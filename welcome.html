<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>欢迎来到游导旅游 - 开启您的旅行之旅</title>
  <meta name="description" content="欢迎使用游导旅游平台，探索全球精彩目的地，找到专业导游，开启完美旅行体验。">
  
  <!-- Preload Critical Resources -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  
  <!-- Stylesheets -->
  <link rel="stylesheet" href="css/onboarding.css">
  <link rel="stylesheet" href="css/animations.css">
  <link rel="stylesheet" href="css/accessibility.css">
  
  <style>
    /* Welcome Page Specific Styles */
    :root {
      --welcome-primary: #4F86F7;
      --welcome-secondary: #3B82F6;
      --welcome-accent: #10B981;
      --welcome-warning: #F59E0B;
      --welcome-bg: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #0f172a 0%, #1e3a5f 50%, #0f172a 100%);
      min-height: 100vh;
      overflow-x: hidden;
      color: #fff;
    }

    /* Animated Background */
    .welcome-bg-effects {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      z-index: 0;
      pointer-events: none;
    }

    .floating-shape {
      position: absolute;
      border-radius: 50%;
      opacity: 0.1;
      animation: float 20s ease-in-out infinite;
    }

    .floating-shape:nth-child(1) {
      width: 400px;
      height: 400px;
      background: var(--welcome-primary);
      top: -100px;
      left: -100px;
      animation-delay: 0s;
    }

    .floating-shape:nth-child(2) {
      width: 300px;
      height: 300px;
      background: var(--welcome-accent);
      top: 50%;
      right: -50px;
      animation-delay: -5s;
    }

    .floating-shape:nth-child(3) {
      width: 200px;
      height: 200px;
      background: var(--welcome-warning);
      bottom: -50px;
      left: 30%;
      animation-delay: -10s;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0) rotate(0deg); }
      50% { transform: translateY(-30px) rotate(180deg); }
    }

    /* Main Container */
    .welcome-container {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* Skip Link */
    .welcome-skip {
      position: fixed;
      top: 24px;
      right: 24px;
      z-index: 100;
    }

    .skip-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 20px;
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 50px;
      color: rgba(255, 255, 255, 0.8);
      font-size: 14px;
      font-weight: 500;
      text-decoration: none;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .skip-btn:hover {
      background: rgba(255, 255, 255, 0.2);
      color: #fff;
      transform: translateY(-2px);
    }

    /* Hero Section */
    .welcome-hero {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 60px 24px;
      text-align: center;
      max-width: 800px;
      margin: 0 auto;
    }

    /* Logo Animation */
    .welcome-logo-container {
      margin-bottom: 40px;
      animation: fadeInUp 0.8s ease-out;
    }

    .welcome-logo {
      width: 120px;
      height: 120px;
      background: linear-gradient(135deg, var(--welcome-primary) 0%, var(--welcome-secondary) 100%);
      border-radius: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 56px;
      box-shadow: 0 20px 60px rgba(79, 134, 247, 0.4);
      animation: pulse-glow 3s ease-in-out infinite;
    }

    @keyframes pulse-glow {
      0%, 100% { box-shadow: 0 20px 60px rgba(79, 134, 247, 0.4); }
      50% { box-shadow: 0 20px 80px rgba(79, 134, 247, 0.6); }
    }

    /* Typography */
    .welcome-title {
      font-size: clamp(2.5rem, 6vw, 4rem);
      font-weight: 700;
      line-height: 1.2;
      margin-bottom: 20px;
      animation: fadeInUp 0.8s ease-out 0.2s backwards;
    }

    .welcome-title .highlight {
      background: linear-gradient(135deg, #60a5fa 0%, #a78bfa 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .welcome-subtitle {
      font-size: 1.25rem;
      color: rgba(255, 255, 255, 0.7);
      max-width: 600px;
      line-height: 1.6;
      margin-bottom: 48px;
      animation: fadeInUp 0.8s ease-out 0.4s backwards;
    }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* Value Props Grid */
    .value-props {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
      margin-bottom: 48px;
      animation: fadeInUp 0.8s ease-out 0.6s backwards;
    }

    .value-prop {
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 16px;
      padding: 24px;
      text-align: center;
      transition: all 0.3s ease;
    }

    .value-prop:hover {
      background: rgba(255, 255, 255, 0.1);
      transform: translateY(-4px);
      border-color: rgba(79, 134, 247, 0.5);
    }

    .value-prop-icon {
      font-size: 36px;
      margin-bottom: 12px;
    }

    .value-prop-title {
      font-size: 1rem;
      font-weight: 600;
      margin-bottom: 8px;
    }

    .value-prop-desc {
      font-size: 0.875rem;
      color: rgba(255, 255, 255, 0.6);
    }

    /* Action Buttons */
    .welcome-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 16px;
      justify-content: center;
      animation: fadeInUp 0.8s ease-out 0.8s backwards;
    }

    .welcome-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 16px 36px;
      border-radius: 50px;
      font-size: 1rem;
      font-weight: 600;
      text-decoration: none;
      cursor: pointer;
      transition: all 0.3s ease;
      border: none;
    }

    .welcome-btn-primary {
      background: linear-gradient(135deg, var(--welcome-primary) 0%, var(--welcome-secondary) 100%);
      color: #fff;
      box-shadow: 0 8px 30px rgba(79, 134, 247, 0.4);
    }

    .welcome-btn-primary:hover {
      transform: translateY(-3px);
      box-shadow: 0 12px 40px rgba(79, 134, 247, 0.5);
    }

    .welcome-btn-secondary {
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.2);
      color: rgba(255, 255, 255, 0.9);
    }

    .welcome-btn-secondary:hover {
      background: rgba(255, 255, 255, 0.15);
      border-color: rgba(255, 255, 255, 0.3);
    }

    /* Stats Section */
    .welcome-stats {
      display: flex;
      justify-content: center;
      gap: 48px;
      padding: 40px 24px;
      margin-top: auto;
      border-top: 1px solid rgba(255, 255, 255, 0.1);
      animation: fadeInUp 0.8s ease-out 1s backwards;
    }

    .stat-item {
      text-align: center;
    }

    .stat-number {
      font-size: 2rem;
      font-weight: 700;
      color: var(--welcome-primary);
    }

    .stat-label {
      font-size: 0.875rem;
      color: rgba(255, 255, 255, 0.5);
      margin-top: 4px;
    }

    /* Responsive */
    @media (max-width: 640px) {
      .welcome-skip {
        top: 16px;
        right: 16px;
      }

      .welcome-hero {
        padding: 40px 20px;
      }

      .welcome-logo {
        width: 100px;
        height: 100px;
        font-size: 48px;
        border-radius: 28px;
      }

      .welcome-stats {
        gap: 24px;
        flex-wrap: wrap;
      }

      .stat-number {
        font-size: 1.5rem;
      }

      .welcome-btn {
        width: 100%;
        justify-content: center;
      }
    }

    /* Page Transition */
    .page-transition {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: #0f172a;
      z-index: 9999;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.4s ease;
    }

    .page-transition.active {
      opacity: 1;
      pointer-events: auto;
    }

    .page-transition-spinner {
      width: 48px;
      height: 48px;
      border: 4px solid rgba(79, 134, 247, 0.2);
      border-top-color: var(--welcome-primary);
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <!-- Background Effects -->
  <div class="welcome-bg-effects">
    <div class="floating-shape"></div>
    <div class="floating-shape"></div>
    <div class="floating-shape"></div>
  </div>

  <!-- Page Transition -->
  <div class="page-transition" id="pageTransition">
    <div class="page-transition-spinner"></div>
  </div>

  <div class="welcome-container">
    <!-- Skip Link -->
    <div class="welcome-skip">
      <a href="index.html" class="skip-btn" id="skipBtn">
        <span>跳过</span>
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M5 12h14M12 5l7 7-7 7"/>
        </svg>
      </a>
    </div>

    <!-- Hero Section -->
    <main class="welcome-hero">
      <!-- Logo -->
      <div class="welcome-logo-container">
        <div class="welcome-logo">🧭</div>
      </div>

      <!-- Title -->
      <h1 class="welcome-title">
        欢迎来到 <span class="highlight">游导旅游</span>
      </h1>

      <!-- Subtitle -->
      <p class="welcome-subtitle">
        连接全球专业导游与旅行者，开启独特、深度的旅行体验。
        无论您向往何处，我们都将助您发现不一样的风景。
      </p>

      <!-- Value Props -->
      <div class="value-props">
        <div class="value-prop">
          <div class="value-prop-icon">🎯</div>
          <div class="value-prop-title">精准匹配</div>
          <div class="value-prop-desc">根据目的地和偏好智能推荐最佳导游</div>
        </div>
        <div class="value-prop">
          <div class="value-prop-icon">🛡️</div>
          <div class="value-prop-title">安全保障</div>
          <div class="value-prop-desc">专业认证导游，真实用户评价</div>
        </div>
        <div class="value-prop">
          <div class="value-prop-icon">💎</div>
          <div class="value-prop-title">品质体验</div>
          <div class="value-prop-desc">精选特色路线，发现小众目的地</div>
        </div>
        <div class="value-prop">
          <div class="value-prop-icon">🤝</div>
          <div class="value-prop-title">贴心服务</div>
          <div class="value-prop-desc">7×24小时客服支持，行程无忧</div>
        </div>
      </div>

      <!-- Action Buttons -->
      <div class="welcome-actions">
        <a href="tour.html" class="welcome-btn welcome-btn-primary" id="startTourBtn">
          <span>开始功能导览</span>
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M5 12h14M12 5l7 7-7 7"/>
          </svg>
        </a>
        <a href="discover.html" class="welcome-btn welcome-btn-secondary">
          <span>探索全部功能</span>
        </a>
      </div>
    </main>

    <!-- Stats -->
    <footer class="welcome-stats">
      <div class="stat-item">
        <div class="stat-number">5000+</div>
        <div class="stat-label">认证导游</div>
      </div>
      <div class="stat-item">
        <div class="stat-number">100+</div>
        <div class="stat-label">热门目的地</div>
      </div>
      <div class="stat-item">
        <div class="stat-number">98%</div>
        <div class="stat-label">用户满意度</div>
      </div>
      <div class="stat-item">
        <div class="stat-number">50000+</div>
        <div class="stat-label">成功订单</div>
      </div>
    </footer>
  </div>

  <script>
    // Mark as not onboarded (for testing purposes)
    localStorage.removeItem('travel_onboarded');
    localStorage.removeItem('travel_onboarding_step');

    // Page transition on navigation
    document.querySelectorAll('.welcome-btn, .skip-btn').forEach(btn => {
      btn.addEventListener('click', function(e) {
        e.preventDefault();
        const href = this.getAttribute('href');
        document.getElementById('pageTransition').classList.add('active');
        
        setTimeout(() => {
          window.location.href = href;
        }, 400);
      });
    });

    // Add entrance animation
    document.addEventListener('DOMContentLoaded', () => {
      document.body.style.opacity = '0';
      setTimeout(() => {
        document.body.style.transition = 'opacity 0.5s ease';
        document.body.style.opacity = '1';
      }, 100);
    });
  </script>
</body>
</html>
