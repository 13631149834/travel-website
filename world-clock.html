    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #6366F1 0%, #8B5CF6 50%, #A855F7 100%);
            min-height: 100vh;
        }
        
        /* 导航栏 */
        .navbar {
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(10px);
            padding: 15px 0;
            box-shadow: 0 2px 20px rgba(0,0,0,0.1);
            position: sticky;
            top: 0;
            z-index: 100;
        }
        
        .navbar .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        
        .navbar .logo {
            font-size: 24px;
            color: #6366F1;
            text-decoration: none;
            font-weight: bold;
        }
        
        .navbar .back-link {
            color: #6366F1;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 14px;
        }
        
        .navbar .back-link:hover {
            text-decoration: underline;
        }
        
        /* 主容器 */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 20px;
        }
        
        /* 页面标题 */
        .page-header {
            text-align: center;
            color: white;
            margin-bottom: 40px;
        }
        
        .page-header .icon {
            font-size: 60px;
            margin-bottom: 15px;
        }
        
        .page-header h1 {
            font-size: 36px;
            margin-bottom: 10px;
            text-shadow: 0 2px 10px rgba(0,0,0,0.2);
        }
        
        .page-header p {
            font-size: 16px;
            opacity: 0.9;
        }
        
        /* 本地时间 */
        .local-time-card {
            background: linear-gradient(135deg, rgba(255,255,255,0.95) 0%, rgba(255,255,255,0.9) 100%);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            padding: 50px;
            margin-bottom: 40px;
            box-shadow: 0 25px 80px rgba(0,0,0,0.2);
            text-align: center;
            animation: slideDown 0.6s ease;
        }
        
        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .local-time-label {
            font-size: 16px;
            color: #64748B;
            margin-bottom: 15px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        
        .local-time {
            font-size: 80px;
            font-weight: 700;
            color: #6366F1;
            margin-bottom: 10px;
            font-family: 'Courier New', monospace;
            letter-spacing: -2px;
        }
        
        .local-date {
            font-size: 20px;
            color: #475569;
            font-weight: 500;
        }
        
        .local-location {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 18px;
            background: #EEF2FF;
            color: #6366F1;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 600;
            margin-top: 20px;
        }
        
        /* 时差计算器 */
        .calculator-section {
            background: linear-gradient(135deg, rgba(255,255,255,0.95) 0%, rgba(255,255,255,0.9) 100%);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            padding: 35px;
            margin-bottom: 40px;
            box-shadow: 0 25px 80px rgba(0,0,0,0.2);
        }
        
        .calculator-section h2 {
            font-size: 22px;
            color: #1E293B;
            margin-bottom: 25px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .calculator-form {
            display: grid;
            grid-template-columns: 1fr auto 1fr auto;
            gap: 15px;
            align-items: end;
        }
        
        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        
        .form-group label {
            font-size: 13px;
            color: #64748B;
            font-weight: 600;
        }
        
        .form-group select,
        .form-group input {
            padding: 14px 16px;
            border: 2px solid #E2E8F0;
            border-radius: 12px;
            font-size: 16px;
            background: white;
            transition: all 0.3s;
        }
        
        .form-group select:focus,
        .form-group input:focus {
            outline: none;
            border-color: #6366F1;
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.1);
        }
        
        .calc-btn {
            padding: 14px 28px;
            background: linear-gradient(135deg, #6366F1 0%, #8B5CF6 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .calc-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(99, 102, 241, 0.4);
        }
        
        .calculator-result {
            margin-top: 25px;
            padding: 25px;
            background: linear-gradient(135deg, #EEF2FF 0%, #E0E7FF 100%);
            border-radius: 16px;
            display: none;
        }
        
        .calculator-result.show {
            display: block;
            animation: slideUp 0.4s ease;
        }
        
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .result-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
        }
        
        .result-item {
            text-align: center;
            padding: 20px;
            background: white;
            border-radius: 12px;
        }
        
        .result-item .label {
            font-size: 13px;
            color: #64748B;
            margin-bottom: 8px;
        }
        
        .result-item .time {
            font-size: 28px;
            font-weight: 700;
            color: #6366F1;
            font-family: 'Courier New', monospace;
        }
        
        .result-item .city {
            font-size: 14px;
            color: #1E293B;
            margin-top: 5px;
        }
        
        .result-item .timezone {
            font-size: 12px;
            color: #94A3B8;
            margin-top: 3px;
        }
        
        /* 世界时钟网格 */
        .clocks-section {
            margin-bottom: 40px;
        }
        
        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            flex-wrap: wrap;
            gap: 15px;
        }
        
        .section-title {
            font-size: 22px;
            color: white;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .add-city-btn {
            padding: 12px 24px;
            background: rgba(255,255,255,0.95);
            color: #6366F1;
            border: none;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.3s;
        }
        
        .add-city-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(255,255,255,0.3);
        }
        
        .clocks-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 25px;
        }
        
        .clock-card {
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.15);
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
            animation: fadeIn 0.5s ease forwards;
            opacity: 0;
        }
        
        @keyframes fadeIn {
            to { opacity: 1; }
        }
        
        .clock-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 20px 60px rgba(99, 102, 241, 0.3);
        }
        
        .clock-card.day {
            background: linear-gradient(135deg, #FEF9C3 0%, #FEF08A 100%);
        }
        
        .clock-card.night {
            background: linear-gradient(135deg, #1E293B 0%, #334155 100%);
        }
        
        .clock-card.night .city-name,
        .clock-card.night .city-country,
        .clock-card.night .time-diff,
        .clock-card.night .clock-date,
        .clock-card.night .timezone-name {
            color: white;
        }
        
        .clock-card.night .clock-time {
            color: #FCD34D;
        }
        
        .clock-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 20px;
        }
        
        .clock-flag {
            font-size: 36px;
        }
        
        .clock-info {
            flex: 1;
        }
        
        .clock-info h3 {
            font-size: 18px;
            color: #1E293B;
            font-weight: 700;
            margin-bottom: 4px;
        }
        
        .clock-info .city-country {
            font-size: 13px;
            color: #64748B;
        }
        
        .remove-btn {
            background: none;
            border: none;
            font-size: 20px;
            cursor: pointer;
            opacity: 0.5;
            transition: all 0.3s;
            padding: 5px;
        }
        
        .remove-btn:hover {
            opacity: 1;
            transform: scale(1.2);
        }
        
        .clock-time {
            font-size: 48px;
            font-weight: 700;
            color: #6366F1;
            margin-bottom: 10px;
            font-family: 'Courier New', monospace;
            letter-spacing: -1px;
        }
        
        .clock-date {
            font-size: 14px;
            color: #64748B;
            margin-bottom: 15px;
        }
        
        .clock-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }
        
        .time-diff {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            padding: 6px 14px;
            background: #EEF2FF;
            color: #6366F1;
            border-radius: 15px;
            font-size: 13px;
            font-weight: 600;
        }
        
        .timezone-name {
            font-size: 12px;
            color: #94A3B8;
            font-family: monospace;
        }
        
        /* 时钟图标 */
        .clock-icon {
            position: absolute;
            top: -20px;
            right: -20px;
            width: 80px;
            height: 80px;
            background: rgba(99, 102, 241, 0.1);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
        }
        
        /* 模态框 */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(5px);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            padding: 20px;
        }
        
        .modal-overlay.show {
            display: flex;
        }
        
        .modal {
            background: white;
            border-radius: 24px;
            padding: 35px;
            max-width: 500px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
            animation: modalSlide 0.3s ease;
        }
        
        @keyframes modalSlide {
            from { opacity: 0; transform: scale(0.9) translateY(20px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }
        
        .modal h2 {
            font-size: 22px;
            color: #1E293B;
            margin-bottom: 25px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .modal-close {
            position: absolute;
            top: 20px;
            right: 20px;
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            color: #64748B;
        }
        
        .city-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 12px;
            margin-bottom: 25px;
        }
        
        .city-item {
            padding: 15px;
            background: #F8FAFC;
            border: 2px solid transparent;
            border-radius: 12px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .city-item:hover {
            background: #EEF2FF;
            border-color: #6366F1;
        }
        
        .city-item.selected {
            background: #EEF2FF;
            border-color: #6366F1;
        }
        
        .city-item .flag {
            font-size: 28px;
            margin-bottom: 5px;
        }
        
        .city-item .name {
            font-size: 14px;
            font-weight: 600;
            color: #1E293B;
        }
        
        .city-item .country {
            font-size: 11px;
            color: #64748B;
        }
        
        .modal-actions {
            display: flex;
            gap: 15px;
        }
        
        .modal-actions button {
            flex: 1;
            padding: 14px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .btn-cancel {
            background: #F1F5F9;
            color: #64748B;
            border: none;
        }
        
        .btn-cancel:hover {
            background: #E2E8F0;
        }
        
        .btn-confirm {
            background: linear-gradient(135deg, #6366F1 0%, #8B5CF6 100%);
            color: white;
            border: none;
        }
        
        .btn-confirm:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(99, 102, 241, 0.4);
        }
        
        .btn-confirm:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }
        
        /* 提示信息 */
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: #1E293B;
            color: white;
            padding: 16px 28px;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 500;
            z-index: 2000;
            opacity: 0;
            transition: all 0.3s;
        }
        
        .toast.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }
        
        /* 响应式 */
        @media (max-width: 768px) {
            .container {
                padding: 20px 15px;
            }
            
            .page-header h1 {
                font-size: 28px;
            }
            
            .local-time {
                font-size: 56px;
            }
            
            .local-time-card {
                padding: 35px 20px;
            }
            
            .clocks-grid {
                grid-template-columns: 1fr;
            }
            
            .clock-time {
                font-size: 36px;
            }
            
            .calculator-form {
                grid-template-columns: 1fr;
            }
            
            .calc-arrow,
            .calc-equals {
                display: none;
            }
            
            .section-header {
                flex-direction: column;
                align-items: flex-start;
            }
            
            .city-list {
                grid-template-columns: repeat(2, 1fr);
            }
        }
    
/* 无障碍 - 焦点可见样式 (WCAG 2.1 AA) */
.skip-link {
  position: absolute;
  top: -100px;
  left: 50%;
  transform: translateX(-50%);
  background: var(--primary);
  color: #fff !important;
  padding: 12px 24px;
  border-radius: 0 0 8px 8px;
  z-index: 10000;
  font-weight: 600;
  transition: top 0.2s;
}
.skip-link:focus {
  top: 0;
  outline: 3px solid var(--primary-dark);
  outline-offset: 2px;
}

/* 全局焦点样式 */
:focus {
  outline: 3px solid var(--primary);
  outline-offset: 2px;
}
:focus:not(:focus-visible) {
  outline: none;
}
:focus-visible {
  outline: 3px solid var(--primary);
  outline-offset: 2px;
}

/* 链接焦点样式 */
a:focus,
button:focus,
[tabindex]:focus {
  outline: 3px solid var(--primary);
  outline-offset: 2px;
  border-radius: 2px;
}

/* 输入框焦点 */
input:focus,
textarea:focus,
select:focus {
  outline: 3px solid var(--primary);
  outline-offset: 0;
  border-color: var(--primary);
}

</style>

    <div class="container">
        <!-- 页面标题 -->
        <div class="page-header">
            <div class="icon">⏰</div>
            <h1>世界时钟</h1>
            <p>查看全球热门旅游城市的实时时间，方便安排行程</p>
        </div>
        
        <!-- 本地时间 -->
        <div class="local-time-card">
            <div class="local-time-label">本地时间</div>
            <div class="local-time" id="localTime">--:--:--</div>
            <div class="local-date" id="localDate">----年--月--日 星期-</div>
            <div class="local-location" id="localTimezone">📍 您当前所在位置</div>
        </div>
        
        <!-- 时差计算器 -->
        <div class="calculator-section">
            <h2>🧮 时差计算器</h2>
            <div class="calculator-form">
                <div class="form-group">
                    <label>源城市</label>
                    <select id="sourceCity">
                        <!-- 动态生成 -->
                    </select>
                </div>
                <div class="calc-arrow" style="padding-bottom: 14px; font-size: 24px; color: #6366F1;">→</div>
                <div class="form-group">
                    <label>目标城市</label>
                    <select id="targetCity">
                        <!-- 动态生成 -->
                    </select>
                </div>
                <div class="calc-equals" style="padding-bottom: 14px; font-size: 24px; color: #6366F1;">=</div>
                <button class="calc-btn" onclick="calculateTimeDiff()">计算时差</button>
            </div>
            <div class="calculator-result" id="calcResult">
                <div class="result-grid" id="resultGrid">
                    <!-- 动态生成 -->
                </div>
            </div>
        </div>
        
        <!-- 世界时钟 -->
        <div class="clocks-section">
            <div class="section-header">
                <h2 class="section-title">🌏 热门城市时钟</h2>
                <button class="add-city-btn" onclick="openAddCityModal()">
                    <span>➕</span>
                    添加城市
                </button>
            </div>
            <div class="clocks-grid" id="clocksGrid">
                <!-- 动态生成 -->
            </div>
        </div>
    </div>
    
    <!-- 添加城市模态框 -->
    <div class="modal-overlay" id="addCityModal">
        <div class="modal">
            <h2>🏙️ 添加城市</h2>
            <div class="city-list" id="availableCities">
                <!-- 动态生成 -->
            </div>
            <div class="modal-actions">
                <button class="btn-cancel" onclick="closeAddCityModal()">取消</button>
                <button class="btn-confirm" id="confirmAddBtn" onclick="confirmAddCity()" disabled>添加</button>
            </div>
        </div>
    </div>
    
    <!-- Toast提示 -->
    <div class="toast" id="toast"></div>
    
    <script>
        // 所有可用城市数据
        const allCities = [
            { name: '北京', country: '中国', flag: '🇨🇳', timezone: 'Asia/Shanghai', offset: 8 },
            { name: '上海', country: '中国', flag: '🇨🇳', timezone: 'Asia/Shanghai', offset: 8 },
            { name: '东京', country: '日本', flag: '🇯🇵', timezone: 'Asia/Tokyo', offset: 9 },
            { name: '首尔', country: '韩国', flag: '🇰🇷', timezone: 'Asia/Seoul', offset: 9 },
            { name: '曼谷', country: '泰国', flag: '🇹🇭', timezone: 'Asia/Bangkok', offset: 7 },
            { name: '新加坡', country: '新加坡', flag: '🇸🇬', timezone: 'Asia/Singapore', offset: 8 },
            { name: '悉尼', country: '澳大利亚', flag: '🇦🇺', timezone: 'Australia/Sydney', offset: 10 },
            { name: '迪拜', country: '阿联酋', flag: '🇦🇪', timezone: 'Asia/Dubai', offset: 4 },
            { name: '巴黎', country: '法国', flag: '🇫🇷', timezone: 'Europe/Paris', offset: 2 },
            { name: '伦敦', country: '英国', flag: '🇬🇧', timezone: 'Europe/London', offset: 1 },
            { name: '纽约', country: '美国', flag: '🇺🇸', timezone: 'America/New_York', offset: -4 },
            { name: '洛杉矶', country: '美国', flag: '🇺🇸', timezone: 'America/Los_Angeles', offset: -7 }
        ];
        
        // 本地时区名称
        function getLocalTimezoneName() {
            try {
                const tz = Intl.DateTimeFormat().resolvedOptions().timeZone;
                return tz;
            } catch (e) {
                return 'Asia/Shanghai';
            }
        }
        
        // 当前显示的城市（默认热门城市）
        let displayedCities = [...allCities.filter(c => 
            ['北京', '上海', '东京', '首尔', '曼谷', '新加坡', '悉尼', '迪拜', '巴黎', '伦敦', '纽约', '洛杉矶'].includes(c.name)
        )];
        
        // 从localStorage加载用户保存的城市
        function loadSavedCities() {
            const saved = localStorage.getItem('worldClockCities');
            if (saved) {
                try {
                    const savedNames = JSON.parse(saved);
                    displayedCities = allCities.filter(c => savedNames.includes(c.name));
                    if (displayedCities.length === 0) {
                        displayedCities = allCities.filter(c => 
                            ['北京', '东京', '曼谷', '巴黎', '伦敦', '纽约', '悉尼', '迪拜'].includes(c.name)
                        );
                    }
                } catch (e) {
                    console.error('Failed to load saved cities');
                }
            }
        }
        
        // 保存城市到localStorage
        function saveCities() {
            localStorage.setItem('worldClockCities', JSON.stringify(displayedCities.map(c => c.name)));
        }
        
        // 格式化时间
        function formatTime(date) {
            const hours = String(date.getHours()).padStart(2, '0');
            const minutes = String(date.getMinutes()).padStart(2, '0');
            const seconds = String(date.getSeconds()).padStart(2, '0');
            return `${hours}:${minutes}:${seconds}`;
        }
        
        // 格式化日期
        function formatDate(date) {
            const year = date.getFullYear();
            const month = String(date.getMonth() + 1).padStart(2, '0');
            const day = String(date.getDate()).padStart(2, '0');
            const weekdays = ['日', '一', '二', '三', '四', '五', '六'];
            const weekday = weekdays[date.getDay()];
            return `${year}年${month}月${day}日 星期${weekday}`;
        }
        
        // 获取时差描述
        function getTimeDiffDesc(sourceOffset, targetOffset) {
            const diff = targetOffset - sourceOffset;
            if (diff === 0) return '相同时间';
            
            const absDiff = Math.abs(diff);
            const sign = diff > 0 ? '+' : '';
            return `${sign}${diff}小时`;
        }
        
        // 判断是否是白天
        function isDayTime(hour) {
            return hour >= 6 && hour < 18;
        }
        
        // 更新本地时间
        function updateLocalTime() {
            const now = new Date();
            document.getElementById('localTime').textContent = formatTime(now);
            document.getElementById('localDate').textContent = formatDate(now);
            document.getElementById('localTimezone').textContent = `📍 ${getLocalTimezoneName()}`;
        }
        
        // 更新世界时钟
        function updateWorldClocks() {
            const grid = document.getElementById('clocksGrid');
            const now = new Date();
            
            grid.innerHTML = displayedCities.map((city, index) => {
                const cityTime = new Date(now.toLocaleString('en-US', { timeZone: city.timezone }));
                const hour = cityTime.getHours();
                const isDay = isDayTime(hour);
                const localOffset = -new Date().getTimezoneOffset() / 60;
                const timeDiff = city.offset - localOffset;
                const diffText = timeDiff === 0 ? '📍 本地时间' : 
                    (timeDiff > 0 ? `⏰ 快${timeDiff}小时` : `⏰ 慢${Math.abs(timeDiff)}小时`);
                
                return `
                    <div class="clock-card ${isDay ? 'day' : 'night'}" style="animation-delay: ${index * 0.08}s">
                        <div class="clock-icon">${isDay ? '☀️' : '🌙'}</div>
                        <div class="clock-header">
                            <span class="clock-flag">${city.flag}</span>
                            <div class="clock-info">
                                <h3 class="city-name">${city.name}</h3>
                                <div class="city-country">${city.country}</div>
                            </div>
                            <button class="remove-btn" onclick="removeCity('${city.name}')" title="移除">✕</button>
                        </div>
                        <div class="clock-time">${formatTime(cityTime)}</div>
                        <div class="clock-date">${formatDate(cityTime)}</div>
                        <div class="clock-footer">
                            <div class="time-diff">${diffText}</div>
                            <div class="timezone-name">${city.timezone}</div>
                        </div>
                    </div>
                `;
            }).join('');
        }
        
        // 初始化时差计算器选项
        function initCalculator() {
            const sourceSelect = document.getElementById('sourceCity');
            const targetSelect = document.getElementById('targetCity');
            
            const options = displayedCities.map(city => 
                `<option value="${city.name}" data-offset="${city.offset}" data-tz="${city.timezone}">${city.name} (${city.country})</option>`
            ).join('');
            
            sourceSelect.innerHTML = options;
            targetSelect.innerHTML = options;
            
            // 默认选择不同城市
            if (displayedCities.length > 1) {
                targetSelect.selectedIndex = 1;
            }
        }
        
        // 计算时差
        function calculateTimeDiff() {
            const sourceSelect = document.getElementById('sourceCity');
            const targetSelect = document.getElementById('targetCity');
            
            const sourceName = sourceSelect.value;
            const targetName = targetSelect.value;
            
            const sourceCity = displayedCities.find(c => c.name === sourceName);
            const targetCity = displayedCities.find(c => c.name === targetName);
            
            if (!sourceCity || !targetCity) return;
            
            const now = new Date();
            const sourceTime = new Date(now.toLocaleString('en-US', { timeZone: sourceCity.timezone }));
            const targetTime = new Date(now.toLocaleString('en-US', { timeZone: targetCity.timezone }));
            
            const resultGrid = document.getElementById('resultGrid');
            const calcResult = document.getElementById('calcResult');
            
            resultGrid.innerHTML = `
                <div class="result-item">
                    <div class="label">源城市时间</div>
                    <div class="time">${formatTime(sourceTime)}</div>
                    <div class="city">${sourceCity.name}</div>
                    <div class="timezone">${sourceCity.timezone}</div>
                </div>
                <div class="result-item">
                    <div class="label">目标城市时间</div>
                    <div class="time">${formatTime(targetTime)}</div>
                    <div class="city">${targetCity.name}</div>
                    <div class="timezone">${targetCity.timezone}</div>
                </div>
                <div class="result-item">
                    <div class="label">时差</div>
                    <div class="time">${getTimeDiffDesc(sourceCity.offset, targetCity.offset)}</div>
                    <div class="city">${sourceCity.name} → ${targetCity.name}</div>
                </div>
            `;
            
            calcResult.classList.add('show');
        }
        
        // 打开添加城市模态框
        function openAddCityModal() {
            const modal = document.getElementById('addCityModal');
            const cityList = document.getElementById('availableCities');
            
            // 显示未添加的城市
            const availableCities = allCities.filter(c => 
                !displayedCities.some(dc => dc.name === c.name)
            );
            
            cityList.innerHTML = availableCities.map(city => `
                <div class="city-item" data-city="${city.name}" onclick="selectCity(this)">
                    <div class="flag">${city.flag}</div>
                    <div class="name">${city.name}</div>
                    <div class="country">${city.country}</div>
                </div>
            `).join('');
            
            if (availableCities.length === 0) {
                cityList.innerHTML = '<p style="text-align:center;color:#64748B;grid-column:1/-1;padding:30px;">所有城市已添加完毕</p>';
            }
            
            window.selectedCity = null;
            document.getElementById('confirmAddBtn').disabled = true;
            modal.classList.add('show');
        }
        
        // 选择城市
        function selectCity(element) {
            document.querySelectorAll('.city-item').forEach(el => el.classList.remove('selected'));
            element.classList.add('selected');
            window.selectedCity = element.dataset.city;
            document.getElementById('confirmAddBtn').disabled = false;
        }
        
        // 确认添加城市
        function confirmAddCity() {
            if (!window.selectedCity) return;
            
            const city = allCities.find(c => c.name === window.selectedCity);
            if (city && !displayedCities.some(c => c.name === city.name)) {
                displayedCities.push(city);
                saveCities();
                updateWorldClocks();
                initCalculator();
                closeAddCityModal();
                showToast(`已添加 ${city.name}`);
            }
        }
        
        // 关闭添加城市模态框
        function closeAddCityModal() {
            document.getElementById('addCityModal').classList.remove('show');
            window.selectedCity = null;
        }
        
        // 移除城市
        function removeCity(cityName) {
            const city = displayedCities.find(c => c.name === cityName);
            if (!city) return;
            
            displayedCities = displayedCities.filter(c => c.name !== cityName);
            saveCities();
            updateWorldClocks();
            initCalculator();
            showToast(`已移除 ${city.name}`);
        }
        
        // 显示Toast提示
        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.classList.add('show');
            
            setTimeout(() => {
                toast.classList.remove('show');
            }, 2000);
        }
        
        // 初始化并定时更新
        function initClocks() {
            loadSavedCities();
            updateLocalTime();
            updateWorldClocks();
            initCalculator();
            
            // 每秒更新一次
            setInterval(() => {
                updateLocalTime();
                updateWorldClocks();
            }, 1000);
        }
        
        // 点击模态框外部关闭
        document.getElementById('addCityModal').addEventListener('click', function(e) {
            if (e.target === this) {
                closeAddCityModal();
            }
        });
        
        // ESC键关闭模态框
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') {
                closeAddCityModal();
            }
        });
        
        // 页面加载时启动时钟
        document.addEventListener('DOMContentLoaded', initClocks);
    </script>
    <script src="js/performance.js" defer></script>
  <script src="js/enhanced-common.js" defer></script>

    <!-- PWA Service Worker -->
    <script src="js/pwa.js" defer></script>
  <script src="js/mobile.js" defer></script>
  <script src="js/customer-service.js" defer></script>
</body>
</html>
