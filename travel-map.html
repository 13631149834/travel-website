  <style>
    :root {
      --primary: #4F86F7;
      --primary-light: #E8F2FF;
      --primary-dark: #3B6FD9;
      --secondary: #10B981;
      --accent: #F59E0B;
      --bg: #FAFAFA;
      --card-bg: #FFFFFF;
      --text: #424242;
      --text-light: #757575;
      --border: #EEEEEE;
      --shadow: 0 2px 8px rgba(0,0,0,0.06);
      --radius: 12px;
    }
    
    .page-header {
      background: linear-gradient(135deg, var(--primary), #6366F1);
      color: white;
      padding: 48px 0;
      text-align: center;
    }
    .page-header h1 { font-size: 2rem; margin-bottom: 8px; }
    .page-header p { opacity: 0.9; font-size: 1.1rem; }
    
    .main-content {
      max-width: 1200px;
      margin: 0 auto;
      padding: 32px 24px;
    }
    
    /* 统计卡片 */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 16px;
      margin-bottom: 32px;
    }
    .stat-card {
      background: var(--card-bg);
      border-radius: var(--radius);
      padding: 20px;
      text-align: center;
      box-shadow: var(--shadow);
      transition: transform 0.2s;
    }
    .stat-card:hover { transform: translateY(-2px); }
    .stat-icon { font-size: 2rem; margin-bottom: 8px; }
    .stat-value { font-size: 2rem; font-weight: 700; color: var(--primary); }
    .stat-label { color: var(--text-light); font-size: 0.85rem; margin-top: 4px; }
    
    /* 标签切换 */
    .map-tabs {
      display: flex;
      gap: 8px;
      margin-bottom: 24px;
      justify-content: center;
    }
    .map-tab {
      padding: 10px 24px;
      border: 2px solid var(--border);
      background: var(--card-bg);
      border-radius: 30px;
      font-size: 0.95rem;
      font-weight: 500;
      color: var(--text-light);
      cursor: pointer;
      transition: all 0.2s;
    }
    .map-tab:hover { border-color: var(--primary); color: var(--primary); }
    .map-tab.active {
      background: var(--primary);
      border-color: var(--primary);
      color: white;
    }
    
    /* 地图容器 */
    .map-container {
      background: var(--card-bg);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 24px;
      margin-bottom: 32px;
      position: relative;
    }
    .map-wrapper {
      position: relative;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 500px;
    }
    .map-svg { width: 100%; max-width: 800px; height: auto; }
    
    /* 省份/国家样式 */
    .region {
      fill: #E5E7EB;
      stroke: #D1D5DB;
      stroke-width: 1;
      cursor: pointer;
      transition: all 0.3s ease;
    }
    .region:hover { fill: #D1D5DB; }
    .region.visited {
      fill: var(--primary);
      stroke: var(--primary-dark);
    }
    .region.visited:hover { fill: var(--primary-dark); }
    
    /* 打卡弹窗 */
    .checkin-modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.5);
      z-index: 1000;
      justify-content: center;
      align-items: center;
      animation: fadeIn 0.2s;
    }
    .checkin-modal.show { display: flex; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    
    .modal-content {
      background: white;
      border-radius: var(--radius);
      padding: 32px;
      max-width: 400px;
      width: 90%;
      text-align: center;
      animation: slideUp 0.3s;
    }
    @keyframes slideUp {
      from { transform: translateY(20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    .modal-icon { font-size: 4rem; margin-bottom: 16px; }
    .modal-title { font-size: 1.5rem; font-weight: 600; margin-bottom: 8px; }
    .modal-subtitle { color: var(--text-light); margin-bottom: 24px; }
    .modal-time { color: var(--primary); font-weight: 500; }
    .modal-buttons { display: flex; gap: 12px; justify-content: center; }
    .btn {
      padding: 12px 28px;
      border-radius: 30px;
      font-size: 1rem;
      font-weight: 500;
      border: none;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn-primary { background: var(--primary); color: white; }
    .btn-primary:hover { background: var(--primary-dark); }
    .btn-secondary { background: var(--bg); color: var(--text); }
    .btn-secondary:hover { background: #E5E7EB; }
    .btn-danger { background: #FEE2E2; color: #DC2626; }
    .btn-danger:hover { background: #FECACA; }
    
    /* 成就展示 */
    .achievements {
      background: var(--card-bg);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 24px;
    }
    .achievements h2 {
      font-size: 1.25rem;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .badge-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
      gap: 16px;
    }
    .badge-item {
      text-align: center;
      padding: 16px 8px;
      border-radius: var(--radius);
      background: var(--bg);
      transition: all 0.2s;
    }
    .badge-item.unlocked {
      background: linear-gradient(135deg, #FEF3C7, #FDE68A);
      border: 2px solid #F59E0B;
    }
    .badge-item.locked { opacity: 0.5; filter: grayscale(1); }
    .badge-icon { font-size: 2.5rem; margin-bottom: 8px; }
    .badge-name { font-weight: 600; font-size: 0.9rem; }
    .badge-desc { font-size: 0.75rem; color: var(--text-light); margin-top: 4px; }
    
    /* 已打卡列表 */
    .visited-list {
      background: var(--card-bg);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 24px;
      margin-top: 32px;
    }
    .visited-list h2 {
      font-size: 1.25rem;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .visited-items {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 12px;
    }
    .visited-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px;
      background: var(--bg);
      border-radius: 8px;
      font-size: 0.9rem;
    }
    .visited-item .flag { font-size: 1.2rem; }
    .visited-item .name { flex: 1; font-weight: 500; }
    .visited-item .time { font-size: 0.75rem; color: var(--text-light); }
    .visited-item .remove-btn {
      width: 24px;
      height: 24px;
      border: none;
      background: #FEE2E2;
      color: #DC2626;
      border-radius: 50%;
      cursor: pointer;
      font-size: 0.8rem;
      opacity: 0.7;
      transition: all 0.2s;
    }
    .visited-item .remove-btn:hover { opacity: 1; transform: scale(1.1); }
    
    /* 空状态 */
    .empty-state {
      text-align: center;
      padding: 48px 24px;
      color: var(--text-light);
    }
    .empty-state .icon { font-size: 4rem; margin-bottom: 16px; opacity: 0.5; }
    
    /* 提示 */
    .tip {
      background: var(--primary-light);
      border-radius: 8px;
      padding: 16px;
      margin-bottom: 24px;
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 0.9rem;
      color: var(--primary-dark);
    }
    .tip-icon { font-size: 1.5rem; }
    
    /* 动画效果 */
    .pulse {
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    
    .sparkle {
      animation: sparkle 0.6s ease-out;
    }
    @keyframes sparkle {
      0% { transform: scale(0); opacity: 1; }
      50% { transform: scale(1.2); }
      100% { transform: scale(1); opacity: 1; }
    }
    
    /* 进度条 */
    .progress-section {
      margin-top: 24px;
      padding-top: 24px;
      border-top: 1px solid var(--border);
    }
    .progress-bar {
      height: 8px;
      background: var(--border);
      border-radius: 4px;
      overflow: hidden;
      margin-top: 12px;
    }
    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--primary), #6366F1);
      border-radius: 4px;
      transition: width 0.5s ease;
    }
    .progress-text {
      display: flex;
      justify-content: space-between;
      font-size: 0.85rem;
      color: var(--text-light);
      margin-top: 8px;
    }
    
    /* 响应式 */
    @media (max-width: 768px) {
      .page-header { padding: 32px 0; }
      .page-header h1 { font-size: 1.5rem; }
      .stats-grid { grid-template-columns: repeat(2, 1fr); }
      .map-tabs { flex-wrap: wrap; }
      .map-tab { padding: 8px 16px; font-size: 0.85rem; }
      .map-wrapper { min-height: 350px; }
    }
  
/* 无障碍 - 焦点可见样式 (WCAG 2.1 AA) */
.skip-link {
  position: absolute;
  top: -100px;
  left: 50%;
  transform: translateX(-50%);
  background: var(--primary);
  color: #fff !important;
  padding: 12px 24px;
  border-radius: 0 0 8px 8px;
  z-index: 10000;
  font-weight: 600;
  transition: top 0.2s;
}
.skip-link:focus {
  top: 0;
  outline: 3px solid var(--primary-dark);
  outline-offset: 2px;
}

/* 全局焦点样式 */
:focus {
  outline: 3px solid var(--primary);
  outline-offset: 2px;
}
:focus:not(:focus-visible) {
  outline: none;
}
:focus-visible {
  outline: 3px solid var(--primary);
  outline-offset: 2px;
}

/* 链接焦点样式 */
a:focus,
button:focus,
[tabindex]:focus {
  outline: 3px solid var(--primary);
  outline-offset: 2px;
  border-radius: 2px;
}

/* 输入框焦点 */
input:focus,
textarea:focus,
select:focus {
  outline: 3px solid var(--primary);
  outline-offset: 0;
  border-color: var(--primary);
}

    <!-- 成就展示 -->
    <section id="main-content" class="achievements">
      <h2>🏆 打卡成就</h2>
      <div class="badge-grid" id="badgeGrid">
        <!-- 动态生成 -->
      </div>
      <div class="progress-section">
        <div class="progress-text">
          <span>中国打卡进度</span>
          <span id="chinaProgress">0/34</span>
        </div>
        <div class="progress-bar">
          <div class="progress-fill" id="chinaProgressBar" style="width: 0%"></div>
        </div>
      </div>
    </section>

    <!-- 已打卡列表 -->
    <section class="visited-list">
      <h2>📋 打卡记录</h2>
      <div class="visited-items" id="visitedItems">
        <div class="empty-state" id="emptyState">
          <div class="icon">🗺️</div>
          <p>还没有打卡记录，<br>点击地图开始你的旅程吧！</p>
        </div>
      </div>
    </section>
  </main>

  <!-- 打卡弹窗 -->
  <div class="checkin-modal" id="checkinModal">
    <div class="modal-content">
      <div class="modal-icon" id="modalIcon">🎉</div>
      <h3 class="modal-title" id="modalTitle">打卡成功！</h3>
      <p class="modal-subtitle" id="modalSubtitle">恭喜你踏上了这片土地</p>
      <p class="modal-time" id="modalTime"></p>
      <div class="modal-buttons" id="modalButtons">
        <button class="btn btn-danger" id="cancelBtn">取消打卡</button>
        <button class="btn btn-primary" id="closeBtn">太棒了！</button>
      </div>
    </div>
  </div>

  <script>
    // 数据管理
    const STORAGE_KEY = 'travelMapData';
    const CHINA_TOTAL = 34;
    const WORLD_COUNTRIES = ['japan', 'korea', 'mongolia', 'india', 'thailand', 'vietnam', 'singapore', 'indonesia', 'malaysia', 'philippines', 'uae', 'saudi', 'israel', 'turkey', 'uk', 'france', 'germany', 'italy', 'spain', 'portugal', 'netherlands', 'belgium', 'switzerland', 'austria', 'poland', 'russia', 'norway', 'sweden', 'finland', 'denmark', 'greece', 'czech', 'hungary', 'iceland', 'usa', 'canada', 'mexico', 'brazil', 'argentina', 'peru', 'chile', 'colombia', 'venezuela', 'australia', 'newzealand', 'egypt', 'southafrica', 'morocco', 'kenya', 'tanzania', 'nigeria', 'ethiopia'];
    const WORLD_TOTAL = WORLD_COUNTRIES.length;

    // 成就配置
    const BADGES = [
      { id: 'first', name: '初次启程', desc: '完成第一次打卡', icon: '🚶', check: (d) => d.china.length + d.world.length >= 1 },
      { id: 'explorer', name: '初探中国', desc: '打卡5个中国省份', icon: '🗺️', check: (d) => d.china.length >= 5 },
      { id: 'wanderer', name: '漫游者', desc: '打卡10个中国省份', icon: '🎒', check: (d) => d.china.length >= 10 },
      { id: 'traveler', name: '旅行家', desc: '打卡20个中国省份', icon: '✈️', check: (d) => d.china.length >= 20 },
      { id: 'grandmaster', name: '华夏大侠', desc: '打卡全中国', icon: '🏔️', check: (d) => d.china.length >= CHINA_TOTAL },
      { id: 'world_first', name: '冲出亚洲', desc: '打卡第一个亚洲以外国家', icon: '🌏', check: (d) => d.world.length >= 1 },
      { id: 'world_5', name: '五洲宾客', desc: '打卡5个国家', icon: '🛂', check: (d) => d.world.length >= 5 },
      { id: 'world_10', name: '环球旅行家', desc: '打卡10个国家', icon: '🗺', check: (d) => d.world.length >= 10 },
      { id: 'world_20', name: '世界公民', desc: '打卡20个国家', icon: '🌍', check: (d) => d.world.length >= 20 },
      { id: 'total_30', name: '足迹累积', desc: '累计打卡30个地区', icon: '📍', check: (d) => d.china.length + d.world.length >= 30 },
    ];

    // 获取数据
    function getData() {
      const stored = localStorage.getItem(STORAGE_KEY);
      if (stored) return JSON.parse(stored);
      return { china: [], world: [] };
    }

    // 保存数据
    function saveData(data) {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
    }

    // 更新显示
    function updateDisplay() {
      const data = getData();
      
      // 统计数据
      document.getElementById('chinaCount').textContent = data.china.length;
      document.getElementById('worldCount').textContent = data.world.length;
      document.getElementById('totalCount').textContent = data.china.length + data.world.length;
      
      // 更新地图
      document.querySelectorAll('#chinaMap .region').forEach(el => {
        el.classList.toggle('visited', data.china.includes(el.id));
      });
      document.querySelectorAll('#worldMap .region').forEach(el => {
        el.classList.toggle('visited', data.world.includes(el.id));
      });
      
      // 更新进度
      const chinaPct = Math.round(data.china.length / CHINA_TOTAL * 100);
      document.getElementById('chinaProgress').textContent = `${data.china.length}/${CHINA_TOTAL}`;
      document.getElementById('chinaProgressBar').style.width = `${chinaPct}%`;
      
      // 更新成就
      updateBadges(data);
      
      // 更新打卡列表
      updateVisitedList(data);
    }

    // 更新成就
    function updateBadges(data) {
      const grid = document.getElementById('badgeGrid');
      let unlockedCount = 0;
      
      grid.innerHTML = BADGES.map(badge => {
        const unlocked = badge.check(data);
        if (unlocked) unlockedCount++;
        return `
          <div class="badge-item ${unlocked ? 'unlocked' : 'locked'}">
            <div class="badge-icon">${badge.icon}</div>
            <div class="badge-name">${badge.name}</div>
            <div class="badge-desc">${badge.desc}</div>
          </div>
        `;
      }).join('');
      
      document.getElementById('badgeCount').textContent = unlockedCount;
    }

    // 更新打卡列表
    function updateVisitedList(data) {
      const container = document.getElementById('visitedItems');
      const emptyState = document.getElementById('emptyState');
      
      const allVisited = [
        ...data.china.map(id => ({ id, type: 'china', el: document.getElementById(id) })),
        ...data.world.map(id => ({ id, type: 'world', el: document.getElementById(id) }))
      ].filter(item => item.el);
      
      if (allVisited.length === 0) {
        container.innerHTML = '';
        container.appendChild(emptyState);
        emptyState.style.display = 'block';
        return;
      }
      
      emptyState.style.display = 'none';
      container.innerHTML = allVisited.map(item => {
        const name = item.el.dataset.name;
        const time = data[item.type].find(d => d === item.id || d.id === item.id);
        const timeStr = typeof time === 'object' ? formatDate(time.time) : formatDate(Date.now());
        const flag = getFlag(item.id);
        
        return `
          <div class="visited-item">
            <span class="flag">${flag}</span>
            <span class="name">${name}</span>
            <span class="time">${timeStr}</span>
            <button class="remove-btn" onclick="removeCheckin('${item.type}', '${item.id}')" title="取消打卡">×</button>
          </div>
        `;
      }).join('');
    }

    // 获取旗帜emoji
    function getFlag(id) {
      const flags = {
        heilongjiang: '🔵', jilin: '🔵', liaoning: '🔵', hebei: '🔵', beijing: '🔵', tianjin: '🔵',
        shanxi: '🔵', neimenggu: '🔵', shandong: '🔵', henan: '🔵', jiangsu: '🔵', anhui: '🔵',
        shanghai: '🔵', zhejiang: '🔵', jiangxi: '🔵', fujian: '🔵', hubei: '🔵', hunan: '🔵',
        guangdong: '🔵', guangxi: '🔵', hainan: '🔵', xianggang: '🔵', aomen: '🔵', chongqing: '🔵',
        sichuan: '🔵', guizhou: '🔵', yunnan: '🔵', xizang: '🔵', shaanxi: '🔵', gansu: '🔵',
        qinghai: '🔵', ningxia: '🔵', xinjiang: '🔵', taiwan: '🔵',
        china: '🇨🇳', japan: '🇯🇵', korea: '🇰🇷', mongolia: '🇲🇳', india: '🇮🇳', thailand: '🇹🇭',
        vietnam: '🇻🇳', singapore: '🇸🇬', indonesia: '🇮🇩', malaysia: '🇲🇾', philippines: '🇵🇭',
        uae: '🇦🇪', saudi: '🇸🇦', israel: '🇮🇱', turkey: '🇹🇷', uk: '🇬🇧', france: '🇫🇷',
        germany: '🇩🇪', italy: '🇮🇹', spain: '🇪🇸', portugal: '🇵🇹', netherlands: '🇳🇱', belgium: '🇧🇪',
        switzerland: '🇨🇭', austria: '🇦🇹', poland: '🇵🇱', russia: '🇷🇺', norway: '🇳🇴', sweden: '🇸🇪',
        finland: '🇫🇮', denmark: '🇩🇰', greece: '🇬🇷', czech: '🇨🇿', hungary: '🇭🇺', iceland: '🇮🇸',
        usa: '🇺🇸', canada: '🇨🇦', mexico: '🇲🇽', brazil: '🇧🇷', argentina: '🇦🇷', peru: '🇵🇪',
        chile: '🇨🇱', colombia: '🇨🇴', venezuela: '🇻🇪', australia: '🇦🇺', newzealand: '🇳🇿',
        egypt: '🇪🇬', southafrica: '🇿🇦', morocco: '🇲🇦', kenya: '🇰🇪', tanzania: '🇹🇿',
        nigeria: '🇳🇬', ethiopia: '🇪🇹'
      };
      return flags[id] || '📍';
    }

    // 格式化日期
    function formatDate(timestamp) {
      const d = new Date(timestamp);
      return `${d.getFullYear()}.${String(d.getMonth() + 1).padStart(2, '0')}.${String(d.getDate()).padStart(2, '0')}`;
    }

    // 打卡
    function checkin(type, id) {
      const data = getData();
      const list = type === 'china' ? data.china : data.world;
      const el = document.getElementById(id);
      const name = el.dataset.name;
      
      if (list.includes(id)) {
        showModal(id, type, name, true);
      } else {
        list.push(id);
        saveData(data);
        updateDisplay();
        showModal(id, type, name, false);
        
        // 添加动画效果
        el.classList.add('sparkle');
        setTimeout(() => el.classList.remove('sparkle'), 600);
      }
    }

    // 显示弹窗
    function showModal(id, type, name, alreadyVisited) {
      const modal = document.getElementById('checkinModal');
      const icon = document.getElementById('modalIcon');
      const title = document.getElementById('modalTitle');
      const subtitle = document.getElementById('modalSubtitle');
      const time = document.getElementById('modalTime');
      const buttons = document.getElementById('modalButtons');
      
      const flag = getFlag(id);
      const now = new Date();
      
      if (alreadyVisited) {
        icon.textContent = '📍';
        title.textContent = name;
        subtitle.textContent = '已打卡地点';
        time.textContent = `打卡时间: ${formatDate(now)}`;
        buttons.innerHTML = `
          <button class="btn btn-danger" onclick="removeCheckin('${type}', '${id}'); closeModal();">取消打卡</button>
          <button class="btn btn-primary" onclick="closeModal()">知道了</button>
        `;
      } else {
        icon.textContent = '🎉';
        title.textContent = `${flag} ${name}`;
        subtitle.textContent = '打卡成功！';
        time.textContent = `打卡时间: ${formatDate(now)}`;
        buttons.innerHTML = `
          <button class="btn btn-primary" onclick="closeModal()">太棒了！</button>
        `;
      }
      
      modal.classList.add('show');
    }

    // 关闭弹窗
    function closeModal() {
      document.getElementById('checkinModal').classList.remove('show');
    }

    // 取消打卡
    function removeCheckin(type, id) {
      const data = getData();
      const list = type === 'china' ? data.china : data.world;
      const index = list.indexOf(id);
      if (index > -1) {
        list.splice(index, 1);
        saveData(data);
        updateDisplay();
      }
    }

    // 地图切换
    function switchMap(mapType) {
      document.querySelectorAll('.map-tab').forEach(tab => {
        tab.classList.toggle('active', tab.dataset.map === mapType);
      });
      document.getElementById('chinaMap').style.display = mapType === 'china' ? 'block' : 'none';
      document.getElementById('worldMap').style.display = mapType === 'world' ? 'block' : 'none';
    }

    // 初始化
    document.addEventListener('DOMContentLoaded', () => {
      // 绑定地图点击
      document.querySelectorAll('.region').forEach(region => {
        region.addEventListener('click', () => {
          const id = region.id;
          const type = ['heilongjiang', 'jilin', 'liaoning', 'hebei', 'beijing', 'tianjin', 'shanxi', 'neimenggu', 'shandong', 'henan', 'jiangsu', 'anhui', 'shanghai', 'zhejiang', 'jiangxi', 'fujian', 'hubei', 'hunan', 'guangdong', 'guangxi', 'hainan', 'xianggang', 'aomen', 'chongqing', 'sichuan', 'guizhou', 'yunnan', 'xizang', 'shaanxi', 'gansu', 'qinghai', 'ningxia', 'xinjiang', 'taiwan'].includes(id) ? 'china' : 'world';
          checkin(type, id);
        });
      });
      
      // 绑定标签切换
      document.querySelectorAll('.map-tab').forEach(tab => {
        tab.addEventListener('click', () => switchMap(tab.dataset.map));
      });
      
      // 绑定弹窗关闭
      document.getElementById('closeBtn').addEventListener('click', closeModal);
      document.getElementById('cancelBtn').addEventListener('click', () => {
        const modal = document.getElementById('checkinModal');
        const title = document.getElementById('modalTitle').textContent;
        // 从当前显示的title获取id
        const allRegions = document.querySelectorAll('.region');
        allRegions.forEach(r => {
          if (r.dataset.name === title.replace(/^[^\s]+\s/, '')) {
            const type = ['heilongjiang', 'jilin', 'liaoning', 'hebei', 'beijing', 'tianjin', 'shanxi', 'neimenggu', 'shandong', 'henan', 'jiangsu', 'anhui', 'shanghai', 'zhejiang', 'jiangxi', 'fujian', 'hubei', 'hunan', 'guangdong', 'guangxi', 'hainan', 'xianggang', 'aomen', 'chongqing', 'sichuan', 'guizhou', 'yunnan', 'xizang', 'shaanxi', 'gansu', 'qinghai', 'ningxia', 'xinjiang', 'taiwan'].includes(r.id) ? 'china' : 'world';
            removeCheckin(type, r.id);
          }
        });
        closeModal();
      });
      
      // 点击遮罩关闭
      document.getElementById('checkinModal').addEventListener('click', (e) => {
        if (e.target.id === 'checkinModal') closeModal();
      });
      
      updateDisplay();
    });
  </script>
  <script src="js/mobile.js" defer></script>
  <script src="js/customer-service.js" defer></script>
</body>
