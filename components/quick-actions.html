<!-- ===================================
   快捷操作组件模板
   包含：悬浮按钮、底部导航、快捷搜索
   =================================== -->

<!-- ===== 悬浮快捷按钮 ===== -->
<div class="quick-float-actions" aria-label="快捷操作">
  <!-- 展开菜单 -->
  <div class="float-menu-expand">
    <button class="float-action-btn float-expand-trigger" aria-label="更多操作">
      <span class="expand-icon">+</span>
    </button>
    <div class="float-expand-menu">
      <a href="guide-apply.html" class="expand-menu-item">
        <span>🎤</span>
        <span>成为导游</span>
      </a>
      <a href="promotions.html" class="expand-menu-item">
        <span>🎁</span>
        <span>领取优惠</span>
      </a>
      <a href="help.html" class="expand-menu-item">
        <span>❓</span>
        <span>帮助中心</span>
      </a>
    </div>
  </div>
  
  <!-- 在线客服 -->
  <button class="float-action-btn float-btn-customer" aria-label="在线客服" onclick="QuickActions.openCustomerService()">
    <span class="service-pulse"></span>
    <span>💬</span>
  </button>
  
  <!-- 快速预约 -->
  <button class="float-action-btn float-btn-booking" aria-label="快速预约" onclick="QuickActions.openQuickBooking()">
    <span>📅</span>
  </button>
  
  <!-- 意见反馈 -->
  <button class="float-action-btn float-btn-feedback" aria-label="意见反馈" onclick="window.location.href='feedback.html'">
    <span>📝</span>
  </button>
  
  <!-- 返回顶部 -->
  <button class="float-action-btn float-btn-backtop" aria-label="返回顶部" onclick="window.scrollTo({top:0,behavior:'smooth'})">
    <span>↑</span>
  </button>
</div>

<!-- ===== 快捷搜索栏 ===== -->
<div class="quick-search-bar" role="search">
  <div class="quick-search-input-wrapper">
    <span class="quick-search-icon">🔍</span>
    <input 
      type="search" 
      class="quick-search-input" 
      placeholder="搜索目的地、导游、线路..."
      autocomplete="off"
    >
    <button class="quick-search-voice" aria-label="语音搜索" title="语音搜索（模拟）">
      🎤
    </button>
  </div>
  <div class="quick-search-suggestions">
    <!-- 动态生成 -->
  </div>
</div>

<!-- ===== 快速预约弹窗 ===== -->
<div class="quick-booking-popup" role="dialog" aria-labelledby="bookingTitle">
  <div class="quick-booking-header">
    <h3 class="quick-booking-title" id="bookingTitle">快速预约导游</h3>
    <button class="quick-booking-close" onclick="QuickActions.closeBooking()" aria-label="关闭">×</button>
  </div>
  <div class="quick-booking-body">
    <form class="quick-booking-form" onsubmit="QuickActions.submitBooking(event)">
      <div class="form-group">
        <input type="text" name="name" placeholder="您的姓名" required>
      </div>
      <div class="form-group">
        <input type="tel" name="phone" placeholder="手机号码" required>
      </div>
      <div class="form-group">
        <select name="destination" required>
          <option value="">选择目的地</option>
          <option value="japan">日本</option>
          <option value="korea">韩国</option>
          <option value="europe">欧洲</option>
          <option value="southeast">东南亚</option>
          <option value="australia">澳洲</option>
          <option value="usa">美国</option>
          <option value="other">其他</option>
        </select>
      </div>
      <div class="form-group">
        <input type="date" name="date" required>
      </div>
      <div class="form-group">
        <input type="number" name="people" placeholder="出行人数" min="1" max="20" value="1" required>
      </div>
      <button type="submit" class="quick-booking-submit">立即预约</button>
    </form>
  </div>
</div>

<!-- ===== 移动端底部导航 ===== -->
<nav class="mobile-bottom-nav" aria-label="底部导航">
  <div class="bottom-nav-items">
    <a href="index.html" class="bottom-nav-item active">
      <span class="nav-icon">🏠</span>
      <span class="nav-label">首页</span>
    </a>
    <a href="guides.html" class="bottom-nav-item">
      <span class="nav-icon">🎤</span>
      <span class="nav-label">找导游</span>
    </a>
    <a href="javascript:;" class="bottom-nav-item bottom-nav-quick-btn" onclick="QuickActions.openQuickBooking()">
      <span class="nav-icon">📅</span>
      <span class="nav-label">预约</span>
    </a>
    <a href="promotions.html" class="bottom-nav-item">
      <span class="nav-icon">🎁</span>
      <span class="nav-label">优惠</span>
    </a>
    <a href="user-center.html" class="bottom-nav-item">
      <span class="nav-icon">👤</span>
      <span class="nav-label">我的</span>
    </a>
  </div>
</nav>

<!-- ===== Toast提示 ===== -->
<div class="quick-action-toast" role="alert" aria-live="polite"></div>

<style>
/* Toast动画 */
.quick-action-toast {
  position: fixed;
  bottom: 100px;
  left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: rgba(0,0,0,0.8);
  color: white;
  padding: 12px 24px;
  border-radius: 24px;
  font-size: 14px;
  z-index: 10000;
  opacity: 0;
  transition: all 0.3s ease;
  pointer-events: none;
}

.quick-action-toast.show {
  opacity: 1;
  transform: translateX(-50%) translateY(0);
}

.quick-action-toast.success {
  background: linear-gradient(135deg, #10B981 0%, #059669 100%);
}

.quick-action-toast.error {
  background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%);
}

/* 模态框遮罩 */
.modal-overlay {
  animation: fadeIn 0.2s ease;
}

@keyframes fadeIn {
  from { opacity: 0; }
  to { opacity: 1; }
}

[data-theme="dark"] .quick-booking-popup,
[data-theme="dark"] .modal-overlay > div {
  background: #2d2d2d;
}

[data-theme="dark"] .quick-booking-form input,
[data-theme="dark"] .quick-booking-form select {
  background: #3d3d3d;
  border-color: #4d4d4d;
  color: #f9fafb;
}

[data-theme="dark"] .quick-booking-header {
  border-bottom-color: #404040;
}

[data-theme="dark"] .quick-booking-title {
  color: #f9fafb;
}
</style>
