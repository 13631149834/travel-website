    categoryResponses: {
      visa: "📋 **签证相关问题**\n\n我可以帮您解答：\n• 日本签证怎么办理\n• 泰国落地签流程\n• 韩国签证要求\n• 新加坡、马来西亚签证\n• 欧洲申根签证\n• 各国签证材料准备\n\n请告诉我您想去哪个国家？",
      transport: "✈️ **交通相关问题**\n\n我可以帮您解答：\n• 日本JR Pass购买和使用\n• 东京地铁乘坐指南\n• 廉价机票抢购技巧\n• 机场接送服务\n• 包车和租车建议\n\n请告诉我您的目的地？",
      accommodation: "🏨 **住宿相关问题**\n\n我可以帮您解答：\n• 各城市酒店推荐\n• 民宿vs酒店对比\n• 如何选择住宿位置\n• 预订平台推荐\n• 取消政策解读\n\n请告诉我您的出行目的地？",
      food: "🍜 **美食相关问题**\n\n我可以帮您解答：\n• 各国必吃美食推荐\n• 米其林餐厅预约\n• 街头美食攻略\n• 餐厅预订技巧\n• 素食/特殊饮食选择\n\n请告诉我您想去哪里品尝美食？",
      attractions: "🏛️ **景点相关问题**\n\n我可以帮您解答：\n• 必去景点推荐\n• 门票预订和优惠\n• 开放时间和游览建议\n• 一日游/半日游规划\n• 景点游览顺序优化\n\n请告诉我您的目的地？",
      shopping: "🛍️ **购物相关问题**\n\n我可以帮您解答：\n• 免税店购物攻略\n• 退税流程详解\n• 伴手礼推荐\n• 购物区域推荐\n• 品牌比价技巧\n\n请告诉我您想去哪里购物？"
    }
  };

  // DOM 元素
  const chatbotToggle = document.getElementById('chatbotToggle');
  const chatbotWindow = document.getElementById('chatbotWindow');
  const chatbotMessages = document.getElementById('chatbotMessages');
  const chatbotInput = document.getElementById('chatbotInput');
  const chatbotSendBtn = document.getElementById('chatbotSendBtn');
  const chatbotMinimize = document.getElementById('chatbotMinimize');
  const chatbotClose = document.getElementById('chatbotClose');
  const categoryBtns = document.querySelectorAll('.category-btn');
  const quickBtns = document.querySelectorAll('.quick-btn');

  let isWindowOpen = false;
  let unreadCount = 0;
  let chatHistory = JSON.parse(localStorage.getItem('chatHistory') || '[]');

  // 初始化
  function init() {
    loadChatHistory();
    bindEvents();
  }

  // 绑定事件
  function bindEvents() {
    chatbotToggle.addEventListener('click', toggleWindow);
    chatbotMinimize.addEventListener('click', minimizeWindow);
    chatbotClose.addEventListener('click', closeWindow);
    chatbotSendBtn.addEventListener('click', sendMessage);
    chatbotInput.addEventListener('keypress', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });

    // 自动调整输入框高度
    chatbotInput.addEventListener('input', autoResize);

    // 分类按钮
    categoryBtns.forEach(btn => {
      btn.addEventListener('click', () => {
        const category = btn.dataset.category;
        handleCategoryClick(category);
      });
    });

    // 快捷问题按钮
    quickBtns.forEach(btn => {
      btn.addEventListener('click', () => {
        const question = btn.textContent;
        chatbotInput.value = question;
        sendMessage();
      });
    });
  }

  // 切换窗口
  function toggleWindow() {
    isWindowOpen = !isWindowOpen;
    chatbotWindow.classList.toggle('active', isWindowOpen);
    if (isWindowOpen) {
      chatbotInput.focus();
      resetUnread();
    }
  }

  // 最小化窗口
  function minimizeWindow() {
    isWindowOpen = false;
    chatbotWindow.classList.remove('active');
  }

  // 关闭窗口
  function closeWindow() {
    isWindowOpen = false;
    chatbotWindow.classList.remove('active');
    saveChatHistory();
  }

  // 自动调整输入框高度
  function autoResize() {
    chatbotInput.style.height = 'auto';
    chatbotInput.style.height = Math.min(chatbotInput.scrollHeight, 100) + 'px';
  }

  // 发送消息
  function sendMessage() {
    const message = chatbotInput.value.trim();
    if (!message) return;

    addMessage(message, 'user');
    chatbotInput.value = '';
    autoResize();

    // 保存到历史
    chatHistory.push({ role: 'user', content: message, time: Date.now() });
    saveChatHistory();

    // 显示打字动画
    showTyping();

    // 模拟延迟回复
    setTimeout(() => {
      hideTyping();
      const response = getResponse(message);
      addMessage(response, 'bot');
      chatHistory.push({ role: 'bot', content: response, time: Date.now() });
      saveChatHistory();
    }, 800 + Math.random() * 800);
  }

  // 添加消息到聊天区域
  function addMessage(content, role) {
    const messageDiv = document.createElement('div');
    messageDiv.className = `message ${role}`;
    messageDiv.innerHTML = `
      <div class="message-avatar">${role === 'bot' ? '🧭' : '👤'}</div>
      <div class="message-content">${content}</div>
    `;
    chatbotMessages.appendChild(messageDiv);
    chatbotMessages.scrollTop = chatbotMessages.scrollHeight;
  }

  // 显示打字动画
  function showTyping() {
    const typingDiv = document.createElement('div');
    typingDiv.className = 'message bot';
    typingDiv.id = 'typingIndicator';
    typingDiv.innerHTML = `
      <div class="message-avatar">🧭</div>
      <div class="typing-indicator">
        <div class="typing-dot"></div>
        <div class="typing-dot"></div>
        <div class="typing-dot"></div>
      </div>
    `;
    chatbotMessages.appendChild(typingDiv);
    chatbotMessages.scrollTop = chatbotMessages.scrollHeight;
  }

  // 隐藏打字动画
  function hideTyping() {
    const typing = document.getElementById('typingIndicator');
    if (typing) typing.remove();
  }

  // 获取回复
  function getResponse(message) {
    const lowerMsg = message.toLowerCase();

    // 遍历所有响应，查找匹配
    for (const response of botData.responses) {
      for (const keyword of response.keywords) {
        if (lowerMsg.includes(keyword.toLowerCase())) {
          return response.answer;
        }
      }
    }

    // 默认回复
    return "🤔 抱歉，我没能完全理解您的问题。\n\n您可以尝试这样问我：\n• \"日本签证怎么办理\"\n• \"东京有什么好吃的\"\n• \"大阪环球影城攻略\"\n• \"日本JR Pass怎么买\"\n\n或者您可以告诉我您想去的目的地，我来帮您规划！";
  }

  // 处理分类点击
  function handleCategoryClick(category) {
    const categoryInfo = botData.categories[category];
    const response = botData.categoryResponses[category];
    
    if (response) {
      addMessage(response, 'bot');
      chatHistory.push({ role: 'bot', content: response, time: Date.now() });
      saveChatHistory();
    }
  }

  // 未读消息计数
  function incrementUnread() {
    unreadCount++;
    const badge = document.getElementById('unreadBadge');
    badge.textContent = unreadCount;
    badge.style.display = 'flex';
    chatbotToggle.classList.add('pulse-animation');
  }

  function resetUnread() {
    unreadCount = 0;
    document.getElementById('unreadBadge').style.display = 'none';
    chatbotToggle.classList.remove('pulse-animation');
  }

  // 保存聊天历史
  function saveChatHistory() {
    try {
      localStorage.setItem('chatHistory', JSON.stringify(chatHistory.slice(-100)));
    } catch (e) {
      console.warn('无法保存聊天历史:', e);
    }
  }

  // 加载聊天历史
  function loadChatHistory() {
    if (chatHistory.length > 0) {
      chatHistory.forEach(msg => {
        addMessage(msg.content, msg.role);
      });
    }
  }

  // 清空聊天历史
  window.clearChatHistory = function() {
    chatHistory = [];
    localStorage.removeItem('chatHistory');
    chatbotMessages.innerHTML = `
      <div class="message bot">
        <div class="message-avatar">🧭</div>
        <div class="message-content">👋 聊天记录已清空！\n\n我是您的智能旅行助手，有什么可以帮您的吗？</div>
      </div>
    `;
  };

  // 初始化
  init();
})();
</script>
