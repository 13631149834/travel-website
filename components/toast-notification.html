<!-- Toast通知组件 -->
<!-- 使用方法: 
  1. 在页面中引入此组件
  2. 调用 showToast({ type, icon, title, message, duration }) 显示通知
-->

<style>
/* ===== Toast容器 ===== */
.toast-notification-container {
  position: fixed;
  top: 90px;
  right: 20px;
  z-index: 10000;
  display: flex;
  flex-direction: column;
  gap: 12px;
  max-width: 380px;
  width: 100%;
  pointer-events: none;
}

/* ===== Toast单个通知 ===== */
.toast-notification {
  display: flex;
  align-items: flex-start;
  gap: 14px;
  padding: 16px 18px;
  background: var(--bg-white);
  border-radius: 14px;
  box-shadow: 0 8px 32px rgba(0, 0, 0, 0.12);
  opacity: 0;
  transform: translateX(120%);
  transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
  pointer-events: auto;
  position: relative;
  overflow: hidden;
}

/* 左边框颜色条 */
.toast-notification::before {
  content: '';
  position: absolute;
  left: 0;
  top: 0;
  bottom: 0;
  width: 5px;
}

.toast-notification.show {
  opacity: 1;
  transform: translateX(0);
}

.toast-notification.hide {
  opacity: 0;
  transform: translateX(120%);
  transition: all 0.3s ease-in;
}

/* ===== Toast类型样式 ===== */
.toast-notification.success::before { background: linear-gradient(180deg, #10b981 0%, #059669 100%); }
.toast-notification.success .toast-icon-wrap { background: #d1fae5; color: #059669; }

.toast-notification.error::before { background: linear-gradient(180deg, #ef4444 0%, #dc2626 100%); }
.toast-notification.error .toast-icon-wrap { background: #fee2e2; color: #dc2626; }

.toast-notification.warning::before { background: linear-gradient(180deg, #f59e0b 0%, #d97706 100%); }
.toast-notification.warning .toast-icon-wrap { background: #fef3c7; color: #d97706; }

.toast-notification.info::before { background: linear-gradient(180deg, #3b82f6 0%, #2563eb 100%); }
.toast-notification.info .toast-icon-wrap { background: #dbeafe; color: #2563eb; }

.toast-notification.system::before { background: linear-gradient(180deg, #64748b 0%, #475569 100%); }
.toast-notification.system .toast-icon-wrap { background: #f1f5f9; color: #475569; }

.toast-notification.activity::before { background: linear-gradient(180deg, #f59e0b 0%, #d97706 100%); }
.toast-notification.activity .toast-icon-wrap { background: #fef3c7; color: #d97706; }

.toast-notification.interaction::before { background: linear-gradient(180deg, #8b5cf6 0%, #7c3aed 100%); }
.toast-notification.interaction .toast-icon-wrap { background: #ede9fe; color: #7c3aed; }

.toast-notification.order::before { background: linear-gradient(180deg, #10b981 0%, #059669 100%); }
.toast-notification.order .toast-icon-wrap { background: #d1fae5; color: #059669; }

/* ===== Toast图标 ===== */
.toast-icon-wrap {
  width: 42px;
  height: 42px;
  border-radius: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1.3rem;
  flex-shrink: 0;
}

/* ===== Toast内容 ===== */
.toast-content {
  flex: 1;
  min-width: 0;
}

.toast-title {
  font-weight: 600;
  font-size: 0.95rem;
  color: var(--text-dark);
  margin-bottom: 4px;
  line-height: 1.3;
}

.toast-message {
  font-size: 0.88rem;
  color: var(--text-gray);
  line-height: 1.5;
  word-break: break-word;
}

/* ===== Toast关闭按钮 ===== */
.toast-close-btn {
  position: absolute;
  top: 10px;
  right: 10px;
  width: 24px;
  height: 24px;
  border: none;
  background: transparent;
  color: var(--text-light);
  font-size: 1.1rem;
  cursor: pointer;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.2s ease;
  opacity: 0;
}

.toast-notification:hover .toast-close-btn {
  opacity: 1;
}

.toast-close-btn:hover {
  background: var(--bg-light);
  color: var(--text-gray);
}

/* ===== Toast进度条 ===== */
.toast-progress {
  position: absolute;
  bottom: 0;
  left: 0;
  height: 3px;
  background: currentColor;
  opacity: 0.3;
  animation: toastProgress linear forwards;
}

@keyframes toastProgress {
  from { width: 100%; }
  to { width: 0%; }
}

/* ===== Toast链接 ===== */
.toast-link {
  display: inline-block;
  margin-top: 10px;
  color: var(--primary);
  font-size: 0.85rem;
  font-weight: 500;
  text-decoration: none;
  transition: color 0.2s ease;
}

.toast-link:hover {
  color: var(--primary-dark);
  text-decoration: underline;
}

/* ===== Toast操作按钮 ===== */
.toast-actions {
  display: flex;
  gap: 8px;
  margin-top: 12px;
}

.toast-action-btn {
  padding: 6px 14px;
  background: var(--bg-light);
  border: 1px solid var(--border);
  border-radius: 6px;
  font-size: 0.8rem;
  color: var(--text-dark);
  cursor: pointer;
  transition: all 0.2s ease;
}

.toast-action-btn:hover {
  background: var(--primary-light);
  border-color: var(--primary);
  color: var(--primary);
}

.toast-action-btn.primary {
  background: var(--primary);
  border-color: var(--primary);
  color: white;
}

.toast-action-btn.primary:hover {
  background: var(--primary-dark);
}

/* ===== Toast堆叠效果 ===== */
.toast-notification:nth-child(1) { z-index: 10000; }
.toast-notification:nth-child(2) { transform: translateX(0) translateY(-10px); }
.toast-notification:nth-child(3) { transform: translateX(0) translateY(-20px); }
.toast-notification:nth-child(n+4) { transform: translateX(0) translateY(-30px); }

/* ===== 响应式 ===== */
@media (max-width: 768px) {
  .toast-notification-container {
    top: auto;
    bottom: 20px;
    left: 16px;
    right: 16px;
    max-width: none;
  }
  
  .toast-notification {
    transform: translateY(120%);
  }
  
  .toast-notification.show {
    transform: translateY(0);
  }
  
  .toast-notification.hide {
    transform: translateY(120%);
  }
}

/* ===== 动画效果 ===== */
@keyframes toastSlideIn {
  from {
    opacity: 0;
    transform: translateX(120%);
  }
  to {
    opacity: 1;
    transform: translateX(0);
  }
}

@keyframes toastSlideOut {
  from {
    opacity: 1;
    transform: translateX(0);
  }
  to {
    opacity: 0;
    transform: translateX(120%);
  }
}

/* 成功动画 */
@keyframes successPulse {
  0% { transform: scale(1); }
  50% { transform: scale(1.1); }
  100% { transform: scale(1); }
}

.toast-notification.success .toast-icon-wrap {
  animation: successPulse 0.4s ease;
}
</style>

<!-- Toast容器 -->
<div class="toast-notification-container" id="toastContainer"></div>

<script>
// Toast通知管理器
const ToastManager = {
  container: null,
  maxToasts: 5,
  defaultDuration: 4000,
  
  // 初始化容器
  init() {
    if (!this.container) {
      this.container = document.getElementById('toastContainer');
    }
    return this.container;
  },
  
  // 显示Toast
  show(options) {
    this.init();
    
    const {
      type = 'info',
      icon = 'ℹ️',
      title = '',
      message = '',
      link = null,
      linkText = '查看',
      actions = [],
      duration = this.defaultDuration,
      onClose = null
    } = options;
    
    // 限制最大数量
    const existingToasts = this.container.querySelectorAll('.toast-notification:not(.hide)');
    if (existingToasts.length >= this.maxToasts) {
      this.removeToast(existingToasts[0]);
    }
    
    // 创建Toast元素
    const toast = document.createElement('div');
    toast.className = `toast-notification ${type}`;
    toast.innerHTML = `
      <div class="toast-icon-wrap">${icon}</div>
      <div class="toast-content">
        ${title ? `<div class="toast-title">${title}</div>` : ''}
        ${message ? `<div class="toast-message">${message}</div>` : ''}
        ${link ? `<a href="${link}" class="toast-link">${linkText} →</a>` : ''}
        ${actions.length > 0 ? `
          <div class="toast-actions">
            ${actions.map(a => `
              <button class="toast-action-btn ${a.primary ? 'primary' : ''}" 
                      onclick="${a.onClick || 'void(0)'}">
                ${a.label}
              </button>
            `).join('')}
          </div>
        ` : ''}
      </div>
      <button class="toast-close-btn" onclick="ToastManager.removeToast(this.parentElement)">✕</button>
      ${duration > 0 ? `<div class="toast-progress" style="animation-duration: ${duration}ms;"></div>` : ''}
    `;
    
    // 添加到容器
    this.container.appendChild(toast);
    
    // 触发动画
    requestAnimationFrame(() => {
      toast.classList.add('show');
    });
    
    // 自动移除
    if (duration > 0) {
      setTimeout(() => {
        this.removeToast(toast);
        if (onClose) onClose();
      }, duration);
    }
    
    return toast;
  },
  
  // 移除Toast
  removeToast(toast) {
    if (!toast || !toast.parentElement) return;
    
    toast.classList.remove('show');
    toast.classList.add('hide');
    
    setTimeout(() => {
      if (toast.parentElement) {
        toast.parentElement.removeChild(toast);
      }
    }, 300);
  },
  
  // 快捷方法
  success(message, title = '成功') {
    return this.show({ type: 'success', icon: '✓', title, message });
  },
  
  error(message, title = '操作失败') {
    return this.show({ type: 'error', icon: '✕', title, message, duration: 6000 });
  },
  
  warning(message, title = '警告') {
    return this.show({ type: 'warning', icon: '⚠', title, message });
  },
  
  info(message, title = '提示') {
    return this.show({ type: 'info', icon: 'ℹ️', title, message });
  }
};

// 全局函数
function showToast(options) {
  return ToastManager.show(options);
}

// 快捷方法
function showToastSuccess(message, title) {
  return ToastManager.success(message, title);
}

function showToastError(message, title) {
  return ToastManager.error(message, title);
}

function showToastWarning(message, title) {
  return ToastManager.warning(message, title);
}

function showToastInfo(message, title) {
  return ToastManager.info(message, title);
}

// 隐藏所有Toast
function hideAllToasts() {
  const toasts = document.querySelectorAll('.toast-notification.show');
  toasts.forEach(toast => ToastManager.removeToast(toast));
}

// 演示函数
function demoToasts() {
  showToast({
    type: 'success',
    icon: '🎉',
    title: '预订成功',
    message: '您的旅行订单已确认，导游将在24小时内与您联系。',
    link: 'my-orders.html',
    linkText: '查看订单'
  });
  
  setTimeout(() => {
    showToast({
      type: 'interaction',
      icon: '💬',
      title: '新评论',
      message: '用户「旅行爱好者」评论了您的笔记',
      duration: 5000
    });
  }, 1000);
  
  setTimeout(() => {
    showToast({
      type: 'activity',
      icon: '🎁',
      title: '限时优惠',
      message: '五一黄金周专属优惠券已到账，快去使用吧！',
      actions: [
        { label: '立即领取', primary: true },
        { label: '稍后再说' }
      ]
    });
  }, 2000);
}
</script>
