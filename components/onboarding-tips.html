<!-- 
  新手引导提示组件
  ======================================
  包含：首次访问提示、功能发现提示、操作引导气泡
  
  使用方法：
  1. 在页面底部引入此组件
  2. 或将组件代码复制到页面 body 末尾
  3. 组件会自动初始化

  示例引用：
  <div id="onboarding-tips-component"></div>
  <script src="js/onboarding-tips.js"><\/script>
-->

<!-- ======================= -->
<!-- 首次访问欢迎弹窗 -->
<!-- ======================= -->
<div class="onboarding-welcome-modal" id="onboardingWelcomeModal" style="display: none;">
  <div class="onboarding-welcome-backdrop"></div>
  <div class="onboarding-welcome-content">
    <button class="onboarding-welcome-close" id="closeWelcomeModal" aria-label="关闭">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M18 6L6 18M6 6l12 12"/>
      </svg>
    </button>
    
    <div class="onboarding-welcome-icon">🧭</div>
    <h2 class="onboarding-welcome-title">欢迎来到游导旅游</h2>
    <p class="onboarding-welcome-subtitle">我们为您准备了一份快速入门指南</p>
    
    <div class="onboarding-welcome-features">
      <div class="onboarding-welcome-feature">
        <span class="feature-icon">🎯</span>
        <span>精准匹配导游</span>
      </div>
      <div class="onboarding-welcome-feature">
        <span class="feature-icon">🗺️</span>
        <span>精选旅行路线</span>
      </div>
      <div class="onboarding-welcome-feature">
        <span class="feature-icon">🛠️</span>
        <span>实用旅行工具</span>
      </div>
      <div class="onboarding-welcome-feature">
        <span class="feature-icon">👥</span>
        <span>旅行社区交流</span>
      </div>
    </div>
    
    <div class="onboarding-welcome-actions">
      <button class="onboarding-btn-primary" id="startOnboardingBtn">
        <span>开始导览</span>
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M5 12h14M12 5l7 7-7 7"/>
        </svg>
      </button>
      <button class="onboarding-btn-secondary" id="skipOnboardingBtn">稍后再说</button>
    </div>
    
    <p class="onboarding-welcome-tip">您可以随时在帮助菜单中重新开始导览</p>
  </div>
</div>

<!-- ======================= -->
<!-- 功能发现提示 -->
<!-- ======================= -->
<div class="onboarding-discovery-tooltip" id="onboardingDiscoveryTooltip" style="display: none;">
  <div class="discovery-tooltip-content">
    <div class="discovery-tooltip-icon">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="12" cy="12" r="10"/>
        <path d="M12 16v-4"/>
        <path d="M12 8h.01"/>
      </svg>
    </div>
    <div class="discovery-tooltip-text">
      <strong class="discovery-tooltip-title">新功能上线</strong>
      <p class="discovery-tooltip-desc">探索全新功能，发现更多精彩内容</p>
    </div>
    <button class="discovery-tooltip-close" id="closeDiscoveryTooltip" aria-label="关闭">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M18 6L6 18M6 6l12 12"/>
      </svg>
    </button>
  </div>
  <div class="discovery-tooltip-arrow"></div>
</div>

<!-- ======================= -->
<!-- 操作引导气泡 -->
<!-- ======================= -->
<div class="onboarding-guided-step" id="guidedStep" style="display: none;">
  <div class="guided-step-backdrop"></div>
  <div class="guided-step-spotlight" id="guidedSpotlight"></div>
  <div class="guided-step-card" id="guidedCard">
    <div class="guided-step-header">
      <div class="guided-step-icon" id="guidedIcon">💡</div>
      <div class="guided-step-info">
        <span class="guided-step-badge" id="guidedBadge">提示</span>
        <h4 class="guided-step-title" id="guidedTitle">功能说明</h4>
      </div>
      <button class="guided-step-skip" id="skipGuidedBtn" aria-label="跳过">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M18 6L6 18M6 6l12 12"/>
        </svg>
      </button>
    </div>
    
    <div class="guided-step-body">
      <p class="guided-step-desc" id="guidedDesc">这是功能的详细说明文字</p>
      
      <ul class="guided-step-features" id="guidedFeatures">
        <!-- Generated by JS -->
      </ul>
    </div>
    
    <div class="guided-step-footer">
      <div class="guided-step-progress" id="guidedProgress">
        <!-- Generated by JS -->
      </div>
      <div class="guided-step-actions">
        <button class="guided-btn-secondary" id="guidedPrevBtn" style="display: none;">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M19 12H5M12 19l-7-7 7-7"/>
          </svg>
          上一步
        </button>
        <button class="guided-btn-primary" id="guidedNextBtn">
          下一步
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M5 12h14M12 5l7 7-7 7"/>
          </svg>
        </button>
      </div>
    </div>
  </div>
</div>

<!-- ======================= -->
<!-- 帮助入口按钮 -->
<!-- ======================= -->
<button class="onboarding-help-fab" id="onboardingHelpFab" aria-label="获取帮助" title="需要帮助？">
  <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
    <circle cx="12" cy="12" r="10"/>
    <path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/>
    <path d="M12 17h.01"/>
  </svg>
</button>

<!-- ======================= -->
<!-- 帮助菜单 -->
<!-- ======================= -->
<div class="onboarding-help-menu" id="onboardingHelpMenu" style="display: none;">
  <div class="help-menu-header">
    <span>需要帮助？</span>
    <button class="help-menu-close" id="closeHelpMenu" aria-label="关闭">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M18 6L6 18M6 6l12 12"/>
      </svg>
    </button>
  </div>
  <div class="help-menu-items">
    <button class="help-menu-item" id="menuTourBtn">
      <span class="item-icon">🧭</span>
      <span>功能导览</span>
    </button>
    <button class="help-menu-item" id="menuDiscoverBtn">
      <span class="item-icon">🔍</span>
      <span>探索功能</span>
    </button>
    <button class="help-menu-item" id="menuGuideBtn">
      <span class="item-icon">📖</span>
      <span>使用指南</span>
    </button>
    <button class="help-menu-item" id="menuFaqBtn">
      <span class="item-icon">❓</span>
      <span>常见问题</span>
    </button>
    <button class="help-menu-item" id="menuContactBtn">
      <span class="item-icon">📞</span>
      <span>联系客服</span>
    </button>
    <button class="help-menu-item" id="menuRestartBtn">
      <span class="item-icon">🔄</span>
      <span>重新开始导览</span>
    </button>
  </div>
</div>

<!-- ======================= -->
<!-- 组件样式 -->
<!-- ======================= -->
<style>
  /* ===== 首次访问欢迎弹窗 ===== */
  .onboarding-welcome-modal {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    z-index: 10000;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .onboarding-welcome-backdrop {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0, 0, 0, 0.6);
    backdrop-filter: blur(4px);
  }

  .onboarding-welcome-content {
    position: relative;
    background: #fff;
    border-radius: 24px;
    padding: 40px;
    max-width: 420px;
    width: calc(100% - 32px);
    text-align: center;
    transform: scale(0.9) translateY(20px);
    animation: welcomeModalIn 0.4s ease forwards;
  }

  @keyframes welcomeModalIn {
    to {
      transform: scale(1) translateY(0);
    }
  }

  .onboarding-welcome-close {
    position: absolute;
    top: 16px;
    right: 16px;
    width: 36px;
    height: 36px;
    background: #f5f5f5;
    border: none;
    border-radius: 50%;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #666;
    transition: all 0.2s;
  }

  .onboarding-welcome-close:hover {
    background: #eee;
    color: #333;
  }

  .onboarding-welcome-icon {
    font-size: 64px;
    margin-bottom: 16px;
  }

  .onboarding-welcome-title {
    font-size: 1.75rem;
    font-weight: 700;
    color: #1a1a1a;
    margin-bottom: 8px;
  }

  .onboarding-welcome-subtitle {
    font-size: 1rem;
    color: #666;
    margin-bottom: 28px;
  }

  .onboarding-welcome-features {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 12px;
    margin-bottom: 28px;
  }

  .onboarding-welcome-feature {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 14px;
    background: #f8fafc;
    border-radius: 12px;
    font-size: 0.875rem;
    font-weight: 500;
    color: #333;
  }

  .onboarding-welcome-feature .feature-icon {
    font-size: 20px;
  }

  .onboarding-welcome-actions {
    display: flex;
    flex-direction: column;
    gap: 12px;
    margin-bottom: 16px;
  }

  .onboarding-btn-primary {
    width: 100%;
    padding: 14px 24px;
    background: linear-gradient(135deg, #4F86F7 0%, #3B82F6 100%);
    color: #fff;
    border: none;
    border-radius: 12px;
    font-size: 1rem;
    font-weight: 600;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    transition: all 0.3s;
  }

  .onboarding-btn-primary:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 20px rgba(79, 134, 247, 0.4);
  }

  .onboarding-btn-secondary {
    width: 100%;
    padding: 14px 24px;
    background: #f5f5f5;
    color: #666;
    border: none;
    border-radius: 12px;
    font-size: 1rem;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.3s;
  }

  .onboarding-btn-secondary:hover {
    background: #eee;
    color: #333;
  }

  .onboarding-welcome-tip {
    font-size: 0.8125rem;
    color: #999;
    margin: 0;
  }

  /* ===== 功能发现提示 ===== */
  .onboarding-discovery-tooltip {
    position: fixed;
    z-index: 9998;
  }

  .discovery-tooltip-content {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 14px 18px;
    background: #fff;
    border-radius: 12px;
    box-shadow: 0 8px 32px rgba(0, 0, 0, 0.15);
  }

  .discovery-tooltip-icon {
    width: 40px;
    height: 40px;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #fff;
    flex-shrink: 0;
  }

  .discovery-tooltip-text {
    flex: 1;
  }

  .discovery-tooltip-title {
    font-size: 0.9375rem;
    font-weight: 600;
    color: #1a1a1a;
    display: block;
    margin-bottom: 2px;
  }

  .discovery-tooltip-desc {
    font-size: 0.8125rem;
    color: #666;
    margin: 0;
  }

  .discovery-tooltip-close {
    width: 28px;
    height: 28px;
    background: #f5f5f5;
    border: none;
    border-radius: 50%;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #999;
    transition: all 0.2s;
  }

  .discovery-tooltip-close:hover {
    background: #eee;
    color: #666;
  }

  .discovery-tooltip-arrow {
    position: absolute;
    width: 12px;
    height: 12px;
    background: #fff;
    transform: rotate(45deg);
    bottom: -6px;
    left: 50%;
    margin-left: -6px;
    box-shadow: 4px 4px 8px rgba(0, 0, 0, 0.08);
  }

  /* ===== 操作引导气泡 ===== */
  .onboarding-guided-step {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    z-index: 9998;
  }

  .guided-step-backdrop {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0, 0, 0, 0.5);
  }

  .guided-step-spotlight {
    position: absolute;
    border: 3px solid #4F86F7;
    border-radius: 12px;
    background: transparent;
    box-shadow: 0 0 0 4px rgba(79, 134, 247, 0.3), 0 8px 32px rgba(0, 0, 0, 0.2);
    animation: spotlightPulse 2s infinite;
  }

  @keyframes spotlightPulse {
    0%, 100% { box-shadow: 0 0 0 4px rgba(79, 134, 247, 0.3), 0 8px 32px rgba(0, 0, 0, 0.2); }
    50% { box-shadow: 0 0 0 8px rgba(79, 134, 247, 0.2), 0 8px 32px rgba(0, 0, 0, 0.25); }
  }

  .guided-step-card {
    position: absolute;
    background: #fff;
    border-radius: 16px;
    padding: 24px;
    width: 340px;
    box-shadow: 0 20px 60px rgba(0, 0, 0, 0.15);
  }

  .guided-step-card::before {
    content: '';
    position: absolute;
    width: 16px;
    height: 16px;
    background: #fff;
    transform: rotate(45deg);
  }

  .guided-step-card.position-bottom::before {
    top: -8px;
    left: 50%;
    margin-left: -8px;
  }

  .guided-step-card.position-top::before {
    bottom: -8px;
    left: 50%;
    margin-left: -8px;
  }

  .guided-step-card.position-left::before {
    right: -8px;
    top: 50%;
    margin-top: -8px;
  }

  .guided-step-card.position-right::before {
    left: -8px;
    top: 50%;
    margin-top: -8px;
  }

  .guided-step-header {
    display: flex;
    align-items: flex-start;
    gap: 14px;
    margin-bottom: 16px;
  }

  .guided-step-icon {
    width: 48px;
    height: 48px;
    background: linear-gradient(135deg, #4F86F7 0%, #3B82F6 100%);
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 24px;
    flex-shrink: 0;
  }

  .guided-step-info {
    flex: 1;
  }

  .guided-step-badge {
    display: inline-block;
    font-size: 11px;
    font-weight: 600;
    color: #4F86F7;
    background: rgba(79, 134, 247, 0.1);
    padding: 3px 8px;
    border-radius: 4px;
    margin-bottom: 4px;
  }

  .guided-step-title {
    font-size: 1.125rem;
    font-weight: 600;
    color: #1a1a1a;
    margin: 0;
  }

  .guided-step-skip {
    width: 32px;
    height: 32px;
    background: #f5f5f5;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #999;
    transition: all 0.2s;
  }

  .guided-step-skip:hover {
    background: #eee;
    color: #666;
  }

  .guided-step-body {
    margin-bottom: 20px;
  }

  .guided-step-desc {
    font-size: 0.875rem;
    color: #555;
    line-height: 1.6;
    margin-bottom: 12px;
  }

  .guided-step-features {
    list-style: none;
    margin: 0;
    padding: 0;
  }

  .guided-step-features li {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 0;
    font-size: 0.875rem;
    color: #555;
    border-bottom: 1px solid #f0f0f0;
  }

  .guided-step-features li:last-child {
    border-bottom: none;
  }

  .guided-step-features li::before {
    content: '✓';
    color: #10B981;
    font-weight: 600;
  }

  .guided-step-footer {
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .guided-step-progress {
    display: flex;
    gap: 6px;
  }

  .guided-progress-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: #e0e0e0;
    transition: all 0.3s;
  }

  .guided-progress-dot.active {
    background: #4F86F7;
    width: 20px;
    border-radius: 4px;
  }

  .guided-progress-dot.completed {
    background: #10B981;
  }

  .guided-step-actions {
    display: flex;
    gap: 8px;
  }

  .guided-btn-primary,
  .guided-btn-secondary {
    padding: 10px 18px;
    border-radius: 8px;
    font-size: 0.875rem;
    font-weight: 500;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 6px;
    transition: all 0.2s;
    border: none;
  }

  .guided-btn-primary {
    background: linear-gradient(135deg, #4F86F7 0%, #3B82F6 100%);
    color: #fff;
  }

  .guided-btn-primary:hover {
    transform: translateY(-1px);
    box-shadow: 0 4px 12px rgba(79, 134, 247, 0.4);
  }

  .guided-btn-secondary {
    background: #f5f5f5;
    color: #666;
  }

  .guided-btn-secondary:hover {
    background: #eee;
  }

  /* ===== 帮助入口按钮 ===== */
  .onboarding-help-fab {
    position: fixed;
    bottom: 24px;
    right: 24px;
    width: 56px;
    height: 56px;
    background: linear-gradient(135deg, #4F86F7 0%, #3B82F6 100%);
    border: none;
    border-radius: 50%;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #fff;
    box-shadow: 0 4px 20px rgba(79, 134, 247, 0.4);
    z-index: 999;
    transition: all 0.3s;
  }

  .onboarding-help-fab:hover {
    transform: scale(1.1);
    box-shadow: 0 6px 28px rgba(79, 134, 247, 0.5);
  }

  .onboarding-help-fab.active {
    transform: rotate(45deg);
  }

  /* ===== 帮助菜单 ===== */
  .onboarding-help-menu {
    position: fixed;
    bottom: 90px;
    right: 24px;
    width: 240px;
    background: #fff;
    border-radius: 16px;
    box-shadow: 0 12px 48px rgba(0, 0, 0, 0.15);
    z-index: 999;
    overflow: hidden;
    transform: translateY(20px) scale(0.95);
    opacity: 0;
    transition: all 0.3s ease;
    pointer-events: none;
  }

  .onboarding-help-menu.active {
    transform: translateY(0) scale(1);
    opacity: 1;
    pointer-events: auto;
  }

  .help-menu-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 18px;
    background: linear-gradient(135deg, #4F86F7 0%, #3B82F6 100%);
    color: #fff;
  }

  .help-menu-header span {
    font-size: 0.9375rem;
    font-weight: 600;
  }

  .help-menu-close {
    width: 28px;
    height: 28px;
    background: rgba(255, 255, 255, 0.2);
    border: none;
    border-radius: 50%;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #fff;
  }

  .help-menu-items {
    padding: 8px;
  }

  .help-menu-item {
    display: flex;
    align-items: center;
    gap: 12px;
    width: 100%;
    padding: 12px 14px;
    background: none;
    border: none;
    border-radius: 10px;
    color: #333;
    font-size: 0.875rem;
    text-align: left;
    cursor: pointer;
    transition: all 0.2s;
  }

  .help-menu-item:hover {
    background: #f5f5f5;
  }

  .help-menu-item .item-icon {
    font-size: 18px;
  }

  /* ===== 响应式适配 ===== */
  @media (max-width: 640px) {
    .onboarding-welcome-content {
      padding: 32px 24px;
    }

    .guided-step-card {
      width: calc(100% - 32px);
      max-width: 340px;
      left: 50% !important;
      transform: translateX(-50%);
    }

    .onboarding-help-menu {
      right: 16px;
      width: calc(100% - 32px);
      max-width: 240px;
    }

    .onboarding-help-fab {
      bottom: 16px;
      right: 16px;
    }
  }

  /* ===== 深色主题适配 ===== */
  [data-theme="dark"] .onboarding-welcome-content,
  [data-theme="dark"] .discovery-tooltip-content,
  [data-theme="dark"] .guided-step-card,
  [data-theme="dark"] .onboarding-help-menu {
    background: #2d2d2d;
  }

  [data-theme="dark"] .onboarding-welcome-title,
  [data-theme="dark"] .guided-step-title {
    color: #fff;
  }

  [data-theme="dark"] .onboarding-welcome-subtitle,
  [data-theme="dark"] .onboarding-welcome-feature,
  [data-theme="dark"] .guided-step-desc,
  [data-theme="dark"] .guided-step-features li,
  [data-theme="dark"] .discovery-tooltip-title,
  [data-theme="dark"] .discovery-tooltip-desc,
  [data-theme="dark"] .help-menu-item {
    color: #ccc;
  }

  [data-theme="dark"] .onboarding-welcome-close,
  [data-theme="dark"] .onboarding-welcome-feature,
  [data-theme="dark"] .onboarding-btn-secondary,
  [data-theme="dark"] .discovery-tooltip-close,
  [data-theme="dark"] .guided-step-skip,
  [data-theme="dark"] .guided-btn-secondary,
  [data-theme="dark"] .help-menu-close {
    background: #444;
    color: #ccc;
  }

<!-- 组件初始化脚本 -->
<!-- ======================= -->
<script>
  // 检查是否首次访问
  const isFirstVisit = !localStorage.getItem('travel_onboarded');
  const helpFab = document.getElementById('onboardingHelpFab');
  const helpMenu = document.getElementById('onboardingHelpMenu');
  const welcomeModal = document.getElementById('onboardingWelcomeModal');

  // 首次访问显示欢迎弹窗
  if (isFirstVisit) {
    setTimeout(() => {
      welcomeModal.style.display = 'flex';
    }, 1000);
  }

  // 欢迎弹窗事件
  document.getElementById('closeWelcomeModal')?.addEventListener('click', () => {
    welcomeModal.style.display = 'none';
    localStorage.setItem('travel_onboarded', 'dismissed');
  });

  document.getElementById('skipOnboardingBtn')?.addEventListener('click', () => {
    welcomeModal.style.display = 'none';
    localStorage.setItem('travel_onboarded', 'dismissed');
  });

  document.getElementById('startOnboardingBtn')?.addEventListener('click', () => {
    welcomeModal.style.display = 'none';
    window.location.href = 'tour.html';
  });

  // 帮助按钮事件
  helpFab?.addEventListener('click', () => {
    helpFab.classList.toggle('active');
    helpMenu.classList.toggle('active');
  });

  document.getElementById('closeHelpMenu')?.addEventListener('click', () => {
    helpFab.classList.remove('active');
    helpMenu.classList.remove('active');
  });

  // 帮助菜单项事件
  document.getElementById('menuTourBtn')?.addEventListener('click', () => {
    helpFab.classList.remove('active');
    helpMenu.classList.remove('active');
    window.location.href = 'tour.html';
  });

  document.getElementById('menuDiscoverBtn')?.addEventListener('click', () => {
    helpFab.classList.remove('active');
    helpMenu.classList.remove('active');
    window.location.href = 'discover.html';
  });

  document.getElementById('menuGuideBtn')?.addEventListener('click', () => {
    helpFab.classList.remove('active');
    helpMenu.classList.remove('active');
    window.location.href = 'downloads/quick-start-guide.html';
  });

  document.getElementById('menuFaqBtn')?.addEventListener('click', () => {
    helpFab.classList.remove('active');
    helpMenu.classList.remove('active');
    window.location.href = 'help.html';
  });

  document.getElementById('menuContactBtn')?.addEventListener('click', () => {
    helpFab.classList.remove('active');
    helpMenu.classList.remove('active');
    window.location.href = 'contact.html';
  });

  document.getElementById('menuRestartBtn')?.addEventListener('click', () => {
    helpFab.classList.remove('active');
    helpMenu.classList.remove('active');
    localStorage.removeItem('travel_onboarded');
    window.location.href = 'welcome.html';
  });

  // 点击其他地方关闭菜单
  document.addEventListener('click', (e) => {
    if (!helpFab?.contains(e.target) && !helpMenu?.contains(e.target)) {
      helpFab?.classList.remove('active');
      helpMenu?.classList.remove('active');
    }
  });
</script>
