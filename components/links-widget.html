<!-- 友情链接组件 - 用于嵌入到其他页面 -->
<!-- 使用方法: 复制此文件内容到页面底部，或使用JavaScript动态加载 -->

<div class="links-widget" id="linksWidget">
  <div class="links-widget-header">
    <h3><i class="fas fa-link"></i> 合作伙伴</h3>
    <a href="links/" class="links-more">查看更多 <i class="fas fa-angle-right"></i></a>
  </div>
  
  <div class="links-scroll-container">
    <div class="links-scroll-track" id="linksScrollTrack">
      <!-- Links will be dynamically loaded here -->
      <div class="links-loading">
        <i class="fas fa-spinner fa-spin"></i> 加载中...
      </div>
    </div>
    
    <button class="links-scroll-btn links-scroll-left" onclick="scrollLinks(-1)" aria-label="向左滚动">
      <i class="fas fa-chevron-left"></i>
    </button>
    <button class="links-scroll-btn links-scroll-right" onclick="scrollLinks(1)" aria-label="向右滚动">
      <i class="fas fa-chevron-right"></i>
    </button>
  </div>
  
  <div class="links-apply-hint">
    <span>交换友链？</span>
    <a href="links/apply.html">立即申请</a>
  </div>
</div>

<style>
/* 链接组件样式 */
.links-widget {
  background: linear-gradient(135deg, #f8f9fa 0%, #fff 100%);
  border-radius: 16px;
  padding: 24px;
  margin: 24px 0;
  border: 1px solid #e9ecef;
}

.links-widget-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 20px;
}

.links-widget-header h3 {
  font-size: 18px;
  font-weight: 600;
  color: #333;
  display: flex;
  align-items: center;
  gap: 8px;
}

.links-widget-header h3 i {
  color: #ff6b35;
}

.links-more {
  font-size: 14px;
  color: #ff6b35;
  text-decoration: none;
  transition: all 0.3s;
}

.links-more:hover {
  color: #e55a2b;
  text-decoration: underline;
}

.links-scroll-container {
  position: relative;
  overflow: hidden;
}

.links-scroll-track {
  display: flex;
  gap: 16px;
  overflow-x: auto;
  scroll-behavior: smooth;
  padding: 8px 0;
  -ms-overflow-style: none;
  scrollbar-width: none;
}

.links-scroll-track::-webkit-scrollbar {
  display: none;
}

.links-scroll-btn {
  position: absolute;
  top: 50%;
  transform: translateY(-50%);
  width: 36px;
  height: 36px;
  border-radius: 50%;
  background: white;
  border: 1px solid #e9ecef;
  box-shadow: 0 2px 8px rgba(0,0,0,0.1);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  opacity: 0;
  transition: all 0.3s;
  z-index: 2;
}

.links-scroll-container:hover .links-scroll-btn {
  opacity: 1;
}

.links-scroll-btn:hover {
  background: #ff6b35;
  color: white;
  border-color: #ff6b35;
}

.links-scroll-left {
  left: -18px;
}

.links-scroll-right {
  right: -18px;
}

.link-card-mini {
  flex-shrink: 0;
  width: 140px;
  padding: 16px;
  background: white;
  border-radius: 12px;
  text-align: center;
  transition: all 0.3s;
  border: 1px solid transparent;
  text-decoration: none;
  display: block;
}

.link-card-mini:hover {
  transform: translateY(-4px);
  box-shadow: 0 8px 24px rgba(0,0,0,0.12);
  border-color: #ff6b35;
}

.link-card-mini .link-logo {
  width: 48px;
  height: 48px;
  margin: 0 auto 12px;
  border-radius: 12px;
  object-fit: contain;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 24px;
  background: #f8f9fa;
}

.link-card-mini .link-logo img {
  max-width: 100%;
  max-height: 100%;
  object-fit: contain;
}

.link-card-mini .link-name {
  font-size: 13px;
  font-weight: 500;
  color: #333;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.links-loading {
  text-align: center;
  padding: 40px;
  color: #999;
  width: 100%;
}

.links-apply-hint {
  margin-top: 16px;
  text-align: center;
  font-size: 13px;
  color: #666;
}

.links-apply-hint a {
  color: #ff6b35;
  text-decoration: none;
  font-weight: 500;
}

.links-apply-hint a:hover {
  text-decoration: underline;
}

/* 响应式适配 */
@media (max-width: 768px) {
  .links-widget {
    padding: 16px;
    margin: 16px 0;
  }
  
  .links-scroll-btn {
    display: none;
  }
  
  .link-card-mini {
    width: 120px;
    padding: 12px;
  }
}
</style>

<script>
// 滚动链接
function scrollLinks(direction) {
  const track = document.getElementById('linksScrollTrack');
  if (track) {
    const scrollAmount = 160 * direction;
    track.scrollBy({ left: scrollAmount, behavior: 'smooth' });
  }
}

// 加载链接数据
async function loadLinksForWidget() {
  const track = document.getElementById('linksScrollTrack');
  if (!track) return;
  
  try {
    const response = await fetch('data/links.json');
    const data = await response.json();
    
    const approvedLinks = data.links
      .filter(link => link.status === 'approved')
      .sort((a, b) => a.sortOrder - b.sortOrder)
      .slice(0, 12); // 显示前12个链接
    
    if (approvedLinks.length === 0) {
      track.innerHTML = '<div class="links-loading">暂无友情链接</div>';
      return;
    }
    
    track.innerHTML = approvedLinks.map(link => `
      <a href="${link.url}" class="link-card-mini" target="_blank" rel="noopener" title="${link.name}">
        <div class="link-logo">
          <img src="${link.logo}" alt="${link.name}" onerror="this.parentElement.textContent='${link.name.charAt(0)}'">
        </div>
        <div class="link-name">${link.name}</div>
      </a>
    `).join('');
    
  } catch (error) {
    console.error('加载链接失败:', error);
    track.innerHTML = '<div class="links-loading">加载失败，请刷新重试</div>';
  }
}

// 页面加载完成后自动加载
document.addEventListener('DOMContentLoaded', loadLinksForWidget);
</script>
