<!-- 分享按钮组件 -->
<!-- 使用方法：在页面中添加 <div class="share-container" data-type="guide" data-id="123"></div> 并引入 share.js 和 share.css -->

<!-- 基础分享按钮组 -->
<div class="share-container" data-type="guide" data-id="">
  <!-- 分享按钮将由 share.js 自动生成 -->
</div>

<!-- 或手动自定义分享按钮 -->
<div class="share-buttons">
  <button class="share-btn share-btn-wechat" onclick="ShareModule.shareToWechat({url: location.href, title: document.title})" aria-label="分享到微信">
    <svg viewBox="0 0 24 24" fill="currentColor"><path d="M8.5 11.5c-.83 0-1.5-.67-1.5-1.5s.67-1.5 1.5-1.5 1.5.67 1.5 1.5-.67 1.5-1.5 1.5zm7 0c-.83 0-1.5-.67-1.5-1.5s.67-1.5 1.5-1.5 1.5.67 1.5 1.5-.67 1.5-1.5 1.5zM12 2C6.48 2 2 6.48 2 12c0 2.17.7 4.18 1.88 5.82L2 22l4.18-1.88C7.82 21.3 9.83 22 12 22c5.52 0 10-4.48 10-10S17.52 2 12 2z"/></svg>
    <span>微信</span>
  </button>
  
  <button class="share-btn share-btn-weibo" onclick="ShareModule.shareToWeibo({url: location.href, title: document.title})" aria-label="分享到微博">
    <svg viewBox="0 0 24 24" fill="currentColor"><path d="M17.3 11.2c-.6-1.4-2-2.5-3.5-2.5-.6 0-1.2.1-1.7.4-1.3-1.1-3.2-1.2-4.5-.1-.9.7-1.4 1.9-1.3 3.1 0 2.2 2.3 3.7 5 4.1 1.7.3 3.4-.1 4.6-1 .3-.2.5-.5.6-.9 0-.1 0-.3-.1-.5-.2-.4-.7-.5-1.1-.3l.1-.2zM12 4c-2.3 0-4.3 1.1-5.5 2.8.3 2.1 2.4 3.5 5.3 3.5 2.3 0 4.3-1.1 5.5-2.8-.3-2.1-2.4-3.5-5.3-3.5z"/></svg>
    <span>微博</span>
  </button>
  
  <button class="share-btn share-btn-qq" onclick="ShareModule.shareToQQ({url: location.href, title: document.title})" aria-label="分享到QQ">
    <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12.003 2c-2.265 0-6.29 1.364-6.29 7.325v1.195S3.55 14.96 3.55 17.474c0 .665.25 1.166.4 1.536.38.92 1.26 1.99 3.04 1.99.36 0 .72-.04 1.06-.1 2.18-.5 3.6-2.12 4.95-3.91.18.03.36.05.55.05 2.27 0 4.88-1.37 4.88-5.03V9.32c0-5.96-4.03-7.32-6.41-7.32zm-1.49 5.87c-.71 0-1.29-.58-1.29-1.29s.58-1.29 1.29-1.29 1.29.58 1.29 1.29-.58 1.29-1.29 1.29zm3.12 0c-.71 0-1.29-.58-1.29-1.29s.58-1.29 1.29-1.29 1.29.58 1.29 1.29-.58 1.29-1.29 1.29z"/></svg>
    <span>QQ</span>
  </button>
  
  <button class="share-btn share-btn-copy" onclick="ShareModule.copyLink({url: location.href})" aria-label="复制链接">
    <svg viewBox="0 0 24 24" fill="currentColor"><path d="M16 1H4c-1.1 0-2 .9-2 2v14h2V3h12V1zm3 4H8c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 16H8V7h11v14z"/></svg>
    <span>复制</span>
  </button>
</div>

<!-- 分享卡片预览 -->
<div class="share-card-preview">
  <div class="share-card-image">
    <img src="images/og-image.png" alt="分享预览">
  </div>
  <div class="share-card-content">
    <h4 class="share-card-title">旅游目的地名称</h4>
    <p class="share-card-desc">这里是描述文字，介绍分享内容的概要信息</p>
    <span class="share-card-source">游导旅游</span>
  </div>
</div>

<!-- 微信分享弹窗（用于触发） -->
<div id="wechatShareModal" class="share-modal" style="display:none;">
  <div class="share-modal-content">
    <button class="share-modal-close" aria-label="关闭">&times;</button>
    <h3>分享到微信</h3>
    <p class="share-tip">打开微信扫一扫，或长按识别二维码</p>
    <div class="wechat-qrcode">
      <img src="" alt="微信二维码">
    </div>
    <div class="share-url-box">
      <input type="text" value="" readonly class="share-url-input">
      <button class="share-copy-btn">复制链接</button>
    </div>
  </div>
</div>
