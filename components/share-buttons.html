<!-- ===== 分享成功提示 Toast ===== -->
<div id="shareToast" class="share-toast" role="alert" aria-live="polite">
  <div class="share-toast-icon">
    <svg viewBox="0 0 24 24" fill="currentColor" width="14" height="14">
      <path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/>
    </svg>
  </div>
  <span class="share-toast-message"></span>
</div>

<!-- ===== 微信分享模态框 ===== -->
<div id="wechatShareModal" class="share-modal" role="dialog" aria-labelledby="wechatModalTitle" aria-modal="true">
  <div class="share-modal-overlay" onclick="ShareModule.closeWechatModal()"></div>
  <div class="share-modal-content">
    <button class="share-modal-close" onclick="ShareModule.closeWechatModal()" aria-label="关闭">
      <svg viewBox="0 0 24 24" fill="currentColor" width="20" height="20">
        <path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/>
      </svg>
    </button>
    <h3 id="wechatModalTitle">分享到微信</h3>
    <p class="share-tip">使用微信扫一扫，或长按识别二维码</p>
    <div class="wechat-qrcode-container">
      <div id="wechatQrcode" class="wechat-qrcode"></div>
      <div class="wechat-fallback">
        <p>无法显示二维码？</p>
        <div class="share-url-box">
          <input type="text" id="wechatShareUrl" class="share-url-input" readonly>
          <button class="share-copy-btn" onclick="ShareModule.copyWechatUrl()">复制链接</button>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- ===== 分享统计面板 ===== -->
<div class="share-stats-panel" id="shareStatsPanel" style="display: none;">
  <h4 class="share-stats-title">分享数据</h4>
  <div class="share-stats-grid">
    <div class="share-stat-item">
      <div class="share-stat-value" id="statTotalShares">0</div>
      <div class="share-stat-label">总分享次数</div>
    </div>
    <div class="share-stat-item share-stat-wechat">
      <div class="share-stat-value" id="statWechatShares">0</div>
      <div class="share-stat-label">微信</div>
    </div>
    <div class="share-stat-item share-stat-weibo">
      <div class="share-stat-value" id="statWeiboShares">0</div>
      <div class="share-stat-label">微博</div>
    </div>
    <div class="share-stat-item share-stat-qq">
      <div class="share-stat-value" id="statQQShares">0</div>
      <div class="share-stat-label">QQ</div>
    </div>
    <div class="share-stat-item share-stat-copy">
      <div class="share-stat-value" id="statCopyShares">0</div>
      <div class="share-stat-label">复制链接</div>
    </div>
  </div>
</div>

<!-- ===== 分享平台分布图表 ===== -->
<div class="share-platform-chart" id="sharePlatformChart" style="display: none;">
  <h4 class="share-chart-title">分享平台分布</h4>
  <div class="share-chart-bars">
    <div class="share-chart-bar-item">
      <div class="share-chart-label">微信</div>
      <div class="share-chart-bar-bg">
        <div class="share-chart-bar-fill share-bar-wechat" id="barWechat"></div>
      </div>
      <div class="share-chart-percent" id="percentWechat">0%</div>
    </div>
    <div class="share-chart-bar-item">
      <div class="share-chart-label">微博</div>
      <div class="share-chart-bar-bg">
        <div class="share-chart-bar-fill share-bar-weibo" id="barWeibo"></div>
      </div>
      <div class="share-chart-percent" id="percentWeibo">0%</div>
    </div>
    <div class="share-chart-bar-item">
      <div class="share-chart-label">QQ</div>
      <div class="share-chart-bar-bg">
        <div class="share-chart-bar-fill share-bar-qq" id="barQQ"></div>
      </div>
      <div class="share-chart-percent" id="percentQQ">0%</div>
    </div>
    <div class="share-chart-bar-item">
      <div class="share-chart-label">QQ空间</div>
      <div class="share-chart-bar-bg">
        <div class="share-chart-bar-fill share-bar-qzone" id="barQzone"></div>
      </div>
      <div class="share-chart-percent" id="percentQzone">0%</div>
    </div>
    <div class="share-chart-bar-item">
      <div class="share-chart-label">豆瓣</div>
      <div class="share-chart-bar-bg">
        <div class="share-chart-bar-fill share-bar-douban" id="barDouban"></div>
      </div>
      <div class="share-chart-percent" id="percentDouban">0%</div>
    </div>
    <div class="share-chart-bar-item">
      <div class="share-chart-label">领英</div>
      <div class="share-chart-bar-bg">
        <div class="share-chart-bar-fill share-bar-linkedin" id="barLinkedin"></div>
      </div>
      <div class="share-chart-percent" id="percentLinkedin">0%</div>
    </div>
  </div>
</div>

<!-- ===== 热门分享页面列表 ===== -->
<div class="share-popular-pages" id="sharePopularPages" style="display: none;">
  <h4 class="share-popular-title">热门分享页面</h4>
  <ul class="share-popular-list" id="popularPagesList">
    <!-- 动态生成 -->
  </ul>
</div>
