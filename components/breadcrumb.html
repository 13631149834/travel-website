<!-- 
  面包屑导航组件
  用法: 将此文件内容复制到页面中，或使用以下JavaScript动态加载
  
  加载方式:
  fetch('components/breadcrumb.html')
    .then(res => res.text())
    .then(html => document.getElementById('breadcrumb-container').innerHTML = html);
  
  参数说明:
  - items: 面包屑项目数组 [{label, url, icon}]
  - separator: 分隔符样式 ('chevron' | 'slash' | 'arrow')
  - showHome: 是否显示首页链接
  - maxItems: 最大显示项目数，超出部分用省略号
  
  示例:
  <div id="breadcrumb-container" data-items='[{"label":"首页","url":"index.html"},{"label":"目的地","url":"destinations.html"},{"label":"泰国"}]'></div>
-->

<!-- 面包屑组件样式 -->
<style>
  .breadcrumb {
    display: flex;
    align-items: center;
    flex-wrap: wrap;
    gap: 4px;
    font-size: 14px;
    line-height: 1.5;
  }
  
  .breadcrumb-item {
    display: flex;
    align-items: center;
    gap: 4px;
    color: #6b7280;
    transition: color 0.2s;
  }
  
  .breadcrumb-item:hover {
    color: #4F86F7;
  }
  
  .breadcrumb-item:hover .breadcrumb-link {
    text-decoration: underline;
  }
  
  .breadcrumb-link {
    color: inherit;
    text-decoration: none;
    max-width: 200px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  
  .breadcrumb-current {
    color: #1f2937;
    font-weight: 500;
    max-width: 300px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  
  .breadcrumb-separator {
    color: #d1d5db;
    user-select: none;
  }
  
  .breadcrumb-icon {
    width: 16px;
    height: 16px;
    flex-shrink: 0;
  }
  
  .breadcrumb-ellipsis {
    color: #9ca3af;
    padding: 0 4px;
  }
  
  /* 紧凑样式 */
  .breadcrumb.breadcrumb-compact {
    font-size: 12px;
    gap: 2px;
  }
  
  .breadcrumb.breadcrumb-compact .breadcrumb-icon {
    width: 14px;
    height: 14px;
  }
  
  /* 大号样式 */
  .breadcrumb.breadcrumb-large {
    font-size: 16px;
    gap: 8px;
  }
  
  .breadcrumb.breadcrumb-large .breadcrumb-icon {
    width: 20px;
    height: 20px;
  }
  
  /* 带背景样式 */
  .breadcrumb-wrapper {
    padding: 12px 16px;
    background: #f9fafb;
    border-radius: 8px;
  }
  
  /* 动画 */
  .breadcrumb-item {
    animation: fadeIn 0.2s ease-out;
  }
  
  @keyframes fadeIn {
    from {
      opacity: 0;
      transform: translateX(-4px);
    }
    to {
      opacity: 1;
      transform: translateX(0);
    }
  }
  
  /* 响应式 */
  @media (max-width: 640px) {
    .breadcrumb-link {
      max-width: 100px;
    }
    .breadcrumb-current {
      max-width: 150px;
    }
  }
</style>

<!-- 面包屑组件模板 -->
<template id="breadcrumb-template">
  <nav aria-label="面包屑导航" class="breadcrumb-wrapper">
    <ol class="breadcrumb" role="list">
      <!-- 动态生成 -->
    </ol>
  </nav>
</template>

<!-- 面包屑组件脚本 -->
<script>
  /**
   * 面包屑导航组件
   * @param {Object} options - 配置选项
   * @param {Array} options.items - 面包屑项目 [{label, url, icon}]
   * @param {string} options.separator - 分隔符样式 ('chevron' | 'slash' | 'arrow')
   * @param {boolean} options.showHome - 是否显示首页
   * @param {number} options.maxItems - 最大显示项目数
   * @param {string} options.size - 大小 ('small' | 'default' | 'large')
   */
  class BreadcrumbComponent {
    constructor(container, options = {}) {
      this.container = container;
      this.options = {
        separator: 'chevron',
        showHome: true,
        maxItems: 5,
        size: 'default',
        homeLabel: '首页',
        homeIcon: '🏠',
        ...options
      };
      
      this.init();
    }
    
    init() {
      const items = this.getItems();
      if (!items || items.length === 0) return;
      
      this.render(items);
    }
    
    getItems() {
      // 优先从 data-items 属性获取
      const dataItems = this.container.dataset.items;
      if (dataItems) {
        try {
          return JSON.parse(dataItems);
        } catch (e) {
          console.error('Invalid breadcrumb data:', e);
        }
      }
      
      // 从 URL 路径推断
      return this.inferFromPath();
    }
    
    inferFromPath() {
      const path = window.location.pathname;
      const segments = path.split('/').filter(Boolean);
      const items = [];
      
      if (this.options.showHome) {
        items.push({ label: this.options.homeLabel, url: 'index.html', icon: this.options.homeIcon });
      }
      
      let currentPath = '';
      segments.forEach((segment, index) => {
        currentPath += '/' + segment;
        
        // 跳过文件名
        if (segment.includes('.html') || segment.includes('.')) {
          const label = segment.replace('.html', '').replace(/-/g, ' ');
          items.push({ label: this.formatLabel(label), url: currentPath });
          return;
        }
        
        // 目录处理
        items.push({ label: this.formatLabel(segment), url: currentPath + '/index.html' });
      });
      
      return items;
    }
    
    formatLabel(str) {
      // 中文友好格式化
      const labels = {
        'index': '首页',
        'guides': '导游列表',
        'guide': '导游',
        'routes': '路线列表',
        'route': '路线',
        'destinations': '目的地',
        'destination': '目的地',
        'visa': '签证服务',
        'knowledge': '知识库',
        'tools': '工具中心',
        'about': '关于我们',
        'user': '用户中心',
        'profile': '个人资料',
        'admin': '管理后台',
        'beaches': '海滩',
        'museums': '博物馆',
        'diving': '潜水',
        'skiing': '滑雪',
        'hiking': '徒步',
        'hot-springs': '温泉',
        'shopping': '购物',
        'culture': '文化',
        'food': '美食',
        'weather': '天气',
        'currency': '汇率',
        'budget': '预算',
        'schedule': '日程',
        'my': '我的',
        'admin': '管理'
      };
      
      const lower = str.toLowerCase();
      if (labels[lower]) return labels[lower];
      
      // 格式化驼峰命名
      return str
        .replace(/([A-Z])/g, ' $1')
        .replace(/-/g, ' ')
        .replace(/\b\w/g, c => c.toUpperCase());
    }
    
    getSeparator() {
      const separators = {
        chevron: `<svg class="breadcrumb-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M9 18l6-6-6-6"/>
        </svg>`,
        slash: `<span class="breadcrumb-separator">/</span>`,
        arrow: `<svg class="breadcrumb-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M5 12h14M12 5l7 7-7 7"/>
        </svg>`
      };
      return separators[this.options.separator] || separators.chevron;
    }
    
    render(items) {
      // 限制显示数量
      let displayItems = [...items];
      const totalItems = displayItems.length;
      
      if (totalItems > this.options.maxItems && this.options.maxItems > 2) {
        const first = displayItems[0];
        const last = displayItems[displayItems.length - 1];
        const middle = displayItems.slice(1, -1);
        
        displayItems = [
          first,
          { label: '...', isEllipsis: true },
          ...middle.slice(-(this.options.maxItems - 3)),
          { label: '...', isEllipsis: true },
          last
        ].filter((item, index, arr) => {
          // 去除重复的省略号
          if (item.isEllipsis && arr[index - 1]?.isEllipsis) return false;
          return true;
        });
      }
      
      // 设置大小类
      const sizeClass = {
        small: 'breadcrumb-compact',
        default: '',
        large: 'breadcrumb-large'
      }[this.options.size] || '';
      
      this.container.innerHTML = `
        <nav aria-label="面包屑导航" class="breadcrumb-wrapper ${sizeClass}">
          <ol class="breadcrumb" role="list">
            ${displayItems.map((item, index) => {
              const isLast = index === displayItems.length - 1;
              const separator = index < displayItems.length - 1 ? this.getSeparator() : '';
              
              if (item.isEllipsis) {
                return `<span class="breadcrumb-ellipsis">...</span>${separator}`;
              }
              
              if (isLast) {
                return `
                  <li class="breadcrumb-item" aria-current="page">
                    <span class="breadcrumb-current">
                      ${item.icon ? `<span class="mr-1">${item.icon}</span>` : ''}
                      ${item.label}
                    </span>
                  </li>
                `;
              }
              
              return `
                <li class="breadcrumb-item">
                  ${item.icon ? `<span class="mr-1">${item.icon}</span>` : ''}
                  <a href="${item.url}" class="breadcrumb-link">${item.label}</a>
                  ${separator}
                </li>
              `;
            }).join('')}
          </ol>
        </nav>
      `;
    }
    
    // 更新面包屑
    update(items) {
      this.render(items);
    }
    
    // 添加项目
    addItem(item) {
      const currentItems = this.getItems();
      currentItems.push(item);
      this.render(currentItems);
    }
    
    // 移除最后一项
    removeLast() {
      const currentItems = this.getItems();
      if (currentItems.length > 1) {
        currentItems.pop();
        this.render(currentItems);
      }
    }
  }
  
  // 自动初始化页面上的面包屑组件
  document.addEventListener('DOMContentLoaded', () => {
    document.querySelectorAll('[data-breadcrumb]').forEach(container => {
      new BreadcrumbComponent(container, {
        separator: container.dataset.separator || 'chevron',
        showHome: container.dataset.showHome !== 'false',
        maxItems: parseInt(container.dataset.maxItems) || 5,
        size: container.dataset.size || 'default'
      });
    });
  });
  
  // 导出到全局
  window.BreadcrumbComponent = BreadcrumbComponent;
</script>

<!-- 常用面包屑示例用法 -->
<!-- 
  示例 1: 基础用法
  <div data-breadcrumb></div>
  
  示例 2: 自定义项目
  <div data-breadcrumb data-items='[
    {"label":"首页","url":"index.html","icon":"🏠"},
    {"label":"目的地","url":"destinations.html"},
    {"label":"泰国"}
  ]'></div>
  
  示例 3: 大尺寸
  <div data-breadcrumb data-size="large" data-items='[...]'></div>
  
  示例 4: 使用 JavaScript
  <div id="my-breadcrumb"></div>
  <script>
    const bc = new BreadcrumbComponent(document.getElementById('my-breadcrumb'), {
      items: [
        { label: '首页', url: 'index.html', icon: '🏠' },
        { label: '导游', url: 'guides.html' },
        { label: '李明导游' }
      ],
      separator: 'slash',
      maxItems: 3
    });
  </script>
  
  示例 5: 页面内跳转
  <nav aria-label="面包屑导航">
    <ol class="breadcrumb">
      <li><a href="index.html">🏠 首页</a></li>
      <li>/</li>
      <li><a href="destinations.html">🌍 目的地</a></li>
      <li>/</li>
      <li><a href="beaches/">🏖️ 海滩</a></li>
      <li>/</li>
      <li aria-current="page">普吉岛海滩</li>
    </ol>
  </nav>
-->
