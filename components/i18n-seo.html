<!-- 多语言 SEO 组件 - 必须在 <head> 中引入 -->
<!-- 生成 hreflang 标签和多语言元数据 -->

<script>
// 多语言 SEO 管理器
(function() {
  'use strict';

  const SEO_CONFIG = {
    siteUrl: 'https://youdautravel.com',
    defaultLang: 'zh',
    supportedLangs: ['zh', 'en', 'ja', 'ko', 'fr', 'de', 'es', 'ru'],
    langRegions: {
      zh: 'zh-CN',
      en: 'en-US',
      ja: 'ja-JP',
      ko: 'ko-KR',
      fr: 'fr-FR',
      de: 'de-DE',
      es: 'es-ES',
      ru: 'ru-RU'
    }
  };

  // 生成 hreflang 标签
  function generateHreflangTags() {
    const currentPath = window.location.pathname.replace(/\/$/, '');
    const tags = [];

    // x-default 版本
    tags.push(`<link rel="alternate" hreflang="x-default" href="${SEO_CONFIG.siteUrl}${currentPath}/" />`);

    // 各语言版本
    SEO_CONFIG.supportedLangs.forEach(lang => {
      const hreflang = SEO_CONFIG.langRegions[lang];
      tags.push(`<link rel="alternate" hreflang="${hreflang}" href="${SEO_CONFIG.siteUrl}/${lang}${currentPath}/" />`);
    });

    return tags.join('\n    ');
  }

  // 注入 hreflang 标签
  function injectHreflangTags() {
    const existing = document.querySelector('link[rel="alternate"][hreflang="x-default"]');
    if (existing) return; // 已存在

    const head = document.head || document.getElementsByTagName('head')[0];
    if (!head) return;

    const container = document.createElement('div');
    container.innerHTML = `<div>    ${generateHreflangTags()}  </div>`;
    const links = container.querySelector('div').querySelectorAll('link');

    links.forEach(link => {
      head.appendChild(link);
    });
  }

  // 更新 Open Graph 标签
  function updateOpenGraphTags(lang) {
    const ogLocale = document.querySelector('meta[property="og:locale"]');
    if (ogLocale) {
      ogLocale.content = SEO_CONFIG.langRegions[lang];
    }

    const ogSiteName = document.querySelector('meta[property="og:site_name"]');
    if (ogSiteName) {
      const names = {
        zh: '游导旅游',
        en: 'YouDao Travel',
        ja: 'ユーダオ  travel',
        ko: '유도 여행',
        fr: 'YouDao Travel',
        de: 'YouDao Travel',
        es: 'YouDao Travel',
        ru: 'YouDao Travel'
      };
      ogSiteName.content = names[lang] || names.zh;
    }
  }

  // 更新文档语言属性
  function updateDocumentLang(lang) {
    document.documentElement.lang = SEO_CONFIG.langRegions[lang];
    document.documentElement.dir = 'ltr'; // 默认左到右，特殊语言需调整
  }

  // 生成多语言站点地图
  function generateSitemap() {
    const pages = [
      { path: '', priority: '1.0', changefreq: 'daily' },
      { path: '/guides', priority: '0.9', changefreq: 'weekly' },
      { path: '/routes', priority: '0.9', changefreq: 'weekly' },
      { path: '/visa', priority: '0.8', changefreq: 'weekly' },
      { path: '/knowledge', priority: '0.8', changefreq: 'weekly' },
      { path: '/tools', priority: '0.8', changefreq: 'monthly' },
      { path: '/about', priority: '0.7', changefreq: 'monthly' },
      { path: '/contact', priority: '0.7', changefreq: 'monthly' },
      { path: '/login', priority: '0.6', changefreq: 'yearly' },
      { path: '/register', priority: '0.6', changefreq: 'yearly' },
      { path: '/blog', priority: '0.8', changefreq: 'daily' },
      { path: '/faq', priority: '0.7', changefreq: 'monthly' },
      { path: '/help', priority: '0.7', changefreq: 'monthly' },
      { path: '/destinations', priority: '0.9', changefreq: 'weekly' },
      { path: '/community', priority: '0.8', changefreq: 'weekly' }
    ];

    const urls = [];
    const now = new Date().toISOString().split('T')[0];

    SEO_CONFIG.supportedLangs.forEach(lang => {
      pages.forEach(page => {
        urls.push({
          loc: `${SEO_CONFIG.siteUrl}/${lang}${page.path}/`,
          priority: page.priority,
          changefreq: page.changefreq,
          lastmod: now,
          hreflang: SEO_CONFIG.langRegions[lang],
          xdefault: lang === SEO_CONFIG.defaultLang
        });
      });
    });

    return generateSitemapXML(urls);
  }

  // 生成站点地图 XML
  function generateSitemapXML(urls) {
    let xml = '<?xml version="1.0" encoding="UTF-8"?>\n';
    xml += '<urlset xmlns="http://www.sitemaps.org/schemas/sitemap/0.9"\n';
    xml += '        xmlns:xhtml="http://www.w3.org/1999/xhtml">\n';

    urls.forEach(url => {
      xml += '  <url>\n';
      xml += `    <loc>${url.loc}</loc>\n`;
      xml += `    <lastmod>${url.lastmod}</lastmod>\n`;
      xml += `    <changefreq>${url.changefreq}</changefreq>\n`;
      xml += `    <priority>${url.priority}</priority>\n`;
      xml += `    <xhtml:link rel="alternate" hreflang="${url.hreflang}" href="${url.loc}"/>\n`;
      if (url.xdefault) {
        xml += `    <xhtml:link rel="alternate" hreflang="x-default" href="${url.loc}"/>\n`;
      }
      xml += '  </url>\n';
    });

    xml += '</urlset>';
    return xml;
  }

  // 导出给外部使用
  window.I18nSEO = {
    generateHreflangTags,
    generateSitemap,
    generateSitemapXML,
    updateOpenGraphTags,
    updateDocumentLang,
    SEO_CONFIG
  };

  // 页面加载后注入标签
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', injectHreflangTags);
  } else {
    injectHreflangTags();
  }
})();
</script>
