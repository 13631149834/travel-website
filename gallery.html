    /* ===================================
       画廊页面专用样式
       =================================== */
    
    /* Hero区域 */
    .gallery-hero {
      background: linear-gradient(180deg, #F8FAFC 0%, #fff 100%);
      padding: 64px 0 48px;
      text-align: center;
    }
    .gallery-hero h1 {
      font-size: 2rem;
      font-weight: 600;
      color: var(--gray-900);
      margin-bottom: 12px;
      letter-spacing: -0.02em;
    }
    .gallery-hero p {
      font-size: 1rem;
      color: var(--gray-500);
      max-width: 480px;
      margin: 0 auto;
    }
    .gallery-hero .photo-count {
      margin-top: 16px;
      font-size: 0.85rem;
      color: var(--gray-400);
    }
    
    /* 筛选区域 */
    .gallery-filters {
      padding: 24px 0;
      background: #fff;
      border-bottom: 1px solid var(--gray-200);
      position: sticky;
      top: 64px;
      z-index: 50;
    }
    .filter-row {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      justify-content: center;
      margin-bottom: 16px;
    }
    .filter-row:last-child {
      margin-bottom: 0;
    }
    .filter-label {
      font-size: 0.85rem;
      color: var(--gray-500);
      display: flex;
      align-items: center;
      margin-right: 8px;
    }
    .filter-btn {
      padding: 8px 16px;
      background: var(--gray-100);
      border: 1px solid transparent;
      border-radius: var(--radius-full);
      font-size: 0.85rem;
      color: var(--gray-600);
      cursor: pointer;
      transition: var(--transition);
      white-space: nowrap;
    }
    .filter-btn:hover {
      background: var(--gray-200);
      color: var(--gray-800);
    }
    .filter-btn.active {
      background: var(--primary);
      color: #fff;
      border-color: var(--primary);
    }
    
    /* 瀑布流画廊 */
    .gallery-content {
      padding: 48px 0 80px;
      background: #fff;
    }
    .masonry-grid {
      column-count: 3;
      column-gap: 20px;
    }
    @media (max-width: 900px) {
      .masonry-grid { column-count: 2; }
    }
    @media (max-width: 580px) {
      .masonry-grid { column-count: 1; }
    }
    
    /* 画廊卡片 */
    .gallery-item {
      break-inside: avoid;
      margin-bottom: 20px;
      position: relative;
      border-radius: var(--radius-lg);
      overflow: hidden;
      cursor: pointer;
      transition: var(--transition);
      background: var(--gray-100);
    }
    .gallery-item:hover {
      transform: translateY(-4px);
      box-shadow: var(--shadow-lg);
    }
    .gallery-item img {
      width: 100%;
      display: block;
      transition: transform 0.4s ease;
    }
    .gallery-item:hover img {
      transform: scale(1.03);
    }
    
    /* 图片信息叠加层 */
    .gallery-overlay {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 48px 16px 16px;
      background: linear-gradient(to top, rgba(0,0,0,0.7) 0%, transparent 100%);
      opacity: 0;
      transition: var(--transition);
    }
    .gallery-item:hover .gallery-overlay {
      opacity: 1;
    }
    .gallery-overlay .photo-title {
      font-size: 0.95rem;
      font-weight: 500;
      color: #fff;
      margin-bottom: 6px;
    }
    .gallery-overlay .photo-meta {
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 0.8rem;
      color: rgba(255,255,255,0.85);
    }
    .gallery-overlay .photo-destination {
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .gallery-overlay .photo-author {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .gallery-overlay .author-avatar {
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: var(--primary);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.65rem;
      color: #fff;
      font-weight: 500;
    }
    
    /* 分类标签 */
    .photo-category {
      position: absolute;
      top: 12px;
      left: 12px;
      padding: 4px 10px;
      background: rgba(255,255,255,0.95);
      border-radius: var(--radius-full);
      font-size: 0.75rem;
      color: var(--gray-700);
      font-weight: 500;
      backdrop-filter: blur(4px);
    }
    
    /* 空状态 */
    .empty-state {
      text-align: center;
      padding: 80px 20px;
      color: var(--gray-400);
    }
    .empty-state .empty-icon {
      font-size: 3.5rem;
      margin-bottom: 16px;
    }
    .empty-state h3 {
      font-size: 1.1rem;
      color: var(--gray-600);
      margin-bottom: 8px;
    }
    .empty-state p {
      font-size: 0.9rem;
    }
    
    /* ===================================
       灯箱弹窗
       =================================== */
    .lightbox {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0,0,0,0.92);
      z-index: 1000;
      align-items: center;
      justify-content: center;
      padding: 40px;
    }
    .lightbox.active {
      display: flex;
    }
    .lightbox-close {
      position: absolute;
      top: 20px;
      right: 20px;
      width: 44px;
      height: 44px;
      border: none;
      background: rgba(255,255,255,0.15);
      border-radius: 50%;
      color: #fff;
      font-size: 1.5rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: var(--transition);
    }
    .lightbox-close:hover {
      background: rgba(255,255,255,0.25);
    }
    .lightbox-content {
      max-width: 90vw;
      max-height: 85vh;
      position: relative;
    }
    .lightbox-content img {
      max-width: 100%;
      max-height: 85vh;
      object-fit: contain;
      border-radius: var(--radius-md);
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    }
    .lightbox-info {
      position: absolute;
      bottom: -80px;
      left: 0;
      right: 0;
      text-align: center;
      color: rgba(255,255,255,0.9);
    }
    .lightbox-info h3 {
      font-size: 1.2rem;
      font-weight: 500;
      margin-bottom: 8px;
    }
    .lightbox-info .info-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 20px;
      font-size: 0.9rem;
      opacity: 0.8;
    }
    .lightbox-info .info-item {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .lightbox-nav {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      width: 50px;
      height: 50px;
      border: none;
      background: rgba(255,255,255,0.15);
      border-radius: 50%;
      color: #fff;
      font-size: 1.25rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: var(--transition);
    }
    .lightbox-nav:hover {
      background: rgba(255,255,255,0.25);
    }
    .lightbox-nav.prev { left: 20px; }
    .lightbox-nav.next { right: 20px; }
    @media (max-width: 768px) {
      .lightbox { padding: 20px; }
      .lightbox-nav { display: none; }
      .lightbox-info { bottom: -60px; }
    }
    
    /* 隐藏的过滤元素 */
    .gallery-item.hidden {
      display: none;
    }
  
/* 无障碍 - 焦点可见样式 (WCAG 2.1 AA) */
.skip-link {
  position: absolute;
  top: -100px;
  left: 50%;
  transform: translateX(-50%);
  background: var(--primary);
  color: #fff !important;
  padding: 12px 24px;
  border-radius: 0 0 8px 8px;
  z-index: 10000;
  font-weight: 600;
  transition: top 0.2s;
}
.skip-link:focus {
  top: 0;
  outline: 3px solid var(--primary-dark);
  outline-offset: 2px;
}

/* 全局焦点样式 */
:focus {
  outline: 3px solid var(--primary);
  outline-offset: 2px;
}
:focus:not(:focus-visible) {
  outline: none;
}
:focus-visible {
  outline: 3px solid var(--primary);
  outline-offset: 2px;
}

/* 链接焦点样式 */
a:focus,
button:focus,
[tabindex]:focus {
  outline: 3px solid var(--primary);
  outline-offset: 2px;
  border-radius: 2px;
}

/* 输入框焦点 */
input:focus,
textarea:focus,
select:focus {
  outline: 3px solid var(--primary);
  outline-offset: 0;
  border-color: var(--primary);
}

    let currentFilter = { category: 'all', destination: 'all' };
    let currentLightboxIndex = 0;
    let filteredPhotos = [...photos];

    // 渲染画廊
    function renderGallery() {
      const grid = document.getElementById('galleryGrid');
      grid.innerHTML = '';
      
      filteredPhotos.forEach((photo, index) => {
        const item = document.createElement('div');
        item.className = 'gallery-item';
        item.onclick = () => openLightbox(index);
        item.innerHTML = `
          <img src="${photo.src}" alt="${photo.title}" loading="lazy" style="aspect-ratio: auto; height: ${photo.height}px;">
          <span class="photo-category">${photo.categoryClass} ${photo.category}</span>
          <div class="gallery-overlay">
            <div class="photo-title">${photo.title}</div>
            <div class="photo-meta">
              <span class="photo-destination">📍 ${photo.destination}</span>
              <span class="photo-author">
                <span class="author-avatar">${photo.authorInitial}</span>
                ${photo.author}
              </span>
            </div>
          </div>
        `;
        grid.appendChild(item);
      });

      // 更新计数
      document.getElementById('photoTotal').textContent = filteredPhotos.length;
      
      // 显示空状态
      const emptyState = document.getElementById('emptyState');
      if (filteredPhotos.length === 0) {
        emptyState.style.display = 'block';
        grid.style.display = 'none';
      } else {
        emptyState.style.display = 'none';
        grid.style.display = 'block';
      }
    }

    // 筛选功能
    function initFilters() {
      const filterBtns = document.querySelectorAll('.filter-btn');
      filterBtns.forEach(btn => {
        btn.addEventListener('click', () => {
          const filterType = btn.dataset.filter;
          const value = btn.dataset.value;
          
          // 更新按钮状态
          document.querySelectorAll(`.filter-btn[data-filter="${filterType}"]`).forEach(b => {
            b.classList.remove('active');
          });
          btn.classList.add('active');
          
          // 更新筛选条件
          currentFilter[filterType] = value;
          
          // 重新筛选
          applyFilters();
        });
      });
    }

    function applyFilters() {
      filteredPhotos = photos.filter(photo => {
        const categoryMatch = currentFilter.category === 'all' || photo.category === currentFilter.category;
        const destMatch = currentFilter.destination === 'all' || photo.destination === currentFilter.destination;
        return categoryMatch && destMatch;
      });
      renderGallery();
    }

    // 灯箱功能
    function openLightbox(index) {
      currentLightboxIndex = index;
      const photo = filteredPhotos[index];
      
      document.getElementById('lightboxImage').src = photo.src;
      document.getElementById('lightboxImage').alt = photo.title;
      document.getElementById('lightboxTitle').textContent = photo.title;
      document.getElementById('lightboxDest').innerHTML = `📍 ${photo.destination}`;
      document.getElementById('lightboxAuthor').innerHTML = `📷 ${photo.author}`;
      document.getElementById('lightboxCategory').innerHTML = `${photo.categoryClass} ${photo.category}`;
      
      document.getElementById('lightbox').classList.add('active');
      document.body.style.overflow = 'hidden';
    }

    function closeLightbox() {
      document.getElementById('lightbox').classList.remove('active');
      document.body.style.overflow = '';
    }

    function navigateLightbox(direction) {
      currentLightboxIndex += direction;
      if (currentLightboxIndex < 0) currentLightboxIndex = filteredPhotos.length - 1;
      if (currentLightboxIndex >= filteredPhotos.length) currentLightboxIndex = 0;
      
      const photo = filteredPhotos[currentLightboxIndex];
      document.getElementById('lightboxImage').src = photo.src;
      document.getElementById('lightboxImage').alt = photo.title;
      document.getElementById('lightboxTitle').textContent = photo.title;
      document.getElementById('lightboxDest').innerHTML = `📍 ${photo.destination}`;
      document.getElementById('lightboxAuthor').innerHTML = `📷 ${photo.author}`;
      document.getElementById('lightboxCategory').innerHTML = `${photo.categoryClass} ${photo.category}`;
    }

    // 键盘导航
    document.addEventListener('keydown', (e) => {
      if (!document.getElementById('lightbox').classList.contains('active')) return;
      if (e.key === 'Escape') closeLightbox();
      if (e.key === 'ArrowLeft') navigateLightbox(-1);
      if (e.key === 'ArrowRight') navigateLightbox(1);
    });

    // 点击背景关闭
    document.getElementById('lightbox').addEventListener('click', (e) => {
      if (e.target.id === 'lightbox') closeLightbox();
    });

    // 移动端导航
    function toggleMobileNav() {
      const nav = document.querySelector('.nav-links');
      nav.style.display = nav.style.display === 'flex' ? '' : 'flex';
    }

    // 初始化
    document.addEventListener('DOMContentLoaded', () => {
      initFilters();
      renderGallery();
    });
  </script>
