<!DOCTYPE html>   < !DOCTYPE html>
<html lang="zh-CN">   < css长= " zh-CN" >
<head>   < head   头>
    <meta charset="UTF-8">   <meta   元 charset   字符集   字符集="UTF-8"   "UTF-8">
    <meta name="viewport" content   内容="width=device-width, initial-scale=1.0">
    <title>注册 - 游导旅游</title>   < title   标题> Register - Tour Guide Travel /title>
    <link rel="stylesheet" href="css/style.css"><link   链接 rel="stylesheet"   "stylesheet" href="css/style.css">
    <style>   < style   风格>
        .auth-container {   ．auth-container {
            min-height: 100vh;   最小高度:100 vh;
            display: flex;   显示:flex;
            align-items: center;   align-items： 居中；
            justify-content: center   中心;   居中对齐内容；
            background   背景: linear-gradient   线性渐变(135deg, #667eea 0%, #764ba2 100%);背景：线性渐变（135 度，#667eea 0%，#764ba2 100%）；
            padding   填充: 20px;   填充:20 px;
        }
        
        .auth-box {   ．auth-box {
            background: white;   背景:白色;
            border-radius: 20px;   圆角半径：20 像素；
            padding   填充: 40px;   填充:40像素;
            width: 100%;   宽度:100%;
            max-width: 400px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);盒阴影：0 20 像素 60 像素 rgba(0,0,0,0.3)；
        }
        
        .auth-header {   ．auth-header {
            text-align: center   中心;
               底部外边距：30 像素；margin-bottom: 30px;
        }
        
        .   ..auth-header .logo   标志 {auth-header .logo   标志 {
               字体大小:48 px;font-size   字体大小   字体大小   字体大小: 48px;
               底部外边距：10 像素；margin-bottom: 10px;
        }
        
        .auth-header h1 {
            font-size: 24px;
            color: #333;
            margin-bottom: 5px;
        }
        
        .auth-header p {
            color: #666;
            font-size: 14px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 500;
        }
        
        .form-group input {
            width: 100%;   宽度:100%;
            padding: 12px 16px;
            border: 2px solid #E5E7EB;
            border-radius: 10px;
            font-size: 16px;
            transition: all 0.3s;
        }
        
        .form-group input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }
        
        .btn-primary {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
        }
        
        .btn-primary:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        
        .auth-footer {
            text-align: center;
            margin-top: 25px;
            color: #666;
            font-size: 14px;
        }
        
        .auth-footer a {
            color: #667eea;
            text-decoration: none;
            font-weight: 500;
        }
        
        .auth-footer a:hover {
            text-decoration: underline;
        }
        
        .role-selector {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        
        .role-btn {
            flex: 1;
            padding: 12px;
            border: 2px solid #E5E7EB;
            border-radius: 10px;
            background: white;
            cursor: pointer;
            transition: all 0.3s;
            text-align: center;
        }
        
        .role-btn:hover {
            border-color: #667eea;
        }
        
        .role-btn.active {
            border-color: #667eea;
            background: rgba(102, 126, 234, 0.1);
        }
        
        .role-btn .icon {
            font-size: 24px;
            margin-bottom: 5px;
            display: block;
        }
        
        .role-btn .text {
            font-size: 14px;
            color: #333;
        }
        
        .role-btn .desc {
            font-size: 12px;
            color: #999;
            margin-top: 3px;
        }
        
        .error-message {
            color: #EF4444;
            font-size: 14px;
            margin-top: 5px;
            display: none;
        }
        
        .password-hint {
            font-size: 12px;
            color: #999;
            margin-top: 5px;
        }
        
        .divider {
            display: flex;
            align-items: center;
            margin: 25px 0;
            color: #999;
            font-size: 14px;
        }
        
        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: #E5E7EB;
        }
        
        .divider span {
            padding: 0 15px;
        }
        
        @keyframes slideDown {
            from { transform: translateX(-50%) translateY(-20px); opacity: 0; }
            to { transform: translateX(-50%) translateY(0); opacity: 1; }
        }
        
        @keyframes slideUp {
            from { transform: translateX(-50%) translateY(0); opacity: 1; }
            to { transform: translateX(-50%) translateY(-20px); opacity: 0; }
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="auth-box">
            <div class="auth-header">
                <div class="logo">🌏</div>
                <h1>加入游导旅游</h1>
                <p>选择身份，开启你的旅程</p>
            </div>
            
            <form id="registerForm">
                <!-- 身份选择 -->
                <div class="form-group">
                    <label>我是</label>
                    <div class="role-selector">
                        <button type="button" class="role-btn active" data-role="tourist">
                            <span class="icon">🎒</span>
                            <span class="text">游客</span>
                            <span class="desc">寻找精彩旅程</span>
                        </button>
                        <button type="button" class="role-btn" data-role="guide">
                            <span class="icon">🎤</span>
                            <span class="text">导游</   & lt;span>
                            <span class="desc">提供专业服务</span>
                        </button>
                    </div>
                </div>
                
                <div class="form-group">
                    <label for="nickname">昵称</label>
                    <input type="text" id="nickname" placeholder="给自己起个名字吧" required>
                    <div class="error-message" id="nicknameError"></div>
                </div>
                
                <div class="form-group">
                    <label for="email">邮箱地址</label>
                    <input type="email" id="email" placeholder="请输入邮箱" required>
                    <div class="error-message" id="emailError"></div>
                </div>
                
                <div class="form-group">
                    <label for="password">密码</label>
                    <input type="password" id="password" placeholder="请设置密码（至少6位）" required minlength="6">
                    <div class="password-hint">密码至少6个字符，建议包含字母和数字</div>
                    <div class="error-message" id="passwordError"></div>
                </div>
                
                <div class="form-group">
                    <label for="confirmPassword">确认密码</label>
                    <input type="password" id="confirmPassword" placeholder="请再次输入密码" required>
                    <div class="error-message" id="confirmError"></div>
                </div>
                
                <button type="submit" class="btn-primary" id="registerBtn">注 册</button>
            </form>
            
            <div class="divider"><span>或</span></div>
            
            <div class="auth-footer">
                已有账号？<a href="login.html">立即登录</a>
            </div>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase-config.js"></script>
    <script>
        let selectedRole = 'tourist';
        
        // 检查是否已登录
        const savedUser = localStorage.getItem('user');
        if (savedUser) {
            window.location.href = 'index.html';
        }
        
        // 身份选择
        document.querySelectorAll('.role-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.role-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                selectedRole = btn.dataset.role;
            });
        });
        
        // 表单提交
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const nickname = document.getElementById('nickname').value.trim();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const registerBtn = document.getElementById('registerBtn');
            
            // 清除错误
            document.querySelectorAll('.error-message').forEach(el => el.style.display = 'none');
            
            // 验证
            let hasError = false;
            
            if (!nickname) {
                document.getElementById('nicknameError').textContent = '请输入昵称';
                document.getElementById('nicknameError').style.display = 'block';
                hasError = true;
            }
            
            if (!email) {
                document.getElementById('emailError').textContent = '请输入邮箱';
                document.getElementById('emailError').style.display = 'block';
                hasError = true;
            }
            
            if (password.length < 6) {
                document.getElementById('passwordError').textContent = '密码至少6个字符';
                document.getElementById('passwordError').style.display = 'block';
                hasError = true;
            }
            
            if (password !== confirmPassword) {
                document.getElementById('confirmError').textContent = '两次密码不一致';
                document.getElementById('confirmError').style.display = 'block';
                hasError = true;
            }
            
            if (hasError) return;
            
            // 注册
            registerBtn.disabled = true;
            registerBtn.textContent = '注册中...';
            
            const { data, error } = await Auth.signUp(email, password, nickname);
            
            if (error) {
                registerBtn.disabled = false;
                registerBtn.textContent = '注 册';
                
                if (error.message.includes('already registered')) {
                    Utils.showToast('该邮箱已被注册', 'error');
                } else {
                    Utils.showToast(error.message, 'error');
                }
                return;
            }
            
            // 创建用户记录
            if (data.user) {
                await DB.users.create({
                    id: data.user.id,
                    email: email,
                    role: selectedRole,
                    nickname: nickname,
                    avatar: '🌍',
                    created_at: new Date().toISOString()
                });
                
                // 如果是导游，提示完善资料
                if (selectedRole === 'guide') {
                    Utils.showToast('注册成功！请完善导游资料', 'success');
                    setTimeout(() => {
                        window.location.href = 'guide-apply.html';
                    }, 1500);
                } else {
                    Utils.showToast('注册成功！请查收验证邮件', 'success');
                    setTimeout(() => {
                        window.location.href = 'login.html';
                    }, 1500);
                }
            }
        });
    </script>
</body>
</html>
