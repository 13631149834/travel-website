<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>注册 - 游导伴旅 | 开启旅行新体验</title>
    <meta name="description" content="注册游导伴旅账号，成为游客发现精彩旅行，或成为导游提供服务，开启旅行新体验。">
    <meta name="keywords" content="注册,账号注册,新用户注册,导游注册,游客注册">
    <meta name="robots" content="noindex, follow">
    <link rel="canonical" href="https://youdao-travel.com/register.html">
    <link rel="stylesheet" href="css/style.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            min-height: 100vh;
            transition: background 0.5s ease;
        }
        
        /* 游客模式 - 蓝色系 */
        body.tourist-mode {
            background: linear-gradient(135deg, #3B82F6 0%, #1D4ED8 50%, #1E40AF 100%);
        }
        
        /* 导游模式 - 紫色系 */
        body.guide-mode {
            background: linear-gradient(135deg, #8B5CF6 0%, #7C3AED 50%, #6D28D9 100%);
        }
        
        .auth-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .auth-box {
            background: white;
            border-radius: 24px;
            padding: 0;
            width: 100%;
            max-width: 480px;
            box-shadow: 0 25px 80px rgba(0,0,0,0.25);
            overflow: hidden;
        }
        
        /* 顶部Tab切换 */
        .auth-tabs {
            display: flex;
            padding: 0;
            background: #F8FAFC;
        }
        
        .auth-tab {
            flex: 1;
            padding: 20px;
            border: none;
            background: transparent;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
            color: #64748B;
            transition: all 0.3s;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            position: relative;
        }
        
        .auth-tab .tab-icon {
            font-size: 28px;
        }
        
        .auth-tab .tab-text {
            font-size: 15px;
        }
        
        .auth-tab.active {
            color: inherit;
        }
        
        /* 游客Tab激活 - 蓝色 */
        body.tourist-mode .auth-tab.tourist-tab.active {
            background: white;
            color: #3B82F6;
        }
        
        body.tourist-mode .auth-tab.tourist-tab.active::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, #3B82F6, #60A5FA);
            border-radius: 4px 4px 0 0;
        }
        
        /* 导游Tab激活 - 紫色 */
        body.guide-mode .auth-tab.guide-tab.active {
            background: white;
            color: #8B5CF6;
        }
        
        body.guide-mode .auth-tab.guide-tab.active::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, #8B5CF6, #A78BFA);
            border-radius: 4px 4px 0 0;
        }
        
        /* 表单区域 */
        .auth-form-wrap {
            padding: 30px 35px 35px;
            max-height: 80vh;
            overflow-y: auto;
        }
        
        .auth-header {
            text-align: center;
            margin-bottom: 25px;
        }
        
        .auth-header .logo {
            font-size: 42px;
            margin-bottom: 10px;
        }
        
        .auth-header h1 {
            font-size: 24px;
            color: #1E293B;
            margin-bottom: 6px;
        }
        
        .auth-header p {
            color: #64748B;
            font-size: 14px;
        }
        
        /* 表单样式 */
        .form-group {
            margin-bottom: 18px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 7px;
            color: #334155;
            font-weight: 500;
            font-size: 14px;
        }
        
        .form-group label .required {
            color: #EF4444;
            margin-left: 3px;
        }
        
        .form-group input,
        .form-group select {
            width: 100%;
            padding: 13px 15px;
            border: 2px solid #E2E8F0;
            border-radius: 10px;
            font-size: 14px;
            transition: all 0.3s;
            background: #F8FAFC;
        }
        
        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: #3B82F6;
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.1);
            background: white;
        }
        
        body.guide-mode .form-group input:focus,
        body.guide-mode .form-group select:focus {
            border-color: #8B5CF6;
            box-shadow: 0 0 0 4px rgba(139, 92, 246, 0.1);
        }
        
        .form-group input.error {
            border-color: #EF4444;
        }
        
        .input-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }
        
        .input-with-btn {
            display: flex;
            gap: 10px;
        }
        
        .input-with-btn input {
            flex: 1;
        }
        
        .verify-btn {
            padding: 13px 15px;
            background: #F1F5F9;
            border: 2px solid #E2E8F0;
            border-radius: 10px;
            color: #64748B;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            white-space: nowrap;
            transition: all 0.3s;
        }
        
        .verify-btn:hover {
            background: #E2E8F0;
            color: #334155;
        }
        
        /* 复选框组 */
        .checkbox-group {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }
        
        .checkbox-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 14px;
            background: #F8FAFC;
            border: 2px solid #E2E8F0;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 13px;
        }
        
        .checkbox-item:hover {
            border-color: #CBD5E1;
        }
        
        .checkbox-item.selected {
            background: #EFF6FF;
            border-color: #3B82F6;
            color: #1D4ED8;
        }
        
        body.guide-mode .checkbox-item.selected {
            background: #F5F3FF;
            border-color: #8B5CF6;
            color: #6D28D9;
        }
        
        .checkbox-item input {
            display: none;
        }
        
        .checkbox-item .checkmark {
            width: 18px;
            height: 18px;
            border: 2px solid #CBD5E1;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
        }
        
        .checkbox-item.selected .checkmark {
            background: #3B82F6;
            border-color: #3B82F6;
        }
        
        body.guide-mode .checkbox-item.selected .checkmark {
            background: #8B5CF6;
            border-color: #8B5CF6;
        }
        
        .checkbox-item.selected .checkmark::after {
            content: '✓';
            color: white;
            font-size: 12px;
            font-weight: bold;
        }
        
        /* 按钮样式 */
        .btn-primary {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            color: white;
        }
        
        body.tourist-mode .btn-primary {
            background: linear-gradient(135deg, #3B82F6 0%, #1D4ED8 100%);
        }
        
        body.tourist-mode .btn-primary:hover {
            box-shadow: 0 10px 30px rgba(59, 130, 246, 0.4);
            transform: translateY(-2px);
        }
        
        body.guide-mode .btn-primary {
            background: linear-gradient(135deg, #8B5CF6 0%, #6D28D9 100%);
        }
        
        body.guide-mode .btn-primary:hover {
            box-shadow: 0 10px 30px rgba(139, 92, 246, 0.4);
            transform: translateY(-2px);
        }
        
        .btn-primary:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        
        /* 协议勾选 */
        .agreement-check {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            margin-bottom: 20px;
            font-size: 13px;
            color: #64748B;
        }
        
        .agreement-check input[type="checkbox"] {
            width: 18px;
            height: 18px;
            margin-top: 2px;
            cursor: pointer;
        }
        
        .agreement-check a {
            color: #3B82F6;
            text-decoration: none;
        }
        
        body.guide-mode .agreement-check a {
            color: #8B5CF6;
        }
        
        /* 底部链接 */
        .auth-footer {
            text-align: center;
            margin-top: 20px;
            color: #64748B;
            font-size: 14px;
        }
        
        .auth-footer a {
            font-weight: 600;
            text-decoration: none;
            transition: color 0.3s;
        }
        
        body.tourist-mode .auth-footer a {
            color: #3B82F6;
        }
        
        body.guide-mode .auth-footer a {
            color: #8B5CF6;
        }
        
        .auth-footer a:hover {
            text-decoration: underline;
        }
        
        /* 错误提示 */
        .error-message {
            color: #EF4444;
            font-size: 12px;
            margin-top: 5px;
            display: none;
        }
        
        /* 隐藏区域 */
        .form-section {
            display: none;
        }
        
        .form-section.active {
            display: block;
        }
        
        /* 导游入驻区域 */
        .guide-fields {
            background: linear-gradient(135deg, #F5F3FF 0%, #EDE9FE 100%);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 20px;
            border: 1px solid #DDD6FE;
        }
        
        .guide-fields-title {
            font-size: 15px;
            font-weight: 600;
            color: #6D28D9;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .guide-fields .form-group {
            margin-bottom: 15px;
        }
        
        .guide-fields .form-group:last-child {
            margin-bottom: 0;
        }
        
        .field-note {
            font-size: 12px;
            color: #7C3AED;
            margin-top: 5px;
            display: flex;
            align-items: center;
            gap: 5px;
        }
        
        .field-warning {
            font-size: 12px;
            color: #DC2626;
            margin-top: 5px;
            display: flex;
            align-items: center;
            gap: 5px;
        }
        
        /* 专业认证标识 */
        .cert-badge {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            padding: 4px 10px;
            background: #FEF3C7;
            color: #D97706;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
        }
        
        /* 审核提示 */
        .review-notice {
            background: linear-gradient(135deg, #FEF3C7 0%, #FDE68A 100%);
            border: 1px solid #F59E0B;
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 20px;
            display: flex;
            align-items: flex-start;
            gap: 12px;
        }
        
        .review-notice .icon {
            font-size: 24px;
        }
        
        .review-notice .text {
            flex: 1;
        }
        
        .review-notice .text h4 {
            color: #92400E;
            font-size: 14px;
            margin-bottom: 5px;
        }
        
        .review-notice .text p {
            color: #B45309;
            font-size: 13px;
            line-height: 1.5;
        }
        
        /* 响应式 */
        @media (max-width: 480px) {
            .auth-form-wrap {
                padding: 20px 15px 25px;
            }
            
            .input-row {
                grid-template-columns: 1fr;
            }
            
            .auth-tab .tab-text {
                font-size: 13px;
            }
            
            .auth-header h1 {
                font-size: 20px;
            }
            
            .checkbox-group {
                gap: 8px;
            }
            
            .checkbox-item {
                padding: 6px 10px;
                font-size: 12px;
            }
        }
    </style>
</head>
<body class="tourist-mode">
    <div class="auth-container">
        <div class="auth-box">
            <!-- Tab切换 -->
            <div class="auth-tabs">
                <button class="auth-tab tourist-tab active" onclick="switchTab('tourist')">
                    <span class="tab-icon">🎬</span>
                    <span class="tab-text">游客注册</span>
                </button>
                <button class="auth-tab guide-tab" onclick="switchTab('guide')">
                    <span class="tab-icon">🎒</span>
                    <span class="tab-text">导游入驻</span>
                </button>
            </div>
            
            <div class="auth-form-wrap">
                <!-- 游客注册区域 -->
                <div class="form-section tourist-section active" id="touristSection">
                    <div class="auth-header">
                        <div class="logo">🎬</div>
                        <h1>游客注册</h1>
                        <p>开启你的精彩旅行</p>
                    </div>
                    
                    <!-- 礼包预览 -->
                    <div class="register-gift-preview" id="touristGiftPreview">
                        <h4>🎁 注册即享新人礼包</h4>
                        <div class="gift-preview-items">
                            <div class="gift-preview-item">
                                <span>📋</span>
                                <span>出行清单生成器</span>
                            </div>
                            <div class="gift-preview-item">
                                <span>🗺️</span>
                                <span>行程规划工具</span>
                            </div>
                            <div class="gift-preview-item">
                                <span>📚</span>
                                <span>旅行知识库</span>
                            </div>
                            <div class="gift-preview-item">
                                <span>🔧</span>
                                <span>实用工具集</span>
                            </div>
                        </div>
                    </div>
                    
                    <form id="touristRegisterForm">
                        <div class="form-group">
                            <label for="touristPhone">手机号 <span class="required">*</span></label>
                            <input type="tel" id="touristPhone" placeholder="请输入手机号" required>
                            <div class="error-message" id="touristPhoneError"></div>
                        </div>
                        
                        <div class="form-group">
                            <label for="touristCode">验证码 <span class="required">*</span></label>
                            <div class="input-with-btn">
                                <input type="text" id="touristCode" placeholder="请输入任意4位数字" required>
                                <button type="button" class="verify-btn" onclick="sendVerifyCode(this)">获取验证码</button>
                            </div>
                            <div class="field-note" style="font-size:12px;color:#7C3AED;margin-top:5px;">💡 演示模式：可输入任意数字</div>
                            <div class="error-message" id="touristCodeError"></div>
                        </div>
                        
                        <div class="form-group">
                            <label for="touristPassword">设置密码 <span class="required">*</span></label>
                            <input type="password" id="touristPassword" placeholder="请设置密码（至少6位）" required minlength="6">
                            <div class="error-message" id="touristPasswordError"></div>
                        </div>
                        
                        <div class="form-group">
                            <label for="touristConfirm">确认密码 <span class="required">*</span></label>
                            <input type="password" id="touristConfirm" placeholder="请再次输入密码" required>
                            <div class="error-message" id="touristConfirmError"></div>
                        </div>
                        
                        <div class="agreement-check">
                            <input type="checkbox" id="touristAgree" required>
                            <label for="touristAgree">我已阅读并同意 <a href="user-agreement.html">《用户协议》</a> 和 <a href="privacy-policy.html">《隐私政策》</a></label>
                        </div>
                        
                        <button type="submit" class="btn-primary" id="touristRegisterBtn">游客注册</button>
                    </form>
                    
                    <div class="auth-footer">
                        已有账号？<a href="login.html">立即登录</a>
                    </div>
                </div>
                
                <!-- 导游入驻区域 -->
                <div class="form-section guide-section" id="guideSection">
                    <div class="auth-header">
                        <div class="logo">🎒</div>
                        <h1>导游入驻申请</h1>
                        <p>成为认证导游，开启专业之旅</p>
                    </div>
                    
                    <!-- 导游礼包预览 -->
                    <div class="register-gift-preview" style="background: linear-gradient(135deg, #F5F3FF 0%, #EDE9FE 100%); border-color: #DDD6FE;" id="guideGiftPreview">
                        <h4 style="color: #6D28D9;">🎤 入驻即享专属权益</h4>
                        <div class="gift-preview-items">
                            <div class="gift-preview-item">
                                <span>🏠</span>
                                <span>个人主页免费1年</span>
                            </div>
                            <div class="gift-preview-item">
                                <span>📊</span>
                                <span>客户管理系统</span>
                            </div>
                            <div class="gift-preview-item">
                                <span>🎯</span>
                                <span>首月客源优先推荐</span>
                            </div>
                            <div class="gift-preview-item">
                                <span>🏆</span>
                                <span>平台认证徽章</span>
                            </div>
                        </div>
                    </div>
                    
                    <form id="guideRegisterForm">
                        <!-- 审核提示 -->
                        <div class="review-notice">
                            <div class="icon">⏳</div>
                            <div class="text">
                                <h4>入驻需审核</h4>
                                <p>您的入驻申请提交后，工作人员会在1-3个工作日内完成审核，请保持手机畅通。</p>
                            </div>
                        </div>
                        
                        <!-- 必填信息 -->
                        <div class="guide-fields">
                            <div class="guide-fields-title">
                                <span class="cert-badge">必填</span>
                                基础信息
                            </div>
                            
                            <div class="form-group">
                                <label for="guideName">真实姓名 <span class="required">*</span></label>
                                <input type="text" id="guideName" placeholder="请输入真实姓名（与证件一致）" required>
                                <div class="error-message" id="guideNameError"></div>
                            </div>
                            
                            <div class="form-group">
                                <label for="guidePhone">手机号 <span class="required">*</span></label>
                                <input type="tel" id="guidePhone" placeholder="请输入手机号" required>
                                <div class="error-message" id="guidePhoneError"></div>
                            </div>
                            
                            <div class="form-group">
                                <label for="guideCert">导游证号 <span class="required">*</span></label>
                                <input type="text" id="guideCert" placeholder="请输入您的导游证号" required>
                                <div class="field-note" id="guideCertNote">
                                    ✏️ 请填写真实的导游证号，用于身份验证
                                </div>
                                <div class="error-message" id="guideCertError"></div>
                            </div>
                            
                            <div class="input-row">
                                <div class="form-group">
                                    <label for="guideYears">从业年限 <span class="required">*</span></label>
                                    <select id="guideYears" required>
                                        <option value="">请选择</option>
                                        <option value="1">1-3年</option>
                                        <option value="3">3-5年</option>
                                        <option value="5">5-10年</option>
                                        <option value="10">10年以上</option>
                                    </select>
                                    <div class="error-message" id="guideYearsError"></div>
                                </div>
                                
                                <div class="form-group">
                                    <label for="guideExp">带团经验 <span class="required">*</span></label>
                                    <select id="guideExp" required>
                                        <option value="">请选择</option>
                                        <option value="10">10团以下</option>
                                        <option value="30">10-50团</option>
                                        <option value="75">50-100团</option>
                                        <option value="100">100团以上</option>
                                    </select>
                                    <div class="error-message" id="guideExpError"></div>
                                </div>
                            </div>
                        </div>
                        
                        <!-- 擅长领域 -->
                        <div class="guide-fields">
                            <div class="guide-fields-title">
                                <span class="cert-badge">必填</span>
                                擅长领域
                            </div>
                            
                            <div class="form-group">
                                <label>擅长目的地（可多选）<span class="required">*</span></label>
                                <div class="checkbox-group" id="regionsGroup">
                                    <label class="checkbox-item">
                                        <input type="checkbox" name="region" value="europe">
                                        <span class="checkmark"></span>
                                        欧洲
                                    </label>
                                    <label class="checkbox-item">
                                        <input type="checkbox" name="region" value="japan">
                                        <span class="checkmark"></span>
                                        日本
                                    </label>
                                    <label class="checkbox-item">
                                        <input type="checkbox" name="region" value="southeast">
                                        <span class="checkmark"></span>
                                        东南亚
                                    </label>
                                    <label class="checkbox-item">
                                        <input type="checkbox" name="region" value="oceania">
                                        <span class="checkmark"></span>
                                        澳新
                                    </label>
                                    <label class="checkbox-item">
                                        <input type="checkbox" name="region" value="mideast">
                                        <span class="checkmark"></span>
                                        中东
                                    </label>
                                    <label class="checkbox-item">
                                        <input type="checkbox" name="region" value="china">
                                        <span class="checkmark"></span>
                                        国内
                                    </label>
                                </div>
                                <div class="error-message" id="regionsError"></div>
                            </div>
                            
                            <div class="form-group">
                                <label>服务语言（可多选）<span class="required">*</span></label>
                                <div class="checkbox-group" id="languagesGroup">
                                    <label class="checkbox-item">
                                        <input type="checkbox" name="language" value="chinese">
                                        <span class="checkmark"></span>
                                        中文
                                    </label>
                                    <label class="checkbox-item">
                                        <input type="checkbox" name="language" value="english">
                                        <span class="checkmark"></span>
                                        英语
                                    </label>
                                    <label class="checkbox-item">
                                        <input type="checkbox" name="language" value="japanese">
                                        <span class="checkmark"></span>
                                        日语
                                    </label>
                                    <label class="checkbox-item">
                                        <input type="checkbox" name="language" value="korean">
                                        <span class="checkmark"></span>
                                        韩语
                                    </label>
                                    <label class="checkbox-item">
                                        <input type="checkbox" name="language" value="thai">
                                        <span class="checkmark"></span>
                                        泰语
                                    </label>
                                </div>
                                <div class="error-message" id="languagesError"></div>
                            </div>
                        </div>
                        
                        <!-- 选填信息 -->
                        <div class="guide-fields" style="background: #F8FAFC; border-color: #E2E8F0;">
                            <div class="guide-fields-title" style="color: #64748B;">
                                <span style="background: #E2E8F0; color: #64748B;">选填</span>
                                补充信息
                            </div>
                            
                            <div class="form-group">
                                <label for="guideAgency">所属旅行社</label>
                                <input type="text" id="guideAgency" placeholder="请输入所属旅行社名称（选填）">
                            </div>
                            
                            <div class="form-group">
                                <label for="guideIntro">个人简介</label>
                                <textarea id="guideIntro" rows="3" placeholder="介绍一下你的专业背景和带团风格（选填）" style="width: 100%; padding: 13px 15px; border: 2px solid #E2E8F0; border-radius: 10px; font-size: 14px; resize: vertical; background: #F8FAFC;"></textarea>
                            </div>
                        </div>
                        
                        <!-- 设置密码 -->
                        <div class="form-group">
                            <label for="guidePassword">设置密码 <span class="required">*</span></label>
                            <input type="password" id="guidePassword" placeholder="请设置密码（至少6位）" required minlength="6">
                            <div class="error-message" id="guidePasswordError"></div>
                        </div>
                        
                        <div class="form-group">
                            <label for="guideConfirm">确认密码 <span class="required">*</span></label>
                            <input type="password" id="guideConfirm" placeholder="请再次输入密码" required>
                            <div class="error-message" id="guideConfirmError"></div>
                        </div>
                        
                        <div class="agreement-check">
                            <input type="checkbox" id="guideAgree" required>
                            <label for="guideAgree">我已阅读并同意 <a href="user-agreement.html">《用户协议》</a>、<a href="privacy-policy.html">《隐私政策》</a> 和 <a href="guide-agreement.html">《导游入驻协议》</a></label>
                        </div>
                        
                        <button type="submit" class="btn-primary" id="guideRegisterBtn">提交入驻申请</button>
                    </form>
                    
                    <div class="auth-footer">
                        已有账号？<a href="login.html">立即登录</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <script>
        // 工具函数
        const Utils = {
            showToast(message, type = 'info') {
                const toast = document.createElement('div');
                toast.textContent = message;
                toast.style.cssText = `position: fixed; top: 20px; left: 50%; transform: translateX(-50%); padding: 12px 24px; border-radius: 8px; color: white; font-size: 14px; z-index: 9999; background: ${type === 'success' ? '#10B981' : type === 'error' ? '#EF4444' : '#3B82F6'};`;
                document.body.appendChild(toast);
                setTimeout(() => toast.remove(), 3000);
            }
        };

        let currentMode = 'tourist';

        // 等待页面加载完成
        document.addEventListener('DOMContentLoaded', function() {
            // Tab切换
            window.switchTab = function(tab) {
                currentMode = tab;
                document.body.className = tab + '-mode';
                
                document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));
                document.querySelector('.' + tab + '-tab').classList.add('active');
                
                document.querySelectorAll('.form-section').forEach(s => s.classList.remove('active'));
                document.getElementById(tab + 'Section').classList.add('active');
            };

            // 复选框点击处理
            document.querySelectorAll('.checkbox-item').forEach(item => {
                item.addEventListener('click', function(e) {
                    e.preventDefault();
                    this.classList.toggle('selected');
                    const input = this.querySelector('input');
                    if (input) {
                        input.checked = this.classList.contains('selected');
                    }
                });
            });
        });
        
        // 发送验证码
        function sendVerifyCode(btn) {
            const phone = document.getElementById('touristPhone').value.trim();
            
            if (!phone || !/^1[3-9]\d{9}$/.test(phone)) {
                document.getElementById('touristPhoneError').textContent = '请输入正确的手机号';
                document.getElementById('touristPhoneError').style.display = 'block';
                return;
            }
            
            btn.disabled = true;
            let countdown = 60;
            btn.textContent = countdown + '秒后重试';
            
            const timer = setInterval(() => {
                countdown--;
                btn.textContent = countdown + '秒后重试';
                
                if (countdown <= 0) {
                    clearInterval(timer);
                    btn.disabled = false;
                    btn.textContent = '获取验证码';
                }
            }, 1000);
            
            // 实际发送验证码的逻辑
            Utils.showToast('验证码已发送', 'success');
        }
        
        // 检查是否已登录（使用localStorage）
        const savedUser = localStorage.getItem('user');
        if (savedUser) {
            window.location.href = 'index.html';
        }
        
        // 游客注册表单提交
        document.getElementById('touristRegisterForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const phone = document.getElementById('touristPhone').value.trim();
            const code = document.getElementById('touristCode').value.trim();
            const password = document.getElementById('touristPassword').value;
            const confirm = document.getElementById('touristConfirm').value;
            const agree = document.getElementById('touristAgree').checked;
            const registerBtn = document.getElementById('touristRegisterBtn');
            
            // 清除错误
            document.querySelectorAll('.error-message').forEach(el => {
                el.style.display = 'none';
                el.previousElementSibling.classList.remove('error');
            });
            
            // 验证
            let hasError = false;
            
            if (!phone || !/^1[3-9]\d{9}$/.test(phone)) {
                showError('touristPhoneError', 'touristPhone', '请输入正确的手机号');
                hasError = true;
            }
            
            if (!code || code.length < 4) {
                showError('touristCodeError', 'touristCode', '请输入验证码（任意4位以上数字即可）');
                hasError = true;
            }
            
            if (!password || password.length < 6) {
                showError('touristPasswordError', 'touristPassword', '密码至少6位');
                hasError = true;
            }
            
            if (password !== confirm) {
                showError('touristConfirmError', 'touristConfirm', '两次密码输入不一致');
                hasError = true;
            }
            
            if (!agree) {
                Utils.showToast('请阅读并同意用户协议', 'warning');
                hasError = true;
            }
            
            if (hasError) return;
            
            registerBtn.disabled = true;
            registerBtn.textContent = '注册中...';
            
            try {
                // 前端模拟注册（数据存localStorage）
                await new Promise(r => setTimeout(r, 1000)); // 模拟网络延迟
                
                // 检查手机号是否已注册
                const users = JSON.parse(localStorage.getItem('users') || '[]');
                if (users.find(u => u.phone === phone)) {
                    throw new Error('该手机号已注册');
                }
                
                // 保存用户数据
                const newUser = {
                    id: Date.now(),
                    phone: phone,
                    password: password, // 实际项目应该加密
                    role: 'tourist',
                    nickname: '游客' + phone.slice(-4),
                    createdAt: new Date().toISOString()
                };
                users.push(newUser);
                localStorage.setItem('users', JSON.stringify(users));
                
                // 保存登录状态
                localStorage.setItem('user', JSON.stringify(newUser));
                localStorage.setItem('userType', 'tourist');
                
                Utils.showToast('注册成功！', 'success');
                
                setTimeout(() => {
                    window.location.href = 'register-success.html';
                }, 1500);
            } catch (error) {
                registerBtn.disabled = false;
                registerBtn.textContent = '游客注册';
                Utils.showToast(error.message || '注册失败', 'error');
            }
        });
        
        // 导游入驻表单提交
        document.getElementById('guideRegisterForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const name = document.getElementById('guideName').value.trim();
            const phone = document.getElementById('guidePhone').value.trim();
            const cert = document.getElementById('guideCert').value.trim();
            const years = document.getElementById('guideYears').value;
            const exp = document.getElementById('guideExp').value;
            const password = document.getElementById('guidePassword').value;
            const confirm = document.getElementById('guideConfirm').value;
            const agree = document.getElementById('guideAgree').checked;
            const registerBtn = document.getElementById('guideRegisterBtn');
            
            // 获取选中的擅长领域
            const selectedRegions = [];
            document.querySelectorAll('input[name="region"]:checked').forEach(cb => {
                selectedRegions.push(cb.value);
            });
            
            // 获取选中的服务语言
            const selectedLanguages = [];
            document.querySelectorAll('input[name="language"]:checked').forEach(cb => {
                selectedLanguages.push(cb.value);
            });
            
            // 清除错误
            document.querySelectorAll('.error-message').forEach(el => {
                el.style.display = 'none';
                if (el.previousElementSibling.tagName !== 'DIV' || !el.previousElementSibling.classList.contains('field-warning')) {
                    el.previousElementSibling.classList?.remove('error');
                }
            });
            
            // 验证
            let hasError = false;
            
            if (!name) {
                showError('guideNameError', 'guideName', '请输入真实姓名');
                hasError = true;
            }
            
            if (!phone || !/^1[3-9]\d{9}$/.test(phone)) {
                showError('guidePhoneError', 'guidePhone', '请输入正确的手机号');
                hasError = true;
            }
            
            // 导游证号验证（只验证非空）
            if (!cert || cert.length < 4) {
                showError('guideCertError', 'guideCert', '请输入有效的导游证号');
                hasError = true;
            }
            
            if (!years) {
                showError('guideYearsError', 'guideYears', '请选择从业年限');
                hasError = true;
            }
            
            if (!exp) {
                showError('guideExpError', 'guideExp', '请选择带团经验');
                hasError = true;
            }
            
            if (selectedRegions.length === 0) {
                document.getElementById('regionsError').textContent = '请至少选择一个擅长目的地';
                document.getElementById('regionsError').style.display = 'block';
                hasError = true;
            }
            
            if (selectedLanguages.length === 0) {
                document.getElementById('languagesError').textContent = '请至少选择一个服务语言';
                document.getElementById('languagesError').style.display = 'block';
                hasError = true;
            }
            
            if (!password || password.length < 6) {
                showError('guidePasswordError', 'guidePassword', '密码至少6位');
                hasError = true;
            }
            
            if (password !== confirm) {
                showError('guideConfirmError', 'guideConfirm', '两次密码输入不一致');
                hasError = true;
            }
            
            if (!agree) {
                Utils.showToast('请阅读并同意相关协议', 'warning');
                hasError = true;
            }
            
            if (hasError) return;
            
            registerBtn.disabled = true;
            registerBtn.textContent = '提交中...';
            
            try {
                // 前端模拟注册（数据存localStorage）
                await new Promise(r => setTimeout(r, 1000)); // 模拟网络延迟
                
                // 检查手机号是否已注册
                const users = JSON.parse(localStorage.getItem('users') || '[]');
                if (users.find(u => u.phone === phone)) {
                    throw new Error('该手机号已注册');
                }
                
                // 保存导游数据
                const newGuide = {
                    id: Date.now(),
                    phone: phone,
                    password: password,
                    role: 'guide',
                    realName: name,
                    guideCert: cert,
                    yearsExperience: years,
                    tourExperience: exp,
                    regions: selectedRegions,
                    languages: selectedLanguages,
                    agency: document.getElementById('guideAgency').value.trim(),
                    intro: document.getElementById('guideIntro').value.trim(),
                    status: 'pending', // 待审核
                    createdAt: new Date().toISOString()
                };
                users.push(newGuide);
                localStorage.setItem('users', JSON.stringify(users));
                
                Utils.showToast('入驻申请已提交！', 'success');
                
                setTimeout(() => {
                    Utils.showToast('工作人员会在1-3个工作日内审核', 'info');
                    window.location.href = 'login.html';
                }, 1500);
            } catch (error) {
                registerBtn.disabled = false;
                registerBtn.textContent = '提交入驻申请';
                Utils.showToast(error.message || '提交失败', 'error');
            }
        });
        
        // 显示错误的辅助函数
        function showError(errorId, inputId, message) {
            const errorEl = document.getElementById(errorId);
            const inputEl = document.getElementById(inputId);
            if (errorEl) {
                errorEl.textContent = message;
                errorEl.style.display = 'block';
            }
            if (inputEl) {
                inputEl.classList.add('error');
            }
        }
    </script>
</body>
</html>
