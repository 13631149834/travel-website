<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="注册游导旅游账号，开始您的精彩旅程。免费注册，享受专属导游推荐、行程规划等服务。">
    <meta name="keywords" content="注册,游导旅游,旅游账号,导游服务">
    <title>注册账号 - 游导旅游</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .register-container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            width: 100%;
            max-width: 480px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.2);
        }
        .logo {
            text-align: center;
            margin-bottom: 30px;
        }
        .logo h1 {
            font-size: 28px;
            color: #6366F1;
        }
        .logo p {
            color: #6B7280;
            font-size: 14px;
            margin-top: 5px;
        }
        
        /* Tab切换 */
        .tab-switch {
            display: flex;
            background: #F3F4F6;
            border-radius: 12px;
            padding: 4px;
            margin-bottom: 25px;
        }
        .tab-switch button {
            flex: 1;
            padding: 12px;
            border: none;
            background: transparent;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 500;
            color: #6B7280;
            transition: all 0.3s;
        }
        .tab-switch button.active {
            background: white;
            color: #6366F1;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #374151;
            font-weight: 500;
        }
        .form-group input, .form-group select {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #E5E7EB;
            border-radius: 10px;
            font-size: 15px;
            transition: border-color 0.3s;
        }
        .form-group input:focus, .form-group select:focus {
            outline: none;
            border-color: #6366F1;
        }
        .code-group {
            display: flex;
            gap: 10px;
        }
        .code-group input {
            flex: 1;
        }
        .code-btn {
            padding: 12px 20px;
            background: #F3F4F6;
            border: none;
            border-radius: 10px;
            color: #6366F1;
            font-weight: 500;
            cursor: pointer;
            white-space: nowrap;
        }
        .code-btn:hover {
            background: #E5E7EB;
        }
        .submit-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #6366F1, #8B5CF6);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: transform 0.3s;
        }
        .submit-btn:hover {
            transform: translateY(-2px);
        }
        .login-link {
            text-align: center;
            margin-top: 20px;
            color: #6B7280;
            font-size: 14px;
        }
        .login-link a {
            color: #6366F1;
            text-decoration: none;
        }
        .divider {
            display: flex;
            align-items: center;
            margin: 25px 0;
        }
        .divider::before, .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: #E5E7EB;
        }
        .divider span {
            padding: 0 15px;
            color: #9CA3AF;
            font-size: 13px;
        }
        .social-login {
            display: flex;
            gap: 15px;
        }
        .social-btn {
            flex: 1;
            padding: 12px;
            border: 2px solid #E5E7EB;
            border-radius: 10px;
            background: white;
            cursor: pointer;
            font-size: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .social-btn:hover {
            border-color: #6366F1;
        }
        
        /* 隐藏表单区域 */
        .form-section {
            display: none;
        }
        .form-section.active {
            display: block;
        }
        
        /* 提示信息 */
        .tip {
            background: #FEF3C7;
            border: 1px solid #F59E0B;
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 20px;
            font-size: 13px;
            color: #92400E;
        }
        .tip i {
            margin-right: 6px;
        }
    </style>
</head>
<body>
    <div class="register-container">
        <div class="logo">
            <h1>🌍 游导旅游</h1>
            <p>导游与游客的一站式旅行平台</p>
        </div>

        <!-- Tab切换 -->
        <div class="tab-switch">
            <button class="active" onclick="switchTab('tourist')">👤 游客注册</button>
            <button onclick="switchTab('guide')">🎒 导游入驻</button>
        </div>

        <!-- 游客注册表单 -->
        <div id="tourist-form" class="form-section active">
            <form action="#" method="POST">
                <div class="form-group">
                    <label>手机号码</label>
                    <input type="tel" placeholder="请输入手机号码" required>
                </div>

                <div class="form-group">
                    <label>验证码</label>
                    <div class="code-group">
                        <input type="text" placeholder="请输入验证码" required>
                        <button type="button" class="code-btn">获取验证码</button>
                    </div>
                </div>

                <div class="form-group">
                    <label>设置密码</label>
                    <input type="password" placeholder="请设置密码（6-20位）" required>
                </div>

                <div class="form-group">
                    <label>确认密码</label>
                    <input type="password" placeholder="请再次输入密码" required>
                </div>

                <button type="submit" class="submit-btn">立即注册</button>
            </form>
        </div>

        <!-- 导游入驻表单 -->
        <div id="guide-form" class="form-section">
            <form action="#" method="POST">
                <div class="form-group">
                    <label>手机号码</label>
                    <input type="tel" placeholder="请输入手机号码" required>
                </div>

                <div class="form-group">
                    <label>验证码</label>
                    <div class="code-group">
                        <input type="text" placeholder="请输入验证码" required>
                        <button type="button" class="code-btn">获取验证码</button>
                    </div>
                </div>

                <div class="form-group">
                    <label>设置密码</label>
                    <input type="password" placeholder="请设置密码（6-20位）" required>
                </div>

                <div class="tip">
                    <i>💡</i>入驻后您可以展示专业服务、接收预约、管理行程
                </div>

                <button type="submit" class="submit-btn">申请入驻</button>
            </form>
        </div>

        <div class="divider"><span>或使用以下方式注册</span></div>

        <div class="social-login">
            <button class="social-btn">📱 微信</button>
            <button class="social-btn">💬 QQ</button>
        </div>

        <p class="login-link">
            已有账号？<a href="login.html">立即登录</a>
        </p>
    </div>

    <script>
        function switchTab(tab) {
            // 切换Tab按钮样式
            document.querySelectorAll('.tab-switch button').forEach(btn => {
                btn.classList.remove('active');
            });
            event.target.classList.add('active');
            
            // 切换表单显示
            document.getElementById('tourist-form').classList.remove('active');
            document.getElementById('guide-form').classList.remove('active');
            
            if (tab === 'tourist') {
                document.getElementById('tourist-form').classList.add('active');
            } else {
                document.getElementById('guide-form').classList.add('active');
            }
        }
    </script>
</body>
</html>
