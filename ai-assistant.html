<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:-apple-system,BlinkMacSystemFont,'PingFang SC','Microsoft YaHei',sans-serif}
body{background:linear-gradient(135deg,#FFF9C4 0%,#FFE082 100%);color:#2C1A00;display:flex;flex-direction:column;min-height:100vh;padding-bottom:70px}
.navbar{display:flex;justify-content:space-between;align-items:center;padding:14px 20px;background:rgba(230,81,0,0.95);backdrop-filter:blur(20px);border-bottom:1px solid rgba(230,81,0,0.1);position:sticky;top:0;z-index:100}
.logo{font-size:1.1rem;font-weight:800;color:#fff;display:flex;align-items:center;gap:8px;text-decoration:none}
.logo-icon{width:32px;height:32px;background:linear-gradient(135deg,#FF6B35,#ff8c5a);border-radius:8px;display:flex;align-items:center;justify-content:center}
.nav-links{display:flex;gap:4px}
.nav-links a{padding:8px 12px;border-radius:10px;font-size:0.88rem;color:#3E2723;transition:all 0.3s;text-decoration:none}
.nav-links a:hover{background:rgba(255,255,255,0.15);color:#fff}
.nav-toggle{display:none;flex-direction:column;gap:5px;cursor:pointer;padding:8px}
.nav-toggle span{width:22px;height:2px;background:#fff;border-radius:2px}
.main{flex:1;display:flex;align-items:center;justify-content:center;padding:30px 20px}
.card{max-width:480px;width:100%;text-align:center}
.avatar{width:100px;height:100px;border-radius:50%;background:linear-gradient(135deg,#FF6B35,#ff8c5a);margin:0 auto 24px;display:flex;align-items:center;justify-content:center;font-size:3rem;box-shadow:0 8px 32px rgba(255,107,53,0.4)}
h1{font-size:1.8rem;font-weight:900;margin-bottom:8px}
.subtitle{color:#3E2723;font-size:1rem;font-weight:500;margin-bottom:28px;line-height:1.7}
.features{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:32px;text-align:left}
.feature{background:rgba(255,255,255,0.28);border:1px solid rgba(255,255,255,0.28);border-radius:12px;padding:14px;font-size:0.88rem;color:#3E2723}
.feature strong{color:#8B0000;display:block;margin-bottom:4px;font-size:0.9rem}
.btn{display:inline-block;padding:16px 48px;background:linear-gradient(135deg,#FF6B35,#ff8c5a);color:#2C1A00;border-radius:16px;font-size:1.1rem;font-weight:700;text-decoration:none;box-shadow:0 8px 24px rgba(255,107,53,0.3);transition:transform 0.2s,box-shadow 0.2s}
.btn:hover{transform:translateY(-2px);box-shadow:0 12px 32px rgba(255,107,53,0.4)}
.btn:active{transform:translateY(0)}
.hint{color:#2C1A00;font-size:0.82rem;margin-top:16px}
@media(max-width:768px){
.nav-links{display:none;position:absolute;top:100%;left:0;right:0;background:rgba(230,81,0,0.98);flex-direction:column;padding:12px;border-radius:0 0 16px 16px}
.nav-links.open{display:flex}
.nav-toggle{display:flex}
.features{grid-template-columns:1fr}
h1{font-size:1.5rem}
}

/* 全局重点突出样式 */
.hl{color:#8B0000;font-weight:700}
.key-point{display:inline-block;background:linear-gradient(135deg,rgba(255,107,53,0.15),rgba(255,140,90,0.06));border:1px solid rgba(255,107,53,0.25);border-radius:8px;padding:2px 10px;color:#8B0000;font-weight:700;font-size:0.92em}
.key-num{color:#8B0000;font-weight:800;font-size:1.1em}
.key-tag{display:inline-block;background:rgba(255,107,53,0.08);color:#8B0000;padding:1px 8px;border-radius:4px;font-weight:600;font-size:0.85em}
.em-text{font-weight:700;color:#1A0F00}

/* === 全局字体强制深色 === */
.container, .container *, .section, .section *, .hero, .hero *,
.glass-card, .glass-card *, .content-card, .content-card *,
.card, .card *, .info-box, .info-box *, .tip-box, .tip-box *,
.question-card, .question-card *, .pricing-card, .pricing-card *,
.pricing-grid, .pricing-grid *, .compare-section, .compare-section *,
.trust-grid, .trust-grid *, .province-card, .province-card *,
.detail-content, .detail-content *, .detail-header, .detail-header *,

.form-group, .form-group *, .faq-item, .faq-item *,

/* 导航/footer/tab保持白色 */
.navbar, .navbar *, .footer, .footer *, .bottom-tabs, .bottom-tabs * {

}
/* 按钮文字白色 */
.btn-primary, .btn-primary *, .pricing-btn, .mode-tab.active,
.submit-multi-btn, .activation-btn {
  color: #fff !important;
}
/* 绿色对勾/错误红 保持 */
.yes, .check { color: #065F46 !important; }
.no, .cross { color: #757575 !important; }
.correct { color: #065F46 !important; }
.wrong { color: #B91C1C !important; }
/* 重点强调色 */
.hl { color: #8B0000 !important; }
.key-point { color: #8B0000 !important; background: rgba(139,0,0,0.06) !important; border-color: rgba(139,0,0,0.2) !important; }
.key-num { color: #8B0000 !important; }
.key-tag { color: #8B0000 !important; background: rgba(139,0,0,0.06) !important; }
.em-text { color: #1A0F00 !important; }
/* 价格色 */
.pricing-price { color: #8B0000 !important; }
.price-tag { color: #8B0000 !important; }
/* 链接色 */
a { color: #8B0000 !important; }
.navbar a, .footer a, .bottom-tabs a { color: #fff !important; }
/* placeholder */
::placeholder { color: #9E9E9E !important; }

/* === END 全局字体 === */
</style>
</head>
