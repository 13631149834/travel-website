*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:-apple-system,BlinkMacSystemFont,'PingFang SC','Microsoft YaHei',sans-serif}
body{background:#FFFFFF;color: #666666;display:flex;flex-direction:column;min-height:100vh;padding-bottom:70px}
.navbar{display:flex;justify-content:space-between;align-items:center;padding:14px 20px;background:#FFFFFF;border-bottom:1px solid #F0F0F0;position:sticky;top:0;z-index:100}

/* 面包屑导航 */
.breadcrumb{padding:12px 20px;font-size:0.8rem;color:#999;background:#FAFAFA;border-bottom:1px solid #F0F0F0}
.breadcrumb a{color:#4C8BF5;text-decoration:none}

/* 主内容区 */
.main-content{max-width:900px;margin:0 auto;padding:24px 20px}

/* 页面标题区 */

.page-desc{font-size:0.95rem;color:#999;line-height:1.6}

/* 功能卡片区域 */
.feature-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:20px;margin:28px 0}
.feature-card{background:#FFFFFF;border:1px solid #F0F0F0;border-radius:18px;padding:28px 24px;box-shadow:0 2px 8px rgba(0,0,0,0.04);transition:all 0.3s}

.feature-card .feature-link{display:inline-flex;align-items:center;gap:4px;color:#4C8BF5;font-size:0.9rem;font-weight:600;text-decoration:none}
.feature-card .feature-link:hover{color:#3B7AE0}
.feature-card .feature-link::after{content:'→';transition:transform 0.2s}

/* 热门问题区域 */

.hot-questions h3{font-size:1.1rem;color:#1A1A1A;margin-bottom:16px;font-weight:700;display:flex;align-items:center;gap:6px}
.hot-question{display:flex;align-items:center;gap:10px;padding:12px 16px;background:#FFFFFF;border-radius:12px;margin-bottom:8px;cursor:pointer;transition:all 0.2s;text-decoration:none;color:#666}
.hot-question:hover{background:#F0F5FF;color:#4C8BF5}
.hot-question .q-icon{color:#4C8BF5;font-weight:700;font-size:0.9rem}
.hot-question .q-text{font-size:0.9rem;flex:1}
.hot-question .q-arrow{opacity:0;transition:opacity 0.2s}
.hot-question:hover .q-arrow{opacity:1}
.hot-more{text-align:center;margin-top:12px}
.hot-more a{color:#4C8BF5;font-size:0.85rem;text-decoration:none}
.hot-more a:hover{text-decoration:underline}

/* 统计区域 */
.stats-row{display:flex;justify-content:center;gap:32px;margin:28px 0;padding:20px;background:#F0F5FF;border-radius:18px}
.stat-item{text-align:center}
.stat-num{font-size:1.5rem;color:#4C8BF5;font-weight:800}
.stat-label{font-size:0.75rem;color:#666;margin-top:2px}

/* CTA区域 */
.cta-section{text-align:center;margin:36px 0;padding:36px 20px;background:linear-gradient(135deg,#4C8BF5,#6BA3FF);border-radius:18px;color:#FFFFFF}

.cta-btn:hover{transform:translateY(-2px);box-shadow:0 6px 16px rgba(0,0,0,0.2)}

/* 全局重点突出样式 */
