*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:-apple-system,BlinkMacSystemFont,'PingFang SC','Microsoft YaHei',sans-serif}
body{background:linear-gradient(135deg,#1a1a4e 0%,#4a7cf7 100%);color:#fff;display:flex;flex-direction:column;min-height:100vh}
.navbar{display:flex;justify-content:space-between;align-items:center;padding:14px 20px;background:rgba(26,26,78,0.85);backdrop-filter:blur(20px);border-bottom:1px solid rgba(255,255,255,0.1);position:sticky;top:0;z-index:100}
.logo{font-size:1.1rem;font-weight:800;color:#fff;display:flex;align-items:center;gap:8px;text-decoration:none}
.logo-icon{width:32px;height:32px;background:linear-gradient(135deg,#FF6B35,#ff8c5a);border-radius:8px;display:flex;align-items:center;justify-content:center}
.nav-links{display:flex;gap:4px}
.nav-links a{padding:8px 12px;border-radius:10px;font-size:0.85rem;color:rgba(255,255,255,0.8);transition:all 0.3s;text-decoration:none}
.nav-links a:hover{background:rgba(255,107,53,0.3);color:#fff}
.nav-toggle{display:none;flex-direction:column;gap:5px;cursor:pointer;padding:8px}
.nav-toggle span{width:22px;height:2px;background:#fff;border-radius:2px}
.chat-container{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;position:relative}
.chat-wrapper{width:100%;max-width:800px;height:calc(100vh - 120px);border-radius:20px;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,0.3);border:1px solid rgba(255,255,255,0.15)}
.chat-wrapper iframe{width:100%;height:100%;border:none}
.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:16px}
.loading-spinner{width:48px;height:48px;border:4px solid rgba(255,255,255,0.2);border-top:4px solid #FF6B35;border-radius:50%;animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading p{color:rgba(255,255,255,0.7);font-size:0.95rem}
.fallback{text-align:center;padding:40px}
.fallback h2{font-size:1.5rem;margin-bottom:12px}
.fallback p{color:rgba(255,255,255,0.7);margin-bottom:24px}
.fallback .btn{display:inline-block;padding:14px 36px;background:linear-gradient(135deg,#FF6B35,#ff8c5a);color:#fff;border-radius:14px;font-size:1rem;font-weight:700;text-decoration:none;box-shadow:0 8px 24px rgba(255,107,53,0.3)}
@media(max-width:768px){
.nav-links{display:none;position:absolute;top:100%;left:0;right:0;background:rgba(26,26,78,0.98);flex-direction:column;padding:12px;border-radius:0 0 16px 16px}
.nav-links.open{display:flex}
.nav-toggle{display:flex}
.chat-wrapper{height:calc(100vh - 80px);border-radius:0;max-width:100%}
}

<script>
(function(){
  // Method 1: Try Coze Web SDK floating chat
  var sdkScript = document.createElement('script');
  sdkScript.src = 'https://lf-cdn.coze.cn/obj/unpkg/flow-platform/chat-app-sdk/1.2.0-beta.17/libs/cn/index.js';
  sdkScript.onload = function() {
    try {
      // Open chat automatically in full page mode
      var client = new CozeWebSDK.WebChatClient({
        config: {
          bot_id: '7638687952973398050'
        },
        componentProps: {
          title: '导游证AI备考助手'
        },
        ui: {
          base: {
            lang: 'zh-CN',
            layout: 'mobile'
          },
          chatBot: {
            title: '导游证AI备考助手'
          },
          asstBtn: {
            isNeed: true
          }
        }
      });
      document.getElementById('loadingIndicator').style.display = 'none';
    } catch(e) {
      console.error('SDK init failed:', e);
      showFallback();
    }
  };
  sdkScript.onerror = function() {
    console.error('SDK load failed');
    showFallback();
  };
  document.body.appendChild(sdkScript);

  // Timeout fallback - if SDK doesn't load in 8 seconds
  setTimeout(function(){
    var loading = document.getElementById('loadingIndicator');
    if(loading && loading.style.display !== 'none') {
      showFallback();
    }
  }, 8000);

  function showFallback() {
    var wrapper = document.getElementById('chatWrapper');
    wrapper.innerHTML = '<div class="fallback"><h2>🤖 导游证AI备考助手</h2><p>7×24小时在线，智能出题、知识问答、模拟面试</p><a class="btn" href="https://www.coze.cn/store/bot/7638687952973398050" target="_blank">打开AI助手 →</a></div>';
  }
})();
</script>
