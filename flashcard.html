let cards=[...allCards],currentIdx=0,mode='flip',known=new Set(),wrong=new Set(),currentFilter='all';

function filterSubject(sub){
  currentFilter=sub;
  document.querySelectorAll('#subjectFilter button').forEach(b=>b.classList.remove('active'));
  event.target.classList.add('active');
  cards=sub==='all'?[...allCards]:allCards.filter(c=>c.s===sub);
  currentIdx=0;known.clear();wrong.clear();
  updateStats();renderDots();showCard();
  document.getElementById('resultCard').style.display='none';
  document.getElementById('cardContainer').style.display='flex';
  document.getElementById('navButtons').style.display='flex';
  if(mode==='test')document.getElementById('testButtons').style.display='block';
}

function setMode(m){
  mode=m;
  document.getElementById('modeFlip').classList.toggle('active',m==='flip');
  document.getElementById('modeTest').classList.toggle('active',m==='test');
  document.getElementById('testButtons').style.display=m==='test'?'block':'none';
}

function showCard(){
  if(currentIdx>=cards.length){showResult();return}
  const c=cards[currentIdx];
  document.getElementById('cardSubject').textContent=c.t;
  document.getElementById('cardQuestion').textContent=c.q;
  document.getElementById('cardAnswer').innerHTML=c.a.replace(/·/g,'<br>');
  document.getElementById('cardMnemonic').innerHTML=c.m;
  document.getElementById('cardTag').textContent='第'+(currentIdx+1)+'/'+cards.length+'张';
  document.getElementById('flashCard').classList.remove('flipped');
  renderDots();updateStats();
}

function flipCard(){
  if(mode==='test'){
    document.getElementById('flashCard').classList.toggle('flipped');
  }else{
    document.getElementById('flashCard').classList.toggle('flipped');
  }
}

function markCard(know){
  const key=currentIdx;
  if(know){known.add(key);wrong.delete(key)}else{wrong.add(key);known.delete(key)}
  nextCard();
}

function nextCard(){
  currentIdx++;
  if(currentIdx>=cards.length){showResult();return}
  showCard();
}

function prevCard(){
  if(currentIdx>0)currentIdx--;
  showCard();
}

function updateStats(){
  document.getElementById('totalCount').textContent=cards.length;
  document.getElementById('knowCount').textContent=known.size;
  document.getElementById('dontCount').textContent=wrong.size;
}

function renderDots(){
  let html='';
  cards.forEach((_,i)=>{
    let cls='flash-dot';
    if(i===currentIdx)cls+=' current';
    else if(known.has(i))cls+=' done';
    else if(wrong.has(i))cls+=' wrong';
    html+='<div class="'+cls+'"></div>';
  });
  document.getElementById('progressDots').innerHTML=html;
}

function showResult(){
  document.getElementById('cardContainer').style.display='none';
  document.getElementById('navButtons').style.display='none';
  document.getElementById('testButtons').style.display='none';
  document.getElementById('resultCard').style.display='block';
  document.getElementById('resultKnow').textContent=known.size;
  document.getElementById('resultDont').textContent=wrong.size;
  const rate=cards.length?Math.round(known.size/cards.length*100):0;
  document.getElementById('resultRate').textContent=rate+'%';
  let advice='';
  if(rate>=90)advice='🎉 太棒了！口诀掌握得很好，继续保持！';
  else if(rate>=70)advice='💪 不错！再把不熟的几条多过两遍就稳了。';
  else if(rate>=50)advice='🔥 加油！建议先集中攻薄弱科目，翻转模式多刷几遍。';
  else advice='📚 别慌！先去知识库看详细内容，理解了再背口诀效率更高。';
  document.getElementById('resultAdvice').innerHTML=advice;
  document.getElementById('reviewWrongBtn').style.display=wrong.size>0?'inline-block':'none';
}

function restartCards(){
  currentIdx=0;known.clear();wrong.clear();
  document.getElementById('resultCard').style.display='none';
  document.getElementById('cardContainer').style.display='flex';
  document.getElementById('navButtons').style.display='flex';
  if(mode==='test')document.getElementById('testButtons').style.display='block';
  showCard();
}

function reviewWrong(){
  cards=allCards.filter((_,i)=>wrong.has(i));
  currentIdx=0;known.clear();wrong.clear();
  document.getElementById('resultCard').style.display='none';
  document.getElementById('cardContainer').style.display='flex';
  document.getElementById('navButtons').style.display='flex';
  if(mode==='test')document.getElementById('testButtons').style.display='block';
  showCard();
}

// init
showCard();
</script>

<script>
(function(){
  const btn=document.createElement('button');
  btn.className='dark-toggle';
  btn.id='darkToggle';
  btn.title='切换夜间模式';
  const saved=localStorage.getItem('youdao_theme');
  if(saved==='dark'){document.documentElement.setAttribute('data-theme','dark');btn.textContent='☀️'}
  else{btn.textContent='🌙'}
  btn.onclick=function(){
    const isDark=document.documentElement.getAttribute('data-theme')==='dark';
    if(isDark){document.documentElement.removeAttribute('data-theme');localStorage.setItem('youdao_theme','light');btn.textContent='🌙'}
    else{document.documentElement.setAttribute('data-theme','dark');localStorage.setItem('youdao_theme','dark');btn.textContent='☀️'}
  };
  document.body.appendChild(btn);
})();
</script>
