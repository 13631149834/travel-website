<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>商品详情 - 积分商城 - 游导旅游</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="../css/points/points.css">
  <link rel="stylesheet" href="../css/footer.css">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#0ea5e9',
            points: '#f97316'
          }
        }
      }
    }
  </script>
</head>
<body class="bg-gradient-to-br from-orange-50 to-amber-50 min-h-screen">
  <!-- Navigation -->
  <nav class="bg-white shadow-md sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-4 py-3">
      <div class="flex items-center justify-between">
        <a href="../index.html" class="flex items-center gap-2 text-gray-700 hover:text-primary transition">
          <span class="text-2xl">🧭</span>
          <span class="text-xl font-bold">游导旅游</span>
        </a>
        <div class="flex items-center gap-6">
          <a href="index.html" class="text-gray-600 hover:text-primary transition">积分商城</a>
          <a href="products.html" class="text-gray-600 hover:text-primary transition">全部商品</a>
          <a href="my-points.html" class="text-gray-600 hover:text-primary transition">我的积分</a>
          <a href="tasks.html" class="text-gray-600 hover:text-primary transition">赚积分</a>
        </div>
      </div>
    </div>
  </nav>

  <!-- Header with Points -->
  <div class="bg-white border-b">
    <div class="max-w-7xl mx-auto px-4 py-4">
      <div class="flex items-center justify-between">
        <a href="products.html" class="flex items-center gap-2 text-gray-600 hover:text-points transition">
          <span>←</span>
          <span>返回商品列表</span>
        </a>
        <div class="flex items-center gap-2">
          <span class="text-gray-600">我的积分:</span>
          <span id="pointsDisplay" class="text-2xl font-bold text-points">0</span>
          <span class="text-gray-400 text-sm">积分</span>
        </div>
      </div>
    </div>
  </div>

  <main class="max-w-7xl mx-auto px-4 py-8">
    <!-- Product Detail -->
    <div class="bg-white rounded-3xl overflow-hidden shadow-lg mb-8" id="productDetail">
      <!-- Loading State -->
      <div class="p-12 text-center">
        <div class="animate-spin text-4xl mb-4">⏳</div>
        <p class="text-gray-500">加载中...</p>
      </div>
    </div>

    <!-- Exchange Tips -->
    <div class="bg-white rounded-2xl p-6 shadow-sm border border-orange-100 mb-8">
      <h3 class="font-bold text-lg text-gray-800 mb-4">💡 兑换说明</h3>
      <ul class="space-y-2 text-gray-600 text-sm">
        <li class="flex items-start gap-2">
          <span class="text-points">•</span>
          <span>积分兑换成功后，优惠券类商品将直接发放到您的账户</span>
        </li>
        <li class="flex items-start gap-2">
          <span class="text-points">•</span>
          <span>实物商品将在7个工作日内发货，请耐心等待</span>
        </li>
        <li class="flex items-start gap-2">
          <span class="text-points">•</span>
          <span>兑换成功后不可取消，如有问题请联系客服</span>
        </li>
        <li class="flex items-start gap-2">
          <span class="text-points">•</span>
          <span>积分有效期为获得后1年，请及时使用</span>
        </li>
      </ul>
    </div>

    <!-- Recent Exchanges -->
    <div class="bg-white rounded-2xl p-6 shadow-sm border border-gray-100">
      <h3 class="font-bold text-lg text-gray-800 mb-4">最近兑换</h3>
      <div id="recentExchanges" class="space-y-3">
        <!-- Recent exchanges will be loaded here -->
      </div>
    </div>
  </main>

  <!-- Exchange Modal -->
  <div id="exchangeModal" class="modal-overlay">
    <div class="modal-content text-center">
      <div id="modalIcon" class="text-6xl mb-4">🎁</div>
      <h3 id="modalTitle" class="text-xl font-bold text-gray-800 mb-2">确认兑换</h3>
      <p id="modalDesc" class="text-gray-500 mb-6">确定要兑换此商品吗？</p>
      <div class="flex gap-4">
        <button onclick="closeModal()" class="flex-1 px-6 py-3 border border-gray-300 text-gray-700 font-semibold rounded-full hover:bg-gray-50 transition">
          取消
        </button>
        <button id="confirmExchange" class="flex-1 px-6 py-3 points-gradient text-white font-semibold rounded-full hover:opacity-90 transition">
          确认兑换
        </button>
      </div>
    </div>
  </div>

  <!-- Footer -->
  <footer class="bg-gray-800 text-white py-12 mt-16">
    <div class="max-w-7xl mx-auto px-4 text-center text-gray-500 text-sm">
      <p>© 2024 游导旅游 youdao-travel.com 版权所有</p>
    </div>
  </footer>

  <script src="../js/points/points-system.js"></script>
  <script>
    let currentProduct = null;

    // 加载数据
    async function loadData() {
      try {
        const response = await fetch('../data/points.json');
        const data = await response.json();
        
        // 显示积分
        const userData = PointsSystem.getUserData();
        document.getElementById('pointsDisplay').textContent = userData.points.toLocaleString();
        
        // 从URL获取商品ID
        const urlParams = new URLSearchParams(window.location.search);
        const productId = urlParams.get('id');
        
        if (productId) {
          currentProduct = data.products.find(p => p.id === productId);
          if (currentProduct) {
            renderProductDetail(currentProduct);
          } else {
            renderNotFound();
          }
        } else {
          renderNotFound();
        }
        
        // 渲染最近兑换
        renderRecentExchanges();
        
      } catch (error) {
        console.error('加载数据失败:', error);
      }
    }

    // 渲染商品详情
    function renderProductDetail(product) {
      const container = document.getElementById('productDetail');
      const userData = PointsSystem.getUserData();
      const canExchange = userData.points >= product.points && product.stock > 0;
      
      container.innerHTML = `
        <div class="grid md:grid-cols-2 gap-8">
          <!-- Product Image -->
          <div class="bg-gradient-to-br from-amber-100 to-orange-100 flex items-center justify-center p-16">
            <div class="text-9xl">${product.image}</div>
          </div>
          
          <!-- Product Info -->
          <div class="p-8">
            <div class="product-tags mb-4">
              ${product.tags.map(tag => {
                let tagClass = 'bg-gray-100 text-gray-600';
                if (tag === '热门') tagClass = 'tag-hot';
                if (tag === '新品') tagClass = 'tag-new';
                if (tag === '限量') tagClass = 'tag-limit';
                return `<span class="product-tag ${tagClass}">${tag}</span>`;
              }).join('')}
            </div>
            
            <h1 class="text-2xl font-bold text-gray-800 mb-4">${product.name}</h1>
            <p class="text-gray-600 mb-6">${product.description}</p>
            
            <div class="bg-orange-50 rounded-2xl p-6 mb-6">
              <div class="flex items-baseline gap-2 mb-2">
                <span class="text-4xl font-black text-points">${product.points}</span>
                <span class="text-xl text-gray-500">积分</span>
              </div>
              ${product.originalPrice ? `
                <div class="flex items-center gap-2">
                  <span class="text-gray-400 line-through">¥${product.originalPrice}</span>
                  <span class="text-green-600 text-sm font-medium">价值约¥${product.originalPrice}</span>
                </div>
              ` : ''}
            </div>
            
            <div class="flex items-center gap-4 mb-6">
              <div class="flex items-center gap-2">
                <span class="text-gray-500">库存:</span>
                <span class="font-semibold ${product.stock < 20 ? 'text-red-500' : 'text-gray-800'}">${product.stock} 件</span>
              </div>
              ${product.stock < 20 && product.stock > 0 ? `
                <span class="text-xs bg-red-100 text-red-600 px-2 py-1 rounded-full">仅剩少量</span>
              ` : ''}
              ${product.stock === 0 ? `
                <span class="text-xs bg-gray-100 text-gray-500 px-2 py-1 rounded-full">已售罄</span>
              ` : ''}
            </div>
            
            <!-- Exchange Button -->
            <button onclick="showExchangeModal()" 
                    class="w-full py-4 rounded-full font-bold text-lg transition ${canExchange ? 'points-gradient text-white hover:opacity-90' : 'bg-gray-200 text-gray-400 cursor-not-allowed'}"
                    ${canExchange ? '' : 'disabled'}>
              ${!canExchange ? (userData.points < product.points ? '积分不足' : '已售罄') : '立即兑换'}
            </button>
            
            <p class="text-center text-gray-500 text-sm mt-4">
              您当前有 <span class="font-semibold text-points">${userData.points}</span> 积分
              ${userData.points >= product.points ? '<span class="text-green-500">（可兑换）</span>' : `<span class="text-red-500">（还差${product.points - userData.points}积分）</span>`}
            </p>
          </div>
        </div>
      `;
    }

    // 渲染未找到
    function renderNotFound() {
      const container = document.getElementById('productDetail');
      container.innerHTML = `
        <div class="p-16 text-center">
          <div class="text-6xl mb-4">🔍</div>
          <h2 class="text-xl font-bold text-gray-800 mb-2">商品不存在</h2>
          <p class="text-gray-500 mb-6">抱歉，您查看的商品不存在或已下架</p>
          <a href="products.html" class="inline-block px-6 py-3 points-gradient text-white font-semibold rounded-full hover:opacity-90 transition">
            浏览其他商品
          </a>
        </div>
      `;
    }

    // 渲染最近兑换
    function renderRecentExchanges() {
      const container = document.getElementById('recentExchanges');
      const history = PointsSystem.getExchangeHistory().slice(0, 3);
      
      if (history.length === 0) {
        container.innerHTML = `
          <div class="text-center py-8 text-gray-400">
            <div class="text-4xl mb-2">📦</div>
            <p>暂无兑换记录</p>
          </div>
        `;
        return;
      }
      
      container.innerHTML = history.map(item => `
        <div class="flex items-center gap-4 p-3 rounded-xl hover:bg-gray-50 transition">
          <div class="w-12 h-12 bg-orange-100 rounded-xl flex items-center justify-center text-2xl">
            ${item.productImage}
          </div>
          <div class="flex-1">
            <h4 class="font-semibold text-gray-800">${item.productName}</h4>
            <p class="text-sm text-gray-500">${PointsSystem.formatTime(item.exchangeTime)}</p>
          </div>
          <span class="status-badge status-${item.status}">
            ${item.status === 'pending' ? '待发货' : item.status === 'shipped' ? '已发货' : item.status === 'delivered' ? '已完成' : '已取消'}
          </span>
        </div>
      `).join('');
    }

    // 显示兑换确认弹窗
    function showExchangeModal() {
      if (!currentProduct) return;
      
      const userData = PointsSystem.getUserData();
      if (userData.points < currentProduct.points) {
        PointsSystem.showToast('积分不足，无法兑换', 'error');
        return;
      }
      
      document.getElementById('modalIcon').textContent = currentProduct.image;
      document.getElementById('modalTitle').textContent = currentProduct.name;
      document.getElementById('modalDesc').textContent = `将消耗 ${currentProduct.points} 积分，确认兑换吗？`;
      document.getElementById('exchangeModal').classList.add('active');
    }

    // 关闭弹窗
    function closeModal() {
      document.getElementById('exchangeModal').classList.remove('active');
    }

    // 确认兑换
    document.getElementById('confirmExchange').addEventListener('click', () => {
      if (!currentProduct) return;
      
      const success = PointsSystem.exchangeProduct(currentProduct);
      if (success) {
        closeModal();
        // 更新页面
        document.getElementById('pointsDisplay').textContent = PointsSystem.getPoints().toLocaleString();
        renderProductDetail(currentProduct);
        renderRecentExchanges();
      }
    });

    // 点击弹窗背景关闭
    document.getElementById('exchangeModal').addEventListener('click', (e) => {
      if (e.target === e.currentTarget) {
        closeModal();
      }
    });

    // 页面加载
    document.addEventListener('DOMContentLoaded', loadData);
  </script>
</body>
</html>
