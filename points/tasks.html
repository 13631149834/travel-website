<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>赚积分 - 积分商城 - 游导旅游</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="../css/points/points.css">
  <link rel="stylesheet" href="../css/footer.css">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#0ea5e9',
            points: '#f97316'
          }
        }
      }
    }
  </script>
</head>
<body class="bg-gradient-to-br from-orange-50 to-amber-50 min-h-screen">
  <!-- Navigation -->
  <nav class="bg-white shadow-md sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-4 py-3">
      <div class="flex items-center justify-between">
        <a href="../index.html" class="flex items-center gap-2 text-gray-700 hover:text-primary transition">
          <span class="text-2xl">🧭</span>
          <span class="text-xl font-bold">游导旅游</span>
        </a>
        <div class="flex items-center gap-6">
          <a href="index.html" class="text-gray-600 hover:text-primary transition">积分商城</a>
          <a href="products.html" class="text-gray-600 hover:text-primary transition">全部商品</a>
          <a href="my-points.html" class="text-gray-600 hover:text-primary transition">我的积分</a>
          <a href="tasks.html" class="text-points font-semibold border-b-2 border-points pb-1">赚积分</a>
        </div>
    </div>
  </nav>

  <!-- Header with Points -->
  <div class="bg-white border-b">
    <div class="max-w-7xl mx-auto px-4 py-4">
      <div class="flex items-center justify-between">
        <div class="flex items-center gap-2">
          <span class="text-gray-600">我的积分:</span>
          <span id="pointsDisplay" class="text-2xl font-bold text-points">0</span>
          <span class="text-gray-400 text-sm">积分</span>
        </div>
        <a href="my-points.html" class="text-points font-medium hover:underline">查看详情 →</a>
      </div>
    </div>
  </div>

  <main class="max-w-7xl mx-auto px-4 py-8">
    <!-- Banner -->
    <div class="points-gradient rounded-3xl p-8 mb-8 text-white text-center relative overflow-hidden">
      <div class="absolute top-0 right-0 w-48 h-48 bg-white/10 rounded-full -translate-y-1/2 translate-x-1/2"></div>
      <div class="relative z-10">
        <h1 class="text-3xl font-bold mb-2">✨ 任务中心</h1>
        <p class="text-white/80">完成任务获取积分，兑换心仪好物</p>
      </div>
    </div>

    <!-- Daily Tasks -->
    <div class="mb-8">
      <div class="flex items-center justify-between mb-4">
        <h2 class="text-xl font-bold text-gray-800 flex items-center gap-2">
          📅 每日任务
        </h2>
        <span class="text-sm text-gray-500">每天重置</span>
      </div>
      <div class="grid md:grid-cols-2 gap-4" id="dailyTasks">
        <!-- Daily tasks will be loaded here -->
      </div>
    </div>

    <!-- Achievement Tasks -->
    <div class="mb-8">
      <div class="flex items-center justify-between mb-4">
        <h2 class="text-xl font-bold text-gray-800 flex items-center gap-2">
          🏆 成就任务
        </h2>
        <span class="text-sm text-gray-500">一次性完成</span>
      </div>
      <div class="grid md:grid-cols-2 lg:grid-cols-3 gap-4" id="achievementTasks">
        <!-- Achievement tasks will be loaded here -->
      </div>
    </div>

    <!-- Points Rules -->
    <div class="bg-white rounded-2xl p-6 shadow-sm border border-orange-100">
      <h3 class="font-bold text-lg text-gray-800 mb-4">📖 积分规则说明</h3>
      <div class="grid md:grid-cols-2 lg:grid-cols-3 gap-4" id="pointsRules">
        <!-- Rules will be loaded here -->
      </div>
    </div>
  </main>

  <!-- Footer -->
  <footer class="bg-gray-800 text-white py-12 mt-16">
    <div class="max-w-7xl mx-auto px-4 text-center text-gray-500 text-sm">
      <p>© 2024 游导旅游 youdao-travel.com 版权所有</p>
    </div>
  </footer>

  <!-- Task Complete Modal -->
  <div id="taskModal" class="modal-overlay">
    <div class="modal-content text-center">
      <div class="text-6xl mb-4 animate-bounce">🎉</div>
      <h3 class="text-xl font-bold text-gray-800 mb-2">任务完成！</h3>
      <p id="taskModalDesc" class="text-gray-500 mb-2">恭喜获得</p>
      <p id="taskModalPoints" class="text-3xl font-bold text-points mb-4">+10 积分</p>
      <button onclick="closeTaskModal()" class="px-8 py-3 points-gradient text-white font-bold rounded-full hover:opacity-90 transition">
        知道了
      </button>
    </div>
  </div>

  <script src="../js/points/points-system.js"></script>
  <script>
    let tasksData = {};

    // 加载数据
    async function loadData() {
      try {
        const response = await fetch('../data/points.json');
        const data = await response.json();
        tasksData = data;
        
        // 显示积分
        const userData = PointsSystem.getUserData();
        document.getElementById('pointsDisplay').textContent = userData.points.toLocaleString();
        
        // 渲染每日任务
        renderDailyTasks(data.tasks.daily, userData.tasks.daily);
        
        // 渲染成就任务
        renderAchievementTasks(data.tasks.achievement, userData.tasks.achievement);
        
        // 渲染积分规则
        renderPointsRules(data.pointsRules);
        
      } catch (error) {
        console.error('加载数据失败:', error);
      }
    }

    // 渲染每日任务
    function renderDailyTasks(tasks, userTasks) {
      const container = document.getElementById('dailyTasks');
      const taskConfig = {
        signin: { icon: '📅', name: '每日签到', points: 10, desc: '每天签到一次' },
        browse: { icon: '👀', name: '浏览景点', points: 5, desc: '浏览任意景点详情' },
        search: { icon: '🔍', name: '搜索目的地', points: 3, desc: '搜索任意目的地' },
        share: { icon: '📤', name: '分享内容', points: 8, desc: '分享任意内容到社交平台' }
      };
      
      container.innerHTML = Object.entries(tasks).map(([key, task]) => {
        const config = taskConfig[key];
        const today = new Date().toDateString();
        const lastTime = userTasks[key]?.lastTime;
        const isCompleted = lastTime === today;
        const count = userTasks[key]?.count || 0;
        
        return `
          <div class="task-card ${isCompleted ? 'completed' : ''}">
            <div class="flex items-center gap-4 mb-4">
              <div class="w-14 h-14 rounded-2xl flex items-center justify-center ${isCompleted ? 'bg-green-100' : 'bg-orange-100'}">
                <span class="text-3xl">${config.icon}</span>
              </div>
              <div class="flex-1">
                <h3 class="font-semibold text-gray-800">${config.name}</h3>
                <p class="text-sm text-gray-500">${config.desc}</p>
              </div>
            </div>
            <div class="flex items-center justify-between">
              <div class="points-badge">
                🪙 +${config.points}积分
              </div>
              ${isCompleted ? `
                <span class="text-green-600 font-semibold flex items-center gap-1">
                  ✓ 已完成
                </span>
              ` : `
                <button onclick="completeDailyTask('${key}', ${config.points})" 
                        class="px-4 py-2 points-gradient text-white text-sm font-semibold rounded-full hover:opacity-90 transition">
                  去完成
                </button>
              `}
            </div>
          </div>
        `;
      }).join('');
    }

    // 渲染成就任务
    function renderAchievementTasks(tasks, userTasks) {
      const container = document.getElementById('achievementTasks');
      
      container.innerHTML = tasks.map(task => {
        const isCompleted = userTasks[task.id]?.completed;
        
        return `
          <div class="task-card ${isCompleted ? 'completed' : ''}">
            <div class="flex items-center gap-4 mb-4">
              <div class="w-14 h-14 rounded-2xl flex items-center justify-center ${isCompleted ? 'bg-green-100' : 'bg-purple-100'}">
                <span class="text-3xl">${task.icon}</span>
              </div>
              <div class="flex-1">
                <h3 class="font-semibold text-gray-800">${task.name}</h3>
                <p class="text-sm text-gray-500">${isCompleted ? '已完成' : '进行中'}</p>
              </div>
            </div>
            <div class="flex items-center justify-between">
              <div class="points-badge">
                🪙 +${task.points}积分
              </div>
              ${isCompleted ? `
                <span class="text-green-600 font-semibold flex items-center gap-1">
                  ✓ 已达成
                </span>
              ` : `
                <button onclick="showAchievementTip('${task.name}')" 
                        class="px-4 py-2 bg-purple-100 text-purple-600 text-sm font-semibold rounded-full hover:bg-purple-200 transition">
                  查看条件
                </button>
              `}
            </div>
          </div>
        `;
      }).join('');
    }

    // 渲染积分规则
    function renderPointsRules(rules) {
      const container = document.getElementById('pointsRules');
      const ruleItems = [
        { icon: '📅', name: '每日签到', ...rules.dailySignIn },
        { icon: '📝', name: '发布游记', ...rules.publishTravel },
        { icon: '💬', name: '发表评论', ...rules.postComment },
        { icon: '👥', name: '邀请好友', ...rules.inviteFriend },
        { icon: '👤', name: '完善资料', ...rules.completeProfile }
      ];
      
      container.innerHTML = ruleItems.map(rule => `
        <div class="flex items-center gap-3 p-3 bg-orange-50 rounded-xl">
          <span class="text-2xl">${rule.icon}</span>
          <div>
            <h4 class="font-semibold text-gray-800">${rule.name}</h4>
            <p class="text-sm text-points font-medium">+${rule.points}积分</p>
          </div>
        </div>
      `).join('');
    }

    // 完成每日任务
    function completeDailyTask(taskId, points) {
      const userData = PointsSystem.getUserData();
      const today = new Date().toDateString();
      const lastTime = userData.tasks.daily[taskId]?.lastTime;
      
      if (lastTime === today) {
        PointsSystem.showToast('今日已完成此任务', 'info');
        return;
      }
      
      // 模拟任务完成
      PointsSystem.completeDailyTask(taskId);
      
      // 显示完成弹窗
      document.getElementById('taskModalDesc').textContent = '恭喜获得';
      document.getElementById('taskModalPoints').textContent = `+${points} 积分`;
      document.getElementById('taskModal').classList.add('active');
      
      // 更新显示
      document.getElementById('pointsDisplay').textContent = PointsSystem.getPoints().toLocaleString();
      
      // 重新加载任务
      const newUserData = PointsSystem.getUserData();
      renderDailyTasks(tasksData.tasks.daily, newUserData.tasks.daily);
    }

    // 显示成就任务提示
    function showAchievementTip(taskName) {
      const tips = {
        '首次兑换': '在积分商城兑换任意商品即可完成',
        '发表10篇评论': '在景点、游记下发表评论累计10篇',
        '发布5篇游记': '在游记频道发布5篇游记',
        '邀请3位好友': '邀请好友注册并成功登录',
        '成为月度会员': '开通月度会员服务'
      };
      
      PointsSystem.showToast(tips[taskName] || '继续努力完成更多任务', 'info');
    }

    // 关闭任务完成弹窗
    function closeTaskModal() {
      document.getElementById('taskModal').classList.remove('active');
    }

    // 点击弹窗背景关闭
    document.getElementById('taskModal').addEventListener('click', (e) => {
      if (e.target === e.currentTarget) {
        closeTaskModal();
      }
    });

    // 页面加载
    document.addEventListener('DOMContentLoaded', loadData);
  </script>
</body>
</html>
