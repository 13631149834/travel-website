<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>兑换记录 - 积分商城 - 游导旅游</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="../css/points/points.css">
  <link rel="stylesheet" href="../css/footer.css">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#0ea5e9',
            points: '#f97316'
          }
        }
      }
    }
  </script>
</head>
<body class="bg-gradient-to-br from-orange-50 to-amber-50 min-h-screen">
  <!-- Navigation -->
  <nav class="bg-white shadow-md sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-4 py-3">
      <div class="flex items-center justify-between">
        <a href="../index.html" class="flex items-center gap-2 text-gray-700 hover:text-primary transition">
          <span class="text-2xl">🧭</span>
          <span class="text-xl font-bold">游导旅游</span>
        </a>
        <div class="flex items-center gap-6">
          <a href="index.html" class="text-gray-600 hover:text-primary transition">积分商城</a>
          <a href="products.html" class="text-gray-600 hover:text-primary transition">全部商品</a>
          <a href="my-points.html" class="text-gray-600 hover:text-primary transition">我的积分</a>
          <a href="history.html" class="text-points font-semibold border-b-2 border-points pb-1">兑换记录</a>
        </div>
      </div>
    </div>
  </nav>

  <!-- Header with Points -->
  <div class="bg-white border-b">
    <div class="max-w-7xl mx-auto px-4 py-4">
      <div class="flex items-center justify-between">
        <div class="flex items-center gap-2">
          <span class="text-gray-600">我的积分:</span>
          <span id="pointsDisplay" class="text-2xl font-bold text-points">0</span>
          <span class="text-gray-400 text-sm">积分</span>
        </div>
        <a href="products.html" class="px-4 py-2 points-gradient text-white font-semibold rounded-full hover:opacity-90 transition">
          去兑换
        </a>
      </div>
    </div>
  </div>

  <main class="max-w-7xl mx-auto px-4 py-8">
    <!-- Filter Tabs -->
    <div class="bg-white rounded-2xl p-4 mb-6 shadow-sm border border-gray-100">
      <div class="flex gap-2">
        <button onclick="filterStatus('all')" class="filter-btn active" data-status="all">全部</button>
        <button onclick="filterStatus('pending')" class="filter-btn" data-status="pending">待发货</button>
        <button onclick="filterStatus('shipped')" class="filter-btn" data-status="shipped">已发货</button>
        <button onclick="filterStatus('delivered')" class="filter-btn" data-status="delivered">已完成</button>
        <button onclick="filterStatus('cancelled')" class="filter-btn" data-status="cancelled">已取消</button>
      </div>
    </div>

    <!-- Exchange List -->
    <div id="exchangeList" class="space-y-4">
      <!-- Exchanges will be loaded here -->
    </div>

    <!-- Empty State -->
    <div id="emptyState" class="empty-state hidden">
      <div class="empty-state-icon">📦</div>
      <h3 class="text-lg font-semibold mb-2">暂无兑换记录</h3>
      <p class="text-sm mb-6">快去积分商城兑换心仪的好物吧</p>
      <a href="products.html" class="inline-block px-6 py-3 points-gradient text-white font-semibold rounded-full hover:opacity-90 transition">
        浏览商品
      </a>
    </div>

    <!-- Statistics Summary -->
    <div id="statsSummary" class="mt-8 grid grid-cols-2 md:grid-cols-4 gap-4">
      <div class="stats-card">
        <div class="text-3xl mb-2">📦</div>
        <p class="text-gray-500 text-sm">总兑换</p>
        <p class="stats-number" id="totalExchanges">0</p>
      </div>
      <div class="stats-card">
        <div class="text-3xl mb-2">⏳</div>
        <p class="text-gray-500 text-sm">待处理</p>
        <p class="stats-number text-yellow-500" id="pendingExchanges">0</p>
      </div>
      <div class="stats-card">
        <div class="text-3xl mb-2">🚚</div>
        <p class="text-gray-500 text-sm">运输中</p>
        <p class="stats-number text-blue-500" id="shippedExchanges">0</p>
      </div>
      <div class="stats-card">
        <div class="text-3xl mb-2">✅</div>
        <p class="text-gray-500 text-sm">已完成</p>
        <p class="stats-number text-green-500" id="deliveredExchanges">0</p>
      </div>
    </div>
  </main>

  <!-- Logistics Modal -->
  <div id="logisticsModal" class="modal-overlay">
    <div class="modal-content">
      <h3 class="text-xl font-bold text-gray-800 mb-4">📦 物流信息</h3>
      <div id="logisticsContent" class="space-y-4 mb-6">
        <!-- Logistics info will be loaded here -->
      </div>
      <button onclick="closeLogisticsModal()" class="w-full py-3 border border-gray-300 text-gray-700 font-semibold rounded-full hover:bg-gray-50 transition">
        关闭
      </button>
    </div>
  </div>

  <!-- Cancel Confirm Modal -->
  <div id="cancelModal" class="modal-overlay">
    <div class="modal-content text-center">
      <div class="text-6xl mb-4">❓</div>
      <h3 class="text-xl font-bold text-gray-800 mb-2">确认取消兑换？</h3>
      <p class="text-gray-500 mb-6">取消后，积分将全额返还到您的账户</p>
      <div class="flex gap-4">
        <button onclick="closeCancelModal()" class="flex-1 px-6 py-3 border border-gray-300 text-gray-700 font-semibold rounded-full hover:bg-gray-50 transition">
          不了
        </button>
        <button id="confirmCancel" class="flex-1 px-6 py-3 bg-red-500 text-white font-semibold rounded-full hover:bg-red-600 transition">
          确认取消
        </button>
      </div>
    </div>
  </div>

  <!-- Footer -->
  <footer class="bg-gray-800 text-white py-12 mt-16">
    <div class="max-w-7xl mx-auto px-4 text-center text-gray-500 text-sm">
      <p>© 2024 游导旅游 youdao-travel.com 版权所有</p>
    </div>
  </footer>

  <script src="../js/points/points-system.js"></script>
  <script>
    let currentFilter = 'all';
    let cancelTargetId = null;

    // 加载数据
    function loadData() {
      const userData = PointsSystem.getUserData();
      document.getElementById('pointsDisplay').textContent = userData.points.toLocaleString();
      
      // 渲染兑换列表
      renderExchanges();
      
      // 渲染统计
      renderStats();
    }

    // 筛选状态
    function filterStatus(status) {
      currentFilter = status;
      
      // 更新按钮状态
      document.querySelectorAll('.filter-btn').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.status === status);
      });
      
      renderExchanges();
    }

    // 渲染兑换列表
    function renderExchanges() {
      const container = document.getElementById('exchangeList');
      const emptyState = document.getElementById('emptyState');
      let exchanges = PointsSystem.getExchangeHistory();
      
      // 筛选
      if (currentFilter !== 'all') {
        exchanges = exchanges.filter(e => e.status === currentFilter);
      }
      
      if (exchanges.length === 0) {
        container.classList.add('hidden');
        emptyState.classList.remove('hidden');
        return;
      }
      
      container.classList.remove('hidden');
      emptyState.classList.add('hidden');
      
      container.innerHTML = exchanges.map(item => `
        <div class="exchange-item slide-up">
          <div class="flex items-start gap-4">
            <div class="w-16 h-16 bg-orange-100 rounded-xl flex items-center justify-center text-3xl">
              ${item.productImage}
            </div>
            <div class="flex-1">
              <div class="flex items-start justify-between mb-2">
                <div>
                  <h3 class="font-semibold text-gray-800">${item.productName}</h3>
                  <p class="text-sm text-gray-500">订单号: ${item.id}</p>
                </div>
                <span class="status-badge status-${item.status}">
                  ${getStatusText(item.status)}
                </span>
              </div>
              
              <div class="flex items-center gap-4 text-sm text-gray-500 mb-3">
                <span>📅 ${PointsSystem.formatDate(item.exchangeTime)}</span>
                <span class="text-points font-semibold">-${item.points}积分</span>
              </div>
              
              ${item.logistics ? `
                <div class="p-3 bg-blue-50 rounded-lg text-sm">
                  <p class="text-blue-600">🚚 ${item.logistics}</p>
                </div>
              ` : ''}
              
              <div class="flex items-center gap-3 mt-3">
                ${item.status === 'pending' ? `
                  <button onclick="showCancelModal(${item.id})" class="text-sm text-red-500 hover:underline">
                    取消兑换
                  </button>
                ` : ''}
                ${item.status === 'shipped' ? `
                  <button onclick="showLogistics(${item.id})" class="text-sm text-blue-500 hover:underline">
                    查看物流
                  </button>
                ` : ''}
                ${item.status === 'delivered' ? `
                  <a href="detail.html?id=${item.productId}" class="text-sm text-points hover:underline">
                    再兑一个
                  </a>
                ` : ''}
              </div>
            </div>
          </div>
        </div>
      `).join('');
    }

    // 获取状态文本
    function getStatusText(status) {
      const texts = {
        pending: '待发货',
        shipped: '已发货',
        delivered: '已完成',
        cancelled: '已取消'
      };
      return texts[status] || status;
    }

    // 渲染统计
    function renderStats() {
      const exchanges = PointsSystem.getExchangeHistory();
      
      document.getElementById('totalExchanges').textContent = exchanges.length;
      document.getElementById('pendingExchanges').textContent = exchanges.filter(e => e.status === 'pending').length;
      document.getElementById('shippedExchanges').textContent = exchanges.filter(e => e.status === 'shipped').length;
      document.getElementById('deliveredExchanges').textContent = exchanges.filter(e => e.status === 'delivered').length;
    }

    // 显示取消确认弹窗
    function showCancelModal(id) {
      cancelTargetId = id;
      document.getElementById('cancelModal').classList.add('active');
    }

    // 关闭取消弹窗
    function closeCancelModal() {
      cancelTargetId = null;
      document.getElementById('cancelModal').classList.remove('active');
    }

    // 确认取消
    document.getElementById('confirmCancel').addEventListener('click', () => {
      if (cancelTargetId) {
        const success = PointsSystem.cancelExchange(cancelTargetId);
        if (success) {
          closeCancelModal();
          loadData();
        }
      }
    });

    // 显示物流信息
    function showLogistics(id) {
      const exchanges = PointsSystem.getExchangeHistory();
      const exchange = exchanges.find(e => e.id === id);
      
      if (exchange) {
        const logisticsData = [
          { time: exchange.exchangeTime, desc: '商品已兑换成功，等待发货' },
          { time: new Date(new Date(exchange.exchangeTime).getTime() + 86400000).toISOString(), desc: '商家正在打包商品' },
          { time: new Date(new Date(exchange.exchangeTime).getTime() + 172800000).toISOString(), desc: '商品已发货，正在配送途中' },
          { time: new Date(new Date(exchange.exchangeTime).getTime() + 259200000).toISOString(), desc: '商品已到达当地配送点' }
        ];
        
        const container = document.getElementById('logisticsContent');
        container.innerHTML = logisticsData.map((item, index) => `
          <div class="flex gap-3">
            <div class="flex flex-col items-center">
              <div class="w-8 h-8 rounded-full ${index === logisticsData.length - 1 ? 'bg-blue-500' : 'bg-green-500'} flex items-center justify-center text-white text-sm">
                ${index + 1}
              </div>
              ${index < logisticsData.length - 1 ? '<div class="w-0.5 h-8 bg-gray-200"></div>' : ''}
            </div>
            <div class="flex-1 pb-4">
              <p class="font-medium text-gray-800">${item.desc}</p>
              <p class="text-sm text-gray-500">${PointsSystem.formatDate(item.time)}</p>
            </div>
          </div>
        `).join('');
        
        document.getElementById('logisticsModal').classList.add('active');
      }
    }

    // 关闭物流弹窗
    function closeLogisticsModal() {
      document.getElementById('logisticsModal').classList.remove('active');
    }

    // 点击弹窗背景关闭
    document.getElementById('logisticsModal').addEventListener('click', (e) => {
      if (e.target === e.currentTarget) {
        closeLogisticsModal();
      }
    });

    document.getElementById('cancelModal').addEventListener('click', (e) => {
      if (e.target === e.currentTarget) {
        closeCancelModal();
      }
    });

    // 页面加载
    document.addEventListener('DOMContentLoaded', loadData);
  </script>
</body>
</html>
