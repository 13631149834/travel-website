<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#f97316">
  <title>离线状态 - 游导旅游</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: linear-gradient(135deg, #fff7ed 0%, #ffedd5 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    
    .offline-container {
      text-align: center;
      max-width: 400px;
      padding: 40px 30px;
      background: white;
      border-radius: 24px;
      box-shadow: 0 20px 60px rgba(249, 115, 22, 0.15);
    }
    
    .offline-icon {
      width: 120px;
      height: 120px;
      margin: 0 auto 24px;
      background: linear-gradient(135deg, #fed7aa 0%, #fb923c 100%);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      animation: pulse 2s ease-in-out infinite;
    }
    
    .offline-icon svg {
      width: 60px;
      height: 60px;
      fill: white;
    }
    
    @keyframes pulse {
      0%, 100% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.05); opacity: 0.9; }
    }
    
    h1 {
      font-size: 24px;
      color: #1f2937;
      margin-bottom: 12px;
      font-weight: 600;
    }
    
    p {
      color: #6b7280;
      font-size: 15px;
      line-height: 1.6;
      margin-bottom: 28px;
    }
    
    .offline-features {
      text-align: left;
      background: #fff7ed;
      border-radius: 16px;
      padding: 20px;
      margin-bottom: 24px;
    }
    
    .offline-features h2 {
      font-size: 14px;
      color: #f97316;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 12px;
    }
    
    .offline-features ul {
      list-style: none;
    }
    
    .offline-features li {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 0;
      color: #374151;
      font-size: 14px;
    }
    
    .offline-features li svg {
      width: 18px;
      height: 18px;
      fill: #f97316;
      flex-shrink: 0;
    }
    
    .retry-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 14px 32px;
      background: linear-gradient(135deg, #f97316 0%, #ea580c 100%);
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 4px 15px rgba(249, 115, 22, 0.3);
    }
    
    .retry-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(249, 115, 22, 0.4);
    }
    
    .retry-btn:active {
      transform: translateY(0);
    }
    
    .retry-btn svg {
      width: 18px;
      height: 18px;
      fill: currentColor;
    }
    
    .cached-pages {
      margin-top: 20px;
      padding-top: 20px;
      border-top: 1px solid #e5e7eb;
    }
    
    .cached-pages h3 {
      font-size: 13px;
      color: #9ca3af;
      margin-bottom: 12px;
    }
    
    .cached-list {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
    }
    
    .cached-item {
      padding: 6px 12px;
      background: #f3f4f6;
      border-radius: 20px;
      font-size: 12px;
      color: #6b7280;
    }
    
    @media (max-width: 480px) {
      .offline-container {
        padding: 30px 20px;
        border-radius: 20px;
      }
      
      .offline-icon {
        width: 100px;
        height: 100px;
      }
      
      h1 {
        font-size: 20px;
      }
    }
  
/* 无障碍 - 焦点可见样式 (WCAG 2.1 AA) */
.skip-link {
  position: absolute;
  top: -100px;
  left: 50%;
  transform: translateX(-50%);
  background: var(--primary);
  color: #fff !important;
  padding: 12px 24px;
  border-radius: 0 0 8px 8px;
  z-index: 10000;
  font-weight: 600;
  transition: top 0.2s;
}
.skip-link:focus {
  top: 0;
  outline: 3px solid var(--primary-dark);
  outline-offset: 2px;
}

/* 全局焦点样式 */
:focus {
  outline: 3px solid var(--primary);
  outline-offset: 2px;
}
:focus:not(:focus-visible) {
  outline: none;
}
:focus-visible {
  outline: 3px solid var(--primary);
  outline-offset: 2px;
}

/* 链接焦点样式 */
a:focus,
button:focus,
[tabindex]:focus {
  outline: 3px solid var(--primary);
  outline-offset: 2px;
  border-radius: 2px;
}

/* 输入框焦点 */
input:focus,
textarea:focus,
select:focus {
  outline: 3px solid var(--primary);
  outline-offset: 0;
  border-color: var(--primary);
}

</style>
</head>
<body>

<!-- 无障碍 - 状态消息区域 -->
<div id="status-message" class="sr-only" aria-live="polite" aria-atomic="true"></div>
<div id="alert-message" class="sr-only" aria-live="assertive" aria-atomic="true"></div>

<!-- 无障碍 - 屏幕阅读器专用样式 -->
<style>
.sr-only {
  position: absolute;
  width: 1px;
  height: 1px;
  padding: 0;
  margin: -1px;
  overflow: hidden;
  clip: rect(0, 0, 0, 0);
  white-space: nowrap;
  border: 0;
}
.sr-only-focusable:focus,
.sr-only-focusable:active {
  position: static;
  width: auto;
  height: auto;
  margin: 0;
  overflow: visible;
  clip: auto;
  white-space: normal;
}
</style>

  <!-- 跳转到主内容链接 - 屏幕阅读器用户快速导航 -->
  <a href="#main-content" class="skip-link">跳转到主内容</a>
  <a href="#main-nav" class="skip-link">跳转到导航</a>
  <a href="#main-footer" class="skip-link">跳转到页脚</a>

  <div class="offline-container">
<main id="main-content" role="main">
    <div class="offline-icon">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 17.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L9 15v1c0 1.1.9 2 2 2v1.93zm6.9-2.54c-.26-.81-1-1.39-1.9-1.39h-1v-3c0-.55-.45-1-1-1H8v-2h2c.55 0 1-.45 1-1V7h2c1.1 0 2-.9 2-2v-.41c2.93 1.19 5 4.06 5 7.41 0 2.08-.8 3.97-2.1 5.39z"/>
      </svg>
    </div>
    
    <h1>当前处于离线状态</h1>
    <p>网络连接已断开，请检查您的网络设置。您仍可访问已缓存的页面和功能。</p>
    
    <div class="offline-features">
      <h2>离线可用功能</h2>
      <ul>
        <li>
          <svg viewBox="0 0 24 24"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/></svg>
          <span>浏览已缓存的旅游目的地</span>
        </li>
        <li>
          <svg viewBox="0 0 24 24"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-5 14H7v-2h7v2zm3-4H7v-2h10v2zm0-4H7V7h10v2z"/></svg>
          <span>查看已缓存的旅行攻略</span>
        </li>
        <li>
          <svg viewBox="0 0 24 24"><path d="M11.99 2C6.47 2 2 6.48 2 12s4.47 10 9.99 10C17.52 22 22 17.52 22 12S17.52 2 11.99 2zM12 20c-4.42 0-8-3.58-8-8s3.58-8 8-8 8 3.58 8 8-3.58 8-8 8zm.5-13H11v6l5.25 3.15.75-1.23-4.5-2.67z"/></svg>
          <span>使用汇率转换和天气工具</span>
        </li>
        <li>
          <svg viewBox="0 0 24 24"><path d="M20 6h-8l-2-2H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V8c0-1.1-.9-2-2-2zm-1 12H5V8h14v10z"/></svg>
          <span>浏览签证和实用工具指南</span>
        </li>
      </ul>
    </div>
    
    <button class="retry-btn" onclick="retryConnection()">
      <svg viewBox="0 0 24 24"><path d="M17.65 6.35C16.2 4.9 14.21 4 12 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08c-.82 2.33-3.04 4-5.65 4-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z"/></svg>
      重新连接
    </button>
    
    <div class="cached-pages">
      <h3>已缓存页面</h3>
      <div class="cached-list" id="cachedList">
        <span class="cached-item">首页</span>
        <span class="cached-item">目的地</span>
        <span class="cached-item">旅行攻略</span>
      </div>
    </div>
  </div>
  
  <script>
    // 尝试重新连接
    function retryConnection() {
      const btn = document.querySelector('.retry-btn');
      btn.innerHTML = '<svg viewBox="0 0 24 24" class="spin"><path d="M12 6v3l4-4-4-4v3c-4.42 0-8 3.58-8 8 0 1.57.46 3.03 1.24 4.26L6.7 14.8c-.45-.83-.7-1.79-.7-2.8 0-3.31 2.69-6 6-6zm6.76 1.74L17.3 9.2c.44.84.7 1.79.7 2.8 0 3.31-2.69 6-6 6v-3l-4 4 4 4v-3c4.42 0 8-3.58 8-8 0-1.57-.46-3.03-1.24-4.26z"/></svg> 连接中...';
      
      // 尝试加载一个已知资源来测试连接
      fetch('/manifest.json', { cache: 'no-store' })
        .then(() => {
          // 连接成功，刷新页面
          window.location.reload();
        })
        .catch(() => {
          // 仍然离线
          btn.innerHTML = '<svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 17.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L9 15v1c0 1.1.9 2 2 2v1.93zm6.9-2.54c-.26-.81-1-1.39-1.9-1.39h-1v-3c0-.55-.45-1-1-1H8v-2h2c.55 0 1-.45 1-1V7h2c1.1 0 2-.9 2-2v-.41c2.93 1.19 5 4.06 5 7.41 0 2.08-.8 3.97-2.1 5.39z"/></svg> 重新连接';
        });
    }
    
    // 添加旋转动画
    const style = document.createElement('style');
    style.textContent = `
      @keyframes spin {
        from { transform: rotate(0deg); }
        to { transform: rotate(360deg); }
      }
      .spin {
        animation: spin 1s linear infinite;
      }
    `;
    document.head.appendChild(style);
    
    // 监听网络恢复
    window.addEventListener('online', () => {
      window.location.reload();
    });
  </script>
  <script src="js/customer-service.js" defer></script>
</body>
</html>
