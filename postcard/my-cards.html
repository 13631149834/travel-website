<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>我的明信片 - 游导旅游</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#0ea5e9',
            secondary: '#06b6d4',
          }
        }
      }
    }
  </script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;600;700&display=swap');
    body { font-family: 'Noto Sans SC', sans-serif; }
    .gradient-hero { background: linear-gradient(135deg, #0ea5e9 0%, #06b6d4 50%, #10b981 100%); }
    .card-hover { transition: all 0.3s ease; }
    .card-hover:hover { transform: translateY(-4px); }
    .postcard-shadow { box-shadow: 0 4px 20px rgba(0,0,0,0.15); }
    .tab-active { background: #0ea5e9; color: white; }
  </style>
</head>
<body class="bg-gradient-to-br from-slate-50 to-blue-50 min-h-screen">
  <!-- Navigation -->
  <nav class="gradient-hero text-white sticky top-0 z-50 shadow-lg">
    <div class="max-w-7xl mx-auto px-4 py-4">
      <div class="flex items-center justify-between">
        <a href="index.html" class="flex items-center gap-2 hover:opacity-90 transition">
          <span class="text-3xl">🧭</span>
          <span class="text-2xl font-bold">游导旅游</span>
        </a>
        <div class="flex items-center gap-4">
          <a href="create.html" class="bg-white/20 hover:bg-white/30 px-4 py-2 rounded-full font-medium transition flex items-center gap-2">
            ✨ 创建明信片
          </a>
          <a href="index.html" class="hover:opacity-80 transition">返回首页</a>
        </div>
      </div>
    </div>
  </nav>

  <!-- Header -->
  <section class="gradient-hero text-white py-12">
    <div class="max-w-7xl mx-auto px-4">
      <h1 class="text-4xl font-bold mb-2">📬 我的明信片</h1>
      <p class="text-lg opacity-90">管理您的创作、发送和收藏</p>
    </div>
  </section>

  <!-- Tabs -->
  <section class="max-w-7xl mx-auto px-4 -mt-6 mb-8">
    <div class="bg-white rounded-2xl shadow-xl p-2 flex flex-wrap gap-2">
      <button onclick="switchTab('sent')" id="tab-sent" class="tab-btn flex-1 min-w-[120px] px-4 py-3 rounded-xl font-medium transition flex items-center justify-center gap-2 tab-active">
        ✈️ 已发送
        <span id="count-sent" class="bg-white/20 px-2 py-0.5 rounded-full text-sm">0</span>
      </button>
      <button onclick="switchTab('received')" id="tab-received" class="tab-btn flex-1 min-w-[120px] px-4 py-3 rounded-xl font-medium transition flex items-center justify-center gap-2 bg-gray-100 text-gray-700">
        📥 已收到
        <span id="count-received" class="bg-gray-200 px-2 py-0.5 rounded-full text-sm">0</span>
      </button>
      <button onclick="switchTab('draft')" id="tab-draft" class="tab-btn flex-1 min-w-[120px] px-4 py-3 rounded-xl font-medium transition flex items-center justify-center gap-2 bg-gray-100 text-gray-700">
        📝 草稿箱
        <span id="count-draft" class="bg-gray-200 px-2 py-0.5 rounded-full text-sm">0</span>
      </button>
      <button onclick="switchTab('favorites')" id="tab-favorites" class="tab-btn flex-1 min-w-[120px] px-4 py-3 rounded-xl font-medium transition flex items-center justify-center gap-2 bg-gray-100 text-gray-700">
        🤍 收藏
        <span id="count-favorites" class="bg-gray-200 px-2 py-0.5 rounded-full text-sm">0</span>
      </button>
    </div>
  </section>

  <!-- Content -->
  <section class="max-w-7xl mx-auto px-4 mb-16">
    <!-- Sent Cards -->
    <div id="panel-sent" class="tab-panel">
      <div class="flex items-center justify-between mb-6">
        <h2 class="text-xl font-bold text-gray-800">✈️ 已发送的明信片</h2>
        <a href="create.html" class="text-primary hover:underline font-medium">+ 创建新明信片</a>
      </div>
      <div id="sentGrid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6">
        <!-- Sent postcards will be loaded here -->
      </div>
      <div id="sentEmpty" class="hidden text-center py-16">
        <div class="text-6xl mb-4">✈️</div>
        <h3 class="text-xl font-bold text-gray-800 mb-2">暂无已发送的明信片</h3>
        <p class="text-gray-500 mb-4">开始创建并发送您的第一张明信片吧</p>
        <a href="create.html" class="inline-flex items-center gap-2 px-6 py-3 bg-primary text-white rounded-full font-medium hover:bg-blue-600 transition">
          ✨ 创建明信片
        </a>
      </div>
    </div>

    <!-- Received Cards -->
    <div id="panel-received" class="tab-panel hidden">
      <div class="flex items-center justify-between mb-6">
        <h2 class="text-xl font-bold text-gray-800">📥 已收到的明信片</h2>
      </div>
      <div id="receivedGrid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6">
        <!-- Received postcards will be loaded here -->
      </div>
      <div id="receivedEmpty" class="hidden text-center py-16">
        <div class="text-6xl mb-4">📭</div>
        <h3 class="text-xl font-bold text-gray-800 mb-2">暂无收到的明信片</h3>
        <p class="text-gray-500 mb-4">分享您的明信片链接，让朋友给您发送明信片</p>
        <a href="#" onclick="shareProfile()" class="inline-flex items-center gap-2 px-6 py-3 bg-primary text-white rounded-full font-medium hover:bg-blue-600 transition">
          📤 分享我的主页
        </a>
      </div>
    </div>

    <!-- Draft Cards -->
    <div id="panel-draft" class="tab-panel hidden">
      <div class="flex items-center justify-between mb-6">
        <h2 class="text-xl font-bold text-gray-800">📝 草稿箱</h2>
      </div>
      <div id="draftGrid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6">
        <!-- Draft postcards will be loaded here -->
      </div>
      <div id="draftEmpty" class="hidden text-center py-16">
        <div class="text-6xl mb-4">📝</div>
        <h3 class="text-xl font-bold text-gray-800 mb-2">草稿箱是空的</h3>
        <p class="text-gray-500 mb-4">保存的草稿将显示在这里</p>
        <a href="create.html" class="inline-flex items-center gap-2 px-6 py-3 bg-primary text-white rounded-full font-medium hover:bg-blue-600 transition">
          ✨ 创建明信片
        </a>
      </div>
    </div>

    <!-- Favorites -->
    <div id="panel-favorites" class="tab-panel hidden">
      <div class="flex items-center justify-between mb-6">
        <h2 class="text-xl font-bold text-gray-800">🤍 收藏的模板</h2>
      </div>
      <div id="favoritesGrid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6">
        <!-- Favorite templates will be loaded here -->
      </div>
      <div id="favoritesEmpty" class="hidden text-center py-16">
        <div class="text-6xl mb-4">🤍</div>
        <h3 class="text-xl font-bold text-gray-800 mb-2">暂无收藏</h3>
        <p class="text-gray-500 mb-4">在模板库中收藏喜欢的模板</p>
        <a href="templates.html" class="inline-flex items-center gap-2 px-6 py-3 bg-primary text-white rounded-full font-medium hover:bg-blue-600 transition">
          🖼️ 浏览模板库
        </a>
      </div>
    </div>
  </section>

  <!-- Detail Modal -->
  <div id="detailModal" class="fixed inset-0 bg-black/70 z-50 hidden flex items-center justify-center p-4">
    <div class="bg-white rounded-3xl max-w-lg w-full overflow-hidden">
      <div id="detailContent">
        <!-- Detail content will be loaded here -->
      </div>
    </div>
  </div>

  <!-- Share Modal -->
  <div id="shareModal" class="fixed inset-0 bg-black/50 z-50 hidden flex items-center justify-center p-4">
    <div class="bg-white rounded-2xl max-w-md w-full p-6">
      <h3 class="text-xl font-bold text-gray-800 mb-4">📤 分享明信片</h3>
      <div class="space-y-4">
        <div class="bg-gray-100 rounded-xl p-4 flex items-center gap-3">
          <input type="text" id="shareLink" class="flex-1 bg-transparent outline-none text-gray-600" value="" readonly>
          <button onclick="copyShareLink()" class="px-4 py-2 bg-primary text-white rounded-lg text-sm font-medium hover:bg-blue-600 transition">
            复制
          </button>
        </div>
        <div class="flex justify-center gap-4">
          <button onclick="shareTo('wechat')" class="w-12 h-12 bg-green-500 text-white rounded-full flex items-center justify-center text-xl hover:bg-green-600 transition">
            💬
          </button>
          <button onclick="shareTo('weibo')" class="w-12 h-12 bg-red-500 text-white rounded-full flex items-center justify-center text-xl hover:bg-red-600 transition">
            📱
          </button>
          <button onclick="shareTo('qq')" class="w-12 h-12 bg-blue-500 text-white rounded-full flex items-center justify-center text-xl hover:bg-blue-600 transition">
            💬
          </button>
          <button onclick="shareTo('email')" class="w-12 h-12 bg-gray-500 text-white rounded-full flex items-center justify-center text-xl hover:bg-gray-600 transition">
            ✉️
          </button>
        </div>
      </div>
      <button onclick="closeShareModal()" class="w-full mt-6 py-2 bg-gray-100 text-gray-700 rounded-xl font-medium hover:bg-gray-200 transition">
        关闭
      </button>
    </div>
  </div>

  <script>
    let currentTab = 'sent';
    let postcardData = null;

    // Initialize
    async function init() {
      await loadPostcardData();
      loadAllCards();
      
      // Check URL hash
      const hash = window.location.hash.slice(1);
      if (hash && ['sent', 'received', 'draft', 'favorites'].includes(hash)) {
        switchTab(hash);
      }
    }

    // Load postcard data
    async function loadPostcardData() {
      try {
        const response = await fetch('../data/postcard.json');
        postcardData = await response.json();
      } catch (error) {
        console.error('Failed to load postcard data:', error);
      }
    }

    // Load all cards
    function loadAllCards() {
      const myCards = JSON.parse(localStorage.getItem('myPostcards') || '[]');
      
      // Categorize cards
      const sentCards = myCards.filter(c => c.status === 'sent');
      const receivedCards = myCards.filter(c => c.status === 'received');
      const draftCards = myCards.filter(c => c.status === 'draft');
      const favoriteIds = JSON.parse(localStorage.getItem('favoriteTemplates') || '[]');
      const favoriteTemplates = Object.values(postcardData?.templates || {}).flat().filter(t => favoriteIds.includes(t.id));
      
      // Update counts
      document.getElementById('count-sent').textContent = sentCards.length;
      document.getElementById('count-received').textContent = receivedCards.length;
      document.getElementById('count-draft').textContent = draftCards.length;
      document.getElementById('count-favorites').textContent = favoriteTemplates.length;
      
      // Render grids
      renderCards('sent', sentCards, 'sentEmpty', 'sentGrid');
      renderCards('received', receivedCards, 'receivedEmpty', 'receivedGrid');
      renderCards('draft', draftCards, 'draftEmpty', 'draftGrid');
      renderFavoriteTemplates(favoriteTemplates, 'favoritesEmpty', 'favoritesGrid');
    }

    // Switch tab
    function switchTab(tabName) {
      currentTab = tabName;
      
      // Update buttons
      document.querySelectorAll('.tab-btn').forEach(btn => {
        btn.classList.remove('tab-active');
        btn.classList.add('bg-gray-100', 'text-gray-700');
        const count = btn.querySelector('span');
        if (count) count.classList.remove('bg-white/20');
        if (count) count.classList.add('bg-gray-200');
      });
      document.getElementById(`tab-${tabName}`).classList.add('tab-active');
      document.getElementById(`tab-${tabName}`).classList.remove('bg-gray-100', 'text-gray-700');
      const activeCount = document.getElementById(`tab-${tabName}`).querySelector('span');
      if (activeCount) activeCount.classList.remove('bg-gray-200');
      if (activeCount) activeCount.classList.add('bg-white/20');
      
      // Update panels
      document.querySelectorAll('.tab-panel').forEach(panel => panel.classList.add('hidden'));
      document.getElementById(`panel-${tabName}`).classList.remove('hidden');
      
      // Update URL
      history.replaceState(null, '', `#${tabName}`);
    }

    // Render cards
    function renderCards(type, cards, emptyId, gridId) {
      const grid = document.getElementById(gridId);
      const empty = document.getElementById(emptyId);
      
      if (cards.length === 0) {
        grid.classList.add('hidden');
        empty.classList.remove('hidden');
        return;
      }
      
      grid.classList.remove('hidden');
      empty.classList.add('hidden');
      
      const statusLabels = {
        sent: '✈️ 已发送',
        received: '📥 已收到',
        draft: '📝 草稿'
      };
      
      grid.innerHTML = cards.map(card => `
        <div class="card-hover group cursor-pointer" onclick="viewDetail('${type}', '${card.id}')">
          <div class="relative overflow-hidden rounded-2xl shadow-lg postcard-shadow">
            <div class="w-full aspect-[4/3] bg-cover bg-center" style="background-image: url('${card.photo || card.background?.slice(5, -2) || 'https://images.unsplash.com/photo-1493976040374-85c8e12f0c0e?w=400'}');">
              ${card.photo ? '' : '<div class="w-full h-full bg-gradient-to-br from-blue-400 to-purple-500 flex items-center justify-center"><span class="text-white text-4xl">📮</span></div>'}
            </div>
            <div class="absolute top-3 left-3">
              <span class="px-2 py-1 bg-white/90 rounded-full text-xs font-medium">${statusLabels[card.status] || card.status}</span>
            </div>
            <div class="absolute inset-0 bg-black/50 opacity-0 group-hover:opacity-100 transition flex items-center justify-center gap-3">
              <button class="w-10 h-10 bg-white rounded-full flex items-center justify-center hover:bg-gray-100 transition" onclick="event.stopPropagation(); sharePostcard('${card.id}')">
                📤
              </button>
              <button class="w-10 h-10 bg-white rounded-full flex items-center justify-center hover:bg-gray-100 transition" onclick="event.stopPropagation(); deletePostcard('${card.id}')">
                🗑️
              </button>
            </div>
          </div>
          <div class="mt-3">
            <h4 class="font-bold text-gray-800 truncate">${card.title || card.message?.slice(0, 20) || '明信片'}</h4>
            <p class="text-sm text-gray-500">${new Date(card.createdAt).toLocaleDateString('zh-CN')}</p>
            ${card.recipientEmail ? `<p class="text-xs text-gray-400">发送给: ${card.recipientEmail}</p>` : ''}
          </div>
        </div>
      `).join('');
    }

    // Render favorite templates
    function renderFavoriteTemplates(templates, emptyId, gridId) {
      const grid = document.getElementById(gridId);
      const empty = document.getElementById(emptyId);
      
      if (templates.length === 0) {
        grid.classList.add('hidden');
        empty.classList.remove('hidden');
        return;
      }
      
      grid.classList.remove('hidden');
      empty.classList.add('hidden');
      
      grid.innerHTML = templates.map(t => `
        <div class="card-hover group cursor-pointer" onclick="useTemplate('${t.id}')">
          <div class="relative overflow-hidden rounded-2xl shadow-lg postcard-shadow">
            <img src="${t.thumbnail}" alt="${t.name}" class="w-full aspect-[4/3] object-cover group-hover:scale-110 transition duration-500">
            <div class="absolute inset-0 bg-gradient-to-t from-black/70 via-transparent to-transparent"></div>
            <div class="absolute bottom-0 left-0 right-0 p-4">
              <h4 class="text-white font-bold">${t.name}</h4>
            </div>
            <div class="absolute top-3 right-3">
              <button class="w-10 h-10 bg-white/90 rounded-full flex items-center justify-center hover:bg-white transition shadow-lg" onclick="event.stopPropagation(); toggleFavorite('${t.id}')">
                <span class="text-xl">❤️</span>
              </button>
            </div>
            <div class="absolute inset-0 bg-black/50 opacity-0 group-hover:opacity-100 transition flex items-center justify-center">
              <button class="px-6 py-3 bg-white text-gray-800 rounded-full font-bold hover:bg-gray-100 transition flex items-center gap-2">
                ✨ 使用此模板
              </button>
            </div>
          </div>
        </div>
      `).join('');
    }

    // View detail
    function viewDetail(type, id) {
      const myCards = JSON.parse(localStorage.getItem('myPostcards') || '[]');
      const card = myCards.find(c => c.id === id);
      
      if (!card) return;
      
      const modal = document.getElementById('detailModal');
      const content = document.getElementById('detailContent');
      
      content.innerHTML = `
        <div class="relative">
          <div class="w-full aspect-[3/2] bg-cover bg-center" style="background-image: url('${card.photo || card.background?.slice(5, -2) || 'https://images.unsplash.com/photo-1493976040374-85c8e12f0c0e?w=600'}');">
            ${card.photo ? '' : '<div class="w-full h-full bg-gradient-to-br from-blue-400 to-purple-500 flex items-center justify-center"><span class="text-white text-6xl">📮</span></div>'}
          </div>
          <button onclick="closeDetailModal()" class="absolute top-4 right-4 w-10 h-10 bg-black/50 text-white rounded-full flex items-center justify-center hover:bg-black/70 transition text-xl">
            ✕
          </button>
        </div>
        <div class="p-6">
          <h3 class="text-xl font-bold text-gray-800 mb-2">${card.title || '明信片'}</h3>
          <p class="text-gray-600 mb-4">${card.message || '暂无内容'}</p>
          <div class="flex flex-wrap gap-2 mb-4 text-sm text-gray-500">
            <span>📅 ${new Date(card.createdAt).toLocaleDateString('zh-CN')}</span>
            ${card.recipientEmail ? `<span>📧 ${card.recipientEmail}</span>` : ''}
            ${card.recipientName ? `<span>👤 ${card.recipientName}</span>` : ''}
          </div>
          <div class="flex gap-3">
            ${card.status === 'draft' ? `<a href="create.html?edit=${card.id}" class="flex-1 py-3 bg-primary text-white rounded-xl font-bold text-center hover:bg-blue-600 transition">继续编辑</a>` : ''}
            <button onclick="sharePostcard('${card.id}')" class="flex-1 py-3 bg-gray-100 text-gray-700 rounded-xl font-medium hover:bg-gray-200 transition flex items-center justify-center gap-2">
              📤 分享
            </button>
            <button onclick="deletePostcard('${card.id}'); closeDetailModal();" class="px-4 py-3 bg-red-50 text-red-500 rounded-xl font-medium hover:bg-red-100 transition">
              🗑️
            </button>
          </div>
        </div>
      `;
      
      modal.classList.remove('hidden');
    }

    // Close detail modal
    function closeDetailModal() {
      document.getElementById('detailModal').classList.add('hidden');
    }

    // Share postcard
    function sharePostcard(id) {
      const shareLink = `${window.location.origin}/postcard/view.html?id=${id}`;
      document.getElementById('shareLink').value = shareLink;
      document.getElementById('shareModal').classList.remove('hidden');
    }

    // Share profile
    function shareProfile() {
      const shareLink = `${window.location.origin}/postcard/my-cards.html`;
      document.getElementById('shareLink').value = shareLink;
      document.getElementById('shareModal').classList.remove('hidden');
    }

    // Copy share link
    function copyShareLink() {
      const link = document.getElementById('shareLink').value;
      navigator.clipboard.writeText(link);
      alert('链接已复制到剪贴板！');
    }

    // Share to platform
    function shareTo(platform) {
      const link = encodeURIComponent(document.getElementById('shareLink').value);
      const text = encodeURIComponent('看看我创建的旅行明信片！');
      
      const urls = {
        wechat: `https://qrcode.2qq.me/?text=${text}%20${link}`,
        weibo: `http://service.weibo.com/share/share.php?url=${link}&title=${text}`,
        qq: `http://connect.qq.com/widget/shareqq/index.html?url=${link}&title=${text}`,
        email: `mailto:?subject=${text}&body=${link}`
      };
      
      if (platform === 'email') {
        window.location.href = urls[platform];
      } else {
        window.open(urls[platform], '_blank');
      }
    }

    // Close share modal
    function closeShareModal() {
      document.getElementById('shareModal').classList.add('hidden');
    }

    // Delete postcard
    function deletePostcard(id) {
      if (!confirm('确定要删除这张明信片吗？')) return;
      
      let myCards = JSON.parse(localStorage.getItem('myPostcards') || '[]');
      myCards = myCards.filter(c => c.id !== id);
      localStorage.setItem('myPostcards', JSON.stringify(myCards));
      
      loadAllCards();
      alert('已删除');
    }

    // Toggle favorite
    function toggleFavorite(templateId) {
      const favorites = JSON.parse(localStorage.getItem('favoriteTemplates') || '[]');
      const index = favorites.indexOf(templateId);
      
      if (index > -1) {
        favorites.splice(index, 1);
      } else {
        favorites.push(templateId);
      }
      
      localStorage.setItem('favoriteTemplates', JSON.stringify(favorites));
      loadAllCards();
    }

    // Use template
    function useTemplate(templateId) {
      window.location.href = `create.html?template=${templateId}`;
    }

    // Close modals on background click
    document.getElementById('detailModal')?.addEventListener('click', function(e) {
      if (e.target === this) closeDetailModal();
    });
    
    document.getElementById('shareModal')?.addEventListener('click', function(e) {
      if (e.target === this) closeShareModal();
    });

    // Initialize
    init();
  </script>
</body>
</html>
