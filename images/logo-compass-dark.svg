<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- 深色版本背景圆圈 -->
  <circle cx="32" cy="32" r="30" fill="url(#faviconGradientDark)"/>
  
  <defs>
    <linearGradient id="faviconGradientDark" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6BA3FF"/>
      <stop offset="100%" style="stop-color:#4F86F7"/>
    </linearGradient>
  </defs>
  
  <!-- 指南针外圈 -->
  <circle cx="32" cy="32" r="20" fill="none" stroke="white" stroke-width="2.5" opacity="0.95"/>
  
  <!-- 指南针指针 北 -->
  <polygon points="32,14 35.5,32 32,27 28.5,32" fill="white"/>
  
  <!-- 指南针指针 南 -->
  <polygon points="32,50 35.5,32 32,37 28.5,32" fill="white" opacity="0.6"/>
  
  <!-- 中心点 -->
  <circle cx="32" cy="32" r="4" fill="white"/>
</svg>
