<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 60" width="200" height="60">
  <!-- Logo背景 -->
  <defs>
    <linearGradient id="logoGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4F86F7"/>
      <stop offset="100%" style="stop-color:#3B82F6"/>
    </linearGradient>
    <filter id="logoShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#4F86F7" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- Logo图标 - 指南针 -->
  <g transform="translate(5, 5)" filter="url(#logoShadow)">
    <!-- 指南针外圈 -->
    <circle cx="25" cy="25" r="22" fill="url(#logoGradient)" opacity="0.15"/>
    <circle cx="25" cy="25" r="18" fill="none" stroke="url(#logoGradient)" stroke-width="2"/>
    <!-- 指南针指针 -->
    <polygon points="25,8 28,25 25,20 22,25" fill="#4F86F7"/>
    <polygon points="25,42 28,25 25,30 22,25" fill="#3B82F6"/>
    <!-- 中心点 -->
    <circle cx="25" cy="25" r="3" fill="url(#logoGradient)"/>
    <!-- 方向标记 -->
    <text x="25" y="6" text-anchor="middle" font-size="5" fill="#4F86F7" font-weight="bold">N</text>
  </g>
  
  <!-- Logo文字 -->
  <g transform="translate(58, 0)">
    <text x="0" y="30" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="26" font-weight="700" fill="#4F86F7">
      游导
    </text>
    <text x="58" y="30" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="26" font-weight="400" fill="#3B82F6">
      旅游
    </text>
  </g>
  
  <!-- 装饰圆点 -->
  <circle cx="185" cy="15" r="3" fill="#4F86F7" opacity="0.5">
    <animate attributeName="opacity" values="0.5;1;0.5" dur="2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="192" cy="25" r="2" fill="#3B82F6" opacity="0.4">
    <animate attributeName="opacity" values="0.4;0.8;0.4" dur="2.5s" repeatCount="indefinite"/>
  </circle>
</svg>
