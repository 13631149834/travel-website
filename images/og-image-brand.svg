<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <!-- 背景 -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4F86F7"/>
      <stop offset="50%" style="stop-color:#3B82F6"/>
      <stop offset="100%" style="stop-color:#764ba2"/>
    </linearGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>
    </pattern>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <!-- 主背景 -->
  <rect width="1200" height="630" fill="url(#bgGradient)"/>
  <rect width="1200" height="630" fill="url(#grid)"/>
  
  <!-- 装饰圆形 -->
  <circle cx="100" cy="100" r="200" fill="rgba(255,255,255,0.1)"/>
  <circle cx="1100" cy="530" r="250" fill="rgba(255,255,255,0.08)"/>
  <circle cx="900" cy="150" r="80" fill="rgba(255,255,255,0.05)"/>
  
  <!-- 左侧装饰 -->
  <g transform="translate(80, 230)" filter="url(#shadow)">
    <!-- 指南针图标 -->
    <circle cx="80" cy="80" r="70" fill="rgba(255,255,255,0.15)"/>
    <circle cx="80" cy="80" r="55" fill="none" stroke="white" stroke-width="3" opacity="0.9"/>
    <polygon points="80,30 88,80 80,70 72,80" fill="white"/>
    <polygon points="80,130 88,80 80,90 72,80" fill="white" opacity="0.6"/>
    <circle cx="80" cy="80" r="10" fill="white"/>
    <text x="80" y="25" text-anchor="middle" font-size="14" fill="white" font-weight="bold" opacity="0.8">N</text>
  </g>
  
  <!-- 文字内容 -->
  <g transform="translate(280, 280)">
    <!-- Logo文字 -->
    <text x="0" y="0" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="72" font-weight="700" fill="white">
      游导旅游
    </text>
    
    <!-- 主宣传语 -->
    <text x="0" y="80" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="48" font-weight="300" fill="rgba(255,255,255,0.95)">
      让旅行充满期待
    </text>
    
    <!-- 分隔线 -->
    <rect x="0" y="120" width="200" height="4" rx="2" fill="rgba(255,255,255,0.3)"/>
    
    <!-- 副宣传语 -->
    <text x="0" y="170" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="28" fill="rgba(255,255,255,0.8)">
      连接优秀导游，开启专属旅程
    </text>
  </g>
  
  <!-- 右下角装饰 -->
  <g transform="translate(1000, 500)">
    <circle cx="0" cy="0" r="8" fill="white" opacity="0.6">
      <animate attributeName="opacity" values="0.6;1;0.6" dur="2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="30" cy="20" r="5" fill="white" opacity="0.4">
      <animate attributeName="opacity" values="0.4;0.8;0.4" dur="2.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="50" cy="0" r="6" fill="white" opacity="0.5">
      <animate attributeName="opacity" values="0.5;0.9;0.5" dur="1.8s" repeatCount="indefinite"/>
    </circle>
  </g>
  
  <!-- 底部域名 -->
  <text x="600" y="600" text-anchor="middle" font-family="'Inter', sans-serif" font-size="24" fill="rgba(255,255,255,0.6)">
    youdao-travel.com
  </text>
</svg>
