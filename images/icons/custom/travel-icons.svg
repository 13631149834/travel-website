<!-- 专属图标系统 - 旅行主题 -->
<!-- 使用品牌色: #4F86F7, #10B981, #764ba2 -->

<!-- 旅行探索图标 -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <circle cx="32" cy="32" r="30" fill="#F0F7FF" stroke="#4F86F7" stroke-width="2"/>
  <path d="M32 12L36 24H48L38 32L42 44L32 36L22 44L26 32L16 24H28L32 12Z" fill="#4F86F7"/>
  <circle cx="32" cy="32" r="6" fill="#10B981"/>
  <circle cx="32" cy="32" r="3" fill="white"/>
</svg>

<!-- 目的地定位图标 -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <circle cx="32" cy="32" r="30" fill="#F0FDF4" stroke="#10B981" stroke-width="2"/>
  <path d="M32 8C22.06 8 14 16.06 14 26C14 34 22 48 32 56C42 48 50 34 50 26C50 16.06 41.94 8 32 8Z" fill="#10B981"/>
  <circle cx="32" cy="24" r="8" fill="white"/>
  <circle cx="32" cy="24" r="4" fill="#10B981"/>
</svg>

<!-- 日历旅行图标 -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <circle cx="32" cy="32" r="30" fill="#FAF5FF" stroke="#764ba2" stroke-width="2"/>
  <rect x="14" y="18" width="36" height="34" rx="4" fill="white" stroke="#764ba2" stroke-width="2"/>
  <rect x="14" y="18" width="36" height="10" rx="4" fill="#764ba2"/>
  <circle cx="22" cy="14" r="3" fill="#764ba2"/>
  <circle cx="42" cy="14" r="3" fill="#764ba2"/>
  <path d="M24 34L30 40L40 28" stroke="#10B981" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
</svg>

<!-- 相机旅行图标 -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <circle cx="32" cy="32" r="30" fill="#FFF7ED" stroke="#F97316" stroke-width="2"/>
  <rect x="14" y="22" width="36" height="26" rx="4" fill="#4F86F7"/>
  <circle cx="32" cy="34" r="10" fill="white"/>
  <circle cx="32" cy="34" r="6" fill="#4F86F7"/>
  <circle cx="32" cy="34" r="3" fill="white"/>
  <rect x="24" y="14" width="16" height="8" rx="2" fill="#4F86F7"/>
  <circle cx="46" cy="28" r="3" fill="#10B981"/>
</svg>

<!-- 美食探索图标 -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <circle cx="32" cy="32" r="30" fill="#FEF3C7" stroke="#F59E0B" stroke-width="2"/>
  <ellipse cx="32" cy="38" rx="18" ry="12" fill="#F59E0B"/>
  <ellipse cx="32" cy="34" rx="16" ry="10" fill="#FCD34D"/>
