<!-- 动态图标 - 带动画效果的图标 -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <linearGradient id="pulseGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4F86F7">
        <animate attributeName="stop-color" values="#4F86F7;#10B981;#4F86F7" dur="2s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" stop-color="#764ba2">
        <animate attributeName="stop-color" values="#764ba2;#4F86F7;#764ba2" dur="2s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>
  </defs>
  <circle cx="32" cy="32" r="30" fill="url(#pulseGradient)">
    <animate attributeName="r" values="28;30;28" dur="1.5s" repeatCount="indefinite"/>
  </circle>
  <path d="M32 16L40 28H52L42 36L46 48L32 40L18 48L22 36L12 28H24L32 16Z" fill="white">
    <animate attributeName="opacity" values="1;0.7;1" dur="1s" repeatCount="indefinite"/>
  </path>
  <circle cx="32" cy="32" r="8" fill="white" fill-opacity="0.9"/>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <linearGradient id="loadingGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#4F86F7"/>
      <stop offset="50%" stop-color="#10B981"/>
      <stop offset="100%" stop-color="#4F86F7">
        <animate attributeName="offset" values="0;1;0" dur="1.5s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>
  </defs>
  <circle cx="32" cy="32" r="26" fill="none" stroke="#E5E7EB" stroke-width="4"/>
  <circle cx="32" cy="32" r="26" fill="none" stroke="url(#loadingGradient)" stroke-width="4" stroke-dasharray="163" stroke-dashoffset="40">
    <animateTransform attributeName="transform" type="rotate" values="0 32 32;360 32 32" dur="1s" repeatCount="indefinite"/>
  </circle>
  <text x="32" y="36" text-anchor="middle" font-size="12" font-weight="bold" fill="#4F86F7">GO</text>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <circle cx="32" cy="32" r="30" fill="#F0FDF4" stroke="#10B981" stroke-width="2"/>
  <!-- 飘动的云朵 -->
  <g>
    <animateTransform attributeName="transform" type="translate" values="0,0;2,-2;0,0" dur="3s" repeatCount="indefinite"/>
    <ellipse cx="24" cy="36" rx="10" ry="6" fill="#4F86F7" fill-opacity="0.6"/>
    <ellipse cx="32" cy="34" rx="12" ry="8" fill="#4F86F7" fill-opacity="0.8"/>
    <ellipse cx="40" cy="36" rx="8" ry="5" fill="#4F86F7" fill-opacity="0.6"/>
  </g>
  <!-- 山峰 -->
  <path d="M12 52L24 38L32 46L44 32L52 52H12Z" fill="#10B981"/>
  <path d="M20 52L28 42L36 50L44 40L52 52H20Z" fill="#059669"/>
  <!-- 太阳 -->
  <circle cx="48" cy="20" r="8" fill="#F59E0B">
    <animate attributeName="r" values="8;9;8" dur="2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="48" cy="20" r="5" fill="#FCD34D"/>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- 心形点赞动画 -->
  <circle cx="32" cy="32" r="30" fill="#FEE2E2" stroke="#EF4444" stroke-width="2"/>
  <path d="M32 52L14 34C8 28 8 18 14 14C20 10 28 14 32 20C36 14 44 10 50 14C56 18 56 28 50 34L32 52Z" fill="#EF4444">
    <animate attributeName="transform" type="scale" values="1;1.1;1" dur="0.5s" repeatCount="indefinite" additive="sum"/>
  </path>
  <path d="M32 46L18 32C14 28 14 22 18 20C22 18 26 20 32 26" stroke="white" stroke-width="3" stroke-linecap="round" opacity="0.5"/>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- 位置标记动画 -->
  <circle cx="32" cy="32" r="30" fill="#EFF6FF" stroke="#4F86F7" stroke-width="2"/>
  <path d="M32 8C22 8 14 16 14 26C14 38 32 58 32 58C32 58 50 38 50 26C50 16 42 8 32 8Z" fill="#4F86F7">
    <animate attributeName="d" values="M32 8C22 8 14 16 14 26C14 38 32 58 32 58C32 58 50 38 50 26C50 16 42 8 32 8Z;M32 10C23 10 16 17 16 26C16 37 32 56 32 56C32 56 48 37 48 26C48 17 41 10 32 10Z;M32 8C22 8 14 16 14 26C14 38 32 58 32 58C32 58 50 38 50 26C50 16 42 8 32 8Z" dur="2s" repeatCount="indefinite"/>
  </path>
  <circle cx="32" cy="26" r="10" fill="white">
    <animate attributeName="r" values="10;12;10" dur="2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="32" cy="26" r="5" fill="#4F86F7"/>
</svg>
