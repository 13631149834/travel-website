<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Logo背景 -->
  <defs>
    <linearGradient id="logoIconGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4F86F7"/>
      <stop offset="100%" style="stop-color:#3B82F6"/>
    </linearGradient>
    <filter id="logoIconShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#4F86F7" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- Logo图标 - 指南针 -->
  <g transform="translate(6, 6)" filter="url(#logoIconShadow)">
    <!-- 指南针外圈 -->
    <circle cx="26" cy="26" r="24" fill="url(#logoIconGradient)" opacity="0.15"/>
    <circle cx="26" cy="26" r="20" fill="none" stroke="url(#logoIconGradient)" stroke-width="2.5"/>
    <!-- 指南针指针 -->
    <polygon points="26,8 29.5,26 26,21 22.5,26" fill="#4F86F7"/>
    <polygon points="26,44 29.5,26 26,31 22.5,26" fill="#3B82F6"/>
    <!-- 中心点 -->
    <circle cx="26" cy="26" r="4" fill="url(#logoIconGradient)"/>
    <!-- 方向标记 -->
    <text x="26" y="5" text-anchor="middle" font-size="6" fill="#4F86F7" font-weight="bold">N</text>
  </g>
</svg>
