<!-- 游导旅游 - 专属装饰元素 -->
<!-- 包含各种可用于页面的装饰图案 -->
<svg width="200" height="200" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- 角落装饰 - 左上 -->
  <g id="corner-decoration">
    <path d="M0 0L0 40C0 22.327 14.327 8 32 8L40 8" stroke="url(#cornerGradient)" stroke-width="3" fill="none" stroke-linecap="round"/>
    <circle cx="32" cy="8" r="4" fill="#4F86F7" opacity="0.6"/>
  </g>
  
  <!-- 角落装饰 - 右下 -->
  <g id="corner-decoration" transform="rotate(180, 200, 200)">
    <path d="M0 0L0 40C0 22.327 14.327 8 32 8L40 8" stroke="url(#cornerGradient)" stroke-width="3" fill="none" stroke-linecap="round"/>
    <circle cx="32" cy="8" r="4" fill="#10B981" opacity="0.6"/>
  </g>
  
  <!-- 中心装饰圆环 -->
  <circle cx="100" cy="100" r="60" stroke="url(#decorativeRing)" stroke-width="1" fill="none" opacity="0.3"/>
  <circle cx="100" cy="100" r="45" stroke="url(#decorativeRing)" stroke-width="1" fill="none" opacity="0.2"/>
  <circle cx="100" cy="100" r="30" stroke="url(#decorativeRing)" stroke-width="1" fill="none" opacity="0.1"/>
  
  <!-- 漂浮元素 -->
  <circle cx="50" cy="50" r="6" fill="#4F86F7" opacity="0.2"/>
  <circle cx="150" cy="60" r="4" fill="#10B981" opacity="0.3"/>
  <circle cx="160" cy="140" r="5" fill="#764ba2" opacity="0.2"/>
  <circle cx="40" cy="150" r="3" fill="#4F86F7" opacity="0.3"/>
  
  <!-- 连接线 -->
  <path d="M50 50L100 100L150 60" stroke="#4F86F7" stroke-width="1" opacity="0.1" stroke-dasharray="4 4"/>
  <path d="M100 100L160 140" stroke="#10B981" stroke-width="1" opacity="0.1" stroke-dasharray="4 4"/>
  <path d="M40 150L100 100" stroke="#764ba2" stroke-width="1" opacity="0.1" stroke-dasharray="4 4"/>
  
  <defs>
    <linearGradient id="cornerGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4F86F7"/>
      <stop offset="100%" stop-color="#10B981"/>
    </linearGradient>
    <linearGradient id="decorativeRing" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4F86F7"/>
      <stop offset="50%" stop-color="#10B981"/>
      <stop offset="100%" stop-color="#764ba2"/>
    </linearGradient>
  </defs>
</svg>
