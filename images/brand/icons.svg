<!-- 游导旅游 - 专属品牌图标集 -->
<svg width="400" height="100" viewBox="0 0 400 100" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- 图标1: 指南针导航 -->
  <g transform="translate(10, 10)">
    <circle cx="20" cy="20" r="18" fill="#4F86F7" opacity="0.1"/>
    <circle cx="20" cy="20" r="14" stroke="#4F86F7" stroke-width="2" fill="none"/>
    <path d="M20 6L22 18H18L20 6Z" fill="#4F86F7"/>
    <path d="M20 34L18 22H22L20 34Z" fill="#10B981"/>
    <path d="M6 20L18 18V22L6 20Z" fill="#764ba2" opacity="0.7"/>
    <path d="M34 20L22 22V18L34 20Z" fill="#764ba2" opacity="0.7"/>
  </g>
  
  <!-- 图标2: 旅行者 -->
  <g transform="translate(80, 10)">
    <circle cx="20" cy="20" r="18" fill="#10B981" opacity="0.1"/>
    <circle cx="20" cy="12" r="6" fill="#10B981"/>
    <path d="M20 18C26 18 30 22 30 28V32H10V28C10 22 14 18 20 18Z" fill="#10B981"/>
    <path d="M15 38L20 32L25 38" stroke="#10B981" stroke-width="2" stroke-linecap="round"/>
  </g>
  
  <!-- 图标3: 世界地图 -->
  <g transform="translate(150, 10)">
    <circle cx="20" cy="20" r="18" fill="#764ba2" opacity="0.1"/>
    <ellipse cx="20" cy="20" rx="16" ry="16" stroke="#764ba2" stroke-width="2" fill="none"/>
    <path d="M8 15C12 12 18 14 24 13C28 12 32 15 34 18" stroke="#764ba2" stroke-width="1.5" fill="none"/>
    <path d="M6 22C10 20 16 22 22 21C28 20 32 22 34 24" stroke="#764ba2" stroke-width="1.5" fill="none"/>
    <line x1="4" y1="20" x2="36" y2="20" stroke="#764ba2" stroke-width="1"/>
    <line x1="20" y1="4" x2="20" y2="36" stroke="#764ba2" stroke-width="1"/>
  </g>
  
  <!-- 图标4: 行李箱 -->
  <g transform="translate(220, 10)">
    <circle cx="20" cy="20" r="18" fill="#4F86F7" opacity="0.1"/>
    <rect x="8" y="14" width="24" height="20" rx="3" stroke="#4F86F7" stroke-width="2" fill="none"/>
    <rect x="14" y="8" width="12" height="6" rx="2" stroke="#4F86F7" stroke-width="2" fill="none"/>
    <line x1="20" y1="14" x2="20" y2="34" stroke="#4F86F7" stroke-width="2"/>
    <circle cx="12" cy="36" r="2" fill="#4F86F7"/>
    <circle cx="28" cy="36" r="2" fill="#4F86F7"/>
  </g>
  
  <!-- 图标5: 相机 -->
  <g transform="translate(290, 10)">
    <circle cx="20" cy="20" r="18" fill="#10B981" opacity="0.1"/>
    <rect x="6" y="14" width="28" height="20" rx="4" stroke="#10B981" stroke-width="2" fill="none"/>
    <circle cx="20" cy="24" r="6" stroke="#10B981" stroke-width="2" fill="none"/>
    <circle cx="20" cy="24" r="2" fill="#10B981"/>
    <rect x="14" y="8" width="12" height="4" rx="1" stroke="#10B981" stroke-width="2" fill="none"/>
  </g>
  
  <!-- 图标6: 爱心 -->
  <g transform="translate(360, 10)">
    <circle cx="20" cy="20" r="18" fill="#764ba2" opacity="0.1"/>
    <path d="M20 32L8 20C4 16 4 10 8 6C12 2 16 6 20 10C24 6 28 2 32 6C36 10 36 16 32 20L20 32Z" fill="#764ba2" opacity="0.8"/>
  </g>
  
  <!-- 底部装饰线 -->
  <line x1="0" y1="60" x2="400" y2="60" stroke="url(#iconLineGradient)" stroke-width="1"/>
  
  <defs>
    <linearGradient id="iconLineGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#4F86F7" stop-opacity="0"/>
      <stop offset="50%" stop-color="#10B981" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#764ba2" stop-opacity="0"/>
    </linearGradient>
  </defs>
</svg>
