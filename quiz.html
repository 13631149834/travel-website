  <style>
    .quiz-hero {
      background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
      color: #fff;
      padding: 50px 0;
      text-align: center;
    }
    .quiz-hero h1 {
      font-size: 2.2rem;
      margin-bottom: 10px;
    }
    .quiz-hero p {
      opacity: 0.9;
      font-size: 1.1rem;
    }
    .quiz-container {
      max-width: 800px;
      margin: 0 auto;
      padding: 40px 20px;
    }
    .quiz-start {
      text-align: center;
      padding: 40px;
      background: #fff;
      border-radius: var(--radius);
      box-shadow: var(--shadow);
    }
    .quiz-start .icon {
      font-size: 5rem;
      margin-bottom: 20px;
    }
    .quiz-start h2 {
      font-size: 1.5rem;
      margin-bottom: 16px;
    }
    .quiz-start p {
      color: var(--gray-600);
      margin-bottom: 24px;
    }
    .quiz-categories {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 16px;
      margin-bottom: 24px;
    }
    .category-card {
      padding: 16px;
      background: var(--gray-50);
      border-radius: var(--radius);
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .category-card .cat-icon {
      font-size: 2rem;
    }
    .category-card .cat-info h4 {
      font-size: 0.95rem;
      margin-bottom: 4px;
    }
    .category-card .cat-info span {
      font-size: 0.85rem;
      color: var(--gray-500);
    }
    .quiz-progress {
      background: #fff;
      padding: 20px;
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      margin-bottom: 20px;
    }
    .progress-bar {
      height: 12px;
      background: var(--gray-200);
      border-radius: 6px;
      overflow: hidden;
      margin-bottom: 12px;
    }
    .progress-bar .fill {
      height: 100%;
      background: linear-gradient(90deg, #f093fb 0%, #f5576c 100%);
      transition: width 0.3s ease;
      border-radius: 6px;
    }
    .progress-info {
      display: flex;
      justify-content: space-between;
      color: var(--gray-600);
      font-size: 0.9rem;
    }
    .quiz-question-card {
      background: #fff;
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 32px;
      margin-bottom: 20px;
    }
    .question-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }
    .question-number {
      background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
      color: #fff;
      padding: 6px 14px;
      border-radius: 20px;
      font-size: 0.9rem;
    }
    .question-category {
      color: var(--gray-500);
      font-size: 0.9rem;
    }
    .question-text {
      font-size: 1.2rem;
      font-weight: 600;
      line-height: 1.6;
      margin-bottom: 24px;
      color: var(--gray-800);
    }
    .options-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .option-btn {
      padding: 16px 20px;
      border: 2px solid var(--gray-200);
      border-radius: var(--radius);
      background: #fff;
      cursor: pointer;
      transition: var(--transition);
      text-align: left;
      font-size: 1rem;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .option-btn:hover:not(.disabled) {
      border-color: #f5576c;
      background: rgba(245, 87, 108, 0.05);
    }
    .option-btn .option-letter {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: var(--gray-100);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 600;
      flex-shrink: 0;
    }
    .option-btn.correct {
      border-color: #10B981;
      background: rgba(16, 185, 129, 0.1);
    }
    .option-btn.correct .option-letter {
      background: #10B981;
      color: #fff;
    }
    .option-btn.wrong {
      border-color: #ef4444;
      background: rgba(239, 68, 68, 0.1);
    }
    .option-btn.wrong .option-letter {
      background: #ef4444;
      color: #fff;
    }
    .option-btn.disabled {
      cursor: default;
      opacity: 0.7;
    }
    .explanation {
      background: #FFF9E6;
      padding: 16px;
      border-radius: var(--radius);
      margin-top: 16px;
      border-left: 4px solid #f59e0b;
    }
    .explanation h4 {
      color: #B8860B;
      font-size: 0.95rem;
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .explanation p {
      color: var(--gray-700);
      line-height: 1.6;
      font-size: 0.95rem;
    }
    .quiz-actions {
      display: flex;
      gap: 12px;
      margin-top: 20px;
    }
    .quiz-actions .btn {
      flex: 1;
    }
    .quiz-result {
      background: #fff;
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 40px;
      text-align: center;
    }
    .result-icon {
      font-size: 5rem;
      margin-bottom: 20px;
    }
    .result-score {
      font-size: 3rem;
      font-weight: 700;
      background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 16px;
    }
    .result-grade {
      font-size: 1.5rem;
      color: var(--gray-700);
      margin-bottom: 24px;
    }
    .result-stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
      margin-bottom: 24px;
    }
    .stat-item {
      padding: 16px;
      background: var(--gray-50);
      border-radius: var(--radius);
    }
    .stat-item .stat-num {
      font-size: 1.8rem;
      font-weight: 700;
      color: var(--primary);
    }
    .stat-item .stat-label {
      color: var(--gray-500);
      font-size: 0.85rem;
    }
    .quiz-actions-full {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .quiz-footer {
      margin-top: 40px;
    }
    .leaderboard {
      background: #fff;
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 24px;
    }
    .leaderboard h3 {
      font-size: 1.2rem;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .leaderboard-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .leaderboard-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px;
      background: var(--gray-50);
      border-radius: var(--radius);
    }
    .leaderboard-item.top-3 .rank {
      background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
      color: #fff;
    }
    .leaderboard-item .rank {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: var(--gray-200);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 600;
      flex-shrink: 0;
    }
    .leaderboard-item .info {
      flex: 1;
    }
    .leaderboard-item .info h4 {
      font-size: 0.95rem;
      margin-bottom: 2px;
    }
    .leaderboard-item .info span {
      font-size: 0.85rem;
      color: var(--gray-500);
    }
    .leaderboard-item .score {
      font-weight: 700;
      color: var(--primary);
    }
    @media (max-width: 768px) {
      .quiz-hero h1 {
        font-size: 1.6rem;
      }
      .quiz-question-card {
        padding: 20px;
      }
      .result-stats {
        grid-template-columns: 1fr;
      }
    }
  
/* 无障碍 - 焦点可见样式 (WCAG 2.1 AA) */
.skip-link {
  position: absolute;
  top: -100px;
  left: 50%;
  transform: translateX(-50%);
  background: var(--primary);
  color: #fff !important;
  padding: 12px 24px;
  border-radius: 0 0 8px 8px;
  z-index: 10000;
  font-weight: 600;
  transition: top 0.2s;
}
.skip-link:focus {
  top: 0;
  outline: 3px solid var(--primary-dark);
  outline-offset: 2px;
}

/* 全局焦点样式 */
:focus {
  outline: 3px solid var(--primary);
  outline-offset: 2px;
}
:focus:not(:focus-visible) {
  outline: none;
}
:focus-visible {
  outline: 3px solid var(--primary);
  outline-offset: 2px;
}

/* 链接焦点样式 */
a:focus,
button:focus,
[tabindex]:focus {
  outline: 3px solid var(--primary);
  outline-offset: 2px;
  border-radius: 2px;
}

/* 输入框焦点 */
input:focus,
textarea:focus,
select:focus {
  outline: 3px solid var(--primary);
  outline-offset: 0;
  border-color: var(--primary);
}

  <script>
    // 题库数据
    const questions = [
      // 世界地理类（50题）
      { id: 1, category: "世界地理", question: "哪个国家被称为"千岛之国"？", options: ["菲律宾", "印度尼西亚", "日本", "马尔代夫"], answer: 1, explanation: "印度尼西亚由约17508个岛屿组成，是世界上最大的群岛国家，被称为千岛之国。" },
      { id: 2, category: "世界地理", question: "世界上最长的河流是？", options: ["亚马逊河", "尼罗河", "长江", "密西西比河"], answer: 1, explanation: "尼罗河全长约6650公里，是世界上最长的河流。" },
      { id: 3, category: "世界地理", question: "巴黎是哪个国家的首都？", options: ["英国", "法国", "德国", "意大利"], answer: 1, explanation: "巴黎是法国的首都和政治、文化中心。" },
      { id: 4, category: "世界地理", question: "富士山在哪个国家？", options: ["韩国", "日本", "中国", "朝鲜"], answer: 1, explanation: "富士山位于日本本州中东部，是日本最高峰，海拔3776米。" },
      { id: 5, category: "世界地理", question: "澳大利亚的首都是？", options: ["悉尼", "墨尔本", "堪培拉", "布里斯班"], answer: 2, explanation: "堪培拉是澳大利亚的首都，而不是最大的城市悉尼或墨尔本。" },
      { id: 6, category: "世界地理", question: "死海位于哪两个国家之间？", options: ["以色列和约旦", "埃及和利比亚", "伊朗和伊拉克", "土耳其和叙利亚"], answer: 0, explanation: "死海位于以色列、约旦和巴勒斯坦三国交界处。" },
      { id: 7, category: "世界地理", question: "世界上最大的沙漠是？", options: ["撒哈拉沙漠", "戈壁沙漠", "阿拉伯沙漠", "克孜勒库姆沙漠"], answer: 0, explanation: "撒哈拉沙漠面积约906万平方公里，是世界上最大的热带沙漠。" },
      { id: 8, category: "世界地理", question: "马尔代夫位于哪个大洋？", options: ["太平洋", "大西洋", "印度洋", "北冰洋"], answer: 2, explanation: "马尔代夫位于印度洋，是印度洋上的群岛国家。" },
      { id: 9, category: "世界地理", question: "阿尔卑斯山脉横跨多少个国家？", options: ["4个", "5个", "6个", "8个"], answer: 2, explanation: "阿尔卑斯山脉横跨法国、瑞士、意大利、奥地利、斯洛文尼亚和列支敦士登6个国家。" },
      { id: 10, category: "世界地理", question: "日本主要由哪四个大岛组成？", options: ["本州、北海道、九州、四国", "本州、九州、冲绳、四国", "本州、北海道、九州、冲绳", "北海道、九州、琉球、四国"], answer: 0, explanation: "日本主要由本州、北海道、九州和四国四个大岛组成。" },
      { id: 11, category: "世界地理", question: "泰国旧称暹罗，位于哪个半岛？", options: ["朝鲜半岛", "马来半岛", "阿拉伯半岛", "印度半岛"], answer: 1, explanation: "泰国旧称暹罗，其南部位于马来半岛上。" },
      { id: 12, category: "世界地理", question: "世界上面积最大的国家是？", options: ["中国", "加拿大", "俄罗斯", "美国"], answer: 2, explanation: "俄罗斯总面积约1709万平方公里，是世界上面积最大的国家。" },
      { id: 13, category: "世界地理", question: "世界上人口最多的国家是？", options: ["印度", "中国", "美国", "印度尼西亚"], answer: 1, explanation: "中国是世界上人口最多的国家，约14亿人口。" },

      { id: 15, category: "世界地理", question: "柬埔寨的著名古迹吴哥窟位于哪个省？", options: ["金边", "暹粒", "西哈努克", "马德望"], answer: 1, explanation: "吴哥窟位于柬埔寨暹粒省，是世界最大的宗教建筑。" },

      gameState.correctCount = 0;
      gameState.wrongCount = 0;
      gameState.answers = [];

      renderQuestion();
    }

    // 渲染题目
    function renderQuestion() {
      const container = document.getElementById('quizContainer');
      const q = gameState.shuffledQuestions[gameState.currentQuestion];
      const progress = ((gameState.currentQuestion) / gameState.totalQuestions) * 100;

      container.innerHTML = `
        <div class="quiz-progress">
          <div class="progress-bar">
            <div class="fill" style="width: ${progress}%"></div>
          </div>
          <div class="progress-info">
            <span>第 ${gameState.currentQuestion + 1} / ${gameState.totalQuestions} 题</span>
            <span>得分: ${gameState.score}</span>
          </div>
        </div>

        <div class="quiz-question-card">
          <div class="question-header">
            <span class="question-number">${q.category}</span>
          </div>
          <div class="question-text">${q.question}</div>
          <div class="options-list">
            ${q.options.map((opt, i) => `
              <button class="option-btn" onclick="selectAnswer(${i})">
                <span class="option-letter">${String.fromCharCode(65 + i)}</span>
                <span>${opt}</span>
              </button>
            `).join('')}
          </div>
        </div>
      `;
    }

    // 选择答案
    function selectAnswer(index) {
      const q = gameState.shuffledQuestions[gameState.currentQuestion];
      const buttons = document.querySelectorAll('.option-btn');
      
      // 禁用所有按钮
      buttons.forEach(btn => btn.classList.add('disabled'));

      const isCorrect = index === q.answer;
      
      if (isCorrect) {
        buttons[index].classList.add('correct');
        gameState.score += 10;
        gameState.correctCount++;
      } else {
        buttons[index].classList.add('wrong');
        buttons[q.answer].classList.add('correct');
        gameState.wrongCount++;
      }

      gameState.answers.push({
        question: q.question,
        selected: index,
        correct: q.answer,
        isCorrect
      });

      // 显示解析
      const card = document.querySelector('.quiz-question-card');
      const explanation = document.createElement('div');
      explanation.className = 'explanation';
      explanation.innerHTML = `
        <h4>💡 ${isCorrect ? '回答正确！' : '回答错误'}</h4>
        <p>${q.explanation}</p>
      `;
      card.appendChild(explanation);

      // 添加下一题按钮
      const actions = document.createElement('div');
      actions.className = 'quiz-actions';
      if (gameState.currentQuestion < gameState.totalQuestions - 1) {
        actions.innerHTML = `
          <button class="btn btn-primary" onclick="nextQuestion()">下一题 →</button>
        `;
      } else {
        actions.innerHTML = `
          <button class="btn btn-primary" onclick="showResult()">查看结果 🏆</button>
        `;
      }
      card.appendChild(actions);
    }

    // 下一题
    function nextQuestion() {
      gameState.currentQuestion++;
      renderQuestion();
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    // 显示结果
    function showResult() {
      const container = document.getElementById('quizContainer');
      const percentage = Math.round((gameState.correctCount / gameState.totalQuestions) * 100);
      
      let grade, icon;
      if (percentage >= 90) {
        grade = '旅行达人 🏅';
        icon = '🏆';
      } else if (percentage >= 70) {
        grade = '旅行达人 🏅';
        icon = '🌟';
      } else if (percentage >= 50) {
        grade = '旅行新手 📚';
        icon = '👍';
      } else {
        grade = '需要加油 💪';
        icon = '📖';
      }

      // 保存到排行榜
      const name = '玩家' + Math.floor(Math.random() * 9999);
      const leaderboard = JSON.parse(localStorage.getItem('quiz_leaderboard') || '[]');
      leaderboard.push({
        name,
        score: gameState.score,
        date: new Date().toLocaleDateString('zh-CN')
      });
      leaderboard.sort((a, b) => b.score - a.score);
      localStorage.setItem('quiz_leaderboard', JSON.stringify(leaderboard.slice(0, 10)));

      container.innerHTML = `
        <div class="quiz-result">
          <div class="result-icon">${icon}</div>
          <div class="result-score">${gameState.score} 分</div>
          <div class="result-grade">${grade}</div>
          
          <div class="result-stats">
            <div class="stat-item">
              <div class="stat-num">${gameState.correctCount}</div>
              <div class="stat-label">答对</div>
            </div>
            <div class="stat-item">
              <div class="stat-num">${gameState.wrongCount}</div>
              <div class="stat-label">答错</div>
            </div>
            <div class="stat-item">
              <div class="stat-num">${percentage}%</div>
              <div class="stat-label">正确率</div>
            </div>
          </div>

          <div class="quiz-actions-full">
            <button class="btn btn-primary" onclick="startQuiz()">再玩一次 🔄</button>
            <button class="btn btn-outline" onclick="renderStartScreen()">返回首页 🏠</button>
          </div>
        </div>
      `;

      window.scrollTo({ top: 0, behavior: 'smooth' });
    }
  </script>
  <script src="js/performance.js" defer></script>
  <script src="js/enhanced-common.js" defer></script>

  <!-- PWA Service Worker -->
  <script src="js/pwa.js" defer></script>
  <script src="js/mobile.js" defer></script>
  <script src="js/customer-service.js" defer></script>
</body>
