<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的收藏 - 游导旅游 | 收藏导游与线路</title>
  <meta name="description" content="管理游导旅游收藏的导游、精品线路、旅行攻略，方便随时查看和规划下次旅行。">
  <meta name="keywords" content="我的收藏,收藏导游,收藏线路,收藏攻略">
  <meta name="robots" content="noindex, follow">
  <link rel="canonical" href="https://youdao-travel.com/my-favorites.html">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .favorites-page { max-width: 1000px; margin: 0 auto; padding: 20px; }
        
        .favorites-header {
            background: linear-gradient(135deg, #F59E0B 0%, #EF4444 100%);
            border-radius: 20px; padding: 30px; color: white;
            margin-bottom: 30px;
        }
        .favorites-header h1 { font-size: 28px; margin-bottom: 10px; }
        
        .section-title { font-size: 20px; color: #333; margin-bottom: 20px; display: flex; align-items: center; gap: 10px; }
        .section-title .count { font-size: 14px; color: #999; font-weight: 400; }
        
        .favorites-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; margin-bottom: 40px; }
        
        .favorite-card {
            background: white; border-radius: 15px; overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.08); transition: all 0.3s;
            cursor: pointer;
        }
        .favorite-card:hover { transform: translateY(-5px); box-shadow: 0 10px 30px rgba(0,0,0,0.15); }
        
        .favorite-cover {
            height: 100px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex; align-items: center; justify-content: center;
            font-size: 40px;
        }
        .favorite-info { padding: 20px; }
        .favorite-info h3 { font-size: 16px; color: #333; margin-bottom: 8px; }
        .favorite-info p { font-size: 13px; color: #666; margin-bottom: 10px; }
        .favorite-info .meta { font-size: 12px; color: #999; }
        
        .favorite-actions { display: flex; gap: 10px; padding: 0 20px 20px; }
        .favorite-actions button {
            flex: 1; padding: 10px; border: none; border-radius: 8px;
            cursor: pointer; font-size: 14px; transition: all 0.3s;
        }
        .favorite-actions .btn-view { background: #F3F4F6; color: #333; }
        .favorite-actions .btn-remove { background: #FEE2E2; color: #DC2626; }
        .favorite-actions button:hover { transform: scale(1.02); }
        
        .empty-state { text-align: center; padding: 60px; }
        .empty-state .icon { font-size: 60px; margin-bottom: 15px; }
        .empty-state p { color: #666; margin-bottom: 20px; }
        .btn-browse {
            padding: 12px 30px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white; border: none; border-radius: 10px;
            font-size: 16px; cursor: pointer;
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <a href="index.html" class="logo">🌍 游导旅游</a>
            <div class="nav-toggle" onclick="toggleNav()"><span></span><span></span><span></span></div>
            <div class="nav-links">
                <a href="index.html">首页</a>
                <a href="guides.html">🎤 找导游</a>
                <a href="routes.html">精品线路</a>
                <a href="guide-tools.html" style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: #fff;">🎒 导游工具</a>
                <a href="login.html" id="authLink" class="auth-nav-link">🔐 登录</a>
            </div>
        </div>
    </nav>
    
    <div class="favorites-page">
        <div class="favorites-header">
            <h1>❤️ 我的收藏</h1>
            <p>收藏的导游和线路，一键查看</p>
        </div>
        
        <h2 class="section-title">🎤 收藏的导游 <span class="count" id="guideCount">(3)</span></h2>
        <div class="favorites-grid" id="guideFavorites"></div>
        
        <h2 class="section-title">🗺️ 收藏的线路 <span class="count" id="routeCount">(2)</span></h2>
        <div class="favorites-grid" id="routeFavorites"></div>
    </div>
    
    <script>
        // Utils 工具函数
        const Utils = {
            showToast: function(message, type = 'info') {
                const toast = document.createElement('div');
                toast.style.cssText = `
                    position: fixed;
                    top: 20px;
                    left: 50%;
                    transform: translateX(-50%);
                    padding: 12px 24px;
                    border-radius: 8px;
                    color: white;
                    font-size: 14px;
                    z-index: 9999;
                    animation: slideDown 0.3s ease;
                    background-color: ${type === 'success' ? '#10B981' : type === 'error' ? '#EF4444' : type === 'warning' ? '#F59E0B' : '#3B82F6'};
                `;
                toast.textContent = message;
                document.body.appendChild(toast);
                setTimeout(() => {
                    toast.style.animation = 'slideUp 0.3s ease forwards';
                    setTimeout(() => toast.remove(), 300);
                }, 3000);
            }
        };

        // Auth 模拟
        const Auth = {
            getUser: function() {
                const userStr = localStorage.getItem('user');
                return Promise.resolve(userStr ? JSON.parse(userStr) : null);
            }
        };

        const sampleGuideFavorites = [
            { id: 1, name: '张导', subtitle: '高级导游 | 北京、西安', rating: 4.9, reviews: 328 },
            { id: 2, name: '李姐', subtitle: '金牌导游 | 广州、深圳', rating: 4.8, reviews: 256 },
            { id: 3, name: '王哥', subtitle: '资深导游 | 成都、杭州', rating: 5.0, reviews: 512 }
        ];

        const sampleRouteFavorites = [
            { id: 1, name: '川西小环线5日游', subtitle: '稻城亚丁 | 四姑娘山', price: '¥3,800起', duration: '5天4晚' },
            { id: 2, name: '西安历史深度游', subtitle: '兵马俑 | 华清池 | 大雁塔', price: '¥2,200起', duration: '4天3晚' }
        ];

        function init() {
            checkAuth();
            renderFavorites();
        }

        async function checkAuth() {
            const user = await Auth.getUser();
            if (!user) {
                window.location.href = 'login.html?redirect=my-favorites.html';
            }
        }
        
        function renderFavorites() {
            const guideGrid = document.getElementById('guideFavorites');
            const routeGrid = document.getElementById('routeFavorites');
            
            guideGrid.innerHTML = sampleGuideFavorites.map(g => `
                <div class="favorite-card">
                    <div class="favorite-cover">👨‍💼</div>
                    <div class="favorite-info">
                        <h3>${g.name}</h3>
                        <p>${g.subtitle}</p>
                        <div class="meta">⭐ ${g.rating} | ${g.reviews}评价</div>
                    </div>
                    <div class="favorite-actions">
                        <button class="btn-view" onclick="location.href='guide-detail.html?id=${g.id}'">查看</button>
                        <button class="btn-remove" onclick="removeFavorite(this, 'guide', ${g.id})">移除</button>
                    </div>
                </div>
            `).join('');
            
            routeGrid.innerHTML = sampleRouteFavorites.map(r => `
                <div class="favorite-card">
                    <div class="favorite-cover" style="background: linear-gradient(135deg, #10B981 0%, #059669 100%);">🏔️</div>
                    <div class="favorite-info">
                        <h3>${r.name}</h3>
                        <p>${r.subtitle}</p>
                        <div class="meta">💰 ${r.price} | 📅 ${r.duration}</div>
                    </div>
                    <div class="favorite-actions">
                        <button class="btn-view" onclick="location.href='routes.html'">查看</button>
                        <button class="btn-remove" onclick="removeFavorite(this, 'route', ${r.id})">移除</button>
                    </div>
                </div>
            `).join('');
            
            document.getElementById('guideCount').textContent = `(${sampleGuideFavorites.length})`;
            document.getElementById('routeCount').textContent = `(${sampleRouteFavorites.length})`;
        }
        
        function removeFavorite(btn, type, id) {
            if (confirm('确定要移除收藏吗？')) {
                const card = btn.closest('.favorite-card');
                card.style.animation = 'fadeOut 0.3s ease forwards';
                setTimeout(() => {
                    card.remove();
                    if (type === 'guide') {
                        const remaining = document.querySelectorAll('#guideFavorites .favorite-card');
                        document.getElementById('guideCount').textContent = `(${remaining.length})`;
                    } else {
                        const remaining = document.querySelectorAll('#routeFavorites .favorite-card');
                        document.getElementById('routeCount').textContent = `(${remaining.length})`;
                    }
                }, 300);
                Utils.showToast('已移除收藏', 'success');
            }
        }
        
        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
