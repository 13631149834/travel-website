<head>

    <style>
        :root {
            --warm-bg: linear-gradient(135deg, #fef3e2 0%, #fce7d6 50%, #fff5eb 100%);
            --warm-primary: #f97316;
            --warm-secondary: #fb923c;
            --warm-accent: #fed7aa;
            --warm-pink: #fda4af;
            --warm-gold: #fbbf24;
            --warm-purple: #c084fc;
            --warm-teal: #2dd4bf;
        }

        body {
            background: var(--warm-bg);
            min-height: 100vh;
        }

        .anniversary-page {
            max-width: 1000px;
            margin: 0 auto;
            padding: 30px 20px;
        }

        /* 头部区域 */
        .anniversary-header {
            background: linear-gradient(135deg, #f97316 0%, #ea580c 100%);
            border-radius: 24px;
            padding: 40px;
            color: white;
            margin-bottom: 30px;
            position: relative;
            overflow: hidden;
            text-align: center;
        }

        .anniversary-header::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255,255,255,0.1) 0%, transparent 60%);
            animation: shimmer 8s ease-in-out infinite;
        }

        @keyframes shimmer {
            0%, 100% { transform: translate(-10%, -10%); }
            50% { transform: translate(10%, 10%); }
        }

        .anniversary-header h1 {
            font-size: 32px;
            margin-bottom: 10px;
            position: relative;
        }

        .anniversary-header p {
            font-size: 16px;
            opacity: 0.9;
            position: relative;
        }

        .header-icons {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 20px;
            font-size: 28px;
        }

        /* 统计卡片 */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: white;
            border-radius: 16px;
            padding: 20px;
            text-align: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.06);
            transition: transform 0.3s;
        }

        .stat-card:hover {
            transform: translateY(-4px);
        }

        .stat-card .icon {
            font-size: 32px;
            margin-bottom: 8px;
        }

        .stat-card .value {
            font-size: 28px;
            font-weight: 700;
            color: var(--warm-primary);
        }

        .stat-card .label {
            font-size: 13px;
            color: #666;
            margin-top: 4px;
        }

        /* 倒计时区域 */
        .countdown-section {
            background: white;
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.06);
        }

        .section-title {
            font-size: 20px;
            color: #333;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .countdown-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
        }

        .countdown-card {
            background: linear-gradient(135deg, #fff7ed 0%, #ffedd5 100%);
            border-radius: 16px;
            padding: 24px;
            position: relative;
            overflow: hidden;
            border: 2px solid #fed7aa;
        }

        .countdown-card.urgent {
            background: linear-gradient(135deg, #fef2f2 0%, #fee2e2 100%);
            border-color: #fecaca;
        }

        .countdown-card .type-badge {
            display: inline-block;
            padding: 4px 12px;
            background: var(--warm-primary);
            color: white;
            border-radius: 20px;
            font-size: 12px;
            margin-bottom: 12px;
        }

        .countdown-card .event-name {
            font-size: 18px;
            font-weight: 600;
            color: #333;
            margin-bottom: 8px;
        }

        .countdown-card .event-date {
            font-size: 13px;
            color: #666;
            margin-bottom: 16px;
        }

        .countdown-timer {
            display: flex;
            gap: 8px;
        }

        .countdown-unit {
            text-align: center;
            background: white;
            padding: 10px 12px;
            border-radius: 10px;
            min-width: 50px;
        }

        .countdown-unit .number {
            font-size: 22px;
            font-weight: 700;
            color: var(--warm-primary);
        }

        .countdown-unit .unit {
            font-size: 11px;
            color: #999;
        }

        /* 添加按钮 */
        .add-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            width: 100%;
            padding: 16px;
            background: white;
            border: 2px dashed var(--warm-accent);
            border-radius: 16px;
            color: var(--warm-primary);
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s;
        }

        .add-btn:hover {
            background: #fff7ed;
            border-color: var(--warm-primary);
        }

        /* 里程碑区域 */
        .milestone-section {
            margin-bottom: 30px;
        }

        .milestone-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .milestone-tab {
            padding: 10px 20px;
            background: white;
            border-radius: 25px;
            cursor: pointer;
            font-size: 14px;
            color: #666;
            transition: all 0.3s;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
        }

        .milestone-tab:hover {
            background: #fff7ed;
        }

        .milestone-tab.active {
            background: linear-gradient(135deg, #f97316 0%, #ea580c 100%);
            color: white;
        }

        .milestone-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
        }

        .milestone-card {
            background: white;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.06);
            transition: transform 0.3s, box-shadow 0.3s;
        }

        .milestone-card:hover {
            transform: translateY(-6px);
            box-shadow: 0 12px 30px rgba(0,0,0,0.1);
        }

        .milestone-card-bg {
            height: 120px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 50px;
        }

        .milestone-card-bg.first-flight { background: linear-gradient(135deg, #3b82f6, #60a5fa); }
        .milestone-card-bg.free-travel { background: linear-gradient(135deg, #10b981, #34d399); }
        .milestone-card-bg.diving { background: linear-gradient(135deg, #06b6d4, #22d3ee); }
        .milestone-card-bg.aurora { background: linear-gradient(135deg, #8b5cf6, #a78bfa); }
        .milestone-card-bg.backpacking { background: linear-gradient(135deg, #f97316, #fb923c); }
        .milestone-card-bg.trip { background: linear-gradient(135deg, #ec4899, #f472b6); }

        .milestone-card-body {
            padding: 20px;
        }

        .milestone-card .milestone-type {
            font-size: 12px;
            color: var(--warm-primary);
            font-weight: 500;
            margin-bottom: 6px;
        }

        .milestone-card .milestone-title {
            font-size: 18px;
            font-weight: 600;
            color: #333;
            margin-bottom: 8px;
        }

        .milestone-card .milestone-date {
            font-size: 14px;
            color: #666;
            margin-bottom: 12px;
        }

        .milestone-card .milestone-location {
            font-size: 13px;
            color: #888;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .milestone-years {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 6px 12px;
            background: linear-gradient(135deg, #fef3c7 0%, #fde68a 100%);
            border-radius: 20px;
            font-size: 13px;
            font-weight: 600;
            color: #92400e;
        }

        /* 日历区域 */
        .calendar-section {
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.06);
            margin-bottom: 30px;
        }

        .calendar-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .calendar-nav {
            display: flex;
            gap: 10px;
        }

        .calendar-nav button {
            width: 36px;
            height: 36px;
            border: none;
            background: #f3f4f6;
            border-radius: 50%;
            cursor: pointer;
            transition: all 0.2s;
        }

        .calendar-nav button:hover {
            background: var(--warm-accent);
        }

        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 4px;
        }

        .calendar-weekday {
            text-align: center;
            padding: 10px;
            font-size: 12px;
            font-weight: 600;
            color: #999;
        }

        .calendar-day {
            aspect-ratio: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 14px;
            color: #666;
            position: relative;
        }

        .calendar-day:hover {
            background: #f3f4f6;
        }

        .calendar-day.other-month {
            color: #ccc;
        }

        .calendar-day.today {
            background: var(--warm-accent);
            font-weight: 600;
        }

        .calendar-day.has-event::after {
            content: '';
            width: 6px;
            height: 6px;
            background: var(--warm-primary);
            border-radius: 50%;
            position: absolute;
            bottom: 6px;
        }

        .calendar-day .event-count {
            font-size: 10px;
            color: var(--warm-primary);
            margin-top: 2px;
        }

        /* 模态框 */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            padding: 20px;
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal {
            background: white;
            border-radius: 24px;
            padding: 30px;
            max-width: 480px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }

        .modal-header h3 {
            font-size: 20px;
            color: #333;
        }

        .modal-close {
            width: 32px;
            height: 32px;
            border: none;
            background: #f3f4f6;
            border-radius: 50%;
            cursor: pointer;
            font-size: 18px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-size: 14px;
            font-weight: 500;
            color: #333;
            margin-bottom: 8px;
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e5e7eb;
            border-radius: 12px;
            font-size: 15px;
            transition: border-color 0.2s;
        }

        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: var(--warm-primary);
        }

        .type-selector {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
        }

        .type-option {
            padding: 16px 12px;
            border: 2px solid #e5e7eb;
            border-radius: 12px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
        }

        .type-option:hover {
            border-color: var(--warm-accent);
        }

        .type-option.selected {
            border-color: var(--warm-primary);
            background: #fff7ed;
        }

        .type-option .icon {
            font-size: 28px;
            margin-bottom: 6px;
        }

        .type-option .name {
            font-size: 13px;
            color: #333;
        }

        .btn-submit {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #f97316 0%, #ea580c 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .btn-submit:hover {
            transform: scale(1.02);
        }

        /* 空状态 */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #999;
        }

        .empty-state .icon {
            font-size: 60px;
            margin-bottom: 16px;
        }

        .empty-state h3 {
            font-size: 18px;
            color: #666;
            margin-bottom: 8px;
        }

        .empty-state p {
            font-size: 14px;
        }

        /* 响应式 */
        @media (max-width: 768px) {
            .stats-grid {
                grid-template-columns: repeat(2, 1fr);
            }
            
            .countdown-grid {
                grid-template-columns: 1fr;
            }
            
            .anniversary-header {
                padding: 30px 20px;
            }
            
            .anniversary-header h1 {
                font-size: 26px;
            }
            
            .milestone-list {
                grid-template-columns: 1fr;
            }
            
            .type-selector {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        /* 动画 */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .milestone-card, .countdown-card, .stat-card {
            animation: fadeIn 0.4s ease-out;
        }

        /* 删除按钮 */
        .delete-btn {
            position: absolute;
            top: 10px;
            right: 10px;
            width: 28px;
            height: 28px;
            border: none;
            background: rgba(255,255,255,0.9);
            border-radius: 50%;
            cursor: pointer;
            font-size: 14px;
            opacity: 0;
            transition: opacity 0.2s;
        }

        .countdown-card:hover .delete-btn,
        .milestone-card:hover .delete-btn {
            opacity: 1;
        }

        /* 编辑按钮 */
        .edit-btn {
            position: absolute;
            top: 10px;
            right: 45px;
            width: 28px;
            height: 28px;
            border: none;
            background: rgba(255,255,255,0.9);
            border-radius: 50%;
            cursor: pointer;
            font-size: 14px;
            opacity: 0;
            transition: opacity 0.2s;
        }

        .countdown-card:hover .edit-btn {
            opacity: 1;
        }

        /* 回顾统计 */
        .review-section {
            background: white;
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.06);
        }

        .review-timeline {
            position: relative;
            padding-left: 30px;
        }

        .review-timeline::before {
            content: '';
            position: absolute;
            left: 10px;
            top: 0;
            bottom: 0;
            width: 2px;
            background: linear-gradient(to bottom, var(--warm-primary), var(--warm-accent));
        }

        .timeline-item {
            position: relative;
            padding-bottom: 24px;
        }

        .timeline-item::before {
            content: '';
            position: absolute;
            left: -26px;
            top: 4px;
            width: 12px;
            height: 12px;
            background: white;
            border: 3px solid var(--warm-primary);
            border-radius: 50%;
        }

        .timeline-item .year {
            font-size: 12px;
            color: var(--warm-primary);
            font-weight: 600;
            margin-bottom: 4px;
        }

        .timeline-item .content {
            font-size: 14px;
            color: #333;
            line-height: 1.6;
        }
    
/* 无障碍 - 焦点可见样式 (WCAG 2.1 AA) */
.skip-link {
  position: absolute;
  top: -100px;
  left: 50%;
  transform: translateX(-50%);
  background: var(--primary);
  color: #fff !important;
  padding: 12px 24px;
  border-radius: 0 0 8px 8px;
  z-index: 10000;
  font-weight: 600;
  transition: top 0.2s;
}
.skip-link:focus {
  top: 0;
  outline: 3px solid var(--primary-dark);
  outline-offset: 2px;
}

/* 全局焦点样式 */
:focus {
  outline: 3px solid var(--primary);
  outline-offset: 2px;
}
:focus:not(:focus-visible) {
  outline: none;
}
:focus-visible {
  outline: 3px solid var(--primary);
  outline-offset: 2px;
}

/* 链接焦点样式 */
a:focus,
button:focus,
[tabindex]:focus {
  outline: 3px solid var(--primary);
  outline-offset: 2px;
  border-radius: 2px;
}

/* 输入框焦点 */
input:focus,
textarea:focus,
select:focus {
  outline: 3px solid var(--primary);
  outline-offset: 0;
  border-color: var(--primary);
}

</style>

        <!-- 里程碑区域 -->

                <span>🏆</span> 旅行里程碑
            </div>
            <div class="milestone-tabs" id="milestoneTabs">
                <span class="milestone-tab active" data-filter="all">全部</span>
                <span class="milestone-tab" data-filter="first-flight">首次出国</span>
                <span class="milestone-tab" data-filter="free-travel">首次自由行</span>
                <span class="milestone-tab" data-filter="diving">首次潜水</span>
                <span class="milestone-tab" data-filter="aurora">首次极光</span>
                <span class="milestone-tab" data-filter="backpacking">首次背包</span>
                <span class="milestone-tab" data-filter="trip">旅行纪念</span>
            </div>
            <div class="milestone-list" id="milestoneList">
                <!-- 动态生成 -->
            </div>
        </div>

        <!-- 日历区域 -->
        <div class="calendar-section">
            <div class="section-title">
                <span>📆</span> 纪念日历
            </div>
            <div class="calendar-header">
                <h3 id="calendarMonth">2024年1月</h3>
                <div class="calendar-nav">
                    <button onclick="changeMonth(-1)">‹</button>
                    <button onclick="changeMonth(1)">›</button>
                </div>
            </div>
            <div class="calendar-grid" id="calendarGrid">
                <!-- 动态生成 -->
            </div>
        </div>

        <!-- 回顾统计 -->
        <div class="review-section">
            <div class="section-title">
                <span>📖</span> 旅行回忆录
            </div>
            <div class="review-timeline" id="reviewTimeline">
                <!-- 动态生成 -->
            </div>
        </div>
    </div>

    <!-- 添加纪念日模态框 -->
    <div class="modal-overlay" id="addModal">
        <div class="modal">
            <div class="modal-header">
                <h3>📝 添加纪念日</h3>
                <button class="modal-close" onclick="closeModal()">×</button>
            </div>
            <form id="anniversaryForm">
                <div class="form-group">
                    <label>纪念日类型</label>
                    <div class="type-selector">
                        <div class="type-option" data-type="first-flight" onclick="selectType(this)">
                            <div class="icon">✈️</div>
                            <div class="name">首次出国</div>
                        </div>
                        <div class="type-option" data-type="free-travel" onclick="selectType(this)">
                            <div class="icon">🎒</div>
                            <div class="name">首次自由行</div>
                        </div>
                        <div class="type-option" data-type="diving" onclick="selectType(this)">
                            <div class="icon">🤿</div>
                            <div class="name">首次潜水</div>
                        </div>
                        <div class="type-option" data-type="aurora" onclick="selectType(this)">
                            <div class="icon">🌌</div>
                            <div class="name">首次极光</div>
                        </div>
                        <div class="type-option" data-type="backpacking" onclick="selectType(this)">
                            <div class="icon">🎒</div>
                            <div class="name">首次背包</div>
                        </div>
                        <div class="type-option" data-type="trip" onclick="selectType(this)">
                            <div class="icon">🌴</div>
                            <div class="name">旅行纪念</div>
                        </div>
                    </div>
                </div>
                <div class="form-group">
                    <label for="eventName">纪念日名称</label>
                    <input type="text" id="eventName" placeholder="例如：日本初体验" required>
                </div>
                <div class="form-group">
                    <label for="eventDate">日期</label>
                    <input type="date" id="eventDate" required>
                </div>
                <div class="form-group">
                    <label for="eventLocation">地点（可选）</label>
                    <input type="text" id="eventLocation" placeholder="例如：东京">
                </div>
                <div class="form-group">
                    <label for="eventNote">备注（可选）</label>
                    <textarea id="eventNote" rows="3" placeholder="记录一些特别的回忆..."></textarea>
                </div>
                <input type="hidden" id="editId">
                <button type="submit" class="btn-submit">保存纪念日</button>
            </form>
        </div>
    </div>

    
</main>
<footer id="main-footer" class="footer">
        <div class="container">
            <p>&copy; 2024 游导旅游 - 记录每一次美好旅程</p>
        </div>
    </footer>

    <script>
        // 数据存储
        const STORAGE_KEY = 'travel_anniversaries';
        
        // 示例数据
        const sampleData = [
            {
                id: '1',
                type: 'first-flight',
                name: '日本初体验',
                date: '2019-07-15',
                location: '东京',
                note: '第一次踏上日本的土地，樱花虽然已谢，但夏日的东京依然令人难忘'
            },
            {
                id: '2',
                type: 'diving',
                name: '马尔代夫深潜',
                date: '2021-10-08',
                location: '马尔代夫',
                note: '在印度洋深处看到了海龟和成群的鱼'
            },
            {
                id: '3',
                type: 'aurora',
                name: '冰岛极光之旅',
                date: '2022-02-14',
                location: '冰岛',
                note: '在北极圈内度过了最浪漫的情人节'
            },
            {
                id: '4',
                type: 'trip',
                name: '云南自驾游',
                date: '2023-08-20',
                location: '丽江',
                note: '和家人一起的自驾之旅'
            }
        ];

        // 获取数据
        function getAnniversaries() {
            const stored = localStorage.getItem(STORAGE_KEY);
            if (stored) {
                return JSON.parse(stored);
            }
            // 首次使用，存入示例数据
            saveAnniversaries(sampleData);
            return sampleData;
        }

        // 保存数据
        function saveAnniversaries(data) {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
        }

        // 计算倒计时
        function getCountdown(dateStr) {
            const now = new Date();
            const target = new Date(dateStr);
            const thisYear = new Date(now.getFullYear(), target.getMonth(), target.getDate());
            
            // 计算今年和明年的日期
            let nextDate = thisYear;
            if (thisYear < now) {
                nextDate = new Date(now.getFullYear() + 1, target.getMonth(), target.getDate());
            }
            
            const diff = nextDate - now;
            const days = Math.floor(diff / (1000 * 60 * 60 * 24));
            const hours = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
            
            return { days, hours, minutes, nextDate };
        }

        // 计算已过去的时间
        function getTimeSince(dateStr) {
            const now = new Date();
            const target = new Date(dateStr);
            const diff = now - target;
            const years = Math.floor(diff / (1000 * 60 * 60 * 24 * 365));
            const days = Math.floor((diff % (1000 * 60 * 60 * 24 * 365)) / (1000 * 60 * 60 * 24));
            
            if (years > 0) {
                return `${years}年${days}天`;
            }
            return `${days}天`;
        }

        // 格式化日期
        function formatDate(dateStr) {
            const date = new Date(dateStr);
            return `${date.getFullYear()}年${date.getMonth() + 1}月${date.getDate()}日`;
        }

        // 获取类型名称
        function getTypeName(type) {
            const names = {
                'first-flight': '首次出国',
                'free-travel': '首次自由行',
                'diving': '首次潜水',
                'aurora': '首次极光',
                'backpacking': '首次背包',
                'trip': '旅行纪念'
            };
            return names[type] || '纪念日';
        }

        // 获取类型图标
        function getTypeIcon(type) {
            const icons = {
                'first-flight': '✈️',
                'free-travel': '🎒',
                'diving': '🤿',
                'aurora': '🌌',
                'backpacking': '🎒',
                'trip': '🌴'
            };
            return icons[type] || '📅';
        }

        // 获取类型背景类
        function getTypeBgClass(type) {
            return type;
        }

        // 渲染倒计时卡片
        function renderCountdowns() {
            const data = getAnniversaries();
            const grid = document.getElementById('countdownGrid');
            
            // 计算即将到来的纪念日
            const upcoming = data
                .map(item => {
                    const countdown = getCountdown(item.date);
                    return { ...item, countdown };
                })
                .filter(item => item.countdown.days < 365) // 一年内的
                .sort((a, b) => a.countdown.days - b.countdown.days)
                .slice(0, 6);

            if (upcoming.length === 0) {
                grid.innerHTML = `
                    <div class="empty-state" style="grid-column: 1/-1;">
                        <div class="icon">📅</div>
                        <h3>暂无纪念日</h3>
                        <p>点击下方按钮添加您的第一个旅行纪念日</p>
                    </div>
                    <button class="add-btn" onclick="openModal()">
                        <span>➕</span> 添加纪念日
                    </button>
                `;
                return;
            }

            grid.innerHTML = upcoming.map(item => {
                const isUrgent = item.countdown.days <= 7;
                return `
                    <div class="countdown-card ${isUrgent ? 'urgent' : ''}">
                        <button class="delete-btn" onclick="deleteAnniversary('${item.id}')">×</button>
                        <span class="type-badge">${getTypeName(item.type)}</span>
                        <div class="event-name">${item.name}</div>
                        <div class="event-date">${formatDate(item.countdown.nextDate)}</div>
                        <div class="countdown-timer">
                            <div class="countdown-unit">
                                <div class="number">${item.countdown.days}</div>
                                <div class="unit">天</div>
                            </div>
                            <div class="countdown-unit">
                                <div class="number">${item.countdown.hours}</div>
                                <div class="unit">时</div>
                            </div>
                            <div class="countdown-unit">
                                <div class="number">${item.countdown.minutes}</div>
                                <div class="unit">分</div>
                            </div>
                        </div>
                    </div>
                `;
            }).join('') + `
                <button class="add-btn" onclick="openModal()">
                    <span>➕</span> 添加纪念日
                </button>
            `;
        }

        // 渲染里程碑列表
        function renderMilestones(filter = 'all') {
            const data = getAnniversaries();
            const list = document.getElementById('milestoneList');
            
            const filtered = filter === 'all' 
                ? data 
                : data.filter(item => item.type === filter);

            if (filtered.length === 0) {
                list.innerHTML = `
                    <div class="empty-state" style="grid-column: 1/-1;">
                        <div class="icon">🏆</div>
                        <h3>暂无里程碑</h3>
                        <p>添加您的旅行里程碑，记录每一个第一次</p>
                    </div>
                `;
                return;
            }

            list.innerHTML = filtered.map(item => `
                <div class="milestone-card">
                    <div class="milestone-card-bg ${getTypeBgClass(item.type)}">
                        ${getTypeIcon(item.type)}
                    </div>
                    <div class="milestone-card-body">
                        <div class="milestone-type">${getTypeName(item.type)}</div>
                        <div class="milestone-title">${item.name}</div>
                        <div class="milestone-date">${formatDate(item.date)}</div>
                        ${item.location ? `<div class="milestone-location">📍 ${item.location}</div>` : ''}
                        <div style="margin-top: 12px;">
                            <span class="milestone-years">🎉 ${getTimeSince(item.date)}</span>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        // 渲染日历
        let currentMonth = new Date();

        function renderCalendar() {
            const grid = document.getElementById('calendarGrid');
            const year = currentMonth.getFullYear();
            const month = currentMonth.getMonth();
            
            document.getElementById('calendarMonth').textContent = `${year}年${month + 1}月`;
            
            const firstDay = new Date(year, month, 1);
            const lastDay = new Date(year, month + 1, 0);
            const startWeekday = firstDay.getDay();
            const totalDays = lastDay.getDate();
            
            const data = getAnniversaries();
            const eventDates = {};
            data.forEach(item => {
                const date = new Date(item.date);
                if (date.getFullYear() === year && date.getMonth() === month) {
                    const key = date.getDate();
                    eventDates[key] = (eventDates[key] || 0) + 1;
                }
            });
            
            const weekdays = ['日', '一', '二', '三', '四', '五', '六'];
            let html = weekdays.map(d => `<div class="calendar-weekday">${d}</div>`).join('');
            
            // 上月空白
            for (let i = 0; i < startWeekday; i++) {
                html += `<div class="calendar-day other-month"></div>`;
            }
            
            // 当月日期
            const today = new Date();
            for (let day = 1; day <= totalDays; day++) {
                const isToday = today.getFullYear() === year && 
                               today.getMonth() === month && 
                               today.getDate() === day;
                const hasEvent = eventDates[day];
                
                html += `
                    <div class="calendar-day ${isToday ? 'today' : ''} ${hasEvent ? 'has-event' : ''}">
                        ${day}
                        ${hasEvent ? `<span class="event-count">${hasEvent}个</span>` : ''}
                    </div>
                `;
            }
            
            grid.innerHTML = html;
        }

        function changeMonth(delta) {
            currentMonth.setMonth(currentMonth.getMonth() + delta);
            renderCalendar();
        }

        // 渲染回顾时间线
        function renderTimeline() {
            const data = getAnniversaries();
            const timeline = document.getElementById('reviewTimeline');
            
            if (data.length === 0) {
                timeline.innerHTML = `
                    <div class="empty-state">
                        <div class="icon">📖</div>
                        <h3>暂无回忆</h3>
                        <p>添加纪念日后，这里将记录您的旅行故事</p>
                    </div>
                `;
                return;
            }
            
            // 按年份分组
            const byYear = {};
            data.forEach(item => {
                const year = new Date(item.date).getFullYear();
                if (!byYear[year]) byYear[year] = [];
                byYear[year].push(item);
            });
            
            const years = Object.keys(byYear).sort((a, b) => b - a);
            
            timeline.innerHTML = years.slice(0, 5).map(year => `
                <div class="timeline-item">
                    <div class="year">${year}年</div>
                    <div class="content">
                        ${byYear[year].map(item => `
                            <span>${getTypeIcon(item.type)} ${item.name}</span>
                            ${item.location ? ` @ ${item.location}` : ''}
                            <br>
                        `).join('')}
                    </div>
                </div>
            `).join('');
        }

        // 更新统计
        function updateStats() {
            const data = getAnniversaries();
            const today = new Date();
            
            // 提取去过的地方
            const countries = new Set();
            const locations = data.filter(item => item.location).map(item => item.location);
            
            // 计算旅行年数
            let yearsTravel = 0;
            if (data.length > 0) {
                const earliest = data.reduce((min, item) => 
                    new Date(item.date) < new Date(min.date) ? item : min, data[0]);
                yearsTravel = today.getFullYear() - new Date(earliest.date).getFullYear();
                if (yearsTravel < 1) yearsTravel = 1;
            }
            
            // 即将到来
            const upcoming = data.filter(item => {
                const countdown = getCountdown(item.date);
                return countdown.days <= 30 && countdown.days >= 0;
            }).length;
            
            document.getElementById('totalCount').textContent = data.length;
            document.getElementById('countryCount').textContent = Math.min(locations.length, 10);
            document.getElementById('yearsTravel').textContent = yearsTravel;
            document.getElementById('upcomingCount').textContent = upcoming;
        }

        // 模态框控制
        function openModal(editItem = null) {
            const modal = document.getElementById('addModal');
            modal.classList.add('active');
            
            if (editItem) {
                document.getElementById('editId').value = editItem.id;
                document.getElementById('eventName').value = editItem.name;
                document.getElementById('eventDate').value = editItem.date;
                document.getElementById('eventLocation').value = editItem.location || '';
                document.getElementById('eventNote').value = editItem.note || '';
                
                // 选中类型
                document.querySelectorAll('.type-option').forEach(opt => {
                    opt.classList.toggle('selected', opt.dataset.type === editItem.type);
                });
            } else {
                document.getElementById('anniversaryForm').reset();
                document.getElementById('editId').value = '';
                document.querySelectorAll('.type-option').forEach(opt => opt.classList.remove('selected'));
            }
        }

        function closeModal() {
            document.getElementById('addModal').classList.remove('active');
        }

        function selectType(el) {
            document.querySelectorAll('.type-option').forEach(opt => opt.classList.remove('selected'));
            el.classList.add('selected');
        }

        // 表单提交
        document.getElementById('anniversaryForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const selectedType = document.querySelector('.type-option.selected');
            if (!selectedType) {
                alert('请选择纪念日类型');
                return;
            }
            
            const editId = document.getElementById('editId').value;
            const data = getAnniversaries();
            
            const item = {
                id: editId || Date.now().toString(),
                type: selectedType.dataset.type,
                name: document.getElementById('eventName').value,
                date: document.getElementById('eventDate').value,
                location: document.getElementById('eventLocation').value,
                note: document.getElementById('eventNote').value
            };
            
            if (editId) {
                const index = data.findIndex(d => d.id === editId);
                if (index !== -1) data[index] = item;
            } else {
                data.push(item);
            }
            
            saveAnniversaries(data);
            closeModal();
            renderAll();
        });

        // 删除
        function deleteAnniversary(id) {
            if (!confirm('确定要删除这个纪念日吗？')) return;
            
            const data = getAnniversaries().filter(item => item.id !== id);
            saveAnniversaries(data);
            renderAll();
        }

        // 标签切换
        document.getElementById('milestoneTabs').addEventListener('click', function(e) {
            if (e.target.classList.contains('milestone-tab')) {
                document.querySelectorAll('.milestone-tab').forEach(t => t.classList.remove('active'));
                e.target.classList.add('active');
                renderMilestones(e.target.dataset.filter);
            }
        });

        // 渲染全部
        function renderAll() {
            renderCountdowns();
            renderMilestones();
            renderCalendar();
            renderTimeline();
            updateStats();
        }

        // 初始化
        document.addEventListener('DOMContentLoaded', renderAll);

        // 点击遮罩关闭
        document.getElementById('addModal').addEventListener('click', function(e) {
            if (e.target === this) closeModal();
        });

        // 更新倒计时
        setInterval(() => {
            renderCountdowns();
        }, 60000);
    </script>
  <script src="js/mobile.js" defer></script>
  <script src="js/customer-service.js" defer></script>
