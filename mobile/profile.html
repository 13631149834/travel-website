  <script>
    // 签到功能
    const CHECKIN_KEY = 'checkinData';
    
    function getCheckinData() {
      return JSON.parse(localStorage.getItem(CHECKIN_KEY) || JSON.stringify({
        lastDate: null,
        days: 0
      }));
    }
    
    function doCheckin() {
      const today = new Date().toDateString();
      const data = getCheckinData();
      const btn = document.getElementById('checkinBtn');
      
      if (data.lastDate === today) {
        alert('今日已签到，明天再来吧！');
        return;
      }
      
      // 计算连续签到
      const yesterday = new Date();
      yesterday.setDate(yesterday.getDate() - 1);
      
      if (data.lastDate === yesterday.toDateString()) {
        data.days += 1;
      } else {
        data.days = 1;
      }
      
      data.lastDate = today;
      localStorage.setItem(CHECKIN_KEY, JSON.stringify(data));
      
      // 更新UI
      document.getElementById('checkinDays').textContent = data.days;
      btn.textContent = '已签到';
      btn.classList.add('signed');
      btn.disabled = true;
      
      // 添加积分
      let points = parseInt(localStorage.getItem('userPoints') || '5680');
      points += 10; // 签到获得10积分
      localStorage.setItem('userPoints', points.toString());
      document.getElementById('pointsCount').textContent = points.toLocaleString();
      
      alert(`签到成功！获得 10 积分，连续签到 ${data.days} 天！`);
    }
    
    function initCheckin() {
      const data = getCheckinData();
      const today = new Date().toDateString();
      const btn = document.getElementById('checkinBtn');
      
      document.getElementById('checkinDays').textContent = data.days;
      
      if (data.lastDate === today) {
        btn.textContent = '已签到';
        btn.classList.add('signed');
        btn.disabled = true;
      }
    }
    
    // 加载用户数据
    function loadUserData() {
      // 收藏数量
      const favorites = JSON.parse(localStorage.getItem('favorites') || '[]');
      document.getElementById('favoritesCount').textContent = favorites.length;
      document.getElementById('menuFavoritesCount').textContent = favorites.length;
      
      // 积分
      const points = localStorage.getItem('userPoints') || '5680';
      document.getElementById('pointsCount').textContent = parseInt(points).toLocaleString();
      
      // 消息数量
      const unreadCount = localStorage.getItem('unreadMessages') || '0';
      const badge = document.getElementById('messageBadge');
      if (parseInt(unreadCount) > 0) {
        badge.textContent = unreadCount;
        badge.style.display = 'inline';
      }
    }
    
    // 触摸反馈
    document.querySelectorAll('.menu-item, .tool-item, .profile-stat').forEach(item => {
      item.addEventListener('touchstart', function() {
        this.style.opacity = '0.7';
      }, { passive: true });
      
      item.addEventListener('touchend', function() {
        this.style.opacity = '1';
      }, { passive: true });
    });
    
    // 初始化
    initCheckin();
    loadUserData();
  </script>
