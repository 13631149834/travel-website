<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>导游主页 - TravelHub</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/guide/guide-tools.css">
  <link rel="stylesheet" href="css/guide/profile.css">
  <style>
    body {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
    }
    
    .preview-container {
      max-width: 600px;
      margin: 0 auto;
      padding: 20px;
    }
    
    .preview-card {
      background: #fff;
      border-radius: 20px;
      padding: 30px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.2);
      text-align: center;
    }
    
    .preview-avatar-large {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      margin: 0 auto 20px;
      overflow: hidden;
      border: 4px solid #667eea;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    
    .preview-avatar-large img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    
    .preview-name {
      font-size: 1.8rem;
      font-weight: 700;
      color: var(--gray-900);
      margin-bottom: 8px;
    }
    
    .preview-title {
      color: #667eea;
      font-size: 1.1rem;
      margin-bottom: 16px;
    }
    
    .preview-intro {
      color: var(--gray-600);
      line-height: 1.7;
      margin-bottom: 24px;
      padding: 16px;
      background: #f9f9f9;
      border-radius: 12px;
    }
    
    .preview-info-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
      margin-bottom: 24px;
    }
    
    .preview-info-item {
      padding: 16px;
      background: #f9f9f9;
      border-radius: 12px;
      text-align: center;
    }
    
    .preview-info-item .label {
      font-size: 0.85rem;
      color: var(--gray-500);
      margin-bottom: 4px;
    }
    
    .preview-info-item .value {
      font-weight: 600;
      color: var(--gray-800);
      font-size: 0.95rem;
    }
    
    .preview-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
      margin-bottom: 24px;
    }
    
    .preview-tag {
      padding: 8px 16px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: #fff;
      border-radius: 20px;
      font-size: 0.9rem;
    }
    
    .preview-contact {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-bottom: 24px;
    }
    
    .preview-contact button {
      width: 100%;
      justify-content: center;
    }
    
    .contact-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 16px;
      background: #f9f9f9;
      border-radius: 8px;
      justify-content: center;
    }
    
    .contact-label {
      color: var(--gray-500);
      font-size: 0.9rem;
    }
    
    .contact-value {
      color: var(--gray-800);
      font-weight: 500;
    }
    
    .preview-footer {
      padding-top: 20px;
      border-top: 1px solid var(--gray-200);
      color: var(--gray-500);
      font-size: 0.85rem;
    }
    
    .license-info {
      background: #f0f9ff;
      padding: 16px;
      border-radius: 12px;
      margin-bottom: 20px;
      text-align: left;
    }
    
    .license-info h4 {
      color: #667eea;
      margin-bottom: 12px;
      font-size: 1rem;
    }
    
    .license-info p {
      color: var(--gray-700);
      margin-bottom: 8px;
      font-size: 0.9rem;
    }
    
    .routes-section {
      text-align: left;
      margin-bottom: 20px;
    }
    
    .routes-section h4 {
      color: var(--gray-800);
      margin-bottom: 12px;
      font-size: 1rem;
    }
    
    .route-preview-item {
      padding: 12px;
      background: #f9f9f9;
      border-radius: 8px;
      margin-bottom: 8px;
    }
    
    .route-preview-name {
      font-weight: 600;
      color: var(--gray-800);
      margin-bottom: 4px;
    }
    
    .route-preview-desc {
      font-size: 0.85rem;
      color: var(--gray-500);
    }
    
    .no-data {
      color: var(--gray-500);
      font-style: italic;
    }
    
    @media (max-width: 480px) {
      .preview-info-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="preview-container">
    <div class="preview-card">
      <div class="preview-avatar-large" id="avatarContainer">
        <img id="previewAvatar" src="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='50' x='50' text-anchor='middle' font-size='50'>👤</text></svg>" alt="头像">
      </div>
      
      <div class="preview-name" id="previewName">导游昵称</div>
      <div class="preview-title" id="previewTitle">初级导游 · 从业0年</div>
      <div class="preview-intro" id="previewIntro">暂无简介</div>
      
      <!-- 资质信息 -->
      <div class="license-info" id="licenseInfo" style="display: none;">
        <h4>📜 资质认证</h4>
        <p><strong>导游证号：</strong><span id="licenseNumber">-</span></p>
        <p><strong>导游等级：</strong><span id="licenseLevel">-</span></p>
      </div>
      
      <!-- 擅长线路 -->
      <div class="routes-section" id="routesSection" style="display: none;">
        <h4>🗺️ 擅长线路</h4>
        <div id="routesList"></div>
      </div>
      
      <!-- 信息卡片 -->
      <div class="preview-info-grid">
        <div class="preview-info-item">
          <div class="label">服务语言</div>
          <div class="value" id="previewLanguages">中文</div>
        </div>
        <div class="preview-info-item">
          <div class="label">服务城市</div>
          <div class="value" id="previewCities">全国</div>
        </div>
        <div class="preview-info-item">
          <div class="label">服务类型</div>
          <div class="value" id="previewServiceTypes">全部类型</div>
        </div>
        <div class="preview-info-item">
          <div class="label">擅长领域</div>
          <div class="value" id="previewExpertiseCount">-</div>
        </div>
      </div>
      
      <!-- 擅长领域标签 -->
      <div class="preview-tags" id="previewExpertise"></div>
      
      <!-- 联系方式 -->
      <div class="preview-contact">
        <button class="btn btn-primary" onclick="contactGuide()">
          📞 联系导游
        </button>
      </div>
      
      <div style="display: flex; flex-direction: column; gap: 8px; margin-bottom: 20px;">
        <div class="contact-item" id="phoneRow" style="display: none;">
          <span class="contact-label">📱 手机：</span>
          <span class="contact-value" id="previewPhone">-</span>
        </div>
        <div class="contact-item" id="wechatRow" style="display: none;">
          <span class="contact-label">💬 微信：</span>
          <span class="contact-value" id="previewWechat">-</span>
        </div>
        <div class="contact-item" id="emailRow" style="display: none;">
          <span class="contact-label">📧 邮箱：</span>
          <span class="contact-value" id="previewEmail">-</span>
        </div>
      </div>
      
      <div class="preview-footer">
        <p>由 TravelHub 导游工具生成</p>
        <p style="margin-top: 4px;">youdao-travel.com</p>
      </div>
    </div>
  </div>

  <script>
    // 加载导游数据
    function loadProfileData() {
      const data = localStorage.getItem('guide_profile');
      if (!data) {
        document.querySelector('.preview-card').innerHTML = `
          <div style="padding: 60px 20px; text-align: center;">
            <div style="font-size: 4rem; margin-bottom: 16px;">👤</div>
            <h3>暂无导游信息</h3>
            <p style="color: var(--gray-600); margin-top: 8px;">该导游还未完善个人主页</p>
          </div>
        `;
        return;
      }
      
      const profile = JSON.parse(data);
      
      // 头像
      if (profile.avatar) {
        document.getElementById('previewAvatar').src = profile.avatar;
      }
      
      // 基本信息
      document.getElementById('previewName').textContent = profile.nickname || profile.name || '导游昵称';
      document.getElementById('previewTitle').textContent = `${profile.licenseLevel || '初级'}导游 · 从业${profile.years || 0}年`;
      document.getElementById('previewIntro').textContent = profile.intro || '暂无简介';
      
      // 资质信息
      if (profile.licenseNumber || profile.licenseLevel) {
        document.getElementById('licenseInfo').style.display = 'block';
        document.getElementById('licenseNumber').textContent = profile.licenseNumber || '未填写';
        document.getElementById('licenseLevel').textContent = profile.licenseLevel || '初级';
      }
      
      // 擅长线路
      if (profile.routes && profile.routes.length > 0) {
        document.getElementById('routesSection').style.display = 'block';
        document.getElementById('routesList').innerHTML = profile.routes.map(route => `
          <div class="route-preview-item">
            <div class="route-preview-name">${route.name}</div>
            <div class="route-preview-desc">${route.description || '暂无描述'}</div>
          </div>
        `).join('');
      }
      
      // 服务信息
      const typeMap = { group: '跟团游', custom: '定制游', private: '私家团' };
      const types = (profile.serviceTypes || []).map(t => typeMap[t] || t);
      document.getElementById('previewLanguages').textContent = profile.languages?.join(' / ') || '中文';
      document.getElementById('previewCities').textContent = profile.cities?.join('、') || '全国';
      document.getElementById('previewServiceTypes').textContent = types.join(' / ') || '全部类型';
      document.getElementById('previewExpertiseCount').textContent = profile.expertise?.length > 0 ? `${profile.expertise.length}项` : '-';
      
      // 擅长领域标签
      if (profile.expertise && profile.expertise.length > 0) {
        document.getElementById('previewExpertise').innerHTML = profile.expertise.map(tag => 
          `<span class="preview-tag">${tag}</span>`
        ).join('');
      }
      
      // 联系方式
      if (profile.phone) {
        document.getElementById('phoneRow').style.display = 'flex';
        document.getElementById('previewPhone').textContent = profile.phone;
      }
      
      if (profile.wechat) {
        document.getElementById('wechatRow').style.display = 'flex';
        document.getElementById('previewWechat').textContent = profile.wechat;
      }
      
      if (profile.email) {
        document.getElementById('emailRow').style.display = 'flex';
        document.getElementById('previewEmail').textContent = profile.email;
      }
    }
    
    // 联系导游
    function contactGuide() {
      const phone = document.getElementById('previewPhone').textContent;
      const wechat = document.getElementById('previewWechat').textContent;
      
      if (phone && phone !== '-') {
        window.location.href = `tel:${phone}`;
      } else if (wechat && wechat !== '-') {
        navigator.clipboard.writeText(wechat).then(() => {
          alert(`微信号已复制：${wechat}\n\n请打开微信添加好友`);
        });
      } else {
        alert('该导游暂未提供联系方式');
      }
    }
    
    // 页面加载完成后加载数据
    document.addEventListener('DOMContentLoaded', loadProfileData);
  </script>
</body>
</html>
