<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>推送设置 - 游导旅游</title>
    <meta name="description" content="管理您的消息推送设置">
    <link rel="preload" href="css/style.css" as="style">
    <link rel="stylesheet" href="css/accessibility.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/mobile.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #f5f6fa; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }

        .page-container { max-width: 800px; margin: 0 auto; padding: 20px; }
        .page-header { margin-bottom: 30px; }
        .page-title { font-size: 1.8rem; color: #333; display: flex; align-items: center; gap: 12px; }
        .page-title .icon { font-size: 1.5rem; }
        .page-desc { color: #666; margin-top: 8px; font-size: 0.95rem; }

        .card { background: #fff; border-radius: 16px; padding: 24px; margin-bottom: 20px; box-shadow: 0 2px 12px rgba(0,0,0,0.06); }
        .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; padding-bottom: 16px; border-bottom: 1px solid #eee; }
        .card-title { font-size: 1.1rem; font-weight: 600; color: #333; display: flex; align-items: center; gap: 8px; }
        .card-title .icon { font-size: 1.3rem; }

        /* 开关样式 */
        .toggle-switch { position: relative; width: 52px; height: 28px; }
        .toggle-switch input { opacity: 0; width: 0; height: 0; }
        .toggle-slider { position: absolute; cursor: pointer; inset: 0; background: #ccc; border-radius: 28px; transition: 0.3s; }
        .toggle-slider:before { content: ''; position: absolute; width: 22px; height: 22px; left: 3px; bottom: 3px; background: white; border-radius: 50%; transition: 0.3s; }
        .toggle-switch input:checked + .toggle-slider { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
        .toggle-switch input:checked + .toggle-slider:before { transform: translateX(24px); }

        /* 类型列表 */
        .type-list { display: flex; flex-direction: column; gap: 16px; }
        .type-item { display: flex; justify-content: space-between; align-items: center; padding: 16px; background: #f8f9fa; border-radius: 12px; transition: all 0.3s; }
        .type-item:hover { background: #f0f2f5; }
        .type-info { display: flex; align-items: center; gap: 14px; }
        .type-icon { font-size: 1.6rem; width: 44px; height: 44px; display: flex; align-items: center; justify-content: center; background: #fff; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
        .type-text .name { font-weight: 600; color: #333; font-size: 1rem; }
        .type-text .desc { color: #888; font-size: 0.85rem; margin-top: 4px; }
        .type-badge { font-size: 0.75rem; padding: 4px 10px; border-radius: 20px; background: #e8eaff; color: #667eea; }

        /* 免打扰时段 */
        .quiet-hours { display: flex; align-items: center; gap: 16px; flex-wrap: wrap; }
        .time-input { display: flex; align-items: center; gap: 8px; }
        .time-input input { padding: 10px 14px; border: 1px solid #ddd; border-radius: 8px; font-size: 1rem; width: 110px; text-align: center; }
        .time-input input:focus { outline: none; border-color: #667eea; }
        .time-separator { color: #888; font-size: 1.2rem; }

        /* 频率设置 */
        .frequency-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; }
        .frequency-item { background: #f8f9fa; padding: 16px; border-radius: 12px; }
        .frequency-item label { display: block; color: #666; font-size: 0.9rem; margin-bottom: 8px; }
        .frequency-item input { width: 100%; padding: 10px 14px; border: 1px solid #ddd; border-radius: 8px; font-size: 1rem; }
        .frequency-item input:focus { outline: none; border-color: #667eea; }

        /* 统计卡片 */
        .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
        @media (max-width: 600px) { .stats-grid { grid-template-columns: repeat(2, 1fr); } }
        .stat-card { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 20px 16px; border-radius: 12px; text-align: center; }
        .stat-card.orange { background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%); }
        .stat-card.green { background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%); }
        .stat-card.yellow { background: linear-gradient(135deg, #43e97b 0%, #38f9d7 100%); }
        .stat-value { font-size: 1.8rem; font-weight: 700; }
        .stat-label { font-size: 0.85rem; opacity: 0.9; margin-top: 6px; }

        /* 按钮 */
        .btn { padding: 12px 24px; border: none; border-radius: 10px; font-size: 1rem; cursor: pointer; transition: all 0.3s; font-weight: 500; }
        .btn-primary { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4); }
        .btn-secondary { background: #f0f0f0; color: #666; }
        .btn-secondary:hover { background: #e0e0e0; }

        /* 提示框 */
        .alert { padding: 14px 18px; border-radius: 10px; margin-bottom: 20px; display: flex; align-items: center; gap: 12px; }
        .alert-success { background: #e8f5e9; color: #2e7d32; }
        .alert-warning { background: #fff8e1; color: #f57c00; }
        .alert-error { background: #ffebee; color: #c62828; }

        /* 保存按钮 */
        .save-bar { position: fixed; bottom: 0; left: 0; right: 0; background: #fff; padding: 16px 20px; box-shadow: 0 -4px 20px rgba(0,0,0,0.1); display: flex; justify-content: center; gap: 12px; z-index: 100; }
        .save-bar .btn { min-width: 140px; }

        /* 浏览器推送状态 */
        .browser-status { display: flex; align-items: center; gap: 16px; padding: 16px; background: #f8f9fa; border-radius: 12px; margin-bottom: 16px; }
        .status-indicator { width: 12px; height: 12px; border-radius: 50%; }
        .status-indicator.granted { background: #4caf50; }
        .status-indicator.denied { background: #f44336; }
        .status-indicator.default { background: #ff9800; }
        .status-indicator.unsupported { background: #9e9e9e; }

        /* 频道设置 */
        .channel-item { display: flex; justify-content: space-between; align-items: center; padding: 16px; background: #f8f9fa; border-radius: 12px; margin-bottom: 12px; }
        .channel-info { display: flex; align-items: center; gap: 12px; }
        .channel-icon { font-size: 1.4rem; }
        .channel-text .name { font-weight: 600; color: #333; }
        .channel-text .address { color: #888; font-size: 0.85rem; margin-top: 2px; }

        /* 高级设置 */
        .advanced-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 16px; }
        .advanced-item { display: flex; justify-content: space-between; align-items: center; padding: 14px 16px; background: #f8f9fa; border-radius: 10px; }

        /* 快捷操作 */
        .quick-actions { display: flex; gap: 12px; flex-wrap: wrap; }
        .quick-btn { padding: 10px 18px; background: #f0f2f5; border: 1px solid #e0e0e0; border-radius: 8px; font-size: 0.9rem; cursor: pointer; transition: all 0.3s; display: flex; align-items: center; gap: 8px; }
        .quick-btn:hover { background: #e8e8e8; }

        .padding-bottom { padding-bottom: 100px; }
    </style>
</head>
<body>
    <div class="page-container padding-bottom">
        <!-- 页面头部 -->
        <div class="page-header">
            <h1 class="page-title">
                <span class="icon">🔔</span>
                推送设置
            </h1>
            <p class="page-desc">管理您的消息推送接收方式，免打扰时段和通知偏好</p>
        </div>

        <!-- 提示区域 -->
        <div id="alertContainer"></div>

        <!-- 浏览器推送状态 -->
        <div class="card" id="browserStatusCard">
            <div class="card-header">
                <div class="card-title">
                    <span class="icon">🌐</span>
                    浏览器推送
                </div>
            </div>
            <div class="browser-status" id="browserStatus">
                <span class="status-indicator" id="statusIndicator"></span>
                <div class="status-text">
                    <div class="name" id="statusName">检测中...</div>
                    <div class="desc" id="statusDesc">正在获取浏览器推送状态</div>
                </div>
                <button class="btn btn-primary" id="requestPermissionBtn" style="margin-left: auto; display: none;">
                    开启推送
                </button>
            </div>
        </div>

        <!-- 基础开关 -->
        <div class="card">
            <div class="card-header">
                <div class="card-title">
                    <span class="icon">⚙️</span>
                    基础设置
                </div>
            </div>
            <div class="type-list">
                <div class="type-item">
                    <div class="type-info">
                        <div class="type-icon">🔔</div>
                        <div class="type-text">
                            <div class="name">开启推送通知</div>
                            <div class="desc">接收平台推送的消息通知</div>
                        </div>
                    </div>
                    <label class="toggle-switch">
                        <input type="checkbox" id="pushEnabled" checked>
                        <span class="toggle-slider"></span>
                    </label>
                </div>
                <div class="type-item">
                    <div class="type-info">
                        <div class="type-icon">🔊</div>
                        <div class="type-text">
                            <div class="name">声音提醒</div>
                            <div class="desc">收到通知时播放提示音</div>
                        </div>
                    </div>
                    <label class="toggle-switch">
                        <input type="checkbox" id="soundEnabled" checked>
                        <span class="toggle-slider"></span>
                    </label>
                </div>
                <div class="type-item">
                    <div class="type-info">
                        <div class="type-icon">📳</div>
                        <div class="type-text">
                            <div class="name">震动提醒</div>
                            <div class="desc">收到通知时震动提示（移动端）</div>
                        </div>
                    </div>
                    <label class="toggle-switch">
                        <input type="checkbox" id="vibrationEnabled" checked>
                        <span class="toggle-slider"></span>
                    </label>
                </div>
            </div>
        </div>

        <!-- 推送类型 -->
        <div class="card">
            <div class="card-header">
                <div class="card-title">
                    <span class="icon">📋</span>
                    推送类型
                </div>
                <button class="quick-btn" id="enableAllTypes">
                    全开
                </button>
            </div>
            <div class="type-list" id="typeList">
                <!-- 由JS动态生成 -->
            </div>
        </div>

        <!-- 免打扰时段 -->
        <div class="card">
            <div class="card-header">
                <div class="card-title">
                    <span class="icon">🌙</span>
                    免打扰时段
                </div>
                <label class="toggle-switch">
                    <input type="checkbox" id="quietHoursEnabled">
                    <span class="toggle-slider"></span>
                </label>
            </div>
            <div class="quiet-hours">
                <div class="time-input">
                    <input type="time" id="quietHoursStart" value="22:00">
                    <span class="time-separator">至</span>
                    <input type="time" id="quietHoursEnd" value="08:00">
                </div>
                <span style="color: #888; font-size: 0.9rem;">免打扰时段内将暂停推送</span>
            </div>
        </div>

        <!-- 推送频率 -->
        <div class="card">
            <div class="card-header">
                <div class="card-title">
                    <span class="icon">📊</span>
                    推送频率
                </div>
            </div>
            <div class="frequency-grid">
                <div class="frequency-item">
                    <label>每日最大推送数</label>
                    <input type="number" id="maxPerDay" value="20" min="1" max="100">
                </div>
                <div class="frequency-item">
                    <label>每小时最大推送数</label>
                    <input type="number" id="maxPerHour" value="5" min="1" max="20">
                </div>
                <div class="frequency-item">
                    <label>最小推送间隔（秒）</label>
                    <input type="number" id="minInterval" value="60" min="0" max="3600">
                </div>
            </div>
        </div>

        <!-- 推送统计 -->
        <div class="card">
            <div class="card-header">
                <div class="card-title">
                    <span class="icon">📈</span>
                    推送统计
                </div>
                <div class="quick-actions">
                    <button class="quick-btn" id="refreshStats">
                        🔄 刷新
                    </button>
                    <button class="quick-btn" id="exportStats">
                        📥 导出
                    </button>
                </div>
            </div>
            <div class="stats-grid" id="statsGrid">
                <div class="stat-card">
                    <div class="stat-value" id="statTotal">0</div>
                    <div class="stat-label">总推送数</div>
                </div>
                <div class="stat-card orange">
                    <div class="stat-value" id="statClicked">0</div>
                    <div class="stat-label">点击数</div>
                </div>
                <div class="stat-card green">
                    <div class="stat-value" id="statClickRate">0%</div>
                    <div class="stat-label">点击率</div>
                </div>
                <div class="stat-card yellow">
                    <div class="stat-value" id="statConverted">0</div>
                    <div class="stat-label">转化数</div>
                </div>
            </div>
        </div>

        <!-- 高级设置 -->
        <div class="card">
            <div class="card-header">
                <div class="card-title">
                    <span class="icon">🔧</span>
                    高级设置
                </div>
            </div>
            <div class="advanced-grid">
                <div class="advanced-item">
                    <span>显示消息预览</span>
                    <label class="toggle-switch">
                        <input type="checkbox" id="showPreview" checked>
                        <span class="toggle-slider"></span>
                    </label>
                </div>
                <div class="advanced-item">
                    <span>需交互关闭</span>
                    <label class="toggle-switch">
                        <input type="checkbox" id="requireInteraction">
                        <span class="toggle-slider"></span>
                    </label>
                </div>
            </div>
        </div>
    </div>

    <!-- 保存栏 -->
    <div class="save-bar">
        <button class="btn btn-secondary" id="resetBtn">恢复默认</button>
        <button class="btn btn-primary" id="saveBtn">保存设置</button>
    </div>

    <script src="js/push/push-settings.js"></script>
    <script src="js/push/push-statistics.js"></script>
    <script src="js/push/push-init.js"></script>
    <script>
        // 推送设置页面逻辑
        document.addEventListener('DOMContentLoaded', function() {
            const settings = window.pushSettings;
            const stats = window.pushStatistics;

            // 初始化类型列表
            function initTypeList() {
                const typeList = document.getElementById('typeList');
                const types = settings.settings.types;

                typeList.innerHTML = Object.entries(types).map(([key, config]) => `
                    <div class="type-item" data-type="${key}">
                        <div class="type-info">
                            <div class="type-icon">${config.icon}</div>
                            <div class="type-text">
                                <div class="name">${config.label}</div>
                                <div class="desc">${config.description}</div>
                            </div>
                        </div>
                        <label class="toggle-switch">
                            <input type="checkbox" class="type-toggle" data-type="${key}" ${config.enabled ? 'checked' : ''}>
                            <span class="toggle-slider"></span>
                        </label>
                    </div>
                `).join('');
            }

            // 更新浏览器推送状态显示
            function updateBrowserStatus() {
                const status = settings.getBrowserPushStatus();
                const indicator = document.getElementById('statusIndicator');
                const nameEl = document.getElementById('statusName');
                const descEl = document.getElementById('statusDesc');
                const btn = document.getElementById('requestPermissionBtn');

                if (!status.supported) {
                    indicator.className = 'status-indicator unsupported';
                    nameEl.textContent = '浏览器不支持';
                    descEl.textContent = '您的浏览器不支持 Web Push 推送功能';
                    btn.style.display = 'none';
                } else if (status.permission === 'granted') {
                    indicator.className = 'status-indicator granted';
                    nameEl.textContent = '已开启';
                    descEl.textContent = status.subscribed ? '已订阅推送消息' : '正在订阅...';
                    btn.style.display = status.subscribed ? 'none' : 'block';
                    btn.textContent = '完成订阅';
                } else if (status.permission === 'denied') {
                    indicator.className = 'status-indicator denied';
                    nameEl.textContent = '已拒绝';
                    descEl.textContent = '您已拒绝推送权限，请在浏览器设置中开启';
                    btn.style.display = 'none';
                } else {
                    indicator.className = 'status-indicator default';
                    nameEl.textContent = '未开启';
                    descEl.textContent = '点击按钮开启浏览器推送';
                    btn.style.display = 'block';
                    btn.textContent = '开启推送';
                }
            }

            // 更新统计显示
            function updateStats() {
                const statsData = stats.getBasicStats('week');
                
                document.getElementById('statTotal').textContent = statsData.sent.total;
                document.getElementById('statClicked').textContent = statsData.performance.clickRate.replace('.00', '') + '%';
                document.getElementById('statClickRate').textContent = statsData.performance.clickRate;
                document.getElementById('statConverted').textContent = statsData.conversion.total;
            }

            // 加载设置到表单
            function loadSettingsToForm() {
                const s = settings.settings;

                document.getElementById('pushEnabled').checked = s.enabled;
                document.getElementById('soundEnabled').checked = s.sound;
                document.getElementById('vibrationEnabled').checked = s.vibration;
                document.getElementById('quietHoursEnabled').checked = s.quietHours.enabled;
                document.getElementById('quietHoursStart').value = s.quietHours.start;
                document.getElementById('quietHoursEnd').value = s.quietHours.end;
                document.getElementById('maxPerDay').value = s.frequency.maxPerDay;
                document.getElementById('maxPerHour').value = s.frequency.maxPerHour;
                document.getElementById('minInterval').value = s.frequency.minInterval;
                document.getElementById('showPreview').checked = s.advanced.showPreview;
                document.getElementById('requireInteraction').checked = s.advanced.requireInteraction;

                // 加载类型开关
                document.querySelectorAll('.type-toggle').forEach(toggle => {
                    const type = toggle.dataset.type;
                    if (s.types[type]) {
                        toggle.checked = s.types[type].enabled;
                    }
                });
            }

            // 保存设置
            function saveSettings() {
                settings.settings.enabled = document.getElementById('pushEnabled').checked;
                settings.settings.sound = document.getElementById('soundEnabled').checked;
                settings.settings.vibration = document.getElementById('vibrationEnabled').checked;
                settings.settings.quietHours.enabled = document.getElementById('quietHoursEnabled').checked;
                settings.settings.quietHours.start = document.getElementById('quietHoursStart').value;
                settings.settings.quietHours.end = document.getElementById('quietHoursEnd').value;
                settings.settings.frequency.maxPerDay = parseInt(document.getElementById('maxPerDay').value);
                settings.settings.frequency.maxPerHour = parseInt(document.getElementById('maxPerHour').value);
                settings.settings.frequency.minInterval = parseInt(document.getElementById('minInterval').value);
                settings.settings.advanced.showPreview = document.getElementById('showPreview').checked;
                settings.settings.advanced.requireInteraction = document.getElementById('requireInteraction').checked;

                // 保存类型开关
                document.querySelectorAll('.type-toggle').forEach(toggle => {
                    const type = toggle.dataset.type;
                    if (settings.settings.types[type]) {
                        settings.settings.types[type].enabled = toggle.checked;
                    }
                });

                const result = settings.saveSettings();
                
                if (result) {
                    showAlert('设置已保存', 'success');
                } else {
                    showAlert('保存失败，请重试', 'error');
                }
            }

            // 显示提示
            function showAlert(message, type = 'success') {
                const container = document.getElementById('alertContainer');
                container.innerHTML = `
                    <div class="alert alert-${type}">
                        <span>${type === 'success' ? '✓' : type === 'error' ? '✗' : '!'}</span>
                        ${message}
                    </div>
                `;
                setTimeout(() => container.innerHTML = '', 3000);
            }

            // 事件绑定
            document.getElementById('requestPermissionBtn').addEventListener('click', async function() {
                this.disabled = true;
                this.textContent = '请求中...';
                
                const result = await settings.requestBrowserPermission();
                
                if (result.success) {
                    showAlert('推送权限已开启', 'success');
                } else {
                    showAlert(result.error || '权限申请失败', 'error');
                }
                
                this.disabled = false;
                updateBrowserStatus();
            });

            document.getElementById('saveBtn').addEventListener('click', saveSettings);

            document.getElementById('resetBtn').addEventListener('click', function() {
                if (confirm('确定要恢复默认设置吗？')) {
                    settings.resetSettings();
                    loadSettingsToForm();
                    showAlert('已恢复默认设置', 'success');
                }
            });

            document.getElementById('enableAllTypes').addEventListener('click', function() {
                document.querySelectorAll('.type-toggle').forEach(toggle => {
                    toggle.checked = true;
                });
                showAlert('已开启所有推送类型', 'success');
            });

            document.getElementById('refreshStats').addEventListener('click', updateStats);

            document.getElementById('exportStats').addEventListener('click', function() {
                const data = stats.exportData('json');
                const blob = new Blob([data], { type: 'application/json' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `push-stats-${new Date().toISOString().slice(0,10)}.json`;
                a.click();
                URL.revokeObjectURL(url);
                showAlert('统计数据已导出', 'success');
            });

            // 初始化
            initTypeList();
            updateBrowserStatus();
            loadSettingsToForm();
            updateStats();

            // 监听权限变化
            window.addEventListener('push:permissionChanged', updateBrowserStatus);
        });
    </script>
</body>
</html>
