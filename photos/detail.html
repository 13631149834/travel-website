<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>图片详情 - 游导旅游</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap');
        * { font-family: 'Noto Sans SC', sans-serif; }
        
        .masonry { column-count: 4; column-gap: 16px; }
        @media (max-width: 1280px) { .masonry { column-count: 3; } }
        @media (max-width: 768px) { .masonry { column-count: 2; } }
        @media (max-width: 480px) { .masonry { column-count: 1; } }
        
        .masonry-item { break-inside: avoid; margin-bottom: 16px; }
        
        .photo-card {
            transition: all 0.3s ease;
            cursor: pointer;
        }
        .photo-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 24px rgba(0,0,0,0.12);
        }
        
        .download-btn {
            transition: all 0.3s ease;
        }
        .download-btn:hover {
            transform: scale(1.05);
        }
        
        .zoom-container {
            overflow: hidden;
            cursor: zoom-in;
        }
        .zoom-container img {
            transition: transform 0.3s ease;
        }
        .zoom-container:hover img {
            transform: scale(1.1);
        }
        
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #f1f5f9; }
        ::-webkit-scrollbar-thumb { background: linear-gradient(180deg, #3b82f6, #8b5cf6); border-radius: 4px; }
    </style>
</head>
<body class="bg-gray-100 min-h-screen">
    <!-- Header -->
    <header class="bg-white shadow-sm sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-16">
                <div class="flex items-center space-x-4">
                    <a href="index.html" class="text-gray-500 hover:text-gray-700">
                        <i class="fas fa-arrow-left text-xl"></i>
                    </a>
                    <a href="../index.html" class="flex items-center space-x-2">
                        <div class="w-10 h-10 bg-gradient-to-br from-blue-500 to-purple-600 rounded-xl flex items-center justify-center">
                            <i class="fas fa-compass text-white text-lg"></i>
                        </div>
                        <span class="text-xl font-bold bg-gradient-to-r from-blue-600 to-purple-600 bg-clip-text text-transparent hidden sm:block">游导旅游</span>
                    </a>
                </div>
                <div class="flex items-center space-x-4">
                    <button onclick="toggleFavorite()" class="p-2 text-gray-500 hover:text-red-500 transition-colors">
                        <i class="far fa-heart text-xl" id="favoriteBtn"></i>
                    </button>
                    <button onclick="sharePhoto()" class="p-2 text-gray-500 hover:text-blue-500 transition-colors">
                        <i class="fas fa-share-alt text-xl"></i>
                    </button>
                </div>
            </div>
        </div>
    </header>
    
    <!-- Main Content -->
    <main class="py-6">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="grid lg:grid-cols-3 gap-6">
                <!-- Image Section -->
                <div class="lg:col-span-2">
                    <div class="bg-white rounded-2xl shadow-sm overflow-hidden">
                        <!-- Main Image -->
                        <div class="zoom-container relative">
                            <img id="mainImage" src="" alt="" class="w-full h-auto">
                            <div class="absolute bottom-4 left-4 flex gap-2">
                                <button onclick="zoomIn()" class="w-10 h-10 bg-white/90 backdrop-blur-sm rounded-lg flex items-center justify-center hover:bg-white transition-colors shadow-lg">
                                    <i class="fas fa-search-plus text-gray-700"></i>
                                </button>
                                <button onclick="zoomOut()" class="w-10 h-10 bg-white/90 backdrop-blur-sm rounded-lg flex items-center justify-center hover:bg-white transition-colors shadow-lg">
                                    <i class="fas fa-search-minus text-gray-700"></i>
                                </button>
                                <button onclick="toggleFullscreen()" class="w-10 h-10 bg-white/90 backdrop-blur-sm rounded-lg flex items-center justify-center hover:bg-white transition-colors shadow-lg">
                                    <i class="fas fa-expand text-gray-700"></i>
                                </button>
                            </div>
                        </div>
                        
                        <!-- Thumbnail Navigation -->
                        <div class="p-4 border-t border-gray-100">
                            <div class="flex items-center justify-between mb-3">
                                <span class="text-sm text-gray-500">按住鼠标拖动可移动查看大图</span>
                                <span class="text-sm text-gray-500" id="zoomLevel">缩放: 100%</span>
                            </div>
                            <div class="flex gap-2 overflow-x-auto pb-2">
                                <button onclick="setZoom(0.5)" class="px-3 py-1 text-xs bg-gray-100 rounded-lg hover:bg-gray-200 transition-colors">50%</button>
                                <button onclick="setZoom(1)" class="px-3 py-1 text-xs bg-blue-100 text-blue-600 rounded-lg hover:bg-blue-200 transition-colors">100%</button>
                                <button onclick="setZoom(1.5)" class="px-3 py-1 text-xs bg-gray-100 rounded-lg hover:bg-gray-200 transition-colors">150%</button>
                                <button onclick="setZoom(2)" class="px-3 py-1 text-xs bg-gray-100 rounded-lg hover:bg-gray-200 transition-colors">200%</button>
                            </div>
                        </div>
                    </div>
                    
                    <!-- Download Section -->
                    <div class="mt-6 bg-white rounded-2xl shadow-sm p-6">
                        <h3 class="text-lg font-bold text-gray-900 mb-4">
                            <i class="fas fa-download mr-2 text-blue-500"></i>下载图片
                        </h3>
                        <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
                            <button onclick="downloadImage('small')" class="download-btn p-4 border border-gray-200 rounded-xl text-center hover:border-blue-500 hover:bg-blue-50 transition-all">
                                <div class="text-2xl mb-2">📱</div>
                                <div class="font-medium text-gray-900">小尺寸</div>
                                <div class="text-xs text-gray-500">640 × 480</div>
                            </button>
                            <button onclick="downloadImage('medium')" class="download-btn p-4 border border-gray-200 rounded-xl text-center hover:border-blue-500 hover:bg-blue-50 transition-all">
                                <div class="text-2xl mb-2">💻</div>
                                <div class="font-medium text-gray-900">中尺寸</div>
                                <div class="text-xs text-gray-500">1920 × 1080</div>
                            </button>
                            <button onclick="downloadImage('large')" class="download-btn p-4 border border-gray-200 rounded-xl text-center hover:border-blue-500 hover:bg-blue-50 transition-all">
                                <div class="text-2xl mb-2">🖥️</div>
                                <div class="font-medium text-gray-900">大尺寸</div>
                                <div class="text-xs text-gray-500">2560 × 1440</div>
                            </button>
                            <button onclick="downloadImage('original')" class="download-btn p-4 border-2 border-blue-500 bg-blue-50 rounded-xl text-center hover:bg-blue-100 transition-all">
                                <div class="text-2xl mb-2">⭐</div>
                                <div class="font-medium text-blue-600">原图下载</div>
                                <div class="text-xs text-blue-500">高清无水印</div>
                            </button>
                        </div>
                        <p class="mt-4 text-sm text-gray-500 text-center">
                            <i class="fas fa-info-circle mr-1"></i>
                            图片仅供个人学习交流使用，商业用途请注明来源
                        </p>
                    </div>
                </div>
                
                <!-- Info Section -->
                <div class="lg:col-span-1">
                    <!-- Photo Info -->
                    <div class="bg-white rounded-2xl shadow-sm p-6 mb-6">
                        <h2 id="photoTitle" class="text-2xl font-bold text-gray-900 mb-3"></h2>
                        <p id="photoDesc" class="text-gray-600 mb-6"></p>
                        
                        <div class="space-y-4">
                            <div class="flex items-center justify-between py-3 border-b border-gray-100">
                                <div class="flex items-center text-gray-500">
                                    <i class="fas fa-map-marker-alt mr-3 text-red-400 w-5"></i>
                                    <span>拍摄地点</span>
                                </div>
                                <span id="photoLocation" class="text-gray-900 font-medium"></span>
                            </div>
                            <div class="flex items-center justify-between py-3 border-b border-gray-100">
                                <div class="flex items-center text-gray-500">
                                    <i class="fas fa-calendar mr-3 text-green-400 w-5"></i>
                                    <span>拍摄日期</span>
                                </div>
                                <span id="photoDate" class="text-gray-900 font-medium"></span>
                            </div>
                            <div class="flex items-center justify-between py-3 border-b border-gray-100">
                                <div class="flex items-center text-gray-500">
                                    <i class="fas fa-tag mr-3 text-blue-400 w-5"></i>
                                    <span>主题分类</span>
                                </div>
                                <span id="photoTheme" class="text-gray-900 font-medium"></span>
                            </div>
                            <div class="flex items-center justify-between py-3 border-b border-gray-100">
                                <div class="flex items-center text-gray-500">
                                    <i class="fas fa-camera mr-3 text-purple-400 w-5"></i>
                                    <span>拍摄设备</span>
                                </div>
                                <span id="photoCamera" class="text-gray-900 font-medium"></span>
                            </div>
                            <div class="flex items-center justify-between py-3">
                                <div class="flex items-center text-gray-500">
                                    <i class="fas fa-sliders-h mr-3 text-orange-400 w-5"></i>
                                    <span>拍摄参数</span>
                                </div>
                                <span id="photoSettings" class="text-gray-900 font-medium"></span>
                            </div>
                        </div>
                    </div>
                    
                    <!-- Tags -->
                    <div class="bg-white rounded-2xl shadow-sm p-6 mb-6">
                        <h3 class="text-lg font-bold text-gray-900 mb-4">
                            <i class="fas fa-tags mr-2 text-pink-500"></i>相关标签
                        </h3>
                        <div id="photoTags" class="flex flex-wrap gap-2"></div>
                    </div>
                    
                    <!-- Author Info -->
                    <div class="bg-white rounded-2xl shadow-sm p-6 mb-6">
                        <h3 class="text-lg font-bold text-gray-900 mb-4">
                            <i class="fas fa-user mr-2 text-blue-500"></i>图片作者
                        </h3>
                        <div class="flex items-center">
                            <div class="w-12 h-12 bg-gradient-to-br from-blue-500 to-purple-600 rounded-full flex items-center justify-center text-white font-bold text-lg mr-4">
                                游
                            </div>
                            <div>
                                <div id="photoAuthor" class="font-medium text-gray-900"></div>
                                <div class="text-sm text-gray-500">上传于 <span id="uploadDate"></span></div>
                            </div>
                        </div>
                        <div class="grid grid-cols-3 gap-4 mt-4 pt-4 border-t border-gray-100">
                            <div class="text-center">
                                <div class="text-xl font-bold text-gray-900" id="authorPhotos">0</div>
                                <div class="text-xs text-gray-500">作品</div>
                            </div>
                            <div class="text-center">
                                <div class="text-xl font-bold text-gray-900" id="authorLikes">0</div>
                                <div class="text-xs text-gray-500">获赞</div>
                            </div>
                            <div class="text-center">
                                <div class="text-xl font-bold text-gray-900" id="authorDownloads">0</div>
                                <div class="text-xs text-gray-500">下载</div>
                            </div>
                        </div>
                    </div>
                    
                    <!-- Stats -->
                    <div class="bg-gradient-to-br from-blue-500 to-purple-600 rounded-2xl shadow-sm p-6 text-white">
                        <div class="grid grid-cols-2 gap-4">
                            <div class="text-center">
                                <div class="text-3xl font-bold mb-1">
                                    <i class="fas fa-heart mr-2"></i><span id="photoLikes">0</span>
                                </div>
                                <div class="text-sm text-white/70">点赞数</div>
                            </div>
                            <div class="text-center">
                                <div class="text-3xl font-bold mb-1">
                                    <i class="fas fa-download mr-2"></i><span id="photoDownloads">0</span>
                                </div>
                                <div class="text-sm text-white/70">下载数</div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            
            <!-- Related Photos -->
            <div class="mt-12">
                <div class="flex items-center justify-between mb-6">
                    <h2 class="text-2xl font-bold text-gray-900">相关推荐</h2>
                    <a href="#" class="text-blue-600 hover:text-blue-700 font-medium">查看更多 <i class="fas fa-arrow-right ml-1"></i></a>
                </div>
                <div id="relatedPhotos" class="masonry">
                    <!-- Related photos will be loaded dynamically -->
                </div>
            </div>
        </div>
    </main>
    
    <!-- Footer -->
    <footer class="bg-white border-t border-gray-100 py-8 mt-12">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex flex-col md:flex-row items-center justify-between gap-4">
                <div class="flex items-center space-x-2">
                    <div class="w-8 h-8 bg-gradient-to-br from-blue-500 to-purple-600 rounded-lg flex items-center justify-center">
                        <i class="fas fa-compass text-white text-sm"></i>
                    </div>
                    <span class="font-bold text-gray-700">游导旅游</span>
                </div>
                <p class="text-sm text-gray-500">&copy; 2024 游导旅游 youdao-travel.com 版权所有</p>
            </div>
        </div>
    </footer>
    
    <!-- Fullscreen Modal -->
    <div id="fullscreenModal" class="fixed inset-0 bg-black z-50 hidden">
        <button onclick="toggleFullscreen()" class="absolute top-4 right-4 text-white text-3xl hover:text-gray-300 z-10 p-4">
            <i class="fas fa-times"></i>
        </button>
        <div class="absolute inset-0 flex items-center justify-center">
            <img id="fullscreenImage" src="" alt="" class="max-w-full max-h-full object-contain">
        </div>
    </div>

    <script>
        let currentPhoto = null;
        let photos = [];
        let currentZoom = 1;
        let favorites = JSON.parse(localStorage.getItem('favorites') || '[]');
        
        document.addEventListener('DOMContentLoaded', function() {
            loadPhotoData();
        });
        
        async function loadPhotoData() {
            try {
                const response = await fetch('../data/photos.json');
                const data = await response.json();
                photos = data.photos;
                
                // Get photo ID from URL
                const params = new URLSearchParams(window.location.search);
                const photoId = params.get('id') || 'jp001';
                
                currentPhoto = photos.find(p => p.id === photoId) || photos[0];
                renderPhotoInfo();
                renderRelatedPhotos();
            } catch (error) {
                console.error('Failed to load photos:', error);
            }
        }
        
        function renderPhotoInfo() {
            if (!currentPhoto) return;
            
            document.getElementById('mainImage').src = currentPhoto.url;
            document.getElementById('fullscreenImage').src = currentPhoto.url;
            document.getElementById('photoTitle').textContent = currentPhoto.title;
            document.getElementById('photoDesc').textContent = currentPhoto.description;
            
            document.getElementById('photoLocation').textContent = getDestinationName(currentPhoto.destination) + ' · ' + getCityName(currentPhoto.city);
            document.getElementById('photoDate').textContent = currentPhoto.date;
            document.getElementById('photoTheme').textContent = getThemeName(currentPhoto.theme);
            document.getElementById('photoCamera').textContent = currentPhoto.camera;
            document.getElementById('photoSettings').textContent = currentPhoto.settings;
            
            document.getElementById('photoTags').innerHTML = currentPhoto.tags.map(tag => 
                `<span class="px-3 py-1 bg-gray-100 text-gray-700 rounded-full text-sm hover:bg-gray-200 cursor-pointer transition-colors">${tag}</span>`
            ).join('');
            
            document.getElementById('photoAuthor').textContent = currentPhoto.author;
            document.getElementById('uploadDate').textContent = currentPhoto.date;
            document.getElementById('photoLikes').textContent = currentPhoto.likes;
            document.getElementById('photoDownloads').textContent = currentPhoto.downloads;
            
            // Update favorite button
            updateFavoriteButton();
            
            // Calculate author stats
            const authorPhotos = photos.filter(p => p.author === currentPhoto.author);
            document.getElementById('authorPhotos').textContent = authorPhotos.length;
            document.getElementById('authorLikes').textContent = authorPhotos.reduce((sum, p) => sum + p.likes, 0);
            document.getElementById('authorDownloads').textContent = authorPhotos.reduce((sum, p) => sum + p.downloads, 0);
            
            document.title = currentPhoto.title + ' - 游导旅游';
        }
        
        function renderRelatedPhotos() {
            const related = photos
                .filter(p => p.id !== currentPhoto?.id && (p.destination === currentPhoto?.destination || p.theme === currentPhoto?.theme))
                .slice(0, 8);
            
            document.getElementById('relatedPhotos').innerHTML = related.map(photo => `
                <div class="masonry-item">
                    <div class="photo-card rounded-xl overflow-hidden shadow-md bg-white" onclick="goToPhoto('${photo.id}')">
                        <div class="relative overflow-hidden">
                            <img src="${photo.thumbUrl}" alt="${photo.title}" 
                                 class="w-full object-cover hover:scale-105 transition-transform duration-500"
                                 style="aspect-ratio: ${getRandomAspectRatio()}">
                        </div>
                        <div class="p-3">
                            <h4 class="font-semibold text-gray-900 mb-1 truncate">${photo.title}</h4>
                            <div class="flex items-center text-xs text-gray-400">
                                <i class="fas fa-heart text-red-400 mr-1"></i>${photo.likes}
                            </div>
                        </div>
                    </div>
                </div>
            `).join('');
        }
        
        function goToPhoto(photoId) {
            window.location.href = `detail.html?id=${photoId}`;
        }
        
        function getDestinationName(dest) {
            const names = { japan: '🗾 日本', korea: '🇰🇷 韩国', thailand: '🇹🇭 泰国', singapore: '🇸🇬 新加坡', general: '🌍 其他' };
            return names[dest] || '🌍 其他';
        }
        
        function getCityName(cityId) {
            const cities = {
                tokyo: '东京', kyoto: '京都', osaka: '大阪', yamanashi: '山梨', nara: '奈良',
                seoul: '首尔', busan: '釜山', jeju: '济州岛',
                bangkok: '曼谷', chiangmai: '清迈', phuket: '普吉岛',
                singapore: '新加坡', general: '其他'
            };
            return cities[cityId] || cityId;
        }
        
        function getThemeName(theme) {
            const names = { landscape: '🏔️ 风景', food: '🍜 美食', architecture: '🏛️ 建筑', culture: '🎎 人文', night: '🌃 夜景' };
            return names[theme] || '📷 其他';
        }
        
        function getRandomAspectRatio() {
            const ratios = ['3/4', '4/5', '1/1', '4/3'];
            return ratios[Math.floor(Math.random() * ratios.length)];
        }
        
        // Zoom functions
        function setZoom(level) {
            currentZoom = level;
            document.getElementById('mainImage').style.transform = `scale(${level})`;
            document.getElementById('zoomLevel').textContent = `缩放: ${Math.round(level * 100)}%`;
        }
        
        function zoomIn() {
            setZoom(Math.min(currentZoom + 0.25, 3));
        }
        
        function zoomOut() {
            setZoom(Math.max(currentZoom - 0.25, 0.5));
        }
        
        function toggleFullscreen() {
            const modal = document.getElementById('fullscreenModal');
            modal.classList.toggle('hidden');
            document.body.style.overflow = modal.classList.contains('hidden') ? '' : 'hidden';
        }
        
        // Favorite functions
        function toggleFavorite() {
            if (!currentPhoto) return;
            
            const index = favorites.indexOf(currentPhoto.id);
            if (index > -1) {
                favorites.splice(index, 1);
            } else {
                favorites.push(currentPhoto.id);
            }
            localStorage.setItem('favorites', JSON.stringify(favorites));
            updateFavoriteButton();
        }
        
        function updateFavoriteButton() {
            const btn = document.getElementById('favoriteBtn');
            if (favorites.includes(currentPhoto?.id)) {
                btn.classList.remove('far');
                btn.classList.add('fas', 'text-red-500');
            } else {
                btn.classList.add('far');
                btn.classList.remove('fas', 'text-red-500');
            }
        }
        
        // Download function
        function downloadImage(size) {
            alert(`正在下载 ${currentPhoto.title} - ${size}尺寸`);
            // In a real app, this would trigger the actual download
        }
        
        // Share function
        function sharePhoto() {
            if (navigator.share) {
                navigator.share({
                    title: currentPhoto.title,
                    text: currentPhoto.description,
                    url: window.location.href
                });
            } else {
                navigator.clipboard.writeText(window.location.href);
                alert('链接已复制到剪贴板');
            }
        }
    </script>
</body>
</html>
