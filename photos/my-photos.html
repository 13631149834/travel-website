<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的图库 - 游导旅游</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap');
        * { font-family: 'Noto Sans SC', sans-serif; }
        
        .masonry { column-count: 4; column-gap: 16px; }
        @media (max-width: 1280px) { .masonry { column-count: 3; } }
        @media (max-width: 768px) { .masonry { column-count: 2; } }
        @media (max-width: 480px) { .masonry { column-count: 1; } }
        
        .masonry-item { break-inside: avoid; margin-bottom: 16px; }
        
        .photo-card {
            transition: all 0.3s ease;
            cursor: pointer;
        }
        .photo-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 24px rgba(0,0,0,0.12);
        }
        
        .tab-btn {
            transition: all 0.3s ease;
            position: relative;
        }
        .tab-btn::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 50%;
            width: 0;
            height: 3px;
            background: #3b82f6;
            border-radius: 2px;
            transform: translateX(-50%);
            transition: width 0.3s ease;
        }
        .tab-btn.active::after { width: 100%; }
        .tab-btn.active { color: #3b82f6; }
        
        .stat-card {
            transition: all 0.3s ease;
        }
        .stat-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 16px rgba(0,0,0,0.1);
        }
        
        .badge {
            position: absolute;
            top: 8px;
            right: 8px;
            padding: 2px 8px;
            border-radius: 9999px;
            font-size: 10px;
            font-weight: 600;
        }
    </style>
</head>
<body class="bg-gray-50 min-h-screen">
    <!-- Header -->
    <header class="bg-white shadow-sm">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-16">
                <a href="../index.html" class="flex items-center space-x-2">
                    <div class="w-10 h-10 bg-gradient-to-br from-blue-500 to-purple-600 rounded-xl flex items-center justify-center">
                        <i class="fas fa-compass text-white text-lg"></i>
                    </div>
                    <span class="text-xl font-bold bg-gradient-to-r from-blue-600 to-purple-600 bg-clip-text text-transparent">游导旅游</span>
                </a>
                <nav class="hidden md:flex items-center space-x-8">
                    <a href="../index.html" class="text-gray-600 hover:text-gray-900 font-medium">首页</a>
                    <a href="destinations.html" class="text-gray-600 hover:text-gray-900 font-medium">目的地</a>
                    <a href="themes.html" class="text-gray-600 hover:text-gray-900 font-medium">主题</a>
                    <a href="index.html" class="text-gray-600 hover:text-gray-900 font-medium">图片库</a>
                    <a href="my-photos.html" class="text-blue-600 font-medium">我的图库</a>
                </nav>
                <a href="upload.html" class="flex items-center px-4 py-2 bg-gradient-to-r from-blue-500 to-purple-600 text-white rounded-lg hover:shadow-lg transition-all">
                    <i class="fas fa-cloud-upload-alt mr-2"></i>
                    上传
                </a>
            </div>
        </div>
    </header>
    
    <!-- Profile Section -->
    <section class="bg-gradient-to-br from-blue-600 via-purple-600 to-pink-500 text-white py-12">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex flex-col md:flex-row items-center md:items-start gap-6">
                <!-- Avatar -->
                <div class="relative">
                    <div class="w-24 h-24 md:w-32 md:h-32 bg-white/20 backdrop-blur-sm rounded-full flex items-center justify-center text-4xl md:text-5xl font-bold border-4 border-white/50">
                        游
                    </div>
                    <button class="absolute bottom-0 right-0 w-10 h-10 bg-white rounded-full flex items-center justify-center text-gray-700 hover:bg-gray-100 shadow-lg transition-colors">
                        <i class="fas fa-camera"></i>
                    </button>
                </div>
                
                <!-- Info -->
                <div class="flex-1 text-center md:text-left">
                    <h1 class="text-2xl md:text-3xl font-bold mb-2">游导用户</h1>
                    <p class="text-white/80 mb-4">旅行摄影师 · 自由撰稿人</p>
                    <div class="flex flex-wrap justify-center md:justify-start gap-4 text-sm">
                        <span class="flex items-center">
                            <i class="fas fa-map-marker-alt mr-2"></i>上海
                        </span>
                        <span class="flex items-center">
                            <i class="fas fa-calendar mr-2"></i>2024年加入
                        </span>
                        <span class="flex items-center">
                            <i class="fas fa-eye mr-2"></i>12.5万次浏览
                        </span>
                    </div>
                </div>
                
                <!-- Edit Button -->
                <button class="px-6 py-2 bg-white/20 backdrop-blur-sm text-white border border-white/30 rounded-xl hover:bg-white/30 transition-colors">
                    <i class="fas fa-edit mr-2"></i>编辑资料
                </button>
            </div>
        </div>
    </section>
    
    <!-- Stats -->
    <section class="py-8 bg-white border-b border-gray-100">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
                <div class="stat-card bg-gradient-to-br from-blue-50 to-blue-100 rounded-xl p-4 text-center">
                    <div class="text-3xl md:text-4xl font-bold text-blue-600 mb-1" id="statUploads">0</div>
                    <div class="text-sm text-gray-600">上传图片</div>
                </div>
                <div class="stat-card bg-gradient-to-br from-red-50 to-red-100 rounded-xl p-4 text-center">
                    <div class="text-3xl md:text-4xl font-bold text-red-500 mb-1" id="statFavorites">0</div>
                    <div class="text-sm text-gray-600">收藏图片</div>
                </div>
                <div class="stat-card bg-gradient-to-br from-green-50 to-green-100 rounded-xl p-4 text-center">
                    <div class="text-3xl md:text-4xl font-bold text-green-600 mb-1" id="statDownloads">0</div>
                    <div class="text-sm text-gray-600">下载记录</div>
                </div>
                <div class="stat-card bg-gradient-to-br from-purple-50 to-purple-100 rounded-xl p-4 text-center">
                    <div class="text-3xl md:text-4xl font-bold text-purple-600 mb-1" id="statLikes">0</div>
                    <div class="text-sm text-gray-600">获得点赞</div>
                </div>
            </div>
        </div>
    </section>
    
    <!-- Main Content -->
    <main class="py-8">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <!-- Tabs -->
            <div class="flex overflow-x-auto pb-4 mb-8 gap-2">
                <button onclick="switchTab('uploads')" class="tab-btn active px-6 py-3 rounded-xl font-medium flex items-center whitespace-nowrap" id="tab-uploads">
                    <i class="fas fa-cloud-upload-alt mr-2"></i>
                    我的上传
                    <span class="ml-2 px-2 py-0.5 bg-blue-100 text-blue-600 text-xs rounded-full" id="count-uploads">0</span>
                </button>
                <button onclick="switchTab('favorites')" class="tab-btn px-6 py-3 rounded-xl font-medium flex items-center text-gray-500 whitespace-nowrap" id="tab-favorites">
                    <i class="fas fa-heart mr-2"></i>
                    我的收藏
                    <span class="ml-2 px-2 py-0.5 bg-red-100 text-red-600 text-xs rounded-full" id="count-favorites">0</span>
                </button>
                <button onclick="switchTab('downloads')" class="tab-btn px-6 py-3 rounded-xl font-medium flex items-center text-gray-500 whitespace-nowrap" id="tab-downloads">
                    <i class="fas fa-download mr-2"></i>
                    下载记录
                    <span class="ml-2 px-2 py-0.5 bg-green-100 text-green-600 text-xs rounded-full" id="count-downloads">0</span>
                </button>
            </div>
            
            <!-- Uploads Content -->
            <div id="content-uploads" class="content-section">
                <div class="flex items-center justify-between mb-6">
                    <div class="flex items-center gap-4">
                        <select id="filterStatus" onchange="renderPhotos()" class="px-4 py-2 rounded-lg border border-gray-200 text-sm">
                            <option value="">全部状态</option>
                            <option value="approved">已通过</option>
                            <option value="pending">审核中</option>
                            <option value="rejected">未通过</option>
                        </select>
                    </div>
                    <a href="upload.html" class="px-4 py-2 bg-blue-500 text-white rounded-lg hover:bg-blue-600 transition-colors">
                        <i class="fas fa-plus mr-2"></i>上传新图片
                    </a>
                </div>
                <div id="uploadsGrid" class="masonry">
                    <!-- Photos will be loaded dynamically -->
                </div>
                <div id="uploadsEmpty" class="hidden text-center py-16">
                    <div class="text-6xl mb-4">📷</div>
                    <h3 class="text-xl font-medium text-gray-600 mb-2">还没有上传图片</h3>
                    <p class="text-gray-400 mb-6">分享您的旅游照片，让更多人看到</p>
                    <a href="upload.html" class="px-6 py-3 bg-blue-500 text-white rounded-xl hover:bg-blue-600 transition-colors inline-flex items-center">
                        <i class="fas fa-cloud-upload-alt mr-2"></i>立即上传
                    </a>
                </div>
            </div>
            
            <!-- Favorites Content -->
            <div id="content-favorites" class="content-section hidden">
                <div class="flex items-center justify-between mb-6">
                    <div class="text-gray-500">
                        共 <span id="favCount">0</span> 张收藏图片
                    </div>
                </div>
                <div id="favoritesGrid" class="masonry">
                    <!-- Photos will be loaded dynamically -->
                </div>
                <div id="favoritesEmpty" class="hidden text-center py-16">
                    <div class="text-6xl mb-4">❤️</div>
                    <h3 class="text-xl font-medium text-gray-600 mb-2">还没有收藏图片</h3>
                    <p class="text-gray-400 mb-6">在图片库中发现喜欢的图片，一键收藏</p>
                    <a href="index.html" class="px-6 py-3 bg-blue-500 text-white rounded-xl hover:bg-blue-600 transition-colors inline-flex items-center">
                        <i class="fas fa-compass mr-2"></i>浏览图库
                    </a>
                </div>
            </div>
            
            <!-- Downloads Content -->
            <div id="content-downloads" class="content-section hidden">
                <div class="text-center py-16">
                    <div class="text-6xl mb-4">📥</div>
                    <h3 class="text-xl font-medium text-gray-600 mb-2">下载记录</h3>
                    <p class="text-gray-400 mb-6">您下载过的图片将显示在这里</p>
                    <a href="index.html" class="px-6 py-3 bg-blue-500 text-white rounded-xl hover:bg-blue-600 transition-colors inline-flex items-center">
                        <i class="fas fa-compass mr-2"></i>浏览图库
                    </a>
                </div>
            </div>
        </div>
    </main>
    
    <!-- Footer -->
    <footer class="bg-white border-t border-gray-100 py-8">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex flex-col md:flex-row items-center justify-between gap-4">
                <div class="flex items-center space-x-2">
                    <div class="w-8 h-8 bg-gradient-to-br from-blue-500 to-purple-600 rounded-lg flex items-center justify-center">
                        <i class="fas fa-compass text-white text-sm"></i>
                    </div>
                    <span class="font-bold text-gray-700">游导旅游</span>
                </div>
                <p class="text-sm text-gray-500">&copy; 2024 游导旅游 youdao-travel.com 版权所有</p>
            </div>
        </div>
    </footer>
    
    <!-- Photo Modal -->
    <div id="photoModal" class="fixed inset-0 bg-black/90 z-50 hidden">
        <button onclick="closeModal()" class="absolute top-4 right-4 text-white text-3xl hover:text-gray-300 z-10">
            <i class="fas fa-times"></i>
        </button>
        <div class="absolute inset-0 flex items-center justify-center p-4 md:p-8">
            <div class="bg-white rounded-2xl max-w-6xl w-full max-h-full overflow-hidden flex flex-col md:flex-row">
                <div class="md:w-2/3 bg-black flex items-center justify-center">
                    <img id="modalImage" src="" alt="" class="max-w-full max-h-[70vh] md:max-h-full object-contain">
                </div>
                <div class="md:w-1/3 p-6 overflow-y-auto max-h-[30vh] md:max-h-full">
                    <h3 id="modalTitle" class="text-xl font-bold text-gray-900 mb-2"></h3>
                    <p id="modalDesc" class="text-gray-600 text-sm mb-4"></p>
                    <div id="modalMeta" class="space-y-2 text-sm text-gray-500 mb-4"></div>
                    <div id="modalStatus" class="mb-4"></div>
                    <div class="flex gap-2">
                        <button id="downloadBtn" class="flex-1 px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition-colors">
                            <i class="fas fa-download mr-2"></i>下载
                        </button>
                        <button id="deleteBtn" class="px-4 py-2 border border-red-300 text-red-600 rounded-lg hover:bg-red-50 transition-colors">
                            <i class="fas fa-trash"></i>
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let allPhotos = [];
        let favorites = JSON.parse(localStorage.getItem('favorites') || '[]');
        let uploads = JSON.parse(localStorage.getItem('uploads') || '[]');
        let downloads = JSON.parse(localStorage.getItem('downloads') || '[]');
        let currentTab = 'uploads';
        let currentPhoto = null;
        let currentPhotoType = ''; // 'upload' or 'favorite'
        
        document.addEventListener('DOMContentLoaded', function() {
            loadPhotoData();
            updateStats();
        });
        
        async function loadPhotoData() {
            try {
                const response = await fetch('../data/photos.json');
                const data = await response.json();
                allPhotos = data.photos;
                
                // Update counts
                document.getElementById('count-uploads').textContent = uploads.length;
                document.getElementById('count-favorites').textContent = favorites.length;
                document.getElementById('count-downloads').textContent = downloads.length;
                
                renderPhotos();
            } catch (error) {
                console.error('Failed to load photos:', error);
            }
        }
        
        function updateStats() {
            const uploadPhotos = allPhotos.slice(0, uploads.length);
            const favPhotos = allPhotos.filter(p => favorites.includes(p.id)).slice(0, favorites.length);
            
            document.getElementById('statUploads').textContent = uploads.length;
            document.getElementById('statFavorites').textContent = favorites.length;
            document.getElementById('statDownloads').textContent = downloads.length;
            document.getElementById('statLikes').textContent = uploadPhotos.reduce((sum, p) => sum + p.likes, 0);
        }
        
        function switchTab(tab) {
            currentTab = tab;
            
            // Update tab buttons
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.classList.remove('active');
                btn.classList.add('text-gray-500');
            });
            document.getElementById('tab-' + tab).classList.add('active');
            document.getElementById('tab-' + tab).classList.remove('text-gray-500');
            
            // Show/hide content
            document.querySelectorAll('.content-section').forEach(section => {
                section.classList.add('hidden');
            });
            document.getElementById('content-' + tab).classList.remove('hidden');
            
            renderPhotos();
        }
        
        function renderPhotos() {
            if (currentTab === 'uploads') {
                renderUploads();
            } else if (currentTab === 'favorites') {
                renderFavorites();
            }
        }
        
        function renderUploads() {
            const grid = document.getElementById('uploadsGrid');
            const empty = document.getElementById('uploadsEmpty');
            const filter = document.getElementById('filterStatus').value;
            
            // Get photos based on uploads (demo: use first N photos from allPhotos)
            const myPhotos = allPhotos.slice(0, uploads.length > 0 ? uploads.length : 6).map((photo, index) => ({
                ...photo,
                status: uploads[index]?.status || (index % 3 === 0 ? 'pending' : 'approved')
            }));
            
            if (myPhotos.length === 0) {
                grid.classList.add('hidden');
                empty.classList.remove('hidden');
                return;
            }
            
            grid.classList.remove('hidden');
            empty.classList.add('hidden');
            
            const filtered = filter ? myPhotos.filter(p => p.status === filter) : myPhotos;
            
            grid.innerHTML = filtered.length > 0 ? filtered.map((photo, index) => `
                <div class="masonry-item">
                    <div class="photo-card rounded-xl overflow-hidden shadow-md bg-white relative" onclick="openModal(${index}, 'upload')">
                        <div class="relative overflow-hidden">
                            <img src="${photo.thumbUrl}" alt="${photo.title}" 
                                 class="w-full object-cover"
                                 style="aspect-ratio: ${getRandomAspectRatio()}">
                            ${getStatusBadge(photo.status)}
                        </div>
                        <div class="p-3">
                            <h4 class="font-semibold text-gray-900 mb-1 truncate">${photo.title}</h4>
                            <div class="flex items-center justify-between text-xs text-gray-400">
                                <span>${photo.date}</span>
                                <span><i class="fas fa-heart text-red-400 mr-1"></i>${photo.likes}</span>
                            </div>
                        </div>
                    </div>
                </div>
            `).join('') : `
                <div class="col-span-full text-center py-8">
                    <p class="text-gray-500">没有符合筛选条件的图片</p>
                </div>
            `;
        }
        
        function renderFavorites() {
            const grid = document.getElementById('favoritesGrid');
            const empty = document.getElementById('favoritesEmpty');
            
            const favPhotos = allPhotos.filter(p => favorites.includes(p.id));
            document.getElementById('favCount').textContent = favPhotos.length;
            
            if (favPhotos.length === 0) {
                grid.classList.add('hidden');
                empty.classList.remove('hidden');
                return;
            }
            
            grid.classList.remove('hidden');
            empty.classList.add('hidden');
            
            grid.innerHTML = favPhotos.map((photo, index) => `
                <div class="masonry-item">
                    <div class="photo-card rounded-xl overflow-hidden shadow-md bg-white relative" onclick="openModal(${index}, 'favorite')">
                        <div class="relative overflow-hidden">
                            <img src="${photo.thumbUrl}" alt="${photo.title}" 
                                 class="w-full object-cover"
                                 style="aspect-ratio: ${getRandomAspectRatio()}">
                            <button onclick="event.stopPropagation(); toggleFavorite('${photo.id}')" 
                                    class="absolute top-3 right-3 w-8 h-8 bg-white/90 backdrop-blur-sm rounded-full flex items-center justify-center hover:bg-white transition-colors">
                                <i class="fas fa-heart text-red-500"></i>
                            </button>
                        </div>
                        <div class="p-3">
                            <h4 class="font-semibold text-gray-900 mb-1 truncate">${photo.title}</h4>
                            <div class="flex items-center justify-between text-xs text-gray-400">
                                <span>${getDestinationName(photo.destination)}</span>
                                <span><i class="fas fa-heart text-red-400 mr-1"></i>${photo.likes}</span>
                            </div>
                        </div>
                    </div>
                </div>
            `).join('');
        }
        
        function getStatusBadge(status) {
            const badges = {
                approved: '<span class="badge bg-green-100 text-green-700"><i class="fas fa-check mr-1"></i>已通过</span>',
                pending: '<span class="badge bg-yellow-100 text-yellow-700"><i class="fas fa-clock mr-1"></i>审核中</span>',
                rejected: '<span class="badge bg-red-100 text-red-700"><i class="fas fa-times mr-1"></i>未通过</span>'
            };
            return badges[status] || '';
        }
        
        function getDestinationName(dest) {
            const names = { japan: '🗾 日本', korea: '🇰🇷 韩国', thailand: '🇹🇭 泰国', singapore: '🇸🇬 新加坡', general: '🌍 其他' };
            return names[dest] || '🌍 其他';
        }
        
        function getRandomAspectRatio() {
            const ratios = ['3/4', '4/5', '1/1', '4/3'];
            return ratios[Math.floor(Math.random() * ratios.length)];
        }
        
        function openModal(index, type) {
            currentPhotoType = type;
            let photo;
            
            if (type === 'upload') {
                photo = allPhotos[index];
            } else {
                photo = allPhotos.find(p => favorites.includes(p.id));
            }
            
            currentPhoto = photo;
            
            document.getElementById('modalImage').src = photo.url;
            document.getElementById('modalTitle').textContent = photo.title;
            document.getElementById('modalDesc').textContent = photo.description;
            
            document.getElementById('modalMeta').innerHTML = `
                <div><i class="fas fa-map-marker-alt mr-2 text-red-400"></i>${getDestinationName(photo.destination)} · ${photo.city}</div>
                <div><i class="fas fa-calendar mr-2 text-green-400"></i>${photo.date}</div>
                <div><i class="fas fa-heart mr-2 text-red-400"></i>${photo.likes} 点赞</div>
                <div><i class="fas fa-download mr-2 text-blue-400"></i>${photo.downloads} 下载</div>
            `;
            
            if (type === 'upload') {
                document.getElementById('modalStatus').innerHTML = photo.status ? getStatusBadge(photo.status) : '';
                document.getElementById('deleteBtn').style.display = 'block';
            } else {
                document.getElementById('modalStatus').innerHTML = '';
                document.getElementById('deleteBtn').style.display = 'none';
            }
            
            document.getElementById('photoModal').classList.remove('hidden');
            document.body.style.overflow = 'hidden';
        }
        
        function closeModal() {
            document.getElementById('photoModal').classList.add('hidden');
            document.body.style.overflow = '';
        }
        
        function toggleFavorite(photoId) {
            const index = favorites.indexOf(photoId);
            if (index > -1) {
                favorites.splice(index, 1);
            } else {
                favorites.push(photoId);
            }
            localStorage.setItem('favorites', JSON.stringify(favorites));
            
            document.getElementById('count-favorites').textContent = favorites.length;
            renderPhotos();
        }
        
        // Delete photo
        document.getElementById('deleteBtn').addEventListener('click', function() {
            if (confirm('确定要删除这张图片吗？')) {
                // In real app, this would delete from server
                uploads.pop();
                localStorage.setItem('uploads', JSON.stringify(uploads));
                document.getElementById('count-uploads').textContent = uploads.length;
                updateStats();
                closeModal();
                renderPhotos();
            }
        });
        
        // Download
        document.getElementById('downloadBtn').addEventListener('click', function() {
            if (currentPhoto) {
                // Add to downloads
                if (!downloads.find(d => d.id === currentPhoto.id)) {
                    downloads.push({ id: currentPhoto.id, date: new Date().toISOString() });
                    localStorage.setItem('downloads', JSON.stringify(downloads));
                    document.getElementById('count-downloads').textContent = downloads.length;
                }
                alert('图片下载中...');
            }
        });
    </script>
</body>
</html>
