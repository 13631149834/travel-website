      <!-- 通知中心主体 -->

        <!-- 侧边栏 -->

            <li>

                <span>系统通知</span>

            </li>
            <li>
              <a href="#" data-type="order" onclick="filterNotifications('order', this); return false;">

            <li>

                🔔 模拟新通知

              <button class="action-btn" onclick="notificationCenter.clearRead()" style="width: 100%;">

          </div>
        </aside>

        <!-- 主内容区 -->
        <section class="notification-main">

              <button class="notification-tab active" data-filter="all" onclick="setReadFilter('all', this)">全部</button>
              <button class="notification-tab" data-filter="unread" onclick="setReadFilter('unread', this)">未读</button>

            <div class="notification-filter">

  <!-- 引入脚本 -->
  <script src="js/notification-center.js"></script>
  <script src="js/enhanced-common.js"></script>
  
  <script>
    // 通知中心控制器
    let currentFilter = 'all';
    let currentReadFilter = 'all';
    let currentSort = 'newest';

    // 初始化
    document.addEventListener('DOMContentLoaded', () => {
      // 初始化通知中心
      if (typeof notificationCenter === 'undefined') {
        window.notificationCenter = new NotificationCenter();
      }
      
      // 渲染列表
      renderNotificationList();
      updateSidebarCounts();
      updateBadge();
    });

    // 渲染通知列表
    function renderNotificationList() {
      let filtered = [...notificationCenter.notifications];
      
      // 类型筛选
      if (currentFilter !== 'all') {
        filtered = filtered.filter(n => n.type === currentFilter);
      }
      
      // 已读/未读筛选
      if (currentReadFilter === 'unread') {
        filtered = filtered.filter(n => !n.read);
      } else if (currentReadFilter === 'read') {
        filtered = filtered.filter(n => n.read);
      }
      
      // 排序
      if (currentSort === 'newest') {
        filtered.sort((a, b) => b.timestamp - a.timestamp);
      } else {
        filtered.sort((a, b) => a.timestamp - b.timestamp);
      }

      const container = document.getElementById('notification-list');
      if (!container) return;

      if (filtered.length === 0) {
        container.innerHTML = `
          <div class="notification-empty">
            <div class="icon">📭</div>
            <h3>暂无通知</h3>
            <p>您目前没有相关通知</p>
          </div>
        `;
        return;
      }

      container.innerHTML = filtered.map(notification => `
        <div class="notification-item ${notification.read ? '' : 'unread'}" data-id="${notification.id}">
          <div class="notification-icon-wrap ${notification.type}">
            ${notification.icon}
          </div>
          <div class="notification-content">
            <div class="notification-header">
              <h4 class="notification-title">${notification.title}</h4>
              <span class="notification-time">${formatTime(notification.timestamp)}</span>
            </div>
            <p class="notification-text">${notification.content}</p>
            <span class="notification-tag ${notification.type}">${notificationCenter.getTypeName(notification.type)}</span>
            <div class="notification-actions-btn">
              ${notification.url ? `<a href="${notification.url}" class="action-btn">查看详情</a>` : ''}
              <button class="action-btn ${notification.read ? '' : 'mark-read'}" data-action="toggle-read">${notification.read ? '标记未读' : '标记已读'}</button>
              <button class="action-btn delete" data-action="delete">删除</button>
            </div>
          </div>
        </div>
      `).join('');

      // 绑定事件
      bindNotificationEvents(container);
    }

    // 格式化时间
    function formatTime(timestamp) {
      const now = Date.now();
      const diff = now - timestamp;
      const minutes = Math.floor(diff / (1000 * 60));
      const hours = Math.floor(diff / (1000 * 60 * 60));
      const days = Math.floor(diff / (1000 * 60 * 60 * 24));

      if (minutes < 1) return '刚刚';
      if (minutes < 60) return `${minutes}分钟前`;
      if (hours < 24) return `${hours}小时前`;
      if (days < 7) return `${days}天前`;
      
      const date = new Date(timestamp);
      return `${date.getMonth() + 1}月${date.getDate()}日`;
    }

    // 绑定通知项事件
    function bindNotificationEvents(container) {
      container.querySelectorAll('.notification-item').forEach(item => {
        item.addEventListener('click', (e) => {
          if (e.target.closest('.notification-actions-btn')) return;
          
          const id = item.dataset.id;
          const notification = notificationCenter.notifications.find(n => n.id === id);
          
          if (notification) {
            notificationCenter.markAsRead(id);
            item.classList.remove('unread');
            
            if (notification.url) {
              window.location.href = notification.url;
            }
          }
        });
      });

      container.querySelectorAll('.notification-actions-btn button').forEach(btn => {
        btn.addEventListener('click', (e) => {
          e.stopPropagation();
          const item = btn.closest('.notification-item');
          const id = item.dataset.id;
          const action = btn.dataset.action;

          if (action === 'toggle-read') {
            const notification = notificationCenter.notifications.find(n => n.id === id);
            if (notification) {
              notification.read = !notification.read;
              notificationCenter.saveNotifications();
              btn.textContent = notification.read ? '标记未读' : '标记已读';
              item.classList.toggle('unread', !notification.read);
              updateBadge();
            }
          } else if (action === 'delete') {
            notificationCenter.deleteNotification(id);
            item.style.animation = 'fadeOut 0.3s ease';
            setTimeout(() => {
              item.remove();
              updateSidebarCounts();
              renderNotificationList();
            }, 300);
          }
        });
      });
    }

    // 按类型筛选
    function filterNotifications(type, element) {
      currentFilter = type;
      
      // 更新侧边栏激活状态
      document.querySelectorAll('.sidebar-menu a').forEach(a => {
        a.classList.remove('active');
      });
      element.classList.add('active');
      
      // 重置已读筛选
      document.querySelectorAll('.notification-tab').forEach(tab => {
        tab.classList.remove('active');
      });
      document.querySelector('.notification-tab[data-filter="all"]').classList.add('active');
      currentReadFilter = 'all';
      
      renderNotificationList();
    }

    // 设置已读筛选
    function setReadFilter(filter, element) {
      currentReadFilter = filter;
      
      document.querySelectorAll('.notification-tab').forEach(tab => {
        tab.classList.remove('active');
      });
      element.classList.add('active');
      
      renderNotificationList();
    }

    // 设置排序
    function setSortOrder(order) {
      currentSort = order;
      renderNotificationList();
    }

    // 全部已读
    function markAllAsRead() {
      notificationCenter.markAllAsRead();
      renderNotificationList();
      updateBadge();
    }

    // 更新侧边栏数量
    function updateSidebarCounts() {
      document.getElementById('count-all').textContent = notificationCenter.notifications.length;
      document.getElementById('count-system').textContent = notificationCenter.getCountByType('system');
      document.getElementById('count-order').textContent = notificationCenter.getCountByType('order');
      document.getElementById('count-activity').textContent = notificationCenter.getCountByType('activity');
      document.getElementById('count-reminder').textContent = notificationCenter.getCountByType('reminder');
    }

    // 更新徽章
    function updateBadge() {
      const badge = document.getElementById('nav-notification-badge');
      if (badge) {
        const count = notificationCenter.getUnreadCount();
        badge.textContent = count > 99 ? '99+' : count;
        badge.classList.toggle('zero', count === 0);
      }
    }

    // 用户菜单切换
    function toggleUserMenu() {
      const menu = document.getElementById('userMenu');
      menu.classList.toggle('open');
    }

    // 关闭用户菜单（点击外部）
    document.addEventListener('click', (e) => {
      const menu = document.getElementById('userMenu');
      if (menu && !menu.contains(e.target)) {
        menu.classList.remove('open');
      }
    });
  </script>
