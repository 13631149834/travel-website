# ============================================
# 安全响应头配置文件
# ============================================
# 游导旅游平台 - Web服务器安全头配置
# ============================================
# 适用于 Nginx、Apache 或其他兼容服务器
# ============================================

# ============================================
# Nginx 配置
# ============================================

# 在 server {} 块中添加以下配置

# ---------- 内容安全策略 (CSP) ----------
# 严格的内容安全策略，限制资源加载来源
# 注意：需要根据实际资源调整配置
add_header Content-Security-Policy "
    default-src 'self';
    script-src 'self' 'unsafe-inline' 'unsafe-eval' https://cdn.jsdelivr.net https://cdn.bootcdn.net;
    style-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net https://cdn.bootcdn.net;
    img-src 'self' data: https: blob:;
    font-src 'self' https://cdn.jsdelivr.net https://cdn.bootcdn.net data:;
    connect-src 'self' https://*.supabase.co wss://*.supabase.co https://api.coze.cn;
    frame-src 'none';
    object-src 'none';
    base-uri 'self';
    form-action 'self';
    frame-ancestors 'none';
    upgrade-insecure-requests;
" always;

# ---------- X-Frame-Options ----------
# 防止页面被嵌入iframe
add_header X-Frame-Options "SAMEORIGIN" always;

# ---------- X-Content-Type-Options ----------
# 禁止浏览器MIME类型嗅探
add_header X-Content-Type-Options "nosniff" always;

# ---------- X-XSS-Protection ----------
# 启用浏览器XSS过滤器（现代浏览器已内置）
add_header X-XSS-Protection "1; mode=block" always;

# ---------- Strict-Transport-Security (HSTS) ----------
# 强制使用HTTPS
add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

# ---------- Referrer-Policy ----------
# 控制Referer头信息
add_header Referrer-Policy "strict-origin-when-cross-origin" always;

# ---------- Permissions-Policy ----------
# 控制浏览器功能权限
add_header Permissions-Policy "
    geolocation=(),
    microphone=(),
    camera=(),
    payment=()
" always;

# ---------- X-Download-Options ----------
# 禁止在IE中自动下载
add_header X-Download-Options "noopen" always;

# ---------- X-Permitted-Cross-Domain-Policies ----------
# 限制Flash和PDF的跨域访问
add_header X-Permitted-Cross-Domain-Policies "none" always;

# ---------- Cache-Control ----------
# 安全缓存策略（根据实际需求调整）
# 静态资源长期缓存
location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
    add_header Cache-Control "public, max-age=31536000, immutable" always;
}

# HTML不缓存
location ~* \.html$ {
    add_header Cache-Control "no-cache, no-store, must-revalidate" always;
    add_header Pragma "no-cache" always;
    add_header Expires "0" always;
}

# API响应不缓存
location ~ ^/api/ {
    add_header Cache-Control "no-store, no-cache, must-revalidate" always;
}


