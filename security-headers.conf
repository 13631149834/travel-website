# ============================================
# 注意事项
# ============================================

# 1. CSP 配置
#    - 首次部署建议使用 report-uri 监控违规
#    - 示例: script-src 'self' 'unsafe-inline'; report-uri /csp-report
#    - 逐步收紧策略，移除 'unsafe-inline'（需要内联脚本迁移到外部文件）

# 2. HSTS 配置
#    - 一旦启用，用户在证书过期时也无法访问
#    - 建议先使用 max-age=300 测试
#    - 确认所有子域名都支持HTTPS后再增加max-age

# 3. 缓存策略
#    - 敏感页面（用户资料、支付等）不要缓存
#    - 静态资源可以长期缓存，配合版本号或hash

# 4. CORS 配置
#    - 在后端单独配置，不要依赖CSP的 frame-ancestors
#    - 示例（Nginx）:
#      location /api/ {
#          add_header Access-Control-Allow-Origin "https://youdao-travel.com";
#          add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS";
#          add_header Access-Control-Allow-Headers "Content-Type, Authorization, X-CSRF-Token";
#          add_header Access-Control-Allow-Credentials "true";
#          
#          if ($request_method = 'OPTIONS') {
#              return 204;
#          }
#      }

# 5. 安全Cookie
#    - 设置Secure、HttpOnly、SameSite属性
#    - 示例:
#      Set-Cookie: session_id=xxx; Path=/; Secure; HttpOnly; SameSite=Strict


