<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>对话历史 - 游导旅游</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#0ea5e9',
            secondary: '#06b6d4',
          }
        }
      }
    }
  </script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;600;700&display=swap');
    body { font-family: 'Noto Sans SC', sans-serif; }
    .gradient-hero { background: linear-gradient(135deg, #0ea5e9 0%, #06b6d4 50%, #10b981 100%); }
    
    .fade-in {
      animation: fadeIn 0.6s ease;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    
    .chat-session {
      transition: all 0.3s ease;
    }
    .chat-session:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(14, 165, 233, 0.12);
    }
    
    .message-preview {
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    
    .empty-state {
      animation: float 3s ease-in-out infinite;
    }
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }
  </style>
</head>
<body class="bg-gradient-to-br from-slate-50 to-blue-50 min-h-screen">
  <!-- 导航栏 -->
  <nav class="gradient-hero text-white sticky top-0 z-50 shadow-lg">
    <div class="max-w-7xl mx-auto px-4 py-4">
      <div class="flex items-center justify-between">
        <a href="index.html" class="flex items-center gap-2 hover:opacity-90 transition">
          <span class="text-3xl">🧭</span>
          <span class="text-2xl font-bold">游导旅游</span>
        </a>
        <div class="hidden md:flex items-center gap-8">
          <a href="index.html" class="hover:opacity-80 transition">首页</a>
          <a href="destinations.html" class="hover:opacity-80 transition">目的地</a>
          <a href="routes.html" class="hover:opacity-80 transition">路线</a>
          <a href="index.html" class="hover:opacity-80 transition">智能问答</a>
          <a href="history.html" class="hover:opacity-80 transition font-medium border-b-2 border-white pb-1">历史记录</a>
        </div>
        <button class="md:hidden text-2xl" onclick="toggleMenu()">☰</button>
      </div>
      <!-- 移动端菜单 -->
      <div id="mobileMenu" class="hidden md:hidden mt-4 pb-2 space-y-3">
        <a href="index.html" class="block py-2">首页</a>
        <a href="destinations.html" class="block py-2">目的地</a>
        <a href="routes.html" class="block py-2">路线</a>
        <a href="index.html" class="block py-2">智能问答</a>
        <a href="history.html" class="block py-2 font-semibold">历史记录</a>
      </div>
    </div>
  </nav>

  <div class="max-w-4xl mx-auto px-4 py-12">
    <!-- 页面标题 -->
    <div class="flex items-center justify-between mb-10 fade-in">
      <div>
        <div class="inline-flex items-center gap-2 px-4 py-2 bg-blue-100 text-primary rounded-full text-sm mb-4">
          <span>📋</span>
          <span>智能问答</span>
        </div>
        <h1 class="text-3xl md:text-4xl font-bold text-gray-800">对话历史</h1>
        <p class="text-gray-600 mt-2">查看和管理您的历史对话记录</p>
      </div>
      <button onclick="clearAllHistory()" class="px-5 py-3 bg-red-50 text-red-500 border border-red-200 rounded-xl font-medium hover:bg-red-100 transition flex items-center gap-2">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path>
        </svg>
        清空全部
      </button>
    </div>

    <!-- 搜索框 -->
    <div class="mb-8 fade-in">
      <div class="relative">
        <input 
          type="text" 
          id="searchInput"
          class="w-full px-5 py-4 pl-12 bg-white border-2 border-gray-200 rounded-2xl focus:border-primary focus:outline-none text-lg"
          placeholder="🔍 搜索对话内容..."
          oninput="filterHistory()"
        >
        <svg class="absolute left-4 top-1/2 -translate-y-1/2 w-5 h-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
        </svg>
      </div>
    </div>

    <!-- 统计信息 -->
    <div class="grid grid-cols-3 gap-4 mb-8 fade-in">
      <div class="bg-white rounded-2xl p-4 text-center shadow-md border border-gray-100">
        <div class="text-3xl font-bold text-primary" id="totalSessions">0</div>
        <div class="text-sm text-gray-500">总会话数</div>
      </div>
      <div class="bg-white rounded-2xl p-4 text-center shadow-md border border-gray-100">
        <div class="text-3xl font-bold text-green-500" id="todaySessions">0</div>
        <div class="text-sm text-gray-500">今日会话</div>
      </div>
      <div class="bg-white rounded-2xl p-4 text-center shadow-md border border-gray-100">
        <div class="text-3xl font-bold text-purple-500" id="totalMessages">0</div>
        <div class="text-sm text-gray-500">总消息数</div>
      </div>
    </div>

    <!-- 历史会话列表 -->
    <div id="historyList" class="space-y-4">
      <!-- 动态生成 -->
    </div>

    <!-- 空状态 -->
    <div id="emptyState" class="hidden text-center py-16">
      <div class="empty-state text-8xl mb-6">💬</div>
      <h2 class="text-2xl font-bold text-gray-800 mb-4">暂无对话记录</h2>
      <p class="text-gray-600 mb-8 max-w-md mx-auto">开始与游导小助手对话，您的对话历史将在这里显示</p>
      <a href="index.html" class="inline-flex items-center gap-2 px-6 py-3 gradient-hero text-white rounded-full font-semibold hover:shadow-lg transition">
        <span>💬</span>
        <span>开始对话</span>
      </a>
    </div>
  </div>

  <!-- 对话详情模态框 -->
  <div id="detailModal" class="fixed inset-0 bg-black/50 z-50 hidden">
    <div class="h-full flex items-center justify-center p-4">
      <div class="bg-white rounded-3xl max-w-2xl w-full max-h-[90vh] overflow-hidden flex flex-col">
        <!-- 模态框头部 -->
        <div class="px-6 py-4 border-b border-gray-100 flex items-center justify-between">
          <div>
            <h3 class="font-bold text-gray-800" id="modalTitle">对话详情</h3>
            <p class="text-sm text-gray-500" id="modalTime"></p>
          </div>
          <button onclick="closeDetailModal()" class="w-10 h-10 bg-gray-100 rounded-full flex items-center justify-center hover:bg-gray-200 transition">
            <svg class="w-5 h-5 text-gray-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
            </svg>
          </button>
        </div>
        <!-- 模态框内容 -->
        <div class="flex-1 overflow-y-auto p-6 bg-gray-50" id="modalContent">
          <!-- 动态生成 -->
        </div>
        <!-- 模态框底部 -->
        <div class="px-6 py-4 border-t border-gray-100 flex justify-between">
          <button onclick="deleteCurrentSession()" class="px-5 py-2 text-red-500 hover:bg-red-50 rounded-lg transition flex items-center gap-2">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path>
            </svg>
            删除此对话
          </button>
          <a href="index.html" class="px-5 py-2 gradient-hero text-white rounded-lg hover:shadow-lg transition flex items-center gap-2">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"></path>
            </svg>
            继续对话
          </a>
        </div>
      </div>
    </div>
  </div>

  <!-- 页脚 -->
  <footer class="bg-gray-800 text-white py-8 mt-12">
    <div class="max-w-7xl mx-auto px-4 text-center">
      <div class="flex justify-center gap-4 mb-4">
        <a href="index.html" class="px-4 py-2 hover:text-primary transition">智能问答</a>
        <a href="knowledge.html" class="px-4 py-2 hover:text-primary transition">知识库</a>
        <a href="settings.html" class="px-4 py-2 hover:text-primary transition">设置</a>
        <a href="history.html" class="px-4 py-2 hover:text-primary transition">历史记录</a>
      </div>
      <p class="text-gray-400">© 2024 游导旅游 · 让旅行更简单</p>
    </div>
  </footer>

  <script>
    // 会话数据
    let sessions = [];
    let currentSessionId = null;

    // 初始化
    function init() {
      loadSessions();
      renderSessions();
      updateStats();
    }

    // 加载会话
    function loadSessions() {
      const stored = localStorage.getItem('botChatSessions');
      if (stored) {
        sessions = JSON.parse(stored);
      } else {
        // 如果没有分会话存储，从主历史中创建
        const mainHistory = JSON.parse(localStorage.getItem('botChatHistory') || '[]');
        if (mainHistory.length > 0) {
          sessions = [{
            id: 'session_' + Date.now(),
            date: new Date().toISOString(),
            messages: mainHistory
          }];
          saveSessions();
        }
      }
    }

    // 保存会话
    function saveSessions() {
      localStorage.setItem('botChatSessions', JSON.stringify(sessions));
    }

    // 渲染会话列表
    function renderSessions(filter = '') {
      const list = document.getElementById('historyList');
      const emptyState = document.getElementById('emptyState');
      
      let filteredSessions = sessions;
      if (filter) {
        filteredSessions = sessions.filter(s => {
          return s.messages.some(m => 
            m.content.toLowerCase().includes(filter.toLowerCase())
          );
        });
      }

      if (filteredSessions.length === 0) {
        list.innerHTML = '';
        emptyState.classList.remove('hidden');
        return;
      }

      emptyState.classList.add('hidden');
      
      list.innerHTML = filteredSessions.map(session => {
        const date = new Date(session.date);
        const dateStr = formatDate(date);
        const lastMessage = session.messages[session.messages.length - 1]?.content || '';
        const preview = lastMessage.length > 100 ? lastMessage.substring(0, 100) + '...' : lastMessage;
        const messageCount = session.messages.length;
        
        return `
          <div class="chat-session bg-white rounded-2xl p-5 shadow-md border border-gray-100 cursor-pointer" onclick="showDetail('${session.id}')">
            <div class="flex items-start justify-between mb-3">
              <div class="flex items-center gap-3">
                <div class="w-12 h-12 bg-gradient-to-br from-primary to-secondary rounded-xl flex items-center justify-center text-2xl">
                  🧭
                </div>
                <div>
                  <h3 class="font-semibold text-gray-800">旅行问答会话</h3>
                  <p class="text-sm text-gray-500">${dateStr}</p>
                </div>
              </div>
              <span class="px-3 py-1 bg-blue-100 text-primary rounded-full text-sm">${messageCount}条消息</span>
            </div>
            <div class="message-preview text-gray-600 pl-15">
              ${preview || '暂无内容'}
            </div>
            <div class="flex items-center justify-between mt-4 pt-3 border-t border-gray-100">
              <button onclick="event.stopPropagation(); deleteSession('${session.id}')" class="text-gray-400 hover:text-red-500 transition flex items-center gap-1">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path>
                </svg>
                <span class="text-sm">删除</span>
              </button>
              <button onclick="event.stopPropagation(); continueSession('${session.id}')" class="text-primary hover:underline text-sm flex items-center gap-1">
                <span>继续对话</span>
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path>
                </svg>
              </button>
            </div>
          </div>
        `;
      }).join('');
    }

    // 格式化日期
    function formatDate(date) {
      const now = new Date();
      const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
      const yesterday = new Date(today - 86400000);
      const sessionDate = new Date(date.getFullYear(), date.getMonth(), date.getDate());
      
      const timeStr = date.toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' });
      
      if (sessionDate.getTime() === today.getTime()) {
        return `今天 ${timeStr}`;
      } else if (sessionDate.getTime() === yesterday.getTime()) {
        return `昨天 ${timeStr}`;
      } else {
        return `${date.getMonth() + 1}月${date.getDate()}日 ${timeStr}`;
      }
    }

    // 更新统计
    function updateStats() {
      const today = new Date();
      today.setHours(0, 0, 0, 0);
      
      const todaySessions = sessions.filter(s => new Date(s.date) >= today);
      const totalMessages = sessions.reduce((sum, s) => sum + s.messages.length, 0);
      
      document.getElementById('totalSessions').textContent = sessions.length;
      document.getElementById('todaySessions').textContent = todaySessions.length;
      document.getElementById('totalMessages').textContent = totalMessages;
    }

    // 搜索过滤
    function filterHistory() {
      const query = document.getElementById('searchInput').value;
      renderSessions(query);
    }

    // 显示详情
    function showDetail(sessionId) {
      const session = sessions.find(s => s.id === sessionId);
      if (!session) return;
      
      currentSessionId = sessionId;
      
      document.getElementById('modalTitle').textContent = '对话详情';
      document.getElementById('modalTime').textContent = new Date(session.date).toLocaleString('zh-CN');
      
      const content = document.getElementById('modalContent');
      content.innerHTML = session.messages.map(msg => {
        const isUser = msg.role === 'user';
        return `
          <div class="flex ${isUser ? 'justify-end' : 'justify-start'} mb-4">
            <div class="max-w-[80%] ${isUser ? 'order-2' : 'order-1'}">
              <div class="flex items-end gap-2 ${isUser ? 'flex-row-reverse' : ''}">
                <div class="w-8 h-8 ${isUser ? 'bg-green-500' : 'bg-gradient-to-br from-primary to-secondary'} rounded-full flex items-center justify-center text-sm">
                  ${isUser ? '👤' : '🧭'}
                </div>
                <div class="${isUser ? 'bg-primary text-white' : 'bg-white text-gray-800'} px-4 py-2 rounded-2xl ${isUser ? 'rounded-br-sm' : 'rounded-bl-sm'} shadow-sm">
                  ${msg.content.replace(/\n/g, '<br>')}
                </div>
              </div>
            </div>
          </div>
        `;
      }).join('');
      
      document.getElementById('detailModal').classList.remove('hidden');
      content.scrollTop = content.scrollHeight;
    }

    // 关闭详情
    function closeDetailModal() {
      document.getElementById('detailModal').classList.add('hidden');
      currentSessionId = null;
    }

    // 删除会话
    function deleteSession(sessionId) {
      if (confirm('确定要删除这个会话吗？')) {
        sessions = sessions.filter(s => s.id !== sessionId);
        saveSessions();
        renderSessions();
        updateStats();
        
        if (currentSessionId === sessionId) {
          closeDetailModal();
        }
      }
    }

    // 删除当前会话
    function deleteCurrentSession() {
      if (currentSessionId) {
        deleteSession(currentSessionId);
      }
    }

    // 清空所有历史
    function clearAllHistory() {
      if (sessions.length === 0) {
        alert('暂无历史记录');
        return;
      }
      if (confirm('确定要清空所有对话历史吗？此操作不可恢复。')) {
        sessions = [];
        localStorage.removeItem('botChatHistory');
        localStorage.removeItem('botChatSessions');
        renderSessions();
        updateStats();
      }
    }

    // 继续会话
    function continueSession(sessionId) {
      const session = sessions.find(s => s.id === sessionId);
      if (session) {
        // 将选中的消息加载到当前会话
        localStorage.setItem('botChatHistory', JSON.stringify(session.messages));
        window.location.href = 'index.html';
      }
    }

    // 移动端菜单
    function toggleMenu() {
      document.getElementById('mobileMenu').classList.toggle('hidden');
    }

    // 点击模态框外部关闭
    document.getElementById('detailModal').addEventListener('click', function(e) {
      if (e.target === this) {
        closeDetailModal();
      }
    });

    // 初始化
    init();
  </script>
</body>
</html>
