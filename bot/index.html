    /* 聊天区域样式 */
    .chat-container {
      height: calc(100vh - 200px);
      min-height: 500px;

      scrollbar-width: thin;

    }

      background: #cbd5e1;
      border-radius: 3px;
    }
    
    /* 消息气泡动画 */
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .message-animate {
      animation: fadeInUp 0.3s ease forwards;
    }
    
    /* 打字动画 */
    @keyframes bounce {
      0%, 80%, 100% { transform: scale(0.6); opacity: 0.4; }
      40% { transform: scale(1); opacity: 1; }
    }
    .typing-dot {
      animation: bounce 1.4s infinite ease-in-out both;

• ⛩️ 浅草寺 - 雷门、仲见世街
• 🏛️ 皇居 - 日本皇室居所
• 🛍️ 新宿、涩谷、银座 - 购物天堂

**特色体验**：
• 🎮 秋叶原 - 动漫、游戏
• 🐱 猫咪咖啡馆
• 🏯 明治神宫 - 祈福参拜

**近郊推荐**：
• 🏮 川越小江户 - 江户风情
• 🎢 迪士尼乐园`
        },
        {
          keywords: ["购物", "退税", "免税"],
          answer: `🛍️ **日本购物退税指南**

**免税条件**：
• 一般商品：同一天同一家店消费满5,000日元

3. 护照上会贴免税购物清单
4. 出境时海关可能会抽查

**注意事项**：

        }
      ]
    };

    // DOM 元素
    const messagesContainer = document.getElementById('messagesContainer');
    const messageInput = document.getElementById('messageInput');

    // 初始化
    function init() {
      loadChatHistory();
      messageInput.focus();
    }

    // 加载聊天历史
    function loadChatHistory() {
      const history = JSON.parse(localStorage.getItem('botChatHistory') || '[]');
      history.forEach(msg => {
        addMessage(msg.content, msg.role, false);
      });
    }

    // 保存聊天历史
    function saveChatHistory() {
      const messages = [];
      messagesContainer.querySelectorAll('.message-animate').forEach(el => {
        const role = el.classList.contains('flex-row-reverse') ? 'user' : 'bot';
        const content = el.querySelector('.bubble-bot, .bubble-user').textContent;
        messages.push({ role, content });
      });
      localStorage.setItem('botChatHistory', JSON.stringify(messages.slice(-50)));
    }

    // 发送消息
    function sendMessage() {
      const message = messageInput.value.trim();
      if (!message) return;

      addMessage(message, 'user');
      messageInput.value = '';
      autoResize(messageInput);

      // 保存到历史
      const history = JSON.parse(localStorage.getItem('botChatHistory') || '[]');
      history.push({ role: 'user', content: message });
      localStorage.setItem('botChatHistory', JSON.stringify(history));

      // 显示打字动画
      showTyping();

      // 模拟延迟回复
      setTimeout(() => {
        hideTyping();
        const response = getBotResponse(message);
        addMessage(response, 'bot');
        
        const updatedHistory = JSON.parse(localStorage.getItem('botChatHistory') || '[]');
        updatedHistory.push({ role: 'bot', content: response });
        localStorage.setItem('botChatHistory', JSON.stringify(updatedHistory));
      }, 800 + Math.random() * 800);
    }

    // 获取机器人回复
    function getBotResponse(message) {
      const lowerMsg = message.toLowerCase();

      // 遍历所有响应
      for (const resp of botResponses.responses) {
        for (const keyword of resp.keywords) {
          if (lowerMsg.includes(keyword.toLowerCase())) {
            return resp.answer;
          }
        }
      }

      // 检查是否包含招呼
      if (/^[嗨嗨?|hi|hello|你好|嗨]$/i.test(message.trim())) {
        return `👋 你好呀！欢迎来到游导旅游！

我是您的智能旅行助手，可以帮您解答：
📋 签证问题
✈️ 交通出行
🏨 酒店住宿
🍜 美食推荐
🏛️ 景点攻略
🛍️ 购物退税

请告诉我您想去哪里旅行，或者有什么问题想咨询呢？`;
      }

      // 检查是否感谢
      if (/^[谢谢|感谢|谢啦|多谢]$/i.test(message.trim())) {
        return `😊 不客气！

如果您还有其他问题，随时问我哦～

祝您旅途愉快！🌍✨`;
      }

      // 默认回复
      return `🤔 抱歉，我没能完全理解您的问题。

您可以尝试这样问我：
• "日本签证怎么办理"
• "东京有什么好吃的"
• "大阪环球影城攻略"
• "日本JR Pass怎么买"

或者点击上方的分类按钮，我会为您详细解答！`;
    }

    // 添加消息
    function addMessage(content, role, animate = true) {
      const messageDiv = document.createElement('div');
      messageDiv.className = `flex items-start gap-3 mb-6 ${animate ? 'message-animate' : ''} ${role === 'user' ? 'flex-row-reverse' : ''}`;
      
      const avatar = role === 'bot' ? '🧭' : '👤';
      const bubbleClass = role === 'bot' ? 'bubble-bot' : 'bubble-user';
      const textColor = role === 'bot' ? 'text-gray-800' : 'text-white';
      
      messageDiv.innerHTML = `
        <div class="w-10 h-10 bg-gradient-to-br ${role === 'bot' ? 'from-primary to-secondary' : 'from-green-400 to-green-500'} rounded-full flex items-center justify-center text-lg flex-shrink-0">
          ${avatar}
        </div>
        <div class="${bubbleClass} px-5 py-3 max-w-xl">
          <p class="${textColor} leading-relaxed whitespace-pre-wrap">${content.replace(/\n/g, '<br>')}</p>
        </div>
      `;
      
      messagesContainer.appendChild(messageDiv);
      messagesContainer.scrollTop = messagesContainer.scrollHeight;
    }

    // 显示打字动画
    function showTyping() {
      const typingDiv = document.createElement('div');
      typingDiv.id = 'typingIndicator';
      typingDiv.className = 'flex items-start gap-3 mb-6 message-animate';
      typingDiv.innerHTML = `
        <div class="w-10 h-10 bg-gradient-to-br from-primary to-secondary rounded-full flex items-center justify-center text-lg flex-shrink-0">
          🧭
        </div>
        <div class="bubble-bot px-5 py-3 flex items-center gap-1">
          <div class="w-2 h-2 bg-gray-400 rounded-full typing-dot"></div>
          <div class="w-2 h-2 bg-gray-400 rounded-full typing-dot"></div>
          <div class="w-2 h-2 bg-gray-400 rounded-full typing-dot"></div>
        </div>
      `;
      messagesContainer.appendChild(typingDiv);
      messagesContainer.scrollTop = messagesContainer.scrollHeight;
    }

    // 隐藏打字动画
    function hideTyping() {
      const typing = document.getElementById('typingIndicator');
      if (typing) typing.remove();
    }

    // 自动调整输入框高度
    function autoResize(textarea) {
      textarea.style.height = 'auto';
      textarea.style.height = Math.min(textarea.scrollHeight, 120) + 'px';
    }

    // 发送快捷问题
    function sendQuickQuestion(question) {
      messageInput.value = question;
      sendMessage();
    }

    // 发送分类
    function sendCategory(category) {
      const cat = botResponses.categories[category];
      if (cat) {
        addMessage(cat.response, 'bot');
        const history = JSON.parse(localStorage.getItem('botChatHistory') || '[]');
        history.push({ role: 'bot', content: cat.response });
        localStorage.setItem('botChatHistory', JSON.stringify(history));
      }
    }

    // 清空输入
    function clearInput() {
      messageInput.value = '';
      autoResize(messageInput);
      messageInput.focus();
    }

    // 清空对话
    function clearChat() {
      if (confirm('确定要清空所有对话记录吗？')) {
        messagesContainer.innerHTML = '';
        localStorage.removeItem('botChatHistory');
        
        // 添加欢迎消息
        const welcomeDiv = document.createElement('div');
        welcomeDiv.className = 'flex items-start gap-3 mb-6 message-animate';
        welcomeDiv.innerHTML = `
          <div class="w-10 h-10 bg-gradient-to-br from-primary to-secondary rounded-full flex items-center justify-center text-lg flex-shrink-0">
            🧭
          </div>
          <div class="bubble-bot px-5 py-3 max-w-xl">
            <p class="text-gray-800 leading-relaxed whitespace-pre-wrap">👋 聊天记录已清空！</p>
            <p class="text-gray-800 leading-relaxed whitespace-pre-wrap mt-2">我是您的智能旅行助手，有什么可以帮您的吗？😊</p>
          </div>
        `;
        messagesContainer.appendChild(welcomeDiv);
      }
    }

    // 处理键盘事件
    function handleKeyDown(event) {
      if (event.key === 'Enter' && !event.shiftKey) {
        event.preventDefault();
        sendMessage();
      }
    }

    // 移动端菜单切换
    function toggleMenu() {
      document.getElementById('mobileMenu').classList.toggle('hidden');
    }

    // 初始化
    init();
  </script>
</body>
</html>
