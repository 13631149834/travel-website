  <style>
    .contact-section {
      max-width: 640px;
      margin: 0 auto;
      padding: 48px 0 80px;
    }
    .contact-card {
      background: #fff;
      border: 1px solid var(--gray-200);
      border-radius: var(--radius-lg);
      padding: 40px;
    }
    .contact-card h2 {
      font-size: 1.25rem;
      font-weight: 600;
      color: var(--gray-900);
      margin-bottom: 8px;
      text-align: center;
    }
    .contact-card > p {
      color: var(--gray-500);
      text-align: center;
      margin-bottom: 32px;
      font-size: 0.95rem;
    }
    .contact-info {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-bottom: 32px;
    }
    .info-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 16px;
      background: var(--gray-50);
      border-radius: var(--radius-md);
    }
    .info-item .icon {
      font-size: 1.5rem;
    }
    .info-item .text strong {
      display: block;
      font-size: 0.9rem;
      color: var(--gray-900);
    }
    .info-item .text span {
      font-size: 0.85rem;
      color: var(--gray-500);
    }
    
    /* 表单增强样式 */
    .contact-form .form-input {
      transition: all 0.3s ease;
    }
    .contact-form .form-input:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(79, 134, 247, 0.15);
      background: #fff;
    }
    .contact-form .form-input.success {
      border-color: var(--secondary);
      background: rgba(16, 185, 129, 0.03);
    }
    .contact-form .form-input.error {
      border-color: var(--error, #EF4444);
      animation: formShake 0.4s ease;
    }
    @keyframes formShake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-4px); }
      75% { transform: translateX(4px); }
    }
    .contact-form .form-textarea {
      min-height: 140px;
      resize: vertical;
    }
    .contact-form .btn-submit {
      position: relative;
      overflow: hidden;
    }
    .contact-form .btn-submit::after {
      content: '';
      position: absolute;
      width: 100%;
      height: 100%;
      top: 0;
      left: -100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
      transition: left 0.5s;
    }
    .contact-form .btn-submit:hover::after {
      left: 100%;
    }
    .contact-form .btn-submit.loading {
      pointer-events: none;
    }
    .contact-form .btn-submit.loading::after {
      display: none;
    }
    
    @media (max-width: 480px) {
      .contact-info {
        grid-template-columns: 1fr;
      }
      .contact-card {
        padding: 24px 16px;
      }
    }
  
/* 无障碍 - 焦点可见样式 (WCAG 2.1 AA) */
.skip-link {
  position: absolute;
  top: -100px;
  left: 50%;
  transform: translateX(-50%);
  background: var(--primary);
  color: #fff !important;
  padding: 12px 24px;
  border-radius: 0 0 8px 8px;
  z-index: 10000;
  font-weight: 600;
  transition: top 0.2s;
}
.skip-link:focus {
  top: 0;
  outline: 3px solid var(--primary-dark);
  outline-offset: 2px;
}

/* 全局焦点样式 */
:focus {
  outline: 3px solid var(--primary);
  outline-offset: 2px;
}
:focus:not(:focus-visible) {
  outline: none;
}
:focus-visible {
  outline: 3px solid var(--primary);
  outline-offset: 2px;
}

/* 链接焦点样式 */
a:focus,
button:focus,
[tabindex]:focus {
  outline: 3px solid var(--primary);
  outline-offset: 2px;
  border-radius: 2px;
}

/* 输入框焦点 */
input:focus,
textarea:focus,
select:focus {
  outline: 3px solid var(--primary);
  outline-offset: 0;
  border-color: var(--primary);
}

  <script>
    // 联系表单提交处理
    function handleContactSubmit(e) {
      e.preventDefault();
      const form = e.target;
      const btn = form.querySelector('.btn-submit');
      const originalText = btn.innerHTML;
      
      // 验证表单
      const inputs = form.querySelectorAll('.form-input[required]');
      let isValid = true;
      
      inputs.forEach(input => {
        if (!input.value.trim()) {
          input.classList.add('error');
          isValid = false;
        } else {
          input.classList.remove('error');
        }
      });
      
      if (!isValid) {
        if (typeof FormEnhance !== 'undefined') {
          FormEnhance.showToast && FormEnhance.showToast('请填写完整信息', 'error');
        }
        return;
      }
      
      // 添加loading状态
      btn.classList.add('loading');
      btn.innerHTML = '⏳ 提交中...';
      btn.disabled = true;
      
      // 模拟提交
      setTimeout(() => {
        btn.classList.remove('loading');
        btn.innerHTML = '✓ 提交成功';
        btn.style.background = '#10B981';
        
        // 重置表单
        setTimeout(() => {
          form.reset();
          btn.innerHTML = originalText;
          btn.style.background = '';
          btn.disabled = false;
          
          // 显示成功提示
          if (typeof Utils !== 'undefined' && Utils.showToast) {
            Utils.showToast('感谢您的留言，我们会尽快回复！', 'success');
          } else {
            alert('感谢您的留言，我们会尽快回复！');
          }
        }, 2000);
      }, 1500);
    }
  </script>
