<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>网站维护中 | 游导旅游</title>
  <meta name="description" content="游导旅游网站正在维护中，请稍后再试，预计恢复时间请查看详情。">
  <meta name="robots" content="noindex, nofollow">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔧</text></svg>">
  <link rel="stylesheet" href="css/style.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: 'PingFang SC', 'Microsoft YaHei', -apple-system, BlinkMacSystemFont, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      overflow-x: hidden;
      position: relative;
    }

    /* 背景效果 */
    .bg-effects {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      overflow: hidden;
    }

    .gear {
      position: absolute;
      font-size: 60px;
      opacity: 0.1;
      animation: rotate 20s linear infinite;
    }

    .gear-1 { top: 10%; left: 5%; animation-duration: 25s; }
    .gear-2 { top: 60%; right: 10%; animation-duration: 30s; animation-direction: reverse; }
    .gear-3 { bottom: 15%; left: 15%; animation-duration: 35s; }

    @keyframes rotate {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    /* 进度条动画 */
    .progress-bg {
      position: fixed;
      top: 0; left: 0;
      height: 4px;
      background: linear-gradient(90deg, #667eea, #764ba2, #f093fb);
      background-size: 200% 100%;
      animation: shimmer 2s linear infinite;
    }

    @keyframes shimmer {
      0% { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }

    /* 导航栏 */
    .nav-bar {
      position: relative;
      z-index: 100;
      padding: 20px 40px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 12px;
      color: white;
      text-decoration: none;
      font-size: 1.5rem;
      font-weight: 700;
    }

    .logo:hover { opacity: 0.9; }

    /* 主容器 */
    .main-container {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px;
      position: relative;
      z-index: 10;
    }

    .maintenance-content {
      text-align: center;
      max-width: 700px;
    }

    /* 维护图标 */
    .maintenance-icon-container {
      position: relative;
      width: 200px;
      height: 200px;
      margin: 0 auto 40px;
    }

    .wrench-animation {
      font-size: 100px;
      animation: wrenchBounce 1s ease-in-out infinite;
      filter: drop-shadow(0 10px 40px rgba(102, 126, 234, 0.5));
    }

    @keyframes wrenchBounce {
      0%, 100% { transform: rotate(-15deg); }
      50% { transform: rotate(15deg); }
    }

    .spanner-set {
      position: absolute;
      font-size: 40px;
      opacity: 0.6;
    }

    .spanner-1 {
      top: 10px; right: 0;
      animation: spannerFloat 2s ease-in-out infinite;
    }

    .spanner-2 {
      bottom: 20px; left: 10px;
      animation: spannerFloat 2s ease-in-out infinite 0.5s;
    }

    @keyframes spannerFloat {
      0%, 100% { transform: translateY(0) rotate(0deg); }
      50% { transform: translateY(-10px) rotate(10deg); }
    }

    h1 {
      font-size: 2.5rem;
      color: white;
      margin-bottom: 16px;
      text-shadow: 0 4px 20px rgba(0,0,0,0.3);
    }

    .maintenance-subtitle {
      font-size: 1.2rem;
      color: rgba(255,255,255,0.8);
      margin-bottom: 30px;
      line-height: 1.8;
    }

    /* 预计时间卡片 */
    .time-card {
      background: rgba(255,255,255,0.1);
      border-radius: 20px;
      padding: 30px;
      margin-bottom: 30px;
      border: 1px solid rgba(255,255,255,0.15);
      backdrop-filter: blur(10px);
    }

    .time-card h3 {
      color: white;
      font-size: 1rem;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .countdown-display {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin-bottom: 20px;
    }

    .countdown-item {
      text-align: center;
    }

    .countdown-number {
      display: block;
      font-size: 3rem;
      font-weight: 800;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1;
    }

    .countdown-label {
      font-size: 0.85rem;
      color: rgba(255,255,255,0.6);
      margin-top: 8px;
    }

    .countdown-separator {
      font-size: 2.5rem;
      color: rgba(255,255,255,0.3);
      line-height: 1;
      margin-top: 5px;
    }

    .maintenance-date {
      color: rgba(255,255,255,0.7);
      font-size: 0.95rem;
    }

    /* 进度展示 */
    .progress-section {
      background: rgba(255,255,255,0.08);
      border-radius: 16px;
      padding: 24px;
      margin-bottom: 30px;
      border: 1px solid rgba(255,255,255,0.1);
    }

    .progress-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
    }

    .progress-title {
      color: white;
      font-size: 1rem;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .progress-percentage {
      color: #667eea;
      font-weight: 700;
      font-size: 1.1rem;
    }

    .progress-bar {
      height: 12px;
      background: rgba(255,255,255,0.1);
      border-radius: 6px;
      overflow: hidden;
      margin-bottom: 16px;
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #667eea, #764ba2);
      border-radius: 6px;
      width: 0%;
      transition: width 1s ease;
      position: relative;
    }

    .progress-fill::after {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
      animation: progressShine 2s linear infinite;
    }

    @keyframes progressShine {
      from { transform: translateX(-100%); }
      to { transform: translateX(100%); }
    }

    .progress-tasks {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 12px;
    }

    .task-item {
      display: flex;
      align-items: center;
      gap: 10px;
      color: rgba(255,255,255,0.8);
      font-size: 0.9rem;
    }

    .task-status {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.8rem;
      flex-shrink: 0;
    }

    .task-status.completed {
      background: #10b981;
      color: white;
    }

    .task-status.in-progress {
      background: #f59e0b;
      color: white;
      animation: pulse 1s ease-in-out infinite;
    }

    .task-status.pending {
      background: rgba(255,255,255,0.2);
      color: rgba(255,255,255,0.5);
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    /* 操作按钮 */
    .actions {
      display: flex;
      gap: 16px;
      justify-content: center;
      flex-wrap: wrap;
      margin-bottom: 30px;
    }

    .btn {
      padding: 14px 32px;
      border-radius: 50px;
      font-size: 1rem;
      font-weight: 600;
      text-decoration: none;
      transition: all 0.3s ease;
      cursor: pointer;
      border: none;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }

    .btn-primary {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      box-shadow: 0 8px 25px rgba(102, 126, 234, 0.4);
    }

    .btn-primary:hover {
      transform: translateY(-3px);
      box-shadow: 0 12px 35px rgba(102, 126, 234, 0.5);
    }

    .btn-secondary {
      background: rgba(255,255,255,0.1);
      color: white;
      border: 2px solid rgba(255,255,255,0.3);
      backdrop-filter: blur(10px);
    }

    .btn-secondary:hover {
      background: rgba(255,255,255,0.2);
      transform: translateY(-3px);
    }

    /* 联系方式 */
    .contact-section {
      background: rgba(255,255,255,0.05);
      border-radius: 16px;
      padding: 24px;
      border: 1px solid rgba(255,255,255,0.1);
    }

    .contact-title {
      color: white;
      font-size: 1rem;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .contact-methods {
      display: flex;
      justify-content: center;
      gap: 24px;
      flex-wrap: wrap;
    }

    .contact-item {
      display: flex;
      align-items: center;
      gap: 8px;
      color: rgba(255,255,255,0.7);
      font-size: 0.9rem;
      text-decoration: none;
    }

    .contact-item:hover {
      color: #667eea;
    }

    /* 订阅更新 */
    .subscribe-section {
      margin-top: 20px;
      padding-top: 20px;
      border-top: 1px solid rgba(255,255,255,0.1);
    }

    .subscribe-text {
      color: rgba(255,255,255,0.6);
      font-size: 0.85rem;
      margin-bottom: 12px;
    }

    .subscribe-form {
      display: flex;
      gap: 8px;
      max-width: 400px;
      margin: 0 auto;
    }

    .subscribe-form input {
      flex: 1;
      padding: 12px 16px;
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 50px;
      background: rgba(255,255,255,0.1);
      color: white;
      font-size: 0.9rem;
    }

    .subscribe-form input::placeholder {
      color: rgba(255,255,255,0.5);
    }

    .subscribe-form input:focus {
      outline: none;
      border-color: #667eea;
    }

    .subscribe-form button {
      padding: 12px 24px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      border: none;
      border-radius: 50px;
      color: white;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .subscribe-form button:hover {
      transform: translateY(-2px);
    }

    /* 响应式 */
    @media (max-width: 768px) {
      .nav-bar {
        padding: 15px 20px;
      }

      .logo { font-size: 1.2rem; }

      .main-container {
        padding: 20px;
      }

      h1 {
        font-size: 1.6rem;
      }

      .maintenance-subtitle {
        font-size: 1rem;
      }

      .countdown-number {
        font-size: 2rem;
      }

      .countdown-separator {
        font-size: 1.8rem;
      }

      .actions {
        flex-direction: column;
        align-items: center;
      }

      .btn {
        width: 100%;
        max-width: 280px;
        justify-content: center;
      }

      .subscribe-form {
        flex-direction: column;
      }

      .subscribe-form button {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <!-- 进度条 -->
  <div class="progress-bg" id="progressBg"></div>

  <!-- 背景齿轮效果 -->
  <div class="bg-effects">
    <div class="gear gear-1">⚙️</div>
    <div class="gear gear-2">⚙️</div>
    <div class="gear gear-3">⚙️</div>
  </div>

  <!-- 导航栏 -->
  <nav class="nav-bar">
    <a href="index.html" class="logo">
      <span>🧭</span>
      <span>游导旅游</span>
    </a>
  </nav>

  <!-- 主内容 -->
  <main class="main-container">
    <div class="maintenance-content">
      <!-- 维护图标 -->
      <div class="maintenance-icon-container">
        <div class="wrench-animation">🔧</div>
        <div class="spanner-set spanner-1">🔩</div>
        <div class="spanner-set spanner-2">🪛</div>
      </div>

      <h1>🌟 网站维护中</h1>
      <p class="maintenance-subtitle">
        您好！我们正在对网站进行升级维护，以提供更好的服务体验。<br>
        预计维护完成后将为您带来全新的功能和更好的性能！
      </p>

      <!-- 预计时间 -->
      <div class="time-card">
        <h3>⏰ 预计恢复时间</h3>
        <div class="countdown-display" id="countdown">
          <div class="countdown-item">
            <span class="countdown-number" id="hours">02</span>
            <span class="countdown-label">小时</span>
          </div>
          <div class="countdown-separator">:</div>
          <div class="countdown-item">
            <span class="countdown-number" id="minutes">30</span>
            <span class="countdown-label">分钟</span>
          </div>
          <div class="countdown-separator">:</div>
          <div class="countdown-item">
            <span class="countdown-number" id="seconds">00</span>
            <span class="countdown-label">秒</span>
          </div>
        </div>
        <p class="maintenance-date" id="maintenanceDate">
          📅 维护时间：2024年12月15日 02:00 - 06:00 (UTC+8)
        </p>
      </div>

      <!-- 进度展示 -->
      <div class="progress-section">
        <div class="progress-header">
          <span class="progress-title">📊 维护进度</span>
          <span class="progress-percentage" id="progressPercent">68%</span>
        </div>
        <div class="progress-bar">
          <div class="progress-fill" id="progressFill" style="width: 68%;"></div>
        </div>
        <div class="progress-tasks">
          <div class="task-item">
            <span class="task-status completed">✓</span>
            <span>数据库优化</span>
          </div>
          <div class="task-item">
            <span class="task-status completed">✓</span>
            <span>安全补丁更新</span>
          </div>
          <div class="task-item">
            <span class="task-status in-progress">⟳</span>
            <span>服务器升级</span>
          </div>
          <div class="task-item">
            <span class="task-status pending">○</span>
            <span>功能测试</span>
          </div>
          <div class="task-item">
            <span class="task-status pending">○</span>
            <span>部署上线</span>
          </div>
        </div>
      </div>

      <!-- 操作按钮 -->
      <div class="actions">
        <button class="btn btn-primary" onclick="checkStatus()">
          🔄 检查状态
        </button>
        <a href="status.html" class="btn btn-secondary">
          📊 查看详细状态
        </a>
      </div>

      <!-- 联系方式 -->
      <div class="contact-section">
        <h4 class="contact-title">📞 如有紧急问题，请联系</h4>
        <div class="contact-methods">
          <a href="mailto:support@youdao-travel.com" class="contact-item">
            📧 support@youdao-travel.com
          </a>
          <a href="tel:13631149834" class="contact-item">
            📞 13631149834
          </a>
        </div>

        <!-- 订阅更新 -->
        <div class="subscribe-section">
          <p class="subscribe-text">🔔 订阅维护通知，第一时间获取更新</p>
          <form class="subscribe-form" id="subscribeForm">
            <input type="email" placeholder="请输入您的邮箱" required>
            <button type="submit">订阅</button>
          </form>
        </div>
      </div>
    </div>
  </main>

  <script>
    // 倒计时功能 (设置2小时30分钟)
    let totalSeconds = 2 * 3600 + 30 * 60;

    function updateCountdown() {
      const hours = Math.floor(totalSeconds / 3600);
      const minutes = Math.floor((totalSeconds % 3600) / 60);
      const seconds = totalSeconds % 60;

      document.getElementById('hours').textContent = hours.toString().padStart(2, '0');
      document.getElementById('minutes').textContent = minutes.toString().padStart(2, '0');
      document.getElementById('seconds').textContent = seconds.toString().padStart(2, '0');

      if (totalSeconds > 0) {
        totalSeconds--;
      }
    }

    // 进度条动画
    let currentProgress = 68;

    function animateProgress() {
      if (currentProgress < 95) {
        currentProgress += Math.random() * 0.5;
        document.getElementById('progressFill').style.width = currentProgress + '%';
        document.getElementById('progressPercent').textContent = Math.round(currentProgress) + '%';
      }
    }

    // 检查状态
    function checkStatus() {
      animateProgress();
      alert('网站仍在维护中，预计将在倒计时结束后恢复。感谢您的耐心等待！');
    }

    // 订阅表单
    document.getElementById('subscribeForm').addEventListener('submit', function(e) {
      e.preventDefault();
      const email = this.querySelector('input').value;
      alert(`✅ 已成功订阅！\n\n我们将向 ${email} 发送维护更新通知。`);
      this.reset();
    });

    // 初始化
    setInterval(updateCountdown, 1000);
    setInterval(animateProgress, 5000);
    updateCountdown();
  </script>
</body>
</html>
