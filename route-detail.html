  <link rel="stylesheet" href="css/style.css">
  <style>
    /* 详情页专用样式 */
    .detail-header {
      position: relative;
      height: 400px;
      overflow: hidden;
    }
    .detail-banner {
      width: 100%;

    .detail-banner-overlay {
      position: absolute;
      bottom: 0;
      left: 0;

    .detail-banner-content {
      position: relative;
      z-index: 1;
    }
    .detail-breadcrumb {
      color: rgba(255,255,255,0.8);

      margin-bottom: 12px;
    }
    .detail-breadcrumb a {

    .detail-breadcrumb a:hover {

    }
    .detail-title {

    .detail-subtitle {

    /* 概览信息栏 */
    .overview-bar {

      border-radius: 16px;
      padding: 24px;

      position: relative;
      z-index: 10;

    .overview-items {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));

    .overview-item {
      text-align: center;
      padding: 12px;
      border-radius: 12px;
      transition: all 0.2s;
    }
    .overview-item:hover {
      background: #fff7ed;
    }
    .overview-icon {
      font-size: 1.5rem;
      margin-bottom: 8px;
    }
    .overview-label {
      color: var(--gray-500);
      font-size: 0.85rem;
      margin-bottom: 4px;
    }
    .overview-value {
      font-size: 1.1rem;
      font-weight: 600;
      color: var(--gray-800);
    }
    .overview-value.price {
      color: #f97316;
      font-size: 1.4rem;
    }

    /* 页面布局 */
    .detail-layout {
      display: grid;
      grid-template-columns: 1fr 360px;
      gap: 30px;
      padding-bottom: 60px;
    }
    .detail-main {
      min-width: 0;
    }
    .detail-sidebar {
      position: sticky;
      top: 90px;
      height: fit-content;

    .detail-card {

      display: flex;
      align-items: center;
      gap: 8px;
    }
    .detail-card h2 .icon {
      font-size: 1.5rem;
    }

    /* 行程亮点 */
    .highlights-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 16px;
    }
    .highlight-item {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      padding: 16px;
      background: #fff7ed;
      border-radius: 12px;

    .highlight-icon {
      width: 40px;
      height: 40px;
      background: #f97316;
      color: #fff;

    .itinerary-header:hover {

    }
    .itinerary-header-left {

      align-items: center;
      gap: 12px;
    }
    .itinerary-day-num {
      width: 36px;
      height: 36px;

      color: #fff;
      border-radius: 50%;

      align-items: center;

    .itinerary-day-title {

    }
    .itinerary-day-city {

      border-radius: 8px;

      justify-content: center;

    .booking-secondary button:hover {

      padding: 80px 20px;

    .loading-state .spinner {
      width: 48px;
      height: 48px;

      border-top-color: #f97316;
      border-radius: 50%;

      margin: 0 auto 16px;

      to { transform: rotate(360deg); }

    /* 响应式 */
    @media (max-width: 1024px) {
      .detail-layout {
        grid-template-columns: 1fr;
      }
      .detail-sidebar {

    @media (max-width: 768px) {
      .detail-header {

      .overview-bar {

      .overview-value {

      }
      .overview-value.price {
        font-size: 1.1rem;

      .related-grid {
        grid-template-columns: 1fr;

  <!-- 引入Supabase SDK -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase-config.js"></script>
  <script src="js/common.js"></script>
  <script>
    // 全局变量
    let currentRoute = null;
    let selectedDate = null;

    // 初始化
    document.addEventListener('DOMContentLoaded', async () => {
      const params = new URLSearchParams(window.location.search);
      const routeId = params.get('id');
      
      if (routeId) {
        await loadRouteDetail(routeId);
      } else {
        showError('未找到路线信息');
      }
      
      updateAuthStatus();
    });

    // 加载路线详情
    async function loadRouteDetail(routeId) {
      try {
        if (!supabaseClient) initSupabase();
        
        const { data, error } = await supabaseClient
          .from('routes')
          .select('*')
          .eq('id', routeId)
          .eq('status', 'published')
          .single();
        
        if (error || !data) throw new Error('路线不存在');
        
        currentRoute = data;
        renderRouteDetail(currentRoute);
        
        // 记录浏览
        await recordView(routeId);
        
      } catch (error) {
        console.error('加载失败:', error);
        // 使用示例数据
        currentRoute = getSampleRoute(routeId);
        renderRouteDetail(currentRoute);
      }
    }

            { day: 2, title: 'Day 2', city: '奥克兰-罗托鲁阿', summary: '前往地热之城', meals: '含早餐、晚餐', activities: ['霍比特人村', '毛利文化村'] }

    // 渲染路线详情
    function renderRouteDetail(route) {
      const regionMap = {
        'oceania': '🌊 澳新',
        'western_europe': '🏰 西欧',
        'spain': '💃 西班牙',
        'egypt': '🏛️ 埃及',
        'other': '🌍 其他'
      };
      
      const html = `
        <!-- Banner -->
        <section class="detail-header">
          <img src="${route.cover_image || 'https://via.placeholder.com/1200x400?text=路线封面'}" alt="${route.title}" class="detail-banner">
          <div class="detail-banner-overlay">
            <div class="container">
              <div class="detail-banner-content">
                <div class="detail-breadcrumb">
                  <a href="index.html">首页</a> / 
                  <a href="routes.html">精选路线</a> / 
                  ${route.destination}
                </div>
                <h1 class="detail-title">${route.title}</h1>
                <p class="detail-subtitle">${route.subtitle || ''}</p>
              </div>
            </div>
          </div>
        </section>

        <!-- 概览信息 -->
        <div class="container">
          <div class="overview-bar">
            <div class="overview-items">
              <div class="overview-item">
                <div class="overview-icon">📍</div>
                <div class="overview-label">目的地</div>
                <div class="overview-value">${route.destination}</div>
              </div>
              <div class="overview-item">
                <div class="overview-icon">⏱️</div>
                <div class="overview-label">行程天数</div>
                <div class="overview-value">${route.days}天${route.nights || (route.days - 1)}晚</div>
              </div>
              <div class="overview-item">
                <div class="overview-icon">📅</div>
                <div class="overview-label">最近团期</div>
                <div class="overview-value">${formatDate(route.departure_dates?.[0]?.date)}</div>
              </div>
              <div class="overview-item">
                <div class="overview-icon">👥</div>
                <div class="overview-label">已成团人数</div>
                <div class="overview-value">${route.min_people}人起</div>
              </div>
              <div class="overview-item">
                <div class="overview-icon">💰</div>
                <div class="overview-label">起售价</div>
                <div class="overview-value price">¥${formatPrice(route.price)}</div>
              </div>
            </div>
          </div>

          <!-- 主体布局 -->
          <div class="detail-layout">
            <!-- 左侧主内容 -->
            <div class="detail-main">
              <!-- 行程亮点 -->
              <section class="detail-card">
                <h2><span class="icon">✨</span>行程亮点</h2>
                <div class="highlights-grid">
                  ${(route.highlights || []).map((h, i) => `
                    <div class="highlight-item">
                      <div class="highlight-icon">${['🎭', '🏛️', '🌅', '🍽️', '🎪'][i % 5]}</div>
                      <div class="highlight-text">
                        <h4>${h}</h4>
                      </div>
                    </div>
                  `).join('')}
                </div>
                ${route.themes?.length ? `
                  <div style="margin-top: 20px;">
                    <span style="font-weight: 600; margin-right: 8px;">主题标签:</span>
                    <div class="theme-tags" style="display: inline-flex;">
                      ${route.themes.map(t => `<span class="theme-tag">${t}</span>`).join('')}
                    </div>
                  </div>
                ` : ''}
              </section>

              <!-- 详细行程 -->
              <section class="detail-card">
                <h2><span class="icon">🗓️</span>详细行程</h2>
                <div class="itinerary-list">
                  ${(route.itinerary || []).map(day => `
                    <div class="itinerary-day" onclick="toggleItinerary(this)">
                      <div class="itinerary-header">
                        <div class="itinerary-header-left">
                          <div class="itinerary-day-num">${day.day}</div>
                          <div>
                            <div class="itinerary-day-title">${day.title}</div>
                            <div class="itinerary-day-city">📍 ${day.city}</div>
                          </div>
                        </div>
                        <span class="itinerary-toggle">▼</span>
                      </div>
                      <div class="itinerary-content">
                        <p class="itinerary-summary">${day.summary}</p>
                        <div class="itinerary-meta">
                          <div class="itinerary-meta-item">🍽️ ${day.meals}</div>
                          ${day.hotel ? `<div class="itinerary-meta-item">🏨 ${day.hotel}</div>` : ''}
                        </div>
                        ${day.activities?.length ? `
                          <div class="itinerary-activities">
                            <h4>📍 游览活动</h4>
                            <ul>
                              ${day.activities.map(a => `<li>${a}</li>`).join('')}
                            </ul>
                          </div>
                        ` : ''}
                        ${day.tips ? `
                          <div class="itinerary-tips">💡 ${day.tips}</div>
                        ` : ''}
                      </div>
                    </div>
                  `).join('')}
                </div>
              </section>

              <!-- 费用说明 -->
              <section class="detail-card">
                <h2><span class="icon">💵</span>费用说明</h2>
                <div class="cost-section">
                  <h4>✅ 费用包含</h4>
                  <ul class="cost-list cost-include">
                    ${(route.includes || []).map(item => `<li>${item}</li>`).join('')}
                  </ul>
                </div>
                <div class="cost-section">
                  <h4>❌ 费用不含</h4>
                  <ul class="cost-list cost-exclude">
                    ${(route.excludes || []).map(item => `<li>${item}</li>`).join('')}
                  </ul>
                </div>
                <div style="margin-top: 20px; padding: 16px; background: #fff7ed; border-radius: 12px;">
                  <p style="font-weight: 600; color: #ea580c; margin-bottom: 8px;">💰 价格说明</p>
                  <p style="color: var(--gray-600);">成人价：¥${formatPrice(route.price)}/${route.price_note || '人'}</p>
                  ${route.price_child ? `<p style="color: var(--gray-600);">儿童价：¥${formatPrice(route.price_child)}/${route.price_note || '人'}（2-12岁不占床）</p>` : ''}
                  <p style="color: var(--gray-500); font-size: 0.9rem; margin-top: 8px;">* 单房差另计，具体价格请咨询</p>
                </div>
              </section>

              <!-- 预订须知 -->
              <section class="detail-card">
                <h2><span class="icon">📋</span>预订须知</h2>
                ${route.visa_info ? `
                  <div class="notice-item">
                    <h4>🛂 签证说明</h4>
                    <p>${route.visa_info}</p>
                  </div>
                ` : ''}
                ${route.insurance_info ? `
                  <div class="notice-item">
                    <h4>🏥 保险说明</h4>
                    <p>${route.insurance_info}</p>
                  </div>
                ` : ''}
                ${route.cancellation_policy ? `
                  <div class="notice-item">
                    <h4>📅 退改政策</h4>
                    <p>${route.cancellation_policy}</p>
                  </div>
                ` : ''}
                ${route.tips ? `
                  <div class="notice-item">
                    <h4>💡 温馨提示</h4>
                    <p>${route.tips}</p>
                  </div>
                ` : ''}
              </section>

              <!-- 导游信息 -->
              ${route.guide_id ? `
                <section class="detail-card">
                  <h2><span class="icon">🎤</span>导游服务</h2>
                  <div class="guide-card" onclick="goToGuide(${route.guide_id})">
                    <img src="https://via.placeholder.com/60x60?text=导游" alt="导游头像" class="guide-avatar">
                    <div class="guide-info">
                      <h4>专业导游带你游</h4>
                      <p>查看导游详情和评价 →</p>
                    </div>
                  </div>
                </section>
              ` : ''}
            </div>

            <!-- 右侧侧边栏 -->
            <aside class="detail-sidebar">
              <!-- 预订卡片 -->
              <div class="booking-card">
                <div class="booking-price">
                  <div class="label">起售价</div>
                  <div class="value">¥${formatPrice(route.price)}</div>
                  <div class="unit">${route.price_note || '起/人'}</div>
                </div>
                
                <div class="booking-form">
                  <div class="form-group">
                    <label>选择出发日期</label>
                    <select id="departureDate" onchange="updatePrice()">
                      <option value="">请选择日期</option>
                      ${(route.departure_dates || []).map(d => `
                        <option value="${d.date}" data-places="${d.places_left}">
                          ${formatDate(d.date)} (剩余${d.places_left}位)
                        </option>
                      `).join('')}
                    </select>
                  </div>
                  
                  <div class="form-group">
                    <label>成人数</label>
                    <select id="adultCount" onchange="updatePrice()">
                      ${Array.from({length: 10}, (_, i) => `<option value="${i + 1}">${i + 1}人</option>`).join('')}
                    </select>
                  </div>
                  
                  <div class="form-group">
                    <label>儿童数</label>
                    <select id="childCount" onchange="updatePrice()">
                      ${Array.from({length: 6}, (_, i) => `<option value="${i}">${i}人</option>`).join('')}
                    </select>
                  </div>
                </div>
                
                <div id="priceSummary" style="margin-bottom: 16px; padding: 12px; background: var(--gray-50); border-radius: 8px; display: none;">
                  <div style="display: flex; justify-content: space-between; margin-bottom: 8px;">
                    <span>成人 × <span id="adultNum">1</span></span>
                    <span>¥<span id="adultTotal">0</span></span>
                  </div>
                  <div style="display: flex; justify-content: space-between; margin-bottom: 8px;">
                    <span>儿童 × <span id="childNum">0</span></span>
                    <span>¥<span id="childTotal">0</span></span>
                  </div>
                  <div style="border-top: 1px dashed var(--gray-300); padding-top: 8px; display: flex; justify-content: space-between; font-weight: 600;">
                    <span>合计</span>
                    <span style="color: #f97316;">¥<span id="totalPrice">0</span></span>
                  </div>
                </div>
                
                <button class="booking-btn" onclick="goToBooking()">立即预订</button>
                
                <div class="booking-secondary">
                  <button onclick="contactUs()">📞 咨询客服</button>
                  <button onclick="toggleFavorite()">🤍 收藏</button>
                </div>
                
                <div class="booking-note">
                  已有${route.min_people}人报名 | 最低${route.min_people}人成团
                </div>
              </div>

              <!-- 相关推荐 -->
              <div class="detail-card" style="margin-top: 20px;">
                <h2><span class="icon">🔖</span>相关路线</h2>
                <div class="related-grid">
                  ${getRelatedRoutes(route).map(r => `
                    <div class="related-item" onclick="window.location.href='route-detail.html?id=${r.id}'">
                      <img src="${r.cover_image || 'https://via.placeholder.com/200x120'}" alt="${r.title}">
                      <div class="related-item-info">
                        <h4>${r.title}</h4>
                        <div><span class="price">¥${formatPrice(r.price)}</span>起</div>
                      </div>
                    </div>
                  `).join('')}
                </div>
              </div>
            </aside>
          </div>
        </div>
      `;
      
      document.getElementById('detailContent').innerHTML = html;
      
      // 默认展开第一天行程
      setTimeout(() => {
        const firstDay = document.querySelector('.itinerary-day');
        if (firstDay) firstDay.classList.add('open');
      }, 100);
    }

    // 相关路线
    function getRelatedRoutes(currentRoute) {
      const all = getSampleRoutes();
      return all
        .filter(r => r.id !== currentRoute.id && r.region === currentRoute.region)
        .slice(0, 2);
    }

    // 获取示例路线列表
    function getSampleRoutes() {
      return [
        { id: 1, title: '澳大利亚大堡礁深度9日游', region: 'oceania', price: 18999, cover_image: 'https://images.unsplash.com/photo-1523482580672-f109ba8cb9be?w=200' },
        { id: 2, title: '新西兰南北岛全景12日', region: 'oceania', price: 25800, cover_image: 'https://images.unsplash.com/photo-1507699622108-4be3abd695ad?w=200' },
        { id: 3, title: '法意瑞三国12日经典游', region: 'western_europe', price: 29800, cover_image: 'https://images.unsplash.com/photo-1502602898657-3e91760cbb34?w=200' },
        { id: 4, title: '西班牙全景10日深度游', region: 'spain', price: 22800, cover_image: 'https://images.unsplash.com/photo-1583422409516-2895a77efded?w=200' },
        { id: 5, title: '埃及尼罗河10日探秘', region: 'egypt', price: 16800, cover_image: 'https://images.unsplash.com/photo-1539650116574-8efeb43e2750?w=200' }
      ];
    }

    // 切换行程展开
    function toggleItinerary(element) {
      element.classList.toggle('open');
    }

    // 更新价格计算
    function updatePrice() {
      if (!currentRoute) return;
      
      const dateSelect = document.getElementById('departureDate');
      const adults = parseInt(document.getElementById('adultCount').value) || 1;
      const children = parseInt(document.getElementById('childCount').value) || 0;
      
      if (!dateSelect.value) {
        document.getElementById('priceSummary').style.display = 'none';
        return;
      }
      
      const priceSummary = document.getElementById('priceSummary');
      priceSummary.style.display = 'block';
      
      document.getElementById('adultNum').textContent = adults;
      document.getElementById('adultTotal').textContent = formatPrice(currentRoute.price * adults);
      document.getElementById('childNum').textContent = children;
      document.getElementById('childTotal').textContent = formatPrice((currentRoute.price_child || currentRoute.price * 0.8) * children);
      document.getElementById('totalPrice').textContent = formatPrice(currentRoute.price * adults + (currentRoute.price_child || currentRoute.price * 0.8) * children);
      
      selectedDate = dateSelect.value;
    }

    // 前往预订页
    function goToBooking() {
      if (!selectedDate) {
        showToast('请选择出发日期', 'warning');
        return;
      }
      
      const adults = document.getElementById('adultCount').value;
      const children = document.getElementById('childCount').value;
      
      window.location.href = `route-booking.html?id=${currentRoute.id}&date=${selectedDate}&adults=${adults}&children=${children}`;
    }

    // 联系客服
    function contactUs() {
      showToast('客服电话：400-888-8888', 'info');
    }

    // 收藏
    function toggleFavorite() {
      let favorites = JSON.parse(localStorage.getItem('routeFavorites') || '[]');
      const index = favorites.indexOf(currentRoute.id);
      
      if (index > -1) {
        favorites.splice(index, 1);
        showToast('已取消收藏', 'success');
      } else {
        favorites.push(currentRoute.id);
        showToast('已添加收藏', 'success');
      }
      
      localStorage.setItem('routeFavorites', JSON.stringify(favorites));
    }

    // 跳转导游详情
    function goToGuide(guideId) {
      window.location.href = `guide-detail.html?id=${guideId}`;
    }

    // 记录浏览
    async function recordView(routeId) {
      try {
        if (!supabaseClient) initSupabase();
        await supabaseClient.rpc('increment_route_view', { route_id: routeId });
      } catch (e) {
        // 静默失败
      }
    }

    // 格式化日期
    function formatDate(dateStr) {
      if (!dateStr) return '-';
      const date = new Date(dateStr);
      return `${date.getMonth() + 1}月${date.getDate()}日`;
    }

    // 格式化价格
    function formatPrice(price) {
      return Number(price).toLocaleString('zh-CN');
    }

    // 错误显示
    function showError(message) {
      document.getElementById('detailContent').innerHTML = `
        <div class="container" style="padding: 80px 0; text-align: center;">
          <div style="font-size: 4rem; margin-bottom: 20px;">😢</div>
          <h2 style="margin-bottom: 12px;">${message}</h2>
          <p><a href="routes.html" style="color: #f97316;">返回路线列表</a></p>
        </div>
      `;
    }

    // Toast提示
    function showToast(message, type = 'info') {
      const toast = document.createElement('div');
      toast.className = `toast toast-${type}`;
      toast.textContent = message;
      document.body.appendChild(toast);
      
      setTimeout(() => {
        toast.remove();
      }, 2500);
    }

    // 更新登录状态
    async function updateAuthStatus() {
      try {
        const isLoggedIn = await Auth.isLoggedIn();
        const authLink = document.getElementById('authLink');
        
        if (isLoggedIn) {
          authLink.textContent = '👤 个人中心';
          authLink.href = 'user-center.html';
          authLink.classList.add('logged-in');
        }
      } catch (e) {
        console.error('检查登录状态失败:', e);
      }
    }
  </script>
</body>
