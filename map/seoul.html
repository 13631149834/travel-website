<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>首尔地图 - 游导旅游</title>
  <meta name="description" content="首尔旅游地图，涵盖景福宫、明洞、南山塔等热门景点的位置信息、详细信息和路线规划。">
  <link rel="preconnect" href="https://unpkg.com">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin="">
  <style>
    :root { --primary: #8B5CF6; --primary-light: #F3EEFF; --primary-dark: #7C3AED; --secondary: #1E3A5F; --accent: #FFD23F; --bg-light: #F8F9FA; --bg-white: #FFFFFF; --text-dark: #2D3436; --text-gray: #636E72; --text-light: #B2BEC3; --border: #E9ECEF; --shadow: 0 4px 20px rgba(0,0,0,0.08); --radius: 16px; --radius-sm: 8px; --attraction: #FF6B35; --food: #F59E0B; --shopping: #EC4899; --transport: #3B82F6; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Noto Sans SC', -apple-system, sans-serif; background: var(--bg-light); color: var(--text-dark); line-height: 1.6; height: 100vh; overflow: hidden; }
    .header { background: var(--bg-white); box-shadow: var(--shadow); position: fixed; top: 0; left: 0; right: 0; z-index: 1000; height: 60px; }
    .header-content { max-width: 100%; height: 100%; padding: 0 20px; display: flex; align-items: center; justify-content: space-between; }
    .logo { font-size: 20px; font-weight: 700; color: var(--primary); text-decoration: none; display: flex; align-items: center; gap: 8px; }
    .logo-icon { font-size: 24px; }
    .city-title { font-size: 18px; font-weight: 600; color: var(--text-dark); display: flex; align-items: center; gap: 8px; }
    .header-actions { display: flex; gap: 12px; }
    .btn { padding: 8px 16px; border-radius: 50px; font-weight: 600; cursor: pointer; transition: all 0.3s; border: none; font-size: 13px; text-decoration: none; display: inline-flex; align-items: center; gap: 6px; }
    .btn-primary { background: var(--primary); color: white; }
    .btn-primary:hover { background: var(--primary-dark); }
    .btn-outline { background: transparent; border: 2px solid var(--border); color: var(--text-gray); }
    .btn-outline:hover { border-color: var(--primary); color: var(--primary); }
    .btn-sm { padding: 6px 12px; font-size: 12px; }
    .main-layout { display: flex; height: calc(100vh - 60px); margin-top: 60px; }
    .sidebar { width: 360px; background: var(--bg-white); border-right: 1px solid var(--border); overflow-y: auto; flex-shrink: 0; display: flex; flex-direction: column; }
    .sidebar-header { padding: 16px; border-bottom: 1px solid var(--border); background: var(--bg-white); position: sticky; top: 0; z-index: 10; }
    .sidebar-title { font-size: 16px; font-weight: 600; margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }
    .filter-section { display: flex; flex-wrap: wrap; gap: 8px; }
    .filter-btn { padding: 6px 14px; border: 2px solid var(--border); background: var(--bg-white); border-radius: 20px; font-size: 13px; font-weight: 500; color: var(--text-gray); cursor: pointer; transition: all 0.2s; display: flex; align-items: center; gap: 4px; }
    .filter-btn:hover { border-color: var(--primary); color: var(--primary); }
    .filter-btn.active { background: var(--primary); border-color: var(--primary); color: white; }
    .filter-btn .dot { width: 8px; height: 8px; border-radius: 50%; }
    .route-section, .spots-section { padding: 16px; }
    .route-section { border-bottom: 1px solid var(--border); }
    .route-title { font-size: 14px; font-weight: 600; margin-bottom: 10px; color: var(--text-dark); }
    .route-list { display: flex; flex-direction: column; gap: 8px; }
    .route-item { padding: 12px; background: var(--bg-light); border-radius: var(--radius-sm); cursor: pointer; transition: all 0.2s; border: 2px solid transparent; }
    .route-item:hover { background: var(--primary-light); border-color: var(--primary); }
    .route-item h4 { font-size: 14px; margin-bottom: 4px; color: var(--text-dark); }
    .route-item p { font-size: 12px; color: var(--text-gray); }
    .spots-section { flex: 1; overflow-y: auto; }
    .spots-title { font-size: 14px; font-weight: 600; margin-bottom: 12px; color: var(--text-dark); display: flex; align-items: center; justify-content: space-between; }
    .spots-count { font-size: 12px; color: var(--text-gray); font-weight: 400; }
    .spot-card { background: var(--bg-white); border-radius: var(--radius-sm); padding: 14px; margin-bottom: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.04); cursor: pointer; transition: all 0.2s; border: 2px solid transparent; }
    .spot-card:hover { box-shadow: 0 4px 16px rgba(0,0,0,0.08); transform: translateX(4px); }
    .spot-card.active { border-color: var(--primary); background: var(--primary-light); }
    .spot-header { display: flex; align-items: flex-start; gap: 12px; margin-bottom: 10px; }
    .spot-icon { width: 44px; height: 44px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 22px; flex-shrink: 0; }
    .spot-icon.attraction { background: #FFF3ED; }
    .spot-icon.food { background: #FFF8E6; }
    .spot-icon.shopping { background: #FFF0F5; }
    .spot-icon.transport { background: #E8F4FF; }
    .spot-info { flex: 1; min-width: 0; }
    .spot-name { font-size: 15px; font-weight: 600; color: var(--text-dark); margin-bottom: 4px; }
    .spot-meta { display: flex; align-items: center; gap: 12px; font-size: 12px; color: var(--text-gray); }
    .spot-rating { color: #FFB800; font-weight: 600; }
    .spot-tags { display: flex; flex-wrap: wrap; gap: 6px; }
    .spot-tag { padding: 3px 10px; background: var(--bg-light); border-radius: 12px; font-size: 11px; color: var(--text-gray); }
    .map-container { flex: 1; position: relative; }
    #cityMap { width: 100%; height: 100%; }
    .custom-marker { background: none; border: none; }
    .marker-content { display: flex; align-items: center; justify-content: center; width: 36px; height: 36px; border-radius: 50%; background: var(--primary); color: white; font-size: 16px; font-weight: bold; box-shadow: 0 3px 10px rgba(0,0,0,0.3); border: 3px solid white; transition: all 0.2s; cursor: pointer; }
    .marker-content:hover { transform: scale(1.2); }
    .marker-content.attraction { background: var(--attraction); }
    .marker-content.food { background: var(--food); }
    .marker-content.shopping { background: var(--shopping); }
    .marker-content.transport { background: var(--transport); }
    .marker-label { position: absolute; top: 100%; left: 50%; transform: translateX(-50%); background: white; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 500; color: var(--text-dark); white-space: nowrap; box-shadow: 0 2px 6px rgba(0,0,0,0.15); margin-top: 4px; opacity: 0; transition: opacity 0.2s; pointer-events: none; }
    .marker-content:hover + .marker-label, .custom-marker:hover .marker-label { opacity: 1; }
    .detail-popup { position: fixed; bottom: 20px; left: 380px; right: 20px; max-width: 480px; background: var(--bg-white); border-radius: var(--radius); box-shadow: 0 8px 40px rgba(0,0,0,0.15); z-index: 1000; transform: translateY(200%); transition: transform 0.3s ease; overflow: hidden; }
    .detail-popup.show { transform: translateY(0); }
    .detail-header { position: relative; }
    .detail-banner { height: 160px; background: linear-gradient(135deg, #8B5CF6 0%, #A78BFA 100%); display: flex; align-items: center; justify-content: center; font-size: 64px; }
    .detail-close { position: absolute; top: 12px; right: 12px; width: 32px; height: 32px; border-radius: 50%; background: rgba(0,0,0,0.3); color: white; border: none; cursor: pointer; font-size: 18px; display: flex; align-items: center; justify-content: center; }
    .detail-close:hover { background: rgba(0,0,0,0.5); }
    .detail-category { position: absolute; bottom: 12px; left: 16px; padding: 6px 14px; background: white; border-radius: 20px; font-size: 12px; font-weight: 600; display: flex; align-items: center; gap: 6px; }
    .detail-body { padding: 20px; }
    .detail-title { font-size: 20px; font-weight: 700; margin-bottom: 8px; color: var(--text-dark); }
    .detail-meta { display: flex; gap: 16px; margin-bottom: 16px; font-size: 14px; color: var(--text-gray); }
    .detail-meta-item { display: flex; align-items: center; gap: 4px; }
    .detail-meta-item .star { color: #FFB800; }
    .detail-description { font-size: 14px; color: var(--text-gray); margin-bottom: 16px; line-height: 1.7; }
    .detail-info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 16px; }
    .detail-info-item { background: var(--bg-light); padding: 12px; border-radius: var(--radius-sm); }
    .detail-info-item .label { font-size: 12px; color: var(--text-gray); margin-bottom: 4px; }
    .detail-info-item .value { font-size: 14px; font-weight: 600; color: var(--text-dark); }
    .detail-highlights { margin-bottom: 16px; }
    .detail-highlights h4 { font-size: 14px; font-weight: 600; margin-bottom: 10px; color: var(--text-dark); }
    .highlights-list { display: flex; flex-wrap: wrap; gap: 8px; }
    .highlight-tag { padding: 6px 12px; background: var(--primary-light); color: var(--primary); border-radius: 20px; font-size: 12px; font-weight: 500; }
    .detail-actions { display: flex; gap: 12px; }
    .detail-actions .btn { flex: 1; justify-content: center; }
    .route-panel { position: fixed; top: 80px; right: 20px; width: 320px; background: var(--bg-white); border-radius: var(--radius); box-shadow: 0 8px 40px rgba(0,0,0,0.15); z-index: 999; transform: translateX(400px); transition: transform 0.3s ease; }
    .route-panel.show { transform: translateX(0); }
    .route-panel-header { padding: 16px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
    .route-panel-title { font-size: 16px; font-weight: 600; }
    .route-panel-body { padding: 16px; max-height: 400px; overflow-y: auto; }
    .route-step { display: flex; gap: 12px; padding: 12px 0; border-bottom: 1px dashed var(--border); }
    .route-step:last-child { border-bottom: none; }
    .route-step-number { width: 28px; height: 28px; border-radius: 50%; background: #8B5CF6; color: white; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 600; flex-shrink: 0; }
    .route-step-info { flex: 1; }
    .route-step-name { font-size: 14px; font-weight: 600; margin-bottom: 4px; }
    .route-step-time { font-size: 12px; color: var(--text-gray); }
    .map-controls { position: absolute; top: 20px; right: 20px; display: flex; flex-direction: column; gap: 8px; z-index: 999; }
    .map-control-btn { width: 44px; height: 44px; background: var(--bg-white); border-radius: var(--radius-sm); box-shadow: var(--shadow); border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 20px; transition: all 0.2s; }
    .map-control-btn:hover { background: #8B5CF6; color: white; }
    @media (max-width: 768px) {
      .sidebar { position: fixed; left: 0; right: 0; bottom: 0; top: auto; width: 100%; height: 50vh; transform: translateY(100%); transition: transform 0.3s ease; z-index: 1001; border-right: none; border-top: 1px solid var(--border); border-radius: var(--radius) var(--radius) 0 0; }
      .sidebar.show { transform: translateY(0); }
      .map-container { height: calc(100vh - 60px); }
      .detail-popup { left: 10px; right: 10px; bottom: 10px; }
      .route-panel { left: 10px; right: 10px; width: auto; transform: translateY(-200%); }
      .route-panel.show { transform: translateY(0); }
    }
    .leaflet-popup-content-wrapper { border-radius: var(--radius-sm); padding: 0; }
    .leaflet-popup-content { margin: 0; min-width: 200px; }
    .popup-content { padding: 16px; }
    .popup-title { font-size: 15px; font-weight: 600; margin-bottom: 8px; }
    .popup-meta { font-size: 12px; color: var(--text-gray); margin-bottom: 8px; }
    .popup-btn { width: 100%; padding: 8px; background: #8B5CF6; color: white; border: none; border-radius: 6px; font-size: 13px; cursor: pointer; }
  </style>
</head>
<body>
  <header class="header">
    <div class="header-content">
      <a href="index.html" class="logo"><span class="logo-icon">🧭</span><span>游导</span></a>
      <div class="city-title"><span>🎎</span><span>首尔地图</span></div>
      <div class="header-actions">
        <button class="btn btn-outline btn-sm" onclick="toggleRoutePanel()">🛣️ 路线</button>
        <a href="search.html" class="btn btn-primary btn-sm">🔍 搜索</a>
      </div>
    </div>
  </header>
  <div class="main-layout">
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <h2 class="sidebar-title">📍 筛选景点</h2>
        <div class="filter-section">
          <button class="filter-btn active" data-category="all" onclick="filterMarkers('all')">全部</button>
          <button class="filter-btn" data-category="attraction" onclick="filterMarkers('attraction')"><span class="dot" style="background:var(--attraction)"></span>🏯 景点</button>
          <button class="filter-btn" data-category="food" onclick="filterMarkers('food')"><span class="dot" style="background:var(--food)"></span>🍜 美食</button>
          <button class="filter-btn" data-category="shopping" onclick="filterMarkers('shopping')"><span class="dot" style="background:var(--shopping)"></span>🛍️ 购物</button>
          <button class="filter-btn" data-category="transport" onclick="filterMarkers('transport')"><span class="dot" style="background:var(--transport)"></span>🚇 交通</button>
        </div>
      </div>
      <div class="route-section">
        <h3 class="route-title">🗺️ 推荐路线</h3>
        <div class="route-list">
          <div class="route-item" onclick="selectRoute(0)"><h4>韩服文化之旅</h4><p>景福宫 → 北村韩屋村 → 仁寺洞</p></div>
          <div class="route-item" onclick="clearRoute()"><h4>清除路线</h4><p>显示所有景点</p></div>
        </div>
      </div>
      <div class="spots-section">
        <h3 class="spots-title">所有景点<span class="spots-count" id="spotsCount">10个</span></h3>
        <div id="spotsList"></div>
      </div>
    </aside>
    <div class="map-container">
      <div id="cityMap"></div>
      <div class="map-controls">
        <button class="map-control-btn" onclick="toggleSidebar()">☰</button>
        <button class="map-control-btn" onclick="map.zoomIn()">+</button>
        <button class="map-control-btn" onclick="map.zoomOut()">−</button>
        <button class="map-control-btn" onclick="locateMe()">📍</button>
      </div>
    </div>
  </div>
  <div class="detail-popup" id="detailPopup">
    <div class="detail-header">
      <div class="detail-banner" id="detailBanner">🏯</div>
      <button class="detail-close" onclick="closeDetail()">✕</button>
      <span class="detail-category" id="detailCategory"><span>🏯</span><span>景点</span></span>
    </div>
    <div class="detail-body">
      <h2 class="detail-title" id="detailTitle">景点名称</h2>
      <div class="detail-meta"><span class="detail-meta-item"><span class="star">⭐</span><span id="detailRating">4.5</span></span><span class="detail-meta-item" id="detailReviews">1.2万评价</span></div>
      <p class="detail-description" id="detailDesc">景点描述内容</p>
      <div class="detail-info-grid"><div class="detail-info-item"><div class="label">🕐 开放时间</div><div class="value" id="detailHours">全天开放</div></div><div class="detail-info-item"><div class="label">💰 门票</div><div class="value" id="detailTicket">免费</div></div></div>
      <div class="detail-highlights"><h4>✨ 亮点推荐</h4><div class="highlights-list" id="detailHighlights"></div></div>
      <div class="detail-actions"><button class="btn btn-outline" onclick="closeDetail()">关闭</button><button class="btn btn-primary" onclick="addToRoute()">加入路线</button></div>
    </div>
  </div>
  <div class="route-panel" id="routePanel">
    <div class="route-panel-header"><span class="route-panel-title">🛣️ 我的路线</span><button class="detail-close" onclick="toggleRoutePanel()">✕</button></div>
    <div class="route-panel-body" id="routePanelBody"><p style="text-align:center;color:var(--text-gray);padding:20px">暂无路线规划<br><small>点击景点添加到路线</small></p></div>
  </div>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
  <script>
    const cityData={name:'首尔',center:[37.5665,126.9780],zoom:13,spots:[
      {id:'sl001',name:'景福宫',category:'attraction',lat:37.5796,lng:126.9770,icon:'🏛️',description:'朝鲜王朝的正宫，韩服体验热门地',rating:4.6,reviews:'3.2万',hours:'9:00-18:00',ticket:'成人3000韩元',highlights:['勤政殿','香远亭','国立民俗博物馆']},
      {id:'sl002',name:'明洞',category:'shopping',lat:37.5636,lng:126.9869,icon:'🛍️',description:'首尔最繁华的购物区，化妆品和时尚品牌云集',rating:4.5,reviews:'4.6万',hours:'10:00-22:00',ticket:'免费',highlights:['乐天免税店','化妆品店','明洞圣堂']},
      {id:'sl003',name:'南山首尔塔',category:'attraction',lat:37.5511,lng:126.9882,icon:'🗼',description:'首尔地标，可乘坐缆车到达，情侣锁是其特色',rating:4.6,reviews:'3.9万',hours:'10:00-23:00',ticket:'展望台15000韩元',highlights:['N 서울타워','爱情锁墙','缆车']},
      {id:'sl004',name:'弘大',category:'attraction',lat:37.5568,lng:126.9240,icon:'🎵',description:'年轻人文化圣地，街头表演和潮流店铺',rating:4.5,reviews:'2.9万',hours:'全天开放',ticket:'免费',highlights:['街头表演','夜店','特色咖啡厅']},
      {id:'sl005',name:'北村韩屋村',category:'attraction',lat:37.5822,lng:126.9830,icon:'🏠',description:'保存完好的传统韩屋村落，感受朝鲜时代风情',rating:4.6,reviews:'2.1万',hours:'全天开放',ticket:'免费',highlights:['韩屋建筑','小巷','韩服体验']},
      {id:'sl006',name:'东大门设计广场',category:'shopping',lat:37.5674,lng:127.0103,icon:'🎨',description:'首尔最大的服装批发零售市场',rating:4.4,reviews:'2.3万',hours:'10:30-次日5:00',ticket:'免费',highlights:['DDP设计广场','批发商城','深夜购物']},
      {id:'sl007',name:'广藏市场',category:'food',lat:37.5648,lng:126.9630,icon:'🍲',description:'首尔最大的传统市场，韩服和小吃云集',rating:4.4,reviews:'1.8万',hours:'8:30-18:00',ticket:'免费',highlights:['绿豆煎饼','紫菜包饭','韩服面料']},
      {id:'sl008',name:'首尔站',category:'transport',lat:37.5547,lng:126.9707,icon:'🚉',description:'首尔最主要的火车站，连接KTX和地铁',rating:4.3,reviews:'1.2万',hours:'全天开放',ticket:'免费',highlights:['KTX','乐天超市','退税服务']},
      {id:'sl009',name:'三清洞',category:'shopping',lat:37.5811,lng:126.9848,icon:'🎭',description:'首尔最文艺的街区，设计师店铺和咖啡厅林立',rating:4.5,reviews:'1.6万',hours:'店铺各异',ticket:'免费',highlights:['特色小店','画廊','韩屋咖啡厅']},
      {id:'sl010',name:'仁寺洞',category:'shopping',lat:37.5753,lng:126.9847,icon:'🎪',description:'传统文化街区，传统工艺品和韩服体验',rating:4.5,reviews:'1.9万',hours:'10:00-20:00',ticket:'免费',highlights:['传统茶馆','韩服租赁','手工艺品']}
    ],routes:[{name:'韩服文化之旅',spots:['sl001','sl005','sl010']}]};
    const categoryConfig={attraction:{name:'景点',icon:'🏯',color:'#FF6B35'},food:{name:'美食',icon:'🍜',color:'#F59E0B'},shopping:{name:'购物',icon:'🛍️',color:'#EC4899'},transport:{name:'交通',icon:'🚇',color:'#3B82F6'}};
    let map,markers={},currentFilter='all',selectedSpot=null,myRoute=[];
    function initMap(){map=L.map('cityMap').setView(cityData.center,cityData.zoom);L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{attribution:'© OpenStreetMap contributors'}).addTo(map);cityData.spots.forEach(spot=>addMarker(spot));renderSpotsList();}
    function addMarker(spot){const icon=L.divIcon({className:'custom-marker',html:'<div class="marker-content '+spot.category+'">'+spot.icon+'</div><div class="marker-label">'+spot.name+'</div>',iconSize:[36,44],iconAnchor:[18,44]});const marker=L.marker([spot.lat,spot.lng],{icon}).addTo(map);marker.bindPopup('<div class="popup-content"><div class="popup-title">'+spot.icon+' '+spot.name+'</div><div class="popup-meta">⭐ '+spot.rating+' · '+categoryConfig[spot.category].name+'</div><button class="popup-btn" onclick="showDetail(\''+spot.id+'\')">查看详情</button></div>');marker.on('click',()=>showDetail(spot.id));markers[spot.id]=marker;}
    function renderSpotsList(){const list=document.getElementById('spotsList');const filtered=currentFilter==='all'?cityData.spots:cityData.spots.filter(s=>s.category===currentFilter);document.getElementById('spotsCount').textContent=filtered.length+'个';list.innerHTML=filtered.map(spot=>'<div class="spot-card" data-id="'+spot.id+'" onclick="focusSpot(\''+spot.id+'\')"><div class="spot-header"><div class="spot-icon '+spot.category+'">'+spot.icon+'</div><div class="spot-info"><div class="spot-name">'+spot.name+'</div><div class="spot-meta"><span class="spot-rating">⭐ '+spot.rating+'</span><span>'+spot.reviews+'评价</span></div></div></div><div class="spot-tags">'+spot.highlights.slice(0,3).map(h=>'<span class="spot-tag">'+h+'</span>').join('')+'</div></div>').join('');}
    function focusSpot(id){const spot=cityData.spots.find(s=>s.id===id);if(!spot)return;map.setView([spot.lat,spot.lng],15);markers[id].openPopup();showDetail(id);document.querySelectorAll('.spot-card').forEach(card=>card.classList.toggle('active',card.dataset.id===id));}
    function filterMarkers(category){currentFilter=category;document.querySelectorAll('.filter-btn').forEach(btn=>btn.classList.toggle('active',btn.dataset.category===category));cityData.spots.forEach(spot=>{if(category==='all'||spot.category===category)markers[spot.id].addTo(map);else markers[spot.id].remove();});renderSpotsList();}
    function showDetail(id){const spot=cityData.spots.find(s=>s.id===id);if(!spot)return;selectedSpot=spot;const config=categoryConfig[spot.category];document.getElementById('detailBanner').textContent=spot.icon;document.getElementById('detailCategory').innerHTML='<span>'+config.icon+'</span><span>'+config.name+'</span>';document.getElementById('detailTitle').textContent=spot.name;document.getElementById('detailRating').textContent=spot.rating;document.getElementById('detailReviews').textContent=spot.reviews+'评价';document.getElementById('detailDesc').textContent=spot.description;document.getElementById('detailHours').textContent=spot.hours;document.getElementById('detailTicket').textContent=spot.ticket;document.getElementById('detailHighlights').innerHTML=spot.highlights.map(h=>'<span class="highlight-tag">'+h+'</span>').join('');document.getElementById('detailPopup').classList.add('show');document.querySelectorAll('.spot-card').forEach(card=>card.classList.toggle('active',card.dataset.id===id));}
    function closeDetail(){document.getElementById('detailPopup').classList.remove('show');document.querySelectorAll('.spot-card').forEach(card=>card.classList.remove('active'));selectedSpot=null;}
    function addToRoute(){if(!selectedSpot)return;if(!myRoute.find(s=>s.id===selectedSpot.id)){myRoute.push(selectedSpot);updateRoutePanel();}closeDetail();}
    function updateRoutePanel(){const body=document.getElementById('routePanelBody');if(myRoute.length===0){body.innerHTML='<p style="text-align:center;color:var(--text-gray);padding:20px">暂无路线规划<br><small>点击景点添加到路线</small></p>';return;}body.innerHTML=myRoute.map((spot,index)=>'<div class="route-step"><span class="route-step-number">'+(index+1)+'</span><div class="route-step-info"><div class="route-step-name">'+spot.icon+' '+spot.name+'</div><div class="route-step-time">约30分钟停留</div></div></div>').join('');drawRoute();}
    function drawRoute(){map.eachLayer(layer=>{if(layer instanceof L.Polyline)map.removeLayer(layer);});if(myRoute.length<2)return;const coords=myRoute.map(spot=>[spot.lat,spot.lng]);L.polyline(coords,{color:'#8B5CF6',weight:4,opacity:0.8,dashArray:'10,10'}).addTo(map);}
    function selectRoute(index){const route=cityData.routes[index];if(!route)return;myRoute=route.spots.map(id=>cityData.spots.find(s=>s.id===id)).filter(Boolean);updateRoutePanel();document.querySelectorAll('.route-item').forEach((item,i)=>item.classList.toggle('active',i===index));if(myRoute.length>0){const bounds=L.latLngBounds(myRoute.map(s=>[s.lat,s.lng]));map.fitBounds(bounds,{padding:[50,50]});}}
    function clearRoute(){myRoute=[];updateRoutePanel();document.querySelectorAll('.route-item').forEach(item=>item.classList.remove('active'));map.eachLayer(layer=>{if(layer instanceof L.Polyline)map.removeLayer(layer);});}
    function toggleSidebar(){document.getElementById('sidebar').classList.toggle('show');}
    function toggleRoutePanel(){document.getElementById('routePanel').classList.toggle('show');}
    function locateMe(){if(navigator.geolocation){navigator.geolocation.getCurrentPosition(position=>{map.setView([position.coords.latitude,position.coords.longitude],15);},error=>alert('无法获取位置'));}else{alert('您的浏览器不支持定位功能');}}
    document.addEventListener('DOMContentLoaded',initMap);
  </script>
</body>
</html>
