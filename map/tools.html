<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>地图工具 - 游导旅游</title>
  <meta name="description" content="免费的在线地图工具，包括测距、面积测量、路线规划和地图截图功能。">
  <link rel="preconnect" href="https://unpkg.com">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin="">
  <style>
    :root { --primary: #FF6B35; --primary-light: #FFF3ED; --primary-dark: #E55A2B; --secondary: #1E3A5F; --bg-light: #F8F9FA; --bg-white: #FFFFFF; --text-dark: #2D3436; --text-gray: #636E72; --border: #E9ECEF; --shadow: 0 4px 20px rgba(0,0,0,0.08); --radius: 16px; --radius-sm: 8px; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Noto Sans SC', -apple-system, sans-serif; background: var(--bg-light); color: var(--text-dark); line-height: 1.6; }
    .header { background: var(--bg-white); box-shadow: var(--shadow); position: sticky; top: 0; z-index: 100; height: 60px; }
    .header-content { max-width: 1200px; margin: 0 auto; padding: 0 20px; height: 100%; display: flex; align-items: center; justify-content: space-between; }
    .logo { font-size: 20px; font-weight: 700; color: var(--primary); text-decoration: none; display: flex; align-items: center; gap: 8px; }
    .logo-icon { font-size: 24px; }
    .header-actions { display: flex; gap: 12px; }
    .btn { padding: 8px 16px; border-radius: 50px; font-weight: 600; cursor: pointer; transition: all 0.3s; border: none; font-size: 13px; text-decoration: none; display: inline-flex; align-items: center; gap: 6px; }
    .btn-primary { background: var(--primary); color: white; }
    .btn-primary:hover { background: var(--primary-dark); }
    .btn-outline { background: transparent; border: 2px solid var(--border); color: var(--text-gray); }
    .btn-sm { padding: 6px 12px; font-size: 12px; }
    .page-hero { background: linear-gradient(135deg, var(--primary) 0%, #FF8F6B 100%); color: white; padding: 48px 20px; text-align: center; }
    .page-hero h1 { font-size: 2rem; margin-bottom: 8px; }
    .page-hero p { font-size: 1rem; opacity: 0.95; }
    .main-content { max-width: 1200px; margin: 0 auto; padding: 32px 20px; }
    .tools-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; margin-bottom: 32px; }
    .tool-card { background: var(--bg-white); border-radius: var(--radius); padding: 24px; box-shadow: var(--shadow); cursor: pointer; transition: all 0.3s; border: 2px solid transparent; }
    .tool-card:hover { transform: translateY(-4px); box-shadow: 0 8px 30px rgba(0,0,0,0.12); }
    .tool-card.active { border-color: var(--primary); background: var(--primary-light); }
    .tool-icon { width: 56px; height: 56px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 28px; margin-bottom: 16px; }
    .tool-icon.orange { background: #FFF3ED; }
    .tool-icon.blue { background: #E8F4FF; }
    .tool-icon.green { background: #ECFDF5; }
    .tool-icon.purple { background: #F3EEFF; }
    .tool-card h3 { font-size: 1.1rem; margin-bottom: 8px; color: var(--text-dark); }
    .tool-card p { font-size: 0.9rem; color: var(--text-gray); }
    .map-tool-section { background: var(--bg-white); border-radius: var(--radius); box-shadow: var(--shadow); margin-bottom: 32px; overflow: hidden; }
    .tool-header { padding: 16px 20px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
    .tool-title { font-size: 16px; font-weight: 600; display: flex; align-items: center; gap: 8px; }
    .tool-actions { display: flex; gap: 8px; }
    .btn-tool { padding: 6px 12px; border-radius: 6px; font-size: 12px; font-weight: 500; cursor: pointer; border: 1px solid var(--border); background: var(--bg-white); color: var(--text-gray); transition: all 0.2s; }
    .btn-tool:hover { background: var(--primary); color: white; border-color: var(--primary); }
    .btn-tool.danger { border-color: #EF4444; color: #EF4444; }
    .btn-tool.danger:hover { background: #EF4444; color: white; }
    .instruction-banner { background: linear-gradient(135deg, #FEF3C7 0%, #FDE68A 100%); padding: 12px 20px; display: flex; align-items: center; gap: 12px; font-size: 14px; color: #92400E; }
    .instruction-icon { font-size: 20px; }
    #toolMap { height: 500px; width: 100%; }
    .custom-marker { background: none; border: none; }
    .marker-point { width: 16px; height: 16px; border-radius: 50%; background: var(--primary); border: 3px solid white; box-shadow: 0 2px 8px rgba(0,0,0,0.3); }
    .marker-label-custom { position: absolute; top: 100%; left: 50%; transform: translateX(-50%); background: white; padding: 4px 10px; border-radius: 4px; font-size: 12px; font-weight: 500; white-space: nowrap; box-shadow: 0 2px 6px rgba(0,0,0,0.15); margin-top: 4px; }
    .result-panel { padding: 16px 20px; background: var(--bg-light); border-top: 1px solid var(--border); }
    .result-info { display: flex; gap: 24px; flex-wrap: wrap; }
    .result-item { display: flex; align-items: center; gap: 8px; }
    .result-label { font-size: 14px; color: var(--text-gray); }
    .result-value { font-size: 16px; font-weight: 600; color: var(--primary); }
    .route-points { padding: 16px 20px; border-top: 1px solid var(--border); }
    .route-points h4 { font-size: 14px; margin-bottom: 12px; color: var(--text-dark); }
    .route-points-list { display: flex; flex-direction: column; gap: 8px; max-height: 200px; overflow-y: auto; }
    .route-point-item { display: flex; align-items: center; gap: 12px; padding: 10px; background: var(--bg-light); border-radius: var(--radius-sm); }
    .route-point-number { width: 24px; height: 24px; border-radius: 50%; background: var(--primary); color: white; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 600; flex-shrink: 0; }
    .route-point-info { flex: 1; }
    .route-point-name { font-size: 14px; font-weight: 500; }
    .route-point-coords { font-size: 11px; color: var(--text-gray); }
    .route-point-remove { width: 24px; height: 24px; border-radius: 50%; background: #FEE2E2; color: #EF4444; border: none; cursor: pointer; font-size: 14px; display: flex; align-items: center; justify-content: center; }
    .route-point-remove:hover { background: #EF4444; color: white; }
    .tool-description { padding: 20px; background: var(--bg-light); border-top: 1px solid var(--border); }
    .tool-description h4 { font-size: 14px; margin-bottom: 8px; color: var(--text-dark); }
    .tool-description p { font-size: 13px; color: var(--text-gray); line-height: 1.6; }
    .screenshot-preview { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.8); z-index: 2000; align-items: center; justify-content: center; flex-direction: column; gap: 20px; }
    .screenshot-preview.show { display: flex; }
    .screenshot-preview img { max-width: 90%; max-height: 80%; border-radius: var(--radius); box-shadow: 0 8px 40px rgba(0,0,0,0.3); }
    .screenshot-actions { display: flex; gap: 12px; }
    .footer { background: var(--secondary); color: white; padding: 40px 20px; text-align: center; margin-top: 60px; }
    .footer p { opacity: 0.8; font-size: 0.9rem; }
    @media (max-width: 768px) { .tools-grid { grid-template-columns: 1fr; } .result-info { flex-direction: column; gap: 8px; } #toolMap { height: 400px; } }
  </style>
</head>
<body>
  <header class="header">
    <div class="header-content">
      <a href="index.html" class="logo"><span class="logo-icon">🧭</span><span>游导</span></a>
      <div class="header-actions"><a href="index.html" class="btn btn-outline btn-sm">返回地图</a></div>
    </div>
  </header>
  <section class="page-hero"><h1>🛠️ 地图工具</h1><p>测距、面积测量、路线规划、地图截图 - 规划旅行的得力助手</p></section>
  <main class="main-content">
    <div class="tools-grid">
      <div class="tool-card active" data-tool="distance" onclick="selectTool('distance')"><div class="tool-icon orange">📏</div><h3>距离测量</h3><p>点击地图测量两点或多点之间的距离</p></div>
      <div class="tool-card" data-tool="area" onclick="selectTool('area')"><div class="tool-icon blue">📐</div><h3>面积测量</h3><p>测量区域面积，适合规划步行范围</p></div>
      <div class="tool-card" data-tool="route" onclick="selectTool('route')"><div class="tool-icon green">🛣️</div><h3>路线规划</h3><p>串联多个景点，规划最优游览顺序</p></div>
      <div class="tool-card" data-tool="screenshot" onclick="selectTool('screenshot')"><div class="tool-icon purple">📷</div><h3>地图截图</h3><p>保存当前地图为图片，方便分享</p></div>
    </div>
    <div class="map-tool-section">
      <div class="tool-header"><h2 class="tool-title" id="toolTitle">📏 距离测量</h2><div class="tool-actions"><button class="btn-tool" id="btnClear" onclick="handleClear()">🗑️ 清除</button><button class="btn-tool" id="btnUndo" onclick="undoLast()">↩️ 撤销</button></div></div>
      <div class="instruction-banner" id="instructionBanner"><span class="instruction-icon">💡</span><span id="instructionText">点击地图添加测量点，系统会自动计算并显示总距离</span></div>
      <div id="toolMap"></div>
      <div class="result-panel" id="resultPanel"><div class="result-info" id="resultInfo"><div class="result-item"><span class="result-label">总距离：</span><span class="result-value" id="totalDistance">0 公里</span></div></div></div>
      <div class="route-points" id="routePointsSection" style="display:none"><h4>📍 路线点</h4><div class="route-points-list" id="routePointsList"></div></div>
      <div class="tool-description"><h4>💡 使用说明</h4><p id="toolDescription">在地图上点击添加测量点，系统会自动计算并显示总距离。支持添加多个点测量折线距离。</p></div>
    </div>
  </main>
  <div class="screenshot-preview" id="screenshotPreview"><img id="screenshotImage" src="" alt="地图截图"><div class="screenshot-actions"><button class="btn btn-outline" onclick="closeScreenshot()">关闭</button><button class="btn btn-primary" onclick="downloadScreenshot()">下载图片</button></div></div>
  <footer class="footer"><p>© 2024 游导旅游 YouDao Travel. 让旅行更简单</p></footer>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
  <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
  <script>
    let map,currentTool='distance',points=[],markers=[],polyline=null,polygon=null;
    const toolConfig={distance:{title:'📏 距离测量',instruction:'点击地图添加测量点，系统会自动计算并显示总距离',description:'在地图上点击添加测量点，系统会自动计算并显示总距离。支持添加多个点测量折线距离。'},area:{title:'📐 面积测量',instruction:'点击地图添加区域顶点，系统会自动计算并显示面积',description:'在地图上点击添加区域顶点，至少需要3个点形成闭合区域。系统会自动计算并显示面积。'},route:{title:'🛣️ 路线规划',instruction:'点击地图添加途经点，规划最优游览路线',description:'点击地图添加景点或途经点，可以删除已添加的点。系统会计算总距离。'},screenshot:{title:'📷 地图截图',instruction:'点击"截图"按钮保存当前地图视图',description:'点击"截图"按钮保存当前地图视图为图片，方便离线查看或分享给好友。'}};
    function initMap(){map=L.map('toolMap').setView([35.6762,139.6503],12);L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{attribution:'© OpenStreetMap contributors'}).addTo(map);map.on('click',handleMapClick);}
    function handleMapClick(e){const{lat,lng}=e.latlng;if(currentTool==='distance'||currentTool==='route'){points.push({lat,lng});updateMarkers();updateResult();}else if(currentTool==='area'){points.push({lat,lng});updateAreaMarkers();updateResult();}}
    function updateMarkers(){markers.forEach(m=>map.removeLayer(m));markers=[];points.forEach((p,i)=>{const marker=L.marker([p.lat,p.lng],{icon:L.divIcon({className:'custom-marker',html:'<div class="marker-point"></div><div class="marker-label-custom">点 '+(i+1)+'</div>',iconSize:[20,30],iconAnchor:[10,15]})}).addTo(map);markers.push(marker);});if(polyline)map.removeLayer(polyline);if(points.length>=2){polyline=L.polyline(points.map(p=>[p.lat,p.lng]),{color:'#FF6B35',weight:3,dashArray:'5,10'}).addTo(map);}updateRoutePointsList();}
    function updateAreaMarkers(){markers.forEach(m=>map.removeLayer(m));markers=[];points.forEach((p,i)=>{const marker=L.marker([p.lat,p.lng],{icon:L.divIcon({className:'custom-marker',html:'<div class="marker-point" style="background:#3B82F6"></div><div class="marker-label-custom">顶点 '+(i+1)+'</div>',iconSize:[20,30],iconAnchor:[10,15]})}).addTo(map);markers.push(marker);});if(polygon)map.removeLayer(polygon);if(points.length>=3){polygon=L.polygon(points.map(p=>[p.lat,p.lng]),{color:'#3B82F6',weight:2,fillColor:'#3B82F6',fillOpacity:0.2}).addTo(map);}updateRoutePointsList();}
    function updateResult(){const resultEl=document.getElementById('totalDistance');if(currentTool==='distance'||currentTool==='route'){let totalDistance=0;for(let i=0;i<points.length-1;i++){totalDistance+=points[i].distanceTo(points[i+1])/1000;}resultEl.textContent=totalDistance.toFixed(2)+' 公里';}else if(currentTool==='area'){if(points.length>=3){const area=calculatePolygonArea(points);const areaInSqM=area;if(areaInSqM>=1000000){resultEl.textContent=(areaInSqM/1000000).toFixed(2)+' 平方公里';}else{resultEl.textContent=areaInSqM.toFixed(0)+' 平方米';}}else{resultEl.textContent='需要至少3个点';}}}}
    function calculatePolygonArea(points){if(points.length<3)return 0;let area=0;const n=points.length;for(let i=0;i<n;i++){const j=(i+1)%n;const lat1=points[i].lat*Math.PI/180;const lat2=points[j].lat*Math.PI/180;const lng1=points[i].lng*Math.PI/180;const lng2=points[j].lng*Math.PI/180;area+=(lng2-lng1)*(2+Math.sin(lat1)+Math.sin(lat2));}return Math.abs(area*6371000*6371000/2);}
    function updateRoutePointsList(){const listEl=document.getElementById('routePointsList');const sectionEl=document.getElementById('routePointsSection');if(currentTool!=='route'){sectionEl.style.display='none';return;}sectionEl.style.display='block';listEl.innerHTML=points.map((p,i)=>'<div class="route-point-item"><span class="route-point-number">'+(i+1)+'</span><div class="route-point-info"><div class="route-point-name">途经点 '+(i+1)+'</div><div class="route-point-coords">'+p.lat.toFixed(5)+', '+p.lng.toFixed(5)+'</div></div><button class="route-point-remove" onclick="removePoint('+i+')">×</button></div>').join('');}
    function removePoint(index){points.splice(index,1);if(currentTool==='area'){updateAreaMarkers();}else{updateMarkers();}updateResult();}
    function selectTool(tool){currentTool=tool;document.querySelectorAll('.tool-card').forEach(card=>card.classList.toggle('active',card.dataset.tool===tool));const config=toolConfig[tool];document.getElementById('toolTitle').textContent=config.title;document.getElementById('instructionText').textContent=config.instruction;document.getElementById('toolDescription').textContent=config.description;document.getElementById('resultPanel').style.display=tool==='screenshot'?'none':'block';clearAll();updateToolButtons();}
    function clearAll(){points=[];markers.forEach(m=>map.removeLayer(m));markers=[];if(polyline){map.removeLayer(polyline);polyline=null;}if(polygon){map.removeLayer(polygon);polygon=null;}document.getElementById('totalDistance').textContent='0 '+(currentTool==='area'?'平方米':'公里');updateRoutePointsList();}
    function undoLast(){if(points.length>0){points.pop();if(currentTool==='area'){updateAreaMarkers();}else{updateMarkers();}updateResult();}}
    function handleClear(){if(currentTool==='screenshot'){takeScreenshot();}else{clearAll();}}
    function updateToolButtons(){const clearBtn=document.getElementById('btnClear');const undoBtn=document.getElementById('btnUndo');if(currentTool==='screenshot'){clearBtn.innerHTML='📷 截图';undoBtn.style.display='none';}else{clearBtn.innerHTML='🗑️ 清除';undoBtn.style.display='block';}}
    async function takeScreenshot(){const mapContainer=document.getElementById('toolMap');try{const canvas=await html2canvas(mapContainer,{useCORS:true,allowTaint:true,backgroundColor:'#ffffff'});document.getElementById('screenshotImage').src=canvas.toDataURL('image/png');document.getElementById('screenshotPreview').classList.add('show');}catch(error){alert('截图失败，请重试');}}
    function closeScreenshot(){document.getElementById('screenshotPreview').classList.remove('show');}
    function downloadScreenshot(){const link=document.createElement('a');link.download='map-screenshot-'+Date.now()+'.png';link.href=document.getElementById('screenshotImage').src;link.click();}
    document.addEventListener('DOMContentLoaded',()=>{initMap();updateToolButtons();});
  </script>
</body>
</html>
