<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>地图搜索 - 游导旅游</title>
  <meta name="description" content="在地图上搜索景点、餐厅、商场和交通枢纽，快速定位想去的地方。">
  <link rel="preconnect" href="https://unpkg.com">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin="">
  <style>
    :root { --primary: #FF6B35; --primary-light: #FFF3ED; --primary-dark: #E55A2B; --secondary: #1E3A5F; --bg-light: #F8F9FA; --bg-white: #FFFFFF; --text-dark: #2D3436; --text-gray: #636E72; --border: #E9ECEF; --shadow: 0 4px 20px rgba(0,0,0,0.08); --radius: 16px; --radius-sm: 8px; --attraction: #FF6B35; --food: #F59E0B; --shopping: #EC4899; --transport: #3B82F6; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Noto Sans SC', -apple-system, sans-serif; background: var(--bg-light); color: var(--text-dark); line-height: 1.6; height: 100vh; overflow: hidden; }
    .header { background: var(--bg-white); box-shadow: var(--shadow); position: fixed; top: 0; left: 0; right: 0; z-index: 1000; height: 60px; }
    .header-content { max-width: 100%; height: 100%; padding: 0 20px; display: flex; align-items: center; justify-content: space-between; }
    .logo { font-size: 20px; font-weight: 700; color: var(--primary); text-decoration: none; display: flex; align-items: center; gap: 8px; }
    .logo-icon { font-size: 24px; }
    .header-actions { display: flex; gap: 12px; }
    .btn { padding: 8px 16px; border-radius: 50px; font-weight: 600; cursor: pointer; transition: all 0.3s; border: none; font-size: 13px; text-decoration: none; display: inline-flex; align-items: center; gap: 6px; }
    .btn-primary { background: var(--primary); color: white; }
    .btn-primary:hover { background: var(--primary-dark); }
    .btn-outline { background: transparent; border: 2px solid var(--border); color: var(--text-gray); }
    .btn-sm { padding: 6px 12px; font-size: 12px; }
    .main-layout { display: flex; height: calc(100vh - 60px); margin-top: 60px; }
    .search-panel { width: 400px; background: var(--bg-white); border-right: 1px solid var(--border); display: flex; flex-direction: column; flex-shrink: 0; }
    .search-header { padding: 20px; border-bottom: 1px solid var(--border); }
    .search-title { font-size: 18px; font-weight: 600; margin-bottom: 16px; color: var(--text-dark); }
    .search-box { position: relative; }
    .search-input { width: 100%; padding: 14px 16px 14px 48px; border: 2px solid var(--border); border-radius: var(--radius); font-size: 15px; transition: all 0.2s; outline: none; }
    .search-input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(255,107,53,0.1); }
    .search-icon { position: absolute; left: 16px; top: 50%; transform: translateY(-50%); font-size: 18px; color: var(--text-gray); }
    .city-selector { margin-top: 16px; }
    .city-label { font-size: 13px; color: var(--text-gray); margin-bottom: 8px; }
    .city-buttons { display: flex; gap: 8px; flex-wrap: wrap; }
    .city-btn { padding: 8px 16px; border: 2px solid var(--border); background: var(--bg-white); border-radius: 20px; font-size: 13px; font-weight: 500; color: var(--text-gray); cursor: pointer; transition: all 0.2s; }
    .city-btn:hover { border-color: var(--primary); color: var(--primary); }
    .city-btn.active { background: var(--primary); border-color: var(--primary); color: white; }
    .category-filter { padding: 16px 20px; border-bottom: 1px solid var(--border); }
    .filter-title { font-size: 13px; color: var(--text-gray); margin-bottom: 10px; }
    .filter-options { display: flex; gap: 8px; flex-wrap: wrap; }
    .filter-chip { padding: 6px 14px; border: 2px solid var(--border); background: var(--bg-white); border-radius: 20px; font-size: 12px; font-weight: 500; color: var(--text-gray); cursor: pointer; transition: all 0.2s; display: flex; align-items: center; gap: 4px; }
    .filter-chip:hover { border-color: var(--primary); color: var(--primary); }
    .filter-chip.active { background: var(--primary); border-color: var(--primary); color: white; }
    .filter-chip .dot { width: 8px; height: 8px; border-radius: 50%; }
    .search-results { flex: 1; overflow-y: auto; padding: 16px 20px; }
    .results-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
    .results-count { font-size: 14px; color: var(--text-gray); }
    .result-card { background: var(--bg-white); border-radius: var(--radius-sm); padding: 14px; margin-bottom: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.04); cursor: pointer; transition: all 0.2s; border: 2px solid transparent; }
    .result-card:hover { box-shadow: 0 4px 16px rgba(0,0,0,0.08); transform: translateX(4px); }
    .result-card.active { border-color: var(--primary); background: var(--primary-light); }
    .result-header { display: flex; align-items: flex-start; gap: 12px; margin-bottom: 10px; }
    .result-icon { width: 44px; height: 44px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 22px; flex-shrink: 0; }
    .result-icon.attraction { background: #FFF3ED; }
    .result-icon.food { background: #FFF8E6; }
    .result-icon.shopping { background: #FFF0F5; }
    .result-icon.transport { background: #E8F4FF; }
    .result-info { flex: 1; min-width: 0; }
    .result-name { font-size: 15px; font-weight: 600; color: var(--text-dark); margin-bottom: 4px; }
    .result-meta { display: flex; align-items: center; gap: 12px; font-size: 12px; color: var(--text-gray); }
    .result-rating { color: #FFB800; font-weight: 600; }
    .result-city { padding: 2px 8px; background: var(--bg-light); border-radius: 4px; font-size: 11px; }
    .result-description { font-size: 13px; color: var(--text-gray); display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    .map-container { flex: 1; position: relative; }
    #searchMap { width: 100%; height: 100%; }
    .custom-marker { background: none; border: none; }
    .marker-content { display: flex; align-items: center; justify-content: center; width: 36px; height: 36px; border-radius: 50%; background: var(--primary); color: white; font-size: 16px; font-weight: bold; box-shadow: 0 3px 10px rgba(0,0,0,0.3); border: 3px solid white; transition: all 0.2s; cursor: pointer; }
    .marker-content:hover { transform: scale(1.2); }
    .marker-content.attraction { background: var(--attraction); }
    .marker-content.food { background: var(--food); }
    .marker-content.shopping { background: var(--shopping); }
    .marker-content.transport { background: var(--transport); }
    .marker-label { position: absolute; top: 100%; left: 50%; transform: translateX(-50%); background: white; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 500; color: var(--text-dark); white-space: nowrap; box-shadow: 0 2px 6px rgba(0,0,0,0.15); margin-top: 4px; opacity: 0; transition: opacity 0.2s; pointer-events: none; }
    .marker-content:hover + .marker-label, .custom-marker:hover .marker-label { opacity: 1; }
    .map-controls { position: absolute; top: 20px; right: 20px; display: flex; flex-direction: column; gap: 8px; z-index: 999; }
    .map-control-btn { width: 44px; height: 44px; background: var(--bg-white); border-radius: var(--radius-sm); box-shadow: var(--shadow); border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 20px; transition: all 0.2s; }
    .map-control-btn:hover { background: var(--primary); color: white; }
    .no-results { text-align: center; padding: 40px 20px; color: var(--text-gray); }
    .no-results-icon { font-size: 48px; margin-bottom: 16px; }
    .no-results h3 { font-size: 16px; margin-bottom: 8px; color: var(--text-dark); }
    @media (max-width: 768px) {
      .search-panel { position: fixed; left: 0; right: 0; bottom: 0; top: auto; width: 100%; height: 50vh; transform: translateY(100%); transition: transform 0.3s ease; z-index: 1001; border-right: none; border-top: 1px solid var(--border); border-radius: var(--radius) var(--radius) 0 0; }
      .search-panel.show { transform: translateY(0); }
      .map-container { height: calc(100vh - 60px); }
    }
    .leaflet-popup-content-wrapper { border-radius: var(--radius-sm); padding: 0; }
    .leaflet-popup-content { margin: 0; min-width: 200px; }
    .popup-content { padding: 16px; }
    .popup-title { font-size: 15px; font-weight: 600; margin-bottom: 8px; }
    .popup-meta { font-size: 12px; color: var(--text-gray); margin-bottom: 8px; }
    .popup-btn { width: 100%; padding: 8px; background: var(--primary); color: white; border: none; border-radius: 6px; font-size: 13px; cursor: pointer; }
  </style>
</head>
<body>
  <header class="header">
    <div class="header-content">
      <a href="index.html" class="logo"><span class="logo-icon">🧭</span><span>游导</span></a>
      <div class="header-actions">
        <button class="btn btn-outline btn-sm" onclick="toggleSearchPanel()">🔍 搜索</button>
        <a href="index.html" class="btn btn-primary btn-sm">返回首页</a>
      </div>
    </div>
  </header>
  <div class="main-layout">
    <aside class="search-panel" id="searchPanel">
      <div class="search-header">
        <h2 class="search-title">🔍 搜索地点</h2>
        <div class="search-box">
          <span class="search-icon">🔎</span>
          <input type="text" class="search-input" id="searchInput" placeholder="搜索景点、餐厅、商场..." oninput="performSearch()">
        </div>
        <div class="city-selector">
          <div class="city-label">选择城市</div>
          <div class="city-buttons">
            <button class="city-btn active" data-city="all" onclick="selectCity('all')">全部</button>
            <button class="city-btn" data-city="tokyo" onclick="selectCity('tokyo')">🗼 东京</button>
            <button class="city-btn" data-city="osaka" onclick="selectCity('osaka')">🏯 大阪</button>
            <button class="city-btn" data-city="seoul" onclick="selectCity('seoul')">🎎 首尔</button>
            <button class="city-btn" data-city="bangkok" onclick="selectCity('bangkok')">🛕 曼谷</button>
          </div>
        </div>
      </div>
      <div class="category-filter">
        <div class="filter-title">分类筛选</div>
        <div class="filter-options">
          <button class="filter-chip active" data-category="all" onclick="filterByCategory('all')">全部</button>
          <button class="filter-chip" data-category="attraction" onclick="filterByCategory('attraction')"><span class="dot" style="background:var(--attraction)"></span>🏯 景点</button>
          <button class="filter-chip" data-category="food" onclick="filterByCategory('food')"><span class="dot" style="background:var(--food)"></span>🍜 美食</button>
          <button class="filter-chip" data-category="shopping" onclick="filterByCategory('shopping')"><span class="dot" style="background:var(--shopping)"></span>🛍️ 购物</button>
          <button class="filter-chip" data-category="transport" onclick="filterByCategory('transport')"><span class="dot" style="background:var(--transport)"></span>🚇 交通</button>
        </div>
      </div>
      <div class="search-results">
        <div class="results-header"><span class="results-count" id="resultsCount">找到 42 个地点</span></div>
        <div id="resultsList"></div>
      </div>
    </aside>
    <div class="map-container">
      <div id="searchMap"></div>
      <div class="map-controls">
        <button class="map-control-btn" onclick="toggleSearchPanel()">☰</button>
        <button class="map-control-btn" onclick="map.zoomIn()">+</button>
        <button class="map-control-btn" onclick="map.zoomOut()">−</button>
        <button class="map-control-btn" onclick="fitAllMarkers()">🌍</button>
      </div>
    </div>
  </div>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
  <script>
    const allSpots=[
      {id:'tk001',name:'东京塔',category:'attraction',city:'tokyo',cityName:'东京',lat:35.6586,lng:139.7454,icon:'🗼',description:'东京标志性铁塔，可俯瞰城市夜景',rating:4.7,reviews:'2.8万'},
      {id:'tk002',name:'浅草寺',category:'attraction',city:'tokyo',cityName:'东京',lat:35.7148,lng:139.7967,icon:'⛩️',description:'东京最古老的佛教寺庙，雷门是其标志性建筑',rating:4.6,reviews:'4.5万'},
      {id:'tk005',name:'筑地市场',category:'food',city:'tokyo',cityName:'东京',lat:35.6654,lng:139.7707,icon:'🍣',description:'世界最大的鱼市场，金枪鱼拍卖闻名',rating:4.6,reviews:'3.2万'},
      {id:'tk006',name:'秋叶原',category:'shopping',city:'tokyo',cityName:'东京',lat:35.7023,lng:139.7745,icon:'🎮',description:'世界著名的电器与动漫文化街区',rating:4.5,reviews:'2.6万'},
      {id:'tk007',name:'东京站',category:'transport',city:'tokyo',cityName:'东京',lat:35.6812,lng:139.7671,icon:'🚉',description:'东京最主要的火车站，丸之内站房是地标',rating:4.4,reviews:'1.6万'},
      {id:'os001',name:'大阪城',category:'attraction',city:'osaka',cityName:'大阪',lat:34.6873,lng:135.5262,icon:'🏰',description:'日本三名城之一，天守阁是标志性建筑',rating:4.7,reviews:'3.6万'},
      {id:'os002',name:'道顿堀',category:'attraction',city:'osaka',cityName:'大阪',lat:34.6687,lng:135.5009,icon:'🎭',description:'大阪最繁华的娱乐购物区，霓虹夜景壮观',rating:4.6,reviews:'4.1万'},
      {id:'os005',name:'大阪环球影城',category:'attraction',city:'osaka',cityName:'大阪',lat:34.6654,lng:135.4324,icon:'🎢',description:'世界知名的主题乐园，超级任天堂世界',rating:4.8,reviews:'5.2万'},
      {id:'os006',name:'黑门市场',category:'food',city:'osaka',cityName:'大阪',lat:34.6678,lng:135.4996,icon:'🦐',description:'大阪人的厨房，新鲜海鲜和美食云集',rating:4.5,reviews:'2.7万'},
      {id:'os008',name:'大阪站',category:'transport',city:'osaka',cityName:'大阪',lat:34.7024,lng:135.4959,icon:'🚉',description:'大阪最主要的火车站，大型商业复合设施',rating:4.3,reviews:'1.5万'},
      {id:'sl001',name:'景福宫',category:'attraction',city:'seoul',cityName:'首尔',lat:37.5796,lng:126.9770,icon:'🏛️',description:'朝鲜王朝的正宫，韩服体验热门地',rating:4.6,reviews:'3.2万'},
      {id:'sl002',name:'明洞',category:'shopping',city:'seoul',cityName:'首尔',lat:37.5636,lng:126.9869,icon:'🛍️',description:'首尔最繁华的购物区，化妆品和时尚品牌云集',rating:4.5,reviews:'4.6万'},
      {id:'sl003',name:'南山首尔塔',category:'attraction',city:'seoul',cityName:'首尔',lat:37.5511,lng:126.9882,icon:'🗼',description:'首尔地标，可乘坐缆车到达，情侣锁是其特色',rating:4.6,reviews:'3.9万'},
      {id:'sl007',name:'广藏市场',category:'food',city:'seoul',cityName:'首尔',lat:37.5648,lng:126.9630,icon:'🍲',description:'首尔最大的传统市场，韩服和小吃云集',rating:4.4,reviews:'1.8万'},
      {id:'sl008',name:'首尔站',category:'transport',city:'seoul',cityName:'首尔',lat:37.5547,lng:126.9707,icon:'🚉',description:'首尔最主要的火车站，连接KTX和地铁',rating:4.3,reviews:'1.2万'},
      {id:'bk001',name:'大皇宫',category:'attraction',city:'bangkok',cityName:'曼谷',lat:13.7500,lng:100.4914,icon:'🏛️',description:'泰国皇家宫殿，金碧辉煌的建筑群',rating:4.6,reviews:'4.6万'},
      {id:'bk002',name:'卧佛寺',category:'attraction',city:'bangkok',cityName:'曼谷',lat:13.7465,lng:100.4930,icon:'🛕',description:'曼谷最古老的寺庙，拥有46米长的大卧佛',rating:4.7,reviews:'2.3万'},
      {id:'bk004',name:'暹罗广场',category:'shopping',city:'bangkok',cityName:'曼谷',lat:13.7462,lng:100.5343,icon:'🛍️',description:'曼谷最繁华的购物区，大型商场云集',rating:4.5,reviews:'2.9万'},
      {id:'bk006',name:'郑王庙',category:'attraction',city:'bangkok',cityName:'曼谷',lat:13.7577,lng:100.4888,icon:'🗼',description:'湄南河畔的标志性寺庙，黎明寺',rating:4.7,reviews:'2.0万'},
      {id:'bk007',name:'恰图恰周末市场',category:'shopping',city:'bangkok',cityName:'曼谷',lat:13.7999,lng:100.5507,icon:'🏪',description:'世界最大的跳蚤市场，种类繁多',rating:4.5,reviews:'2.7万'}
    ];
    const categoryConfig={attraction:{name:'景点',icon:'🏯'},food:{name:'美食',icon:'🍜'},shopping:{name:'购物',icon:'🛍️'},transport:{name:'交通',icon:'🚇'}};
    let map,markers={},currentCity='all',currentCategory='all',searchQuery='';
    function initMap(){map=L.map('searchMap').setView([30,120],4);L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{attribution:'© OpenStreetMap contributors'}).addTo(map);allSpots.forEach(spot=>addMarker(spot));renderResults();}
    function addMarker(spot){const icon=L.divIcon({className:'custom-marker',html:'<div class="marker-content '+spot.category+'" id="marker-'+spot.id+'">'+spot.icon+'</div><div class="marker-label">'+spot.name+'</div>',iconSize:[36,44],iconAnchor:[18,44]});const marker=L.marker([spot.lat,spot.lng],{icon}).addTo(map);marker.bindPopup('<div class="popup-content"><div class="popup-title">'+spot.icon+' '+spot.name+'</div><div class="popup-meta">⭐ '+spot.rating+' · '+categoryConfig[spot.category].name+' · '+spot.cityName+'</div><button class="popup-btn" onclick="focusResult(\''+spot.id+'\')">查看详情</button></div>');marker.on('click',()=>focusResult(spot.id));markers[spot.id]=marker;}
    function renderResults(){const filtered=allSpots.filter(spot=>{const matchCity=currentCity==='all'||spot.city===currentCity;const matchCategory=currentCategory==='all'||spot.category===currentCategory;const matchSearch=searchQuery===''||spot.name.toLowerCase().includes(searchQuery.toLowerCase())||spot.description.toLowerCase().includes(searchQuery.toLowerCase());return matchCity&&matchCategory&&matchSearch;});document.getElementById('resultsCount').textContent='找到 '+filtered.length+' 个地点';const list=document.getElementById('resultsList');if(filtered.length===0){list.innerHTML='<div class="no-results"><div class="no-results-icon">🔍</div><h3>未找到相关地点</h3><p>尝试调整搜索条件或关键词</p></div>';return;}list.innerHTML=filtered.map(spot=>'<div class="result-card" data-id="'+spot.id+'" onclick="focusResult(\''+spot.id+'\')"><div class="result-header"><div class="result-icon '+spot.category+'">'+spot.icon+'</div><div class="result-info"><div class="result-name">'+spot.name+'</div><div class="result-meta"><span class="result-rating">⭐ '+spot.rating+'</span><span>'+spot.reviews+'评价</span><span class="result-city">'+spot.cityName+'</span></div></div></div><p class="result-description">'+spot.description+'</p></div>').join('');}
    function focusResult(id){const spot=allSpots.find(s=>s.id===id);if(!spot)return;document.querySelectorAll('.result-card').forEach(card=>card.classList.toggle('active',card.dataset.id===id));map.setView([spot.lat,spot.lng],14);markers[id].openPopup();const markerEl=document.getElementById('marker-'+id);if(markerEl){markerEl.classList.add('highlighted');setTimeout(()=>markerEl.classList.remove('highlighted'),2000);}}
    function performSearch(){searchQuery=document.getElementById('searchInput').value;renderResults();updateMarkers();}
    function selectCity(city){currentCity=city;document.querySelectorAll('.city-btn').forEach(btn=>btn.classList.toggle('active',btn.dataset.city===city));renderResults();updateMarkers();if(city!=='all'){const cityCenters={tokyo:[35.6762,139.6503],osaka:[34.6937,135.5023],seoul:[37.5665,126.9780],bangkok:[13.7563,100.5018]};map.setView(cityCenters[city],12);}else{map.setView([30,120],4);}}
    function filterByCategory(category){currentCategory=category;document.querySelectorAll('.filter-chip').forEach(chip=>chip.classList.toggle('active',chip.dataset.category===category));renderResults();updateMarkers();}
    function updateMarkers(){allSpots.forEach(spot=>{const matchCity=currentCity==='all'||spot.city===currentCity;const matchCategory=currentCategory==='all'||spot.category===currentCategory;const matchSearch=searchQuery===''||spot.name.toLowerCase().includes(searchQuery.toLowerCase())||spot.description.toLowerCase().includes(searchQuery.toLowerCase());if(matchCity&&matchCategory&&matchSearch)markers[spot.id].addTo(map);else markers[spot.id].remove();});}
    function fitAllMarkers(){const visibleMarkers=Object.values(markers).filter(marker=>marker._map!==null);if(visibleMarkers.length>0){const group=L.featureGroup(visibleMarkers);map.fitBounds(group.getBounds(),{padding:[50,50]});}}
    function toggleSearchPanel(){document.getElementById('searchPanel').classList.toggle('show');}
    document.addEventListener('DOMContentLoaded',initMap);
  </script>
</body>
</html>
