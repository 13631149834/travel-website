<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>团期管理 - 导游工具</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/guide/guide-tools.css">
</head>
<body>
  <!-- 导航栏 -->
  <nav class="navbar">
    <div class="container">
      <a href="index.html" class="logo">🌍 游导旅游</a>
      <div class="nav-toggle" onclick="toggleNav()">
        <span></span><span></span><span></span>
      </div>
      <div class="nav-links">
        <a href="index.html">首页</a>
        <a href="guide-tools.html">导游工具</a>
        <a href="schedule.html" class="active">团期管理</a>
        <a href="finance.html">收入记账</a>
      </div>
    </div>
  </nav>

  <!-- 页面头部 -->
  <header class="tool-header" style="background: linear-gradient(135deg, #fc4a1a 0%, #f7b733 100%);">
    <div class="container">
      <h1>📅 团期管理</h1>
      <p>日历视图管理团队行程 · 告别混乱的Excel表格</p>
    </div>
  </header>

  <!-- 主内容区 -->
  <section class="tool-container">
    <div style="display: grid; grid-template-columns: 1fr 400px; gap: 24px;">
      <!-- 日历视图 -->
      <div>
        <div class="calendar-container">
          <div class="calendar-header">
            <button onclick="changeMonth(-1)">&lt;</button>
            <h3 id="calendarTitle">2024年1月</h3>
            <button onclick="changeMonth(1)">&gt;</button>
          </div>
          <div class="calendar-weekdays">
            <div>日</div>
            <div>一</div>
            <div>二</div>
            <div>三</div>
            <div>四</div>
            <div>五</div>
            <div>六</div>
          </div>
          <div class="calendar-days" id="calendarDays">
            <!-- 动态渲染 -->
          </div>
        </div>
      </div>

      <!-- 侧边栏 -->
      <div>
        <!-- 添加团队按钮 -->
        <button class="btn btn-primary" style="width: 100%; margin-bottom: 20px;" onclick="openAddModal()">
          ➕ 添加新团队
        </button>

        <!-- 近期团期 -->
        <div class="content-card">
          <h3>📋 近期团期</h3>
          <div id="upcomingList" class="data-list" style="margin-top: 16px;">
            <!-- 动态渲染 -->
          </div>
          <div class="empty-state" id="upcomingEmpty" style="padding: 30px 0;">
            <div class="icon" style="font-size: 2rem;">📅</div>
            <h3 style="font-size: 1rem;">暂无近期团期</h3>
          </div>
        </div>

        <!-- 统计 -->
        <div class="stats-grid" style="margin-top: 20px;">
          <div class="stat-card">
            <div class="stat-icon" style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);">📅</div>
            <div class="stat-value" id="totalTeams">0</div>
            <div class="stat-label">总团期</div>
          </div>
          <div class="stat-card">
            <div class="stat-icon" style="background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);">👥</div>
            <div class="stat-value" id="totalGuests">0</div>
            <div class="stat-label">总人数</div>
          </div>
        </div>
      </div>
    </div>

    <!-- 全部团期列表 -->
    <div class="content-card" style="margin-top: 30px;">
      <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
        <h3>📋 全部团期</h3>
        <button class="btn btn-secondary" onclick="exportAllTeams()" style="padding: 8px 16px; font-size: 0.9rem;">
          📤 导出数据
        </button>
      </div>
      <div id="allTeamsList">
        <!-- 动态渲染 -->
      </div>
      <div class="empty-state" id="allTeamsEmpty">
        <div class="icon">📋</div>
        <h3>暂无团期记录</h3>
        <p>点击上方按钮添加第一个团期</p>
      </div>
    </div>
  </section>

  <!-- 添加/编辑团期模态框 -->
  <div class="modal" id="teamModal">
    <div class="modal-content" style="max-width: 700px;">
      <div class="modal-header">
        <h3 id="modalTitle">添加新团队</h3>
        <button class="modal-close" onclick="closeTeamModal()">&times;</button>
      </div>
      <div class="modal-body">
        <form id="teamForm">
          <input type="hidden" id="teamId">
          <div class="form-row">
            <div class="form-group">
              <label>团队名称 *</label>
              <input type="text" id="teamName" placeholder="例如：北京4日游" required>
            </div>
            <div class="form-group">
              <label>出发日期 *</label>
              <input type="date" id="startDate" required>
            </div>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label>结束日期 *</label>
              <input type="date" id="endDate" required>
            </div>
            <div class="form-group">
              <label>团队人数</label>
              <input type="number" id="guestCount" placeholder="人数" min="1">
            </div>
          </div>
          <div class="form-group">
            <label>行程安排</label>
            <textarea id="itinerary" placeholder="简要描述行程安排..."></textarea>
          </div>
          <div class="form-group">
            <label>接送地点</label>
            <textarea id="pickupInfo" placeholder="接：xxx地点 xx时间&#10;送：xxx地点 xx时间"></textarea>
          </div>
          <div class="form-group">
            <label>备注信息</label>
            <textarea id="notes" placeholder="其他需要备注的信息..."></textarea>
          </div>
        </form>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="closeTeamModal()">取消</button>
        <button class="btn btn-primary" onclick="saveTeam()">保存</button>
      </div>
    </div>
  </div>

  <!-- 团队详情模态框 -->
  <div class="modal" id="detailModal">
    <div class="modal-content" style="max-width: 600px;">
      <div class="modal-header">
        <h3 id="detailTitle">团队详情</h3>
        <button class="modal-close" onclick="closeDetailModal()">&times;</button>
      </div>
      <div class="modal-body" id="detailBody">
        <!-- 动态内容 -->
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="closeDetailModal()">关闭</button>
        <button class="btn btn-primary" onclick="editTeamFromDetail()">编辑</button>
      </div>
    </div>
  </div>

  <!-- Toast提示 -->
  <div class="toast" id="toast"></div>

  <!-- 页脚 -->
  <footer class="footer">
    <div class="container">
      <div class="footer-bottom">
        <p>© 2024 游导Travel (youdao-travel.com) 版权所有</p>
      </div>
    </div>
  </footer>

  <style>
    @media (max-width: 900px) {
      .tool-container > div:first-child {
        grid-template-columns: 1fr !important;
      }
    }
  </style>

  <script>
    // 全局变量
    let teams = JSON.parse(localStorage.getItem('guide_teams') || '[]');
    let currentYear = new Date().getFullYear();
    let currentMonth = new Date().getMonth();
    let editingTeamId = null;

    // 页面加载完成后
    document.addEventListener('DOMContentLoaded', () => {
      renderCalendar();
      renderUpcoming();
      renderAllTeams();
      updateStats();
    });

    // 切换月份
    function changeMonth(delta) {
      currentMonth += delta;
      if (currentMonth < 0) {
        currentMonth = 11;
        currentYear--;
      } else if (currentMonth > 11) {
        currentMonth = 0;
        currentYear++;
      }
      renderCalendar();
    }

    // 渲染日历
    function renderCalendar() {
      const container = document.getElementById('calendarDays');
      document.getElementById('calendarTitle').textContent = `${currentYear}年${currentMonth + 1}月`;

      const firstDay = new Date(currentYear, currentMonth, 1).getDay();
      const daysInMonth = new Date(currentYear, currentMonth + 1, 0).getDate();
      const today = new Date();

      let html = '';

      // 上月空白
      for (let i = 0; i < firstDay; i++) {
        html += '<div class="calendar-day other-month"></div>';
      }

      // 当月日期
      for (let day = 1; day <= daysInMonth; day++) {
        const dateStr = `${currentYear}-${String(currentMonth + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
        const dayTeams = teams.filter(t => t.startDate === dateStr || (t.startDate <= dateStr && t.endDate >= dateStr));
        const isToday = today.getFullYear() === currentYear && today.getMonth() === currentMonth && today.getDate() === day;

        html += `
          <div class="calendar-day ${isToday ? 'today' : ''}" onclick="showDayTeams('${dateStr}')">
            <div class="day-number">${day}</div>
            <div class="day-events">
              ${dayTeams.slice(0, 2).map(t => `
                <div class="event-dot" title="${t.name}">${t.name.substring(0, 6)}</div>
              `).join('')}
              ${dayTeams.length > 2 ? `<div class="event-dot" style="background: var(--gray-400);">+${dayTeams.length - 2}</div>` : ''}
            </div>
          </div>
        `;
      }

      container.innerHTML = html;
    }

    // 显示某一天的团队
    function showDayTeams(dateStr) {
      const dayTeams = teams.filter(t => t.startDate === dateStr || (t.startDate <= dateStr && t.endDate >= dateStr));
      if (dayTeams.length === 0) {
        showToast('这天没有团期安排', '');
        return;
      }
      showDetail(dayTeams[0].id);
    }

    // 渲染近期团期
    function renderUpcoming() {
      const list = document.getElementById('upcomingList');
      const empty = document.getElementById('upcomingEmpty');
      const today = new Date().toISOString().split('T')[0];
      
      const upcoming = teams
        .filter(t => t.startDate >= today)
        .sort((a, b) => a.startDate.localeCompare(b.startDate))
        .slice(0, 5);

      if (upcoming.length === 0) {
        list.innerHTML = '';
        empty.style.display = 'block';
        return;
      }

      empty.style.display = 'none';
      list.innerHTML = upcoming.map(team => `
        <div class="data-item" onclick="showDetail('${team.id}')" style="cursor: pointer;">
          <div class="data-item-icon" style="background: linear-gradient(135deg, #fc4a1a 0%, #f7b733 100%);">
            👥
          </div>
          <div class="data-item-content">
            <h4>${team.name}</h4>
            <p>${team.startDate} ~ ${team.endDate} · ${team.guestCount || 0}人</p>
          </div>
        </div>
      `).join('');
    }

    // 渲染全部团期
    function renderAllTeams() {
      const list = document.getElementById('allTeamsList');
      const empty = document.getElementById('allTeamsEmpty');

      if (teams.length === 0) {
        list.innerHTML = '';
        empty.style.display = 'block';
        return;
      }

      empty.style.display = 'none';
      list.innerHTML = teams
        .sort((a, b) => b.startDate.localeCompare(a.startDate))
        .map(team => `
          <div class="data-item">
            <div class="data-item-icon" style="background: linear-gradient(135deg, #fc4a1a 0%, #f7b733 100%);">
              👥
            </div>
            <div class="data-item-content">
              <h4>${team.name}</h4>
              <p>${team.startDate} ~ ${team.endDate} · ${team.guestCount || 0}人${team.itinerary ? ' · ' + team.itinerary.substring(0, 30) : ''}</p>
            </div>
            <div class="data-item-actions">
              <button class="edit-btn" onclick="showDetail('${team.id}')">详情</button>
              <button class="edit-btn" onclick="editTeam('${team.id}')">编辑</button>
              <button class="delete-btn" onclick="deleteTeam('${team.id}')">删除</button>
            </div>
          </div>
        `).join('');
    }

    // 更新统计
    function updateStats() {
      document.getElementById('totalTeams').textContent = teams.length;
      document.getElementById('totalGuests').textContent = teams.reduce((sum, t) => sum + (parseInt(t.guestCount) || 0), 0);
    }

    // 打开添加模态框
    function openAddModal() {
      editingTeamId = null;
      document.getElementById('modalTitle').textContent = '添加新团队';
      document.getElementById('teamForm').reset();
      document.getElementById('teamId').value = '';
      
      // 设置默认日期为今天
      const today = new Date().toISOString().split('T')[0];
      document.getElementById('startDate').value = today;
      
      document.getElementById('teamModal').classList.add('open');
    }

    // 编辑团队
    function editTeam(id) {
      const team = teams.find(t => t.id === id);
      if (!team) return;

      editingTeamId = id;
      document.getElementById('modalTitle').textContent = '编辑团队';
      document.getElementById('teamId').value = team.id;
      document.getElementById('teamName').value = team.name;
      document.getElementById('startDate').value = team.startDate;
      document.getElementById('endDate').value = team.endDate;
      document.getElementById('guestCount').value = team.guestCount || '';
      document.getElementById('itinerary').value = team.itinerary || '';
      document.getElementById('pickupInfo').value = team.pickupInfo || '';
      document.getElementById('notes').value = team.notes || '';

      document.getElementById('teamModal').classList.add('open');
    }

    // 从详情页编辑
    function editTeamFromDetail() {
      closeDetailModal();
      editTeam(editingTeamId);
    }

    // 关闭团队模态框
    function closeTeamModal() {
      document.getElementById('teamModal').classList.remove('open');
      editingTeamId = null;
    }

    // 保存团队
    function saveTeam() {
      const id = document.getElementById('teamId').value || Date.now().toString();
      const team = {
        id,
        name: document.getElementById('teamName').value,
        startDate: document.getElementById('startDate').value,
        endDate: document.getElementById('endDate').value,
        guestCount: parseInt(document.getElementById('guestCount').value) || 0,
        itinerary: document.getElementById('itinerary').value,
        pickupInfo: document.getElementById('pickupInfo').value,
        notes: document.getElementById('notes').value,
        createdAt: editingTeamId ? teams.find(t => t.id === editingTeamId)?.createdAt : new Date().toISOString()
      };

      if (!team.name || !team.startDate || !team.endDate) {
        showToast('请填写必填项', 'error');
        return;
      }

      if (editingTeamId) {
        const idx = teams.findIndex(t => t.id === editingTeamId);
        if (idx > -1) teams[idx] = team;
      } else {
        teams.push(team);
      }

      localStorage.setItem('guide_teams', JSON.stringify(teams));
      closeTeamModal();
      renderCalendar();
      renderUpcoming();
      renderAllTeams();
      updateStats();
      showToast(editingTeamId ? '已更新' : '已添加', 'success');
    }

    // 显示详情
    function showDetail(id) {
      const team = teams.find(t => t.id === id);
      if (!team) return;

      editingTeamId = id;
      document.getElementById('detailTitle').textContent = team.name;
      document.getElementById('detailBody').innerHTML = `
        <div style="display: grid; gap: 16px;">
          <div style="display: flex; gap: 16px; flex-wrap: wrap;">
            <div style="flex: 1; padding: 16px; background: var(--gray-50); border-radius: 10px;">
              <div style="font-size: 0.85rem; color: var(--gray-500); margin-bottom: 4px;">出发日期</div>
              <div style="font-weight: 600;">${team.startDate}</div>
            </div>
            <div style="flex: 1; padding: 16px; background: var(--gray-50); border-radius: 10px;">
              <div style="font-size: 0.85rem; color: var(--gray-500); margin-bottom: 4px;">结束日期</div>
              <div style="font-weight: 600;">${team.endDate}</div>
            </div>
          </div>
          <div style="padding: 16px; background: var(--gray-50); border-radius: 10px;">
            <div style="font-size: 0.85rem; color: var(--gray-500); margin-bottom: 4px;">团队人数</div>
            <div style="font-weight: 600; font-size: 1.5rem;">${team.guestCount || 0} 人</div>
          </div>
          ${team.itinerary ? `
            <div style="padding: 16px; background: var(--gray-50); border-radius: 10px;">
              <div style="font-size: 0.85rem; color: var(--gray-500); margin-bottom: 8px;">行程安排</div>
              <div style="color: var(--gray-700); white-space: pre-wrap;">${team.itinerary}</div>
            </div>
          ` : ''}
          ${team.pickupInfo ? `
            <div style="padding: 16px; background: var(--gray-50); border-radius: 10px;">
              <div style="font-size: 0.85rem; color: var(--gray-500); margin-bottom: 8px;">接送安排</div>
              <div style="color: var(--gray-700); white-space: pre-wrap;">${team.pickupInfo}</div>
            </div>
          ` : ''}
          ${team.notes ? `
            <div style="padding: 16px; background: var(--gray-50); border-radius: 10px;">
              <div style="font-size: 0.85rem; color: var(--gray-500); margin-bottom: 8px;">备注</div>
              <div style="color: var(--gray-700); white-space: pre-wrap;">${team.notes}</div>
            </div>
          ` : ''}
        </div>
      `;

      document.getElementById('detailModal').classList.add('open');
    }

    // 关闭详情模态框
    function closeDetailModal() {
      document.getElementById('detailModal').classList.remove('open');
    }

    // 删除团队
    function deleteTeam(id) {
      if (confirm('确定要删除这个团期吗？')) {
        teams = teams.filter(t => t.id !== id);
        localStorage.setItem('guide_teams', JSON.stringify(teams));
        renderCalendar();
        renderUpcoming();
        renderAllTeams();
        updateStats();
        showToast('已删除', 'success');
      }
    }

    // 导出全部数据
    function exportAllTeams() {
      if (teams.length === 0) {
        showToast('暂无数据', 'error');
        return;
      }

      let csv = '\uFEFF团队名称,出发日期,结束日期,人数,行程安排,接送安排,备注\n';
      teams.forEach(t => {
        csv += `"${t.name}","${t.startDate}","${t.endDate}","${t.guestCount || 0}","${(t.itinerary || '').replace(/"/g, '""')}","${(t.pickupInfo || '').replace(/"/g, '""')}","${(t.notes || '').replace(/"/g, '""')}"\n`;
      });

      const blob = new Blob([csv], { type: 'text/csv;charset=utf-8' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `团期管理_${new Date().toISOString().split('T')[0]}.csv`;
      a.click();
      URL.revokeObjectURL(url);
      showToast('已导出CSV', 'success');
    }

    // 显示Toast
    function showToast(message, type = '') {
      const toast = document.getElementById('toast');
      toast.textContent = message;
      toast.className = `toast ${type} show`;
      setTimeout(() => {
        toast.className = 'toast';
      }, 3000);
    }

    // 点击模态框外部关闭
    document.getElementById('teamModal').addEventListener('click', function(e) {
      if (e.target === this) closeTeamModal();
    });
    document.getElementById('detailModal').addEventListener('click', function(e) {
      if (e.target === this) closeDetailModal();
    });
  </script>
</body>
</html>
