<button class="dark-toggle" id="darkToggle" title="切换夜间模式">🌙</button>

<script>
(function(){
  const btn=document.getElementById('darkToggle');
  const saved=localStorage.getItem('youdao_theme');
  if(saved==='dark'){document.documentElement.setAttribute('data-theme','dark');btn.textContent='☀️'}
  btn.onclick=function(){
    const isDark=document.documentElement.getAttribute('data-theme')==='dark';
    if(isDark){document.documentElement.removeAttribute('data-theme');localStorage.setItem('youdao_theme','light');btn.textContent='🌙'}
    else{document.documentElement.setAttribute('data-theme','dark');localStorage.setItem('youdao_theme','dark');btn.textContent='☀️'}
  };
})();
</script>
<style>
[data-theme="dark"] body{background:linear-gradient(135deg,#1a1a2e,#16213e)!important}
[data-theme="dark"] .container{background:#1e2a3a!important;box-shadow:0 20px 60px rgba(0,0,0,.3)!important}
[data-theme="dark"] h1{color:#FF8A65!important}
[data-theme="dark"] .subtitle,[data-theme="dark"] .brand{color:#b0b0b0!important}
[data-theme="dark"] .hint{background:#2a2a3a!important;color:#FF8A65!important}
[data-theme="dark"] .btn-secondary{background:#2a2a3a!important;color:#FF8A65!important}
[data-theme="dark"] .links a{background:#2a2a3a!important;color:#FF8A65!important;border-color:#3a3a4a!important}
.dark-toggle{position:fixed;bottom:20px;right:16px;z-index:999;width:44px;height:44px;border-radius:50%;border:none;cursor:pointer;font-size:1.3rem;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 12px rgba(0,0,0,.2);background:#fff;color:#E65100;transition:all .3s}
[data-theme="dark"] .dark-toggle{background:#1a2a3a;color:#FFB74D;border:2px solid #2a3a4a}
.page-loading-bar{position:fixed;top:0;left:0;height:3px;background:linear-gradient(90deg,#E65100,#FF6D00,#FFB74D);z-index:9999;width:0;opacity:0}
</style>
