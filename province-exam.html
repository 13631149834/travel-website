          "北京烤鸭技艺2008年被列入国家级非物质文化遗产名录。全聚德挂炉烤鸭技艺和便宜坊焖炉烤鸭技艺各具特色。全聚德选用果木（枣木、梨木）为燃料，烤制50分钟。片鸭讲究\"108片\"，每片带皮带肉。鸭架可熬汤，物尽其用。烤鸭已成为北京递给世界的一张美食名片。",

          "天津捞面是天津人待客的重要饮食习俗，尤其以大年初二\"姑爷节\"吃的四碟捞面最为讲究。捞面配四碟浇头：清炒虾仁、炒鸡蛋、肉丝炒香干、糖醋面筋丝，搭配三鲜卤或西红柿鸡蛋卤。面条要用手擀面，配菜丰富象征吉祥。天津捞面讲究\"菜码要全、卤汁要鲜\"，一碗面承载着天津人的热情与好客。",

          "安徽宏村、西递是皖南古村落的杰出代表，2000年列入世界文化遗产。宏村位于黟县东北部，有」画里乡村」之誉，是汪氏聚居地。村中月沼、南湖如明镜映照白墙黛瓦，牛形水系设计精巧，徽派建筑精华尽在于此。西递距宏村约18公里，有」桃花源里人家」之称，建筑布局讲究」枕山、环水、面屏」。",
          "西递、宏村的徽派建筑艺术登峰造极。白墙黛瓦、马头墙是徽派建筑特征。马头墙又称」封火墙」，高于屋面，可在火灾时阻隔蔓延。」三雕」（木雕、石雕、砖雕）装饰精美，题材有戏曲人物、花鸟虫鱼、吉祥图案等。木雕多见于梁枋、窗棂，以透雕、镂空雕见长。门楼、门罩采用砖雕，工艺精细。",
          "安徽现有5A级景区12个，数量居全国前列。黄山风景区、九华山风景区、皖南古村落（西递、宏村）是世界遗产。天柱山风景区以超高压变质带地质奇观著称，大别山主峰白马尖雄奇险峻。天堂寨风景区是」华东最后一片原始森林」。方特主题公园（芜湖）是亲子游首选。",
          "安徽名人辈出，历史文化底蕴深厚。老子、庄子创立道家学说，庄子是安徽蒙城人。曹操是亳州人，」东临碣石，以观沧海」。朱熹祖籍安徽，是宋代理学集大成者。李白多次游历安徽，留下」桃花潭水深千尺，不及汪伦送我情」。徽州是程朱理学发源地，徽商称雄商界数百年。",
          "安徽楚文化遗存丰富。寿县是楚国最后都城所在地，战国末期楚考烈王迁都寿春。寿县博物馆馆藏丰富，有」全国县级博物馆之最」美誉。出土文物有越王剑、鄂君启金节（战国错金铭文）等珍贵文物。凤阳明中都城是朱元璋建国初营建的都城，规模宏大，遗址保存较好。",
          "安徽是文房四宝的故乡。宣城宣纸、歙县歙砚、徽墨、湖笔并称」文房四宝」。宣纸产于宣城泾县，因」韧而能润，光而不滑、洁白稠密」著称，有」纸中之王」美誉。歙砚产于黄山脚下歙县、祁门一带，质地细腻发墨，储量稀少。徽墨产于绩溪、歙县，墨色黑润，香气浓郁。",
          "安徽戏曲文化灿烂。徽剧是京剧前身，乾隆年间」四大徽班」进京献艺促成京剧诞生。黄梅戏起源于安庆、鄂东地区，以《天仙配》《女驸马》等剧目闻名全国。安徽梆子、庐剧、泗州戏等地方剧种各具特色。」梨园佳子弟」的徽班演艺传统延续至今。",

          "安徽南北文化差异明显。皖北是中原文化区，宿州、亳州、阜阳等地通行中原官话，民风淳朴豪放。皖中是江淮文化区，合肥、芜湖等地兼容南北文化。皖南是徽州文化区，安庆、池州、宣城等地通行吴语，崇文重教。徽州文化强调」耕读传家」，」十户之村，不废诵读」。",
          "安徽矿产资源丰富，煤、铁、铜、硫铁等储量居华东或全国前列。淮南、淮北煤炭基地是」华东能源库」。马鞍山钢铁产量全国前列。铜陵是」中国古铜都」，铜冶炼历史3000年。滁州、定远盐矿储量华东第一。",
          "安徽是农业大省，粮食产量居全国前列。皖北是重要商品粮基地，阜阳、宿州是产粮大市。淮河流域是中国大豆、棉花主产区。皖西六安瓜片茶、霍山石斛是珍贵特产。皖南山区是徽州贡菊、太平猴魁、黄山毛峰产区。安徽是全国最大稻米出口省份之一。",
          "合肥是安徽省会，面积1.14万平方公里，常住人口近1000万。是长三角城市群副中心、全国性综合交通枢纽。京沪高铁、合福高铁在此交汇。」合肥造」集成电路、新型显示、人工智能等产业国内领先。是全国四大科教城市之一，拥有中国科技大学等高等院校60余所。",

          "徽菜是中国八大菜系之一，以烹饪山珍见长。」三重」（重油、重色、重火功）是徽菜特点。代表名菜有臭鳜鱼、毛豆腐、胡适一品锅、李鸿章大杂烩、黄山炖鸡等。臭鳜鱼又称」腌鲜鳜鱼」，经发酵后产生独特气味，肉质却更加鲜嫩。毛豆腐表面生有白色绒毛，配辣椒酱煎制，外酥里嫩。",
          "安徽早点文化丰富，各地风味不同。合肥有」四大名点」：麻饼、烘糕、寸金、白切，以甜味为主。芜湖虾子面用河虾籽提鲜，面条劲道。蚌埠蚂虾（小龙虾）是特色夜市美食。安庆江毛水饺，皮薄馅大，汤汁鲜美。阜阳格拉条是当地人最爱的面食，配豆芽、芝麻酱、辣椒油。",

          "沿江菜以芜湖、安庆、马鞍山为代表，善于烹饪河鲜。巢湖三白（银鱼、白虾、白米虾）是当地特产。银鱼细如面条，入口即化；白虾壳薄肉嫩，可醉虾或清炒；白米虾小巧玲珑，晒干即成虾皮。」鱼茸圆子」是安庆名菜，用鱼肉茸制成，口感弹牙。",
          "沿淮菜以蚌埠、宿州为代表，口味偏咸辣，善于烹饪牛羊肉。淮南牛肉汤是安徽最著名的小吃之一，以牛骨、牛肉熬制的清汤为底，配粉丝、千张、香菜，驱寒暖胃。蚌埠烧饼夹里脊是当地人早餐标配，烧饼酥脆，里脊鲜嫩。宿州sa汤用母鸡、猪骨熬汤，打入鸡蛋花，配煎包食用。",
          "黄山美食以徽州菜为主，臭鳜鱼、毛豆腐是必尝。笋干烧肉是皖南家常菜，冬笋或春笋制成笋干，配五花肉红烧。刀板香是绩溪名菜，用腌制的猪肉在香樟木板上蒸制，油脂被木板吸走，肉香四溢。石耳炒蛋是山珍名菜，石耳是黄山特产野生菌。",

          "安徽小吃丰富多样。合肥庐州烤鸭色泽红润，鸭皮酥脆，配甜面酱葱丝卷饼。黄山烧饼又名」蟹壳黄烧饼」，酥脆掉渣，有梅菜、鲜肉等馅料。合肥老母鸡汤是待客上品，散养老母鸡慢炖数小时，汤鲜肉香。亳州曹操鸡相传因曹操喜爱而得名。",

          "安徽春节习俗保留诸多传统。除夕守岁吃年夜饭，鱼是必备菜品寓意」年年有余」。合肥人年初一吃」元宝」（饺子），包硬币寓财运。年初二女儿女婿回娘家」走亲戚」。正月十五吃元宵、赏花灯，合肥城隍庙、芜湖方特是灯会主会场。」送年」习俗在皖北流行，正月十六送火把，祈求新年平安。",
          "安徽清明习俗有地方特色。除扫墓祭祖外，还有踏青、插柳、放风筝等。皖南有」清明会」，同宗族人聚祭祀，商议族务。绩溪等徽州地区有」清明祭祀」传统，规模隆重，旅外游子多返乡参加。祭祀后族人共食」清明粿」，以艾草糯米为皮，包咸甜馅料。",

          "黄山两日精华游：第一天乘云谷寺索道上山，游始信峰、北海景区、狮子峰、排云亭，视天气看日落。第二天早起在光明顶或丹霞峰看日出，游飞来石、一线天、玉屏楼（迎客松），乘玉屏索道下山。下午可泡黄山温泉或游览宏村。建议住山顶酒店看日出（需提前预约），或住山下汤口镇。门票190元+景区大巴38元+索道80-90元。",

          "福建地跨中亚热带和南亚热带，气候温暖湿润。年均温17-21℃，降水1000-2000毫米。依山傍海，山海资源丰富。闽江、九龙江、晋江、汀江是主要河流。海域面积大于陆地面积，海岸线曲折，多天然良港。沿海有众多岛屿，厦门岛最大，平潭岛是全省最大岛屿。",
          "福建历史悠久，是海洋文明的代表。闽越族是早期居民，西汉设闽越国。三国时期孙吴在福州设造船厂。宋代泉州成为东方第一大港，明代郑和下西洋从福建出发。鸦片战争后，福州、厦门辟为通商口岸。近代大量闽籍华侨出国，形成独特侨乡文化。现有海外华侨华人1580万人，分布在188个国家和地区。",
          "福建是中国最绿、最清新省份。空气质量优良率98%以上，PM2.5年均浓度22微克/立方米。生态文明指数全国第一，是首个国家生态文明试验区。设有武夷山国家公园、厦门鼓浪屿世界遗产、泰宁丹霞世界自然遗产等。36个县（市）空气质量达标，9个设区市空气质量全部达标。",
          "闽南文化是福建重要文化分支，以厦门、漳州、泉州为核心。闽南语是汉藏语系汉语方言，保留大量古汉语特征。建筑风格独特，红砖大厝、骑楼、番仔楼是代表。宗教信仰多元，妈祖信仰、保生大帝信仰、开漳圣王信仰影响广泛。闽南人敢闯敢拼，」爱拼才会赢」是精神写照。",
          "客家文化是福建特色文化，主要分布在龙岩、三明地区。客家人是中原汉人南迁后裔，保持独特语言、风俗、建筑。土楼是客家民居代表，圆形或方形，聚族而居。客家人重视教育，有」崇文重教」传统。永定土楼群、长汀古城是客家文化核心区。",
          "闽东文化以福州、宁德为代表。福州方言是闽东方言代表，保留古汉语」书」与」猪」同音等特征。福州有2200多年历史，是近代中国开放前沿。马尾船政是中国近代海军摇篮。宁德是」中国大黄鱼之乡」，霞浦滩涂摄影闻名全国。",
          "福建海洋资源丰富，是」海上丝绸之路」核心区。福州、厦门、泉州是古代三大对外贸易港口。海洋渔业发达，水产品人均占有量全国第一。石狮、晋江是服装制造中心，泉州是」品牌之都」，安踏、361度等从这里走向世界。茶产业全产业链产值全国第一，是乌龙茶、红茶、白茶发源地。",

          "闽菜是中国八大菜系之一，以」色香味形」俱佳著称。代表名菜有佛跳墙、鸡汤氽海蚌、白切鸡、醉糟鸡等。佛跳墙又名」福寿全」，集鲍鱼、海参、鱼翅、鱼唇、干贝、蹄筋等二十余种山珍海味于一坛，加入高汤和绍兴酒，文火煨制而成。」佛跳墙」之名源于诗句」坛启荤香飘四邻，佛闻弃禅跳墙来」。",
          "福州鱼丸是福州传统名吃，以鱼肉外皮包肉馅制成。鱼肉剁茸加淀粉擀皮，包入猪肉馅制成丸子。皮薄馅大，洁白晶亮如水晶，咬一口汁水四溢。」鱼丸汤」撒葱花胡椒，福州人早餐宵夜都爱。福州肉燕又称」太平燕」，皮以猪肉捶打制成，薄如纸却韧劲十足，包入肉馅，形似燕子，」无燕不成宴」。",
          "闽南小吃种类繁多，各具特色。沙茶面以沙茶酱为底，配以豆干、鸭血、大肠、虾仁等多种配料，花生酱香浓郁。姜母鸭选用红面番鸭配老姜、麻油焖制，鸭肉酥烂入味，姜香四溢。海蛎煎外酥里嫩，蘸酸辣酱食用，是闽南经典夜市小吃。土笋冻以海虫加工而成，Q弹爽滑，配酱油醋调味。",
          "泉州面线糊是泉州早餐代表，细如丝的面线煮至软烂，加入海鲜、畜禽内脏等配料，勾芡成糊。配油条、醋肉、马蹄酥蘸食，是泉州人一天的开始。崇武鱼卷以马鲛鱼肉为主料，捶打成茸加淀粉制成，长条形状，寓意」圆满」，是婚嫁喜庆必备。拳头母是晋江深沪名吃，以猪瘦肉捶打上劲制成。",
          "武夷山美食以山珍野味著称。岚谷熏鹅是武夷山传统名菜，鹅肉用糯米酿的红酒糟腌制，再以炭火熏烤，皮脆肉嫩，咸香入味。朱子孝母饼是理学家朱熹母亲创制的点心，以面粉、糖、芝麻为料，松脆香甜。文公菜是正宗武夷山名菜，相传朱熹创制，由粉丝、肉丝等十种配料组成。",
          "厦门美食融合闽南与南洋风味。沙茶面遍布街头，花生酱与沙茶粉调制的汤头浓郁。姜母鸭是厦门名菜，用红面番鸭和老姜在砂锅中文火慢炖，鸭肉酥烂入味。海鲜酱油水是最原汁原味的海鲜做法，以酱油、水、姜丝调味突显鲜甜。烧肉粽以糯米包入卤肉、香菇、虾干等，香糯可口。",

          "福建茶文化享誉世界。闽北乌龙茶以武夷岩茶为代表，大红袍、肉桂、水仙是当家品种，有」岩骨花香」之韵。闽南铁观音是乌龙茶另一代表，兰花香气馥郁，七泡有余香。闽东白茶以福鼎白茶为佳，年份白茶越存越有价值。福州茉莉花茶窨制工艺精湛，」福州茉莉花茶」是国家地理标志产品。",

          "拗九节是福州十邑地区特有的传统节日，在农历正月廿九。」拗」在福州话中是」逢」的意思，这天要煮」拗九粥」孝敬父母。粥用糯米、红糖、花生、红枣、桂圆、荸荠等熬制，已出嫁女儿要送拗九粥回娘家，寓意平安吉祥。2022年拗九节列入福建省非物质文化遗产名录。节日当天，福州各大公园、社区举办拗九节活动。",
          "妈祖信俗是全球3亿信众的共同信仰，起源于莆田湄洲岛。妈祖原名林默，宋960年诞生于此，28岁救人殉难。历代皇帝封号不断，最高为」天后」「天上圣母」。每年农历三月廿三妈祖诞辰、九月九妈祖升天日，湄洲祖庙举行盛大祭典。祭典保留」三献礼」古制，包括迎神、上香、读祝、进俎、献舞等环节。2009年列入人类非物质文化遗产。",
          "闽南中秋博饼是厦门、漳州、泉州地区独特的节俗，起源于明末清初。博饼用六颗骰子投入大碗，根据红四点数目决定状元、榜眼、探花、进士、举人、秀才。相传郑成功屯兵厦门时为解士兵思乡之情而发明。」博」与」卜」同音，原为占卜科举运气，如今成为中秋团聚游戏。2008年列入国家级非物质文化遗产。",
          "送王船是闽南沿海地区禳灾祈福仪式，厦门、漳州等地盛行。」王船」是以纸和竹篾扎制的纸船，送入海中焚烧送走瘟神。仪式历时三天，包括请王、造船、出游、化船等环节。」送王船」与马六甲华人社群有密切联系，2011年中马联合申报列入人类非物质文化遗产代表作名录。",
          "福建春节习俗保留诸多传统。除夕吃年夜饭，福州有」围炉」习俗，火锅热气腾腾寓意团圆。闽南有」跳火群」习俗，除夕夜在门口点燃火堆，全家依次跳过，寓意新年红火。」掸尘」是大扫除，腊月廿三送灶王上天言好事。」天香腊味」是福州特有年俗，正月里游神祈福。",
          "龙岩连城姑田游大龙是客家地区春节习俗，每隔一年正月十五前后举行。」大龙」最长可达千米，需数百人抬举巡游，气势恢宏。」游大龙」源于明代，村民以龙祈福，祈求风调雨涣、五谷丰登。2008年列入国家级非物质文化遗产，有」天下第一龙」美誉。",
          "泉州蟳埔女簪花围是闽南渔家女特有的头饰文化。正月或喜庆节日，蟳埔女在发髻间插满鲜花，以素馨花、含笑花等为主，配以金丝银线。簪花围不仅是装饰，更寓意」头上花园」的美好祝愿。2008年列入国家级非物质文化遗产。簪花围与惠安女服饰、湄洲女头饰并称」福建三大渔女」。",

          "黑龙江省因境内最大河流黑龙江而得名，简称'黑'，省会哈尔滨市。全省面积47.3万平方公里，居全国第六位；常住人口约3100万。黑龙江省地貌特征为'五山一水一草三分田'，北部为大兴安岭和小兴安岭，东部分布着张广才岭、老爷岭、完达山，中部为松嫩平原，西部是草原和湿地。",
          "黑龙江省属于温带大陆性季风气候，四季分明。冬季漫长而寒冷，最冷月平均气温可达零下30摄氏度，是全国气温最低的省份；夏季短促凉爽，最热月平均气温20摄氏度左右，是著名的避暑胜地。这种独特的气候条件孕育了发达的冰雪产业和夏季生态旅游。",

    "西南": ["重庆","四川","贵州","云南","西藏"],
    "西北": ["陕西","甘肃","青海","宁夏","新疆"],
    "港澳台": ["香港","澳门","台湾"]
  };
  let allProvinces = [];
  Object.values(regionNames).forEach(arr => allProvinces = allProvinces.concat(arr));
  function renderGrid(filter) {
    container.innerHTML = '';
    const list = filter === '全部' ? allProvinces : (regionNames[filter] || allProvinces);
    list.forEach(name => {
      const data = provinceData[name];
      const card = document.createElement('div');
      card.className = 'province-card';
      const hasExtra = data && data.extra && data.extra.length > 0;
      const hasQ = data && data.questions && data.questions.length > 0;
      card.innerHTML = '<h3>' + name + '</h3><span>' + (hasExtra ? '详细考点' : '基础信息') + (hasQ ? ' · ' + data.questions.length + '题' : '') + '</span>';
      card.onclick = () => showDetail(name);
      container.appendChild(card);
    });
  }
  function showDetail(name) {
    const data = provinceData[name] || {};
    const detail = document.getElementById('provinceDetail');
    document.getElementById('provinceGrid').style.display = 'none';
    document.querySelector('.region-tabs').style.display = 'none';
    detail.classList.add('active');
    detail.innerHTML = '<div class="detail-header"><a class="back-btn" onclick="backToList()">← 返回列表</a><h2>' + name + '备考指南</h2><p>地方导游基础知识·' + name + '专区</p></div>';
    let tabs = '<div class="detail-tabs"><div class="detail-tab active" onclick="switchTab(this,&quot;official&quot;)">官方信息</div>';
    if (data.extra && data.extra.length) tabs += '<div class="detail-tab" onclick="switchTab(this,&quot;extra&quot;)">核心考点</div>';
    if (data.questions && data.questions.length) tabs += '<div class="detail-tab" onclick="switchTab(this,&quot;quiz&quot;)">练习题(' + data.questions.length + ')</div>';
    if (data.guideSpeech && data.guideSpeech.length) tabs += '<div class="detail-tab" onclick="switchTab(this,&quot;guide&quot;)">导游词(' + data.guideSpeech.length + ')</div>';
    tabs += '</div>';
    let official = '<div class="detail-content active" id="tab-official"><div class="info-box"><h4>官方报考信息</h4><ul>';
    if (data.official) {
      official += '<li>官网：<a href="' + (data.official.site||'#') + '" target="_blank" rel="noopener noreferrer" style="color:#0D47A1;text-decoration:underline;font-weight:600;word-break:break-all">' + (data.official.site||'暂无') + '</a></li>';
      official += '<li>' + (data.official.notice||'暂无通知') + '</li>';
      official += '<li>' + (data.official.policy||'暂无政策') + '</li>';
    }
    official += '</ul></div></div>';
    let extra = '<div class="detail-content" id="tab-extra"><div class="content-grid">';
    if (data.extra) {
      const catIcons = {'核心景点':'🏛️','美食特产':'🍜','历史文化':'📜','自然风光':'🏔️','交通出行':'🚄','住宿推荐':'🏨','导游词重点':'🎤','民俗节庆':'🎆','易考数字':'🔢','报名须知':'📋','面试要点':'💬','特色文化':'🎭','必知常识':'💡','经典路线':'🗺️','气候特点':'🌤️','购物指南':'🛍️','安全提示':'⚠️','地方风俗':'🏮','非遗项目':'🎪','历史名人':'👤','红色旅游':'⭐','民俗文化':'🎎','特色节庆':'🎊','考试重点':'🎯'};
      data.extra.forEach(cat => {
        let icon = catIcons[cat.title] || '📌';
        extra += '<div class="content-card"><h4><span style="margin-right:8px">' + icon + '</span>' + (cat.title||'') + '</h4><ul>';
        if (cat.items) cat.items.forEach(item => extra += '<li>' + item + '</li>');
        extra += '</ul></div>';
      });
    }
    extra += '</div></div>';
    let guide = '<div class="detail-content" id="tab-guide">';
    if (data.guideSpeech) {
      data.guideSpeech.forEach((g, i) => {
        guide += '<div class="content-card" style="margin-bottom:20px"><h4><span style="margin-right:8px">🎤</span>' + (g.title||'导游词'+(i+1)) + '</h4><div style="white-space:pre-wrap;line-height:1.9;font-size:0.92rem;color:#1B5E20;font-weight:500;padding:12px 0">' + (g.content||'暂无内容') + '</div></div>';
      });
    }
    guide += '</div>';
    let quiz = '<div class="detail-content" id="tab-quiz">';
    if (data.questions) {
      data.questions.forEach((q, i) => {
        let qType = q.type === 'multi' ? '【多选】' : q.type === 'judge' ? '【判断】' : '【单选】';
        let qStyle = q.type === 'multi' ? 'color:#0D47A1' : q.type === 'judge' ? 'color:#065F46' : 'color:#0D47A1';
        quiz += '<div class="question-card"><h4>第' + (i+1) + '题 <span style="' + qStyle + ';font-size:0.85em">' + qType + '</span></h4><div class="question-text">' + q.q + '</div>';
        if (q.type === 'multi') {
          quiz += '<ul class="question-options" data-answer="' + JSON.stringify(q.answer) + '" data-type="multi">';
          q.options.forEach((opt, j) => quiz += '<li onclick="toggleMulti(this,' + j + ')">' + String.fromCharCode(65+j) + '. ' + opt + '</li>');
          quiz += '</ul><button class="submit-multi-btn" onclick="submitMulti(this)" style="margin:8px 0;padding:8px 20px;background:linear-gradient(135deg,#43A047,#66BB6A);color:#1B5E20;border:none;border-radius:20px;font-size:0.85rem;cursor:pointer">确认提交</button>';
        } else if (q.type === 'judge') {
          quiz += '<ul class="question-options" data-answer="' + q.answer + '" data-type="judge">';
          q.options.forEach((opt, j) => quiz += '<li onclick="checkAnswer(this,' + j + ',' + q.answer + ')">' + opt + '</li>');
          quiz += '</ul>';
        } else {
          quiz += '<ul class="question-options" data-answer="' + q.answer + '">';
          q.options.forEach((opt, j) => quiz += '<li onclick="checkAnswer(this,' + j + ',' + q.answer + ')">' + String.fromCharCode(65+j) + '. ' + opt + '</li>');
          quiz += '</ul>';
        }
        quiz += '<div class="explain-box">' + (q.explain || '暂无解析') + '</div></div>';
      });
    }
    quiz += '</div>';
    detail.innerHTML += tabs + official + extra + guide + quiz;
  }
  window.backToList = function() {
    document.getElementById('provinceDetail').classList.remove('active');
    document.getElementById('provinceGrid').style.display = '';
    document.querySelector('.region-tabs').style.display = '';
  };
  window.switchTab = function(el, tab) {
    document.querySelectorAll('.detail-tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.detail-content').forEach(c => c.classList.remove('active'));
    el.classList.add('active');
    document.getElementById('tab-' + tab).classList.add('active');
  };
  window.checkAnswer = function(li, selected, correct) {
    const parent = li.parentElement;
    if (parent.dataset.answered) return;
    parent.dataset.answered = '1';
    const items = parent.querySelectorAll('li');
    items[correct].classList.add('correct');
    if (selected !== correct) li.classList.add('wrong');
    li.closest('.question-card').querySelector('.explain-box').classList.add('show');
  };
  regionTabs.forEach(tab => {
    tab.onclick = () => {
      regionTabs.forEach(t => t.classList.remove('active'));
      tab.classList.add('active');
      renderGrid(tab.textContent);
    };
  });
  renderGrid('全部');
}
initPage();
</script>
