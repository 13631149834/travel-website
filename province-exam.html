extra:[
{title:'世界遗产与重要景区',items:['台北故宫博物院是中国三大博物馆之一，收藏近70万件中华文物，年代跨越五千年。翠玉白菜、肉形石、毛公鼎是三大镇馆之宝。建筑采用中国宫殿式设计，白墙绿瓦古朴典雅。展品丰富，建议预留半天时间深度参观。','日月潭是台湾最大的天然湖泊，因湖形如日如月而得名。北半湖形如日轮，南半湖如弯月，故名日月潭。湖光山色美不胜收，每年吸引超过350万游客，是台湾最著名的旅游景点之一。','阿里山以"五奇"著称：日出、云海、晚霞、森林、铁路。阿里山森林铁路是世界三大高山铁路之一，乘坐红色小火车穿行于云雾森林中是独特体验。祝山观日平台是观赏日出的最佳地点。','台北101大楼曾是世界第一高楼，地上101层地下5层，高508米。89楼的室内观景台可360度俯瞰台北全景，91楼的室外观景台可近距离观赏塔尖。跨年烟火是世界级盛事，每年吸引数十万人观赏。','太鲁阁国家公园以壮丽的峡谷景观著称，是台湾八景之冠。燕子口步道、九曲洞等景点让您近距离感受大自然的鬼斧神工。白色大理石峡谷、激流、深潭构成一幅幅震撼人心的画面。','垦丁国家公园位于台湾最南端，三面环海。鹅銮鼻灯塔是远东最大的灯塔，白色塔身矗立在碧绿草坪上。后壁湖是潜水胜地，海水清澈见底，珊瑚礁和热带鱼丰富多样。','九份山城保留着日治时期的老房子和矿城风貌，宫崎骏《千与千寻》汤婆婆油屋的灵感便来源于此。夜晚基山街的红灯笼亮起，窄巷中的各家茶楼飘出阵阵茶香，如穿越至千与千寻的世界。','野柳地质公园以奇特的海蚀地貌闻名，女王头是标志性景观。风化作用将砂岩雕刻成各种形状，女王头优雅的头颅令人惊叹。蜂窝岩、烛台石、姜石等地质景观展现了自然的鬼斧神工。']},
{title:'地区概况',items:['台湾省，全称中华人民共和国台湾省，由台湾本岛及澎湖列岛、金门、马祖等岛屿组成，总面积约3.6万平方公里。2023年人口约2340万，汉族占97%，少数民族以高山族为主。台湾是中国不可分割的一部分。','台湾古称夷洲、流求，明朝以后渐有汉人移居。1624年荷兰殖民者占据南部，1661年郑成功收复台湾。1895年清政府被迫签订《马关条约》，台湾割让给日本，直到1945年光复。','台湾省现设6个直辖市、3个市、13个县。省会台北市是政治经济文化中心，高雄市是南部最大城市。新竹科学工业园区是台湾科技产业重镇，被誉为"台湾硅谷"。','台湾是亚洲四小龙之一，半导体产业全球领先。台积电是全球最大的芯片代工厂，技术世界领先。电子产业、精密机械、观光旅游是主要经济支柱，农业亦占有重要地位。','台湾交通便利，高速铁路连接台北至高雄，全程约350公里只需1.5小时。台铁环岛运行，悠游卡可用于全台捷运和公交。桃园机场和松山机场是主要航空枢纽。','台湾属亚热带和热带季风气候，北部多雨冬季湿冷，南部日照充足冬季温暖。5至9月为台风季节，需关注天气预报。最佳旅游季节为春季（3至5月）和秋季（9至11月）。','台湾以普通话为主要语言，闽南语和客家话广泛使用。原住民各族有各自语言。繁体中文为主要书写文字，货币为新台币（TWD），消费水平与大陆一线城市相当。','台湾法定假期包括元旦、春节（除夕至初六）、228纪念日、清明、儿童节、端午、中秋节、双十节等。选举日放假一天。妈祖诞辰是民间重要节日，各地妈祖庙举行盛大庙会。']},
{title:'特色美食',items:['台湾夜市小吃是饮食文化代表。士林夜市、逢甲夜市、六合夜市各具特色。蚵仔煎、担仔面、珍珠奶茶、臭豆腐、大肠包小肠、盐酥鸡是必尝美食。夜市营业至深夜，是体验台湾饮食文化的最佳去处。','牛肉面是台湾经典美食，由1949年来台的大陆老兵带回。红烧牛肉面汤头浓郁，牛肉软烂入味。满汉牛肉面是加料升级版，配菜丰富。台北的永康街是牛肉面店聚集地，多家店获得米其林推荐。','珍珠奶茶起源于台中春水堂，用Q弹的木薯粉珍珠配奶茶，口感丰富。CoCo、50岚等品牌遍布全台，春水堂被视为珍珠奶茶的发源地。天仁茗茶旗下的CHA FOR TEA则以茶饮闻名。','凤梨酥是台湾最受欢迎的伴手礼。外皮酥香、内馅酸甜的凤梨果肉，寓意"旺来"。微热山丘、土旺凤梨酥、佳德等品牌各具特色。太阳饼、芋头酥、牛轧糖同样深受游客喜爱。','小笼包以鼎泰丰的最负盛名，皮薄汁多馅鲜，一口咬下汤汁四溢。创始于1949年的南货行，经过数十年改良精进，是台北必访的美食名店，需提前预约才能避免排队。','药炖排骨和羊肉炉是台湾进补美食。冬季食补风气盛行，大街小巷的药炖店提供当归羊肉汤、十全排骨等。士林夜市的海友十全排骨是代表性老店，汤头温补养身。','台式卤肉饭遍布全台，是最平民的美味。五花肉切丁慢炖，胶质丰富，配上香喷喷的白米饭，一碗下肚满足感十足。控肉饭、排骨饭同样是台湾人日常喜爱的快餐选择。','芒果冰是台湾夏季消暑圣品。爱文芒果肉质细腻、金煌芒果果肉厚实，制成芒果冰沙、芒果绵绵冰清爽解暑。台南的莉莉水果店、台北的ICE MONSTER是著名芒果冰店。']},
{title:'传统节日',items:['春节是台湾最重要的传统节日。除夕夜全家团聚吃年夜饭，凌晨抢头香祈福。初一走春拜年，各寺庙人潮涌动。台北迪化街年货大街热闹非凡，置办年货是年前重头戏。','元宵节台湾人赏灯、吃元宵（汤圆）。平溪天灯节最为著名，万人齐放天灯的场面壮观。台湾灯会由北至南轮办，各县市政府推出主题花灯 competition，竞争激烈。','妈祖诞辰（农历三月二十三）是台湾最盛大的宗教庆典。南部信徒抬妈祖神像绕境巡游，队伍绵延数公里。大甲妈祖遶境进香是世界三大宗教盛事之一，每年吸引数十万信众参与。','端午节台湾有划龙舟、吃粽子、挂艾草佩香包习俗。宜兰冬山河是龙舟赛热门地点，两岸人山人海。粽子有南北之分，北方粽馅料丰富，南方粽偏清淡，各具风味。','中秋节台湾人烤肉赏月成风，全台烤肉风潮席卷。中秋烤肉不仅是家人团聚，也是朋友社交活动。伴手礼以月饼、柚子为主。文旦柚是应景水果，寓意团圆。','七夕情人节源于牛郎织女传说，台湾视为情人节之一。餐厅推出浪漫套餐，商家推出情侣优惠。单身的年轻人会到庙宇祈求姻缘，拜月老是台北霞海城隍庙的特色活动。','重阳节台湾人登高赏秋、祭祖扫墓。登山健行是重阳习俗，各地山径人流如织。部分县市发放敬老礼金，敬老尊贤的传统延续至今。','除上述节日外，台湾还有228纪念日（2月28日）、国庆日（双十节）等纪念日。各原住民有各自传统祭典，如阿美族的丰年祭、卑南族的猴祭，保留了珍贵的民族文化。']},
{title:'旅游攻略',items:['交通指南：台湾桃园机场是主要国际机场，台北松山机场有两岸直航航班。环岛高铁连接台北至高雄（1.5小时），台铁环岛运行。捷运覆盖台北、高雄等城市，悠游卡可通用。','住宿推荐：台北五星酒店集中于东区或信义区，价格较高但设施完善。民宿是体验台湾人情味的绝佳选择，各县市皆有特色民宿。花莲、台东民宿可欣赏无敌海景或山景。','美食地图：台北士林夜市、高雄六合夜市、台中逢甲夜市是三大夜市代表。台南是美食古都，赤嵌楼周边聚集众多老店。澎湖海鲜、金门贡糖、马祖老酒各有地方特色。','行程建议：台北3日游（故宫、101、国父纪念馆、士林夜市）；环岛精华7日游（台北→日月潭→阿里山→高雄→垦丁→花莲→台北）。建议提前预约阿里山小火车和热门景点门票。','购物推荐：台北东区、信义商圈是时尚购物区，精品店林立。迪化街是传统干货一条街，茶叶、干贝、乌鱼子应有尽有。台湾美妆产品如宠爱之名、森田药妆等性价比高。','注意事项：台湾室内全面禁烟，违者罚款2000至10000元新台币。搭乘捷运和公交需排队，大众交通工具内禁止饮食。尊重原住民文化，进入部落请遵守当地规矩。','伴手礼推荐：凤梨酥是首选，微热山丘口感酸甜。牛轧糖推荐糖村，奶香浓郁不黏牙。乌龙茶推荐冻顶乌龙或高山茶，佳德或春水堂的茶点同样值得带回家。','最佳时间：春季（3至5月）适合赏花和阿里山樱花季；秋季（9至11月）天气凉爽适合户外活动。避开大陆十一黄金周可免拥挤。提前预约热门餐厅和酒店，享受更优质的服务。']}
],

extra:[
{title:'世界遗产与重要景区',items:['维多利亚港位于香港岛与九龙半岛之间，是世界三大天然良港之一。因港阔水深，被誉为"东方之珠"，每晚8点上演的"幻彩咏香江"灯光汇演吸引无数游客。天星小轮被美国《国家地理杂志》列为"人生50个必到景点"。','太平山顶是香港最高点，海拔552米，可俯瞰维多利亚港两岸全景。凌霄阁观景台是最佳观景点，傍晚时分可见夕阳将天际线染成金黄，入夜后万家灯火如星河璀璨。山顶缆车自1888年运营至今，是世界上最古老的缆车系统之一。','香港迪士尼乐园位于大屿山，是全球第五座、中国第一座迪士尼主题公园。分为美国小镇大街、幻想世界、明日世界、探险世界、反斗奇兵大本营、灰熊山谷和迷离庄园七个主题园区，每年吸引超过600万游客。','海洋公园位于香港仔黄竹坑，是集海洋动物保育、机动游戏和自然景观于一体的主题公园。拥有全球最大的水族馆之一"海洋奇观"和水母万花筒等特色展馆，大熊猫盈盈、乐乐是园内明星动物。','星光大道位于尖沙咀海滨长廊，展示香港电影业百年辉煌。镶嵌着超过100位巨星的手印和雕像，包括李小龙、成龙、张学友等。附近的香港文化中心和香港艺术馆是了解香港艺术文化的重要场所。','昂坪360缆车连接东涌与昂坪，全长5.7公里，跨越北大屿山郊野公园。水晶车厢底部透明，可俯瞰赤腊角机场和港珠澳大桥。昂坪市集免费开放，缆车站旁的天坛大佛是全球最高的户外青铜坐佛。','南丫岛是香港第三大岛屿，保留纯朴渔村风貌。岛上有索罟湾和榕树湾两个主要村落，步行径穿越树林和海滩。岛民以外籍人士居多，被誉为"香港的后花园"，是周末休闲的好去处。','香港故宫文化博物馆位于西九文化区，2022年开幕。馆内珍藏北京故宫博物院借出的900多件珍贵文物，其中近200件为一级文物。建筑外观融合传统明清宫阙造型与现代设计，是了解中华文明的重要窗口。']},
{title:'地区概况',items:['香港，全称中华人民共和国香港特别行政区，由香港岛、九龙半岛和新界组成，总面积1114平方公里。2023年人口约750万，是世界上人口密度最高的地区之一。香港实行"一国两制"，保持资本主义制度五十年不变。','香港古称"香菇"，自先秦时期属百越地。1842年鸦片战争后，清政府被迫签订《南京条约》，将香港岛割让给英国。其后通过《北京条约》和《展拓香港界址专条》，英国陆续取得九龙半岛和新界。','1997年7月1日，中国政府对香港恢复行使主权，香港特别行政区成立。首任行政长官为董建华。香港回归是中华民族百年耻辱的终结，标志着"一国两制"构想的成功实践。','香港是全球第三大金融中心，与纽约、伦敦并称"纽伦港"。港交所是全球最大的首次公开募股市场之一。维多利亚港两岸是中环和尖沙咀的核心商业区，汇聚了汇丰、渣打、中银等金融机构。','香港地铁（MTR）全球闻名，线路覆盖港岛、九龙、新界及大屿山。机场快线连接市区与赤腊角国际机场，八达通卡可用于全港公共交通及部分零售消费，是最便捷的支付方式。','香港属亚热带季风气候，全年温暖湿润。5月至9月为雨季，夏季气温约26至31度；冬季气温约12至20度，天气干燥舒适。每年9月至次年3月是最佳旅游季节，台风季节集中在7至9月。','香港以粤语为母语，英语和普通话通用。繁体中文为主要书写文字，货币为港币（HKD）。茶餐厅文化是香港独有的饮食特色，体现了中西融合、快速高效的城市生活节奏。','香港法定假期包括元旦、春节（正月初二初三）、清明、复活节、劳动节、佛诞、端午、国庆节、重阳、冬至、圣诞节等，体现了中西宗教文化交融的特点。']},
{title:'特色美食',items:['港式茶餐厅是香港独有的饮食文化符号，融合中西餐食精髓。1952年开业的兰芳园被誉为"丝袜奶茶之父"，首创以丝袜滤茶冲制奶茶。招牌菜式包括菠萝油、咖喱牛腩、西多士等，人均消费约50至80港币。','烧腊是港式餐饮的代表，包括烧鹅、叉烧、烤乳猪等。镛记酒家的烧鹅皮脆肉嫩，曾获米其林一星；一乐烧鹅是平民米其林之选。推荐配白米饭和特制酸梅酱，肥而不腻，滋味无穷。','港式点心是广东饮食文化的精华，莲香楼、添好运是代表性茶楼。招牌点心包括虾饺、烧卖、叉烧包、流沙包、虾籽烧卖等。传统茶楼仍保留手推点心车服务，体现老香港风情。','街头小吃是香港草根饮食文化的代表。旺角女人街、深水埗庙街是美食天堂。推荐鱼蛋（弹牙爽口）、鸡蛋仔（外脆内软）、碗仔翅（粉丝羹仿鱼翅）、咖喱鱼蛋、砵仔糕等。','云吞面是香港经典面食，麦奀云吞面世家以皮薄馅靓著称。鲜虾云吞配以大地鱼猪骨汤底，面条采用竹升面工艺，口感爽脆弹牙。香港仔的生记粥品专家以鱼腩粥闻名，粥底绵密。','甜品糖水是香港人饭后必备。传统甜品包括杨枝甘露（芒果柚子西米）、芝麻糊、豆腐花、杏仁糊等。聪嫂甜品的龙眼冰是招牌，满记甜品以榴莲系列甜品闻名，甜入心扉。','避风塘美食是香港独有风味。桥底辣蟹以避风塘炒蟹闻名，选用鲜活肉蟹猛火爆炒，蒜香辣椒味浓郁，吸引众多明星光顾。蟹盖配蒜蓉面包同吃，是地道食法。','港式奶茶2017年列入香港非物质文化遗产。选用斯里兰卡红茶，经过"撞茶"工艺反复拉高冲撞，使茶汤与空气充分融合，口感香浓幼滑。香港人日均消耗250万杯奶茶，是生活中不可或缺的一部分。']},
{title:'传统节日',items:['农历新年是香港最重要的传统节日，从除夕夜倒数到正月十五元宵节。春节期间，维多利亚港两岸举行大型烟花汇演，香港岛和九龙的高楼同步亮灯倒数。各大商场推出年宵花市，出售桃花、年桔等应节花卉。','中秋节是香港传统佳节，维多利亚公园和文化中心是赏月热点。市民喜欢在户外赏月、吃月饼、玩灯笼。大坑舞火龙是国家级非物质文化遗产，火龙长67米，由珍珠草扎制，中秋夜巡游大坑地区，祈求平安。','端午节香港举行国际龙舟邀请赛，在赤柱、香港仔等海滨举行。传统龙舟竞渡吸引来自世界各地的队伍参加，热闹非凡。粽子是节日应节食品，有咸肉粽和碱水粽两大流派。','天后诞是香港渔业界最重要的节日，天后娘娘是海上守护神。佛堂门天后古庙、西贡天后古庙等，香火鼎盛。渔民会在天后诞前后举行祭祀巡游，部分乡村举办盆菜宴酬谢神明。','盂兰胜会是香港重要的佛教节日，纪念先人和无主孤魂。各区举办诵经法会，派发平安米，大坑东游乐场有抢包山比赛。潮籍人士尤为重视这一节日，体现香港族群多元的文化特色。','香港回归纪念日（7月1日）是香港法定假期。1997年7月1日香港回归祖国，是中华民族历史性时刻。当日会举行升旗仪式和庆祝活动，金紫荆广场的"永远盛开的紫荆花"雕塑成为热门打卡地。','重阳节香港人喜欢登高扫墓。九龙仔公园、青衣青马大桥是热门登高地。部分家庭会返乡祭祖，携带烧猪、三牲、水果等祭品上山扫墓，慎终追远，缅怀先人。','万圣节香港是亚洲最隆重的庆祝城市之一。兰桂坊举办变装派对，迪士尼乐园和海洋公园推出万圣节主题活动。鬼屋探险、南瓜装饰等西方习俗在香港年轻人中流行。']},
{title:'旅游攻略',items:['交通指南：八达通卡是必备，地铁、巴士、叮叮车、天星小轮均可使用，机场快线连接市区与机场。香港国际机场是全球最繁忙的航空枢纽之一，往返市区可选机场快线、巴士或出租车。','住宿推荐：尖沙咀是游客首选，交通便利、景点集中，酒店价格约500至1500港币/晚；中环适合商务旅客；旺角适合年轻背包客，房价相对便宜。选择酒店时注意避开会展期间，价格会大幅上涨。','购物天堂：铜锣湾时代广场、尖沙咀海港城、中环IFC是三大购物地标。香港是全球名牌汇聚地，税率低、价格优惠。每年农历新年前后是打折季，部分商品低至五折。','离岛一日游：建议选择南丫岛或长洲岛，乘渡轮约30至40分钟可达。南丫岛适合徒步和海鲜，长洲岛有传统渔村风貌和太平清醮抢包山活动。离岛保留了纯朴的香港风情。','行程建议：3天经典游D1日游尖沙咀（太空馆、星光大道、1881 Heritage）至天星小轮至中环，山顶缆车登太平山顶观夜景；D2日游迪士尼乐园或海洋公园；D3日游南丫岛或赤柱市集购物。','美食地图：早茶推荐莲香楼或添好运；茶餐厅推荐兰芳园或澳洲牛奶公司；烧腊推荐镛记或一乐烧鹅；甜品推荐聪嫂甜品或满记；宵夜推荐庙街大排档或旺角街头小吃。避开旅游区高价陷阱。','注意事项：香港室内全面禁烟，违者罚款5000港币；地铁禁止饮食；带够港币现金，部分老店只收现金；遵守排队秩序；避开周三、六下午过关高峰。香港使用英式插头，需带转换器。','最佳时间：10月至12月天气晴朗舒适，是最佳旅游季节；1月至2月农历新年气氛浓厚；7至9月台风季节需关注天气预报。提前预约热门景点门票，如迪士尼、海洋公园、昂坪360等。']}
],

extra:[
{title:'世界遗产与重要景区',items:['新疆天山（2013年列入世界自然遗产，包含托木尔峰片区、喀拉峻-库尔德宁片区、巴音布鲁克片区、博格达片区4个组成部分，总面积约5.7万平方公里，是全球温带干旱区最典型的自然景观代表，拥有雪山、冰川、森林、草原等多样生态系统）','天山天池（古代神话中王母娘娘设宴款待周穆王的瑶池所在地，位于博格达峰北麓，新疆第一个国家5A级景区，湖水清澈碧蓝透明度极高，周长约9公里形状像一颗蓝宝石相传为西王母沐浴之地）','喀纳斯（变色湖著称，湖水随季节和天气呈现蓝、绿、金等不同颜色，湖底有水怪传说，世外桃源图瓦人村落保存完整原始木屋，被誉为人间净土神的花园）','那拉提草原（哈萨克语意为最先见到太阳的地方，被称为空中草原，伊犁河谷代表，夏季野花遍地牛羊成群毡房点点，是世界四大草原之一，这里保留了最完整的哈萨克族游牧文化）','赛里木湖（古称净海，大西洋暖流最后眷顾的地方，高山湖泊风光旖旎，湖畔是著名的果子沟大桥，是新疆海拔最高面积最大的湖泊，有大西洋最后一滴眼泪的美誉）','喀什老城（迷宫式伊斯兰建筑群代表，保留完好的中世纪古城风貌，街道纵横交错如迷宫般四通八达，艾提尕尔清真寺是新疆最大清真寺可容纳两万人礼拜）','交河故城（世界上最大最古老的生土建筑城市遗址，公元前2世纪至公元14世纪，曾是车师前国都城，建筑遗迹保存完好被誉为城市的标本，是研究古代城市的活化石）','克孜尔千佛洞（比敦煌莫高窟早一百年，佛教东传重要见证，龟兹石窟艺术代表，现存236个洞窟壁画精美生动，是西域佛教文化的瑰宝）']},
{title:'省份概况',items:['面积166.49万平方公里，全国最大，占中国陆地总面积的六分之一，相当于3个法国或15个浙江省面积，是中国西部重要门户和战略要地，自古就是中国不可分割的一部分）','地形特征：三山夹两盆（阿尔泰山脉、天山山脉、昆仑山脉夹准噶尔盆地和塔里木盆地），形成了独特的高山盆地相间地形和丰富多样的自然景观，准噶尔盆地有古尔班通古特沙漠，塔里木盆地有中国最大沙漠塔克拉玛干）','首府乌鲁木齐市，新疆政治经济文化中心，古丝绸之路重镇，亚心之都，亚洲大陆地理中心位于乌鲁木齐县永丰乡包家槽子村）','与8个国家接壤（哈萨克斯坦、吉尔吉斯斯坦、塔吉克斯坦、巴基斯坦、蒙古、印度、阿富汗、俄罗斯），边境线长达5600多公里，是中国接壤国家最多的省区）','古丝绸之路核心区，古代东西方文明交流的重要通道，佛教、伊斯兰教、儒家文化在此交汇融合，形成了多元包容的文化特色，留下了大量历史遗迹和文化遗产）','气候特点：深居亚欧大陆腹地，属于温带大陆性干旱气候，日照充足年日照时数达2800小时，昼夜温差大年均降水量约150毫米蒸发量却达2000毫米，有早穿棉袄午穿纱围着火炉吃西瓜的说法）','多民族聚居：维吾尔族为主，约占41%，还有汉族、哈萨克族、回族、柯尔克孜族、蒙古族、塔吉克族、乌孜别克族等47个民族，民族风情浓郁，各民族和睦相处）','自然资源丰富：石油、天然气、煤炭储量居全国前列，是国家重要的能源战略接替区和西气东输起点，还有丰富的光热资源和风能资源）']},
{title:'特色美食',items:['大盘鸡（新疆第一菜，起源于沙湾县，融合了西北人的豪爽与川菜的麻辣，鸡肉土豆皮带面是经典吃法，大盘装盛故名大盘鸡，是待客必备佳肴）','烤羊肉串（维吾尔语喀瓦普，选用新鲜羊肉切成大块，穿制后炭火慢烤，撒上孜然和辣椒面，外焦里嫩香气四溢，是夜市必点美食）','手抓饭（维吾尔语波劳，羊肉、胡萝卜、洋葱、大米焖制而成，油亮味香，逢年过节和待客必备的传统美食，象征着热情好客）','馕（新疆独特面饼，维吾尔族主食，由面粉、盐、水、酵母制成，可保存数月不坏，是丝绸之路上的方便面，种类繁多有肉馕油馕等）','拉条子（新疆拌面，手工拉制的新鲜面条，配以各种炒菜，是新疆人日常饮食的重要组成部分，百吃不厌）','烤包子（维吾尔语沙木萨，羊肉丁、洋葱、孜然等做馅，贴在馕坑壁烤制，外皮酥脆内馅鲜香）','手抓肉（哈萨克族待客上品，选用新鲜羊肉清炖，保留肉质原味，蘸盐食用，大块吃肉大碗喝酒尽显豪爽）','缸子肉（搪瓷缸炖制的清炖羊肉，将羊肉切块放入缸中，加水文火慢炖，汤鲜肉嫩极具草原风情）','酸奶粽子（和田夜市网红美食，糯米粽浇上浓稠酸奶和蜂蜜，酸甜可口是传统与创新的完美结合）','新疆瓜果（吐鲁番葡萄享誉世界，哈密瓜甜蜜多汁，库尔勒香梨皮薄肉细，阿克苏苹果冰糖心著称，和田红枣声名远扬）']},
{title:'传统节日',items:['古尔邦节（伊斯兰教重要节日，阿拉伯语尔德艾祖哈，意为宰牲节，维吾尔语称库尔邦节，穆斯林在这天宰杀牛羊馈赠亲友，放假3天）','开斋节（斋月结束的庆祝日，阿拉伯语尔德费图尔，穆斯林封斋一个月后庆祝，教众互相拜访赠送礼品）','诺鲁孜节（波斯语新年第一天，在公历3月21日前后，是维吾尔、哈萨克、柯尔克孜等民族的共同节日）','那达慕大会（蒙古族传统盛会，7-8月水草丰美时举办，包含摔跤、赛马、射箭男子三艺竞技）','天马节（伊犁昭苏县举办，7月中旬，纪念天马故乡传统，马术表演、赛马、姑娘追等民俗活动）','葡萄节（吐鲁番8-9月葡萄成熟季举办，品尝葡萄、参观晾房、了解葡萄酒文化）','麦西来甫（维吾尔族群众性娱乐活动，集歌舞、游戏、说唱、劝话于一体，是社交活动的重要形式）','雪顿节（部分新疆蒙古族地区庆祝，藏传佛教节日，酸奶宴请僧侣，后逐渐成为各民族共同参与的节日）']},
{title:'旅游攻略',items:['最佳时间：北疆6-9月最佳，伊犁河谷花开遍野气候宜人是避暑胜地；南疆9-11月最佳，塔克拉玛干沙漠胡杨林金黄灿烂）','独库公路（中国最美自驾公路，穿越天山纵贯南北，561公里连接南北疆，6-10月开放，每年仅开放5个月，沿途风景绝美一日四季）','北疆大环线7日：乌鲁木齐-可可托海-五彩滩-喀纳斯-禾木-赛里木湖-那拉提-巴音布鲁克-乌鲁木齐，涵盖北疆精华景点）','南疆深度5日：乌鲁木齐-库车（龟兹故地）-沙雅胡杨林-阿克苏-喀什老城-塔什库尔干，领略丝路南道风情）','喀纳斯深度3日：喀纳斯湖环湖、白哈巴村（西北第一村）、禾木村（神的自留地），体验图瓦人生活）','吐鲁番精华1日：火焰山-葡萄沟-坎儿井-交河故城-高昌故城-维吾尔古村，历史文化之旅）','伊犁河谷深度：那拉提空中草原-喀拉峻人体草原-琼库什台古村-夏塔古道-霍尔果斯口岸，草原风光无限）','注意事项：做好防晒（紫外线强），带外套（昼夜温差大），尊重各民族习俗，清真饮食请勿带猪肉制品】']}
],
questions:[
{q:'新疆天山于哪一年被列入世界自然遗产？',options:['2010年','2011年','2012年','2013年'],answer:3,explain:'2013年6月21日，新疆天山被列入世界自然遗产名录，包含托木尔峰、喀拉峻-库尔德宁、巴音布鲁克、博格达4个片区'},{q:'大西洋最后一滴眼泪指的是哪个景点？',options:['喀纳斯湖','赛里木湖','天池','博斯腾湖'],answer:1,explain:'赛里木湖位于新疆博尔塔拉蒙古自治州，海拔2073米，因其深邃的蓝色湖水被誉为大西洋最后一滴眼泪'},{q:'那拉提草原位于新疆哪个地区？',options:['北疆','南疆','东疆','乌鲁木齐'],answer:0,explain:'那拉提草原位于新疆伊犁哈萨克自治州新源县境内，是北疆著名草原，哈萨克语意为最先见到太阳的地方'},{q:'交河故城的建筑材料主要是？',options:['砖瓦','木材','生土（泥土）','石材'],answer:2,explain:'交河故城是世界上最大最古老的生土建筑城市遗址，建筑材料以泥土为主，巧妙利用地形地貌建造'},{q:'新疆地形特征概括为？',options:['五山三盆','三山夹两盆','两山夹一盆','七山一水'],answer:1,explain:'新疆地形可概括为三山夹两盆：阿尔泰山、天山、昆仑山夹准噶尔盆地和塔里木盆地两大盆地'}
]
}
江西:{
region:'华东',
official:{site:'https://whly.jx.gov.cn',notice:'关注江西省文化和旅游厅官网',policy:'无特殊限制'},
extra:[
{title:'世界遗产与重要景区',items:[
'庐山：世界文化景观遗产，中华十大名山之一，以"雄、奇、险、秀"闻名于世。仙人洞、花径、含鄱口、三叠泉等景点星罗棋布。庐山云雾变幻莫测，瀑布云蔚为壮观。宋代苏轼"不识庐山真面目"之问，道尽庐山的神奇与魅力。',
'三清山：世界自然遗产，因玉京、玉虚、玉华三峰如道教三清尊神列坐而得名。1600余年的道教历史使其被誉为"中国道教文化露天博物馆"。花岗岩峰林造型奇特，"东方女神"、"巨蟒出山"等象形石惟妙惟肖，被誉为"太平洋西岸最美的花岗岩"。',
'龙虎山：世界自然遗产，道教正一派祖庭。99峰、24岩、108处自然人文景观，泸溪河蜿蜒穿行其间。乘竹筏顺流而下，两岸丹霞地貌如画卷展开，是"丹霞地貌景观博物馆"。',
'中国丹霞（江西部分）：2010年列入世界自然遗产，江西龙虎山是重要组成部分。丹霞地貌以赤壁丹崖为特色，"色如渥丹，灿若明霞"，与青松翠柏交相辉映，构成独特的自然景观。',
'滕王阁：江南三大名楼之一，始建于唐代，因王勃《滕王阁序》"落霞与孤鹜齐飞，秋水共长天一色"而名传千古。现阁为1985年重建，仿宋代建筑风格，共九层，碧瓦朱楹，雕梁画栋，气势恢宏。',
'景德镇古窑民俗博览区：国家5A级景区，是景德镇陶瓷文化的核心展示区。历代古窑保存完好，瓷宫内陈列着从唐宋到明清的珍品瓷器。游客可现场观摩传统制瓷72道工序，亲手体验拉坯乐趣，感受千年瓷都的匠心传承。',
'婺源：被誉为"中国最美乡村"，徽派建筑粉墙黛瓦与金黄油菜花海交相辉映。篁岭"晒秋"已成摄影天堂，江湾、篁岭、彩虹桥等古村落星罗棋布。秋末冬初，枫叶红透，石城晨雾缭绕，宛如人间仙境。',
'武功山：国家5A级景区，主峰白鹤峰海拔1918米，被誉为"云中草原"。10万亩高山草甸绵延起伏，春夏绿草如茵，秋末金黄一片。搭帐篷、数星星、观日出云海，是户外运动爱好者的圣地。'
]},
{title:'省份概况',items:[
'地理位置：江西省位于中国东南部、长江中下游南岸，简称赣，因赣江纵贯全境而得名。东邻浙江、福建，南连广东，西接湖南，北毗湖北、安徽，东南西三面环山，中部丘陵起伏，北部为鄱阳湖平原。',
'面积人口：总面积16.69万平方公里，2024年末常住人口约4500万人，城镇化率约61%。省会南昌是全省政治、经济、文化中心。景德镇、上饶、赣州等城市各具特色，赣州是江西省域副中心城市。',
'地形气候：属亚热带季风气候，温和平稳，四季分明。夏季炎热，冬季湿冷，年均温16至19摄氏度。地貌以山地、丘陵为主，赣江、抚河、信江、修水、饶河五大水系汇入鄱阳湖，后者是中国最大淡水湖。',
'历史沿革：江西历史悠久，新石器时代就有人类活动。秦设九江郡，唐宋经济繁荣，景德镇瓷器行销世界。近代太平天国运动在江西留下众多遗迹，井冈山是中国革命摇篮，共和国从这里走来。',
'文化底蕴：江西素有"文章节义之邦，白鹤鱼米之乡"美誉。陶渊明、王安石、欧阳修、曾巩、黄庭坚、文天祥、朱熹等历史文化名人辈出。白鹿洞书院是中国古代四大书院之首，朱熹曾在此讲学。',
'矿产资源：江西矿产资源丰富，有"七朵金花"——铜、钨、铀、钽、稀土、金、银。其中德兴铜矿亚洲最大，赣州被誉为"世界钨都""稀土王国"，钨和稀土储量居世界前列。',
'经济发展：2025年江西省GDP约36020亿元，以有色金属、电子信息、航空航天、汽车产业为特色。景德镇陶瓷、赣州稀土应用产业、南昌航空城等发展迅速，正努力打造中部地区先进制造业基地。',
'生态环境：江西森林覆盖率63.35%，居全国前列。鄱阳湖是亚洲最大淡水湖，越冬候鸟高达60至70万只，白鹤数量约占全球98%。武夷山国家公园（江西片区）是世界自然与文化双遗产。'
]},
{title:'特色美食',items:[
'赣南三杯鸡：赣州传统名菜，因烹饪时使用一杯米酒、一杯猪油、一杯酱油，不加水而得名。选用农村土鸡，慢火焖制而成。鸡肉色泽红亮，肉质软烂入味，肥而不腻，甜中带咸，咸中带鲜，是赣州人的待客首选。',
'南昌拌粉+瓦罐汤：南昌早餐"绝配"。米粉爽滑筋道，配以萝卜干、花生米、葱花、辣椒油拌匀，香辣开胃。瓦罐汤以土陶罐密封，小火煨制数小时，汤品清香味醇、营养丰富。',
'藜蒿炒腊肉：鄱阳湖特色菜，藜蒿春季鲜嫩，与咸香腊肉同炒。藜蒿的清香与腊肉的醇厚完美融合，藜蒿脆嫩，腊肉油亮，是最能代表赣鄱风味的经典菜肴。',
'瓦罐煨汤：江西民间传统汤品，将食材置于土陶大瓦罐内，以炭火慢煨数小时。汤品清香味醇、营养丰富，"无汤不成席"是江西人的饮食传统。常见的有墨鱼汤、排骨汤、猪肚鸡汤等。',
'萍乡辣条：萍乡特产零食，以面粉、豆粉为原料，配以辣椒等调料制成。口感筋道有嚼劲，香辣可口，是萍乡人最引以为傲的"家乡味道"，也是全国辣条爱好者的心头好。',
'九江茶饼：九江传统糕点，以面粉、糯米、茶油，白糖为主料，配以桂花等辅料。饼皮酥脆，茶香浓郁，甜而不腻，配茶食用最佳。九江茶饼历史悠久，是赣北地区的传统美食代表。',
'赣南脐橙入菜：赣南脐橙是世界最大脐橙产区，橙皮可入菜——橙香牛肉、脐橙蒸蛋等，橙香解腻、鲜辣平衡。赣州人将一颗橙子用到极致，展现了客家人的饮食智慧。',
'煌上煌酱鸭：南昌煌上煌特产，被称为"酱卤第一股"。鸭子以三十余种香辛料卤制，色泽红亮，酥香入骨，连骨头都能吃。"皇禽"酱鸭是南昌人馈赠亲友的佳品，也是游客必带的江西伴手礼。'
]},
{title:'传统节日',items:[
'南昌绳金塔庙会：每年9至10月在南昌绳金塔景区举行，是南昌最隆重的传统节日。庙会融合了美食展销、民俗表演、非遗展示等内容，热闹非凡。绳金塔是南昌标志性古建筑。',
'龙虎山道教文化节：每年在龙虎山举行，以道教文化为核心，展示道教礼仪，音乐、武术等传统文化。游客可参与祈福法会，品鉴道茶、体验道教养生功，感受千年道教文化的独特魅力。',
'婺源篁岭晒秋文化节：每年秋季在婺源篁岭举行，是展示徽州农耕文化的重要节日。村民将辣椒、玉米、菊花等晾晒于窗台屋顶，形成独特的"晒秋"景观，吸引无数摄影爱好者前来创作。',
'景德镇国际陶瓷节：每两年举办一次，是景德镇陶瓷文化的盛会。节日期间举行陶瓷博览会、陶艺大赛、瓷都风情表演、陶瓷DIY体验等活动，是了解景德镇陶瓷文化的最佳窗口。',
'赣州客家文化节：展示赣州客家文化的大型节庆活动，包括客家山歌、采茶戏、客家围屋建筑艺术展等。赣州是客家人的发源地和中转站，95%以上人口为客家人，客家文化底蕴深厚。',
'鄱阳湖国际观鸟节：每年冬季在鄱阳湖举行，吸引了国内外众多鸟类保护专家和观鸟爱好者。鄱阳湖是世界上最大的候鸟越冬栖息地，白鹤、东方白鹳等珍稀鸟类在此翩翩起舞，蔚为壮观。',

let currentRegion = '华北';
let currentProvince = '';

function init(){
renderRegionTabs();
renderProvinceList('华北');
}

function renderRegionTabs(){
const container = document.getElementById('regionTabs');
regions.forEach(r=>{
const btn = document.createElement('button');
btn.className = 'region-tab' + (r===currentRegion?' active':'');
btn.textContent = r;
btn.onclick = ()=>{
currentRegion = r;
document.querySelectorAll('.region-tab').forEach(t=>t.classList.remove('active'));
btn.classList.add('active');
renderProvinceList(r);
};
container.appendChild(btn);
});
}

function renderProvinceList(region){
const container = document.getElementById('provinceList');
container.innerHTML = '';
regionNames[region].forEach(p=>{
const card = document.createElement('div');
card.className = 'province-card glass-card';
card.innerHTML = '<h3>'+p+'</h3><span>'+provinceData[p].region+'</span>';
card.onclick = ()=>showProvince(p);
container.appendChild(card);
});
document.getElementById('provinceDetail').classList.remove('active');
container.style.display = 'grid';
}

function showProvince(name){
currentProvince = name;
const data = provinceData[name];
document.getElementById('detailTitle').textContent = name;
document.getElementById('detailDesc').textContent = data.region + ' · 地方导游基础知识';
document.getElementById('provinceList').style.display = 'none';
document.getElementById('provinceDetail').classList.add('active');
document.getElementById('provinceDetail').scrollTop = 0;
renderKnowledge(name);
renderQuestions(name);
renderOfficial(name);
switchTab('knowledge');
}

function showProvinceList(){
document.getElementById('provinceDetail').classList.remove('active');
document.getElementById('provinceList').style.display = 'grid';
}

function switchTab(tab){
document.querySelectorAll('.detail-tab').forEach(t=>t.classList.remove('active'));
document.querySelectorAll('.detail-content').forEach(c=>c.classList.remove('active'));
event.target.classList.add('active');
document.getElementById('tab-'+tab).classList.add('active');
}

function renderKnowledge(name){
const data = provinceData[name];
const container = document.getElementById('tab-knowledge');
let html = '<div class="content-grid">';
data.extra.forEach(item=>{
html += '<div class="content-card"><h4><span>📍</span>'+item.title+'</h4><ul>';
item.items.forEach(i=>html += '<li>'+i+'</li>');
html += '</ul></div>';
});
html += '</div>';
container.innerHTML = html;
}

function renderQuestions(name){
const data = provinceData[name];
const container = document.getElementById('tab-questions');
let html = '';
data.questions.forEach((q,i)=>{
html += '<div class="question-card"><h4>第'+(i+1)+'题</h4><p class="question-text">'+q.q+'</p><ul class="question-options">';
q.options.forEach((opt,j)=>{
html += '<li onclick="checkAnswer(this,'+j+','+i+',\''+name+'\')">'+opt+'</li>';
});
html += '</ul><div class="explain-box" id="explain-'+i+'"></div></div>';
});
container.innerHTML = html;
}

function checkAnswer(el,idx,qIdx,name){
const data = provinceData[name].questions[qIdx];
const options = el.parentElement.querySelectorAll('li');
const explainBox = document.getElementById('explain-'+qIdx);
if(el.classList.contains('correct')||el.classList.contains('wrong')) return;
options.forEach(o=>o.style.pointerEvents='none');
if(idx===data.answer){
el.classList.add('correct');
explainBox.textContent = '✓ 回答正确！'+data.explain;
explainBox.className = 'explain-box show';
}else{
el.classList.add('wrong');
options[data.answer].classList.add('correct');
explainBox.innerHTML = '✗ 回答错误！正确答案：'+options[data.answer].textContent+'<br><br>'+data.explain;
explainBox.className = 'explain-box show wrong-type';
}
}

function renderOfficial(name){
const data = provinceData[name];
const container = document.getElementById('tab-official');
container.innerHTML = `
<div class="info-box">
<h4>📋 官方报名信息</h4>
<ul>
<li>官方报名入口：<a href="https://mr.mct.gov.cn" target="_blank">全国旅游监管服务平台</a></li>
<li>官方公众号：文旅之声（底部菜单-导游考试报名）</li>
<li>考试大纲下载：<a href="https://www.mct.gov.cn" target="_blank">文化和旅游部官网</a></li>
</ul>
</div>
<div class="info-box">
<h4>🗺️ ${name}省官方渠道</h4>
<ul>
<li>官网：<a href="${data.official.site}" target="_blank">${data.official.site}</a></li>
<li>报名通知：${data.official.notice}</li>
${data.official.policy?'<li>特别说明：'+data.official.policy+'</li>':''}
</ul>
</div>
<div class="tip-box">
<strong>📌 备考提示</strong>
<p>${name}地方导基考试重点：本省世界遗产、5A级景区、特色民俗、历史文化。建议结合当地实际备考，多关注官方发布的考试信息。</p>
</div>
`;
}

document.addEventListener('DOMContentLoaded',init);
