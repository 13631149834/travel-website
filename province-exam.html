{title:'世界遗产与重要景点',items:['【莫高窟】世界文化遗产，始建于前秦建元二年（366年），位于敦煌市东南25公里鸣沙山东麓。现存洞窟735个，壁画4.5万平方米，彩塑2400余尊，是世界上现存规模最大、内容最丰富的佛教艺术宝库。1987年列入世界文化遗产名录。参观需提前预约。','【麦积山石窟】世界文化遗产，位于天水市麦积区，因山形似农家麦垛而得名。始建于十六国后秦时期（384年），历经1600余年开凿，现存窟龛221个，各类造像3938件。以精美泥塑艺术著称，被誉为"东方雕塑陈列馆"。2014年随丝绸之路列入世界文化遗产。','【嘉峪关关城】世界文化遗产，明代长城西端起点，始建于明洪武五年（1372年）。关城由内城、外城、城壕三道防线组成，防御体系完整。"天下雄关"石碑矗立城楼，气势恢宏。登关城可远眺祁连雪山，感受古代边塞的雄浑与苍凉。','【炳灵寺石窟】世界文化遗产，位于临夏回族自治州永靖县。开凿于西秦建弘元年（420年），是中国石窟寺中最早的纪年题记。现存窟龛214个，各类造像800余身。','【锁阳城遗址】世界文化遗产，位于酒泉市瓜州县。是丝绸之路咽喉地带的大型古城遗址，始建于汉代。因唐代名将薛仁贵征西被困于此、靠锁阳充饥而得名。']},
{title:'省份概况',items:['【地理位置】甘肃省简称"甘"或"陇"，省会兰州市。地处中国西北部、黄河上游，位于黄土高原、青藏高原和内蒙古高原三大高原交汇地带。东西狭长，从东南到西北依次经过陇南山地、黄土高原、河西走廊、甘南高原等不同地形区。','【历史沿革】甘肃是中华文明重要发祥地之一，有8000年文明史。马家窑文化彩陶艺术达到史前艺术巅峰。秦汉时期，甘肃是秦人发祥地和丝绸之路主要通道，武威、张掖、酒泉、敦煌并称"河西四郡"。','【行政区划】甘肃省现辖12个地级市、2个自治州，共86个县。省会兰州是西北地区重要工业基地和交通枢纽，有"黄河之都"美誉。','【经济概况】甘肃省以农业、能源、旅游业为支柱产业。2024年甘肃省GDP突破1.2万亿元。莫高窟、嘉峪关、张掖丹霞等景区享誉世界。','【文化特色】甘肃是中华民族多元一体格局的典型缩影。丝绸之路文化璀璨夺目，佛教文化遗存丰富，石窟艺术冠绝全国。汉、回、藏、蒙古、裕固、东乡等民族和谐共生。']},
{title:'特色美食',items:['【兰州牛肉面】甘肃美食名片，被誉为"中华第一面"。讲究"一清二白三红四绿五黄"：汤清、萝卜白、辣油红、香菜绿、面条黄亮。牛肉面已经成为兰州人日常生活中不可或缺的一部分。推荐馆子：马子禄牛肉面、吾穆勒蓬灰牛肉面。','【手抓羊肉】甘肃羊肉的代表菜品，尤以临夏东乡族自治县出产的"东乡贡羊"最为著名。东乡羊长期放养于高山草甸，肉质细嫩、膻味极轻。传统做法是清水加盐煮熟，直接手抓食用。','【张掖炒炮】张掖市特色面食，因面条短小如鞭炮而得名。将面剂子搓成细长条，掐成约3厘米长的小段，与羊肉丁、青椒、洋葱等配料猛火爆炒。香辣过瘾，是张掖人最爱的家常美食。','【天水呱呱】天水市传统小吃，用荞麦淀粉制作而成，呈现琥珀色半透明状，口感软糯筋道。浇上芝麻酱、蒜水、油泼辣子等调料，酸辣香麻，十分开胃。','【敦煌驴肉黄面】敦煌市特色美食，"驴肉配黄面"是敦煌饮食文化的经典组合。黄面用优质面粉制作，口感筋道。配上卤制的敦煌驴肉，肉质鲜嫩、瘦而不柴。']},
{title:'传统节日',items:['【敦煌行旅节】敦煌市主办的旅游文化节庆，每年8月举办，持续约一个月。节日以"丝绸之路"文化为主题，举办大型文艺演出、敦煌文化论坛、敦煌艺术展览等活动。开幕式在莫高窟或鸣沙山举行，场面壮观。','【天水伏羲文化旅游节】天水市主办的文化节庆，每年6月22日（伏羲诞辰日）举办。伏羲是中华人文始祖，相传诞生于天水。节庆活动包括公祭伏羲大典、伏羲庙会、卦台山民间祭祀等。','【兰州春节庙会】春节期间，兰州市各区县举办丰富多彩的春节庙会活动。主要包括白塔山庙会、五泉山庙会、金城关庙会等。庙会上有秦腔大戏、太平鼓表演、社火巡游等传统民俗展示。','【张掖马蹄寺香浪节】甘州区举办的山地文化节庆，每年7-8月在马蹄寺风景区举行。内容包括藏族、裕固族传统体育竞技（赛马、摔跤、射箭）、民族歌舞表演、山地露营、篝火晚会等。','【嘉峪关国际滑翔节】嘉峪关市主办的航空体育节庆，每年5-6月在嘉峪关滑翔基地举办。嘉峪关滑翔基地是世界三大理想滑翔带之一，因气流稳定、风向恒定而闻名。']},
{title:'旅游攻略',items:['【最佳时间】甘肃南北跨度大，最佳旅游时间因地而异。河西走廊适合5-10月出行，其中5-6月和9-10月气候最宜人；甘南高原适合6-9月，夏季气温舒适、草原碧绿。','【交通指南】甘肃地形狭长，建议采用"动车站点+包车游览"的交通模式。兰州中川国际机场是西北重要航空枢纽。兰新高铁贯穿河西走廊，兰州至敦煌约6小时。注意：莫高窟A类票需提前一个月预约。','【住宿推荐】兰州住宿选择最多，推荐城关区张掖路附近。张掖推荐甘州区住宿，方便往返丹霞景区。敦煌市区住宿条件成熟，鸣沙山周边民宿性价比高。','【高反提示】甘肃大部分地区海拔不高，兰州约1500米、敦煌约1100米，基本无高原反应。但甘南地区海拔3000米以上，初到可能有轻微高反，建议放缓节奏、多喝水。','【导游证面试考点】甘肃导游证面试常考内容：莫高窟的历史沿革、建筑特色；嘉峪关的防御体系、历史地位；麦积山石窟的泥塑艺术风格；甘肃简称"甘"的由来（甘州+肃州）；丝绸之路对甘肃的影响。']}
],

extra:[
{title:'世界遗产与重要景区',items:['【可可西里】世界自然遗产，位于青藏高原腹地，青海省玉树藏族自治州西部。总面积约4.5万平方公里，是中国面积最大、海拔最高的世界自然遗产地。2017年被列入世界自然遗产名录。这里是藏羚羊的主要栖息地，"可可西里"藏语意为"美丽的少女"。','【三江源国家公园】世界自然遗产地，长江、黄河、澜沧江的发源地，被誉为"中华水塔"。位于青海南部高原，平均海拔4500米以上，是世界上海拔最高的高原湿地生态系统之一。公园面积19.07万平方公里，是全国首批国家公园。','【青海湖】中国最大的内陆咸水湖，有"高原蓝宝石"美誉。湖面海拔3196米，面积约4583平方公里。湖水湛蓝清澈，湖畔是广袤的草原和金黄的油菜花田。每年4-6月，数十万只候鸟在青海湖繁殖栖息。','【塔尔寺】藏传佛教格鲁派六大寺院之一，位于西宁市湟中区鲁沙尔镇。始建于明嘉靖三十九年（1560年），是格鲁派创始人宗喀巴大师的诞生地。酥油花、壁画、堆绣被誉为"艺术三绝"。','【茶卡盐湖】"天空之镜"，位于海西蒙古族藏族自治州乌兰县。湖面海拔3059米，面积约105平方公里。湖水含盐量极高，倒映蓝天白云，仿佛天地融为一体。乘坐小火车深入湖心，是最经典的游览方式。']},
{title:'省份概况',items:['【地理位置】青海省简称"青"，省会西宁市。位于中国西部、青藏高原东北部，因境内有中国最大的内陆咸水湖——青海湖而得名。总面积72.23万平方公里，居全国第四位。北部和东部与甘肃相连，西北与新疆接壤，南部和西南与西藏毗邻。','【历史沿革】青海是中华民族和中华文明形成发展的重要源头地区之一。先秦时期属古羌人领地，是古羌文明的核心区域。汉武帝时期，青海东部正式纳入中原版图。1928年正式设立青海省。','【行政区划】青海省现辖2个地级市、6个自治州。省会西宁市海拔约2261米，有"中国夏都"之称。6个自治州分别是：海北、海南、海西、黄南、玉树、果洛。','【经济概况】青海已形成以绿色能源、绿色产业、绿色农牧业为架构的绿色发展方式。是全国最大的钾肥和盐化工综合利用基地，柴达木盆地盐湖资源丰富。2024年全省GDP达4121.84亿元。','【民族文化】青海是多民族聚居区，汉族、藏族、回族、土族、撒拉族、蒙古族等26个民族和谐共生。藏族人口最多，主要分布在青南高原，信奉藏传佛教。土族是青海独有的少数民族。']},
{title:'特色美食',items:['【手抓羊肉】青海美食的灵魂代表，选用藏系绵羊或滩羊，常年在海拔3000米以上的天然草场放养，肉质纤维紧实、脂肪分布均匀，几乎没有膻味。清水慢炖，只加花椒与盐，徒手抓取，入口即化、肥而不腻。','【青海老酸奶】青海酸奶用牦牛奶或普通牛奶发酵而成，呈固态。瓷碗装，表层结着厚厚的金黄奶皮，绵密浓稠，酸香醇厚。吃时配一勺白砂糖或蜂蜜，酸与甜在舌尖碰撞。德禄酸奶（莫家街店）是西宁老字号的代表。','【尕面片】青海人最家常的面食，又称"指甲面片"。将面剂子擀薄后，用手指掐成指甲盖大小的面片。分汤面片和炒面片两种：汤面片鲜美清淡，炒面片香辣入味。','【狗浇尿饼】青海非遗美食，用青稞面或小麦面加香豆粉煎制而成。饼皮焦脆金黄，内里筋道柔软，带有淡淡的香豆清香。早晨配一碗牛杂汤，是最地道的青海早餐。','【青海土火锅】炭火铜锅里的高原盛宴，用特制铜锅，中间燃炭煮食。食材以牦牛肉、酸菜、豆腐、粉条为主，层层码放，汤底鲜美。围锅而坐，热气腾腾，适合寒冬时节。']},
{title:'传统节日',items:['【藏历新年】藏族最重要的传统节日，时间在藏历正月初一。节日期间，藏族群众身着盛装，走亲访友，互献哈达，送去新年祝福。家家户户用酥油灯、酥油花装饰佛龛，摆上"切玛"。人们会去煨桑、逛林卡、赛马射箭。','【那达慕大会】蒙古族、藏族传统盛会，意为"娱乐、游戏"。每年7-8月草原黄金季节举行，内容包括摔跤、赛马、射箭"男儿三艺"竞技，以及民族歌舞、物资交流等。青海那达慕主要在海北州、海南州等草原地区举行。','【酥油花灯节】塔尔寺最盛大的宗教节日，每年藏历正月十五举行。夜幕降临，塔尔寺内点亮数千盏酥油灯，佛殿金顶流光溢彩。最精彩的是酥油花展，用牦牛酥油捏制各种造型，色彩艳丽、栩栩如生。','【热贡六月会】青海黄南藏族自治州同仁市藏族、土族群众的传统节日，每年农历六月十七至二十五举行。节日期间，各村寨举行祭祀山神、驱邪祈福的仪式。热贡六月会是国家级非物质文化遗产。','【土族波波会】互助土族自治县土族群众传统节日，每年农历二月二或七月二十三举行。波波会是土族语"跳神"的意思，是土族群众祭祀山神、驱邪避灾的宗教活动。']},
{title:'旅游攻略',items:['【高原反应】青海地处高原，平均海拔超过3000米，初到高原可能有高原反应，如头痛、胸闷、气短等。到青海后多休息、少运动、多喝水；避免剧烈活动；可提前服用红景天等药物。如出现严重高反，应立即就医。','【最佳时间】青海最佳旅游季节是5-10月。5-6月草原返青、气候宜人；7-8月油菜花盛开，是青海湖最美的季节；9-10月秋色浓郁、游客较少。茶卡盐湖建议晴天前往。','【环湖自驾】青海湖环湖一周约360公里，建议2-3天时间。自驾路线：西宁-倒淌河-二郎剑-黑马河-石乃亥-刚察-西海镇-西宁。黑马河是观看青海湖日出的最佳地点。','【交通指南】西宁是青海旅游的集散中心。曹家堡国际机场开通国内外航线。铁路方面，青藏铁路是进出青海的主要通道。省内景点分散，建议包车或自驾，租车价格在300-800元/天不等。','【导游证面试考点】青海省导游证面试常考内容：三江源是哪三条江河的发源地？青海湖是构造湖还是冰川湖？塔尔寺"三绝"是什么？可可西里被列入世界遗产的时间；青海主要的世居民族。']}
],

extra:[
{title:'世界遗产与重要景区',items:['【西夏陵】世界文化遗产，位于银川市西夏区贺兰山东麓。2025年7月正式列入《世界遗产名录》，成为中国第60项世界遗产。西夏陵是11-13世纪西夏王朝的皇家陵寝遗址群，分布范围近40平方公里，包含9座帝陵、271处陪葬墓，被誉为"东方金字塔"。','【沙坡头】国家5A级旅游景区，位于中卫市沙坡头区。集大漠、黄河、高山、绿洲于一体，是宁夏旅游的标志性景区。有"世界沙都"之称，可体验骑骆驼穿越沙漠、乘坐羊皮筏子漂流黄河、飞越黄河滑索等特色项目。','【镇北堡西部影视城】国家5A级旅游景区，位于银川市西夏区。由明城、清城、老银川一条街三部分组成，是我国十大影视基地之一。《大话西游》《新龙门客栈》《红高粱》等经典影片在此拍摄。','【沙湖】国家5A级旅游景区，位于石嘴山市平罗县。总面积80多平方公里，其中水域面积45平方公里，沙漠面积22平方公里。沙与水在这里完美融合，形成独特的"沙水相依"景观。','【贺兰山岩画】全国重点文物保护单位，位于银川市西夏区贺兰山东麓。古代先民在岩石上凿刻的图画，反映了原始游牧民族的生活场景和信仰崇拜，其中"太阳神"岩画最为著名。']},
{title:'省份概况',items:['【地理位置】宁夏回族自治区简称"宁"，首府银川市。地处中国西北内陆、黄河中上游地区，位于黄土高原与内蒙古高原的过渡地带。总面积6.64万平方公里，是我国五个少数民族自治区之一。地形南北狭长，北为银川平原，南为黄土丘陵和六盘山区。','【历史沿革】宁夏是中华文明的发祥地之一，3万年前就有人类活动。秦代属北地郡，汉代设安定郡。公元11世纪，党项族在此建立西夏王朝。1958年成立宁夏回族自治区。','【行政区划】宁夏回族自治区现辖5个地级市：银川市（首府）、石嘴山市、吴忠市、中卫市、固原市。下辖22个县（市、区）。银川市是全区政治、经济、文化中心。','【经济概况】宁夏已形成以能源化工、装备制造、新材料、新能源、特色农业和现代服务业为主的产业体系。枸杞、滩羊、葡萄酒是宁夏特色农产品。2024年全区GDP约5700亿元。','【回族文化】宁夏是全国最大的回族聚居区，回族人口约占全区总人口的三分之一。回族全民信仰伊斯兰教，饮食遵循清真标准，不食猪肉、不饮含酒精饮料。清真寺是回族宗教活动的中心。']},
{title:'特色美食',items:['【手抓羊肉】宁夏滩羊闻名全国，滩羊肉质细嫩、膻味极轻。正宗宁夏手抓选用成年绵羊，只加清水和盐炖煮，捞出后手抓蘸椒盐食用，最大程度保留羊肉本味。肉色白嫩，肥而不腻，入口即化。','【八宝茶】回族待客的传统茶饮，又称"盖碗茶"。茶具为三件套的"三泡台"盖碗，内放茶叶、冰糖、红枣、桂圆、枸杞、核桃仁、葡萄干、芝麻等八种配料。倒入滚水，香气四溢，甜润可口。','【烩小吃】吴忠市传统名小吃，将夹板、牛肉丸子、粉条、豆腐等十几种食材放入羊汤中烩煮。汤色清亮，内容丰富，一碗之内尽享多种美味。烩小吃是吴忠早茶文化的代表。','【辣糊糊】银川市特色小吃，将各种蔬菜、肉类用竹签串起，放入特制的辣汤中涮煮。汤底香辣浓郁。食客围坐锅边，边煮边吃，气氛热烈。是银川年轻人最爱的美食之一。','【中卫硒砂瓜】宁夏中卫市特产，因压砂种植而得名。硒砂瓜个头巨大，一般10-20斤，皮薄瓤红，汁多味甜，糖度高，耐储运。每年7-9月上市，是消暑解渴的佳品。']},
{title:'传统节日',items:['【古尔邦节】伊斯兰教重要节日，又称"宰牲节"。时间为伊斯兰历十二月十日，与开斋节、圣纪节并称伊斯兰教三大节日。节日当天，回族群众沐浴更衣，前往清真寺参加会礼。会礼后宰杀牛羊，分赠亲友和贫弱者。','【开斋节】伊斯兰教重要节日，又称"开斋节"。时间为伊斯兰历十月一日，标志着斋月的结束。斋月期间，回族群众从黎明到日落禁食禁饮。开斋节当天，回族群众前往清真寺做礼拜，互赠礼物，欢庆斋功圆满完成。','【圣纪节】伊斯兰教重要节日，纪念先知穆罕默德的诞辰。时间在伊斯兰历三月十二日。节日期间，回族群众聚集清真寺，听阿訇讲述穆罕默德的生平事迹和教义，诵读《古兰经》，赞颂先知功德。','【宁夏黄河金岸马拉松】每年4月在吴忠市举办的国际马拉松赛事，赛道沿黄河金岸设置。比赛线路串联宁夏引黄古灌区、盐池长城遗址、青铜峡黄河大峡谷等景点，赛事规模约5000人。','【银川当代戏剧节】每年10月在银川举办的戏剧艺术盛会，邀请国内外优秀剧团参演。剧目类型涵盖话剧、舞剧、戏曲、儿童剧等多种形式，是西北地区重要的文化盛事。']},
{title:'旅游攻略',items:['【最佳时间】宁夏最佳旅游季节是4-10月。4-5月气候回暖，避开人潮；6-8月沙坡头玩沙漠项目最刺激，但要注意防晒；9-10月秋高气爽，是摄影最佳时节。冬季气温低，但可体验冰雪沙漠。','【行程建议】推荐5日深度游：Day1银川（西夏陵、宁夏博物馆）；Day2银川（镇北堡影城、贺兰山岩画）；Day3银川-沙湖-中卫；Day4中卫（沙坡头、66号公路）；Day5中卫-银川，返程。','【交通指南】银川河东国际机场是宁夏航空枢纽。银西高铁连接西安、兰州。银川至中卫高铁仅需1.5小时。景区间建议包车或自驾，银川包车一日游约500-800元。','【住宿推荐】银川住宿选择最多，推荐兴庆区或金凤区。中卫可住沙坡头景区附近沙漠酒店或帐篷，夜晚可观星。建议体验沙漠星星酒店（旺季需提前一个月预订）。','【导游证面试考点】宁夏导游证面试常考内容：西夏陵2025年被列入世界遗产名录；宁夏"五宝"；沙坡头景区的主要体验项目；镇北堡西部影城的代表作品；回族的饮食禁忌和节日习俗。']}
],

official:{site:'https://wlt.gansu.gov.cn',notice:'关注甘肃省文化和旅游厅官网',policy:'无特殊限制'},
extra:[
{title:'世界遗产与重要景区',items:['【新疆天山】世界自然遗产，位于新疆维吾尔自治区境内，包含托木尔峰、喀拉峻-库尔德宁、巴音布鲁克、博格达四个提名地段。总面积约5759平方公里，2013年被列入世界自然遗产名录。天山是世界上最大的独立纬向山系，主峰托木尔峰海拔7443米。','【天山天池】国家5A级旅游景区，位于昌吉回族自治州阜康市境内。以高山湖泊为中心，周围群山环抱，雪峰倒映，云杉蔽日。天池古称"瑶池"，传说是西王母设宴款待周穆王的仙境。湖面海拔1910米。','【喀纳斯】国家5A级旅游景区，位于阿勒泰地区布尔津县境内。"喀纳斯"蒙古语意为"美丽而神秘的湖"。湖水随季节和天气变化呈现不同颜色，故称"变色湖"。喀纳斯湖畔生活着图瓦人，保留着古老的游牧文化。','【吐鲁番葡萄沟】国家5A级旅游景区，位于吐鲁番市高昌区火焰山西侧。是火焰山山谷中最大的沟谷，全长约8公里，种植葡萄面积达2万余亩。盛夏时节，晶莹剔透的葡萄垂挂架下，极具风情。','【那拉提草原】国家5A级旅游景区，位于伊犁哈萨克自治州新源县。是世界四大草原之一的亚高山草甸植物区，海拔约1800米，享有"空中草原"美誉。夏秋季节，野花遍野，牛羊成群，一派诗画般的草原风光。']},
{title:'省份概况',items:['【地理位置】新疆维吾尔自治区简称"新"，首府乌鲁木齐市。位于中国西北边陲、亚欧大陆腹地，面积166.49万平方公里，占中国陆地总面积的六分之一，是中国面积最大的省级行政区。地形可概括为"三山夹两盆"。','【历史沿革】新疆古称"西域"，是古代丝绸之路的重要通道。汉代设西域都护府，正式纳入中国版图。唐代设安西都护府和北庭都护府。1884年设新疆省。1955年成立新疆维吾尔自治区。','【行政区划】新疆维吾尔自治区现辖4个地级市、5个地区、5个自治州。乌鲁木齐市是首府，还有克拉玛依市、吐鲁番市、哈密市等。另有多个自治州包括伊犁哈萨克自治州、巴音郭楞蒙古自治州等。','【经济概况】新疆已形成以油气资源、煤炭资源、电力能源、化工产业为支柱的现代产业体系。塔里木盆地蕴藏着丰富的油气资源，是西气东输的主要气源地。棉花产量占全国90%以上。2024年新疆GDP突破1.8万亿元。','【民族文化】新疆是一个多民族聚居区，有维吾尔族、汉族、哈萨克族、回族、蒙古族、柯尔克孜族等56个民族。维吾尔族人口最多，主要分布在南疆，信奉伊斯兰教。哈萨克族主要分布在北疆。']},
{title:'特色美食',items:['【新疆大盘鸡】新疆第一菜，起源于90年代初期。将整只土鸡切块，配以土豆、青椒、洋葱，用大盘盛装，故名大盘鸡。做法融合了川菜麻辣和新疆本地口味，鸡肉软糯入味，土豆绵软吸满汤汁。新疆本地大盘鸡首选沙湾县。','【新疆馕】维吾尔族传统主食，种类繁多，有肉馕、油馕、窝窝馕、芝麻馕等数十种。馕用面粉加盐水发酵后烤制而成，外皮金黄酥脆，内里松软可口，可保存数月不坏。馕是维吾尔族饮食文化的象征。','【烤羊肉串】新疆夜市的主角，维吾尔语称"卡瓦普"。选用新鲜羊肉，穿在铁签或红柳签上，撒上盐、孜然粉、辣椒粉，在炭火上翻烤。肉串滋滋冒油，香气四溢。新疆羊肉串每串分量十足。','【手抓饭】维吾尔族、乌孜别克族传统美食。将大米与羊肉、洋葱、胡萝卜一起焖煮，加入孜然粉、盐等调味。成品米饭粒粒分明，吸收了羊肉的油脂和香气，油润喷香。是维吾尔族节庆、婚嫁等重要场合必备的待客美食。','【烤全羊】新疆待客最高礼遇的美食。将整只羊处理干净后，用炭火慢慢烘烤数小时。成品外皮金黄酥脆，肉质鲜嫩多汁，香气扑鼻。烤全羊一般在大型庆典、接待贵宾时才会准备。']},
{title:'传统节日',items:['【古尔邦节】维吾尔族、哈萨克族、回族等信仰伊斯兰教民族最重要的节日之一，又称"宰牲节"。时间为伊斯兰历十二月十日。节日当天上午，穆斯林群众前往清真寺参加会礼，然后宰杀牛羊，分赠亲友和贫困者。节日假期一般三天到一周不等。','【肉孜节】伊斯兰教重要节日，又称"开斋节"。时间为伊斯兰历十月一日，标志着长达一个月的斋月结束。节日当天，人们沐浴更衣，前往清真寺做礼拜，互致问候，共贺佳节。节日食品有馓子、油香、点心等。','【纳吾热孜节】哈萨克族、柯尔克孜族等民族的传统新年节日。时间在每年3月21日前后（春分时节），标志着新年的开始。各家各户用七种食材煮成"纳吾热孜饭"，寓意来年五谷丰登。人们走亲访友，举行赛马、摔跤、姑娘追等传统体育活动。','【新疆国际舞蹈节】新疆维吾尔自治区政府主办的文化节庆活动，每两年举办一次，时间在6-7月。活动包括开闭幕式演出、舞蹈比赛、群众舞蹈展演等。来自国内外的优秀舞蹈团体参展，是新疆最具影响力的文化盛会。','【伊犁天马国际旅游节】伊犁哈萨克自治州主办的旅游节庆，每年7月在昭苏县举行。昭苏是"天马之乡"，伊犁马体型矫健。节日期间举办速度赛马、走马比赛、马术表演等赛事，还有叼羊、姑娘追等哈萨克族传统体育活动。']},
{title:'旅游攻略',items:['【最佳时间】新疆四季皆有不同的美：4-5月杏花盛开；6-8月草原碧绿、瓜果飘香，是旅游旺季；9-10月秋色浓郁；11月-次年3月冰雪覆盖。建议根据想看的景色选择出行时间。','【行程规划】新疆地域辽阔，建议根据时间选择线路：①北疆环线（7-10天）：乌鲁木齐-可可托海-喀纳斯-禾木-赛里木湖-那拉提-巴音布鲁克。②南疆环线（10-15天）：乌鲁木齐-库尔勒-库车-阿克苏-喀什-塔县-和田。','【交通指南】乌鲁木齐地窝堡国际机场是新疆航空枢纽。兰新高铁连接乌鲁木齐与兰州、吐鲁番、哈密等地。省内旅游建议包车或自驾，但地域广阔，日均行驶300-500公里是常态。独库公路每年仅6-10月开放。','【住宿建议】新疆旅游住宿选择多样：乌鲁木齐、伊宁、喀什等城市有各种档次酒店；赛里木湖、那拉提等景区有特色民宿；禾木、白哈巴等村落有图瓦族特色木屋。建议旺季提前一个月预订。','【导游证面试考点】新疆导游证面试常考内容：新疆地形"三山夹两盆"的具体含义；坎儿井的工作原理及功能；天山天池的别称"瑶池"来历；维吾尔族的主要节日和饮食禁忌；哈萨克族的传统体育项目。']}
],

let currentRegion = '华北';
let currentProvince = '';

function init(){
renderRegionTabs();
renderProvinceList('华北');
}

function renderRegionTabs(){
const container = document.getElementById('regionTabs');
regions.forEach(r=>{
const btn = document.createElement('button');
btn.className = 'region-tab' + (r===currentRegion?' active':'');
btn.textContent = r;
btn.onclick = ()=>{
currentRegion = r;
document.querySelectorAll('.region-tab').forEach(t=>t.classList.remove('active'));
btn.classList.add('active');
renderProvinceList(r);
};
container.appendChild(btn);
});
}

function renderProvinceList(region){
const container = document.getElementById('provinceList');
container.innerHTML = '';
regionNames[region].forEach(p=>{
const card = document.createElement('div');
card.className = 'province-card glass-card';
card.innerHTML = '<h3>'+p+'</h3><span>'+provinceData[p].region+'</span>';
card.onclick = ()=>showProvince(p);
container.appendChild(card);
});
document.getElementById('provinceDetail').classList.remove('active');
container.style.display = 'grid';
}

function showProvince(name){
currentProvince = name;
const data = provinceData[name];
document.getElementById('detailTitle').textContent = name;
document.getElementById('detailDesc').textContent = data.region + ' · 地方导游基础知识';
document.getElementById('provinceList').style.display = 'none';
document.getElementById('provinceDetail').classList.add('active');
document.getElementById('provinceDetail').scrollTop = 0;
renderKnowledge(name);
renderQuestions(name);
renderOfficial(name);
switchTab('knowledge');
}

function showProvinceList(){
document.getElementById('provinceDetail').classList.remove('active');
document.getElementById('provinceList').style.display = 'grid';
}

function switchTab(tab){
document.querySelectorAll('.detail-tab').forEach(t=>t.classList.remove('active'));
document.querySelectorAll('.detail-content').forEach(c=>c.classList.remove('active'));
event.target.classList.add('active');
document.getElementById('tab-'+tab).classList.add('active');
}

function renderKnowledge(name){
const data = provinceData[name];
const container = document.getElementById('tab-knowledge');
let html = '<div class="content-grid">';
data.extra.forEach(item=>{
html += '<div class="content-card"><h4><span>📍</span>'+item.title+'</h4><ul>';
item.items.forEach(i=>html += '<li>'+i+'</li>');
html += '</ul></div>';
});
html += '</div>';
container.innerHTML = html;
}

function renderQuestions(name){
const data = provinceData[name];
const container = document.getElementById('tab-questions');
let html = '';
data.questions.forEach((q,i)=>{
html += '<div class="question-card"><h4>第'+(i+1)+'题</h4><p class="question-text">'+q.q+'</p><ul class="question-options">';
q.options.forEach((opt,j)=>{
html += '<li onclick="checkAnswer(this,'+j+','+i+',\''+name+'\')">'+opt+'</li>';
});
html += '</ul><div class="explain-box" id="explain-'+i+'"></div></div>';
});
container.innerHTML = html;
}

function checkAnswer(el,idx,qIdx,name){
const data = provinceData[name].questions[qIdx];
const options = el.parentElement.querySelectorAll('li');
const explainBox = document.getElementById('explain-'+qIdx);
if(el.classList.contains('correct')||el.classList.contains('wrong')) return;
options.forEach(o=>o.style.pointerEvents='none');
if(idx===data.answer){
el.classList.add('correct');
explainBox.textContent = '✓ 回答正确！'+data.explain;
explainBox.className = 'explain-box show';
}else{
el.classList.add('wrong');
options[data.answer].classList.add('correct');
explainBox.innerHTML = '✗ 回答错误！正确答案：'+options[data.answer].textContent+'<br><br>'+data.explain;
explainBox.className = 'explain-box show wrong-type';
}
}

function renderOfficial(name){
const data = provinceData[name];
const container = document.getElementById('tab-official');
container.innerHTML = `
<div class="info-box">
<h4>📋 官方报名信息</h4>
<ul>
<li>官方报名入口：<a href="https://mr.mct.gov.cn" target="_blank">全国旅游监管服务平台</a></li>
<li>官方公众号：文旅之声（底部菜单-导游考试报名）</li>
<li>考试大纲下载：<a href="https://www.mct.gov.cn" target="_blank">文化和旅游部官网</a></li>
</ul>
</div>
<div class="info-box">
<h4>🗺️ ${name}省官方渠道</h4>
<ul>
<li>官网：<a href="${data.official.site}" target="_blank">${data.official.site}</a></li>
<li>报名通知：${data.official.notice}</li>
${data.official.policy?'<li>特别说明：'+data.official.policy+'</li>':''}
</ul>
</div>
<div class="tip-box">
<strong>📌 备考提示</strong>
<p>${name}地方导基考试重点：本省世界遗产、5A级景区、特色民俗、历史文化。建议结合当地实际备考，多关注官方发布的考试信息。</p>
</div>
`;
}
