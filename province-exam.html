【敦煌莫高窟】世界文化遗产，位于甘肃省酒泉市敦煌市东南25公里处的鸣沙山东麓断崖上。始建于十六国的前秦时期（公元366年），历经十六国、北朝、隋、唐、五代、西夏、元等朝代的连续营造，形成了现存735个洞窟、4.5万平方米壁画和2400余尊彩塑的宏大艺术宝库，是世界上现存规模最大、内容最丰富的佛教艺术圣地。莫高窟被誉为"东方卢浮宫"，1987年被列入世界文化遗产名录。其壁画内容涵盖佛教故事、历史事件、社会生活、歌舞音乐、建筑服饰等多个方面，色彩绚丽、线条精妙。著名的洞窟有第96窟（九层楼，内有35.5米高的北大佛）、第130窟（南大佛）、第17窟（藏经洞）、第428窟、第323窟（张骞出使西域图）、第285窟等。藏经洞内曾藏有公元4-11世纪的经卷、文书、绘画等5万余件文物，是研究中古时期中国与中亚历史文化的"百科全书"。导游词要点：莫高窟是丝绸之路的艺术瑰宝；洞窟内严禁拍照；洞窟分A类票（8个洞窟）和B类票（4个洞窟），建议提前30天预约。

【嘉峪关关城】世界文化遗产，位于甘肃省嘉峪关市西5公里处。始建于明洪武五年（1372年），是明代万里长城的西端起点，有"天下第一雄关"之称。关城由内城、外城、罗城、瓮城、城壕、烽燧等组成，周长约740米，高约10.7米。主要建筑有光化门（东门）、柔远门（西门）、游击将军府等。关城外有罗城，形成"三重城郭"的防御格局。景区还包括长城第一墩和悬壁长城。长城第一墩建于明嘉靖十八年（1539年），是明代长城最西端的烽燧。悬壁长城长约750米，有"西部八达岭"之称。导游词要点：嘉峪关是明代长城的最西端；"三重城郭"体现军事防御思想；"定城砖"传说；嘉峪关在丝绸之路上的战略地位。

【天水麦积山石窟】世界文化遗产预备名单，位于甘肃省天水市麦积区。始建于后秦（公元384-417年），形成现有221个洞窟、10632身泥塑、1300多平方米壁画的艺术宝库。麦积山石窟与敦煌莫高窟、大同云冈石窟、洛阳龙门石窟并称为中国四大石窟，被誉为"东方雕塑陈列馆"。著名洞窟有第4窟（散花楼）、第44窟（东方微笑，被誉为"东方的蒙娜丽莎"）、第133窟（万佛洞）等。第169窟有西秦建弘元年墨书题记，是中国石窟中最早的纪年题记。导游词要点：麦积山以泥塑艺术著称；栈道工程的艰险；泥塑风格演变；第44窟的微笑佛像。

【张掖丹霞地貌】国家5A级旅游景区，位于甘肃省张掖市临泽县和肃南县境内。总面积约510平方公里，是中国北方干旱地区最典型的丹霞地貌，被誉为"世界十大神奇地理奇观"之一。张掖丹霞地貌形成于约6000万年前的白垩纪时期。著名景点有七彩丹霞、冰沟丹霞等。最佳观赏时间是日出和日落时分。2019年评为国家5A级景区。导游词要点：丹霞地貌形成过程；七彩丹霞与冰沟丹霞的特点；最佳观赏时间。

【鸣沙山月牙泉】国家5A级旅游景区，位于甘肃省敦煌市城南5公里处。鸣沙山因沙动成响而得名，五色沙粒晶莹闪亮。月牙泉因形似新月而得名，长约150米，宽约25米，是沙漠中的绿洲奇观。"山泉共处、沙水共生"被誉为"塞外风光之一绝"。主要景点有月牙泉、鸣沙山、沙岭晴鸣等。景区内有骑骆驼、滑沙、沙漠越野车、沙漠露营等项目。导游词要点：鸣沙山发声原理；月牙泉形成条件；五色沙特点；骑骆驼、滑沙体验。

【炳灵寺石窟】全国重点文物保护单位，位于甘肃省临夏回族自治州永靖县。始建于西秦建弘元年（420年），是丝绸之路东段南道的重要石窟寺。现存窟龛185个、石雕造像776尊、泥塑54尊、壁画900平方米。第169窟有中国石窟中最早的纪年题记。著名洞窟有第169窟（西秦）、第126、128、132窟（北魏）、第3窟（唐代，高10米主佛像）。导游词要点：炳灵寺是甘肃三大石窟之一；第169窟题记意义；北魏造像"秀骨清像"风格。

【崆峒山】国家5A级旅游景区，位于甘肃省平凉市崆峒区。主峰海拔2123米，是道教圣地，被誉为"西来第一山""中华道教第一山"。相传黄帝曾问道于广成子于此。有九宫八台十二院等道教建筑群，包括皇城、问道宫、上天梯、雷声峰、香山观等。崆峒山还是崆峒武术的发源地。导游词要点：崆峒山是道教名山；黄帝问道广成子的典故；九宫八台十二院布局；崆峒武术特点。

【黄河石林】国家4A级旅游景区，位于甘肃省白银市景泰县。总面积约50平方公里，是集雅丹、丹霞、石林地貌于一体的自然奇观。黄河石林形成于约210万年前的更新世。石林高约80-200米，黄河从脚下流过，形成"九曲黄河石林间"的壮丽景观。龙湾村是黄河岸边的古老村落。导游词要点：石林是地质奇观；黄河与石林相伴的景观；龙湾村民俗文化；羊皮筏子漂流体验。

【拉卜楞寺】全国重点文物保护单位，位于甘肃省甘南藏族自治州夏河县。是藏传佛教格鲁派六大寺院之一，有"世界藏学府"之称。寺院始建于清康熙四十八年（1709年）。占地约86万平方米，拥有经堂6座、佛殿84座、活佛府邸31座、僧舍万余间。六大扎仓是藏传佛教的重要学术中心。有世界上最长的转经筒长廊，1700多个转经筒。导游词要点：格鲁派六大寺院之一；六大扎仓教学内容；转经筒的文化意义。

【甘加八角城】全国重点文物保护单位，位于甘肃省甘南藏族自治州夏河县甘加镇。是唐代西北重要的军事城堡，始建于唐代，距今1300多年。八角城因有八个城角而得名，城墙周长约2000米，城内面积约20万平方米。城址保存完整，对研究唐代西北边疆防御体系具有重要价值。可结合甘加草原一同游览。导游词要点：八角城始建于唐代；八角形布局的独特性；唐代边疆防御研究价值；甘加草原风光。,{title:'省份概况',items:['【地理位置】甘肃省简称"甘"或"陇"，省会兰州市。地处中国西北部、黄河上游，位于黄土高原、青藏高原和内蒙古高原三大高原交汇地带。东西狭长，从东南到西北依次经过陇南山地、黄土高原、河西走廊、甘南高原等不同地形区。总面积42.58万平方公里。

【历史沿革】甘肃省历史悠久，是中华文明的重要发祥地之一，有近8000年的文明史。大地湾遗址位于天水市秦安县，是黄河流域最早的新石器时代文化遗址之一，距今约8000年。马家窑文化以绚丽多彩的彩陶闻名世界，代表了中国史前彩陶艺术的巅峰。甘肃是伏羲和女娲的故乡，天水是伏羲故里。先秦时期，秦人在陇南山地崛起。秦汉时期，甘肃是丝绸之路的主要通道，武威、张掖、酒泉、敦煌并称"河西四郡"。明代，修筑了嘉峪关长城。1950年，甘肃省人民政府成立。

【行政区划】甘肃省现辖12个地级市、2个自治州，共86个县（市区），省会为兰州市。12个地级市分别是：兰州市（省会）、嘉峪关市、金昌市、白银市、天水市、武威市、张掖市、平凉市、酒泉市、庆阳市、定西市、陇南市。2个自治州是：临夏回族自治州、甘南藏族自治州。

【人口民族】甘肃省常住人口约2490万（2023年），共有55个民族成分。世居甘肃的少数民族有回族、藏族、东乡族、保安族、裕固族、蒙古族等。回族人口最多，主要分布在临夏回族自治州。藏族主要分布在甘南藏族自治州。裕固族主要分布在张掖市肃南县，是甘肃独有的少数民族。

【经济产业】甘肃省已形成以农业、能源、旅游业为支柱的产业体系。2024年甘肃省GDP突破1.2万亿元。甘肃是中国重要的药材之乡，当归、党参、黄芪等中药材产量居全国前列。旅游业是甘肃的支柱产业之一，莫高窟、嘉峪关、麦积山石窟、张掖丹霞等景区享誉世界，2024年甘肃省接待游客超过5亿人次。

【文化特色】甘肃省是中华民族多元一体格局的典型缩影。丝绸之路文化璀璨夺目，佛教文化遗存丰富，甘肃被誉为"中国石窟艺术之乡"。甘肃还是多民族聚居区，汉、回、藏、蒙古、裕固、东乡、保安等民族和谐共生。

【历史名人】甘肃历史悠久，人杰地灵。飞将军李广是陇西成纪（今甘肃天水）人，是汉代著名的军事家。诗人李白祖籍为陇西成纪。医学家皇甫谧是安定朝那人（今甘肃灵台）人，著有《针灸甲乙经》，是中国第一部针灸学专著。

【方言特色】甘肃方言复杂多样，按语言学分类可分为中原官话、兰银官话、西南官话三大片。甘肃方言特点是语音硬朗、声调简洁、词汇丰富，有很多独特的方言词汇和表达方式。甘肃省内各地语言差异较大，有"十里不同音"的说法。']},{title:'特色美食',items:['【兰州牛肉面】甘肃美食名片，被誉为"中华第一面"。讲究"一清二白三红四绿五黄"：汤清、萝卜白、辣油红、香菜绿、面条黄亮。牛肉面已经成为兰州人日常生活中不可或缺的一部分。推荐馆子：马子禄牛肉面、吾穆勒蓬灰牛肉面。导游词话术：兰州牛肉面是甘肃人的"命"，清晨的牛肉面馆总是人满为患，一碗面、一碟牛肉、一杯枣茶，是兰州人最地道的早餐。

【手抓羊肉】甘肃羊肉的代表菜品，尤以临夏回族自治州东乡族自治县出产的"东乡贡羊"最为著名。东乡羊长期放养于高山草甸，肉质细嫩、膻味极轻。传统做法是清水加盐煮熟，直接手抓食用。导游词话术：甘肃的手抓羊肉讲究"鲜、嫩、香"，东乡贡羊更是羊中上品，吃手抓要的就是这份原汁原味，大口吃肉、大碗喝酒，才是甘肃人的待客之道。

【张掖炒炮】张掖市特色面食，因面条短小如鞭炮而得名。将面剂子搓成细长条，掐成约3厘米长的小段，与羊肉丁、青椒、洋葱等配料猛火爆炒。香辣过瘾，是张掖人最爱的家常美食。导游词话术：炒炮是张掖人的"灵魂面食"，名字喜庆，做法豪爽，一锅一炒，香辣过瘾，体现了西北人的热情与直爽。

【天水呱呱】天水市传统小吃，用荞麦淀粉制作而成，呈现琥珀色半透明状，口感软糯筋道。浇上芝麻酱、蒜水、油泼辣子等调料，酸辣香麻，十分开胃。导游词话术：天水呱呱是西北最具特色的小吃之一，酸辣香麻，软糯筋道，天水人每天的早餐就从一碗呱呱开始，是当地人最割舍不下的家乡味道。

【敦煌驴肉黄面】敦煌市特色美食，"驴肉配黄面"是敦煌饮食文化的经典组合。黄面用优质面粉制作，口感筋道。配上卤制的敦煌驴肉，肉质鲜嫩、瘦而不柴。导游词话术：驴肉黄面是敦煌的"招牌美食"，天上龙肉、地上驴肉，说的就是这道菜，一碗筋道的黄面配上鲜嫩的驴肉，是丝路古道上最地道的敦煌味道。

【定西陇西腊肉】定西市陇西县特产，中国国家地理标志产品。陇西腊肉选用当地特有的"蕨麻猪"或普通猪为原料，采用传统的腌制工艺，用盐、花椒、小茴香等调料腌制，然后用松木、柏木屑等慢火熏制。导游词话术：陇西腊肉是甘肃的"年味代表"，红亮的外观、浓郁的香气，代表着西北人过年的热闹与喜庆。

【临夏手抓】临夏回族自治州特色美食，临夏是甘肃重要的回族聚居区，手抓羊肉是当地的待客名菜。临夏手抓选用当地特有的"栈羊"为原料，肉质鲜嫩、膻味极轻。导游词话术：临夏是甘肃的"美食天堂"，手抓羊肉、东乡土豆片、河沿面片，每一道菜都代表着临夏人的热情与好客。

【白银酸烂肉】白银市特色美食，以会宁县的最负盛名。酸烂肉选用猪五花肉为原料，先将肉煮至八成熟，切薄片，然后与酸菜一起爆炒。酸菜用当地特有的青菜腌制，酸味纯正。导游词话术：酸烂肉是白银人的"乡愁味道"，酸菜的酸、肉片的香，完美融合，是甘肃人最割舍不下的家常美味。

【张掖臊面】张掖市传统早餐美食，被誉为"中国第一面"。臊面的面条细如龙须，口感筋道。臊面的灵魂在于臊子汤，用牛羊肉、豆腐、黄花菜、木耳、鸡蛋等十多种食材熬制。导游词话术：张掖臊面是"西北早餐之王"，清亮的汤底、筋道的面条、丰富的配料，一碗下肚，浑身舒坦。

【酒泉糊锅】酒泉市特色早餐美食，是酒泉人最钟爱的早餐。糊锅用面皮、面筋、麻花等原料，配上鸡汤或骨汤熬煮成糊状。香浓粘稠，暖胃暖心，是寒冬里最好的早餐。导游词话术：糊锅是酒泉人的"暖心早餐"，香浓粘稠的糊状食物配上酥脆的麻花，一碗下肚，驱散西北清晨的寒意。']},{title:'传统节日',items:['【敦煌行旅节】敦煌市主办的旅游文化节庆，每年8月在敦煌市举办，持续约一个月。节日以"丝绸之路"文化为主题，弘扬敦煌文化，促进旅游发展。节庆期间举办大型文艺演出、敦煌文化论坛、敦煌艺术展览、敦煌美食节等活动。导游讲解要点：敦煌行旅节是敦煌市最重要的文旅节庆；节庆内容和活动时间。

【天水伏羲文化旅游节】天水市主办的文化节庆，每年6月22日（伏羲诞辰日）在天水市举办。伏羲是中华人文始祖，相传诞生于天水，天水因此被称为"羲皇故里"。节庆活动包括公祭伏羲大典、伏羲庙会、卦台山民间祭祀、伏羲文化学术研讨会等。导游讲解要点：伏羲是中华人文始祖，相传诞生于天水；伏羲的主要贡献：创制八卦。

【兰州春节庙会】春节期间（农历正月初一至十五），兰州市各区县举办丰富多彩的春节庙会活动。主要庙会有白塔山庙会、五泉山庙会、金城关庙会等。白塔山庙会有秦腔大戏、太平鼓表演、社火巡游、猜灯谜等活动。导游讲解要点：兰州春节庙会是西北规模最大的年俗活动；太平鼓是兰州独有的民间艺术。

【张掖马蹄寺香浪节】甘州区主办的山地文化节庆，每年7-8月在张掖市甘州区马蹄寺风景区举行。香浪节是藏族、裕固族等少数民族的传统节日，"香浪"藏语意为"采薪"或"踏青"。活动内容包括传统体育竞技（赛马、摔跤、射箭）、民族歌舞表演、篝火晚会等。导游讲解要点：香浪节是藏族、裕固族的传统节日；赛马、摔跤、"押加"等传统运动。

【嘉峪关国际滑翔节】嘉峪关市主办的航空体育节庆，每年5-6月在嘉峪关滑翔基地举办。嘉峪关滑翔基地是世界三大理想滑翔带之一，因气流稳定、风向恒定而闻名于世。节庆期间举办滑翔伞比赛、三角翼飞行表演、热气球展等活动。导游讲解要点：嘉峪关滑翔基地是世界三大理想滑翔带之一。

【临夏花儿会】临夏回族自治州主办的民歌节庆，每年6月在临夏州康乐县、和政县等地举行。花儿是流传于西北地区的原生态民歌，以爱情为主题，歌词即兴创作，曲调悠扬婉转。临夏被中国文联命名为"中国花儿之乡"。导游讲解要点：花儿是西北特有的民歌形式，以爱情为主题；临夏是"中国花儿之乡"。

【敦煌莫高窟数字化展示周】敦煌研究院主办的文化活动，每年9月在敦煌莫高窟举行。活动期间，莫高窟开放更多洞窟供游客参观，举办敦煌壁画数字化展览、敦煌文化讲座、敦煌艺术工作坊等。导游讲解要点：莫高窟壁画保护的重要性；数字化技术在壁画保护中的应用。

【白银黄河湿地生态旅游节】白银市主办的旅游节庆，每年9月在白银市景泰县黄河湿地公园举行。活动内容包括湿地观鸟、黄河漂流、生态摄影展、农事体验、特色美食展销等。导游讲解要点：黄河湿地是重要的生态保护区；黄河湿地的主要鸟类资源。

【庆阳香包民俗文化节】庆阳市主办的民俗节庆，每年端午节（农历五月初五）前后在庆阳市西峰区举行。庆阳香包是中国传统的民间工艺品，是国家级非物质文化遗产。导游讲解要点：庆阳香包是国家级非物质文化遗产；香包的传统文化内涵。

【定西渭水源祭水节】定西市渭源县主办的传统节庆，每年农历三月初三在渭水源景区举行。渭河是黄河最大的支流，渭源县是渭河的发源地。祭水节是当地祭祀水神、祈求风调雨顺的传统节日。导游讲解要点：渭河是黄河最大的支流；祭水节的历史和意义。']},{title:'旅游攻略',items:['【最佳时间】甘肃南北跨度大，最佳旅游时间因地而异。河西走廊（武威、张掖、酒泉、敦煌、嘉峪关）适合5-10月出行，其中5-6月和9-10月气候最宜人。甘南高原（夏河、合作、郎木寺）适合6-9月，夏季气温舒适、草原碧绿。

【交通指南】甘肃地形狭长，建议采用"动车站点+包车游览"的交通模式。兰州中川国际机场是西北重要航空枢纽。兰新高铁贯穿河西走廊，兰州至敦煌约6小时。省内各城市间高铁动车便利。

【住宿推荐】兰州住宿选择最多，推荐城关区张掖路附近。张掖推荐甘州区住宿。敦煌市区住宿条件成熟。甘南地区住宿条件相对较差，建议提前预订。

【高反提示】甘肃大部分地区海拔不高，兰州约1500米、敦煌约1100米，基本无高原反应。但甘南地区海拔较高，如夏河约2800米，郎木寺约3300米，需注意高反。

【门票信息】甘肃主要景区门票价格：莫高窟A类票238元/人（含数字电影+8个洞窟），嘉峪关关城联票110元/人，张掖丹霞门票75元/人（含观光车），麦积山石窟门票80元/人（含观光车），鸣沙山月牙泉门票110元/人。

【导游证面试考点】甘肃导游证面试常考内容：1.莫高窟的历史沿革（始建于前秦建元二年，366年）；2.嘉峪关的防御体系（三重城郭）；3.甘肃简称"甘"的由来（甘州+肃州）；4.丝绸之路对甘肃的影响。面试口诀速记："甘肃简称甘或陇，甘州肃州来合成；莫高嘉峪麦积山，石窟长城丹霞艳。"

【注意事项】1.防晒：甘肃紫外线强，尤其是敦煌、张掖等地，务必携带防晒霜、墨镜、遮阳帽；2.补水：甘肃气候干燥，需多喝水；3.尊重宗教：甘肃是多民族聚居区，进入清真寺、寺庙需遵守宗教礼仪；4.预订：旺季景区门票紧张，莫高窟A类票需提前30天预约。']}
],

extra:[
{title:'世界遗产与重要景区',items:['【可可西里】世界自然遗产，位于青藏高原腹地，青海省玉树藏族自治州西部。总面积约4.5万平方公里，是中国面积最大、海拔最高的世界自然遗产地。2017年被列入世界遗产名录。这里是藏羚羊的主要栖息地，"可可西里"藏语意为"美丽的少女"。可可西里平均海拔超过4600米，气候严寒。保护区内有藏羚羊、野牦牛、藏野驴、雪豹、盘羊等珍稀野生动物。导游词要点：可可西里是世界上面积最大、海拔最高的世界自然遗产地；藏羚羊是标志性物种；2017年列入世界遗产。

【三江源国家公园】世界自然遗产地，长江、黄河、澜沧江的发源地，被誉为"中华水塔"。位于青海南部高原，总面积19.07万平方公里，是全国首批国家公园。三江源地区平均海拔4500米以上，是世界上海拔最高的高原湿地生态系统之一。导游词要点：三江源是长江、黄河、澜沧江的发源地；"中华水塔"的由来和意义。

【青海湖】中国最大的内陆咸水湖，有"高原蓝宝石"美誉。湖面海拔3196米，面积约4583平方公里。青海湖古称"西海"，藏语名"措温布"。湖畔是广袤的草原，每年4-6月，数十万只候鸟在青海湖繁殖栖息。导游词要点：中国最大的内陆咸水湖；湖面海拔3196米；候鸟栖息的时间。

【塔尔寺】藏传佛教格鲁派六大寺院之一，位于西宁市湟中区鲁沙尔镇。始建于明嘉靖三十九年（1560年），是格鲁派创始人宗喀巴大师的诞生地。酥油花、壁画、堆绣被誉为"艺术三绝"。导游词要点：格鲁派六大寺院之一；宗喀巴大师是格鲁派创始人；"艺术三绝"：酥油花、壁画、堆绣。

【茶卡盐湖】"天空之镜"，位于海西蒙古族藏族自治州乌兰县茶卡镇。湖面海拔3059米，面积约105平方公里，是一个固液并存的卤水湖。天气晴好时，湖面如同一面巨大的镜子，倒映蓝天白云。导游词要点："天空之镜"的形成原理；最佳游览时间；小火车游览体验。

【坎布拉国家森林公园】国家4A级旅游景区，位于黄南藏族自治州尖扎县境内。公园总面积152平方公里，集丹霞地貌、森林、湖泊、宗教文化于一体。园区内有李家峡水库，湖水碧绿。导游词要点：丹霞地貌特点；李家峡水库的碧绿湖水。

【门源油菜花海】国家4A级旅游景区，位于海北藏族自治州门源回族自治县。每年7月，数十万亩油菜花竞相绽放，金色花海与远处的雪山交相辉映。门源是青海省最大的油菜籽生产基地。导游词要点：门源油菜花的种植规模；最佳观赏时间和地点。

【祁连山草原】国家4A级旅游景区，位于青海与甘肃交界处的祁连山地区。祁连山草原被誉为"东方瑞士"，草原面积广阔，水草丰美。卓尔山有"天境祁连"之称。导游词要点：被誉为"东方瑞士"；卓尔山"天境祁连"的美誉。

【年保玉则】国家4A级旅游景区，位于果洛藏族自治州久治县境内。年保玉则是巴颜喀拉山的最高峰，海拔5369米，终年积雪，有"天神后花园"之称。仙女湖藏语名"西姆措"，湖水清澈碧蓝。导游词要点：巴颜喀拉山主峰；仙女湖的传说和美景。

【察尔汗盐湖】中国最大的盐湖，位于海西蒙古族藏族自治州格尔木市境内。湖面海拔2670米，面积约5856平方公里。万丈盐桥全长32公里，宛如一座玉带横跨盐湖。导游词要点：中国最大的盐湖；万丈盐桥的奇观。']},{title:'省份概况',items:['【地理位置】青海省简称"青"，省会西宁市。位于中国西部、青藏高原东北部，因境内有中国最大的内陆咸水湖——青海湖而得名。总面积72.23万平方公里，居全国第四位。

【历史沿革】青海是中华民族和中华文明形成发展的重要源头地区之一。先秦时期属古羌人领地，是古羌文明的核心区域。汉武帝时期，青海东部正式纳入中原版图。1928年正式设立青海省。

【行政区划】青海省现辖2个地级市、6个自治州。省会西宁市海拔约2261米，有"中国夏都"之称。6个自治州分别是：海北、海南、海西、黄南、玉树、果洛。

【经济概况】青海已形成以绿色能源、绿色产业、绿色农牧业为架构的绿色发展方式。是全国最大的钾肥和盐化工综合利用基地。2024年全省GDP达4121.84亿元。

【民族文化】青海是多民族聚居区，汉族、藏族、回族、土族、撒拉族、蒙古族等26个民族和谐共生。藏族人口最多，信奉藏传佛教。土族是青海独有的少数民族。']},{title:'特色美食',items:['【手抓羊肉】青海美食的灵魂代表，选用藏系绵羊或滩羊，常年在海拔3000米以上的天然草场放养，肉质纤维紧实、脂肪分布均匀，膻味极轻。清水慢炖，只加花椒与盐，徒手抓取，入口即化。导游词话术：青海的手抓羊肉，选用的是海拔3000米以上高原放养的藏系绵羊，肉质鲜美，是真正的"绿色食品"。

【青海老酸奶】青海酸奶用牦牛奶或普通牛奶发酵而成，呈固态。表层结着厚厚的金黄奶皮，绵密浓稠，酸香醇厚。吃时配一勺白砂糖或蜂蜜。导游词话术：青海酸奶用牦牛奶发酵，酸香醇厚，是藏族人民招待贵宾的传统食品。

【尕面片】青海人最家常的面食，又称"指甲面片"。将面剂子擀薄后，用手指掐成指甲盖大小的面片。分汤面片和炒面片两种。导游词话术：尕面片是青海人的"家乡味道"，小小的面片，大大的情怀。

【狗浇尿饼】青海非遗美食，用青稞面或小麦面加香豆粉煎制而成。饼皮焦脆金黄，内里筋道柔软，带有淡淡的香豆清香。导游词话术：狗浇尿饼名字虽然不雅，但味道绝佳，是青海的非遗美食。

【青海土火锅】炭火铜锅里的高原盛宴，用特制铜锅，中间燃炭煮食。食材以牦牛肉、酸菜、豆腐、粉条为主，层层码放，汤底鲜美。导游词话术：青海土火锅讲究的是"原汁原味"，铜锅炭火，热气腾腾。

【牦牛酸奶】用纯牦牛奶发酵制成的酸奶，呈淡黄色，表面有一层厚厚的奶皮，酸香扑鼻。导游词话术：牦牛酸奶是用纯牦牛奶发酵，脂肪含量高，口感浓稠。

【甜醅】青海传统小吃，用青稞或莜麦发酵制成。甜醅的制作方法与醪糟类似，但口感更加浓稠香甜。导游词话术：甜醅是青海人的"消暑神器"，酸甜可口。

【焜锅馍馍】青海传统面食，用焜锅烤制而成。焜锅馍馍外皮金黄酥脆，内里松软可口。导游词话术：焜锅馍馍是青海人的"干粮"，出门在外带上几个焜锅馍馍，既方便又耐放。

【炮仗面】青海特色面食，因面条短小如鞭炮而得名。将面段与羊肉丁、青椒、洋葱等配料一起爆炒。导游词话术：炮仗面名字喜庆，味道香辣，是青海人的"家常味道"。

【青稞面搓鱼】青海特色面食，用青稞面制作。搓成两头细、中间粗的小鱼形状，口感独特，有青稞特有的香味。导游词话术：青稞面搓鱼是藏族人民的传统主食，青稞是青藏高原特有的农作物。']},{title:'传统节日',items:['【藏历新年】藏族最重要的传统节日，时间在藏历正月初一。节日期间，藏族群众身着盛装，走亲访友，互献哈达，送去新年祝福。家家户户用酥油灯、酥油花装饰佛龛，摆上"切玛"。导游讲解要点：藏历新年是藏族最重要的节日；"切玛"是藏历新年的吉祥物。

【那达慕大会】蒙古族、藏族传统盛会，意为"娱乐、游戏"。每年7-8月草原黄金季节举行，内容包括摔跤、赛马、射箭"男儿三艺"竞技，以及民族歌舞、物资交流等。导游讲解要点：那达慕是蒙古族、藏族的传统盛会；"男儿三艺"：摔跤、赛马、射箭。

【酥油花灯节】塔尔寺最盛大的宗教节日，每年藏历正月十五举行。夜幕降临，塔尔寺内点亮数千盏酥油灯。最精彩的是酥油花展，用牦牛酥油捏制各种造型。导游讲解要点：酥油花灯节是塔尔寺最重要的法会；酥油花的制作工艺。

【热贡六月会】青海黄南藏族自治州同仁市藏族、土族群众的传统节日，每年农历六月十七至二十五举行。节日期间，各村寨举行祭祀山神、驱邪祈福的仪式。导游讲解要点：热贡六月会是国家级非物质文化遗产；祭祀山神、驱邪祈福的仪式。

【土族波波会】互助土族自治县土族群众传统节日，每年农历二月二或七月二十三举行。波波会是土族语"跳神"的意思，是土族群众祭祀山神、驱邪避灾的宗教活动。导游讲解要点：波波会是土族传统节日；"跳神"活动的内容。

【土族纳顿节】互助土族自治县土族群众传统节日，被誉为"世界上最长的狂欢节"，从农历七月十二日开始，持续到农历九月十五日。导游讲解要点：纳顿节是"世界上最长的狂欢节"；跳庄子的舞蹈表演。

【玉树赛马节】玉树藏族自治州传统节日，每年7-8月在玉树州府结古镇举行。玉树是"赛马之乡"，玉树赛马节是康巴藏区最盛大的赛马节。导游讲解要点：玉树是"赛马之乡"；走马比赛的规则和特点。

【青海湖环湖自行车赛】每年7月在青海湖举办的大型体育赛事，是世界上海拔最高的自行车赛。专业组赛道环青海湖一周约360公里。导游讲解要点：青海湖环湖自行车赛是世界上海拔最高的自行车赛。

【茶卡盐湖摄影节】每年6月在茶卡盐湖举办的摄影盛会，吸引国内外众多摄影爱好者参加。摄影节期间，主办方组织摄影讲座、摄影比赛等活动。导游讲解要点：茶卡盐湖是摄影爱好者的天堂。

【三江源国际观鹰节】每年9月在玉树藏族自治州巴塘草原举办的活动。三江源地区是猛禽的天堂，有金雕、草原雕等珍稀鸟类。导游讲解要点：三江源是猛禽的天堂；观鹰节的活动内容。']},{title:'旅游攻略',items:['【高原反应】青海地处高原，平均海拔超过3000米，初到高原可能有高原反应。到青海后多休息、少运动、多喝水；避免剧烈活动；可提前服用红景天等药物。

【最佳时间】青海最佳旅游季节是5-10月。5-6月草原返青、气候宜人；7-8月油菜花盛开，是青海湖最美的季节；9-10月秋色浓郁。茶卡盐湖建议晴天前往。

【环湖自驾】青海湖环湖一周约360公里，建议2-3天时间。自驾路线：西宁-倒淌河-二郎剑-黑马河-石乃亥-刚察-西海镇-西宁。黑马河是观看青海湖日出的最佳地点。

【交通指南】西宁是青海旅游的集散中心。曹家堡国际机场开通国内外航线。省内景点分散，建议包车或自驾，租车价格在300-800元/天不等。

【住宿推荐】西宁住宿选择最多，推荐城西区或海湖新区。黑马河镇住宿条件一般，但看日出方便。淡季（11月-次年4月）住宿价格便宜，旺季（6-9月）价格高涨，建议提前预订。

【导游证面试考点】青海省导游证面试常考内容：1.三江源是哪三条江河的发源地？（长江、黄河、澜沧江）；2.青海湖是构造湖还是冰川湖？（构造湖）；3.塔尔寺"三绝"是什么？（酥油花、壁画、堆绣）；4.可可西里被列入世界遗产的时间（2017年）；5.青海主要的世居民族。面试口诀速记："三江源是长黄澜，中华水塔美名扬；可可西里世界遗产，2017年获此荣。"

【注意事项】1.防晒：青海紫外线强，务必携带防晒霜、墨镜、遮阳帽；2.保暖：青海温差大，即使是夏季，早晚也很凉，需携带外套；3.补水：青海气候干燥，需多喝水；4.高反：进入高原后多休息、少运动。']}

extra:[
{title:'世界遗产与重要景区',items:['【西夏陵】世界文化遗产，位于宁夏回族自治区银川市西夏区贺兰山东麓。2025年7月11日，西夏陵正式列入《世界遗产名录》，成为中国第60项世界遗产。西夏陵是11至13世纪西夏王朝的皇家陵寝遗址群，分布范围近40平方公里，包含9座帝陵、271处陪葬墓，被誉为"东方金字塔"。导游词要点：西夏陵是党项族建立的西夏王朝皇家陵寝；2025年列入世界遗产名录；与宋辽金并存190年。

【沙坡头】国家5A级旅游景区，位于宁夏中卫市沙坡头区。集大漠、黄河、高山、绿洲于一体，有"世界沙都"之称。羊皮筏子漂流黄河是最具特色的体验项目。沙坡头还是"麦草方格"治沙法创造了世界治沙奇迹。导游词要点：沙漠与黄河交汇的独特景观；骑骆驼、羊皮筏子是特色体验；"麦草方格"治沙法。

【镇北堡西部影视城】国家5A级旅游景区，位于银川市西夏区。始建于1993年，由明城、清城、老银川一条街三部分组成，是中国十大影视基地之一，被誉为"东方好莱坞"。《大话西游之大圣娶亲》《新龙门客栈》《红高粱》等数百部经典影片在此拍摄。导游词要点：中国十大影视基地之一；代表作品《大话西游》《新龙门客栈》。

【沙湖】国家5A级旅游景区，位于石嘴山市平罗县。总面积80.25平方公里，集湖泊、沙漠、湿地、芦苇、候鸟于一体，被誉为"丝路驿站上的翡翠明珠"。导游词要点：沙漠与湖泊交汇的独特景观；芦苇荡是独特的湿地生态。

【贺兰山岩画】全国重点文物保护单位，位于银川市西夏区贺兰山东麓。古代游牧民族在岩石上凿刻的图画，距今已有3000-10000年的历史。"太阳神"岩画最为著名。导游词要点：古代游牧民族凿刻的艺术瑰宝；"太阳神"岩画是最著名的代表作品。

【中卫金沙岛】国家4A级旅游景区，位于中卫市沙坡头区。总面积约15平方公里，集沙漠、湖泊、湿地、花海于一体。薰衣草、马鞭草花海被誉为"中国的普罗旺斯"。导游词要点：沙漠中的绿洲；薰衣草花海。

【青铜峡黄河大峡谷】国家4A级旅游景区，位于吴忠市青铜峡市。黄河大峡谷全长约10公里，核心景点是黄河铁桥和一百零八塔。一百零八塔是西夏时期建造的喇嘛教塔群。导游词要点：黄河上游最后的峡谷；一百零八塔是西夏时期建造。

【水洞沟】国家5A级旅游景区，位于灵武市临河镇。是中国最早发掘的旧石器时代文化遗址之一，被誉为"中国史前考古的发祥地"。1923年首次发掘，出土大量旧石器时代文物。导游词要点：1923年首次发掘；张三小店是遗址发现的重要见证。

【黄沙古渡】国家4A级旅游景区，位于银川市兴庆区月牙湖乡。是明清时期宁夏八景之一。康熙皇帝曾在此渡河亲征噶尔丹。导游词要点：明清时期宁夏八景之一；康熙皇帝渡河纪念。

【六盘山国家森林公园】国家4A级旅游景区，位于固原市泾源县。主峰米缸山海拔2942米，森林覆盖率超过80%，有"高原绿岛"之称。毛泽东《清平乐·六盘山》使六盘山名扬天下。导游词要点：黄土高原上的绿色屏障；红军长征重要纪念地。']},{title:'省份概况',items:['【地理位置】宁夏回族自治区简称"宁"，首府银川市。地处中国西北内陆、黄河中上游地区，位于黄土高原与内蒙古高原的过渡地带。总面积6.64万平方公里，是我国五个少数民族自治区之一。

【历史沿革】宁夏是中华文明的发祥地之一，3万年前就有人类活动。秦代属北地郡，汉代设安定郡。公元11世纪，党项族在此建立西夏王朝。1958年成立宁夏回族自治区。

【行政区划】宁夏回族自治区现辖5个地级市：银川市（首府）、石嘴山市、吴忠市、中卫市、固原市。下辖22个县（市、区）。

【经济概况】宁夏已形成以能源化工、装备制造、新材料、新能源、特色农业和现代服务业为主的产业体系。枸杞、滩羊、葡萄酒是宁夏特色农产品。2024年全区GDP约5700亿元。

【回族文化】宁夏是全国最大的回族聚居区，回族人口约占全区总人口的三分之一。回族全民信仰伊斯兰教，饮食遵循清真标准。清真寺是回族宗教活动的中心。']},{title:'特色美食',items:['【手抓羊肉】宁夏滩羊闻名全国，滩羊肉质细嫩、膻味极轻。正宗宁夏手抓选用成年绵羊，只加清水和盐炖煮，捞出后手抓蘸椒盐食用，最大程度保留羊肉本味。导游词话术：宁夏手抓羊肉，选用的是盐池滩羊，肉质细嫩、膻味极轻，大口吃肉、大碗喝酒，是宁夏人的待客之道。

【八宝茶】回族待客的传统茶饮，又称"盖碗茶"。茶具为三件套的"三泡台"盖碗，内放茶叶、冰糖、红枣、桂圆、枸杞、核桃仁、葡萄干、芝麻等八种配料。导游词话术：八宝茶是回族人待客的最高礼遇，一碗八宝茶，甜在嘴里，暖在心里。

【烩小吃】吴忠市传统名小吃，将夹板、牛肉丸子、粉条、豆腐等十几种食材放入羊汤中烩煮。汤色清亮，内容丰富，一碗之内尽享多种美味。导游词话术：烩小吃是吴忠人的"家乡味道"，内容丰富，一碗烩小吃，尽享多种美味。

【辣糊糊】银川市特色小吃，将各种蔬菜、肉类用竹签串起，放入特制的辣汤中涮煮。汤底香辣浓郁。导游词话术：辣糊糊是银川人的"深夜食堂"，辣得过瘾，吃得热闹。

【中卫硒砂瓜】宁夏中卫市特产，因压砂种植而得名。硒砂瓜个头巨大，一般10-20斤，皮薄瓤红，汁多味甜，糖度高。导游词话术：硒砂瓜是宁夏的"瓜中之王"，个头巨大，汁多味甜。

【宁夏烤全羊】待客最高礼遇的美食。将整只羊处理干净后，用炭火慢慢烘烤数小时。成品外皮金黄酥脆，肉质鲜嫩多汁。导游词话术：烤全羊是宁夏待客的最高礼遇。

【羊杂碎】银川市传统早餐，将羊的头、蹄、心、肝、肺等煮熟后切碎，配上香菜、葱花、辣椒油等调料。导游词话术：羊杂碎是银川人的"清晨第一口"。

【大武口凉皮】石嘴山市特色小吃，以筋道爽滑、麻辣鲜香著称。导游词话术：大武口凉皮是宁夏凉皮的代表。

【固原暖锅】固原市传统美食，用铜锅将各种食材层层码放，加入高汤慢慢炖煮。导游词话术：暖锅是固原人的"待客最高礼"。

【宁夏葡萄酒】宁夏贺兰山东麓是中国的明星葡萄酒产区，酿造的葡萄酒多次在国际大赛中获奖。导游词话术：宁夏贺兰山东麓是"中国的波尔多"。']},{title:'传统节日',items:['【古尔邦节】伊斯兰教重要节日，又称"宰牲节"。时间为伊斯兰历十二月十日，与开斋节、圣纪节并称伊斯兰教三大节日。节日当天，回族群众沐浴更衣，前往清真寺参加会礼。会礼后宰杀牛羊，分赠亲友和贫弱者。导游讲解要点：古尔邦节是伊斯兰教三大节日之一；"宰牲节"的含义。

【开斋节】伊斯兰教重要节日。时间为伊斯兰历十月一日，标志着斋月的结束。斋月期间，回族群众从黎明到日落禁食禁饮。开斋节当天，回族群众前往清真寺做礼拜，互赠礼物。导游讲解要点：开斋节标志着斋月结束；斋月的意义和习俗。

【圣纪节】伊斯兰教重要节日，纪念先知穆罕默德的诞辰。时间在伊斯兰历三月十二日。节日期间，回族群众聚集清真寺，听阿訇讲述穆罕默德的生平事迹。导游讲解要点：圣纪节纪念先知穆罕默德诞辰。

【宁夏黄河金岸马拉松】每年4月在吴忠市举办的国际马拉松赛事，赛道沿黄河金岸设置。比赛线路串联宁夏引黄古灌区、盐池长城遗址等景点。导游讲解要点：马拉松赛事时间和地点；赛道特色。

【银川当代戏剧节】每年10月在银川举办的戏剧艺术盛会，邀请国内外优秀剧团参演。剧目类型涵盖话剧、舞剧、戏曲、儿童剧等多种形式。导游讲解要点：戏剧节举办时间和地点。

【宁夏沙坡头沙漠音乐节】每年夏季在沙坡头景区举办的大型音乐活动，融合了沙漠元素和现代音乐。导游讲解要点：音乐节举办时间和地点。

【中卫枸杞文化节】每年6月在宁夏中卫市举办的文化节庆活动，庆祝枸杞丰收，展示枸杞文化。导游讲解要点：枸杞是宁夏"五宝"之一。

【宁夏冰雪旅游节】每年冬季在沙坡头、鸣翠湖等景区举办的冰雪旅游活动。导游讲解要点：冬季冰雪旅游体验。

【西夏陵申遗成功纪念活动】2025年7月西夏陵正式列入世界遗产名录后举办的系列纪念活动。导游讲解要点：西夏陵2025年列入世界遗产；申遗成功的意义。

【宁夏国际葡萄酒文化节】每年9月在宁夏举办的葡萄酒文化盛会，活动包括葡萄酒品鉴、葡萄酒拍卖、葡萄采摘体验等。导游讲解要点：宁夏贺兰山东麓葡萄酒产区。']},{title:'旅游攻略',items:['【最佳时间】宁夏最佳旅游季节是4-10月。4-5月气候回暖，避开人潮；6-8月沙坡头玩沙漠项目最刺激；9-10月秋高气爽，是摄影最佳时节。

【行程建议】推荐5日深度游：Day1银川（西夏陵、宁夏博物馆）；Day2银川（镇北堡影城、贺兰山岩画）；Day3银川-沙湖-中卫；Day4中卫（沙坡头、66号公路）；Day5中卫-银川返程。

【交通指南】银川河东国际机场是宁夏航空枢纽。银西高铁连接西安、兰州。银川至中卫高铁仅需1.5小时。景区间建议包车或自驾。

【住宿推荐】银川住宿选择最多，推荐兴庆区或金凤区。中卫可住沙坡头景区附近沙漠酒店或帐篷。

【导游证面试考点】宁夏导游证面试常考内容：1.西夏陵2025年被列入世界遗产名录；2.宁夏"五宝"（枸杞、甘草、贺兰石、滩羊皮、发菜）；3.沙坡头景区的主要体验项目；4.回族的饮食禁忌和节日习俗。面试口诀速记："宁夏简称是银川，五宝枸杞最为先；西夏陵寝东方塔，2025年列入世界遗产。"

【注意事项】1.防晒：宁夏紫外线强，尤其是沙漠地区；2.尊重宗教：宁夏是多民族聚居区；3.预订：旺季住宿和门票紧张，需提前预订。']}

extra:[
{title:'世界遗产与重要景区',items:['【新疆天山】世界自然遗产，位于新疆维吾尔自治区境内，包含托木尔峰、喀拉峻-库尔德宁、巴音布鲁克、博格达四个提名地段。总面积约5759平方公里，2013年被列入世界自然遗产名录。天山是世界上最大的独立纬向山系，主峰托木尔峰海拔7443米。导游词要点：新疆天山2013年列入世界自然遗产；主峰托木尔峰海拔7443米。

【天山天池】国家5A级旅游景区，位于昌吉回族自治州阜康市境内。以高山湖泊为中心，周围群山环抱，雪峰倒映，云杉蔽日。天池古称"瑶池"，传说是西王母设宴款待周穆王的仙境。湖面海拔1910米。导游词要点：天池古称"瑶池"；西王母与周穆王的传说。

【喀纳斯】国家5A级旅游景区，位于阿勒泰地区布尔津县境内。"喀纳斯"蒙古语意为"美丽而神秘的湖"。湖水随季节和天气变化呈现不同颜色，故称"变色湖"。喀纳斯湖畔生活着图瓦人。导游词要点："变色湖"的变色原理；图瓦人的文化和生活。

【吐鲁番葡萄沟】国家5A级旅游景区，位于吐鲁番市高昌区火焰山西侧。是火焰山山谷中最大的沟谷，全长约8公里，种植葡萄面积达2万余亩。导游词要点：葡萄沟的葡萄种植面积；维吾尔族葡萄文化。

【那拉提草原】国家5A级旅游景区，位于伊犁哈萨克自治州新源县。是世界四大草原之一的亚高山草甸植物区，海拔约1800米，享有"空中草原"美誉。导游词要点："空中草原"的美誉；哈萨克族文化。

【赛里木湖】国家5A级旅游景区，位于博尔塔拉蒙古自治州博乐市境内。赛里木湖古称"净海"，湖面海拔2073米，面积约458平方公里，是新疆面积最大、透明度最高的高山湖泊。有"大西洋最后一滴眼泪"之称。导游词要点：赛里木湖是新疆最大的高山湖泊。

【巴音布鲁克草原】国家5A级旅游景区，位于巴音郭楞蒙古自治州和静县境内。是天山山间盆地，平均海拔约2500米，面积约2.3万平方公里，是中国最大的高山草原。"九曲十八弯"的开都河是摄影爱好者的最爱。导游词要点：中国最大的高山草原。

【可可托海】国家5A级旅游景区，位于阿勒泰地区富蕴县境内。可可托海是额尔齐斯河的源头，哈萨克语意为"绿色的丛林"。可可托海还因拥有世界最大矿坑而闻名，是中国的"功勋矿"。导游词要点：可可托海是额尔齐斯河的源头；"功勋矿"的历史意义。

【布尔津五彩滩】国家4A级旅游景区，位于阿勒泰地区布尔津县境内。雅丹地貌和河流侵蚀共同形成的独特景观，额尔齐斯河从这里流过。日落时分景色最为壮观。导游词要点：五彩滩的丹霞地貌；最佳观赏时间。

【塔克拉玛干沙漠】中国最大的沙漠，位于新疆南部塔里木盆地中部，面积约33万平方公里。"塔克拉玛干"维吾尔语意为"走得进、出不来"。沙漠中有塔里木沙漠公路，全长约522公里。导游词要点：中国最大的沙漠；沙漠公路的建设奇迹。']},{title:'省份概况',items:['【地理位置】新疆维吾尔自治区简称"新"，首府乌鲁木齐市。位于中国西北边陲，面积166.49万平方公里，是中国面积最大的省级行政区。地形可概括为"三山夹两盆"：阿尔泰山、天山、昆仑山夹准噶尔盆地和塔里木盆地。

【历史沿革】新疆古称"西域"，是古代丝绸之路的重要通道。汉代设西域都护府，正式纳入中国版图。1884年设新疆省。1955年成立新疆维吾尔自治区。

【行政区划】新疆维吾尔自治区现辖4个地级市、5个地区、5个自治州。乌鲁木齐市是首府，还有克拉玛依市、吐鲁番市、哈密市等。

【经济概况】新疆已形成以油气资源、煤炭资源、电力能源、化工产业为支柱的现代产业体系。塔里木盆地蕴藏着丰富的油气资源。棉花产量占全国90%以上。2024年新疆GDP突破1.8万亿元。

【民族文化】新疆是一个多民族聚居区，有维吾尔族、汉族、哈萨克族、回族、蒙古族、柯尔克孜族等56个民族。维吾尔族人口最多，主要分布在南疆。哈萨克族主要分布在北疆。']},{title:'特色美食',items:['【新疆大盘鸡】新疆第一菜，起源于90年代初期。将整只土鸡切块，配以土豆、青椒、洋葱，用大盘盛装。做法融合了川菜麻辣和新疆本地口味。导游词话术：大盘鸡是新疆人的"团宠"，一盘菜、一份情。

【新疆馕】维吾尔族传统主食，种类繁多，有肉馕、油馕、窝窝馕、芝麻馕等数十种。馕用面粉加盐水发酵后烤制而成，外皮金黄酥脆，内里松软可口。导游词话术：馕是维吾尔族人民的"生命之饼"。

【烤羊肉串】新疆夜市的主角，维吾尔语称"卡瓦普"。选用新鲜羊肉，撒上盐、孜然粉、辣椒粉，在炭火上翻烤。导游词话术：烤羊肉串是新疆夜市的"灵魂"。

【手抓饭】维吾尔族、乌孜别克族传统美食。将大米与羊肉、洋葱、胡萝卜一起焖煮，加入孜然粉、盐等调味。是维吾尔族节庆、婚嫁等重要场合必备的待客美食。导游词话术：手抓饭是维吾尔族的"待客上品"。

【烤全羊】新疆待客最高礼遇的美食。将整只羊处理干净后，用炭火慢慢烘烤数小时。导游词话术：烤全羊是新疆待客的最高礼遇。

【拉条子】新疆拌面的俗称，是新疆人最家常的面食。导游词话术：拉条子是新疆人的"家常味道"。

【新疆奶茶】哈萨克族、蒙古族传统饮品，用砖茶和鲜牛奶熬制而成。导游词话术：新疆奶茶是草原人民的"生命之源"。

【新疆瓜果】新疆是著名的"瓜果之乡"，吐鲁番的葡萄、哈密的瓜、阿克苏的苹果、库尔勒的香梨等。导游词话术：新疆是"瓜果之乡"。

【馕坑肉】维吾尔族传统美食，用馕坑烤制的羊肉。导游词话术：馕坑肉是"升级版"的烤羊肉。

【玛仁糖】新疆传统糖果，俗称"切糕"。导游词话术：玛仁糖是新疆人的"能量棒"。']},{title:'传统节日',items:['【古尔邦节】维吾尔族、哈萨克族、回族等信仰伊斯兰教民族最重要的节日之一，又称"宰牲节"。时间为伊斯兰历十二月十日。节日当天上午，穆斯林群众前往清真寺参加会礼，然后宰杀牛羊。导游讲解要点：古尔邦节是伊斯兰教三大节日之一。

【肉孜节】伊斯兰教重要节日，又称"开斋节"。时间为伊斯兰历十月一日，标志着长达一个月的斋月结束。导游讲解要点：肉孜节标志着斋月结束。

【纳吾热孜节】哈萨克族、柯尔克孜族等民族的传统新年节日。时间在每年3月21日前后（春分时节）。导游讲解要点：纳吾热孜节是哈萨克族新年。

【新疆国际舞蹈节】新疆维吾尔自治区政府主办的文化节庆活动，每两年举办一次，时间在6-7月。导游讲解要点：舞蹈节举办时间和地点。

【伊犁天马国际旅游节】伊犁哈萨克自治州主办的旅游节庆，每年7月在昭苏县举行。昭苏是"天马之乡"。导游讲解要点：天马之乡昭苏。

【克拉玛依水节】克拉玛依市主办的消夏文化节庆，每年7-8月举行。导游讲解要点：水节举办时间和地点。

【吐鲁番葡萄节】吐鲁番市主办的旅游节庆，每年8-9月在葡萄成熟季节举行。导游讲解要点：吐鲁番是"葡萄之乡"。

【喀纳斯金秋节】每年9-10月在喀纳斯景区举办的秋季旅游节庆。导游讲解要点：金秋时节喀纳斯的美景。

【和田玉石节】和田地区主办的文化节庆，每年8月举行。导游讲解要点：和田是"玉石之乡"。

【塔城阿肯弹唱会】塔城地区哈萨克族传统节庆，每年夏季举行。导游讲解要点：阿肯是哈萨克族游吟诗人。']},{title:'旅游攻略',items:['【最佳时间】新疆四季皆有不同的美：4-5月杏花盛开；6-8月草原碧绿、瓜果飘香，是旅游旺季；9-10月秋色浓郁。

【行程规划】新疆地域辽阔，建议根据时间选择线路：北疆环线（7-10天）或南疆环线（10-15天）。

【交通指南】乌鲁木齐地窝堡国际机场是新疆航空枢纽。兰新高铁连接乌鲁木齐与兰州、吐鲁番、哈密等地。独库公路每年仅6-10月开放。

【住宿建议】新疆旅游住宿选择多样。旺季建议提前一个月预订。

【导游证面试考点】新疆导游证面试常考内容：1.新疆地形"三山夹两盆"的具体含义；2.坎儿井的工作原理及功能；3.天山天池的别称"瑶池"来历；4.维吾尔族的主要节日和饮食禁忌。面试口诀速记："新疆地形三山夹两盆，天山横亘在中间；坎儿井是地下河，瑶池天池神话传。"

【注意事项】1.防晒：新疆紫外线强；2.保暖：新疆温差大；3.时差：新疆与北京有2小时时差；4.预订：旺季住宿和门票紧张。']}

let currentRegion = '华北';
let currentProvince = '';

function init(){
renderRegionTabs();
renderProvinceList('华北');
}

function renderRegionTabs(){
const container = document.getElementById('regionTabs');
regions.forEach(r=>{
const btn = document.createElement('button');
btn.className = 'region-tab' + (r===currentRegion?' active':'');
btn.textContent = r;
btn.onclick = ()=>{
currentRegion = r;
document.querySelectorAll('.region-tab').forEach(t=>t.classList.remove('active'));
btn.classList.add('active');
renderProvinceList(r);
};
container.appendChild(btn);
});
}

function renderProvinceList(region){
const container = document.getElementById('provinceList');
container.innerHTML = '';
regionNames[region].forEach(p=>{
const card = document.createElement('div');
card.className = 'province-card glass-card';
card.innerHTML = '<h3>'+p+'</h3><span>'+provinceData[p].region+'</span>';
card.onclick = ()=>showProvince(p);
container.appendChild(card);
});
document.getElementById('provinceDetail').classList.remove('active');
container.style.display = 'grid';
}

function showProvince(name){
currentProvince = name;
const data = provinceData[name];
document.getElementById('detailTitle').textContent = name;
document.getElementById('detailDesc').textContent = data.region + ' · 地方导游基础知识';
document.getElementById('provinceList').style.display = 'none';
document.getElementById('provinceDetail').classList.add('active');
document.getElementById('provinceDetail').scrollTop = 0;
renderKnowledge(name);
renderQuestions(name);
renderOfficial(name);
switchTab('knowledge');
}

function showProvinceList(){
document.getElementById('provinceDetail').classList.remove('active');
document.getElementById('provinceList').style.display = 'grid';
}

function switchTab(tab){
document.querySelectorAll('.detail-tab').forEach(t=>t.classList.remove('active'));
document.querySelectorAll('.detail-content').forEach(c=>c.classList.remove('active'));
event.target.classList.add('active');
document.getElementById('tab-'+tab).classList.add('active');
}

function renderKnowledge(name){
const data = provinceData[name];
const container = document.getElementById('tab-knowledge');
let html = '<div class="content-grid">';
data.extra.forEach(item=>{
html += '<div class="content-card"><h4><span>📍</span>'+item.title+'</h4><ul>';
item.items.forEach(i=>html += '<li>'+i+'</li>');
html += '</ul></div>';
});
html += '</div>';
container.innerHTML = html;
}

function renderQuestions(name){
const data = provinceData[name];
const container = document.getElementById('tab-questions');
let html = '';
data.questions.forEach((q,i)=>{
html += '<div class="question-card"><h4>第'+(i+1)+'题</h4><p class="question-text">'+q.q+'</p><ul class="question-options">';
q.options.forEach((opt,j)=>{
html += '<li onclick="checkAnswer(this,'+j+','+i+',\''+name+'\')">'+opt+'</li>';
});
html += '</ul><div class="explain-box" id="explain-'+i+'"></div></div>';
});
container.innerHTML = html;
}

function checkAnswer(el,idx,qIdx,name){
const data = provinceData[name].questions[qIdx];
const options = el.parentElement.querySelectorAll('li');
const explainBox = document.getElementById('explain-'+qIdx);
if(el.classList.contains('correct')||el.classList.contains('wrong')) return;
options.forEach(o=>o.style.pointerEvents='none');
if(idx===data.answer){
el.classList.add('correct');
explainBox.textContent = '✓ 回答正确！'+data.explain;
explainBox.className = 'explain-box show';
}else{
el.classList.add('wrong');
options[data.answer].classList.add('correct');
explainBox.innerHTML = '✗ 回答错误！正确答案：'+options[data.answer].textContent+'<br><br>'+data.explain;
explainBox.className = 'explain-box show wrong-type';
}
}

<li>考试大纲下载：<a href="https://www.mct.gov.cn" target="_blank">文化和旅游部官网</a></li>
</ul>
</div>
<div class="info-box">
<h4>🗺️ ${name}省官方渠道</h4>
<ul>
<li>官网：<a href="${data.official.site}" target="_blank">${data.official.site}</a></li>

${data.official.policy?'<li>特别说明：'+data.official.policy+'</li>':''}

`;
}
