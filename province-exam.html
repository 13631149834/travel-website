                    {title:'世界遗产与重要景区',items:[
                        '故宫博物院位于北京中轴线中心，是世界现存规模最大、保存最完整的木质结构古建筑群。占地72万平方米，建筑面积约15万平方米，有殿宇宫室9000余间。明清两代24位皇帝曾在此居住办公。1987年被列入世界文化遗产名录，馆藏文物186万余件（套），是中华文明的标志性符号。重要建筑包括太和殿、中和殿、保和殿、乾清宫、坤宁宫等。',
                        '八达岭长城是明长城最具代表性的段落，位于延庆区军都山关沟古道北口。长城全长3731米，开放段落2255米，最高海拔1015米。1961年被列为首批全国重点文物保护单位，1987年被列入世界文化遗产。八达岭段长城保存完好，设施完善，是长城旅游的首选目的地。毛泽东题词"不到长城非好汉"使八达岭更加声名远播。',
                        '天坛公园位于东城区永定门内大街东侧，是明清两代皇帝祭天、祈谷的神圣场所。占地约273万平方米，主要建筑有祈年殿、圜丘、皇穹宇等。1998年被列入世界文化遗产名录。天坛展现了"天人合一"的哲学思想，建筑布局呈圆形，象征天圆，色彩以蓝色为主，代表苍穹。',
                        '颐和园位于海淀区，是中国现存最大的皇家园林，前身为清漪园。占地2.97平方公里，水面占四分之三。始建于清乾隆十五年（1750年），1860年被英法联军焚毁，光绪年间重建。1998年被列入世界文化遗产名录。主要景点包括万寿山、昆明湖、长廊（728米）、佛香阁、十七孔桥等，集江南园林精华与皇家气派于一身。',
                        '明十三陵是明朝13位皇帝的陵墓群，位于昌平区天寿山南麓。陵区面积约80平方公里，自永乐七年（1409年）开始营建，历时230余年。定陵已科学发掘并开放地下宫殿。长陵祾恩殿是现存最大的楠木殿。目前开放参观的有定陵、长陵、昭陵、神路四个景区。2003年被列入世界遗产名录。',
                        '北京中轴线南起永定门，北至钟鼓楼，全长7.8公里，是世界上现存最长的古代城市中轴线。2024年被列入世界文化遗产名录。中轴线两侧分布着天坛、先农坛、故宫、景山等重要建筑，体现了中国古代都城规划理念。故宫、天坛、颐和园、长城并称北京四大世界文化遗产。',
                        '圆明园遗址公园位于海淀区，与颐和园相邻。曾是清代著名的皇家园林，有"万园之园"美誉。占地350公顷，水面占三分之一。1860年被英法联军焚毁，大量文物被掠夺。目前遗址以遗迹形式保存，建有圆明园展览馆供人凭吊。是进行爱国主义教育的重要基地。',
                        '周口店北京人遗址位于房山区周口店镇，是世界闻名的古人类文化遗址。1929年中国学者裴文中发现第一个北京人头盖骨化石。遗址出土大量北京人化石、用火遗迹和原始人化石遗存，是研究人类起源的重要资料。1987年被列入世界遗产名录。目前建有周口店遗址博物馆和遗址公园。'
                    ]},
                    {title:'城市概况',items:[
                        '北京，简称"京"，古称燕京、京城、大都等，是中华人民共和国首都，全国政治中心、文化中心、国际交往中心、科技创新中心。面积16410.54平方公里，下辖16个区，常住人口约2189万。北京是中国四大古都之一，拥有3000多年建城史、870年建都史。是全球拥有世界文化遗产最多的城市之一。',
                        '北京是中国历史文化名城，元、明、清三朝都城所在地。金朝海陵王于1153年迁都中都，开启北京作为国都的历史。1271年忽必烈改国号为元，定都大都。1403年朱棣改北平为北京，1420年迁都于此。1949年中华人民共和国成立，北京成为首都。北京中轴线是城市灵魂，全长7.8公里。',
                        '北京属温带季风气候，四季分明。春季干燥多风，夏季高温多雨，秋季天高气爽，冬季寒冷干燥。年平均气温12.8℃，年降水量约600毫米。最佳旅游季节为春秋两季。春季可赏花（玉渊潭樱花、颐和园桃花），秋季可赏红叶（香山、八达岭）。',
                        '北京话属于北方方言中的北京官话，语音特点鲜明：儿化音丰富，轻声多，语调抑扬顿挫。"您"是北京的敬称，"您呐"表示客气，"得嘞"表示答应。北京人说话讲究礼数，见面问好是基本礼貌。北京方言词汇丰富，如"局气"（仗义）、"磁器"（关系好）、"发小儿"（从小一起长大的朋友）等。',
                        '北京是中国教育最发达的城市之一，拥有92所普通高校，包括北京大学、清华大学、中国人民大学等顶尖学府。清华大学和北京大学是中国最著名的高等学府，每年吸引大量优秀学生报考。中关村是中国第一个国家级高新技术产业开发区，被誉为"中国硅谷"，聚集了大量高新技术企业和科研机构。',
                        '北京是中国的国际交往中心，驻华使馆、国际组织总部云集。朝阳区三里屯、顺义区等是外国人聚居区。北京奥运会（2008年）和北京冬奥会（2022年）成功举办，使北京成为全球首个"双奥之城"。鸟巢、水立方、国家体育场等奥运场馆成为城市新地标。国家会议中心、雁栖湖等地承办了大量国际会议。',
                        '北京交通网络发达，拥有两个大型国际机场：北京首都国际机场和大兴国际机场。首都国际机场是全球最繁忙的机场之一，大兴国际机场是全球最大的单体航站楼。北京地铁运营里程居全国前列，票价实惠。出租汽车、网约车、共享单车等多种出行方式并存。京沪、京津城际高铁使出行更加便捷。',
                        '北京是中国的文化中心，国家大剧院、故宫博物院、国家博物馆、中国美术馆等文化设施一流。北京人民艺术剧院是国家顶级话剧院，京剧、评剧、相声等艺术形式繁荣发展。798艺术区、宋庄艺术区是当代艺术聚集地。北京每年举办国际音乐节、国际电影节等重大文化活动。'
                    ]},
                    {title:'特色美食',items:[
                        '北京烤鸭是中国十大名菜之首，被誉为"天下美味"。历史可追溯至明朝，有600余年历史。分为挂炉烤鸭（全聚德代表）和焖炉烤鸭（便宜坊代表）两大流派。挂炉烤鸭以果木明火烤制，皮脆肉嫩；焖炉烤鸭不见明火，外脆里嫩。吃法讲究：鸭皮蘸白糖、荷叶饼卷葱丝黄瓜条。一只烤鸭约需50分钟烤制。',
                        '京剧是中国的国粹，起源于1790年四大徽班进京，与汉调、昆曲等融合而成。2006年被列入首批国家级非物质文化遗产名录，2010年被列入人类非物质文化遗产代表作名录。京剧表演唱念做打兼备，手眼身法步讲究。代表剧目有《霸王别姬》《贵妃醉酒》《空城计》等。梅兰芳是享誉世界的京剧艺术大师。',
                        '北京胡同是老北京特有的民居形式，承载着600年城市记忆。胡同名称多样：以官员命名（如俸俸禄胡同等）、以市场命名（如金鱼胡同等）、以形状命名（如九道弯胡同等）。有"有名的胡同三千六，没名的胡同赛牛毛"之说。著名胡同有南锣鼓巷、五道营胡同、砖塔胡同、史家胡同等。胡同文化是北京文化的缩影。',
                        '北京小吃历史悠久，代表品种包括豆汁儿、焦圈、卤煮、爆肚、炒肝、艾窝窝、驴打滚、蜜麻花等。豆汁儿是绿豆粉条沉淀后发酵而成，味道独特，是老北京人的最爱。护国寺小吃、隆福寺小吃是品尝北京小吃的著名去处。牛街是清真小吃集中地，羊肉串、爆肚、涮羊肉味道正宗。',
                        '北京涮羊肉选用内蒙古羔羊肉，肉质鲜嫩。以铜锅炭火清汤为特色，保持羊肉原味。蘸料以麻酱为主，配以韭菜花、酱豆腐、葱花、香菜等。代表店铺有东来顺、聚宝源等。讲究"肉片薄如纸，撒在盘子上能透出字来"。冬日里一家人围坐涮锅，热气腾腾，是北京人最温暖的记忆。',
                        '北京烤鸭技艺2008年被列入国家级非物质文化遗产名录。全聚德挂炉烤鸭技艺和便宜坊焖炉烤鸭技艺各具特色。全聚德选用果木（枣木、梨木）为燃料，烤制50分钟。片鸭讲究"108片"，每片带皮带肉。鸭架可熬汤，物尽其用。烤鸭已成为北京递给世界的一张美食名片。',
                        '北京小吃中的炸酱面是家常美食代表。手擀面煮熟过水，浇上黄酱炒制的炸酱，配以八种菜码（黄瓜丝、豆芽、芹菜丁等）。炸酱要用五花肉，慢火熬制数小时。代表店铺有海碗居、四季民福等。老北京人讲究"头碗面敬祖"，炸酱面承载着北京人的乡愁记忆。',
                        '北京饮品文化独特，豆汁儿配焦圈是经典搭配。豆汁儿历史悠久，是绿豆淀粉的副产品，经发酵后酸中带甜。外地人初尝往往不适应，但老北京人视为珍馐。此外，大碗茶、酸梅汤、桂花酸枣糕等也是北京传统饮品。茉莉花茶是老北京人的最爱，"小枣切糕配碗茶"是老北京的生活写照。'
                    ]},
                    {title:'传统节日',items:[
                        '老北京春节俗称"过年"，从腊月初八开始持续到正月十五。腊八节喝腊八粥、泡腊八蒜是传统。腊月二十三祭灶王，买关东糖祭拜后烧掉旧灶王像，寓意送灶王上天述职。除夕守岁，灯火通明，合家团聚吃年夜饭，饺子是必备食品。初一开始拜年走亲访友，互相道贺"恭喜发财"。',
                        '北京庙会是春节期间最重要的民俗活动。地坛庙会、龙潭庙会，白云观庙会、厂甸庙会并称"北京四大庙会"。庙会上有踩高跷、舞狮舞龙、杂技表演、曲艺演出等。琳琅满目的年货、传统小吃、手工艺品令人目不暇接。厂甸庙会以书市和文房四宝著称，地坛庙会以祭地表演闻名。',
                        '正月初五俗称"破五"，是送穷迎财的日子。商家多选此日开市，张灯结彩迎接财神。普通人家吃饺子"捏小人嘴"，寓意规避谗言。初五过后，春节期间的诸多禁忌即可解除，生活恢复正常。旧时北京人在初五零点放鞭炮，名为"崩穷"。',
                        '元宵节（正月十五）是春节的压轴大戏，北京人称为"灯节"。各处张灯结彩，尤以前门大街、琉璃厂、五道庙最为热闹。猜灯谜是传统活动，"灯谜"又称"文虎"。老北京人这天要吃元宵（汤圆），取"团圆"之意。儿童提着自制的灯笼走街串巷欢度佳节。',
                        '清明节北京人有扫墓祭祖的传统。旧时清明时节踏青赏花，北海公园、颐和园、香山等处游人如织。寒食节禁火冷食的习俗虽已淡化，但吃寒食、踏青的遗风仍在。胡同里孩子们放风筝也是清明时节的传统游戏。菊花、梅花是清明祭扫常用花卉。',
                        '端午节北京习俗丰富。门上贴钟馗像，挂艾叶菖蒲，贴葫芦符以辟邪驱毒。小孩子佩戴五彩丝线"长命缕"，穿绣有五毒的兜兜。用雄黄酒涂抹额头、鼻孔以防蛇虫。吃粽子是南方传来的习俗，但北京人更爱吃江米小枣粽子。现在北京端午节最热闹的地方是北海公园、龙潭湖等地。',
                        '中秋节是北京人非常重视的传统节日。祭月拜月是重要仪式，月饼和团圆饭是节日必备。老北京人讲究"男不拜月，女不祭灶"。供月要在庭院或阳台设案，摆上月饼、水果、毛豆等。兔儿爷是北京中秋节的特色玩具和祭品，中秋前几天大街小巷都有卖兔儿爷的摊子。',
                        '重阳节（九月九日）北京人有登高赏秋的习俗。景山公园、北海公园、香山都是登高好去处。旧时文人墨客多于此时聚会赋诗。赏菊花是老北京重阳节的另一雅事，北海公园、陶然亭公园菊花展历史悠久。吃花糕是节日食品，"糕"与"高"谐音，寓意"步步高升"。'
                    ]},
                    {title:'旅游攻略',items:[
                        '北京五日深度游推荐：第一天游览天安门广场、故宫（建议从午门进、神武门出，下午逛景山公园俯瞰故宫全景）；第二天八达岭长城（早起出发，晚返回后夜游什刹海）；第三天颐和园（建议从东宫门进游览长廊、佛香阁，乘船游昆明湖）；第四天天坛、前门大街（傍晚逛大栅栏，晚上听一场京剧）；第五天雍和宫、国子监、南锣鼓巷胡同游。',
                        '故宫游览建议提前7天在故宫博物院官网预约门票，每日8万人限额。珍宝馆和钟表馆需单独购票（10元/人）。建议租借导览器或使用微信讲解。最佳游览路线为中轴线三大殿+内廷六宫，至少需要4小时。故宫文创产品丰富，冰窖餐厅可品尝御膳。开放时间：8:30-17:00（16:00停止入院），周一闭馆。',
                        '长城游览可选择八达岭（最经典、交通便利）或慕田峪（景色秀丽、人少清净）。八达岭可乘坐919路公交车或市郊铁路S2线。缆车单程100元/人，往返140元。建议穿舒适运动鞋，带足饮用水。春秋两季最佳，夏季做好防晒。司马台长城是唯一保留明长城原貌的段落，适合探险爱好者。',
                        '北京美食攻略：烤鸭首选全聚德（大栅栏店是老字号）、四季民福（性价比高）；涮羊肉去聚宝源（牛街店）；炸酱面推荐海碗居；小吃去护国寺小吃总店或隆福寺；豆汁儿去尹三豆汁；南锣鼓巷美食多但价格偏高；簋街是夜宵天堂，胡大饭馆的小龙虾远近闻名。',
                        '北京交通建议：地铁是最便捷的出行方式，票价2-10元，可购买一日卡或使用北京一卡通。出租汽车起步价13元/3公里。网约车滴滴、高德等平台均可使用。北京景点间距离较远，建议合理规划路线避免浪费时间。早晚高峰（7-9点、17-20点）交通拥堵，建议错峰出行。',
                        '胡同游推荐线路：南锣鼓巷→菊儿胡同→雨儿胡同（齐白石故居）→帽儿胡同（婉容故居）→什刹海。也可选择五道营胡同→方家胡同→国子监街→雍和宫。胡同游可步行或骑自行车，ofo、摩拜等共享单车很方便。深度体验可参加胡同三轮车游，师傅会沿途讲解胡同文化。',
                        '北京博物馆推荐免费参观：中国国家博物馆（需预约）、首都博物馆（需预约）、中国人民革命军事博物馆。周二至周日开放。周三、周六晚上国家博物馆有延时开放。建议提前在官方公众号预约。重点推荐故宫博物院珍宝馆（钟表馆另收费），提前买票避免排队。798艺术区适合文艺青年。',
                        '北京旅游注意事项：故宫每周一闭馆，节假日除外；天坛公园祈年殿等景点下午5点关闭；长城四季温差大，冬季注意保暖；天安门广场观看升旗需早起，提前查好当日升旗时间；北京夏季炎热多雨，春秋季最佳；胡同游谨防"黑导游"和天价纪念品；景区周边购物需谨慎。'
                    ]}

天津:{
region:'华北',
official:{site:'https://whly.tjcac.org.cn',notice:'关注天津市文化和旅游局官网',policy:'无特殊限制'},
extra:[
{title:'世界遗产与重要景区',items:[
'天津古文化街：位于南开区，是天津最著名的旅游景点之一，国家5A级景区。街内有天后宫、玉皇阁等历史建筑，聚集了众多老字号店铺，是津门文化的缩影',
'天津之眼：位于红桥区，是世界上唯一建在桥上的摩天轮，高120米。乘坐可俯瞰海河两岸风光，是天津的地标性建筑',
'五大道：位于和平区，是天津保存最完整的历史街区。汇集了英、法、意、德、西班牙等国建筑风格，被誉为"万国建筑博览会"',
'盘山风景区：位于蓟州区，国家5A级景区。乾隆皇帝曾感叹"早知有盘山，何必下江南"，自然风光秀美，人文景观丰富',
'黄崖关长城：位于蓟州区，是明代长城的重要组成部分。关城设计独特，有"八卦关"之称，戚继光曾在此镇守',
'瓷房子：位于和平区，是一座用多件古董装修而成的法式洋楼。用古代瓷片装饰，价值连城，是天津网红打卡地',
'滨海航母主题公园：以基辅号航空母舰为核心，集航母观光、武备展示、演出于一体，是军事爱好者的乐园',
'天津海河夜景：海河是天津的母亲河，夜色中的海河两岸灯火辉煌，解放桥、大沽桥开启表演令人震撼'
]},
{title:'省份概况',items:[
'地理位置：天津位于华北平原东北部、海河流域下游，东临渤海，北依燕山。地处海河五大支流汇合处，是华北地区重要的港口城市',
'面积人口：总面积1.19万平方公里，2024年末常住人口约1390万人。辖16个区，是中国人口最多的直辖市',
'历史沿革：天津古为退海之地，金朝设直沽寨，元朝设海津镇。明永乐二年（1404年）筑城设卫，故名"天津"。1860年后开埠通商',
'地形气候：地势以平原为主，北部有低山丘陵。属暖温带半湿润大陆性季风气候，四季分明，年均气温约13摄氏度',
'经济特色：天津是中国北方最大的港口城市，2024年GDP约1.6万亿元。以先进制造业、现代服务业为主导',
'文化特色：天津是曲艺之乡，相声、快板、评书等曲艺形式在这里发展繁荣。"天津话"幽默风趣',
'教育资源：天津高校众多，南开大学、天津大学是全国知名高等学府',
'交通枢纽：天津港是北方最大综合性港口，滨海国际机场连接国内外主要城市'
]},
{title:'特色美食',items:[
'狗不理包子：天津传统名吃，始创于1858年。皮薄馅大、鲜香可口，有"津门三绝"之首之称',
'耳朵眼炸糕：天津"三绝"之一，因店铺位于耳朵眼胡同而得名。糯米为皮、豆沙为馅，炸制金黄，外酥里嫩',
'十八街麻花：天津"三绝"之一，以酥脆香甜著称。桂发祥麻花最为著名',
'煎饼果子：天津人的日常早餐，绿豆面摊饼，裹以油条或薄脆，抹上面酱、辣酱',
'锅巴菜：天津独有小吃，绿豆煎饼切条，浇上卤汁，配以香菜、辣油',
'八大碗：天津传统宴席菜式，包括扒、焗、烩等技法制作的八道菜肴',
'贴饽饽熬小鱼：农家风味，玉米面贴饼子配杂鱼炖制',
'爆三样：天津清真名菜，猪肚、羊心、腰子爆炒而成'
]},
{title:'传统节日',items:[
'天津古文化街天后宫庙会：每年农历三月二十三举办，是妈祖文化的重要活动',
'天津杨柳青国际木版年画节：展示杨柳青年画的盛会',
'天津相声节：汇集全国相声名家，传承曲艺文化',
'天津妈祖文化旅游节：每年在滨海新区举办',
'天津啤酒节：夏季在各区举办消夏活动',
'天津温泉旅游节：冬季温泉养生主题活动'
]},
{title:'旅游攻略',items:[
'最佳时间：4月至10月，春季可赏桃花梨花',
'经典线路：古文化街→天津之眼→意式风情街→五大道',
'交通：滨海机场、津滨高铁，市内地铁网络发达',
'美食：南市食品街汇集天津各色小吃'
]}
]

河北:{
region:'华北',
official:{site:'https://hbtc.hebei.gov.cn',notice:'关注河北省文化和旅游厅官网',policy:'无特殊限制'},
extra:[
{title:'世界遗产与重要景区',items:[
'承德避暑山庄及周围寺庙：1994年列入世界文化遗产，位于承德市，是清代皇帝夏日避暑和处理政务的场所。占地564万平方米，由宫殿区和苑景区组成，是世界现存最大的皇家园林。山庄分宫殿区、湖泊区、平原区、山峦区四部分',
'长城（河北段）：河北是长城途经距离最长、保存最完整、建筑最雄伟的省份之一。山海关"天下第一关"、金山岭长城、角山长城等构成完整的军事防御体系，1987年随长城整体列入世界文化遗产',
'清东陵：2000年列入世界文化遗产，位于唐山市遵化市。是清朝皇室陵墓建筑群，埋葬顺治、康熙、乾隆等5位皇帝及150多位妃嫔。陵寝布局严谨、建筑宏伟，石雕艺术精湛',
'清西陵：2000年列入世界文化遗产，位于保定市易县。是清代帝王陵寝建筑群中最具代表性的部分，建有泰陵、昌西陵、慕陵、崇陵等14座陵寝，陵寝建筑类型齐全、保存完整',
'白洋淀：河北省第一大内陆湖，总面积366平方公里，位于保定市安新县。淀内沟渠纵横、芦苇茂密、荷花飘香，是华北地区最大的淡水湖泊，素有"华北明珠"之称',
'西柏坡：位于石家庄市平山县，是中国共产党进入北京前最后一个农村指挥所。党中央、毛主席在此指挥了辽沈、淮海、平津三大战役，召开了具有历史意义的七届二中全会',
'野三坡：位于保定市涞水县太行山与燕山交汇处，以"雄、险、奇、幽"著称。百里峡、鱼谷洞、白草畔等景区集山水洞林于一体，被誉为"世外桃源"',
'秦皇岛山海关：明长城东北关隘之首，始建于明洪武十四年（1381年）。关城周长约4公里，有"天下第一关"箭楼、老龙头等主要景点，以"边郡之咽喉、京师之保障"闻名'
]},
{title:'省份概况',items:[
'地理位置：河北省位于华北平原东部，东临渤海、内环京津，西依太行山与山西相邻，北接燕山与内蒙古、辽宁交界，南接河南、山东。总面积18.88万平方公里，海岸线长487公里',
'面积人口：总面积18.88万平方公里，2024年末常住人口约7443万人。辖11个设区市，省会石家庄市人口约1123万，是全省政治、经济、文化中心',
'地形气候：地势西北高、东南低，由西北向东南倾斜。西北部为山地，中部为平原，东南部为渤海沿岸平原。属温带大陆性季风气候，四季分明，年均气温约12摄氏度',
'历史沿革：河北古属幽州、冀州，是华夏文明的重要发祥地之一。泥河湾古人类遗址、燕赵大地见证了中华民族的起源。历史上燕赵大地英雄辈出，留下无数千古佳话',
'文物古迹：河北是全国文物大省，有6座国家历史文化名城（保定、承德、正定、邯郸、山海关、蔚县），不可移动文物达3万余处，各级文物保护单位1500余处',
'经济特色：2024年GDP约4.4万亿元，以钢铁、装备制造、石化、医药为主。京津冀协同发展深入推进，曹妃甸新区、雄安新区建设加速',
'交通枢纽：河北是全国交通枢纽省份，京广、京哈、京九等铁路干线纵贯南北，高速公路里程居全国前列。石家庄正定国际机场开通国内外航线',
'文化特色：河北文化底蕴深厚，燕赵文化、运河文化、长城文化交相辉映。沧州武术、吴桥杂技、蔚县剪纸等非物质文化遗产享誉全国'
]},
{title:'特色美食',items:[
'保定驴肉火烧：保定市传统名吃，以烙饼夹驴肉而闻名。选用太行驴为原料，卤制后的驴肉色泽红润、入口即化。烙饼外酥里嫩，配以软烂的驴肉，一口咬下满嘴肉香，是"保定三宝"之一',
'沧州火锅鸡：沧州市特色美食，选用当地土鸡为主料，以火锅形式呈现。鸡肉切块与酱料同炒，加入高汤炖煮，配以白菜、豆腐、粉条等涮品。口味鲜香微辣，是沧州人待客的必备佳肴',
'石家庄金毛狮子鱼：石家庄传统名菜，以鲤鱼为主料经刀工处理后呈狮子鬃毛状，再经油炸、浇汁而成。成菜色泽金黄、形似狮子，故名。造型生动、口味酸甜，是冀菜的代表',
'唐山棋子烧饼：唐山市传统小吃，因形如棋子而得名。以外酥里嫩著称，饼皮层层分离、酥脆掉渣，内馅可咸可甜。咸馅以肉末、椒盐为主，甜馅以豆沙、红糖为主',
'廊坊香河肉饼：廊坊市香河县特产，饼大如盖、薄如蝉翼。以面饼包裹猪肉馅制成，皮薄馅大、色泽金黄。入口外酥里嫩、肉香四溢，被誉为"冀菜四大家常名吃"之一',
'邯郸拽面：邯郸市传统面食，以高筋面粉为原料，经反复揉拽形成宽窄不一的面条。面条筋道爽滑，可搭配各种卤汁或浇头，是邯郸人日常喜爱的主食',
'张家口莜面窝窝：张家口地区特色美食，以莜麦面为原料制成。面团经反复揉揣后揪成小剂子，在手指上卷成筒状整齐码放入笼屉。配以羊肉蘑菇汤或酸菜汁食用，口感筋道、独具风味',
'秦皇岛海鲜：秦皇岛濒临渤海，海鲜品种丰富。皮皮虾、螃蟹、花蛤、八爪鱼等应季海鲜鲜活肥美。清蒸、油焖、辣炒等多种做法，满足不同口味需求'
]},
{title:'传统节日',items:[
'吴桥国际杂技艺术节：每两年一届在沧州市吴桥县举办，是世界最著名的杂技盛会之一。吴桥是"中国杂技之乡"，素有"没有吴桥人不成杂技班"之说。节日期间举行国际杂技展演、比赛和交流活动',
'衡水湖马拉松：每年春季在衡水市举办，环衡水湖进行，吸引国内外跑者参与。衡水湖是国家自然保护区，赛道环绕湿地景观，被誉为"最美马拉松赛道"',
'承德皇家文化节：夏季在承德避暑山庄举办，弘扬清代皇家文化。活动包括皇帝巡游表演、满族婚礼秀、清宫服饰展、皇家祭祀仪式等，游客可体验穿越时空的皇家生活',
'蔚县剪纸艺术节：每年在张家口市蔚县举办，展示世界非遗蔚县剪纸文化。蔚县剪纸以"阴刻为主、阳刻为辅"的表现手法著称，被誉为"中华民族一种美丽的符号"',
'唐山陶瓷博览会：每年在唐山市举办，展示唐山陶瓷文化。唐山是中国北方瓷都，陶瓷生产历史近600年，骨质瓷享誉世界，是日用瓷、艺术瓷的重要产区',
'西柏坡红色旅游节：每年在石家庄市平山县举办，传承红色基因。活动包括革命圣地参观、红歌演唱、红色故事宣讲等，是爱国主义教育的重要载体',
'白洋淀荷花节：夏季在保定市白洋淀景区举办，是华北地区最大的荷花观赏盛会。数十种荷花竞相绽放，游客可泛舟赏荷、品尝全鱼宴、体验渔家生活',
'廊坊国际啤酒节：每年夏季在廊坊市举办，融合啤酒文化与地方美食。活动包括啤酒品鉴、美食一条街、文艺演出等，是消夏休闲的好去处'
]},
{title:'旅游攻略',items:[
'最佳时间：4月至10月是河北最佳旅游季节。4月可赏承德避暑山庄春色，5月白洋淀荷花初绽，9至10月长城沿线秋景如画。冬季可体验西柏坡红色旅游或崇礼滑雪',
'精华线路（4至5日）：D1石家庄（西柏坡、正定古城）；D2至D3承德（避暑山庄、外八庙、棒槌山）；D4至D5秦皇岛（山海关、老龙头、鸽子窝公园）',
'草原天路之旅（2至3日）：张家口→草原天路（中国的66号公路）→闪电湖→沽源。沿途草原、林海、风车、梯田交织，是自驾和摄影爱好者的天堂',
'华北水乡游（2至3日）：雄安新区→白洋淀。泛舟芦苇荡、赏荷花、尝河鲜。白洋淀旅游码头有多条线路可选，可体验渔家乐',
'长城徒步线（3至4日）：金山岭长城→司马台长城→山海关。金山岭日出、司马台日落、山海关雄姿，各有特色，是徒步爱好者的经典路线',
'京津后花园（2至3日）：保定（古莲花池，白洋淀）→沧州（铁狮子、吴桥杂技大世界）→衡水（衡水湖）。线路紧凑，适合周末短途游',
'交通建议：石家庄正定国际机场是主要航空枢纽，高铁连接北京、天津、太原等城市。景区间建议自驾或包车，张家口至崇礼高速直达',
'美食地图：保定驴肉火烧认准"漕河"或"保定"字号；沧州火锅鸡吃"0317"或"春满疆"；唐山棋子烧饼买"九美斋"或"万里香"',
'注意事项：避暑山庄面积大建议乘观光车；白洋淀旺季人流量大需提前订票；草原天路弯道多注意安全；秦皇岛旺季住宿紧张，建议提前预订'
]}
]
questions:[
{q:'避暑山庄始建于清代哪位皇帝在位时期？',options:['顺治','康熙','雍正','乾隆'],answer:1,explain:'避暑山庄始建于康熙四十二年（1703年），历经康熙、雍正、乾隆三朝89年建成'},

山西:{
region:'华北',
official:{site:'https://www.sx.gov.cn',notice:'关注山西省文化和旅游厅官网',policy:'无特殊限制'},
extra:[
{title:'世界遗产与重要景区',items:[
'平遥古城：1997年列入世界文化遗产，是中国现存最完整的明清古城之一。古城垣周长约6公里，设有6座城门，城内保存有3797处传统民居院落，日升昌票号是中国第一家票号金融机构，创造了"汇通天下"的传奇，被誉为"中国古建筑的荟萃和晋商文化的发源地"',
'云冈石窟：2001年列入世界文化遗产，位于大同市西郊武周山南麓，依山开凿，东西绵延约1公里。现存主要洞窟45个，附属洞窟209个，造像59000余尊，以昙曜五窟最为著名。石雕造像气势恢宏、雕刻精湛，展现了公元5世纪中国佛教艺术的最高成就',
'五台山：2009年作为"中华五岳五镇"之一列入世界文化景观遗产，是中国佛教四大名山之首。文殊菩萨道场，现有寺院68座，宗教活动场所104处，保存有从东魏到清代各个时期的佛教建筑珍品，是中国佛教建筑艺术的集大成者',
'壶口瀑布：位于临汾市吉县，是黄河唯一的瀑布，也是世界上最大的黄色瀑布。瀑布宽约30米，落差约9米，汛期时可达50米，以"黄河之水天上来"的气势闻名。"十里龙槽"是河水下切形成的峡谷景观，展现了大自然的鬼斧神工',
'大同古城：位于大同市平城区，是明代九边重镇之首。城墙周长7.2公里，设四门四楼，城墙外侧建有护城河。城内的华严寺、善化寺、九龙壁等文物古迹星罗棋布，是中国古代城市规划和建筑艺术的杰出代表',
'应县木塔：全称佛宫寺释迦塔，位于朔州市应县县城西北佛宫寺内。建于辽清宁二年（1056年），为八角五层楼阁式木构建筑，高67.31米，是中国现存最古老最高的木构塔式建筑，有"天下第一塔"之称',
'皇城相府：位于晋城市阳城县，是清代文渊阁大学士陈廷敬的故居。建筑群分内城外城两部分，占地面积约10万平方米，御书楼、家训碑、中道庄等建筑依山就势、层层递进，展现了明清时期官宦府邸的建筑风范',
'雁门关：位于忻州市代县北境，是长城上的重要关隘，有"中华第一关"之称。与宁武关、偏关合称"外三关"。雁门关地势险要，是古代塞北通往中原的咽喉要道，见证了无数战争与和平'
]},
{title:'省份概况',items:[
'地理位置：山西省位于华北平原西部、黄土高原东部，因地处太行山以西而得名，简称晋。地形呈南北狭长的不规则长方形，东以太行山与河北、河南两省为界，西隔黄河与陕西相邻',
'面积人口：总面积15.67万平方公里，2024年末常住人口约3481万人。辖11个设区市，省会太原市是全省政治、经济、文化中心，人口约544万',
'地形气候：境内地形以山地、丘陵为主，东部为太行山脉，西部为吕梁山脉，中部为一系列断陷盆地。属温带大陆性季风气候，四季分明，年均气温约10摄氏度，年均降水量约500毫米',
'历史沿革：山西古属冀州、并州，是中华民族的发祥地之一。临汾丁村、芮城西侯度等古人类遗址表明早在旧石器时代就有人类活动。春秋时期晋国称霸中原，创造了灿烂的晋文化',
'晋商文化：明清时期，山西商人以经营盐业、票号著称，足迹遍布全国乃至海外。日升昌、蔚泰厚等票号开创了近代银行业雏形，"汇通天下"一时无两，形成了独特的晋商文化',
'文物大省：山西是全国文物大省，不可移动文物达5万余处，全国重点文物保护单位数量居全国第一。宋辽金以前的木构建筑占全国的75%以上，被誉为"中国古代建筑艺术博物馆"',
'煤炭经济：山西是中国重要的能源基地，煤炭产量和外运量均居全国首位。近年来加快产业转型升级，发展新能源、高端装备制造、文化旅游等新兴产业',
'交通发展：大西高铁贯通南北，太原至北京高铁约3小时。太原武宿国际机场开通国内外航线百余条，形成了较为完善的立体交通网络'
]},
{title:'特色美食',items:[
'山西刀削面：被列入山西省非物质文化遗产名录，是中式面食的代表作。面条中厚边薄、形似柳叶，入口外滑内筋、软而不黏。传统做法以猪肉或羊肉为臊子，配以山西老陈醋食用，一碗热气腾腾的刀削面承载着山西人的乡愁与记忆',
'平遥牛肉：产自晋中市平遥县，制作历史可追溯至汉代。以冠云牌最为著名，选用本地优质黄牛，经腌、煮、炖等多道工序精制而成，色泽红润、入口即化、咸淡适中，是佐餐下酒的佳品',
'大同浑源凉粉：在大同市浑源县已有数百年历史，以土豆淀粉为原料制成，口感爽滑Q弹。配以当地的莲花豆、豆腐干和特制辣椒油，酸辣可口，是夏季消暑的经典小吃',
'太谷饼：晋中市太谷区特产，是山西传统名点。饼面粘满芝麻，外皮酥脆、内瓤松软、味道香甜。相传清康熙皇帝曾品尝此饼并大加赞赏，因而又名"玉液酥"',
'晋南油酥饼：流行于运城、临汾地区，以面粉和猪油为原料，经烙制而成。饼皮层层分离、酥脆掉渣，配以椒盐或红糖为馅心，是晋南人喜爱的传统小吃',
'太原头脑：是太原独有的滋补药膳早餐，又名"八珍汤"。以羊肉、山药、莲藕、黄酒等为原料熬制而成，相传为傅山先生创制，具有温中健脾、滋补养身的功效',
'柳林碗托：吕梁市柳林县特产，以荞麦面为原料，蒸制成碗状。食用时切成条状，浇以辣椒油、蒜泥、香醋等调料，筋道耐嚼、酸辣爽口，是吕梁地区的代表性小吃',
'永济牛肉饺子：运城市永济市特产，以黄河滩牛肉为馅，皮薄馅大、汁多味美。饺子形状似元宝，寓意吉祥如意，是逢年过节餐桌上不可或缺的美食'
]},
{title:'传统节日',items:[
'晋祠庙会：每年农历七月初二在太原市晋祠举办，是纪念晋祠圣母邑姜的传统盛会。庙会期间举行晋剧表演、民间社火、特色小吃展销等活动，热闹非凡，可追溯至宋代',
'平遥中国年：春节期间在平遥古城举办，传承明清时期过年习俗。贴春联、挂灯笼、点旺火、唱大戏，游客可体验推镖车、坐花轿、拜大年等传统民俗，感受晋商大院里的年味',
'大同云冈石窟文化旅游节：每年夏季举办，展示云冈石窟的历史文化内涵。活动包括石窟艺术论坛、非遗展演、美食品鉴等，是了解北魏文化的重要窗口',
'五台山国际文化旅游月：每年7至8月在五台山举办，弘扬佛教文化。期间举行佛事法会、武僧表演、禅茶一味等体验活动，吸引众多国内外游客和佛教信众',
'洪洞大槐树寻根祭祖节：每年清明节在临汾市洪洞县举办，传承移民文化。民间有"问我祖先在何处，山西洪洞大槐树"的说法，来自海内外的华人后裔齐聚大槐树下祭祖寻根',
'晋中社火节：正月期间在晋中市各区县举行，是山西规模最大的传统社火活动。高跷、旱船、背棍、铁棍等传统表演形式丰富多彩，展现了三晋儿女的热情与智慧',
'运城关帝庙会：每年农历四月八在运城市解州镇关帝庙举行，是纪念关羽的文化盛会。庙会包括祭祀仪式、武术表演、戏剧演出等，弘扬关公文化',
'忻州摔跤节：忻州是"摔跤之乡"，摔跤是当地传统体育活动。每逢节庆都会举行摔跤比赛，吸引周边地区选手参加，展现了山西汉子的豪迈气概'
]},
{title:'旅游攻略',items:[
'最佳时间：4月至10月是山西最佳旅游季节，4月可赏晋祠牡丹，5月平遥古城春意盎然，9至10月五台山秋色宜人。冬季虽冷但可体验山西年俗、泡温泉',
'经典线路：建议安排5至7天——D1太原（晋祠、永祚寺双塔）；D2至D3大同（云冈石窟、华严寺、九龙壁）；D4至D5五台山（寺庙群、黛螺顶）；D6平遥古城深度游；D7临汾（壶口瀑布、洪洞大槐树）',
'晋北精华线：太原→代县雁门关→应县木塔→大同云冈石窟→浑源悬空寺。这条线路集中展示了北魏文化、边塞文化和古建艺术，建议安排3至4天',
'晋商文化线：太原→祁县乔家大院→平遥古城→太谷三多堂→灵石王家大院。这条线路串联晋商豪宅和票号遗址，是了解晋商文化的最佳选择',
'太原深度游：晋祠是必去景点，建议听讲解了解三晋文化；永祚寺双塔是太原地标；食品街品尝当地小吃；山西博物院免费开放，周二至周日9至17时',
'交通建议：太原武宿机场连接国内外主要城市，大西高铁纵贯南北。景区间建议包车或跟团，各景点较为分散，自驾需注意山区道路安全',
'美食地图：太原食品街汇集各类小吃；大同凤临阁是百年老店，浑源凉粉不可错过；平遥古城内牛肉和碗托最地道；运城永济牛肉饺子值得专程品尝',
'注意事项：五台山景区温差大需备外套；云冈石窟参观建议预约讲解；平遥古城内步行最佳，停车不便；山西面食种类繁多，可放心品尝'
]}
]

内蒙古:{
region:'华北',
official:{site:'https://whlyw.nmg.gov.cn',notice:'关注内蒙古自治区文化和旅游厅官网',policy:'无特殊限制'},
extra:[
{title:'世界遗产与重要景区',items:[
'呼伦贝尔大草原：世界四大草原之一，位于内蒙古东北部，面积约10万平方公里。草原辽阔无垠，莫日格勒河蜿蜒其中被誉为"天下第一曲水"。夏季绿草如茵、野花遍野，冬季银装素裹，是体验蒙古族游牧文化的绝佳目的地',
'元上都遗址：2012年列入世界文化遗产，位于锡林郭勒盟正蓝旗。是元朝陪都，忽必烈在此登基称帝。遗址包括宫城、皇城、外城，保存有完整的城市布局和建筑遗迹，见证了草原文明与农耕文明的交融',
'成吉思汗陵：位于鄂尔多斯市伊金霍洛旗，是蒙古族供奉和祭祀成吉思汗的圣地。陵园占地约5.5平方公里，由苏勒德祭坛、祭祀大殿、成吉思汗铜像等组成。每年春祭大典吸引八方牧民汇聚，缅怀一代天骄的丰功伟绩',
'响沙湾：位于鄂尔多斯市达拉特旗，是中国首家沙漠休闲度假中心。沙丘高110米、宽400米，细沙干燥时会发出"响声"故名"响沙"。游客可体验骑骆驼、沙漠越野、滑沙冲浪等项目，被誉为"沙漠中的迪士尼"',
'阿尔山：位于兴安盟阿尔山市，是世界地质公园。火山与森林共生，天池如蓝宝石镶嵌林中，石塘林奇崛壮观，三潭峡幽深静谧。温泉资源丰富，被誉为"东方小瑞士"',
'额济纳胡杨林：位于阿拉善盟额济纳旗，是世界三大胡杨林之一。每年金秋十月，胡杨林一片金黄，与蓝天碧水交相辉映。"生而千年不死，死而千年不倒，倒而千年不朽"的三千年胡杨精神令人震撼',
'呼伦湖：内蒙古第一大湖，位于呼伦贝尔大草原西部。水域面积达2339平方公里，有"草原明珠"之称。湖畔水草丰美，是候鸟迁徙的重要栖息地，可体验湖边垂钓、沙滩嬉戏',
'乌兰布统草原：位于赤峰市克什克腾旗，是清代皇家猎场。以其优美的欧式草原风光著称，是摄影家的天堂。《还珠格格》《康熙王朝》等多部影视作品在此取景拍摄'
]},
{title:'省份概况',items:[
'地理位置：内蒙古自治区位于中国北部边疆，横跨东北、华北、西北三大区域，东、南、西依次与黑、吉、辽、冀、晋、陕、宁、甘8省区相邻，北与蒙古国和俄罗斯接壤，边境线长4200余公里',
'面积人口：总面积118.3万平方公里，是中国第三大省级行政区。2024年末常住人口约2396万人，下辖9个地级市、3个盟，首府呼和浩特市',
'地形气候：地域狭长，地形以高原为主，大部分地区海拔在1000米以上。属温带大陆性季风气候，四季分明，冬季寒冷漫长，夏季短促凉爽，日照充足，昼夜温差大',
'民族构成：以蒙古族为主体，汉族占多数，还有达斡尔、鄂温克、鄂伦春、回、满等49个民族。蒙古族约占总人口的17%，是中国最早实行民族区域自治的省级行政区',
'历史沿革：内蒙古是中华文明的发祥地之一，红山文化C形玉龙被誉为"中华第一龙"。历史上匈奴、鲜卑、突厥、契丹、蒙古等民族先后在此繁衍生息，创造了灿烂的草原文明',
'草原文化：蒙古族是草原文化的主要传承者，创造了独特的游牧文明。蒙古族长调、呼麦、马头琴、那达慕等16项非遗列入联合国教科文组织名录，被誉为"非遗之冠"',
'资源富集：内蒙古是中国重要的能源和畜牧业基地。煤炭储量居全国第一，风能、太阳能资源丰富，稀土储量占全国80%以上，羊绒产量占全国一半以上',
'经济发展：2024年地区生产总值约2.4万亿元，以能源、化工、冶金、农畜产品加工为支柱产业，正加快新能源产业发展，建设国家重要能源和战略资源基地'
]},
{title:'特色美食',items:[
'烤全羊：蒙古族待客的最高礼遇，选用2至3岁的草原散养羊，经腌制后挂炉慢火烤制数小时。成品色泽金黄油亮，皮酥肉嫩、肥而不腻。食用前举行隆重的开羊仪式，是草原盛宴的压轴大菜',
'手把肉：蒙古族传统美食，选用草原羊肉清水煮制，最大程度保留肉的原汁原味。食用时用手直接抓着吃，配以蒜蓉、韭菜花、椒盐等蘸料，肉质鲜嫩清香、不膻不腻',
'蒙古奶茶：蒙古族日常生活中不可或缺的饮品，以砖茶和鲜牛奶熬制而成。呈淡黄色，咸香醇厚，回味悠长。食用时加入炒米、奶豆腐、奶皮子、油果子等配料，是草原牧民待客的首选饮品',
'涮羊肉：以内蒙古优质羊肉为原料，切成薄如纸张的肉片，入沸水即熟。蘸以芝麻酱、韭菜花、辣椒油等调料，肉质鲜嫩无比。呼和浩特"涮羊肉一条街"汇集了众多老字号店铺',
'蒙古馅饼：蒙古族传统面食，以烫面为皮，包裹牛羊肉馅制成。饼皮薄如蝉翼，可透出馅料颜色，烙制后外酥里嫩、鲜香可口。相传起源于蒙古帝国时期，是草原牧民征战时的军粮',
'马奶酒：蒙古语称"策格"，以马奶为原料经发酵酿制而成。酒精度数较低，约10至15度，入口微酸、回味甘甜。蒙古族传统上视其为珍贵饮品，常用于祭祀和招待贵宾',
'蒙古包子：又称"布和"，以死面为皮、牛羊肉为馅。皮薄馅大、褶子细密，蒸制后汤汁丰富、鲜香四溢。呼伦贝尔的布里亚特包子最为著名，皮面柔软、馅心鲜香',
'蒙古奶酪：牧民日常喜爱的奶制品，以牛奶或羊奶为原料经发酵凝固制成。呈乳白色或淡黄色，口感酸甜、奶香浓郁。风干奶酪便于储存携带，是草原游牧生活中的理想食品'
]},
{title:'传统节日',items:[
'那达慕大会：蒙古族最隆重的传统节日，"那达慕"意为"娱乐、游戏"。每年夏季或金秋在草原上举行，内容包括摔跤、赛马、射箭"男儿三艺"，还有文艺演出、物资交流等。游客可体验马队迎接、下马酒献哈达等蒙古族礼仪',
'祭敖包：蒙古族古老的祭祀活动，"敖包"是草原上堆砌的石堆，象征山神和祖先。每年农历五月十三举行祭敖包仪式，牧民身着盛装前来祈福，祭祀仪式后举行赛马、摔跤等活动',
'白月节：蒙古族新年，日期与藏历新年相同。节日期间人们穿新衣、拜年、祭祖先、吃手把肉，举行祭火仪式。蒙古族认为火能驱散一切邪祟，祭火是迎接新年的重要仪式',
'马奶节：每年农历八月末举行，是蒙古族庆祝丰收的节日。节日期间举行赛马、挤马奶、品尝马奶酒等活动。蒙古族认为马奶酒能强身健体、延年益寿',
'中俄蒙三国旅游节：满洲里市定期举办，融合中俄蒙三国文化元素。活动包括国际选美、文艺演出、经贸洽谈等，展现边境城市的多元文化魅力',
'昭君文化节：每年8月在呼和浩特市昭君墓景区举行，纪念王昭君出塞和亲的历史功绩。活动包括昭君祭典、文艺演出、民俗展示等，促进民族团结',
'蒙古族服装服饰艺术节：展示蒙古族传统服饰文化的盛会。各盟市代表队身着精美蒙古袍，进行服饰展演和比赛，展现蒙古族服饰的多样性和艺术性',
'敖鲁古雅使鹿部落文化节：根河市举办，展示鄂温克族驯鹿文化。游客可近距离接触驯鹿，体验桦树皮船制作、鄂温克传统歌舞等活动'
]},
{title:'旅游攻略',items:[
'最佳时间：6月至9月是内蒙古旅游黄金季节，7至8月草原水草丰美、气候宜人。9月中旬至10月上旬可赏额济纳胡杨林金色秋景。冬季可体验冰雪那达慕、林海雪原',
'呼伦贝尔环线（5至7日）：海拉尔→莫日格勒河→额尔古纳湿地→恩和→临江→漠河北极村。穿越大兴安岭、边境草原，欣赏湿地、森林、界河风光，体验俄罗斯族和蒙古族民俗',
'锡林郭勒草原深度游（3至4日）：锡林浩特→平顶山→贝子庙→元上都遗址。探访草原深处的蒙古族牧民家，体验骑马、挤牛奶、制作奶食品',
'沙漠探险线（2至3日）：呼和浩特→鄂尔多斯响沙湾→成吉思汗陵。体验沙漠驼队、滑沙冲浪，拜谒一代天骄陵寝',
'阿尔山森林之旅（3至4日）：阿尔山市→阿尔山国家森林公园（天池→三潭峡→石塘林→杜鹃湖）。火山地貌与森林景观交相辉映，秋色尤其壮观',
'边境风情线（3至4日）：满洲里→呼伦湖→中俄边境。游览国门、套娃广场，体验俄罗斯族民俗，品尝俄式西餐',
'交通建议：呼和浩特白塔机场是主要航空枢纽，区内航班连接各盟市。火车覆盖主要城市，建议包车或自驾，景点分散且距离较远',
'美食指南：手把肉、烤全羊是必尝美食，呼伦贝尔的布里亚特包子、蒙古奶茶地道正宗。蒙古族饮食以肉食为主，可备消食片',
'注意事项：草原昼夜温差大，即使夏季也需带外套；防晒霜、墨镜必备；蒙古族待客有下马酒，量力而行；尊重民族习俗，进入蒙古包要脱帽'
]}
]

extra:[
{title:"世界遗产与重要景区",items:["武当山古建筑群（位于十堰市丹江口境内，是中国道教名山和武当武术的发源地，1994年被联合国教科文组织列入世界文化遗产名录。永乐年间动用20万军民历时12年建成9宫9观36庵堂等宏大建筑群，绵延140余里，汇集唐宋元明清五朝建筑精华，被称为中国古代宗教建筑的奇迹和建筑成就博物馆）","明显陵（位于荆门市钟祥市，是明代嘉靖皇帝朱厚熜为其生父兴献王朱祐杬所建的陵寝，始建于1519年，历时47年方才完工，是明代帝陵中规模最大、保存最完整的单体帝王陵墓建筑群，其一陵两冢的特殊规制在中国历代帝陵中独一无二，2000年入列世界文化遗产）","神农架（2016年以优异成绩入选世界自然遗产，是全球中纬度地区保存最完好的亚热带森林生态系统，被誉为北纬31度的绿色奇迹。拥有珙桐、银杏等珍稀植物和川金丝猴、白鹳等濒危动物，最高峰神农顶海拔3106.2米，有华中屋脊之称，森林覆盖率超过91%，空气中负氧离子含量极高）","武汉黄鹤楼（江南三大名楼之一，始建于三国时期吴黄武年间，因唐代诗人崔颢题诗《黄鹤楼》而名扬天下，有天下江山第一楼之誉。历代屡毁屡建，现楼为1985年在原址重建，采用清代同治年间形制，为五层攒尖顶仿木结构钢筋混凝土仿古建筑，高51.4米，黄色琉璃瓦覆顶，气势恢宏）","宜昌三峡大坝（位于宜昌市境内的西陵峡中段，是当今世界上规模最大的水利发电工程，也是长江三峡旅游的核心景点。坝体为混凝土重力坝，全长2309米、最大坝高181米，正常蓄水位175米，总库容393亿立方米，集防洪、发电、航运、水资源综合利用于一体，大国重器当之无愧）","武汉东湖生态旅游风景区（国家5A级景区，水域面积约33平方公里，是杭州西湖的6倍，为中国最大城中湖。景区由听涛、磨山、落雁、吹笛四大景区组成，听涛景区有屈原纪念馆，磨山景区有楚风建筑和樱园，东湖樱园与武汉大学樱花齐名，春季樱花盛开时蔚为壮观，年接待游客超2000万人次）","襄阳古隆中（位于襄阳市襄城区，为诸葛亮隐居躬耕、刘备三顾茅庐的历史发生地，保留有武侯祠、三顾堂、草庐亭、躬耕田等历史遗迹四十余处，是三国文化的源头，被誉为卧龙出山之地，隆中风景名胜区为国家AAAA级旅游景区，是湖北三国文化旅游的核心目的地）","恩施大峡谷（国家5A级景区，位于恩施市沐抚办事处，被专家评为全球最长、世界最美的峡谷之一，恩施大峡谷拥有清江升白云、绝壁环峰丛、天坑接天缝、地缝接飞瀑等奇观，峡谷全长108公里，以雄奇险峻秀著称，是喀斯特地貌的天然博物馆云龙河地缝被《中国国家地理》评为中国最美喀斯特峡谷）"]},
{title:"省份概况",items:["地理位置：湖北省位于中国中部、长江中游，因位于洞庭湖以北而得名，简称鄂。地处中国地势第二级阶梯向第三级阶梯的过渡地带，省域地势呈三面高、中间低的马蹄形特征。省域东西长约740公里，南北宽约470公里，东邻安徽，西连重庆，西北与陕西接壤，南接江西、湖南，北与河南毗邻）","面积人口：湖北省总面积18.59万平方公里，约占全国陆地面积的1.94%。2024年末常住人口约5834万人（较2020年六普数据有所减少），城镇化率约65.5%。省会武汉市常住人口约1377万人，是中部地区唯一的副省级城市和国家中心城市，也是长江经济带核心城市之一）","历史地位：湖北是荆楚文化的发祥地，春秋战国时期楚国在此创造了灿烂的青铜文明，灿烂辉煌800年，曾侯乙编钟、越王勾践剑等出土文物震惊世界。三国文化在此留下大量遗迹，宜昌是屈原故里，荆州是楚文化中心，武汉是辛亥革命首义之地，宜昌是王昭君故里，历史文化积淀极为深厚）","气候特点：属亚热带季风气候，具有南北过渡性特征，夏热冬冷、四季分明、春暖秋爽、雨热同季、时空不均。年平均气温约16.7摄氏度，1月均温3至5摄氏度，7月均温26至29.5摄氏度。年均降水量约1200毫米，呈南多北少分布，鄂西南年降水最多可达1300至1690毫米）","地形地貌：省域地势西高东低，三面环山、中部为江汉平原。北部为大别山和桐柏山，最高峰天堂寨海拔1729米；西部为巫山和武陵山，神农架主峰神农顶海拔3106.2米为华中第一峰；东南部为幕阜山脉。全省丘陵与平原相间，水系发达，长江横贯东西，汉江为其最大支流）","文化特色：荆楚文化是中华文化的重要组成部分，与中原文化、江南文化交融发展。武汉是辛亥革命首义之地，宜昌是屈原故里，荆州是国家历史文化名城，襄阳是三国文化重镇。湖北是中华武术武当派和武当武术的发源地，曾侯乙编钟、越王勾践剑等世界级文物出土于此，武汉大学、华中科技大学等高校云集）","经济状况：2024年湖北省GDP达到60012.97亿元，位列全国第七位，增长约5.8%。以武汉为龙头的光电子信息、汽车制造、生物医药等产业居全国前列，武汉都市圈是中部地区核心增长极。中国（湖北）自由贸易试验区已与180余个国家和地区开展贸易往来，外向型经济活力充沛）","交通优势：武汉是全国高铁网络的心脏，京广高铁纵贯南北，沪汉蓉高铁横跨东西，武汉站、汉口站、武昌站、武汉东站四大站辐射全国。武汉天河机场是中部最大航空枢纽，国际及地区航线覆盖亚洲、欧洲、美洲、大洋洲、非洲五大洲。武汉还是长江中游航运中心，阳逻港是内陆最大集装箱码头）"]},
{title:"特色美食",items:["武汉热干面（中国五大名面之一，选用碱水面经沸水烫熟后拌以香油防止粘连，食时再入沸水烫热，浇上浓稠芝麻酱、配以香葱、辣萝卜丁、酸豆角和特制卤水。热干面已成为武汉人清晨的灵魂唤醒剂，是武汉早餐文化（俗称\"过早\"）的核心代表，在武汉街头巷尾随处可见，反映了江汉平原码头城市独特的市井饮食气质）","武汉鸭脖（精武鸭脖起源于武汉精武路，周黑鸭诞生于武汉汉口，两者代表了武汉鸭脖的两大流派——麻辣派与甜辣派。鸭脖以二十余种香料卤制，麻辣鲜香、回味悠长，原本只是街头巷尾的休闲小吃，如今已发展成为年产值超百亿元的特色产业，遍布全国各大城市的机场、火车站和商业综合体）","武昌鱼（学名团头鲂，为鳊鱼的一种，主产于鄂州市梁子湖水域，肉质细嫩、刺少味鲜。武昌鱼因毛泽东主席1956年畅游长江后赋诗\"才饮长沙水，又食武昌鱼\"而名扬天下，成为湖北鱼鲜的代表品种。武汉各大餐厅均有清蒸武昌鱼供应，做法讲究原汁原味，仅以姜葱料酒去腥提鲜，最大程度保留鱼肉的鲜甜）","排骨藕汤（湖北人爱藕，更爱煨汤，排骨藕汤是湖北煨汤文化的代表。选用洪湖特产九孔粉藕（而非脆藕），切成滚刀块，与排骨同入砂锅或陶铫，文火慢煨三四小时，汤色奶白浓稠，藕块粉糯拉丝、排骨酥烂脱骨。民间有\"无汤不成席\"之说，逢年过节或家有贵客，餐桌上必有一锅排骨藕汤，是湖北人待客的最高礼仪）","三鲜豆皮（武汉传统名小吃，以绿豆和大米混合磨浆摊成薄皮为底，包入炒制好的糯米、香菇丁、鲜肉丁、笋丁等馅料，上覆鸡蛋液，煎至金黄酥脆即成。成品外皮金黄焦香、内馅软糯鲜香，层次分明，在武汉粮道街、户部巷等老街区随处可见，是武汉过早文化中最具仪式感的品种之一）","潜江油焖大虾（潜江市位于江汉平原腹地，被誉为中国小龙虾之乡，小龙虾年产量超10万吨，制定了全国首个小龙虾烹饪标准。油焖大虾以大量食用油配合八角、桂皮、花椒、干辣椒等香料长时间焖制，色泽红亮、麻辣鲜香、肉质Q弹。2015年油焖大虾被评为中国名菜，潜江每年举办小龙虾节，每年5至9月是小龙虾的最佳食用季节）","孝感米酒（孝感市是中国米酒之乡，制作历史逾千年，选用孝感特有的蜂窝酒曲（由辣蓼草和米粉制成）与珍珠糯米低温发酵而成。成品汁液浓白如奶、甜味自然、酒香淡雅，可直接饮用，也可做成蛋花米酒、桂花米酒或糊米酒，冬季热饮暖胃健脾，是湖北人喜爱的传统饮品，孝感米酒已出口至全球二十多个国家和地区）","恩施合渣（合渣又名懒豆腐，是恩施土家族地区的传统家常菜，将黄豆浸泡后连渣带浆研磨煮沸，加入青菜叶稍煮即成，口感细腻清淡、豆香浓郁，与四川豆花有几分相似但无需点卤凝固。合渣通常配以数十种免费小菜如糟辣子、酸腌菜、腐乳、腊肉丁等同食，丰俭由人、开胃下饭，是土家族人每日必备的主食，在婚丧嫁娶等重要场合均可见）"]},
{title:"传统节日",items:["武汉国际渡江节（每年7月16日在武汉举办，纪念1956年毛泽东主席第一次畅游长江的历史壮举，现已成为国内规模最大的公开水域游泳活动。节日期间，数千名中外泳者同场横渡长江，武汉两江四岸万人空巷观看盛况，是武汉最具城市标识性的节日活动，2024年已举办第50届，横渡路线从武昌汉阳门至汉口江滩，全长约1200米）","武汉东湖梅花节（每年2至3月在东湖梅园举办，武汉东湖磨山梅园是中国梅花研究中心，保存有梅花品种340余个，数量近万株，为全国保存最多的梅花品种资源圃。梅花节期间举办梅花摄影展、梅文化讲座、古风游园等丰富活动，万株梅花傲寒绽放，暗香浮动，吸引武汉及周边城市大量游客前来赏梅探春）","武当山道教庙会（每年农历腊月二十三至正月十五在武当山各宫观举办，是武当山最盛大的传统节庆活动。庙会以道教祭祀仪式为核心，融合武当武术表演、道乐演奏、祈福法会、道医义诊、传统集市等内容，游客可体验太极拳表演、品尝道家素斋、购买道教文创，感受道教文化的独特魅力，香火鼎盛、热闹非凡）","宜昌屈原故里端午文化节（每年端午节期间在宜昌市秭归县举办，纪念伟大爱国诗人屈原的大型节庆活动。节日包括龙舟竞渡、包粽子大赛、祭祀仪式、楚辞朗诵、文艺演出等，2009年屈原故里端午习俗被联合国教科文组织列入人类非物质文化遗产代表作名录，成为世界级文化遗产，与龙舟文化、楚文化深度融合，影响深远）","武汉东湖樱花节（每年3至4月在武汉大学和东湖樱园举办，武大樱花因历史建筑与樱花交相辉映被誉为全国最美校园樱花，东湖樱园则胜在规模和品种，两处共有樱花树上万株，品种达58个。樱花盛开时如云似霞，游客如织，樱园夜场灯光秀更添梦幻氛围，每年吸引数百万国内外游客前来观赏）","襄阳诸葛亮文化旅游节（以三国文化为主题的综合性节庆活动，在襄阳市举办，包含隆重的祭祀大典、诸葛亮学术研讨会、三国文化论坛、文艺演出等内容。祭祀大典在南阳武侯祠或古隆中景区举行，再现古时祭祀智圣诸葛亮的庄严仪式，吸引全国三国文化研究专家学者和游客广泛参与，已连续举办多届）","荆州关帝庙会（每年正月十五在荆州市荆州古城举办，是荆楚地区纪念关公诞辰最具影响力的民俗活动。庙会包括抬关帝神像古城巡游、传统戏曲展演、非遗民俗展销、民间艺术表演等项目，热闹非凡。古时荆州为兵家必争之地，关帝庙是荆州重要的宗教文化场所，庙会活动历史悠久，承载着丰富的历史信息和民间信仰）","恩施土家女儿会（每年农历七月初九至十二在恩施市举办，是土家族传统的情人节和相亲大会，被列入湖北省非物质文化遗产名录。活动期间，土家族未婚男女青年身着盛装，以对歌方式传情达意、择偶配对，场面热烈喜庆，极具民族特色。同时还有土家摆手舞、织锦表演、土家美食展销等配套活动，是体验土家族民俗文化的重要窗口）"]},
{title:"旅游攻略",items:["最佳时间：3至5月是武汉赏樱最佳时节，东湖樱园和武汉大学樱花如云似霞；9至11月秋高气爽是旅游旺季，武当山红叶层林尽染、恩施大峡谷秋色宜人。夏季可前往神农架原始森林避暑，均温22摄氏度；冬季可泡温泉，咸宁温泉和随州大洪山温泉是热门选择。各地季节特色鲜明，四季皆宜旅游）","交通建议：武汉天河机场航线覆盖全国主要城市及五大洲，国际航班密集；武汉站（高铁站）位于洪山区，汉口站位于江岸区（主打动车），武昌站位于武昌区，武汉东站位于光谷，四站各有分工，高铁网络四通八达。建议首选武汉站或汉口站出行，地铁4号线连接武汉站和武昌站，2号线连接汉口站和天河机场）","行程规划：建议安排7至9天较为充裕——D1至D3游览武汉（黄鹤楼、东湖、湖北省博物馆、江汉路），D4至D5前往武当山（登山观日出、参观紫霄宫和南岩宫），D6至D7深入神农架（大九湖、神农顶、天生桥），D8至D9恩施大峡谷探险。各景区之间车程较长，建议包车或自驾，预留充足时间）","住宿推荐：武汉住宿选择丰富，高端可选武昌江滩或光谷商圈，交通便利；景区住宿条件良好但价格波动大，旺季务必提前15天以上预订。武当山景区内可在乌鸦藤或琼台上住宿，山顶寺庙也提供借宿服务（需提前联系），清晨可观日出云海，是体验道教文化的绝佳方式。恩施大峡谷景区周边有特色民宿群，可欣赏峡谷日出）","必去景点：武当山体验道教文化、习练太极剑法；神农架探秘原始森林、邂逅金丝猴；三峡大坝见证大国重器、乘船过葛洲坝船闸；东湖绿道骑行、泛舟东湖；黄鹤楼登楼远眺、俯瞰长江；湖北省博物馆观曾侯乙编钟、越王勾践剑。建议早起错峰出行，避开节假日人流高峰）","美食指南：武汉过早文化丰富，粮道街、水塔街是本地人最爱的美食街，户部巷适合初次打卡。潜江小龙虾不可错过，5至9月最佳。恩施的合渣、松滋鸡、土家腊肉极具民族特色。宜昌的红油小面、荆州的早堂面、襄阳的牛肉面各具风味。武汉过早一个月不重样，武汉鸭脖、孝感米酒、黄陂三鲜等均可作为伴手礼带走）","注意事项：武当山登山部分路段较陡，需穿防滑舒适的登山鞋，山顶温差大建议备冲锋衣。神农架原始森林区早晚温差大，夏季也需外套，森林中蚊虫较多务必做好防虫措施，避免被毒虫叮咬。恩施大峡谷部分栈道悬空，有恐高症者需谨慎。全省夏季多暴雨，出行前关注天气预报，山区道路需注意滑坡风险）","特色体验：武当山太极湖边学一套太极拳，感受道法自然的哲学；潜江街头吃一顿油焖大虾配冰啤，体验宵夜文化；恩施大峡谷绝壁栈道探险，挑战自我极限；武汉清晨在街头小店过早，从一碗热干面开始认识武汉；宜昌清江画廊泛舟，两岸喀斯特峰丛倒映水中如诗如画；武汉东湖绿道租一辆自行车环湖骑行，尽享城市慢生活）"]}
],

湖南:{
region:'华中',
official:{site:'https://d何时.hunan.gov.cn',notice:'关注湖南省文化和旅游厅官网',policy:'无特殊限制'},
extra:[
{title:'世界遗产与重要景区',items:[
'张家界武陵源：中国首个被列入世界自然遗产的景区，以独特的石英砂岩峰林地貌闻名于世。三千多座石峰拔地而起，层层叠叠，气势磅礴，被誉为"缩小的仙境"。电影《阿凡达》中的悬浮山正是以此为灵感。袁家界、天子山、金鞭溪、十里画廊等景区各具特色，百龙天梯垂直升降326米创吉尼斯纪录。',
'天门山：张家界市标志性景观，以天门洞、99道弯盘山公路、玻璃栈道著称。天门洞是世界最高海拔穿山溶洞，海拔1518米，高131.5米、宽57米。999级天梯蜿蜒而上，世界最长高山索道全程7公里直抵山顶，是体验极限与壮美的绝佳目的地。',
'岳阳楼：江南三大名楼之一，始建于三国时期，与黄鹤楼、滕王阁并称千古名楼。因北宋范仲淹《岳阳楼记》"先天下之忧而忧，后天下之乐而乐"之名句而名扬天下。纯木结构建筑，三层飞檐斗拱，登楼可俯瞰洞庭湖浩渺烟波，感受"衔远山，吞长江"的壮阔气势。',
'凤凰古城：中国历史文化名城，沈从文笔下的"边城"原型。千年古城保存完好，沱江穿城而过，两岸明清吊脚楼错落有致。清晨薄雾笼罩，夜晚灯火阑珊。沱江泛舟、跳岩漫步、沈从文故居、虹桥风雨楼，每一个角落都散发着湘西独有的浪漫与质朴。',
'南岳衡山：中国五岳之南岳，道教、佛教圣地，海拔1300米的祝融峰为最高峰。山上寺庙道观200余处，林木葱茏，云雾缭绕。衡山四季皆宜——春赏杜鹃、夏避酷暑、秋观红叶、冬览雾凇，被誉为"中华寿岳"。',
'韶山：毛泽东同志故居所在地，中国红色旅游圣地。故居是一栋保存完好的江南农舍，泥砖青瓦，质朴大方。故居旁有毛泽东纪念馆、铜像广场，每年吸引数百万游客前来瞻仰缅怀，接受革命传统教育，是爱国主义教育的重要基地。',
'岳麓书院：创建于北宋的千年学府，中国古代四大书院之一。"惟楚有材，于斯为盛"的门联彰显其学术地位。朱熹、张栻曾在此讲学，毛泽东曾在此寓居。书院位于岳麓山脚，湖南大学校园内，是湖湘文化的精神源头。',
'矮寨大桥·十八洞村·德夯大峡谷：国家5A级景区，矮寨大桥被誉为"国际桥梁界的珠穆朗玛峰"，创四项世界第一。十八洞村是精准扶贫首倡地，世界"最佳旅游乡村"。德夯大峡谷被誉为"天下鼓乡、天然氧吧"，苗族文化浓郁。'
]},
{title:'省份概况',items:[
'地理位置：湖南省位于中国中南部、长江中游南岸，因大部分位于洞庭湖以南而得名，简称湘。省境东南西三面环山，中部、北部低平，呈朝北开口的马蹄形盆地。东部邻江西，浙江，南接广东、广西，西部连贵州、重庆，北界湖北。',
'面积人口：湖南总面积21.18万平方公里，2024年末常住人口约6630万人，城镇化率60.3%。省会长沙是全省政治、经济、文化中心。湖南籍人口众多，"湖南人"遍布全国乃至世界各地，"无湘不成军"之说流传甚广。',
'地形气候：省境地形以山地、丘陵为主，东部有幕阜山、武功山，西部有武陵山、雪峰山，南部有南岭。属亚热带季风气候，温暖湿润，四季分明。夏季高温多雨，冬季湿冷，湘江、沅江等水系发达，洞庭湖是中国第二大淡水湖。',
'历史沿革：湖南古属楚国，"楚虽三户，亡秦必楚"彰显其历史地位。近代以来，湖南人才辈出，影响中国历史进程。毛泽东、刘少奇等无产阶级革命家从这里走出，曾国藩、左宗棠等湘军将领叱咤风云，湖湘文化成为中国文化的重要流派。',
'民系与方言：湖南主体为湘系民系，通用湘语。湘西、湘南分布着土家族、苗族、侗族等少数民族。湖南方言复杂多样，有湘语、赣语、西南官话等多种方言，长沙话是湘语代表。辣椒文化深入湖南人的性格，"辣"成为湖南人直率血性的象征。',
'经济特色：2024年湖南GDP约5万亿元，以装备制造、文化旅游、电子信息、食品加工为支柱产业。长沙是工程机械之都，中联重科、三一重工闻名全球。湖南卫视、动漫游戏等文化产业发达，"电视湘军""出版湘军"享誉全国。',
'红色文化：湖南是中国革命的重要发源地。韶山是毛泽东故里，花明楼是刘少奇故里，炎陵是炎帝陵寝。秋收起义、湘南起义、平江起义等重大革命事件在此发生。湘籍开国将军202位，将军县数量居全国之首，红色旅游资源极为丰富。',
'湖湘精神：湖南人性格鲜明——"吃得苦、霸得蛮、耐得烦、不怕死"。这种刚烈倔强、敢为人先的精神，体现在近代湘军的征战、维新变法的参与、辛亥革命的响应中。辣椒不仅是调味品，更成为湖南人性格的文化符号。'
]},
{title:'特色美食',items:[
'剁椒鱼头：湘菜招牌名菜，选用新鲜鳙鱼头，配以剁椒、葱姜蒜蒸制而成。鱼头肉质细嫩，剁椒咸辣鲜香，汤汁红亮诱人。"剁椒鱼头"寓意"鸿运当头"，是湘菜馆的必点菜，也是湖南人待客的热情表达。',
'辣椒炒肉：湖南人家家户户都会做的家常菜。选用土猪五花肉或前腿肉，配以青红辣椒、蒜苗、豆豉爆炒。肉片焦香油亮，辣椒脆嫩爽辣，汤汁用来拌饭更是湖南人的终极美味。这道菜看似简单，却最能体现湘菜的精髓——"香辣、下饭"。',
'臭豆腐：长沙名小吃，以黄豆为原料制成豆腐胚，经卤水发酵后油炸。外酥里嫩，浇上辣椒油、蒜汁、香菜等调料。闻着臭、吃着香，是长沙夜市的灵魂。火宫殿臭豆腐最为著名，"臭"名远扬却让无数食客趋之若鹜。',
'湘西腊肉：土家族、苗族传统美食，将猪肉以盐腌制后悬挂于火塘上方，以松柏枝、甘蔗渣等慢火熏制数月。成品色泽红亮，肥肉透明如琥珀，瘦肉纹理分明。蒸腊肉、腊肉炒蒜苗、腊肉炖竹笋，每一种吃法都令人回味无穷。',
'口味虾：长沙夜宵摊的"扛把子"，小龙虾配以紫苏、辣椒、蒜头等爆炒，红彤彤一盆，香气四溢。剥开虾壳，虾肉鲜嫩弹牙，汤汁香辣浓郁。吃口味虾喝冰啤酒，是长沙年轻人夏夜的最佳消遣。',
'剁椒鱼头同源变体，"剁椒"系列是湘菜的灵魂。剁椒可以搭配各种食材——剁椒金针菇、剁椒芋头、剁椒蒸蛋，每一道都是下饭神器。湖南人发明了200多种辣椒品种和吃法，构建了完整的辣味体系。',
'常德牛肉粉：常德米粉的国家地理标志产品。米粉以早籼米为原料，口感爽滑有嚼劲，配以麻辣牛肉浇头。"圆粉"vs"扁粉"、"麻辣"vs"红烧"，每个常德人心中都有自己的"顶配"配方。',
'樟树港辣椒炒肉：辣椒炒肉的"奢华版"，选用岳阳樟树港特产的辣椒。这种辣椒皮薄肉厚，辣度适中，带有独特回甘，曾搭乘神舟十四号飞船进入太空育种。与土猪肉同炒，是湖南最顶级的家常美味。'
]},
{title:'传统节日',items:[
'苗族四月八：农历四月初八是苗族同胞的传统节日，又称"亚努节"，纪念苗族英雄。节日期间举行苗族盛装巡游、苗鼓表演、苗歌对唱、苗族银饰展等民俗活动，场面盛大，热闹非凡，是体验苗族文化的最佳时机。',
'土家族赶年节：土家族比汉族提前一天过年，称"过赶年"。传说是因为土家族先祖赴外地作战，赶在年前凯旋归来而设。节日期间打糍粑、杀年猪、唱摆手舞，保留着浓郁的土家族传统年俗。',
'汨罗龙舟竞渡：每年端午节在岳阳汨罗举行，纪念爱国诗人屈原。汨罗是屈原殉国之地，龙舟竞渡传统已延续两千多年。百舸争流、万人空巷，是湖南最具仪式感的传统节庆活动。',
'湘绣文化节：湖南是湘绣发源地，湘绣与苏绣、蜀绣、粤绣并称中国四大名绣。文化节期间举办湘绣展览、现场刺绣表演、绣娘大赛等，展示湘绣精湛工艺，传承湖湘非遗文化。',
'长沙火宫殿庙会：长沙最热闹的传统庙会，春节期间在火宫殿举行。庙会融合了民俗表演、传统小吃、祭祀祈福等内容，是老长沙年味的集中体现。糖油粑粑、臭豆腐、姊妹团子等地道小吃应有尽有。',
'韶山毛主席诞辰纪念日：每年12月26日，无数游客和民众自发来到韶山，纪念毛泽东同志诞辰。献花篮、唱红歌、瞻仰故居，表达对伟人的缅怀之情，是最具湖南特色的红色纪念活动。',
'张家界国际森林保护节：每年在张家界举行，以"保护森林资源"为主题。节日期间举办森林音乐会、户外运动挑战、非遗展演等活动，将自然保护与旅游文化完美结合。',
'湘西苗族银饰文化节：展示苗族银饰锻造技艺的盛会。苗族银饰工艺精湛，被列入国家级非物质文化遗产。节日期间银饰模特走秀、银饰制作技艺展演、苗族服饰大秀等，展现苗族文化的独特魅力。'
]},
{title:'旅游攻略',items:[
'最佳时间：湖南四季皆宜旅游，3至5月春暖花开，衡山杜鹃、橘子洲桃花盛放；6至8月张家界凉爽宜人，是避暑圣地；9至11月秋高气爽，岳麓山红叶、洞庭湖芦苇最美；12至2月可体验韶山红色旅游，凤凰古城雪景。',
'经典线路：长沙（岳麓山、橘子洲、坡子街）→韶山（毛泽东故居）→张家界（武陵源、天门山）→凤凰古城。这条线路涵盖湖南最精华的山水人文景观，建议安排5至7天。',
'张家界深度游：武陵源景区面积大，建议安排2至3天。D1游袁家界、天子山；D2走金鞭溪、十里画廊；D3挑战天门山玻璃栈道、登天门洞。天门山下午容易起雾，建议上午登顶。门票4日有效，可多次进入景区。',
'长沙休闲游：D1游岳麓山、岳麓书院、爱晚亭，下山后逛湖南大学、登橘子洲；D2参观湖南省博物馆、马王堆汉墓，傍晚去坡子街、火宫殿品尝地道美食。茶颜悦色、文和友是长沙网红打卡点。',
'凤凰深度游：建议住一晚体验古城晨昏。清晨薄雾笼罩下的沱江最为美丽，夜晚华灯初上时最浪漫。泛舟沱江、漫步虹桥、探访沈从文故居、品尝苗家酸汤鱼，感受边城的诗意与浪漫。',
'交通建议：长沙黄花国际机场航线覆盖全国主要城市，高铁四通八达。景区间建议乘高铁或旅游大巴，张家界至凤凰需乘专线车。长沙市內地铁便捷，共享单车遍布全城。',
'美食指南：长沙必吃——火宫殿（臭豆腐、糖油粑粑）、文和友（小龙虾、口味虾）、茶颜悦色（奶茶）；湘西必尝——凤凰血粑鸭、腊肉、米豆腐；衡山素斋、韶山毛家菜也值得一试。湘菜普遍偏辣，肠胃敏感者可提前说明。',
'注意事项：张家界景区山高路陡，建议穿防滑舒适的运动鞋；天门山玻璃栈道有一定刺激性，恐高者慎入。湖南夏季湿热，蚊虫较多，务必做好防蚊防暑措施。凤凰古城商业化较成熟，建议提前预订住宿。'
]}
]

extra:[{title:'世界遗产与重要景区',items:['桂林山水（世界自然遗产，以喀斯特地貌著称，山青、水秀、洞奇、石美，甲天下的美誉源于宋代诗人王正功的诗句，千百年来令无数文人墨客倾倒，是中华民族山水的杰出代表）','左江花山岩画（世界文化遗产，位于崇左市宁明县，是战国至东汉时期壮族先民留下的珍贵遗迹，岩画绘制在临江的悬崖峭壁上，赭红色图案以人物、器具、动物为主，神秘壮观）','中国南方喀斯特（世界自然遗产，广西部分包括桂林峰林与峰丛、荔浦喀斯特等，以独特的锥状、塔状喀斯特地貌闻名，是全球热带、亚热带喀斯特的典型代表）','漓江（国家5A级景区，发源于华南第一峰猫儿山，是珠江水系西江支流桂江的上游，全长164公里，两岸喀斯特峰林层叠，是世界上最典型的岩溶峰林景观）','德天跨国瀑布（国家5A级景区，位于崇左市大新县，与越南板约瀑布相连，是亚洲第一、世界第四大跨国瀑布，年均流量约为贵州黄果树瀑布的三倍，蔚为壮观）','涠洲岛（中国最大最年轻的火山岛，国家5A级景区，位于北海市南部海域，岛上有鳄鱼山火山公园、五彩滩、天主教堂等景点，海水清澈碧蓝）','阳朔西街（1400多年历史的古老街道，是阳朔县城最繁华地段，保存着明清古建筑风格，夜晚华灯初上，酒吧、小店热闹非凡，被誉为地球村）','龙脊梯田（国家4A级景区，位于桂林市龙胜各族自治县，始建于元朝，梯田层层叠叠如龙脊蜿蜒，最高海拔约900米，是壮瑶两族农耕智慧的杰作）']},{title:'省份概况',items:['地理位置：广西壮族自治区地处中国西南边陲，南临北部湾、面向东南亚，是中国唯一沿海的少数民族自治区，北回归线横贯中部，属亚热带季风气候区）','总面积与区划：广西陆地总面积23.76万平方公里，下辖14个设区市、111个县（市、区），是中国五个少数民族自治区之一，首府为南宁市）','人口民族：2024年末常住人口约5013万人，有壮、汉、瑶、苗、侗等12个世居民族，壮族人口约1500万，是全国少数民族人口最多的省级行政区）','历史沿革：广西古属百越之地，秦设桂林郡，汉为交趾刺史部，唐属岭南道，宋设广南西路简称广西，元设广西行中书省，1958年成立广西壮族自治区）','地形地貌：以喀斯特地貌为主，约占全区总面积的37.8%，发育类型之齐全、景观之优美堪称全国之最，桂林山水是喀斯特地貌的精华代表）','海岸与海洋：广西海岸线长约1628公里，北部湾海域面积约12.93万平方公里，海洋资源丰富，拥有红树林、珊瑚礁等珍贵生态系统，是西南地区最便捷的出海通道）','经济特色：以有色金属、汽车、机械等为主导产业，2024年GDP约2.76万亿元，是面向东盟开放合作的前沿和窗口）','长寿之乡：巴马瑶族自治县是世界著名的长寿之乡，百岁老人比例远高于国际标准，独特的地理环境和饮食习惯被认为是长寿的秘诀）']},{title:'特色美食',items:['桂林米粉（广西最具代表性的传统小吃，以干捞粉为主，配以锅烧肉、酸豆角、花生、卤水等配料，米粉柔韧爽滑、卤香浓郁，是桂林人早餐的首选）','柳州螺蛳粉（柳州市特产，以酸、辣、鲜、爽著称，主要原料包括螺蛳汤、酸笋、花生、木耳、黄花菜等，因独特的酸臭味让人欲罢不能，已风靡全国）','南宁老友粉（南宁市特色小吃，以酸、辣、咸、香为主味，相传源于一段老友情谊的故事，选用米粉配以酸笋、豆豉、蒜末、辣椒等爆炒而成）','北海海鲜（北部湾海域盛产各种海鲜，虾、蟹、贝类、鱼品种繁多，侨港风情街是品尝海鲜的热门地点，价格实惠、做法地道）','荔浦芋头扣肉（桂林荔浦特产香芋与五花肉同烹，芋头粉糯香甜、五花肉肥而不腻，是广西宴席上的传统名菜）','巴马香猪（巴马长寿之乡特产，体型矮小、皮薄骨细、肉质鲜嫩，烤乳猪是当地特色，皮脆肉香）','恭城油茶（桂林市恭城瑶族自治县传统饮品，以茶叶、生姜、蒜头等捶打熬制而成，配以米花、油果、葱花等佐料，有提神醒脑的功效）','玉林牛巴（玉林市传统风味食品，选用黄牛臀部肉经传统工艺制作，色泽暗亮油润、肉质细嫩耐嚼、咸甜适口，是广西四大名吃之一）']},{title:'传统节日',items:['壮族三月三（又称歌圩节，是壮族最重要的传统节日，每年农历三月初三举行，活动包括对歌、抛绣球、跳竹竿舞、吃五色糯米饭等，2014年入选国家级非物质文化遗产）','布洛陀文化旅游节（每年农历三月初七至初九在百色市田阳区敢壮山举行，是壮族同胞祭祀创世始祖布洛陀的盛大节日，包含祈福仪式、山歌对唱等民俗活动）','武鸣三月三歌圩（南宁市武鸣区是中国壮乡，每年三月三举行盛大的歌圩活动，数万民众身着民族盛装对歌，场面壮观，被誉为壮族文化的活化石）','鱼峰歌圩（柳州市鱼峰山是歌仙刘三姐骑鱼升天之地，自唐代起便有歌圩传统，每逢节假日都有山歌爱好者在此对歌，是全国最活跃的传统山歌歌圩之一）','瑶族盘王节（瑶族同胞祭祀始祖盘王的节日，通常在农历十月十六举行，包含长鼓舞、盘王大歌等内容，是瑶族文化的重要载体）','宾阳炮龙节（南宁市宾阳县的传统节日，于正月十一举行，舞龙者点燃鞭炮炸龙驱邪，数万游客涌入老街参与狂欢，被誉为东方狂欢节）','京族哈节（防城港市京族人民最重要的传统节日，哈节当天举行迎神、祭祖、唱哈等仪式，祈求海神保佑渔业丰收，是京族文化的集中展现）','壮族蚂拐节（河池市宜州区一带特有的节日，于农历正月举行，主要活动包括找蚂拐、祭蚂拐、葬蚂拐等，是研究古代蛙崇拜文化的活态民俗）']},{title:'旅游攻略',items:['最佳时间：4月至10月是广西最佳旅游季节，4月可参与壮族三月三歌圩，7月至9月德天瀑布水量充沛，10月可欣赏龙脊梯田金黄稻浪）','经典路线：建议首站桂林游览象鼻山、两江四湖，次日乘船游漓江至阳朔，第三天阳朔十里画廊、遇龙河漂流，可顺访德天瀑布和明仕田园）','交通建议：南宁吴圩机场和桂林两江机场是主要航空枢纽，区内高铁网络发达，桂林至阳朔可乘船或动车，崇左方向建议包车或自驾）','桂林深度游：象鼻山（免费预约）、叠彩山、七星公园、芦笛岩等经典景点不容错过，晚上可观看《印象·刘三姐》实景演出）','阳朔精华：遇龙河人工竹筏漂流推荐金龙桥至旧县段，十里画廊骑行打卡大榕树、月亮山，兴坪古镇打卡20元人民币背景图）','海滨度假：北海银滩（天下第一滩）、涠洲岛（火山岛日出日落）是广西海滨旅游的代表，涠洲岛上岛需提前预约船票）','边境风光：崇左方向可游览德天跨国瀑布、明仕田园、花山岩画，深度体验中越边境的喀斯特山水风光）','注意事项：山区景区分散建议结伴或跟团，夏季注意防蚊防虫，品尝螺蛳粉可从微辣开始适应，尊重当地少数民族风俗习惯）']}],

extra:[
{title:"世界遗产与重要景区",items:["海南热带雨林国家公园（2021年设立，面积4269平方公里，是我国分布最集中、类型最多样、保存最完好、连片面积最大的大陆性岛屿型热带雨林，拥有高等植物4367种、野生动物5000余种，被誉为热带生物多样性和遗传资源的宝库，2023年成为世界遗产提名地）","南山文化旅游区（位于三亚市崖州区，南山是中国最南端的山，景区以佛教文化为主题，108米海上观音圣像是世界最高的观音像，三面分别持箧、持珠、持莲，寓意慈悲、智慧、和平，被誉为南海佛国）","大小洞天旅游区（以道教文化为主题的著名景区，海山奇观被誉为琼崖八百年第一山水名胜，因拥有小洞天、钓台等历代摩崖石刻群而闻名）","天涯海角游览区（位于三亚市西南方向，以美丽迷人的热带自然海滨风光、悠久独特的历史文化和浓郁多彩的民族风情著称，是三亚的城市名片）","蜈支洲岛旅游区（国家5A级景区，海水清澈透明，能见度极高，是国内最佳潜水基地之一，岛上有两千多种植物，四周海域毫无污染）","呀诺达雨林文化旅游区（位于保亭黎族苗族自治县，是北纬18度热带雨林资源的博览馆，主要由经石峡、梦幻谷、黎锦苑等九大主题景观区组成）","槟榔谷黎苗文化旅游区（保亭甘什岭的黎苗文化诺亚方舟，保存着船型屋、隆闺房等黎族传统建筑，黎族传统纺染织绣技艺被列入联合国非遗名录）","海口骑楼老街（中国历史文化名街，保留了约600栋南洋风格骑楼建筑群，见证了海口作为海上丝绸之路重要港口的历史繁华）"]},
{title:"省份概况",items:["地理位置：海南省位于中国最南端，北以琼州海峡与广东省划界，西隔北部湾与越南相对，东面和南面在南海与菲律宾、文莱、印度尼西亚和马来西亚为邻）","总面积：全省陆地总面积3.54万平方公里，海域面积约200万平方公里。海南岛面积3.39万平方公里，是中国第二大岛，海岸线总长1823公里）","气候特征：属热带海洋性季风气候，年均气温22-26摄氏度，全年暖热，雨量充沛，干湿季节明显，是我国难得的全年候避寒胜地）","人口民族：2024年末常住人口1048万人，城镇化率63.08%。有黎族、苗族、回族等少数民族，黎族是海南最早的居民，世居五指山地区）","历史沿革：西汉元封元年（前110年）正式列入西汉版图，南朝梁代设崖州。1988年设立海南经济特区，2020年启动自由贸易港建设，2025年将实现封关运作）","经济特色：以旅游业、热带农业、现代服务业为主导，2024年GDP为7935.69亿元，增长3.7%，人均可支配收入34829元）","交通优势：已实现县县通高速。环岛高铁、博鳌机场、美兰机场等交通设施完善，是海上丝绸之路的重要支点）","博鳌亚洲论坛：总部设在海南博鳌的国际组织，每年举办年会，是亚洲乃至全球政商学界交流合作的重要平台，汇聚各国政要）"]},
{title:"特色美食",items:["文昌鸡（海南四大名菜之首，产自文昌市，因产地得名。选用当地土鸡品种，采用白切烹饪方式，皮滑肉嫩、骨酥味鲜，配以鸡油饭食用更佳）","和乐蟹（万宁市特产，中国国家地理标志产品。蟹肉肥美膏满，烹饪方式以清蒸为主，保留蟹肉原汁原味的鲜甜，蟹黄饱满如咸蛋黄）","椰子鸡（以新鲜椰子水和椰肉为主料，配以文昌鸡炖煮而成，汤汁清甜鲜美，鸡肉滑嫩可口，椰香四溢）","东山羊（万宁市特产，与加积鸭、和乐蟹、文昌鸡并称海南四大名菜。选用东山岭放养的山羊，肉质鲜嫩无膻味）","海南粉（海口、定安等地的特色小吃，以细米粉为主料，配以肉丝、花生、酸笋等十余种配料，淋上特制卤汁搅拌均匀食用）","清补凉（海南最受欢迎的消暑甜品，以椰奶或糖水为底，配以红豆、绿豆、薏米、芋头、凉粉等多种配料，清凉解暑）","陵水酸粉（陵水黎族自治县的特色小吃，以细米粉配以牛肉干、花生、米粉饼等多种配料，淋上特制酸辣酱汁，酸辣开胃）","抱罗粉（文昌市抱罗镇的特色米粉，以粗圆米粉为主，口感Q弹有嚼劲，配以靓汤或干拌两种吃法，汤鲜粉滑）"]},
{title:"传统节日",items:["三月三节（黎族苗族同胞最重要的传统节日，每年农历三月初三举行，是海南国家级非物质文化遗产。节日期间举行祭祖仪式、竹竿舞比赛等）","换花节（每年农历正月十五在海口府城地区举行，是海南独特的元宵习俗。年轻人手持鲜花互相交换，寓意美好祝福）","海南国际旅游岛欢乐节（每年12月举办，是海南最具影响力的旅游节庆活动，涵盖开幕式、文艺演出、美食节等系列活动）","南洋文化节（展示海南华侨文化的主题活动，海南是著名的侨乡，有海外琼籍华侨华人300多万人，分布在50多个国家和地区）","冼夫人文化节（每年二月初九至十五在海口举行，纪念巾帼英雄冼夫人，是海南民间信仰的重要组成部分）","中国南海伏季休渔节（每年5月至8月举行，南海伏季休渔期是养护渔业资源的重要措施，对海洋生态可持续发展意义重大）","文昌孔庙祭孔大典（每年9月28日在文昌孔庙举行，纪念孔子诞辰，是海南最庄重的儒家文化活动）","七仙温泉嬉水节（每年七夕在保亭黎族苗族自治县举行，是海南黎族青年男女追求爱情的传统节日）"]},
{title:"旅游攻略",items:["最佳时间：11月至次年4月是海南旅游旺季，天气温暖宜人，是避寒的最佳选择。5月至10月为雨季，是体验热带雨林的好时机）","交通建议：海口美兰机场和三亚凤凰机场是主要航空枢纽，环岛高铁连接全岛主要城市。自驾游是最佳选择，可欣赏环岛风光）","住宿推荐：三亚海棠湾、亚龙湾是高端度假区；海口市区适合商务和历史文化游；博鳌以会议度假著称，设施完善）","景点选择：三亚湾看日落、天涯海角打卡、蜈支洲岛潜水、呀诺达雨林洗肺、南山祈福，各具特色）","免税购物：海南离岛旅客每年每人免税购物额度10万元，海口日月广场免税店、三亚海棠湾免税城是主要购物场所）","美食攻略：文昌鸡、和乐蟹、东山羊是必尝美食，海鲜去第一市场或鸿港市场自己选购加工，新鲜又实惠）","注意事项：海南紫外线强烈，务必做好防晒；热带水果虽美味但不宜空腹大量食用；海边游玩注意安全）","特色体验：冲浪去万宁日月湾、潜水去蜈支洲岛、雨林探险去呀诺达、温泉泡汤去七仙岭、观鸟去东寨港红树林）"]}

official:{site:'https://whlyw.cq.gov.cn',notice:'关注重庆市文化和旅游发展委员会官网',policy:'无特殊限制'},
extra:[
{title:'世界遗产与重要景区',items:['大足石刻（1999年列入世界文化遗产，位于重庆市大足区，始凿于唐宋，以两宋时期作品最为精美。以宝顶山、北山石刻为代表，5万余尊造像题材丰富，以佛教为主，融道教、儒家造像于一体。被誉为“中国石窟艺术史上最后一座丰碑”，代表了中国石刻艺术的最高水平）','武隆喀斯特（2007年列入世界自然遗产，包括天生三硚、芙蓉洞、仙女山等。天生三硚由天龙桥、青龙桥、黑龙桥三座天生石桥组成，是世界上规模最大的串珠式天生桥群。芙蓉洞是大型石灰岩洞穴，被称为“世界三大洞穴”之一）','长江三峡（重庆至湖北宜昌段，西起奉节白帝城，东至宜昌南津关，全长193公里。瞿塘峡雄伟险峻，夔门天下雄；巫峡幽深秀丽，神女峰婷婷玉立；西陵峡滩多水急。高峡平湖景观壮观，沿途人文景观众多）','白帝城（位于奉节县瞿塘峡口，是刘备托孤之地，李白名诗《早发白帝城》使其闻名于世。三国文化深厚，是长江三峡旅游的重要景点，有“诗城”美誉）','钓鱼城（位于合川区，是南宋抗元战争遗址，1259年蒙古大汗蒙哥在此战死，改变了世界历史进程。钓鱼城坚守36年，被誉为“东方麦加城”）']},
{title:'省份概况',items:['地理位置：重庆市位于中国西南部、长江上游地区，东邻湖北、湖南，南接贵州，西连四川，北接陕西。总面积8.24万平方公里，是中国四大直辖市之一，也是世界上面积最大的城市）','面积人口：重庆市总面积约8.24万平方公里，2024年末常住人口约3191万人，城镇化率约71%。主城九区人口约1000万，是中西部地区重要的国家中心城市）','地形特点：重庆位于四川盆地东南缘，以山地、丘陵为主，地形复杂多样。城区依山傍水而立，建筑层层叠叠，被誉为“山城”“江城”“雾都”。长江、嘉陵江穿城而过，形成独特的山水城市格局）','气候特点：属亚热带湿润季风气候，夏热冬暖，年均气温约18摄氏度。夏季酷热，最高气温可达40摄氏度以上，素有“火炉城市”之称。冬季温暖，少霜雪，雾日较多，年均雾日约104天）','历史地位：重庆古称渝州，隋唐设渝州，宋代改为恭州。1189年升格为重庆府。抗日战争时期是陪都，1949年后为西南大区驻地。1997年设立重庆直辖市）是抗战时期国民政府陪都，1997年成为直辖市）','经济地位：2024年重庆市GDP约3.2万亿元，是中西部地区重要的经济中心。以汽车制造、电子信息、装备制造等产业为主导，是全球最大的笔记本电脑生产基地，有“西部硅谷”之称）','交通优势：重庆是西南地区交通枢纽，江北国际机场是重要航空枢纽。郑渝高铁、渝昆高铁等高速铁路四通八达。长江航运直达上海，嘉陵江航运条件改善）','码头文化：重庆是两江交汇的码头城市，形成了独特的码头文化。袍哥文化、纤夫文化、棒棒军文化等构成了重庆独特的民俗风情。火锅文化更是重庆码头文化的典型代表）']},
{title:'特色美食',items:['重庆火锅（2007年获评“中国火锅之都”，是中国火锅发源地之一。以牛油红汤为底，九宫格设计独特，毛肚鸭肠黄喉是经典涮品。“七上八下”涮毛肚是重庆火锅独特的吃法。2009年重庆火锅制作技艺列入市级非物质文化遗产名录）','重庆小面（重庆人早餐首选，以麻辣著称。面条劲道有弹性，浇上红油辣子、花椒、芽菜等调料，香辣扑鼻。重庆小面50强遍布大街小巷，一碗小面承载着山城人的早餐记忆）','酸辣粉（重庆传统小吃，以红薯粉为主料，酸辣开胃。以解放碑好吃街的酸辣粉最有名，粉条晶莹剔透，酸辣可口，配以肉末、黄豆、花生等佐料）','辣子鸡（重庆经典名菜，以整只鸡切块与大量干辣椒、花椒同炒。鸡肉外酥里嫩，麻辣鲜香，越吃越有味。以歌乐山辣子鸡最有名，形成“辣椒比鸡多”的独特景观）','水煮鱼（重庆创新川菜，以草鱼或黑鱼为主料。鱼肉片得薄如蝉翼，铺在豆芽白菜上，浇上滚烫的红油辣子，麻辣鲜香、鱼肉嫩滑，是重庆江湖菜的代表）','黔江鸡杂（重庆黔江地区特色，以鸡内脏与泡椒、泡萝卜同炒。鸡杂脆嫩，酸辣可口，配上一碗米饭是绝配。是重庆人最爱的下饭菜之一）','豆花饭（重庆传统快餐，以嫩豆花配白米饭。豆花鲜嫩可口，配以蘸水调料，咸鲜微辣，经济实惠，是重庆人最朴素的一餐）','串串香（重庆版麻辣烫，将各种食材穿在竹签上，在红汤火锅中涮烫。方便快捷，是重庆人喜爱的宵夜美食）']},
{title:'传统节日',items:['磁器口庙会（每年春节期间在磁器口古镇举办，是重庆最热闹的传统庙会。有川剧变脸、茶馆说书、民俗表演等活动，糖人、面人等传统手工艺展示琳琅满目，年味十足）','铜梁龙灯会（重庆铜梁区是“中国龙灯之乡”，舞龙历史悠久。铜梁火龙以铁水打花，场面壮观震撼。舞龙表演曾多次出国演出，是国家级非物质文化遗产）','丰都庙会（丰都鬼城是道教名山，每年举办庙会活动。有祭祀表演、民俗巡游、鬼城探秘等内容，是了解中国鬼神文化的重要活动）','重庆夜市文化节（每年夏季举办，展示重庆夜市美食文化。八一路好吃街、磁器口、南滨路等夜市热闹非凡，火锅、烧烤、小面等美食汇聚，是体验重庆夜生活的好时机）','巫山红叶节（每年11月在巫山县举办，巫峡两岸红叶漫山遍野，美不胜收。乘船游览巫峡是最佳观赏方式，红叶与江水相映成趣，是摄影爱好者的天堂）','酉阳桃花节（每年3月在酉阳土家族苗族自治县举办，桃花盛开时节举行赏花、歌舞表演、土家族文化体验等活动，是踏青赏花的好去处）']},
{title:'旅游攻略',items:['最佳时间：3月至5月和9月至11月是重庆最佳旅游季节。春季可赏桃花、油菜花；秋季天气凉爽，适合游览三峡、酉阳桃花源。夏季炎热但夜生活丰富；冬季温暖是避寒好去处）','经典路线：D1解放碑、洪崖洞、长江索道；D2武隆天生三硚一日游；D3大足石刻；D4磁器口、白公馆、渣子洞；D5三峡游轮或816地下核工程）','主城精华：D1洪崖洞夜景、千厮门大桥；D2磁器口古镇、歌乐山；D3长江索道、南山一棵树观景；D4四川美术学院（黄桷坪涂鸦街）、交通茶馆）','武隆攻略：距主城约3小时车程，建议跟团或自驾。天生三硚游览约2至3小时，需爬山注意体力。仙女山夏季避暑、冬季滑雪，四季皆宜）','三峡游览：建议乘三峡游轮从重庆朝天门出发，4天3晚至宜昌沿途游览丰都鬼城、忠县石宝寨、奉节白帝城、瞿塘峡、巫峡、西陵峡、三峡大坝）','美食地图：解放碑八一路好吃街是美食集中地；磁器口有毛血旺、陈麻花等特产；南滨路赏夜景品美食；夜宵去较场口、科园四路、九村烤脑花）','住宿建议：解放碑、洪崖洞周边交通便利、景点集中，适合首次来渝游客。喜欢夜生活可选南滨路，想体验山城特色可选民宿）','注意事项：重庆多山多台阶，穿舒适的运动鞋；夏季炎热注意防暑防晒；火锅辣度较高，不能吃辣提前说明；导航在重庆可能不准，多问路）','交通建议：江北国际机场T2/T3航站楼，轻轨直达。重庆北站、重庆西站为主要火车站。市内轻轨公交便利，微信支付宝可刷码乘车）']}
],

四川:{

official:{site:'https://whscgzx.wt.sc.gov.cn',notice:'关注四川省文化和旅游厅官网',policy:'无特殊限制'},
extra:[
{title:'世界遗产与重要景区',items:[
'九寨沟（1992年列入世界自然遗产，位于阿坝州九寨沟县，因山谷中分布9个藏族村寨而得名。以翠湖、叠瀑、彩林、雪峰、藏情、蓝冰\'六绝\'著称于世，有\'童话世界\'美誉。五花海、珍珠滩瀑布、诺日朗瀑布是不可错过的经典景观）',
'黄龙（1992年列入世界自然遗产，位于阿坝州松潘县，以彩池、雪山、峡谷、森林四绝著称于世。\'人间瑶池\'黄龙寺因佛门称这片天然水池为\'珍珠嵌玉\'而得名。五彩池规模宏大、色彩斑斓，是全球最美的天然钙化彩池群）',
'峨眉山·乐山大佛（1996年双双列入世界遗产。峨眉山是中国四大佛教名山之一，普贤菩萨道场，金顶日出、云海、佛光令人神往。乐山大佛开凿于唐代，高71米，是世界最大的石刻弥勒佛坐像，历时90年才完成）',
'青城山·都江堰（2000年列入世界文化遗产。都江堰是战国时期李冰父子主持修建的大型水利工程，无坝引水设计精妙，运行2000余年至今仍在使用。青城山是中国道教发源地之一，林木青翠、四季常青，有\'青城天下幽\'美誉）',
'四川大熊猫栖息地（2006年列入世界自然遗产，包括成都、雅安、甘孜、阿坝等7个市州的9个县。全球约30%的野生大熊猫、约70%的人工饲养大熊猫栖息于此，是\'大熊猫之乡\'，也是小熊猫、金丝猴等珍稀物种的庇护所）',
'三星堆遗址（2021年启动世界遗产申报，位于德阳市广汉市，是古蜀文明的重要代表。遗址出土青铜纵目面具、青铜神树、金杖等珍贵文物上千件，造型奇特、神秘莫测，向世界展示了与中原文化风格迥异的古蜀文明）',
'稻城亚丁（被誉为\'蓝色星球上最后一片净土\'，位于甘孜州稻城县。景区以仙乃日、央迈勇、夏诺多吉三座神山为核心，周围是辽阔的高山草甸、冰川湖泊、森林溪流。牛奶海、五色海碧蓝如玉，是摄影爱好者的天堂）',
'剑门蜀道（\'蜀道难，难于上青天\'指的便是这里，位于广元市剑阁县。剑门关是入蜀咽喉，以\'剑门天下险\'著称于世。翠云廊古柏参天，最古老的柏树树龄超过2000年，是秦汉时期栽种留下来的活文物）',
]},
{title:'省份概况',items:[
'地理位置：四川省位于中国西南腹地、长江上游，东邻重庆，南接云南、贵州，西连西藏，北接青海、甘肃、陕西。总面积48.6万平方公里，是中国第五大省份。地跨青藏高原、横断山脉、云贵高原、秦巴山区、四川盆地五大地貌单元）',
'面积人口：四川省总面积约48.6万平方公里，2024年末常住人口约9075万人，城镇化率约60%。省会成都市人口约2140万，是国家中心城市和新一线城市榜首，2023年GDP突破2.2万亿元）',
'地形地貌：地形以高原、山地、峡谷为主，地势西高东低。西部是川西高原和横断山脉，平均海拔4000米以上，贡嘎山海拔7556米是四川最高峰；东部是四川盆地，海拔300至700米，土地肥沃、物产丰饶）',
'气候特点：地跨亚热带和高原气候区，东部盆地属亚热带湿润季风气候，温暖湿润、四季分明；川西高原属高原气候，干湿季分明、日照充足、昼夜温差大。降水量充沛，年均降水量约1000毫米）',
'历史地位：四川古属巴蜀之地，是古蜀文明和巴文化的重要发祥地。三星堆遗址、金沙遗址证明古蜀文明与中原文明同样灿烂辉煌。三国时期是蜀汉政权的核心区域，武侯祠、剑门关等三国遗迹众多）',
'民族构成：四川有彝族、藏族、羌族、土家族、苗族、回族等15个世居少数民族，少数民族人口约650万。甘孜、阿坝、凉山是三大自治州，藏、羌、彝等民族文化多彩纷呈）',
'经济发展：2024年四川省GDP约6.1万亿元，位列全国第五位。电子信息、装备制造、食品饮料、先进材料、能源化工是五大主导产业，成都高新区是西部地区重要的经济增长极）',
'文化特色：四川是道教发源地，佛教文化深厚，儒家文化兴盛。川剧是四川最具代表性的戏曲艺术，变脸、吐火等绝技独树一帜。蜀绣、蜀锦、漆器、竹编等传统工艺享誉中外）',
]},
{title:'特色美食',items:[
'川菜（四大菜系之一，以\'一菜一格、百菜百味\'著称。分为蓉派川菜（上河帮）、渝派川菜（下河帮）、盐帮川菜（小河帮）三大流派。代表菜品有麻婆豆腐、宫保鸡丁、回锅肉、水煮鱼等，讲究色、香、味、形、器）',
'火锅（四川火锅以麻辣著称，锅底以郫县豆瓣、永川豆豉、花椒、辣椒为主料。经典的油碟配比是麻油加蒜泥，可以降温解辣。鸭肠、毛肚、黄喉、酥肉是必点菜品，\'七上八下\'涮毛肚是老成都的独特吃法）',
'串串香（成都街头最常见的小吃，将各种食材穿在竹签上，在红油锅底中涮烫。吃完后按签子数量结算，经济实惠。玉林路、建设路是串串香的热门打卡地，冷锅串串、热锅串串各有特色）',
'担担面（成都传统小吃，相传因挑担沿街叫卖而得名。面条细薄筋道，浇上红油辣椒、芽菜、肉末、葱花等调料，香辣扑鼻、酸辣可口。成都担担面以祠堂街那家最负盛名）',
'郫县豆瓣（川菜之魂，国家地理标志产品。选用蚕豆、辣椒、盐等原料，经过三年以上的自然发酵酿制而成。色泽红亮油润、辣味浓烈、香气醇厚，是制作川菜不可或缺的调味品）',
'龙抄手（成都传统名小吃，\'抄手\'即馄饨。以皮薄馅嫩、汤鲜味美著称，皮薄如纸、透而不破。龙抄手的红油抄手是招牌，皮薄馅嫩、辣而不燥，配上一碗鲜汤，是成都人最爱的早餐之一）',
'夫妻肺片（成都名菜，相传因郭朝华夫妇创制而得名。选用牛肉、牛杂为主料，切成薄片后浇上红油辣椒、花椒面等调料。色泽红亮、质嫩味鲜、麻辣浓香，是下饭下酒的绝佳选择）',
'钟水饺（成都传统小吃，以猪肉馅为主，不加其他鲜菜。外皮薄如蝉翼，浇上红油辣椒、复制酱油、蒜泥等调料。皮薄馅嫩、咸辣微甜、鲜香可口，与龙抄手并称成都小吃\'双绝\'）',
]},
{title:'传统节日',items:[
'成都国际桃花节（每年3月在龙泉驿区举行，是成都历史最悠久的节会活动。桃花漫山遍野、灿若云霞，吸引数百万游客踏青赏花。节日期间还有文艺表演、民俗展演、美食节等活动）',
'自贡国际恐龙灯会（每年春节期间在自贡市举行，是中国历史最悠久、规模最大的灯会活动。被誉为\'天下第一灯\'，有\'南国灯城\'美誉。大型灯组精美绝伦、气势恢宏，彩灯与恐龙主题完美结合）',
'彝族火把节（每年农历六月二十四举行，是凉山彝族自治州最盛大的传统节日。活动持续三天，包括斗牛、斗羊、摔跤、赛马、选美等民俗竞技。夜晚点燃火把照亮山野，载歌载舞，是体验彝族文化的最佳时机）',
'羌族羌历年（每年农历十月初一举行，是羌族同胞最重要的传统节日。羌族同胞身着节日盛装，跳沙朗舞、唱羌族民歌、祭祀羌族神灵，祈福来年五谷丰登、人畜兴旺）',
'都江堰放水节（每年清明节举行，再现古代放水祭祀的盛大场面。祭祀李冰父子、砍杩槎放水，是古代重要的农耕仪式。节日期间有文艺表演、传统祭祀等活动，吸引了众多游客参与）',
'广元女儿节（每年农历七夕举行，相传武则天出生于广元。是女性专属的节日，女性同胞身着盛装游览皇泽寺、凤凰山，泛舟嘉陵江。节日期间还有文艺演出、相亲大会等活动）',
'康定情歌节（每年8月在甘孜州康定市举行，是康巴地区最具影响力的节会活动。以康定情歌为主题，举行情歌对唱、藏戏表演、民族舞蹈等活动，展现康巴文化的独特魅力）',
'绵竹年画节（每年春节期间在绵竹市举行，是中国四大年画之一绵竹年画的展示盛会。年画是国家级非物质文化遗产，以色彩鲜艳、构图饱满、线条流畅著称，具有浓郁的西部民间特色）',
]},
{title:'旅游攻略',items:[
'最佳时间：3月至5月和9月至11月是四川最佳旅游季节。春季可赏龙泉桃花、青城山春色；秋季川西彩林烂漫，是摄影黄金期。夏季可避暑九寨沟、稻城亚丁；冬季可滑雪西岭雪山、泡温泉）',
'经典路线：D1成都（宽窄巷子、锦里、武侯祠）；D2成都至都江堰、青城山；D3成都至乐山大佛、峨眉山；D4返回成都或继续前往川西）',
'川西环线（6至8天）：成都→康定→新都桥→理塘→稻城亚丁→康定→成都。这条线路串联高原草甸、雪山冰川、原始森林，是深度体验藏羌文化的精华路线）',
'成都深度游：宽窄巷子品茶掏耳朵，锦里古街尝小吃、观夜景，春熙路、太古里购物打卡。鹤鸣茶社是成都最老的茶馆，人民公园体验地道成都生活）',
'美食地图：锦官城、红杏酒家是川菜老字号；玉林串串香、建设路小吃街是打卡圣地；宽窄巷子、锦里美食集中但价格偏高；想体验正宗成都味道，去玉林小区、玉林菜市场周边）',
'住宿建议：成都选择天府广场、春熙路附近交通便利；九寨沟、稻城亚丁提前15天以上预订；川西高原住宿条件有限，选择有供暖供氧的酒店）',
'交通建议：成都双流国际机场、天府国际机场是航空枢纽，成渝高铁、西成高铁四通八达。川西景点分散，建议自驾或跟团，路况良好但需注意落石和暗冰）',
'注意事项：高原地区注意防晒保暖、避免剧烈运动预防高反；川西山路弯多坡陡，自驾需谨慎；尊重藏羌民族习俗，进入寺庙注意着装。提前预约热门景点门票）',
]},
,

region:'西南',
official:{site:'https://whhly.guizhou.gov.cn',notice:'关注贵州省文化和旅游厅官网',policy:'无特殊限制'},
extra:[
{title:'世界遗产与重要景区',items:['黄果树瀑布（国家5A级景区，位于安顺市镇宁自治县，以瀑布群著称，被大世界吉尼斯评为世界最大瀑布群，18个瀑布形态各异，主瀑高77.8米、宽101米，是中国最大瀑布。著名地理学家徐霞客曾赞叹其“水由溪上石，如烟雾腾空，势其雄厉”。瀑布可六方位观看，134米水帘洞可从洞内听、观、摸，是世界唯一可如此体验的大瀑布）','梵净山（2018年列入世界自然遗产，位于铜仁市江口、印江、松桃三县交界处，武陵山脉主峰，最高峰凤凰山海拔2572米。是地球同纬度保存最完好的原始森林，森林覆盖率超95%，有黔金丝猴和梵净山冷杉全球唯一分布地。红云金顶海拔2336米，孤峰插云，云瀑、佛光、蘑菇石等十大奇绝景观令人叹为观止）','赤水丹霞（2010年列入世界自然遗产，位于遵义市赤水市，是中国丹霞地貌面积最大、出露最齐、特色最典型的区域，约1200平方公里。青年早期丹霞地貌代表，有“丹霞之冠”佛光岩，弧长1000余米、高300余米，恐龙灭纪实一部红色天书。五柱峰、燕子岩等景观鬼斧神工，被《中国国家地理》评为“中国最美丹霞地貌”）','荔波樟江（2014年列入世界自然遗产，位于黔南州荔波县，由小七孔、大七孔、水春河景区组成。小七孔景区融山、水、林、洞、湖泊和瀑布为一体，有涵碧潭、拉雅瀑布、68级瀑布、水上森林、卧龙潭等景点，以“绿”闻名，是地球腰带上的绿宝石）','遵义海龙屯（2015年列入世界文化遗产，位于遵义市汇川区，始建于南宋，是西南地区历史最久、规模最大、保存最完整的土司城堡。三面环溪一面临山，地势险要，《明史》称“飞鸟腾猿不能逾者”。见证了土司制度从羁縻之治到改土归流的完整变迁，2012年出土文物万余件）']},
{title:'省份概况',items:['地理位置：贵州省位于中国西南内陆腹地，东临湖南、南接广西、西连云南、北接四川和重庆，总面积17.62万平方公里。地处云贵高原东部，平均海拔1100米，地势西高东低，自中部向北、东、南三面倾斜，是中国西南地区重要的交通枢纽）','面积人口：贵州省总面积约17.62万平方公里，2024年末常住人口约3860万人，城镇化率约55%。省会贵阳市人口约640万，是全省政治、经济、文化中心，享有“中国避暑之都”美誉。六盘水市被称为“中国凉都”，夏季平均气温19.8摄氏度）','气候特点：属亚热带湿润季风气候，冬无严寒、夏无酷暑，年均气温15摄氏度左右。降水充沛，年均降水量约1200毫米，夏季多暴雨，冬季阴雨天较多。贵阳、遵义、安顺等地气候舒适宜人，是著名避暑目的地）','地形地貌：贵州是全国唯一没有平原支撑的省份，地形以高原、山地、丘陵、盆地为主，素有“地无三里平”之说。乌蒙山、大娄山、梵净山等山脉纵横交错，长江和珠江两大水系在省内分水而过，水力资源丰富）','历史地位：贵州是古人类发祥地之一，春秋时期属黔中地，唐宋设矩州，明朝正式建省。因黔东南苗族侗族自治州是中国苗族、侗族人口最集中的地区，被誉为“世界上最大的原生态民族博物馆”。遵义会议是中国革命生死攸关的转折点）','民族构成：贵州有苗族、布依族、侗族、土家族、彝族等17个世居少数民族，少数民族人口占全省总人口的37%左右。民族文化丰富多彩，苗族银饰、侗族大歌、布依族蜡染等都是国家级非物质文化遗产）','经济发展：2024年贵州省GDP约2.2万亿元，以大数据产业、白酒产业、旅游产业为特色。茅台酒是贵州名片，酱香型白酒产量全国第一。国家大数据综合试验区建设深入推进，华为、苹果等数据中心落户贵州）','交通发展：贵州实现了县县通高速，高速公路里程居全国前列。贵广高铁、沪昆高铁穿过贵州，贵阳龙洞堡国际机场是重要航空枢纽。村村通公路极大改善了山区交通条件')},
{title:'特色美食',items:['凯里酸汤鱼（凯里市特产，苗族酸汤鱼制作技艺是国家级非物质文化遗产。酸汤以米汤自然发酵而成，配以糟辣椒、木姜子等调料，鱼选用当地稻花鲤鱼或草鱼。酸汤红亮鲜美、鱼肉嫩滑，有“三天不吃酸走路打窜窜”的民谚，是贵州美食的代表之一）','贵阳辣子鸡（以本地散养土鸡和辣椒为主料，配以糍粑辣椒爆炒而成。辣椒焦香与鸡肉鲜嫩完美融合，入口先是辣香扑鼻，后有麻香回甘，层次丰富。息烽阳朗辣子鸡制作技艺是省级非物质文化遗产，有180余年历史）','肠旺面（贵阳市传统小吃，以猪大肠、猪血、面条为主料，配以脆哨、葱花等。面条劲道有弹性，血旺嫩滑鲜美，大肠软糯入味，红油汤底香辣可口，是贵阳人早餐的首选，有“肠旺”寓意“常旺”的美好祝愿）','丝娃娃（贵州特色小吃，用薄如蝉翼的面皮包裹萝卜丝、黄瓜丝、海带丝等十余种素菜，浇上酸辣蘸水食用。因形状像襁褓中的婴儿而得名，口感清爽开胃，是解腻佳品，在贵州各地都很受欢迎）','花溪牛肉粉（贵阳市花溪区特产，以黄牛肉熬制的浓汤配以酸粉、牛肉片、芫荽等。汤鲜肉香、粉滑爽口，牛肉炖得软烂入味，是贵阳人早餐和夜宵的常选美食）','青岩状元蹄（贵阳市花溪区青岩古镇特产，选用本地黑毛猪前蹄卤制而成。肉质软糯、卤香浓郁，配以折耳根辣椒蘸水，是青岩古镇必尝美食。相传与清代状元赵以炯有关，寓意“金榜题名”）','贵州羊肉粉（贵州多地均有特色，选用本地山羊，肉质鲜嫩无膻味。粉以米浆制成，口感滑爽，浇上浓白羊汤，配以辣椒、芫荽等，一碗下肚暖身暖胃，是冬日最佳美食）','贵州腊肉（贵州农村传统美食，鲜肉用盐腌制后以柏树枝、果木柴火慢熏。成品色泽红亮、烟香浓郁、瘦肉紧实咸香、肥肉晶莹油润。年夜饭必备菜肴，寓意“长久富贵”）']},
{title:'传统节日',items:['苗族姊妹节（每年农历三月十五举行，是苗族最盛大的传统节日之一，2006年列入国家级非物质文化遗产。节日期间苗族姑娘身着银饰盛装，唱歌、跳芦笙舞、游方对歌，展示苗族传统文化。姊妹饭是节日特色食品，用不同颜色染色的糯米做成）','侗族大歌（侗族多声部民歌，无伴奏、无指挥，被誉为“清泉般闪光的音乐”。2009年被列入联合国非物质文化遗产，是侗族文化的精髓。侗族大歌历史悠久，最早可追溯至宋代，是侗族人代代相传的文化瑰宝）','布依族六月六（每年农历六月初六举行，是布依族最重要的传统节日。有祭祀祖先、青年男女对歌、舞龙舞狮、唱山歌等活动。“六月六”是布依族祈求丰收、祭祀祖宗的盛大节日，节日气氛热烈）','苗族芦笙节（每年农历九月二十七举行，是苗族同胞庆祝丰收、祭祀祖灵的节日。节日期间举行盛大的芦笙舞比赛，苗族青年男女身着盛装，围成圆圈跳芦笙舞，是苗族最具代表性的集体舞蹈）','贵州水族端节（又称“瓜节”，是水族最隆重的节日，按水族历法在农历九月初一开始，节期长达49天。节日期间举行祭祖、赛马、唱水歌等活动，是水族文化的重要载体）','仡佬族吃新节（每年农历七月初七举行，是仡佬族庆祝丰收、祭祀祖先的节日。节日期间举行祭神农、采新、祭祀祖先等活动，家家户户杀鸡宰鸭，用新米饭祭祀祖先，祈求来年丰收）','苗族花山节（每年正月初一至十五举行，是云南贵州等地苗族的传统节日。节日期间举行爬花杆、跳芦笙舞、对歌等活动，青年男女借此机会寻找意中人。花山节是苗族同胞最重要的社交节日之一）','水族卯节（每年农历五月卯日举行，是水族青年男女相亲的节日。有对歌、祭祀、赶卯坡等活动，是水族独特的婚恋习俗。卯节期间未婚男女身着盛装，在卯坡上对歌传情，寻找心上人）']},
{title:'旅游攻略',items:['最佳时间：4月至10月是贵州最佳旅游季节。春季可赏百里杜鹃花海，夏季可避暑漂流，秋季可赏梵净山红叶、黄果树水量充沛。冬季虽冷但可体验温泉，贵州温泉资源丰富，是冬季养生的好选择）','经典路线：D1贵阳抵达，游黔灵山公园、甲秀楼；D2安顺黄果树瀑布一日游；D3龙宫或天星桥水上石林；D4荔波小七孔；D5西江千户苗寨体验苗族文化；D6返回贵阳或前往遵义）','交通建议：贵阳龙洞堡国际机场是主要航空枢纽，高铁可达广州、昆明、重庆、成都等地。省内建议自驾或包车，景点分散路况良好。贵州“县县通高速”，自驾非常方便）','黄果树攻略：建议先游览天星桥（2小时），再乘景区交通至陡坡塘（1小时），最后游览大瀑布（2小时）。丰水期（6月至10月）瀑布最为壮观，建议清晨入园避开人流）','黔东南深度游：西江千户苗寨是最大苗族聚居村寨，夜景壮观。肇兴侗寨是最大侗族聚居地，有侗族大歌表演。镇远古镇历史悠久，舞阳河山水如画）','美食推荐：贵阳云岩区、南明区是美食集中地，丝娃娃、肠旺面、恋爱豆腐果遍布大街小巷。黔东南酸汤系列不可错过，凯里酸汤鱼、酸汤牛肉是代表）','住宿建议：贵阳作为中转交通便利，选择甲秀楼、花果园附近出行方便。景区内可体验特色民宿，西江千户苗寨观景台附近客栈可欣赏苗寨夜景）','注意事项：贵州夏季多雨，携带雨具；山区气温变化大，需备外套。酸汤系列较酸辣，可先少量尝试。尊重少数民族习俗，进入苗寨侗寨注意当地禁忌）']}
],

extra:[
{title:'世界遗产与重要景区',items:[
'丽江古城：世界文化遗产，始建于宋末元初，是中国以整座古城申报世界文化遗产成功的典范。古城的核心四方街以红色角砾岩铺就，流水穿城而过，纳西族传统民居"三坊一照壁、四合五天井"错落有致，木府被誉为"小故宫"。夜晚灯火阑珊，酒吧一条街热闹非凡，东巴文化、纳西古乐让古城充满人文魅力。',
'三江并流保护区：2003年列入世界自然遗产，金沙江、澜沧江、怒江三条大江在云南境内并行奔流170多公里却不交汇，形成世界上独一无二的地理奇观。高山峡谷、雪峰冰川、高原湿地等景观齐全，涵盖担当力卡山、高黎贡山等山脉，是世界生物多样性最丰富地区之一，有滇金丝猴等珍稀物种。',
'云南石林：世界自然遗产"中国南方喀斯特"核心区，被誉为"天下第一奇观"。历经2.7亿年地质变迁，形成剑状、塔状、柱状等千姿百态的石灰岩柱群。《阿诗玛》传说诞生于此，石柱最高达40米，步入其中如入奇幻迷宫，是研究喀斯特地貌的天然课堂。',
'红河哈尼梯田：2013年列入世界文化遗产，哈尼族1300多年农耕文明的杰作。百万亩梯田从海拔600米延伸至1800米，4300级首尾相连，随山势变化万千。灌水期（11月至次年4月）形成镜面梯田，如银色腰带缠绕山间，被法国人类学家誉为"真正的大地艺术"。',
'澄江化石地：2012年列入世界自然遗产，是亚洲唯一的化石类世界遗产。保存着5.3亿年前寒武纪生命大爆发的完整遗迹，至少涵盖160种生物门类，化石保存完整度举世罕见，被国际科学界誉为"20世纪最惊人的古生物发现"，是揭开地球生命起源密码的圣地。',
'普洱景迈山古茶林：2023年列入世界文化遗产，是全球首个以茶文化为主题的世界遗产。千年万亩古茶林是布朗族、傣族先民濮人濮刀始种的"茶树始祖"，古茶林、生物多样性、文化景观三位一体，被誉为"茶树自然博物馆"和"世界茶树基因库"。',
'大理古城：始建于明洪武年间，是中国首批24座历史文化名城之一。古城坐落于苍山脚下、洱海之畔，文献楼、五华楼、南城门彰显明代建筑风韵，洋人街、人民路店铺林立。扎染、烤乳扇、酸辣鱼等美食与白族三道茶文化交融，是体验南诏大理文化的绝佳之地。',
'玉龙雪山：北半球最南端的雪山，主峰扇子陡海拔5596米。冰川公园大索道带你直达4506米观景台，蓝月谷湖水湛蓝如九寨，印象丽江实景演出震撼心灵。高山植被垂直分布，从草甸到冰川在一座山中尽览，是纳西族人民心中的神山。'
]},
{title:'省份概况',items:[
'地理位置：云南省位于中国西南边陲，北回归线横贯南部，属低纬度内陆地区。东部与贵州、广西为邻，北部与四川相连，西北部与西藏接壤，西部与缅甸接壤，南部和东南部与老挝、越南毗邻，国境线长达4060公里，是全国边境线最长的省份之一。',
'面积与区划：云南国土总面积39.41万平方公里，居全国第8位。全省辖8个地级市、8个自治州，省会昆明市。25个边境县分别与缅甸、老挝、越南接壤，是我国面向南亚东南亚开放的重要通道和前沿。',
'人口民族：2024年末常住人口4655万人，城镇化率54.11%。有25个世居少数民族，少数民族人口占总人口的33.12%，是全国少数民族种类最多的省份。15个少数民族为云南特有，布朗族、德昂族、独龙族等跨境民族众多。',
'地形地貌：云南地处第一、第二阶梯过渡地带，以山地高原为主，山地占94%。地势西北高、东南低，最高点为梅里雪山卡瓦格博峰（6740米），最低点为河口县（76.4米），高差达6663米。东部为滇东高原，西部为横断山脉纵谷区。',
'气候特征：属亚热带高原季风型，立体气候显著，"一山分四季，十里不同天"。7月均温20至23度，1月均温7至11度，年温差小、日温差大。5至10月为雨季，降雨量占全年85%；11月至次年4月为旱季。',
'资源禀赋：云南素有"植物王国"、"动物王国"、"有色金属王国"美誉。植物种类占全国50%以上，野生动物种类全国第一。矿产资源丰富，铅、锌、锡、磷等9种矿产储量居全国前列，水能蕴藏量居全国第二。',
'六大水系：境内河流分属金沙江（长江）、南盘江（珠江）、元江（红河）、澜沧江（湄公河）、怒江（萨尔温江）、大盈江（伊洛瓦底江）六大水系。九大高原湖泊包括滇池、洱海、抚仙湖等，其中抚仙湖最深处150米，为全国第二深湖。',
'经济发展：2025年云南省GDP达32765.78亿元，增长4.1%。第一产业4320.77亿元，第二产业10500.61亿元，第三产业17944.40亿元。旅游业是支柱产业，2024年有671个A级景区，是全国旅游大省。'
]},
{title:'特色美食',items:[
'过桥米线：云南最具代表性的传统美食，起源于蒙自，已有百余年历史。滚烫的鸡汤为底，配以鹌鹑蛋、脊肉片、鲜蔬、豆皮等十余种配料，食者将生料逐一滑入汤中烫熟，仪式感十足。昆明"建新园"、蒙自"过桥米线小镇"是品尝正宗风味的绝佳去处。',
'鲜花饼：云南特色糕点，以玫瑰花、玉兰花等可食用鲜花入馅，外皮酥脆，内馅花香四溢、甜而不腻。嘉华鲜花饼是云南伴手礼的首选，刚出炉的鲜花饼酥香软糯，玫瑰花香沁人心脾，是馈赠亲友的佳品。',
'普洱茶：云南特产，国家地理标志产品。分为生普和熟普，以澜沧江流域优质大叶种茶为原料，经特殊工艺制作。茶汤橙黄明亮，滋味醇厚回甘，越陈越香，有降脂减肥、消炎抗菌等功效，深受茶友喜爱。',
'宣威火腿：云南著名特产，中国三大名腿之一。选用乌金猪后腿，经腌制、晾晒等传统工艺精制而成，形如琵琶，皮色腊黄，肉质细嫩，切开后香气浓郁。可炒、可蒸、可炖，蒸宣威火腿是待客佳肴。',
'汽锅鸡：云南传统名菜，利用汽锅蒸制而成。将鸡肉与虫草花、三七等滋补药材同置于紫陶汽锅内，底部加清水，蒸汽上升凝为汤汁，最大程度保留鸡肉原味，汤清肉嫩、滋补养生，是滇菜中的瑰宝。',
'野生菌火锅：云南特产，牛肝菌、鸡枞、松茸、见手青等数十种野生菌类，搭配乌骨鸡熬制的浓汤，鲜美无比。每年6至10月是野生菌旺季，但需注意烹饪时间，部分菌类需确保熟透以防中毒。',
'傣族手抓饭：西双版纳、德宏等地傣族特色美食，将米饭与烤肉、烤鱼、凉拌鸡、炸猪皮、青菜等配菜铺在洗净的芭蕉叶上，用手抓取食用。色彩缤纷、酸辣开胃，是体验傣族饮食文化的好方式。',
'乳扇：云南十八怪之一，大理地区特产。将牛奶酸化后拉成薄片缠绕在竹竿上晾晒而成，可炸可烤可生吃。炸乳扇金黄酥脆，抹上玫瑰酱或夹着炼乳食用，奶香浓郁，是大理街头最常见的小吃。'
]},
{title:'传统节日',items:[
'彝族火把节：云南最盛大的民族节日之一，每年农历六月二十四举行，为期三天。节日期间点燃火把照天祈福，举行斗牛、斗羊、摔跤、赛马、点燃篝火等民俗活动，彝族青年男女以火为媒、对歌传情。火把节已被列入国家级非物质文化遗产，是体验彝族文化的最佳时机。',
'傣族泼水节：傣历新年庆典，每年4月13日至15日举行，是傣族最隆重的传统节日。人们相互泼水祝福，象征洗去过去一年的不顺，迎接新年的到来。节日期间还有龙舟竞渡、孔雀舞表演、赶摆等活动，西双版纳傣族园是体验泼水节的首选之地。',
'白族三月街：又称"观音市"，每年农历三月十五至二十在大理古城西举行，是白族传统物资交流会和文体盛会。街上人山人海，物资琳琅满目，赛马、射箭、对歌等文体活动精彩纷呈，是白族文化的集中展现。',
'纳西族三朵节：每年农历二月初八，是纳西族祭祀本主"三朵神"的节日。三朵神是纳西族的保护神，传说为一骑白马、穿白甲、执白矛的战神。节日期间举行祭祀仪式、游山踏青等活动，丽江黑龙潭公园是主要活动场所。',
'佤族司岗里摸你黑狂欢节：每年五一期间在临沧市沧源佤族自治县举行，是佤族最盛大的节日。以"摸你黑"为特色，参加者互相涂抹黑色泥土，寓意健康永恒、快乐永恒。节日期间还有佤族甩发舞、木鼓舞等表演，尽显佤族狂野奔放的民族风情。',
'苗族花山节：农历正月初二至初七举行，是苗族青年男女社交择偶的节日。节日期间立花杆、跳芦笙舞、爬花杆比赛、斗牛斗鸡等活动热闹非凡，青年男女以歌传情、互表爱意，是苗族浪漫风情的集中体现。',
'傈僳族刀杆节：每年农历二月初八在怒江傈僳族自治州举行，是傈僳族最惊险的传统节日。节日主要内容是"上刀山、下火海"，勇士赤脚踩在锋利的刀刃上爬上刀杆，又从火海中赤脚走过，展现傈僳族人民勇敢无畏的精神。',
'哈尼族昂玛吐节：哈尼族祈福丰收的节日，在每年农历二月的龙日举行。节日期间祭祀寨神、集体聚餐、跳棕扇舞，祈求风调雨顺、五谷丰登。墨江哈尼族自治县是体验昂玛吐节的最佳地点。'
]},
{title:'旅游攻略',items:[
'最佳时间：云南四季皆宜，3至5月春暖花开，石林、滇池海鸥飞舞；6至8月雨季虽湿热，但可避暑、吃野生菌；9至11月秋高气爽，大理洱海、丽江古城最美；12至2月可去西双版纳避寒，体验泼水节。',
'滇西北经典线（5至7天）：昆明（石林、滇池）→大理（洱海骑行、古城）→丽江（古城、玉龙雪山）→香格里拉（普达措、独克宗古城）。这条线路是云南最经典的旅游线路，涵盖雪山、古城、湖泊、高原草甸等多种景观。',
'滇东南田园线（4至5天）：昆明→普者黑（山水田园、荷花）→建水（古城、豆腐）→元阳（梯田日出日落）。这条线路适合喜欢田园风光和摄影的游客，梯田、云海、荷塘构成绝美画卷。',
'滇西南热带风情线（4至5天）：昆明→西双版纳（热带雨林、野象谷）→普洱（茶山、茶马古道）。这条线路可体验傣族风情、热带雨林风光，还能品鉴普洱茶。',
'交通建议：昆明是交通枢纽，高铁连接大理、丽江、玉溪等地。丽江至香格里拉、泸沽湖建议乘正规大巴或包车。景区分散，建议租车自驾或参加当地纯玩团。提前关注天气，雨季注意滑坡泥石流。',
'住宿推荐：大理住双廊海景民宿（看日出绝佳）；丽江住古城内民宿（体验纳西风情）；西双版纳住告庄附近（近夜市、交通便利）；香格里拉住独克宗古城（藏式风格、暖气充足）。',
'美食地图：昆明"福照楼"过桥米线、建新园汽锅鸡；大理"益恒饭店"乳扇、酸辣鱼；丽江"忠义市场"腊排骨火锅；西双版纳"曼听公园"附近傣族餐厅。手抓饭、野生菌火锅是特色体验。',
'注意事项：高原紫外线强，务必防晒；香格里拉海拔3500米以上，注意防高反（提前服用红景天）；野生菌务必确保熟透；尊重各民族宗教信仰和风俗习惯；避开雨季山区公路落石风险。'
]}
]

official:{site:'https://whlyt.xizang.gov.cn',notice:'关注西藏自治区文化和旅游厅官网',policy:'需西藏户籍或居住证'},
extra:[
{title:'世界遗产与重要景区',items:['布达拉宫（1994年列入世界文化遗产，位于拉萨市玛布日山上，是世界上海拔最高的宫殿式建筑群。始建于公元7世纪松赞干布时期，是历代达赖喇嘛的冬宫。主体建筑13层，高117米，白宫红宫交相辉映，内部收藏珍贵壁画、佛像、唐卡等文物，是藏传佛教圣地）','大昭寺（2000年列入世界文化遗产，位于拉萨市老城区中心，是藏王松赞干布为纪念文成公主入藏而建。寺内供奉的释迦牟尼12岁等身像，是文成公主从长安带来的，有“觉卧佛像”之称。大昭寺是藏传佛教信徒朝圣的终点，有“先有大昭寺，后有拉萨城”之说）','罗布林卡（2001年列入世界文化遗产，位于拉萨市西郊，是历代达赖喇嘛的夏宫。始建于18世纪，占地36万平方米，有宫殿、湖泊、花园等建筑群体。园内古木参天、繁花似锦，是藏族园林艺术的杰作，被誉为“拉萨的颐和园”）','珠穆朗玛峰（世界最高峰，海拔8848.86米，位于中尼边境。2020年中国与尼泊尔共同宣布珠峰最新高程。珠峰巍峨雄伟，是登山爱好者的圣地，绒布寺是世界上海拔最高的寺庙，是观赏珠峰的最佳地点之一）','纳木措（西藏第二大湖泊，海拔4718米，是世界上海拔最高的大型湖泊。湖水清澈湛蓝，与念青唐古拉山相映成趣，是藏传佛教著名神湖。湖畔是著名的扎西半岛，玛尼堆、五彩经幡遍布，是转湖朝圣的圣地）']},
{title:'省份概况',items:['地理位置：西藏自治区位于中国西南边陲、青藏高原西南部，平均海拔4000米以上，是世界上海拔最高的地区，被称为“世界屋脊”。北邻新疆，东连四川、云南，南接尼泊尔、印度、不丹等国）','面积人口：西藏总面积122.84万平方公里，约占全国陆地面积的八分之一，是仅次于新疆的中国第二大省份。2024年末常住人口约366万人，是中国人口最少、人口密度最低的省级行政区之一）','民族宗教：藏族占全区总人口的90%以上，此外有汉族、回族、门巴族、珞巴族等民族。藏传佛教是藏族的主要宗教，格鲁派（黄教）为主流，达赖喇嘛和班禅额尔德尼是格鲁派两大宗教领袖）','气候特点：属高原山地气候，空气稀薄、日照强烈、昼夜温差大。年均气温较低，拉萨年均气温约8摄氏度。干湿季分明，雨季集中在6至9月。氧气含量约为内地的60%至70%，容易引发高原反应）','地形地貌：青藏高原主体，平均海拔4000米以上。喜马拉雅山脉横亘南境，珠穆朗玛峰8848.86米是世界最高峰。冈底斯山脉、念青唐古拉山脉、唐古拉山脉等山脉纵横。高原上湖泊众多，是长江、怒江、雅鲁藏布江等大江大河的发源地）','历史沿革：7世纪吐蕃赞普松赞干布统一西藏，建都拉萨。9世纪吐蕃瓦解后分裂为多个割据势力。13世纪归入元朝版图，设立乌斯藏宣慰司。清朝设立驻藏大臣。1951年西藏和平解放，1965年成立西藏自治区）','经济状况：2024年西藏GDP约2500亿元，以旅游业、畜牧业、矿业为特色。青稞、牦牛、藏药材是特色产品。清洁能源资源丰富，雅鲁藏布江是重要的水能资源宝库）','交通发展：青藏铁路是西藏唯一的铁路线，北起青海西宁、南至拉萨，全长1956公里，是世界上海拔最高、线路最长的高原铁路。拉萨贡嘎机场是主要航空枢纽，开通多条国际国内航线）']},
{title:'特色美食',items:['糌粑（藏语音译，是藏族的主食。由炒熟的青稞磨成面粉，加酥油茶或清茶揉捏成团食用。糌粑营养丰富、热量高、耐饿，是藏族人每日必备的食物。吃法简单直接，却承载着藏族人世代传承的饮食文化）','酥油茶（藏族传统饮品，由酥油、茶叶、盐混合打制而成。酥油从牦牛奶中提炼，呈淡黄色。酥油茶能提神醒脑、补充热量，是藏族人待客的必备饮品。客人到家必须喝酥油茶，谢绝会被视为不礼貌）','藏面（拉萨特色小吃，牛肉汤配以小麦面条，面条口感介于面条和粉丝之间。藏面分量小、汤鲜肉香，是拉萨人早餐常选。甜茶是甜味奶茶，与酥油茶同为藏族日常饮品）','牦牛肉（青藏高原特产，肉质鲜嫩、营养丰富、热量高。高原牦牛放养在海拔4000米以上的草场，肉质紧实、味道鲜美。风干牦牛肉是西藏传统美食，将新鲜牦牛肉风干后食用，嚼劲十足）','青稞酒（藏语音译“羌”，用青稞酿制的低度酒。色泽橙黄、酸甜可口、酒精含量约15%至20%。藏族人民婚丧嫁娶、节日庆典必备。敬酒讲究“三口一杯”，主人唱着酒歌敬酒，客人需一饮而尽）','藏香猪（藏东南地区特产，体型小、肉质好。放养在高海拔山区，肉质紧实、味道鲜美。是西藏待客的上等食材，烤藏香猪是特色美食）','酥油糕（藏式甜点，用酥油、糖、面粉制成。色泽金黄、香甜可口，是藏族节日必备食品。藏历新年时家家户户都会制作酥油糕，用于供奉和待客）','人参果饭（藏语音译“卓玛”，用草原野生人参果与米饭同蒸而成。人参果学名鹅绒委陵菜，生长在高原草甸。米饭香甜软糯，人参果绵软可口，是藏历新年必备食品，寓意吉祥如意）']},
{title:'传统节日',items:['藏历新年（藏语音译“洛萨”，是藏族最隆重的传统节日。时间在藏历正月初一，与农历新年相近但不同。节日期间人们穿新衣、拜年、吃古突（面疙瘩汤），家家户户挂经幡、煨桑烟，祈求新年平安吉祥。节日持续约半个月）','雪顿节（藏语音译“吃酸奶子的节日”，每年藏历七月一日开始，持续5至7天。2006年列入国家级非物质文化遗产。节日源于僧人解禁后吃酸奶的习俗，后来演变为藏戏节。有展佛、藏戏表演、赛牦牛等活动，是藏族最盛大的节日之一）','萨嘎达瓦节（藏历四月十五，是佛祖释迦牟尼出生、悟道、圆寂的日子。是藏传佛教最神圣的节日之一，信众转经、布施、持咒。拉萨八廓街上转经人络绎不绝，林廓转经道人山人海）','沐浴节（藏历七月，是藏族人传统的洗澡健身节日。相传此时的水具有特殊的功效，能洗去疾病和晦气。人们扶老携幼到河边沐浴、洗衣，节日持续一周左右）','赛马节（西藏各地均有，以当雄赛马节最为著名。通常在藏历七八月举行，有马术表演、赛马、射箭、抱石等传统竞技项目。康巴汉子骑术精湛、马蹄飞扬，是藏族体育文化的重要展示）','酥油花灯节（藏历正月十五，是藏传佛教最隆重的灯会。塔尔寺酥油花灯节最为著名，僧侣用彩色酥油塑制精美佛像花卉，夜晚灯火辉煌，吸引了大量信众和游客）']},
{title:'旅游攻略',items:['最佳时间：5月至10月是西藏最佳旅游季节，其中6月至9月天气最好。冬季11月至次年4月气温低但游客少，布达拉宫门票容易预约。各有特色，建议根据时间和兴趣选择）','高反应对：进藏前一周可服用红景天，高原安等药物预防高反。进藏后多休息、少运动、多喝水、避免剧烈活动。可提前准备高原安、葡萄糖、氧气袋等。严重高反需及时就医或下撤至低海拔地区）','经典路线：D1拉萨市区（布达拉宫、大昭寺、八廓街）；D2拉萨周边（纳木措或羊卓雍措）；D3林芝三日游（巴松措、雅鲁藏布大峡谷、鲁朗）；D4山南一日游（桑耶寺、雍布拉康））','布达拉宫攻略：需提前一天预约或凭预约券进入。建议请导游讲解才能更好理解其历史价值。红宫参观时间有限，注意游览节奏。尊重宗教礼仪，禁止拍照）','拉萨深度游：哲蚌寺是格鲁派最大寺院；色拉寺下午有辩经；罗布林卡是达赖夏宫；甜茶馆是体验藏族生活的好去处。玛吉阿米餐厅是传说中仓央嘉措约会的地方）','林芝攻略：有“西藏江南”之称，海拔较低（3000米左右），适合初次进藏者。巴松措湖光山色美不胜收；雅鲁藏布大峡谷是世界第一大峡谷，南迦巴瓦峰终年积雪）','注意事项：尊重藏族宗教信仰和风俗习惯，进入寺庙需脱帽、不得拍照的地方不要拍摄。不可触摸佛像和法器。玛尼堆和经幡不可随意破坏）','边防证：前往珠峰、阿里等边境地区需办理边防证，可在户籍所在地或拉萨办理。珠峰大本营现已迁移至绒布寺附近，需注意环保）']}
],

extra:[
{title:'世界遗产与重要景区',items:['秦始皇兵马俑（1987年列入世界文化遗产，位于西安市临潼区骊山北麓，是秦始皇陵的陪葬坑。1974年发现，被誉为“世界第八大奇迹”。三座兵马俑坑呈品字形排列，出土陶俑约8000件，每件面容各异、姿态不同。铜车马展厅展示两乘精美铜车马，被誉为“青铜之冠”。代表秦代雕塑艺术最高成就）','西安城墙（建于明洪武年间1370年至1378年，是中国现存规模最大、保存最完整的古代城垣建筑。全长约13.74公里，墙高12米，厚18米。城墙上有98座敌台、四座角楼，城门四座。内侧有环城公园，外侧有护城河，是西安最具标志性的城市地标）','大雁塔（位于西安市南郊慈恩寺内，始建于唐永徽三年652年，由玄奘法师主持修建。塔高64.5米，七层方形楼阁式砖塔，是中国现存最早、规模最大的唐代砖塔。塔内保存有珍贵的佛经和佛像，是丝绸之路世界文化遗产的重要组成部分）','华清宫（位于西安市临潼区，以唐玄宗与杨贵妃的爱情故事和历代皇家温泉遗址著称。华清池是杨贵妃沐浴之所，“温泉水滑洗凝脂”典故源于此。景区内有唐御汤遗址、五间厅（西安事变旧址）、骊山等景点）','法门寺（位于宝鸡市扶风县，是一座历史悠久的佛教寺院，以安置释迦牟尼佛指骨舍利而闻名。地宫出土的佛指舍利及数千件唐皇家珍宝震惊世界，是佛教文化和皇家艺术的珍贵遗存）','延安革命旧址（延安是中国革命圣地，1935年至1948年是中共中央所在地。宝塔山、杨家岭革命旧址、枣园革命旧址等保存完好，记录了中国共产党从小到大、从弱到强的光辉历程）']},
{title:'省份概况',items:['地理位置：陕西省位于中国西北内陆腹地，东临山西、河南，南接四川、重庆、湖北，西连甘肃、宁夏，北接内蒙古。总面积20.56万平方公里，是中国西北地区重要的省份。地处黄河中游，是中华民族和华夏文明的重要发祥地）','面积人口：陕西省总面积约20.56万平方公里，2024年末常住人口约3952万人，城镇化率约62%。省会西安市人口约1300万，是中国西北地区最大的城市和国家中心城市，2018年获批建设国家中心城市）','历史地位：陕西是中华文明的重要发祥地，有100万年人类史、5000年文明史、1100多年建都史。西安古称长安，是世界四大古都之一，十三朝古都，周、秦、汉、唐等十三个王朝在此建都，创造了璀璨的历史文明）','行政区划：陕西省简称“陕”或“秦”，省会西安市。下辖10个地级市，包括西安市、宝鸡市、咸阳市、铜川市、渭南市、延安市、榆林市、汉中市、安康市、商洛市）','气候特点：属温带半湿润大陆性季风气候，年均气温约13摄氏度，年均降水量约600毫米。南北气候差异明显，秦岭以南属亚热带气候，秦岭以北属暖温带气候。四季分明，春秋季气候宜人）','地形地貌：地势南北高、中间低，南部为秦巴山区，中部为关中平原，北部为黄土高原。秦岭是中国地理南北分界线，主峰太白山海拔3767米。渭河横贯关中平原，是黄河最大支流）','经济发展：2024年陕西省GDP约3.5万亿元，以能源化工、装备制造、航空航天、电子信息等产业为主导。西安是西部地区重要的科研、高等教育和高新技术产业基地，拥有西安交通大学、西北工业大学等知名高校）','文化特色：陕西是中华民族和华夏文明的重要发祥地，周礼、秦制、汉风、唐韵影响深远。秦腔是陕西地方戏曲的代表，被誉为“中国戏曲鼻祖”。剪纸、皮影、腰鼓等民间艺术独具特色）']},
{title:'特色美食',items:['肉夹馍（陕西名吃，被誉为“中国汉堡”。选用白吉饼夹入腊汁肉，腊汁肉以五花肉配以多种香料慢炖数小时，肥而不腻、瘦而不柴，夹入饼中香气四溢。西安街头随处可见，以樊记腊汁肉夹馍最为著名）','羊肉泡馍（西安传统名吃，选用优质羊肉和羊骨熬制高汤，泡入手工烙制的饦饦馍。食客需亲手将馍掰成小块，再交由厨师烹煮。配上糖蒜和辣子酱，汤鲜肉烂、馍筋光滑，香气扑鼻）','凉皮（陕西传统小吃，有米皮、面皮等品种。选用优质面粉或米浆蒸制而成，配以黄瓜丝、面筋，浇上醋、蒜水和辣子油。口感软糯或筋道，酸辣爽口，是夏季消暑佳品，西安凉皮以魏家凉皮最有名）','biangbiang面（陕西特色面食，因制作时面条拍打案板发出“biangbiang”声而得名。面条宽如裤带，配以臊子肉、西红柿鸡蛋、油泼辣子等。手工扯面筋道弹牙，臊子鲜香，是陕西“八大怪”之一）','西凤酒（四大名酒之一，产于宝鸡市凤翔区柳林镇，有三千余年历史。属于凤香型白酒，清而不淡、浓而不艳，集酱香、浓香优点于一体。唐代即有“开坛香十里，隔壁醉三家”之美誉）','西安甑糕（西安传统小吃，用糯米和红枣在铁甑中蒸制而成。甑糕色泽红白相间、绵软粘甜，糯米软糯、红枣香甜，是西安人喜爱的早餐和零食，回民街的东南亚甑糕最有名）','岐山臊子面（宝鸡市岐山县特产，以“薄、筋、光、煎、稀、汪、酸、辣、香”九大特点著称。面条细长，臊子鲜香，汤底酸辣可口，是陕西人待客的上等面食）','锅盔（陕西传统面食，制作时需用铁锅烙制，外表金黄酥脆、内部松软可口。锅盔个大壁厚，便于保存和携带，是古代行军打仗的干粮。陕西锅盔以乾县锅盔最有名）']},
{title:'传统节日',items:['黄帝陵祭祖（每年清明节在延安市黄陵县黄帝陵举行公祭典礼，是全球华人追思先祖的重要活动。黄帝陵是中华民族人文初祖轩辕黄帝的陵寝，有“中华第一陵”之称。清明公祭黄帝陵是中华民族的传统礼仪）','延安过大年（春节期间延安举办的传统节庆活动，有扭秧歌、打腰鼓、剪窗花、贴春联等民俗活动。延安是中国革命圣地，红色文化与陕北民俗相结合，独具特色）','西安城墙灯会（每年春节期间在西安城墙上举办，是西安最盛大的灯会活动。万盏花灯将古城墙装点得流光溢彩，既有传统民俗灯组，也有现代科技灯饰，是西安春节旅游的名片）','法门寺浴佛节（每年农历四月初八在法门寺举行，纪念佛祖释迦牟尼诞辰。浴佛仪式庄严肃穆，信众虔诚参与，是佛教文化的重要活动，吸引众多海内外信众和游客）','西安世园会（2011年在西安浐灞生态区举办，是中国第三次举办世界园艺博览会。园区面积418公顷，展示国内外园林园艺精品，是西安近年来最具影响力的国际性展会）','延安秧歌节（每年正月十五前后在延安举办，是陕北地区最具代表性的群众性文化活动。秧歌、腰鼓、舞龙舞狮等民俗表演热闹非凡，体现了延安独特的地域文化）']},
{title:'旅游攻略',items:['最佳时间：3月至5月和9月至11月是陕西最佳旅游季节。春季可赏青龙寺樱花、城墙上花展；秋季秋高气爽，是游览华山的最佳时节。夏季炎热，冬季寒冷但可体验北方年味）','经典路线：D1西安市区（城墙、钟鼓楼、回民街）；D2东线一日游（兵马俑、华清池）；D3西线一日游（乾陵、法门寺）；D4华山或延安二日游）','西安深度游：城墙建议租自行车环城骑行；大雁塔北广场有亚洲最大音乐喷泉，晚8点半开始；大唐不夜城夜景璀璨；碑林博物馆书法艺术瑰宝；陕西历史博物馆免费预约）','华山攻略：华山以险著称，有“奇险天下第一山”之称。建议乘缆车西峰上、北峰下，或北上西下。智取华山路徒步需体力，注意安全。最佳观日出地点是东峰）','延安红色游：延安革命旧址包括宝塔山、杨家岭、枣园等，建议包车一日游。可观看红秀《延安保育院》实景演出，感受革命历史）','美食地图：回民街是西安美食集中地，羊肉泡馍、肉夹馍、凉皮、灌汤包应有尽有；永兴坊是摔碗酒网红地；长安大排档体验古风主题餐饮）','门票预约：兵马俑需提前在官方公众号预约，华清池《长恨歌》演出需提前订票。秦始皇帝陵博物院由兵马俑博物馆和丽山园两部分组成，两处均需参观）','注意事项：西安夏季炎热注意防暑；华山游览注意安全，量力而行；尊重当地风俗习惯。回民街用餐注意清真禁忌。提前预约热门景点门票）','交通建议：西安咸阳国际机场是重要航空枢纽，高铁可达北京、上海、广州等城市。市内地铁网络发达，钟楼、回民街、大雁塔等景点可地铁直达）']}
],

extra:[
{title:'世界遗产与重要景区',items:['莫高窟（1987年列入世界文化遗产，位于敦煌市东南25公里的鸣沙山东麓断崖上，现有735个洞窟保存壁画4.5万平方米、彩塑2415尊，是中国现存规模最大、内容最丰富的佛教艺术宝库，被誉为"东方艺术明珠"，对研究中国古代政治、经济、文化、宗教具有重要价值）','嘉峪关（明长城最西端关口，素有"天下第一雄关"之称，始建于明洪武五年1372年，由内城、外城、城壕三道防线组成，呈梯形分布，关城南北连接长城，与东边的山海关遥相呼应，关楼巍峨壮丽，是古代丝绸之路的重要关隘和军事防御要塞）','麦积山石窟（位于天水市麦积区，因山形酷似农家麦垛而得名，始建于后秦时期，现有194个窟龛、7000多尊佛像、1300平方米壁画，以其精美的泥塑艺术著称，被雕塑家刘开渠誉为"东方雕塑馆"，与敦煌莫高窟、山西云冈石窟、河南龙门石窟并称为中国四大石窟）','炳灵寺石窟（位于临夏回族自治州永靖县西南约52公里处的黄河北岸，开凿于西秦建弘元年公元420年，是中国现存最早有明确纪年的石窟，比莫高窟还要早近百年，现存窟龛185个，保存大量北魏至明清时期的壁画和雕塑，具有极高的历史和艺术价值）','甘肃长城（甘肃是长城资源最丰富的省份之一，总长度约1700公里，占全国长城总长度的三分之一，包括战国秦长城、汉长城、明长城三代长城遗址，跨越张掖、酒泉、嘉峪关等地，是研究中国古代军事防御体系的重要实物资料）']},
{title:'省份概况',items:['地理位置：甘肃省位于中国西北部、黄河上游地区，地处黄土高原、青藏高原和内蒙古高原三大高原交汇处，东南连接陕西、四川，西南接青海、新疆，西连新疆、北接宁夏、内蒙古，总面积约42.58万平方公里，是中国地理位置最狭长的省份之一，东西跨度约1400多公里）','行政区划：甘肃省简称"甘"或"陇"，省会为兰州市，下辖12个地级市州，包括兰州市、嘉峪关市、金昌市、白银市、天水市、武威市、张掖市、平凉市、酒泉市、庆阳市、定西市、陇南市，以及临夏回族自治州和甘南藏族自治州两个自治州）','河西走廊：甘肃中西部狭长地带，因位于黄河以西形似走廊而得名，是古丝绸之路的精华路段，全长约1000公里、宽数公里至百公里不等，武威、张掖、酒泉、敦煌并称"河西四郡"，是东西方文明交汇融合的重要通道，见证了千年丝路辉煌）','省会兰州：兰州是甘肃省政治、经济、文化中心，人口约435万，是中国唯一黄河穿城而过的省会城市，因"黄河之都"著称，市区沿黄河两岸分布形成了"两山夹一河"的独特城市格局，白塔山、中山桥、水车博览园等景点展现了黄河文化的独特魅力）','历史地位：甘肃古属雍州、凉州，是中华民族和华夏文明的重要发祥地之一，也是中医药学的发源地之一，自古就是古丝绸之路的咽喉要道和军事重镇，连接中原与西域，是东西方文明交汇融合的重要舞台，历史文化底蕴深厚）']},
{title:'特色美食',items:['兰州牛肉面（百年中华老字号美食，讲究"一清二白三红四绿五黄"，一清指汤清、二白指萝卜白、三红指辣椒油红、四绿指香菜绿、五黄指面条黄，面条按粗细分为毛细、细、三细、二细、韭叶、薄宽、大宽等种类，正宗牛肉面清晨现做现卖，汤鲜肉香面韧，是兰州人生活中不可或缺的美食）','手抓羊肉（甘肃经典名菜，尤以靖远羊羔肉和盐池滩羊著称，选用优质羊肉大块白水煮制，保留羊肉最原始的鲜美味道，配以椒盐、蒜泥等蘸料食用，不膻不腻、鲜嫩可口，相传有近千年历史，是西北地区待客的上等佳肴）','张掖炒炮（张掖市特色面食，因面条形状短粗似炮仗而得名，制作时将面团拉成小段下锅煮熟，捞出后与卤肉、豆腐、粉条等浇头爆炒，面条筋道弹牙、浇头香浓味美，是张掖人最爱的家常美食之一，分量实在、价格亲民）','天水呱呱（天水传统小吃，起源于西汉时期，已有两千多年历史，选用优质荞麦淀粉经过多道工序熬制而成，成品呈半透明状，配以辣椒油、蒜泥、芝麻酱、酱油醋等调料，香辣软糯、酸辣可口，是天水人早餐的首选，被誉为"西北第一小吃"）','敦煌驴肉黄面（敦煌特色美食，由抻面和卤驴肉组成，面条细如龙须、金黄透亮，配以香菇肉酱和卤驴肉食用，黄面香气扑鼻、驴肉酥烂可口，据传是古代莫高窟工匠们的传统主食，如今已成为敦煌旅游必尝的特色美食）','静宁烧鸡（甘肃省静宁县传统名菜，起源于明末清初，以本地土鸡为原料，配以多种中药材和香料烧制而成，色泽金黄、香味浓郁、酥脆可口、回味无穷，是馈赠亲友的佳品，与天津狗不理包子、沟帮子熏鸡并称"中国三大名鸡"）','灰豆子（兰州特色甜品小吃，选用甘肃特有的一种野生豆类"麻豌豆"与红枣、白糖共同熬制数小时而成，汤汁浓稠、豆子绵软、口感沙糯、甜而不腻，是夏季消暑、冬季暖身的传统美食，老少皆宜）','酿皮子（甘肃青海地区传统面食，有蒸面皮、涮面皮等品种，色泽金黄透亮、口感柔韧筋道，配以辣椒油、蒜泥、芝麻酱、醋等调料，酸辣可口、清爽开胃，是西北地区广受欢迎的消暑美食）']},
{title:'传统节日',items:['敦煌行丝路旅游节（每年8月在敦煌市举办，是甘肃省最重要的旅游节会活动之一，展示敦煌文化、丝绸之路风情和敦煌壁画艺术，包含艺术展演、民俗活动、美食品鉴等内容，吸引国内外游客广泛参与，是了解敦煌文化的重要窗口）','天水伏羲文化旅游节（每年公历6月22日举行，纪念人文始祖伏羲，相传伏羲诞生于天水，该节会包含祭拜仪式、文艺演出、学术研讨等内容，是传承中华优秀传统文化的重要活动，对研究易经文化、寻根问祖具有重要意义）','兰州黄河旅游节（每年夏季在兰州举办，围绕黄河文化主题，举办龙舟赛、黄河漂流、皮划艇等水上运动项目，以及文艺演出、民俗展演、美食品鉴等文化活动，是展示兰州城市形象和黄河文化的重要平台）','拉卜楞寺毛兰姆法会（每年农历正月十三在甘南州夏河县拉卜楞寺举行，是藏传佛教最盛大的法会活动之一，数万信众和游客齐聚一堂，瞻仰巨幅唐卡（晒佛），场面庄严壮观，体现了藏族同胞虔诚的宗教信仰）','临夏花儿会（每年农历四月在临夏州举办，是多民族共同参与的歌咏盛会，以"花儿"这一民间艺术形式为主，花儿是流传于西北地区的山歌，被列入国家级非物质文化遗产，会期万人同唱、蔚为壮观）','庆阳香包节（每年端午节期间在庆阳市举办，庆阳香包是国家级非物质文化遗产，俗称"荷包""耍货"，是传统刺绣工艺品，具有浓郁的西北风格和民俗特色，香包节期间展示展销各类香包刺绣产品，吸引众多游客）']},
{title:'旅游攻略',items:['最佳旅游季节：5月至10月是甘肃最佳旅游时间，其中7月至9月气候最为宜人，是游览甘南藏族自治州和河西走廊的黄金时段，夏季可避暑，秋季可欣赏胡杨林和雪山景观，冬季可体验冰雪乐趣和温泉养生）','河西走廊自驾游推荐（5日行程）：Day1兰州至武威（约270公里），游览雷台汉墓、海藏寺，品尝三套车；Day2武威至张掖（约230公里），游览七彩丹霞景区，品张掖炒炮；Day3张掖至酒泉（约220公里），游览嘉峪关关城；Day4酒泉至敦煌（约400公里），沿途欣赏戈壁风光；Day5敦煌深度游莫高窟、鸣沙山月牙泉、玉门关、阳关）','甘南深度游推荐（3日行程）：Day1兰州至夏河（约230公里），游览拉卜楞寺、世界最长的转经长廊；Day2夏河至桑科草原至郎木寺（约150公里），体验草原风光和藏族文化；Day3郎木寺至扎尕那（约100公里），游览"石头城"扎尕那，感受迭山主峰的自然奇观）','敦煌深度游推荐（3日行程）：Day1莫高窟（需提前预约，约3至4小时）+鸣沙山月牙泉（傍晚可观赏日落）；Day2阳关、玉门关、汉长城遗址（感受古丝路历史沧桑）；Day3敦煌古城、西千佛洞、榆林窟（深度了解敦煌石窟艺术）','门票预约提示：莫高窟实行预约制参观，需提前15至30天通过莫高窟参观预约网或微信公众号预约门票，门票含数字中心至窟区摆渡车，建议预约上午场以便下午游览鸣沙山，特窟需另购票）','自驾注意事项：甘肃地域辽阔、景点分散，自驾需提前检查车况，油箱加满，备好饮用水和干粮；河西走廊部分路段手机信号较弱，建议下载离线地图；甘南地区海拔较高注意高反，山路弯多需谨慎驾驶）'}
],
questions:[
{q:'莫高窟于哪一年被列入世界文化遗产？',options:['1979年','1987年','1997年','2001年'],answer:1,explain:'莫高窟于1987年被联合国教科文组织列入世界文化遗产名录，现保存洞窟735个、壁画4.5万平方米、彩塑2415尊，是中国现存规模最大、内容最丰富的佛教艺术宝库'},
{q:'"天下第一雄关"指的是甘肃哪个关隘？',options:['山海关','玉门关','嘉峪关','雁门关'],answer:2,explain:'嘉峪关位于甘肃省嘉峪关市，始建于明洪武五年（1372年），是明长城最西端的关口，被称为"天下第一雄关"，与东边的山海关遥相呼应'},
{q:'兰州牛肉面的"五黄"指的是？',options:['面粉黄','面条黄','辣椒油黄','卤蛋黄'],answer:1,explain:'兰州牛肉面讲究"一清二白三红四绿五黄"，其中"五黄"指面条要呈淡黄色，体现了面粉选择和制面工艺的讲究，是评判一碗正宗牛肉面的重要标准'},
{q:'拉卜楞寺位于甘肃哪个地区？',options:['敦煌','张掖','甘南州夏河县','天水'],answer:2,explain:'拉卜楞寺位于甘肃省甘南藏族自治州夏河县，是格鲁派六大寺院之一，寺内拥有世界最长的转经长廊，长约3.5公里，宗教地位崇高'},
{q:'甘肃长城总长度约占全国长城总长度的多少？',options:['五分之一','四分之一','三分之一','二分之一'],answer:2,explain:'甘肃长城总长度约1700公里，约占全国长城总长度的三分之一，是长城资源最丰富的省份之一，包括战国秦长城、汉长城、明长城三代长城遗址'}
]
},,
青海:{
region:'西北',
official:{site:'https://whlyt.qinghai.gov.cn',notice:'关注青海省文化和旅游厅官网',policy:'无特殊限制'},
extra:[
{title:'世界遗产与重要景区',items:['可可西里：2017年列入世界自然遗产，平均海拔超过4500米，是世界上面积最大、海拔最高的高原荒野区，保存着完整的藏羚羊迁徙路线和珍贵的冰川雪山生态系统', '三江源国家公园：中国首个国家公园试点，地处青藏高原腹地，是长江、黄河、澜沧江三大江河的发源地，被誉为"中华水塔"，生态地位极其重要', '青海湖：中国最大的内陆咸水湖，湖面面积4543平方公里，湖水清澈湛蓝，湖畔是重要的鸟类栖息地，每年春季有数十万只候鸟在此繁衍生息', '塔尔寺：藏传佛教格鲁派六大寺院之一，酥油花、壁画、堆绣被誉为"塔尔寺三绝"，寺内建筑金碧辉煌，佛塔林立，艺术价值极高', '茶卡盐湖：著名的"天空之镜"，湖面如镜子般倒映天空和远山，游客可以走在湖面上拍摄绝美倒影照片，是摄影爱好者的天堂', '祁连山草原：中国最美的六大草原之一，水草丰美，牛羊遍野，夏季野花盛开，秋季金黄一片，雪山与草原相映成趣', '坎布拉国家森林公园：丹霞地貌与原始森林完美结合，景区内有众多藏传佛教寺院，红色的丹霞山与翠绿的松柏交相辉映', '阿尼玛卿雪山：藏区四大神山之一，终年积雪，主峰海拔6282米，是登山和探险的理想之地']},
{title:'省份概况',items:['地理位置：位于青藏高原东北部，是长江、黄河、澜沧江的发源地，素有"中华水塔"之称', '面积人口：总面积72.23万平方公里，居全国第四位，人口约600万，是地广人稀的省份', '省会西宁：夏无酷暑、冬无严寒的"中国夏都"，是青藏高原最大的城市和交通枢纽', '民族构成：多民族聚居区，藏族、回族、蒙古族、土族、撒拉族等47个民族和谐共处，少数民族人口占全省总人口的47%', '生态地位：被誉为"中华水塔"，是长江、黄河、澜沧江的发源地，生态战略地位极其重要', '气候特点：属高原大陆性气候，日照时间长，太阳辐射强烈，昼夜温差大，年均气温5.1摄氏度', '经济发展：以畜牧业和盐湖化工为主，是全国最大的钾肥生产基地和重要的太阳能光伏产业基地', '水资源：青海是三江之源，每年向下游输送超过600亿立方米的清洁水源，是中华文明的生命之源']},
{title:'特色美食',items:['手抓羊肉：青海传统名菜，选用高原放养的藏系绵羊，肉质鲜嫩无膻味，配以椒盐和蒜泥直接手抓着吃，是待客的上等佳肴', '酿皮：青海特色小吃，分为白酿皮和黑酿皮两种，以西宁的黑酿皮最为著名，口感柔韧Q弹，配以辣椒油、芝麻酱、蒜汁等调料，酸辣可口', '牦牛酸奶：采用高原牦牛奶发酵制成，质地浓稠如豆腐脑，表面有一层金黄色的奶皮，酸甜适中，营养价值极高，富含蛋白质和钙质', '尕面片：青海人日常喜爱的面食，将面片揪成指甲盖大小的形状，配以羊肉、西红柿、青菜等煮成汤面，味道鲜美，是家的味道', '青海土火锅：使用铜制土火锅，将牛羊肉、豆腐、粉条、蔬菜等食材层层码放，加入特色底料慢炖，食材丰富，汤鲜肉嫩', '杂碎汤：清晨的青海街头，到处可见卖杂碎的店铺，将牛羊内脏煮成浓汤，配以葱花、香菜、辣椒，早晨一碗杂碎汤暖身又暖胃', '狗浇尿饼：名字有趣的面食，因烙制时沿锅边浇油的动作而得名，饼薄酥脆，层次分明，是青海人喜爱的传统小吃', '搅团：用青稞面或小麦面在沸水中搅成糊状，配以酸菜汤或羊肉汤食用，是青海农村的传统美食，代表着乡愁和记忆']},
{title:'传统节日',items:['塔尔寺酥油花灯节：每年正月十五举办，是藏传佛教最隆重的灯会，僧侣用彩色酥油塑制精美佛像和花卉图案，夜晚灯火辉煌，吸引了大量信众和游客', '环青海湖国际公路自行车赛：每年7月至8月举办，是亚洲级别最高的公路自行车赛，也是世界上海拔最高的自行车赛，被评为中国十大最佳赛事之一', '玉树赛马节：每年7月下旬在玉树藏族自治州举行，是康巴藏族最盛大的节日，举行马术表演、赛马、藏式摔跤、射箭等传统体育竞技活动', '土族纳顿节：世界上历时最长的节日，从每年农历七月十二日开始，持续近两个月，是土族人民庆祝丰收、感谢神灵的盛大节日', '热贡唐卡艺术节：每年8月在黄南州同仁市举办，展示藏族唐卡艺术的魅力，包括现场绘制、展览、学术研讨等活动', '青海湖祭海：每年农历七月十五举行，是藏族同胞祭祀青海湖神的传统仪式，祈求风调雨顺、牛羊兴旺，仪式庄严肃穆', '花儿会：西北地区特有的民歌盛会，青海是"花儿"的发源地之一，每年春季各地举办花儿会，对歌场面热闹非凡', '土族波波会：土族特有的宗教节日，在春耕前举行，祭祀五谷神，祈求农业丰收']},
{title:'旅游攻略',items:['最佳时间：6月至9月是青海旅游黄金季节，7月至8月油菜花盛开，青海湖一片金黄，是拍照的最佳时机', '高原反应：青海平均海拔超过3000米，初到高原应避免剧烈运动，多喝水，多吃水果蔬菜，保证充足睡眠，严重者可服用红景天', '交通指南：西宁是交通枢纽，可乘飞机、火车到达，西宁至青海湖约2小时车程，青海湖环湖约400公里，建议自驾或包车', '住宿建议：沿途住宿条件不断完善，青海湖周边有帐篷营地和星级酒店，7月至8月旺季需提前预订', '高海拔环线：青海大环线全长约2500公里，历时7天，途径青海湖、茶卡盐湖、柴达木盆地、敦煌、张掖等地，是深度游玩的经典线路', '装备准备：防晒霜SPF50+必备，墨镜、遮阳帽防紫外线，早晚温差大需带厚外套，冲锋衣或羽绒服是明智之选', '环保提醒：青海生态脆弱，请勿在草原随意碾压，不乱扔垃圾，不投喂野生动物，共同守护三江之源', '特色体验：草原骑马、湖边骑自行车、藏族家访、观看马术表演、制作青稞面食']},
],

region:'华东',
official:{site:'https://whlyj.sh.gov.cn',notice:'关注上海市文化和旅游局官网',policy:'无户籍限制，外省籍考生需提供在沪工作证明'},
extra:[
{title:'世界遗产与重要景区',items:[
'外滩：位于黄浦江畔，全长1.5公里，是上海最著名的标志性景观。52幢风格迥异的建筑群被称为"万国建筑博览会"，融合了哥特式、罗马式、巴洛克式等风格。夜晚灯光璀璨，浦江对岸陆家嘴现代建筑群与外滩历史建筑交相辉映。',
'东方明珠广播电视塔：位于浦东新区陆家嘴，高468米，是上海的标志性建筑之一。塔身由11个大小不一、高低错落的球体组成，集广播电视发射、娱乐、观光于一体，267米处的悬空观光廊可俯瞰上海全景。',
'豫园：国家5A级景区，位于上海老城厢，是江南古典园林的杰出代表。始建于明代，园内假山、流水、亭台楼阁精巧布局，豫园灯会（国家级非遗）每年春节期间举办，是上海最热闹的传统民俗活动。',
'上海迪士尼度假区：位于浦东新区，包含迪士尼乐园、主题酒店和星愿公园等。是中国内地首座迪士尼主题乐园，拥有全球最高的奇幻童话城堡，适合家庭出游和童话爱好者。',
'中共一大会址：位于黄浦区兴业路76号，是中国共产党第一次全国代表大会的召开地。1921年7月23日，13位代表在此秘密召开会议，宣告了中国共产党的诞生。纪念馆免费开放，需预约。',
'佘山：位于松江区，是上海唯一的自然山林，主峰佘山海拔97米。佘山国家森林公园拥有亚洲最大的天文台——佘山天文台，佘山圣母大教堂是天主教朝圣地。',
'上海野生动物园：国家5A级景区，位于浦东新区，展出来自国内外的珍稀动物200余种。园区分为车入区和步行区，可近距离观赏大熊猫、金丝猴、金毛羚牛等中国珍稀动物。',
'朱家角：位于青浦区，是上海保存最完整的江南古镇。素有"上海威尼斯"之称，放生桥是华东地区最大的五孔石拱桥，古镇风貌完整，水乡风情浓郁。'
]},
{title:'省份概况',items:[
'地理位置：上海位于中国大陆海岸线中部、长江入海口，东濒东海，北界长江，西接江苏、浙江两省。总面积6340.5平方公里，是中国面积最小的省级行政区之一。',
'面积人口：2024年末常住人口约2487万人，城镇化率近90%。下辖16个区，是全球最大的工商业城市之一，也是中国重要的经济、金融、贸易、航运中心。',
'历史沿革：上海古为渔村，战国时属楚春申君封地。宋代设上海镇，元代设上海县。1843年开埠后迅速崛起为远东最大城市。1927年设特别市，1949年解放后成为直辖市。',
'经济地位：2024年GDP达5.4万亿元，居全国城市首位。以金融、贸易、航运、科技创新为中心，第三产业占比超过75%。上海港集装箱吞吐量连续多年居全球首位。',
'海派文化：上海在长期发展中形成了独特的"海派文化"，以开放、包容、创新、多元为特征。中西合璧的建筑、戏曲、服饰、饮食文化交融，旗袍、西装并行，京剧、昆曲、沪剧共存。',
'江南文化：上海根植于江南水乡文化底蕴，保留了朱家角、召楼等水乡古镇，豫园、古城公园等古典园林，以及龙华寺、静安寺等历史宗教建筑。',
'红色文化：上海是中国共产党的诞生地，中共一大会址、二大会址、陈云故居等红色遗迹众多。《新青年》编辑部旧址、中共一大纪念馆等是重要的爱国主义教育基地。',
'交通枢纽：上海拥有浦东、虹桥两大国际机场，航线覆盖全球主要城市。京沪、沪宁、沪杭等高铁四通八达。轨道交通运营里程居全国首位。'
]},
{title:'特色美食',items:[
'本帮红烧肉：上海本帮菜的代表，选用五花肉慢火炖制。色泽红亮、油而不腻、入口即化，浓油赤酱是典型特征，配以冰糖、酱油、绍酒等调料，甜中带咸。',
'上海生煎：又称生煎馒头，是上海人最爱的早餐之一。底部煎至金黄酥脆，顶部撒有芝麻和葱花，肉馅鲜嫩多汁，配以醋和姜丝食用，是上海的"国民小吃"。',
'南翔小笼：嘉定区南翔镇的著名点心，皮薄馅大、汤汁丰富。制作工艺讲究"提褶"手法，蒸熟后晶莹剔透，可先用筷子戳破皮吸汤，再品尝肉馅。',
'响油鳝丝：上海本帮菜经典，选用鳝鱼丝与葱姜蒜同炒，淋上热油"滋滋"作响，故名"响油"。鳝丝鲜嫩滑爽，蒜香扑鼻，是夏令时节的美味。',
'上海醉蟹：用活蟹以花雕酒、酱油、冰糖等调料腌制，蟹肉饱满、酒香浓郁，是上海人的传统年菜之一。与江苏的醉蟹工艺相似但口味略有不同。',
'葱油拌面：上海人最爱的面食之一，面条煮熟后拌入葱油，配以酱油、白糖调味。简单却美味，葱香四溢，体现了上海人"浓油赤酱"的饮食偏好。',
'排骨年糕：上海传统小吃，大排炸至金黄后配以甜面酱，配上年糕片同食。排骨酥脆、年糕软糯，甜中带咸，是街头巷尾常见的人气美食。',
'鲜肉月饼：上海特色月饼，苏式月饼的代表。酥皮层层分明，内馅是实打实的鲜肉而非甜馅，需趁热食用才能品尝到皮酥肉鲜的最佳口感，每年中秋供不应求。'
]},
{title:'传统节日',items:[
'豫园灯会：每年春节期间在豫园举办，是国家级非物质文化遗产。灯会期间整个豫园商城张灯结彩，各式彩灯争奇斗艳，吸引数百万游客前来观赏，是上海最具年味的活动。',
'上海国际电影节：每年6月举办，是中国唯一的国际A类电影节。届时中外明星云集，展映数百部中外优秀影片，是电影爱好者的盛会，也是上海城市文化的重要名片。',
'上海旅游节：每年9月中旬举办，是上海规模最大的旅游节庆活动。花车巡游是重头戏，各国表演团体和花车穿越上海主要街区，吸引大量市民游客参与。',
'上海国际马拉松赛：每年11月举办，是上海的传统体育赛事。赛道经过外滩、南京路、淮海路等主要景观，被称为"最美马拉松赛道"，吸引数万名国内外跑者参赛。',
'上海双年展：每两年在上海当代艺术博物馆举办，是中国最具国际影响力的当代艺术大展。来自世界各地的艺术家参展，展示当代艺术的前沿探索。',
'上海桃花节：每年3-4月在浦东新区新场镇等桃花产区举办。桃花盛开时节，游客可赏花、踏青、品尝农家菜，体验上海郊区的田园风光。',
'上海购物节：每年9-10月与上海旅游节同期举办，各大商圈推出优惠活动，百联、新世界等商场打折力度大，是购物血拼的好时机。',
'上海国际音乐烟花节：每年在上海迪士尼度假区举办，邀请各国烟花团队参赛表演。夜晚的烟花与音乐同步，是视觉和听觉的双重享受。'
]},
{title:'旅游攻略',items:[
'最佳时间：3-5月和9-11月是上海最佳旅游季节。春季樱花、桃花盛开；秋季天气宜人、购物节精彩。夏季闷热但可避暑；冬季湿冷但可体验年味。',
'经典路线：D1外滩+南京路+豫园；D2陆家嘴+东方明珠+上海博物馆；D3田子坊+新天地+淮海路；D4迪士尼或朱家角。核心景点3-4天可游览完毕。',
'外滩夜景攻略：外滩观景最佳位置在黄浦公园和对岸的陆家嘴滨江。可沿外滩步行道从外白渡桥走到十六铺，全程约1.5公里，欣赏万国建筑博览群。',
'陆家嘴精华游：东方明珠（登塔观景）、上海中心（118层观光厅可俯瞰全城）、金茂大厦88层观光厅、上海海洋水族馆。正大广场可购物用餐。',
'上海迪士尼：建议提前购票并预约入园时间；必玩项目创极速光轮、七个小矮人矿车、飞越地平线；FP快速通行证可节省排队时间。',
'免费景点：上海博物馆、上海城市规划展示馆、中华艺术宫（原世博会中国馆）、思南路历史街区、田子坊、上海外滩历史纪念馆均可免费参观。',
'美食推荐：南京路步行街（沈大成、泰康食品）、城隍庙（南翔小笼、绿波廊）、淮海路（光明邨、老大昌）、虹口足球场（万寿斋）。',
'交通建议：上海地铁覆盖全城，建议购买一日票或三日票；观光巴士有红线、蓝线等路线串联主要景点；共享单车骑行也很便捷。'
]},
questions:[
{q:'中共一大会址位于上海市哪条路？',options:['南京东路','淮海中路','兴业路','延安中路'],answer:2,explain:'中共一大会址位于上海市黄浦区兴业路76号（原望志路106号），1921年7月23日中国共产党第一次全国代表大会在此秘密召开。'},{q:'上海最高的建筑是哪一个？',options:['东方明珠塔','金茂大厦','上海中心大厦','环球金融中心'],answer:2,explain:'上海中心大厦高632米，是目前上海最高的建筑，也是中国第一高楼。其118层的观光厅可俯瞰上海全景。'},{q:'上海本帮红烧肉的典型特征是什么？',options:['清淡爽口','浓油赤酱','麻辣鲜香','酸甜可口'],answer:1,explain:'上海本帮菜以"浓油赤酱"著称，红烧肉色泽红亮、油而不腻、入口即化，甜中带咸，体现了上海菜的特点。'},{q:'南翔小笼是哪个区的特产？',options:['嘉定区','青浦区','松江区','闵行区'],answer:0,explain:'南翔小笼是上海市嘉定区南翔镇的著名点心，皮薄馅大、汤汁丰富，已有100多年历史，是上海小吃的代表。'},{q:'上海迪士尼度假区位于哪个区？',options:['黄浦区','徐汇区','浦东新区','闵行区'],answer:2,explain:'上海迪士尼度假区位于上海市浦东新区，包含迪士尼乐园、主题酒店和星愿公园等，是中国内地首座迪士尼主题乐园。'}
]

江苏:{
region:'华东',
official:{site:'https://www.jste.net.cn',notice:'关注江苏省文化和旅游厅官网',policy:'无特殊限制'},
extra:[
{title:'世界遗产与重要景区',items:[
'苏州古典园林：1997年和2000年，拙政园、留园、网师园、环秀山庄、狮子林、沧浪亭、耦园、艺圃等9座园林先后列入《世界遗产名录》，是全球拥有世界遗产园林最多的城市。园林将山水、建筑、花木融为一体，"咫尺之内再造乾坤"，是中国园林艺术的杰出代表。',
'明孝陵：2003年列入世界文化遗产，位于南京市紫金山南麓，是明朝开国皇帝朱元璋及其皇后马氏的陵墓。陵墓布局庄严宏伟，神道石刻精美绝伦，代表了明清皇家陵寝的最高成就，是南京重要的历史文化地标。',
'中国大运河（江苏段）：2014年列入世界文化遗产，江苏段全长690公里，途经徐州、宿迁、淮安、扬州、镇江、常州、无锡、苏州8个城市。运河两岸遗迹众多，是研究中国古代水利工程和漕运文化的重要实物。',
'太湖鼋头渚：国家5A级景区，位于无锡市滨湖区，是太湖西北岸的半岛，因巨石突入湖中状如浮鼋翘首而得名"鼋头渚"。郭沫若赞"太湖佳绝处，毕竟在鼋头"，每年春季樱花烂漫，是观赏太湖风光的最佳去处。',
'扬州瘦西湖：国家5A级景区，位于扬州市区西北部，是清代康乾时期形成的湖上园林群。总面积约200亩，以"瘦"著称，五亭桥、二十四桥，白塔等景点错落有致，被誉为"园林之盛，甲于天下"。',
'周庄古镇：国家5A级景区，江南六大古镇之一，位于苏州市昆山市。保存完好的明清建筑近千座，"小桥、流水、人家"的水乡风光完整如初，有"中国第一水乡"之誉。',
'南京钟山风景区：国家5A级景区，位于南京市东郊，包含中山陵、明孝陵、灵谷寺等景点。中山陵是孙中山先生的陵墓，明孝陵是朱元璋陵寝，风景优美，文化底蕴深厚。',
'连云港花果山：国家5A级景区，位于连云港市南云台山中麓，因《西游记》描写为孙悟空老家而闻名。主峰玉女峰海拔624米，是江苏最高峰，山上水帘洞、玉女峰等景点与神话传说紧密相连。'
]},
{title:'省份概况',items:[
'地理位置：江苏省位于中国大陆东部沿海、长江下游，东濒黄海，西连安徽，北接山东，东南与浙江和上海毗邻。跨江滨海，水网密布，湖泊众多，全国五大淡水湖得其二（太湖、洪泽湖）。',
'面积人口：2024年末常住人口8526万人，城镇化率75.5%。陆域国土面积10.72万平方公里，占全国1.12%。全省共有13个设区市、95个县（市、区），省会为南京市。',
'地形气候：地形以平原为主，平原面积占87%，居全国首位。水域面积占17%，河渠纵横、湖荡棋布。属亚热带季风向暖温带季风过渡气候，年均气温13-16摄氏度，年均降水量800-1200毫米。',
'历史文化：江苏建省始于清代初年，省名取江宁、苏州二府首字。南京是"六朝古都"，苏州是吴文化发祥地，扬州是淮扬文化中心。昆曲、苏绣、扬剧等非物质文化遗产享誉海内外。',
'经济地位：2024年GDP达137008亿元，位居全国第二，增长5.8%。苏州GDP超2.6万亿居全省第一。制造业高质量发展指数连续四年全国第一，是全国经济最发达的省份之一。',
'鱼米之乡：江苏是中国著名的"鱼米之乡"，水稻产量居全国前列，太湖、洪泽湖等淡水养殖发达。淮扬菜是中国四大菜系之一，以清淡鲜美、刀工精细著称。',
'水乡文化：江苏水系发达，大运河纵贯南北，长江横穿东西。秦淮河、苏州河等江河孕育了独特的水乡文化，形成了昆曲、评弹、苏绣等文化艺术。',
'交通优势：高速铁路里程居全国前列，实现设区市全部通动车。高速公路网络密集，9个城市开通城市轨道交通。南京、苏州等城市地铁便捷发达。'
]},
{title:'特色美食',items:[
'扬州炒饭：淮扬菜经典，将米饭与火腿、虾仁、鸡蛋、青豆等配料同炒。相传源于隋朝越国公杨素喜爱的"碎金饭"，如今已成为闻名中外的中华名饭。讲究配料丰富、色彩鲜艳、粒粒分明。',
'苏州松鼠鳜鱼：苏帮菜代表作，鳜鱼经花刀处理后炸成松鼠状，浇上酸甜酱汁。外形金黄酥脆，形似松鼠，酸甜适口，是宴席上的经典大菜。',
'南京盐水鸭：南京名菜，又称"桂花鸭"，因鸭在桂花盛开时制作最佳而得名。皮白肉嫩、肥而不腻、香鲜味美，是南京人的日常美食，也是馈赠亲友的特产。',
'镇江锅盖面：江苏十大面条之首，在面锅里加入小锅盖煮面，面条在锅盖下形成独特的筋道口感。配以长鱼（黄鳝）、牛肉、肥肠等浇头，汤鲜面弹，是镇江人的早餐首选。',
'淮安软兜长鱼：淮扬菜代表，选用鳝鱼脊背肉制作，因Formerly用布兜盛装而得名。成菜软嫩滑爽、蒜香浓郁，是淮安地区的传统名菜。',
'无锡酱排骨：无锡名菜，选用猪肋排经酱油、冰糖、绍酒等调料慢火炖制。色泽红亮、肉质酥烂、甜中带咸，是无锡"三凤桥"等老字号的招牌产品。',
'苏州阳澄湖大闸蟹：每年秋季上市的时令美食，素有"蟹中之王"的美誉。蟹黄饱满、蟹膏丰腴、肉质细嫩，清蒸最能保留原汁原味，是馈赠佳品。',
'南京秦淮八绝：夫子庙地区的特色小吃总称，包括魁光阁的五香茶叶蛋、永和园的黄桥烧饼、奇芳阁的鸭油酥烧饼等，是体验南京小吃文化的必选。'
]},
{title:'传统节日',items:[
'苏州虎丘庙会：每年中秋前后在苏州虎丘山举办，是苏州最古老的传统节日活动。庙会期间有民俗表演、工艺展示、庙市交易等内容，是体验苏州民俗文化的重要活动。',
'扬州烟花三月旅游节：每年3-5月在扬州举办，是扬州最重要的旅游节庆活动。活动包括瘦西湖赏花、古运河游览、盐商宅邸开放等，吸引大量游客前来踏青赏春。',
'南京国际梅花节：每年2-3月在中山陵风景区梅花山举办，是南京最负盛名的花事节庆。梅花山拥有4万余株梅花、350多个品种，是全国最大的赏梅胜地。',
'周庄水乡风情节：每年五一、十一黄金周在周庄举办，有民俗表演、水乡婚典、打莲厢、宣卷等节目，展现江南水乡的传统文化和民俗风情。',
'盱眙国际龙虾节：每年6月在淮安市盱眙县举办，是盱眙龙虾的推广盛会。节日期间有万人龙虾宴、烹饪大赛、龙虾文化展等活动，是美食爱好者的天堂。',
'苏州寒山寺新年听钟声：每年除夕夜在苏州寒山寺举办，已有40多年历史。108声钟声寓意消除108种烦恼，是体验江南年俗、祈福迎新的特色活动。',
'扬州个园菊花会：每年10-11月在扬州个园举办，是扬州传统花事活动。个园以竹石著称，菊花会期间展出数百种菊花，游客可欣赏"采菊东篱下"的意境。',
'苏州端午金鸡湖龙舟赛：每年端午节在苏州工业园区金鸡湖举办，是苏州规模最大的龙舟赛事。来自国内外的队伍参赛，岸边观众众多，热闹非凡。'
]},
{title:'旅游攻略',items:[
'最佳时间：4-6月和9-11月是江苏最佳旅游季节。春季苏州园林、扬州瘦西湖春意盎然；秋季桂花飘香、螃蟹肥美。夏季荷花盛开，冬季可泡温泉。',
'苏南经典线：南京（中山陵+明孝陵+夫子庙2天）→镇江（金山寺+西津渡1天）→扬州（瘦西湖+个园+东关街1-2天）→苏州（园林+周庄2天）。全程5-7天尽享江南风情。',
'苏州园林深度游：建议购买联票或年卡，必游拙政园（最大）、留园（最精）、网师园（夜游）；虎丘有"吴中第一名胜"之称；留园路步行街可体验苏州老城区生活。',
'南京文化游：中山陵免费但需预约；明孝陵60元是朱元璋陵寝；夫子庙地区免费，秦淮河夜游必体验；南京博物院免费需预约，是中国三大博物院之一。',
'扬州慢生活：扬州早餐"皮包水"（汤包）必须体验，趣园茶社排队也值得。瘦西湖建议清晨或傍晚游览，人少景美；东关街品尝四望亭美食。',
'太湖休闲游：无锡鼋头渚春季赏樱、夏季赏荷；灵山胜境拜灵山大佛、观九龙灌浴演出；拈花湾是唐风小镇，夜景绝美。',
'美食地图：南京（夫子庙秦淮风味）、苏州（观前街松鹤楼得月楼）、扬州（冶春茶社富春茶社）、无锡（南长街南禅寺）。淮扬菜讲究清淡鲜美时令。',
'交通建议：高铁四通八达，南京至上海约1小时。苏州、无锡城市地铁便捷。主要景区公交或打车可达，周庄需从苏州或昆山乘车前往。'
]},
questions:[
{q:'苏州古典园林于哪一年开始列入世界遗产？',options:['1995年','1996年','1997年','1998年'],answer:2,explain:'1997年，拙政园、留园、网师园、环秀山庄作为"苏州古典园林"列入《世界遗产名录》。2000年，又有5座园林被列入，使苏州拥有9座世界遗产园林。'},{q:'中国四大名园中，哪两座位于苏州？',options:['颐和园和承德避暑山庄','拙政园和留园','网师园和狮子林','沧浪亭和耦园'],answer:1,explain:'中国四大名园是指拙政园、留园、颐和园、承德避暑山庄。其中拙政园和留园位于苏州，是中国古典园林的杰出代表。'},{q:'明孝陵是哪个朝代哪位皇帝的陵墓？',options:['唐朝李世民','明朝朱元璋','清朝康熙','宋朝赵构'],answer:1,explain:'明孝陵位于南京市紫金山南麓，是明朝开国皇帝朱元璋及其皇后马氏的陵墓，始建于1381年，耗时25年建成。'},{q:'淮扬菜是江苏省哪个地区的代表菜系？',options:['南京','苏州','扬州和淮安','无锡'],answer:2,explain:'淮扬菜以扬州、淮安为中心，讲究清淡鲜美、刀工精细，是中国四大菜系之一，以制作精细、风格雅致著称。'},{q:'阳澄湖大闸蟹产自江苏省哪个城市？',options:['南京','苏州','扬州','无锡'],answer:1,explain:'阳澄湖位于苏州市境内，是著名的"蟹中之王"产区。阳澄湖大闸蟹以青背、白肚、黄毛、金爪著称，是馈赠佳品。'}
]
},
浙江:{
region:'华东',
official:{site:'https://whlyt.sh.gov.cn',notice:'关注上海市文化和旅游局官网',policy:'无户籍限制，非沪籍考生需提供在沪工作证明'},
extra:[
{title:'世界遗产与重要景区',items:[
'西湖：2011年列入世界文化遗产，位于杭州市区西部的湖泊风景区，面积约6.39平方公里，以"一山、二塔、三岛、三堤、五湖"著称于世。自古以来，西湖就是文人墨客吟咏的对象，苏轼"欲把西湖比西子，淡妆浓抹总相宜"使其获得"西子湖"美誉。雷峰塔、断桥残雪、苏堤春晓等"西湖十景"闻名中外。',
'良渚古城遗址：2019年列入世界遗产，位于杭州市余杭区，是长江下游地区新石器时代晚期规模最大的城址，距今约5300-4300年。遗址展现了中华文明起源阶段稻作农业的高度成就，出土的玉器数量与质量为同期文化之最，被史学界称为"中华第一城"。',
'千岛湖：国家5A级景区，位于杭州市淳安县，1959年因建设新安江水电站形成的人工湖。水域面积580平方公里，拥有1078座大小岛屿，湖水透明度达7-12米可直接饮用，被誉为"天下第一秀水"。湖水清澈碧蓝，岛屿星罗棋布，是长三角地区重要的度假胜地。',
'普陀山：中国四大佛教名山之一，国家5A级景区，位于舟山市普陀区，是观音菩萨的道场。面积12.52平方公里，海天佛国、梵音袅袅，南海观音铜像高33米矗立山巅。普济寺、法雨寺、慧济寺三大寺香火鼎盛，与山西五台山、四川峨眉山、安徽九华山并称。',
'乌镇：国家5A级景区，江南六大古镇之一，位于桐乡市，分为东栅和西栅两大部分。保存完好的明清古建筑、小桥流水人家，被誉为"中国最后的枕水人家"。木心美术馆、乌镇戏剧节（每年10月举办）更增添了文化气息，是体验江南水乡风情的绝佳之地。',
'西塘：国家5A级景区，江南六大古镇之一，位于嘉善县，保存了25万平方米的明清古建筑。千米烟雨长廊是标志性景观，夜晚红灯笼亮起时酒吧街热闹非凡，被誉为"活着的千年古镇"。',
'南浔古镇：江南六大古镇之一，位于湖州市，以中西合璧的建筑风格著称。拥有嘉业堂藏书楼、小莲庄、张石铭故居等明清古建筑，百间楼建筑群最为著名，是中国近代丝商的聚集地。',
'莫干山：国家4A级景区，位于德清县，以竹、云、泉"三胜"和清、静、绿、凉"四优"著称。拥有250多幢风格各异的别墅，被誉为"世界建筑博物馆"，是中国四大避暑胜地之一，裸心谷、法国山居等高端民宿聚集。'
]},
{title:'省份概况',items:[
'地理位置：浙江省位于中国东南沿海、长江三角洲南翼，陆域面积10.55万平方公里，海域面积26万平方公里。东临东海，南靠福建，西与江西、安徽相连，北与上海、江苏接壤。境内最大河流为钱塘江，因江流曲折又称浙江，省以江名，简称"浙"。',
'面积人口：2024年末常住人口6670万人，比2023年末增加43万人。城镇化率75.5%，下辖11个地级市，省会为杭州市。陆域面积为全国较小的省份之一，但海域面积广阔，海岸线长6486公里，居全国首位，沿海岛屿3000余个，是全国岛屿最多的省份。',
'地形气候：地势南高北低，南部为山地，中部为丘陵盆地，北部为平原水网。地跨中亚热带和南亚热带，属亚热带季风气候，温暖湿润，四季分明，年均气温15-18摄氏度，年均降水量1100-2000毫米。',
'历史文化：浙江是中华文明的发祥地之一，河姆渡文化、良渚文化举世闻名。自古有"鱼米之乡"、"丝绸之府"美誉， 青瓷、龙泉剑、杭绣等手工艺精湛。浙商文化源远流长，是中国民营经济最发达的省份之一。',
'经济地位：2024年GDP达90131亿元，居全国第四位，增长5.5%。以数字经济、民营经济、制造业为主，阿里巴巴、海康威视等龙头企业云集。外贸进出口总额连续多年位居全国前列。',
'特色产业：浙江是中国数字经济大省，电子商务、移动支付、云计算等产业发达。杭州是互联网之城，宁波是港口城市和制造业基地，温州是民营经济发源地，义乌是小商品之都。',
'生态环境：森林覆盖率61.17%，钱塘江、瓯江等水系发达。西湖、千岛湖等风景区众多，空气质量优良天数比例居全国前列，"千村示范、万村整治"工程改善了农村人居环境。',
'交通网络：高速公路总里程居全国前列，实现县县通高速。杭州东站是全国高铁枢纽，宁波舟山港是全球货物吞吐量最大港口。萧山机场、栎社机场是主要航空枢纽。'
]},
{title:'特色美食',items:[
'西湖醋鱼：杭州名菜，选用西湖鲲鱼烧制，鱼肉鲜嫩，酸甜适口。据传源于南宋，诗人苏东坡推崇有加。成菜色泽红亮，肉质鲜嫩，酸甜适中，堪称杭帮菜的代表作。',
'龙井虾仁：杭州名菜，将鲜活河虾仁与龙井新茶同烹。虾仁白嫩，茶香清幽，是春季时令佳肴，体现了杭帮菜"清鲜本味"的特色，被誉为"一锅两菜"的典范。',
'东坡肉：苏东坡在杭州任职时发明的名菜，选用五花肉慢火炖制。色泽红亮如玛瑙，肥而不腻，入口即化，配以绍酒、冰糖慢焖，香气四溢，是宴席上的压轴大菜。',
'片儿川：杭州人最爱的面食，面条筋斗，汤头鲜美，配以雪菜、笋片、肉丝。奎元馆的片儿川被誉为"浙江第一面"，是杭州人早餐的首选。',
'绍兴黄酒：中国黄酒的代表，以鉴湖水酿造，色泽澄黄清亮，香气浓郁醇厚。分为元红、加饭、善酿、香雪四大类型，花雕、太雕是绍兴黄酒的名牌产品。',
'绍兴臭豆腐：绍兴特色小吃，用苋菜梗汁发酵制成的臭豆腐，外酥里嫩，配以辣酱或甜面酱食用。鲁迅故里附近摊位林立，是游客必尝的特色美食。',
'舟山海鲜：舟山渔场是中国最大的渔场，梭子蟹、带鱼、黄鱼、墨鱼等海鲜品质优良。沈家门夜排档是品尝海鲜的好去处，海鲜面、葱油梭子蟹是招牌美食。',
'嘉兴粽子：嘉兴粽子是江南粽子的代表，五芳斋粽子最为著名。分为咸粽（鲜肉、蛋黄）和甜粽（豆沙、枣泥）两大类，糯米软糯，馅料丰富，是伴手礼的首选。'
]},
{title:'传统节日',items:[
'乌镇戏剧节：每年10月在乌镇举办，汇聚国内外顶尖戏剧团体，已成为中国最具影响力的戏剧节庆活动之一。除正式演出外，还有古镇嘉年华、青年竞演等板块。',
'西湖桂花节：每年9月下旬至10月在西湖周边举办，杭州满觉陇是赏桂胜地。桂花糕、桂花茶、桂花糖等桂花美食应有尽有，香气袭人，吸引大量游客前来赏桂品茗。',
'钱塘江观潮：每年农历八月十八是钱塘江潮水最为壮观的日子，海宁盐官是最佳观潮地点。潮水汹涌澎湃高达数米，形成"一线潮"、"回头潮"等奇观，被誉为"天下奇观"。',
'龙舟竞渡：端午节期间，浙江各地均有龙舟赛。杭州西湖、温州楠溪江等地举办的龙舟赛最为著名，选手们划桨劈浪、呐喊助威，展现团队协作精神。',
'畲族三月三：每年农历三月初三，丽水景宁畲族自治县举办畲族传统节日。身着民族服饰的畲族同胞载歌载舞，对歌传情，举办祭祀仪式、歌舞表演等民俗活动。',
'绍兴黄酒节：每年秋季在绍兴举办，展示绍兴黄酒文化。游客可参观黄酒博物馆、品尝各类黄酒、参与开酿仪式，体验绍兴酒文化的独特魅力。',
'普陀山观音香会期：每年农历二月十九、六月十九、九月十九是观音菩萨诞辰、成道、出家纪念日，普陀山举行盛大的法会，香客如云，是礼佛祈福的最佳时节。',
'绍兴祭禹大典：每年清明节前后在绍兴大禹陵景区举行公祭大禹典礼。身着古装的祭祀队伍进行祭拜仪式，颂扬大禹治水的丰功伟绩，是传承大禹精神的重要活动。'
]},
{title:'旅游攻略',items:[
'最佳时间：3-5月和9-11月是浙江最佳旅游季节。春季杭州西湖赏樱、龙井采茶；秋季桂花飘香、乌镇戏剧节。建议避开6月梅雨季节和7-8月台风季节。',
'经典路线：杭州（西湖+灵隐寺+宋城2天）→乌镇（东栅+西栅夜景1晚）→绍兴（鲁迅故里+东湖1天）→宁波/舟山（普陀山1-2天）。全程5-7天可玩遍精华。',
'杭州深度游：西湖建议骑行环湖，断桥残雪、苏堤春晓等十景各有韵味；灵隐寺需要购买飞来峰门票+香花券；西溪湿地乘摇橹船游览体验更佳。',
'乌镇住宿攻略：西栅景区内住宿可免门票，客栈临水而建，夜晚华灯初上最美；东栅住宿便宜但体验原生态。建议在西栅住一晚体验水乡夜景。',
'舟山海岛游：普陀山需乘船上岛，建议清晨出发；东极岛是《后会无期》取景地，海水湛蓝；枸杞岛蓝海牧场适合发呆看星空。注意查好船班时刻表。',
'美食推荐：杭州知味观、外婆家是杭帮菜代表；绍兴寻宝记、咸亨酒店品尝黄酒文化；舟山沈家门夜排档海鲜新鲜实惠；五芳斋粽子是伴手礼首选。',
'交通建议：高铁覆盖主要城市，杭州至绍兴约20分钟，杭州至宁波约1小时。舟山需从宁波或沈家门乘船，建议自驾或跟团。',
'门票预约：西湖免费但灵隐寺、宋城等需提前购票；乌镇东栅120元、西栅150元联票；普陀山门票+船票需提前预订，避免节假日排队。'
]},
questions:[
{q:'杭州西湖于哪一年被列入世界文化遗产？',options:['2009年','2010年','2011年','2012年'],answer:2,explain:'2011年6月24日，在巴黎举行的世界遗产委员会第35次会议上，杭州西湖文化景观被列入《世界遗产名录》。'},{q:'中国四大佛教名山中，哪座是观音菩萨的道场？',options:['五台山','峨眉山','普陀山','九华山'],answer:2,explain:'普陀山是中国四大佛教名山之一，位于浙江省舟山市，是观音菩萨的道场，与五台山（文殊）、峨眉山（普贤）、九华山（地藏）并列。'},{q:'良渚古城遗址位于浙江省哪个城市？',options:['杭州','宁波','温州','绍兴'],answer:0,explain:'良渚古城遗址位于浙江省杭州市余杭区，2019年被列入世界遗产名录，是长江下游地区新石器时代晚期规模最大的城址，距今约5300-4300年。'},{q:'浙江的省会是哪个城市？',options:['宁波','温州','杭州','绍兴'],answer:2,explain:'杭州市是浙江省省会，位于浙江省北部、钱塘江下游，是长三角地区重要的中心城市，也是阿里巴巴等互联网企业总部所在地。'},{q:'钱塘江潮水最为壮观的时期是农历？',options:['正月十五','三月三','八月十八','九月九'],answer:2,explain:'民间有"八月十八潮，壮观天下无"的说法，每年农历八月十八是钱塘江潮水最为壮观的日子，海宁盐官是最佳观潮地点。'}
]
},

澳门:{
region:'华南',
official:{site:'https://www.dst.gov.mo',notice:'关注澳门特别行政区政府旅游局官网',policy:'持港澳通行证及签注入境'},
extra:[
{title:'世界遗产与重要景区',items:['大三巴牌坊是澳门的标志性建筑，原为圣保禄大教堂的前壁，1835年火灾后仅余此牌坊。巴洛克式建筑风格融合中西文化元素，浮雕上的圣经故事与中式祥云图案交相辉映。牌坊下方的恋爱巷是热门打卡地，色彩斑斓的葡式建筑充满浪漫气息。','澳门历史城区于2005年被列入世界遗产名录，包含20多处中西合璧的历史建筑。从大三巴步行至妈阁庙，沿途经过议事亭前地、仁慈堂、岗顶剧院、圣老楞佐教堂等景点，串联起400多年的中西交流史。','妈阁庙是澳门最古老的禅院，始建于明朝弘治元年（1488年）。妈祖阁依山而建，香火鼎盛，是澳门名字的起源地。相传葡萄牙人当年在此登陆，问当地人此处何名，答曰"妈阁"，澳门由此得名。','威尼斯人度假村是澳门的标志性综合度假村，以威尼斯水乡为主题。室内人造运河、贡多拉船和蓝色天幕令人仿佛置身意大利。度假村内的美食广场提供葡国鸡、马介休等澳门特色美食，购物中心汇聚国际名牌。','澳门塔是澳门的城市地标，高338米，位列全球第十高独立塔式建筑。塔内设有360度旋转餐厅和空中漫步平台。勇敢者可以体验全球最高的商业蹦极跳，从233米高空一跃而下，俯瞰澳门全景。','路氹金光大道汇聚了威尼斯人、巴黎人、伦敦人等多家大型综合度假村。澳门巴黎人的埃菲尔铁塔按原比例二分之一建造，夜晚上演浪漫灯光秀。伦敦人将伦敦风情完美复制，是拍照打卡的热门景点。','黑沙海滩位于路环岛，是澳门最大的天然海滩。因黑色细砂富含矿物质而得名，海滩绵延千米，是游泳、日光浴和郊游的好去处。附近的黑沙公园设有露营区和烧烤设施，适合家庭聚会。','龙环葡韵是氹仔旧城区保存完好的葡式建筑群。五栋翠绿色的葡萄牙式别墅依山而建，前面是红树林湿地，环境清幽。别墅内设有土生葡人之家博物馆，展示澳门独特的土生葡人文化和生活方式。']},
{title:'地区概况',items:['澳门，全称中华人民共和国澳门特别行政区，由澳门半岛、氹仔岛和路环岛组成，总面积33.3平方公里。2023年人口约68万，是世界上人口密度最高的地区之一。澳门实行"一国两制"，保持资本主义制度五十年不变。','澳门古属百越地，南宋时期成为海上贸易要冲。1553年葡萄牙人借地晾晒货物上岸，逐步在此定居。1887年清政府被迫签订《中葡里斯本草约》，承认葡萄牙对澳门的居住权。','1999年12月20日，中国政府对澳门恢复行使主权，澳门特别行政区成立。何厚铧为首任行政长官。澳门回归是中华民族的又一历史盛事，标志着"一国两制"在澳门的成功实践。','澳门是全球著名的博彩旅游城市，博彩业是其经济支柱。2002年赌权开放后，多家博彩企业竞争发展。2018年澳门博彩收入曾一度超越拉斯维加斯，成为全球最大的博彩市场。','旅游业是澳门另一重要经济支柱。2019年入境旅客近3940万人次，疫情后逐步恢复。文化遗产游、博彩娱乐游、美食游是澳门旅游的三大特色，联合国教科文组织"创意美食城市"称号彰显其美食魅力。','澳门属亚热带季风气候，全年温和湿润。10月至12月天气最为舒适，是最佳旅游季节；1月至2月有农历新年活动；6月至9月较为炎热，偶有台风。室内外温差不大，衣着轻便即可。','澳门以粤语为通用语言，葡萄牙语为官方语言之一，普通话亦广泛使用。繁体中文为主要书写文字，货币为澳门币（MOP），港币亦可在大部分场所通用，汇率基本挂钩。','澳门法定假期包括元旦、春节（除夕至初三）、清明、劳动节、佛诞、端午节、国庆节、重阳节、圣诞节、追思节等，体现了中西宗教文化交融的特点。']},
{title:'特色美食',items:['葡式蛋挞是澳门最具代表性的美食，由安德鲁饼店首创。酥脆的外皮包裹嫩滑的蛋奶馅，焦糖色泽令人食欲大增。玛嘉烈蛋挞与安德鲁蛋挞是两大知名品牌，各有特色。在路环岛可参观安德鲁饼店总店。','葡国鸡是澳门的招牌葡式美食，融合中国和葡萄牙烹饪技艺。用椰浆、咖喱和姜黄烹制整只鸡，色泽金黄，香气扑鼻。配上米饭和葡式腊肠，是澳门独有的中西合璧美味。','猪扒包是澳门街头美食代表，发表于脆或松软的面包中夹入煎烤猪排。氹仔大利来记咖啡室的猪扒包最负盛名，每日下午3点新鲜出炉，往往需要排队等候。','水蟹粥是澳门特色海鲜美食，选用本地新鲜水蟹熬制粥底。粥水充分吸收蟹膏的鲜甜，蟹肉弹牙爽口。大利来记咖啡室和诚昌饭店的水蟹粥最为著名，是到澳门必尝的美味。','竹升面是澳门传统面食，用竹竿反复压制面团使其筋道。面条细而有弹性，配上鲜虾云吞或叉烧，淋上香浓的虾酱，是早餐或宵夜的经典选择。黄枝记粥面专家是代表性老字号。','澳门豆捞是火锅的一种，以海鲜为主打。将新鲜鱼、虾、贝类等海鲜放入特制汤底涮食，保持食材原汁原味。海鲜拼盘品种丰富，配上特制蘸酱，鲜美无比，是近年兴起的美食风潮。','马介休是葡萄牙语Bacalhau的音译，指腌制的鳕鱼。澳门人将马介休融入各种中式菜式，创造出马介休炒饭、马介休球、马介休焗土豆等美食。葡国餐厅和茶餐厅均可品尝。','双皮奶是澳门传统甜品，用牛奶反复加热形成两层奶皮，口感细腻嫩滑。顺义牛奶公司和沙度娜饼店的木糠布丁同样闻名，葡式甜点与广东糖水的完美结合，令人回味无穷。']},
{title:'传统节日',items:['农历新年是澳门最重要的传统节日。妈阁庙、大三巴等宗教场所香火鼎盛，信众祈福许愿。年初三"赤口"人们避免拜年，多到赌场一试手气。春节期间各大酒店和商场装饰一新，年味十足。','中秋节澳门人赏月、吃月饼、玩灯笼。大炮台花园和东望洋灯塔是赏月热点。西望洋圣堂前地的中秋园游会热闹非凡，灯谜会和民族舞蹈表演吸引众多居民参与。','端午节澳门举行国际龙舟邀请赛，在南湾湖和黑沙海滩举行。来自世界各地的龙舟队伍参赛，锣鼓喧天、桨影翻飞。粽子是节日应节食品，咸肉粽和碱水粽各有支持者。','天后诞（妈祖诞）是澳门渔民最重要的节日。妈阁庙和路环天后古庙举行盛大的祭祀仪式，信众奉上三牲果品祈福。妈祖信俗已于2009年列入国家级非物质文化遗产名录。','鱼行醉龙节是澳门鲜鱼行特有的传统节日，于2011年列入国家级非物质文化遗产。行友们舞动用木制成的大鱼和巨龙，边舞边饮美酒，祈求神灵保佑渔业丰收、合境平安。','葡国节日如圣体节、澳门主教座堂瞻礼等保留下来，与华人节日并存。圣体节当天，玫瑰圣母堂等天主教堂举行盛大游行，教徒抬圣体出巡，场面庄严隆重，体现澳门宗教多元。','重阳节澳门人登高扫墓，也会祭祖致祭。路环岛叠石塘山塔石塘最高点，吸引众多市民登高望远。黑沙和竹湾海滩也成为重阳登高的好去处。','圣诞节是澳门重要节日，教堂举行子夜弥撒。议事亭前地和大三巴广场布置圣诞灯饰，商场推出圣诞促销活动。氹仔龙环葡韵的圣诞市集热闹非凡，充满葡式风情。']},
{title:'旅游攻略',items:['交通指南：往来港澳可乘喷射飞船或金光飞航，航程约1小时。澳门内可乘巴士或出租车，赌场穿梭巴士（发财巴）免费乘坐连接各口岸和赌场。新葡京至港澳码头航线最为便捷。','住宿推荐：五星酒店集中在路氹金光大道，如威尼斯人、巴黎人、新濠天地等，娱乐设施完善。澳门半岛价格相对实惠，适合预算有限的游客。提前预订可享优惠。','美食地图：官也街是澳门美食街，安德鲁蛋挞、莫义记榴莲雪糕、木糠布丁等小吃汇聚。大三巴街的手信一条街可现烤杏仁饼和肉脯。赌场美食广场提供多国美食，消费较高。','行程建议：D1日游澳门半岛（大三巴、妈阁庙、议事亭前地）至葡式美食；D2日游氹仔（龙环葡韵、官也街、威尼斯人）；D3日游路环（黑沙海滩、安德鲁饼店）体验澳门悠闲一面。','博彩须知：进入赌场需年满21岁，需出示证件。赌场内禁止拍照，禁止使用手机。21点、百家乐、轮盘、角子机等博彩项目多样，小赌怡情，大赌伤身。','注意事项：澳门室内全面禁烟，违者罚款1500澳门币。赌场全面禁烟，设有指定吸烟区。带够澳门币或港币现金，部分小店只收现金。遵守公共秩序，排队购票。','购物推荐：手信以杏仁饼、肉脯、蛋卷最受欢迎。钜记手信和咀香园饼家是知名品牌。大三巴街和官也街是购物热点。高档商品在路氹各大度假村购买，可享受免税优惠。','最佳时间：10月至12月天气凉爽舒适，是最佳旅游季节。农历新年期间活动丰富，但房价较高。避开内地公众假期可免拥挤。提前预约热门景点门票和餐厅。']}
],
