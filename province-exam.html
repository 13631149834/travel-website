    "龙门石窟（位于洛阳市南郊，是中国石刻艺术的宝库，始凿于北魏孝文帝年间，历经东魏、西魏、北齐、隋、唐、五代、宋等朝代400余年连续大规模营造，现存窟龛2345个、造像10万余尊，以古阳洞、宾阳中洞、莲花洞、奉先寺卢舍那大佛等洞窟最为精美，代表了中国石刻艺术的最高峰）","洛阳白马寺（创建于东汉永平十一年（公元68年），是中国第一座官方建造的寺院，被誉为释源和祖庭，印度高僧竺法兰、迦叶摩腾在此翻译佛经、传播佛教。现存建筑多为明清时期所建，寺内保存有自唐代以来历代碑刻40余方，被誉为天下第一寺）","登封天地之中历史建筑群（2010年列入世界文化遗产，包含少林寺建筑群、中岳庙、嵩岳寺塔、会善寺、嵩阳书院等8处11项优秀历史建筑，涵盖了佛、道、儒三教代表性建筑，是中国古代建筑技术、礼制、宗教文化的杰出代表）","安阳殷墟（商朝晚期都城遗址，2006年列入世界文化遗产，是商代第十九代王盘庚迁都至灭亡497年间的政治、经济、文化中心。出土大量甲骨文和青铜器，其中后母戊鼎是目前已知最重的青铜器，甲骨文的发现震惊世界）","焦作云台山（国家5A级景区，以峡谷地貌著称，园区面积达240平方公里。红石峡是核心景点，全长2公里、深68米，拥有亚洲落差最大的云台瀑布，景区内有泉瀑峡、潭瀑峡、猕猴谷等十一大景点，被誉为自然山水精品走廊）","开封清明上河园（以张择端名画《清明上河图》为蓝本建造的国家5A级大型宋代文化主题公园，再现了北宋东京城的繁华景象，园内有十多个演出区域，每天演出包拯迎宾、踩高跷、斗鸡等数十场民俗表演，游客可换穿宋装沉浸式体验）","洛阳老君山（道教名山，海拔2217米，为秦岭余脉八百里伏牛山的主峰，金顶道观群建筑恢宏壮观，被称为中原小黄山，冬季雪景尤为壮观，十里画屏的云海日出更是摄影爱好者的最爱）","红旗渠（位于安阳市林州市，是20世纪60年代林县人民在悬崖峭壁间修建的伟大水利工程，被誉为人工天河，总长1500公里，削平1250座山头、凿通211个隧洞，是新中国建设史上的奇迹工程，已列入全国红色旅游经典景区）"
  ]}],
{title:"省份概况",items:[
    "地理位置：河南省位于中国中东部、黄河中下游，因大部地区位于黄河以南而得名。南北纵跨530公里，东西横越580公里，总面积16.7万平方公里，与山东、安徽、湖北、陕西、山西、河北等省相邻，是中华民族和中华文明的主要发祥地）","面积人口：总面积16.7万平方公里，2024年末常住人口9785万人，是全国第三人口大省。城镇化率59.22%，省会郑州市常住人口约1300万，是中部地区重要的国家中心城市。河南户籍人口超过1.15亿，为全国最多）","历史地位：河南是中华文明的主要发祥地之一，夏、商、周三代均在此建都，是中国八大古都独占其四（郑州、洛阳、开封、安阳），地下文物和馆藏文物均居全国首位。有着超过5000年的文明史和13个王朝建都史）","简称由来：河南简称豫，古属豫州。豫字由予和象组成，古代河南气候温润、森林茂密、野象众多，故称豫。豫字蕴含着人与自然和谐共处的古老智慧，是中华民族文化的重要象征）","气候特点：属暖温带至亚热带过渡的大陆性季风气候，四季分明、雨热同期。年均气温14至16摄氏度，年均降水量600至1000毫米。春季干燥多风、夏季炎热多雨、秋季晴和宜人、冬季寒冷少雪）","地形地貌：地势西高东低，北、西、南三面环山，中东部为黄淮海冲积平原。最高峰为灵宝市老鸦岔脑，海拔2413.8米。全省地貌类型多样，有山地、丘陵、平原、盆地等多种地形）","文化特色：中原文化是中华文化的主干和核心。河南是中华武术两大流派少林功夫和太极拳的发源地，豫剧是中国五大剧种之一。河南还是中华民族的人文始祖黄帝的故乡，河洛文化是华夏文明的核心源头）","经济状况：2024年GDP约5.9万亿元，居全国第五位。以食品加工、装备制造、电子信息等产业为主导，郑州航空港区是国家级航空经济发展先行区，郑州期货交易所是全国首家期货交易所）"
  ]}],
{title:"特色美食",items:[
    "郑州烩面（中国十大名面之一，选用优质高筋面粉制成宽厚面条，配以羊肉汤、海带丝、豆腐皮、粉条等多种配料，汤鲜面滑、口感筋道。合记烩面以羊骨熬制8小时以上的奶白浓汤著称，是郑州的城市名片和外地游客必打卡的美食）","洛阳水席（始于唐代，是中国保存最完整的历史名宴之一，全套24道菜全部带汤，依次上桌，有冷有热、有甜有咸，体现唐代宫廷饮食文化。头牌牡丹燕菜以白萝卜丝仿燕窝，酸辣开胃，与龙门石窟、洛阳牡丹并称洛阳三绝）","开封灌汤包（源于北宋，皮薄馅大、汤汁丰富，吃法讲究先开窗、后喝汤、再满口香，是开封传统名吃之首。第一楼和黄家老店是开封灌汤包的两大老字号，一口下去鲜香四溢，被誉为北宋宫廷饮食文化的活化石）","逍遥镇胡辣汤（源于周口市西华县逍遥镇，是河南早餐的代表，酸辣开胃、暖身暖胃。2021年入选国家级非物质文化遗产名录，以牛骨羊肉吊汤、三十余种香料现磨现熬为特色，配油馍头堪称早餐绝配，已风靡全国）","道口烧鸡（安阳市滑县道口镇特产，与北京烤鸭、金华火腿并称中华三大名产，有中华第一鸡之美誉。选用散养蛋鸡，经涂蜜、油炸后入八料老汤卤制，色香味烂四绝齐备，手提骨脱，是豫北名吃）","信阳毛尖（中国十大名茶之一，产自信阳市大别山地区，茶汤嫩绿明亮、香气清高、滋味浓醇、回甘悠长。1915年获巴拿马万国博览会金奖，远销海外，是河南茶叶的代表，也是款待贵宾的上品）","黄河大鲤鱼（豫菜头牌，与北京烤鸭并称中国四大名菜之首。选用黄河特产鲤鱼，色泽枣红、肉质鲜嫩，配以糖醋汁和蓬松焙面，是河南省非遗十大名菜之首，寓意鲤鱼跃龙门，是河南宴席的压轴大菜）","开封桶子鸡（开封传统名菜，色泽金黄、形体似桶故名，选用老母鸡反复腌制晾晒而成，鸡肉肥而不腻、越嚼越香，是开封又一特色美食。与灌汤包并称开封双绝，是下酒佳品）"
  ]}],
{title:"传统节日",items:[
    "洛阳牡丹文化节（每年4月在洛阳举办，前身为洛阳牡丹花会，是中国四大名会之一，2010年升级为国家级文化盛会，2026年已举办第43届。洛阳牡丹品种达1445个，其中92个为独有珍稀品种，洛阳地脉花最宜牡丹尤为天下奇，雍容华贵、国色天香，隋唐洛阳城灯火璀璨、汉服如云）","开封清明文化节（每年4月在开封举办，延续宋代清明民俗，以宋都文化为核心，活动包括大宋簪花游园会、盘鼓表演、非遗展演等，吸引全国乃至全球华人寻访宋韵清明，感受清明上河图中的千年繁华，2026年清明假期接待游客超2100万人次）","郑州少林国际武术节（每年10月在郑州及登封举办，是集武术、旅游、文化交流于一体的大型综合性节会。少林寺功夫名扬天下，节会期间举办迎宾仪式、少林武术精英擂台赛、文艺演出等活动，是少林功夫走向世界的重要窗口）","郑州黄帝故里拜祖大典（每年农历三月初三在新郑市举办，是全球华人寻根祭祖的盛典，源于新郑为中华人文始祖轩辕黄帝出生、创业、建都之地，自古有三月初三拜祖传统，现已成为凝聚华人力量的文化盛会）","浚县古庙会（每年正月十六在鹤壁市浚县举办，是华北最大规模的传统庙会，源于明代，绵延数百年，会期人山人海、热闹非凡，有华北第一古庙会之称，汇聚民俗表演、传统小吃和民间艺术，是体验中原年味的绝佳去处）","淮阳太昊陵庙会（每年农历二月初二至三月初三在周口市淮阳举办，是中华最古老的庙会之一，祭祀人祖伏羲，庙会期间有民间祭祀表演、杂耍、交易等，人数可达数十万之众，是研究中华古老祭祀文化的重要窗口）","马街书会（每年正月十三在平顶山市宝丰县举办，是全国曲艺人的朝圣地，说书艺人在此献艺，观众数以万计，已有数百年历史，被誉为世界最大的民间口头文学盛会，2006年列入国家级非物质文化遗产名录）","焦作国际太极拳交流大赛（每两年一届在焦作市温县举办，源于1992年的太极拳年会，是太极拳爱好者切磋交流的国际性赛事，对推动太极拳走向世界发挥重要作用，焦作是太极拳的发源地，陈氏太极拳在此传承发展）"
  ]}],
{title:"旅游攻略",items:[
    "最佳时间：4至5月和9至10月是最佳旅游季节，春季可赏洛阳牡丹（4月牡丹文化节期间最美），秋季可赏开封菊花（10月菊花文化节），气候宜人。7至8月较炎热，冬季较冷但不失韵味，老君山冬季雪景蔚为壮观）","交通指南：郑州是全国高铁枢纽，京广高铁和徐兰高铁在此交汇。郑州东站为亚洲最大高铁站之一，到洛阳约30分钟、到开封约20分钟、到安阳约1小时。新郑国际机场是中部地区最大航空港，国际国内航线覆盖广，出行极为便利）","行程建议：建议5至7天——D1郑州（河南博物院、嵩山少林寺），D2洛阳（龙门石窟、白马寺、洛邑古城夜游），D3开封（清明上河园、开封府、龙亭），D4安阳（殷墟、中国文字博物馆），D5焦作云台山，D6老君山，可根据兴趣灵活调整）","住宿推荐：郑州酒店选择丰富，高中低档齐全；洛阳推荐洛邑古城或应天门附近，可深度体验汉服文化和夜游；开封推荐鼓楼或清明上河园周边，方便夜游和品小吃；云台山景区内有多家酒店，可欣赏峡谷晨景）","景点推荐：必游龙门石窟感受佛教艺术巅峰、少林寺看功夫表演并学习少林武术、清明上河园穿越北宋繁华、安阳殷墟探秘商文明、云台山观峡谷奇观、老君山赏云海日出，每一处都是河南文化的精华所在）","美食指南：郑州合记烩面（人均40元）是郑州必吃、洛阳真不同水席（全套约300元）是体验盛唐饮食文化的最佳方式、开封黄家老店灌汤包（人均50元）不可错过、道口烧鸡（50至80元一只）是豫北名吃、信阳毛尖（每斤200至800元）是馈赠佳品）","注意事项：石窟和寺院内勿大声喧哗、不触摸文物。登山注意安全，雨天路滑需谨慎。老君山冬季山顶较冷需备羽绒服。云台山旺季人多建议早出发。少林寺节庆期间人流密集，建议提前网上购票）","特色体验：少林寺学一套少林功夫，体验禅武合一的魅力；洛阳换装汉服穿梭于洛邑古城和隋唐洛阳城，感受古都风韵；开封逛鼓楼夜市、体验宋代点茶和簪花文化；清明上河园观看大型实景演出大宋东京梦华，穿越千年感受宋韵繁华）"
  ]}],
questions:[
{q:"中国第一古刹指的是？",options:["少林寺","白马寺","相国寺","龙门石窟"],answer:1,explain:"白马寺建于东汉永平年间，是中国第一座官方建造的寺院"},
{q:"嵩山少林寺属于哪个宗教场所？",options:["道教","佛教","儒教","伊斯兰教"],answer:1,explain:"少林寺是佛教禅宗祖庭，以少林功夫闻名天下"},

{q:"红旗渠位于河南哪个县市？",options:["郑州","洛阳","安阳林州","开封"],answer:2,explain:"红旗渠位于安阳市林州市"}

extra:[
{title:"世界遗产与重要景区",items:["武当山古建筑群（位于十堰市丹江口境内，是中国道教名山和武当武术的发源地，1994年被联合国教科文组织列入世界文化遗产名录。永乐年间动用20万军民历时12年建成9宫9观36庵堂等宏大建筑群，绵延140余里，汇集唐宋元明清五朝建筑精华，被称为中国古代宗教建筑的奇迹和建筑成就博物馆）","明显陵（位于荆门市钟祥市，是明代嘉靖皇帝朱厚熜为其生父兴献王朱祐杬所建的陵寝，始建于1519年，历时47年方才完工，是明代帝陵中规模最大、保存最完整的单体帝王陵墓建筑群，其一陵两冢的特殊规制在中国历代帝陵中独一无二，2000年入列世界文化遗产）","神农架（2016年以优异成绩入选世界自然遗产，是全球中纬度地区保存最完好的亚热带森林生态系统，被誉为北纬31度的绿色奇迹。拥有珙桐、银杏等珍稀植物和川金丝猴、白鹳等濒危动物，最高峰神农顶海拔3106.2米，有华中屋脊之称，森林覆盖率超过91%，空气中负氧离子含量极高）","武汉黄鹤楼（江南三大名楼之一，始建于三国时期吴黄武年间，因唐代诗人崔颢题诗《黄鹤楼》而名扬天下，有天下江山第一楼之誉。历代屡毁屡建，现楼为1985年在原址重建，采用清代同治年间形制，为五层攒尖顶仿木结构钢筋混凝土仿古建筑，高51.4米，黄色琉璃瓦覆顶，气势恢宏）","宜昌三峡大坝（位于宜昌市境内的西陵峡中段，是当今世界上规模最大的水利发电工程，也是长江三峡旅游的核心景点。坝体为混凝土重力坝，全长2309米、最大坝高181米，正常蓄水位175米，总库容393亿立方米，集防洪、发电、航运、水资源综合利用于一体，大国重器当之无愧）","武汉东湖生态旅游风景区（国家5A级景区，水域面积约33平方公里，是杭州西湖的6倍，为中国最大城中湖。景区由听涛、磨山、落雁、吹笛四大景区组成，听涛景区有屈原纪念馆，磨山景区有楚风建筑和樱园，东湖樱园与武汉大学樱花齐名，春季樱花盛开时蔚为壮观，年接待游客超2000万人次）","襄阳古隆中（位于襄阳市襄城区，为诸葛亮隐居躬耕、刘备三顾茅庐的历史发生地，保留有武侯祠、三顾堂、草庐亭、躬耕田等历史遗迹四十余处，是三国文化的源头，被誉为卧龙出山之地，隆中风景名胜区为国家AAAA级旅游景区，是湖北三国文化旅游的核心目的地）","恩施大峡谷（国家5A级景区，位于恩施市沐抚办事处，被专家评为全球最长、世界最美的峡谷之一，恩施大峡谷拥有清江升白云、绝壁环峰丛、天坑接天缝、地缝接飞瀑等奇观，峡谷全长108公里，以雄奇险峻秀著称，是喀斯特地貌的天然博物馆云龙河地缝被《中国国家地理》评为中国最美喀斯特峡谷）"]},
{title:"省份概况",items:["地理位置：湖北省位于中国中部、长江中游，因位于洞庭湖以北而得名，简称鄂。地处中国地势第二级阶梯向第三级阶梯的过渡地带，省域地势呈三面高、中间低的马蹄形特征。省域东西长约740公里，南北宽约470公里，东邻安徽，西连重庆，西北与陕西接壤，南接江西、湖南，北与河南毗邻）","面积人口：湖北省总面积18.59万平方公里，约占全国陆地面积的1.94%。2024年末常住人口约5834万人（较2020年六普数据有所减少），城镇化率约65.5%。省会武汉市常住人口约1377万人，是中部地区唯一的副省级城市和国家中心城市，也是长江经济带核心城市之一）","历史地位：湖北是荆楚文化的发祥地，春秋战国时期楚国在此创造了灿烂的青铜文明，灿烂辉煌800年，曾侯乙编钟、越王勾践剑等出土文物震惊世界。三国文化在此留下大量遗迹，宜昌是屈原故里，荆州是楚文化中心，武汉是辛亥革命首义之地，宜昌是王昭君故里，历史文化积淀极为深厚）","气候特点：属亚热带季风气候，具有南北过渡性特征，夏热冬冷、四季分明、春暖秋爽、雨热同季、时空不均。年平均气温约16.7摄氏度，1月均温3至5摄氏度，7月均温26至29.5摄氏度。年均降水量约1200毫米，呈南多北少分布，鄂西南年降水最多可达1300至1690毫米）","地形地貌：省域地势西高东低，三面环山、中部为江汉平原。北部为大别山和桐柏山，最高峰天堂寨海拔1729米；西部为巫山和武陵山，神农架主峰神农顶海拔3106.2米为华中第一峰；东南部为幕阜山脉。全省丘陵与平原相间，水系发达，长江横贯东西，汉江为其最大支流）","文化特色：荆楚文化是中华文化的重要组成部分，与中原文化、江南文化交融发展。武汉是辛亥革命首义之地，宜昌是屈原故里，荆州是国家历史文化名城，襄阳是三国文化重镇。湖北是中华武术武当派和武当武术的发源地，曾侯乙编钟、越王勾践剑等世界级文物出土于此，武汉大学、华中科技大学等高校云集）","经济状况：2024年湖北省GDP达到60012.97亿元，位列全国第七位，增长约5.8%。以武汉为龙头的光电子信息、汽车制造、生物医药等产业居全国前列，武汉都市圈是中部地区核心增长极。中国（湖北）自由贸易试验区已与180余个国家和地区开展贸易往来，外向型经济活力充沛）","交通优势：武汉是全国高铁网络的心脏，京广高铁纵贯南北，沪汉蓉高铁横跨东西，武汉站、汉口站、武昌站、武汉东站四大站辐射全国。武汉天河机场是中部最大航空枢纽，国际及地区航线覆盖亚洲、欧洲、美洲、大洋洲、非洲五大洲。武汉还是长江中游航运中心，阳逻港是内陆最大集装箱码头）"]},
{title:"特色美食",items:["武汉热干面（中国五大名面之一，选用碱水面经沸水烫熟后拌以香油防止粘连，食时再入沸水烫热，浇上浓稠芝麻酱、配以香葱、辣萝卜丁、酸豆角和特制卤水。热干面已成为武汉人清晨的灵魂唤醒剂，是武汉早餐文化（俗称\"过早\"）的核心代表，在武汉街头巷尾随处可见，反映了江汉平原码头城市独特的市井饮食气质）","武汉鸭脖（精武鸭脖起源于武汉精武路，周黑鸭诞生于武汉汉口，两者代表了武汉鸭脖的两大流派——麻辣派与甜辣派。鸭脖以二十余种香料卤制，麻辣鲜香、回味悠长，原本只是街头巷尾的休闲小吃，如今已发展成为年产值超百亿元的特色产业，遍布全国各大城市的机场、火车站和商业综合体）","武昌鱼（学名团头鲂，为鳊鱼的一种，主产于鄂州市梁子湖水域，肉质细嫩、刺少味鲜。武昌鱼因毛泽东主席1956年畅游长江后赋诗\"才饮长沙水，又食武昌鱼\"而名扬天下，成为湖北鱼鲜的代表品种。武汉各大餐厅均有清蒸武昌鱼供应，做法讲究原汁原味，仅以姜葱料酒去腥提鲜，最大程度保留鱼肉的鲜甜）","排骨藕汤（湖北人爱藕，更爱煨汤，排骨藕汤是湖北煨汤文化的代表。选用洪湖特产九孔粉藕（而非脆藕），切成滚刀块，与排骨同入砂锅或陶铫，文火慢煨三四小时，汤色奶白浓稠，藕块粉糯拉丝、排骨酥烂脱骨。民间有\"无汤不成席\"之说，逢年过节或家有贵客，餐桌上必有一锅排骨藕汤，是湖北人待客的最高礼仪）","三鲜豆皮（武汉传统名小吃，以绿豆和大米混合磨浆摊成薄皮为底，包入炒制好的糯米、香菇丁、鲜肉丁、笋丁等馅料，上覆鸡蛋液，煎至金黄酥脆即成。成品外皮金黄焦香、内馅软糯鲜香，层次分明，在武汉粮道街、户部巷等老街区随处可见，是武汉过早文化中最具仪式感的品种之一）","潜江油焖大虾（潜江市位于江汉平原腹地，被誉为中国小龙虾之乡，小龙虾年产量超10万吨，制定了全国首个小龙虾烹饪标准。油焖大虾以大量食用油配合八角、桂皮、花椒、干辣椒等香料长时间焖制，色泽红亮、麻辣鲜香、肉质Q弹。2015年油焖大虾被评为中国名菜，潜江每年举办小龙虾节，每年5至9月是小龙虾的最佳食用季节）","孝感米酒（孝感市是中国米酒之乡，制作历史逾千年，选用孝感特有的蜂窝酒曲（由辣蓼草和米粉制成）与珍珠糯米低温发酵而成。成品汁液浓白如奶、甜味自然、酒香淡雅，可直接饮用，也可做成蛋花米酒、桂花米酒或糊米酒，冬季热饮暖胃健脾，是湖北人喜爱的传统饮品，孝感米酒已出口至全球二十多个国家和地区）","恩施合渣（合渣又名懒豆腐，是恩施土家族地区的传统家常菜，将黄豆浸泡后连渣带浆研磨煮沸，加入青菜叶稍煮即成，口感细腻清淡、豆香浓郁，与四川豆花有几分相似但无需点卤凝固。合渣通常配以数十种免费小菜如糟辣子、酸腌菜、腐乳、腊肉丁等同食，丰俭由人、开胃下饭，是土家族人每日必备的主食，在婚丧嫁娶等重要场合均可见）"]},
{title:"传统节日",items:["武汉国际渡江节（每年7月16日在武汉举办，纪念1956年毛泽东主席第一次畅游长江的历史壮举，现已成为国内规模最大的公开水域游泳活动。节日期间，数千名中外泳者同场横渡长江，武汉两江四岸万人空巷观看盛况，是武汉最具城市标识性的节日活动，2024年已举办第50届，横渡路线从武昌汉阳门至汉口江滩，全长约1200米）","武汉东湖梅花节（每年2至3月在东湖梅园举办，武汉东湖磨山梅园是中国梅花研究中心，保存有梅花品种340余个，数量近万株，为全国保存最多的梅花品种资源圃。梅花节期间举办梅花摄影展、梅文化讲座、古风游园等丰富活动，万株梅花傲寒绽放，暗香浮动，吸引武汉及周边城市大量游客前来赏梅探春）","武当山道教庙会（每年农历腊月二十三至正月十五在武当山各宫观举办，是武当山最盛大的传统节庆活动。庙会以道教祭祀仪式为核心，融合武当武术表演、道乐演奏、祈福法会、道医义诊、传统集市等内容，游客可体验太极拳表演、品尝道家素斋、购买道教文创，感受道教文化的独特魅力，香火鼎盛、热闹非凡）","宜昌屈原故里端午文化节（每年端午节期间在宜昌市秭归县举办，纪念伟大爱国诗人屈原的大型节庆活动。节日包括龙舟竞渡、包粽子大赛、祭祀仪式、楚辞朗诵、文艺演出等，2009年屈原故里端午习俗被联合国教科文组织列入人类非物质文化遗产代表作名录，成为世界级文化遗产，与龙舟文化、楚文化深度融合，影响深远）","武汉东湖樱花节（每年3至4月在武汉大学和东湖樱园举办，武大樱花因历史建筑与樱花交相辉映被誉为全国最美校园樱花，东湖樱园则胜在规模和品种，两处共有樱花树上万株，品种达58个。樱花盛开时如云似霞，游客如织，樱园夜场灯光秀更添梦幻氛围，每年吸引数百万国内外游客前来观赏）","襄阳诸葛亮文化旅游节（以三国文化为主题的综合性节庆活动，在襄阳市举办，包含隆重的祭祀大典、诸葛亮学术研讨会、三国文化论坛、文艺演出等内容。祭祀大典在南阳武侯祠或古隆中景区举行，再现古时祭祀智圣诸葛亮的庄严仪式，吸引全国三国文化研究专家学者和游客广泛参与，已连续举办多届）","荆州关帝庙会（每年正月十五在荆州市荆州古城举办，是荆楚地区纪念关公诞辰最具影响力的民俗活动。庙会包括抬关帝神像古城巡游、传统戏曲展演、非遗民俗展销、民间艺术表演等项目，热闹非凡。古时荆州为兵家必争之地，关帝庙是荆州重要的宗教文化场所，庙会活动历史悠久，承载着丰富的历史信息和民间信仰）","恩施土家女儿会（每年农历七月初九至十二在恩施市举办，是土家族传统的情人节和相亲大会，被列入湖北省非物质文化遗产名录。活动期间，土家族未婚男女青年身着盛装，以对歌方式传情达意、择偶配对，场面热烈喜庆，极具民族特色。同时还有土家摆手舞、织锦表演、土家美食展销等配套活动，是体验土家族民俗文化的重要窗口）"]},
{title:"旅游攻略",items:["最佳时间：3至5月是武汉赏樱最佳时节，东湖樱园和武汉大学樱花如云似霞；9至11月秋高气爽是旅游旺季，武当山红叶层林尽染、恩施大峡谷秋色宜人。夏季可前往神农架原始森林避暑，均温22摄氏度；冬季可泡温泉，咸宁温泉和随州大洪山温泉是热门选择。各地季节特色鲜明，四季皆宜旅游）","交通建议：武汉天河机场航线覆盖全国主要城市及五大洲，国际航班密集；武汉站（高铁站）位于洪山区，汉口站位于江岸区（主打动车），武昌站位于武昌区，武汉东站位于光谷，四站各有分工，高铁网络四通八达。建议首选武汉站或汉口站出行，地铁4号线连接武汉站和武昌站，2号线连接汉口站和天河机场）","行程规划：建议安排7至9天较为充裕——D1至D3游览武汉（黄鹤楼、东湖、湖北省博物馆、江汉路），D4至D5前往武当山（登山观日出、参观紫霄宫和南岩宫），D6至D7深入神农架（大九湖、神农顶、天生桥），D8至D9恩施大峡谷探险。各景区之间车程较长，建议包车或自驾，预留充足时间）","住宿推荐：武汉住宿选择丰富，高端可选武昌江滩或光谷商圈，交通便利；景区住宿条件良好但价格波动大，旺季务必提前15天以上预订。武当山景区内可在乌鸦藤或琼台上住宿，山顶寺庙也提供借宿服务（需提前联系），清晨可观日出云海，是体验道教文化的绝佳方式。恩施大峡谷景区周边有特色民宿群，可欣赏峡谷日出）","必去景点：武当山体验道教文化、习练太极剑法；神农架探秘原始森林、邂逅金丝猴；三峡大坝见证大国重器、乘船过葛洲坝船闸；东湖绿道骑行、泛舟东湖；黄鹤楼登楼远眺、俯瞰长江；湖北省博物馆观曾侯乙编钟、越王勾践剑。建议早起错峰出行，避开节假日人流高峰）","美食指南：武汉过早文化丰富，粮道街、水塔街是本地人最爱的美食街，户部巷适合初次打卡。潜江小龙虾不可错过，5至9月最佳。恩施的合渣、松滋鸡、土家腊肉极具民族特色。宜昌的红油小面、荆州的早堂面、襄阳的牛肉面各具风味。武汉过早一个月不重样，武汉鸭脖、孝感米酒、黄陂三鲜等均可作为伴手礼带走）","注意事项：武当山登山部分路段较陡，需穿防滑舒适的登山鞋，山顶温差大建议备冲锋衣。神农架原始森林区早晚温差大，夏季也需外套，森林中蚊虫较多务必做好防虫措施，避免被毒虫叮咬。恩施大峡谷部分栈道悬空，有恐高症者需谨慎。全省夏季多暴雨，出行前关注天气预报，山区道路需注意滑坡风险）","特色体验：武当山太极湖边学一套太极拳，感受道法自然的哲学；潜江街头吃一顿油焖大虾配冰啤，体验宵夜文化；恩施大峡谷绝壁栈道探险，挑战自我极限；武汉清晨在街头小店过早，从一碗热干面开始认识武汉；宜昌清江画廊泛舟，两岸喀斯特峰丛倒映水中如诗如画；武汉东湖绿道租一辆自行车环湖骑行，尽享城市慢生活）"]}
],

extra:[{title:'世界遗产与重要景区',items:['桂林山水（世界自然遗产，以喀斯特地貌著称，山青、水秀、洞奇、石美，甲天下的美誉源于宋代诗人王正功的诗句，千百年来令无数文人墨客倾倒，是中华民族山水的杰出代表）','左江花山岩画（世界文化遗产，位于崇左市宁明县，是战国至东汉时期壮族先民留下的珍贵遗迹，岩画绘制在临江的悬崖峭壁上，赭红色图案以人物、器具、动物为主，神秘壮观）','中国南方喀斯特（世界自然遗产，广西部分包括桂林峰林与峰丛、荔浦喀斯特等，以独特的锥状、塔状喀斯特地貌闻名，是全球热带、亚热带喀斯特的典型代表）','漓江（国家5A级景区，发源于华南第一峰猫儿山，是珠江水系西江支流桂江的上游，全长164公里，两岸喀斯特峰林层叠，是世界上最典型的岩溶峰林景观）','德天跨国瀑布（国家5A级景区，位于崇左市大新县，与越南板约瀑布相连，是亚洲第一、世界第四大跨国瀑布，年均流量约为贵州黄果树瀑布的三倍，蔚为壮观）','涠洲岛（中国最大最年轻的火山岛，国家5A级景区，位于北海市南部海域，岛上有鳄鱼山火山公园、五彩滩、天主教堂等景点，海水清澈碧蓝）','阳朔西街（1400多年历史的古老街道，是阳朔县城最繁华地段，保存着明清古建筑风格，夜晚华灯初上，酒吧、小店热闹非凡，被誉为地球村）','龙脊梯田（国家4A级景区，位于桂林市龙胜各族自治县，始建于元朝，梯田层层叠叠如龙脊蜿蜒，最高海拔约900米，是壮瑶两族农耕智慧的杰作）']},{title:'省份概况',items:['地理位置：广西壮族自治区地处中国西南边陲，南临北部湾、面向东南亚，是中国唯一沿海的少数民族自治区，北回归线横贯中部，属亚热带季风气候区）','总面积与区划：广西陆地总面积23.76万平方公里，下辖14个设区市、111个县（市、区），是中国五个少数民族自治区之一，首府为南宁市）','人口民族：2024年末常住人口约5013万人，有壮、汉、瑶、苗、侗等12个世居民族，壮族人口约1500万，是全国少数民族人口最多的省级行政区）','历史沿革：广西古属百越之地，秦设桂林郡，汉为交趾刺史部，唐属岭南道，宋设广南西路简称广西，元设广西行中书省，1958年成立广西壮族自治区）','地形地貌：以喀斯特地貌为主，约占全区总面积的37.8%，发育类型之齐全、景观之优美堪称全国之最，桂林山水是喀斯特地貌的精华代表）','海岸与海洋：广西海岸线长约1628公里，北部湾海域面积约12.93万平方公里，海洋资源丰富，拥有红树林、珊瑚礁等珍贵生态系统，是西南地区最便捷的出海通道）','经济特色：以有色金属、汽车、机械等为主导产业，2024年GDP约2.76万亿元，是面向东盟开放合作的前沿和窗口）','长寿之乡：巴马瑶族自治县是世界著名的长寿之乡，百岁老人比例远高于国际标准，独特的地理环境和饮食习惯被认为是长寿的秘诀）']},{title:'特色美食',items:['桂林米粉（广西最具代表性的传统小吃，以干捞粉为主，配以锅烧肉、酸豆角、花生、卤水等配料，米粉柔韧爽滑、卤香浓郁，是桂林人早餐的首选）','柳州螺蛳粉（柳州市特产，以酸、辣、鲜、爽著称，主要原料包括螺蛳汤、酸笋、花生、木耳、黄花菜等，因独特的酸臭味让人欲罢不能，已风靡全国）','南宁老友粉（南宁市特色小吃，以酸、辣、咸、香为主味，相传源于一段老友情谊的故事，选用米粉配以酸笋、豆豉、蒜末、辣椒等爆炒而成）','北海海鲜（北部湾海域盛产各种海鲜，虾、蟹、贝类、鱼品种繁多，侨港风情街是品尝海鲜的热门地点，价格实惠、做法地道）','荔浦芋头扣肉（桂林荔浦特产香芋与五花肉同烹，芋头粉糯香甜、五花肉肥而不腻，是广西宴席上的传统名菜）','巴马香猪（巴马长寿之乡特产，体型矮小、皮薄骨细、肉质鲜嫩，烤乳猪是当地特色，皮脆肉香）','恭城油茶（桂林市恭城瑶族自治县传统饮品，以茶叶、生姜、蒜头等捶打熬制而成，配以米花、油果、葱花等佐料，有提神醒脑的功效）','玉林牛巴（玉林市传统风味食品，选用黄牛臀部肉经传统工艺制作，色泽暗亮油润、肉质细嫩耐嚼、咸甜适口，是广西四大名吃之一）']},{title:'传统节日',items:['壮族三月三（又称歌圩节，是壮族最重要的传统节日，每年农历三月初三举行，活动包括对歌、抛绣球、跳竹竿舞、吃五色糯米饭等，2014年入选国家级非物质文化遗产）','布洛陀文化旅游节（每年农历三月初七至初九在百色市田阳区敢壮山举行，是壮族同胞祭祀创世始祖布洛陀的盛大节日，包含祈福仪式、山歌对唱等民俗活动）','武鸣三月三歌圩（南宁市武鸣区是中国壮乡，每年三月三举行盛大的歌圩活动，数万民众身着民族盛装对歌，场面壮观，被誉为壮族文化的活化石）','鱼峰歌圩（柳州市鱼峰山是歌仙刘三姐骑鱼升天之地，自唐代起便有歌圩传统，每逢节假日都有山歌爱好者在此对歌，是全国最活跃的传统山歌歌圩之一）','瑶族盘王节（瑶族同胞祭祀始祖盘王的节日，通常在农历十月十六举行，包含长鼓舞、盘王大歌等内容，是瑶族文化的重要载体）','宾阳炮龙节（南宁市宾阳县的传统节日，于正月十一举行，舞龙者点燃鞭炮炸龙驱邪，数万游客涌入老街参与狂欢，被誉为东方狂欢节）','京族哈节（防城港市京族人民最重要的传统节日，哈节当天举行迎神、祭祖、唱哈等仪式，祈求海神保佑渔业丰收，是京族文化的集中展现）','壮族蚂拐节（河池市宜州区一带特有的节日，于农历正月举行，主要活动包括找蚂拐、祭蚂拐、葬蚂拐等，是研究古代蛙崇拜文化的活态民俗）']},{title:'旅游攻略',items:['最佳时间：4月至10月是广西最佳旅游季节，4月可参与壮族三月三歌圩，7月至9月德天瀑布水量充沛，10月可欣赏龙脊梯田金黄稻浪）','经典路线：建议首站桂林游览象鼻山、两江四湖，次日乘船游漓江至阳朔，第三天阳朔十里画廊、遇龙河漂流，可顺访德天瀑布和明仕田园）','交通建议：南宁吴圩机场和桂林两江机场是主要航空枢纽，区内高铁网络发达，桂林至阳朔可乘船或动车，崇左方向建议包车或自驾）','桂林深度游：象鼻山（免费预约）、叠彩山、七星公园、芦笛岩等经典景点不容错过，晚上可观看《印象·刘三姐》实景演出）','阳朔精华：遇龙河人工竹筏漂流推荐金龙桥至旧县段，十里画廊骑行打卡大榕树、月亮山，兴坪古镇打卡20元人民币背景图）','海滨度假：北海银滩（天下第一滩）、涠洲岛（火山岛日出日落）是广西海滨旅游的代表，涠洲岛上岛需提前预约船票）','边境风光：崇左方向可游览德天跨国瀑布、明仕田园、花山岩画，深度体验中越边境的喀斯特山水风光）','注意事项：山区景区分散建议结伴或跟团，夏季注意防蚊防虫，品尝螺蛳粉可从微辣开始适应，尊重当地少数民族风俗习惯）']}],

extra:[
{title:"世界遗产与重要景区",items:["海南热带雨林国家公园（2021年设立，面积4269平方公里，是我国分布最集中、类型最多样、保存最完好、连片面积最大的大陆性岛屿型热带雨林，拥有高等植物4367种、野生动物5000余种，被誉为热带生物多样性和遗传资源的宝库，2023年成为世界遗产提名地）","南山文化旅游区（位于三亚市崖州区，南山是中国最南端的山，景区以佛教文化为主题，108米海上观音圣像是世界最高的观音像，三面分别持箧、持珠、持莲，寓意慈悲、智慧、和平，被誉为南海佛国）","大小洞天旅游区（以道教文化为主题的著名景区，海山奇观被誉为琼崖八百年第一山水名胜，因拥有小洞天、钓台等历代摩崖石刻群而闻名）","天涯海角游览区（位于三亚市西南方向，以美丽迷人的热带自然海滨风光、悠久独特的历史文化和浓郁多彩的民族风情著称，是三亚的城市名片）","蜈支洲岛旅游区（国家5A级景区，海水清澈透明，能见度极高，是国内最佳潜水基地之一，岛上有两千多种植物，四周海域毫无污染）","呀诺达雨林文化旅游区（位于保亭黎族苗族自治县，是北纬18度热带雨林资源的博览馆，主要由经石峡、梦幻谷、黎锦苑等九大主题景观区组成）","槟榔谷黎苗文化旅游区（保亭甘什岭的黎苗文化诺亚方舟，保存着船型屋、隆闺房等黎族传统建筑，黎族传统纺染织绣技艺被列入联合国非遗名录）","海口骑楼老街（中国历史文化名街，保留了约600栋南洋风格骑楼建筑群，见证了海口作为海上丝绸之路重要港口的历史繁华）"]},
{title:"省份概况",items:["地理位置：海南省位于中国最南端，北以琼州海峡与广东省划界，西隔北部湾与越南相对，东面和南面在南海与菲律宾、文莱、印度尼西亚和马来西亚为邻）","总面积：全省陆地总面积3.54万平方公里，海域面积约200万平方公里。海南岛面积3.39万平方公里，是中国第二大岛，海岸线总长1823公里）","气候特征：属热带海洋性季风气候，年均气温22-26摄氏度，全年暖热，雨量充沛，干湿季节明显，是我国难得的全年候避寒胜地）","人口民族：2024年末常住人口1048万人，城镇化率63.08%。有黎族、苗族、回族等少数民族，黎族是海南最早的居民，世居五指山地区）","历史沿革：西汉元封元年（前110年）正式列入西汉版图，南朝梁代设崖州。1988年设立海南经济特区，2020年启动自由贸易港建设，2025年将实现封关运作）","经济特色：以旅游业、热带农业、现代服务业为主导，2024年GDP为7935.69亿元，增长3.7%，人均可支配收入34829元）","交通优势：已实现县县通高速。环岛高铁、博鳌机场、美兰机场等交通设施完善，是海上丝绸之路的重要支点）","博鳌亚洲论坛：总部设在海南博鳌的国际组织，每年举办年会，是亚洲乃至全球政商学界交流合作的重要平台，汇聚各国政要）"]},
{title:"特色美食",items:["文昌鸡（海南四大名菜之首，产自文昌市，因产地得名。选用当地土鸡品种，采用白切烹饪方式，皮滑肉嫩、骨酥味鲜，配以鸡油饭食用更佳）","和乐蟹（万宁市特产，中国国家地理标志产品。蟹肉肥美膏满，烹饪方式以清蒸为主，保留蟹肉原汁原味的鲜甜，蟹黄饱满如咸蛋黄）","椰子鸡（以新鲜椰子水和椰肉为主料，配以文昌鸡炖煮而成，汤汁清甜鲜美，鸡肉滑嫩可口，椰香四溢）","东山羊（万宁市特产，与加积鸭、和乐蟹、文昌鸡并称海南四大名菜。选用东山岭放养的山羊，肉质鲜嫩无膻味）","海南粉（海口、定安等地的特色小吃，以细米粉为主料，配以肉丝、花生、酸笋等十余种配料，淋上特制卤汁搅拌均匀食用）","清补凉（海南最受欢迎的消暑甜品，以椰奶或糖水为底，配以红豆、绿豆、薏米、芋头、凉粉等多种配料，清凉解暑）","陵水酸粉（陵水黎族自治县的特色小吃，以细米粉配以牛肉干、花生、米粉饼等多种配料，淋上特制酸辣酱汁，酸辣开胃）","抱罗粉（文昌市抱罗镇的特色米粉，以粗圆米粉为主，口感Q弹有嚼劲，配以靓汤或干拌两种吃法，汤鲜粉滑）"]},
{title:"传统节日",items:["三月三节（黎族苗族同胞最重要的传统节日，每年农历三月初三举行，是海南国家级非物质文化遗产。节日期间举行祭祖仪式、竹竿舞比赛等）","换花节（每年农历正月十五在海口府城地区举行，是海南独特的元宵习俗。年轻人手持鲜花互相交换，寓意美好祝福）","海南国际旅游岛欢乐节（每年12月举办，是海南最具影响力的旅游节庆活动，涵盖开幕式、文艺演出、美食节等系列活动）","南洋文化节（展示海南华侨文化的主题活动，海南是著名的侨乡，有海外琼籍华侨华人300多万人，分布在50多个国家和地区）","冼夫人文化节（每年二月初九至十五在海口举行，纪念巾帼英雄冼夫人，是海南民间信仰的重要组成部分）","中国南海伏季休渔节（每年5月至8月举行，南海伏季休渔期是养护渔业资源的重要措施，对海洋生态可持续发展意义重大）","文昌孔庙祭孔大典（每年9月28日在文昌孔庙举行，纪念孔子诞辰，是海南最庄重的儒家文化活动）","七仙温泉嬉水节（每年七夕在保亭黎族苗族自治县举行，是海南黎族青年男女追求爱情的传统节日）"]},
{title:"旅游攻略",items:["最佳时间：11月至次年4月是海南旅游旺季，天气温暖宜人，是避寒的最佳选择。5月至10月为雨季，是体验热带雨林的好时机）","交通建议：海口美兰机场和三亚凤凰机场是主要航空枢纽，环岛高铁连接全岛主要城市。自驾游是最佳选择，可欣赏环岛风光）","住宿推荐：三亚海棠湾、亚龙湾是高端度假区；海口市区适合商务和历史文化游；博鳌以会议度假著称，设施完善）","景点选择：三亚湾看日落、天涯海角打卡、蜈支洲岛潜水、呀诺达雨林洗肺、南山祈福，各具特色）","免税购物：海南离岛旅客每年每人免税购物额度10万元，海口日月广场免税店、三亚海棠湾免税城是主要购物场所）","美食攻略：文昌鸡、和乐蟹、东山羊是必尝美食，海鲜去第一市场或鸿港市场自己选购加工，新鲜又实惠）","注意事项：海南紫外线强烈，务必做好防晒；热带水果虽美味但不宜空腹大量食用；海边游玩注意安全）","特色体验：冲浪去万宁日月湾、潜水去蜈支洲岛、雨林探险去呀诺达、温泉泡汤去七仙岭、观鸟去东寨港红树林）"]}

extra:[
{title:'世界遗产与重要景区',items:['莫高窟（1987年列入世界文化遗产，位于敦煌市东南25公里的鸣沙山东麓断崖上，现有735个洞窟保存壁画4.5万平方米、彩塑2415尊，是中国现存规模最大、内容最丰富的佛教艺术宝库，被誉为"东方艺术明珠"，对研究中国古代政治、经济、文化、宗教具有重要价值）','嘉峪关（明长城最西端关口，素有"天下第一雄关"之称，始建于明洪武五年1372年，由内城、外城、城壕三道防线组成，呈梯形分布，关城南北连接长城，与东边的山海关遥相呼应，关楼巍峨壮丽，是古代丝绸之路的重要关隘和军事防御要塞）','麦积山石窟（位于天水市麦积区，因山形酷似农家麦垛而得名，始建于后秦时期，现有194个窟龛、7000多尊佛像、1300平方米壁画，以其精美的泥塑艺术著称，被雕塑家刘开渠誉为"东方雕塑馆"，与敦煌莫高窟、山西云冈石窟、河南龙门石窟并称为中国四大石窟）','炳灵寺石窟（位于临夏回族自治州永靖县西南约52公里处的黄河北岸，开凿于西秦建弘元年公元420年，是中国现存最早有明确纪年的石窟，比莫高窟还要早近百年，现存窟龛185个，保存大量北魏至明清时期的壁画和雕塑，具有极高的历史和艺术价值）','甘肃长城（甘肃是长城资源最丰富的省份之一，总长度约1700公里，占全国长城总长度的三分之一，包括战国秦长城、汉长城、明长城三代长城遗址，跨越张掖、酒泉、嘉峪关等地，是研究中国古代军事防御体系的重要实物资料）']},
{title:'省份概况',items:['地理位置：甘肃省位于中国西北部、黄河上游地区，地处黄土高原、青藏高原和内蒙古高原三大高原交汇处，东南连接陕西、四川，西南接青海、新疆，西连新疆、北接宁夏、内蒙古，总面积约42.58万平方公里，是中国地理位置最狭长的省份之一，东西跨度约1400多公里）','行政区划：甘肃省简称"甘"或"陇"，省会为兰州市，下辖12个地级市州，包括兰州市、嘉峪关市、金昌市、白银市、天水市、武威市、张掖市、平凉市、酒泉市、庆阳市、定西市、陇南市，以及临夏回族自治州和甘南藏族自治州两个自治州）','河西走廊：甘肃中西部狭长地带，因位于黄河以西形似走廊而得名，是古丝绸之路的精华路段，全长约1000公里、宽数公里至百公里不等，武威、张掖、酒泉、敦煌并称"河西四郡"，是东西方文明交汇融合的重要通道，见证了千年丝路辉煌）','省会兰州：兰州是甘肃省政治、经济、文化中心，人口约435万，是中国唯一黄河穿城而过的省会城市，因"黄河之都"著称，市区沿黄河两岸分布形成了"两山夹一河"的独特城市格局，白塔山、中山桥、水车博览园等景点展现了黄河文化的独特魅力）','历史地位：甘肃古属雍州、凉州，是中华民族和华夏文明的重要发祥地之一，也是中医药学的发源地之一，自古就是古丝绸之路的咽喉要道和军事重镇，连接中原与西域，是东西方文明交汇融合的重要舞台，历史文化底蕴深厚）']},
{title:'特色美食',items:['兰州牛肉面（百年中华老字号美食，讲究"一清二白三红四绿五黄"，一清指汤清、二白指萝卜白、三红指辣椒油红、四绿指香菜绿、五黄指面条黄，面条按粗细分为毛细、细、三细、二细、韭叶、薄宽、大宽等种类，正宗牛肉面清晨现做现卖，汤鲜肉香面韧，是兰州人生活中不可或缺的美食）','手抓羊肉（甘肃经典名菜，尤以靖远羊羔肉和盐池滩羊著称，选用优质羊肉大块白水煮制，保留羊肉最原始的鲜美味道，配以椒盐、蒜泥等蘸料食用，不膻不腻、鲜嫩可口，相传有近千年历史，是西北地区待客的上等佳肴）','张掖炒炮（张掖市特色面食，因面条形状短粗似炮仗而得名，制作时将面团拉成小段下锅煮熟，捞出后与卤肉、豆腐、粉条等浇头爆炒，面条筋道弹牙、浇头香浓味美，是张掖人最爱的家常美食之一，分量实在、价格亲民）','天水呱呱（天水传统小吃，起源于西汉时期，已有两千多年历史，选用优质荞麦淀粉经过多道工序熬制而成，成品呈半透明状，配以辣椒油、蒜泥、芝麻酱、酱油醋等调料，香辣软糯、酸辣可口，是天水人早餐的首选，被誉为"西北第一小吃"）','敦煌驴肉黄面（敦煌特色美食，由抻面和卤驴肉组成，面条细如龙须、金黄透亮，配以香菇肉酱和卤驴肉食用，黄面香气扑鼻、驴肉酥烂可口，据传是古代莫高窟工匠们的传统主食，如今已成为敦煌旅游必尝的特色美食）','静宁烧鸡（甘肃省静宁县传统名菜，起源于明末清初，以本地土鸡为原料，配以多种中药材和香料烧制而成，色泽金黄、香味浓郁、酥脆可口、回味无穷，是馈赠亲友的佳品，与天津狗不理包子、沟帮子熏鸡并称"中国三大名鸡"）','灰豆子（兰州特色甜品小吃，选用甘肃特有的一种野生豆类"麻豌豆"与红枣、白糖共同熬制数小时而成，汤汁浓稠、豆子绵软、口感沙糯、甜而不腻，是夏季消暑、冬季暖身的传统美食，老少皆宜）','酿皮子（甘肃青海地区传统面食，有蒸面皮、涮面皮等品种，色泽金黄透亮、口感柔韧筋道，配以辣椒油、蒜泥、芝麻酱、醋等调料，酸辣可口、清爽开胃，是西北地区广受欢迎的消暑美食）']},
{title:'传统节日',items:['敦煌行丝路旅游节（每年8月在敦煌市举办，是甘肃省最重要的旅游节会活动之一，展示敦煌文化、丝绸之路风情和敦煌壁画艺术，包含艺术展演、民俗活动、美食品鉴等内容，吸引国内外游客广泛参与，是了解敦煌文化的重要窗口）','天水伏羲文化旅游节（每年公历6月22日举行，纪念人文始祖伏羲，相传伏羲诞生于天水，该节会包含祭拜仪式、文艺演出、学术研讨等内容，是传承中华优秀传统文化的重要活动，对研究易经文化、寻根问祖具有重要意义）','兰州黄河旅游节（每年夏季在兰州举办，围绕黄河文化主题，举办龙舟赛、黄河漂流、皮划艇等水上运动项目，以及文艺演出、民俗展演、美食品鉴等文化活动，是展示兰州城市形象和黄河文化的重要平台）','拉卜楞寺毛兰姆法会（每年农历正月十三在甘南州夏河县拉卜楞寺举行，是藏传佛教最盛大的法会活动之一，数万信众和游客齐聚一堂，瞻仰巨幅唐卡（晒佛），场面庄严壮观，体现了藏族同胞虔诚的宗教信仰）','临夏花儿会（每年农历四月在临夏州举办，是多民族共同参与的歌咏盛会，以"花儿"这一民间艺术形式为主，花儿是流传于西北地区的山歌，被列入国家级非物质文化遗产，会期万人同唱、蔚为壮观）','庆阳香包节（每年端午节期间在庆阳市举办，庆阳香包是国家级非物质文化遗产，俗称"荷包""耍货"，是传统刺绣工艺品，具有浓郁的西北风格和民俗特色，香包节期间展示展销各类香包刺绣产品，吸引众多游客）']},
{title:'旅游攻略',items:['最佳旅游季节：5月至10月是甘肃最佳旅游时间，其中7月至9月气候最为宜人，是游览甘南藏族自治州和河西走廊的黄金时段，夏季可避暑，秋季可欣赏胡杨林和雪山景观，冬季可体验冰雪乐趣和温泉养生）','河西走廊自驾游推荐（5日行程）：Day1兰州至武威（约270公里），游览雷台汉墓、海藏寺，品尝三套车；Day2武威至张掖（约230公里），游览七彩丹霞景区，品张掖炒炮；Day3张掖至酒泉（约220公里），游览嘉峪关关城；Day4酒泉至敦煌（约400公里），沿途欣赏戈壁风光；Day5敦煌深度游莫高窟、鸣沙山月牙泉、玉门关、阳关）','甘南深度游推荐（3日行程）：Day1兰州至夏河（约230公里），游览拉卜楞寺、世界最长的转经长廊；Day2夏河至桑科草原至郎木寺（约150公里），体验草原风光和藏族文化；Day3郎木寺至扎尕那（约100公里），游览"石头城"扎尕那，感受迭山主峰的自然奇观）','敦煌深度游推荐（3日行程）：Day1莫高窟（需提前预约，约3至4小时）+鸣沙山月牙泉（傍晚可观赏日落）；Day2阳关、玉门关、汉长城遗址（感受古丝路历史沧桑）；Day3敦煌古城、西千佛洞、榆林窟（深度了解敦煌石窟艺术）','门票预约提示：莫高窟实行预约制参观，需提前15至30天通过莫高窟参观预约网或微信公众号预约门票，门票含数字中心至窟区摆渡车，建议预约上午场以便下午游览鸣沙山，特窟需另购票）','自驾注意事项：甘肃地域辽阔、景点分散，自驾需提前检查车况，油箱加满，备好饮用水和干粮；河西走廊部分路段手机信号较弱，建议下载离线地图；甘南地区海拔较高注意高反，山路弯多需谨慎驾驶）'}
],
questions:[
{q:'莫高窟于哪一年被列入世界文化遗产？',options:['1979年','1987年','1997年','2001年'],answer:1,explain:'莫高窟于1987年被联合国教科文组织列入世界文化遗产名录，现保存洞窟735个、壁画4.5万平方米、彩塑2415尊，是中国现存规模最大、内容最丰富的佛教艺术宝库'},
{q:'"天下第一雄关"指的是甘肃哪个关隘？',options:['山海关','玉门关','嘉峪关','雁门关'],answer:2,explain:'嘉峪关位于甘肃省嘉峪关市，始建于明洪武五年（1372年），是明长城最西端的关口，被称为"天下第一雄关"，与东边的山海关遥相呼应'},
{q:'兰州牛肉面的"五黄"指的是？',options:['面粉黄','面条黄','辣椒油黄','卤蛋黄'],answer:1,explain:'兰州牛肉面讲究"一清二白三红四绿五黄"，其中"五黄"指面条要呈淡黄色，体现了面粉选择和制面工艺的讲究，是评判一碗正宗牛肉面的重要标准'},
{q:'拉卜楞寺位于甘肃哪个地区？',options:['敦煌','张掖','甘南州夏河县','天水'],answer:2,explain:'拉卜楞寺位于甘肃省甘南藏族自治州夏河县，是格鲁派六大寺院之一，寺内拥有世界最长的转经长廊，长约3.5公里，宗教地位崇高'},
{q:'甘肃长城总长度约占全国长城总长度的多少？',options:['五分之一','四分之一','三分之一','二分之一'],answer:2,explain:'甘肃长城总长度约1700公里，约占全国长城总长度的三分之一，是长城资源最丰富的省份之一，包括战国秦长城、汉长城、明长城三代长城遗址'}
]
},,

extra:[
{title:'世界遗产与重要景区',items:['可可西里：2017年列入世界自然遗产，平均海拔超过4500米，是世界上面积最大、海拔最高的高原荒野区，保存着完整的藏羚羊迁徙路线和珍贵的冰川雪山生态系统', '三江源国家公园：中国首个国家公园试点，地处青藏高原腹地，是长江、黄河、澜沧江三大江河的发源地，被誉为"中华水塔"，生态地位极其重要', '青海湖：中国最大的内陆咸水湖，湖面面积4543平方公里，湖水清澈湛蓝，湖畔是重要的鸟类栖息地，每年春季有数十万只候鸟在此繁衍生息', '塔尔寺：藏传佛教格鲁派六大寺院之一，酥油花、壁画、堆绣被誉为"塔尔寺三绝"，寺内建筑金碧辉煌，佛塔林立，艺术价值极高', '茶卡盐湖：著名的"天空之镜"，湖面如镜子般倒映天空和远山，游客可以走在湖面上拍摄绝美倒影照片，是摄影爱好者的天堂', '祁连山草原：中国最美的六大草原之一，水草丰美，牛羊遍野，夏季野花盛开，秋季金黄一片，雪山与草原相映成趣', '坎布拉国家森林公园：丹霞地貌与原始森林完美结合，景区内有众多藏传佛教寺院，红色的丹霞山与翠绿的松柏交相辉映', '阿尼玛卿雪山：藏区四大神山之一，终年积雪，主峰海拔6282米，是登山和探险的理想之地']},
{title:'省份概况',items:['地理位置：位于青藏高原东北部，是长江、黄河、澜沧江的发源地，素有"中华水塔"之称', '面积人口：总面积72.23万平方公里，居全国第四位，人口约600万，是地广人稀的省份', '省会西宁：夏无酷暑、冬无严寒的"中国夏都"，是青藏高原最大的城市和交通枢纽', '民族构成：多民族聚居区，藏族、回族、蒙古族、土族、撒拉族等47个民族和谐共处，少数民族人口占全省总人口的47%', '生态地位：被誉为"中华水塔"，是长江、黄河、澜沧江的发源地，生态战略地位极其重要', '气候特点：属高原大陆性气候，日照时间长，太阳辐射强烈，昼夜温差大，年均气温5.1摄氏度', '经济发展：以畜牧业和盐湖化工为主，是全国最大的钾肥生产基地和重要的太阳能光伏产业基地', '水资源：青海是三江之源，每年向下游输送超过600亿立方米的清洁水源，是中华文明的生命之源']},
{title:'特色美食',items:['手抓羊肉：青海传统名菜，选用高原放养的藏系绵羊，肉质鲜嫩无膻味，配以椒盐和蒜泥直接手抓着吃，是待客的上等佳肴', '酿皮：青海特色小吃，分为白酿皮和黑酿皮两种，以西宁的黑酿皮最为著名，口感柔韧Q弹，配以辣椒油、芝麻酱、蒜汁等调料，酸辣可口', '牦牛酸奶：采用高原牦牛奶发酵制成，质地浓稠如豆腐脑，表面有一层金黄色的奶皮，酸甜适中，营养价值极高，富含蛋白质和钙质', '尕面片：青海人日常喜爱的面食，将面片揪成指甲盖大小的形状，配以羊肉、西红柿、青菜等煮成汤面，味道鲜美，是家的味道', '青海土火锅：使用铜制土火锅，将牛羊肉、豆腐、粉条、蔬菜等食材层层码放，加入特色底料慢炖，食材丰富，汤鲜肉嫩', '杂碎汤：清晨的青海街头，到处可见卖杂碎的店铺，将牛羊内脏煮成浓汤，配以葱花、香菜、辣椒，早晨一碗杂碎汤暖身又暖胃', '狗浇尿饼：名字有趣的面食，因烙制时沿锅边浇油的动作而得名，饼薄酥脆，层次分明，是青海人喜爱的传统小吃', '搅团：用青稞面或小麦面在沸水中搅成糊状，配以酸菜汤或羊肉汤食用，是青海农村的传统美食，代表着乡愁和记忆']},
{title:'传统节日',items:['塔尔寺酥油花灯节：每年正月十五举办，是藏传佛教最隆重的灯会，僧侣用彩色酥油塑制精美佛像和花卉图案，夜晚灯火辉煌，吸引了大量信众和游客', '环青海湖国际公路自行车赛：每年7月至8月举办，是亚洲级别最高的公路自行车赛，也是世界上海拔最高的自行车赛，被评为中国十大最佳赛事之一', '玉树赛马节：每年7月下旬在玉树藏族自治州举行，是康巴藏族最盛大的节日，举行马术表演、赛马、藏式摔跤、射箭等传统体育竞技活动', '土族纳顿节：世界上历时最长的节日，从每年农历七月十二日开始，持续近两个月，是土族人民庆祝丰收、感谢神灵的盛大节日', '热贡唐卡艺术节：每年8月在黄南州同仁市举办，展示藏族唐卡艺术的魅力，包括现场绘制、展览、学术研讨等活动', '青海湖祭海：每年农历七月十五举行，是藏族同胞祭祀青海湖神的传统仪式，祈求风调雨顺、牛羊兴旺，仪式庄严肃穆', '花儿会：西北地区特有的民歌盛会，青海是"花儿"的发源地之一，每年春季各地举办花儿会，对歌场面热闹非凡', '土族波波会：土族特有的宗教节日，在春耕前举行，祭祀五谷神，祈求农业丰收']},
{title:'旅游攻略',items:['最佳时间：6月至9月是青海旅游黄金季节，7月至8月油菜花盛开，青海湖一片金黄，是拍照的最佳时机', '高原反应：青海平均海拔超过3000米，初到高原应避免剧烈运动，多喝水，多吃水果蔬菜，保证充足睡眠，严重者可服用红景天', '交通指南：西宁是交通枢纽，可乘飞机、火车到达，西宁至青海湖约2小时车程，青海湖环湖约400公里，建议自驾或包车', '住宿建议：沿途住宿条件不断完善，青海湖周边有帐篷营地和星级酒店，7月至8月旺季需提前预订', '高海拔环线：青海大环线全长约2500公里，历时7天，途径青海湖、茶卡盐湖、柴达木盆地、敦煌、张掖等地，是深度游玩的经典线路', '装备准备：防晒霜SPF50+必备，墨镜、遮阳帽防紫外线，早晚温差大需带厚外套，冲锋衣或羽绒服是明智之选', '环保提醒：青海生态脆弱，请勿在草原随意碾压，不乱扔垃圾，不投喂野生动物，共同守护三江之源', '特色体验：草原骑马、湖边骑自行车、藏族家访、观看马术表演、制作青稞面食']},
],

extra:[
{title:'世界遗产与重要景区',items:['新疆天山（2013年列入世界自然遗产，包含托木尔峰片区、喀拉峻-库尔德宁片区、巴音布鲁克片区、博格达片区4个组成部分，总面积约5.7万平方公里，是全球温带干旱区最典型的自然景观代表，拥有雪山、冰川、森林、草原等多样生态系统）','天山天池（古代神话中王母娘娘设宴款待周穆王的瑶池所在地，位于博格达峰北麓，新疆第一个国家5A级景区，湖水清澈碧蓝透明度极高，周长约9公里形状像一颗蓝宝石相传为西王母沐浴之地）','喀纳斯（变色湖著称，湖水随季节和天气呈现蓝、绿、金等不同颜色，湖底有水怪传说，世外桃源图瓦人村落保存完整原始木屋，被誉为人间净土神的花园）','那拉提草原（哈萨克语意为最先见到太阳的地方，被称为空中草原，伊犁河谷代表，夏季野花遍地牛羊成群毡房点点，是世界四大草原之一，这里保留了最完整的哈萨克族游牧文化）','赛里木湖（古称净海，大西洋暖流最后眷顾的地方，高山湖泊风光旖旎，湖畔是著名的果子沟大桥，是新疆海拔最高面积最大的湖泊，有大西洋最后一滴眼泪的美誉）','喀什老城（迷宫式伊斯兰建筑群代表，保留完好的中世纪古城风貌，街道纵横交错如迷宫般四通八达，艾提尕尔清真寺是新疆最大清真寺可容纳两万人礼拜）','交河故城（世界上最大最古老的生土建筑城市遗址，公元前2世纪至公元14世纪，曾是车师前国都城，建筑遗迹保存完好被誉为城市的标本，是研究古代城市的活化石）','克孜尔千佛洞（比敦煌莫高窟早一百年，佛教东传重要见证，龟兹石窟艺术代表，现存236个洞窟壁画精美生动，是西域佛教文化的瑰宝）']},
{title:'省份概况',items:['面积166.49万平方公里，全国最大，占中国陆地总面积的六分之一，相当于3个法国或15个浙江省面积，是中国西部重要门户和战略要地，自古就是中国不可分割的一部分）','地形特征：三山夹两盆（阿尔泰山脉、天山山脉、昆仑山脉夹准噶尔盆地和塔里木盆地），形成了独特的高山盆地相间地形和丰富多样的自然景观，准噶尔盆地有古尔班通古特沙漠，塔里木盆地有中国最大沙漠塔克拉玛干）','首府乌鲁木齐市，新疆政治经济文化中心，古丝绸之路重镇，亚心之都，亚洲大陆地理中心位于乌鲁木齐县永丰乡包家槽子村）','与8个国家接壤（哈萨克斯坦、吉尔吉斯斯坦、塔吉克斯坦、巴基斯坦、蒙古、印度、阿富汗、俄罗斯），边境线长达5600多公里，是中国接壤国家最多的省区）','古丝绸之路核心区，古代东西方文明交流的重要通道，佛教、伊斯兰教、儒家文化在此交汇融合，形成了多元包容的文化特色，留下了大量历史遗迹和文化遗产）','气候特点：深居亚欧大陆腹地，属于温带大陆性干旱气候，日照充足年日照时数达2800小时，昼夜温差大年均降水量约150毫米蒸发量却达2000毫米，有早穿棉袄午穿纱围着火炉吃西瓜的说法）','多民族聚居：维吾尔族为主，约占41%，还有汉族、哈萨克族、回族、柯尔克孜族、蒙古族、塔吉克族、乌孜别克族等47个民族，民族风情浓郁，各民族和睦相处）','自然资源丰富：石油、天然气、煤炭储量居全国前列，是国家重要的能源战略接替区和西气东输起点，还有丰富的光热资源和风能资源）']},
{title:'特色美食',items:['大盘鸡（新疆第一菜，起源于沙湾县，融合了西北人的豪爽与川菜的麻辣，鸡肉土豆皮带面是经典吃法，大盘装盛故名大盘鸡，是待客必备佳肴）','烤羊肉串（维吾尔语喀瓦普，选用新鲜羊肉切成大块，穿制后炭火慢烤，撒上孜然和辣椒面，外焦里嫩香气四溢，是夜市必点美食）','手抓饭（维吾尔语波劳，羊肉、胡萝卜、洋葱、大米焖制而成，油亮味香，逢年过节和待客必备的传统美食，象征着热情好客）','馕（新疆独特面饼，维吾尔族主食，由面粉、盐、水、酵母制成，可保存数月不坏，是丝绸之路上的方便面，种类繁多有肉馕油馕等）','拉条子（新疆拌面，手工拉制的新鲜面条，配以各种炒菜，是新疆人日常饮食的重要组成部分，百吃不厌）','烤包子（维吾尔语沙木萨，羊肉丁、洋葱、孜然等做馅，贴在馕坑壁烤制，外皮酥脆内馅鲜香）','手抓肉（哈萨克族待客上品，选用新鲜羊肉清炖，保留肉质原味，蘸盐食用，大块吃肉大碗喝酒尽显豪爽）','缸子肉（搪瓷缸炖制的清炖羊肉，将羊肉切块放入缸中，加水文火慢炖，汤鲜肉嫩极具草原风情）','酸奶粽子（和田夜市网红美食，糯米粽浇上浓稠酸奶和蜂蜜，酸甜可口是传统与创新的完美结合）','新疆瓜果（吐鲁番葡萄享誉世界，哈密瓜甜蜜多汁，库尔勒香梨皮薄肉细，阿克苏苹果冰糖心著称，和田红枣声名远扬）']},
{title:'传统节日',items:['古尔邦节（伊斯兰教重要节日，阿拉伯语尔德艾祖哈，意为宰牲节，维吾尔语称库尔邦节，穆斯林在这天宰杀牛羊馈赠亲友，放假3天）','开斋节（斋月结束的庆祝日，阿拉伯语尔德费图尔，穆斯林封斋一个月后庆祝，教众互相拜访赠送礼品）','诺鲁孜节（波斯语新年第一天，在公历3月21日前后，是维吾尔、哈萨克、柯尔克孜等民族的共同节日）','那达慕大会（蒙古族传统盛会，7-8月水草丰美时举办，包含摔跤、赛马、射箭男子三艺竞技）','天马节（伊犁昭苏县举办，7月中旬，纪念天马故乡传统，马术表演、赛马、姑娘追等民俗活动）','葡萄节（吐鲁番8-9月葡萄成熟季举办，品尝葡萄、参观晾房、了解葡萄酒文化）','麦西来甫（维吾尔族群众性娱乐活动，集歌舞、游戏、说唱、劝话于一体，是社交活动的重要形式）','雪顿节（部分新疆蒙古族地区庆祝，藏传佛教节日，酸奶宴请僧侣，后逐渐成为各民族共同参与的节日）']},

let currentRegion = '华北';
let currentProvince = '';

function init(){
renderRegionTabs();
renderProvinceList('华北');
}

function renderRegionTabs(){
const container = document.getElementById('regionTabs');
regions.forEach(r=>{
const btn = document.createElement('button');
btn.className = 'region-tab' + (r===currentRegion?' active':'');
btn.textContent = r;
btn.onclick = ()=>{
currentRegion = r;
document.querySelectorAll('.region-tab').forEach(t=>t.classList.remove('active'));
btn.classList.add('active');
renderProvinceList(r);
};
container.appendChild(btn);
});
}

function renderProvinceList(region){
const container = document.getElementById('provinceList');
container.innerHTML = '';
regionNames[region].forEach(p=>{
const card = document.createElement('div');
card.className = 'province-card glass-card';
card.innerHTML = '<h3>'+p+'</h3><span>'+provinceData[p].region+'</span>';
card.onclick = ()=>showProvince(p);
container.appendChild(card);
});
document.getElementById('provinceDetail').classList.remove('active');
container.style.display = 'grid';
}

function showProvince(name){
currentProvince = name;
const data = provinceData[name];
document.getElementById('detailTitle').textContent = name;
document.getElementById('detailDesc').textContent = data.region + ' · 地方导游基础知识';
document.getElementById('provinceList').style.display = 'none';
document.getElementById('provinceDetail').classList.add('active');
document.getElementById('provinceDetail').scrollTop = 0;
renderKnowledge(name);
renderQuestions(name);
renderOfficial(name);
switchTab('knowledge');
}

function showProvinceList(){
document.getElementById('provinceDetail').classList.remove('active');
document.getElementById('provinceList').style.display = 'grid';
}

function switchTab(tab){
document.querySelectorAll('.detail-tab').forEach(t=>t.classList.remove('active'));
document.querySelectorAll('.detail-content').forEach(c=>c.classList.remove('active'));
event.target.classList.add('active');
document.getElementById('tab-'+tab).classList.add('active');
}

function renderKnowledge(name){
const data = provinceData[name];
const container = document.getElementById('tab-knowledge');
let html = '<div class="content-grid">';
data.extra.forEach(item=>{
html += '<div class="content-card"><h4><span>📍</span>'+item.title+'</h4><ul>';
item.items.forEach(i=>html += '<li>'+i+'</li>');
html += '</ul></div>';
});
html += '</div>';
container.innerHTML = html;
}

function renderQuestions(name){
const data = provinceData[name];
const container = document.getElementById('tab-questions');
let html = '';
data.questions.forEach((q,i)=>{
html += '<div class="question-card"><h4>第'+(i+1)+'题</h4><p class="question-text">'+q.q+'</p><ul class="question-options">';
q.options.forEach((opt,j)=>{
html += '<li onclick="checkAnswer(this,'+j+','+i+',\''+name+'\')">'+opt+'</li>';
});
html += '</ul><div class="explain-box" id="explain-'+i+'"></div></div>';
});
container.innerHTML = html;
}

function checkAnswer(el,idx,qIdx,name){
const data = provinceData[name].questions[qIdx];
const options = el.parentElement.querySelectorAll('li');
const explainBox = document.getElementById('explain-'+qIdx);
if(el.classList.contains('correct')||el.classList.contains('wrong')) return;
options.forEach(o=>o.style.pointerEvents='none');
if(idx===data.answer){
el.classList.add('correct');
explainBox.textContent = '✓ 回答正确！'+data.explain;
explainBox.className = 'explain-box show';
}else{
el.classList.add('wrong');
options[data.answer].classList.add('correct');
explainBox.innerHTML = '✗ 回答错误！正确答案：'+options[data.answer].textContent+'<br><br>'+data.explain;
explainBox.className = 'explain-box show wrong-type';
}
}

function renderOfficial(name){
const data = provinceData[name];
const container = document.getElementById('tab-official');
container.innerHTML = `
<div class="info-box">
<h4>📋 官方报名信息</h4>
<ul>
<li>官方报名入口：<a href="https://mr.mct.gov.cn" target="_blank">全国旅游监管服务平台</a></li>
<li>官方公众号：文旅之声（底部菜单-导游考试报名）</li>
<li>考试大纲下载：<a href="https://www.mct.gov.cn" target="_blank">文化和旅游部官网</a></li>
</ul>
</div>
<div class="info-box">
<h4>🗺️ ${name}省官方渠道</h4>
<ul>
<li>官网：<a href="${data.official.site}" target="_blank">${data.official.site}</a></li>
<li>报名通知：${data.official.notice}</li>
${data.official.policy?'<li>特别说明：'+data.official.policy+'</li>':''}
</ul>
</div>
<div class="tip-box">
<strong>📌 备考提示</strong>
<p>${name}地方导基考试重点：本省世界遗产、5A级景区、特色民俗、历史文化。建议结合当地实际备考，多关注官方发布的考试信息。</p>
</div>
`;
}

document.addEventListener('DOMContentLoaded',init);
</script>
