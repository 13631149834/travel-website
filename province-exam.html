      {
        "title": "传统节日",

          "老北京春节俗称\"过年\"，从腊月初八开始持续到正月十五。腊八节喝腊八粥、泡腊八蒜是传统。腊月二十三祭灶王，买关东糖祭拜后烧掉旧灶王像，寓意送灶王上天述职。除夕守岁，灯火通明，合家团聚吃年夜饭，饺子是必备食品。初一开始拜年走亲访友，互相道贺\"恭喜发财\"。",
          "北京庙会是春节期间最重要的民俗活动。地坛庙会、龙潭庙会，白云观庙会、厂甸庙会并称\"北京四大庙会\"。庙会上有踩高跷、舞狮舞龙、杂技表演、曲艺演出等。琳琅满目的年货、传统小吃、手工艺品令人目不暇接。厂甸庙会以书市和文房四宝著称，地坛庙会以祭地表演闻名。",

          "清明节北京人有扫墓祭祖的传统。旧时清明时节踏青赏花，北海公园、颐和园、香山等处游人如织。寒食节禁火冷食的习俗虽已淡化，但吃寒食、踏青的遗风仍在。胡同里孩子们放风筝也是清明时节的传统游戏。菊花、梅花是清明祭扫常用花卉。",

        "title": "旅游攻略",
        "items": [
          "北京五日深度游推荐：第一天游览天安门广场、故宫（建议从午门进、神武门出，下午逛景山公园俯瞰故宫全景）；第二天八达岭长城（早起出发，晚返回后夜游什刹海）；第三天颐和园（建议从东宫门进游览长廊、佛香阁，乘船游昆明湖）；第四天天坛、前门大街（傍晚逛大栅栏，晚上听一场京剧）；第五天雍和宫、国子监、南锣鼓巷胡同游。",
          "故宫游览建议提前7天在故宫博物院官网预约门票，每日8万人限额。珍宝馆和钟表馆需单独购票（10元/人）。建议租借导览器或使用微信讲解。最佳游览路线为中轴线三大殿+内廷六宫，至少需要4小时。故宫文创产品丰富，冰窖餐厅可品尝御膳。开放时间：8:30-17:00（16:00停止入院），周一闭馆。",

          "五大道文化旅游区位于天津市和平区，是国家AAAA级旅游景区，享有\"万国建筑博览馆\"美誉。街区面积1.28平方公里，拥有2000余栋上世纪二三十年代建成的英、法、意、德、西班牙等国风格花园洋房，是我国唯一完整保存元代胡同院落肌理的棋盘式传统民居区。2014年被评为国家AAAA级景区，2016年列入首批《中国20世纪建筑遗产名录》。著名景点包括民园广场、庆王府，先农大院等。",
          "天津古文化街位于南开区宫南大街、宫北大街，是国家5A级景区，以津门故里著称。街内有天后宫（民俗博物馆）、泥人张美术馆、杨柳青年画馆等。整条街全长687米，保留明清风格建筑98栋，集中展示天津传统民俗文化。逢年过节举办民俗表演，糖画、面人、风筝魏等非遗项目在此传承。天后宫是中国三大天后宫之一，香火鼎盛。",
          "意大利风情旅游区位于河北区，是亚洲唯一意大利本土以外保存完整的意式建筑群。占地28.45公顷，建筑面积63万平方米，拥有200余栋意式建筑。包括马可波罗广场、但丁广场、意式花园等。夜景灯光璀璨，酒吧餐厅林立，是天津最具异国情调的休闲街区。梁启超故居、曹禺故居等名人故居也在此区域。",
          "瓷房子位于和平区赤峰道72号，是一座用7亿多片古瓷片、瓷瓶、瓷盘装饰的特殊建筑。该建筑为法式洋楼，前身为北洋政府外交总长黄荣良故居。2002年被收藏家张连志购得后，用历代陶瓷片、古董装饰外墙，耗资数亿元打造而成。建筑风格中西合璧，极具视觉冲击力，是天津最网红的地标建筑之一。",
          "盘山风景区位于蓟州区西北部，是国家5A级景区，素有\"京东第一山\"美誉。盘山海拔864.4米，松柏苍翠，瀑布飞泉，五峰八石构成独特景观。乾隆皇帝曾32次巡游盘山，留下\"早知有盘山，何必下江南\"赞叹。著名景点包括挂月峰、三盘暮雨、云罩寺等，秋季红叶景观尤为壮观。",
          "黄崖关长城位于蓟州区下营镇，始建于明洪武年间，是明代长城精华段落。全长42公里，关城10座，敌楼52座，烽火台21座。关城依山傍水，形势险要，有八卦关城之称。1990年入选津门十景之一。主要景点包括八卦迷宫、长城碑林、戚继光雕像等，是天津境内唯一的长城遗迹。",

          "天津，简称\"津\"，别称津门、津沽，是中华人民共和国四个直辖市之一。总面积11966.45平方公里，下辖16个区，常住人口约1386万人。天津是中国北方最大的沿海开放城市，也是北方国际航运核心区。2022年天津港货物吞吐量达4.68亿吨，位居世界前十。天津滨海国际机场是4E级民用国际机场，通航国内外航线200余条。",
          "天津历史悠久，早在战国时期就有渔盐之利。金朝设直沽寨，元朝设海津镇。明永乐二年（1404年）设天津卫，这是天津城市发展的转折点。1860年天津开埠通商，成为近代中国最早对外开放的沿海城市之一。九国租界的设立使天津成为中国乃至东亚最国际化的城市之一，奠定了天津兼容并蓄的城市性格。",
          "天津是中国历史文化名城和优秀旅游城市，拥有600余年建城史。天津是京杭大运河重要的节点城市，大运河天津段全长174公里。天津独特的地理位置孕育了多元文化：漕运文化、运河文化、租界文化、妈祖文化在此交汇融合。天津还是中国近代工业的发祥地，诞生了天津机器制造局、永利碱厂等近代企业。",
          "天津属温带季风气候，四季分明。年平均气温约13℃，年降水量约550毫米。春季干燥多风，夏季炎热多雨，秋季天高气爽，冬季寒冷少雪。最佳旅游季节为春秋两季，此时气候宜人，风景最美。夏季虽热，但可体验海河夜游、五大道漫步等特色活动。冬季可参观各大博物馆和室内景点。",
          "天津话是北方方言的一种，语调幽默诙谐，词汇丰富独特。\"嘛\"是天津话中最具代表性的语气词，\"哏儿\"形容有趣可笑的事物。天津人性格直爽热情，说话办事讲究\"板正\"（认真），有\"卫嘴子\"之称，形容天津人能说会道。天津相声、评书、快板等曲艺形式全国闻名，体现了天津的语言文化魅力。",
          "天津是中国近代教育的先驱城市。1895年创办的北洋大学是中国近代第一所大学。天津还拥有南开大学、天津大学等知名高等学府。南开大学由张伯苓创办于1919年，培养了周恩来、温家宝等杰出校友。天津大学前身为北洋大学，是中国近代第一所现代大学。目前天津共有普通高校56所，在校生超80万人。",
          "天津是中国北方金融中心，拥有各类金融机构超过1000家。天津经济技术开发区（泰达）是首批国家级开发区之一，聚集了大量外资企业和跨国公司。滨海新区是国家综合配套改革试验区，拥有天津港、经济技术开发区、保税区等功能区。天津正加快建设\"一基地三区\"：全国先进制造研发基地、北方国际航运核心区。",

        "items": [
          "狗不理包子是天津最著名的传统小吃，起源于清咸丰年间。相传创始人高贵友因包子皮薄馅大、鲜香可口，食客络绎不绝，忙得顾不上搭理客人，得名\"狗不理\"。包子采用传统半发面工艺，每个包子至少18个褶，制作精细。馅料选用上等猪肉，配以骨头汤和特制调料，鲜嫩多汁。现已被列入国家级非物质文化遗产名录。",
          "煎饼果子是天津人日常早餐的首选，正宗做法以绿豆面糊摊成薄饼，打入鸡蛋，卷上油条或馃篦，涂上面酱、腐乳、辣酱等佐料。讲究\"果子和煎饼是天生一对\"，现做现吃最为美味。杨姐煎饼、二姑煎饼等老店凌晨就开始排队。天津人对煎饼果子有严格要求：只加鸡蛋、果子和面酱，任何额外食材都被视为\"邪教\"。",
          "耳朵眼炸糕是天津三绝之一，因店铺位于耳朵眼胡同而得名。选用上等糯米制成绵软外皮，包裹红豆沙馅或红糖馅，经热油炸制金黄酥脆。炸糕外皮酥脆，内馅软糯，甜而不腻。创于清光绪年间，至今已有百余年历史。建议现买现吃，冷却后口感大打折扣。价格实惠，是不可错过的天津味道。",
          "十八街麻花是天津三绝之一，全名\"桂发祥十八街麻花\"。创于1927年，因最初店铺位于大沽南路十八街而得名。麻花选用面粉、白糖、芝麻、桃仁等原料，经十几道工序精制而成。特点是酥脆香甜、久放不绵，曾多次获得国家级金奖，是馈赠亲友的佳品。天津大麻花与十八街麻花齐名，各有特色。",
          "锅巴菜是天津独有的传统小吃，又称\"嘎巴菜\"。将绿豆、小米磨成浆，摊成薄饼切成柳叶形，浇上由大料粉、肉汤、淀粉等熬制的卤汁，配以香菜、辣油等佐料。特点是嘎巴柔软筋道，卤汁鲜香微辣，是天津人早餐桌上不可或缺的美食。正味斋、炉炉香等老字号经营百年，口味正宗。",
          "天津捞面是天津人待客的重要饮食习俗，尤其以大年初二\"姑爷节\"吃的四碟捞面最为讲究。捞面配四碟浇头：清炒虾仁、炒鸡蛋、肉丝炒香干、糖醋面筋丝，搭配三鲜卤或西红柿鸡蛋卤。面条要用手擀面，配菜丰富象征吉祥。天津捞面讲究\"菜码要全、卤汁要鲜\"，一碗面承载着天津人的热情与好客。",
          "天津海鲜来自渤海湾，以皮皮虾、梭子蟹、八带（章鱼）、海螺等最为著名。天津有\"借钱吃海货，不算不会过\"的俗语，说明天津人对海鲜的喜爱。每年春秋两季是海鲜最肥美的季节。八珍豆腐、老爆三、酱卧鸡蛋等津菜都是将海鲜与本地食材完美结合的代表作。塘沽、北塘是品尝海鲜的好去处。",
          "天津清真菜以牛羊肉为主料，代表菜包括黄焖牛肉、扒肉条、独面筋等。推荐店铺有恩宏德、宴宾楼等老字号。天津的早点文化丰富多彩：炸糕、卷圈、糖果子、蜜麻花、炸老虎（油条的一种）等，每天清晨街头巷尾的早点摊前总是排着长队，体现着天津人对生活的热爱。"
        ]

      {
        "title": "传统节日",
        "items": [
          "天津春节习俗丰富多彩，延续时间最长，从腊月初八开始一直到二月初二结束。天津人讲究\"没出正月就算过年\"，年前准备从腊月二十三祭灶开始。腊八节喝腊八粥、泡腊八蒜是传统。年前还有\"扫房子\"、\"糊窗户\"、\"贴倒有\"等习俗。除夕守岁，初一吃素饺子，初二回娘家拜年，正月里走亲访友，一直热闹到元宵节。",
          "天津人正月初二有\"姑爷节\"习俗，这天女婿要携礼品拜见岳父母，岳父母家则准备丰盛的四碟捞面招待女婿。天津人称此日为\"姑爷节\"，体现了天津人重视礼仪、热情好客的性格。这一天无论商场还是家庭，都充满节日气氛。捞面象征\"条条顺顺\"，是天津人对新年的美好期盼。",
          "正月初五俗称\"破五\"，是天津重要的民俗节日。这一天要包饺子，俗称\"捏小人嘴\"，寓意规避谗言。商家多选此日开市，贴红挂彩，放鞭炮迎接财神。天津人认为初五之后春节禁忌即可解除，生活恢复正常。破五饺子要用肉馅，象征生活富足。初五晚上鞭炮声此起彼伏，热闹非凡。",
          "天津元宵节（正月十五）有挂灯、赏灯、猜灯谜的习俗。天津天后宫一带自古是灯市最繁华之处，各式花灯争奇斗艳。孩子们提着灯笼走街串巷，大人们则聚集猜灯谜。天津还保留着\"正月十五走百病\"的习俗，人们在这天夜晚出行散步，祈求去除疾病。汤圆和饺子是这天的节日美食。",
          "天津端午节习俗独特，是一次入夏前的大规模\"扫除日\"。节前悬挂艾叶菖蒲，门贴葫芦门符，用红纸剪小葫芦贴在门窗上。小孩子要穿绣有五毒图案的兜兜，佩戴长命缕（五彩丝线）和香囊。人们用雄黄酒涂抹额头、耳孔以驱毒虫。杨柳青年画中钟馗题材丰富，端午节期间特别畅销。",
          "天津有\"五月十三关帝磨刀\"的说法，相传是关帝单刀赴会之日。这一天若下雨，称\"磨刀雨\"，主人口平安；若无雨，则预示可能有旱灾。天津人会在关帝庙前举行祭祀活动，祈求风调雨顺、国泰民安。部分地区有宰白雄鸡祭祀关帝的习俗。",
          "天津天后宫是妈祖文化在北方的重要传播中心。农历三月二十三为天后诞辰，天津古文化街一带举办盛大庙会。届时有皇会表演，踩高跷、划旱船、舞龙舞狮等民俗活动精彩纷呈。妈祖文化体现了天津作为漕运码头、运河要冲的历史地位，也展现了天津人海上祈福的民俗传统。",
          "天津杨柳青年画历史悠久，是中国著名的木版年画产地之一。与苏州桃花坞年画并称\"南桃北柳\"。年画题材多为胖娃娃、门神、历史故事等，色彩鲜艳，寓意吉祥。腊月里贴年画是天津重要的年俗。2006年杨柳青年画被列入首批国家级非物质文化遗产名录。"

          "天津三日精华游推荐：第一天游览五大道（建议上午前往，租自行车骑行，约2-3小时）、下午参观天津博物馆了解津沽文化、傍晚到意式风情区看夜景；第二天上午逛古文化街和天后宫、参观瓷房子、下午乘海河游船欣赏两岸风光；第三天可选择盘山一日游或国家海洋博物馆深度游。住宿建议选在和平区或河北区，交通便利且景点集中。",

  "辽宁": {
    "region": "东北",
    "overview": {},
    "keyPoints": [],
    "attractions": [],
    "extra": [
      {
        "title": "世界遗产与重要景区",
        "items": [
          "沈阳故宫位于沈阳市沈河区，是中国现存完整的两座宫殿建筑群之一。始建于后金天命十年（1625年），是清朝入关前的皇宫。沈阳故宫占地6万多平方米，有古建筑114座，分为东路、中路、西路三部分。东路以大政殿和十王亭为代表，体现了满族'宫高殿低'的建筑特色；中路的崇政殿是皇太极处理朝政之所；西路的文溯阁专为存放《四库全书》而建。",
          "千山位于鞍山市东南部，是国家5A级旅游景区。千山又名积翠山、千朵莲花山，因999座山峰连绵起伏、形如莲花而得名。景区面积72平方公里，最高峰仙人台海拔708米。千山以奇峰、怪石、古松、寺庙著称，有'东北第一名山'之誉。著名景点有弥勒大佛、五佛顶、天外天等。",
          "本溪水洞位于本溪市本溪满族自治县，是目前发现的世界最长的充水溶洞。洞长约5800米，已开放游览段约2800米。洞内四季恒温，保持在12摄氏度左右。地下暗河水质清澈，终年不竭。游客乘船游览，可观赏到形态各异的钟乳石景观，如银河两岸、宝鼎双塔、仙草等。本溪水洞是国家重点风景名胜区。",
          "大连金石滩位于大连市金州区，是国家5A级旅游度假区。因金色礁石遍布海岸线而得名，滩长约6公里。金石滩分为黄金海岸、东部地质公园、金石蜡像馆、金石园等景区。著名的'恐龙探海'、'贝多芬头像'等礁石景观惟妙惟肖。金石滩还是中国发现最古老的化石产地之一。",
          "鸭绿江断桥位于丹东市振兴区，始建于1909年。原名'鸭绿江铁桥'，是当时连接中朝两国的重要通道。1950年抗美援朝战争期间，美军飞机轰炸这座桥，朝方一侧被炸毁，中方一侧残留至今，成为历史的见证。断桥现为全国重点文物保护单位，桥上保留有弹孔痕迹。",
          "红海滩国家风景廊道位于盘锦市大洼区，总长度约20公里。这里是全球保存最完好、规模最大的湿地资源。红海滩的红色来自一种叫翅碱蓬的盐沼植物，5月呈玫红色，6月粉红，7月转为大红，10月变成紫红色。最佳观赏期为9月至10月。盘锦红海滩是中国最北海岸线的重要生态景观。",
          "笔架山位于锦州市太和区，是辽西走廊的著名景点。山体呈笔架状，故名。笔架山最奇特的是连接海岸与海岛之间的'天桥'，长约1620米，随着潮汐涨落时隐时现。潮水退去时，天桥露出海面，游人可步行至笔架山；潮水涨起时，天桥被淹没，需乘船登岛。",
          "医巫闾山位于锦州市北镇市，是国家5A级旅游景区。闾山主峰望海峰海拔866米，是古代北方镇山之一。景区内古建筑众多，有北镇庙、崇兴寺双塔、大观音阁等景点。闾山历史文化底蕴深厚，是舜封十二大名山之一，隋炀帝、唐太宗等都曾登临此山。历代文人墨客留下了大量诗词碑刻。"
        ]
      },
      {

          "吉林省因境内吉林城而得名，简称'吉'，省会长春市。全省面积18.74万平方公里，常住人口约2340万。吉林省地势东南高、西北低，东部为长白山区，中部为松嫩平原，西部为科尔沁草原。主要河流有松花江、图们江、鸭绿江等，水力资源丰富。",
          "吉林省属于温带大陆性季风气候，四季分明。春季干燥多风，夏季温暖多雨，秋季凉爽宜人，冬季漫长寒冷。全省年平均气温4摄氏度左右，最冷月1月平均气温零下18摄氏度，长白山地区可达零下30摄氏度以下。夏季是最佳旅游季节，气候凉爽宜人。",
          "吉林省是满族、朝鲜族、蒙古族等少数民族聚居地。满族是吉林省人口最多的少数民族，保留有丰富的传统文化；朝鲜族主要聚居在延边地区，是全国最大的朝鲜族聚居区，民族文化特色鲜明。延边朝鲜族自治州是中国唯一的朝鲜族自治州，被誉为'教育之乡'。",
          "吉林省是东北亚地区的几何中心，长（春）吉（林）图（们江）开发开放先导区是国家级战略规划。长春市是吉林省政治、经济、文化中心，也是中国重要的汽车工业基地，有'汽车城'之称。一汽集团是中国汽车工业的摇篮，红旗牌轿车是中国民族汽车工业的象征。",
          "吉林省是中国重要的商品粮基地，粮食产量连续多年位居全国前列。玉米、水稻、大豆是主要粮食作物。吉林省玉米产量居全国首位，'黄金玉米带'享誉世界。水稻主要分布在松花江流域，所产大米品质优良，'吉林大米'是国家地理标志产品。",
          "吉林省森林资源丰富，长白山区是中国重要的林区之一。林地面积约占全省总面积的50%，森林覆盖率达45%。长白山原始森林保存完好，是中国东北虎、东北豹等珍稀濒危物种的主要栖息地。长白山自然保护区是中国最早建立的自然保护区之一。",
          "吉林省拥有丰富的矿产资源，已发现矿产136种。油页岩储量居全国第一位，镍、钼等有色金属储量丰富。松辽盆地是重要的油气资源分布区，原油产量位居全国前列。矿泉水资源得天独厚，长白山地区矿泉水水质优良，储量巨大。",
          "吉林省交通便利，长春龙嘉国际机场开通了至国内外多个城市的航线。京哈铁路、哈大高铁纵贯南北，长珲城际铁路连接长春、吉林、珲春。公路网四通八达，沈哈高速、长吉高速等构成便捷的高速公路网络。"
        ]

      {
        "title": "特色美食",
        "items": [
          "朝鲜族冷面是吉林省传统美食，以延边地区最为正宗。冷面以荞麦面或土豆淀粉为主料，面条筋道有弹性。汤汁用牛肉或鸡肉熬制，酸甜适口，配以辣白菜、黄瓜丝、煮蛋、苹果片等辅料。朝鲜族冷面讲究'三成面、七成汤'，食用时加适量芥末，酸辣爽口，是消暑佳品。",
          "人参是吉林省特产，有'东北三宝'之首的美誉。长白山人参被誉为'百草之王'，含有人参皂苷等多种有效成分，具有大补元气、益智安神的功效。吉林长白山人参是国家地理标志产品，分为野山参、林下参、园参等类别，其中野山参最为珍贵，价格昂贵。",
          "鹿茸是吉林省著名特产，取自梅花鹿或马鹿的幼角。鹿茸含有丰富的氨基酸、磷脂、激素等营养成分，具有温肾壮阳、强筋健骨的功效。吉林省梅花鹿养殖历史悠久，产量占全国首位。双阳区是著名的'中国梅花鹿之乡'，所产鹿茸品质优良。",
          "满族火锅是东北地区传统美食，相传起源于清朝宫廷。传统的满族火锅采用铜制火锅，炭火加热，汤底用鸡汤或骨汤。食材丰富多样，包括猪肉、羊肉、牛肉、各种山珍菌菇等。食用时将食材放入沸腾的汤中涮煮，蘸以麻酱、腐乳、蒜泥等调料，香气扑鼻。",
          "吉林炖菜是东北菜的代表，体现了东北人豪爽的性格。代表菜品有小鸡炖蘑菇、猪肉炖粉条、排骨炖豆角等。炖菜讲究火候，大锅慢炖，使食材充分入味。'大丰收'是特色炖菜拼盘，将豆角、土豆、南瓜、玉米等多种食材一起炖煮，寓意五谷丰登。",
          "朝鲜族辣白菜是吉林省朝鲜族传统发酵食品，以白菜为主要原料。制作时将白菜用盐腌制后，涂抹由辣椒面、蒜泥、姜末、苹果梨泥等调制的酱料，发酵数日后即可食用。辣白菜酸辣爽口、开胃下饭，是朝鲜族餐桌上不可或缺的菜肴，也是许多朝鲜族美食的重要配料。",
          "打糕是朝鲜族传统糕点，在吉林延边地区极为流行。打糕以糯米为主料，蒸熟后反复捶打至粘稠细腻，切成块状。食用时裹以熟黄豆面和白糖，口感软糯筋道，香甜可口。打糕是朝鲜族节日必备食品，在婚嫁、寿诞等重要场合都有食用打糕的习俗。",
          "松花江鱼宴是吉林特色美食，利用松花湖和松花江的鲜鱼烹制。代表菜品有清蒸鳌花鱼、红烧鲤鱼、鱼头泡饼等。松花江水温凉，鱼类生长缓慢，肉质细嫩鲜美。'三花一岛'是松花江名鱼，指鳌花鱼、鳊花鱼、季花鱼和岛子鱼，尤以鳌花鱼最为珍贵。"
        ]

      {
        "title": "传统节日",
        "items": [
          "中国朝鲜族农乐舞是联合国教科文组织认定的世界非物质文化遗产，是朝鲜族传统节庆活动中不可或缺的表演艺术。农乐舞源于农业生产的丰收庆祝，舞者头戴'象帽'，舞动时长带飞扬，极具视觉冲击力。舞者还会进行'踩地神'等民俗表演，祈求来年丰收。",
          "朝鲜族秋夕节是朝鲜族最重要的传统节日之一，相当于汉族的中秋节。时间在农历八月十五日，节日期间举行祭祖、赏月、吃松饼等民俗活动。松饼是秋夕节特色食品，以糯米面包裹芝麻、糖等馅料制成，形状如半月，象征团圆。秋夕节还是朝鲜族青年男女相亲订婚的好日子。",
          "雾凇冰雪节是吉林市冬季品牌节庆活动，每年1月在雾凇最佳观赏期举办。节日期间除观赏雾凇外，还举办冰雪运动、冬捕体验、满族民俗展示等活动。吉林雾凇与桂林山水、云南石林、长江三峡并称'中国四大自然奇观'。雾凇景观通常出现在每年12月至次年2月。",
          "满族颁金节是满族传统节日，'颁金'意为满族命名。每年农历十月十三，满族同胞举行集会庆祝，纪念1635年皇太极宣布'满族'名称。节日期间举办满族文化展览、传统体育比赛、民族歌舞表演等活动。吉林省是满族重要聚居区，各地的满族同胞都会隆重庆祝这一节日。",
          "延边韦德娱乐城朝鲜族民俗节是延边地区的品牌节庆活动，集中展示朝鲜族传统文化。节日期间举办民族歌舞表演、传统体育竞技、民俗游戏体验、美食展销等活动。跳板和荡秋千是朝鲜族传统体育项目，在民俗节上经常表演。高跷、假面舞等也是常见的民俗表演。",
          "查干湖冬捕节每年12月在松原市查干湖举办，是吉林冬季旅游的重头戏。冬捕节期间举行传统的祭湖醒网仪式、马拉绞盘冰下走网表演、头鱼拍卖等活动。游客可以参与冰上娱乐项目、品尝全鱼宴。查干湖冬捕是国家级非物质文化遗产。",
          "端午节在吉林省也有浓厚的节日氛围。满族和朝鲜族都有端午节习俗，满族称为'五月节'，朝鲜族称为'当桑'。节日期间，满族人有采艾蒿、系五彩线、挂纸葫芦等习俗；朝鲜族则有祭祀祖先、荡秋千、摔跤等传统活动。长春净月潭等地会举办端午民俗文化活动。",
          "吉林省冰雪旅游节庆丰富，12月至次年2月是冰雪旅游旺季。长春冰雪新天地、吉林雾凇、长白山滑雪等都是冬季旅游热点。各地举办冰雪嘉年华、冰雪温泉节、雪地音乐节等特色活动。吉林省提出'冰天雪地也是金山银山'的发展理念，冰雪产业蓬勃发展。"

      {
        "title": "旅游攻略",
        "items": [
          "长白山旅游建议安排3至5天。建议从长春或延吉出发，乘高铁至长白山站或龙嘉机场。建议住在二道白河镇，设施完善。从北坡可乘坐倒站车登顶观赏天池，游览温泉群、小天池、绿渊潭等景点。南坡景观原始，但需徒步时间较长。7月至9月是最佳游览季节。",
          "吉林雾凇观赏攻略：最佳观赏地点为吉林市雾凇岛和丰满水电站下游。雾凇多出现在每天清晨，日出后逐渐消散。建议住在雾凇岛农家乐，清晨乘船上岛观赏。从吉林市前往雾凇岛约40公里，需提前关注天气预报，选择气温在零下20摄氏度左右、温差大的天气前往。",
          "延边地区旅游建议安排4至5天。首站延吉市，品尝朝鲜族美食、逛水上市场；然后前往珲春防川风景区，观赏一眼望三国的壮观景象；最后可前往图们口岸、汪清满天星风景区等。延边地区保留了完整的朝鲜族文化，民俗风情浓郁。9月至11月是最佳旅游季节。",
          "长春旅游建议安排2至3天。必游景点包括伪满皇宫博物院、长影世纪城、净月潭国家森林公园。第一天参观伪满皇宫和长影世纪城；第二天前往净月潭，骑行或徒步欣赏湖光山色。晚上可去桂林路美食街品尝各类小吃。冬季还可前往莲花山滑雪场体验滑雪。",
          "查干湖旅游建议安排1至2天。从长春或吉林市出发约3至4小时车程。冬季前往可观赏冬捕盛况，品尝全鱼宴；夏季可乘船游湖、欣赏湿地风光。景区周边有蒙古族民俗村，可体验骑马、射箭等民族活动。建议11月至次年2月前往。",
          "吉林省自驾游线路推荐：长春—吉林—桦甸—蛟河—长白山北坡路线。全程约500公里，沿途可游览伪满皇宫、松花湖、丰满水电站、蛟河红叶谷等景点。这条线路四季皆宜，秋季红叶最为壮观。建议用时4至5天。",
          "长白山北坡深度游攻略：除天池外，景区内还有温泉群、小天池、绿渊潭、地下森林等景点。建议早起进山，避开人流高峰。游览顺序为：天池—温泉群—小天池—绿渊潭—地下森林。温泉群可品尝温泉鸡蛋。小天池是《雪山飞狐》的取景地。",
          "吉林美食探店推荐：长春必吃有元盛居火锅、福义德烧鸡锅贴、回宝珍饺子；吉林市推荐新兴园饺子馆、福源馆糕点；延边推荐李先生牛肉面、服务大楼冷面。全州狗肉城、水豆腐村也是特色选择。建议避开旅游旺季前往，排队时间较短。"

        "title": "世界遗产与重要景区",
        "items": [
          "五大连池世界地质公园位于黑龙江省黑河市，由14座火山和5个汐水相连的湖泊群组成，是中国保存最完好的第四纪火山地质遗迹。2004年被评为世界地质公园，2013年入选世界遗产名录。公园内火山锥拔地而起，熔岩台地绵延不绝，火山堰塞湖星罗棋布，展现了完整的火山地质演化过程。游客可观赏到新期火山喷发形成的熔岩奇观，感受大自然的震撼力。",
          "哈尔滨冰雪大世界始创于1999年，是集冰雪艺术、冰雪文化、冰雪演艺、冰雪建筑于一体的超大型主题乐园。每年12月至次年2月开放，园区面积达60万平方米以上。园区内的冰雕作品全部采用松花江天然冰块精心雕琢，晶莹剔透、美轮美奂，曾创造过吉尼斯世界纪录。主冰雕《冰雪之冠》高达42米，体现了当今世界冰雕艺术的最高水平。",
          "太阳岛风景名胜区位于哈尔滨市松北区，是国家5A级旅游景区，也是国内规模最大的冰雪艺术展示区。景区总面积88平方公里，由太阳岛生态湿地、俄罗斯风情园、冰雪艺术馆等组成。夏季碧水环绕、绿树成荫，是避暑胜地；冬季则举办国际雪雕艺术博览会，千姿百态的雪雕作品令人叹为观止。太阳岛名称源于满语'太安'的谐音，寓意吉祥平安。",
          "镜泊湖世界地质公园位于牡丹江市宁安市，是中国最大、世界第二大高山堰塞湖。湖面海拔351米，平均水深40米，最深处达62米。景区以原始天然的风韵著称于世，集湖光山色、熔岩地貌、瀑布奇观于一体。著名的吊水楼瀑布宽40余米，落差12米，瀑布下的黑龙潭深不见底。镜泊湖还保留着唐代渤海国遗址。",
          "漠河北极村位于大兴安岭地区漠河市，是中国最北端的旅游景区，也是中国唯一能观赏到极昼极夜和北极光的地方。北极村依托独特的地理位置，打造了北字广场、最北哨所、神州北极石碑等特色景点。每年夏至前后，这里会出现极昼现象，吸引大量游客前来体验。漠河北极村已成为黑龙江省冰雪旅游的重要名片。",
          "东北虎林园位于哈尔滨市松北区，是世界上最大的东北虎繁育和科研基地。园区占地144万平方米，饲养东北虎400余只。游客可乘坐专用游览车近距离观赏东北虎的野生形态，感受'百兽之王'的威猛气势。园区还设有科普教育区，展示东北虎的保护成果和生存现状。",
          "亚布力滑雪旅游度假区位于尚志市亚布力镇，是中国最大的滑雪场，也是第24届北京冬奥会部分雪上项目举办地。度假区拥有17条各级别雪道，总长度达50公里以上，其中最长雪道达5公里。亚布力年降雪量近2米，积雪期超过170天，雪质松软优良。完善的配套设施使其成为国内外滑雪爱好者的首选目的地。",
          "雪乡旅游风景区位于牡丹江市大海林林业局双峰林场，因雪期长、雪质好、积雪厚度大而得名'中国雪乡'。这里年平均降雪量达2米以上，积雪厚度最深时超过2米。独特的地理位置和气候条件形成了'雪舌'、'雪蘑菇'等奇特雪景，宛如童话世界。《爸爸去哪儿》等热门综艺曾在此取景拍摄，使雪乡知名度大增。"

      {
        "title": "省份概况",
        "items": [
          "黑龙江省因境内最大河流黑龙江而得名，简称'黑'，省会哈尔滨市。全省面积47.3万平方公里，居全国第六位；常住人口约3100万。黑龙江省地貌特征为'五山一水一草三分田'，北部为大兴安岭和小兴安岭，东部分布着张广才岭、老爷岭、完达山，中部为松嫩平原，西部是草原和湿地。",
          "黑龙江省属于温带大陆性季风气候，四季分明。冬季漫长而寒冷，最冷月平均气温可达零下30摄氏度，是全国气温最低的省份；夏季短促凉爽，最热月平均气温20摄氏度左右，是著名的避暑胜地。这种独特的气候条件孕育了发达的冰雪产业和夏季生态旅游。",
          "黑龙江省是满族、朝鲜族、蒙古族、赫哲族等少数民族聚居地，其中赫哲族是黑龙江特有的少数民族。少数民族保留了丰富的传统文化，如赫哲族的鱼皮制作技艺、鄂伦春族的桦树皮工艺品等都已列入国家级非物质文化遗产。多元民族文化交融共生，形成了独特的地域文化景观。",
          "黑龙江省是中华文明的重要发祥地之一。约三万年前，这里就有人类活动。考古发现的昂昂溪遗址是东北地区新石器时代的代表，出土了大量细石器，表明此地是人类最早使用弓箭的地区之一。金代上京会宁府遗址见证了清朝发祥地的辉煌历史，阿城金源文化旅游区现为国家4A级景区。",
          "黑龙江省是中国重要的商品粮基地和绿色食品大省。拥有世界闻名的黑土地，土壤有机质含量高，适宜农作物生长。五常大米、响水大米等优质农产品享誉全国。全省绿色食品认证面积和实物产量均居全国首位，被誉为'中华大粮仓'和'绿色食品之乡'。",
          "黑龙江省林地面积广袤，森林覆盖率达47.3%，居全国第三位。大小兴安岭和长白山系构成了我国重要的天然林区，生长着红松、云杉、冷杉等珍贵用材树种，也是东北虎、棕熊、紫貂等珍稀动物的栖息地。伊春市因森林资源丰富被誉为'红松故乡'。",
          "黑龙江省与俄罗斯边境线长达2981公里，拥有25个对外开放口岸，是中国对俄贸易的重要窗口。哈尔滨作为中东铁路枢纽城市，深受俄罗斯文化影响，形成了独特的'东方莫斯科'风情。中央大街、果戈里大街等历史街区保留了大量俄式建筑，成为重要的旅游资源。",
          "黑龙江省矿产资源丰富，已发现各类矿产136种，其中石油、天然气、煤炭、金矿等储量大、品位高。大庆油田是中国第一大油田，为国家经济建设做出了重大贡献。石墨、硅藻土等非金属矿产储量居全国首位，伊春市被称为'石墨之都'。"

          "锅包肉是哈尔滨传统名菜，起源于清朝光绪年间哈尔滨道台府，由厨师郑兴文创制。选用猪里脊肉切片裹淀粉炸至金黄酥脆，再用糖醋汁急火烹制而成。成菜外皮酥脆、肉质嫩滑、酸甜适口，是东北菜的代表之作。老厨家作为锅包肉的创始店，至今仍保留着百年传统技艺。",
          "哈尔滨红肠是黑龙江省传统风味肉制品，起源于19世纪末俄式香肠制作工艺。选用优质猪肉加淀粉、大蒜等调料，经两次水煮、两次硬杂木熏烤而成。成品外皮枣红、皱纹均匀，入口蒜香浓郁、烟熏味足，是哈尔滨最具代表性的伴手礼。秋林里道斯、商委红肠是当地最著名的品牌。",

          "得莫利炖鱼起源于方正县得莫利村，是黑龙江省级非物质文化遗产。选用松花江活鱼配豆腐、宽粉条，用铁锅慢火炖制一个多小时而成。鱼肉鲜嫩、豆腐入味、粉条滑爽，汤汁浓郁鲜美。'得莫利'为俄语音译，意为渡口，反映了当地渔民的生活智慧。",
          "齐齐哈尔烤肉是黑龙江知名美食，以独特的炭火烤肉技艺著称。选用新鲜牛羊肉切成薄片，拌入洋葱、香菜等调料，在带篦子的铁锅上炙烤。蘸料分为干料和湿料两种，干料含花生、芝麻、孜然，湿料为酱油、醋、糖。烤肉香气四溢、肉质鲜嫩，是齐齐哈尔人待客的首选。",
          "赫哲族全鱼宴是黑龙江省级非物质文化遗产，体现了北方渔猎民族独特的饮食文化。用松花江、黑龙江的各种鲜鱼，通过蒸、煮、烤、刹等多种技法烹制，组成一桌丰盛的鱼宴。刹生鱼片薄如蝉翼，蘸醋盐辣酱食用；鱼刨花冻后刨成薄片，口感脆嫩。全鱼宴展示了赫哲族人与自然的和谐相处之道。",

          "马迭尔冰棍是哈尔滨百年冷饮品牌，由法籍犹太人约瑟夫·卡斯普于1906年创立。'马迭尔'意为摩登、时髦，品牌名称沿用至今。产品特点为甜而不腻、冰中带香，采用纯牛奶制作，不含任何添加剂。中央大街马迭尔冷饮厅是品尝正宗马迭尔冰棍的最佳去处。"

          "哈尔滨国际冰雪节创办于1985年，是中国最早以冰雪为主题的国际性节庆活动，与日本札幌雪节、加拿大魁北克冬季狂欢节并称世界三大冰雪节。每年1月5日开幕，历时约一个月。节日期间举办冰雪雕比赛、冰雪旅游、冰雪体育、冰雪经贸等系列活动，吸引数十个国家和地区参与。",
          "黑龙江五花山观赏节在每年秋季举办。黑龙江省秋季短暂而绚丽，大兴安岭、小兴安岭的张广才岭林区红松、云杉等针叶树与桦树、枫树等阔叶树交相辉映，五彩斑斓，美不胜收。各地举办五花山摄影大赛、森林徒步、采摘等特色活动，是黑龙江秋季旅游的重要品牌。",

          "鄂温克族瑟宾节是黑龙江鄂温克族的传统节日，'瑟宾'意为欢乐祥和。每年6月18日，各族群众身着节日盛装，聚集在草原上欢庆节日。节日活动包括祭祀山神、民族歌舞、传统体育竞技等。篝火晚会是瑟宾节的高潮，鄂温克人与宾客围着篝火载歌载舞，通宵达旦。",

          "哈尔滨冰雪旅游建议安排3至5天时间。第一天抵达后游览中央大街、圣索菲亚教堂、防洪纪念塔，感受俄式风情；第二天全天游览冰雪大世界，建议傍晚前往以便同时欣赏日景和夜景；第三天前往太阳岛雪雕博览会。12月至次年2月是最佳旅游季节，需注意保暖。",

          "漠河北极村旅游建议安排3至4天。可乘飞机至漠河古莲机场，或乘火车至漠河站。必游景点包括北极哨所、神州北极石碑、最北邮局等。夏至前后可体验极昼和极光。建议11月至次年2月前往，气氛更浓。",

function initPage() {
  const container = document.getElementById('provinceGrid');
  const regionTabs = document.querySelectorAll('.region-tab');
  const regionNames = {
    "华北": ["北京","天津","河北","山西","内蒙古"],
    "东北": ["辽宁","吉林","黑龙江"],
    "华东": ["上海","江苏","浙江","安徽","福建","江西","山东"],
    "华中": ["河南","湖北","湖南"],
    "华南": ["广东","广西","海南"],
    "西南": ["重庆","四川","贵州","云南","西藏"],
    "西北": ["陕西","甘肃","青海","宁夏","新疆"],
    "港澳台": ["香港","澳门","台湾"]
  };
  
  let allProvinces = [];
  Object.values(regionNames).forEach(arr => allProvinces = allProvinces.concat(arr));
  
  function renderGrid(filter) {
    container.innerHTML = '';
    const list = filter === '全部' ? allProvinces : (regionNames[filter] || allProvinces);
    list.forEach(name => {
      const data = provinceData[name];
      const card = document.createElement('div');
      card.className = 'province-card';
      const hasExtra = data && data.extra && data.extra.length > 0;
      const hasQ = data && data.questions && data.questions.length > 0;
      card.innerHTML = '<h3>' + name + '</h3><span>' + (hasExtra ? '✦ 详细考点' : '基础信息') + (hasQ ? ' · ' + data.questions.length + '题' : '') + '</span>';
      card.onclick = () => showDetail(name);
      container.appendChild(card);
    });
  }
  
  function showDetail(name) {
    const data = provinceData[name] || {};
    const detail = document.getElementById('provinceDetail');
    document.getElementById('provinceGrid').style.display = 'none';
    document.querySelector('.region-tabs').style.display = 'none';
    detail.classList.add('active');
    detail.innerHTML = '<div class="detail-header"><a class="back-btn" onclick="backToList()">← 返回列表</a><h2>' + name + '备考指南</h2><p>地方导游基础知识·' + name + '专区</p></div>';
    
    let tabs = '<div class="detail-tabs"><div class="detail-tab active" onclick="switchTab(this,'official')">📋 官方信息</div>';
    if (data.extra && data.extra.length) tabs += '<div class="detail-tab" onclick="switchTab(this,'extra')">📖 核心考点</div>';
    if (data.questions && data.questions.length) tabs += '<div class="detail-tab" onclick="switchTab(this,'quiz')">📝 练习题(' + data.questions.length + ')</div>';
    tabs += '</div>';
    
    let official = '<div class="detail-content active" id="tab-official"><div class="info-box"><h4>官方报考信息</h4><ul>';
    if (data.official) {
      official += '<li><a href="' + (data.official.site||'#') + '" target="_blank">官网：' + (data.official.site||'暂无') + '</a></li>';
      official += '<li>' + (data.official.notice||'暂无通知') + '</li>';
      official += '<li>' + (data.official.policy||'暂无政策') + '</li>';
    }
    official += '</ul></div></div>';
    
    let extra = '<div class="detail-content" id="tab-extra"><div class="content-grid">';
    if (data.extra) {
      data.extra.forEach(cat => {
        extra += '<div class="content-card"><h4><span>' + (cat.title||'').charAt(0) + '</span>' + (cat.title||'') + '</h4><ul>';
        if (cat.items) cat.items.forEach(item => extra += '<li>' + item + '</li>');
        extra += '</ul></div>';
      });
    }
    extra += '</div></div>';
    
    let quiz = '<div class="detail-content" id="tab-quiz">';
    if (data.questions) {
      data.questions.forEach((q, i) => {
        quiz += '<div class="question-card"><h4>第' + (i+1) + '题</h4><div class="question-text">' + q.q + '</div><ul class="question-options" data-answer="' + q.answer + '">';
        q.options.forEach((opt, j) => quiz += '<li onclick="checkAnswer(this,' + j + ',' + q.answer + ')">' + String.fromCharCode(65+j) + '. ' + opt + '</li>');
        quiz += '</ul><div class="explain-box">' + (q.explain || '暂无解析') + '</div></div>';
      });
    }
    quiz += '</div>';
    
    detail.innerHTML += tabs + official + extra + quiz;
  }
  
  window.backToList = function() {
    document.getElementById('provinceDetail').classList.remove('active');
    document.getElementById('provinceGrid').style.display = '';
    document.querySelector('.region-tabs').style.display = '';
  };
  
  window.switchTab = function(el, tab) {
    document.querySelectorAll('.detail-tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.detail-content').forEach(c => c.classList.remove('active'));
    el.classList.add('active');
    document.getElementById('tab-' + tab).classList.add('active');
  };
  
  window.checkAnswer = function(li, selected, correct) {
    const parent = li.parentElement;
    if (parent.dataset.answered) return;
    parent.dataset.answered = '1';
    const items = parent.querySelectorAll('li');
    items[correct].classList.add('correct');
    if (selected !== correct) li.classList.add('wrong');
    li.closest('.question-card').querySelector('.explain-box').classList.add('show');
  };
  
  regionTabs.forEach(tab => {
    tab.onclick = () => {
      regionTabs.forEach(t => t.classList.remove('active'));
      tab.classList.add('active');
      renderGrid(tab.textContent);
    };
  });
  
  renderGrid('全部');
}
initPage();
</script>
