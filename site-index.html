    /* Tab 样式 */
    .tab-btn {
      padding: 8px 16px;
      border-radius: 9999px;
      font-weight: 500;
      transition: all 0.2s;
    }
    
    .tab-btn.active {
      background: var(--primary);
      color: white;
    }
    
    .tab-btn:not(.active) {
      background: #f3f4f6;
      color: #6b7280;
    }
    
    .tab-btn:not(.active):hover {
      background: #e5e7eb;
    }

      align-items: center;

      border-radius: 9999px;

      tools: { color: '#F59E0B', label: '实用工具', icon: '🛠️' },

      user: { color: '#EC4899', label: '用户相关', icon: '👤' },
      about: { color: '#6B7280', label: '关于我们', icon: 'ℹ️' },
      admin: { color: '#EF4444', label: '管理后台', icon: '⚙️' }
    };
    
    // 更新页面计数
    document.getElementById('pageCount').textContent = `共 ${pagesData.length} 个页面`;
    
    // 获取所有字母
    const letters = [...new Set(pagesData.map(p => p.letter))].sort();
    
    // 生成字母导航
    function generateLetterNav() {
      const container = document.getElementById('letterNav');
      const allLetters = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ'.split('');
      
      container.innerHTML = allLetters.map(letter => {
        const hasPages = letters.includes(letter);
        return `
          <a href="#letter-${letter}" 
             class="letter-item ${hasPages ? '' : 'disabled'}"
             ${hasPages ? '' : 'aria-disabled="true"'}>
            ${letter}
          </a>
        `;
      }).join('');
    }
    
    // 按字母分组
    function groupByLetter() {
      const grouped = {};
      pagesData.forEach(page => {
        if (!grouped[page.letter]) {
          grouped[page.letter] = [];
        }
        grouped[page.letter].push(page);
      });
      return grouped;
    }
    
    // 渲染字母顺序视图
    function renderAlphabeticalView(filter = '') {
      const container = document.getElementById('alphabeticalList');
      const grouped = groupByLetter();
      let html = '';
      
      Object.keys(grouped).sort().forEach(letter => {
        const pages = grouped[letter].filter(p => 
          !filter || p.label.toLowerCase().includes(filter.toLowerCase()) || 
          p.url.toLowerCase().includes(filter.toLowerCase())
        );
        
        if (pages.length === 0 && filter) return;
        
        html += `
          <div id="letter-${letter}" class="letter-section">
            <div class="letter-section-title flex items-center gap-3">
              <span class="text-2xl font-bold text-brand-primary">${letter}</span>
              <span class="text-sm text-gray-500">${pages.length} 个页面</span>
            </div>
            <div class="grid md:grid-cols-2 lg:grid-cols-3 gap-3">
              ${pages.map(page => `
                <a href="${page.url}" class="index-card bg-white rounded-lg p-4 border border-gray-100 hover:border-brand-primary">
                  <div class="flex items-start justify-between gap-2">
                    <div class="flex-1 min-w-0">
                      <div class="font-medium text-gray-900 truncate">${page.label}</div>
                      <div class="text-xs text-gray-400 truncate mt-1">${page.url}</div>
                    </div>
                    <span class="category-badge flex-shrink-0" style="background-color: ${categoryConfig[page.category].color}20; color: ${categoryConfig[page.category].color}">
                      ${categoryConfig[page.category].label}
                    </span>
                  </div>
                </a>
              `).join('')}
            </div>
          </div>
        `;
      });
      
      container.innerHTML = html || '<div class="text-center text-gray-500 py-8">未找到匹配的页面</div>';
    }
    
    // 渲染分类视图
    function renderCategoryView(filter = '') {
      const container = document.getElementById('categoryList');
      const grouped = {};
      
      pagesData.forEach(page => {
        if (!grouped[page.category]) {
          grouped[page.category] = [];
        }
        grouped[page.category].push(page);
      });
      
      let html = '';
      Object.keys(categoryConfig).forEach(cat => {
        const config = categoryConfig[cat];
        const pages = grouped[cat] || [];
        const filteredPages = filter ? pages.filter(p => 
          p.label.toLowerCase().includes(filter.toLowerCase())
        ) : pages;
        
        if (filteredPages.length === 0 && filter) return;
        
        html += `
          <div class="bg-white rounded-xl shadow-sm overflow-hidden">
            <div class="p-4 border-b flex items-center gap-2" style="background-color: ${config.color}10">
              <span class="text-xl">${config.icon}</span>
              <span class="font-bold" style="color: ${config.color}">${config.label}</span>
              <span class="text-sm text-gray-500 ml-auto">${filteredPages.length} 个页面</span>
            </div>
            <div class="p-4 space-y-2 max-h-64 overflow-y-auto">
              ${filteredPages.map(page => `
                <a href="${page.url}" class="flex items-center justify-between p-2 rounded-lg hover:bg-gray-50 transition">
                  <span class="text-gray-700">${page.label}</span>
                  <i data-lucide="arrow-right" class="w-4 h-4 text-gray-400"></i>
                </a>
              `).join('')}
            </div>
          </div>
        `;
      });
      
      container.innerHTML = html;
      lucide.createIcons();
    }
    
    // 渲染层级视图
    function renderHierarchyView() {
      const container = document.getElementById('hierarchyList');
      
      const structure = [
        {
          icon: '🏠',
          label: '首页与入口',
          children: ['index.html', 'login.html', 'register.html']
        },
        {
          icon: '👨‍🏫',
          label: '导游服务',
          children: ['guides.html', 'guide-detail.html', 'guide-apply.html', 'guide-verification.html']
        },
        {
          icon: '🗺️',
          label: '路线规划',
          children: ['routes.html', 'route-detail.html', 'route-planner.html', 'route-booking.html']
        },
        {
          icon: '🌍',
          label: '目的地',
          children: ['destinations.html', 'destinations-map.html', 'destination-detail.html', 'beaches/', 'museums/']
        },
        {
          icon: '📋',
          label: '签证服务',
          children: ['visa.html', 'visa-assistant.html', 'visa-checklist.html']
        },
        {
          icon: '📚',
          label: '知识中心',
          children: ['knowledge.html', 'beginner-guide.html', 'safety-tips.html', 'faq.html']
        },
        {
          icon: '🛠️',
          label: '实用工具',
          children: ['tools.html', 'budget-calculator.html', 'currency-converter.html', 'weather.html', 'translator.html']
        },
        {
          icon: '👤',
          label: '用户中心',
          children: ['user-center.html', 'profile.html', 'my-orders.html', 'my-favorites.html', 'my-reviews.html']
        },
        {
          icon: '🚀',
          label: '成长激励',
          children: ['growth-center.html', 'achievements.html', 'points-mall.html', 'coupons.html', 'membership.html']
        },
        {
          icon: 'ℹ️',
          label: '关于我们',
          children: ['about.html', 'about-brand.html', 'our-story.html', 'partners.html', 'join.html']
        }
      ];
      
      container.innerHTML = `
        <div class="grid md:grid-cols-2 gap-6">
          ${structure.map(item => `
            <div class="border border-gray-200 rounded-xl p-4">
              <div class="flex items-center gap-2 mb-3">
                <span class="text-xl">${item.icon}</span>
                <span class="font-bold text-gray-900">${item.label}</span>
              </div>
              <div class="flex flex-wrap gap-2">
                ${item.children.map(url => {
                  const page = pagesData.find(p => p.url === url);
                  if (!page) {
                    return `<a href="${url}" class="px-3 py-1 bg-gray-100 rounded-full text-sm text-gray-600 hover:bg-gray-200">${url}</a>`;
                  }
                  return `
                    <a href="${page.url}" class="px-3 py-1 rounded-full text-sm text-white" style="background-color: ${categoryConfig[page.category].color}">
                      ${page.label}
                    </a>
                  `;
                }).join('')}
              </div>
            </div>
          `).join('')}
        </div>
      `;
    }
    
    // 搜索功能
    function searchPages(term) {
      const hintContainer = document.getElementById('searchHint');
      const resultsContainer = document.getElementById('searchResults');
      
      if (!term.trim()) {
        hintContainer.classList.add('hidden');
        return;
      }
      
      const results = pagesData.filter(page => 
        page.label.toLowerCase().includes(term.toLowerCase()) ||
        page.url.toLowerCase().includes(term.toLowerCase())
      );
      
      if (results.length === 0) {
        resultsContainer.innerHTML = `
          <div class="text-center text-gray-500 py-6">
            <p>未找到匹配 "${term}" 的页面</p>
          </div>
        `;
      } else {
        resultsContainer.innerHTML = results.map(page => `
          <a href="${page.url}" class="flex items-center justify-between p-3 bg-gray-50 rounded-lg hover:bg-gray-100 transition">
            <div>
              <div class="font-medium text-gray-900">${page.label}</div>
              <div class="text-xs text-gray-500">${page.url}</div>
            </div>
            <span class="category-badge" style="background-color: ${categoryConfig[page.category].color}20; color: ${categoryConfig[page.category].color}">
              ${categoryConfig[page.category].label}
            </span>
          </a>
        `).join('');
      }
      
      hintContainer.classList.remove('hidden');
    }
    
    // Tab 切换
    function switchTab(tabName) {
      document.querySelectorAll('.tab-btn').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.tab === tabName);
      });
      
      document.querySelectorAll('.tab-content').forEach(content => {
        content.classList.add('hidden');
      });
      
      document.getElementById(tabName + 'View').classList.remove('hidden');
      
      const searchTerm = document.getElementById('indexSearch').value;
      
      switch (tabName) {
        case 'alphabetical':
          renderAlphabeticalView(searchTerm);
          break;
        case 'category':
          renderCategoryView(searchTerm);
          break;
        case 'hierarchy':
          renderHierarchyView();
          break;
      }
    }
    
    // 事件绑定
    document.querySelectorAll('.tab-btn').forEach(btn => {
      btn.addEventListener('click', () => switchTab(btn.dataset.tab));
    });
    
    document.getElementById('indexSearch').addEventListener('input', (e) => {
      const activeTab = document.querySelector('.tab-btn.active').dataset.tab;
      searchPages(e.target.value);
      
      if (activeTab === 'alphabetical') {
        renderAlphabeticalView(e.target.value);
      } else if (activeTab === 'category') {
        renderCategoryView(e.target.value);
      }
    });
    
    document.getElementById('clearSearch')?.addEventListener('click', () => {
      document.getElementById('indexSearch').value = '';
      document.getElementById('searchHint').classList.add('hidden');
      switchTab('alphabetical');
    });
    
    // 滚动监听，更新字母导航状态
    window.addEventListener('scroll', () => {
      const sections = document.querySelectorAll('.letter-section');
      const navLetters = document.querySelectorAll('.letter-item');
      
      let current = '';
      sections.forEach(section => {
        const rect = section.getBoundingClientRect();
        if (rect.top <= 100) {
          current = section.id;
        }
      });
      
      navLetters.forEach(item => {
        const letter = item.getAttribute('href')?.replace('#letter-', '');
        item.classList.toggle('active', current === `letter-${letter}`);
      });
    });
    
    // 初始化
    generateLetterNav();
    renderAlphabeticalView();
  </script>
