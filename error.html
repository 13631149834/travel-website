<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <meta name="description" content="error - 游导旅游 - 游导旅游">
  <meta name="robots" content="noindex, nofollow">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🤔</text></svg>">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #636e72 0%, #2d3436 50%, #74b9ff 100%);
      background-size: 400% 400%;
      animation: gradientBG 15s ease infinite;
      position: relative;
      overflow: hidden;
    }

    @keyframes gradientBG {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    .bg-decoration {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      pointer-events: none;
      overflow: hidden;
    }

    .bg-decoration span {
      position: absolute;
      display: block;
      width: 20px;
      height: 20px;
      background: rgba(255,255,255,0.1);
      border-radius: 50%;
      animation: floatUp 25s linear infinite;
    }

    .bg-decoration span:nth-child(1) { left: 10%; animation-delay: 0s; }
    .bg-decoration span:nth-child(2) { left: 20%; animation-delay: 5s; }
    .bg-decoration span:nth-child(3) { left: 30%; animation-delay: 10s; }
    .bg-decoration span:nth-child(4) { left: 40%; animation-delay: 15s; }
    .bg-decoration span:nth-child(5) { left: 50%; animation-delay: 20s; }
    .bg-decoration span:nth-child(6) { left: 60%; animation-delay: 2s; }
    .bg-decoration span:nth-child(7) { left: 70%; animation-delay: 7s; }
    .bg-decoration span:nth-child(8) { left: 80%; animation-delay: 12s; }
    .bg-decoration span:nth-child(9) { left: 90%; animation-delay: 17s; }
    .bg-decoration span:nth-child(10) { left: 95%; animation-delay: 22s; }

    @keyframes floatUp {
      0% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
      10% { opacity: 1; }
      90% { opacity: 1; }
      100% { transform: translateY(-100vh) rotate(720deg); opacity: 0; }
    }

    .error-container {
      text-align: center;
      padding: 40px;
      max-width: 700px;
      position: relative;
      z-index: 1;
    }

    /* 疑惑表情动画 */
    .illustration-container {
      position: relative;
      width: 150px;
      height: 150px;
      margin: 0 auto 25px;
    }

    .thinking-icon {
      font-size: 100px;
      animation: wobble 2s ease-in-out infinite;
      filter: drop-shadow(0 10px 30px rgba(0,0,0,0.3));
    }

    @keyframes wobble {
      0%, 100% { transform: rotate(-5deg); }
      50% { transform: rotate(5deg); }
    }

    /* 思考气泡 */
    .thought-bubbles {
      position: absolute;
      top: -10px;
      right: -20px;
    }

    .bubble {
      position: absolute;
      font-size: 24px;
      animation: bubbleFloat 2s ease-in-out infinite;
    }

    .bubble:nth-child(1) { top: 0; right: 0; animation-delay: 0s; }
    .bubble:nth-child(2) { top: -15px; right: 30px; animation-delay: 0.4s; }
    .bubble:nth-child(3) { top: -30px; right: 15px; animation-delay: 0.8s; }

    @keyframes bubbleFloat {
      0%, 100% { transform: translateY(0) scale(1); opacity: 0.8; }
      50% { transform: translateY(-8px) scale(1.1); opacity: 1; }
    }

    h1 {
      font-size: 1.8rem;
      color: white;
      margin-bottom: 12px;
    }

    p {
      font-size: 1.05rem;
      color: rgba(255,255,255,0.9);
      margin-bottom: 25px;
      line-height: 1.7;
    }

    /* 错误类型卡片 */
    .error-cards {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
      margin-bottom: 25px;
    }

    .error-card {
      background: rgba(255,255,255,0.15);
      border-radius: 16px;
      padding: 18px 12px;
      text-decoration: none;
      transition: all 0.3s;
      border: 2px solid transparent;
    }

    .error-card:hover {
      background: rgba(255,255,255,0.25);
      transform: translateY(-5px);
      border-color: rgba(255,255,255,0.4);
    }

    .error-card .icon {
      font-size: 40px;
      margin-bottom: 8px;
    }

    .error-card .code {
      font-size: 1.3rem;
      font-weight: 700;
      color: white;
      margin-bottom: 4px;
    }

    .error-card .desc {
      font-size: 0.85rem;
      color: rgba(255,255,255,0.8);
    }

    /* 常见问题 */
    .faq-section {
      background: rgba(255,255,255,0.15);
      border-radius: 16px;
      padding: 20px;
      margin-bottom: 25px;
      text-align: left;
    }

    .faq-section h3 {
      color: white;
      font-size: 1rem;
      margin-bottom: 15px;
      display: flex;
      align-items: center;
      gap: 8px;
      justify-content: center;
    }

    .faq-list {
      display: grid;
      gap: 10px;
    }

    .faq-item {
      background: rgba(255,255,255,0.1);
      border-radius: 10px;
      padding: 12px 16px;
    }

    .faq-item .question {
      color: white;
      font-size: 0.95rem;
      margin-bottom: 6px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .faq-item .answer {
      color: rgba(255,255,255,0.75);
      font-size: 0.9rem;
      padding-left: 24px;
    }

    /* 按钮组 */
    .btn-group {
      display: flex;
      gap: 15px;
      justify-content: center;
      flex-wrap: wrap;
      margin-bottom: 25px;
    }

    .btn {
      padding: 14px 32px;
      border-radius: 50px;
      font-size: 1rem;
      font-weight: 600;
      text-decoration: none;
      transition: all 0.3s;
      cursor: pointer;
      border: none;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }

    .btn-primary {
      background: white;
      color: #636e72;
      box-shadow: 0 4px 15px rgba(0,0,0,0.2);
    }

    .btn-primary:hover {
      transform: translateY(-3px) scale(1.02);
      box-shadow: 0 10px 30px rgba(0,0,0,0.25);
    }

    .btn-outline {
      background: transparent;
      color: white;
      border: 2px solid rgba(255,255,255,0.7);
      backdrop-filter: blur(5px);
    }

    .btn-outline:hover {
      background: rgba(255,255,255,0.2);
      transform: translateY(-3px);
    }

    /* 联系方式 */
    .contact-section {
      padding: 20px;
      background: rgba(255,255,255,0.15);
      border-radius: 16px;
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.2);
    }

    .contact-section h3 {
      color: white;
      font-size: 1rem;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .contact-cards {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      justify-content: center;
    }

    .contact-card {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 18px;
      background: rgba(255,255,255,0.2);
      border-radius: 25px;
      color: white;
      text-decoration: none;
      font-size: 0.9rem;
      transition: all 0.3s;
    }

    .contact-card:hover {
      background: rgba(255,255,255,0.35);
      transform: translateY(-2px);
    }

    .deco-cloud {
      position: absolute;
      font-size: 40px;
      opacity: 0.3;
      animation: float 6s ease-in-out infinite;
    }

    .deco-cloud:nth-child(1) { top: 15%; left: 10%; animation-delay: 0s; }
    .deco-cloud:nth-child(2) { top: 20%; right: 15%; animation-delay: 2s; }
    .deco-cloud:nth-child(3) { bottom: 20%; left: 15%; animation-delay: 4s; }
    .deco-cloud:nth-child(4) { bottom: 25%; right: 10%; animation-delay: 1s; }

    @keyframes float {
      0%, 100% { transform: translateY(0) rotate(0deg); }
      50% { transform: translateY(-15px) rotate(5deg); }
    }

    @media (max-width: 600px) {
      .thinking-icon { font-size: 80px; }
      h1 { font-size: 1.5rem; }
      p { font-size: 1rem; }
      .btn { padding: 12px 24px; font-size: 0.95rem; }
      .error-cards { grid-template-columns: repeat(2, 1fr); }
      .deco-cloud { display: none; }
      .contact-cards { flex-direction: column; align-items: center; }
    }

    /* 无障碍样式 */
    .skip-link {
      position: absolute;
      top: -100px;
      left: 50%;
      transform: translateX(-50%);
      background: #636e72;
      color: #fff !important;
      padding: 12px 24px;
      border-radius: 0 0 8px 8px;
      z-index: 10000;
      font-weight: 600;
      transition: top 0.2s;
    }
    .skip-link:focus {
      top: 0;
      outline: 3px solid #74b9ff;
      outline-offset: 2px;
    }

    :focus {
      outline: 3px solid #636e72;
      outline-offset: 2px;
    }
    :focus:not(:focus-visible) {
      outline: none;
    }
    :focus-visible {
      outline: 3px solid #636e72;
      outline-offset: 2px;
    }

    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }
  </style>
