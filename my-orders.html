<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的订单 - 游导旅游 | 订单查询与管理</title>
  <meta name="description" content="查看和管理游导旅游订单记录，包括导游预约、线路订单、签证服务等，随时掌握订单状态。">
  <meta name="keywords" content="我的订单,订单查询,订单管理,导游订单,旅行订单">
  <meta name="robots" content="noindex, follow">
  <link rel="canonical" href="https://youdao-travel.com/my-orders.html">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .orders-page { max-width: 900px; margin: 0 auto; padding: 20px; }
        
        .orders-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 20px; padding: 30px; color: white;
            margin-bottom: 30px;
        }
        .orders-header h1 { font-size: 28px; margin-bottom: 10px; }
        
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
        .tab {
            padding: 10px 20px; background: #F3F4F6; border-radius: 20px;
            cursor: pointer; transition: all 0.3s; font-size: 14px;
        }
        .tab:hover, .tab.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        
        .order-card {
            background: white; border-radius: 15px; padding: 25px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.08);
            margin-bottom: 15px;
        }
        .order-header {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 15px; padding-bottom: 15px; border-bottom: 1px solid #F3F4F6;
        }
        .order-id { font-size: 14px; color: #999; }
        .order-status {
            padding: 4px 12px; border-radius: 20px; font-size: 12px;
        }
        .order-status.pending { background: #FEF3C7; color: #D97706; }
        .order-status.confirmed { background: #DBEAFE; color: #2563EB; }
        .order-status.completed { background: #D1FAE5; color: #059669; }
        .order-status.cancelled { background: #FEE2E2; color: #DC2626; }
        
        .order-content { display: flex; gap: 20px; }
        .order-avatar {
            width: 80px; height: 80px; border-radius: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex; align-items: center; justify-content: center;
            font-size: 36px; flex-shrink: 0;
        }
        .order-info { flex: 1; }
        .order-info h3 { font-size: 18px; color: #333; margin-bottom: 8px; }
        .order-info p { font-size: 14px; color: #666; margin-bottom: 5px; }
        .order-info .highlight { color: #667eea; font-weight: 500; }
        
        .order-footer {
            display: flex; justify-content: space-between; align-items: center;
            margin-top: 15px; padding-top: 15px; border-top: 1px solid #F3F4F6;
        }
        .order-price { font-size: 24px; font-weight: 700; color: #EF4444; }
        .order-actions { display: flex; gap: 10px; }
        .btn-action {
            padding: 10px 20px; border-radius: 8px; font-size: 14px;
            cursor: pointer; transition: all 0.3s; border: none;
        }
        .btn-action.primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .btn-action.secondary {
            background: #F3F4F6; color: #666;
        }
        .btn-action:hover { transform: scale(1.02); }
        
        .empty-state { text-align: center; padding: 60px; color: #666; }
        .empty-state .icon { font-size: 60px; margin-bottom: 15px; }
        
        @media (max-width: 768px) {
            .order-content { flex-direction: column; align-items: center; text-align: center; }
            .order-footer { flex-direction: column; gap: 15px; }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <a href="index.html" class="logo">🌍 游导旅游</a>
            <div class="nav-toggle" onclick="toggleNav()"><span></span><span></span><span></span></div>
            <div class="nav-links">
                <a href="index.html">首页</a>
                <a href="guides.html">🎤 找导游</a>
                <a href="routes.html">精品线路</a>
                <a href="guide-tools.html" style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: #fff;">🎒 导游工具</a>
                <a href="login.html" id="authLink" class="auth-nav-link">🔐 登录</a>
            </div>
        </div>
    </nav>
    
    <div class="orders-page">
        <div class="orders-header">
            <h1>📋 我的订单</h1>
            <p>管理您的所有预约记录</p>
        </div>
        
        <div class="tabs">
            <span class="tab active" data-status="all">全部订单</span>
            <span class="tab" data-status="pending">待确认</span>
            <span class="tab" data-status="confirmed">已确认</span>
            <span class="tab" data-status="completed">已完成</span>
            <span class="tab" data-status="cancelled">已取消</span>
        </div>
        
        <div id="ordersList"></div>
    </div>
    
    <script>
        // Utils 工具函数
        const Utils = {
            showToast: function(message, type = 'info') {
                const toast = document.createElement('div');
                toast.style.cssText = `
                    position: fixed;
                    top: 20px;
                    left: 50%;
                    transform: translateX(-50%);
                    padding: 12px 24px;
                    border-radius: 8px;
                    color: white;
                    font-size: 14px;
                    z-index: 9999;
                    animation: slideDown 0.3s ease;
                    background-color: ${type === 'success' ? '#10B981' : type === 'error' ? '#EF4444' : type === 'warning' ? '#F59E0B' : '#3B82F6'};
                `;
                toast.textContent = message;
                document.body.appendChild(toast);
                setTimeout(() => {
                    toast.style.animation = 'slideUp 0.3s ease forwards';
                    setTimeout(() => toast.remove(), 300);
                }, 3000);
            }
        };

        // Auth 模拟
        const Auth = {
            getUser: function() {
                const userStr = localStorage.getItem('user');
                return Promise.resolve(userStr ? JSON.parse(userStr) : null);
            }
        };

        const sampleOrders = [
            {
                id: 'YD20240413001',
                guideName: '张导 - 北京一日游',
                avatar: '👨‍💼',
                date: '2024年4月20日',
                people: 2,
                location: '天安门广场',
                price: '¥1,160',
                status: 'confirmed',
                statusText: '已确认'
            },
            {
                id: 'YD20240410002',
                guideName: '李姐 - 广州美食之旅',
                avatar: '👩‍💼',
                date: '2024年4月10日',
                people: 3,
                location: '广州塔',
                price: '¥1,440',
                status: 'completed',
                statusText: '已完成'
            },
            {
                id: 'YD20240408003',
                guideName: '王哥 - 成都户外探险',
                avatar: '🧔',
                date: '2024年4月25日',
                people: 4,
                location: '待确认',
                price: '¥2,720',
                status: 'pending',
                statusText: '待确认'
            }
        ];

        function init() {
            checkAuth();
            setupTabs();
            renderOrders('all');
        }

        async function checkAuth() {
            const user = await Auth.getUser();
            if (!user) {
                window.location.href = 'login.html?redirect=my-orders.html';
            }
        }

        function setupTabs() {
            document.querySelectorAll('.tab').forEach(tab => {
                tab.addEventListener('click', () => {
                    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                    tab.classList.add('active');
                    const status = tab.dataset.status;
                    renderOrders(status);
                });
            });
        }

        function renderOrders(status) {
            const ordersList = document.getElementById('ordersList');
            const filtered = status === 'all' ? sampleOrders : sampleOrders.filter(o => o.status === status);

            if (filtered.length === 0) {
                ordersList.innerHTML = `
                    <div class="empty-state">
                        <div class="icon">📋</div>
                        <p>暂无订单记录</p>
                    </div>
                `;
                return;
            }

            ordersList.innerHTML = filtered.map(order => `
                <div class="order-card">
                    <div class="order-header">
                        <span class="order-id">订单号：${order.id}</span>
                        <span class="order-status ${order.status}">${order.statusText}</span>
                    </div>
                    <div class="order-content">
                        <div class="order-avatar">${order.avatar}</div>
                        <div class="order-info">
                            <h3>${order.guideName}</h3>
                            <p>📅 出行日期：<span class="${order.status === 'pending' ? 'highlight' : ''}">${order.date}</span></p>
                            <p>👥 出游人数：${order.people}人</p>
                            <p>📍 集合地点：${order.location}</p>
                        </div>
                    </div>
                    <div class="order-footer">
                        <div class="order-price">${order.price}</div>
                        <div class="order-actions">
                            ${getOrderActions(order)}
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function getOrderActions(order) {
            if (order.status === 'pending') {
                return `
                    <button class="btn-action secondary" onclick="cancelOrder()">取消订单</button>
                    <button class="btn-action primary" onclick="contactGuide()">联系导游</button>
                `;
            } else if (order.status === 'confirmed') {
                return `
                    <button class="btn-action secondary" onclick="contactGuide()">💬 联系导游</button>
                    <button class="btn-action primary" onclick="viewDetail()">查看详情</button>
                `;
            } else if (order.status === 'completed') {
                return `
                    <button class="btn-action secondary" onclick="writeReview()">⭐ 写评价</button>
                    <button class="btn-action primary" onclick="rebook()">再次预约</button>
                `;
            }
            return '';
        }

        function contactGuide() {
            Utils.showToast('请联系微信：ximao101', 'info');
        }

        function viewDetail() {
            Utils.showToast('订单详情功能开发中', 'info');
        }

        function writeReview() {
            window.location.href = 'review-submit.html';
        }

        function rebook() {
            window.location.href = 'guides.html';
        }

        function cancelOrder() {
            if (confirm('确定要取消此订单吗？')) {
                Utils.showToast('订单已取消', 'success');
            }
        }
        
        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
