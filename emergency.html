<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>应急预案库 - 导游工具</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/guide/guide-tools.css">
</head>
<body>
  <!-- 导航栏 -->
  <nav class="navbar">
    <div class="container">
      <a href="index.html" class="logo">🌍 游导旅游</a>
      <div class="nav-toggle" onclick="toggleNav()">
        <span></span><span></span><span></span>
      </div>
      <div class="nav-links">
        <a href="index.html">首页</a>
        <a href="guide-tools.html">导游工具</a>
        <a href="knowledge-base.html">景点知识库</a>
        <a href="emergency.html" class="active">应急预案</a>
        <a href="route-planner.html">路线规划</a>
      </div>
    </div>
  </nav>

  <!-- 页面头部 -->
  <header class="tool-header" style="background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);">
    <div class="container">
      <h1>🆘 应急预案库</h1>
      <p>7大类突发情况 · 详细处理步骤 · 紧急联系方式</p>
    </div>
  </header>

  <!-- 主内容区 -->
  <section class="tool-container">
    <!-- 搜索栏 -->
    <div class="search-bar">
      <input type="text" class="search-input" id="searchInput" placeholder="搜索应急预案...">
      <select class="search-input" id="severityFilter" style="max-width: 180px;">
        <option value="">全部严重程度</option>
        <option value="high">🔴 紧急</option>
        <option value="medium">🟡 一般</option>
        <option value="low">🟢 轻微</option>
      </select>
    </div>

    <!-- 紧急电话速查 -->
    <div class="content-card" style="background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%); color: #fff; margin-bottom: 30px;">
      <h2 style="color: #fff;">
        📞 全国紧急电话速查
      </h2>
      <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 16px; margin-top: 16px;">
        <div style="text-align: center;">
          <div style="font-size: 2rem; margin-bottom: 8px;">🚔</div>
          <div style="font-weight: 600;">报警电话</div>
          <div style="font-size: 1.5rem; font-weight: 700;">110</div>
        </div>
        <div style="text-align: center;">
          <div style="font-size: 2rem; margin-bottom: 8px;">🚑</div>
          <div style="font-weight: 600;">急救电话</div>
          <div style="font-size: 1.5rem; font-weight: 700;">120</div>
        </div>
        <div style="text-align: center;">
          <div style="font-size: 2rem; margin-bottom: 8px;">🚒</div>
          <div style="font-weight: 600;">火灾电话</div>
          <div style="font-size: 1.5rem; font-weight: 700;">119</div>
        </div>
        <div style="text-align: center;">
          <div style="font-size: 2rem; margin-bottom: 8px;">🚗</div>
          <div style="font-weight: 600;">交通事故</div>
          <div style="font-size: 1.5rem; font-weight: 700;">122</div>
        </div>
        <div style="text-align: center;">
          <div style="font-size: 2rem; margin-bottom: 8px;">🌤️</div>
          <div style="font-weight: 600;">天气预报</div>
          <div style="font-size: 1.5rem; font-weight: 700;">12121</div>
        </div>
        <div style="text-align: center;">
          <div style="font-size: 2rem; margin-bottom: 8px;">🛣️</div>
          <div style="font-weight: 600;">高速路况</div>
          <div style="font-size: 1.5rem; font-weight: 700;">12122</div>
        </div>
        <div style="text-align: center;">
          <div style="font-size: 2rem; margin-bottom: 8px;">🏥</div>
          <div style="font-weight: 600;">卫生热线</div>
          <div style="font-size: 1.5rem; font-weight: 700;">12320</div>
        </div>
        <div style="text-align: center;">
          <div style="font-size: 2rem; margin-bottom: 8px;">🧳</div>
          <div style="font-weight: 600;">旅游投诉</div>
          <div style="font-size: 1.5rem; font-weight: 700;">12301</div>
        </div>
        <div style="text-align: center;">
          <div style="font-size: 2rem; margin-bottom: 8px;">👤</div>
          <div style="font-weight: 600;">领事保护</div>
          <div style="font-size: 1.5rem; font-weight: 700;">12308</div>
        </div>
        <div style="text-align: center;">
          <div style="font-size: 2rem; margin-bottom: 8px;">🛒</div>
          <div style="font-weight: 600;">消费者投诉</div>
          <div style="font-size: 1.5rem; font-weight: 700;">12315</div>
        </div>
      </div>
    </div>

    <!-- 应急预案列表 -->
    <div id="emergencyList" class="data-list">
      <!-- 动态渲染 -->
    </div>

    <!-- 空状态 -->
    <div class="empty-state" id="emptyState" style="display: none;">
      <div class="icon">🔍</div>
      <h3>没有找到匹配的应急预案</h3>
      <p>试试调整搜索条件</p>
    </div>
  </section>

  <!-- 详情模态框 -->
  <div class="modal" id="detailModal">
    <div class="modal-content" style="max-width: 700px;">
      <div class="modal-header">
        <h3 id="detailTitle">应急预案详情</h3>
        <button class="modal-close" onclick="closeDetailModal()">&times;</button>
      </div>
      <div class="modal-body" id="detailBody">
        <!-- 动态内容 -->
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="closeDetailModal()">关闭</button>
        <button class="btn btn-primary" onclick="copyPlan()">复制方案</button>
      </div>
    </div>
  </div>

  <!-- Toast提示 -->
  <div class="toast" id="toast"></div>

  <!-- 页脚 -->
  <footer class="footer">
    <div class="container">
      <div class="footer-bottom">
        <p>© 2024 游导Travel (youdao-travel.com) 版权所有</p>
      </div>
    </div>
  </footer>

  <script>
    // 全局变量
    let emergencies = [];
    let currentSearch = '';
    let currentSeverity = '';
    let currentDetailId = '';

    // 页面加载完成后获取数据
    document.addEventListener('DOMContentLoaded', async () => {
      await loadEmergencies();
      setupEventListeners();
      renderEmergencies();
    });

    // 加载应急预案数据
    async function loadEmergencies() {
      try {
        const response = await fetch('data/emergency.json');
        emergencies = await response.json();
      } catch (error) {
        console.error('加载应急预案数据失败:', error);
        emergencies = [];
      }
    }

    // 设置事件监听
    function setupEventListeners() {
      document.getElementById('searchInput').addEventListener('input', (e) => {
        currentSearch = e.target.value.toLowerCase();
        renderEmergencies();
      });

      document.getElementById('severityFilter').addEventListener('change', (e) => {
        currentSeverity = e.target.value;
        renderEmergencies();
      });
    }

    // 获取严重程度标签
    function getSeverityBadge(severity) {
      const badges = {
        high: '<span style="padding: 4px 10px; background: #fef2f2; color: #ef4444; border-radius: 12px; font-size: 0.8rem; font-weight: 600;">🔴 紧急</span>',
        medium: '<span style="padding: 4px 10px; background: #fffbeb; color: #f59e0b; border-radius: 12px; font-size: 0.8rem; font-weight: 600;">🟡 一般</span>',
        low: '<span style="padding: 4px 10px; background: #ecfdf5; color: #10b981; border-radius: 12px; font-size: 0.8rem; font-weight: 600;">🟢 轻微</span>'
      };
      return badges[severity] || '';
    }

    // 筛选应急预案
    function filterEmergencies() {
      return emergencies.filter(item => {
        const matchSearch = !currentSearch || 
          item.type.toLowerCase().includes(currentSearch) ||
          item.description.toLowerCase().includes(currentSearch);
        const matchSeverity = !currentSeverity || item.severity === currentSeverity;
        return matchSearch && matchSeverity;
      });
    }

    // 渲染应急预案列表
    function renderEmergencies() {
      const list = document.getElementById('emergencyList');
      const emptyState = document.getElementById('emptyState');
      const filtered = filterEmergencies();

      if (filtered.length === 0) {
        list.innerHTML = '';
        emptyState.style.display = 'block';
        return;
      }

      emptyState.style.display = 'none';
      list.innerHTML = filtered.map(item => `
        <div class="emergency-card ${item.severity}" onclick="showDetail('${item.id}')">
          <div class="emergency-card-header">
            <div class="icon">${item.icon}</div>
            <div style="flex: 1;">
              <h3>${item.type}</h3>
              <p>${item.description}</p>
            </div>
            ${getSeverityBadge(item.severity)}
            <span class="arrow">▼</span>
          </div>
        </div>
      `).join('');
    }

    // 显示详情
    function showDetail(id) {
      const item = emergencies.find(e => e.id === id);
      if (!item) return;

      currentDetailId = id;

      document.getElementById('detailTitle').textContent = `${item.icon} ${item.type}`;
      document.getElementById('detailBody').innerHTML = `
        <div style="margin-bottom: 20px;">
          ${getSeverityBadge(item.severity)}
          <p style="color: var(--gray-600); margin-top: 12px;">${item.description}</p>
        </div>

        <h4 style="font-size: 1.1rem; margin-bottom: 16px;">📋 处理步骤</h4>
        <div class="step-list">
          ${item.steps.map((step, index) => `
            <div class="step-item">
              <span class="step-number">${index + 1}</span>
              <span class="step-text">${step}</span>
            </div>
          `).join('')}
        </div>

        ${item.tips ? `
          <div class="tips-section" style="margin-top: 20px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);">
            <h4>💡 预防措施</h4>
            <p style="font-size: 0.9rem; line-height: 1.7;">${item.tips}</p>
          </div>
        ` : ''}

        <div class="contact-section">
          <h4>📞 紧急联系方式</h4>
          <div class="contact-badges">
            ${Object.entries(item.contacts).map(([key, value]) => `
              <div class="contact-badge">
                <span>${getContactLabel(key)}</span>
                <span class="phone">${value}</span>
              </div>
            `).join('')}
          </div>
        </div>
      `;

      document.getElementById('detailModal').classList.add('open');
    }

    // 获取联系方式标签
    function getContactLabel(key) {
      const labels = {
        police: '🚔 报警',
        emergency: '🚑 急救',
        ambulance: '🚑 救护车',
        traffic: '🚗 交通',
        weather: '🌤️ 天气',
        highway: '🛣️ 高速',
        health_hotline: '🏥 卫生热线',
        tourism_hotline: '🧳 旅游热线',
        tourism_bureau: '🏛️ 旅游局',
        insurance: '📋 保险公司',
        travel_insurance: '🧳 旅游保险',
        consular_protection: '👤 领事保护',
        consumer_protection: '🛒 消费者热线'
      };
      return labels[key] || key;
    }

    // 复制方案
    function copyPlan() {
      const item = emergencies.find(e => e.id === currentDetailId);
      if (!item) return;

      let text = `${item.icon} ${item.type}\n`;
      text += `严重程度: ${getSeverityText(item.severity)}\n\n`;
      text += `【处理步骤】\n`;
      item.steps.forEach((step, index) => {
        text += `${index + 1}. ${step}\n`;
      });
      if (item.tips) {
        text += `\n【预防措施】\n${item.tips}\n`;
      }
      text += `\n【紧急联系方式】\n`;
      Object.entries(item.contacts).forEach(([key, value]) => {
        text += `${getContactLabel(key)}: ${value}\n`;
      });

      navigator.clipboard.writeText(text).then(() => {
        showToast('预案已复制到剪贴板', 'success');
        closeDetailModal();
      });
    }

    // 获取严重程度文本
    function getSeverityText(severity) {
      const texts = {
        high: '紧急',
        medium: '一般',
        low: '轻微'
      };
      return texts[severity] || severity;
    }

    // 关闭详情模态框
    function closeDetailModal() {
      document.getElementById('detailModal').classList.remove('open');
    }

    // 显示Toast
    function showToast(message, type = '') {
      const toast = document.getElementById('toast');
      toast.textContent = message;
      toast.className = `toast ${type} show`;
      setTimeout(() => {
        toast.className = 'toast';
      }, 3000);
    }

    // 点击模态框外部关闭
    document.getElementById('detailModal').addEventListener('click', function(e) {
      if (e.target === this) {
        closeDetailModal();
      }
    });
  </script>
</body>
</html>
