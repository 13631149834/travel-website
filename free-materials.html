  <style>
    *,*::before,*::after { box-sizing: border-box; margin: 0; padding: 0; }

    body { font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif; line-height: 1.7; color: #666666; background: #FFFFFF; min-height: 100vh; padding-bottom: 70px; }
