  <title>旅行日历 - 游导旅游</title>
  <style>
    /* 日历页面专属样式 */
    .calendar-page {
      padding: 40px 0 80px;
    }
    
    .calendar-header {
      text-align: center;
      margin-bottom: 40px;
    }
    .calendar-header h1 {
      font-size: 1.75rem;
      font-weight: 600;
      color: var(--gray-900);
      margin-bottom: 8px;
    }
    .calendar-header p {
      color: var(--gray-500);
      font-size: 0.95rem;
    }
    
    /* 日历主体布局 */
    .calendar-layout {
      display: grid;
      grid-template-columns: 1fr 360px;
      gap: 32px;
      max-width: 1100px;
      margin: 0 auto;
      padding: 0 32px;
    }
    
    /* 日历容器 */
    .calendar-container {
      background: #fff;
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow);
      padding: 24px;
    }
    
    /* 月份导航 */
    .calendar-nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
    }
    .calendar-nav h2 {
      font-size: 1.25rem;
      font-weight: 600;
      color: var(--gray-900);
    }
    .nav-buttons {
      display: flex;
      gap: 8px;
    }
    .nav-btn {
      width: 36px;
      height: 36px;
      border: 1px solid var(--gray-200);
      background: #fff;
      border-radius: var(--radius);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: var(--transition);
    }
    .nav-btn:hover {
      background: var(--gray-100);
      border-color: var(--gray-300);
    }
    .nav-btn svg {
      width: 18px;
      height: 18px;
      color: var(--gray-600);
    }
    
    /* 星期标题 */
    .weekdays {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 4px;
      margin-bottom: 8px;
    }
    .weekday {
      text-align: center;
      padding: 12px 0;
      font-size: 0.85rem;
      font-weight: 500;
      color: var(--gray-500);
    }
    .weekday:first-child, .weekday:last-child {
      color: #E57373;
    }
    
    /* 日期网格 */
    .days-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 4px;
    }
    .day-cell {
      aspect-ratio: 1;
      min-height: 64px;
      border: 1px solid var(--gray-200);
      border-radius: var(--radius);
      padding: 8px;
      cursor: pointer;
      transition: var(--transition);
      position: relative;
      display: flex;
      flex-direction: column;
    }
    .day-cell:hover {
      border-color: var(--primary);
      background: var(--primary-light);
    }
    .day-cell.other-month {
      background: var(--gray-50);
      opacity: 0.4;
    }
    .day-cell.today {
      background: var(--primary-light);
      border-color: var(--primary);
    }
    .day-cell.selected {
      background: var(--primary);
      border-color: var(--primary);
    }
    .day-cell.selected .day-number {
      color: #fff;
    }
    .day-number {
      font-size: 0.95rem;
      font-weight: 500;
      color: var(--gray-800);
    }
    .day-cell.today .day-number {
      color: var(--primary);
      font-weight: 600;
    }
    
    /* 日期内的事件标记 */
    .day-events {
      margin-top: auto;
      display: flex;
      flex-wrap: wrap;
      gap: 2px;
    }
    .event-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--primary);
    }
    .event-dot.important {
      background: #E57373;
    }
    .event-dot.reminder {
      background: #FFB74D;
    }
    
    /* 事件详情预览 */
    .day-preview {
      font-size: 0.7rem;
      color: var(--gray-600);
      margin-top: 4px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .day-cell.selected .day-preview {
      color: rgba(255,255,255,0.8);
    }
    
    /* 侧边栏 */
    .sidebar {
      display: flex;
      flex-direction: column;
      gap: 24px;
    }
    
    /* 添加事件卡片 */
    .add-event-card {
      background: #fff;
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow);
      padding: 24px;
    }
    .add-event-card h3 {
      font-size: 1rem;
      font-weight: 600;
      color: var(--gray-900);
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .add-event-card h3 svg {
      width: 20px;
      height: 20px;
      color: var(--primary);
    }
    
    .form-group {
      margin-bottom: 16px;
    }
    .form-group label {
      display: block;
      font-size: 0.85rem;
      color: var(--gray-600);
      margin-bottom: 6px;
    }
    .form-group input,
    .form-group textarea,
    .form-group select {
      width: 100%;
      padding: 10px 14px;
      border: 1px solid var(--gray-300);
      border-radius: var(--radius);
      font-size: 0.9rem;
      transition: var(--transition);
    }
    .form-group input:focus,
    .form-group textarea:focus,
    .form-group select:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(79, 134, 247, 0.1);
    }
    .form-group textarea {
      min-height: 80px;
      resize: vertical;
    }
    
    /* 标签选项 */
    .tag-options {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    .tag-option {
      padding: 6px 12px;
      border: 1px solid var(--gray-300);
      border-radius: 20px;
      font-size: 0.8rem;
      cursor: pointer;
      transition: var(--transition);
    }
    .tag-option:hover {
      border-color: var(--primary);
    }
    .tag-option.active {
      background: var(--primary);
      border-color: var(--primary);
      color: #fff;
    }
    
    .btn-group {
      display: flex;
      gap: 8px;
      margin-top: 20px;
    }
    .btn {
      flex: 1;
      padding: 10px 16px;
      border: none;
      border-radius: var(--radius);
      font-size: 0.9rem;
      font-weight: 500;
      transition: var(--transition);
    }
    .btn-primary {
      background: var(--primary);
      color: #fff;
    }
    .btn-primary:hover {
      background: var(--primary-dark);
    }
    .btn-secondary {
      background: var(--gray-100);
      color: var(--gray-700);
    }
    .btn-secondary:hover {
      background: var(--gray-200);
    }
    
    /* 事件列表 */
    .events-card {
      background: #fff;
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow);
      padding: 24px;
      flex: 1;
    }
    .events-card h3 {
      font-size: 1rem;
      font-weight: 600;
      color: var(--gray-900);
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .events-card h3 svg {
      width: 20px;
      height: 20px;
      color: var(--secondary);
    }
    
    .events-list {
      max-height: 400px;
      overflow-y: auto;
    }
    .event-item {
      padding: 14px;
      background: var(--gray-50);
      border-radius: var(--radius);
      margin-bottom: 10px;
      position: relative;
      transition: var(--transition);
    }
    .event-item:hover {
      background: var(--gray-100);
    }
    .event-item-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 6px;
    }
    .event-date {
      font-size: 0.8rem;
      color: var(--primary);
      font-weight: 500;
    }
    .event-tags {
      display: flex;
      gap: 4px;
    }
    .event-tag {
      padding: 2px 8px;
      border-radius: 10px;
      font-size: 0.7rem;
    }
    .event-tag.important {
      background: #FFEBEE;
      color: #E57373;
    }
    .event-tag.reminder {
      background: #FFF3E0;
      color: #FF9800;
    }
    .event-tag.normal {
      background: var(--primary-light);
      color: var(--primary);
    }
    .event-title {
      font-size: 0.95rem;
      font-weight: 500;
      color: var(--gray-800);
      margin-bottom: 4px;
    }
    .event-desc {
      font-size: 0.8rem;
      color: var(--gray-500);
    }
    .event-delete {
      position: absolute;
      top: 10px;
      right: 10px;
      width: 24px;
      height: 24px;
      border: none;
      background: transparent;
      color: var(--gray-400);
      border-radius: 4px;
      cursor: pointer;
      opacity: 0;
      transition: var(--transition);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .event-item:hover .event-delete {
      opacity: 1;
    }
    .event-delete:hover {
      background: #FFEBEE;
      color: #E57373;
    }
    .event-delete svg {
      width: 16px;
      height: 16px;
    }
    
    .empty-state {
      text-align: center;
      padding: 40px 20px;
      color: var(--gray-400);
    }
    .empty-state svg {
      width: 48px;
      height: 48px;
      margin-bottom: 12px;
      opacity: 0.5;
    }
    .empty-state p {
      font-size: 0.9rem;
    }
    
    /* 响应式 */
    @media (max-width: 900px) {
      .calendar-layout {
        grid-template-columns: 1fr;
        padding: 0 16px;
      }
      .day-cell {
        min-height: 56px;
      }
    }
    @media (max-width: 480px) {
      .calendar-header h1 {
        font-size: 1.4rem;
      }
      .day-cell {
        min-height: 48px;
        padding: 4px;
      }
      .day-number {
        font-size: 0.85rem;
      }
      .day-preview {
        display: none;
      }
    }
  
/* 无障碍 - 焦点可见样式 (WCAG 2.1 AA) */
.skip-link {
  position: absolute;
  top: -100px;
  left: 50%;
  transform: translateX(-50%);
  background: var(--primary);
  color: #fff !important;
  padding: 12px 24px;
  border-radius: 0 0 8px 8px;
  z-index: 10000;
  font-weight: 600;
  transition: top 0.2s;
}
.skip-link:focus {
  top: 0;
  outline: 3px solid var(--primary-dark);
  outline-offset: 2px;
}

/* 全局焦点样式 */
:focus {
  outline: 3px solid var(--primary);
  outline-offset: 2px;
}
:focus:not(:focus-visible) {
  outline: none;
}
:focus-visible {
  outline: 3px solid var(--primary);
  outline-offset: 2px;
}

/* 链接焦点样式 */
a:focus,
button:focus,
[tabindex]:focus {
  outline: 3px solid var(--primary);
  outline-offset: 2px;
  border-radius: 2px;
}

/* 输入框焦点 */
input:focus,
textarea:focus,
select:focus {
  outline: 3px solid var(--primary);
  outline-offset: 0;
  border-color: var(--primary);
}

</style>

  <script>
    // 日历状态
    let currentDate = new Date();
    let selectedDate = null;
    let events = [];
    
    // 月份名称
    const monthNames = ['1月', '2月', '3月', '4月', '5月', '6月', '7月', '8月', '9月', '10月', '11月', '12月'];
    
    // 从 localStorage 加载事件
    function loadEvents() {
      const saved = localStorage.getItem('travelEvents');
      if (saved) {
        events = JSON.parse(saved);
      }
    }
    
    // 保存事件到 localStorage
    function saveEvents() {
      localStorage.setItem('travelEvents', JSON.stringify(events));
    }
    
    // 渲染日历
    function renderCalendar() {
      const year = currentDate.getFullYear();
      const month = currentDate.getMonth();
      
      document.getElementById('currentMonth').textContent = `${year}年 ${monthNames[month]}`;
      
      const firstDay = new Date(year, month, 1);
      const lastDay = new Date(year, month + 1, 0);
      const startDay = firstDay.getDay();
      const totalDays = lastDay.getDate();
      
      const today = new Date();
      const isCurrentMonth = today.getFullYear() === year && today.getMonth() === month;
      
      let html = '';
      
      // 上个月的天数
      const prevMonth = new Date(year, month, 0);
      for (let i = startDay - 1; i >= 0; i--) {
        html += `<div class="day-cell other-month"><span class="day-number">${prevMonth.getDate() - i}</span></div>`;
      }
      
      // 当月的天数
      for (let day = 1; day <= totalDays; day++) {
        const dateStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
        const dayEvents = events.filter(e => e.date === dateStr);
        const isToday = isCurrentMonth && day === today.getDate();
        const isSelected = selectedDate === dateStr;
        
        let classes = 'day-cell';
        if (isToday) classes += ' today';
        if (isSelected) classes += ' selected';
        
        let dotsHtml = dayEvents.map(e => `<span class="event-dot ${e.tag}"></span>`).join('');
        let previewHtml = '';
        if (dayEvents.length > 0) {
          previewHtml = `<div class="day-preview">${dayEvents[0].title}</div>`;
        }
        
        html += `
          <div class="${classes}" data-date="${dateStr}">
            <span class="day-number">${day}</span>
            <div class="day-events">${dotsHtml}</div>
            ${previewHtml}
          </div>
        `;
      }
      
      // 下个月的天数
      const remaining = 42 - (startDay + totalDays);
      for (let i = 1; i <= remaining; i++) {
        html += `<div class="day-cell other-month"><span class="day-number">${i}</span></div>`;
      }
      
      document.getElementById('daysGrid').innerHTML = html;
      
      // 绑定日期点击
      document.querySelectorAll('.day-cell:not(.other-month)').forEach(cell => {
        cell.addEventListener('click', () => {
          selectedDate = cell.dataset.date;
          document.getElementById('eventDate').value = selectedDate;
          document.querySelectorAll('.day-cell').forEach(c => c.classList.remove('selected'));
          cell.classList.add('selected');
        });
      });
    }
    
    // 渲染事件列表
    function renderEvents() {
      const container = document.getElementById('eventsList');
      
      if (events.length === 0) {
        container.innerHTML = `
          <div class="empty-state">
            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg>
            <p>暂无行程安排</p>
          </div>
        `;
        return;
      }
      
      // 按日期排序
      const sorted = [...events].sort((a, b) => new Date(a.date) - new Date(b.date));
      
      container.innerHTML = sorted.map((event, index) => `
        <div class="event-item">
          <div class="event-item-header">
            <span class="event-date">${formatDate(event.date)}</span>
            <div class="event-tags">
              <span class="event-tag ${event.tag}">${getTagName(event.tag)}</span>
            </div>
          </div>
          <div class="event-title">${event.title}</div>
          ${event.desc ? `<div class="event-desc">${event.desc}</div>` : ''}
          <button class="event-delete" onclick="deleteEvent(${index})" title="删除">
            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg>
          </button>
        </div>
      `).join('');
    }
    
    // 格式化日期
    function formatDate(dateStr) {
      const d = new Date(dateStr);
      return `${d.getMonth() + 1}月${d.getDate()}日 ${weekdays[d.getDay()]}`;
    }
    
    const weekdays = ['周日', '周一', '周二', '周三', '周四', '周五', '周六'];
    
    // 获取标签名称
    function getTagName(tag) {
      const names = { normal: '常规', important: '重要', reminder: '提醒' };
      return names[tag] || '常规';
    }
    
    // 删除事件
    function deleteEvent(index) {
      events.splice(index, 1);
      saveEvents();
      renderCalendar();
      renderEvents();
    }
    
    // 添加事件
    document.getElementById('eventForm').addEventListener('submit', (e) => {
      e.preventDefault();
      
      const date = document.getElementById('eventDate').value;
      const title = document.getElementById('eventTitle').value.trim();
      const desc = document.getElementById('eventDesc').value.trim();
      const tag = document.querySelector('.tag-option.active').dataset.tag;
      
      if (!date || !title) return;
      
      events.push({ date, title, desc, tag });
      saveEvents();
      
      renderCalendar();
      renderEvents();
      
      // 重置表单
      e.target.reset();
      document.querySelector('.tag-option').click();
      
      // 提示
      alert('行程添加成功！');
    });
    
    // 标签选择
    document.querySelectorAll('.tag-option').forEach(tag => {
      tag.addEventListener('click', () => {
        document.querySelectorAll('.tag-option').forEach(t => t.classList.remove('active'));
        tag.classList.add('active');
      });
    });
    
    // 月份导航
    document.getElementById('prevMonth').addEventListener('click', () => {
      currentDate.setMonth(currentDate.getMonth() - 1);
      renderCalendar();
    });
    
    document.getElementById('nextMonth').addEventListener('click', () => {
      currentDate.setMonth(currentDate.getMonth() + 1);
      renderCalendar();
    });
    
    // 初始化
    loadEvents();
    renderCalendar();
    renderEvents();
    
    // 设置默认日期为今天
    const today = new Date();
    const todayStr = `${today.getFullYear()}-${String(today.getMonth() + 1).padStart(2, '0')}-${String(today.getDate()).padStart(2, '0')}`;
    document.getElementById('eventDate').value = todayStr;
  </script>
  <script src="js/mobile.js" defer></script>
  <script src="js/customer-service.js" defer></script>
</body>
</html>
