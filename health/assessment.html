<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>健康评估 - 旅行健康管家</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#10b981',
            secondary: '#059669',
            accent: '#34d399',
            medical: '#0ea5e9',
            medicalDark: '#0284c7',
          }
        }
      }
    }
  </script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;600;700&display=swap');
    body { font-family: 'Noto Sans SC', sans-serif; }
    .gradient-health { background: linear-gradient(135deg, #10b981 0%, #059669 50%, #0ea5e9 100%); }
    .card-hover { transition: all 0.3s ease; }
    .card-hover:hover { transform: translateY(-4px); box-shadow: 0 12px 24px rgba(0,0,0,0.1); }
    .step-indicator { transition: all 0.3s ease; }
    .step-indicator.active { background: #10b981; color: white; }
    .step-indicator.completed { background: #059669; color: white; }
    .option-card { transition: all 0.2s ease; }
    .option-card:hover { border-color: #10b981; background: #ecfdf5; }
    .option-card.selected { border-color: #10b981; background: #d1fae5; }
    .fade-in { animation: fadeIn 0.4s ease; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body class="bg-gradient-to-br from-green-50 to-blue-50 min-h-screen">
  <!-- Navigation -->
  <nav class="gradient-health text-white sticky top-0 z-50 shadow-lg">
    <div class="max-w-7xl mx-auto px-4 py-4">
      <div class="flex items-center justify-between">
        <a href="index.html" class="flex items-center gap-2 hover:opacity-90 transition">
          <span class="text-3xl">🧭</span>
          <span class="text-2xl font-bold">游导旅游</span>
        </a>
        <div class="hidden md:flex items-center gap-8">
          <a href="index.html" class="hover:opacity-80 transition">🏥 健康管家</a>
          <a href="assessment.html" class="font-semibold border-b-2 border-white pb-1">📋 健康评估</a>
          <a href="vaccines.html" class="hover:opacity-80 transition">💉 疫苗指南</a>
          <a href="medicine-kit.html" class="hover:opacity-80 transition">💊 旅行药箱</a>
        </div>
        <button class="md:hidden text-2xl" onclick="toggleMenu()">☰</button>
      </div>
      <div id="mobileMenu" class="hidden md:hidden mt-4 pb-2 space-y-3">
        <a href="index.html" class="block py-2">🏥 健康管家</a>
        <a href="assessment.html" class="block py-2 font-semibold">📋 健康评估</a>
        <a href="vaccines.html" class="block py-2">💉 疫苗指南</a>
        <a href="medicine-kit.html" class="block py-2">💊 旅行药箱</a>
      </div>
    </div>
  </nav>

  <!-- Page Header -->
  <section class="bg-white shadow-sm">
    <div class="max-w-4xl mx-auto px-4 py-6">
      <div class="flex items-center gap-2 text-sm text-gray-500 mb-4">
        <a href="index.html" class="hover:text-primary">健康管家</a>
        <span>›</span>
        <span class="text-gray-700">健康评估</span>
      </div>
      <h1 class="text-3xl font-bold text-gray-800 flex items-center gap-3">
        <span class="text-4xl">📋</span> 旅行前健康评估
      </h1>
      <p class="text-gray-600 mt-2">完成问卷，获取个性化的旅行健康建议</p>
    </div>
  </section>

  <!-- Progress Bar -->
  <div class="bg-white border-b">
    <div class="max-w-4xl mx-auto px-4 py-4">
      <div class="flex items-center justify-between mb-2">
        <span class="text-sm text-gray-600">评估进度</span>
        <span id="progressText" class="text-sm font-medium text-primary">第 1 步 / 共 5 步</span>
      </div>
      <div class="flex gap-2">
        <div class="step-indicator active flex-1 text-center py-2 rounded-lg font-medium" data-step="1">1</div>
        <div class="step-indicator flex-1 text-center py-2 rounded-lg font-medium bg-gray-200 text-gray-600" data-step="2">2</div>
        <div class="step-indicator flex-1 text-center py-2 rounded-lg font-medium bg-gray-200 text-gray-600" data-step="3">3</div>
        <div class="step-indicator flex-1 text-center py-2 rounded-lg font-medium bg-gray-200 text-gray-600" data-step="4">4</div>
        <div class="step-indicator flex-1 text-center py-2 rounded-lg font-medium bg-gray-200 text-gray-600" data-step="5">5</div>
      </div>
    </div>
  </div>

  <!-- Assessment Form -->
  <div class="max-w-4xl mx-auto px-4 py-8">
    <div id="assessmentForm" class="bg-white rounded-2xl shadow-lg p-6 md:p-8">
      <!-- Step 1: Basic Info -->
      <div id="step1" class="step-content fade-in">
        <h2 class="text-xl font-bold text-gray-800 mb-6 flex items-center gap-2">
          <span class="w-8 h-8 bg-primary text-white rounded-full flex items-center justify-center text-sm">1</span>
          基本信息
        </h2>
        <div class="space-y-6">
          <div>
            <label class="block text-gray-700 font-medium mb-2">您的年龄范围</label>
            <div class="grid grid-cols-2 md:grid-cols-4 gap-3">
              <button onclick="selectOption(this, 'age', '18-30')" class="option-card p-4 border-2 border-gray-200 rounded-xl text-center hover:border-primary">
                <div class="text-2xl mb-1">👶</div>
                <div class="text-sm font-medium">18-30岁</div>
              </button>
              <button onclick="selectOption(this, 'age', '31-45')" class="option-card p-4 border-2 border-gray-200 rounded-xl text-center hover:border-primary">
                <div class="text-2xl mb-1">🧑</div>
                <div class="text-sm font-medium">31-45岁</div>
              </button>
              <button onclick="selectOption(this, 'age', '46-60')" class="option-card p-4 border-2 border-gray-200 rounded-xl text-center hover:border-primary">
                <div class="text-2xl mb-1">👨</div>
                <div class="text-sm font-medium">46-60岁</div>
              </button>
              <button onclick="selectOption(this, 'age', '60+')" class="option-card p-4 border-2 border-gray-200 rounded-xl text-center hover:border-primary">
                <div class="text-2xl mb-1">👴</div>
                <div class="text-sm font-medium">60岁以上</div>
              </button>
            </div>
          </div>
          <div>
            <label class="block text-gray-700 font-medium mb-2">您的性别</label>
            <div class="grid grid-cols-2 gap-3">
              <button onclick="selectOption(this, 'gender', 'male')" class="option-card p-4 border-2 border-gray-200 rounded-xl text-center hover:border-primary">
                <div class="text-2xl mb-1">👨</div>
                <div class="text-sm font-medium">男性</div>
              </button>
              <button onclick="selectOption(this, 'gender', 'female')" class="option-card p-4 border-2 border-gray-200 rounded-xl text-center hover:border-primary">
                <div class="text-2xl mb-1">👩</div>
                <div class="text-sm font-medium">女性</div>
              </button>
            </div>
          </div>
          <div>
            <label class="block text-gray-700 font-medium mb-2">是否怀孕（仅女性填写）</label>
            <div class="grid grid-cols-2 gap-3">
              <button onclick="selectOption(this, 'pregnant', 'no')" class="option-card p-4 border-2 border-gray-200 rounded-xl text-center hover:border-primary">
                <div class="text-2xl mb-1">✕</div>
                <div class="text-sm font-medium">否</div>
              </button>
              <button onclick="selectOption(this, 'pregnant', 'yes')" class="option-card p-4 border-2 border-gray-200 rounded-xl text-center hover:border-primary">
                <div class="text-2xl mb-1">✓</div>
                <div class="text-sm font-medium">是</div>
              </button>
            </div>
          </div>
        </div>
      </div>

      <!-- Step 2: Health Status -->
      <div id="step2" class="step-content hidden fade-in">
        <h2 class="text-xl font-bold text-gray-800 mb-6 flex items-center gap-2">
          <span class="w-8 h-8 bg-primary text-white rounded-full flex items-center justify-center text-sm">2</span>
          健康状况
        </h2>
        <div class="space-y-6">
          <div>
            <label class="block text-gray-700 font-medium mb-2">您是否患有慢性疾病？</label>
            <div class="space-y-2">
              <label class="flex items-center gap-3 p-3 border border-gray-200 rounded-xl hover:bg-gray-50 cursor-pointer">
                <input type="checkbox" name="chronic" value="none" class="w-5 h-5 text-primary rounded" onchange="handleChronicChange(this)">
                <span>无慢性疾病</span>
              </label>
              <label class="flex items-center gap-3 p-3 border border-gray-200 rounded-xl hover:bg-gray-50 cursor-pointer">
                <input type="checkbox" name="chronic" value="heart" class="w-5 h-5 text-primary rounded">
                <span>心血管疾病（高血压、冠心病等）</span>
              </label>
              <label class="flex items-center gap-3 p-3 border border-gray-200 rounded-xl hover:bg-gray-50 cursor-pointer">
                <input type="checkbox" name="chronic" value="diabetes" class="w-5 h-5 text-primary rounded">
                <span>糖尿病</span>
              </label>
              <label class="flex items-center gap-3 p-3 border border-gray-200 rounded-xl hover:bg-gray-50 cursor-pointer">
                <input type="checkbox" name="chronic" value="respiratory" class="w-5 h-5 text-primary rounded">
                <span>呼吸系统疾病（哮喘、慢性支气管炎等）</span>
              </label>
              <label class="flex items-center gap-3 p-3 border border-gray-200 rounded-xl hover:bg-gray-50 cursor-pointer">
                <input type="checkbox" name="chronic" value="other" class="w-5 h-5 text-primary rounded">
                <span>其他慢性疾病</span>
              </label>
            </div>
          </div>
          <div>
            <label class="block text-gray-700 font-medium mb-2">您是否有过敏史？</label>
            <div class="space-y-2">
              <label class="flex items-center gap-3 p-3 border border-gray-200 rounded-xl hover:bg-gray-50 cursor-pointer">
                <input type="checkbox" name="allergy" value="none" class="w-5 h-5 text-primary rounded" onchange="handleAllergyChange(this)">
                <span>无过敏史</span>
              </label>
              <label class="flex items-center gap-3 p-3 border border-gray-200 rounded-xl hover:bg-gray-50 cursor-pointer">
                <input type="checkbox" name="allergy" value="food" class="w-5 h-5 text-primary rounded">
                <span>食物过敏（请在健康记录中详细记录）</span>
              </label>
              <label class="flex items-center gap-3 p-3 border border-gray-200 rounded-xl hover:bg-gray-50 cursor-pointer">
                <input type="checkbox" name="allergy" value="drug" class="w-5 h-5 text-primary rounded">
                <span>药物过敏</span>
              </label>
              <label class="flex items-center gap-3 p-3 border border-gray-200 rounded-xl hover:bg-gray-50 cursor-pointer">
                <input type="checkbox" name="allergy" value="other" class="w-5 h-5 text-primary rounded">
                <span>其他过敏</span>
              </label>
            </div>
          </div>
          <div>
            <label class="block text-gray-700 font-medium mb-2">您目前是否正在服用药物？</label>
            <div class="grid grid-cols-2 gap-3">
              <button onclick="selectOption(this, 'medication', 'no')" class="option-card p-4 border-2 border-gray-200 rounded-xl text-center hover:border-primary">
                <div class="text-2xl mb-1">✕</div>
                <div class="text-sm font-medium">否</div>
              </button>
              <button onclick="selectOption(this, 'medication', 'yes')" class="option-card p-4 border-2 border-gray-200 rounded-xl text-center hover:border-primary">
                <div class="text-2xl mb-1">✓</div>
                <div class="text-sm font-medium">是</div>
              </button>
            </div>
          </div>
        </div>
      </div>

      <!-- Step 3: Trip Info -->
      <div id="step3" class="step-content hidden fade-in">
        <h2 class="text-xl font-bold text-gray-800 mb-6 flex items-center gap-2">
          <span class="w-8 h-8 bg-primary text-white rounded-full flex items-center justify-center text-sm">3</span>
          旅行计划
        </h2>
        <div class="space-y-6">
          <div>
            <label class="block text-gray-700 font-medium mb-2">目的地类型</label>
            <div class="grid grid-cols-2 md:grid-cols-3 gap-3">
              <button onclick="selectOption(this, 'destination', 'city')" class="option-card p-4 border-2 border-gray-200 rounded-xl text-center hover:border-primary">
                <div class="text-2xl mb-1">🏙️</div>
                <div class="text-sm font-medium">城市观光</div>
              </button>
              <button onclick="selectOption(this, 'destination', 'beach')" class="option-card p-4 border-2 border-gray-200 rounded-xl text-center hover:border-primary">
                <div class="text-2xl mb-1">🏖️</div>
                <div class="text-sm font-medium">海岛度假</div>
              </button>
              <button onclick="selectOption(this, 'destination', 'mountain')" class="option-card p-4 border-2 border-gray-200 rounded-xl text-center hover:border-primary">
                <div class="text-2xl mb-1">🏔️</div>
                <div class="text-sm font-medium">高山徒步</div>
              </button>
              <button onclick="selectOption(this, 'destination', 'jungle')" class="option-card p-4 border-2 border-gray-200 rounded-xl text-center hover:border-primary">
                <div class="text-2xl mb-1">🌴</div>
                <div class="text-sm font-medium">热带雨林</div>
              </button>
              <button onclick="selectOption(this, 'destination', 'desert')" class="option-card p-4 border-2 border-gray-200 rounded-xl text-center hover:border-primary">
                <div class="text-2xl mb-1">🏜️</div>
                <div class="text-sm font-medium">沙漠探险</div>
              </button>
              <button onclick="selectOption(this, 'destination', 'cold')" class="option-card p-4 border-2 border-gray-200 rounded-xl text-center hover:border-primary">
                <div class="text-2xl mb-1">❄️</div>
                <div class="text-sm font-medium">寒冷地区</div>
              </button>
            </div>
          </div>
          <div>
            <label class="block text-gray-700 font-medium mb-2">预计海拔高度（如涉及高原地区）</label>
            <div class="grid grid-cols-2 md:grid-cols-4 gap-3">
              <button onclick="selectOption(this, 'altitude', 'none')" class="option-card p-3 border-2 border-gray-200 rounded-xl text-center hover:border-primary">
                <div class="text-sm font-medium">不涉及高原</div>
              </button>
              <button onclick="selectOption(this, 'altitude', 'low')" class="option-card p-3 border-2 border-gray-200 rounded-xl text-center hover:border-primary">
                <div class="text-sm font-medium">1500-2500m</div>
              </button>
              <button onclick="selectOption(this, 'altitude', 'medium')" class="option-card p-3 border-2 border-gray-200 rounded-xl text-center hover:border-primary">
                <div class="text-sm font-medium">2500-4000m</div>
              </button>
              <button onclick="selectOption(this, 'altitude', 'high')" class="option-card p-3 border-2 border-gray-200 rounded-xl text-center hover:border-primary">
                <div class="text-sm font-medium">4000m以上</div>
              </button>
            </div>
          </div>
          <div>
            <label class="block text-gray-700 font-medium mb-2">旅行时长</label>
            <div class="grid grid-cols-2 md:grid-cols-4 gap-3">
              <button onclick="selectOption(this, 'duration', 'short')" class="option-card p-3 border-2 border-gray-200 rounded-xl text-center hover:border-primary">
                <div class="text-sm font-medium">1-3天</div>
              </button>
              <button onclick="selectOption(this, 'duration', 'medium')" class="option-card p-3 border-2 border-gray-200 rounded-xl text-center hover:border-primary">
                <div class="text-sm font-medium">4-7天</div>
              </button>
              <button onclick="selectOption(this, 'duration', 'long')" class="option-card p-3 border-2 border-gray-200 rounded-xl text-center hover:border-primary">
                <div class="text-sm font-medium">8-14天</div>
              </button>
              <button onclick="selectOption(this, 'duration', 'extended')" class="option-card p-3 border-2 border-gray-200 rounded-xl text-center hover:border-primary">
                <div class="text-sm font-medium">14天以上</div>
              </button>
            </div>
          </div>
          <div>
            <label class="block text-gray-700 font-medium mb-2">目的地所在区域</label>
            <div class="grid grid-cols-2 md:grid-cols-3 gap-3">
              <button onclick="selectOption(this, 'region', 'domestic')" class="option-card p-4 border-2 border-gray-200 rounded-xl text-center hover:border-primary">
                <div class="text-2xl mb-1">🇨🇳</div>
                <div class="text-sm font-medium">国内</div>
              </button>
              <button onclick="selectOption(this, 'region', 'asia')" class="option-card p-4 border-2 border-gray-200 rounded-xl text-center hover:border-primary">
                <div class="text-2xl mb-1">🌏</div>
                <div class="text-sm font-medium">亚洲</div>
              </button>
              <button onclick="selectOption(this, 'region', 'europe')" class="option-card p-4 border-2 border-gray-200 rounded-xl text-center hover:border-primary">
                <div class="text-2xl mb-1">🇪🇺</div>
                <div class="text-sm font-medium">欧洲</div>
              </button>
              <button onclick="selectOption(this, 'region', 'america')" class="option-card p-4 border-2 border-gray-200 rounded-xl text-center hover:border-primary">
                <div class="text-2xl mb-1">🌎</div>
                <div class="text-sm font-medium">美洲</div>
              </button>
              <button onclick="selectOption(this, 'region', 'africa')" class="option-card p-4 border-2 border-gray-200 rounded-xl text-center hover:border-primary">
                <div class="text-2xl mb-1">🌍</div>
                <div class="text-sm font-medium">非洲</div>
              </button>
              <button onclick="selectOption(this, 'region', 'oceania')" class="option-card p-4 border-2 border-gray-200 rounded-xl text-center hover:border-primary">
                <div class="text-2xl mb-1">🏝️</div>
                <div class="text-sm font-medium">大洋洲</div>
              </button>
            </div>
          </div>
        </div>
      </div>

      <!-- Step 4: Special Needs -->
      <div id="step4" class="step-content hidden fade-in">
        <h2 class="text-xl font-bold text-gray-800 mb-6 flex items-center gap-2">
          <span class="w-8 h-8 bg-primary text-white rounded-full flex items-center justify-center text-sm">4</span>
          特殊需求
        </h2>
        <div class="space-y-6">
          <div>
            <label class="block text-gray-700 font-medium mb-2">您是否有以下特殊需求？</label>
            <div class="space-y-2">
              <label class="flex items-center gap-3 p-3 border border-gray-200 rounded-xl hover:bg-gray-50 cursor-pointer">
                <input type="checkbox" name="special" value="motion" class="w-5 h-5 text-primary rounded">
                <span>🚗 晕车/晕机/晕船</span>
              </label>
              <label class="flex items-center gap-3 p-3 border border-gray-200 rounded-xl hover:bg-gray-50 cursor-pointer">
                <input type="checkbox" name="special" value="altitude" class="w-5 h-5 text-primary rounded">
                <span>🏔️ 担心高原反应</span>
              </label>
              <label class="flex items-center gap-3 p-3 border border-gray-200 rounded-xl hover:bg-gray-50 cursor-pointer">
                <input type="checkbox" name="special" value="digestive" class="w-5 h-5 text-primary rounded">
                <span>🍽️ 肠胃敏感</span>
              </label>
              <label class="flex items-center gap-3 p-3 border border-gray-200 rounded-xl hover:bg-gray-50 cursor-pointer">
                <input type="checkbox" name="special" value="skin" class="w-5 h-5 text-primary rounded">
                <span>☀️ 皮肤敏感/易晒伤</span>
              </label>
              <label class="flex items-center gap-3 p-3 border border-gray-200 rounded-xl hover:bg-gray-50 cursor-pointer">
                <input type="checkbox" name="special" value="mosquito" class="w-5 h-5 text-primary rounded">
                <span>🦟 蚊虫敏感</span>
              </label>
              <label class="flex items-center gap-3 p-3 border border-gray-200 rounded-xl hover:bg-gray-50 cursor-pointer">
                <input type="checkbox" name="special" value="none" class="w-5 h-5 text-primary rounded">
                <span>✓ 以上都没有</span>
              </label>
            </div>
          </div>
          <div>
            <label class="block text-gray-700 font-medium mb-2">是否有其他需要我们了解的情况？</label>
            <textarea id="additionalInfo" rows="4" class="w-full p-4 border border-gray-300 rounded-xl focus:ring-2 focus:ring-primary focus:border-transparent" placeholder="请描述您的特殊情况或需求..."></textarea>
          </div>
        </div>
      </div>

      <!-- Step 5: Results -->
      <div id="step5" class="step-content hidden fade-in">
        <h2 class="text-xl font-bold text-gray-800 mb-6 flex items-center gap-2">
          <span class="w-8 h-8 bg-primary text-white rounded-full flex items-center justify-center text-sm">✓</span>
          评估结果
        </h2>
        <div id="resultsContainer">
          <!-- Results will be dynamically inserted -->
        </div>
      </div>

      <!-- Navigation Buttons -->
      <div class="flex justify-between mt-8 pt-6 border-t">
        <button id="prevBtn" onclick="prevStep()" class="px-6 py-3 border-2 border-gray-300 rounded-full text-gray-600 font-medium hover:bg-gray-50 hidden">
          ← 上一步
        </button>
        <button id="nextBtn" onclick="nextStep()" class="px-8 py-3 bg-primary text-white rounded-full font-bold hover:bg-secondary transition ml-auto flex items-center gap-2">
          继续 <span>→</span>
        </button>
        <button id="submitBtn" onclick="generateResults()" class="px-8 py-3 bg-primary text-white rounded-full font-bold hover:bg-secondary transition ml-auto flex items-center gap-2 hidden">
          🩺 查看评估结果
        </button>
      </div>
    </div>
  </div>

  <!-- Footer -->
  <footer class="bg-gray-800 text-white py-8 mt-12">
    <div class="max-w-7xl mx-auto px-4 text-center">
      <p class="text-gray-400 text-sm">© 2024 游导旅游 youdao-travel.com</p>
      <p class="mt-2 text-xs text-gray-500">温馨提示：本评估结果仅供参考，不构成医疗建议。如有身体不适，请及时就医。</p>
    </div>
  </footer>

  <script>
    let currentStep = 1;
    const totalSteps = 5;
    const formData = {};

    function toggleMenu() {
      document.getElementById('mobileMenu').classList.toggle('hidden');
    }

    function selectOption(element, key, value) {
      // Remove selected class from siblings
      const parent = element.parentElement;
      parent.querySelectorAll('.option-card').forEach(card => {
        card.classList.remove('selected');
      });
      element.classList.add('selected');
      formData[key] = value;
    }

    function handleChronicChange(element) {
      if (element.checked && element.value === 'none') {
        document.querySelectorAll('input[name="chronic"]:not([value="none"])').forEach(cb => {
          cb.checked = false;
        });
      } else if (element.checked) {
        document.querySelector('input[name="chronic"][value="none"]').checked = false;
      }
    }

    function handleAllergyChange(element) {
      if (element.checked && element.value === 'none') {
        document.querySelectorAll('input[name="allergy"]:not([value="none"])').forEach(cb => {
          cb.checked = false;
        });
      } else if (element.checked) {
        document.querySelector('input[name="allergy"][value="none"]').checked = false;
      }
    }

    function updateProgress() {
      document.getElementById('progressText').textContent = `第 ${currentStep} 步 / 共 ${totalSteps} 步`;
      for (let i = 1; i <= totalSteps; i++) {
        const indicator = document.querySelector(`.step-indicator[data-step="${i}"]`);
        if (i < currentStep) {
          indicator.classList.add('completed');
          indicator.classList.remove('active');
        } else if (i === currentStep) {
          indicator.classList.add('active');
          indicator.classList.remove('completed');
        } else {
          indicator.classList.remove('active', 'completed');
        }
      }
    }

    function showStep(step) {
      document.querySelectorAll('.step-content').forEach(content => {
        content.classList.add('hidden');
      });
      document.getElementById(`step${step}`).classList.remove('hidden');
      
      const prevBtn = document.getElementById('prevBtn');
      const nextBtn = document.getElementById('nextBtn');
      const submitBtn = document.getElementById('submitBtn');
      
      prevBtn.classList.toggle('hidden', step === 1);
      nextBtn.classList.toggle('hidden', step === totalSteps);
      submitBtn.classList.toggle('hidden', step !== totalSteps);
    }

    function nextStep() {
      if (currentStep < totalSteps) {
        currentStep++;
        showStep(currentStep);
        updateProgress();
      }
    }

    function prevStep() {
      if (currentStep > 1) {
        currentStep--;
        showStep(currentStep);
        updateProgress();
      }
    }

    function generateResults() {
      const results = analyzeData();
      displayResults(results);
      currentStep = 5;
      showStep(5);
      updateProgress();
    }

    function analyzeData() {
      const results = {
        riskLevel: 'low',
        warnings: [],
        recommendations: [],
        requiredItems: [],
        vaccineSuggestions: []
      };

      // Age risk
      if (formData.age === '60+') {
        results.riskLevel = 'medium';
        results.warnings.push({ type: 'age', message: '60岁以上人群旅行需注意体力消耗，建议避免高强度活动' });
      }

      // Chronic disease warnings
      const chronicDiseases = [];
      document.querySelectorAll('input[name="chronic"]:checked').forEach(cb => {
        if (cb.value !== 'none') chronicDiseases.push(cb.value);
      });
      if (chronicDiseases.includes('heart')) {
        results.riskLevel = 'high';
        results.warnings.push({ type: 'heart', message: '心血管疾病患者需随身携带处方药物，了解目的地医疗资源' });
        results.requiredItems.push('硝酸甘油或速效救心丸');
      }
      if (chronicDiseases.includes('diabetes')) {
        results.riskLevel = 'high';
        results.warnings.push({ type: 'diabetes', message: '糖尿病患者需准备足够的胰岛素和血糖仪，注意饮食规律' });
        results.requiredItems.push('胰岛素、血糖仪、葡萄糖片');
      }
      if (chronicDiseases.includes('respiratory')) {
        results.warnings.push({ type: 'respiratory', message: '呼吸系统疾病患者应避免前往空气污染严重或高海拔地区' });
        results.requiredItems.push('吸入器、止咳药');
      }

      // Allergy handling
      const allergies = [];
      document.querySelectorAll('input[name="allergy"]:checked').forEach(cb => {
        if (cb.value !== 'none') allergies.push(cb.value);
      });
      if (allergies.length > 0) {
        results.warnings.push({ type: 'allergy', message: '有过敏史，请随身携带抗过敏药物，并将过敏信息告知同行人员' });
        results.requiredItems.push('氯雷他定或扑尔敏');
      }

      // Destination analysis
      if (formData.altitude === 'high' || formData.altitude === 'medium') {
        results.riskLevel = results.riskLevel === 'high' ? 'high' : 'medium';
        results.warnings.push({ type: 'altitude', message: '前往高原地区需预防高原反应，建议提前服用红景天' });
        results.requiredItems.push('红景天胶囊、乙酰唑胺');
      }

      // Region vaccine suggestions
      if (formData.region === 'africa') {
        results.vaccineSuggestions.push({ name: '黄热病疫苗', urgency: 'required', note: '必须接种，有效期10年' });
        results.vaccineSuggestions.push({ name: '霍乱疫苗', urgency: 'recommended', note: '建议接种' });
        results.vaccineSuggestions.push({ name: '疟疾预防', urgency: 'required', note: '需服用预防药物' });
      }
      if (formData.region === 'asia' && (formData.destination === 'jungle' || formData.destination === 'mountain')) {
        results.vaccineSuggestions.push({ name: '甲肝疫苗', urgency: 'recommended', note: '建议接种' });
        results.vaccineSuggestions.push({ name: '伤寒疫苗', urgency: 'recommended', note: '建议接种' });
      }

      // Special needs
      const specialNeeds = [];
      document.querySelectorAll('input[name="special"]:checked').forEach(cb => {
        specialNeeds.push(cb.value);
      });
      if (specialNeeds.includes('motion')) {
        results.requiredItems.push('茶苯海明片（晕车药）');
        results.recommendations.push('选择靠窗座位，保持通风');
      }
      if (specialNeeds.includes('digestive')) {
        results.requiredItems.push('蒙脱石散、口服补液盐');
        results.recommendations.push('选择正规餐厅，避免生冷食物');
      }
      if (specialNeeds.includes('skin')) {
        results.requiredItems.push('防晒霜SPF50+、晒后修复凝胶');
        results.recommendations.push('避免强紫外线时段外出，穿着防护衣物');
      }
      if (specialNeeds.includes('mosquito')) {
        results.requiredItems.push('驱蚊液（含DEET）、驱蚊贴');
        results.recommendations.push('穿着长袖衣物，避免黄昏夜间外出');
      }

      // Universal recommendations
      results.recommendations.push('携带基本药品（感冒药、止痛药、创可贴）');
      results.recommendations.push('了解目的地紧急医疗电话');
      results.recommendations.push('购买旅行医疗保险');

      return results;
    }

    function displayResults(results) {
      const container = document.getElementById('resultsContainer');
      const riskColors = {
        low: { bg: 'bg-green-100', text: 'text-green-700', border: 'border-green-300' },
        medium: { bg: 'bg-yellow-100', text: 'text-yellow-700', border: 'border-yellow-300' },
        high: { bg: 'bg-red-100', text: 'text-red-700', border: 'border-red-300' }
      };
      const riskLabels = { low: '低风险', medium: '中等风险', high: '高风险' };
      const colors = riskColors[results.riskLevel];

      container.innerHTML = `
        <!-- Risk Level -->
        <div class="text-center mb-8">
          <div class="inline-flex items-center gap-2 px-6 py-3 ${colors.bg} ${colors.text} rounded-full text-lg font-bold ${colors.border} border">
            <span>${results.riskLevel === 'low' ? '✅' : results.riskLevel === 'medium' ? '⚠️' : '🚨'}</span>
            ${riskLabels[results.riskLevel]}旅行
          </div>
        </div>

        <!-- Warnings -->
        ${results.warnings.length > 0 ? `
        <div class="mb-6">
          <h3 class="text-lg font-bold text-gray-800 mb-4 flex items-center gap-2">
            <span class="text-2xl">⚠️</span> 健康风险提示
          </h3>
          <div class="space-y-3">
            ${results.warnings.map(w => `
            <div class="p-4 bg-yellow-50 border border-yellow-200 rounded-xl">
              <div class="font-medium text-yellow-800">${w.message}</div>
            </div>
            `).join('')}
          </div>
        </div>
        ` : ''}

        <!-- Required Items -->
        ${results.requiredItems.length > 0 ? `
        <div class="mb-6">
          <h3 class="text-lg font-bold text-gray-800 mb-4 flex items-center gap-2">
            <span class="text-2xl">🎒</span> 建议携带物品
          </h3>
          <div class="grid md:grid-cols-2 gap-3">
            ${results.requiredItems.map(item => `
            <div class="p-3 bg-blue-50 border border-blue-200 rounded-xl flex items-center gap-3">
              <span class="text-blue-500">✓</span>
              <span class="text-blue-800">${item}</span>
            </div>
            `).join('')}
          </div>
        </div>
        ` : ''}

        <!-- Vaccine Suggestions -->
        ${results.vaccineSuggestions.length > 0 ? `
        <div class="mb-6">
          <h3 class="text-lg font-bold text-gray-800 mb-4 flex items-center gap-2">
            <span class="text-2xl">💉</span> 疫苗建议
          </h3>
          <div class="space-y-3">
            ${results.vaccineSuggestions.map(v => `
            <div class="p-4 border ${v.urgency === 'required' ? 'bg-red-50 border-red-200' : 'bg-purple-50 border-purple-200'} rounded-xl">
              <div class="flex items-center justify-between mb-1">
                <span class="font-bold ${v.urgency === 'required' ? 'text-red-700' : 'text-purple-700'}">${v.name}</span>
                <span class="text-xs px-2 py-1 rounded-full ${v.urgency === 'required' ? 'bg-red-100 text-red-600' : 'bg-purple-100 text-purple-600'}">${v.urgency === 'required' ? '必打' : '建议'}</span>
              </div>
              <div class="text-sm ${v.urgency === 'required' ? 'text-red-600' : 'text-purple-600'}">${v.note}</div>
            </div>
            `).join('')}
          </div>
        </div>
        ` : ''}

        <!-- General Recommendations -->
        ${results.recommendations.length > 0 ? `
        <div class="mb-6">
          <h3 class="text-lg font-bold text-gray-800 mb-4 flex items-center gap-2">
            <span class="text-2xl">💡</span> 通用建议
          </h3>
          <div class="space-y-2">
            ${results.recommendations.map(r => `
            <div class="flex items-center gap-3 p-3 bg-gray-50 rounded-xl">
              <span class="text-green-500">✓</span>
              <span class="text-gray-700">${r}</span>
            </div>
            `).join('')}
          </div>
        </div>
        ` : ''}

        <!-- Actions -->
        <div class="flex flex-col sm:flex-row gap-4 mt-8">
          <a href="vaccines.html" class="flex-1 p-4 bg-primary text-white rounded-xl text-center font-bold hover:bg-secondary transition flex items-center justify-center gap-2">
            💉 查看疫苗详情
          </a>
          <a href="medicine-kit.html" class="flex-1 p-4 bg-blue-500 text-white rounded-xl text-center font-bold hover:bg-blue-600 transition flex items-center justify-center gap-2">
            💊 查看药品清单
          </a>
          <a href="records.html" class="flex-1 p-4 bg-purple-500 text-white rounded-xl text-center font-bold hover:bg-purple-600 transition flex items-center justify-center gap-2">
            📁 记录健康信息
          </a>
        </div>

        <!-- Disclaimer -->
        <div class="mt-8 p-4 bg-gray-100 rounded-xl text-center">
          <p class="text-sm text-gray-600">📋 本评估结果仅供参考，不构成医疗建议。如有身体不适或疑问，请咨询专业医生。</p>
        </div>
      `;
    }
  </script>
</body>
</html>
