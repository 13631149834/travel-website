<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>我的收藏 - 游导旅游壁纸</title>
  <link rel="stylesheet" href="../css/wallpapers.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    body { margin: 0; font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif; }
  </style>
</head>
<body class="wp-page">
  <!-- Navigation -->
  <nav style="background: linear-gradient(135deg, #0ea5e9 0%, #06b6d4 50%, #10b981 100%); color: white; padding: 16px 0; position: sticky; top: 0; z-index: 100; box-shadow: 0 4px 20px rgba(0,0,0,0.1);">
    <div style="max-width: 1200px; margin: 0 auto; padding: 0 20px; display: flex; justify-content: space-between; align-items: center;">
      <a href="index.html" style="color: white; text-decoration: none; font-size: 24px; font-weight: bold; display: flex; align-items: center; gap: 8px;">
        <span style="font-size: 28px;">🧭</span>
        <span>游导旅游</span>
      </a>
      <div style="display: flex; gap: 24px; align-items: center;">
        <a href="index.html" style="color: white; text-decoration: none; opacity: 0.9;">返回壁纸首页</a>
        <a href="upload.html" style="color: white; text-decoration: none; opacity: 0.9;">上传壁纸</a>
      </div>
    </div>
  </nav>

  <div style="max-width: 1200px; margin: 0 auto; padding: 0 20px;">
    <!-- 页面标题 -->
    <div style="padding: 40px 0 20px;">
      <h1 style="font-size: 32px; color: #1e293b; display: flex; align-items: center; gap: 12px;">
        <span>❤️</span> 我的收藏
      </h1>
      <p style="color: #64748b; margin-top: 8px;">收藏你喜欢的壁纸，方便随时下载使用</p>
    </div>

    <!-- 操作栏 -->
    <div class="wp-favorites-header" id="actionBar" style="display: none;">
      <div style="color: #64748b; font-size: 14px;">
        已选择 <span id="selectedCount">0</span> 张壁纸
      </div>
      <div class="wp-favorites-actions">
        <button class="wp-batch-btn" onclick="selectAll()">
          <i class="far fa-check-square"></i> 全选
        </button>
        <button class="wp-batch-btn" onclick="batchDownload()">
          <i class="fas fa-download"></i> 批量下载
        </button>
        <button class="wp-batch-btn" onclick="batchRemove()" style="border-color: #ef4444; color: #ef4444;">
          <i class="fas fa-trash"></i> 批量移除
        </button>
      </div>
    </div>

    <!-- 壁纸列表 -->
    <div id="favoritesList"></div>

    <!-- 空状态 -->
    <div class="wp-empty-state" id="emptyState" style="display: none;">
      <div class="icon">💝</div>
      <h3>还没有收藏</h3>
      <p>去首页浏览并收藏你喜欢的壁纸吧</p>
      <a href="index.html" class="wp-empty-btn">
        <i class="fas fa-compass"></i> 浏览壁纸
      </a>
    </div>
  </div>

  <!-- Footer -->
  <footer style="background: #1e293b; color: white; padding: 40px 20px; margin-top: 60px;">
    <div style="max-width: 1200px; margin: 0 auto; text-align: center;">
      <p style="opacity: 0.8;">© 2024 游导旅游 All Rights Reserved</p>
    </div>
  </footer>

  <!-- Toast Container -->
  <div id="toastContainer"></div>

  <script>
    let wallpapersData = null;
    let favorites = JSON.parse(localStorage.getItem('wpFavorites') || '[]');
    let selectedItems = new Set();

    // 加载数据
    async function loadData() {
      try {
        const response = await fetch('../data/wallpapers.json');
        wallpapersData = await response.json();
        renderFavorites();
      } catch (error) {
        console.error('加载数据失败:', error);
        showToast('数据加载失败', 'error');
      }
    }

    // 渲染收藏列表
    function renderFavorites() {
      const container = document.getElementById('favoritesList');
      const emptyState = document.getElementById('emptyState');
      const actionBar = document.getElementById('actionBar');
      
      if (favorites.length === 0) {
        container.innerHTML = '';
        emptyState.style.display = 'block';
        actionBar.style.display = 'none';
        return;
      }

      emptyState.style.display = 'none';
      actionBar.style.display = 'flex';

      const wallpapers = wallpapersData.wallpapers.filter(w => favorites.includes(w.id));
      
      container.innerHTML = `
        <div class="wp-grid" style="grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));">
          ${wallpapers.map(wp => createFavoriteCard(wp)).join('')}
        </div>
      `;
    }

    // 创建收藏卡片
    function createFavoriteCard(wp) {
      const isSelected = selectedItems.has(wp.id);
      
      return `
        <div class="wp-card" style="position: relative;">
          <div class="wp-card-image">
            <img src="${wp.preview}" alt="${wp.title}" loading="lazy">
            <div class="wp-card-badge">${getCategoryName(wp.category)}</div>
            
            <!-- 选择框 -->
            <div style="position: absolute; top: 12px; right: 12px; z-index: 10;">
              <label style="display: flex; align-items: center; cursor: pointer;">
                <input type="checkbox" 
                       ${isSelected ? 'checked' : ''} 
                       onchange="toggleSelect('${wp.id}')"
                       style="width: 20px; height: 20px; cursor: pointer; accent-color: #0ea5e9;">
              </label>
            </div>
            
            <div class="wp-card-overlay">
              <div class="wp-card-actions">
                <button class="wp-btn-download" onclick="downloadWallpaper('${wp.id}')">
                  <i class="fas fa-download"></i> 下载
                </button>
                <button class="wp-btn-favorite active" onclick="removeFavorite('${wp.id}')">
                  <i class="fas fa-heart"></i>
                </button>
              </div>
            </div>
          </div>
          <div class="wp-card-info" onclick="goToDetail('${wp.id}')" style="cursor: pointer;">
            <h3>${wp.title}</h3>
            <div class="wp-card-meta">
              <span><i class="fas fa-map-marker-alt"></i> ${wp.location}</span>
              <span><i class="fas fa-download"></i> ${formatNumber(wp.downloads)}</span>
            </div>
          </div>
        </div>
      `;
    }

    // 选择/取消选择
    function toggleSelect(id) {
      if (selectedItems.has(id)) {
        selectedItems.delete(id);
      } else {
        selectedItems.add(id);
      }
      updateSelectedCount();
    }

    // 全选
    function selectAll() {
      if (selectedItems.size === favorites.length) {
        selectedItems.clear();
      } else {
        selectedItems = new Set(favorites);
      }
      renderFavorites();
      updateSelectedCount();
    }

    // 更新选中数量
    function updateSelectedCount() {
      document.getElementById('selectedCount').textContent = selectedItems.size;
    }

    // 批量下载
    function batchDownload() {
      if (selectedItems.size === 0) {
        showToast('请先选择要下载的壁纸', 'error');
        return;
      }
      
      showToast(`开始下载 ${selectedItems.size} 张壁纸...`, 'success');
      
      let delay = 0;
      selectedItems.forEach(id => {
        setTimeout(() => {
          const wp = wallpapersData.wallpapers.find(w => w.id === id);
          if (wp) {
            const link = document.createElement('a');
            link.href = wp.preview;
            link.download = `${wp.title}.jpg`;
            link.target = '_blank';
            link.click();
          }
        }, delay);
        delay += 500;
      });
    }

    // 批量移除
    function batchRemove() {
      if (selectedItems.size === 0) {
        showToast('请先选择要移除的壁纸', 'error');
        return;
      }
      
      if (confirm(`确定要移除选中的 ${selectedItems.size} 张壁纸吗？`)) {
        favorites = favorites.filter(id => !selectedItems.has(id));
        localStorage.setItem('wpFavorites', JSON.stringify(favorites));
        selectedItems.clear();
        renderFavorites();
        showToast('已移除收藏', 'success');
      }
    }

    // 移除单个收藏
    function removeFavorite(id) {
      favorites = favorites.filter(f => f !== id);
      localStorage.setItem('wpFavorites', JSON.stringify(favorites));
      selectedItems.delete(id);
      renderFavorites();
      showToast('已移除收藏', 'success');
    }

    // 下载
    function downloadWallpaper(id) {
      const wp = wallpapersData.wallpapers.find(w => w.id === id);
      if (wp) {
        showToast(`开始下载: ${wp.title}`, 'success');
        const link = document.createElement('a');
        link.href = wp.preview;
        link.download = `${wp.title}.jpg`;
        link.target = '_blank';
        link.click();
      }
    }

    // 跳转详情
    function goToDetail(id) {
      window.location.href = `detail.html?id=${id}`;
    }

    // 工具函数
    function getCategoryName(id) {
      const cat = wallpapersData.categories.find(c => c.id === id);
      return cat ? cat.name : id;
    }

    function formatNumber(num) {
      if (num >= 10000) {
        return (num / 10000).toFixed(1) + '万';
      }
      return num.toLocaleString();
    }

    function showToast(message, type = 'success') {
      const container = document.getElementById('toastContainer');
      const toast = document.createElement('div');
      toast.className = `wp-toast ${type}`;
      toast.innerHTML = `<i class="fas fa-${type === 'success' ? 'check-circle' : 'exclamation-circle'}"></i> ${message}`;
      container.appendChild(toast);
      
      setTimeout(() => {
        toast.style.animation = 'slideIn 0.3s ease reverse';
        setTimeout(() => toast.remove(), 300);
      }, 2500);
    }

    // 初始化
    document.addEventListener('DOMContentLoaded', loadData);
  </script>
</body>
</html>
