    :root {

    .filter-label { font-weight: 600; color: var(--text); margin-right: 8px; }
    .filter-btn {
      padding: 8px 18px;

      background: var(--card-bg);
      border-radius: 20px;
      font-size: 0.9rem;
      color: var(--text-light);
      cursor: pointer;
      transition: all 0.2s;
    }
    .filter-btn:hover { border-color: var(--primary); color: var(--primary); }
    .filter-btn.active {

    .info-header {

      height: 32px;
      border-radius: 50%;

      font-size: 1.2rem;
      color: var(--text-light);

    .info-close:hover { background: var(--border); color: var(--text); }
    
    .info-meta {

      gap: 20px;
      margin-bottom: 16px;

    .meta-icon { font-size: 1.1rem; }
    
    .info-desc { color: var(--text); line-height: 1.7; margin-bottom: 20px; }
    
    .info-tags { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 20px; }
    .tag {

    // 初始化地图
    let map;
    let markers = {};
    let currentFilter = 'all';

    function initMap() {
      // 创建地图实例，初始视野设置为亚洲
      map = L.map('destinationMap').setView([35, 110], 3);

      // 添加 OpenStreetMap 图层
      L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors',
        maxZoom: 19
      }).addTo(map);

      // 添加标记
      addMarkers(destinations);

      // 渲染热门目的地
      renderHotDestinations();
    }

    // 添加标记
    function addMarkers(data) {
      data.forEach(dest => {
        const marker = L.marker([dest.lat, dest.lng]).addTo(map);
        
        // 创建弹出内容
        const popupContent = `
          <div class="popup-content">
            <span class="popup-flag">${dest.flag}</span>
            <div class="popup-name">${dest.name}</div>
            <a href="#" class="popup-btn" onclick="showDestinationInfo('${dest.id}')">查看详情</a>
          </div>
        `;
        
        marker.bindPopup(popupContent);
        markers[dest.id] = marker;
      });
    }

    // 显示目的地信息
    function showDestinationInfo(destId) {
      const dest = destinations.find(d => d.id === destId);
      if (!dest) return;

      document.getElementById('infoTitle').textContent = dest.flag + ' ' + dest.name;
      document.getElementById('infoContinent').textContent = getContinentName(dest.continent);
      document.getElementById('infoSeason').textContent = dest.season;
      document.getElementById('infoVisa').textContent = dest.visa;
      document.getElementById('infoDesc').textContent = dest.desc;
      
      const tagsContainer = document.getElementById('infoTags');
      tagsContainer.innerHTML = dest.tags.map(tag => `<span class="tag">${tag}</span>`).join('');
      
      document.getElementById('infoDetailBtn').href = `destinations.html#${dest.id}`;
      
      document.getElementById('destinationInfo').classList.add('show');
      
      // 滚动到信息面板
      document.getElementById('destinationInfo').scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }

    // 关闭信息面板
    function closeInfo() {
      document.getElementById('destinationInfo').classList.remove('show');
    }

    // 获取大洲名称
    function getContinentName(continent) {
      const names = {
        'asia': '亚洲',
        'europe': '欧洲',
        'america': '美洲',
        'oceania': '大洋洲',
        'africa': '非洲'
      };
      return names[continent] || continent;
    }

    // 筛选目的地
    function filterDestinations(continent) {
      currentFilter = continent;
      
      // 更新按钮状态
      document.querySelectorAll('.filter-btn').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.filter === continent);
      });

      // 过滤标记
      Object.keys(markers).forEach(id => {
        const dest = destinations.find(d => d.id === id);
        if (continent === 'all' || dest.continent === continent) {
          markers[id].addTo(map);
        } else {
          map.removeLayer(markers[id]);
        }
      });

      // 更新热门目的地
      renderHotDestinations();
    }

    // 渲染热门目的地
    function renderHotDestinations() {
      const filteredDest = currentFilter === 'all' 
        ? destinations 
        : destinations.filter(d => d.continent === currentFilter);
      
      const hotGrid = document.getElementById('hotGrid');
      hotGrid.innerHTML = filteredDest.map(dest => `
        <div class="hot-card" onclick="showDestinationInfo('${dest.id}')">
          <div class="hot-flag">${dest.flag}</div>
          <div class="hot-name">${dest.name}</div>
          <div class="hot-desc">${dest.desc.substring(0, 40)}...</div>
        </div>
      `).join('');
    }

    // 初始化事件监听
    document.addEventListener('DOMContentLoaded', () => {
      initMap();

      // 筛选按钮
      document.querySelectorAll('.filter-btn').forEach(btn => {
        btn.addEventListener('click', () => filterDestinations(btn.dataset.filter));
      });

      // 地图点击关闭popup
      map.on('click', () => {
        map.closePopup();
      });
    });
  </script>

  <script src="js/mobile.js" defer></script>
  <script src="js/customer-service.js" defer></script>
</body>
</html>
