<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>开启胶囊 - 游导旅游</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="css/capsule.css">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            capsule: {
              primary: '#6366f1',
              secondary: '#8b5cf6',
              accent: '#f59e0b',
              mystery: '#1e1b4b',
              glow: '#a78bfa'
            }
          }
        }
      }
    }
  </script>
  <style>
    body { font-family: 'Noto Sans SC', sans-serif; }
    .gradient-hero { background: linear-gradient(135deg, #0f0f1a 0%, #1a1a2e 50%, #16213e 100%); }
    .text-gradient { background: linear-gradient(135deg, #a78bfa, #f59e0b); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .celebration-bg { 
      background: radial-gradient(circle at center, rgba(245, 158, 11, 0.2) 0%, transparent 70%);
    }
    .fade-in { animation: fadeIn 0.6s ease; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    .float { animation: float 3s ease-in-out infinite; }
    @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }
    .pulse { animation: pulse 2s ease-in-out infinite; }
    @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }
    .sparkle { animation: sparkle 1.5s ease-in-out infinite; }
    @keyframes sparkle { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    .rotate { animation: rotate 20s linear infinite; }
    @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    .confetti { position: fixed; width: 10px; height: 10px; pointer-events: none; z-index: 1000; }
    .slide-up { animation: slideUp 1s ease-out forwards; }
    @keyframes slideUp { from { opacity: 0; transform: translateY(50px); } to { opacity: 1; transform: translateY(0); } }
    .scale-in { animation: scaleIn 0.5s ease-out forwards; }
    @keyframes scaleIn { from { opacity: 0; transform: scale(0.8); } to { opacity: 1; transform: scale(1); } }
    .stars { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 0; overflow: hidden; }
    .star { position: absolute; width: 2px; height: 2px; background: white; border-radius: 50%; animation: twinkle 3s ease-in-out infinite; }
    @keyframes twinkle { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; } }
  </style>
</head>
<body class="gradient-hero min-h-screen">
  <!-- 星星背景 -->
  <div class="stars" id="stars"></div>

  <!-- 导航栏 -->
  <nav class="relative z-10 bg-black/30 backdrop-blur-lg border-b border-white/10 sticky top-0 z-50">
    <div class="max-w-4xl mx-auto px-4 py-4">
      <div class="flex items-center justify-between">
        <a href="index.html" class="flex items-center gap-2 text-white hover:opacity-80 transition">
          <span class="text-2xl">←</span>
          <span class="text-lg font-medium">返回</span>
        </a>
        <span class="text-lg font-bold text-white">时间胶囊</span>
        <div class="w-16"></div>
      </div>
    </div>
  </nav>

  <!-- 主内容 -->
  <main class="relative z-10 max-w-4xl mx-auto px-4 py-12">
    <!-- 加载状态 -->
    <div id="loadingState" class="text-center py-20">
      <div class="loading-spinner mx-auto mb-4"></div>
      <p class="text-gray-400">正在加载...</p>
    </div>

    <!-- 未找到 -->
    <div id="notFoundState" class="empty-state hidden">
      <div class="empty-state-icon">🔍</div>
      <h3 class="empty-state-title">胶囊未找到</h3>
      <p class="empty-state-desc">无法找到对应的时间胶囊</p>
      <a href="index.html" class="btn-capsule btn-capsule-secondary mt-4">返回首页</a>
    </div>

    <!-- 开启成功 -->
    <div id="openedState" class="hidden celebration-bg">
      <!-- 庆祝动画 -->
      <div id="celebrationAnimation" class="text-center mb-12">
        <div class="relative inline-block mb-8">
          <div class="w-40 h-40 mx-auto rounded-full bg-gradient-to-br from-amber-500 to-orange-600 flex items-center justify-center pulse">
            <span class="text-7xl float">✨</span>
          </div>
          <div class="absolute inset-0 rounded-full border-4 border-amber-400 rotate" style="animation-direction: reverse;"></div>
        </div>
        <h1 class="text-4xl font-bold text-white mb-4">🎉 恭喜开启！</h1>
        <p class="text-xl text-gray-300 mb-2">你收到了一个来自过去的时间胶囊</p>
        <p class="text-gray-500" id="openDate"></p>
      </div>

      <!-- 胶囊信息 -->
      <div id="capsuleInfo" class="memory-content mb-8 scale-in">
        <div class="text-center mb-6">
          <span class="inline-block px-4 py-1 bg-green-500/20 text-green-400 rounded-full text-sm mb-4">✨ 已开启</span>
          <h2 id="capsuleTitle" class="text-3xl font-bold text-white mb-2"></h2>
          <p id="capsuleDesc" class="text-gray-400"></p>
        </div>
        
        <!-- 标签 -->
        <div id="capsuleTags" class="flex flex-wrap justify-center gap-2 mb-6">
        </div>

        <!-- 位置信息 -->
        <div id="locationInfo" class="hidden">
          <div class="flex items-center justify-center gap-2 text-gray-400 mb-4">
            <span>📍</span>
            <span id="locationName"></span>
          </div>
        </div>
      </div>

      <!-- 记忆内容 -->
      <div id="memoryContent" class="memory-content mb-8 slide-up" style="animation-delay: 0.3s;">
        <div class="text-center mb-6">
          <span class="text-4xl mb-4 block">📜</span>
          <h3 class="text-xl font-bold text-white">记忆内容</h3>
        </div>
        <div id="capsuleContentText" class="text-gray-300 text-lg leading-relaxed whitespace-pre-wrap"></div>
      </div>

      <!-- 照片 -->
      <div id="photosSection" class="memory-content mb-8 slide-up hidden" style="animation-delay: 0.5s;">
        <div class="text-center mb-6">
          <span class="text-4xl mb-4 block">📸</span>
          <h3 class="text-xl font-bold text-white">照片回忆</h3>
        </div>
        <div id="photoGallery" class="photo-grid">
        </div>
      </div>

      <!-- 回忆统计 -->
      <div id="statsSection" class="memory-content mb-8 slide-up hidden" style="animation-delay: 0.7s;">
        <h3 class="text-lg font-bold text-white mb-4 text-center">💫 回忆统计</h3>
        <div class="grid grid-cols-3 gap-4 text-center">
          <div class="p-4 bg-white/5 rounded-xl">
            <div class="text-2xl font-bold text-capsule-glow" id="daysCount">-</div>
            <div class="text-gray-500 text-sm">封存天数</div>
          </div>
          <div class="p-4 bg-white/5 rounded-xl">
            <div class="text-2xl font-bold text-capsule-glow" id="photosCount">-</div>
            <div class="text-gray-500 text-sm">照片数量</div>
          </div>
          <div class="p-4 bg-white/5 rounded-xl">
            <div class="text-2xl font-bold text-capsule-glow" id="tagsCount">-</div>
            <div class="text-gray-500 text-sm">标签数量</div>
          </div>
        </div>
      </div>

      <!-- 操作按钮 -->
      <div class="slide-up" style="animation-delay: 0.9s;">
        <div class="grid grid-cols-2 gap-4 mb-6">
          <a href="create.html" class="btn-capsule btn-capsule-gold text-center">
            <span>✨</span>
            <span>创建新胶囊</span>
          </a>
          <button class="btn-capsule btn-capsule-secondary" onclick="shareCapsule()">
            <span>📤</span>
            <span>分享喜悦</span>
          </button>
        </div>
        <div class="text-center">
          <a href="map.html" class="text-gray-400 hover:text-white transition">
            🗺️ 探索其他胶囊
          </a>
        </div>
      </div>
    </div>

    <!-- 分享模态框 -->
    <div id="shareModal" class="modal-overlay">
      <div class="modal-content">
        <h3 class="text-xl font-bold text-white mb-6 text-center">📤 分享喜悦</h3>
        <div class="flex justify-center gap-4 mb-6">
          <button class="share-btn" onclick="shareTo('wechat')" title="微信">💬</button>
          <button class="share-btn" onclick="shareTo('weibo')" title="微博">📱</button>
          <button class="share-btn" onclick="shareTo('copy')" title="复制">🔗</button>
        </div>
        <button class="btn-capsule w-full mt-4" onclick="closeShareModal()">关闭</button>
      </div>
    </div>
  </main>

  <script>
    let currentCapsule = null;

    // 创建星星背景
    function createStars() {
      const starsContainer = document.getElementById('stars');
      for (let i = 0; i < 50; i++) {
        const star = document.createElement('div');
        star.className = 'star';
        star.style.left = Math.random() * 100 + '%';
        star.style.top = Math.random() * 100 + '%';
        star.style.animationDelay = Math.random() * 3 + 's';
        starsContainer.appendChild(star);
      }
    }

    // 创建彩带
    function createConfetti() {
      const colors = ['#f59e0b', '#6366f1', '#8b5cf6', '#10b981', '#ec4899'];
      for (let i = 0; i < 50; i++) {
        const confetti = document.createElement('div');
        confetti.className = 'confetti';
        confetti.style.left = Math.random() * 100 + 'vw';
        confetti.style.top = '-10px';
        confetti.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
        confetti.style.borderRadius = Math.random() > 0.5 ? '50%' : '0';
        confetti.style.transform = `rotate(${Math.random() * 360}deg)`;
        document.body.appendChild(confetti);
        
        const duration = 3000 + Math.random() * 2000;
        const animation = confetti.animate([
          { transform: `translateY(0) rotate(0deg)`, opacity: 1 },
          { transform: `translateY(100vh) rotate(${Math.random() * 720}deg)`, opacity: 0 }
        ], {
          duration: duration,
          easing: 'cubic-bezier(0.25, 0.46, 0.45, 0.94)'
        });
        
        animation.onfinish = () => confetti.remove();
      }
    }

    // 页面初始化
    document.addEventListener('DOMContentLoaded', function() {
      createStars();
      
      const urlParams = new URLSearchParams(window.location.search);
      const capsuleId = urlParams.get('id');
      
      if (!capsuleId) {
        showNotFound();
        return;
      }
      
      loadCapsule(capsuleId);
    });

    // 加载胶囊
    function loadCapsule(id) {
      const capsules = JSON.parse(localStorage.getItem('travelCapsules') || '[]');
      currentCapsule = capsules.find(c => c.id === id);
      
      if (!currentCapsule) {
        showNotFound();
        return;
      }
      
      // 检查是否已开启
      if (currentCapsule.status !== 'opened') {
        // 尝试开启
        checkAndOpenCapsule();
      } else {
        showOpenedContent();
      }
    }

    // 检查并开启胶囊
    function checkAndOpenCapsule() {
      const conditions = currentCapsule.openConditions?.conditions || [];
      let canOpen = true;
      let needsPassword = false;
      let needsLocation = false;
      
      for (const cond of conditions) {
        if (cond.type === 'time') {
          const target = new Date(`${cond.date}T${cond.time || '00:00'}`);
          if (new Date() < target) {
            canOpen = false;
          }
        } else if (cond.type === 'password') {
          needsPassword = true;
        } else if (cond.type === 'location') {
          needsLocation = true;
        }
      }
      
      if (canOpen && !needsPassword && !needsLocation) {
        openCapsule();
      } else if (needsPassword) {
        showPasswordPrompt();
      } else if (needsLocation) {
        checkLocationAndOpen();
      } else {
        // 时间未到
        showTimeNotReached();
      }
    }

    // 显示密码输入
    function showPasswordPrompt() {
      const cond = currentCapsule.openConditions.conditions.find(c => c.type === 'password');
      const hint = cond?.hint ? `提示：${cond.hint}` : '请输入开启密码';
      const password = prompt(hint);
      
      if (password === cond.password) {
        openCapsule();
      } else if (password !== null) {
        alert('密码错误');
        showPasswordPrompt();
      } else {
        window.location.href = 'index.html';
      }
    }

    // 检查位置并开启
    function checkLocationAndOpen() {
      if (!navigator.geolocation) {
        alert('浏览器不支持定位');
        window.location.href = 'index.html';
        return;
      }
      
      navigator.geolocation.getCurrentPosition(
        function(position) {
          const cond = currentCapsule.openConditions.conditions.find(c => c.type === 'location');
          if (cond) {
            const distance = getDistance(
              position.coords.latitude, position.coords.longitude,
              cond.latitude, cond.longitude
            );
            
            if (distance <= cond.radius) {
              openCapsule();
            } else {
              alert(`你距离开启位置还有 ${Math.round(distance)} 米，无法开启此胶囊`);
              window.location.href = 'index.html';
            }
          }
        },
        function() {
          alert('无法获取位置');
          window.location.href = 'index.html';
        }
      );
    }

    // 计算距离
    function getDistance(lat1, lon1, lat2, lon2) {
      const R = 6371000;
      const dLat = (lat2 - lat1) * Math.PI / 180;
      const dLon = (lon2 - lon1) * Math.PI / 180;
      const a = Math.sin(dLat/2) * Math.sin(dLat/2) +
                Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
                Math.sin(dLon/2) * Math.sin(dLon/2);
      const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
      return R * c;
    }

    // 显示时间未到
    function showTimeNotReached() {
      document.getElementById('loadingState').classList.add('hidden');
      const timeCond = currentCapsule.openConditions.conditions.find(c => c.type === 'time');
      if (timeCond) {
        alert(`这个胶囊将在 ${timeCond.date} ${timeCond.time || ''} 开启，请耐心等待`);
      }
      window.location.href = 'index.html';
    }

    // 开启胶囊
    function openCapsule() {
      currentCapsule.status = 'opened';
      currentCapsule.openedAt = new Date().toISOString();
      
      const capsules = JSON.parse(localStorage.getItem('travelCapsules') || '[]');
      const index = capsules.findIndex(c => c.id === currentCapsule.id);
      if (index !== -1) {
        capsules[index] = currentCapsule;
        localStorage.setItem('travelCapsules', JSON.stringify(capsules));
      }
      
      showOpenedContent();
    }

    // 显示已开启内容
    function showOpenedContent() {
      document.getElementById('loadingState').classList.add('hidden');
      document.getElementById('openedState').classList.remove('hidden');
      
      // 创建庆祝动画
      createConfetti();
      
      // 震动反馈
      if (navigator.vibrate) {
        navigator.vibrate([100, 50, 100, 50, 200]);
      }
      
      // 基本信息
      document.getElementById('capsuleTitle').textContent = currentCapsule.title;
      document.getElementById('capsuleDesc').textContent = currentCapsule.description || '';
      
      // 日期
      const openDate = new Date(currentCapsule.openedAt);
      document.getElementById('openDate').textContent = `开启于 ${openDate.toLocaleDateString('zh-CN')} ${openDate.toLocaleTimeString('zh-CN')}`;
      
      // 标签
      if (currentCapsule.tags?.length) {
        document.getElementById('capsuleTags').innerHTML = currentCapsule.tags.map(tag => 
          `<span class="tag">${tag}</span>`
        ).join('');
      }
      
      // 位置
      if (currentCapsule.location) {
        document.getElementById('locationInfo').classList.remove('hidden');
        document.getElementById('locationName').textContent = currentCapsule.location.name;
      }
      
      // 内容
      document.getElementById('capsuleContentText').textContent = currentCapsule.content;
      
      // 照片
      if (currentCapsule.photos?.length) {
        document.getElementById('photosSection').classList.remove('hidden');
        document.getElementById('photoGallery').innerHTML = currentCapsule.photos.map(photo => `
          <div class="photo-item cursor-pointer" onclick="viewPhoto('${photo.data}')">
            <img src="${photo.data}" alt="${photo.description || ''}">
          </div>
        `).join('');
      }
      
      // 统计
      if (currentCapsule.photos?.length || currentCapsule.tags?.length) {
        document.getElementById('statsSection').classList.remove('hidden');
        const createdAt = new Date(currentCapsule.createdAt);
        const now = new Date();
        const days = Math.floor((now - createdAt) / (1000 * 60 * 60 * 24));
        
        document.getElementById('daysCount').textContent = days;
        document.getElementById('photosCount').textContent = currentCapsule.photos?.length || 0;
        document.getElementById('tagsCount').textContent = currentCapsule.tags?.length || 0;
      }
    }

    // 查看大图
    function viewPhoto(src) {
      const modal = document.createElement('div');
      modal.className = 'fixed inset-0 bg-black/90 z-[2000] flex items-center justify-center cursor-zoom-out';
      modal.onclick = () => modal.remove();
      modal.innerHTML = `<img src="${src}" class="max-w-full max-h-full object-contain">`;
      document.body.appendChild(modal);
    }

    // 显示未找到
    function showNotFound() {
      document.getElementById('loadingState').classList.add('hidden');
      document.getElementById('notFoundState').classList.remove('hidden');
    }

    // 分享
    function shareCapsule() {
      document.getElementById('shareModal').classList.add('active');
    }

    function closeShareModal() {
      document.getElementById('shareModal').classList.remove('active');
    }

    function shareTo(platform) {
      const title = currentCapsule.title;
      const text = `我刚刚开启了一个时间胶囊：「${title}」✨ 这是来自过去的珍贵记忆！`;
      
      if (platform === 'copy') {
        navigator.clipboard.writeText(text).then(() => {
          alert('已复制到剪贴板');
        });
      } else if (platform === 'weibo') {
        window.open(`https://service.weibo.com/share/share.php?title=${encodeURIComponent(text)}`);
      } else if (platform === 'wechat') {
        alert('请截图分享到微信');
      }
    }
  </script>
</body>
</html>
