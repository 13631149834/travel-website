<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>活动资讯 - 游导旅游</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#8b5cf6',
            category: '#8b5cf6',
          }
        }
      }
    }
  </script>
  <link rel="stylesheet" href="../css/news/news.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;600;700&display=swap');
    body { font-family: 'Noto Sans SC', sans-serif; }
  </style>
</head>
<body class="bg-gray-50">
  <nav class="bg-white shadow-sm sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-4 py-4">
      <div class="flex items-center justify-between">
        <a href="../index.html" class="flex items-center gap-2 hover:opacity-80 transition">
          <span class="text-3xl">🧭</span>
          <span class="text-2xl font-bold bg-gradient-to-r from-violet-500 to-purple-400 bg-clip-text text-transparent">游导旅游</span>
        </a>
        <div class="hidden md:flex items-center gap-8">
          <a href="../index.html" class="text-gray-600 hover:text-primary transition">首页</a>
          <a href="index.html" class="text-primary font-semibold border-b-2 border-primary pb-1">资讯</a>
          <a href="../tools/index.html" class="text-gray-600 hover:text-primary transition">工具箱</a>
        </div>
        <button class="md:hidden text-2xl" onclick="toggleMenu()">☰</button>
      </div>
      <div id="mobileMenu" class="hidden md:hidden mt-4 pb-4 space-y-3 border-t pt-4">
        <a href="../index.html" class="block py-2 text-gray-600">首页</a>
        <a href="index.html" class="block py-2 text-primary font-semibold">资讯</a>
      </div>
    </div>
  </nav>

  <section class="bg-gradient-to-r from-violet-500 to-purple-500 py-12">
    <div class="max-w-7xl mx-auto px-4">
      <div class="flex items-center gap-4 mb-4">
        <span class="text-5xl">🎭</span>
        <div>
          <h1 class="text-2xl md:text-3xl font-bold text-white">活动资讯</h1>
          <p class="text-violet-100">目的地活动、节庆盛典、文化展演</p>
        </div>
      </div>
    </div>
  </section>

  <div class="bg-white border-b">
    <div class="max-w-7xl mx-auto px-4 py-3">
      <nav class="flex items-center gap-2 text-sm">
        <a href="index.html" class="text-gray-500 hover:text-primary transition">资讯中心</a>
        <span class="text-gray-400">/</span>
        <span class="text-primary">活动资讯</span>
      </nav>
    </div>
  </div>

  <div class="bg-white border-b sticky top-16 z-40">
    <div class="max-w-7xl mx-auto px-4">
      <div class="flex items-center gap-2 py-3 overflow-x-auto">
        <a href="policy.html" class="px-4 py-2 bg-gray-100 text-gray-600 rounded-full text-sm font-medium hover:bg-gray-200 whitespace-nowrap">政策资讯</a>
        <a href="visa.html" class="px-4 py-2 bg-gray-100 text-gray-600 rounded-full text-sm font-medium hover:bg-gray-200 whitespace-nowrap">签证资讯</a>
        <a href="transport.html" class="px-4 py-2 bg-gray-100 text-gray-600 rounded-full text-sm font-medium hover:bg-gray-200 whitespace-nowrap">交通资讯</a>
        <a href="deals.html" class="px-4 py-2 bg-gray-100 text-gray-600 rounded-full text-sm font-medium hover:bg-gray-200 whitespace-nowrap">优惠资讯</a>
        <a href="events.html" class="px-4 py-2 bg-primary text-white rounded-full text-sm font-medium whitespace-nowrap">活动资讯</a>
        <a href="safety.html" class="px-4 py-2 bg-gray-100 text-gray-600 rounded-full text-sm font-medium hover:bg-gray-200 whitespace-nowrap">安全资讯</a>
      </div>
    </div>
  </div>

  <main class="max-w-7xl mx-auto px-4 py-8">
    <div class="flex flex-col lg:flex-row gap-8">
      <div class="flex-1">
        <div class="flex items-center justify-between mb-6">
          <h2 class="text-xl font-bold text-gray-800">资讯列表</h2>
          <span id="articleCount" class="text-gray-500 text-sm">0 篇资讯</span>
        </div>
        <div id="articlesList" class="space-y-4"></div>
        <div id="emptyState" class="hidden text-center py-16">
          <div class="text-6xl mb-4">🎭</div>
          <h3 class="text-xl font-semibold text-gray-800 mb-2">暂无活动资讯</h3>
          <a href="index.html" class="inline-block px-6 py-3 bg-primary text-white rounded-lg font-medium hover:bg-violet-600 transition">返回资讯首页</a>
        </div>
      </div>
      <aside class="lg:w-80">
        <div class="bg-gradient-to-br from-violet-500 to-purple-400 rounded-xl p-6 text-white">
          <h3 class="font-bold mb-2 flex items-center gap-2"><span class="text-xl">🔔</span>订阅推送</h3>
          <p class="text-white/80 text-sm mb-4">第一时间获取最新活动信息</p>
          <a href="subscribe.html" class="block w-full py-2.5 bg-white text-primary text-center rounded-lg font-semibold hover:bg-gray-100 transition">立即订阅</a>
        </div>
      </aside>
    </div>
  </main>

  <footer class="bg-gray-900 text-white py-8 mt-12">
    <div class="max-w-7xl mx-auto px-4 text-center text-gray-500 text-sm">
      <p>&copy; 2024 游导旅游 youdao-travel.com</p>
    </div>
  </footer>

  <script>
    const CATEGORY_ID = 'events';
    document.addEventListener('DOMContentLoaded', async function() {
      try {
        const response = await fetch('../data/news.json');
        const data = await response.json();
        const articles = (data.articles || []).filter(a => a.category === CATEGORY_ID);
        document.getElementById('articleCount').textContent = articles.length + ' 篇资讯';
        if (articles.length === 0) {
          document.getElementById('articlesList').classList.add('hidden');
          document.getElementById('emptyState').classList.remove('hidden');
          return;
        }
        document.getElementById('articlesList').innerHTML = articles.map(article => `
          <a href="detail.html?id=${article.id}" class="news-card bg-white rounded-xl p-4 flex gap-4 shadow-sm hover:shadow-md transition">
            <div class="w-32 h-24 rounded-lg overflow-hidden flex-shrink-0"><img src="${article.image}" alt="${article.title}" class="w-full h-full object-cover"></div>
            <div class="flex-1 min-w-0">
              <h3 class="font-semibold text-gray-800 mb-2 line-clamp-2 hover:text-primary transition">${article.title}</h3>
              <p class="text-sm text-gray-500 line-clamp-2 mb-3">${article.summary}</p>
              <div class="flex items-center gap-4 text-xs text-gray-400"><span>${formatTime(article.publishTime)}</span><span>👁 ${formatNumber(article.viewCount)}</span></div>
            </div>
          </a>
        `).join('');
      } catch (error) { console.error('加载失败:', error); }
    });
    function formatTime(d) { const date = new Date(d), now = new Date(), diff = now - date; if (diff < 3600000) return Math.floor(diff/60000) + '分钟前'; if (diff < 86400000) return Math.floor(diff/3600000) + '小时前'; if (diff < 604800000) return Math.floor(diff/86400000) + '天前'; return date.toLocaleDateString('zh-CN', {month:'short',day:'numeric'}); }
    function formatNumber(n) { return n >= 10000 ? (n/10000).toFixed(1) + '万' : n.toString(); }
    function toggleMenu() { document.getElementById('mobileMenu').classList.toggle('hidden'); }
  </script>
</body>
</html>
