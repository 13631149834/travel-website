<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>资讯搜索 - 游导旅游</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#667eea',
            secondary: '#764ba2',
          }
        }
      }
    }
  </script>
  <link rel="stylesheet" href="../css/news/news.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;600;700&display=swap');
    body { font-family: 'Noto Sans SC', sans-serif; }
  </style>
</head>
<body class="bg-gray-50">
  <nav class="bg-white shadow-sm sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-4 py-4">
      <div class="flex items-center justify-between">
        <a href="../index.html" class="flex items-center gap-2 hover:opacity-80 transition">
          <span class="text-3xl">🧭</span>
          <span class="text-2xl font-bold bg-gradient-to-r from-primary to-secondary bg-clip-text text-transparent">游导旅游</span>
        </a>
        <div class="hidden md:flex items-center gap-8">
          <a href="../index.html" class="text-gray-600 hover:text-primary transition">首页</a>
          <a href="index.html" class="text-primary font-semibold border-b-2 border-primary pb-1">资讯</a>
          <a href="../tools/index.html" class="text-gray-600 hover:text-primary transition">工具箱</a>
        </div>
        <button class="md:hidden text-2xl" onclick="toggleMenu()">☰</button>
      </div>
      <div id="mobileMenu" class="hidden md:hidden mt-4 pb-4 space-y-3 border-t pt-4">
        <a href="../index.html" class="block py-2 text-gray-600">首页</a>
        <a href="index.html" class="block py-2 text-primary font-semibold">资讯</a>
      </div>
    </div>
  </nav>

  <section class="bg-gradient-to-r from-primary to-secondary py-12">
    <div class="max-w-4xl mx-auto px-4">
      <h1 class="text-2xl md:text-3xl font-bold text-white text-center mb-6">搜索资讯</h1>
      <div class="bg-white rounded-xl p-2 flex items-center gap-2 shadow-lg">
        <svg class="w-6 h-6 text-gray-400 ml-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
        </svg>
        <input type="text" id="searchInput" placeholder="搜索感兴趣的旅游资讯..." class="flex-1 py-3 px-2 outline-none text-lg" onkeypress="if(event.key==='Enter') performSearch()">
        <button onclick="performSearch()" class="px-6 py-3 bg-gradient-to-r from-primary to-secondary text-white rounded-lg font-medium hover:opacity-90 transition">搜索</button>
      </div>
    </div>
  </section>

  <main class="max-w-7xl mx-auto px-4 py-8">
    <div class="bg-white rounded-xl shadow-sm p-6 mb-8">
      <div class="mb-6">
        <h3 class="font-semibold text-gray-800 mb-3 flex items-center gap-2">
          <svg class="w-5 h-5 text-primary" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 7h.01M7 3h5c.512 0 1.024.195 1.414.586l7 7a2 2 0 010 2.828l-7 7a2 2 0 01-2.828 0l-7-7A1.994 1.994 0 013 12V7a4 4 0 014-4z"/>
          </svg>
          分类筛选
        </h3>
        <div class="flex flex-wrap gap-2">
          <button onclick="filterByCategory('')" class="filter-tag active" data-category="">全部</button>
          <button onclick="filterByCategory('policy')" class="filter-tag" data-category="policy">📜 政策资讯</button>
          <button onclick="filterByCategory('visa')" class="filter-tag" data-category="visa">📋 签证资讯</button>
          <button onclick="filterByCategory('transport')" class="filter-tag" data-category="transport">✈️ 交通资讯</button>
          <button onclick="filterByCategory('deals')" class="filter-tag" data-category="deals">🎫 优惠资讯</button>
          <button onclick="filterByCategory('events')" class="filter-tag" data-category="events">🎭 活动资讯</button>
          <button onclick="filterByCategory('safety')" class="filter-tag" data-category="safety">🛡️ 安全资讯</button>
        </div>
      </div>

      <div class="mb-6">
        <h3 class="font-semibold text-gray-800 mb-3 flex items-center gap-2">
          <svg class="w-5 h-5 text-primary" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/>
          </svg>
          时间范围
        </h3>
        <div class="flex flex-wrap gap-2">
          <button onclick="filterByTime('')" class="filter-tag active" data-time="">不限</button>
          <button onclick="filterByTime('today')" class="filter-tag" data-time="today">今天</button>
          <button onclick="filterByTime('week')" class="filter-tag" data-time="week">近一周</button>
          <button onclick="filterByTime('month')" class="filter-tag" data-time="month">近一月</button>
          <button onclick="filterByTime('year')" class="filter-tag" data-time="year">近一年</button>
        </div>
      </div>

      <div>
        <h3 class="font-semibold text-gray-800 mb-3 flex items-center gap-2">
          <svg class="w-5 h-5 text-primary" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 4h13M3 8h9m-9 4h6m4 0l4-4m0 0l4 4m-4-4v12"/>
          </svg>
          排序方式
        </h3>
        <div class="flex flex-wrap gap-2">
          <button onclick="filterBySort('time')" class="filter-tag active" data-sort="time">最新发布</button>
          <button onclick="filterBySort('views')" class="filter-tag" data-sort="views">最多浏览</button>
          <button onclick="filterBySort('likes')" class="filter-tag" data-sort="likes">最多点赞</button>
        </div>
      </div>
    </div>

    <div class="mb-4">
      <p class="text-gray-600">
        <span id="resultCount">0</span> 条相关资讯
        <span id="searchKeyword" class="text-primary font-semibold"></span>
      </p>
    </div>

    <div id="searchResults" class="grid md:grid-cols-2 lg:grid-cols-3 gap-6"></div>

    <div id="emptyState" class="hidden text-center py-16">
      <div class="text-6xl mb-4">🔍</div>
      <h3 class="text-xl font-semibold text-gray-800 mb-2">暂无相关资讯</h3>
      <p class="text-gray-500 mb-6">换个关键词试试，或浏览其他分类</p>
      <a href="index.html" class="inline-block px-6 py-3 bg-gradient-to-r from-primary to-secondary text-white rounded-lg font-medium hover:opacity-90 transition">返回资讯首页</a>
    </div>

    <div id="loadMore" class="text-center mt-8 hidden">
      <button onclick="loadMoreResults()" class="px-8 py-3 border-2 border-primary text-primary rounded-lg font-medium hover:bg-primary hover:text-white transition">加载更多</button>
    </div>
  </main>

  <footer class="bg-gray-900 text-white py-12 mt-12">
    <div class="max-w-7xl mx-auto px-4 text-center text-gray-500 text-sm">
      <p>&copy; 2024 游导旅游 youdao-travel.com</p>
    </div>
  </footer>

  <script src="js/search.js"></script>
</body>
</html>
