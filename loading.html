<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>加载中... | 游导旅游</title>
  <link rel="icon" href="images/favicon.svg">
  <link rel="stylesheet" href="css/loading.css">
  <style>
    body {
      margin: 0;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
    }
  
/* 无障碍 - 焦点可见样式 (WCAG 2.1 AA) */
.skip-link {
  position: absolute;
  top: -100px;
  left: 50%;
  transform: translateX(-50%);
  background: var(--primary);
  color: #fff !important;
  padding: 12px 24px;
  border-radius: 0 0 8px 8px;
  z-index: 10000;
  font-weight: 600;
  transition: top 0.2s;
}
.skip-link:focus {
  top: 0;
  outline: 3px solid var(--primary-dark);
  outline-offset: 2px;
}

/* 全局焦点样式 */
:focus {
  outline: 3px solid var(--primary);
  outline-offset: 2px;
}
:focus:not(:focus-visible) {
  outline: none;
}
:focus-visible {
  outline: 3px solid var(--primary);
  outline-offset: 2px;
}

/* 链接焦点样式 */
a:focus,
button:focus,
[tabindex]:focus {
  outline: 3px solid var(--primary);
  outline-offset: 2px;
  border-radius: 2px;
}

/* 输入框焦点 */
input:focus,
textarea:focus,
select:focus {
  outline: 3px solid var(--primary);
  outline-offset: 0;
  border-color: var(--primary);
}

</style>
  <!-- PWA Meta Tags -->
  <meta name="theme-color" content="#3b82f6">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="游导旅游">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="images/icon-192.png">
  <!-- Favicon & App Icons -->
  <link rel="icon" type="image/x-icon" href="images/favicon.ico">
  <link rel="icon" type="image/png" sizes="16x16" href="images/icons/favicon-16x16.png">
  <link rel="icon" type="image/png" sizes="32x32" href="images/icons/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="64x64" href="images/icons/favicon-64x64.png">
  <link rel="apple-touch-icon" sizes="180x180" href="images/apple-touch-icon.png">
  <meta name="msapplication-TileImage" content="images/icon-192.png">
  <meta name="msapplication-TileColor" content="#4F86F7">
  <meta name="theme-color" content="#4F86F7">
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="css/mobile.css">
</head>
<body>

<!-- 无障碍 - 状态消息区域 -->
<div id="status-message" class="sr-only" aria-live="polite" aria-atomic="true"></div>
<div id="alert-message" class="sr-only" aria-live="assertive" aria-atomic="true"></div>

<!-- 无障碍 - 屏幕阅读器专用样式 -->
<style>
.sr-only {
  position: absolute;
  width: 1px;
  height: 1px;
  padding: 0;
  margin: -1px;
  overflow: hidden;
  clip: rect(0, 0, 0, 0);
  white-space: nowrap;
  border: 0;
}
.sr-only-focusable:focus,
.sr-only-focusable:active {
  position: static;
  width: auto;
  height: auto;
  margin: 0;
  overflow: visible;
  clip: auto;
  white-space: normal;
}
</style>

  <!-- 跳转到主内容链接 - 屏幕阅读器用户快速导航 -->
  <a href="#main-content" class="skip-link">跳转到主内容</a>
  <a href="#main-nav" class="skip-link">跳转到导航</a>
  <a href="#main-footer" class="skip-link">跳转到页脚</a>

  <!-- 全屏加载动画 -->
  <div class="full-loading" id="loadingScreen">
    <div class="logo">
      <span class="logo-icon">🧭</span>
      <span>游导旅游</span>
    </div>
    <p class="loading-text loading-text-anim">正在准备精彩的旅行...</p>
    <div class="loading-bar-container">
<main id="main-content" role="main">
      <div class="loading-bar"></div>
    </div>
    <div class="loading-dots">
      <span></span>
      <span></span>
      <span></span>
    </div>
  </div>

  <script>
    // 模拟加载完成
    window.addEventListener('load', function() {
      setTimeout(function() {
        document.getElementById('loadingScreen').classList.add('hidden');
        // 加载完成后可以显示页面内容
        // document.getElementById('mainContent').style.display = 'block';
      }, 1500);
    });
  </script>
  <script src="js/performance.js" defer></script>
  <script src="js/enhanced-common.js" defer></script>

  <!-- PWA Service Worker -->
  <script src="js/pwa.js" defer></script>
  <script src="js/mobile.js" defer></script>
  <script src="js/customer-service.js" defer></script>
</body>
</html>
