    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #059669 0%, #047857 50%, #065F46 100%);

        }
        
        /* 导航栏 */
        .navbar {
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(10px);
            padding: 15px 0;
            box-shadow: 0 2px 20px rgba(0,0,0,0.1);
            position: sticky;
            top: 0;
            z-index: 100;
        }
        
        .navbar .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        
        .navbar .logo {
            font-size: 24px;
            color: #059669;
            text-decoration: none;
            font-weight: bold;
        }
        
        .navbar .back-link {
            color: #059669;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 14px;

        .navbar .back-link:hover {

        }
        
        /* 主容器 */
        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 40px 20px;
        }
        
        /* 页面标题 */
        .page-header {
            text-align: center;
            color: white;
            margin-bottom: 40px;
        }
        
        .page-header .icon {
            font-size: 60px;
            margin-bottom: 15px;
        }
        
        .page-header h1 {
            font-size: 36px;
            margin-bottom: 10px;
            text-shadow: 0 2px 10px rgba(0,0,0,0.2);
        }
        
        .page-header p {
            font-size: 16px;
            opacity: 0.9;
        }
        
        /* 换算卡片 */
        .exchange-card {
            background: white;
            border-radius: 24px;
            padding: 35px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.2);
            margin-bottom: 30px;
        }
        
        /* 金额输入 */
        .amount-input {
            margin-bottom: 25px;
        }
        
        .amount-input label {
            display: block;
            font-size: 14px;
            color: #64748B;
            margin-bottom: 10px;
        }
        
        .amount-input input {
            width: 100%;
            padding: 18px 20px;
            border: 2px solid #E5E7EB;
            border-radius: 14px;
            font-size: 28px;
            font-weight: 600;
            text-align: center;
            color: #1E293B;
            transition: all 0.3s;
        }
        
        .amount-input input:focus {
            outline: none;
            border-color: #059669;
            box-shadow: 0 0 0 4px rgba(5, 150, 105, 0.1);
        }
        
        .amount-input input::placeholder {
            color: #CBD5E1;
            font-weight: 400;
        }
        
        /* 货币选择 */
        .currency-selectors {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 30px;
        }
        
        .currency-box {
            flex: 1;
        }
        
        .currency-box label {
            display: block;
            font-size: 13px;
            color: #64748B;
            margin-bottom: 8px;
        }
        
        .currency-select {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid #E5E7EB;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            color: #1E293B;
            background: white;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .currency-select:focus {
            outline: none;
            border-color: #059669;
        }
        
        .swap-btn {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            border: none;
            background: linear-gradient(135deg, #059669 0%, #047857 100%);
            color: white;
            font-size: 24px;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-top: 22px;
        }
        
        .swap-btn:hover {
            transform: rotate(180deg) scale(1.1);
            box-shadow: 0 8px 25px rgba(5, 150, 105, 0.4);
        }
        
        /* 结果显示 */
        .result-box {
            background: linear-gradient(135deg, #ECFDF5 0%, #D1FAE5 100%);
            border-radius: 20px;
            padding: 30px;
            text-align: center;
            margin-bottom: 25px;
        }
        
        .result-label {
            font-size: 14px;
            color: #047857;
            margin-bottom: 10px;
        }
        
        .result-amount {
            font-size: 42px;
            font-weight: 700;
            color: #065F46;
            margin-bottom: 10px;
        }
        
        .result-rate {
            font-size: 14px;
            color: #059669;
        }
        
        /* 快捷货币 */
        .quick-currencies {
            margin-bottom: 25px;
        }
        
        .quick-currencies-title {
            font-size: 14px;
            color: #64748B;
            margin-bottom: 12px;
        }
        
        .currency-chips {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }
        
        .currency-chip {
            padding: 10px 18px;
            background: #F1F5F9;
            border: 2px solid transparent;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 500;
            color: #475569;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .currency-chip:hover {
            background: #E2E8F0;
        }
        
        .currency-chip.active {
            background: #ECFDF5;
            border-color: #059669;
            color: #047857;
        }
        
        .currency-chip .flag {
            font-size: 20px;
        }
        
        /* 汇率列表 */
        .rates-list {
            background: white;
            border-radius: 20px;
            padding: 25px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
        }
        
        .rates-title {
            font-size: 16px;
            font-weight: 600;
            color: #1E293B;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .rate-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 15px 0;
            border-bottom: 1px solid #F1F5F9;
        }
        
        .rate-item:last-child {
            border-bottom: none;
        }
        
        .rate-item-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .rate-item .flag {
            font-size: 28px;
        }
        
        .rate-item .currency-name {
            font-weight: 600;
            color: #1E293B;
            font-size: 15px;
        }
        
        .rate-item .currency-code {
            font-size: 13px;
            color: #64748B;
        }
        
        .rate-item .rate-value {
            font-weight: 600;
            color: #059669;
            font-size: 16px;
        }
        
        /* 更新时间 */
        .update-time {
            text-align: center;
            font-size: 12px;
            color: #94A3B8;
            margin-top: 15px;
        }
        
        /* 响应式 */
        @media (max-width: 768px) {
            .container {
                padding: 20px 15px;
            }
            
            .page-header h1 {
                font-size: 28px;
            }
            
            .currency-selectors {
                flex-direction: column;
            }
            
            .swap-btn {
                transform: rotate(90deg);
                margin: 10px 0;
            }
            
            .swap-btn:hover {
                transform: rotate(270deg) scale(1.1);
            }
            
            .result-amount {
                font-size: 32px;
            }
            
            .amount-input input {
                font-size: 22px;
            }
        }

/* 全局焦点样式 */

  outline: 3px solid var(--primary);
  outline-offset: 2px;
}
:focus:not(:focus-visible) {
  outline: none;
}
:focus-visible {
  outline: 3px solid var(--primary);
  outline-offset: 2px;
}

/* 链接焦点样式 */
a:focus,
button:focus,
[tabindex]:focus {
  outline: 3px solid var(--primary);
  outline-offset: 2px;
  border-radius: 2px;
}

/* 输入框焦点 */
input:focus,
textarea:focus,
select:focus {
  outline: 3px solid var(--primary);
  outline-offset: 0;
  border-color: var(--primary);
}

    <div class="container">
        <!-- 页面标题 -->
        <div class="page-header">
            <div class="icon">💱</div>
            <h1>汇率换算</h1>
            <p>实时汇率，助你轻松换算各国货币</p>

            <!-- 金额输入 -->
            <div class="amount-input">
                <label>输入金额</label>
                <input type="number" id="amountInput" placeholder="0" value="100" oninput="calculate()">
            </div>
            
            <!-- 货币选择 -->
            <div class="currency-selectors">
                <div class="currency-box">
                    <label>源货币</label>
                    <select class="currency-select" id="fromCurrency" onchange="calculate()">

                <button class="swap-btn" onclick="swapCurrencies()" title="交换货币">⇄</button>
                
                <div class="currency-box">
                    <label>目标货币</label>
                    <select class="currency-select" id="toCurrency" onchange="calculate()">
                        <option value="CNY">🇨🇳 人民币 (CNY)</option>
                        <option value="USD" selected>🇺🇸 美元 (USD)</option>
                        <option value="EUR">🇪🇺 欧元 (EUR)</option>
                        <option value="GBP">🇬🇧 英镑 (GBP)</option>
                        <option value="JPY" selected>🇯🇵 日元 (JPY)</option>
                        <option value="THB" selected>🇹🇭 泰铢 (THB)</option>
                        <option value="AUD">🇦🇺 澳元 (AUD)</option>
                        <option value="KRW">🇰🇷 韩元 (KRW)</option>
                        <option value="SGD">🇸🇬 新加坡元 (SGD)</option>

                    </select>
                </div>

                <div class="result-rate" id="resultRate">汇率：1 CNY = 0.14 USD</div>
            </div>

            <div class="quick-currencies">
                <div class="quick-currencies-title">💡 常用货币快捷换算（以100元为基准）：</div>
                <div class="currency-chips" id="quickChips">

                </div>
            </div>
        </div>
        
        <!-- 汇率列表 -->
        <div class="rates-list">
            <div class="rates-title">📊 人民币兑主要货币汇率</div>
            <div id="ratesContainer">
                <!-- 动态生成 -->
            </div>
            <div class="update-time">数据更新时间：2024年（仅供参考，以实际交易汇率为准）</div>
        </div>
        
        <!-- 免责声明 -->
        <div style="background: rgba(255,255,255,0.9); border-radius: 16px; padding: 20px; margin-top: 20px; text-align: center;">
            <p style="color: #64748B; font-size: 13px; line-height: 1.6;">
                ⚠️ <strong>免责声明</strong><br>
                本页面提供的汇率数据仅供参考，不构成任何投资建议。<br>
                实际交易汇率可能因银行、支付平台和时间而有所不同。<br>

            </p>

    <script>
        // 汇率数据（基于2024年平均汇率，数据仅供参考）
        const exchangeRates = {
            CNY: 1,
            USD: 7.24,
            EUR: 7.82,
            GBP: 9.15,
            JPY: 0.048,
            THB: 0.20,
            AUD: 4.72,
            KRW: 0.0054,
            SGD: 5.38,
            HKD: 0.93
        };
        
        // 货币信息
        const currencyInfo = {
            CNY: { flag: '🇨🇳', name: '人民币', symbol: '¥' },
            USD: { flag: '🇺🇸', name: '美元', symbol: '$' },
            EUR: { flag: '🇪🇺', name: '欧元', symbol: '€' },
            GBP: { flag: '🇬🇧', name: '英镑', symbol: '£' },
            JPY: { flag: '🇯🇵', name: '日元', symbol: '¥' },
            THB: { flag: '🇹🇭', name: '泰铢', symbol: '฿' },
            AUD: { flag: '🇦🇺', name: '澳元', symbol: 'A$' },
            KRW: { flag: '🇰🇷', name: '韩元', symbol: '₩' },
            SGD: { flag: '🇸🇬', name: '新加坡元', symbol: 'S$' },
            HKD: { flag: '🇭🇰', name: '港币', symbol: 'HK$' }
        };
        
        // 常用货币列表
        const popularCurrencies = ['USD', 'JPY', 'KRW', 'THB', 'EUR', 'GBP', 'SGD'];
        
        // 计算换算
        function calculate() {
            const amount = parseFloat(document.getElementById('amountInput').value) || 0;
            const fromCurrency = document.getElementById('fromCurrency').value;
            const toCurrency = document.getElementById('toCurrency').value;
            
            // 转换为人民币再转换为目标货币
            const amountInCNY = amount / exchangeRates[fromCurrency];
            const result = amountInCNY * exchangeRates[toCurrency];
            
            // 计算汇率
            const rate = exchangeRates[toCurrency] / exchangeRates[fromCurrency];
            
            // 更新显示
            const fromInfo = currencyInfo[fromCurrency];
            const toInfo = currencyInfo[toCurrency];
            
            document.getElementById('resultLabel').textContent = `${fromInfo.name} → ${toInfo.name}`;
            document.getElementById('resultAmount').textContent = `${toInfo.symbol} ${formatNumber(result)}`;
            document.getElementById('resultRate').textContent = `1 ${fromCurrency} = ${rate.toFixed(4)} ${toCurrency}`;
        }
        
        // 交换货币
        function swapCurrencies() {
            const fromCurrency = document.getElementById('fromCurrency');
            const toCurrency = document.getElementById('toCurrency');
            
            const temp = fromCurrency.value;
            fromCurrency.value = toCurrency.value;
            toCurrency.value = temp;
            
            calculate();
        }
        
        // 快捷换算
        function quickConvert(from, to, amount) {
            document.getElementById('fromCurrency').value = from;
            document.getElementById('toCurrency').value = to;
            document.getElementById('amountInput').value = amount;
            calculate();
        }
        
        // 渲染快捷货币按钮
        function renderQuickChips() {
            const container = document.getElementById('quickChips');
            const fromCurrency = 'CNY';
            
            container.innerHTML = popularCurrencies.map(toCurrency => {
                const fromInfo = currencyInfo[fromCurrency];
                const toInfo = currencyInfo[toCurrency];
                const rate = exchangeRates[toCurrency] / exchangeRates[fromCurrency];
                const result = 100 * rate;
                
                return `
                    <button class="currency-chip" onclick="quickConvert('${fromCurrency}', '${toCurrency}', 100)" title="1 ${fromCurrency} = ${rate.toFixed(4)} ${toCurrency}">
                        <span class="flag">${fromInfo.flag}</span> → <span class="flag">${toInfo.flag}</span>
                        <span style="margin-left: 4px;">${toInfo.symbol}${formatNumber(result)}</span>
                    </button>
                `;
            }).join('');
        }
        
        // 添加美元反向快捷按钮
        function renderAdditionalChips() {
            const container = document.getElementById('quickChips');
            const additionalChips = `
                <button class="currency-chip" onclick="quickConvert('USD', 'CNY', 100)" title="美元换人民币">
                    <span class="flag" aria-hidden="true">🇺🇸</span> 100$ → <span class="flag" aria-hidden="true">🇨🇳</span> ¥
                </button>
                <button class="currency-chip" onclick="quickConvert('USD', 'JPY', 100)" title="美元换日元">
                    <span class="flag" aria-hidden="true">🇺🇸</span> 100$ → <span class="flag" aria-hidden="true">🇯🇵</span> ¥
                </button>
                <button class="currency-chip" onclick="quickConvert('USD', 'KRW', 100)" title="美元换韩元">
                    <span class="flag" aria-hidden="true">🇺🇸</span> 100$ → <span class="flag" aria-hidden="true">🇰🇷</span> ₩
                </button>
                <button class="currency-chip" onclick="quickConvert('USD', 'THB', 100)" title="美元换泰铢">
                    <span class="flag" aria-hidden="true">🇺🇸</span> 100$ → <span class="flag" aria-hidden="true">🇹🇭</span> ฿
                </button>
            `;
            container.innerHTML += additionalChips;
        }
        
        // 格式化数字
        function formatNumber(num) {
            if (num >= 10000) {
                return num.toLocaleString('en-US', { maximumFractionDigits: 0 });
            } else if (num >= 100) {
                return num.toFixed(2);
            } else {
                return num.toFixed(4);
            }
        }
        
        // 渲染汇率列表
        function renderRatesList() {
            const container = document.getElementById('ratesContainer');
            const baseCurrency = 'CNY';
            
            const currencies = ['USD', 'EUR', 'GBP', 'JPY', 'THB', 'AUD', 'KRW', 'SGD', 'HKD'];
            
            container.innerHTML = currencies.map(currency => {
                const rate = exchangeRates[currency] / exchangeRates[baseCurrency];
                const info = currencyInfo[currency];
                
                return `
                    <div class="rate-item">
                        <div class="rate-item-left">
                            <span class="flag">${info.flag}</span>
                            <div>
                                <div class="currency-name">${info.name}</div>
                                <div class="currency-code">${currency}</div>
                            </div>
                        </div>
                        <div class="rate-value">${rate.toFixed(4)}</div>
                    </div>
                `;
            }).join('');
        }
        
        // 页面加载时初始化
        document.addEventListener('DOMContentLoaded', () => {
            calculate();
            renderRatesList();
            renderQuickChips();
            renderAdditionalChips();
        });
    </script>
