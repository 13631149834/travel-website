<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>导游入驻 - 游导旅游</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/guide/profile.css">
    <style>
        .apply-container {
            max-width: 800px;
            margin: 0 auto;
            padding: 40px 20px;
        }
        
        .apply-header {
            text-align: center;
            margin-bottom: 40px;
        }
        
        .apply-header h1 {
            font-size: 28px;
            color: #333;
            margin-bottom: 10px;
        }
        
        .apply-header p {
            color: #666;
        }
        
        .apply-steps {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 40px;
        }
        
        .step-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 20px;
            border-radius: 30px;
            background: #F3F4F6;
            color: #9CA3AF;
        }
        
        .step-item.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        
        .step-item.completed {
            background: #10B981;
            color: white;
        }
        
        .step-num {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background: rgba(255,255,255,0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            font-weight: 600;
        }
        
        .apply-form {
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
        }
        
        .form-section {
            margin-bottom: 30px;
        }
        
        .form-section h3 {
            font-size: 18px;
            color: #333;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid #F3F4F6;
        }
        
        .form-row {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-group.full-width {
            grid-column: 1 / -1;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 500;
        }
        
        .form-group label .required {
            color: #EF4444;
        }
        
        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #E5E7EB;
            border-radius: 10px;
            font-size: 16px;
            transition: all 0.3s;
        }
        
        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }
        
        .form-group textarea {
            resize: vertical;
            min-height: 100px;
        }
        
        .tag-selector {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }
        
        .tag-btn {
            padding: 8px 16px;
            border: 2px solid #E5E7EB;
            border-radius: 20px;
            background: white;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 14px;
        }
        
        .tag-btn:hover {
            border-color: #667eea;
        }
        
        .tag-btn.selected {
            border-color: #667eea;
            background: rgba(102, 126, 234, 0.1);
            color: #667eea;
        }
        
        .file-upload {
            border: 2px dashed #E5E7EB;
            border-radius: 10px;
            padding: 30px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .file-upload:hover {
            border-color: #667eea;
            background: rgba(102, 126, 234, 0.05);
        }
        
        .file-upload .icon {
            font-size: 40px;
            margin-bottom: 10px;
        }
        
        .file-upload .text {
            color: #666;
            font-size: 14px;
        }
        
        .file-upload .hint {
            color: #999;
            font-size: 12px;
            margin-top: 5px;
        }
        
        .submit-section {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 30px;
        }
        
        .btn-submit {
            padding: 14px 40px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
        }
        
        .btn-submit:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        
        .btn-secondary {
            padding: 14px 40px;
            background: white;
            color: #667eea;
            border: 2px solid #667eea;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .btn-secondary:hover {
            background: rgba(102, 126, 234, 0.1);
        }
        
        @media (max-width: 768px) {
            .form-row {
                grid-template-columns: 1fr;
            }
            
            .apply-steps {
                flex-direction: column;
                align-items: center;
            }
        }
    </style>
</head>
<body>
    <div class="apply-container">
        <div class="apply-header">
            <h1>🎤 导游入驻申请</h1>
            <p>填写资料，成为认证导游，开启专业服务之旅</p>
        </div>
        
        <div class="apply-steps">
            <div class="step-item active" data-step="1">
                <span class="step-num">1</span>
                <span>基本信息</span>
            </div>
            <div class="step-item" data-step="2">
                <span class="step-num">2</span>
                <span>资质认证</span>
            </div>
            <div class="step-item" data-step="3">
                <span class="step-num">3</span>
                <span>服务范围</span>
            </div>
        </div>
        
        <form id="applyForm" class="apply-form">
            <!-- 步骤1：基本信息 -->
            <div class="step-content" data-step="1">
                <div class="form-section">
                    <h3>👤 个人信息</h3>
                    <div class="form-row">
                        <div class="form-group">
                            <label>真实姓名 <span class="required">*</span></label>
                            <input type="text" id="name" placeholder="请输入真实姓名" required>
                        </div>
                        <div class="form-group">
                            <label>手机号码 <span class="required">*</span></label>
                            <input type="tel" id="phone" placeholder="请输入手机号码" required>
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>微信号</label>
                            <input type="text" id="wechat" placeholder="请输入微信号（选填）">
                        </div>
                        <div class="form-group">
                            <label>电子邮箱</label>
                            <input type="email" id="email" placeholder="请输入邮箱（选填）">
                        </div>
                    </div>
                </div>
                
                <div class="form-section">
                    <h3>🌐 服务语言</h3>
                    <div class="tag-selector" id="languageTags">
                        <button type="button" class="tag-btn" data-value="普通话">普通话</button>
                        <button type="button" class="tag-btn" data-value="粤语">粤语</button>
                        <button type="button" class="tag-btn" data-value="英语">英语</button>
                        <button type="button" class="tag-btn" data-value="日语">日语</button>
                        <button type="button" class="tag-btn" data-value="韩语">韩语</button>
                        <button type="button" class="tag-btn" data-value="法语">法语</button>
                        <button type="button" class="tag-btn" data-value="德语">德语</button>
                        <button type="button" class="tag-btn" data-value="西班牙语">西班牙语</button>
                    </div>
                </div>
            </div>
            
            <!-- 步骤2：资质认证 -->
            <div class="step-content" data-step="2" style="display: none;">
                <div class="form-section">
                    <h3>📋 导游资质</h3>
                    <div class="form-row">
                        <div class="form-group">
                            <label>导游证号 <span class="required">*</span></label>
                            <input type="text" id="licenseNo" placeholder="请输入导游证编号" required>
                        </div>
                        <div class="form-group">
                            <label>导游等级</label>
                            <select id="licenseLevel">
                                <option value="初级">初级导游</option>
                                <option value="中级">中级导游</option>
                                <option value="高级">高级导游</option>
                                <option value="特级">特级导游</option>
                            </select>
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>从业年限 <span class="required">*</span></label>
                            <select id="years">
                                <option value="1">1年以下</option>
                                <option value="2">1-3年</option>
                                <option value="5">3-5年</option>
                                <option value="8">5-10年</option>
                                <option value="15">10年以上</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>所属旅行社</label>
                            <input type="text" id="agency" placeholder="请输入旅行社名称（选填）">
                        </div>
                    </div>
                </div>
                
                <div class="form-section">
                    <h3>📷 证书照片</h3>
                    <div class="file-upload" id="certificateUpload">
                        <div class="icon">📸</div>
                        <div class="text">点击上传导游证照片</div>
                        <div class="hint">支持 JPG、PNG 格式，大小不超过 5MB</div>
                        <input type="file" id="certificateFile" accept="image/*" style="display: none;">
                    </div>
                    <div id="certificatePreview" style="display: none; margin-top: 15px;"></div>
                </div>
            </div>
            
            <!-- 步骤3：服务范围 -->
            <div class="step-content" data-step="3" style="display: none;">
                <div class="form-section">
                    <h3>🎯 擅长领域</h3>
                    <div class="tag-selector" id="specialtyTags">
                        <button type="button" class="tag-btn" data-value="历史文化">历史文化</button>
                        <button type="button" class="tag-btn" data-value="自然风光">自然风光</button>
                        <button type="button" class="tag-btn" data-value="美食探店">美食探店</button>
                        <button type="button" class="tag-btn" data-value="摄影打卡">摄影打卡</button>
                        <button type="button" class="tag-btn" data-value="亲子研学">亲子研学</button>
                        <button type="button" class="tag-btn" data-value="户外探险">户外探险</button>
                        <button type="button" class="tag-btn" data-value="购物血拼">购物血拼</button>
                        <button type="button" class="tag-btn" data-value="宗教文化">宗教文化</button>
                    </div>
                </div>
                
                <div class="form-section">
                    <h3>📍 服务城市</h3>
                    <div class="form-group">
                        <input type="text" id="cities" placeholder="请输入服务城市，多个城市用逗号分隔">
                    </div>
                </div>
                
                <div class="form-section">
                    <h3>📝 个人简介</h3>
                    <div class="form-group">
                        <textarea id="bio" placeholder="介绍一下自己吧，让游客更了解你的风格和特长..."></textarea>
                    </div>
                </div>
                
                <div class="form-section">
                    <h3>✅ 服务类型</h3>
                    <div class="tag-selector" id="serviceTypes">
                        <button type="button" class="tag-btn" data-value="私人定制">私人定制</button>
                        <button type="button" class="tag-btn" data-value="跟团游">跟团游</button>
                        <button type="button" class="tag-btn" data-value="包车服务">包车服务</button>
                        <button type="button" class="tag-btn" data-value="景点讲解">景点讲解</button>
                    </div>
                </div>
            </div>
            
            <div class="submit-section">
                <button type="button" class="btn-secondary" id="prevBtn" style="display: none;">上一步</button>
                <button type="button" class="btn-submit" id="nextBtn">下一步</button>
                <button type="submit" class="btn-submit" id="submitBtn" style="display: none;">提交申请</button>
            </div>
        </form>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase-config.js"></script>
    <script>
        let currentStep = 1;
        let selectedLanguages = [];
        let selectedSpecialties = [];
        let selectedServiceTypes = [];
        
        // 检查登录状态
        Auth.getUser().then(async user => {
            if (!user) {
                window.location.href = 'login.html?redirect=guide-apply.html';
                return;
            }
            
            // 检查是否已有导游资料
            const { data } = await DB.guideProfiles.getByUserId(user.id);
            if (data) {
                Utils.showToast('您已提交导游资料', 'info');
                window.location.href = 'profile.html';
            }
        });
        
        // 标签选择
        function setupTagSelector(containerId, selectedArray) {
            const container = document.getElementById(containerId);
            container.querySelectorAll('.tag-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    const value = btn.dataset.value;
                    if (selectedArray.includes(value)) {
                        selectedArray = selectedArray.filter(v => v !== value);
                        btn.classList.remove('selected');
                    } else {
                        selectedArray.push(value);
                        btn.classList.add('selected');
                    }
                });
            });
        }
        
        setupTagSelector('languageTags', selectedLanguages);
        setupTagSelector('specialtyTags', selectedSpecialties);
        setupTagSelector('serviceTypes', selectedServiceTypes);
        
        // 文件上传
        const uploadArea = document.getElementById('certificateUpload');
        const fileInput = document.getElementById('certificateFile');
        const preview = document.getElementById('certificatePreview');
        
        uploadArea.addEventListener('click', () => fileInput.click());
        
        fileInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    preview.innerHTML = `<img src="${e.target.result}" style="max-width: 200px; border-radius: 10px;">`;
                    preview.style.display = 'block';
                };
                reader.readAsDataURL(file);
            }
        });
        
        // 步骤切换
        function updateSteps() {
            document.querySelectorAll('.step-item').forEach((item, index) => {
                item.classList.remove('active', 'completed');
                if (index + 1 < currentStep) {
                    item.classList.add('completed');
                } else if (index + 1 === currentStep) {
                    item.classList.add('active');
                }
            });
            
            document.querySelectorAll('.step-content').forEach(content => {
                content.style.display = content.dataset.step == currentStep ? 'block' : 'none';
            });
            
            document.getElementById('prevBtn').style.display = currentStep > 1 ? 'block' : 'none';
            document.getElementById('nextBtn').style.display = currentStep < 3 ? 'block' : 'none';
            document.getElementById('submitBtn').style.display = currentStep === 3 ? 'block' : 'none';
        }
        
        document.getElementById('nextBtn').addEventListener('click', () => {
            if (currentStep < 3) {
                currentStep++;
                updateSteps();
            }
        });
        
        document.getElementById('prevBtn').addEventListener('click', () => {
            if (currentStep > 1) {
                currentStep--;
                updateSteps();
            }
        });
        
        // 提交表单
        document.getElementById('applyForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const user = await Auth.getUser();
            if (!user) return;
            
            const submitBtn = document.getElementById('submitBtn');
            submitBtn.disabled = true;
            submitBtn.textContent = '提交中...';
            
            const profile = {
                user_id: user.id,
                name: document.getElementById('name').value,
                phone: document.getElementById('phone').value,
                wechat: document.getElementById('wechat').value,
                email: document.getElementById('email').value || user.email,
                languages: selectedLanguages,
                license_no: document.getElementById('licenseNo').value,
                license_level: document.getElementById('licenseLevel').value,
                years: parseInt(document.getElementById('years').value),
                agency: document.getElementById('agency').value,
                specialties: selectedSpecialties,
                cities: document.getElementById('cities').value.split(',').map(c => c.trim()),
                bio: document.getElementById('bio').value,
                service_types: selectedServiceTypes,
                verified: false,
                created_at: new Date().toISOString()
            };
            
            const { data, error } = await DB.guideProfiles.create(profile);
            
            if (error) {
                submitBtn.disabled = false;
                submitBtn.textContent = '提交申请';
                Utils.showToast('提交失败：' + error.message, 'error');
                return;
            }
            
            Utils.showToast('申请提交成功！等待审核', 'success');
            setTimeout(() => {
                window.location.href = 'profile.html';
            }, 1500);
        });
    </script>
</body>
</html>
