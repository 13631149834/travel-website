<style>
.page-loading-bar{position:fixed;top:0;left:0;height:3px;background:linear-gradient(90deg,#E65100,#FF6D00,#FFB74D);z-index:9999;transition:width .3s ease;width:0;opacity:0}
.page-loading-bar.active{opacity:1}
.page-loading-bar.done{opacity:0;transition:width .2s ease,opacity .5s ease .3s}
</style>
<div class="page-loading-bar" id="loadingBar"></div>
<script>
// 加载进度条
(function(){
  const bar=document.getElementById('loadingBar');
  let w=0;
  function startLoad(){w=0;bar.style.width='0';bar.classList.add('active');bar.classList.remove('done');
    const t=setInterval(()=>{w+=Math.random()*25;if(w>=80){clearInterval(t);bar.style.width='80%'}else{bar.style.width=w+'%'}},150);
    window._loadTimer=t}
  function endLoad(){clearInterval(window._loadTimer);bar.style.width='100%';bar.classList.add('done');
    setTimeout(()=>{bar.classList.remove('active');bar.classList.remove('done');bar.style.width='0'},800)}
  startLoad();
  if(document.readyState==='complete'){endLoad()}else{window.addEventListener('load',endLoad)}
  // 页面跳转时显示进度条
  document.addEventListener('click',function(e){
    const a=e.target.closest('a');
    if(a&&a.href&&!a.target&&!a.href.startsWith('javascript')&&!a.href.startsWith('#')&&a.origin===location.origin){
      startLoad()}
  });
})();
</script>

<script>
var searchData = [];
var searchInput = document.getElementById('searchInput');
var resultsEl = document.getElementById('searchResults');

// 加载搜索索引
fetch('/search-index.json').then(r=>r.json()).then(data=>{
  searchData = data;
  // 检查URL参数
  var params = new URLSearchParams(window.location.search);
  var q = params.get('q');
  if(q){searchInput.value=q;doSearch(q);}
}).catch(e=>{console.log('搜索索引加载失败',e)});

searchInput.addEventListener('input',function(){
  var q=this.value.trim();
  if(q.length<2){resultsEl.innerHTML='<div class="no-result"><div class="emoji">📚</div><p>输入2个字以上开始搜索</p></div>';return;}
  doSearch(q);
});

function doSearch(q){
  if(!searchData.length)return;
  searchInput.value=q;
  q=q.toLowerCase();
  var results=[];
  searchData.forEach(function(item){
    var score=0;
    var title=item.title.toLowerCase();
    var kw=item.keywords;
    if(title.indexOf(q)>-1)score+=10;
    if(kw.indexOf(q)>-1)score+=5;
    if(score>0)results.push({item:item,score:score});
  });
  results.sort(function(a,b){return b.score-a.score;});
  
  if(!results.length){
    resultsEl.innerHTML='<div class="no-result"><div class="emoji">🤔</div><p>没找到"'+q+'"相关内容</p><p style="font-size:0.82rem;color:#94A3B8;margin-top:8px;">试试换个关键词，或去<a href="/chat.html" style="color:#E65100;">问AI助手</a></p></div>';
    return;
  }
  
  var html='';
  results.slice(0,15).forEach(function(r){
    var item=r.item;
    var snippet=item.text;
    var idx=snippet.toLowerCase().indexOf(q);
    if(idx>-1){
      var start=Math.max(0,idx-30);
      var end=Math.min(snippet.length,idx+q.length+80);
      snippet=(start>0?'...':'')+snippet.substring(start,end)+(end<snippet.length?'...':'');
      snippet=snippet.replace(new RegExp('('+q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+')','gi'),'<mark>$1</mark>');
    }else{
      snippet=snippet.substring(0,120)+'...';
    }
    var typeClass=item.type==='chapter'?'chapter':'page';
    var typeLabel=item.type==='chapter'?'章节':'页面';
    var subjectTag=item.subject?'<div class="result-subject">'+item.subject+'</div>':'';
    
    html+='<a class="result-item" href="'+item.url+'">'
      +'<span class="result-type '+typeClass+'">'+typeLabel+'</span>'
      +subjectTag
      +'<div class="result-title">'+item.title+'</div>'
      +'<div class="result-snippet">'+snippet+'</div>'
      +'</a>';
  });
  
  resultsEl.innerHTML=html;
}
</script>

<script>
(function(){
  const btn=document.createElement('button');
  btn.className='dark-toggle';
  btn.id='darkToggle';
  btn.title='切换夜间模式';
  const saved=localStorage.getItem('youdao_theme');
  if(saved==='dark'){document.documentElement.setAttribute('data-theme','dark');btn.textContent='☀️'}
  else{btn.textContent='🌙'}
  btn.onclick=function(){
    const isDark=document.documentElement.getAttribute('data-theme')==='dark';
    if(isDark){document.documentElement.removeAttribute('data-theme');localStorage.setItem('youdao_theme','light');btn.textContent='🌙'}
    else{document.documentElement.setAttribute('data-theme','dark');localStorage.setItem('youdao_theme','dark');btn.textContent='☀️'}
  };
  document.body.appendChild(btn);
})();
</script>

<script>
// 页面跳转淡出效果
(function(){
  document.addEventListener('click',function(e){
    var a=e.target.closest('a');
    if(!a)return;
    var href=a.getAttribute('href');
    if(!href||href.startsWith('#')||href.startsWith('javascript')||href.startsWith('http')||href.startsWith('mailto')||href.startsWith('tel'))return;
    // Same page anchors
    if(href.startsWith('#'))return;
    e.preventDefault();
    document.body.style.transition='opacity 0.15s ease';
    document.body.style.opacity='0.6';
    setTimeout(function(){location.href=href;},150);
  });
})();
</script>
