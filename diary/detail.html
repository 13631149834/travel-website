<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>日记详情 - 游导旅游</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#0ea5e9',
            secondary: '#06b6d4',
            warm: '#f59e0b',
            soft: '#fef3c7',
            blush: '#fecaca',
            mint: '#d1fae5'
          }
        }
      }
    }
  </script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;600;700&display=swap');
    body { font-family: 'Noto Sans SC', sans-serif; }
    .gradient-hero { background: linear-gradient(135deg, #0ea5e9 0%, #06b6d4 50%, #10b981 100%); }
    .gradient-warm { background: linear-gradient(135deg, #f59e0b 0%, #f97316 100%); }
    .fade-in { animation: fadeIn 0.5s ease; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    .slide-up { animation: slideUp 0.4s ease; }
    @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
    .diary-content { line-height: 1.9; font-size: 1.1rem; }
    .diary-content p { margin-bottom: 1rem; }
    .photo-modal { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.9); z-index: 100; display: flex; align-items: center; justify-content: center; }
    .photo-modal img { max-width: 90vw; max-height: 90vh; object-fit: contain; }
    .mood-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 16px;
      border-radius: 999px;
      font-weight: 600;
    }
    .weather-badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 4px 12px;
      background: #e0f2fe;
      border-radius: 999px;
      font-size: 14px;
    }
    .tag-pill {
      background: linear-gradient(135deg, #e0f2fe 0%, #dbeafe 100%);
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 13px;
      color: #0369a1;
    }
    .photo-gallery {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
      gap: 12px;
    }
    .photo-item {
      aspect-ratio: 1;
      border-radius: 12px;
      overflow: hidden;
      cursor: pointer;
      transition: transform 0.3s ease;
    }
    .photo-item:hover { transform: scale(1.05); }
    .photo-item img { width: 100%; height: 100%; object-fit: cover; }
    .action-btn { transition: all 0.2s ease; }
    .action-btn:hover { transform: scale(1.05); }
    .share-dropdown { position: relative; }
    .share-menu { position: absolute; top: 100%; right: 0; margin-top: 8px; background: white; border-radius: 12px; box-shadow: 0 10px 40px rgba(0,0,0,0.15); overflow: hidden; z-index: 10; min-width: 160px; }
    .share-menu a { display: flex; align-items: center; gap: 8px; padding: 12px 16px; color: #374151; transition: background 0.2s; }
    .share-menu a:hover { background: #f3f4f6; }
  </style>
</head>
<body class="bg-gradient-to-br from-slate-50 via-blue-50 to-emerald-50 min-h-screen">
  <!-- Navigation -->
  <nav class="gradient-hero text-white sticky top-0 z-50 shadow-lg backdrop-blur-md bg-opacity-95">
    <div class="max-w-4xl mx-auto px-4 py-4">
      <div class="flex items-center justify-between">
        <a href="index.html" class="flex items-center gap-2 hover:opacity-90 transition">
          <span class="text-3xl">🧭</span>
          <span class="text-2xl font-bold">游导旅游</span>
        </a>
        <div class="flex items-center gap-4">
          <a href="index.html" class="hover:opacity-80 transition flex items-center gap-1">
            📔 旅行日记
          </a>
        </div>
      </div>
    </div>
  </nav>

  <!-- Main Content -->
  <div class="max-w-3xl mx-auto px-4 py-8" id="diaryContent">
    <!-- Loading State -->
    <div class="text-center py-16">
      <div class="text-6xl mb-4 animate-pulse">📔</div>
      <p class="text-gray-500">加载中...</p>
    </div>
  </div>

  <!-- Photo Modal -->
  <div id="photoModal" class="photo-modal hidden" onclick="closePhotoModal()">
    <button class="absolute top-4 right-4 text-white text-3xl hover:opacity-80 transition">&times;</button>
    <img id="modalImage" src="" alt="">
  </div>

  <!-- Delete Confirmation Modal -->
  <div id="deleteModal" class="fixed inset-0 bg-black/50 z-50 flex items-center justify-center hidden">
    <div class="bg-white rounded-2xl p-6 max-w-sm mx-4 slide-up">
      <div class="text-center">
        <div class="text-6xl mb-4">🗑️</div>
        <h3 class="text-xl font-bold text-gray-800 mb-2">确认删除</h3>
        <p class="text-gray-600 mb-6">删除后无法恢复，确定要删除这篇日记吗？</p>
        <div class="flex gap-4 justify-center">
          <button onclick="closeDeleteModal()" class="px-6 py-3 bg-gray-100 text-gray-700 rounded-full font-semibold hover:bg-gray-200 transition">
            取消
          </button>
          <button onclick="confirmDelete()" class="px-6 py-3 bg-red-500 text-white rounded-full font-semibold hover:bg-red-600 transition">
            删除
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- Toast -->
  <div id="toast" class="fixed bottom-8 left-1/2 transform -translate-x-1/2 px-6 py-3 bg-gray-800 text-white rounded-full shadow-lg opacity-0 transition-opacity duration-300 pointer-events-none z-50">
    <span id="toastMessage">提示信息</span>
  </div>

  <!-- Footer -->
  <footer class="bg-gray-800 text-white py-8 mt-16">
    <div class="max-w-4xl mx-auto px-4 text-center">
      <p class="text-gray-400">&copy; 2024 游导旅游. All rights reserved.</p>
    </div>
  </footer>

  <script>
    const STORAGE_KEY = 'travelDiaries';
    let diaryData = [];
    let configData = null;
    let currentDiary = null;
    let deleteDiaryId = null;

    // Load data
    async function loadData() {
      try {
        const response = await fetch('data/diary.json');
        configData = await response.json();
        loadDiariesFromStorage();
        loadDiary();
      } catch (error) {
        console.error('Failed to load data:', error);
        loadDiariesFromStorage();
        loadDiary();
      }
    }

    function loadDiariesFromStorage() {
      const stored = localStorage.getItem(STORAGE_KEY);
      if (stored) {
        diaryData = JSON.parse(stored);
      }
    }

    function saveDiariesToStorage() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(diaryData));
    }

    function getMoodInfo(moodId) {
      return configData?.moods?.find(m => m.id === moodId) || { emoji: '😊', label: '未知', color: '#94a3b8', bgColor: '#e2e8f0' };
    }

    function getWeatherInfo(weatherId) {
      return configData?.weathers?.find(w => w.id === weatherId) || { emoji: '☀️', label: '未知' };
    }

    function getPrivacyInfo(privacyId) {
      return configData?.privacyOptions?.find(p => p.id === privacyId) || { emoji: '🔒', label: '私密' };
    }

    function loadDiary() {
      const params = new URLSearchParams(window.location.search);
      const id = params.get('id');
      
      if (!id) {
        showNotFound();
        return;
      }

      currentDiary = diaryData.find(d => d.id === id);
      
      if (!currentDiary) {
        showNotFound();
        return;
      }

      renderDiary();
    }

    function showNotFound() {
      document.getElementById('diaryContent').innerHTML = `
        <div class="text-center py-16">
          <div class="text-8xl mb-6">🔍</div>
          <h2 class="text-2xl font-bold text-gray-600 mb-4">日记不存在</h2>
          <p class="text-gray-500 mb-8">该日记可能已被删除或无法访问</p>
          <a href="index.html" class="inline-flex items-center gap-2 px-6 py-3 gradient-warm text-white rounded-full font-bold hover:shadow-lg transition">
            ← 返回日记列表
          </a>
        </div>
      `;
    }

    function renderDiary() {
      const diary = currentDiary;
      const moodInfo = getMoodInfo(diary.mood);
      const weatherInfo = getWeatherInfo(diary.weather);
      const privacyInfo = getPrivacyInfo(diary.privacy);
      const date = new Date(diary.createdAt);
      const dateStr = date.toLocaleDateString('zh-CN', { 
        year: 'numeric', 
        month: 'long', 
        day: 'numeric',
        weekday: 'long'
      });
      const timeStr = date.toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' });

      const content = diary.content.split('\n').map(p => `<p>${p}</p>`).join('');

      let photosHtml = '';
      if (diary.photos && diary.photos.length > 0) {
        photosHtml = `
          <div class="mb-8">
            <h3 class="text-lg font-bold text-gray-800 mb-4 flex items-center gap-2">
              <span class="text-xl">📷</span> 旅行照片
            </h3>
            <div class="photo-gallery">
              ${diary.photos.map((photo, index) => `
                <div class="photo-item" onclick="openPhotoModal('${photo}', ${index})">
                  <img src="${photo}" alt="照片 ${index + 1}" onerror="this.parentElement.style.display='none'">
                </div>
              `).join('')}
            </div>
          </div>
        `;
      }

      document.getElementById('diaryContent').innerHTML = `
        <div class="fade-in">
          <!-- Back Button -->
          <a href="index.html" class="inline-flex items-center gap-2 text-gray-600 hover:text-primary transition mb-6">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
            </svg>
            返回日记列表
          </a>

          <!-- Diary Card -->
          <article class="bg-white rounded-3xl shadow-xl overflow-hidden">
            <!-- Header with Mood Background -->
            <div class="relative" style="background: linear-gradient(135deg, ${moodInfo.bgColor} 0%, white 100%);">
              ${diary.photos && diary.photos.length > 0 ? `
                <div class="h-64 md:h-80 overflow-hidden opacity-20">
                  <img src="${diary.photos[0]}" alt="封面" class="w-full h-full object-cover">
                </div>
              ` : ''}
              <div class="absolute inset-0 flex items-center justify-center">
                <span class="text-8xl md:text-9xl">${moodInfo.emoji}</span>
              </div>
            </div>

            <!-- Content -->
            <div class="p-6 md:p-8">
              <!-- Meta Info -->
              <div class="flex flex-wrap items-center gap-4 mb-6">
                <span class="mood-badge" style="background: ${moodInfo.bgColor}; color: ${moodInfo.color}">
                  ${moodInfo.emoji} ${moodInfo.label}
                </span>
                ${weatherInfo ? `
                  <span class="weather-badge">
                    ${weatherInfo.emoji} ${weatherInfo.label}
                  </span>
                ` : ''}
                <span class="text-gray-400 text-sm flex items-center gap-1">
                  ${privacyInfo.emoji} ${privacyInfo.label}
                </span>
              </div>

              <!-- Title -->
              <h1 class="text-2xl md:text-3xl font-bold text-gray-800 mb-4">${diary.title || '无标题'}</h1>

              <!-- Date & Location -->
              <div class="flex flex-wrap items-center gap-4 text-gray-500 mb-6 pb-6 border-b border-gray-100">
                <span class="flex items-center gap-1">
                  <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/>
                  </svg>
                  ${dateStr} ${timeStr}
                </span>
                ${diary.location ? `
                  <span class="flex items-center gap-1">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"/>
                      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"/>
                    </svg>
                    ${diary.location}
                  </span>
                ` : ''}
                <span class="text-gray-400">${diary.wordCount || 0}字</span>
              </div>

              <!-- Tags -->
              ${diary.tags && diary.tags.length > 0 ? `
                <div class="flex flex-wrap gap-2 mb-6">
                  ${diary.tags.map(tag => `<span class="tag-pill">${tag}</span>`).join('')}
                </div>
              ` : ''}

              <!-- Photos -->
              ${photosHtml}

              <!-- Content -->
              <div class="diary-content text-gray-700 mb-8">
                ${content}
              </div>

              <!-- Actions -->
              <div class="flex flex-wrap items-center justify-between gap-4 pt-6 border-t border-gray-100">
                <div class="flex gap-3">
                  <a href="write.html?edit=${diary.id}" class="action-btn px-5 py-2.5 bg-blue-100 text-blue-700 rounded-full font-semibold flex items-center gap-2">
                    ✏️ 编辑
                  </a>
                  <button onclick="openDeleteModal('${diary.id}')" class="action-btn px-5 py-2.5 bg-red-100 text-red-700 rounded-full font-semibold flex items-center gap-2">
                    🗑️ 删除
                  </button>
                </div>
                <div class="share-dropdown">
                  <button onclick="toggleShareMenu()" class="action-btn px-5 py-2.5 bg-gray-100 text-gray-700 rounded-full font-semibold flex items-center gap-2">
                    📤 分享
                  </button>
                  <div id="shareMenu" class="share-menu hidden">
                    <a href="javascript:void(0)" onclick="copyLink()">
                      <span>🔗</span> 复制链接
                    </a>
                    <a href="javascript:void(0)" onclick="shareToFriends()">
                      <span>👥</span> 分享给好友
                    </a>
                    <a href="export.html?diary=${diary.id}" class="text-primary">
                      <span>📥</span> 导出日记
                    </a>
                  </div>
                </div>
              </div>
            </div>
          </article>

          <!-- Navigation -->
          <div class="flex justify-between items-center mt-8 text-gray-600">
            <a href="index.html" class="flex items-center gap-2 hover:text-primary transition">
              ← 返回日记列表
            </a>
            <a href="write.html" class="flex items-center gap-2 px-5 py-2.5 gradient-warm text-white rounded-full font-semibold hover:shadow-lg transition">
              ✍️ 写新日记
            </a>
          </div>
        </div>
      `;
    }

    // Photo Modal
    function openPhotoModal(photoUrl, index) {
      const modal = document.getElementById('photoModal');
      const modalImg = document.getElementById('modalImage');
      modalImg.src = photoUrl;
      modal.classList.remove('hidden');
      document.body.style.overflow = 'hidden';
    }

    function closePhotoModal() {
      document.getElementById('photoModal').classList.add('hidden');
      document.body.style.overflow = '';
    }

    // Delete Modal
    function openDeleteModal(id) {
      deleteDiaryId = id;
      document.getElementById('deleteModal').classList.remove('hidden');
      document.body.style.overflow = 'hidden';
    }

    function closeDeleteModal() {
      deleteDiaryId = null;
      document.getElementById('deleteModal').classList.add('hidden');
      document.body.style.overflow = '';
    }

    function confirmDelete() {
      if (deleteDiaryId) {
        const index = diaryData.findIndex(d => d.id === deleteDiaryId);
        if (index > -1) {
          diaryData.splice(index, 1);
          saveDiariesToStorage();
          showToast('日记已删除');
          setTimeout(() => {
            window.location.href = 'index.html';
          }, 1000);
        }
      }
      closeDeleteModal();
    }

    // Share Menu
    function toggleShareMenu() {
      const menu = document.getElementById('shareMenu');
      menu.classList.toggle('hidden');
    }

    function copyLink() {
      const url = window.location.href;
      navigator.clipboard.writeText(url).then(() => {
        showToast('链接已复制到剪贴板');
      }).catch(() => {
        showToast('复制失败，请手动复制');
      });
      toggleShareMenu();
    }

    function shareToFriends() {
      if (navigator.share) {
        navigator.share({
          title: currentDiary?.title || '旅行日记',
          text: `${currentDiary?.mood || ''} ${currentDiary?.location || ''}`,
          url: window.location.href
        });
      } else {
        copyLink();
      }
      toggleShareMenu();
    }

    // Toast
    function showToast(message) {
      const toast = document.getElementById('toast');
      document.getElementById('toastMessage').textContent = message;
      toast.classList.remove('opacity-0');
      toast.classList.add('opacity-100');
      setTimeout(() => {
        toast.classList.remove('opacity-100');
        toast.classList.add('opacity-0');
      }, 2500);
    }

    // Close share menu when clicking outside
    document.addEventListener('click', (e) => {
      const shareDropdown = document.querySelector('.share-dropdown');
      if (shareDropdown && !shareDropdown.contains(e.target)) {
        const menu = document.getElementById('shareMenu');
        if (menu) {
          menu.classList.add('hidden');
        }
      }
    });

    // Initialize
    loadData();
  </script>
</body>
</html>
