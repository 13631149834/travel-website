<html lang="zh-CN">

  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>心情统计 - 游导旅游</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#0ea5e9',
            secondary: '#06b6d4',
            warm: '#f59e0b',
            soft: '#fef3c7',
            blush: '#fecaca',
            mint: '#d1fae5'
          }
        }
      }
    }
  </script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;600;700&display=swap');
    body { font-family: 'Noto Sans SC', sans-serif; }
    .gradient-hero { background: linear-gradient(135deg, #0ea5e9 0%, #06b6d4 50%, #10b981 100%); }
    .gradient-warm { background: linear-gradient(135deg, #f59e0b 0%, #f97316 100%); }
    .fade-in { animation: fadeIn 0.5s ease; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    .slide-up { animation: slideUp 0.4s ease; }
    @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
    .stat-card { background: linear-gradient(135deg, #ffffff 0%, #f8fafc 100%); }
    .mood-bar { height: 8px; border-radius: 4px; transition: width 0.5s ease; }
    .chart-container { position: relative; height: 250px; width: 100%; }
    .achievement-badge { transition: all 0.3s ease; }
    .achievement-badge:hover { transform: scale(1.05); }
  </style>
</head>

  <nav class="gradient-hero text-white sticky top-0 z-50 shadow-lg backdrop-blur-md bg-opacity-95">

        <div class="hidden md:flex items-center gap-8">
          <a href="../index.html" class="hover:opacity-80 transition">首页</a>
          <a href="index.html" class="hover:opacity-80 transition flex items-center gap-1">
            📔 旅行日记
          </a>
          <a href="statistics.html" class="font-semibold border-b-2 border-white pb-1 flex items-center gap-1">
            📊 心情统计

        <button class="md:hidden text-2xl" onclick="toggleMenu()">☰</button>

        <a href="../index.html" class="block py-2">首页</a>
        <a href="index.html" class="block py-2">📔 旅行日记</a>
        <a href="statistics.html" class="block py-2 font-semibold">📊 心情统计</a>
        <a href="export.html" class="block py-2">📤 导出</a>
      </div>
    </div>
  </nav>

  <!-- Page Header -->
  <div class="bg-gradient-to-r from-purple-100 via-pink-50 to-orange-100 py-12">
    <div class="max-w-7xl mx-auto px-4 text-center fade-in">
      <div class="inline-block px-4 py-1.5 bg-white/60 rounded-full text-sm mb-4 shadow-sm">📈 你的旅行数据洞察</div>
      <h1 class="text-4xl md:text-5xl font-bold text-gray-800 mb-4">📊 心情统计</h1>
      <p class="text-lg text-gray-600">用数据记录你的旅行心情历程</p>
    </div>
  </div>

  <!-- Main Content -->
  <div class="max-w-7xl mx-auto px-4 py-8">
    <!-- Overview Stats -->
    <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8">
      <div class="stat-card rounded-2xl shadow-lg p-6 text-center slide-up">
        <div class="text-4xl mb-2">📔</div>
        <div class="text-3xl font-bold text-primary" id="totalDiaries">0</div>
        <div class="text-gray-500 text-sm">日记总数</div>
      </div>
      <div class="stat-card rounded-2xl shadow-lg p-6 text-center slide-up" style="animation-delay: 0.1s">
        <div class="text-4xl mb-2">😊</div>
        <div class="text-3xl font-bold text-amber-500" id="happyDays">0</div>
        <div class="text-gray-500 text-sm">开心天数</div>
      </div>
      <div class="stat-card rounded-2xl shadow-lg p-6 text-center slide-up" style="animation-delay: 0.2s">
        <div class="text-4xl mb-2">📝</div>
        <div class="text-3xl font-bold text-green-500" id="totalWords">0</div>
        <div class="text-gray-500 text-sm">写作字数</div>
      </div>
      <div class="stat-card rounded-2xl shadow-lg p-6 text-center slide-up" style="animation-delay: 0.3s">
        <div class="text-4xl mb-2">📍</div>
        <div class="text-3xl font-bold text-purple-500" id="totalPlaces">0</div>
        <div class="text-gray-500 text-sm">旅行地点</div>
      </div>
    </div>

    <!-- Charts Row -->
    <div class="grid grid-cols-1 lg:grid-cols-2 gap-6 mb-8">
      <!-- Mood Distribution -->
      <div class="bg-white rounded-2xl shadow-lg p-6 slide-up" style="animation-delay: 0.4s">
        <h2 class="text-xl font-bold text-gray-800 mb-6 flex items-center gap-2">
          <span class="text-2xl">😊</span> 心情分布
        </h2>
        <div class="flex flex-col md:flex-row items-center gap-8">
          <div class="chart-container" style="height: 200px; min-width: 200px;">
            <canvas id="moodPieChart"></canvas>
          </div>
          <div id="moodLegend" class="flex-1 space-y-3">
            <!-- Legend items -->
          </div>
        </div>
      </div>

      <!-- Writing Frequency -->
      <div class="bg-white rounded-2xl shadow-lg p-6 slide-up" style="animation-delay: 0.5s">
        <h2 class="text-xl font-bold text-gray-800 mb-6 flex items-center gap-2">
          <span class="text-2xl">📅</span> 写作频率
        </h2>
        <div class="chart-container">
          <canvas id="frequencyChart"></canvas>
        </div>
      </div>
    </div>

    <!-- Mood Trend -->
    <div class="bg-white rounded-2xl shadow-lg p-6 mb-8 slide-up" style="animation-delay: 0.6s">
      <h2 class="text-xl font-bold text-gray-800 mb-6 flex items-center gap-2">
        <span class="text-2xl">📈</span> 心情趋势
      </h2>
      <div class="chart-container" style="height: 300px;">
        <canvas id="moodTrendChart"></canvas>
      </div>
      <div class="flex flex-wrap justify-center gap-4 mt-4 text-sm text-gray-500">
        <span class="flex items-center gap-1"><span class="w-3 h-3 rounded-full bg-amber-400"></span> 开心</span>
        <span class="flex items-center gap-1"><span class="w-3 h-3 rounded-full bg-orange-400"></span> 兴奋</span>
        <span class="flex items-center gap-1"><span class="w-3 h-3 rounded-full bg-green-400"></span> 平静</span>
        <span class="flex items-center gap-1"><span class="w-3 h-3 rounded-full bg-purple-400"></span> 怀念</span>
        <span class="flex items-center gap-1"><span class="w-3 h-3 rounded-full bg-pink-400"></span> 感恩</span>
      </div>
    </div>

    <!-- Detailed Stats -->
    <div class="grid grid-cols-1 lg:grid-cols-2 gap-6 mb-8">
      <!-- Mood Breakdown -->
      <div class="bg-white rounded-2xl shadow-lg p-6 slide-up" style="animation-delay: 0.7s">
        <h2 class="text-xl font-bold text-gray-800 mb-6 flex items-center gap-2">
          <span class="text-2xl">📊</span> 心情详情
        </h2>
        <div id="moodBreakdown" class="space-y-4">
          <!-- Dynamic content -->
        </div>
      </div>

      <!-- Location Distribution -->
      <div class="bg-white rounded-2xl shadow-lg p-6 slide-up" style="animation-delay: 0.8s">
        <h2 class="text-xl font-bold text-gray-800 mb-6 flex items-center gap-2">
          <span class="text-2xl">🌍</span> 地点分布
        </h2>

          <!-- Dynamic content -->
        </div>
      </div>
    </div>

    <!-- Achievements -->
    <div class="bg-white rounded-2xl shadow-lg p-6 slide-up" style="animation-delay: 0.9s">
      <h2 class="text-xl font-bold text-gray-800 mb-6 flex items-center gap-2">
        <span class="text-2xl">🏆</span> 旅行成就
      </h2>
      <div id="achievements" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-6 gap-4">
        <!-- Dynamic content -->
      </div>
    </div>

    <!-- Empty State -->
    <div id="emptyState" class="hidden text-center py-16">
      <div class="text-8xl mb-6">📊</div>
      <h3 class="text-2xl font-bold text-gray-600 mb-4">还没有统计数据</h3>
      <p class="text-gray-500 mb-8 max-w-md mx-auto">写几篇日记后，就能看到你的心情统计和旅行成就啦！</p>
      <a href="write.html" class="inline-flex items-center gap-2 gradient-warm text-white px-8 py-4 rounded-full font-bold shadow-lg hover:shadow-xl transition">
        ✍️ 开始写日记
      </a>
    </div>
  </div>

  <!-- Footer -->
  <footer class="bg-gray-800 text-white py-12 mt-auto">
    <div class="max-w-7xl mx-auto px-4 text-center">
      <p class="text-gray-400">&copy; 2024 游导旅游. All rights reserved.</p>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <script>
    const STORAGE_KEY = 'travelDiaries';
    let diaryData = [];
    let configData = null;
    let moodPieChart = null;
    let frequencyChart = null;
    let moodTrendChart = null;

    // Load data
    async function loadData() {
      try {
        const response = await fetch('data/diary.json');
        configData = await response.json();
        loadDiariesFromStorage();
        if (diaryData.length === 0) {
          showEmptyState();
        } else {
          calculateStats();
          renderCharts();
          renderMoodBreakdown();
          renderLocationDistribution();
          renderAchievements();
        }
      } catch (error) {
        console.error('Failed to load data:', error);
        loadDiariesFromStorage();
        if (diaryData.length === 0) {
          showEmptyState();
        } else {
          calculateStats();
          renderCharts();
          renderMoodBreakdown();
          renderLocationDistribution();
          renderAchievements();
        }
      }
    }

    function loadDiariesFromStorage() {
      const stored = localStorage.getItem(STORAGE_KEY);
      if (stored) {
        diaryData = JSON.parse(stored);
      }
    }

    function getMoodInfo(moodId) {
      return configData?.moods?.find(m => m.id === moodId) || { emoji: '😊', label: '未知', color: '#94a3b8', bgColor: '#e2e8f0' };
    }

    function showEmptyState() {
      document.querySelectorAll('.grid, .bg-white').forEach(el => {
        if (el.id !== 'mobileMenu' && el.id !== 'toast') {
          el.style.display = 'none';
        }
      });
      document.getElementById('emptyState').classList.remove('hidden');
    }

    function calculateStats() {
      const totalDiaries = diaryData.length;
      const happyMoods = ['happy', 'excited', 'grateful'];
      const happyDays = diaryData.filter(d => happyMoods.includes(d.mood)).length;
      const totalWords = diaryData.reduce((sum, d) => sum + (d.wordCount || 0), 0);
      const uniquePlaces = [...new Set(diaryData.filter(d => d.location).map(d => d.location))];
      const totalPlaces = uniquePlaces.length;

      document.getElementById('totalDiaries').textContent = totalDiaries;
      document.getElementById('happyDays').textContent = happyDays;
      document.getElementById('totalWords').textContent = totalWords > 10000 ? (totalWords / 10000).toFixed(1) + '万' : totalWords;
      document.getElementById('totalPlaces').textContent = totalPlaces;
    }

    function renderCharts() {
      // Mood Pie Chart
      const moodCounts = {};
      diaryData.forEach(d => {
        moodCounts[d.mood] = (moodCounts[d.mood] || 0) + 1;
      });

      const moodLabels = Object.keys(moodCounts);
      const moodData = Object.values(moodCounts);
      const moodColors = moodLabels.map(m => getMoodInfo(m).color);
      const moodEmojis = moodLabels.map(m => getMoodInfo(m).emoji);

      const pieCtx = document.getElementById('moodPieChart').getContext('2d');
      moodPieChart = new Chart(pieCtx, {
        type: 'doughnut',
        data: {
          labels: moodLabels.map((m, i) => `${moodEmojis[i]} ${getMoodInfo(m).label}`),
          datasets: [{
            data: moodData,
            backgroundColor: moodColors,
            borderWidth: 0
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: {
            legend: { display: false },
            tooltip: {
              callbacks: {
                label: (context) => {
                  const total = context.dataset.data.reduce((a, b) => a + b, 0);
                  const percentage = ((context.raw / total) * 100).toFixed(1);
                  return `${context.raw}篇 (${percentage}%)`;
                }
              }
            }
          }
        }
      });

      // Render legend
      const legendContainer = document.getElementById('moodLegend');
      legendContainer.innerHTML = moodLabels.map(mood => {
        const info = getMoodInfo(mood);
        const count = moodCounts[mood];
        const total = diaryData.length;
        const percentage = ((count / total) * 100).toFixed(1);
        return `
          <div class="flex items-center gap-3">
            <span class="text-2xl">${info.emoji}</span>
            <div class="flex-1">
              <div class="flex justify-between text-sm mb-1">
                <span class="font-medium">${info.label}</span>
                <span class="text-gray-500">${count}篇</span>
              </div>
              <div class="mood-bar" style="width: ${percentage}%; background: ${info.color}"></div>
            </div>
          </div>
        `;
      }).join('');

      // Frequency Chart (Last 7 Days)
      const last7Days = [];
      const dayLabels = [];
      const dayCounts = [];
      
      for (let i = 6; i >= 0; i--) {
        const date = new Date();
        date.setDate(date.getDate() - i);
        const dateStr = date.toDateString();
        last7Days.push(dateStr);
        dayLabels.push(date.toLocaleDateString('zh-CN', { weekday: 'short', month: 'short', day: 'numeric' }));
        dayCounts.push(diaryData.filter(d => new Date(d.createdAt).toDateString() === dateStr).length);
      }

      const freqCtx = document.getElementById('frequencyChart').getContext('2d');
      frequencyChart = new Chart(freqCtx, {
        type: 'bar',
        data: {
          labels: dayLabels,
          datasets: [{
            label: '日记数量',
            data: dayCounts,
            backgroundColor: 'rgba(14, 165, 233, 0.7)',
            borderRadius: 8,
            borderSkipped: false
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: {
            legend: { display: false },
            tooltip: {
              callbacks: {
                label: (context) => `${context.raw}篇日记`
              }
            }
          },
          scales: {
            y: {
              beginAtZero: true,
              ticks: { stepSize: 1 }
            }
          }
        }
      });

      // Mood Trend Chart
      const trendDays = [];
      const trendLabels = [];
      const trendMoodData = {};
      const moodColors = {
        'happy': '#fcd34d',
        'excited': '#fb923c',
        'peaceful': '#6ee7b7',
        'grateful': '#f9a8d4',
        'nostalgic': '#c4b5fd',
        'tired': '#94a3b8',
        'lonely': '#7dd3fc',
        'worried': '#a5b4fc'
      };

      const topMoods = Object.entries(moodCounts)
        .sort((a, b) => b[1] - a[1])
        .slice(0, 5)
        .map(m => m[0]);

      for (let i = 29; i >= 0; i--) {
        const date = new Date();
        date.setDate(date.getDate() - i);
        trendDays.push(date.toDateString());
        trendLabels.push(`${date.getMonth() + 1}/${date.getDate()}`);
      }

      topMoods.forEach(mood => {
        trendMoodData[mood] = trendDays.map(day => {
          const diariesOnDay = diaryData.filter(d => new Date(d.createdAt).toDateString() === day);
          return diariesOnDay.filter(d => d.mood === mood).length;
        });
      });

      const trendCtx = document.getElementById('moodTrendChart').getContext('2d');
      moodTrendChart = new Chart(trendCtx, {
        type: 'line',
        data: {
          labels: trendLabels,
          datasets: topMoods.map(mood => ({
            label: `${getMoodInfo(mood).emoji} ${getMoodInfo(mood).label}`,
            data: trendMoodData[mood],
            borderColor: moodColors[mood] || '#94a3b8',
            backgroundColor: (moodColors[mood] || '#94a3b8') + '20',
            tension: 0.4,
            fill: true
          }))
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: {
            legend: { display: false }
          },
          scales: {
            y: {
              beginAtZero: true,
              ticks: { stepSize: 1 }
            }
          }
        }
      });
    }

    function renderMoodBreakdown() {
      const container = document.getElementById('moodBreakdown');
      const moodCounts = {};
      diaryData.forEach(d => {
        moodCounts[d.mood] = (moodCounts[d.mood] || 0) + 1;
      });

      const sortedMoods = Object.entries(moodCounts).sort((a, b) => b[1] - a[1]);
      const total = diaryData.length;

      container.innerHTML = sortedMoods.map(([mood, count]) => {
        const info = getMoodInfo(mood);
        const percentage = ((count / total) * 100).toFixed(1);
        return `
          <div class="flex items-center gap-4 p-3 rounded-xl hover:bg-gray-50 transition">
            <div class="w-12 h-12 rounded-full flex items-center justify-center text-2xl" style="background: ${info.bgColor}">
              ${info.emoji}
            </div>
            <div class="flex-1">
              <div class="flex justify-between items-center mb-1">
                <span class="font-semibold text-gray-800">${info.label}</span>
                <span class="text-sm text-gray-500">${count}篇 · ${percentage}%</span>
              </div>
              <div class="w-full bg-gray-100 rounded-full h-2">
                <div class="h-2 rounded-full transition-all duration-500" style="width: ${percentage}%; background: ${info.color}"></div>
              </div>
            </div>
          </div>
        `;
      }).join('');
    }

    function renderLocationDistribution() {
      const container = document.getElementById('locationDistribution');
      const locationCounts = {};
      
      diaryData.forEach(d => {
        if (d.location) {
          locationCounts[d.location] = (locationCounts[d.location] || 0) + 1;
        }
      });

      const sortedLocations = Object.entries(locationCounts)
        .sort((a, b) => b[1] - a[1])
        .slice(0, 8);
      
      const total = diaryData.length;

      if (sortedLocations.length === 0) {
        container.innerHTML = '<p class="text-gray-500 text-center py-8">还没有添加地点信息</p>';
        return;
      }

      container.innerHTML = sortedLocations.map(([location, count], index) => {
        const percentage = ((count / total) * 100).toFixed(1);
        const colors = ['#0ea5e9', '#06b6d4', '#10b981', '#f59e0b', '#ef4444', '#8b5cf6', '#ec4899', '#14b8a6'];
        return `
          <div class="flex items-center gap-4">
            <span class="w-8 h-8 rounded-full flex items-center justify-center text-white font-bold text-sm" style="background: ${colors[index % colors.length]}">
              ${index + 1}
            </span>
            <div class="flex-1">
              <div class="flex justify-between items-center mb-1">
                <span class="font-medium text-gray-800">${location}</span>
                <span class="text-sm text-gray-500">${count}篇</span>
              </div>
              <div class="w-full bg-gray-100 rounded-full h-2">
                <div class="h-2 rounded-full transition-all duration-500" style="width: ${percentage}%; background: ${colors[index % colors.length]}"></div>
              </div>
            </div>
          </div>
        `;
      }).join('');
    }

    function renderAchievements() {
      const container = document.getElementById('achievements');
      
      const achievements = [
        { id: 'first_diary', emoji: '✍️', title: '初次记录', desc: '写下第一篇日记', unlocked: diaryData.length >= 1 },
        { id: 'ten_diaries', emoji: '📔', title: '日记达人', desc: '写下10篇日记', unlocked: diaryData.length >= 10 },
        { id: 'fifty_diaries', emoji: '📚', title: '旅行作家', desc: '写下50篇日记', unlocked: diaryData.length >= 50 },
        { id: 'happy_traveler', emoji: '😊', title: '快乐旅行', desc: '记录30天开心心情', unlocked: diaryData.filter(d => ['happy', 'excited'].includes(d.mood)).length >= 30 },
        { id: 'explorer', emoji: '🌍', title: '探索者', desc: '去过5个不同地方', unlocked: [...new Set(diaryData.filter(d => d.location).map(d => d.location))].length >= 5 },
        { id: 'photo_master', emoji: '📷', title: '摄影大师', desc: '上传100张照片', unlocked: diaryData.reduce((sum, d) => sum + (d.photos?.length || 0), 0) >= 100 },
        { id: 'writer', emoji: '✏️', title: '写作高手', desc: '累计写作1万字', unlocked: diaryData.reduce((sum, d) => sum + (d.wordCount || 0), 0) >= 10000 },
        { id: 'consistent', emoji: '🔥', title: '坚持不懈', desc: '连续7天写日记', unlocked: checkConsecutiveDays(7) },
        { id: 'mood_tracker', emoji: '🎭', title: '心情追踪', desc: '记录所有8种心情', unlocked: [...new Set(diaryData.map(d => d.mood))].length >= 8 },
        { id: 'memories', emoji: '💫', title: '美好回忆', desc: '写下100篇日记', unlocked: diaryData.length >= 100 },
        { id: 'wordsmith', emoji: '📝', title: '文字大师', desc: '单篇日记超过1000字', unlocked: diaryData.some(d => (d.wordCount || 0) >= 1000) },
        { id: 'globetrotter', emoji: '🎯', title: '环球旅行', desc: '去过10个不同地方', unlocked: [...new Set(diaryData.filter(d => d.location).map(d => d.location))].length >= 10 }
      ];

      container.innerHTML = achievements.map(achievement => `
        <div class="achievement-badge p-4 rounded-xl text-center ${achievement.unlocked ? 'bg-gradient-to-br from-amber-100 to-orange-100' : 'bg-gray-100 opacity-50'}" 
             title="${achievement.desc}">
          <div class="text-4xl mb-2">${achievement.emoji}</div>
          <div class="font-semibold text-sm text-gray-800">${achievement.title}</div>
          <div class="text-xs text-gray-500 mt-1">${achievement.desc}</div>
          ${achievement.unlocked ? '<div class="mt-2"><span class="text-xs bg-green-500 text-white px-2 py-0.5 rounded-full">已达成</span></div>' : ''}
        </div>
      `).join('');
    }

    function checkConsecutiveDays(days) {
      if (diaryData.length < days) return false;
      
      const sortedDiaries = [...diaryData].sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt));
      const dates = sortedDiaries.map(d => new Date(d.createdAt).toDateString());
      const uniqueDates = [...new Set(dates)];
      
      let consecutive = 1;
      for (let i = 1; i < uniqueDates.length; i++) {
        const prev = new Date(uniqueDates[i - 1]);
        const curr = new Date(uniqueDates[i]);
        const diff = (prev - curr) / (1000 * 60 * 60 * 24);
        if (diff === 1) {
          consecutive++;
          if (consecutive >= days) return true;
        } else {
          consecutive = 1;
        }
      }
      return false;
    }

    function toggleMenu() {
      document.getElementById('mobileMenu').classList.toggle('hidden');
    }

    // Initialize
    loadData();
  </script>
