<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>已完成的愿望 - 游导旅游</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#0ea5e9',
            secondary: '#06b6d4',
          }
        }
      }
    }
  </script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;600;700&display=swap');
    body { font-family: 'Noto Sans SC', sans-serif; }
    .gradient-bg { background: linear-gradient(135deg, #0ea5e9 0%, #06b6d4 50%, #10b981 100%); }
    .card-hover { transition: all 0.3s ease; }
    .card-hover:hover { transform: translateY(-6px); box-shadow: 0 20px 40px rgba(0,0,0,0.12); }
    .fade-in { animation: fadeIn 0.6s ease; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    .trophy-shine { animation: shine 2s ease-in-out infinite; }
    @keyframes shine { 0%, 100% { filter: brightness(1); } 50% { filter: brightness(1.3); } }
  </style>
</head>
<body class="bg-gradient-to-br from-slate-50 to-blue-50 min-h-screen">
  <!-- Navigation -->
  <nav class="gradient-bg text-white sticky top-0 z-50 shadow-lg">
    <div class="max-w-7xl mx-auto px-4 py-4">
      <div class="flex items-center justify-between">
        <a href="../index.html" class="flex items-center gap-2 hover:opacity-90 transition">
          <span class="text-3xl">🧭</span>
          <span class="text-2xl font-bold">游导旅游</span>
        </a>
        <div class="hidden md:flex items-center gap-8">
          <a href="../index.html" class="hover:opacity-80 transition">首页</a>
          <a href="index.html" class="font-semibold border-b-2 border-white pb-1">愿望清单</a>
        </div>
        <button class="md:hidden text-2xl" onclick="toggleMenu()">☰</button>
      </div>
      <div id="mobileMenu" class="hidden md:hidden mt-4 pb-2 space-y-3">
        <a href="../index.html" class="block py-2">首页</a>
        <a href="index.html" class="block py-2 font-semibold">愿望清单</a>
      </div>
    </div>
  </nav>

  <!-- Hero Section -->
  <section class="gradient-bg text-white py-12">
    <div class="max-w-7xl mx-auto px-4 text-center fade-in">
      <div class="text-6xl mb-4 trophy-shine">🏆</div>
      <div class="inline-block px-4 py-1.5 bg-white/20 rounded-full text-sm mb-4">✨ 恭喜你实现了这些梦想</div>
      <h1 class="text-3xl md:text-4xl font-bold mb-3">🎉 已完成的愿望</h1>
      <p class="text-lg opacity-90 max-w-2xl mx-auto">每一份完成的愿望都是一段美好的回忆</p>
    </div>
  </section>

  <!-- Stats -->
  <section class="max-w-7xl mx-auto px-4 -mt-6 mb-8">
    <div class="grid grid-cols-3 gap-4">
      <div class="bg-white rounded-2xl p-5 shadow-lg text-center fade-in">
        <div class="text-3xl mb-2">✅</div>
        <div id="completedCount" class="text-2xl font-bold text-green-500">0</div>
        <div class="text-sm text-gray-500">已完成</div>
      </div>
      <div class="bg-white rounded-2xl p-5 shadow-lg text-center fade-in" style="animation-delay: 0.1s">
        <div class="text-3xl mb-2">💰</div>
        <div id="totalSpent" class="text-2xl font-bold text-orange-500">¥0</div>
        <div class="text-sm text-gray-500">总花费</div>
      </div>
      <div class="bg-white rounded-2xl p-5 shadow-lg text-center fade-in" style="animation-delay: 0.2s">
        <div class="text-3xl mb-2">⭐</div>
        <div id="avgRating" class="text-2xl font-bold text-yellow-500">0</div>
        <div class="text-sm text-gray-500">平均评分</div>
      </div>
    </div>
  </section>

  <!-- Quick Actions -->
  <section class="max-w-7xl mx-auto px-4 mb-8">
    <div class="flex justify-between items-center">
      <a href="index.html" class="text-primary font-medium flex items-center gap-2 hover:underline">
        ← 返回进行中的愿望
      </a>
      <a href="statistics.html" class="px-4 py-2 bg-white text-gray-600 rounded-lg text-sm font-medium transition hover:shadow-lg border border-gray-200 flex items-center gap-2">
        📊 查看统计
      </a>
    </div>
  </section>

  <!-- Completed Wishes -->
  <main class="max-w-7xl mx-auto px-4 pb-16">
    <div id="wishList" class="space-y-6">
      <!-- Wish cards will be loaded here -->
    </div>
    
    <!-- Empty State -->
    <div id="emptyState" class="hidden text-center py-16">
      <div class="text-8xl mb-6">🎯</div>
      <h3 class="text-2xl font-bold text-gray-700 mb-3">还没有完成的愿望</h3>
      <p class="text-gray-500 mb-6">去添加并完成你的第一个旅行愿望吧！</p>
      <a href="add.html" class="inline-block px-6 py-3 bg-primary text-white rounded-full font-medium hover:shadow-lg transition">
        ➕ 添加愿望
      </a>
    </div>
  </main>

  <!-- Review Modal -->
  <div id="reviewModal" class="fixed inset-0 bg-black/50 z-50 hidden items-center justify-center p-4">
    <div class="bg-white rounded-2xl max-w-lg w-full max-h-[90vh] overflow-y-auto">
      <div class="p-6">
        <div class="flex justify-between items-center mb-4">
          <h3 class="text-lg font-bold text-gray-800">📝 旅行心得</h3>
          <button onclick="closeReviewModal()" class="text-gray-400 hover:text-gray-600 text-2xl">&times;</button>
        </div>
        <div id="reviewContent">
          <!-- Review content will be loaded here -->
        </div>
      </div>
    </div>
  </div>

  <!-- Footer -->
  <footer class="bg-gray-800 text-white py-8 mt-auto">
    <div class="max-w-7xl mx-auto px-4 text-center">
      <p class="text-gray-400">© 2025 游导旅游 · 让旅行更简单</p>
    </div>
  </footer>

  <script>
    const STORAGE_KEY = 'travel_wishlist';

    // Category styles
    const categoryStyles = {
      destination: { icon: '🌍', bg: 'bg-blue-100', text: 'text-blue-600' },
      experience: { icon: '🎯', bg: 'bg-purple-100', text: 'text-purple-600' },
      food: { icon: '🍜', bg: 'bg-orange-100', text: 'text-orange-600' },
      accommodation: { icon: '🏨', bg: 'bg-pink-100', text: 'text-pink-600' },
      adventure: { icon: '⛷️', bg: 'bg-red-100', text: 'text-red-600' }
    };

    const categoryNames = {
      destination: '目的地',
      experience: '体验',
      food: '美食',
      accommodation: '住宿',
      adventure: '挑战'
    };

    // Load completed wishes
    function loadCompletedWishes() {
      const wishes = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
      const completed = wishes.filter(w => w.status === 'completed');
      
      updateStats(completed);
      renderWishes(completed);
    }

    // Update statistics
    function updateStats(wishes) {
      document.getElementById('completedCount').textContent = wishes.length;
      
      const totalSpent = wishes.reduce((sum, w) => sum + (Number(w.actualCost) || Number(w.estimatedBudget) || 0), 0);
      document.getElementById('totalSpent').textContent = '¥' + totalSpent.toLocaleString('zh-CN');
      
      const ratings = wishes.filter(w => w.rating).map(w => w.rating);
      const avgRating = ratings.length > 0 ? (ratings.reduce((a, b) => a + b, 0) / ratings.length).toFixed(1) : '-';
      document.getElementById('avgRating').textContent = avgRating;
    }

    // Render completed wishes
    function renderWishes(wishes) {
      const container = document.getElementById('wishList');
      const emptyState = document.getElementById('emptyState');
      
      if (wishes.length === 0) {
        container.innerHTML = '';
        emptyState.classList.remove('hidden');
        return;
      }
      
      emptyState.classList.add('hidden');
      
      // Sort by completion date
      wishes.sort((a, b) => new Date(b.completedAt) - new Date(a.completedAt));
      
      container.innerHTML = wishes.map((wish, index) => {
        const style = categoryStyles[wish.category] || categoryStyles.destination;
        
        return `
          <div class="bg-white rounded-2xl shadow-lg overflow-hidden fade-in" style="animation-delay: ${index * 0.1}s">
            <div class="md:flex">
              <!-- Image -->
              <div class="md:w-1/3 relative h-48 md:h-auto">
                <img src="${wish.image || 'https://images.unsplash.com/photo-1488646953014-85cb44e25828?w=600'}" 
                     alt="${wish.title}"
                     class="w-full h-full object-cover">
                <div class="absolute top-4 left-4 ${style.bg} ${style.text} px-3 py-1 rounded-full text-sm font-medium">
                  ${style.icon} ${categoryNames[wish.category]}
                </div>
                <div class="absolute top-4 right-4 bg-green-500 text-white px-3 py-1 rounded-full text-sm font-medium">
                  ✅ 已完成
                </div>
              </div>
              
              <!-- Content -->
              <div class="md:w-2/3 p-6">
                <div class="flex justify-between items-start mb-3">
                  <div>
                    <h3 class="font-bold text-xl text-gray-800 mb-1">${wish.title}</h3>
                    <p class="text-gray-500 flex items-center gap-2">
                      📍 ${wish.destination || '-'}
                    </p>
                  </div>
                  ${wish.rating ? `
                    <div class="flex items-center gap-1">
                      ${Array(5).fill(0).map((_, i) => `
                        <span class="${i < wish.rating ? 'text-yellow-400' : 'text-gray-300'}">★</span>
                      `).join('')}
                    </div>
                  ` : ''}
                </div>
                
                ${wish.review ? `
                  <p class="text-gray-600 mb-4 line-clamp-2">"${wish.review}"</p>
                ` : ''}
                
                <!-- Photos -->
                ${wish.photos && wish.photos.length > 0 ? `
                  <div class="flex gap-2 mb-4 overflow-x-auto">
                    ${wish.photos.map(photo => `
                      <img src="${photo}" alt="旅行照片" class="w-20 h-20 object-cover rounded-lg flex-shrink-0 cursor-pointer hover:opacity-80 transition" onclick="viewPhoto('${photo}')">
                    `).join('')}
                  </div>
                ` : ''}
                
                <!-- Meta Info -->
                <div class="flex flex-wrap gap-4 text-sm text-gray-500 mb-4">
                  <span class="flex items-center gap-1">
                    📅 完成于 ${formatDate(wish.completedAt)}
                  </span>
                  ${wish.actualCost ? `
                    <span class="flex items-center gap-1">
                      💰 实际花费 ¥${Number(wish.actualCost).toLocaleString('zh-CN')}
                    </span>
                  ` : ''}
                  ${wish.duration ? `
                    <span class="flex items-center gap-1">
                      ⏱️ ${wish.duration}
                    </span>
                  ` : ''}
                </div>
                
                <!-- Actions -->
                <div class="flex gap-3 pt-4 border-t border-gray-100">
                  ${wish.review ? `
                    <button onclick="viewReview('${wish.id}')" class="flex-1 py-2 bg-primary text-white rounded-lg text-sm font-medium hover:bg-primary/90 transition">
                      📖 查看心得
                    </button>
                  ` : `
                    <button onclick="addReview('${wish.id}')" class="flex-1 py-2 bg-primary text-white rounded-lg text-sm font-medium hover:bg-primary/90 transition">
                      ✍️ 写心得
                    </button>
                  `}
                  <button onclick="deleteWish('${wish.id}')" class="px-4 py-2 bg-red-100 text-red-500 rounded-lg text-sm font-medium hover:bg-red-200 transition">
                    🗑️
                  </button>
                </div>
              </div>
            </div>
          </div>
        `;
      }).join('');
    }

    // View photo
    function viewPhoto(url) {
      window.open(url, '_blank');
    }

    // View review
    function viewReview(id) {
      const wishes = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
      const wish = wishes.find(w => w.id === id);
      if (!wish) return;
      
      const style = categoryStyles[wish.category] || categoryStyles.destination;
      
      document.getElementById('reviewContent').innerHTML = `
        <div class="text-center mb-6">
          <div class="text-5xl mb-3">🎉</div>
          <h4 class="font-bold text-xl text-gray-800">${wish.title}</h4>
          <p class="text-gray-500">${wish.destination}</p>
        </div>
        
        ${wish.rating ? `
          <div class="flex justify-center gap-1 mb-4">
            ${Array(5).fill(0).map((_, i) => `
              <span class="text-2xl ${i < wish.rating ? 'text-yellow-400' : 'text-gray-300'}">★</span>
            `).join('')}
          </div>
        ` : ''}
        
        <div class="bg-gray-50 rounded-xl p-4 mb-4">
          <p class="text-gray-700 leading-relaxed">${wish.review}</p>
        </div>
        
        ${wish.photos && wish.photos.length > 0 ? `
          <div class="grid grid-cols-2 gap-2 mb-4">
            ${wish.photos.map(photo => `
              <img src="${photo}" alt="旅行照片" class="w-full h-32 object-cover rounded-lg cursor-pointer hover:opacity-80 transition" onclick="viewPhoto('${photo}')">
            `).join('')}
          </div>
        ` : ''}
        
        <div class="text-center text-sm text-gray-500">
          完成于 ${formatDate(wish.completedAt)}
        </div>
      `;
      
      document.getElementById('reviewModal').classList.remove('hidden');
      document.getElementById('reviewModal').classList.add('flex');
    }

    // Add review
    function addReview(id) {
      const review = prompt('分享你的旅行心得：\n\n（输入你的真实感受，将有机会被推荐给其他旅行者）');
      if (review && review.trim()) {
        const wishes = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
        const wish = wishes.find(w => w.id === id);
        if (wish) {
          wish.review = review.trim();
          localStorage.setItem(STORAGE_KEY, JSON.stringify(wishes));
          loadCompletedWishes();
        }
      }
    }

    // Close review modal
    function closeReviewModal() {
      document.getElementById('reviewModal').classList.add('hidden');
      document.getElementById('reviewModal').classList.remove('flex');
    }

    // Delete wish
    function deleteWish(id) {
      if (confirm('确定要删除这个已完成的愿望吗？')) {
        let wishes = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
        wishes = wishes.filter(w => w.id !== id);
        localStorage.setItem(STORAGE_KEY, JSON.stringify(wishes));
        loadCompletedWishes();
      }
    }

    // Format date
    function formatDate(dateStr) {
      if (!dateStr) return '-';
      const date = new Date(dateStr);
      return date.toLocaleDateString('zh-CN', { year: 'numeric', month: 'long', day: 'numeric' });
    }

    // Toggle mobile menu
    function toggleMenu() {
      document.getElementById('mobileMenu').classList.toggle('hidden');
    }

    // Initialize
    document.addEventListener('DOMContentLoaded', loadCompletedWishes);
  </script>
</body>
</html>
