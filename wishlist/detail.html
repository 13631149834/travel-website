<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>愿望详情 - 游导旅游</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#0ea5e9',
            secondary: '#06b6d4',
          }
        }
      }
    }
  </script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;600;700&display=swap');
    body { font-family: 'Noto Sans SC', sans-serif; }
    .gradient-bg { background: linear-gradient(135deg, #0ea5e9 0%, #06b6d4 50%, #10b981 100%); }
    .card-hover { transition: all 0.3s ease; }
    .card-hover:hover { transform: translateY(-4px); }
    .fade-in { animation: fadeIn 0.5s ease; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    .progress-ring { transition: stroke-dashoffset 1s ease-in-out; }
  </style>
</head>
<body class="bg-gradient-to-br from-slate-50 to-blue-50 min-h-screen">
  <!-- Navigation -->
  <nav class="gradient-bg text-white sticky top-0 z-50 shadow-lg">
    <div class="max-w-7xl mx-auto px-4 py-4">
      <div class="flex items-center justify-between">
        <a href="index.html" class="flex items-center gap-2 hover:opacity-90 transition">
          <span class="text-3xl">🧭</span>
          <span class="text-2xl font-bold">游导旅游</span>
        </a>
        <div class="hidden md:flex items-center gap-8">
          <a href="../index.html" class="hover:opacity-80 transition">首页</a>
          <a href="index.html" class="font-semibold border-b-2 border-white pb-1">愿望清单</a>
        </div>
      </div>
    </div>
  </nav>

  <!-- Loading State -->
  <div id="loadingState" class="max-w-4xl mx-auto px-4 py-16 text-center">
    <div class="text-6xl mb-4 animate-spin">⏳</div>
    <p class="text-gray-500">加载中...</p>
  </div>

  <!-- Content (hidden by default) -->
  <div id="content" class="hidden">
    <!-- Hero Image -->
    <div class="relative h-64 md:h-80 bg-gradient-to-br from-blue-200 to-cyan-200 overflow-hidden">
      <img id="wishImage" src="" alt="" class="w-full h-full object-cover">
      <div class="absolute inset-0 bg-gradient-to-t from-black/60 to-transparent"></div>
      <div class="absolute bottom-0 left-0 right-0 p-6 text-white">
        <a href="index.html" class="inline-flex items-center gap-2 text-white/80 hover:text-white mb-3 transition">
          ← 返回列表
        </a>
        <div id="categoryBadge" class="inline-block px-3 py-1 rounded-full text-sm font-medium mb-3"></div>
        <h1 id="wishTitle" class="text-2xl md:text-3xl font-bold mb-2"></h1>
        <p id="wishDestination" class="text-white/90 flex items-center gap-2"></p>
      </div>
    </div>

    <!-- Main Content -->
    <main class="max-w-4xl mx-auto px-4 -mt-8 pb-16">
      <div class="grid md:grid-cols-3 gap-6">
        <!-- Left Column -->
        <div class="md:col-span-2 space-y-6">
          <!-- Description -->
          <div class="bg-white rounded-2xl shadow-lg p-6 fade-in">
            <h2 class="text-lg font-bold text-gray-800 mb-3 flex items-center gap-2">
              📝 愿望描述
            </h2>
            <p id="wishDescription" class="text-gray-600 leading-relaxed"></p>
          </div>

          <!-- Progress Section -->
          <div class="bg-white rounded-2xl shadow-lg p-6 fade-in">
            <div class="flex justify-between items-center mb-4">
              <h2 class="text-lg font-bold text-gray-800 flex items-center gap-2">
                📊 完成进度
              </h2>
              <span id="progressPercent" class="text-2xl font-bold text-primary">0%</span>
            </div>
            
            <!-- Progress Bar -->
            <div class="h-4 bg-gray-200 rounded-full overflow-hidden mb-6">
              <div id="progressBar" class="h-full bg-gradient-to-r from-primary to-secondary rounded-full transition-all duration-1000" style="width: 0%"></div>
            </div>

            <!-- Checklist -->
            <div id="checklistSection">
              <h3 class="font-medium text-gray-700 mb-3">准备清单</h3>
              <div id="checklistItems" class="space-y-3">
                <!-- Checklist items will be loaded here -->
              </div>
            </div>
            
            <!-- Add Checklist Item -->
            <div class="mt-4 flex gap-2">
              <input type="text" id="newChecklistItem" placeholder="添加新清单项..."
                     class="flex-1 px-4 py-2 border border-gray-200 rounded-lg focus:ring-2 focus:ring-primary focus:border-transparent outline-none text-sm">
              <button onclick="addChecklistItem()" class="px-4 py-2 bg-primary text-white rounded-lg text-sm font-medium hover:bg-primary/90 transition">
                添加
              </button>
            </div>
          </div>

          <!-- Notes -->
          <div id="notesSection" class="bg-white rounded-2xl shadow-lg p-6 fade-in hidden">
            <h2 class="text-lg font-bold text-gray-800 mb-3 flex items-center gap-2">
              📋 备注信息
            </h2>
            <p id="wishNotes" class="text-gray-600 leading-relaxed"></p>
          </div>

          <!-- Related Guides -->
          <div class="bg-white rounded-2xl shadow-lg p-6 fade-in">
            <h2 class="text-lg font-bold text-gray-800 mb-4 flex items-center gap-2">
              🔗 相关攻略
            </h2>
            <div id="relatedGuides" class="grid grid-cols-2 gap-4">
              <!-- Related guides will be loaded here -->
            </div>
          </div>
        </div>

        <!-- Right Column -->
        <div class="space-y-6">
          <!-- Quick Actions -->
          <div class="bg-white rounded-2xl shadow-lg p-6 fade-in sticky top-24">
            <!-- Circular Progress -->
            <div class="text-center mb-6">
              <svg class="w-32 h-32 mx-auto" viewBox="0 0 100 100">
                <circle cx="50" cy="50" r="45" fill="none" stroke="#e5e7eb" stroke-width="8"/>
                <circle id="progressRing" cx="50" cy="50" r="45" fill="none" stroke="url(#gradient)" stroke-width="8" 
                        stroke-linecap="round" stroke-dasharray="283" stroke-dashoffset="283"
                        transform="rotate(-90 50 50)" class="progress-ring"/>
                <defs>
                  <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="0%">
                    <stop offset="0%" stop-color="#0ea5e9"/>
                    <stop offset="100%" stop-color="#10b981"/>
                  </linearGradient>
                </defs>
              </svg>
              <div class="-mt-20">
                <div id="ringPercent" class="text-3xl font-bold text-primary">0%</div>
                <div class="text-sm text-gray-500">完成度</div>
              </div>
            </div>

            <!-- Info -->
            <div class="space-y-3 mb-6">
              <div id="targetDateInfo" class="flex items-center gap-3 text-gray-600">
                <span class="text-xl">📅</span>
                <div>
                  <div class="text-sm text-gray-400">目标日期</div>
                  <div id="targetDate" class="font-medium">-</div>
                </div>
              </div>
              <div class="flex items-center gap-3 text-gray-600">
                <span class="text-xl">💰</span>
                <div>
                  <div class="text-sm text-gray-400">预计预算</div>
                  <div id="budget" class="font-medium">¥0</div>
                </div>
              </div>
              <div class="flex items-center gap-3 text-gray-600">
                <span class="text-xl">📅</span>
                <div>
                  <div class="text-sm text-gray-400">创建时间</div>
                  <div id="createdAt" class="font-medium">-</div>
                </div>
              </div>
            </div>

            <!-- Actions -->
            <div class="space-y-3">
              <button id="markCompleteBtn" onclick="markComplete()" 
                      class="w-full py-3 bg-green-500 text-white rounded-xl font-medium hover:bg-green-600 transition flex items-center justify-center gap-2">
                ✅ 标记完成
              </button>
              <button onclick="shareWish()" 
                      class="w-full py-3 bg-gray-100 text-gray-700 rounded-xl font-medium hover:bg-gray-200 transition flex items-center justify-center gap-2">
                📤 分享愿望
              </button>
              <a id="editLink" href="#" 
                 class="w-full py-3 bg-blue-50 text-primary rounded-xl font-medium hover:bg-blue-100 transition flex items-center justify-center gap-2 text-center">
                ✏️ 编辑愿望
              </a>
              <button onclick="deleteWish()" 
                      class="w-full py-3 bg-red-50 text-red-500 rounded-xl font-medium hover:bg-red-100 transition flex items-center justify-center gap-2">
                🗑️ 删除愿望
              </button>
            </div>
          </div>
        </div>
      </div>
    </main>
  </div>

  <!-- Share Modal -->
  <div id="shareModal" class="fixed inset-0 bg-black/50 z-50 hidden items-center justify-center">
    <div class="bg-white rounded-2xl p-6 max-w-md mx-4">
      <div class="flex justify-between items-center mb-4">
        <h3 class="text-lg font-bold text-gray-800">📤 分享愿望</h3>
        <button onclick="closeShareModal()" class="text-gray-400 hover:text-gray-600 text-2xl">&times;</button>
      </div>
      <div class="space-y-4">
        <div class="bg-gray-50 rounded-xl p-4">
          <p class="text-gray-600 text-sm mb-2">复制以下内容分享：</p>
          <textarea id="shareText" rows="4" readonly 
                    class="w-full bg-white border border-gray-200 rounded-lg p-3 text-sm text-gray-700"></textarea>
        </div>
        <button onclick="copyShareText()" 
                class="w-full py-3 bg-primary text-white rounded-xl font-medium hover:bg-primary/90 transition">
          📋 复制链接
        </button>
      </div>
    </div>
  </div>

  <!-- Footer -->
  <footer class="bg-gray-800 text-white py-6 mt-auto">
    <div class="max-w-7xl mx-auto px-4 text-center">
      <p class="text-gray-400">© 2025 游导旅游 · 让旅行更简单</p>
    </div>
  </footer>

  <script>
    const STORAGE_KEY = 'travel_wishlist';
    let currentWish = null;

    // Category styles
    const categoryStyles = {
      destination: { icon: '🌍', bg: 'bg-blue-100', text: 'text-blue-600' },
      experience: { icon: '🎯', bg: 'bg-purple-100', text: 'text-purple-600' },
      food: { icon: '🍜', bg: 'bg-orange-100', text: 'text-orange-600' },
      accommodation: { icon: '🏨', bg: 'bg-pink-100', text: 'text-pink-600' },
      adventure: { icon: '⛷️', bg: 'bg-red-100', text: 'text-red-600' }
    };

    const categoryNames = {
      destination: '目的地',
      experience: '体验',
      food: '美食',
      accommodation: '住宿',
      adventure: '挑战'
    };

    // Get wish ID from URL
    function getWishId() {
      const params = new URLSearchParams(window.location.search);
      return params.get('id');
    }

    // Load wish details
    function loadWish() {
      const id = getWishId();
      if (!id) {
        window.location.href = 'index.html';
        return;
      }

      const wishes = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
      currentWish = wishes.find(w => w.id === id);

      if (!currentWish) {
        alert('愿望不存在');
        window.location.href = 'index.html';
        return;
      }

      document.getElementById('loadingState').classList.add('hidden');
      document.getElementById('content').classList.remove('hidden');
      renderWish();
    }

    // Render wish details
    function renderWish() {
      const wish = currentWish;
      const style = categoryStyles[wish.category] || categoryStyles.destination;

      // Header
      document.getElementById('wishImage').src = wish.image || 'https://images.unsplash.com/photo-1488646953014-85cb44e25828?w=800';
      document.getElementById('categoryBadge').className = `inline-block px-3 py-1 rounded-full text-sm font-medium mb-3 ${style.bg} ${style.text}`;
      document.getElementById('categoryBadge').innerHTML = `${style.icon} ${categoryNames[wish.category]}`;
      document.getElementById('wishTitle').textContent = wish.title;
      document.getElementById('wishDestination').innerHTML = `📍 ${wish.destination || '-'}`;

      // Description
      document.getElementById('wishDescription').textContent = wish.description || '暂无描述';

      // Notes
      if (wish.notes) {
        document.getElementById('notesSection').classList.remove('hidden');
        document.getElementById('wishNotes').textContent = wish.notes;
      }

      // Progress
      const progress = wish.progress || 0;
      document.getElementById('progressPercent').textContent = progress + '%';
      document.getElementById('progressBar').style.width = progress + '%';
      document.getElementById('ringPercent').textContent = progress + '%';
      
      // Progress ring (circumference = 2 * π * 45 ≈ 283)
      const circumference = 283;
      const offset = circumference - (progress / 100) * circumference;
      document.getElementById('progressRing').style.strokeDashoffset = offset;

      // Checklist
      renderChecklist();

      // Info
      if (wish.targetDate) {
        document.getElementById('targetDate').textContent = formatDate(wish.targetDate);
        const daysLeft = getDaysLeft(wish.targetDate);
        if (daysLeft !== null) {
          document.getElementById('targetDateInfo').innerHTML = `
            <span class="text-xl">${daysLeft < 0 ? '⏱️' : '📅'}</span>
            <div>
              <div class="text-sm text-gray-400">${daysLeft < 0 ? '已逾期' : '剩余天数'}</div>
              <div class="font-medium ${daysLeft < 0 ? 'text-red-500' : 'text-green-500'}">${Math.abs(daysLeft)}天</div>
            </div>
          `;
        }
      }
      document.getElementById('budget').textContent = '¥' + Number(wish.estimatedBudget || 0).toLocaleString('zh-CN');
      document.getElementById('createdAt').textContent = formatDate(wish.createdAt);

      // Edit link
      document.getElementById('editLink').href = `edit.html?id=${wish.id}`;

      // Related guides
      renderRelatedGuides();
    }

    // Render checklist
    function renderChecklist() {
      const container = document.getElementById('checklistItems');
      const checklist = currentWish.checklist || [];
      
      if (checklist.length === 0) {
        container.innerHTML = '<p class="text-gray-400 text-sm">暂无清单项</p>';
        return;
      }

      container.innerHTML = checklist.map((item, index) => `
        <label class="flex items-center gap-3 p-3 bg-gray-50 rounded-xl cursor-pointer hover:bg-gray-100 transition">
          <input type="checkbox" ${item.completed ? 'checked' : ''} 
                 onchange="toggleChecklistItem(${index})"
                 class="w-5 h-5 rounded border-gray-300 text-primary focus:ring-primary">
          <span class="flex-1 ${item.completed ? 'line-through text-gray-400' : 'text-gray-700'}">${item.item}</span>
        </label>
      `).join('');
    }

    // Toggle checklist item
    function toggleChecklistItem(index) {
      currentWish.checklist[index].completed = !currentWish.checklist[index].completed;
      
      // Update progress based on checklist
      const completed = currentWish.checklist.filter(i => i.completed).length;
      const total = currentWish.checklist.length;
      currentWish.progress = total > 0 ? Math.round((completed / total) * 100) : 0;
      currentWish.updatedAt = new Date().toISOString();
      
      saveWish();
      renderChecklist();
      updateProgressUI();
    }

    // Add checklist item
    function addChecklistItem() {
      const input = document.getElementById('newChecklistItem');
      const value = input.value.trim();
      
      if (!value) return;
      
      if (!currentWish.checklist) currentWish.checklist = [];
      currentWish.checklist.push({ item: value, completed: false });
      currentWish.updatedAt = new Date().toISOString();
      
      saveWish();
      renderChecklist();
      input.value = '';
    }

    // Update progress UI
    function updateProgressUI() {
      const progress = currentWish.progress || 0;
      document.getElementById('progressPercent').textContent = progress + '%';
      document.getElementById('progressBar').style.width = progress + '%';
      document.getElementById('ringPercent').textContent = progress + '%';
      
      const circumference = 283;
      const offset = circumference - (progress / 100) * circumference;
      document.getElementById('progressRing').style.strokeDashoffset = offset;
    }

    // Save wish
    function saveWish() {
      const wishes = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
      const index = wishes.findIndex(w => w.id === currentWish.id);
      if (index !== -1) {
        wishes[index] = currentWish;
        localStorage.setItem(STORAGE_KEY, JSON.stringify(wishes));
      }
    }

    // Mark complete
    function markComplete() {
      if (confirm('确定要将这个愿望标记为完成吗？')) {
        currentWish.status = 'completed';
        currentWish.progress = 100;
        currentWish.completedAt = new Date().toISOString();
        saveWish();
        
        showConfetti();
        setTimeout(() => {
          window.location.href = 'completed.html';
        }, 1500);
      }
    }

    // Delete wish
    function deleteWish() {
      if (confirm('确定要删除这个愿望吗？此操作不可恢复。')) {
        let wishes = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
        wishes = wishes.filter(w => w.id !== currentWish.id);
        localStorage.setItem(STORAGE_KEY, JSON.stringify(wishes));
        window.location.href = 'index.html';
      }
    }

    // Share wish
    function shareWish() {
      const text = `🎯 我的旅行愿望清单\n\n✨ ${currentWish.title}\n📍 ${currentWish.destination}\n💰 预算：¥${Number(currentWish.estimatedBudget || 0).toLocaleString('zh-CN')}\n📅 目标：${currentWish.targetDate ? formatDate(currentWish.targetDate) : '待定'}\n\n来自 @游导旅游 的愿望清单`;
      
      document.getElementById('shareText').value = text;
      document.getElementById('shareModal').classList.remove('hidden');
      document.getElementById('shareModal').classList.add('flex');
    }

    // Close share modal
    function closeShareModal() {
      document.getElementById('shareModal').classList.add('hidden');
      document.getElementById('shareModal').classList.remove('flex');
    }

    // Copy share text
    function copyShareText() {
      const text = document.getElementById('shareText');
      text.select();
      document.execCommand('copy');
      alert('已复制到剪贴板！');
      closeShareModal();
    }

    // Render related guides
    function renderRelatedGuides() {
      const container = document.getElementById('relatedGuides');
      const destination = currentWish.destination || '';
      
      // Sample related guides
      const guides = [
        { title: '目的地攻略', icon: '🗺️', url: '../destinations.html' },
        { title: '旅行必备清单', icon: '📝', url: '../checklist.html' },
        { title: '预算规划工具', icon: '💰', url: '../budget-calculator.html' },
        { title: '签证办理指南', icon: '📋', url: '../visa-checklist.html' }
      ];
      
      container.innerHTML = guides.map(guide => `
        <a href="${guide.url}" class="card-hover bg-gray-50 rounded-xl p-4 text-center">
          <div class="text-2xl mb-2">${guide.icon}</div>
          <div class="text-sm font-medium text-gray-700">${guide.title}</div>
        </a>
      `).join('');
    }

    // Format date
    function formatDate(dateStr) {
      if (!dateStr) return '-';
      const date = new Date(dateStr);
      return date.toLocaleDateString('zh-CN', { year: 'numeric', month: 'long', day: 'numeric' });
    }

    // Get days left
    function getDaysLeft(targetDate) {
      if (!targetDate) return null;
      const today = new Date();
      today.setHours(0, 0, 0, 0);
      const target = new Date(targetDate);
      return Math.ceil((target - today) / (1000 * 60 * 60 * 24));
    }

    // Show confetti
    function showConfetti() {
      const colors = ['#0ea5e9', '#06b6d4', '#10b981', '#f59e0b', '#ef4444', '#8b5cf6'];
      for (let i = 0; i < 50; i++) {
        const confetti = document.createElement('div');
        confetti.className = 'fixed pointer-events-none z-50';
        confetti.style.cssText = `
          left: ${Math.random() * 100}vw;
          top: -20px;
          width: ${Math.random() * 10 + 5}px;
          height: ${Math.random() * 10 + 5}px;
          background: ${colors[Math.floor(Math.random() * colors.length)]};
          border-radius: ${Math.random() > 0.5 ? '50%' : '0'};
          animation: confetti-fall ${Math.random() * 2 + 2}s linear forwards;
        `;
        document.body.appendChild(confetti);
        setTimeout(() => confetti.remove(), 4000);
      }
    }

    // Add confetti animation
    const style = document.createElement('style');
    style.textContent = `
      @keyframes confetti-fall {
        to { transform: translateY(100vh) rotate(720deg); opacity: 0; }
      }
    `;
    document.head.appendChild(style);

    // Initialize
    document.addEventListener('DOMContentLoaded', loadWish);
  </script>
</body>
</html>
