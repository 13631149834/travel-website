<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>我的旅行愿望清单 - 游导旅游</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#0ea5e9',
            secondary: '#06b6d4',
          }
        }
      }
    }
  </script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;600;700&display=swap');
    body { font-family: 'Noto Sans SC', sans-serif; }
    .gradient-bg { background: linear-gradient(135deg, #0ea5e9 0%, #06b6d4 50%, #10b981 100%); }
    .card-hover { transition: all 0.3s ease; }
    .card-hover:hover { transform: translateY(-6px); box-shadow: 0 20px 40px rgba(0,0,0,0.12); }
    .progress-bar { transition: width 1s ease-in-out; }
    .fade-in { animation: fadeIn 0.6s ease; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    .confetti { position: fixed; pointer-events: none; z-index: 9999; }
    @keyframes confetti-fall { to { transform: translateY(100vh) rotate(720deg); opacity: 0; } }
  </style>
</head>
<body class="bg-gradient-to-br from-slate-50 to-blue-50 min-h-screen">
  <!-- Navigation -->
  <nav class="gradient-bg text-white sticky top-0 z-50 shadow-lg">
    <div class="max-w-7xl mx-auto px-4 py-4">
      <div class="flex items-center justify-between">
        <a href="../index.html" class="flex items-center gap-2 hover:opacity-90 transition">
          <span class="text-3xl">🧭</span>
          <span class="text-2xl font-bold">游导旅游</span>
        </a>
        <div class="hidden md:flex items-center gap-8">
          <a href="../index.html" class="hover:opacity-80 transition">首页</a>
          <a href="../destinations.html" class="hover:opacity-80 transition">目的地</a>
          <a href="../routes.html" class="hover:opacity-80 transition">路线</a>
          <a href="index.html" class="font-semibold border-b-2 border-white pb-1">愿望清单</a>
        </div>
        <button class="md:hidden text-2xl" onclick="toggleMenu()">☰</button>
      </div>
      <div id="mobileMenu" class="hidden md:hidden mt-4 pb-2 space-y-3">
        <a href="../index.html" class="block py-2">首页</a>
        <a href="../destinations.html" class="block py-2">目的地</a>
        <a href="../routes.html" class="block py-2">路线</a>
        <a href="index.html" class="block py-2 font-semibold">愿望清单</a>
      </div>
    </div>
  </nav>

  <!-- Hero Section -->
  <section class="gradient-bg text-white py-12">
    <div class="max-w-7xl mx-auto px-4 text-center fade-in">
      <div class="inline-block px-4 py-1.5 bg-white/20 rounded-full text-sm mb-4">✨ 让每一个梦想都有实现的可能</div>
      <h1 class="text-3xl md:text-4xl font-bold mb-3">🎯 我的旅行愿望清单</h1>
      <p class="text-lg opacity-90 max-w-2xl mx-auto">记录你的旅行梦想，追踪完成进度，让愿望变为现实</p>
    </div>
  </section>

  <!-- Stats Overview -->
  <section class="max-w-7xl mx-auto px-4 -mt-6 mb-8">
    <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
      <div class="bg-white rounded-2xl p-5 shadow-lg text-center fade-in">
        <div class="text-3xl mb-2">📝</div>
        <div id="totalWishes" class="text-2xl font-bold text-primary">0</div>
        <div class="text-sm text-gray-500">总愿望数</div>
      </div>
      <div class="bg-white rounded-2xl p-5 shadow-lg text-center fade-in" style="animation-delay: 0.1s">
        <div class="text-3xl mb-2">✅</div>
        <div id="completedWishes" class="text-2xl font-bold text-green-500">0</div>
        <div class="text-sm text-gray-500">已完成</div>
      </div>
      <div class="bg-white rounded-2xl p-5 shadow-lg text-center fade-in" style="animation-delay: 0.2s">
        <div class="text-3xl mb-2">📊</div>
        <div id="completionRate" class="text-2xl font-bold text-purple-500">0%</div>
        <div class="text-sm text-gray-500">完成率</div>
      </div>
      <div class="bg-white rounded-2xl p-5 shadow-lg text-center fade-in" style="animation-delay: 0.3s">
        <div class="text-3xl mb-2">💰</div>
        <div id="totalBudget" class="text-2xl font-bold text-orange-500">¥0</div>
        <div class="text-sm text-gray-500">预计花费</div>
      </div>
    </div>
  </section>

  <!-- Quick Actions -->
  <section class="max-w-7xl mx-auto px-4 mb-8">
    <div class="flex flex-wrap gap-4 justify-between items-center">
      <div class="flex flex-wrap gap-3">
        <button onclick="filterByCategory('all')" id="filter-all" class="px-4 py-2 bg-primary text-white rounded-full text-sm font-medium transition hover:shadow-lg">
          全部
        </button>
        <button onclick="filterByCategory('destination')" id="filter-destination" class="px-4 py-2 bg-white text-gray-600 rounded-full text-sm font-medium transition hover:shadow-lg border border-gray-200">
          🌍 目的地
        </button>
        <button onclick="filterByCategory('experience')" id="filter-experience" class="px-4 py-2 bg-white text-gray-600 rounded-full text-sm font-medium transition hover:shadow-lg border border-gray-200">
          🎯 体验
        </button>
        <button onclick="filterByCategory('food')" id="filter-food" class="px-4 py-2 bg-white text-gray-600 rounded-full text-sm font-medium transition hover:shadow-lg border border-gray-200">
          🍜 美食
        </button>
        <button onclick="filterByCategory('accommodation')" id="filter-accommodation" class="px-4 py-2 bg-white text-gray-600 rounded-full text-sm font-medium transition hover:shadow-lg border border-gray-200">
          🏨 住宿
        </button>
        <button onclick="filterByCategory('adventure')" id="filter-adventure" class="px-4 py-2 bg-white text-gray-600 rounded-full text-sm font-medium transition hover:shadow-lg border border-gray-200">
          ⛷️ 挑战
        </button>
      </div>
      <div class="flex gap-3">
        <a href="statistics.html" class="px-4 py-2 bg-white text-gray-600 rounded-lg text-sm font-medium transition hover:shadow-lg border border-gray-200 flex items-center gap-2">
          📊 统计
        </a>
        <a href="completed.html" class="px-4 py-2 bg-white text-gray-600 rounded-lg text-sm font-medium transition hover:shadow-lg border border-gray-200 flex items-center gap-2">
          🏆 已完成
        </a>
        <a href="add.html" class="px-5 py-2 bg-primary text-white rounded-lg font-medium transition hover:shadow-lg flex items-center gap-2">
          ➕ 添加愿望
        </a>
      </div>
    </div>
  </section>

  <!-- Wish List -->
  <main class="max-w-7xl mx-auto px-4 pb-16">
    <div id="wishList" class="grid md:grid-cols-2 lg:grid-cols-3 gap-6">
      <!-- Wish cards will be loaded here -->
    </div>
    
    <!-- Empty State -->
    <div id="emptyState" class="hidden text-center py-16">
      <div class="text-8xl mb-6">🎯</div>
      <h3 class="text-2xl font-bold text-gray-700 mb-3">还没有旅行愿望</h3>
      <p class="text-gray-500 mb-6">开始添加你的第一个旅行愿望吧！</p>
      <a href="add.html" class="inline-block px-6 py-3 bg-primary text-white rounded-full font-medium hover:shadow-lg transition">
        ➕ 添加第一个愿望
      </a>
    </div>
  </main>

  <!-- Footer -->
  <footer class="bg-gray-800 text-white py-8 mt-auto">
    <div class="max-w-7xl mx-auto px-4 text-center">
      <p class="text-gray-400">© 2025 游导旅游 · 让旅行更简单</p>
    </div>
  </footer>

  <script>
    // Data storage key
    const STORAGE_KEY = 'travel_wishlist';
    
    // Category icons and colors
    const categoryStyles = {
      destination: { icon: '🌍', bg: 'bg-blue-100', text: 'text-blue-600' },
      experience: { icon: '🎯', bg: 'bg-purple-100', text: 'text-purple-600' },
      food: { icon: '🍜', bg: 'bg-orange-100', text: 'text-orange-600' },
      accommodation: { icon: '🏨', bg: 'bg-pink-100', text: 'text-pink-600' },
      adventure: { icon: '⛷️', bg: 'bg-red-100', text: 'text-red-600' }
    };

    // Load data from localStorage
    function loadWishes() {
      const stored = localStorage.getItem(STORAGE_KEY);
      if (stored) {
        return JSON.parse(stored);
      }
      // Load sample data
      fetch('../data/wishlist.json')
        .then(res => res.json())
        .then(data => {
          localStorage.setItem(STORAGE_KEY, JSON.stringify(data.sampleWishes));
          return data.sampleWishes;
        })
        .then(wishes => {
          renderWishes(wishes);
          updateStats(wishes);
        });
    }

    // Get wishes from storage
    function getWishes() {
      const stored = localStorage.getItem(STORAGE_KEY);
      return stored ? JSON.parse(stored) : [];
    }

    // Save wishes to storage
    function saveWishes(wishes) {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(wishes));
    }

    // Current filter
    let currentFilter = 'all';

    // Filter wishes by category
    function filterByCategory(category) {
      currentFilter = category;
      const wishes = getWishes().filter(w => w.status === 'active');
      const filtered = category === 'all' ? wishes : wishes.filter(w => w.category === category);
      
      // Update filter buttons
      document.querySelectorAll('[id^="filter-"]').forEach(btn => {
        btn.classList.remove('bg-primary', 'text-white');
        btn.classList.add('bg-white', 'text-gray-600', 'border', 'border-gray-200');
      });
      const activeBtn = document.getElementById(`filter-${category}`);
      if (activeBtn) {
        activeBtn.classList.remove('bg-white', 'text-gray-600', 'border', 'border-gray-200');
        activeBtn.classList.add('bg-primary', 'text-white');
      }
      
      renderWishes(filtered);
    }

    // Render wish cards
    function renderWishes(wishes) {
      const container = document.getElementById('wishList');
      const emptyState = document.getElementById('emptyState');
      
      if (wishes.length === 0) {
        container.innerHTML = '';
        emptyState.classList.remove('hidden');
        return;
      }
      
      emptyState.classList.add('hidden');
      
      container.innerHTML = wishes.map((wish, index) => {
        const style = categoryStyles[wish.category] || categoryStyles.destination;
        const daysLeft = getDaysLeft(wish.targetDate);
        const isUrgent = daysLeft !== null && daysLeft <= 30 && daysLeft >= 0;
        const isPast = daysLeft !== null && daysLeft < 0;
        
        return `
          <div class="card-hover bg-white rounded-2xl overflow-hidden shadow-lg fade-in" style="animation-delay: ${index * 0.1}s">
            <div class="relative h-48 bg-gradient-to-br from-blue-200 to-cyan-200 overflow-hidden">
              <img src="${wish.image || 'https://images.unsplash.com/photo-1488646953014-85cb44e25828?w=600'}" 
                   alt="${wish.title}" 
                   class="w-full h-full object-cover"
                   onerror="this.style.display='none'; this.parentElement.classList.add('flex', 'items-center', 'justify-center'); this.insertAdjacentHTML('afterend', '<span class=\\'text-6xl\\'>${style.icon}</span>')">
              <div class="absolute top-4 left-4 ${style.bg} ${style.text} px-3 py-1 rounded-full text-sm font-medium">
                ${style.icon} ${getCategoryName(wish.category)}
              </div>
              ${isUrgent ? '<div class="absolute top-4 right-4 bg-red-500 text-white px-3 py-1 rounded-full text-sm font-medium animate-pulse">⏰ 即将到期</div>' : ''}
              ${isPast ? '<div class="absolute top-4 right-4 bg-gray-500 text-white px-3 py-1 rounded-full text-sm font-medium">已过期</div>' : ''}
            </div>
            <div class="p-5">
              <h3 class="font-bold text-lg text-gray-800 mb-2 line-clamp-2">${wish.title}</h3>
              <p class="text-gray-500 text-sm mb-3 line-clamp-2">${wish.description || ''}</p>
              
              <!-- Progress -->
              <div class="mb-4">
                <div class="flex justify-between text-sm mb-1">
                  <span class="text-gray-500">完成进度</span>
                  <span class="font-medium text-primary">${wish.progress || 0}%</span>
                </div>
                <div class="h-2 bg-gray-200 rounded-full overflow-hidden">
                  <div class="progress-bar h-full bg-gradient-to-r from-primary to-secondary rounded-full" style="width: ${wish.progress || 0}%"></div>
                </div>
              </div>
              
              <!-- Info -->
              <div class="flex flex-wrap gap-2 mb-4">
                ${wish.destination ? `<span class="text-xs text-gray-500 bg-gray-100 px-2 py-1 rounded">📍 ${wish.destination}</span>` : ''}
                ${daysLeft !== null ? `
                  <span class="text-xs ${isPast ? 'text-red-500 bg-red-50' : isUrgent ? 'text-orange-500 bg-orange-50' : 'text-gray-500 bg-gray-100'} px-2 py-1 rounded">
                    ${isPast ? '⏱️ 逾期' : `📅 ${daysLeft}天后`}
                  </span>
                ` : ''}
                <span class="text-xs text-gray-500 bg-gray-100 px-2 py-1 rounded">💰 ¥${formatNumber(wish.estimatedBudget || 0)}</span>
              </div>
              
              <!-- Actions -->
              <div class="flex gap-2 pt-3 border-t border-gray-100">
                <a href="detail.html?id=${wish.id}" class="flex-1 text-center py-2 bg-primary text-white rounded-lg text-sm font-medium hover:bg-primary/90 transition">
                  查看详情
                </a>
                <button onclick="markComplete('${wish.id}')" class="px-4 py-2 bg-green-500 text-white rounded-lg text-sm font-medium hover:bg-green-600 transition" title="标记完成">
                  ✓
                </button>
                <button onclick="deleteWish('${wish.id}')" class="px-4 py-2 bg-red-100 text-red-500 rounded-lg text-sm font-medium hover:bg-red-200 transition" title="删除">
                  🗑️
                </button>
              </div>
            </div>
          </div>
        `;
      }).join('');
    }

    // Get category name
    function getCategoryName(category) {
      const names = {
        destination: '目的地',
        experience: '体验',
        food: '美食',
        accommodation: '住宿',
        adventure: '挑战'
      };
      return names[category] || category;
    }

    // Get days left until target date
    function getDaysLeft(targetDate) {
      if (!targetDate) return null;
      const today = new Date();
      today.setHours(0, 0, 0, 0);
      const target = new Date(targetDate);
      const diff = target - today;
      return Math.ceil(diff / (1000 * 60 * 60 * 24));
    }

    // Format number
    function formatNumber(num) {
      return Number(num).toLocaleString('zh-CN');
    }

    // Update statistics
    function updateStats(wishes) {
      const activeWishes = wishes.filter(w => w.status === 'active');
      const completedWishes = wishes.filter(w => w.status === 'completed');
      const totalBudget = activeWishes.reduce((sum, w) => sum + (Number(w.estimatedBudget) || 0), 0);
      
      document.getElementById('totalWishes').textContent = activeWishes.length;
      document.getElementById('completedWishes').textContent = completedWishes.length;
      document.getElementById('completionRate').textContent = wishes.length > 0 
        ? Math.round((completedWishes.length / wishes.length) * 100) + '%' 
        : '0%';
      document.getElementById('totalBudget').textContent = '¥' + formatNumber(totalBudget);
    }

    // Mark wish as complete
    function markComplete(id) {
      const wishes = getWishes();
      const wish = wishes.find(w => w.id === id);
      if (wish) {
        wish.status = 'completed';
        wish.completedAt = new Date().toISOString();
        wish.progress = 100;
        saveWishes(wishes);
        
        // Show confetti
        showConfetti();
        
        // Refresh after delay
        setTimeout(() => {
          filterByCategory(currentFilter);
          updateStats(getWishes());
        }, 1500);
      }
    }

    // Delete wish
    function deleteWish(id) {
      if (confirm('确定要删除这个愿望吗？')) {
        let wishes = getWishes();
        wishes = wishes.filter(w => w.id !== id);
        saveWishes(wishes);
        filterByCategory(currentFilter);
        updateStats(wishes);
      }
    }

    // Show confetti animation
    function showConfetti() {
      const colors = ['#0ea5e9', '#06b6d4', '#10b981', '#f59e0b', '#ef4444', '#8b5cf6'];
      for (let i = 0; i < 50; i++) {
        const confetti = document.createElement('div');
        confetti.className = 'confetti';
        confetti.style.cssText = `
          left: ${Math.random() * 100}vw;
          top: -20px;
          width: ${Math.random() * 10 + 5}px;
          height: ${Math.random() * 10 + 5}px;
          background: ${colors[Math.floor(Math.random() * colors.length)]};
          border-radius: ${Math.random() > 0.5 ? '50%' : '0'};
          animation: confetti-fall ${Math.random() * 2 + 2}s linear forwards;
        `;
        document.body.appendChild(confetti);
        setTimeout(() => confetti.remove(), 4000);
      }
    }

    // Toggle mobile menu
    function toggleMenu() {
      document.getElementById('mobileMenu').classList.toggle('hidden');
    }

    // Initialize
    document.addEventListener('DOMContentLoaded', () => {
      loadWishes();
    });
  </script>
</body>
</html>
