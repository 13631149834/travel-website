<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>愿望统计 - 游导旅游</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#0ea5e9',
            secondary: '#06b6d4',
          }
        }
      }
    }
  </script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;600;700&display=swap');
    body { font-family: 'Noto Sans SC', sans-serif; }
    .gradient-bg { background: linear-gradient(135deg, #0ea5e9 0%, #06b6d4 50%, #10b981 100%); }
    .card-hover { transition: all 0.3s ease; }
    .card-hover:hover { transform: translateY(-4px); }
    .fade-in { animation: fadeIn 0.6s ease; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    .counter { animation: countUp 1s ease-out; }
    @keyframes countUp { from { opacity: 0; transform: scale(0.5); } to { opacity: 1; transform: scale(1); } }
    .progress-circle { transition: stroke-dashoffset 1.5s ease-in-out; }
  </style>
</head>
<body class="bg-gradient-to-br from-slate-50 to-blue-50 min-h-screen">
  <!-- Navigation -->
  <nav class="gradient-bg text-white sticky top-0 z-50 shadow-lg">
    <div class="max-w-7xl mx-auto px-4 py-4">
      <div class="flex items-center justify-between">
        <a href="../index.html" class="flex items-center gap-2 hover:opacity-90 transition">
          <span class="text-3xl">🧭</span>
          <span class="text-2xl font-bold">游导旅游</span>
        </a>
        <div class="hidden md:flex items-center gap-8">
          <a href="../index.html" class="hover:opacity-80 transition">首页</a>
          <a href="index.html" class="font-semibold border-b-2 border-white pb-1">愿望清单</a>
        </div>
      </div>
    </div>
  </nav>

  <!-- Hero Section -->
  <section class="gradient-bg text-white py-12">
    <div class="max-w-7xl mx-auto px-4 text-center fade-in">
      <div class="inline-block px-4 py-1.5 bg-white/20 rounded-full text-sm mb-4">📊 数据概览</div>
      <h1 class="text-3xl md:text-4xl font-bold mb-3">🎯 愿望清单统计</h1>
      <p class="text-lg opacity-90">全面了解你的旅行愿望和完成情况</p>
    </div>
  </section>

  <!-- Main Stats -->
  <section class="max-w-7xl mx-auto px-4 -mt-6 mb-8">
    <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
      <div class="bg-white rounded-2xl p-5 shadow-lg text-center fade-in counter">
        <div class="text-4xl mb-2">📝</div>
        <div id="totalWishes" class="text-3xl font-bold text-primary">0</div>
        <div class="text-sm text-gray-500">总愿望数</div>
      </div>
      <div class="bg-white rounded-2xl p-5 shadow-lg text-center fade-in counter" style="animation-delay: 0.1s">
        <div class="text-4xl mb-2">✅</div>
        <div id="completedWishes" class="text-3xl font-bold text-green-500">0</div>
        <div class="text-sm text-gray-500">已完成</div>
      </div>
      <div class="bg-white rounded-2xl p-5 shadow-lg text-center fade-in counter" style="animation-delay: 0.2s">
        <div class="text-4xl mb-2">🔄</div>
        <div id="activeWishes" class="text-3xl font-bold text-orange-500">0</div>
        <div class="text-sm text-gray-500">进行中</div>
      </div>
      <div class="bg-white rounded-2xl p-5 shadow-lg text-center fade-in counter" style="animation-delay: 0.3s">
        <div class="text-4xl mb-2">📈</div>
        <div id="completionRate" class="text-3xl font-bold text-purple-500">0%</div>
        <div class="text-sm text-gray-500">完成率</div>
      </div>
    </div>
  </section>

  <!-- Charts Section -->
  <main class="max-w-7xl mx-auto px-4 pb-16">
    <div class="grid md:grid-cols-2 gap-6 mb-8">
      <!-- Completion Rate Chart -->
      <div class="bg-white rounded-2xl shadow-lg p-6 fade-in">
        <h2 class="text-lg font-bold text-gray-800 mb-6 flex items-center gap-2">
          📊 完成率
        </h2>
        <div class="flex items-center justify-center">
          <div class="relative">
            <svg class="w-48 h-48" viewBox="0 0 100 100">
              <circle cx="50" cy="50" r="45" fill="none" stroke="#e5e7eb" stroke-width="10"/>
              <circle id="completionRing" cx="50" cy="50" r="45" fill="none" stroke="url(#gradient)" stroke-width="10" 
                      stroke-linecap="round" stroke-dasharray="283" stroke-dashoffset="283"
                      transform="rotate(-90 50 50)" class="progress-circle"/>
              <defs>
                <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="0%">
                  <stop offset="0%" stop-color="#0ea5e9"/>
                  <stop offset="100%" stop-color="#10b981"/>
                </linearGradient>
              </defs>
            </svg>
            <div class="absolute inset-0 flex flex-col items-center justify-center">
              <div id="ringRate" class="text-4xl font-bold text-primary">0%</div>
              <div class="text-sm text-gray-500">完成率</div>
            </div>
          </div>
        </div>
        <div class="grid grid-cols-2 gap-4 mt-6 text-center">
          <div class="bg-green-50 rounded-xl p-4">
            <div class="text-2xl font-bold text-green-600" id="completedCount">0</div>
            <div class="text-sm text-gray-500">已完成</div>
          </div>
          <div class="bg-orange-50 rounded-xl p-4">
            <div class="text-2xl font-bold text-orange-600" id="remainingCount">0</div>
            <div class="text-sm text-gray-500">剩余</div>
          </div>
        </div>
      </div>

      <!-- Budget Overview -->
      <div class="bg-white rounded-2xl shadow-lg p-6 fade-in">
        <h2 class="text-lg font-bold text-gray-800 mb-6 flex items-center gap-2">
          💰 预算概览
        </h2>
        <div class="space-y-4">
          <div class="flex justify-between items-center p-4 bg-blue-50 rounded-xl">
            <div class="flex items-center gap-3">
              <span class="text-2xl">📝</span>
              <span class="font-medium text-gray-700">计划总预算</span>
            </div>
            <div class="text-2xl font-bold text-primary" id="totalBudget">¥0</div>
          </div>
          <div class="flex justify-between items-center p-4 bg-green-50 rounded-xl">
            <div class="flex items-center gap-3">
              <span class="text-2xl">✅</span>
              <span class="font-medium text-gray-700">已完成花费</span>
            </div>
            <div class="text-2xl font-bold text-green-600" id="spentBudget">¥0</div>
          </div>
          <div class="flex justify-between items-center p-4 bg-orange-50 rounded-xl">
            <div class="flex items-center gap-3">
              <span class="text-2xl">🔜</span>
              <span class="font-medium text-gray-700">待实现预算</span>
            </div>
            <div class="text-2xl font-bold text-orange-600" id="pendingBudget">¥0</div>
          </div>
        </div>
      </div>
    </div>

    <!-- Category Distribution -->
    <div class="bg-white rounded-2xl shadow-lg p-6 mb-8 fade-in">
      <h2 class="text-lg font-bold text-gray-800 mb-6 flex items-center gap-2">
        📁 分类分布
      </h2>
      <div id="categoryChart" class="grid grid-cols-2 md:grid-cols-5 gap-4">
        <!-- Category items will be loaded here -->
      </div>
    </div>

    <!-- Monthly Distribution -->
    <div class="bg-white rounded-2xl shadow-lg p-6 mb-8 fade-in">
      <h2 class="text-lg font-bold text-gray-800 mb-6 flex items-center gap-2">
        📅 时间分布
      </h2>
      <div id="timelineChart" class="overflow-x-auto">
        <div class="min-w-[600px]">
          <!-- Timeline chart will be loaded here -->
        </div>
      </div>
    </div>

    <!-- Recent Activity -->
    <div class="bg-white rounded-2xl shadow-lg p-6 fade-in">
      <h2 class="text-lg font-bold text-gray-800 mb-6 flex items-center gap-2">
        🕐 最近活动
      </h2>
      <div id="recentActivity" class="space-y-4">
        <!-- Recent activities will be loaded here -->
      </div>
      <div id="noActivity" class="hidden text-center py-8 text-gray-400">
        暂无活动记录
      </div>
    </div>

    <!-- Back Button -->
    <div class="mt-8 text-center">
      <a href="index.html" class="inline-flex items-center gap-2 px-6 py-3 bg-primary text-white rounded-full font-medium hover:shadow-lg transition">
        ← 返回愿望清单
      </a>
    </div>
  </main>

  <!-- Footer -->
  <footer class="bg-gray-800 text-white py-6 mt-auto">
    <div class="max-w-7xl mx-auto px-4 text-center">
      <p class="text-gray-400">© 2025 游导旅游 · 让旅行更简单</p>
    </div>
  </footer>

  <script>
    const STORAGE_KEY = 'travel_wishlist';

    // Category styles
    const categoryStyles = {
      destination: { icon: '🌍', bg: 'bg-blue-100', text: 'text-blue-600', color: '#3b82f6' },
      experience: { icon: '🎯', bg: 'bg-purple-100', text: 'text-purple-600', color: '#8b5cf6' },
      food: { icon: '🍜', bg: 'bg-orange-100', text: 'text-orange-600', color: '#f97316' },
      accommodation: { icon: '🏨', bg: 'bg-pink-100', text: 'text-pink-600', color: '#ec4899' },
      adventure: { icon: '⛷️', bg: 'bg-red-100', text: 'text-red-600', color: '#ef4444' }
    };

    const categoryNames = {
      destination: '目的地',
      experience: '体验',
      food: '美食',
      accommodation: '住宿',
      adventure: '挑战'
    };

    // Load and analyze data
    function loadStatistics() {
      const wishes = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
      
      const total = wishes.length;
      const completed = wishes.filter(w => w.status === 'completed').length;
      const active = wishes.filter(w => w.status === 'active').length;
      const rate = total > 0 ? Math.round((completed / total) * 100) : 0;
      
      // Update main stats
      document.getElementById('totalWishes').textContent = total;
      document.getElementById('completedWishes').textContent = completed;
      document.getElementById('activeWishes').textContent = active;
      document.getElementById('completionRate').textContent = rate + '%';
      
      // Update completion ring
      const circumference = 283;
      const offset = circumference - (rate / 100) * circumference;
      document.getElementById('completionRing').style.strokeDashoffset = offset;
      document.getElementById('ringRate').textContent = rate + '%';
      document.getElementById('completedCount').textContent = completed;
      document.getElementById('remainingCount').textContent = total - completed;
      
      // Budget stats
      const totalBudget = wishes.reduce((sum, w) => sum + (Number(w.estimatedBudget) || 0), 0);
      const completedBudget = wishes.filter(w => w.status === 'completed')
        .reduce((sum, w) => sum + (Number(w.actualCost) || Number(w.estimatedBudget) || 0), 0);
      const pendingBudget = totalBudget - completedBudget;
      
      document.getElementById('totalBudget').textContent = '¥' + totalBudget.toLocaleString('zh-CN');
      document.getElementById('spentBudget').textContent = '¥' + completedBudget.toLocaleString('zh-CN');
      document.getElementById('pendingBudget').textContent = '¥' + pendingBudget.toLocaleString('zh-CN');
      
      // Category distribution
      renderCategoryChart(wishes);
      
      // Timeline
      renderTimeline(wishes);
      
      // Recent activity
      renderRecentActivity(wishes);
    }

    // Render category chart
    function renderCategoryChart(wishes) {
      const container = document.getElementById('categoryChart');
      const categories = ['destination', 'experience', 'food', 'accommodation', 'adventure'];
      const total = wishes.length;
      
      container.innerHTML = categories.map(cat => {
        const style = categoryStyles[cat];
        const count = wishes.filter(w => w.category === cat).length;
        const percentage = total > 0 ? Math.round((count / total) * 100) : 0;
        
        return `
          <div class="card-hover bg-white border border-gray-200 rounded-xl p-4 text-center cursor-pointer">
            <div class="w-16 h-16 mx-auto mb-3 rounded-full flex items-center justify-center" style="background: ${style.color}20">
              <span class="text-3xl">${style.icon}</span>
            </div>
            <div class="text-lg font-bold text-gray-800">${count}</div>
            <div class="text-sm text-gray-500">${categoryNames[cat]}</div>
            <div class="mt-2 h-2 bg-gray-100 rounded-full overflow-hidden">
              <div class="h-full rounded-full transition-all duration-1000" style="width: ${percentage}%; background: ${style.color}"></div>
            </div>
            <div class="text-xs text-gray-400 mt-1">${percentage}%</div>
          </div>
        `;
      }).join('');
    }

    // Render timeline
    function renderTimeline(wishes) {
      const container = document.getElementById('timelineChart').querySelector('.min-w-\\[600px\\]');
      
      // Group wishes by month
      const monthlyData = {};
      const now = new Date();
      
      // Generate last 12 months
      for (let i = 11; i >= 0; i--) {
        const date = new Date(now.getFullYear(), now.getMonth() - i, 1);
        const key = `${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2, '0')}`;
        monthlyData[key] = { created: 0, completed: 0, label: date.toLocaleDateString('zh-CN', { month: 'short' }) };
      }
      
      // Count wishes
      wishes.forEach(wish => {
        const createdDate = new Date(wish.createdAt);
        const createdKey = `${createdDate.getFullYear()}-${String(createdDate.getMonth() + 1).padStart(2, '0')}`;
        if (monthlyData[createdKey]) {
          monthlyData[createdKey].created++;
        }
        
        if (wish.completedAt) {
          const completedDate = new Date(wish.completedAt);
          const completedKey = `${completedDate.getFullYear()}-${String(completedDate.getMonth() + 1).padStart(2, '0')}`;
          if (monthlyData[completedKey]) {
            monthlyData[completedKey].completed++;
          }
        }
      });
      
      const maxValue = Math.max(...Object.values(monthlyData).map(m => Math.max(m.created, m.completed)), 1);
      
      container.innerHTML = `
        <div class="flex items-end gap-2 h-48">
          ${Object.entries(monthlyData).map(([key, data]) => `
            <div class="flex-1 flex flex-col items-center gap-2">
              <div class="w-full flex gap-1 items-end justify-center h-36">
                <div class="w-4 bg-blue-400 rounded-t transition-all duration-500" style="height: ${(data.created / maxValue) * 100}%"></div>
                <div class="w-4 bg-green-400 rounded-t transition-all duration-500" style="height: ${(data.completed / maxValue) * 100}%"></div>
              </div>
              <div class="text-xs text-gray-500">${data.label}</div>
            </div>
          `).join('')}
        </div>
        <div class="flex justify-center gap-6 mt-4">
          <div class="flex items-center gap-2">
            <div class="w-3 h-3 bg-blue-400 rounded"></div>
            <span class="text-sm text-gray-600">新增愿望</span>
          </div>
          <div class="flex items-center gap-2">
            <div class="w-3 h-3 bg-green-400 rounded"></div>
            <span class="text-sm text-gray-600">完成愿望</span>
          </div>
        </div>
      `;
    }

    // Render recent activity
    function renderRecentActivity(wishes) {
      const container = document.getElementById('recentActivity');
      const noActivity = document.getElementById('noActivity');
      
      // Get recent activities
      const activities = [];
      
      wishes.forEach(wish => {
        activities.push({
          type: 'created',
          date: wish.createdAt,
          title: wish.title,
          description: '创建了愿望'
        });
        
        if (wish.completedAt) {
          activities.push({
            type: 'completed',
            date: wish.completedAt,
            title: wish.title,
            description: '完成了愿望'
          });
        }
        
        if (wish.updatedAt && wish.updatedAt !== wish.createdAt) {
          activities.push({
            type: 'updated',
            date: wish.updatedAt,
            title: wish.title,
            description: '更新了愿望'
          });
        }
      });
      
      // Sort by date descending
      activities.sort((a, b) => new Date(b.date) - new Date(a.date));
      
      if (activities.length === 0) {
        container.innerHTML = '';
        noActivity.classList.remove('hidden');
        return;
      }
      
      noActivity.classList.add('hidden');
      
      container.innerHTML = activities.slice(0, 10).map(activity => {
        const icons = {
          created: '📝',
          completed: '✅',
          updated: '✏️'
        };
        const colors = {
          created: 'bg-blue-50 text-blue-600',
          completed: 'bg-green-50 text-green-600',
          updated: 'bg-orange-50 text-orange-600'
        };
        
        return `
          <div class="flex items-start gap-4 p-4 bg-gray-50 rounded-xl">
            <div class="w-10 h-10 rounded-full flex items-center justify-center text-lg ${colors[activity.type]}">
              ${icons[activity.type]}
            </div>
            <div class="flex-1">
              <div class="font-medium text-gray-800">${activity.title}</div>
              <div class="text-sm text-gray-500">${activity.description}</div>
            </div>
            <div class="text-sm text-gray-400 whitespace-nowrap">
              ${formatRelativeTime(activity.date)}
            </div>
          </div>
        `;
      }).join('');
    }

    // Format relative time
    function formatRelativeTime(dateStr) {
      const date = new Date(dateStr);
      const now = new Date();
      const diff = now - date;
      
      const minutes = Math.floor(diff / 60000);
      const hours = Math.floor(diff / 3600000);
      const days = Math.floor(diff / 86400000);
      
      if (minutes < 1) return '刚刚';
      if (minutes < 60) return `${minutes}分钟前`;
      if (hours < 24) return `${hours}小时前`;
      if (days < 30) return `${days}天前`;
      
      return date.toLocaleDateString('zh-CN', { month: 'short', day: 'numeric' });
    }

    // Initialize
    document.addEventListener('DOMContentLoaded', loadStatistics);
  </script>
</body>
</html>
