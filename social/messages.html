<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>私信 - 游导旅游</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#f97316',
            secondary: '#ea580c',
          }
        }
      }
    }
  </script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap');
    body { font-family: 'Noto Sans SC', sans-serif; }
    
    .gradient-bg {
      background: linear-gradient(135deg, #f97316 0%, #ea580c 100%);
    }
    
    .chat-container {
      height: calc(100vh - 180px);
    }
    
    .messages-list {
      flex: 1;
      overflow-y: auto;
      padding-bottom: 70px;
    }
    
    .message-bubble {
      max-width: 75%;
      animation: bubbleIn 0.2s ease;
    }
    @keyframes bubbleIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    
    .message-sent {
      background: linear-gradient(135deg, #f97316 0%, #ea580c 100%);
      border-radius: 18px 18px 4px 18px;
    }
    
    .message-received {
      background: #f3f4f6;
      border-radius: 18px 18px 18px 4px;
    }
    
    .input-container {
      background: white;
      border-top: 1px solid #e5e7eb;
      padding: 12px 16px;
      padding-bottom: max(12px, env(safe-area-inset-bottom));
    }
    
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 3px; }
    
    .conversation-item:hover {
      background-color: #f9fafb;
    }
    
    .conversation-item.active {
      background-color: #fff7ed;
    }
    
    .typing-indicator span {
      animation: typingBounce 1.4s infinite ease-in-out;
    }
    .typing-indicator span:nth-child(1) { animation-delay: 0s; }
    .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
    .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes typingBounce {
      0%, 60%, 100% { transform: translateY(0); }
      30% { transform: translateY(-4px); }
    }
  </style>
</head>
<body class="bg-gray-100 min-h-screen">
  <div class="max-w-6xl mx-auto flex h-screen">
    <!-- Conversations List -->
    <div id="conversations-panel" class="w-full md:w-80 lg:w-96 bg-white border-r flex flex-col">
      <!-- Header -->
      <div class="p-4 border-b flex items-center justify-between">
        <h1 class="text-xl font-bold text-gray-800">私信</h1>
        <button onclick="openNewChat()" class="w-10 h-10 rounded-full hover:bg-gray-100 flex items-center justify-center text-gray-600">
          <i class="fas fa-edit"></i>
        </button>
      </div>
      
      <!-- Search -->
      <div class="p-4">
        <div class="relative">
          <input type="text" id="conversation-search" placeholder="搜索聊天记录..." class="w-full pl-10 pr-4 py-2 bg-gray-100 rounded-full text-sm focus:outline-none focus:ring-2 focus:ring-primary/50">
          <i class="fas fa-search absolute left-4 top-1/2 -translate-y-1/2 text-gray-400"></i>
        </div>
      </div>
      
      <!-- Conversations -->
      <div id="conversations-list" class="flex-1 overflow-y-auto">
        <!-- Will be populated by JS -->
      </div>
    </div>

    <!-- Chat Panel (hidden on mobile initially) -->
    <div id="chat-panel" class="hidden md:flex flex-1 flex-col bg-white">
      <!-- No Chat Selected State -->
      <div id="no-chat-selected" class="flex-1 flex flex-col items-center justify-center text-center p-8">
        <div class="w-24 h-24 gradient-bg rounded-full flex items-center justify-center mb-6">
          <i class="fas fa-comments text-white text-4xl"></i>
        </div>
        <h2 class="text-2xl font-bold text-gray-800 mb-2">欢迎来到私信</h2>
        <p class="text-gray-500 mb-6">和志同道合的旅行者聊天，分享你的旅行故事</p>
        <button onclick="openNewChat()" class="gradient-bg text-white px-6 py-3 rounded-full font-medium hover:opacity-90 transition">
          <i class="fas fa-plus mr-2"></i>开始聊天
        </button>
      </div>

      <!-- Active Chat -->
      <div id="active-chat" class="hidden flex-1 flex flex-col">
        <!-- Chat Header -->
        <div class="p-4 border-b flex items-center gap-4">
          <button onclick="closeChat()" class="md:hidden w-10 h-10 rounded-full bg-gray-100 flex items-center justify-center">
            <i class="fas fa-arrow-left text-gray-600"></i>
          </button>
          <a href="profile.html" id="chat-avatar-link">
            <img id="chat-avatar" src="" alt="" class="w-10 h-10 rounded-full object-cover">
          </a>
          <div class="flex-1">
            <a href="profile.html" id="chat-username" class="font-semibold text-gray-800 hover:text-primary">-</a>
            <p class="text-xs text-gray-500">在线</p>
          </div>
          <div class="flex items-center gap-2">
            <button class="w-10 h-10 rounded-full hover:bg-gray-100 flex items-center justify-center text-gray-600">
              <i class="fas fa-phone"></i>
            </button>
            <button class="w-10 h-10 rounded-full hover:bg-gray-100 flex items-center justify-center text-gray-600">
              <i class="fas fa-video"></i>
            </button>
            <button class="w-10 h-10 rounded-full hover:bg-gray-100 flex items-center justify-center text-gray-600">
              <i class="fas fa-ellipsis-v"></i>
            </button>
          </div>
        </div>

        <!-- Messages -->
        <div id="messages-container" class="messages-list chat-container p-4 space-y-4">
          <!-- Messages will be populated by JS -->
        </div>

        <!-- Input -->
        <div class="input-container">
          <div class="flex items-end gap-3">
            <button class="w-10 h-10 rounded-full hover:bg-gray-100 flex items-center justify-center text-gray-500">
              <i class="fas fa-plus-circle text-xl"></i>
            </button>
            <div class="flex-1 relative">
              <textarea id="message-input" rows="1" placeholder="输入消息..." class="w-full px-4 py-2.5 bg-gray-100 rounded-2xl resize-none focus:outline-none focus:ring-2 focus:ring-primary/50 max-h-32" onkeydown="handleKeyDown(event)" oninput="autoResize(this)"></textarea>
            </div>
            <button class="w-10 h-10 rounded-full hover:bg-gray-100 flex items-center justify-center text-gray-500">
              <i class="far fa-smile text-xl"></i>
            </button>
            <button onclick="sendMessage()" class="w-10 h-10 gradient-bg rounded-full flex items-center justify-center text-white hover:opacity-90 transition">
              <i class="fas fa-paper-plane"></i>
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- New Chat Modal -->
  <div id="new-chat-modal" class="fixed inset-0 bg-black/50 z-50 hidden">
    <div class="absolute top-0 right-0 bottom-0 w-full md:w-96 bg-white slide-in">
      <div class="p-4 border-b flex items-center justify-between">
        <h3 class="font-bold text-lg">发起聊天</h3>
        <button onclick="closeNewChat()" class="w-8 h-8 rounded-full bg-gray-100 flex items-center justify-center">
          <i class="fas fa-times"></i>
        </button>
      </div>
      <div class="p-4">
        <div class="relative mb-4">
          <input type="text" id="user-search" placeholder="搜索用户..." class="w-full pl-10 pr-4 py-2 bg-gray-100 rounded-full focus:outline-none focus:ring-2 focus:ring-primary/50">
          <i class="fas fa-search absolute left-4 top-1/2 -translate-y-1/2 text-gray-400"></i>
        </div>
        <div id="user-list" class="space-y-2">
          <!-- Users will be loaded here -->
        </div>
      </div>
    </div>
  </div>

  <script>
    let socialData = null;
    let currentConversation = null;
    let currentMessages = [];
    
    async function loadData() {
      try {
        const response = await fetch('../data/social.json');
        socialData = await response.json();
        
        renderConversations();
        renderUserList();
        
        // Check for user parameter in URL
        const params = new URLSearchParams(window.location.search);
        const userId = params.get('user');
        if (userId) {
          const user = socialData.users.find(u => u.id === userId);
          if (user) {
            openChat(user);
          }
        }
      } catch (error) {
        console.error('Failed to load data:', error);
      }
    }
    
    function renderConversations() {
      const container = document.getElementById('conversations-list');
      const conversations = socialData.conversations;
      
      container.innerHTML = conversations.map(conv => `
        <div class="conversation-item flex items-center gap-3 p-4 cursor-pointer border-b" onclick="openChatById('${conv.id}')">
          <div class="relative">
            <img src="${conv.avatar}" alt="${conv.username}" class="w-12 h-12 rounded-full object-cover">
            <span class="absolute bottom-0 right-0 w-3 h-3 bg-green-500 rounded-full border-2 border-white"></span>
          </div>
          <div class="flex-1 min-w-0">
            <div class="flex items-center justify-between mb-1">
              <p class="font-medium text-gray-800 truncate">${conv.username}</p>
              <span class="text-xs text-gray-400">${formatTime(conv.lastMessageTime)}</span>
            </div>
            <p class="text-sm text-gray-500 truncate">${conv.lastMessage}</p>
          </div>
          ${conv.unreadCount > 0 ? `
            <span class="w-5 h-5 bg-primary text-white text-xs rounded-full flex items-center justify-center">${conv.unreadCount}</span>
          ` : ''}
        </div>
      `).join('');
    }
    
    function openChatById(convId) {
      const conv = socialData.conversations.find(c => c.id === convId);
      if (conv) {
        const user = socialData.users.find(u => u.id === conv.userId);
        if (user) {
          openChat(user);
        }
      }
    }
    
    function openChat(user) {
      currentConversation = user;
      
      // Hide no chat selected, show active chat
      document.getElementById('no-chat-selected').classList.add('hidden');
      document.getElementById('active-chat').classList.remove('hidden');
      document.getElementById('active-chat').classList.add('flex');
      
      // Update header
      document.getElementById('chat-avatar').src = user.avatar;
      document.getElementById('chat-avatar-link').href = `profile.html?user=${user.id}`;
      document.getElementById('chat-username').textContent = user.username;
      document.getElementById('chat-username').href = `profile.html?user=${user.id}`;
      
      // Load messages
      loadMessages(user.id);
      
      // Highlight conversation
      document.querySelectorAll('.conversation-item').forEach(item => item.classList.remove('active'));
      
      // On mobile, show chat panel
      if (window.innerWidth < 768) {
        document.getElementById('conversations-panel').classList.add('hidden');
        document.getElementById('chat-panel').classList.remove('hidden');
        document.getElementById('chat-panel').classList.add('flex');
      }
    }
    
    function loadMessages(userId) {
      // Get messages between current user and selected user
      const allMessages = socialData.messages;
      currentMessages = allMessages.filter(m => 
        (m.fromUserId === 'user_001' && m.toUserId === userId) ||
        (m.fromUserId === userId && m.toUserId === 'user_001')
      );
      
      renderMessages();
    }
    
    function renderMessages() {
      const container = document.getElementById('messages-container');
      
      if (currentMessages.length === 0) {
        container.innerHTML = `
          <div class="flex items-center justify-center h-full">
            <p class="text-gray-400">开始和${currentConversation.username}聊天吧~</p>
          </div>
        `;
        return;
      }
      
      container.innerHTML = currentMessages.map(msg => {
        const isSent = msg.fromUserId === 'user_001';
        return `
          <div class="flex ${isSent ? 'justify-end' : 'justify-start'} message-bubble">
            <div class="${isSent ? 'message-sent text-white' : 'message-received text-gray-800'} px-4 py-2.5">
              <p class="text-sm">${msg.content}</p>
              <p class="text-xs ${isSent ? 'text-white/70' : 'text-gray-400'} mt-1">${formatTime(msg.createdAt)}</p>
            </div>
          </div>
        `;
      }).join('');
      
      // Scroll to bottom
      container.scrollTop = container.scrollHeight;
    }
    
    function sendMessage() {
      const input = document.getElementById('message-input');
      const content = input.value.trim();
      
      if (!content) return;
      
      const newMessage = {
        id: 'msg_' + Date.now(),
        fromUserId: 'user_001',
        fromUsername: '旅行摄影师小王',
        fromAvatar: 'https://images.unsplash.com/photo-1507003211169-0a1dd7228f2d?w=100&h=100&fit=crop',
        toUserId: currentConversation.id,
        content: content,
        createdAt: new Date().toISOString(),
        isRead: true
      };
      
      currentMessages.push(newMessage);
      socialData.messages.push(newMessage);
      
      renderMessages();
      input.value = '';
      input.style.height = 'auto';
    }
    
    function handleKeyDown(event) {
      if (event.key === 'Enter' && !event.shiftKey) {
        event.preventDefault();
        sendMessage();
      }
    }
    
    function autoResize(textarea) {
      textarea.style.height = 'auto';
      textarea.style.height = Math.min(textarea.scrollHeight, 128) + 'px';
    }
    
    function closeChat() {
      document.getElementById('conversations-panel').classList.remove('hidden');
      document.getElementById('chat-panel').classList.add('hidden');
      document.getElementById('chat-panel').classList.remove('flex');
      document.getElementById('no-chat-selected').classList.remove('hidden');
      document.getElementById('active-chat').classList.add('hidden');
      currentConversation = null;
    }
    
    function openNewChat() {
      document.getElementById('new-chat-modal').classList.remove('hidden');
      document.body.style.overflow = 'hidden';
    }
    
    function closeNewChat() {
      document.getElementById('new-chat-modal').classList.add('hidden');
      document.body.style.overflow = '';
    }
    
    document.getElementById('new-chat-modal').addEventListener('click', function(e) {
      if (e.target === this) closeNewChat();
    });
    
    function renderUserList() {
      const container = document.getElementById('user-list');
      const users = socialData.users.filter(u => u.id !== 'user_001');
      
      container.innerHTML = users.map(user => `
        <div class="flex items-center gap-3 p-3 rounded-xl hover:bg-gray-50 cursor-pointer transition" onclick="startChat('${user.id}')">
          <img src="${user.avatar}" alt="${user.username}" class="w-12 h-12 rounded-full object-cover">
          <div class="flex-1">
            <p class="font-medium text-gray-800">${user.username}</p>
            <p class="text-sm text-gray-500 truncate">${user.bio.split('|')[0]}</p>
          </div>
        </div>
      `).join('');
    }
    
    function startChat(userId) {
      const user = socialData.users.find(u => u.id === userId);
      if (user) {
        closeNewChat();
        openChat(user);
      }
    }
    
    // Search conversations
    document.getElementById('conversation-search').addEventListener('input', function() {
      const query = this.value.toLowerCase();
      const items = document.querySelectorAll('.conversation-item');
      
      items.forEach(item => {
        const name = item.querySelector('.font-medium').textContent.toLowerCase();
        const message = item.querySelector('.text-gray-500').textContent.toLowerCase();
        if (name.includes(query) || message.includes(query)) {
          item.style.display = '';
        } else {
          item.style.display = 'none';
        }
      });
    });
    
    // Search users in new chat modal
    document.getElementById('user-search').addEventListener('input', function() {
      const query = this.value.toLowerCase();
      const items = document.querySelectorAll('#user-list > div');
      
      items.forEach(item => {
        const name = item.querySelector('.font-medium').textContent.toLowerCase();
        item.style.display = name.includes(query) ? '' : 'none';
      });
    });
    
    function formatTime(dateString) {
      const date = new Date(dateString);
      const now = new Date();
      const diff = (now - date) / 1000;
      
      if (diff < 60) return '刚刚';
      if (diff < 3600) return Math.floor(diff / 60) + '分钟';
      if (diff < 86400) return Math.floor(diff / 3600) + '小时';
      if (diff < 604800) return Math.floor(diff / 86400) + '天';
      return date.toLocaleDateString('zh-CN', { month: 'short', day: 'numeric' });
    }
    
    // Handle back button on mobile
    window.addEventListener('popstate', function() {
      if (currentConversation && window.innerWidth < 768) {
        closeChat();
      }
    });
    
    // Initialize
    loadData();
  </script>
  
  <style>
    .slide-in {
      animation: slideIn 0.3s ease;
    }
    @keyframes slideIn {
      from { transform: translateX(100%); }
      to { transform: translateX(0); }
    }
    
    @media (max-width: 767px) {
      #chat-panel {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        z-index: 40;
      }
    }
  </style>
</body>
</html>
