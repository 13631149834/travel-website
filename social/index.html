    tailwind.config = {

        extend: {

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap');
    body { font-family: 'Noto Sans SC', sans-serif; }
    
    .gradient-bg {
      background: linear-gradient(135deg, #f97316 0%, #ea580c 100%);
    }
    
    .card-hover {
      transition: all 0.3s ease;
    }
    .card-hover:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 24px rgba(0,0,0,0.1);
    }
    
    .tab-active {
      position: relative;
    }
    .tab-active::after {
      content: '';
      position: absolute;
      bottom: -2px;
      left: 50%;
      transform: translateX(-50%);
      width: 24px;
      height: 3px;
      background: linear-gradient(135deg, #f97316 0%, #ea580c 100%);
      border-radius: 2px;
    }
    
    .image-carousel {
      scroll-snap-type: x mandatory;
      -webkit-overflow-scrolling: touch;
    }
    .image-carousel > div {
      scroll-snap-align: start;
    }
    
    .like-animation {
      animation: likeAnim 0.3s ease;
    }
    @keyframes likeAnim {
      0% { transform: scale(1); }
      50% { transform: scale(1.3); }
      100% { transform: scale(1); }
    }
    
    .slide-up {
      animation: slideUp 0.3s ease;
    }
    @keyframes slideUp {
      from { transform: translateY(100%); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: #f1f1f1; border-radius: 3px; }
    ::-webkit-scrollbar-thumb { background: #ccc; border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: #aaa; }
  </style>
</head>

  <script>
    // Load social data
    let socialData = null;
    
    async function loadSocialData() {
      try {
        const response = await fetch('../data/social.json');
        socialData = await response.json();
        renderFeed();
        renderSidebar();
        renderRecommendedUsers();
      } catch (error) {
        console.error('Failed to load social data:', error);
      }
    }
    
    // Render feed posts
    function renderFeed() {
      const container = document.getElementById('feed-container');
      const posts = socialData.posts.slice(0, 5);
      
      container.innerHTML = posts.map(post => `
        <article class="bg-white rounded-2xl shadow-sm overflow-hidden card-hover">
          <!-- Post Header -->
          <div class="p-5 pb-0">
            <div class="flex items-center justify-between">
              <div class="flex items-center gap-3">
                <a href="profile.html?user=${post.userId}">
                  <img src="${post.userAvatar}" alt="${post.username}" class="w-12 h-12 rounded-full object-cover">
                </a>
                <div>
                  <a href="profile.html?user=${post.userId}" class="font-semibold text-gray-800 hover:text-primary">${post.username}</a>
                  <div class="flex items-center gap-2 text-sm text-gray-500">
                    <span>${formatTime(post.createdAt)}</span>
                    ${post.location ? `<span>·</span><span><i class="fas fa-map-marker-alt mr-1"></i>${post.location}</span>` : ''}
                  </div>
                </div>
              </div>
              <button class="w-8 h-8 rounded-full hover:bg-gray-100 flex items-center justify-center text-gray-400">
                <i class="fas fa-ellipsis-h"></i>
              </button>
            </div>
          </div>
          
          <!-- Post Content -->
          <div class="p-5">
            <p class="text-gray-700 whitespace-pre-line leading-relaxed">${post.content}</p>
            
            ${post.images && post.images.length > 0 ? `
              <div class="mt-4 grid ${post.images.length === 1 ? 'grid-cols-1' : 'grid-cols-2'} gap-2">
                ${post.images.map((img, idx) => `
                  <a href="detail.html?post=${post.id}" class="${post.images.length === 1 ? 'max-h-96' : 'aspect-square'} overflow-hidden rounded-xl ${post.images.length === 3 && idx === 0 ? 'row-span-2' : ''}">
                    <img src="${img}" alt="图片${idx + 1}" class="w-full h-full object-cover hover:scale-105 transition duration-300">
                  </a>
                `).join('')}
              </div>
            ` : ''}
            
            ${post.topics && post.topics.length > 0 ? `
              <div class="flex flex-wrap gap-2 mt-4">
                ${post.topics.map(topic => `
                  <a href="topics.html?topic=${encodeURIComponent(topic)}" class="text-primary hover:underline text-sm">#${topic}</a>
                `).join('')}
              </div>
            ` : ''}
          </div>
          
          <!-- Post Actions -->
          <div class="px-5 py-4 border-t flex items-center justify-between">
            <div class="flex items-center gap-6">
              <button onclick="toggleLike('${post.id}')" class="flex items-center gap-2 text-gray-500 hover:text-red-500 transition ${post.isLiked ? 'text-red-500' : ''}">
                <i class="${post.isLiked ? 'fas' : 'far'} fa-heart text-lg like-btn ${post.isLiked ? 'like-animation' : ''}" data-post="${post.id}"></i>
                <span class="text-sm">${formatNumber(post.likes)}</span>
              </button>
              <a href="detail.html?post=${post.id}" class="flex items-center gap-2 text-gray-500 hover:text-primary transition">
                <i class="far fa-comment text-lg"></i>
                <span class="text-sm">${post.comments}</span>
              </a>
              <button onclick="sharePost('${post.id}')" class="flex items-center gap-2 text-gray-500 hover:text-green-500 transition">
                <i class="far fa-share-square text-lg"></i>
                <span class="text-sm">${post.shares}</span>
              </button>
            </div>
            <button onclick="bookmarkPost('${post.id}')" class="w-8 h-8 rounded-full hover:bg-gray-100 flex items-center justify-center text-gray-400 hover:text-yellow-500 transition">
              <i class="far fa-bookmark"></i>
            </button>
          </div>
        </article>
      `).join('');
    }
    
    // Render sidebar topics
    function renderSidebar() {
      const container = document.getElementById('sidebar-topics');
      const topics = socialData.topics.slice(0, 5);
      
      container.innerHTML = topics.map(topic => `
        <a href="topics.html?topic=${encodeURIComponent(topic.name)}" class="flex items-center gap-3 p-2 -mx-2 rounded-xl hover:bg-orange-50 transition">
          <span class="text-2xl">${topic.icon}</span>
          <div class="flex-1 min-w-0">
            <p class="font-medium text-gray-800 truncate">#${topic.name}</p>
            <p class="text-xs text-gray-500">${formatNumber(topic.posts)} 动态</p>
          </div>
        </a>
      `).join('');
    }
    
    // Render recommended users
    function renderRecommendedUsers() {
      const container = document.getElementById('recommended-users');
      const users = socialData.users.filter(u => !u.isFollowing).slice(0, 4);
      
      container.innerHTML = users.map(user => `
        <div class="flex items-center gap-3">
          <a href="profile.html?user=${user.id}">
            <img src="${user.avatar}" alt="${user.username}" class="w-12 h-12 rounded-full object-cover">
          </a>
          <div class="flex-1 min-w-0">
            <a href="profile.html?user=${user.id}" class="font-medium text-gray-800 hover:text-primary block truncate">${user.username}</a>
            <p class="text-xs text-gray-500 truncate">${user.bio.split('|')[0]}</p>
          </div>
          <button onclick="toggleFollow(this, '${user.id}')" class="px-3 py-1.5 bg-primary text-white text-xs rounded-full hover:opacity-90 transition follow-btn" data-user="${user.id}">
            + 关注
          </button>
        </div>
      `).join('');
    }
    
    // Tab switching
    document.querySelectorAll('[data-tab]').forEach(tab => {
      tab.addEventListener('click', function() {
        document.querySelectorAll('[data-tab]').forEach(t => {
          t.classList.remove('tab-active', 'text-primary');
          t.classList.add('text-gray-400');
        });
        this.classList.add('tab-active', 'text-primary');
        this.classList.remove('text-gray-400');
        
        const tabName = this.dataset.tab;
        if (tabName === 'discover') {
          // Shuffle posts for discover
          const shuffled = [...socialData.posts].sort(() => Math.random() - 0.5);
          renderPosts(shuffled.slice(0, 6));
        } else {
          renderFeed();
        }
      });
    });
    
    // Modal functions
    function openPostModal() {
      document.getElementById('post-modal').classList.remove('hidden');
      document.getElementById('post-modal').classList.add('flex');
      document.body.style.overflow = 'hidden';
    }
    
    function closePostModal() {
      document.getElementById('post-modal').classList.add('hidden');
      document.getElementById('post-modal').classList.remove('flex');
      document.body.style.overflow = '';
    }
    
    function openTopicPicker() {
      document.getElementById('topic-picker').classList.remove('hidden');
      document.getElementById('topic-picker').classList.add('flex');
    }
    
    function closeTopicPicker() {
      document.getElementById('topic-picker').classList.add('hidden');
      document.getElementById('topic-picker').classList.remove('flex');
    }
    
    // Close modals on backdrop click
    document.getElementById('post-modal').addEventListener('click', function(e) {
      if (e.target === this) closePostModal();
    });
    
    document.getElementById('topic-picker').addEventListener('click', function(e) {
      if (e.target === this) closeTopicPicker();
    });
    
    // Like function
    function toggleLike(postId) {
      const btn = document.querySelector(`.like-btn[data-post="${postId}"]`);
      if (btn.classList.contains('far')) {
        btn.classList.remove('far', 'text-gray-500');
        btn.classList.add('fas', 'text-red-500', 'like-animation');
      } else {
        btn.classList.remove('fas', 'text-red-500');
        btn.classList.add('far', 'text-gray-500');
      }
    }
    
    // Follow function
    function toggleFollow(btn, userId) {
      const currentText = btn.textContent.trim();
      if (currentText === '+ 关注') {
        btn.textContent = '已关注';
        btn.classList.remove('bg-primary', 'text-white');
        btn.classList.add('bg-gray-100', 'text-gray-600');
      } else {
        btn.textContent = '+ 关注';
        btn.classList.add('bg-primary', 'text-white');
        btn.classList.remove('bg-gray-100', 'text-gray-600');
      }
    }
    
    // Share function
    function sharePost(postId) {
      if (navigator.share) {
        navigator.share({
          title: '游导旅游',
          text: '来看看这个精彩的旅行动态！',
          url: window.location.origin + '/social/detail.html?post=' + postId
        });
      } else {
        alert('链接已复制到剪贴板！');
      }
    }
    
    // Bookmark function
    function bookmarkPost(postId) {
      const btn = event.currentTarget.querySelector('i');
      btn.classList.toggle('far');
      btn.classList.toggle('fas');
      btn.classList.toggle('text-yellow-500');
    }
    
    // Publish post
    function publishPost() {
      const content = document.getElementById('post-content').value;
      if (!content.trim()) {
        alert('请输入内容');
        return;
      }
      alert('发布成功！');
      closePostModal();
      document.getElementById('post-content').value = '';
    }
    
    // Format time
    function formatTime(dateString) {
      const date = new Date(dateString);
      const now = new Date();
      const diff = (now - date) / 1000;
      
      if (diff < 60) return '刚刚';
      if (diff < 3600) return Math.floor(diff / 60) + '分钟前';
      if (diff < 86400) return Math.floor(diff / 3600) + '小时前';
      if (diff < 604800) return Math.floor(diff / 86400) + '天前';
      return date.toLocaleDateString('zh-CN', { month: 'short', day: 'numeric' });
    }
    
    // Format number
    function formatNumber(num) {
      if (num >= 10000) return (num / 10000).toFixed(1) + 'w';
      if (num >= 1000) return (num / 1000).toFixed(1) + 'k';
      return num.toString();
    }
    
    // Initialize
    loadSocialData();
  </script>
</body>
</html>
