<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>发布动态 - 游导旅游</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#f97316',
            secondary: '#ea580c',
          }
        }
      }
    }
  </script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap');
    body { font-family: 'Noto Sans SC', sans-serif; }
    
    .gradient-bg {
      background: linear-gradient(135deg, #f97316 0%, #ea580c 100%);
    }
    
    .image-preview {
      transition: all 0.3s ease;
    }
    .image-preview:hover .remove-btn {
      opacity: 1;
    }
    
    .drag-active {
      border-color: #f97316 !important;
      background-color: rgba(249, 115, 22, 0.05) !important;
    }
    
    .location-tag {
      animation: slideIn 0.3s ease;
    }
    @keyframes slideIn {
      from { transform: translateY(-10px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    
    .char-count {
      transition: color 0.3s ease;
    }
    
    .emoji-picker {
      display: grid;
      grid-template-columns: repeat(8, 1fr);
      gap: 4px;
    }
  </style>
</head>
<body class="bg-gray-50 min-h-screen">
  <!-- Header -->
  <header class="sticky top-0 bg-white/95 backdrop-blur-sm shadow-sm z-50">
    <div class="max-w-2xl mx-auto px-4">
      <div class="flex items-center justify-between h-16">
        <button onclick="goBack()" class="w-10 h-10 rounded-full bg-gray-100 flex items-center justify-center hover:bg-gray-200 transition">
          <i class="fas fa-arrow-left text-gray-600"></i>
        </button>
        <h1 class="text-lg font-bold text-gray-800">发布动态</h1>
        <button onclick="publishPost()" id="publish-btn" class="px-5 py-2 gradient-bg text-white rounded-full text-sm font-medium hover:opacity-90 transition disabled:opacity-50" disabled>
          发布
        </button>
      </div>
    </div>
  </header>

  <main class="max-w-2xl mx-auto px-4 py-6">
    <!-- Post Input -->
    <div class="bg-white rounded-2xl shadow-sm p-5 mb-6">
      <div class="flex gap-4">
        <img src="https://images.unsplash.com/photo-1507003211169-0a1dd7228f2d?w=100&h=100&fit=crop" alt="头像" class="w-12 h-12 rounded-full">
        <div class="flex-1">
          <textarea id="post-content" rows="6" placeholder="分享你的旅行故事，介绍有趣的景点、美食、体验..." class="w-full resize-none border-0 focus:outline-none text-lg placeholder-gray-400" maxlength="2000"></textarea>
        </div>
      </div>
      
      <!-- Character Count -->
      <div class="text-right mt-2">
        <span id="char-count" class="text-sm text-gray-400 char-count">0</span>
        <span class="text-sm text-gray-400">/2000</span>
      </div>
      
      <!-- Selected Location -->
      <div id="selected-location" class="hidden mt-4">
        <!-- Will be populated by JS -->
      </div>
      
      <!-- Selected Topics -->
      <div id="selected-topics" class="flex flex-wrap gap-2 mt-4">
        <!-- Will be populated by JS -->
      </div>
      
      <!-- Image Previews -->
      <div id="image-previews" class="grid grid-cols-3 gap-2 mt-4">
        <!-- Will be populated by JS -->
      </div>
      
      <!-- Mention Suggestions -->
      <div id="mention-suggestions" class="hidden mt-4 bg-gray-50 rounded-xl p-3 max-h-48 overflow-auto">
        <!-- Will be populated by JS -->
      </div>
    </div>
    
    <!-- Upload Area -->
    <div class="bg-white rounded-2xl shadow-sm p-5 mb-6">
      <div class="flex items-center justify-between mb-4">
        <h3 class="font-bold text-gray-800">添加内容</h3>
        <span class="text-sm text-gray-400"><span id="image-count">0</span>/9 张图片</span>
      </div>
      
      <div class="grid grid-cols-4 gap-3">
        <!-- Photo Upload -->
        <div class="relative group cursor-pointer" onclick="document.getElementById('file-input').click()">
          <div class="aspect-square bg-gray-100 rounded-xl border-2 border-dashed border-gray-300 flex flex-col items-center justify-center group-hover:border-primary transition">
            <i class="fas fa-plus text-2xl text-gray-400 group-hover:text-primary transition"></i>
            <span class="text-xs text-gray-400 mt-1">图片</span>
          </div>
          <input type="file" id="file-input" accept="image/*" multiple class="hidden" onchange="handleFileSelect(event)">
        </div>
        
        <!-- Camera -->
        <div class="relative group cursor-pointer">
          <div class="aspect-square bg-gray-100 rounded-xl flex flex-col items-center justify-center group-hover:bg-gray-200 transition">
            <i class="fas fa-camera text-2xl text-gray-400"></i>
            <span class="text-xs text-gray-400 mt-1">拍照</span>
          </div>
        </div>
        
        <!-- Video -->
        <div class="relative group cursor-pointer">
          <div class="aspect-square bg-gray-100 rounded-xl flex flex-col items-center justify-center group-hover:bg-gray-200 transition">
            <i class="fas fa-video text-2xl text-gray-400"></i>
            <span class="text-xs text-gray-400 mt-1">视频</span>
          </div>
        </div>
        
        <!-- Travel Guide -->
        <div class="relative group cursor-pointer" onclick="openGuidePicker()">
          <div class="aspect-square bg-gray-100 rounded-xl flex flex-col items-center justify-center group-hover:bg-gray-200 transition">
            <i class="fas fa-map-marked-alt text-2xl text-gray-400"></i>
            <span class="text-xs text-gray-400 mt-1">关联攻略</span>
          </div>
        </div>
      </div>
    </div>
    
    <!-- Location -->
    <div class="bg-white rounded-2xl shadow-sm p-5 mb-6">
      <div class="flex items-center justify-between mb-4">
        <h3 class="font-bold text-gray-800 flex items-center gap-2">
          <i class="fas fa-map-marker-alt text-primary"></i>
          添加位置
        </h3>
        <button onclick="openLocationPicker()" class="text-sm text-primary hover:underline">选择位置</button>
      </div>
      <div id="location-display" class="text-gray-500">
        点击选择你的旅行地点
      </div>
    </div>
    
    <!-- Topics -->
    <div class="bg-white rounded-2xl shadow-sm p-5 mb-6">
      <div class="flex items-center justify-between mb-4">
        <h3 class="font-bold text-gray-800 flex items-center gap-2">
          <i class="fas fa-hashtag text-primary"></i>
          添加话题
        </h3>
        <button onclick="openTopicPicker()" class="text-sm text-primary hover:underline">选择话题</button>
      </div>
      <div id="topics-display" class="text-gray-500">
        选择相关话题，让更多人看到你的动态
      </div>
    </div>
    
    <!-- Privacy Settings -->
    <div class="bg-white rounded-2xl shadow-sm p-5 mb-6">
      <h3 class="font-bold text-gray-800 mb-4 flex items-center gap-2">
        <i class="fas fa-lock text-primary"></i>
        隐私设置
      </h3>
      <div class="space-y-3">
        <label class="flex items-center gap-3 p-3 rounded-xl hover:bg-gray-50 cursor-pointer transition privacy-option" data-value="public">
          <input type="radio" name="privacy" value="public" checked class="text-primary">
          <div class="flex-1">
            <p class="font-medium text-gray-800">🌍 公开</p>
            <p class="text-sm text-gray-500">所有用户可见，会出现在发现页</p>
          </div>
        </label>
        <label class="flex items-center gap-3 p-3 rounded-xl hover:bg-gray-50 cursor-pointer transition privacy-option" data-value="friends">
          <input type="radio" name="privacy" value="friends" class="text-primary">
          <div class="flex-1">
            <p class="font-medium text-gray-800">👥 仅关注者</p>
            <p class="text-sm text-gray-500">只有你的关注者可见</p>
          </div>
        </label>
        <label class="flex items-center gap-3 p-3 rounded-xl hover:bg-gray-50 cursor-pointer transition privacy-option" data-value="private">
          <input type="radio" name="privacy" value="private" class="text-primary">
          <div class="flex-1">
            <p class="font-medium text-gray-800">🔒 仅自己</p>
            <p class="text-sm text-gray-500">仅自己可见，作为旅行日记</p>
          </div>
        </label>
      </div>
    </div>
    
    <!-- Advanced Options -->
    <div class="bg-white rounded-2xl shadow-sm p-5">
      <h3 class="font-bold text-gray-800 mb-4">更多选项</h3>
      <div class="space-y-4">
        <label class="flex items-center justify-between cursor-pointer">
          <div>
            <p class="font-medium text-gray-800">允许评论</p>
            <p class="text-sm text-gray-500">关闭后无法评论此动态</p>
          </div>
          <input type="checkbox" checked class="toggle toggle-primary">
        </label>
        <label class="flex items-center justify-between cursor-pointer">
          <div>
            <p class="font-medium text-gray-800">同步到动态</p>
            <p class="text-sm text-gray-500">同时发布到个人主页动态</p>
          </div>
          <input type="checkbox" checked class="toggle toggle-primary">
        </label>
      </div>
    </div>
  </main>

  <!-- Topic Picker Modal -->
  <div id="topic-picker-modal" class="fixed inset-0 bg-black/50 z-50 hidden">
    <div class="absolute bottom-0 left-0 right-0 bg-white rounded-t-3xl max-h-[70vh] overflow-auto">
      <div class="sticky top-0 bg-white p-4 border-b flex items-center justify-between">
        <h3 class="font-bold text-lg">选择话题</h3>
        <button onclick="closeTopicPicker()" class="w-8 h-8 rounded-full bg-gray-100 flex items-center justify-center">
          <i class="fas fa-times"></i>
        </button>
      </div>
      <div class="p-4">
        <div class="relative mb-4">
          <input type="text" id="topic-search" placeholder="搜索话题..." class="w-full pl-10 pr-4 py-3 bg-gray-100 rounded-full focus:outline-none focus:ring-2 focus:ring-primary/50">
          <i class="fas fa-search absolute left-4 top-1/2 -translate-y-1/2 text-gray-400"></i>
        </div>
        <div class="space-y-2" id="topic-list">
          <!-- Topics will be loaded here -->
        </div>
        
        <!-- Hot Topics -->
        <h4 class="font-medium text-gray-800 mt-6 mb-3">🔥 热门话题</h4>
        <div class="flex flex-wrap gap-2" id="hot-topics">
          <button onclick="addTopic('冰岛')" class="px-4 py-2 bg-orange-50 text-orange-600 rounded-full text-sm hover:bg-orange-100 transition">#冰岛</button>
          <button onclick="addTopic('日本旅游')" class="px-4 py-2 bg-orange-50 text-orange-600 rounded-full text-sm hover:bg-orange-100 transition">#日本旅游</button>
          <button onclick="addTopic('穷游攻略')" class="px-4 py-2 bg-orange-50 text-orange-600 rounded-full text-sm hover:bg-orange-100 transition">#穷游攻略</button>
          <button onclick="addTopic('美食探店')" class="px-4 py-2 bg-orange-50 text-orange-600 rounded-full text-sm hover:bg-orange-100 transition">#美食探店</button>
          <button onclick="addTopic('户外探险')" class="px-4 py-2 bg-orange-50 text-orange-600 rounded-full text-sm hover:bg-orange-100 transition">#户外探险</button>
          <button onclick="addTopic('旅行摄影')" class="px-4 py-2 bg-orange-50 text-orange-600 rounded-full text-sm hover:bg-orange-100 transition">#旅行摄影</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Location Picker Modal -->
  <div id="location-picker-modal" class="fixed inset-0 bg-black/50 z-50 hidden">
    <div class="absolute bottom-0 left-0 right-0 bg-white rounded-t-3xl max-h-[70vh] overflow-auto">
      <div class="sticky top-0 bg-white p-4 border-b flex items-center justify-between">
        <h3 class="font-bold text-lg">选择位置</h3>
        <button onclick="closeLocationPicker()" class="w-8 h-8 rounded-full bg-gray-100 flex items-center justify-center">
          <i class="fas fa-times"></i>
        </button>
      </div>
      <div class="p-4">
        <div class="relative mb-4">
          <input type="text" id="location-search" placeholder="搜索地点..." class="w-full pl-10 pr-4 py-3 bg-gray-100 rounded-full focus:outline-none focus:ring-2 focus:ring-primary/50">
          <i class="fas fa-search absolute left-4 top-1/2 -translate-y-1/2 text-gray-400"></i>
        </div>
        
        <!-- Recent -->
        <h4 class="font-medium text-gray-800 mb-3">📍 常用位置</h4>
        <div class="space-y-2 mb-4">
          <button onclick="selectLocation('冰岛·蓝湖温泉', 'https://images.unsplash.com/photo-1504893524553-b855bce32c67?w=100')" class="w-full flex items-center gap-3 p-3 rounded-xl hover:bg-gray-50 transition">
            <i class="fas fa-map-marker-alt text-gray-400"></i>
            <span class="text-gray-700">冰岛·蓝湖温泉</span>
          </button>
          <button onclick="selectLocation('日本·东京', 'https://images.unsplash.com/photo-1540959733332-eab4deabeeaf?w=100')" class="w-full flex items-center gap-3 p-3 rounded-xl hover:bg-gray-50 transition">
            <i class="fas fa-map-marker-alt text-gray-400"></i>
            <span class="text-gray-700">日本·东京</span>
          </button>
          <button onclick="selectLocation('云南·丽江古城', 'https://images.unsplash.com/photo-1528181304800-259b08848526?w=100')" class="w-full flex items-center gap-3 p-3 rounded-xl hover:bg-gray-50 transition">
            <i class="fas fa-map-marker-alt text-gray-400"></i>
            <span class="text-gray-700">云南·丽江古城</span>
          </button>
        </div>
        
        <!-- Popular Destinations -->
        <h4 class="font-medium text-gray-800 mb-3">🌟 热门目的地</h4>
        <div class="grid grid-cols-2 gap-2">
          <button onclick="selectLocation('四川·成都', null)" class="p-3 bg-gray-50 rounded-xl text-left hover:bg-gray-100 transition">
            <p class="font-medium text-gray-800">成都</p>
            <p class="text-xs text-gray-500">川西旅游</p>
          </button>
          <button onclick="selectLocation('云南·大理', null)" class="p-3 bg-gray-50 rounded-xl text-left hover:bg-gray-100 transition">
            <p class="font-medium text-gray-800">大理</p>
            <p class="text-xs text-gray-500">洱海风光</p>
          </button>
          <button onclick="selectLocation('新疆·喀纳斯', null)" class="p-3 bg-gray-50 rounded-xl text-left hover:bg-gray-100 transition">
            <p class="font-medium text-gray-800">喀纳斯</p>
            <p class="text-xs text-gray-500">秋色天堂</p>
          </button>
          <button onclick="selectLocation('西藏·拉萨', null)" class="p-3 bg-gray-50 rounded-xl text-left hover:bg-gray-100 transition">
            <p class="font-medium text-gray-800">拉萨</p>
            <p class="text-xs text-gray-500">圣地高原</p>
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- Guide Picker Modal -->
  <div id="guide-picker-modal" class="fixed inset-0 bg-black/50 z-50 hidden">
    <div class="absolute bottom-0 left-0 right-0 bg-white rounded-t-3xl max-h-[70vh] overflow-auto">
      <div class="sticky top-0 bg-white p-4 border-b flex items-center justify-between">
        <h3 class="font-bold text-lg">关联攻略</h3>
        <button onclick="closeGuidePicker()" class="w-8 h-8 rounded-full bg-gray-100 flex items-center justify-center">
          <i class="fas fa-times"></i>
        </button>
      </div>
      <div class="p-4">
        <div class="space-y-3">
          <button onclick="selectGuide('冰岛7日自驾游攻略', '冰岛')" class="w-full flex items-center gap-3 p-4 bg-gray-50 rounded-xl hover:bg-gray-100 transition text-left">
            <img src="https://images.unsplash.com/photo-1504893524553-b855bce32c67?w=100" alt="" class="w-16 h-12 rounded-lg object-cover">
            <div class="flex-1">
              <p class="font-medium text-gray-800">冰岛7日自驾游攻略</p>
              <p class="text-sm text-gray-500">阅读 12.5k · 收藏 892</p>
            </div>
          </button>
          <button onclick="selectGuide('日本关西10日深度游', '日本')" class="w-full flex items-center gap-3 p-4 bg-gray-50 rounded-xl hover:bg-gray-100 transition text-left">
            <img src="https://images.unsplash.com/photo-1493976040374-85c8e12f0c0e?w=100" alt="" class="w-16 h-12 rounded-lg object-cover">
            <div class="flex-1">
              <p class="font-medium text-gray-800">日本关西10日深度游</p>
              <p class="text-sm text-gray-500">阅读 8.3k · 收藏 567</p>
            </div>
          </button>
        </div>
      </div>
    </div>
  </div>

  <script>
    let selectedTopics = [];
    let selectedLocation = null;
    let selectedGuide = null;
    let selectedImages = [];
    
    // Load topics
    async function loadTopics() {
      try {
        const response = await fetch('../data/social.json');
        const data = await response.json();
        const topics = data.topics;
        
        const list = document.getElementById('topic-list');
        list.innerHTML = topics.slice(0, 8).map(topic => `
          <button onclick="toggleTopic('${topic.name}', '${topic.icon}')" class="w-full text-left px-4 py-3 rounded-xl hover:bg-orange-50 transition flex items-center gap-3 topic-btn" data-topic="${topic.name}">
            <span class="text-xl">${topic.icon}</span>
            <div class="flex-1">
              <p class="font-medium text-gray-800">#${topic.name}</p>
              <p class="text-xs text-gray-500">${topic.posts} 动态</p>
            </div>
            <i class="fas fa-plus text-gray-400"></i>
          </button>
        `).join('');
      } catch (error) {
        console.error('Failed to load topics:', error);
      }
    }
    
    // Textarea input handler
    const textarea = document.getElementById('post-content');
    textarea.addEventListener('input', function() {
      const length = this.value.length;
      const countEl = document.getElementById('char-count');
      countEl.textContent = length;
      
      // Update color based on length
      if (length > 1800) {
        countEl.classList.add('text-red-500');
        countEl.classList.remove('text-gray-400', 'text-primary');
      } else if (length > 0) {
        countEl.classList.add('text-primary');
        countEl.classList.remove('text-gray-400', 'text-red-500');
      } else {
        countEl.classList.remove('text-primary', 'text-red-500');
        countEl.classList.add('text-gray-400');
      }
      
      // Check for hashtags
      const content = this.value;
      const hashtagMatch = content.match(/#[\w\u4e00-\u9fa5]+$/);
      if (hashtagMatch) {
        // Could show suggestions here
      }
      
      // Enable/disable publish button
      document.getElementById('publish-btn').disabled = length === 0;
    });
    
    // Topic functions
    function openTopicPicker() {
      document.getElementById('topic-picker-modal').classList.remove('hidden');
      document.body.style.overflow = 'hidden';
    }
    
    function closeTopicPicker() {
      document.getElementById('topic-picker-modal').classList.add('hidden');
      document.body.style.overflow = '';
    }
    
    function toggleTopic(name, icon) {
      if (selectedTopics.find(t => t.name === name)) {
        removeTopic(name);
      } else {
        addTopic(name, icon);
      }
    }
    
    function addTopic(name, icon = '🏷️') {
      if (selectedTopics.length >= 5) {
        alert('最多添加5个话题');
        return;
      }
      selectedTopics.push({ name, icon });
      renderSelectedTopics();
      updateTopicButtons();
    }
    
    function removeTopic(name) {
      selectedTopics = selectedTopics.filter(t => t.name !== name);
      renderSelectedTopics();
      updateTopicButtons();
    }
    
    function renderSelectedTopics() {
      const container = document.getElementById('selected-topics');
      if (selectedTopics.length === 0) {
        container.innerHTML = '';
        return;
      }
      
      container.innerHTML = selectedTopics.map(topic => `
        <span class="location-tag inline-flex items-center gap-1 px-3 py-1.5 bg-primary/10 text-primary rounded-full text-sm">
          <span>${topic.icon}</span>
          <span>#${topic.name}</span>
          <button onclick="removeTopic('${topic.name}')" class="ml-1 hover:text-red-500">
            <i class="fas fa-times"></i>
          </button>
        </span>
      `).join('');
    }
    
    function updateTopicButtons() {
      document.querySelectorAll('.topic-btn').forEach(btn => {
        const topic = btn.dataset.topic;
        const isSelected = selectedTopics.find(t => t.name === topic);
        const icon = btn.querySelector('i');
        
        if (isSelected) {
          btn.classList.add('bg-primary/10');
          icon.classList.remove('fa-plus');
          icon.classList.add('fa-check', 'text-primary');
        } else {
          btn.classList.remove('bg-primary/10');
          icon.classList.remove('fa-check', 'text-primary');
          icon.classList.add('fa-plus');
        }
      });
    }
    
    // Location functions
    function openLocationPicker() {
      document.getElementById('location-picker-modal').classList.remove('hidden');
      document.body.style.overflow = 'hidden';
    }
    
    function closeLocationPicker() {
      document.getElementById('location-picker-modal').classList.add('hidden');
      document.body.style.overflow = '';
    }
    
    function selectLocation(name, image = null) {
      selectedLocation = { name, image };
      renderSelectedLocation();
      closeLocationPicker();
    }
    
    function clearLocation() {
      selectedLocation = null;
      document.getElementById('selected-location').classList.add('hidden');
      document.getElementById('location-display').textContent = '点击选择你的旅行地点';
      document.getElementById('location-display').classList.remove('hidden');
    }
    
    function renderSelectedLocation() {
      const container = document.getElementById('selected-location');
      document.getElementById('location-display').classList.add('hidden');
      container.classList.remove('hidden');
      
      container.innerHTML = `
        <div class="location-tag flex items-center gap-3 p-3 bg-gray-50 rounded-xl">
          ${selectedLocation.image ? `
            <img src="${selectedLocation.image}" alt="" class="w-12 h-12 rounded-lg object-cover">
          ` : `
            <div class="w-12 h-12 rounded-lg bg-primary/10 flex items-center justify-center">
              <i class="fas fa-map-marker-alt text-primary text-xl"></i>
            </div>
          `}
          <div class="flex-1">
            <p class="font-medium text-gray-800">${selectedLocation.name}</p>
            <p class="text-sm text-gray-500">添加位置</p>
          </div>
          <button onclick="clearLocation()" class="w-8 h-8 rounded-full bg-white flex items-center justify-center text-gray-400 hover:text-red-500">
            <i class="fas fa-times"></i>
          </button>
        </div>
      `;
    }
    
    // Guide functions
    function openGuidePicker() {
      document.getElementById('guide-picker-modal').classList.remove('hidden');
      document.body.style.overflow = 'hidden';
    }
    
    function closeGuidePicker() {
      document.getElementById('guide-picker-modal').classList.add('hidden');
      document.body.style.overflow = '';
    }
    
    function selectGuide(title, tag) {
      selectedGuide = { title, tag };
      closeGuidePicker();
      // Show selected guide indicator
      alert(`已关联攻略：${title}`);
    }
    
    // File handling
    function handleFileSelect(event) {
      const files = Array.from(event.target.files);
      const remaining = 9 - selectedImages.length;
      const filesToAdd = files.slice(0, remaining);
      
      filesToAdd.forEach(file => {
        const reader = new FileReader();
        reader.onload = function(e) {
          selectedImages.push(e.target.result);
          renderImagePreviews();
        };
        reader.readAsDataURL(file);
      });
      
      document.getElementById('image-count').textContent = selectedImages.length;
    }
    
    function renderImagePreviews() {
      const container = document.getElementById('image-previews');
      
      container.innerHTML = selectedImages.map((img, idx) => `
        <div class="image-preview relative aspect-square rounded-xl overflow-hidden">
          <img src="${img}" alt="预览" class="w-full h-full object-cover">
          <button onclick="removeImage(${idx})" class="remove-btn absolute top-2 right-2 w-6 h-6 bg-black/50 text-white rounded-full flex items-center justify-center opacity-0 transition">
            <i class="fas fa-times text-xs"></i>
          </button>
          ${idx === 0 ? '<span class="absolute bottom-2 left-2 px-2 py-0.5 bg-black/50 text-white text-xs rounded">封面</span>' : ''}
        </div>
      `).join('');
    }
    
    function removeImage(idx) {
      selectedImages.splice(idx, 1);
      renderImagePreviews();
      document.getElementById('image-count').textContent = selectedImages.length;
    }
    
    // Privacy selection
    document.querySelectorAll('.privacy-option').forEach(option => {
      option.addEventListener('click', function() {
        document.querySelectorAll('.privacy-option').forEach(opt => {
          opt.classList.remove('bg-primary/10', 'border', 'border-primary');
        });
        this.classList.add('bg-primary/10', 'border', 'border-primary');
        const radio = this.querySelector('input[type="radio"]');
        radio.checked = true;
      });
    });
    
    // Publish
    function publishPost() {
      const content = document.getElementById('post-content').value;
      const privacy = document.querySelector('input[name="privacy"]:checked').value;
      
      if (!content.trim()) {
        alert('请输入内容');
        return;
      }
      
      // Simulate publishing
      document.getElementById('publish-btn').innerHTML = '<i class="fas fa-spinner fa-spin"></i> 发布中...';
      document.getElementById('publish-btn').disabled = true;
      
      setTimeout(() => {
        alert('发布成功！');
        window.location.href = 'index.html';
      }, 1500);
    }
    
    // Close modals on backdrop click
    ['topic-picker-modal', 'location-picker-modal', 'guide-picker-modal'].forEach(id => {
      document.getElementById(id).addEventListener('click', function(e) {
        if (e.target === this) {
          this.classList.add('hidden');
          document.body.style.overflow = '';
        }
      });
    });
    
    // Go back
    function goBack() {
      if (document.getElementById('post-content').value || selectedImages.length > 0) {
        if (confirm('确定要放弃编辑吗？')) {
          window.location.href = 'index.html';
        }
      } else {
        window.location.href = 'index.html';
      }
    }
    
    // Topic search
    document.getElementById('topic-search')?.addEventListener('input', function() {
      const query = this.value.toLowerCase();
      document.querySelectorAll('.topic-btn').forEach(btn => {
        const topic = btn.dataset.topic.toLowerCase();
        btn.style.display = topic.includes(query) ? 'flex' : 'none';
      });
    });
    
    // Initialize
    loadTopics();
  </script>
</body>
</html>
