<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>语言设置 - 游导旅游</title>
  <meta name="description" content="自动检测您的浏览器语言设置，为您推荐最适合的语言版本">
  <link rel="canonical" href="https://youdao-travel.com/language-detect.html">
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- 自定义样式 -->
  <style>
    :root {
      --primary: #4F86F7;
      --primary-dark: #3B82F6;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
    }
    
    .card-hover {
      transition: all 0.3s ease;
    }
    
    .card-hover:hover {
      transform: translateY(-4px);
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.15);
    }
    
    .lang-card {
      transition: all 0.25s ease;
      cursor: pointer;
    }
    
    .lang-card:hover {
      transform: scale(1.02);
    }
    
    .lang-card.selected {
      border-color: var(--primary);
      background: linear-gradient(135deg, rgba(79, 134, 247, 0.1) 0%, rgba(79, 134, 247, 0.05) 100%);
    }
    
    .pulse-dot {
      animation: pulse 2s infinite;
    }
    
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }
    
    .fade-in {
      animation: fadeIn 0.5s ease;
    }
    
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body class="p-4 md:p-8">
  <!-- 主容器 -->
  <div class="max-w-3xl mx-auto">
    
    <!-- 顶部导航 -->
    <div class="flex items-center justify-between mb-8">
      <a href="index.html" class="flex items-center gap-2 text-white hover:text-white/80 transition-colors">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
        </svg>
        <span>返回首页</span>
      </a>
      <div class="flex items-center gap-2 text-white/80 text-sm">
        <span class="pulse-dot w-2 h-2 bg-green-400 rounded-full"></span>
        <span id="browserStatus">检测中...</span>
      </div>
    </div>

    <!-- 主卡片 -->
    <div class="bg-white rounded-2xl shadow-2xl overflow-hidden fade-in">
      
      <!-- 头部区域 -->
      <div class="bg-gradient-to-r from-indigo-500 to-purple-600 px-6 py-10 text-center text-white">
        <div class="text-5xl mb-4">🌐</div>
        <h1 class="text-2xl md:text-3xl font-bold mb-2">选择您的语言</h1>
        <p class="text-white/80 text-sm md:text-base">选择您偏好的语言，体验更好的服务</p>
      </div>

      <!-- 检测结果提示 -->
      <div id="detectNotice" class="mx-6 mt-6 p-4 bg-blue-50 border border-blue-100 rounded-xl hidden">
        <div class="flex items-start gap-3">
          <span class="text-2xl">💡</span>
          <div class="flex-1">
            <p class="font-medium text-blue-900" id="detectTitle">检测到您的浏览器语言</p>
            <p class="text-sm text-blue-700 mt-1" id="detectMessage">我们将为您自动切换到推荐的语言版本</p>
          </div>
          <button id="applyDetectBtn" class="px-4 py-2 bg-blue-500 text-white rounded-lg text-sm font-medium hover:bg-blue-600 transition-colors">
            应用
          </button>
        </div>
      </div>

      <!-- 语言列表 -->
      <div class="p-6">
        <h2 class="text-lg font-semibold text-gray-800 mb-4 flex items-center gap-2">
          <span>🌍</span>
          <span>选择语言</span>
        </h2>
        
        <div class="grid grid-cols-2 md:grid-cols-4 gap-3" id="langGrid">
          <!-- 简体中文 -->
          <div class="lang-card p-4 border-2 border-gray-100 rounded-xl text-center" data-lang="zh-CN" onclick="selectLang('zh-CN')">
            <span class="text-4xl block mb-2">🇨🇳</span>
            <span class="font-medium text-gray-800 block">中文</span>
            <span class="text-xs text-gray-500">简体中文</span>
          </div>

          <!-- English -->
          <div class="lang-card p-4 border-2 border-gray-100 rounded-xl text-center" data-lang="en" onclick="selectLang('en')">
            <span class="text-4xl block mb-2">🇺🇸</span>
            <span class="font-medium text-gray-800 block">English</span>
            <span class="text-xs text-gray-500">English</span>
          </div>

          <!-- 日本語 -->
          <div class="lang-card p-4 border-2 border-gray-100 rounded-xl text-center" data-lang="ja" onclick="selectLang('ja')">
            <span class="text-4xl block mb-2">🇯🇵</span>
            <span class="font-medium text-gray-800 block">日本語</span>
            <span class="text-xs text-gray-500">日语</span>
          </div>

          <!-- 한국어 -->
          <div class="lang-card p-4 border-2 border-gray-100 rounded-xl text-center" data-lang="ko" onclick="selectLang('ko')">
            <span class="text-4xl block mb-2">🇰🇷</span>
            <span class="font-medium text-gray-800 block">한국어</span>
            <span class="text-xs text-gray-500">韩语</span>
          </div>

          <!-- ไทย -->
          <div class="lang-card p-4 border-2 border-gray-100 rounded-xl text-center" data-lang="th" onclick="selectLang('th')">
            <span class="text-4xl block mb-2">🇹🇭</span>
            <span class="font-medium text-gray-800 block">ไทย</span>
            <span class="text-xs text-gray-500">泰语</span>
          </div>

          <!-- Tiếng Việt -->
          <div class="lang-card p-4 border-2 border-gray-100 rounded-xl text-center" data-lang="vi" onclick="selectLang('vi')">
            <span class="text-4xl block mb-2">🇻🇳</span>
            <span class="font-medium text-gray-800 block">Tiếng Việt</span>
            <span class="text-xs text-gray-500">越南语</span>
          </div>

          <!-- Bahasa Indonesia -->
          <div class="lang-card p-4 border-2 border-gray-100 rounded-xl text-center" data-lang="id" onclick="selectLang('id')">
            <span class="text-4xl block mb-2">🇮🇩</span>
            <span class="font-medium text-gray-800 block">Indonesia</span>
            <span class="text-xs text-gray-500">印尼语</span>
          </div>

          <!-- Bahasa Melayu -->
          <div class="lang-card p-4 border-2 border-gray-100 rounded-xl text-center" data-lang="ms" onclick="selectLang('ms')">
            <span class="text-4xl block mb-2">🇲🇾</span>
            <span class="font-medium text-gray-800 block">Melayu</span>
            <span class="text-xs text-gray-500">马来语</span>
          </div>
        </div>
      </div>

      <!-- 确认按钮 -->
      <div class="px-6 pb-6">
        <button id="confirmBtn" class="w-full py-4 bg-gradient-to-r from-indigo-500 to-purple-600 text-white rounded-xl font-semibold text-lg hover:from-indigo-600 hover:to-purple-700 transition-all disabled:opacity-50 disabled:cursor-not-allowed shadow-lg hover:shadow-xl" disabled onclick="confirmSelection()">
          确认并继续
        </button>
        <p class="text-center text-gray-500 text-sm mt-3">
          选择语言后，我们将记住您的偏好设置
        </p>
      </div>
    </div>

    <!-- 浏览器信息 -->
    <div class="mt-6 bg-white/10 backdrop-blur rounded-xl p-4 text-white text-sm">
      <div class="flex items-start gap-3">
        <span class="text-xl">🔍</span>
        <div class="flex-1">
          <p class="font-medium mb-1">浏览器检测信息</p>
          <div class="grid grid-cols-2 gap-2 text-white/70 text-xs">
            <div>浏览器语言: <span id="browserLang">-</span></div>
            <div>系统语言: <span id="systemLang">-</span></div>
            <div>时区: <span id="timezone">-</span></div>
            <div>推荐语言: <span id="recommendLang" class="text-yellow-300">-</span></div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- 语言映射表 -->
  <script>
    const langMap = {
      'zh-CN': { native: '中文', flag: '🇨🇳', url: 'index.html' },
      'en': { native: 'English', flag: '🇺🇸', url: 'en/index.html' },
      'ja': { native: '日本語', flag: '🇯🇵', url: 'ja/index.html' },
      'ko': { native: '한국어', flag: '🇰🇷', url: 'ko/index.html' },
      'th': { native: 'ไทย', flag: '🇹🇭', url: 'th/index.html' },
      'vi': { native: 'Tiếng Việt', flag: '🇻🇳', url: 'vi/index.html' },
      'id': { native: 'Indonesia', flag: '🇮🇩', url: 'id/index.html' },
      'ms': { native: 'Melayu', flag: '🇲🇾', url: 'ms/index.html' }
    };

    const browserLangMap = {
      'zh': 'zh-CN', 'zh-CN': 'zh-CN', 'zh-TW': 'zh-CN', 'zh-HK': 'zh-CN',
      'en': 'en', 'en-US': 'en', 'en-GB': 'en',
      'ja': 'ja', 'ja-JP': 'ja',
      'ko': 'ko', 'ko-KR': 'ko',
      'th': 'th', 'th-TH': 'th',
      'vi': 'vi', 'vi-VN': 'vi',
      'id': 'id', 'id-ID': 'id',
      'ms': 'ms', 'ms-MY': 'ms'
    };

    let selectedLang = null;

    function getBrowserLang() {
      return navigator.language || navigator.userLanguage || 'zh-CN';
    }

    function getSystemLang() {
      return navigator.languages ? navigator.languages[0] : getBrowserLang();
    }

    function getRecommendedLang() {
      const browserLang = getBrowserLang().toLowerCase();
      const systemLang = getSystemLang().toLowerCase();
      
      for (const [key, value] of Object.entries(browserLangMap)) {
        if (browserLang.startsWith(key) || systemLang.startsWith(key)) {
          return value;
        }
      }
      return 'zh-CN';
    }

    function init() {
      const browserLang = getBrowserLang();
      const systemLang = getSystemLang();
      const recommendedLang = getRecommendedLang();
      const userLang = localStorage.getItem('preferred-lang');

      document.getElementById('browserLang').textContent = browserLang;
      document.getElementById('systemLang').textContent = systemLang;
      document.getElementById('timezone').textContent = Intl.DateTimeFormat().resolvedOptions().timeZone;
      document.getElementById('recommendLang').textContent = langMap[recommendedLang]?.native || recommendedLang;
      document.getElementById('browserStatus').textContent = '就绪';

      if (userLang && langMap[userLang]) {
        selectLang(userLang, false);
      } 
      else if (recommendedLang && langMap[recommendedLang]) {
        showDetectNotice(recommendedLang);
      }
    }

    function showDetectNotice(langCode) {
      const notice = document.getElementById('detectNotice');
      const lang = langMap[langCode];
      
      if (lang) {
        document.getElementById('detectTitle').textContent = `检测到您使用 ${lang.native}`;
        document.getElementById('detectMessage').textContent = `我们推荐您使用 ${lang.native} 版本`;
        notice.classList.remove('hidden');
        
        document.getElementById('applyDetectBtn').onclick = () => {
          selectLang(langCode);
          notice.classList.add('hidden');
        };
      }
    }

    function selectLang(langCode, autoConfirm = false) {
      selectedLang = langCode;
      
      document.querySelectorAll('.lang-card').forEach(card => {
        card.classList.toggle('selected', card.dataset.lang === langCode);
      });

      document.getElementById('confirmBtn').disabled = false;

      if (autoConfirm) {
        confirmSelection();
      }
    }

    function confirmSelection() {
      if (!selectedLang) return;

      localStorage.setItem('preferred-lang', selectedLang);
      localStorage.setItem('lang-set-time', Date.now());

      const targetUrl = langMap[selectedLang]?.url || 'index.html';
      
      const btn = document.getElementById('confirmBtn');
      btn.innerHTML = '<span class="inline-block animate-spin mr-2">⟳</span> 正在跳转...';
      btn.disabled = true;

      setTimeout(() => {
        window.location.href = targetUrl;
      }, 500);
    }

    document.addEventListener('DOMContentLoaded', init);
  </script>
</body>
</html>
