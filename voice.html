<script>
var STORAGE_KEY = 'youdao_voice_posts';

// 发声墙数据 - 暂时清空，等待真实用户内容
var seedPosts = [];

function getAllPosts() {
  var localPosts = [];
  try {
    var stored = localStorage.getItem(STORAGE_KEY);
    if (stored) localPosts = JSON.parse(stored);
  } catch(e) {}
  return localPosts;
}

function savePosts(posts) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(posts));
}

function getMergedPosts() {
  var localPosts = getAllPosts();
  var localIds = {};
  for (var i = 0; i < localPosts.length; i++) {
    localIds[localPosts[i].localId] = true;
  }
  var merged = localPosts.slice();
  for (var j = 0; j < seedPosts.length; j++) {
    var seedId = 'seed_' + j;
    if (!localIds[seedId]) {
      merged.push({ identity: seedPosts[j].identity, nickname: seedPosts[j].nickname, content: seedPosts[j].content, likes: seedPosts[j].likes, time: seedPosts[j].time, localId: seedId });
    }
  }
  merged.sort(function(a, b) { return b.time - a.time; });
  return merged;
}

var currentTab = 'guide';

function switchTab(tab) {
  currentTab = tab;
  var btns = document.querySelectorAll('.tab-btn');
  for (var i = 0; i < btns.length; i++) {
    btns[i].classList.toggle('active', btns[i].dataset.tab === tab);
  }
  renderPosts();
}

function formatTime(ts) {
  var diff = Date.now() - ts;
  if (diff < 60000) return '刚刚';
  if (diff < 3600000) return Math.floor(diff / 60000) + '分钟前';
  if (diff < 86400000) return Math.floor(diff / 3600000) + '小时前';
  if (diff < 604800000) return Math.floor(diff / 86400000) + '天前';
  var d = new Date(ts);
  return (d.getMonth() + 1) + '月' + d.getDate() + '日';
}

function escapeHtml(text) {
  var div = document.createElement('div');
  div.appendChild(document.createTextNode(text));
  return div.innerHTML;
}

function renderPosts() {
  var grid = document.getElementById('postsGrid');
  var allPosts = getMergedPosts();
  var filtered = [];
  for (var i = 0; i < allPosts.length; i++) {
    if (allPosts[i].identity === currentTab) filtered.push(allPosts[i]);
  }

  if (filtered.length === 0) {
    grid.innerHTML = '<div class="empty-state" style="grid-column:1/-1"><div class="icon">💛</div><p>还没有' + (currentTab === 'guide' ? '导游' : '游客') + '分享温暖</p><p>做第一个传递温暖的人吧！</p></div>';
    return;
  }

  var html = '';
  for (var k = 0; k < filtered.length; k++) {
    var post = filtered[k];
    var badge = post.identity === 'guide' ? 'identity-guide' : 'identity-tourist';
    var label = post.identity === 'guide' ? '🎙️ 导游' : '🎒 游客';
    html += '<div class="post-card"><div class="post-header"><span class="identity-badge ' + badge + '">' + label + '</span><span class="post-meta">' + formatTime(post.time) + '</span></div><div class="post-author" style="margin-bottom:8px;color:#888;font-size:0.85rem;">' + escapeHtml(post.nickname || '匿名用户') + '</div><div class="post-content">' + escapeHtml(post.content) + '</div><div class="post-footer"><span class="like-icon">❤</span><span>' + post.likes + '</span></div></div>';
  }
  grid.innerHTML = html;
}

var selectedIdentity = 'guide';

function selectIdentity(el) {
  var opts = document.querySelectorAll('.identity-option');
  for (var i = 0; i < opts.length; i++) opts[i].classList.remove('selected');
  el.classList.add('selected');
  selectedIdentity = el.dataset.identity;
}

function updateCharCount() {
  var content = document.getElementById('postContent').value;
  document.getElementById('charCount').textContent = content.length;
  document.getElementById('submitBtn').disabled = content.trim().length === 0;
}

function openModal() {
  document.getElementById('modalOverlay').classList.add('show');
  document.getElementById('postContent').value = '';
  document.getElementById('nickname').value = '';
  document.getElementById('charCount').textContent = '0';
  document.getElementById('submitBtn').disabled = true;
  selectIdentity(document.querySelector('.identity-option[data-identity="guide"]'));
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('show');
}

function closeModalOnOverlay(e) {
  if (e.target === e.currentTarget) closeModal();
}

function submitPost() {
  var content = document.getElementById('postContent').value.trim();
  if (!content) return;

  var nickname = document.getElementById('nickname').value.trim() || '匿名用户';
  var newPost = {
    identity: selectedIdentity,
    nickname: nickname,
    content: content,
    likes: 0,
    time: Date.now(),
    localId: 'local_' + Date.now()
  };

  var posts = getAllPosts();
  posts.unshift(newPost);
  savePosts(posts);

  closeModal();
  renderPosts();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

window.onscroll = function() {
  document.getElementById('backTop').classList.toggle('show', window.scrollY > 400);
};

renderPosts();
</script>
