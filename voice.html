  <style>

    a { text-decoration: none; color: inherit; }
    .glass-card { background: rgba(255,255,255,0.08); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.15); border-radius: 20px; transition: all 0.3s; }
    .glass-card:hover { background: rgba(255,255,255,0.12); border-color: rgba(255,255,255,0.25); transform: translateY(-3px); box-shadow: 0 15px 35px rgba(0,0,0,0.25); }
    .navbar { display: flex; justify-content: space-between; align-items: center; padding: 14px 20px; background: rgba(80,65,10,0.95); backdrop-filter: blur(20px); border-bottom: 1px solid rgba(255,255,255,0.1); position: sticky; top: 0; z-index: 100; }
    .logo { font-size: 1.1rem; font-weight: 800; color: #fff; display: flex; align-items: center; gap: 8px; }
    .logo-icon { width: 32px; height: 32px; background: linear-gradient(135deg, #FF6B35, #ff8c5a); border-radius: 8px; display: flex; align-items: center; justify-content: center; }
    .nav-links { display: flex; gap: 4px; }
    .nav-links a { padding: 8px 12px; border-radius: 10px; font-size: 0.85rem; color: rgba(255,255,255,0.8); transition: all 0.3s; }
    .nav-links a:hover { background: rgba(255,107,53,0.3); color: #fff; }
    .nav-links a.active { background: #FF6B35; color: #fff; font-weight: 600; }
    .nav-toggle { display: none; flex-direction: column; gap: 5px; cursor: pointer; padding: 8px; }
    .nav-toggle span { width: 22px; height: 2px; background: #fff; border-radius: 2px; }
    .container { max-width: 1100px; margin: 0 auto; padding: 0 20px; }
    .hero { padding: 100px 20px 60px; text-align: center; position: relative; }
    .hero::before { content: ''; position: absolute; top: -50%; left: 50%; transform: translateX(-50%); width: 80%; height: 200%; background: radial-gradient(circle, rgba(255,107,53,0.08) 0%, transparent 60%); pointer-events: none; }
    .hero h1 { font-size: clamp(2.5rem, 8vw, 4rem); font-weight: 900; margin-bottom: 16px; background: linear-gradient(135deg, #fff 0%, rgba(255,255,255,0.85) 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; letter-spacing: -1px; }
    .hero p { font-size: 1.1rem; color: rgba(255,255,255,0.95); max-width: 520px; margin: 0 auto; }
    .hero-tip { font-size: 0.95rem; color: rgba(255,255,255,0.6); font-style: italic; margin-top: 16px; }
    .tabs { display: flex; justify-content: center; gap: 12px; margin-top: 32px; }
    .tab-btn { padding: 12px 28px; border-radius: 50px; font-size: 0.95rem; cursor: pointer; border: 2px solid rgba(255,255,255,0.3); background: transparent; color: rgba(255,255,255,0.8); transition: all 0.3s; display: flex; align-items: center; gap: 8px; }
    .tab-btn:hover, .tab-btn.active { background: #fff; color: #6b5a10; border-color: #fff; }
    .tab-btn .emoji { font-size: 1.1rem; }
    .posts-section { padding: 40px 0 120px; }
    .posts-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 20px; margin-top: 32px; }
    .post-card { padding: 24px; display: flex; flex-direction: column; }
    .post-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
    .identity-badge { padding: 6px 14px; border-radius: 20px; font-size: 0.8rem; font-weight: 600; }
    .identity-guide { background: rgba(255,107,53,0.2); color: #FF6B35; border: 1px solid rgba(255,107,53,0.3); }
    .identity-tourist { background: rgba(255,140,90,0.2); color: #ffb070; border: 1px solid rgba(255,140,90,0.3); }
    .identity-examinee { background: rgba(16,185,129,0.2); color: #10b981; border: 1px solid rgba(16,185,129,0.3); }
    .post-meta { font-size: 0.82rem; color: rgba(255,255,255,0.5); }
    .post-content { flex: 1; font-size: 0.95rem; line-height: 1.8; color: rgba(255,255,255,0.9); margin-bottom: 18px; }
    .post-footer { display: flex; align-items: center; gap: 8px; color: rgba(255,255,255,0.5); font-size: 0.88rem; }
    .like-btn { background: none; border: none; color: rgba(255,255,255,0.5); cursor: pointer; display: flex; align-items: center; gap: 6px; font-size: 0.88rem; transition: all 0.2s; padding: 6px 12px; border-radius: 20px; }
    .like-btn:hover { background: rgba(239,68,68,0.15); color: #f87171; }
    .like-btn.liked { color: #f87171; }
    .fab { position: fixed; bottom: 30px; right: 30px; background: linear-gradient(135deg, #FF6B35, #ea580c); color: white; border: none; padding: 16px 28px; border-radius: 50px; font-size: 1rem; cursor: pointer; box-shadow: 0 8px 25px rgba(255,107,53,0.4); display: flex; align-items: center; gap: 10px; transition: all 0.3s; z-index: 50; font-weight: 600; }
    .fab:hover { transform: translateY(-3px) scale(1.02); box-shadow: 0 12px 35px rgba(255,107,53,0.5); }
    .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 200; align-items: center; justify-content: center; padding: 20px; }
    .modal-overlay.show { display: flex; }
    .modal { background: linear-gradient(135deg, #6b5a10, #2d3a8c); border-radius: 24px; padding: 36px; max-width: 520px; width: 100%; max-height: 90vh; overflow-y: auto; border: 1px solid rgba(255,255,255,0.15); }
    .modal h3 { font-size: 1.4rem; color: #fff; margin-bottom: 28px; display: flex; align-items: center; gap: 10px; }
    .form-group { margin-bottom: 22px; }
    .form-group label { display: block; font-size: 0.92rem; color: rgba(255,255,255,0.85); margin-bottom: 10px; font-weight: 500; }
    .form-group input, .form-group textarea { width: 100%; padding: 14px 16px; background: rgba(255,255,255,0.08); border: 1.5px solid rgba(255,255,255,0.15); border-radius: 14px; font-size: 1rem; font-family: inherit; color: #fff; transition: all 0.3s; }
    .form-group input:focus, .form-group textarea:focus { outline: none; border-color: #FF6B35; background: rgba(255,255,255,0.12); }
    .form-group textarea { resize: vertical; min-height: 150px; }
    .form-group input::placeholder, .form-group textarea::placeholder { color: rgba(255,255,255,0.4); }
    .char-count { text-align: right; font-size: 0.82rem; color: rgba(255,255,255,0.4); margin-top: 6px; }
    .identity-select { display: flex; gap: 12px; }
    .identity-option { flex: 1; padding: 16px 12px; border: 2px solid rgba(255,255,255,0.15); border-radius: 14px; cursor: pointer; text-align: center; transition: all 0.3s; }
    .identity-option:hover { border-color: rgba(255,107,53,0.5); }
    .identity-option.selected { border-color: #FF6B35; background: rgba(255,107,53,0.15); }
    .identity-option .icon { font-size: 1.8rem; margin-bottom: 6px; }
    .identity-option .text { font-size: 0.88rem; font-weight: 500; color: rgba(255,255,255,0.85); }
    .modal-actions { display: flex; gap: 12px; margin-top: 28px; }
    .btn-cancel { flex: 1; padding: 14px; background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.15); border-radius: 14px; color: rgba(255,255,255,0.8); font-size: 1rem; cursor: pointer; transition: all 0.3s; }
    .btn-cancel:hover { background: rgba(255,255,255,0.15); }
    .btn-submit { flex: 2; padding: 14px; background: linear-gradient(135deg, #FF6B35, #ea580c); border: none; border-radius: 14px; color: #fff; font-size: 1rem; font-weight: 600; cursor: pointer; transition: all 0.3s; box-shadow: 0 6px 20px rgba(255,107,53,0.35); }
    .btn-submit:hover { transform: translateY(-2px); box-shadow: 0 10px 30px rgba(255,107,53,0.45); }
    .toast { position: fixed; top: 100px; left: 50%; transform: translateX(-50%) translateY(-20px); background: linear-gradient(135deg, #10b981, #059669); color: #fff; padding: 16px 32px; border-radius: 14px; font-size: 1rem; font-weight: 500; box-shadow: 0 10px 30px rgba(16,185,129,0.4); opacity: 0; visibility: hidden; transition: all 0.3s; z-index: 300; }
    .toast.show { opacity: 1; visibility: visible; transform: translateX(-50%) translateY(0); }
    .footer { background: rgba(80,65,10,0.95); backdrop-filter: blur(20px); border-top: 1px solid rgba(255,255,255,0.1); padding: 40px 20px; text-align: center; }
    .footer p { color: rgba(255,255,255,0.7); font-size: 0.9rem; margin-bottom: 8px; }
    @media (max-width: 768px) { .nav-links { display: none; position: absolute; top: 100%; left: 0; right: 0; background: rgba(80,65,10,0.98); flex-direction: column; padding: 12px; gap: 4px; border-radius: 0 0 16px 16px; } .nav-links.open { display: flex; } .nav-toggle { display: flex; } .posts-grid { grid-template-columns: 1fr; } .tabs { flex-wrap: wrap; } .fab { bottom: 24px; right: 24px; padding: 14px 24px; } .hero { padding: 80px 20px 40px; } .modal { padding: 24px; } }
  
/* 全局重点突出样式 */
.hl{color:#FF6B35;font-weight:700}
.key-point{display:inline-block;background:linear-gradient(135deg,rgba(255,107,53,0.18),rgba(255,140,90,0.08));border:1px solid rgba(255,107,53,0.25);border-radius:8px;padding:2px 10px;color:#ff8c5a;font-weight:600;font-size:0.92em}

</style>

<body>

    <a class="logo" href="index.html"><div class="logo-icon"><svg fill="white" height="18" viewBox="0 0 24 24" width="18"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path></svg></div>游导旅游</a>
    <div class="nav-links" id="navLinks">
      <a href="index.html">首页</a><a href="chat.html">AI助手</a><a href="exam-guide.html">备考攻略</a><a href="province-exam.html">各省备考</a><a href="exam-simulator.html">模拟考试</a><a href="travel-knowledge.html">旅行知识</a><a href="voice.html" class="active">发声墙</a><a href="resources.html">资料套餐</a>
    </div>
    <div class="nav-toggle" onclick="document.getElementById('navLinks').classList.toggle('open')"><span></span><span></span><span></span></div>
  </nav>
  <div class="hero">
    <h1>发声墙</h1>
    <p>旅行中的温暖与感动，值得被看见</p>
    <p class="hero-tip">可以是别人的善意，也可以是你自己的感动</p>
    <div class="tabs">
      <button class="tab-btn active" onclick="filterPosts('all')"><span class="emoji">✨</span> 全部</button>
      <button class="tab-btn" onclick="filterPosts('guide')"><span class="emoji">🏛️</span> 导游说</button>
      <button class="tab-btn" onclick="filterPosts('tourist')"><span class="emoji">🎒</span> 游客说</button>
      <button class="tab-btn" onclick="filterPosts('examinee')"><span class="emoji">📚</span> 备考人</button>
    </div>
  </div>
  <div class="container"><div class="posts-section"><div class="posts-grid" id="postsGrid"></div></div></div>
  <button class="fab" onclick="openModal()"><span>✏️</span> 我要发声</button>
  <div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
    <div class="modal" onclick="event.stopPropagation()">
      <h3>✨ 分享你的故事</h3>
      <div class="form-group"><label>你的身份</label>
        <div class="identity-select">
          <div class="identity-option" onclick="selectIdentity(this, 'guide')"><div class="icon">🏛️</div><div class="text">导游</div></div>
          <div class="identity-option" onclick="selectIdentity(this, 'tourist')"><div class="icon">🎒</div><div class="text">游客</div></div>
          <div class="identity-option" onclick="selectIdentity(this, 'examinee')"><div class="icon">📚</div><div class="text">备考人</div></div>
        </div>
      </div>
      <div class="form-group"><label>昵称（选填）</label><input type="text" id="authorName" placeholder="给自己起个名字"></div>
      <div class="form-group"><label>想说的话</label><textarea id="postContent" placeholder="分享旅途中的温暖故事、备考心得或任何想说的..." maxlength="500" oninput="updateCharCount()"></textarea><div class="char-count"><span id="charCount">0</span>/500</div></div>
      <div class="modal-actions"><button class="btn-cancel" onclick="closeModal()">取消</button><button class="btn-submit" onclick="submitPost()">发布</button></div>
    </div>
  </div>
  <div class="toast" id="toast">发布成功！感谢你的分享 ✨</div>
  <footer class="footer"><p>游导旅游 - 专注导游证备考与旅行知识分享</p><p>微信联系：<strong>ximao101</strong></p></footer>
  <script>
    // 默认展示帖子（只在没有localStorage数据时加载）
    const defaultPosts = [
      {id:1,identity:'examinee',identityText:'备考人',content:'买了B包资料，配合AI助手每天刷题2小时，笔试终于过了！政策法规那个口诀真的太好记了，考试好几题都是口诀里的内容。',author:'小陈',time:'3天前',likes:0},
      {id:2,identity:'examinee',identityText:'备考人',content:'非旅游专业零基础备考，导基知识量太大了，还好有AI助手能随时问，比翻书快多了。面试部分还在练，加油！',author:'阿杰',time:'5天前',likes:0},
      {id:3,identity:'examinee',identityText:'备考人',content:'第二次考了，上次差3分没过。这次换了复习方法，跟着备考攻略的节奏走，比上次有信心多了。',author:'再来一次',time:'1周前',likes:0},
      {id:4,identity:'examinee',identityText:'备考人',content:'各省导基真的太细了，每个省的景点、美食、民俗都要记。我的方法是每天攻一个省，用AI助手测一测，效果不错。',author:'考证ing',time:'1周前',likes:0},
      {id:5,identity:'examinee',identityText:'备考人',content:'最怕面试了，站在那里脑子一片空白。后来用AI模拟面试练了十几遍，终于能流利讲完导游词了。',author:'社恐选手',time:'2周前',likes:0}
    ];

    // 从localStorage加载帖子，没有则用默认
    let posts = JSON.parse(localStorage.getItem('youdao_posts') || 'null') || defaultPosts;

    function savePosts() {
      localStorage.setItem('youdao_posts', JSON.stringify(posts));
    }

    let currentFilter = 'all';
    let selectedIdentity = '';
    function renderPosts(filter = 'all') {
      const grid = document.getElementById('postsGrid');
      const filtered = filter === 'all' ? posts : posts.filter(p => p.identity === filter);
      grid.innerHTML = filtered.map(post => `<div class="post-card glass-card" data-identity="${post.identity}"><div class="post-header"><span class="identity-badge identity-${post.identity}">${post.identityText}</span><span class="post-meta">${post.author ? post.author + ' · ' : ''}${post.time}</span></div><div class="post-content">${post.content}</div><div class="post-footer"><button class="like-btn" onclick="toggleLike(${post.id}, this)">❤️ <span class="like-count">${post.likes}</span></button></div></div>`).join('');
    }
    function filterPosts(identity) { currentFilter = identity; document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active')); event.target.closest('.tab-btn').classList.add('active'); renderPosts(identity); }
    function toggleLike(id, btn) { btn.classList.toggle('liked'); const countSpan = btn.querySelector('.like-count'); let count = parseInt(countSpan.textContent); if (btn.classList.contains('liked')) { count++; } else { count--; } countSpan.textContent = count; // 更新数据并保存 const post = posts.find(p => p.id === id); if (post) { post.likes = count; savePosts(); } }
    function openModal() { document.getElementById('modalOverlay').classList.add('show'); document.body.style.overflow = 'hidden'; }
    function closeModal(e) { if (e && e.target !== e.currentTarget) return; document.getElementById('modalOverlay').classList.remove('show'); document.body.style.overflow = ''; document.querySelectorAll('.identity-option').forEach(opt => opt.classList.remove('selected')); document.getElementById('authorName').value = ''; document.getElementById('postContent').value = ''; document.getElementById('charCount').textContent = '0'; selectedIdentity = ''; }
    function selectIdentity(el, identity) { document.querySelectorAll('.identity-option').forEach(opt => opt.classList.remove('selected')); el.classList.add('selected'); selectedIdentity = identity; }
    function updateCharCount() { document.getElementById('charCount').textContent = document.getElementById('postContent').value.length; }
    function submitPost() {
      const content = document.getElementById('postContent').value.trim();
      const author = document.getElementById('authorName').value.trim() || '匿名';
      if (!content) { alert('请输入想说的话'); return; }
      if (!selectedIdentity) { alert('请选择你的身份'); return; }
      const newPost = { id: Date.now(), identity: selectedIdentity, identityText: selectedIdentity === 'guide' ? '导游' : selectedIdentity === 'tourist' ? '游客' : '备考人', content: content, author: author, time: new Date().toLocaleDateString('zh-CN'), likes: 0 };
      posts.unshift(newPost);
      savePosts(); // 保存到localStorage
      renderPosts(currentFilter);
      closeModal();
      const toast = document.getElementById('toast');
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 3000);
    }
    document.getElementById('navLinks').classList.remove('open');
    renderPosts();
  </script>

  <a href="province-exam.html" style="display:flex;flex-direction:column;align-items:center;gap:2px;font-size:0.7rem;color:rgba(255,255,255,0.68);text-decoration:none;"><span style="font-size:1.2rem;">🗺️</span>选省份</a>
