  // 示例发帖数据
  const samplePosts = [
    {id:1, category:'备考人', author:'小雨', avatar:'🧑‍🎓', time:'3小时前', content:'今天做模拟考试终于过了政策法规那一科！从52分到78分，用了半个月。分享我的方法：先做错题本里所有政策法规的错题，把每道题的知识点写在本子上，然后每天早上花15分钟默写。真的有效！', likes:24, comments:8},
    {id:2, category:'导游说', author:'老张带团记', avatar:'👨‍💼', time:'5小时前', content:'带了一个广东团去西安，有个阿姨全程都在问"这个是不是西游记里的？"到了兵马俑她说"这不就是泥人张嘛！"全车人都笑翻了。做导游最开心的就是遇见有趣的客人。', likes:56, comments:15},
    {id:3, category:'游客说', author:'旅行的鱼', avatar:'🎒', time:'昨天', content:'在九寨沟遇到一位导游，讲解特别专业，不是那种背词的，是真的理解景点背后的故事。后来才知道她考了3次导游证才过。现在我也在备考，希望以后也能成为那样有温度的导游。', likes:38, comments:6},
    {id:4, category:'备考人', author:'努力的小陈', avatar:'👩‍🎓', time:'昨天', content:'导游业务这科真的好难记！特别是那个应变能力的题型，每次都选错。后来发现一个口诀："先安抚、再处理、后上报"，瞬间好记多了。有没有同学跟我一样这科最弱的？', likes:19, comments:12},
    {id:5, category:'导游说', author:'西柚姐姐', avatar:'👩‍💼', time:'2天前', content:'今天带团去丹霞山，刚好碰上日落，整座山都是金红色的，游客们全都在拍照。有个小朋友问我"姐姐，这些石头为什么会变色呀"我现场编了一段科普，小朋友听得好认真。这大概就是当导游的意义吧。', likes:72, comments:20},
    {id:6, category:'备考人', author:'梦在旅途', avatar:'🧑‍🎓', time:'2天前', content:'分享一个记忆全国导基的小技巧：把知识点编成故事。比如记四大佛教名山，我就想象一个故事：文殊菩萨骑着狮子去五台山取经，路上遇到普贤骑象去峨眉山，观音从普陀山赶来帮忙，最后地藏王在九华山等他们回来。画面感一出来就忘不掉了！', likes:45, comments:9},
    {id:7, category:'游客说', author:'北方姑娘', avatar:'🎒', time:'3天前', content:'第一次跟团游去了桂林，导游是个90后小姐姐，一路上又讲解又照顾老人，中途有位爷爷突然头晕，她反应超快，马上扶住老人、喂糖水、联系景区医务室。那一刻觉得导游真的不只是讲解员，更是旅途中的守护者。', likes:63, comments:18},
    {id:8, category:'备考人', author:'一起上岸', avatar:'👩‍🎓', time:'3天前', content:'面试模拟今天练了第5次，终于不紧张了！心得：1.先写稿再脱稿 2.对着镜子练表情 3.录视频回看 4.找朋友当考官提问 5.提前踩点熟悉考场环境。加油，我们都能上岸！', likes:31, comments:7},
    {id:9, category:'导游说', author:'阿杰在路上', avatar:'👨‍💼', time:'4天前', content:'带了一个外国团去故宫，用英语讲解三大殿的建筑特色，老外们听得目瞪口呆。有个美国大叔说"我在美国住了一辈子，没想到中国的建筑这么讲究"。做外语导游虽然累，但那种传播文化的成就感真的无法替代。', likes:48, comments:11},
    {id:10, category:'备考人', author:'小太阳', avatar:'🧑‍🎓', time:'5天前', content:'考了2次终于过了！第一次笔试差2分，第二次认真刷了3周题。最大的教训是：不要只看书不做题！做题才能发现你的知识盲区。推荐大家用这个网站的模拟考试功能，题目质量还不错，解析也清楚。', likes:82, comments:23},

    {id:12, category:'导游说', author:'岭南阿玲', avatar:'👩‍💼', time:'1周前', content:'持证3年了，最大的感受：考证只是入门，真正的学习是带团之后。每带一个团都能学到新东西，客人的问题千奇百怪，逼着你不断学习。所以大家放心考，考过之后才是学习的开始！', likes:67, comments:12},
    {id:13, category:'备考人', author:'深圳小薇', avatar:'👩‍🎓', time:'1周前', content:'分享我的复习计划：早上7-8点背政策法规，中午12-1点做20道题，晚上8-10点看导游业务和导基。坚持了2个月，4科全过了！关键是每天都要学，哪怕只有半小时也别断。', likes:89, comments:15},
    {id:14, category:'导游说', author:'老陈带团记', avatar:'👨‍💼', time:'2周前', content:'刚带完一个潮汕美食团，游客们吃得太开心了。卤鹅、牛肉火锅、粿条、蚝烙...潮汕真的是美食天堂。考导游证的时候好好背各地特产，以后带团用得上！', likes:45, comments:7},

  const categoryIcons = {'备考人':'📚','导游说':'🏛️','游客说':'🎒','全部':'✨'};
  
  
window.closeModal = function(e) {
    if(e && e.target !== document.getElementById('modalOverlay')) return;
    document.getElementById('modalOverlay').classList.remove('show');
  };

window.selectIdentity = function(el, identity) {
    document.querySelectorAll('.identity-option').forEach(opt => opt.classList.remove('selected'));
    el.classList.add('selected');
    el.dataset.identity = identity;
  };

window.updateCharCount = function() {
    var len = document.getElementById('postContent').value.length;
    (document.getElementById('charCount')||{}).textContent= len;
  };
  function renderPosts(filter) {
    const grid = document.getElementById('postsGrid');
    if(!grid) return;
    const filtered = filter && filter !== '全部' ? samplePosts.filter(p => p.category === filter) : samplePosts;
    grid.innerHTML = filtered.map(p => `
      <div class="post-card">
        <div class="post-header">
          <div style="display:flex;align-items:center;gap:8px">
            <span style="font-size:1.5rem">${p.avatar}</span>
            <div>
              <div style="font-weight:600;font-size:0.9rem;color:#1A1A1A">${p.author}</div>
              <div style="font-size:0.75rem;color:#999">${p.time} · ${categoryIcons[p.category]||''} ${p.category}</div>
            </div>
          </div>
        </div>
        <div class="post-content">${p.content}</div>
        <div class="post-footer">
          <span style="font-size:0.85rem;color:#999;cursor:pointer" onclick="likePost(${p.id})">❤️ ${p.likes}</span>
          <span style="font-size:0.85rem;color:#999;margin-left:12px">💬 ${p.comments}</span>
        </div>
      </div>
    `).join('');
  }

  // Category filter - match existing tab-btn + filterPosts
  const categoryMap = {'all':'全部', 'guide':'导游说', 'tourist':'游客说', 'examinee':'备考人'};
  window.filterPosts = function(cat, btn) {
    document.querySelectorAll('.tab-btn').forEach(t => t.classList.remove('active'));
    if(btn) btn.classList.add('active');
    renderPosts(categoryMap[cat] || '全部');
  };

  window.likePost = function(id) {
    const post = samplePosts.find(p => p.id === id);
    if(post) { post.likes++; renderPosts(document.querySelector('.tab-btn.active')?.textContent.replace(/[✨🏛️🎒📚]/g,'').trim() || '全部'); }
  };

window.submitPost = function() {
    var content_text = document.getElementById('postContent').value.trim();
    if(!content_text) {
      alert('请输入想说的话');
      return;
    }
    var identity = '游客';
    document.querySelectorAll('.identity-option').forEach(opt => {
      if(opt.classList.contains('selected') && opt.dataset.identity) {
        identity = {'guide':'导游','tourist':'游客','examinee':'备考人'}[opt.dataset.identity] || '游客';
      }
    });
    var author = document.getElementById('authorName').value.trim() || '匿名用户';
    var avatar = {'guide':'👨‍💼','tourist':'🎒','examinee':'👩‍🎓'}[document.querySelector('.identity-option.selected')?.dataset.identity] || '👤';
    
    // 创建新帖子
    var newPost = {
      id: Date.now(),
      category: identity,
      author: author,
      avatar: avatar,
      time: '刚刚',
      content: content_text,
      likes: 0,
      comments: 0,
      isUserPost: true
    };
    
    // 保存到 localStorage
    try {
      var userPosts = JSON.parse(localStorage.getItem('userPosts') || '[]');
      userPosts.unshift(newPost);
      localStorage.setItem('userPosts', JSON.stringify(userPosts.slice(0, 50))); // 最多保存50条
    } catch(e) {
      console.log('保存帖子失败:', e);
    }
    
    // 添加到显示列表
    samplePosts.unshift(newPost);
    
    // 关闭弹窗并刷新
    document.getElementById('modalOverlay').classList.remove('show');
    showToast('发布成功！感谢你的分享 ✨');
    
    // 刷新列表
    var activeFilter = document.querySelector('.tab-btn.active')?.textContent.replace(/[✨🏛️🎒📚]/g,'').trim() || '全部';
    renderPosts(activeFilter === '全部' ? '全部' : activeFilter);
  };

function showToast(msg) {
    var toast = document.getElementById('toast');
    toast.textContent = msg;
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 2500);
  }

  window.openModal = function() {
    document.getElementById('modalOverlay').classList.add('show');
    // 重置表单
    document.getElementById('authorName').value = '';
    document.getElementById('postContent').value = '';
    (document.getElementById('charCount')||{}).textContent= '0';
    // 重置身份选择
    document.querySelectorAll('.identity-option').forEach(opt => opt.classList.remove('selected'));
  };

  // Initial render
  renderPosts('全部');

</script>

<script src="gamification.js"></script>
</body>
</html>
