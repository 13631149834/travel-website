  <div class="hero">

  <div class="container"><div class="posts-section"><div class="posts-grid" id="postsGrid"></div></div></div>
  <button class="fab" onclick="openModal()"><span>✏️</span> 我要发声</button>
  <div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
    <div class="modal" onclick="event.stopPropagation()">
      <h3>✨ 分享你的故事</h3>
      <div class="form-group"><label>你的身份</label>
        <div class="identity-select">
          <div class="identity-option" onclick="selectIdentity(this, 'guide')"><div class="icon">🏛️</div><div class="text">导游</div></div>
          <div class="identity-option" onclick="selectIdentity(this, 'tourist')"><div class="icon">🎒</div><div class="text">游客</div></div>
          <div class="identity-option" onclick="selectIdentity(this, 'examinee')"><div class="icon">📚</div><div class="text">备考人</div></div>
        </div>
      </div>
      <div class="form-group"><label>昵称（选填）</label><input type="text" id="authorName" placeholder="给自己起个名字"></div>
      <div class="form-group"><label>想说的话</label><textarea id="postContent" placeholder="分享旅途中的温暖故事、备考心得或任何想说的..." maxlength="500" oninput="updateCharCount()"></textarea><div class="char-count"><span id="charCount">0</span>/500</div></div>
      <div class="modal-actions"><button class="btn-cancel" onclick="closeModal()">取消</button><button class="btn-submit" onclick="submitPost()">发布</button></div>
    </div>
  </div>
  <div class="toast" id="toast">发布成功！感谢你的分享 ✨</div>
  <footer class="footer"><p>游导旅游 - 专注导游证备考与旅行知识分享</p><p>微信联系：<strong>ximao101</strong></p></footer>
  <script>
    // 默认展示帖子（只在没有localStorage数据时加载）
    const defaultPosts = [
      {id:1,identity:'examinee',identityText:'备考人',content:'买了B包资料，配合AI助手每天刷题2小时，笔试终于过了！政策法规那个口诀真的太好记了，考试好几题都是口诀里的内容。',author:'小陈',time:'3天前',likes:12},
      {id:2,identity:'examinee',identityText:'备考人',content:'非旅游专业零基础备考，导基知识量太大了，还好有AI助手能随时问，比翻书快多了。面试部分还在练，加油！',author:'阿杰',time:'5天前',likes:8},
      {id:3,identity:'examinee',identityText:'备考人',content:'第二次考了，上次差3分没过。这次换了复习方法，跟着备考攻略的节奏走，比上次有信心多了。',author:'再来一次',time:'1周前',likes:15},
      {id:4,identity:'examinee',identityText:'备考人',content:'各省导基真的太细了，每个省的景点、美食、民俗都要记。我的方法是每天攻一个省，用AI助手测一测，效果不错。',author:'考证ing',time:'1周前',likes:6},
      {id:5,identity:'examinee',identityText:'备考人',content:'最怕面试了，站在那里脑子一片空白。后来用AI模拟面试练了十几遍，终于能流利讲完导游词了。',author:'社恐选手',time:'2周前',likes:21},
      {id:6,identity:'guide',identityText:'导游',content:'带团三年了，当年备考时最痛苦的就是背导游词。建议学弟学妹们一定要用自己的话讲，不要死记硬背，考官一听就知道你是不是在背书。',author:'老导游阿文',time:'2天前',likes:18},
      {id:7,identity:'guide',identityText:'导游',content:'分享一下面试通关经验：开场微笑问好，讲解时要有手势和眼神交流，遇到忘词别慌，自然过渡到下一段就好。考官看的是你的台风，不是背书能力。',author:'带团小能手',time:'4天前',likes:25},
      {id:8,identity:'guide',identityText:'导游',content:'做了5年导游，说说这个行业的真实感受。收入跟淡旺季关系很大，旺季月入2万+不稀奇，淡季可能就几千。但自由度是真的高，认识天南海北的朋友。',author:'行走江湖',time:'1周前',likes:14},
      {id:9,identity:'tourist',identityText:'游客',content:'去九寨沟遇到一个超好的导游，讲解特别生动，把藏族文化讲得引人入胜。好导游真的能让旅行体验翻倍！',author:'旅行小达人',time:'1天前',likes:9},
      {id:10,identity:'tourist',identityText:'游客',content:'跟团游被坑过一次，导游强制购物体验极差。后来学了点导游证知识，知道这是违规的，现在投诉有底气了哈哈。',author:'精明旅客',time:'3天前',likes:11},
      {id:11,identity:'examinee',identityText:'备考人',content:'我是日语专业的，想考外语导游证。感觉比中文导游多了语言关，但薪资也更高。有没有同样备考外语导游的姐妹？',author:'日语小樱',time:'6天前',likes:7},
      {id:12,identity:'examinee',identityText:'备考人',content:'地方导基真的让人头大，一个省几十个景点+美食+民俗+历史...我的记忆方法是画思维导图，先把框架搭起来，再往里填细节。',author:'思维导图党',time:'1周前',likes:16},
      {id:13,identity:'guide',identityText:'导游',content:'给备考的同学提个醒：笔试只是第一步，面试才是拉开差距的关键！一定要提前准备导游词，找朋友模拟考官，练到脱稿为止。',author:'前辈指路',time:'5天前',likes:22},
      {id:14,identity:'tourist',identityText:'游客',content:'在丽江遇到一个特别专业的导游，纳西族文化讲得特别透彻。后来才知道她考导游证时就特别用功，还拿了面试高分。专业真的能感受到！',author:'文化爱好者',time:'1周前',likes:5},
      {id:15,identity:'examinee',identityText:'备考人',content:'政策法规太难背了...各种旅游法、消费者权益保护法、合同法，条款多到怀疑人生。不过用AI助手梳理重点之后清晰多了，至少知道哪些是高频考点。',author:'法条苦手',time:'4天前',likes:13},
      {id:16,identity:'examinee',identityText:'备考人',content:'我是四川的，省考导基要背九寨沟、峨眉山、都江堰这些导游词，感觉背完一遍忘一半。后来每天对着镜子讲一遍，慢慢就记住了。',author:'川妹子备考中',time:'2天前',likes:19}
    ];

    // 从localStorage加载帖子，没有则用默认
    let posts = JSON.parse(localStorage.getItem('youdao_posts') || 'null') || defaultPosts;

    function savePosts() {
      localStorage.setItem('youdao_posts', JSON.stringify(posts));
    }

    let currentFilter = 'all';
    let selectedIdentity = '';
    function renderPosts(filter) {
      filter = filter || 'all';
      var grid = document.getElementById('postsGrid');
      var filtered = filter === 'all' ? posts : posts.filter(function(p){ return p.identity === filter; });
      grid.innerHTML = filtered.map(function(post) {
        return '<div class="post-card glass-card" data-identity="' + post.identity + '">' +
          '<div class="post-header"><span class="identity-badge identity-' + post.identity + '">' + post.identityText + '</span>' +
          '<span class="post-meta">' + (post.author ? post.author + ' · ' : '') + post.time + '</span></div>' +
          '<div class="post-content">' + post.content + '</div>' +
          '<div class="post-footer"><button class="like-btn" onclick="toggleLike(' + post.id + ', this)">❤️ <span class="like-count">' + post.likes + '</span></button></div></div>';
      }).join('');
    }
    function filterPosts(identity, btn) { currentFilter = identity; document.querySelectorAll('.tab-btn').forEach(function(b){b.classList.remove('active')}); btn.classList.add('active'); renderPosts(identity); }
    function toggleLike(id, btn) { btn.classList.toggle('liked'); var countSpan = btn.querySelector('.like-count'); var count = parseInt(countSpan.textContent); if (btn.classList.contains('liked')) { count++; } else { count--; } countSpan.textContent = count; var post = posts.find(function(p){ return p.id === id; }); if (post) { post.likes = count; savePosts(); } }
    function openModal() { document.getElementById('modalOverlay').classList.add('show'); document.body.style.overflow = 'hidden'; }
    function closeModal(e) { if (e && e.target !== e.currentTarget) return; document.getElementById('modalOverlay').classList.remove('show'); document.body.style.overflow = ''; document.querySelectorAll('.identity-option').forEach(opt => opt.classList.remove('selected')); document.getElementById('authorName').value = ''; document.getElementById('postContent').value = ''; document.getElementById('charCount').textContent = '0'; selectedIdentity = ''; }
    function selectIdentity(el, identity) { document.querySelectorAll('.identity-option').forEach(opt => opt.classList.remove('selected')); el.classList.add('selected'); selectedIdentity = identity; }
    function updateCharCount() { document.getElementById('charCount').textContent = document.getElementById('postContent').value.length; }
    function submitPost() {
      const content = document.getElementById('postContent').value.trim();
      const author = document.getElementById('authorName').value.trim() || '匿名';
      if (!content) { alert('请输入想说的话'); return; }
      if (!selectedIdentity) { alert('请选择你的身份'); return; }
      const newPost = { id: Date.now(), identity: selectedIdentity, identityText: selectedIdentity === 'guide' ? '导游' : selectedIdentity === 'tourist' ? '游客' : '备考人', content: content, author: author, time: new Date().toLocaleDateString('zh-CN'), likes: 0 };
      posts.unshift(newPost);
      savePosts(); // 保存到localStorage
      renderPosts(currentFilter);
      closeModal();
      const toast = document.getElementById('toast');
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 3000);
    }
    document.getElementById('navLinks').classList.remove('open');
    renderPosts();
  </script>
