<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="游导旅游优惠券中心，领取各类旅游优惠券，享受更多优惠">
  <title>优惠券中心 - 游导旅游</title>
  
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/enhanced.css">
  <link rel="stylesheet" href="css/common.css">
  <link rel="stylesheet" href="css/coupons.css">
  
  <style>
    .coupons-center-page {
      background: var(--bg-primary);
      min-height: 100vh;
      padding-bottom: 60px;
    }
    
    .back-nav {
      padding: 20px;
      max-width: 1200px;
      margin: 0 auto;
    }
    
    .back-nav a {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: white;
      text-decoration: none;
      font-size: 0.95rem;
      opacity: 0.9;
      transition: opacity 0.3s;
    }
    
    .back-nav a:hover {
      opacity: 1;
    }
    
    .coupons-main {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 20px;
    }
    
    .coupon-detail-modal .modal-header {
      background: linear-gradient(135deg, var(--coupon-primary), #ff8e8e);
    }
    
    .coupon-detail-modal .modal-header.highlight {
      background: linear-gradient(135deg, #FFD700, #FFA500);
    }
    
    .coupon-detail-modal .modal-header.teal {
      background: linear-gradient(135deg, #4ECDC4, #44A08D);
    }
    
    .coupon-detail-modal .modal-header.purple {
      background: linear-gradient(135deg, #9B59B6, #8E44AD);
    }
    
    .coupon-detail-modal .modal-header.blue {
      background: linear-gradient(135deg, #3498DB, #2980B9);
    }
  </style>
</head>
<body>
  <a href="#main-content" class="skip-link">跳转到主要内容</a>
  
  <!-- 导航栏 -->
  <nav class="navbar">
    <div class="container nav-container">
      <a href="index.html" class="logo">🌍 游导旅游</a>
      <div class="nav-toggle" onclick="toggleNav()" role="button" aria-label="菜单" aria-expanded="false" tabindex="0">
        <span></span>
      </div>
      <div class="nav-links">
        <a href="index.html">🏠 首页</a>
        <a href="guides.html">🎤 找导游</a>
        <a href="routes.html">🗺️ 线路</a>
        <a href="promotions.html">🎁 活动</a>
        <a href="search.html" class="nav-search-btn">🔍</a>
      </div>
    </div>
  </nav>

  <main class="coupons-center-page" id="main-content">
    <!-- 返回导航 -->
    <div class="back-nav">
      <a href="index.html">
        <span>←</span> 返回首页
      </a>
    </div>

    <!-- 英雄区域 -->
    <section class="coupons-hero">
      <div class="coupons-main">
        <h1>🎫 优惠券中心</h1>
        <p>领取专属优惠券，畅享旅途优惠</p>
        
        <!-- 统计卡片 -->
        <div class="coupon-summary">
          <div class="summary-card">
            <div class="icon">🎁</div>
            <div class="number" id="totalCoupons">0</div>
            <div class="label">优惠券总数</div>
          </div>
          <div class="summary-card">
            <div class="icon">✓</div>
            <div class="number" id="claimedCoupons">0</div>
            <div class="label">已领取</div>
          </div>
          <div class="summary-card">
            <div class="icon">💰</div>
            <div class="number" id="myCoupons">0</div>
            <div class="label">我的优惠券</div>
          </div>
          <div class="summary-card">
            <div class="icon">🔥</div>
            <div class="number" id="remainingCoupons">0</div>
            <div class="label">可领取</div>
          </div>
        </div>
      </div>
    </section>

    <!-- 分类标签 -->
    <div class="coupons-main">
      <div class="category-tabs" id="categoryTabs">
        <!-- 由JS渲染 -->
        <div class="category-tab active" data-category="all">
          <span>🏆</span>
          <span>全部</span>
          <span class="count">0</span>
        </div>
      </div>
      
      <!-- 优惠券列表 -->
      <div id="couponGrid">
        <div class="coupon-grid">
          <!-- 由JS渲染 -->
        </div>
      </div>
    </div>
  </main>

  <!-- 优惠券详情弹窗 -->
  <div id="couponDetailModal" class="coupon-modal-overlay">
    <div class="coupon-modal">
      <div class="modal-header">
        <button class="close-btn" onclick="CouponsSystem.closeModal()">×</button>
        <div class="coupon-detail-value">
          <div class="amount" id="modalCouponValue">¥100</div>
          <div class="condition" id="modalCouponCondition">满500元可用</div>
        </div>
      </div>
      <div class="modal-body">
        <h3 id="modalCouponName" style="margin-bottom: 16px; font-size: 1.2rem;">优惠券名称</h3>
        
        <div class="coupon-detail-info">
          <div class="info-row">
            <span class="label">有效期</span>
            <span class="value" id="modalCouponExpire">2026-06-30</span>
          </div>
          <div class="info-row">
            <span class="label">适用产品</span>
            <span class="value" id="modalCouponProducts">全部路线</span>
          </div>
        </div>
        
        <div class="coupon-rules">
          <h4>📋 使用规则</h4>
          <ul id="modalCouponRules">
            <li>规则内容</li>
          </ul>
        </div>
        
        <button id="modalClaimBtn" class="claim-btn" style="width: 100%; padding: 14px;">
          立即领取
        </button>
      </div>
    </div>
  </div>

  <!-- 提示容器 -->
  <div class="toast-container"></div>

  <!-- 页脚 -->
  <footer>
    <div class="container">
      <div class="footer-links">
        <a href="about.html">关于我们</a>
        <a href="contact.html">联系我们</a>
        <a href="privacy.html">隐私政策</a>
        <a href="terms.html">服务条款</a>
        <a href="my-coupons.html">我的优惠券</a>
      </div>
      <p>&copy; 2026 游导旅游. All rights reserved.</p>
    </div>
  </footer>

  <script src="js/common.js"></script>
  <script src="js/coupons.js"></script>
  <script>
    // 初始化
    document.addEventListener('DOMContentLoaded', async () => {
      await CouponCenter.init();
      
      // 更新统计
      const coupons = CouponCenter.categories.reduce((sum, cat) => sum + cat.count, 0);
      const claimed = CouponsSystem.userCoupons.length;
      
      document.getElementById('totalCoupons').textContent = coupons;
      document.getElementById('claimedCoupons').textContent = claimed;
      document.getElementById('myCoupons').textContent = claimed;
      
      // 计算可领取
      let availableCount = 0;
      CouponsSystem.coupons.forEach(c => {
        if (!CouponsSystem.hasClaimed(c.id) && 
            c.quantity > 0 && 
            c.claimed < c.quantity &&
            !c.requiresMembership &&
            !c.autoIssue) {
          availableCount++;
        }
      });
      document.getElementById('remainingCoupons').textContent = availableCount;
    });
  </script>
</body>
</html>
