*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:-apple-system,BlinkMacSystemFont,'PingFang SC','Microsoft YaHei',sans-serif}
body{background:#FFFFFF;color:#333;font-weight:400;display:flex;flex-direction:column;min-height:100vh}
.navbar{display:flex;justify-content:space-between;align-items:center;padding:14px 20px;background:#FFFFFF;border-bottom:1px solid #F0F0F0;position:sticky;top:0;z-index:9999;position:relative}
.logo{font-size:1.1rem;font-weight:800;color:#1A1A1A;display:flex;align-items:center;gap:8px;text-decoration:none}
.logo-icon{width:32px;height:32px;background:#4C8BF5;border-radius:8px;display:flex;align-items:center;justify-content:center}
.nav-links{display:flex;gap:4px}
.nav-links a{padding:8px 12px;border-radius:10px;font-size:0.85rem;color: #666666;transition:all 0.3s;text-decoration:none}
.nav-links a:hover{background:#F0F5FF;color:#4C8BF5}
.nav-links a.active{background:#4C8BF5;color:#FFFFFF;font-weight:600}
.nav-toggle{display:none;flex-direction:column;gap:5px;cursor:pointer;padding:8px}
.nav-toggle span{width:22px;height:2px;background:#1A1A1A;border-radius:2px}
.chat-wrap{flex:1;display:flex;flex-direction:column;max-width:800px;width:100%;margin:0 auto}
/* 精简版 chat-header */
.chat-header{padding:10px 16px;border-bottom:1px solid #F0F0F0;display:flex;align-items:center;gap:10px;background:#FFFFFF}
.chat-header-info h2{font-size:0.95rem;font-weight:700;color:#1A1A1A}
.chat-header-info p{font-size:0.72rem;color:#999}
.chat-avatar{width:40px;height:40px;background:#4C8BF5;border-radius:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0;overflow:hidden}
.chat-avatar img{width:100%;height:100%;border-radius:12px;object-fit:cover}
.chat-header-info h2{font-size:0.95rem;font-weight:700;color:#1A1A1A}
.chat-header-info p{font-size:0.75rem;color: #666666}
.messages{flex:1;overflow-y:auto;padding:12px 16px;display:flex;flex-direction:column;gap:16px;-webkit-overflow-scrolling:touch}
.msg{display:flex;gap:10px;max-width:88%;animation:msgIn 0.15s ease}
.msg.user{align-self:flex-end;flex-direction:row-reverse}
.msg-avatar{width:32px;height:32px;border-radius:10px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:0.8rem;overflow:hidden}
.msg.bot .msg-avatar{background:#4C8BF5}
.msg.bot .msg-avatar img{width:100%;height:100%;border-radius:10px;object-fit:cover}
.msg.user .msg-avatar{background:#4C8BF5}
.msg-bubble{padding:14px 18px;border-radius:16px;font-size:0.9rem;line-height:1.8;word-break:break-word;position:relative}
.msg.bot .msg-bubble{background:#FFFFFF;border:1px solid #E8EEF5;border-top-left-radius:4px}
.msg.user .msg-bubble{background:#4C8BF5;color:#FFFFFF;border-top-right-radius:4px}
/* 引用消息样式 */
.msg-quote{background:#F0F5FF;border-left:3px solid #4C8BF5;padding:8px 12px;margin-bottom:10px;border-radius:0 8px 8px 0;font-size:0.76rem;color:#666666;max-height:60px;overflow:hidden;line-height:1.5;opacity:0.75}
.msg-quote .quote-author{color: #666666;font-weight:600;font-size:0.78rem;margin-bottom:2px}
/* 长按菜单 - 微信风格 */
.msg-bubble{position:relative}
.msg-context-menu{display:none;position:absolute;top:-44px;left:50%;transform:translateX(-50%);background:#4A4A4A;border-radius:8px;padding:6px 4px;gap:2px;z-index:100;white-space:nowrap;flex-direction:row}
.msg-context-menu::after{content:'';position:absolute;bottom:-6px;left:50%;transform:translateX(-50%);border-left:6px solid transparent;border-right:6px solid transparent;border-top:6px solid #4A4A4A}
.msg-context-menu.show{display:flex}
.ctx-btn{background:none;border:none;color:#FFFFFF;padding:6px 12px;font-size:0.75rem;cursor:pointer;border-radius:6px;white-space:nowrap}
.ctx-btn:active{background:rgba(255,255,255,0.15)}
/* 引用输入提示 */
.quote-hint{display:none;padding:8px 14px;background:#F0F5FF;border:1px solid #F0F5FF;border-radius:10px 10px 0 0;margin:0 6px;font-size:0.82rem;color: #666666;align-items:center;justify-content:space-between}
.quote-hint.show{display:flex}
.quote-hint .cancel-quote{background:none;border:none;color: #666666;cursor:pointer;font-size:1rem;padding:0 4px}
/* 图片按钮 */
/* 图片消息 */
.msg-image{max-width:220px;max-height:220px;border-radius:10px;margin-top:6px;cursor:pointer;transition:transform 0.2s}
.msg-image:hover{transform:scale(1.02)}
/* 图片预览 */
.image-preview{position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:1000;display:flex;align-items:center;justify-content:center;cursor:pointer}
.image-preview img{max-width:90vw;max-height:85vh;border-radius:12px}
/* 待发送图片预览 */
.send-preview{padding:8px 12px;background:#F0F5FF;border:1px solid #F0F5FF;border-radius:8px;margin:0 6px 4px;font-size:0.8rem;color: #666666;display:none;align-items:center;gap:8px}
.send-preview.show{display:flex}
.send-preview img{width:50px;height:50px;border-radius:6px;object-fit:cover}
.send-preview .remove-img{cursor:pointer;color:#C62828;font-size:1rem}
/* 引用来源标签 */
.msg-source{margin-top:10px;padding:8px 12px;background:#F0F5FF;border:1px solid #F0F5FF;border-radius:10px;font-size:0.78rem;color: #666666;display:flex;align-items:center;gap:6px}
.msg-source::before{content:'📚';font-size:0.9rem}
/* 延伸提问 */
.follow-ups{margin-top:12px;display:flex;flex-wrap:nowrap;gap:8px;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;padding-bottom:4px}.follow-ups::-webkit-scrollbar{display:none}
.follow-btn{padding:8px 14px;background:#F0F5FF;border:1px solid #E0EAFF;border-radius:20px;color:#4C8BF5;font-size:0.82rem;cursor:pointer;transition:all 0.2s;white-space:nowrap;flex-shrink:0}
.follow-btn:hover{background:#F0F5FF;border-color: #666666}
/* 消息队列提示 */
.queue-badge{display:none;position:absolute;top:-6px;right:-6px;background:#FF5252;color:#FFFFFF;font-size:0.65rem;font-weight:700;width:18px;height:18px;border-radius:50%;align-items:center;justify-content:center}
.queue-badge.show{display:flex}
/* Markdown样式 */
.msg.bot .msg-bubble h1,.msg.bot .msg-bubble h2,.msg.bot .msg-bubble h3{margin:12px 0 6px;font-size:1em;font-weight:700;color:#1A1A1A}
.msg.bot .msg-bubble h1{font-size:1.15em}
.msg.bot .msg-bubble h2{font-size:1.05em}
.msg.bot .msg-bubble p{margin:4px 0;color:#333}
.msg.bot .msg-bubble ul,.msg.bot .msg-bubble ol{margin:6px 0;padding-left:20px}
.msg.bot .msg-bubble li{margin:3px 0}
.msg.bot .msg-bubble strong{color:#1A1A1A}
.msg.bot .msg-bubble blockquote{border-left:3px solid #4C8BF5;padding-left:12px;margin:8px 0;color:#333}
.msg.bot .msg-bubble hr{border:none;border-top:1px solid #F0F0F0;margin:12px 0}
/* 计时器 */
.timer{display:inline-flex;align-items:center;gap:6px;font-size:0.75rem;color:#616161;margin-top:6px}
.timer-dot{width:6px;height:6px;background:#4C8BF5;border-radius:50%;animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}
/* 输入打字中 */
.typing-dots{display:flex;gap:5px;padding:4px 0}
.typing-dots span{width:8px;height:8px;background:#4C8BF5;border-radius:50%;animation:bounce 1.4s infinite;opacity:0.5}
.typing-dots span:nth-child(2){animation-delay:0.2s}
.typing-dots span:nth-child(3){animation-delay:0.4s}
@keyframes bounce{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-6px)}}
/* 快捷功能标签 */
.chat-shortcuts{display:flex;gap:8px;padding:10px 16px;overflow-x:auto;-webkit-overflow-scrolling:touch;background:#FAFAFA;border-top:1px solid #F0F0F0;flex-shrink:0}
.shortcut-tag{display:inline-flex;align-items:center;gap:4px;padding:6px 14px;background:#FFFFFF;border:1px solid #E8E8E8;border-radius:20px;font-size:0.8rem;color:#666;white-space:nowrap;cursor:pointer;transition:all 0.2s;flex-shrink:0}
.shortcut-tag:hover{background:#F0F5FF;border-color:#4C8BF5;color:#4C8BF5}
.shortcut-tag:active{background:#E0EAFF}

/* 输入区 */
.input-area{padding:0 14px 16px;position:relative}
.input-wrap{display:flex;gap:10px;background:#FFFFFF;border:1px solid #F0F0F0;border-radius:16px;padding:6px 6px 6px 16px;align-items:flex-end}
.input-wrap textarea{flex:1;background:none;border:none;color: #666666;font-size:0.9rem;resize:none;outline:none;max-height:120px;min-height:24px;line-height:1.5;padding:6px 0;font-family:inherit}
.input-wrap textarea::placeholder{color:#616161}
.send-btn{width:40px;height:40px;border-radius:12px;border:none;background:#4C8BF5;color:#FFFFFF;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:transform 0.15s,opacity 0.15s;position:relative}
.send-btn:hover{transform:scale(1.05)}
.send-btn:disabled{opacity:0.4;cursor:not-allowed;transform:none}
.send-btn svg{width:20px;height:20px}
/* 欢迎 */
.welcome{display:flex;flex-direction:column;align-items:center;justify-content:center;flex:1;padding:30px;text-align:center;gap:20px}
.welcome-avatar{width:64px;height:64px;background:#4C8BF5;border-radius:20px;display:flex;align-items:center;justify-content:center;overflow:hidden}
.welcome-avatar img{width:100%;height:100%;border-radius:20px;object-fit:cover}
.welcome h2{font-size:1.3rem}
.welcome p{color: #666666;font-size:0.85rem;line-height:1.6}
.quick-actions{display:flex;flex-wrap:wrap;gap:8px;justify-content:center}
.quick-btn{padding:10px 16px;background:#F8F9FA;border:1px solid #F0F0F0;border-radius:12px;color: #666666;font-size:0.82rem;cursor:pointer;transition:all 0.2s}
.quick-btn:hover{background:#F0F5FF;border-color:#4C8BF5;color:#4C8BF5;transform:translateY(-1px)}
/* 历史提示 */
.history-notice{font-size:0.75rem;color:#616161;text-align:center;padding:8px;display:flex;align-items:center;justify-content:center;gap:8px}
.clear-btn{background:none;border:1px solid #F0F0F0;color: #999999;padding:4px 12px;border-radius:12px;font-size:0.72rem;cursor:pointer}
.clear-btn:hover{border-color:#616161;color: #666666}

function generateFollowUps(text){
  var suggestions = [];
  var t = text.toLowerCase();
  if(t.includes('科目') || t.includes('笔试')) suggestions.push('各科目分值怎么分布？');
  if(t.includes('导游词')) suggestions.push('能给我一篇导游词范文吗？');
  if(t.includes('面试')) suggestions.push('面试评分标准是什么？');
  if(t.includes('法规') || t.includes('法律')) suggestions.push('法规科目有哪些必背条款？');
  if(t.includes('计划') || t.includes('备考')) suggestions.push('每天应该学几个小时？');
  if(t.includes('导基') || t.includes('基础知识')) suggestions.push('全国导基和地方导基哪个难？');
  if(t.includes('导游业务')) suggestions.push('导游业务实操题怎么答？');
  if(t.includes('报名') || t.includes('条件')) suggestions.push('非旅游专业能考吗？');
  if(t.includes('真题') || t.includes('题目')) suggestions.push('能出几道模拟题练练手吗？');
  if(t.includes('口诀') || t.includes('记忆')) suggestions.push('有没有快速记忆的方法？');
  if(suggestions.length < 2){
    var generic = ['这个知识点容易考什么题型？','能展开讲讲重点吗？','有相关真题可以练习吗？','这个在面试中怎么考？'];
    while(suggestions.length < 2 && generic.length > 0){
      var g = generic.shift();
      if(suggestions.indexOf(g) === -1) suggestions.push(g);
    }
  }
  return suggestions.slice(0, 3);
}

/* ===== 实际发送到API ===== */
async function doSendMessage(text, quote){
  sendBtn.disabled = true;
  (document.getElementById('statusText')||{}).textContent= '小游正在思考...';

  var botInfo = addBotStreaming();
  var bubble = botInfo.div.querySelector('.msg-bubble');

  // 构建请求内容，如果引用了消息，加入上下文
  var prompt = text;
  if(quote && quote.text){
    prompt = '[引用消息: "' + (quote.text||'').substring(0,100) + '"]\n' + text;
  }
  // 附加上下文关联指令
  prompt += '\n[系统修正指令（必须遵守）：]';
  prompt += '\n1. 你是导游证备考助手"小游"，不要叫用户任何昵称，直接用"你"称呼';
  prompt += '\n2. 面试模拟时：广东省面试采用机考（人机对话）模式，考生对着电脑录制讲解视频，无需面对真人考官。其他省份请根据实际情况说明';
  prompt += '\n3. 不要编造数据（通过率、报名人数等），不确定的就说"建议查阅当地文旅厅官方公告"';
  prompt += '\n4. 不要使用"闯关""升级""金币"等游戏化话术，这是专业备考工具';
  prompt += '\n5. 2025年考试已结束，下次考试预计2026年7月报名、11月笔试';
  prompt += '\n6. 资料包价格：全套49.9元，含完整真题+面试问答+导游词模板，引导加微信ximao101';
  prompt += '\n7. 请结合之前的对话上下文来回答，给出连贯完整的回复';

  var body = {
    bot_id: BOT_ID,
    user_id: 'web_user',
    stream: true,
    auto_save_history: true,
    additional_messages: [{ role: 'user', content: prompt, content_type: 'text' }]
  };
  if(conversationId) body.conversation_id = conversationId;

  try{
    var resp = await fetch('https://api.coze.cn/v3/chat', {
      method: 'POST',
      headers: {
        'Authorization': 'Bearer ' + PAT_TOKEN,
        'Content-Type': 'application/json'
      },
      body: JSON.stringify(body)
    });

    var fullText = '';
    var answerId = null;
    var rendered = false;
    var reader = resp.body.getReader();
    var decoder = new TextDecoder();
    var buffer = '';

    while(true){
      var result = await reader.read();
      if(result.done) break;
      buffer += decoder.decode(result.value, {stream: true});
      var lines = buffer.split('\n');
      buffer = lines.pop();

      for(var i = 0; i < lines.length; i++){
        var line = lines[i].trim();
        if(!line.startsWith('data:')) continue;
        var jsonStr = line.substring(5).trim();
        if(!jsonStr || jsonStr === '[DONE]') continue;
        try{
          var data = JSON.parse(jsonStr);
          if(data.conversation_id) conversationId = data.conversation_id;
          if(data.type === 'answer' && data.role === 'assistant'){
            if(data.content !== undefined && data.content !== null && data.content !== ''){
              if(!answerId && data.id) answerId = data.id;
              if(!answerId || data.id === answerId){
                if(!rendered){ clearInterval(timerInterval); rendered = true; }
                // Coze API: content may be incremental or full
                // If content looks like incremental (starts from beginning each time), use full replace
                // If content is growing, append
                if(data.content.length > fullText.length && data.content.startsWith(fullText)) {
                  // Full content mode: API returns complete text each time
                  fullText = data.content;
                } else if(data.content.length <= fullText.length) {
                  // Full content mode with same or shorter: replace
                  fullText = data.content;
                } else {
                  // Incremental mode: append new content
                  fullText += data.content;
                }
                bubble.innerHTML = renderMd(fullText);
                // 保留引用按钮
                msgContainer.scrollTop = msgContainer.scrollHeight;
              }
            }
          }
        } catch(e){}
      }
    }

    if(!fullText){
      clearInterval(timerInterval);
      bubble.innerHTML = '<span style="color:#666666">抱歉，暂时无法回复，请稍后再试</span>';
    } else {
      clearInterval(timerInterval);
      var elapsed = Math.floor((Date.now() - botInfo.ts) / 1000);
      var timeTag = document.createElement('div');
      timeTag.className = 'timer';
      timeTag.style.marginTop = '8px';
      timeTag.innerHTML = '<span style="font-size:0.7rem;color:#616161">⏱ ' + elapsed + '秒</span>';
      bubble.appendChild(timeTag);

      // 引用来源
      var sourceTag = document.createElement('div');
      sourceTag.className = 'msg-source';
      sourceTag.textContent = '以上内容基于导游证考试知识库整理';
      bubble.appendChild(sourceTag);

      // 延伸提问
      var followUps = generateFollowUps(fullText);
      if(followUps.length > 0){
        var followDiv = document.createElement('div');
        followDiv.className = 'follow-ups';
        followUps.forEach(function(q){
          var btn = document.createElement('button');
          btn.className = 'follow-btn';
          btn.textContent = q;
          btn.onclick = function(){ sendQuick(q); };
          followDiv.appendChild(btn);
        });
        bubble.appendChild(followDiv);
      }

      // 引用按钮
      var actions = document.createElement('div');
      actions.className = 'msg-context-menu';
      actions.innerHTML = '<button class="ctx-btn" onclick="copyMsg(this)">复制</button><button class="ctx-btn" onclick="quoteMsg(this)">引用</button>';
      bubble.appendChild(actions);

      // 更新聊天记录
      chatHistory.push({id: botInfo.div.id, role: 'bot', html: bubble.innerHTML, text: fullText});
      if(chatHistory.length > 100) chatHistory = chatHistory.slice(-80);
      try{ localStorage.setItem('youdao_chat_history', JSON.stringify(chatHistory)); localStorage.setItem('youdao_chat_conv', conversationId || ''); }catch(e){}
    }
  } catch(e){
    clearInterval(timerInterval);
    bubble.innerHTML = '<span style="color:#666666">网络错误，请检查后重试</span>';
  }

  sendBtn.disabled = false;
  (document.getElementById('statusText')||{}).textContent= '在线 · 随时提问';
  inputEl.focus();
}

// 复制消息内容
function copyMsg(btn) {
  var bubble = btn.closest('.msg-bubble');
  var text = bubble.textContent.replace(/复制|引用/g, '').trim();
  navigator.clipboard.writeText(text).then(function() {
    showToast('已复制');

  });
  hideCtxMenu();
}

// 初始化消息气泡的交互事件
function initMsgInteractions() {
  // PC端右键菜单
  document.addEventListener('click', function(e) {
    if (!e.target.closest('.msg-bubble')) hideCtxMenu();
  });
  
  // 消息气泡点击显示菜单（手机友好）
  document.querySelectorAll('.msg-bubble').forEach(function(bubble) {
    // 长按显示菜单（500ms）
    bubble.addEventListener('touchstart', function(e) {
      longPressTimer = setTimeout(function() {
        showCtxMenu(bubble);
      }, 500);
    });
    bubble.addEventListener('touchend', function() {
      clearTimeout(longPressTimer);
    });
    bubble.addEventListener('touchmove', function() {
      clearTimeout(longPressTimer);
    });
    
    // PC端右键菜单
    bubble.addEventListener('contextmenu', function(e) {
      e.preventDefault();
      showCtxMenu(bubble);
    });
    
    // 单击也显示菜单（手机友好）
    bubble.addEventListener('click', function(e) {
      if (!e.target.closest('button') && !e.target.closest('a') && !e.target.closest('img')) {
        showCtxMenu(bubble);
      }
    });
  });
}

  voiceRecognition.onresult = function(e) {
    var transcript = '';
    for (var i = e.resultIndex; i < e.results.length; i++) {
      transcript += e.results[i][0].transcript;
    }
    if (inp) inp.value = transcript;
    // Auto-resize textarea
    inp.style.height = 'auto';
    inp.style.height = Math.min(inp.scrollHeight, 120) + 'px';
  };

  voiceRecognition.onend = function() {
    isRecording = false;
    if (btn) btn.classList.remove('recording');
    if (inp) inp.placeholder = '输入你的问题...';
    // Auto send if we got text
    if (inp && inp.value.trim()) {
      sendMessage();
    }
  };

  voiceRecognition.onerror = function(e) {
    isRecording = false;
    if (btn) btn.classList.remove('recording');
    if (inp) inp.placeholder = '输入你的问题...';
    if (e.error === 'not-allowed') {
      inp.placeholder = '请允许麦克风权限';
    }
  };

  voiceRecognition.start();
}

function stopVoice() {
  if (voiceRecognition) {
    voiceRecognition.stop();
  }
  isRecording = false;
  var btn = document.getElementById('voiceBtn');
  if (btn) btn.classList.remove('recording');
}
</script>
