<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:-apple-system,BlinkMacSystemFont,'PingFang SC','Microsoft YaHei',sans-serif}
body{background:#FFF9C4;color:#2C1A00;font-weight:400;display:flex;flex-direction:column;min-height:100vh}
.navbar{display:flex;justify-content:space-between;align-items:center;padding:14px 20px;background:rgba(230,81,0,0.95);backdrop-filter:blur(20px);border-bottom:1px solid rgba(255,255,255,0.85);position:sticky;top:0;z-index:100}
.logo{font-size:1.1rem;font-weight:800;color:#fff;display:flex;align-items:center;gap:8px;text-decoration:none}
.logo-icon{width:32px;height:32px;background:linear-gradient(135deg,#FF6B35,#ff8c5a);border-radius:8px;display:flex;align-items:center;justify-content:center}

.nav-links a{padding:8px 12px;border-radius:10px;font-size:0.85rem;color:rgba(255,255,255,0.8);transition:all 0.3s;text-decoration:none}

.nav-toggle{display:none;flex-direction:column;gap:5px;cursor:pointer;padding:8px}
.nav-toggle span{width:22px;height:2px;background:#fff;border-radius:2px}
.chat-wrap{flex:1;display:flex;flex-direction:column;max-width:800px;width:100%;margin:0 auto}
.chat-header{padding:16px 20px;border-bottom:1px solid rgba(255,255,255,0.82);display:flex;align-items:center;gap:12px}
.chat-avatar{width:40px;height:40px;background:linear-gradient(135deg,#FF6B35,#ff8c5a);border-radius:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0;overflow:hidden}
.chat-avatar img{width:100%;height:100%;border-radius:12px;object-fit:cover}
.chat-header-info h2{font-size:1rem;font-weight:700}
.chat-header-info p{font-size:0.75rem;color:#2C1A00}
.messages{flex:1;overflow-y:auto;padding:16px 20px;display:flex;flex-direction:column;gap:16px;-webkit-overflow-scrolling:touch}
.msg{display:flex;gap:10px;max-width:88%;animation:fadeIn 0.3s ease}
.msg.user{align-self:flex-end;flex-direction:row-reverse}
.msg-avatar{width:32px;height:32px;border-radius:10px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:0.8rem;overflow:hidden}
.msg.bot .msg-avatar{background:linear-gradient(135deg,#FF6B35,#ff8c5a)}
.msg.bot .msg-avatar img{width:100%;height:100%;border-radius:10px;object-fit:cover}
.msg.user .msg-avatar{background:rgba(255,255,255,0.88)}
.msg-bubble{padding:14px 18px;border-radius:16px;font-size:0.9rem;line-height:1.8;word-break:break-word;position:relative}
.msg.bot .msg-bubble{background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.88);border-top-left-radius:4px}
.msg.user .msg-bubble{background:linear-gradient(135deg,#FF6B35,#ff8c5a);border-top-right-radius:4px}
/* 引用消息样式 */
.msg-quote{background:rgba(255,107,53,0.1);border-left:3px solid #FF6B35;padding:8px 12px;margin-bottom:10px;border-radius:0 8px 8px 0;font-size:0.82rem;color:rgba(255,255,255,0.65);max-height:60px;overflow:hidden}
.msg-quote .quote-author{color:#FF6B35;font-weight:600;font-size:0.78rem;margin-bottom:2px}
/* 引用按钮 - hover时显示 */
.msg-actions{position:absolute;top:8px;right:8px;display:none;gap:4px}
.msg:hover .msg-actions{display:flex}
.quote-btn{background:rgba(255,255,255,0.1);border:1px solid rgba(230,81,0,0.15);color:#5D4037;padding:4px 8px;border-radius:6px;font-size:0.72rem;cursor:pointer;transition:all 0.2s}
.quote-btn:hover{background:rgba(255,107,53,0.2);border-color:rgba(255,107,53,0.4);color:#FF6B35}
/* 引用输入提示 */
.quote-hint{display:none;padding:8px 14px;background:rgba(255,107,53,0.08);border:1px solid rgba(255,107,53,0.2);border-radius:10px 10px 0 0;margin:0 6px;font-size:0.82rem;color:#FF6B35;align-items:center;justify-content:space-between}
.quote-hint.show{display:flex}
.quote-hint .cancel-quote{background:none;border:none;color:rgba(255,255,255,0.5);cursor:pointer;font-size:1rem;padding:0 4px}
/* 引用来源标签 */
.msg-source{margin-top:10px;padding:8px 12px;background:rgba(255,107,53,0.08);border:1px solid rgba(255,107,53,0.15);border-radius:10px;font-size:0.78rem;color:rgba(255,255,255,0.55);display:flex;align-items:center;gap:6px}
.msg-source::before{content:'📚';font-size:0.9rem}
/* 延伸提问 */
.follow-ups{margin-top:12px;display:flex;flex-wrap:wrap;gap:8px}
.follow-btn{padding:8px 14px;background:rgba(255,107,53,0.1);border:1px solid rgba(255,107,53,0.25);border-radius:20px;color:#FF6B35;font-size:0.82rem;cursor:pointer;transition:all 0.2s}
.follow-btn:hover{background:rgba(255,107,53,0.2);border-color:rgba(255,107,53,0.4)}
/* 消息队列提示 */
.queue-badge{display:none;position:absolute;top:-6px;right:-6px;background:#FF6B35;color:#2C1A00;font-size:0.65rem;font-weight:700;width:18px;height:18px;border-radius:50%;align-items:center;justify-content:center}
.queue-badge.show{display:flex}
/* Markdown样式 */
.msg.bot .msg-bubble h1,.msg.bot .msg-bubble h2,.msg.bot .msg-bubble h3{margin:12px 0 6px;font-size:1em;font-weight:700;color:#FF6B35}
.msg.bot .msg-bubble h1{font-size:1.15em}
.msg.bot .msg-bubble h2{font-size:1.05em}
.msg.bot .msg-bubble p{margin:4px 0}
.msg.bot .msg-bubble ul,.msg.bot .msg-bubble ol{margin:6px 0;padding-left:20px}
.msg.bot .msg-bubble li{margin:3px 0}
.msg.bot .msg-bubble strong{color:#FF6B35}
.msg.bot .msg-bubble code{background:rgba(0,0,0,0.3);padding:2px 6px;border-radius:4px;font-size:0.85em}
.msg.bot .msg-bubble blockquote{border-left:3px solid #FF6B35;padding-left:12px;margin:8px 0;color:rgba(255,255,255,0.7)}
.msg.bot .msg-bubble hr{border:none;border-top:1px solid rgba(230,81,0,0.1);margin:12px 0}
/* 计时器 */
.timer{display:inline-flex;align-items:center;gap:6px;font-size:0.75rem;color:rgba(255,255,255,0.4);margin-top:6px}
.timer-dot{width:6px;height:6px;background:#FF6B35;border-radius:50%;animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}
/* 输入打字中 */
.typing-dots{display:flex;gap:5px;padding:4px 0}
.typing-dots span{width:8px;height:8px;background:rgba(255,255,255,0.35);border-radius:50%;animation:bounce 1.4s infinite}
.typing-dots span:nth-child(2){animation-delay:0.2s}
.typing-dots span:nth-child(3){animation-delay:0.4s}
@keyframes bounce{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-6px)}}
/* 输入区 */
.input-area{padding:0 20px 20px;position:relative}
.input-wrap{display:flex;gap:10px;background:rgba(255,255,255,0.82);border:1px solid rgba(255,255,255,0.88);border-radius:16px;padding:6px 6px 6px 16px;align-items:flex-end}
.input-wrap textarea{flex:1;background:none;border:none;color:#2C1A00;font-size:0.9rem;resize:none;outline:none;max-height:120px;min-height:24px;line-height:1.5;padding:6px 0;font-family:inherit}
.input-wrap textarea::placeholder{color:rgba(255,255,255,0.35)}
.send-btn{width:40px;height:40px;border-radius:12px;border:none;background:linear-gradient(135deg,#FF6B35,#ff8c5a);color:#2C1A00;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:transform 0.15s,opacity 0.15s;position:relative}
.send-btn:hover{transform:scale(1.05)}
.send-btn:disabled{opacity:0.4;cursor:not-allowed;transform:none}
.send-btn svg{width:20px;height:20px}
/* 欢迎 */
.welcome{display:flex;flex-direction:column;align-items:center;justify-content:center;flex:1;padding:30px;text-align:center;gap:20px}
.welcome-avatar{width:64px;height:64px;background:linear-gradient(135deg,#FF6B35,#ff8c5a);border-radius:20px;display:flex;align-items:center;justify-content:center;overflow:hidden}
.welcome-avatar img{width:100%;height:100%;border-radius:20px;object-fit:cover}
.welcome h2{font-size:1.3rem}
.welcome p{color:#2C1A00;font-size:0.85rem;line-height:1.6}
.quick-actions{display:flex;flex-wrap:wrap;gap:8px;justify-content:center}
.quick-btn{padding:10px 16px;background:rgba(255,255,255,0.82);border:1px solid rgba(255,255,255,0.88);border-radius:12px;color:rgba(255,255,255,0.8);font-size:0.82rem;cursor:pointer;transition:all 0.2s}
.quick-btn:hover{background:rgba(255,107,53,0.15);border-color:rgba(255,107,53,0.3);color:#2C1A00}
/* 历史提示 */
.history-notice{font-size:0.75rem;color:rgba(255,255,255,0.35);text-align:center;padding:8px;display:flex;align-items:center;justify-content:center;gap:8px}
.clear-btn{background:none;border:1px solid rgba(255,255,255,0.88);color:rgba(255,255,255,0.5);padding:4px 12px;border-radius:12px;font-size:0.72rem;cursor:pointer}
.clear-btn:hover{border-color:rgba(255,255,255,0.3);color:rgba(255,255,255,0.7)}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@media(max-width:768px){
.nav-links{display:none;position:absolute;top:100%;left:0;right:0;background:rgba(230,81,0,0.98);flex-direction:column;padding:12px;border-radius:0 0 16px 16px}
.nav-links.open{display:flex}
.nav-toggle{display:flex}
.msg{max-width:92%}
.messages{padding:12px 14px;gap:12px}
.chat-header{padding:12px 14px}
.input-area{padding:0 14px 16px}
.msg-actions{display:flex!important;opacity:0.6}
}
</style>

<script>
var BOT_ID = '7638687952973398050';
var PAT_TOKEN = 'pat_7thMqKrsyXMEX4W6N51ILHY5X9TmWYG93eioUN2IvWEXprM24nYx6w2cKNIeEvZW';
var conversationId = null;
var isStreaming = false;
var msgContainer = document.getElementById('messages');
var inputEl = document.getElementById('userInput');
var sendBtn = document.getElementById('sendBtn');
var welcomeEl = document.getElementById('welcome');
var timerInterval = null;
var chatHistory = [];
var quoteTarget = null; // 引用的消息
var messageQueue = []; // 消息队列
var isProcessingQueue = false;

if(typeof marked !== 'undefined'){
  marked.setOptions({ breaks: true, gfm: true });
}

inputEl.addEventListener('input', function(){
  this.style.height = 'auto';
  this.style.height = Math.min(this.scrollHeight, 120) + 'px';
});

function handleKey(e){
  if(e.key === 'Enter' && !e.shiftKey){
    e.preventDefault();
    sendMessage();
  }
}

function sendQuick(text){
  inputEl.value = text;
  sendMessage();
}

function escapeHtml(t){
  var d = document.createElement('div');
  d.textContent = t;
  return d.innerHTML;
}

/* ===== 引用功能 ===== */
function quoteMessage(el){
  // 从按钮往上找到msg元素，获取文本
  var msgEl = el.closest('.msg');
  if(!msgEl) return;
  var bubble = msgEl.querySelector('.msg-bubble');
  if(!bubble) return;
  var text = bubble.textContent.replace(/📎 引用/g,'').replace(/📚.*/,'').replace(/⏱.*/,'').trim();
  quoteTarget = {text: text.substring(0,100), role: msgEl.classList.contains('bot') ? 'bot' : 'user'};
  var hint = document.getElementById('quoteHint');
  var hintText = document.getElementById('quoteHintText');
  hintText.textContent = '📎 引用: ' + text.substring(0, 40) + '...';
  hint.classList.add('show');
  inputEl.focus();
}
function cancelQuote(){
  quoteTarget = null;
  document.getElementById('quoteHint').classList.remove('show');
}

/* ===== 消息队列 - 支持同时发多条 ===== */
function processQueue(){
  if(isProcessingQueue || messageQueue.length === 0) return;
  isProcessingQueue = true;
  var item = messageQueue.shift();
  updateQueueBadge();
  doSendMessage(item.text, item.quote).finally(function(){
    isProcessingQueue = false;
    if(messageQueue.length > 0){
      setTimeout(processQueue, 500);
    }
  });
}
function updateQueueBadge(){
  var badge = document.getElementById('queueBadge');
  if(messageQueue.length > 0){
    badge.textContent = messageQueue.length;
    badge.classList.add('show');
  } else {
    badge.classList.remove('show');
  }
}

/* ===== 延伸提问 ===== */
function generateFollowUps(text){
  var suggestions = [];
  var t = text.toLowerCase();
  if(t.includes('科目') || t.includes('笔试')) suggestions.push('各科目分值怎么分布？');
  if(t.includes('导游词')) suggestions.push('能给我一篇导游词范文吗？');
  if(t.includes('面试')) suggestions.push('面试评分标准是什么？');
  if(t.includes('法规') || t.includes('法律')) suggestions.push('法规科目有哪些必背条款？');
  if(t.includes('计划') || t.includes('备考')) suggestions.push('每天应该学几个小时？');
  if(t.includes('导基') || t.includes('基础知识')) suggestions.push('全国导基和地方导基哪个难？');
  if(t.includes('导游业务')) suggestions.push('导游业务实操题怎么答？');
  if(t.includes('报名') || t.includes('条件')) suggestions.push('非旅游专业能考吗？');
  if(t.includes('真题') || t.includes('题目')) suggestions.push('能出几道模拟题练练手吗？');
  if(t.includes('口诀') || t.includes('记忆')) suggestions.push('有没有快速记忆的方法？');
  if(suggestions.length < 2){
    var generic = ['这个知识点容易考什么题型？','能展开讲讲重点吗？','有相关真题可以练习吗？','这个在面试中怎么考？'];
    while(suggestions.length < 2 && generic.length > 0){
      var g = generic.shift();
      if(suggestions.indexOf(g) === -1) suggestions.push(g);
    }
  }
  return suggestions.slice(0, 3);
}

var msgIdCounter = 0;
function addMsg(role, html, save, msgText){
  if(welcomeEl){ welcomeEl.remove(); welcomeEl = null; }
  var div = document.createElement('div');
  div.className = 'msg ' + role;
  var mid = 'msg_' + (++msgIdCounter);
  div.id = mid;
  var avatar = role === 'bot' ? '<img src="images/ai-avatar.jpg">' : '👤';
  div.innerHTML = '<div class="msg-avatar">' + avatar + '</div><div class="msg-bubble">' + html + '<div class="msg-actions"><button class="quote-btn" onclick="quoteMessage(this)">📎 引用</button></div></div>';
  msgContainer.appendChild(div);
  msgContainer.scrollTop = msgContainer.scrollHeight;
  if(save !== false){
    chatHistory.push({id: mid, role: role, html: html, text: msgText || ''});
    if(chatHistory.length > 100) chatHistory = chatHistory.slice(-80);
    try{ localStorage.setItem('youdao_chat_history', JSON.stringify(chatHistory)); localStorage.setItem('youdao_chat_conv', conversationId || ''); }catch(e){}
  }
  return div;
}

function addBotStreaming(){
  if(welcomeEl){ welcomeEl.remove(); welcomeEl = null; }
  var div = document.createElement('div');
  div.className = 'msg bot';
  var ts = Date.now();
  div.innerHTML = '<div class="msg-avatar"><img src="images/ai-avatar.jpg"></div><div class="msg-bubble"><div class="typing-dots"><span></span><span></span><span></span></div><div class="timer"><span class="timer-dot"></span><span id="timer_' + ts + '">预计 5-15 秒</span></div></div>';
  msgContainer.appendChild(div);
  msgContainer.scrollTop = msgContainer.scrollHeight;

  var timerEl = document.getElementById('timer_' + ts);
  var start = Date.now();
  timerInterval = setInterval(function(){
    var elapsed = Math.floor((Date.now() - start) / 1000);
    if(elapsed < 5) timerEl.textContent = '预计 5-15 秒';
    else if(elapsed < 15) timerEl.textContent = '已等待 ' + elapsed + ' 秒';
    else timerEl.textContent = '已等待 ' + elapsed + ' 秒，回复较长请耐心';
  }, 1000);

  return { div: div, ts: ts };
}

function renderMd(text){
  if(typeof marked !== 'undefined' && marked.parse){
    try{ return marked.parse(text); } catch(e){}
  }
  var s = escapeHtml(text);
  s = s.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
  s = s.replace(/`(.*?)`/g, '<code>$1</code>');
  s = s.replace(/\n/g, '<br>');
  return s;
}

/* ===== 恢复历史 ===== */
function restoreHistory(){
  try{
    var saved = localStorage.getItem('youdao_chat_history');
    var savedConv = localStorage.getItem('youdao_chat_conv');
    if(savedConv) conversationId = savedConv;
    if(saved){
      chatHistory = JSON.parse(saved);
      if(chatHistory.length > 0){
        chatHistory.forEach(function(item){
          addMsg(item.role, item.html, false, item.text || '');
        });
        var notice = document.createElement('div');
        notice.className = 'history-notice';
        notice.innerHTML = '已恢复上次对话<button class="clear-btn" onclick="clearHistory()">清除记录</button>';
        msgContainer.appendChild(notice);
        msgContainer.scrollTop = msgContainer.scrollHeight;
      }
    }
  }catch(e){}
}

function clearHistory(){
  chatHistory = [];
  conversationId = null;
  try{ localStorage.removeItem('youdao_chat_history'); localStorage.removeItem('youdao_chat_conv'); }catch(e){}
  msgContainer.innerHTML = '';
  var w = document.createElement('div');
  w.className = 'welcome'; w.id = 'welcome';
  w.innerHTML = '<div class="welcome-avatar"><img src="images/ai-avatar.jpg"></div><h2>你好，我是小游 👋</h2><p>你的导游证AI备考搭子<br>随时问我任何备考问题</p><div class="quick-actions"><button class="quick-btn" onclick="sendQuick(\'北京导游考试考哪些科目？\')">北京导游考试科目</button><button class="quick-btn" onclick="sendQuick(\'导游业务笔试重点有哪些？\')">导游业务重点</button><button class="quick-btn" onclick="sendQuick(\'帮我制定一个30天备考计划\')">30天备考计划</button><button class="quick-btn" onclick="sendQuick(\'全国导游基础知识怎么复习？\')">导基复习方法</button></div>';
  msgContainer.appendChild(w);
  welcomeEl = w;
}

/* ===== 发送消息（入队列） ===== */
function sendMessage(){
  var text = inputEl.value.trim();
  if(!text) return;
  inputEl.value = '';
  inputEl.style.height = 'auto';
  
  var q = quoteTarget;
  cancelQuote();
  
  messageQueue.push({text: text, quote: q});
  updateQueueBadge();
  
  // 立即显示用户消息
  var userHtml = escapeHtml(text);
  if(q && q.text){
    userHtml = '<div class="msg-quote"><div class="quote-author">' + (q.role==='bot'?'小游':'你') + '</div>' + escapeHtml((q.text||'').substring(0,60)) + '...</div>' + userHtml;
  }
  addMsg('user', userHtml, true, text);
  
  processQueue();
}

/* ===== 实际发送到API ===== */
async function doSendMessage(text, quote){
  sendBtn.disabled = true;
  document.getElementById('statusText').textContent = '小游正在思考...';

  var botInfo = addBotStreaming();
  var bubble = botInfo.div.querySelector('.msg-bubble');

  // 构建请求内容，如果引用了消息，加入上下文
  var prompt = text;
  if(quote && quote.text){
    prompt = '[引用消息: "' + (quote.text||'').substring(0,100) + '"]\n' + text;
  }

  var body = {
    bot_id: BOT_ID,
    user_id: 'web_user',
    stream: true,
    auto_save_history: true,
    additional_messages: [{ role: 'user', content: prompt, content_type: 'text' }]
  };
  if(conversationId) body.conversation_id = conversationId;

  try{
    var resp = await fetch('https://api.coze.cn/v3/chat', {
      method: 'POST',
      headers: {
        'Authorization': 'Bearer ' + PAT_TOKEN,
        'Content-Type': 'application/json'
      },
      body: JSON.stringify(body)
    });

    var fullText = '';
    var answerId = null;
    var rendered = false;
    var reader = resp.body.getReader();
    var decoder = new TextDecoder();
    var buffer = '';

    while(true){
      var result = await reader.read();
      if(result.done) break;
      buffer += decoder.decode(result.value, {stream: true});
      var lines = buffer.split('\n');
      buffer = lines.pop();

      for(var i = 0; i < lines.length; i++){
        var line = lines[i].trim();
        if(!line.startsWith('data:')) continue;
        var jsonStr = line.substring(5).trim();
        if(!jsonStr || jsonStr === '[DONE]') continue;
        try{
          var data = JSON.parse(jsonStr);
          if(data.conversation_id) conversationId = data.conversation_id;
          if(data.type === 'answer' && data.role === 'assistant'){
            if(data.content !== undefined && data.content !== null && data.content !== ''){
              if(!answerId && data.id) answerId = data.id;
              if(!answerId || data.id === answerId){
                if(!rendered){ clearInterval(timerInterval); rendered = true; }
                fullText = data.content;
                bubble.innerHTML = renderMd(fullText);
                // 保留引用按钮
                // msg-actions added after full response
                msgContainer.scrollTop = msgContainer.scrollHeight;
              }
            }
          }
        } catch(e){}
      }
    }

    if(!fullText){
      clearInterval(timerInterval);
      bubble.innerHTML = '<span style="color:rgba(255,255,255,0.5)">抱歉，暂时无法回复，请稍后再试</span>';
    } else {
      clearInterval(timerInterval);
      var elapsed = Math.floor((Date.now() - botInfo.ts) / 1000);
      var timeTag = document.createElement('div');
      timeTag.className = 'timer';
      timeTag.style.marginTop = '8px';
      timeTag.innerHTML = '<span style="font-size:0.7rem;color:rgba(255,255,255,0.3)">⏱ ' + elapsed + '秒</span>';
      bubble.appendChild(timeTag);

      // 引用来源
      var sourceTag = document.createElement('div');
      sourceTag.className = 'msg-source';
      sourceTag.textContent = '以上内容基于导游证考试知识库整理';
      bubble.appendChild(sourceTag);

      // 延伸提问
      var followUps = generateFollowUps(fullText);
      if(followUps.length > 0){
        var followDiv = document.createElement('div');
        followDiv.className = 'follow-ups';
        followUps.forEach(function(q){
          var btn = document.createElement('button');
          btn.className = 'follow-btn';
          btn.textContent = q;
          btn.onclick = function(){ sendQuick(q); };
          followDiv.appendChild(btn);
        });
        bubble.appendChild(followDiv);
      }

      // 引用按钮
      var actions = document.createElement('div');
      actions.className = 'msg-actions';
      actions.innerHTML = '<button class="quote-btn" onclick="quoteMessage(this)">📎 引用</button>';
      bubble.appendChild(actions);

      // 更新聊天记录
      chatHistory.push({id: botInfo.div.id, role: 'bot', html: bubble.innerHTML, text: fullText});
      if(chatHistory.length > 100) chatHistory = chatHistory.slice(-80);
      try{ localStorage.setItem('youdao_chat_history', JSON.stringify(chatHistory)); localStorage.setItem('youdao_chat_conv', conversationId || ''); }catch(e){}
    }
  } catch(e){
    clearInterval(timerInterval);
    bubble.innerHTML = '<span style="color:rgba(255,255,255,0.5)">网络错误，请检查后重试</span>';
  }

  sendBtn.disabled = false;
  document.getElementById('statusText').textContent = '在线 · 随时提问';
  inputEl.focus();
}

restoreHistory();
</script>
</body>
</html>
