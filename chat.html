<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:-apple-system,BlinkMacSystemFont,'PingFang SC','Microsoft YaHei',sans-serif}
body{background:#1a1a4e;color:#fff;display:flex;flex-direction:column;min-height:100vh}
.navbar{display:flex;justify-content:space-between;align-items:center;padding:14px 20px;background:rgba(26,26,78,0.85);backdrop-filter:blur(20px);border-bottom:1px solid rgba(255,255,255,0.1);position:sticky;top:0;z-index:100}
.logo{font-size:1.1rem;font-weight:800;color:#fff;display:flex;align-items:center;gap:8px;text-decoration:none}
.logo-icon{width:32px;height:32px;background:linear-gradient(135deg,#FF6B35,#ff8c5a);border-radius:8px;display:flex;align-items:center;justify-content:center}
.nav-links{display:flex;gap:4px}
.nav-links a{padding:8px 12px;border-radius:10px;font-size:0.85rem;color:rgba(255,255,255,0.8);transition:all 0.3s;text-decoration:none}
.nav-links a:hover{background:rgba(255,107,53,0.3);color:#fff}
.nav-toggle{display:none;flex-direction:column;gap:5px;cursor:pointer;padding:8px}
.nav-toggle span{width:22px;height:2px;background:#fff;border-radius:2px}
.chat-wrap{flex:1;display:flex;flex-direction:column;max-width:800px;width:100%;margin:0 auto;padding:0}
.chat-header{padding:16px 20px;border-bottom:1px solid rgba(255,255,255,0.08);display:flex;align-items:center;gap:12px}
.chat-avatar{width:40px;height:40px;background:linear-gradient(135deg,#FF6B35,#ff8c5a);border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:1.2rem}
.chat-header-info h2{font-size:1rem;font-weight:700}
.chat-header-info p{font-size:0.75rem;color:rgba(255,255,255,0.5)}
.messages{flex:1;overflow-y:auto;padding:16px 20px;display:flex;flex-direction:column;gap:12px}
.msg{display:flex;gap:10px;max-width:85%;animation:fadeIn 0.3s}
.msg.user{align-self:flex-end;flex-direction:row-reverse}
.msg-avatar{width:32px;height:32px;border-radius:10px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:0.85rem}
.msg.bot .msg-avatar{background:linear-gradient(135deg,#FF6B35,#ff8c5a)}
.msg.user .msg-avatar{background:rgba(255,255,255,0.15)}
.msg-bubble{padding:12px 16px;border-radius:16px;font-size:0.9rem;line-height:1.6;word-break:break-word}
.msg.bot .msg-bubble{background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.1);border-top-left-radius:4px}
.msg.user .msg-bubble{background:linear-gradient(135deg,#FF6B35,#ff8c5a);border-top-right-radius:4px}
.msg-bubble p{margin:0}
.msg-bubble code{background:rgba(0,0,0,0.3);padding:2px 6px;border-radius:4px;font-size:0.85em}
.typing{display:flex;gap:4px;padding:12px 16px}
.typing span{width:8px;height:8px;background:rgba(255,255,255,0.4);border-radius:50%;animation:bounce 1.4s infinite}
.typing span:nth-child(2){animation-delay:0.2s}
.typing span:nth-child(3){animation-delay:0.4s}
.input-area{padding:12px 20px 20px;border-top:1px solid rgba(255,255,255,0.08)}
.input-wrap{display:flex;gap:10px;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.12);border-radius:16px;padding:6px 6px 6px 16px;align-items:flex-end}
.input-wrap textarea{flex:1;background:none;border:none;color:#fff;font-size:0.9rem;resize:none;outline:none;max-height:120px;min-height:24px;line-height:1.5;padding:6px 0;font-family:inherit}
.input-wrap textarea::placeholder{color:rgba(255,255,255,0.35)}
.send-btn{width:40px;height:40px;border-radius:12px;border:none;background:linear-gradient(135deg,#FF6B35,#ff8c5a);color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:transform 0.15s,opacity 0.15s}
.send-btn:hover{transform:scale(1.05)}
.send-btn:disabled{opacity:0.4;cursor:not-allowed;transform:none}
.send-btn svg{width:20px;height:20px}
.welcome{display:flex;flex-direction:column;align-items:center;justify-content:center;flex:1;padding:30px;text-align:center;gap:20px}
.welcome h2{font-size:1.4rem}
.welcome p{color:rgba(255,255,255,0.5);font-size:0.85rem}
.quick-actions{display:flex;flex-wrap:wrap;gap:8px;justify-content:center}
.quick-btn{padding:10px 16px;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.12);border-radius:12px;color:rgba(255,255,255,0.8);font-size:0.82rem;cursor:pointer;transition:all 0.2s}
.quick-btn:hover{background:rgba(255,107,53,0.15);border-color:rgba(255,107,53,0.3);color:#fff}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes bounce{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-6px)}}
@media(max-width:768px){
.nav-links{display:none;position:absolute;top:100%;left:0;right:0;background:rgba(26,26,78,0.98);flex-direction:column;padding:12px;border-radius:0 0 16px 16px}
.nav-links.open{display:flex}
.nav-toggle{display:flex}
.msg{max-width:90%}
}
</style>
</head>
<body>

<div class="chat-wrap">
  <div class="chat-header">
    <div class="chat-avatar">🤖</div>
    <div class="chat-header-info">
      <h2>导游证AI备考助手「小游」</h2>
      <p id="statusText">在线 · 随时提问</p>
    </div>
  </div>

  <div class="messages" id="messages">
    <div class="welcome" id="welcome">
      <div class="chat-avatar" style="width:56px;height:56px;font-size:1.6rem;border-radius:16px">🤖</div>
      <h2>你好，我是小游 👋</h2>
      <p>你的导游证AI备考搭子，随时问我任何备考问题</p>
      <div class="quick-actions">
        <button class="quick-btn" onclick="sendQuick('北京导游考试考哪些科目？')">北京导游考试科目</button>
        <button class="quick-btn" onclick="sendQuick('导游业务笔试重点有哪些？')">导游业务重点</button>
        <button class="quick-btn" onclick="sendQuick('帮我制定一个30天备考计划')">30天备考计划</button>
        <button class="quick-btn" onclick="sendQuick('全国导游基础知识怎么复习？')">导基复习方法</button>
      </div>
    </div>
  </div>

  <div class="input-area">
    <div class="input-wrap">
      <textarea id="userInput" placeholder="输入你的问题..." rows="1" onkeydown="handleKey(event)"></textarea>
      <button class="send-btn" id="sendBtn" onclick="sendMessage()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 2L11 13"/><path d="M22 2L15 22L11 13L2 9L22 2Z"/></svg>
      </button>
    </div>
  </div>
</div>

<script>
var BOT_ID = '7638687952973398050';
var PAT_TOKEN = 'pat_7thMqKrsyXMEX4W6N51ILHY5X9TmWYG93eioUN2IvWEXprM24nYx6w2cKNIeEvZW';
var conversationId = null;
var isStreaming = false;
var msgContainer = document.getElementById('messages');
var inputEl = document.getElementById('userInput');
var sendBtn = document.getElementById('sendBtn');
var welcomeEl = document.getElementById('welcome');

inputEl.addEventListener('input', function(){
  this.style.height = 'auto';
  this.style.height = Math.min(this.scrollHeight, 120) + 'px';
});

function handleKey(e){
  if(e.key === 'Enter' && !e.shiftKey){
    e.preventDefault();
    sendMessage();
  }
}

function sendQuick(text){
  inputEl.value = text;
  sendMessage();
}

function addMsg(role, html){
  if(welcomeEl){ welcomeEl.remove(); welcomeEl = null; }
  var div = document.createElement('div');
  div.className = 'msg ' + role;
  var avatar = role === 'bot' ? '🤖' : '👤';
  div.innerHTML = '<div class="msg-avatar">' + avatar + '</div><div class="msg-bubble">' + html + '</div>';
  msgContainer.appendChild(div);
  msgContainer.scrollTop = msgContainer.scrollHeight;
  return div;
}

function addTyping(){
  var div = document.createElement('div');
  div.className = 'msg bot';
  div.id = 'typingMsg';
  div.innerHTML = '<div class="msg-avatar">🤖</div><div class="msg-bubble"><div class="typing"><span></span><span></span><span></span></div></div>';
  msgContainer.appendChild(div);
  msgContainer.scrollTop = msgContainer.scrollHeight;
}

function removeTyping(){
  var el = document.getElementById('typingMsg');
  if(el) el.remove();
}

function escapeHtml(text){
  var d = document.createElement('div');
  d.textContent = text;
  return d.innerHTML;
}

function renderMarkdown(text){
  var s = escapeHtml(text);
  s = s.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
  s = s.replace(/`(.*?)`/g, '<code>$1</code>');
  s = s.replace(/\n/g, '<br>');
  return s;
}

async function sendMessage(){
  var text = inputEl.value.trim();
  if(!text || isStreaming) return;
  isStreaming = true;
  inputEl.value = '';
  inputEl.style.height = 'auto';
  sendBtn.disabled = true;
  document.getElementById('statusText').textContent = '正在思考...';

  addMsg('user', escapeHtml(text));
  addTyping();

  var body = {
    bot_id: BOT_ID,
    user_id: 'web_user_' + Math.random().toString(36).substr(2, 8),
    stream: true,
    auto_save_history: true,
    additional_messages: [{ role: 'user', content: text, content_type: 'text' }]
  };
  if(conversationId) body.conversation_id = conversationId;

  try{
    var resp = await fetch('https://api.coze.cn/v3/chat', {
      method: 'POST',
      headers: {
        'Authorization': 'Bearer ' + PAT_TOKEN,
        'Content-Type': 'application/json'
      },
      body: JSON.stringify(body)
    });

    removeTyping();
    var botDiv = addMsg('bot', '');
    var bubble = botDiv.querySelector('.msg-bubble');
    var fullText = '';
    var reader = resp.body.getReader();
    var decoder = new TextDecoder();
    var buffer = '';

    while(true){
      var result = await reader.read();
      if(result.done) break;
      buffer += decoder.decode(result.value, {stream: true});
      var lines = buffer.split('\n');
      buffer = lines.pop();

      for(var i = 0; i < lines.length; i++){
        var line = lines[i].trim();
        if(!line.startsWith('data:')) continue;
        var jsonStr = line.substring(5).trim();
        if(!jsonStr) continue;
        try{
          var data = JSON.parse(jsonStr);
          if(data.conversation_id) conversationId = data.conversation_id;
          if(data.type === 'answer' && data.content){
            fullText += data.content;
            bubble.innerHTML = renderMarkdown(fullText);
            msgContainer.scrollTop = msgContainer.scrollHeight;
          }
        } catch(e){}
      }
    }

    if(!fullText){
      bubble.innerHTML = '<span style="color:rgba(255,255,255,0.5)">抱歉，暂时无法回复，请稍后再试</span>';
    }
  } catch(e){
    removeTyping();
    addMsg('bot', '<span style="color:rgba(255,255,255,0.5)">网络错误，请检查网络后重试</span>');
  }

  isStreaming = false;
  sendBtn.disabled = false;
  document.getElementById('statusText').textContent = '在线 · 随时提问';
  inputEl.focus();
}
</script>
</body>
