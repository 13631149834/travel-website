<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:-apple-system,BlinkMacSystemFont,'PingFang SC','Microsoft YaHei',sans-serif}
body{background:#26267a;color:#fff;display:flex;flex-direction:column;min-height:100vh}
.navbar{display:flex;justify-content:space-between;align-items:center;padding:14px 20px;background:rgba(30,30,90,0.9);backdrop-filter:blur(20px);border-bottom:1px solid rgba(255,255,255,0.12);position:sticky;top:0;z-index:100}
.logo{font-size:1.1rem;font-weight:800;color:#fff;display:flex;align-items:center;gap:8px;text-decoration:none}
.logo-icon{width:32px;height:32px;background:linear-gradient(135deg,#FF6B35,#ff8c5a);border-radius:8px;display:flex;align-items:center;justify-content:center}
.nav-links{display:flex;gap:4px}
.nav-links a{padding:8px 12px;border-radius:10px;font-size:0.85rem;color:rgba(255,255,255,0.8);transition:all 0.3s;text-decoration:none}
.nav-links a:hover{background:rgba(255,107,53,0.3);color:#fff}
.nav-toggle{display:none;flex-direction:column;gap:5px;cursor:pointer;padding:8px}
.nav-toggle span{width:22px;height:2px;background:#fff;border-radius:2px}
.chat-wrap{flex:1;display:flex;flex-direction:column;max-width:800px;width:100%;margin:0 auto}
.chat-header{padding:16px 20px;border-bottom:1px solid rgba(255,255,255,0.08);display:flex;align-items:center;gap:12px}
.chat-avatar{width:40px;height:40px;background:linear-gradient(135deg,#FF6B35,#ff8c5a);border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:1.2rem;flex-shrink:0}
.chat-header-info h2{font-size:1rem;font-weight:700}
.chat-header-info p{font-size:0.75rem;color:rgba(255,255,255,0.58)}
.messages{flex:1;overflow-y:auto;padding:16px 20px;display:flex;flex-direction:column;gap:16px;-webkit-overflow-scrolling:touch}
.msg{display:flex;gap:10px;max-width:88%}
.msg.user{align-self:flex-end;flex-direction:row-reverse}
.msg-avatar{width:32px;height:32px;border-radius:10px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:0.8rem}
.msg.bot .msg-avatar{background:linear-gradient(135deg,#FF6B35,#ff8c5a)}
.msg.user .msg-avatar{background:rgba(255,255,255,0.15)}
.msg-bubble{padding:14px 18px;border-radius:16px;font-size:0.9rem;line-height:1.8;word-break:break-word}
.msg.bot .msg-bubble{background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.15);border-top-left-radius:4px}
.msg.user .msg-bubble{background:linear-gradient(135deg,#FF6B35,#ff8c5a);border-top-right-radius:4px}
/* 引用来源标签 */
.msg-source{margin-top:10px;padding:8px 12px;background:rgba(255,107,53,0.08);border:1px solid rgba(255,107,53,0.15);border-radius:10px;font-size:0.78rem;color:rgba(255,255,255,0.55);display:flex;align-items:center;gap:6px}
.msg-source::before{content:'📚';font-size:0.9rem}
/* 延伸提问 */
.follow-ups{margin-top:12px;display:flex;flex-wrap:wrap;gap:8px}
.follow-btn{padding:8px 14px;background:rgba(255,107,53,0.1);border:1px solid rgba(255,107,53,0.25);border-radius:20px;color:#FF6B35;font-size:0.82rem;cursor:pointer;transition:all 0.2s}
.follow-btn:hover{background:rgba(255,107,53,0.2);border-color:rgba(255,107,53,0.4)}
/* Markdown样式 */
.msg.bot .msg-bubble h1,.msg.bot .msg-bubble h2,.msg.bot .msg-bubble h3{margin:12px 0 6px;font-size:1em;font-weight:700;color:#FF6B35}
.msg.bot .msg-bubble h1{font-size:1.15em}
.msg.bot .msg-bubble h2{font-size:1.05em}
.msg.bot .msg-bubble p{margin:4px 0}
.msg.bot .msg-bubble ul,.msg.bot .msg-bubble ol{margin:6px 0;padding-left:20px}
.msg.bot .msg-bubble li{margin:3px 0}
.msg.bot .msg-bubble strong{color:#FF6B35}
.msg.bot .msg-bubble code{background:rgba(0,0,0,0.3);padding:2px 6px;border-radius:4px;font-size:0.85em}
.msg.bot .msg-bubble blockquote{border-left:3px solid #FF6B35;padding-left:12px;margin:8px 0;color:rgba(255,255,255,0.78)}
.msg.bot .msg-bubble hr{border:none;border-top:1px solid rgba(255,255,255,0.1);margin:12px 0}
/* 计时器 */
.timer{display:inline-flex;align-items:center;gap:6px;font-size:0.75rem;color:rgba(255,255,255,0.4);margin-top:6px}
.timer-dot{width:6px;height:6px;background:#FF6B35;border-radius:50%;animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}
/* 输入打字中 */
.typing-dots{display:flex;gap:5px;padding:4px 0}
.typing-dots span{width:8px;height:8px;background:rgba(255,255,255,0.35);border-radius:50%;animation:bounce 1.4s infinite}
.typing-dots span:nth-child(2){animation-delay:0.2s}
.typing-dots span:nth-child(3){animation-delay:0.4s}
@keyframes bounce{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-6px)}}
/* 输入区 */
.input-area{padding:12px 20px 20px;border-top:1px solid rgba(255,255,255,0.08)}
.input-wrap{display:flex;gap:10px;background:rgba(255,255,255,0.11);border:1px solid rgba(255,255,255,0.15);border-radius:16px;padding:6px 6px 6px 16px;align-items:flex-end}
.input-wrap textarea{flex:1;background:none;border:none;color:#fff;font-size:0.9rem;resize:none;outline:none;max-height:120px;min-height:24px;line-height:1.5;padding:6px 0;font-family:inherit}
.input-wrap textarea::placeholder{color:rgba(255,255,255,0.35)}
.send-btn{width:40px;height:40px;border-radius:12px;border:none;background:linear-gradient(135deg,#FF6B35,#ff8c5a);color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:transform 0.15s,opacity 0.15s}
.send-btn:hover{transform:scale(1.05)}
.send-btn:disabled{opacity:0.4;cursor:not-allowed;transform:none}
.send-btn svg{width:20px;height:20px}
/* 欢迎 */
.welcome{display:flex;flex-direction:column;align-items:center;justify-content:center;flex:1;padding:30px;text-align:center;gap:20px}
.welcome-avatar{width:64px;height:64px;background:linear-gradient(135deg,#FF6B35,#ff8c5a);border-radius:20px;display:flex;align-items:center;justify-content:center;font-size:1.8rem}
.welcome h2{font-size:1.3rem}
.welcome p{color:rgba(255,255,255,0.55);font-size:0.85rem;line-height:1.6}
.quick-actions{display:flex;flex-wrap:wrap;gap:8px;justify-content:center}
.quick-btn{padding:10px 16px;background:rgba(255,255,255,0.11);border:1px solid rgba(255,255,255,0.15);border-radius:12px;color:rgba(255,255,255,0.8);font-size:0.82rem;cursor:pointer;transition:all 0.2s}
.quick-btn:hover{background:rgba(255,107,53,0.15);border-color:rgba(255,107,53,0.3);color:#fff}
/* 历史提示 */
.history-notice{font-size:0.75rem;color:rgba(255,255,255,0.35);text-align:center;padding:8px}
.clear-btn{background:none;border:1px solid rgba(255,255,255,0.15);color:rgba(255,255,255,0.58);padding:4px 12px;border-radius:12px;font-size:0.72rem;cursor:pointer;margin-left:8px}
.clear-btn:hover{border-color:rgba(255,255,255,0.3);color:rgba(255,255,255,0.78)}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@media(max-width:768px){
.nav-links{display:none;position:absolute;top:100%;left:0;right:0;background:rgba(30,30,90,0.98);flex-direction:column;padding:12px;border-radius:0 0 16px 16px}
.nav-links.open{display:flex}
.nav-toggle{display:flex}
.msg{max-width:92%}
.messages{padding:12px 14px;gap:12px}
.chat-header{padding:12px 14px}
.input-area{padding:10px 14px 16px}
}

/* 全局重点突出样式 */
.hl{color:#FF6B35;font-weight:700}
.key-point{display:inline-block;background:linear-gradient(135deg,rgba(255,107,53,0.18),rgba(255,140,90,0.08));border:1px solid rgba(255,107,53,0.25);border-radius:8px;padding:2px 10px;color:#ff8c5a;font-weight:600;font-size:0.92em}
.key-num{color:#FF6B35;font-weight:800;font-size:1.1em}
.key-tag{display:inline-block;background:rgba(255,107,53,0.15);color:#FF6B35;padding:1px 8px;border-radius:4px;font-weight:600;font-size:0.85em}
.em-text{font-weight:700;color:#fff}
</style>

<div class="chat-wrap">
  <div class="chat-header">
    <div class="chat-avatar"><img src="images/ai-avatar.jpg" style="width:100%;height:100%;border-radius:12px;object-fit:cover"></div>

<script>
var BOT_ID = '7638687952973398050';
var PAT_TOKEN = 'pat_7thMqKrsyXMEX4W6N51ILHY5X9TmWYG93eioUN2IvWEXprM24nYx6w2cKNIeEvZW';
var conversationId = null;
var isStreaming = false;
var msgContainer = document.getElementById('messages');
var inputEl = document.getElementById('userInput');
var sendBtn = document.getElementById('sendBtn');
var welcomeEl = document.getElementById('welcome');
var timerInterval = null;
var chatHistory = [];

if(typeof marked !== 'undefined'){
  marked.setOptions({ breaks: true, gfm: true });
}

inputEl.addEventListener('input', function(){
  this.style.height = 'auto';
  this.style.height = Math.min(this.scrollHeight, 120) + 'px';
});

function handleKey(e){
  if(e.key === 'Enter' && !e.shiftKey){
    e.preventDefault();
    sendMessage();
  }
}

function sendQuick(text){
  inputEl.value = text;
  sendMessage();
}

function escapeHtml(t){
  var d = document.createElement('div');
  d.textContent = t;
  return d.innerHTML;
}

/* ===== 延伸提问：根据回复内容生成相关追问 ===== */
function generateFollowUps(text){
  var suggestions = [];
  var t = text.toLowerCase();
  if(t.includes('科目') || t.includes('笔试')) suggestions.push('各科目分值怎么分布？');
  if(t.includes('导游词')) suggestions.push('能给我一篇导游词范文吗？');
  if(t.includes('面试')) suggestions.push('面试评分标准是什么？');
  if(t.includes('法规') || t.includes('法律')) suggestions.push('法规科目有哪些必背条款？');
  if(t.includes('计划') || t.includes('备考')) suggestions.push('每天应该学几个小时？');
  if(t.includes('导基') || t.includes('基础知识')) suggestions.push('全国导基和地方导基哪个难？');
  if(t.includes('导游业务')) suggestions.push('导游业务实操题怎么答？');
  if(t.includes('报名') || t.includes('条件')) suggestions.push('非旅游专业能考吗？');
  if(t.includes('真题') || t.includes('题目')) suggestions.push('能出几道模拟题练练手吗？');
  if(t.includes('口诀') || t.includes('记忆')) suggestions.push('有没有快速记忆的方法？');
  // 补充通用追问
  if(suggestions.length < 2){
    var generic = ['这个知识点容易考什么题型？','能展开讲讲重点吗？','有相关真题可以练习吗？','这个在面试中怎么考？'];
    while(suggestions.length < 2 && generic.length > 0){
      var g = generic.shift();
      if(suggestions.indexOf(g) === -1) suggestions.push(g);
    }
  }
  return suggestions.slice(0, 3);
}

function addMsg(role, html, save){
  if(welcomeEl){ welcomeEl.remove(); welcomeEl = null; }
  var div = document.createElement('div');
  div.className = 'msg ' + role;
  var avatar = role === 'bot' ? '<img src="images/ai-avatar.jpg" style="width:100%;height:100%;border-radius:10px;object-fit:cover">' : '👤';
  div.innerHTML = '<div class="msg-avatar">' + avatar + '</div><div class="msg-bubble">' + html + '</div>';
  msgContainer.appendChild(div);
  msgContainer.scrollTop = msgContainer.scrollHeight;
  if(save !== false){
    chatHistory.push({role: role, html: html});
    if(chatHistory.length > 100) chatHistory = chatHistory.slice(-80);
    try{ localStorage.setItem('youdao_chat_history', JSON.stringify(chatHistory)); localStorage.setItem('youdao_chat_conv', conversationId || ''); }catch(e){}
  }
  return div;
}

function addBotStreaming(){
  if(welcomeEl){ welcomeEl.remove(); welcomeEl = null; }
  var div = document.createElement('div');
  div.className = 'msg bot';
  var ts = Date.now();
  div.innerHTML = '<div class="msg-avatar"><img src="images/ai-avatar.jpg" style="width:100%;height:100%;border-radius:10px;object-fit:cover"></div><div class="msg-bubble"><div class="typing-dots"><span></span><span></span><span></span></div><div class="timer"><span class="timer-dot"></span><span id="timer_' + ts + '">预计 5-15 秒</span></div></div>';
  msgContainer.appendChild(div);
  msgContainer.scrollTop = msgContainer.scrollHeight;

  var timerEl = document.getElementById('timer_' + ts);
  var start = Date.now();
  timerInterval = setInterval(function(){
    var elapsed = Math.floor((Date.now() - start) / 1000);
    if(elapsed < 5){
      timerEl.textContent = '预计 5-15 秒';
    } else if(elapsed < 15){
      timerEl.textContent = '已等待 ' + elapsed + ' 秒';
    } else {
      timerEl.textContent = '已等待 ' + elapsed + ' 秒，回复较长请耐心';
    }
  }, 1000);

  return { div: div, ts: ts };
}

function renderMd(text){
  if(typeof marked !== 'undefined' && marked.parse){
    try{ return marked.parse(text); } catch(e){}
  }
  var s = escapeHtml(text);
  s = s.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
  s = s.replace(/`(.*?)`/g, '<code>$1</code>');
  s = s.replace(/\n/g, '<br>');
  return s;
}

/* ===== 恢复历史对话 ===== */
function restoreHistory(){
  try{
    var saved = localStorage.getItem('youdao_chat_history');
    var savedConv = localStorage.getItem('youdao_chat_conv');
    if(savedConv) conversationId = savedConv;
    if(saved){
      chatHistory = JSON.parse(saved);
      if(chatHistory.length > 0){
        chatHistory.forEach(function(item){
          addMsg(item.role, item.html, false);
        });
        // 历史提示
        var notice = document.createElement('div');
        notice.className = 'history-notice';
        notice.innerHTML = '已恢复上次对话' + (conversationId ? '' : '（新对话）') + '<button class="clear-btn" onclick="clearHistory()">清除记录</button>';
        msgContainer.appendChild(notice);
        msgContainer.scrollTop = msgContainer.scrollHeight;
      }
    }
  }catch(e){}
}

function clearHistory(){
  chatHistory = [];
  conversationId = null;
  try{ localStorage.removeItem('youdao_chat_history'); localStorage.removeItem('youdao_chat_conv'); }catch(e){}
  msgContainer.innerHTML = '';
  // 重新显示欢迎
  var w = document.createElement('div');
  w.className = 'welcome'; w.id = 'welcome';
  w.innerHTML = '<div class="welcome-avatar"><img src="images/ai-avatar.jpg" style="width:100%;height:100%;border-radius:20px;object-fit:cover"></div><h2>你好，我是小游 👋</h2><p>你的导游证AI备考搭子<br>随时问我任何备考问题</p><div class="quick-actions"><button class="quick-btn" onclick="sendQuick(\'北京导游考试考哪些科目？\')">北京导游考试科目</button><button class="quick-btn" onclick="sendQuick(\'导游业务笔试重点有哪些？\')">导游业务重点</button><button class="quick-btn" onclick="sendQuick(\'帮我制定一个30天备考计划\')">30天备考计划</button><button class="quick-btn" onclick="sendQuick(\'全国导游基础知识怎么复习？\')">导基复习方法</button></div>';
  msgContainer.appendChild(w);
  welcomeEl = w;
}

async function sendMessage(){
  var text = inputEl.value.trim();
  if(!text || isStreaming) return;
  isStreaming = true;
  inputEl.value = '';
  inputEl.style.height = 'auto';
  sendBtn.disabled = true;
  document.getElementById('statusText').textContent = '小游正在思考...';

  addMsg('user', escapeHtml(text));
  var botInfo = addBotStreaming();
  var bubble = botInfo.div.querySelector('.msg-bubble');

  var body = {
    bot_id: BOT_ID,
    user_id: 'web_user',
    stream: true,
    auto_save_history: true,
    additional_messages: [{ role: 'user', content: text, content_type: 'text' }]
  };
  if(conversationId) body.conversation_id = conversationId;

  try{
    var resp = await fetch('https://api.coze.cn/v3/chat', {
      method: 'POST',
      headers: {
        'Authorization': 'Bearer ' + PAT_TOKEN,
        'Content-Type': 'application/json'
      },
      body: JSON.stringify(body)
    });

    var fullText = '';
    var answerId = null;
    var rendered = false;
    var hasReference = false;
    var reader = resp.body.getReader();
    var decoder = new TextDecoder();
    var buffer = '';

    while(true){
      var result = await reader.read();
      if(result.done) break;
      buffer += decoder.decode(result.value, {stream: true});
      var lines = buffer.split('\n');
      buffer = lines.pop();

      for(var i = 0; i < lines.length; i++){
        var line = lines[i].trim();
        if(!line.startsWith('data:')) continue;
        var jsonStr = line.substring(5).trim();
        if(!jsonStr || jsonStr === '[DONE]') continue;
        try{
          var data = JSON.parse(jsonStr);
          if(data.conversation_id) conversationId = data.conversation_id;

          // 处理answer类型
          if(data.type === 'answer' && data.role === 'assistant'){
            if(data.content !== undefined && data.content !== null && data.content !== ''){
              if(!answerId && data.id) answerId = data.id;
              if(!answerId || data.id === answerId){
                if(!rendered){
                  clearInterval(timerInterval);
                  rendered = true;
                }
                fullText = data.content;
                bubble.innerHTML = renderMd(fullText);
                msgContainer.scrollTop = msgContainer.scrollHeight;
              }
            }
          }
          // 检测引用/检索事件
          if(data.type === 'verbose_message' || data.type === 'follow_up'){
            hasReference = true;
          }
        } catch(e){}
      }
    }

    if(!fullText){
      clearInterval(timerInterval);
      bubble.innerHTML = '<span style="color:rgba(255,255,255,0.58)">抱歉，暂时无法回复，请稍后再试</span>';
    } else {
      clearInterval(timerInterval);
      // 添加耗时统计
      var elapsed = Math.floor((Date.now() - botInfo.ts) / 1000);
      var timeTag = document.createElement('div');
      timeTag.className = 'timer';
      timeTag.style.marginTop = '8px';
      timeTag.innerHTML = '<span style="font-size:0.7rem;color:rgba(255,255,255,0.3)">⏱ ' + elapsed + '秒</span>';
      bubble.appendChild(timeTag);

      // 引用来源标签
      var sourceTag = document.createElement('div');
      sourceTag.className = 'msg-source';
      sourceTag.textContent = '以上内容基于导游证考试知识库整理';
      bubble.appendChild(sourceTag);

      // 延伸提问
      var followUps = generateFollowUps(fullText);
      if(followUps.length > 0){
        var followDiv = document.createElement('div');
        followDiv.className = 'follow-ups';
        followUps.forEach(function(q){
          var btn = document.createElement('button');
          btn.className = 'follow-btn';
          btn.textContent = q;
          btn.onclick = function(){ sendQuick(q); };
          followDiv.appendChild(btn);
        });
        bubble.appendChild(followDiv);
      }

      // 保存含引用和追问的完整消息
      chatHistory.push({role: 'user', html: escapeHtml(text)});
      chatHistory.push({role: 'bot', html: bubble.innerHTML});
      if(chatHistory.length > 100) chatHistory = chatHistory.slice(-80);
      try{ localStorage.setItem('youdao_chat_history', JSON.stringify(chatHistory)); localStorage.setItem('youdao_chat_conv', conversationId || ''); }catch(e){}
    }
  } catch(e){
    clearInterval(timerInterval);
    bubble.innerHTML = '<span style="color:rgba(255,255,255,0.58)">网络错误，请检查后重试</span>';
  }

  isStreaming = false;
  sendBtn.disabled = false;
  document.getElementById('statusText').textContent = '在线 · 随时提问';
  inputEl.focus();
}

// 页面加载时恢复历史
restoreHistory();
</script>
</body>
</html>
