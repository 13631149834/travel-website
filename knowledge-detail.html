    .detail-main {

      display: flex;

    .related-card {
      background: #fff;

      box-shadow: var(--shadow);

}
:focus:not(:focus-visible) {

}
:focus-visible {
  outline: 3px solid var(--primary);
  outline-offset: 2px;
}

/* 链接焦点样式 */
a:focus,
button:focus,
[tabindex]:focus {
  outline: 3px solid var(--primary);
  outline-offset: 2px;
  border-radius: 2px;
}

/* 输入框焦点 */
input:focus,
textarea:focus,
select:focus {
  outline: 3px solid var(--primary);
  outline-offset: 0;
  border-color: var(--primary);
}

  <script>
    // 获取URL参数
    function getUrlParameter(name) {
      const params = new URLSearchParams(window.location.search);
      return params.get(name);
    }

    // 全局变量
    let attractions = [];
    let currentAttraction = null;
    let currentStyle = 'literary';

    // 页面加载
    document.addEventListener('DOMContentLoaded', async () => {
      await loadAttractions();
      const id = getUrlParameter('id');
      if (id) {
        loadDetail(id);
      } else {
        window.location.href = 'knowledge-base.html';
      }
    });

    // 加载景点数据
    async function loadAttractions() {
      try {
        const response = await fetch('data/attractions.json');
        attractions = await response.json();
      } catch (error) {
        console.error('加载景点数据失败:', error);
        attractions = [];
      }
    }

    // 加载详情
    function loadDetail(id) {
      currentAttraction = attractions.find(a => a.id === id);
      if (!currentAttraction) {
        document.getElementById('detailContent').innerHTML = '<div class="container" style="padding: 60px 20px; text-align: center;"><h2>景点不存在</h2><a href="knowledge-base.html" class="btn btn-primary" style="margin-top: 20px;">返回知识库</a></div>';
        return;
      }

      document.title = `${currentAttraction.name} - 游导旅游景点知识库`;
      document.getElementById('breadcrumbName').textContent = currentAttraction.name;

      renderDetail();
      loadRelated();
    }

    // 渲染详情
    function renderDetail() {
      const a = currentAttraction;
      const container = document.getElementById('detailContent');

      container.innerHTML = `
        <!-- 英雄区域 -->
        <div class="detail-hero">
          <div class="detail-hero-content">
            <div class="emoji">${a.image}</div>
            <h1>${a.name}</h1>
            <p class="subtitle">${a.city} · ${a.country}</p>
          </div>
        </div>

        <div class="detail-container">
          <a href="knowledge-base.html" class="back-to-list">← 返回景点列表</a>
          
          <div class="detail-grid">
            <!-- 主内容区 -->
            <div class="detail-main">
              <!-- 基本信息标签 -->
              <div class="detail-tags">
                <span class="detail-tag primary">🏷️ ${a.type}</span>
                <span class="detail-tag">⭐ ${a.level}</span>
                <span class="detail-tag">⏱️ ${a.duration || '建议游玩时间未知'}</span>
              </div>

              <!-- 景点简介 -->
              <div class="detail-section">
                <h2>📖 景点简介</h2>
                <p>${a.description}</p>
              </div>

              <!-- 亮点特色 -->
              <div class="detail-section">
                <h2>✨ 亮点特色</h2>
                <div class="detail-highlights">
                  ${(a.highlights || ['信息待补充']).map(h => `
                    <div class="highlight-item">
                      <div class="icon">⭐</div>
                      <div>${h}</div>
                    </div>
                  `).join('')}
                </div>
              </div>

              <!-- 游览贴士 -->
              <div class="detail-section">
                <h2>💡 游览贴士</h2>
                <div class="tips-grid">
                  ${(a.tips || []).map((tip, i) => `
                    <div class="tip-item">
                      <span class="tip-icon">💡</span>
                      <span class="tip-text">${tip}</span>
                    </div>
                  `).join('')}
                </div>
              </div>

              <!-- 讲解风格 -->
              <div class="detail-section">
                <h2>🎤 导游讲解词</h2>
                <div class="story-tabs">
                  <button class="story-tab ${currentStyle === 'literary' ? 'active' : ''}" onclick="switchStyle('literary', this)">
                    📝 文艺版
                  </button>
                  <button class="story-tab ${currentStyle === 'humorous' ? 'active' : ''}" onclick="switchStyle('humorous', this)">
                    😄 幽默版
                  </button>
                  <button class="story-tab ${currentStyle === 'professional' ? 'active' : ''}" onclick="switchStyle('professional', this)">
                    🎓 专业版
                  </button>
                </div>
                <div class="story-content" id="storyContent">
                  ${(a.stories && a.stories[currentStyle]) || '暂无讲解词'}
                </div>
                <div class="action-buttons">
                  <button class="btn btn-primary" onclick="copyStory()">
                    📋 复制当前讲解词
                  </button>
                </div>
              </div>

              <!-- 交通指南 -->
              ${a.transport ? `
              <div class="detail-section">
                <h2>🚌 交通指南</h2>
                <p>${a.transport}</p>
              </div>
              ` : ''}
            </div>

            <!-- 侧边栏 -->
            <div class="detail-sidebar">
              <!-- 基本信息 -->
              <div class="sidebar-card">
                <h3>📋 基本信息</h3>
                <div class="info-row">
                  <span class="label">景点名称</span>
                  <span class="value">${a.name}</span>
                </div>
                <div class="info-row">
                  <span class="label">所在城市</span>
                  <span class="value">${a.city}</span>
                </div>
                <div class="info-row">
                  <span class="label">所属国家</span>
                  <span class="value">${a.country}</span>
                </div>
                <div class="info-row">
                  <span class="label">景点类型</span>
                  <span class="value">${a.type}</span>
                </div>
                <div class="info-row">
                  <span class="label">景区级别</span>
                  <span class="value">${a.level}</span>
                </div>
                <div class="info-row">
                  <span class="label">最佳时间</span>
                  <span class="value">${a.bestTime || '全年适宜'}</span>
                </div>
                <div class="info-row">
                  <span class="label">门票价格</span>
                  <span class="value">${a.ticket || '免费'}</span>
                </div>
              </div>

              <!-- 快速操作 -->
              <div class="sidebar-card">
                <h3>⚡ 快速操作</h3>
                <div class="action-buttons">
                  <button class="btn btn-outline" onclick="addToFavorites()">
                    🤍 收藏此景点
                  </button>
                  <button class="btn btn-outline" onclick="shareToFriends()">
                    📱 分享给好友
                  </button>
                  <a href="quiz.html" class="btn btn-outline">
                    🎮 测试旅行知识
                  </a>
                </div>
              </div>

              <!-- 目的地信息 -->
              <div class="sidebar-card">
                <h3>🌍 目的地百科</h3>
                <p style="color: var(--gray-600); margin-bottom: 16px; font-size: 0.9rem;">
                  查看更多关于 ${a.country} 的旅行信息
                </p>
                <a href="destinations.html?country=${encodeURIComponent(a.country)}" class="btn btn-outline" style="width: 100%; text-align: center;">
                  前往 ${a.country} 百科
                </a>
              </div>
            </div>
          </div>
        </div>
      `;
    }

    // 切换讲解风格
    function switchStyle(style, btn) {
      currentStyle = style;
      document.querySelectorAll('.story-tab').forEach(t => t.classList.remove('active'));
      btn.classList.add('active');
      document.getElementById('storyContent').textContent = 
        (currentAttraction.stories && currentAttraction.stories[style]) || '暂无讲解词';
    }

    // 复制讲解词
    function copyStory() {
      const story = currentAttraction.stories && currentAttraction.stories[currentStyle];
      if (!story) return;
      
      navigator.clipboard.writeText(story).then(() => {
        showToast('讲解词已复制到剪贴板！', 'success');
      });
    }

    // 收藏景点
    function addToFavorites() {
      let favorites = JSON.parse(localStorage.getItem('guide_favorites') || '[]');
      const id = currentAttraction.id;
      if (favorites.includes(id)) {
        showToast('已取消收藏', '');
      } else {
        favorites.push(id);
        showToast('已添加到收藏', 'success');
      }
      localStorage.setItem('guide_favorites', JSON.stringify(favorites));
    }

    // 分享
    function shareToFriends() {
      const url = window.location.href;
      if (navigator.share) {
        navigator.share({
          title: currentAttraction.name,
          text: currentAttraction.description,
          url: url
        });
      } else {
        navigator.clipboard.writeText(url).then(() => {
          showToast('链接已复制，可以分享啦！', 'success');
        });
      }
    }

    // 加载相关景点
    function loadRelated() {
      if (!currentAttraction) return;

      const related = attractions
        .filter(a => a.id !== currentAttraction.id && 
          (a.country === currentAttraction.country || a.type === currentAttraction.type))
        .slice(0, 4);

      if (related.length > 0) {
        document.getElementById('relatedSection').style.display = 'block';
        document.getElementById('relatedGrid').innerHTML = related.map(a => `
          <a href="knowledge-detail.html?id=${a.id}" class="related-card">
            <div class="card-image">${a.image}</div>
            <div class="card-content">
              <h4>${a.name}</h4>
              <p class="meta">📍 ${a.city} · ${a.type}</p>
            </div>
          </a>
        `).join('');
      }
    }

    // Toast提示
    function showToast(message, type = '') {
      const toast = document.createElement('div');
      toast.className = `toast ${type}`;
      toast.textContent = message;
      document.body.appendChild(toast);
      setTimeout(() => toast.classList.add('show'), 10);
      setTimeout(() => {
        toast.classList.remove('show');
        setTimeout(() => toast.remove(), 300);
      }, 3000);
    }
  </script>

  <style>
    .toast {
      position: fixed;
      bottom: 100px;
      left: 50%;
      transform: translateX(-50%) translateY(100px);
      background: #333;
      color: #fff;
      padding: 12px 24px;
      border-radius: 25px;
      font-size: 0.95rem;
      z-index: 9999;
      opacity: 0;
      transition: all 0.3s ease;
    }
    .toast.show {
      transform: translateX(-50%) translateY(0);
      opacity: 1;
    }
    .toast.success {
      background: #10B981;
    }
  </style>
  <script src="js/performance.js" defer></script>
  <script src="js/enhanced-common.js" defer></script>

  <!-- PWA Service Worker -->
  <script src="js/pwa.js" defer></script>
  <script src="js/mobile.js" defer></script>
  <script src="js/customer-service.js" defer></script>
</body>
