<!-- 
  目的地天气模块嵌入代码
  使用方法：在目的地页面中引入此代码，并添加对应的CSS和JS依赖
-->

<!-- 天气模块HTML结构 -->
<div class="destination-weather-module" id="destination-weather-{CITY_ID}">
  <div class="weather-widget">
    <div class="weather-widget-header">
      <h4><span>🌤️</span> 目的地天气</h4>
      <a href="../weather/index.html?city={CITY_ID}" class="weather-more-link">查看详情 →</a>
    </div>
    <div class="weather-widget-body">
      <div class="weather-widget-current">
        <div class="weather-widget-icon" id="weather-icon-{CITY_ID}">☀️</div>
        <div class="weather-widget-temp" id="weather-temp-{CITY_ID}">--°C</div>
        <div class="weather-widget-info">
          <div class="weather-widget-city" id="weather-city-{CITY_ID}">加载中...</div>
          <div class="weather-widget-desc" id="weather-desc-{CITY_ID}">--</div>
        </div>
      </div>
      <div class="weather-widget-forecast" id="weather-forecast-{CITY_ID}">
        <!-- 由JS动态填充 -->
      </div>
    </div>
  </div>
</div>

<!-- 快速出行建议 -->
<div class="destination-travel-tips" id="destination-tips-{CITY_ID}">
  <div class="tips-header">
    <span>🎒</span>
    <h4>出行提示</h4>
  </div>
  <div class="tips-content" id="tips-content-{CITY_ID}">
    <!-- 由JS动态填充 -->
  </div>
</div>

<style>
/* 目的地天气模块嵌入样式 */
.destination-weather-module {
  margin: 20px 0;
}

.weather-widget {
  background: white;
  border-radius: 16px;
  overflow: hidden;
  box-shadow: 0 4px 15px rgba(0,0,0,0.08);
}

.weather-widget-header {
  background: linear-gradient(135deg, #4F86F7 0%, #3B82F6 100%);
  color: white;
  padding: 14px 20px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.weather-widget-header h4 {
  margin: 0;
  font-size: 1rem;
  display: flex;
  align-items: center;
  gap: 8px;
}

.weather-more-link {
  color: white;
  text-decoration: none;
  font-size: 0.875rem;
  opacity: 0.9;
  transition: opacity 0.2s;
}

.weather-more-link:hover {
  opacity: 1;
}

.weather-widget-body {
  padding: 20px;
}

.weather-widget-current {
  display: flex;
  align-items: center;
  gap: 16px;
  margin-bottom: 16px;
}

.weather-widget-icon {
  font-size: 48px;
}

.weather-widget-temp {
  font-size: 2rem;
  font-weight: 600;
  color: #333;
}

.weather-widget-info {
  flex: 1;
}

.weather-widget-city {
  font-size: 1.1rem;
  font-weight: 600;
  color: #333;
}

.weather-widget-desc {
  font-size: 0.9rem;
  color: #666;
  margin-top: 4px;
}

.weather-widget-forecast {
  display: flex;
  justify-content: space-between;
  border-top: 1px solid #eee;
  padding-top: 16px;
}

.forecast-item {
  text-align: center;
  flex: 1;
}

.forecast-item .day {
  font-size: 0.75rem;
  color: #999;
  margin-bottom: 4px;
}

.forecast-item .icon {
  font-size: 20px;
  margin: 4px 0;
  display: block;
}

.forecast-item .temp {
  font-size: 0.85rem;
  font-weight: 500;
  color: #333;
}

/* 目的地出行提示样式 */
.destination-travel-tips {
  background: linear-gradient(135deg, #fef9ef 0%, #fff5e6 100%);
  border-radius: 16px;
  padding: 20px;
  margin-top: 20px;
  border: 1px solid #fde68a;
}

.tips-header {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 12px;
}

.tips-header span {
  font-size: 20px;
}

.tips-header h4 {
  margin: 0;
  font-size: 1rem;
  color: #92400e;
}

.tips-content {
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.tip-item {
  display: flex;
  align-items: flex-start;
  gap: 10px;
  font-size: 0.9rem;
  color: #78350f;
}

.tip-item .tip-icon {
  flex-shrink: 0;
}

/* 响应式 */
@media (max-width: 480px) {
  .weather-widget-body {
    padding: 15px;
  }
  
  .weather-widget-icon {
    font-size: 36px;
  }
  
  .weather-widget-temp {
    font-size: 1.5rem;
  }
}
</style>

<script>
/**
 * 目的地天气模块初始化
 * @param {string} cityId - 城市ID
 * @param {string} cityName - 城市名称（可选，用于显示）
 */
function initDestinationWeather(cityId, cityName) {
  // 加载天气数据
  fetch('../data/weather.json')
    .then(response => response.json())
    .then(data => {
      const city = data.cities[cityId];
      if (!city) {
        console.warn('未找到城市天气数据:', cityId);
        return;
      }
      
      // 更新当前天气
      document.getElementById('weather-city-' + cityId).textContent = cityName || city.name;
      document.getElementById('weather-temp-' + cityId).textContent = city.current.temp + '°C';
      document.getElementById('weather-desc-' + cityId).textContent = 
        city.current.weather + ' · ' + city.current.wind_dir;
      document.getElementById('weather-icon-' + cityId).textContent = 
        getWeatherIcon(city.current.weather_code, data.weather_icons);
      
      // 更新预报
      const forecastContainer = document.getElementById('weather-forecast-' + cityId);
      if (forecastContainer && city.forecast) {
        forecastContainer.innerHTML = city.forecast.slice(0, 5).map(day => `
          <div class="forecast-item">
            <span class="day">${day.day}</span>
            <span class="icon">${getWeatherIcon(day.weather_code, data.weather_icons)}</span>
            <span class="temp">${day.temp_high}°</span>
          </div>
        `).join('');
      }
      
      // 更新出行提示
      const tipsContainer = document.getElementById('tips-content-' + cityId);
      if (tipsContainer) {
        const tips = generateTravelTips(city);
        tipsContainer.innerHTML = tips.map(tip => `
          <div class="tip-item">
            <span class="tip-icon">${tip.icon}</span>
            <span>${tip.text}</span>
          </div>
        `).join('');
      }
    })
    .catch(error => {
      console.error('加载天气数据失败:', error);
    });
}

/**
 * 获取天气图标
 */
function getWeatherIcon(code, iconMap) {
  const icons = iconMap || {
    sunny: '☀️',
    cloudy: '☁️',
    partly_cloudy: '⛅',
    overcast: '🌥️',
    rain: '🌧️',
    heavy_rain: '⛈️',
    thunderstorm: '⚡',
    snow: '❄️',
    fog: '🌫️',
    wind: '💨'
  };
  return icons[code] || '☀️';
}

/**
 * 生成出行提示
 */
function generateTravelTips(city) {
  const tips = [];
  const temp = city.current.temp;
  const weather = city.current.weather_code;
  const uv = city.current.uv_index;
  const aqi = city.current.aqi;
  
  // 温度提示
  if (temp < 10) {
    tips.push({ icon: '🧥', text: '气温较低（' + temp + '°C），建议携带保暖衣物' });
  } else if (temp > 30) {
    tips.push({ icon: '🥵', text: '气温较高（' + temp + '°C），注意防暑降温' });
  } else {
    tips.push({ icon: '😊', text: '气温适宜（' + temp + '°C），适合户外活动' });
  }
  
  // 天气提示
  if (weather === 'rain' || weather === 'heavy_rain' || weather === 'thunderstorm') {
    tips.push({ icon: '☂️', text: '今日有雨，请随身携带雨具' });
  } else if (weather === 'sunny') {
    tips.push({ icon: '🕶️', text: '阳光充足，建议做好防晒措施' });
  }
  
  // 紫外线提示
  if (uv >= 7) {
    tips.push({ icon: '🧴', text: '紫外线强度较高，建议使用SPF50+防晒霜' });
  }
  
  // 空气提示
  if (aqi > 100) {
    tips.push({ icon: '😷', text: '空气质量一般，建议佩戴口罩' });
  }
  
  return tips.slice(0, 3);
}

// 页面加载后自动初始化
document.addEventListener('DOMContentLoaded', function() {
  // 自动查找并初始化目的地天气模块
  document.querySelectorAll('[id^="destination-weather-"]').forEach(module => {
    const id = module.id.replace('destination-weather-', '');
    initDestinationWeather(id);
  });
});
</script>
