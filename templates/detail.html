<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>行程详情 - 游导旅游</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap');
    * { font-family: 'Noto Sans SC', -apple-system, BlinkMacSystemFont, sans-serif; }
    
    .card-hover { transition: all 0.3s ease; }
    .card-hover:hover { transform: translateY(-4px); box-shadow: 0 12px 24px rgba(0,0,0,0.1); }
    
    .day-timeline { position: relative; padding-left: 80px; }
    .day-timeline::before {
      content: '';
      position: absolute;
      left: 28px;
      top: 0;
      bottom: 0;
      width: 3px;
      background: linear-gradient(to bottom, #667eea, #764ba2);
    }
    
    .time-block {
      position: relative;
      margin-bottom: 24px;
    }
    .time-block::before {
      content: '';
      position: absolute;
      left: -56px;
      top: 12px;
      width: 12px;
      height: 12px;
      background: #667eea;
      border-radius: 50%;
      border: 3px solid white;
      box-shadow: 0 0 0 3px #667eea;
    }
    
    .meal-block {
      position: relative;
      margin: 16px 0;
      padding: 16px;
      background: linear-gradient(135deg, #fef3c7 0%, #fde68a 100%);
      border-radius: 12px;
      border-left: 4px solid #f59e0b;
    }
    .meal-block::before {
      content: '';
      position: absolute;
      left: -52px;
      top: 16px;
      width: 8px;
      height: 8px;
      background: #f59e0b;
      border-radius: 50%;
    }
    
    .sticky-nav {
      position: sticky;
      top: 64px;
      z-index: 40;
    }
    
    .active-day {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
    }
    
    @media print {
      .no-print { display: none !important; }
      .page-break { page-break-before: always; }
      body { font-size: 11px; }
      .day-section { page-break-inside: avoid; }
      header, footer { display: none; }
    }
    
    /* Print-friendly styles */
    @media print {
      .print-header {
        display: block !important;
        text-align: center;
        margin-bottom: 20px;
        padding-bottom: 20px;
        border-bottom: 2px solid #667eea;
      }
    }
  </style>
</head>
<body class="bg-gray-50">
  <!-- Header -->
  <header class="bg-white shadow-sm sticky top-0 z-50">
    <div class="container mx-auto px-4">
      <div class="flex items-center justify-between h-16">
        <a href="index.html" class="flex items-center space-x-2">
          <div class="w-10 h-10 rounded-xl bg-gradient-to-br from-purple-600 to-blue-500 flex items-center justify-center">
            <i class="fas fa-compass text-white text-lg"></i>
          </div>
          <span class="text-xl font-bold bg-gradient-to-r from-purple-600 to-blue-500 bg-clip-text text-transparent">游导旅游</span>
        </a>
        <nav class="hidden md:flex items-center space-x-8">
          <a href="../index.html" class="text-gray-600 hover:text-purple-600 transition">首页</a>
          <a href="index.html" class="text-purple-600 font-medium">行程模板</a>
        </nav>
        <div class="flex items-center space-x-4 no-print">
          <button onclick="window.print()" class="text-gray-600 hover:text-purple-600">
            <i class="fas fa-print mr-1"></i>打印
          </button>
          <button onclick="downloadPDF()" class="bg-gradient-to-r from-purple-600 to-blue-500 text-white px-4 py-2 rounded-lg hover:opacity-90 transition">
            <i class="fas fa-download mr-1"></i>下载PDF
          </button>
        </div>
      </div>
    </div>
  </header>

  <!-- Print Header (only visible when printing) -->
  <div class="print-header hidden print:block">
    <h1 class="text-2xl font-bold" id="printTitle"></h1>
    <p class="text-gray-600" id="printSubtitle"></p>
  </div>

  <!-- Hero Section -->
  <section class="relative h-80 md:h-96 overflow-hidden">
    <img id="heroImage" src="" alt="" class="w-full h-full object-cover">
    <div class="absolute inset-0 bg-gradient-to-t from-black/80 via-black/40 to-transparent"></div>
    <div class="absolute bottom-0 left-0 right-0 container mx-auto px-4 pb-8">
      <div class="flex items-center text-sm text-white/80 mb-4">
        <a href="index.html" class="hover:text-white"><i class="fas fa-home mr-2"></i>模板库</a>
        <span class="mx-2">/</span>
        <span id="countryLink"></span>
      </div>
      <div class="flex flex-wrap items-end justify-between">
        <div>
          <h1 class="text-3xl md:text-4xl font-bold text-white mb-2" id="templateTitle"></h1>
          <p class="text-xl text-white/80 mb-4" id="templateSubtitle"></p>
          <div class="flex flex-wrap gap-3">
            <span class="bg-white/20 backdrop-blur px-4 py-2 rounded-full text-white text-sm">
              <i class="far fa-calendar mr-2"></i><span id="daysCount"></span>
            </span>
            <span class="bg-white/20 backdrop-blur px-4 py-2 rounded-full text-white text-sm">
              <i class="fas fa-tag mr-2"></i><span id="priceRange"></span>
            </span>
            <span class="bg-white/20 backdrop-blur px-4 py-2 rounded-full text-white text-sm">
              <i class="fas fa-signal mr-2"></i><span id="difficulty"></span>
            </span>
          </div>
        </div>
        <div class="flex gap-3 mt-4 md:mt-0 no-print">
          <button onclick="useTemplate()" class="bg-gradient-to-r from-purple-600 to-blue-500 text-white px-8 py-3 rounded-full font-medium hover:opacity-90 transition shadow-lg">
            <i class="fas fa-rocket mr-2"></i>使用此模板
          </button>
          <button onclick="toggleFavorite()" id="favoriteBtn" class="w-12 h-12 bg-white/20 backdrop-blur rounded-full flex items-center justify-center text-white hover:bg-white hover:text-red-500 transition">
            <i class="far fa-heart text-xl"></i>
          </button>
          <button onclick="shareTemplate()" class="w-12 h-12 bg-white/20 backdrop-blur rounded-full flex items-center justify-center text-white hover:bg-white hover:text-purple-600 transition">
            <i class="fas fa-share-alt text-xl"></i>
          </button>
        </div>
      </div>
    </div>
  </section>

  <!-- Main Content -->
  <div class="container mx-auto px-4 py-8">
    <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
      <!-- Itinerary -->
      <div class="lg:col-span-2">
        <!-- Overview -->
        <div class="bg-white rounded-2xl shadow-lg p-6 mb-8">
          <h2 class="text-2xl font-bold mb-4 flex items-center">
            <i class="fas fa-info-circle text-purple-600 mr-3"></i>行程简介
          </h2>
          <p class="text-gray-600 mb-6" id="description"></p>
          
          <h3 class="font-bold text-lg mb-3">行程亮点</h3>
          <div class="flex flex-wrap gap-2 mb-6" id="highlights"></div>
          
          <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
            <div class="text-center p-4 bg-gray-50 rounded-xl">
              <i class="fas fa-clock text-purple-600 text-xl mb-2"></i>
              <div class="text-sm text-gray-500">最佳季节</div>
              <div class="font-medium" id="bestSeason"></div>
            </div>
            <div class="text-center p-4 bg-gray-50 rounded-xl">
              <i class="fas fa-signal text-blue-500 text-xl mb-2"></i>
              <div class="text-sm text-gray-500">难度</div>
              <div class="font-medium" id="difficultyDetail"></div>
            </div>
            <div class="text-center p-4 bg-gray-50 rounded-xl">
              <i class="fas fa-money-bill-wave text-green-500 text-xl mb-2"></i>
              <div class="text-sm text-gray-500">预算范围</div>
              <div class="font-medium" id="budgetRange"></div>
            </div>
            <div class="text-center p-4 bg-gray-50 rounded-xl">
              <i class="fas fa-map-marker-alt text-red-500 text-xl mb-2"></i>
              <div class="text-sm text-gray-500">目的地</div>
              <div class="font-medium" id="destinations"></div>
            </div>
          </div>
        </div>

        <!-- Daily Itinerary -->
        <div class="bg-white rounded-2xl shadow-lg p-6 mb-8">
          <h2 class="text-2xl font-bold mb-6 flex items-center">
            <i class="fas fa-calendar-alt text-purple-600 mr-3"></i>每日行程
          </h2>
          <div class="day-timeline" id="dailyItinerary"></div>
        </div>

        <!-- Tips -->
        <div class="bg-gradient-to-r from-purple-50 to-blue-50 rounded-2xl p-6">
          <h2 class="text-2xl font-bold mb-4 flex items-center">
            <i class="fas fa-lightbulb text-yellow-500 mr-3"></i>旅行贴士
          </h2>
          <ul class="space-y-3" id="tipsList"></ul>
        </div>
      </div>

      <!-- Sidebar -->
      <div class="lg:col-span-1">
        <!-- Quick Nav -->
        <div class="bg-white rounded-2xl shadow-lg p-6 mb-6 sticky-nav no-print">
          <h3 class="font-bold text-lg mb-4">行程概览</h3>
          <div class="space-y-2" id="dayNav"></div>
        </div>

        <!-- Accommodation -->
        <div class="bg-white rounded-2xl shadow-lg p-6 mb-6">
          <h3 class="font-bold text-lg mb-4 flex items-center">
            <i class="fas fa-bed text-purple-600 mr-2"></i>推荐住宿
          </h3>
          <div class="space-y-4" id="accommodations"></div>
        </div>

        <!-- Budget -->
        <div class="bg-white rounded-2xl shadow-lg p-6 mb-6">
          <h3 class="font-bold text-lg mb-4 flex items-center">
            <i class="fas fa-wallet text-green-600 mr-2"></i>预算参考
          </h3>
          <div class="text-center py-4 bg-purple-50 rounded-xl mb-4">
            <div class="text-sm text-gray-500">总预算</div>
            <div class="text-3xl font-bold text-purple-600" id="totalBudget"></div>
          </div>
          <div class="space-y-3" id="budgetBreakdown"></div>
        </div>

        <!-- CTA -->
        <div class="bg-gradient-to-br from-purple-600 to-blue-500 rounded-2xl p-6 text-white">
          <h3 class="font-bold text-lg mb-2">喜欢这个行程？</h3>
          <p class="text-purple-100 text-sm mb-4">一键使用模板，开始你的定制之旅</p>
          <button onclick="useTemplate()" class="w-full bg-white text-purple-600 py-3 rounded-xl font-medium hover:bg-purple-50 transition">
            <i class="fas fa-rocket mr-2"></i>使用此模板
          </button>
          <button onclick="window.print()" class="w-full mt-3 border-2 border-white text-white py-3 rounded-xl font-medium hover:bg-white/10 transition">
            <i class="fas fa-print mr-2"></i>打印行程
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- Share Modal -->
  <div id="shareModal" class="modal">
    <div class="bg-white rounded-2xl max-w-md w-full mx-4 p-8">
      <div class="flex justify-between items-center mb-6">
        <h3 class="text-xl font-bold">分享行程</h3>
        <button onclick="closeShareModal()" class="text-gray-400 hover:text-gray-600">
          <i class="fas fa-times text-xl"></i>
        </button>
      </div>
      <div class="space-y-4">
        <button onclick="shareTo('wechat')" class="w-full flex items-center p-4 bg-gray-50 rounded-xl hover:bg-gray-100 transition">
          <div class="w-12 h-12 bg-green-500 rounded-xl flex items-center justify-center mr-4">
            <i class="fab fa-weixin text-white text-xl"></i>
          </div>
          <div class="text-left">
            <div class="font-medium">微信分享</div>
            <div class="text-sm text-gray-500">分享到微信好友/朋友圈</div>
          </div>
        </button>
        <button onclick="shareTo('copy')" class="w-full flex items-center p-4 bg-gray-50 rounded-xl hover:bg-gray-100 transition">
          <div class="w-12 h-12 bg-purple-500 rounded-xl flex items-center justify-center mr-4">
            <i class="fas fa-link text-white text-xl"></i>
          </div>
          <div class="text-left">
            <div class="font-medium">复制链接</div>
            <div class="text-sm text-gray-500">复制行程链接</div>
          </div>
        </button>
      </div>
    </div>
  </div>

  <!-- Footer -->
  <footer class="bg-gray-800 text-white py-8 mt-12">
    <div class="container mx-auto px-4 text-center">
      <p>&copy; 2025 游导旅游 youdao-travel.com</p>
    </div>
  </footer>

  <script>
    let currentTemplate = null;
    let currentCountry = null;

    async function loadTemplate() {
      const urlParams = new URLSearchParams(window.location.search);
      const templateId = urlParams.get('id');
      
      if (!templateId) {
        window.location.href = 'index.html';
        return;
      }

      try {
        const response = await fetch('../data/templates.json');
        const data = await response.json();
        
        // Find template
        for (const country of data.countries) {
          const template = country.templates.find(t => t.id === templateId);
          if (template) {
            currentTemplate = template;
            currentCountry = country;
            renderTemplate();
            return;
          }
        }
        
        // Template not found
        window.location.href = 'index.html';
      } catch (error) {
        console.error('Error loading template:', error);
      }
    }

    function renderTemplate() {
      const t = currentTemplate;
      const c = currentCountry;

      // Hero section
      document.getElementById('heroImage').src = t.image;
      document.getElementById('templateTitle').textContent = t.title;
      document.getElementById('templateSubtitle').textContent = t.subtitle;
      document.getElementById('daysCount').textContent = `${t.days}天行程`;
      document.getElementById('priceRange').textContent = t.priceRange;
      document.getElementById('difficulty').textContent = t.difficulty;
      document.getElementById('countryLink').textContent = c.name;
      document.getElementById('countryLink').href = `${c.id}.html`;

      // Print header
      document.getElementById('printTitle').textContent = t.title;
      document.getElementById('printSubtitle').textContent = t.subtitle;

      // Overview
      document.getElementById('description').textContent = t.description;
      document.getElementById('highlights').innerHTML = t.highlights.map(h => 
        `<span class="bg-purple-100 text-purple-700 px-3 py-1 rounded-full text-sm">${h}</span>`
      ).join('');
      document.getElementById('bestSeason').textContent = t.bestSeason;
      document.getElementById('difficultyDetail').textContent = t.difficulty;
      document.getElementById('budgetRange').textContent = t.priceRange;
      document.getElementById('destinations').textContent = t.highlights.slice(0, 2).join(', ');

      // Day navigation
      const dayNav = document.getElementById('dayNav');
      dayNav.innerHTML = t.itinerary.map((day, i) => `
        <a href="#day-${day.day}" class="day-nav-btn block px-4 py-3 rounded-xl text-gray-600 hover:bg-purple-50 hover:text-purple-600 transition ${i === 0 ? 'active-day' : ''}" onclick="scrollToDay(${day.day})">
          <div class="flex items-center">
            <span class="w-8 h-8 ${i === 0 ? 'bg-white text-purple-600' : 'bg-purple-100 text-purple-600'} rounded-lg flex items-center justify-center font-bold text-sm mr-3">${day.day}</span>
            <div>
              <div class="font-medium text-sm">${day.title}</div>
              <div class="text-xs text-gray-400">${day.theme}</div>
            </div>
          </div>
        </a>
      `).join('');

      // Daily itinerary
      const dailyItinerary = document.getElementById('dailyItinerary');
      dailyItinerary.innerHTML = t.itinerary.map(day => `
        <div class="day-section bg-white rounded-2xl p-6 mb-6 shadow-lg" id="day-${day.day}">
          <div class="flex items-center mb-4">
            <div class="w-12 h-12 bg-gradient-to-br from-purple-600 to-blue-500 rounded-xl flex items-center justify-center text-white font-bold text-xl mr-4">
              ${day.day}
            </div>
            <div>
              <h3 class="text-xl font-bold">Day ${day.day}: ${day.title}</h3>
              <p class="text-gray-500 text-sm">${day.theme}</p>
            </div>
          </div>

          ${day.morning ? `
          <div class="time-block">
            <div class="bg-purple-50 rounded-xl p-4 mb-4">
              <div class="flex items-center text-purple-600 font-medium mb-2">
                <i class="fas fa-sun mr-2"></i>上午 ${day.morning.time}
              </div>
              <h4 class="font-bold text-lg mb-2">${day.morning.title}</h4>
              <p class="text-gray-600 text-sm mb-3">${day.morning.description}</p>
              <div class="flex flex-wrap gap-2 text-xs">
                ${day.morning.tips ? `<span class="bg-yellow-100 text-yellow-700 px-2 py-1 rounded"><i class="fas fa-lightbulb mr-1"></i>${day.morning.tips}</span>` : ''}
                ${day.morning.transportation ? `<span class="bg-blue-100 text-blue-700 px-2 py-1 rounded"><i class="fas fa-subway mr-1"></i>${day.morning.transportation}</span>` : ''}
              </div>
            </div>
          </div>
          ` : ''}

          ${day.lunch ? `
          <div class="meal-block">
            <div class="flex items-center text-amber-600 font-medium mb-2">
              <i class="fas fa-utensils mr-2"></i>午餐
              ${day.lunch.place ? `<span class="text-gray-400 font-normal ml-2">@ ${day.lunch.place}</span>` : ''}
            </div>
            <p class="text-gray-700">${day.lunch.recommendation}</p>
            <div class="text-sm text-gray-500 mt-1">预算: ${day.lunch.budget}</div>
          </div>
          ` : ''}

          ${day.afternoon ? `
          <div class="time-block">
            <div class="bg-blue-50 rounded-xl p-4 mb-4">
              <div class="flex items-center text-blue-600 font-medium mb-2">
                <i class="fas fa-cloud mr-2"></i>下午 ${day.afternoon.time}
              </div>
              <h4 class="font-bold text-lg mb-2">${day.afternoon.title}</h4>
              <p class="text-gray-600 text-sm mb-3">${day.afternoon.description}</p>
              <div class="flex flex-wrap gap-2 text-xs">
                ${day.afternoon.tips ? `<span class="bg-yellow-100 text-yellow-700 px-2 py-1 rounded"><i class="fas fa-lightbulb mr-1"></i>${day.afternoon.tips}</span>` : ''}
                ${day.afternoon.transportation ? `<span class="bg-blue-100 text-blue-700 px-2 py-1 rounded"><i class="fas fa-subway mr-1"></i>${day.afternoon.transportation}</span>` : ''}
              </div>
            </div>
          </div>
          ` : ''}

          ${day.dinner ? `
          <div class="meal-block">
            <div class="flex items-center text-amber-600 font-medium mb-2">
              <i class="fas fa-moon mr-2"></i>晚餐
              ${day.dinner.place ? `<span class="text-gray-400 font-normal ml-2">@ ${day.dinner.place}</span>` : ''}
            </div>
            <p class="text-gray-700">${day.dinner.recommendation}</p>
            <div class="text-sm text-gray-500 mt-1">预算: ${day.dinner.budget}</div>
          </div>
          ` : ''}

          ${day.evening ? `
          <div class="time-block">
            <div class="bg-indigo-50 rounded-xl p-4">
              <div class="flex items-center text-indigo-600 font-medium mb-2">
                <i class="fas fa-star mr-2"></i>晚间
              </div>
              <h4 class="font-bold text-lg mb-2">${day.evening.title}</h4>
              <p class="text-gray-600 text-sm mb-3">${day.evening.description}</p>
              ${day.evening.tips ? `<span class="bg-yellow-100 text-yellow-700 px-2 py-1 rounded text-xs"><i class="fas fa-lightbulb mr-1"></i>${day.evening.tips}</span>` : ''}
            </div>
          </div>
          ` : ''}
        </div>
      `).join('');

      // Tips
      document.getElementById('tipsList').innerHTML = t.tips.map(tip => `
        <li class="flex items-start">
          <i class="fas fa-check-circle text-green-500 mt-1 mr-3"></i>
          <span class="text-gray-600">${tip}</span>
        </li>
      `).join('');

      // Accommodations
      document.getElementById('accommodations').innerHTML = t.accommodations.map(acc => `
        <div class="flex items-start p-3 bg-gray-50 rounded-xl">
          <div class="w-10 h-10 bg-purple-100 rounded-lg flex items-center justify-center mr-3">
            <i class="fas fa-bed text-purple-600"></i>
          </div>
          <div class="flex-1">
            <div class="font-medium">${acc.name}</div>
            <div class="text-sm text-gray-500">${acc.location} · ${acc.type}</div>
            <div class="text-sm text-purple-600 font-medium">${acc.price}</div>
          </div>
        </div>
      `).join('');

      // Budget
      document.getElementById('totalBudget').textContent = t.budget.total;
      document.getElementById('budgetBreakdown').innerHTML = Object.entries(t.budget.breakdown).map(([key, value]) => `
        <div class="flex justify-between items-center py-2 border-b border-gray-100 last:border-0">
          <span class="text-gray-600 capitalize">${key === 'accommodation' ? '住宿' : key === 'food' ? '餐饮' : key === 'transportation' ? '交通' : key === 'attractions' ? '景点' : '购物'}</span>
          <span class="font-medium">¥${value}</span>
        </div>
      `).join('');
    }

    function scrollToDay(day) {
      const element = document.getElementById(`day-${day}`);
      if (element) {
        element.scrollIntoView({ behavior: 'smooth', block: 'start' });
      }
    }

    function toggleFavorite() {
      const btn = document.getElementById('favoriteBtn');
      const icon = btn.querySelector('i');
      icon.classList.toggle('far');
      icon.classList.toggle('fas');
      btn.classList.toggle('text-red-500');
    }

    function shareTemplate() {
      document.getElementById('shareModal').classList.add('active');
      document.body.style.overflow = 'hidden';
    }

    function closeShareModal() {
      document.getElementById('shareModal').classList.remove('active');
      document.body.style.overflow = '';
    }

    function shareTo(platform) {
      if (platform === 'copy') {
        navigator.clipboard.writeText(window.location.href);
        alert('链接已复制到剪贴板！');
      }
      closeShareModal();
    }

    function useTemplate() {
      alert('模板功能已准备就绪！\n\n点击"使用此模板"将进入行程定制页面，您可以：\n• 调整每日行程\n• 添加或删除景点\n• 修改时间安排\n• 调整预算\n\n该功能即将上线，敬请期待！');
    }

    function downloadPDF() {
      alert('PDF下载功能即将上线！\n\n您现在可以点击右上角的"打印"按钮，然后选择"保存为PDF"来获取行程文档。');
      window.print();
    }

    // Close modal on outside click
    document.getElementById('shareModal').addEventListener('click', (e) => {
      if (e.target.id === 'shareModal') closeShareModal();
    });

    // Scroll spy for day navigation
    window.addEventListener('scroll', () => {
      const sections = document.querySelectorAll('.day-section');
      const navBtns = document.querySelectorAll('.day-nav-btn');
      
      let current = '';
      sections.forEach(section => {
        const sectionTop = section.offsetTop;
        if (window.scrollY >= sectionTop - 200) {
          current = section.getAttribute('id');
        }
      });

      navBtns.forEach(btn => {
        btn.classList.remove('active-day');
        if (btn.getAttribute('href') === '#' + current) {
          btn.classList.add('active-day');
        }
      });
    });

    // Initialize
    loadTemplate();
  </script>
</body>
</html>
