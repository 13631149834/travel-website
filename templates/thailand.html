<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>泰国行程模板 - 游导旅游</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/tailwheel@2.2.19/dist/tailwind.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap');
    * { font-family: 'Noto Sans SC', -apple-system, BlinkMacSystemFont, sans-serif; }
    
    .hero-bg {
      background: linear-gradient(135deg, rgba(249, 115, 22, 0.9) 0%, rgba(234, 179, 8, 0.9) 100%),
                  url('https://images.unsplash.com/photo-1528181304800-259b08848526?w=1200') center/cover;
    }
    
    .card-hover { transition: all 0.3s ease; }
    .card-hover:hover { transform: translateY(-4px); box-shadow: 0 12px 24px rgba(0,0,0,0.15); }
  </style>
</head>
<body class="bg-gray-50">
  <!-- Header -->
  <header class="bg-white shadow-sm sticky top-0 z-50">
    <div class="container mx-auto px-4">
      <div class="flex items-center justify-between h-16">
        <a href="../index.html" class="flex items-center space-x-2">
          <div class="w-10 h-10 rounded-xl bg-gradient-to-br from-purple-600 to-blue-500 flex items-center justify-center">
            <i class="fas fa-compass text-white text-lg"></i>
          </div>
          <span class="text-xl font-bold bg-gradient-to-r from-purple-600 to-blue-500 bg-clip-text text-transparent">游导旅游</span>
        </a>
        <nav class="hidden md:flex items-center space-x-8">
          <a href="../index.html" class="text-gray-600 hover:text-purple-600 transition">首页</a>
          <a href="../destinations.html" class="text-gray-600 hover:text-purple-600 transition">目的地</a>
          <a href="index.html" class="text-purple-600 font-medium">行程模板</a>
        </nav>
        <button class="bg-gradient-to-r from-purple-600 to-blue-500 text-white px-4 py-2 rounded-lg">登录</button>
      </div>
    </div>
  </header>

  <!-- Hero -->
  <section class="hero-bg py-16">
    <div class="container mx-auto px-4">
      <div class="flex items-center mb-4">
        <a href="index.html" class="text-white hover:text-orange-200 transition flex items-center">
          <i class="fas fa-arrow-left mr-2"></i>返回模板库
        </a>
      </div>
      <div class="flex items-center mb-6">
        <span class="text-6xl mr-4">🇹🇭</span>
        <div>
          <h1 class="text-4xl font-bold text-white mb-2">泰国行程模板</h1>
          <p class="text-orange-100 text-lg">微笑国度的魅力</p>
        </div>
      </div>
      <div class="flex flex-wrap gap-4">
        <div class="bg-white bg-opacity-20 px-4 py-2 rounded-full text-white">
          <i class="fas fa-route mr-2"></i>3个精选模板
        </div>
        <div class="bg-white bg-opacity-20 px-4 py-2 rounded-full text-white">
          <i class="fas fa-clock mr-2"></i>3-5天行程
        </div>
      </div>
    </div>
  </section>

  <!-- Templates -->
  <section class="py-12">
    <div class="container mx-auto px-4">
      <div class="grid grid-cols-1 lg:grid-cols-3 gap-8" id="thailandTemplates"></div>
    </div>
  </section>

  <!-- Thailand Info -->
  <section class="py-16 bg-white">
    <div class="container mx-auto px-4">
      <h2 class="text-3xl font-bold text-center mb-12">泰国旅行实用信息</h2>
      <div class="grid grid-cols-1 md:grid-cols-4 gap-8">
        <div class="text-center p-6 bg-gray-50 rounded-2xl">
          <div class="w-16 h-16 bg-orange-100 rounded-full flex items-center justify-center mx-auto mb-4">
            <i class="fas fa-passport text-2xl text-orange-600"></i>
          </div>
          <h3 class="font-bold text-lg mb-2">签证信息</h3>
          <p class="text-gray-600 text-sm">落地签15天，旅游签证60天，可申请延期</p>
        </div>
        <div class="text-center p-6 bg-gray-50 rounded-2xl">
          <div class="w-16 h-16 bg-yellow-100 rounded-full flex items-center justify-center mx-auto mb-4">
            <i class="fas fa-sun text-2xl text-yellow-600"></i>
          </div>
          <h3 class="font-bold text-lg mb-2">最佳时间</h3>
          <p class="text-gray-600 text-sm">11月-次年2月凉爽季节，4月宋干节</p>
        </div>
        <div class="text-center p-6 bg-gray-50 rounded-2xl">
          <div class="w-16 h-16 bg-blue-100 rounded-full flex items-center justify-center mx-auto mb-4">
            <i class="fas fa-bolt text-2xl text-blue-600"></i>
          </div>
          <h3 class="font-bold text-lg mb-2">交通建议</h3>
          <p class="text-gray-600 text-sm">曼谷建议BTS/MRT，其他地区双条车或包车</p>
        </div>
        <div class="text-center p-6 bg-gray-50 rounded-2xl">
          <div class="w-16 h-16 bg-green-100 rounded-full flex items-center justify-center mx-auto mb-4">
            <i class="fas fa-coins text-2xl text-green-600"></i>
          </div>
          <h3 class="font-bold text-lg mb-2">货币兑换</h3>
          <p class="text-gray-600 text-sm">SuperRich汇率最佳，唐人街和兑换店比银行好</p>
        </div>
      </div>
    </div>
  </section>

  <!-- Related -->
  <section class="py-12 bg-gray-50">
    <div class="container mx-auto px-4">
      <h2 class="text-2xl font-bold mb-8">其他目的地模板</h2>
      <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
        <a href="japan.html" class="bg-white rounded-2xl p-6 flex items-center card-hover">
          <span class="text-4xl mr-4">🇯🇵</span>
          <div><h3 class="font-bold text-lg">日本</h3><p class="text-gray-500 text-sm">5个模板</p></div>
          <i class="fas fa-arrow-right ml-auto text-gray-400"></i>
        </a>
        <a href="korea.html" class="bg-white rounded-2xl p-6 flex items-center card-hover">
          <span class="text-4xl mr-4">🇰🇷</span>
          <div><h3 class="font-bold text-lg">韩国</h3><p class="text-gray-500 text-sm">3个模板</p></div>
          <i class="fas fa-arrow-right ml-auto text-gray-400"></i>
        </a>
        <a href="singapore.html" class="bg-white rounded-2xl p-6 flex items-center card-hover">
          <span class="text-4xl mr-4">🇸🇬</span>
          <div><h3 class="font-bold text-lg">新加坡</h3><p class="text-gray-500 text-sm">2个模板</p></div>
          <i class="fas fa-arrow-right ml-auto text-gray-400"></i>
        </a>
      </div>
    </div>
  </section>

  <footer class="bg-gray-800 text-white py-8 text-center">
    <p>&copy; 2025 游导旅游 youdao-travel.com</p>
  </footer>

  <script>
    async function loadTemplates() {
      try {
        const response = await fetch('../data/templates.json');
        const data = await response.json();
        const thailandData = data.countries.find(c => c.id === 'thailand');
        const container = document.getElementById('thailandTemplates');
        
        container.innerHTML = thailandData.templates.map(template => `
          <div class="bg-white rounded-2xl overflow-hidden shadow-lg card-hover">
            <div class="relative h-48 overflow-hidden">
              <img src="${template.image}" alt="${template.title}" class="w-full h-full object-cover" onerror="this.src='https://via.placeholder.com/600x400/f97316/ffffff?text=${encodeURIComponent(template.title)}'">
              <div class="absolute inset-0 bg-gradient-to-t from-black/60 to-transparent"></div>
              <div class="absolute bottom-4 left-4">
                <h3 class="text-xl font-bold text-white">${template.title}</h3>
                <p class="text-white/80 text-sm">${template.subtitle}</p>
              </div>
            </div>
            <div class="p-6">
              <p class="text-gray-600 text-sm mb-4 line-clamp-2">${template.description}</p>
              <div class="flex flex-wrap gap-2 mb-4">
                ${template.highlights.slice(0, 3).map(h => `<span class="text-xs bg-orange-50 text-orange-600 px-2 py-1 rounded">${h}</span>`).join('')}
              </div>
              <div class="flex items-center justify-between text-sm text-gray-500 mb-4">
                <span><i class="far fa-calendar mr-1"></i>${template.days}天</span>
                <span><i class="fas fa-signal mr-1"></i>${template.difficulty}</span>
              </div>
              <div class="flex items-center justify-between pt-4 border-t border-gray-100">
                <span class="text-lg font-bold text-orange-600">${template.priceRange}</span>
                <a href="detail.html?id=${template.id}" class="bg-gradient-to-r from-orange-500 to-amber-500 text-white px-5 py-2 rounded-full text-sm font-medium hover:opacity-90 transition">
                  查看详情 <i class="fas fa-arrow-right ml-1"></i>
                </a>
              </div>
            </div>
          </div>
        `).join('');
      } catch (error) {
        console.error('Error:', error);
      }
    }
    loadTemplates();
  </script>
</body>
</html>
