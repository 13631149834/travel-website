<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>新加坡行程模板 - 游导旅游</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap');
    * { font-family: 'Noto Sans SC', -apple-system, BlinkMacSystemFont, sans-serif; }
    
    .hero-bg {
      background: linear-gradient(135deg, rgba(14, 165, 233, 0.9) 0%, rgba(20, 184, 166, 0.9) 100%),
                  url('https://images.unsplash.com/photo-1525625293386-3f8f99389edd?w=1200') center/cover;
    }
    
    .card-hover { transition: all 0.3s ease; }
    .card-hover:hover { transform: translateY(-4px); box-shadow: 0 12px 24px rgba(0,0,0,0.15); }
  </style>
</head>
<body class="bg-gray-50">
  <!-- Header -->
  <header class="bg-white shadow-sm sticky top-0 z-50">
    <div class="container mx-auto px-4">
      <div class="flex items-center justify-between h-16">
        <a href="../index.html" class="flex items-center space-x-2">
          <div class="w-10 h-10 rounded-xl bg-gradient-to-br from-purple-600 to-blue-500 flex items-center justify-center">
            <i class="fas fa-compass text-white text-lg"></i>
          </div>
          <span class="text-xl font-bold bg-gradient-to-r from-purple-600 to-blue-500 bg-clip-text text-transparent">游导旅游</span>
        </a>
        <nav class="hidden md:flex items-center space-x-8">
          <a href="../index.html" class="text-gray-600 hover:text-purple-600 transition">首页</a>
          <a href="../destinations.html" class="text-gray-600 hover:text-purple-600 transition">目的地</a>
          <a href="index.html" class="text-purple-600 font-medium">行程模板</a>
        </nav>
        <button class="bg-gradient-to-r from-purple-600 to-blue-500 text-white px-4 py-2 rounded-lg">登录</button>
      </div>
    </div>
  </header>

  <!-- Hero -->
  <section class="hero-bg py-16">
    <div class="container mx-auto px-4">
      <div class="flex items-center mb-4">
        <a href="index.html" class="text-white hover:text-cyan-200 transition flex items-center">
          <i class="fas fa-arrow-left mr-2"></i>返回模板库
        </a>
      </div>
      <div class="flex items-center mb-6">
        <span class="text-6xl mr-4">🇸🇬</span>
        <div>
          <h1 class="text-4xl font-bold text-white mb-2">新加坡行程模板</h1>
          <p class="text-cyan-100 text-lg">花园城市的魅力</p>
        </div>
      </div>
      <div class="flex flex-wrap gap-4">
        <div class="bg-white bg-opacity-20 px-4 py-2 rounded-full text-white">
          <i class="fas fa-route mr-2"></i>2个精选模板
        </div>
        <div class="bg-white bg-opacity-20 px-4 py-2 rounded-full text-white">
          <i class="fas fa-clock mr-2"></i>3-5天行程
        </div>
      </div>
    </div>
  </section>

  <!-- Templates -->
  <section class="py-12">
    <div class="container mx-auto px-4">
      <div class="grid grid-cols-1 lg:grid-cols-2 gap-8" id="singaporeTemplates"></div>
    </div>
  </section>

  <!-- Singapore Info -->
  <section class="py-16 bg-white">
    <div class="container mx-auto px-4">
      <h2 class="text-3xl font-bold text-center mb-12">新加坡旅行实用信息</h2>
      <div class="grid grid-cols-1 md:grid-cols-4 gap-8">
        <div class="text-center p-6 bg-gray-50 rounded-2xl">
          <div class="w-16 h-16 bg-cyan-100 rounded-full flex items-center justify-center mx-auto mb-4">
            <i class="fas fa-passport text-2xl text-cyan-600"></i>
          </div>
          <h3 class="font-bold text-lg mb-2">签证信息</h3>
          <p class="text-gray-600 text-sm">需办理新加坡旅游签证，有效期35天-2年不等</p>
        </div>
        <div class="text-center p-6 bg-gray-50 rounded-2xl">
          <div class="w-16 h-16 bg-teal-100 rounded-full flex items-center justify-center mx-auto mb-4">
            <i class="fas fa-cloud-sun text-2xl text-teal-600"></i>
          </div>
          <h3 class="font-bold text-lg mb-2">最佳时间</h3>
          <p class="text-gray-600 text-sm">全年适合旅游，6-8月可能有热浪</p>
        </div>
        <div class="text-center p-6 bg-gray-50 rounded-2xl">
          <div class="w-16 h-16 bg-blue-100 rounded-full flex items-center justify-center mx-auto mb-4">
            <i class="fas fa-train text-2xl text-blue-600"></i>
          </div>
          <h3 class="font-bold text-lg mb-2">交通建议</h3>
          <p class="text-gray-600 text-sm">EZ-Link交通卡必备，地铁和公交覆盖全面</p>
        </div>
        <div class="text-center p-6 bg-gray-50 rounded-2xl">
          <div class="w-16 h-16 bg-green-100 rounded-full flex items-center justify-center mx-auto mb-4">
            <i class="fas fa-receipt text-2xl text-green-600"></i>
          </div>
          <h3 class="font-bold text-lg mb-2">消费税退税</h3>
          <p class="text-gray-600 text-sm">消费满100新币可申请7%消费税退税</p>
        </div>
      </div>
    </div>
  </section>

  <!-- Related -->
  <section class="py-12 bg-gray-50">
    <div class="container mx-auto px-4">
      <h2 class="text-2xl font-bold mb-8">其他目的地模板</h2>
      <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
        <a href="japan.html" class="bg-white rounded-2xl p-6 flex items-center card-hover">
          <span class="text-4xl mr-4">🇯🇵</span>
          <div><h3 class="font-bold text-lg">日本</h3><p class="text-gray-500 text-sm">5个模板</p></div>
          <i class="fas fa-arrow-right ml-auto text-gray-400"></i>
        </a>
        <a href="korea.html" class="bg-white rounded-2xl p-6 flex items-center card-hover">
          <span class="text-4xl mr-4">🇰🇷</span>
          <div><h3 class="font-bold text-lg">韩国</h3><p class="text-gray-500 text-sm">3个模板</p></div>
          <i class="fas fa-arrow-right ml-auto text-gray-400"></i>
        </a>
        <a href="thailand.html" class="bg-white rounded-2xl p-6 flex items-center card-hover">
          <span class="text-4xl mr-4">🇹🇭</span>
          <div><h3 class="font-bold text-lg">泰国</h3><p class="text-gray-500 text-sm">3个模板</p></div>
          <i class="fas fa-arrow-right ml-auto text-gray-400"></i>
        </a>
      </div>
    </div>
  </section>

  <footer class="bg-gray-800 text-white py-8 text-center">
    <p>&copy; 2025 游导旅游 youdao-travel.com</p>
  </footer>

  <script>
    async function loadTemplates() {
      try {
        const response = await fetch('../data/templates.json');
        const data = await response.json();
        const singaporeData = data.countries.find(c => c.id === 'singapore');
        const container = document.getElementById('singaporeTemplates');
        
        container.innerHTML = singaporeData.templates.map(template => `
          <div class="bg-white rounded-2xl overflow-hidden shadow-lg card-hover">
            <div class="relative h-56 overflow-hidden">
              <img src="${template.image}" alt="${template.title}" class="w-full h-full object-cover" onerror="this.src='https://via.placeholder.com/600x400/0ea5e9/ffffff?text=${encodeURIComponent(template.title)}'">
              <div class="absolute inset-0 bg-gradient-to-t from-black/60 to-transparent"></div>
              <div class="absolute bottom-4 left-4">
                <span class="bg-white/90 px-3 py-1 rounded-full text-sm font-medium text-cyan-600 inline-block mb-2">
                  ${template.days}天行程
                </span>
                <h3 class="text-2xl font-bold text-white">${template.title}</h3>
                <p class="text-white/80">${template.subtitle}</p>
              </div>
            </div>
            <div class="p-6">
              <p class="text-gray-600 mb-4">${template.description}</p>
              <div class="flex flex-wrap gap-2 mb-4">
                ${template.highlights.map(h => `<span class="text-xs bg-cyan-50 text-cyan-600 px-2 py-1 rounded">${h}</span>`).join('')}
              </div>
              <div class="grid grid-cols-2 gap-4 mb-4 text-sm">
                <div class="flex items-center text-gray-500">
                  <i class="far fa-calendar mr-2 text-cyan-600"></i>${template.bestSeason}
                </div>
                <div class="flex items-center text-gray-500">
                  <i class="fas fa-signal mr-2 text-cyan-600"></i>${template.difficulty}
                </div>
              </div>
              <div class="flex items-center justify-between pt-4 border-t border-gray-100">
                <div>
                  <span class="text-2xl font-bold text-cyan-600">${template.priceRange.split('-')[0]}</span>
                  <span class="text-gray-400 text-sm">起</span>
                </div>
                <a href="detail.html?id=${template.id}" class="bg-gradient-to-r from-cyan-500 to-teal-500 text-white px-6 py-2 rounded-full text-sm font-medium hover:opacity-90 transition">
                  查看详情 <i class="fas fa-arrow-right ml-1"></i>
                </a>
              </div>
            </div>
          </div>
        `).join('');
      } catch (error) {
        console.error('Error:', error);
      }
    }
    loadTemplates();
  </script>
</body>
</html>
