  <style>
    /* 页面特定样式 */
    .page-header {
      background: linear-gradient(135deg, #4F86F7 0%, #10B981 100%);
      color: white;
      padding: 48px 0;
      text-align: center;
    }
    .page-header h1 {
      font-size: 2rem;
      margin-bottom: 8px;
    }
    .page-header p {
      opacity: 0.9;
      font-size: 1rem;
    }
    
    /* 工具栏 */
    .translator-toolbar {
      background: white;
      padding: 24px 0;
      border-bottom: 1px solid var(--gray-200);
      position: sticky;
      top: 64px;
      z-index: 90;
    }
    .lang-selector {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      justify-content: center;
    }
    .lang-btn {
      padding: 10px 20px;
      border: 2px solid var(--gray-200);
      border-radius: 24px;
      background: white;
      color: var(--gray-600);
      font-size: 0.9rem;
      cursor: pointer;
      transition: all 0.2s;
    }
    .lang-btn:hover {
      border-color: var(--primary);
      color: var(--primary);
    }
    .lang-btn.active {
      background: var(--primary);
      border-color: var(--primary);
      color: white;
    }
    
    /* 分类标签 */
    .category-tabs {
      display: flex;
      gap: 8px;
      padding: 24px 0;
      overflow-x: auto;
      scrollbar-width: none;
    }
    .category-tabs::-webkit-scrollbar {
      display: none;
    }
    .category-tab {
      padding: 10px 20px;
      border-radius: var(--radius);
      background: var(--gray-100);
      color: var(--gray-600);
      font-size: 0.9rem;
      white-space: nowrap;
      cursor: pointer;
      transition: all 0.2s;
      border: 1px solid transparent;
    }
    .category-tab:hover {
      background: var(--primary-light);
      color: var(--primary);
    }
    .category-tab.active {
      background: var(--primary);
      color: white;
    }
    
    /* 短语卡片 */
    .phrase-list {
      display: grid;
      gap: 16px;
      padding-bottom: 48px;
    }
    .phrase-card {
      background: white;
      border-radius: var(--radius-md);
      padding: 20px;
      box-shadow: var(--shadow-sm);
      border: 1px solid var(--gray-200);
      transition: all 0.2s;
    }
    .phrase-card:hover {
      box-shadow: var(--shadow-md);
      border-color: var(--primary-light);
    }
    .phrase-original {
      font-size: 1.1rem;
      font-weight: 600;
      color: var(--gray-900);
      margin-bottom: 16px;
    }
    .phrase-translations {
      display: grid;
      gap: 12px;
    }
    .translation-item {
      display: grid;
      grid-template-columns: 60px 1fr auto;
      gap: 12px;
      align-items: center;
      padding: 12px;
      background: var(--gray-50);
      border-radius: var(--radius);
    }
    .lang-tag {
      font-size: 0.75rem;
      font-weight: 600;
      padding: 4px 10px;
      border-radius: 12px;
      text-align: center;
    }
    .lang-tag.en { background: #E3F2FD; color: #1565C0; }
    .lang-tag.ja { background: #FCE4EC; color: #C2185B; }
    .lang-tag.ko { background: #E8F5E9; color: #2E7D32; }
    .lang-tag.th { background: #FFF3E0; color: #E65100; }
    .lang-tag.fr { background: #F3E5F5; color: #7B1FA2; }
    
    .translation-text {
      font-size: 0.95rem;
      color: var(--gray-800);
    }
    .pronunciation {
      font-size: 0.8rem;
      color: var(--gray-500);
      font-style: italic;
    }
    .copy-btn {
      padding: 6px 12px;
      border: none;
      border-radius: var(--radius);
      background: var(--primary-light);
      color: var(--primary);
      font-size: 0.8rem;
      cursor: pointer;
      transition: all 0.2s;
    }
    .copy-btn:hover {
      background: var(--primary);
      color: white;
    }
    .copy-btn.copied {
      background: var(--secondary);
      color: white;
    }
    
    /* 搜索框 */
    .search-box {
      max-width: 500px;
      margin: 0 auto 24px;
    }
    .search-box input {
      width: 100%;
      padding: 12px 20px;
      border: 2px solid var(--gray-200);
      border-radius: 24px;
      font-size: 1rem;
      outline: none;
      transition: border-color 0.2s;
    }
    .search-box input:focus {
      border-color: var(--primary);
    }
    
    /* 空状态 */
    .empty-state {
      text-align: center;
      padding: 48px 24px;
      color: var(--gray-500);
    }
    .empty-state .icon {
      font-size: 3rem;
      margin-bottom: 16px;
    }
    
    /* 响应式 */
    @media (max-width: 768px) {
      .page-header {
        padding: 32px 0;
      }
      .page-header h1 {
        font-size: 1.5rem;
      }
      .lang-btn {
        padding: 8px 16px;
        font-size: 0.85rem;
      }
      .translation-item {
        grid-template-columns: 50px 1fr;
        gap: 8px;
      }
      .pronunciation {
        grid-column: 2;
      }
      .copy-btn {
        grid-column: 2;
        justify-self: start;
      }
    }
  
/* 无障碍 - 焦点可见样式 (WCAG 2.1 AA) */
.skip-link {
  position: absolute;
  top: -100px;
  left: 50%;
  transform: translateX(-50%);
  background: var(--primary);
  color: #fff !important;
  padding: 12px 24px;
  border-radius: 0 0 8px 8px;
  z-index: 10000;
  font-weight: 600;
  transition: top 0.2s;
}
.skip-link:focus {
  top: 0;
  outline: 3px solid var(--primary-dark);
  outline-offset: 2px;
}

/* 全局焦点样式 */
:focus {
  outline: 3px solid var(--primary);
  outline-offset: 2px;
}
:focus:not(:focus-visible) {
  outline: none;
}
:focus-visible {
  outline: 3px solid var(--primary);
  outline-offset: 2px;
}

/* 链接焦点样式 */
a:focus,
button:focus,
[tabindex]:focus {
  outline: 3px solid var(--primary);
  outline-offset: 2px;
  border-radius: 2px;
}

/* 输入框焦点 */
input:focus,
textarea:focus,
select:focus {
  outline: 3px solid var(--primary);
  outline-offset: 0;
  border-color: var(--primary);
}

.sr-only {

}

    // 当前状态

    let searchQuery = '';

    // DOM元素
    const phraseList = document.getElementById('phraseList');
    const emptyState = document.getElementById('emptyState');
    const searchInput = document.getElementById('searchInput');

    // 渲染短语列表
    function renderPhrases() {
      const filtered = phrases.filter(phrase => {
        const matchCategory = currentCategory === 'all' || phrase.category === currentCategory;
        const matchSearch = searchQuery === '' || 
          phrase.original.toLowerCase().includes(searchQuery) ||
          phrase.translations[currentLang].text.toLowerCase().includes(searchQuery);
        return matchCategory && matchSearch;
      });

      if (filtered.length === 0) {
        phraseList.innerHTML = '';
        emptyState.style.display = 'block';
        return;
      }

      emptyState.style.display = 'none';
      phraseList.innerHTML = filtered.map(phrase => `
        <div class="phrase-card" data-id="${phrase.id}">
          <div class="phrase-original">${phrase.original}</div>
          <div class="phrase-translations">
            ${['en', 'ja', 'ko', 'th', 'fr'].map(lang => {
              const t = phrase.translations[lang];
              const langNames = { en: '英语', ja: '日语', ko: '韩语', th: '泰语', fr: '法语' };
              const langFlags = { en: '🇬🇧', ja: '🇯🇵', ko: '🇰🇷', th: '🇹🇭', fr: '🇫🇷' };
              return `
                <div class="translation-item">
                  <span class="lang-tag ${lang}">${langFlags[lang]}</span>
                  <div>
                    <div class="translation-text">${t.text}</div>
                    <div class="pronunciation">${t.pron}</div>
                  </div>
                  <button class="copy-btn" data-text="${t.text}">复制</button>
                </div>
              `;
            }).join('')}
          </div>
        </div>
      `).join('');

      // 绑定复制按钮事件
      document.querySelectorAll('.copy-btn').forEach(btn => {
        btn.addEventListener('click', async () => {
          const text = btn.dataset.text;
          await navigator.clipboard.writeText(text);
          btn.textContent = '已复制';
          btn.classList.add('copied');
          setTimeout(() => {
            btn.textContent = '复制';
            btn.classList.remove('copied');
          }, 1500);
        });
      });
    }

    // 语言切换
    document.querySelectorAll('.lang-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentLang = btn.dataset.lang;
        renderPhrases();
      });
    });

    // 分类切换
    document.querySelectorAll('.category-tab').forEach(tab => {
      tab.addEventListener('click', () => {
        document.querySelectorAll('.category-tab').forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
        currentCategory = tab.dataset.category;
        renderPhrases();
      });
    });

    // 搜索
    searchInput.addEventListener('input', (e) => {
      searchQuery = e.target.value.toLowerCase();
      renderPhrases();
