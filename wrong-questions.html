.wrong-hero{text-align:center;padding:30px 20px 20px;background:linear-gradient(135deg,#FFF8E1,#FFE082);margin:-20px -20px 20px;border-radius:0 0 20px 20px}

.wrong-item .q-explain{font-size:.8rem;color:#666;margin-top:6px;padding:6px 12px;background:#FFF8E1;border-radius:6px}

.btn-master{background:#4CAF50;color:#fff}

.quiz-feedback.show{display:block}

.quiz-nav{display:flex;justify-content:center;gap:12px;margin:20px 0}

@media(max-width:600px){.wrong-stats{gap:8px}.wrong-stat{min-width:60px;padding:8px 10px}.wrong-stat .num{font-size:1.2rem}}

<script>
let allWrong=[],currentFilter='all',currentRedoFilter='all',redoQuestions=[],redoIdx=0,redoCorrect=0,redoAnswered=false;

function loadWrong(){
  try{allWrong=JSON.parse(localStorage.getItem('wrongQuestions')||'[]')}catch(e){allWrong=[]}
  updateStats();renderList();
}

function updateStats(){
  document.getElementById('totalCount').textContent=allWrong.length;
  const counts={business:0,policy:0,national:0,local:0};
  allWrong.forEach(w=>{if(counts.hasOwnProperty(w.subject))counts[w.subject]++});
  document.getElementById('businessCount').textContent=counts.business;
  document.getElementById('policyCount').textContent=counts.policy;
  document.getElementById('nationalCount').textContent=counts.national;
  document.getElementById('localCount').textContent=counts.local;
  document.getElementById('redoSection').style.display=allWrong.length>0?'block':'none';
  document.getElementById('emptyState').style.display=allWrong.length===0?'block':'none';
  document.getElementById('subjectFilter').style.display=allWrong.length>0?'flex':'none';
}

function renderList(){
  const filtered=currentFilter==='all'?allWrong:allWrong.filter(w=>w.subject===currentFilter);
  const listEl=document.getElementById('wrongList');
  if(filtered.length===0){
    listEl.innerHTML='<div style="text-align:center;padding:20px;color:#999;font-size:.9rem">'+(currentFilter==='all'?'暂无错题':'该科目暂无错题')+'</div>';
    return;
  }
  let html='';
  filtered.forEach((w,i)=>{
    const origIdx=allWrong.indexOf(w);
    html+='<div class="wrong-item'+(w.mastered?' mastered':'')+'">';
    html+='<div class="q-subject">'+getSubjectLabel(w.subject)+'</div>';
    html+='<div class="q-text">'+w.question+'</div>';
    if(w.correctAnswer)html+='<div class="q-answer">✅ 正确答案：'+w.correctAnswer+'</div>';
    if(w.explanation)html+='<div class="q-explain">💡 '+w.explanation+'</div>';
    html+='<div class="q-actions">';
    html+='<button class="btn-small btn-master" onclick="markMastered('+origIdx+')">'+(w.mastered?'已掌握':'✅ 标记已掌握')+'</button>';
    html+='<button class="btn-small btn-del" onclick="deleteWrong('+origIdx+')">🗑️ 删除</button>';
    html+='</div></div>';
  });
  listEl.innerHTML=html;
}

function getSubjectLabel(s){
  const map={business:'💼 导游业务',policy:'⚖️ 政策法规',national:'📚 全国导基',local:'🗺️ 地方导基',interview:'🎤 面试'};
  return map[s]||s;
}

function filterSubject(s){
  currentFilter=s;
  document.querySelectorAll('#subjectFilter button').forEach(b=>b.classList.remove('active'));
  event.target.classList.add('active');
  renderList();
}

function markMastered(idx){
  allWrong[idx].mastered=!allWrong[idx].mastered;
  saveWrong();updateStats();renderList();
  // 检查成就
  if(allWrong.every(w=>w.mastered)&&allWrong.length>0){
    try{const a=JSON.parse(localStorage.getItem('youdao_achievements')||'{}');if(!a.wrong_clear){a.wrong_clear={date:new Date().toISOString()};localStorage.setItem('youdao_achievements',JSON.stringify(a))}}catch(e){}
  }
}

function deleteWrong(idx){
  allWrong.splice(idx,1);
  saveWrong();updateStats();renderList();
}

function clearAllWrong(){
  if(!confirm('确定清空所有错题？此操作不可恢复！'))return;
  allWrong=[];
  saveWrong();updateStats();renderList();
}

function saveWrong(){
  localStorage.setItem('wrongQuestions',JSON.stringify(allWrong));
}

// ===== 重做模式 =====
function startRedo(filter){
  currentRedoFilter=filter;
  redoQuestions=filter==='all'?[...allWrong]:allWrong.filter(w=>w.subject===filter);
  if(redoQuestions.length===0){alert('该科目没有错题');return}
  // 洗牌
  for(let i=redoQuestions.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[redoQuestions[i],redoQuestions[j]]=[redoQuestions[j],redoQuestions[i]]}
  redoIdx=0;redoCorrect=0;redoAnswered=false;
  document.getElementById('browseMode').style.display='none';
  document.getElementById('redoMode').style.display='block';
  document.getElementById('redoResult').style.display='none';
  showRedoQ();
}

function showRedoQ(){
  if(redoIdx>=redoQuestions.length){showRedoResult();return}
  const q=redoQuestions[redoIdx];
  document.getElementById('redoProgress').textContent='第 '+(redoIdx+1)+' 题 / 共 '+redoQuestions.length+' 题';
  document.getElementById('redoScore').textContent='正确: '+redoCorrect;
  
  let html='<div class="quiz-card">';
  html+='<div class="q-num">'+getSubjectLabel(q.subject)+'</div>';
  html+='<div class="q-text">'+q.question+'</div>';
  if(q.options&&q.options.length>0){
    q.options.forEach((opt,i)=>{
      html+='<div class="quiz-option" id="redoOpt'+i+'" onclick="selectRedoAnswer('+i+')">'+opt+'</div>';
    });
  }else{
    // 判断题
    html+='<div class="quiz-option" id="redoOpt0" onclick="selectRedoAnswer(0)">A 正确</div>';
    html+='<div class="quiz-option" id="redoOpt1" onclick="selectRedoAnswer(1)">B 错误</div>';
  }
  html+='<div class="quiz-feedback" id="redoFeedback"></div>';
  html+='</div>';
  
  document.getElementById('redoCard').innerHTML=html;
  document.getElementById('redoNav').style.display='none';
  redoAnswered=false;
}

function selectRedoAnswer(idx){
  if(redoAnswered)return;
  redoAnswered=true;
  const q=redoQuestions[redoIdx];
  let isCorrect=false;
  
  if(q.options&&q.options.length>0){
    const correctIdx=q.options.findIndex(o=>o.startsWith(q.correctAnswer));
    isCorrect=(idx===correctIdx)||(q.options[idx]&&q.options[idx].startsWith(q.correctAnswer));
  }else{
    // 判断题
    isCorrect=(q.correctAnswer==='正确'&&idx===0)||(q.correctAnswer==='错误'&&idx===1);
  }
  
  // 标记选中
  const selectedEl=document.getElementById('redoOpt'+idx);
  if(selectedEl)selectedEl.classList.add('selected');
  
  // 标记正确答案
  if(q.options&&q.options.length>0){
    const correctIdx=q.options.findIndex(o=>o.startsWith(q.correctAnswer));
    if(correctIdx>=0){
      document.getElementById('redoOpt'+correctIdx).classList.add('correct');
      if(idx!==correctIdx)selectedEl.classList.add('wrong');
    }
  }else{
    const correctIdx=(q.correctAnswer==='正确')?0:1;
    document.getElementById('redoOpt'+correctIdx).classList.add('correct');
    if(idx!==correctIdx)selectedEl.classList.add('wrong');
  }
  
  const fb=document.getElementById('redoFeedback');
  if(isCorrect){
    redoCorrect++;
    fb.className='quiz-feedback show correct-fb';
    fb.innerHTML='✅ 正确！'+(q.explanation?'<br>💡 '+q.explanation:'');
  }else{
    fb.className='quiz-feedback show wrong-fb';
    fb.innerHTML='❌ 正确答案是：'+q.correctAnswer+(q.explanation?'<br>💡 '+q.explanation:'');
  }
  
  document.getElementById('redoScore').textContent='正确: '+redoCorrect;
  document.getElementById('redoNav').style.display='flex';
  document.getElementById('redoNav').querySelector('button').textContent=redoIdx===redoQuestions.length-1?'查看结果 →':'下一题 →';
}

function nextRedoQ(){
  redoIdx++;
  if(redoIdx>=redoQuestions.length){showRedoResult();return}
  showRedoQ();
}

function showRedoResult(){
  document.getElementById('redoCard').innerHTML='';
  document.getElementById('redoNav').style.display='none';
  document.getElementById('redoResult').style.display='block';
  
  const rate=Math.round(redoCorrect/redoQuestions.length*100);
  let html='<div style="display:flex;gap:30px;justify-content:center;margin:20px 0">';
  html+='<div style="text-align:center"><div style="font-size:2rem;font-weight:bold;color:#4CAF50">'+redoCorrect+'</div><div style="font-size:.8rem;color:#888">✅ 答对</div></div>';
  html+='<div style="text-align:center"><div style="font-size:2rem;font-weight:bold;color:#F44336">'+(redoQuestions.length-redoCorrect)+'</div><div style="font-size:.8rem;color:#888">❌ 仍错</div></div>';
  html+='<div style="text-align:center"><div style="font-size:2rem;font-weight:bold;color:#E65100">'+rate+'%</div><div style="font-size:.8rem;color:#888">正确率</div></div>';
  html+='</div>';
  
  let advice='';
  if(rate>=90)advice='🎉 太棒了！这些错题基本掌握了，继续保持！';
  else if(rate>=70)advice='💪 进步很大！还差一点，再做一遍把剩下的也搞定。';
  else if(rate>=50)advice='🔥 有进步！建议回顾一下知识点，再来一轮重做。';
  else advice='📚 还需要加油！建议先回知识库重新学一遍，再回来做题。';
  html+='<div style="background:#FFF3E0;border-radius:12px;padding:14px;font-size:.9rem;color:#E65100">'+advice+'</div>';
  
  document.getElementById('redoResultContent').innerHTML=html;
  
  // 更新错题本 - 重做正确的可以标记为mastered
  // 不自动删除，让用户决定
}

function exitRedo(){
  document.getElementById('browseMode').style.display='block';
  document.getElementById('redoMode').style.display='none';
  loadWrong();
}

// 初始化
loadWrong();
</script>

    document.body.style.transition='opacity 0.15s ease';

    setTimeout(function(){location.href=href;},150);
  });
})();
</script>
