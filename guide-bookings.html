    }

    <div class="container nav-container">

      <div class="nav-links">

    </div>

  <!-- 导游子导航 -->
  <div class="guide-subnav">
    <div class="container">
      <div class="subnav-tabs">
        <a href="guide-dashboard.html" class="subnav-tab">
          <span class="tab-icon" aria-hidden="true">📊</span>
          <span>工作台</span>
        </a>
        <a href="guide-calendar.html" class="subnav-tab">
          <span class="tab-icon" aria-hidden="true">📅</span>

        <a href="guide-bookings.html" class="subnav-tab active">

  <!-- 主内容 -->
  <main class="guide-main">
    <div class="container">
      <!-- 页面标题 -->
      <div class="page-header">
        <h1>📋 预约管理</h1>
        <div class="header-stats">
          <div class="stat-badge pending">
            <span class="stat-num" id="pending-count">2</span>
            <span class="stat-label">待确认</span>
          </div>
          <div class="stat-badge confirmed">
            <span class="stat-num" id="confirmed-count">2</span>
            <span class="stat-label">已确认</span>
          </div>
          <div class="stat-badge completed">
            <span class="stat-num" id="completed-count">2</span>
            <span class="stat-label">已完成</span>
          </div>
        </div>
      </div>

      <!-- 标签页切换 -->
      <div class="booking-tabs">
        <button class="booking-tab active" data-tab="pending">
          <span class="tab-icon">⏳</span>
          待确认
          <span class="tab-count" id="pending-tab-count">2</span>
        </button>
        <button class="booking-tab" data-tab="confirmed">
          <span class="tab-icon" aria-hidden="true">✅</span>
          已确认
          <span class="tab-count" id="confirmed-tab-count">2</span>
        </button>
        <button class="booking-tab" data-tab="completed">
          <span class="tab-icon" aria-hidden="true">📝</span>
          历史记录
          <span class="tab-count" id="completed-tab-count">2</span>
        </button>
      </div>

      <!-- 待确认预约 -->
      <div id="pending-panel" class="booking-panel active">
        <div id="pending-bookings" class="bookings-list">
          <!-- 由JS渲染 -->
        </div>
      </div>

      <!-- 已确认预约 -->
      <div id="confirmed-panel" class="booking-panel">
        <div id="confirmed-bookings" class="bookings-list">
          <!-- 由JS渲染 -->
        </div>
      </div>

      <!-- 历史记录 -->
      <div id="completed-panel" class="booking-panel">
        <div class="filter-bar">
          <select id="completed-filter" class="filter-select">
            <option value="all">全部评价</option>
            <option value="5">5星</option>
            <option value="4">4星及以上</option>
            <option value="3">3星及以上</option>
          </select>
          <select id="completed-sort" class="filter-select">
            <option value="date-desc">最新优先</option>
            <option value="date-asc">最早优先</option>
            <option value="rating-desc">评分最高</option>
          </select>
        </div>
        <div id="completed-bookings" class="bookings-list">
          <!-- 由JS渲染 -->
        </div>
      </div>
    </div>
  </main>

  <!-- 预约详情模态框 -->
  <div id="booking-detail-modal" class="modal">
    <div class="modal-overlay"></div>
    <div class="modal-content">
      <div class="modal-header">
        <h3>预约详情</h3>
        <button class="modal-close" aria-label="关闭">×</button>
      </div>
      <div class="modal-body" id="booking-detail-content">
        <!-- 由JS渲染 -->
      </div>
    </div>
  </div>

  <!-- 婉拒原因模态框 -->
  <div id="reject-modal" class="modal">
    <div class="modal-overlay"></div>
    <div class="modal-content modal-sm">
      <div class="modal-header">
        <h3>婉拒预约</h3>
        <button class="modal-close" aria-label="关闭">×</button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label>婉拒原因（选填）</label>
          <textarea id="reject-reason" rows="3" placeholder="请输入婉拒原因，以便游客了解情况..."></textarea>
        </div>
        <div class="form-actions">
          <button type="button" class="btn btn-outline" onclick="closeModal('reject-modal')">取消</button>
          <button type="button" class="btn btn-danger" onclick="confirmReject()">确认婉拒</button>
        </div>
      </div>
    </div>
  </div>

  <!-- 完成评价模态框 -->
  <div id="complete-modal" class="modal">
    <div class="modal-overlay"></div>
    <div class="modal-content modal-sm">
      <div class="modal-header">
        <h3>完成服务</h3>
        <button class="modal-close" aria-label="关闭">×</button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label>客户评分</label>
          <div class="rating-input">
            <span class="rating-star" data-rating="1" aria-hidden="true">★</span>
            <span class="rating-star" data-rating="2" aria-hidden="true">★</span>
            <span class="rating-star" data-rating="3" aria-hidden="true">★</span>
            <span class="rating-star" data-rating="4" aria-hidden="true">★</span>
            <span class="rating-star active" data-rating="5" aria-hidden="true">★</span>
          </div>
          <input type="hidden" id="complete-rating" value="5">
        </div>
        <div class="form-actions">
          <button type="button" class="btn btn-outline" onclick="closeModal('complete-modal')">取消</button>
          <button type="button" class="btn btn-primary" onclick="confirmComplete()">确认完成</button>
        </div>
      </div>
    </div>
  </div>

  <!-- 通知容器 -->
  <div id="notification-container" class="notification-container"></div>

  <!-- 页脚 -->
  <footer class="footer">
    <div class="container">
      <p>&copy; 2024 游导旅游. All rights reserved.</p>

  <style>
    /* 预约管理页面样式 */
    .header-stats {
      display: flex;
      gap: 16px;
    }
    
    .stat-badge {
      background: #fff;
      padding: 12px 20px;
      border-radius: 12px;
      text-align: center;
      box-shadow: var(--shadow);
      min-width: 100px;
    }
    
    .stat-badge .stat-num {
      display: block;
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--primary);
    }
    
    .stat-badge .stat-label {
      font-size: 0.85rem;
      color: var(--gray-600);
    }
    
    .stat-badge.pending .stat-num { color: #f59e0b; }
    .stat-badge.confirmed .stat-num { color: #10b981; }
    .stat-badge.completed .stat-num { color: #6366f1; }
    
    .booking-tabs {
      display: flex;
      gap: 12px;
      margin-bottom: 24px;
      border-bottom: 2px solid var(--gray-200);
      padding-bottom: 0;
    }
    
    .booking-tab {
      padding: 12px 24px;
      background: none;
      border: none;
      cursor: pointer;
      font-size: 1rem;
      color: var(--gray-600);
      position: relative;
      display: flex;
      align-items: center;
      gap: 8px;
      transition: var(--transition);
    }
    
    .booking-tab:hover {
      color: var(--primary);
    }
    
    .booking-tab.active {
      color: var(--primary);
      font-weight: 600;
    }
    
    .booking-tab.active::after {
      content: '';
      position: absolute;
      bottom: -2px;
      left: 0;
      right: 0;
      height: 3px;
      background: var(--primary);
      border-radius: 3px 3px 0 0;
    }
    
    .tab-count {
      background: var(--gray-100);
      padding: 2px 8px;
      border-radius: 12px;
      font-size: 0.85rem;
    }
    
    .booking-tab.active .tab-count {
      background: var(--primary-light);
      color: var(--primary);
    }
    
    .booking-panel {
      display: none;
    }
    
    .booking-panel.active {
      display: block;
    }
    
    .bookings-list {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    
    .booking-card {
      background: #fff;
      border-radius: 16px;
      padding: 20px;
      box-shadow: var(--shadow);
      transition: var(--transition);
    }
    
    .booking-card:hover {
      box-shadow: var(--shadow-md);
      transform: translateY(-2px);
    }
    
    .booking-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 16px;
    }
    
    .customer-info {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    
    .customer-avatar {
      width: 48px;
      height: 48px;
      background: var(--primary-light);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.5rem;
    }
    
    .customer-name {
      display: block;
      font-weight: 600;
      font-size: 1.1rem;
      color: var(--gray-900);
    }
    
    .customer-phone {
      display: block;
      font-size: 0.85rem;
      color: var(--gray-500);
    }
    
    .booking-status {
      padding: 6px 14px;
      border-radius: 20px;
      font-size: 0.85rem;
      font-weight: 500;
    }
    
    .booking-status.pending {
      background: #FEF3C7;
      color: #B45309;
    }
    
    .booking-status.confirmed {
      background: #D1FAE5;
      color: #047857;
    }
    
    .booking-status.completed {
      background: #E0E7FF;
      color: #4338CA;
    }
    
    .booking-details {
      padding: 16px 0;
      border-top: 1px solid var(--gray-100);
      border-bottom: 1px solid var(--gray-100);
    }
    
    .booking-title {
      font-size: 1.1rem;
      font-weight: 600;
      margin-bottom: 12px;
      color: var(--gray-900);
    }
    
    .booking-info {
      display: flex;
      flex-wrap: wrap;
      gap: 16px;
      font-size: 0.95rem;
      color: var(--gray-700);
    }
    
    .booking-info span {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    
    .booking-message {
      margin-top: 12px;
      padding: 12px;
      background: var(--gray-50);
      border-radius: 8px;
      font-size: 0.9rem;
      color: var(--gray-600);
    }
    
    .booking-actions {
      display: flex;
      gap: 12px;
      margin-top: 16px;
      justify-content: flex-end;
    }
    
    .booking-rating {
      margin-top: 16px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    
    .booking-rating .stars {
      display: flex;
    }
    
    .booking-rating .star {
      color: var(--gray-300);
      font-size: 1.2rem;
    }
    
    .booking-rating .star.filled {
      color: #FBBF24;
    }
    
    .filter-bar {
      display: flex;
      gap: 12px;
      margin-bottom: 16px;
    }
    
    .filter-select {
      padding: 10px 16px;
      border: 2px solid var(--gray-200);
      border-radius: 8px;
      font-size: 0.95rem;
      cursor: pointer;
    }
    
    .rating-input {
      display: flex;
      gap: 8px;
      margin: 12px 0;
    }
    
    .rating-star {
      font-size: 2rem;
      color: var(--gray-300);
      cursor: pointer;
      transition: var(--transition);
    }
    
    .rating-star:hover,
    .rating-star.active {
      color: #FBBF24;
    }
    
    .rating-star:hover ~ .rating-star {
      color: var(--gray-300);
    }
    
    .btn-danger {
      background: #EF4444;
      color: #fff;
      border: none;
    }
    
    .btn-danger:hover {
      background: #DC2626;
    }
    
    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--gray-500);
    }
    
    .empty-state::before {
      content: '📭';
      display: block;
      font-size: 3rem;
      margin-bottom: 16px;
    }

    @media (max-width: 768px) {
      .header-stats {
        flex-wrap: wrap;
      }
      
      .stat-badge {
        flex: 1;
        min-width: 80px;
        padding: 10px 12px;
      }
      
      .booking-tabs {
        overflow-x: auto;
        -webkit-overflow-scrolling: touch;
      }
      
      .booking-tab {
        white-space: nowrap;
      }
    }
  </style>

  <script src="js/guide-schedule.js"></script>
  <script>
    let currentRejectBookingId = null;
    let currentCompleteBookingId = null;
    
    document.addEventListener('DOMContentLoaded', function() {
      // 初始化预约列表
      scheduleManager.refreshBookingList();
      
      // 更新统计
      updateBookingStats();
      
      // 标签页切换
      document.querySelectorAll('.booking-tab').forEach(tab => {
        tab.addEventListener('click', function() {
          const tabName = this.dataset.tab;
          switchTab(tabName);
        });
      });
      
      // 评分选择
      document.querySelectorAll('.rating-star').forEach(star => {
        star.addEventListener('click', function() {
          const rating = this.dataset.rating;
          document.getElementById('complete-rating').value = rating;
          document.querySelectorAll('.rating-star').forEach((s, i) => {
            s.classList.toggle('active', i < rating);
          });
        });
      });
      
      // 历史记录筛选
      document.getElementById('completed-filter').addEventListener('change', filterCompleted);
      document.getElementById('completed-sort').addEventListener('change', sortCompleted);
    });
    
    function switchTab(tabName) {
      document.querySelectorAll('.booking-tab').forEach(tab => {
        tab.classList.toggle('active', tab.dataset.tab === tabName);
      });
      
      document.querySelectorAll('.booking-panel').forEach(panel => {
        panel.classList.toggle('active', panel.id === tabName + '-panel');
      });
    }
    
    function updateBookingStats() {
      const bookings = scheduleManager.bookings;
      document.getElementById('pending-count').textContent = bookings.pending.length;
      document.getElementById('pending-tab-count').textContent = bookings.pending.length;
      document.getElementById('confirmed-count').textContent = bookings.confirmed.length;
      document.getElementById('confirmed-tab-count').textContent = bookings.confirmed.length;
      document.getElementById('completed-count').textContent = bookings.completed.length;
      document.getElementById('completed-tab-count').textContent = bookings.completed.length;
    }
    
    function showRejectModal(bookingId) {
      currentRejectBookingId = bookingId;
      document.getElementById('reject-reason').value = '';
      document.getElementById('reject-modal').classList.add('active');
    }
    
    function confirmReject() {
      if (currentRejectBookingId) {
        const reason = document.getElementById('reject-reason').value;
        scheduleManager.rejectBooking(currentRejectBookingId, reason);
        scheduleManager.showToast('已婉拒预约');
        scheduleManager.refreshBookingList();
        updateBookingStats();
        closeModal('reject-modal');
        currentRejectBookingId = null;
      }
    }
    
    function completeBookingFromUI(bookingId) {
      currentCompleteBookingId = bookingId;
      document.getElementById('complete-modal').classList.add('active');
    }
    
    function confirmComplete() {
      if (currentCompleteBookingId) {
        const rating = parseInt(document.getElementById('complete-rating').value);
        scheduleManager.completeBooking(currentCompleteBookingId, rating);
        scheduleManager.showToast('服务已完成');
        scheduleManager.refreshBookingList();
        updateBookingStats();
        closeModal('complete-modal');
        currentCompleteBookingId = null;
      }
    }
    
    function contactCustomer(phone) {
      window.location.href = `tel:${phone}`;
    }
    
    function filterCompleted() {
      // 筛选逻辑
      scheduleManager.refreshCompletedBookings();
    }
    
    function sortCompleted() {
      // 排序逻辑
      scheduleManager.refreshCompletedBookings();
    }
    
    function showBookingDetail(bookingId) {
      const booking = scheduleManager.getBookingById(bookingId);
      if (!booking) return;
      
      const content = `
        <div class="booking-detail-card">
          <div class="detail-section">
            <h4>客户信息</h4>
            <div class="detail-row">
              <span class="detail-label">姓名</span>
              <span class="detail-value">${booking.customerName}</span>
            </div>
            <div class="detail-row">
              <span class="detail-label">电话</span>
              <span class="detail-value">${booking.customerPhone}</span>
            </div>
          </div>
          <div class="detail-section">
            <h4>预约信息</h4>
            <div class="detail-row">
              <span class="detail-label">行程</span>
              <span class="detail-value">${booking.scheduleTitle}</span>
            </div>
            <div class="detail-row">
              <span class="detail-label">日期</span>
              <span class="detail-value">${booking.date} ${booking.time || ''}</span>
            </div>
            <div class="detail-row">
              <span class="detail-label">人数</span>
              <span class="detail-value">${booking.participants}人</span>
            </div>
            <div class="detail-row">
              <span class="detail-label">总价</span>
              <span class="detail-value">¥${booking.totalPrice}</span>
            </div>
          </div>
          ${booking.message ? `
          <div class="detail-section">
            <h4>客户留言</h4>
            <p class="detail-message">${booking.message}</p>
          </div>
          ` : ''}
        </div>
      `;
      
      document.getElementById('booking-detail-content').innerHTML = content;
      document.getElementById('booking-detail-modal').classList.add('active');
    }
  </script>
</body>
</html>
